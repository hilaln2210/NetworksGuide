<script>
(function(){
// [theory, scenario|null, question, [opts], correctIdx, explanation]
// BALANCED: correct answer index varies (0-3), lengths are similar
var QS=[
["<strong>SOC (Security Operations Center)</strong> \u05d4\u05d5\u05d0 \u05de\u05e8\u05db\u05d6 \u05d4\u05e0\u05d9\u05d8\u05d5\u05e8 \u05d5\u05d4\u05ea\u05d2\u05d5\u05d1\u05d4 \u05dc\u05d0\u05d9\u05e8\u05d5\u05e2\u05d9 \u05d0\u05d1\u05d8\u05d7\u05d4. \u05e2\u05d5\u05d1\u05d3 24/7 \u05e2\u05dd 3 \u05e8\u05de\u05d5\u05ea: <strong>Tier 1</strong> (\u05de\u05d5\u05e0\u05d9\u05d8\u05d5\u05e8\u05d9\u05dd \u2014 \u05de\u05e1\u05e0\u05e0\u05d9\u05dd \u05d5\u05de\u05e1\u05dc\u05d9\u05de\u05d9\u05dd), <strong>Tier 2</strong> (\u05d0\u05e0\u05dc\u05d9\u05e1\u05d8\u05d9\u05dd \u2014 \u05d7\u05d5\u05e7\u05e8\u05d9\u05dd \u05dc\u05e2\u05d5\u05de\u05e7), <strong>Tier 3</strong> (\u05de\u05d5\u05de\u05d7\u05d9\u05dd \u2014 threat hunting, malware analysis).",
null,
"\u05de\u05d4 \u05ea\u05e4\u05e7\u05d9\u05d3 \u05d0\u05e0\u05dc\u05d9\u05e1\u05d8 Tier 1?",
["Threat hunting \u05d5\u05de\u05d7\u05e7\u05e8 \u05de\u05e2\u05de\u05d9\u05e7 \u05e9\u05dc malware","\u05e1\u05d9\u05e0\u05d5\u05df \u05d4\u05ea\u05e8\u05d0\u05d5\u05ea, \u05e1\u05d9\u05d5\u05d5\u05d2 \u05e8\u05d0\u05e9\u05d5\u05e0\u05d9, \u05d4\u05e1\u05dc\u05de\u05d4 \u05dc-Tier 2","\u05db\u05ea\u05d9\u05d1\u05ea \u05db\u05dc\u05dc\u05d9 Firewall \u05d5-IDS \u05de\u05d0\u05e4\u05e1","\u05e4\u05d9\u05ea\u05d5\u05d7 \u05db\u05dc\u05d9 \u05d6\u05d9\u05d4\u05d5\u05d9 \u05d7\u05d3\u05e9\u05d9\u05dd \u05dc\u05d0\u05e8\u05d2\u05d5\u05df"],1,
"Tier 1 = \u05e7\u05d5 \u05e8\u05d0\u05e9\u05d5\u05df. \u05de\u05e1\u05e0\u05df alerts, \u05de\u05e1\u05d5\u05d5\u05d2 (true positive \u05d0\u05d5 false positive?), \u05de\u05e1\u05dc\u05d9\u05dd \u05d7\u05e7\u05d9\u05e8\u05d5\u05ea \u05de\u05d5\u05e8\u05db\u05d1\u05d5\u05ea \u05dc-Tier 2. Tier 2 = \u05d7\u05e7\u05d9\u05e8\u05d4. Tier 3 = hunting \u05d5\u05e0\u05d9\u05ea\u05d5\u05d7 malware."],

["<strong>SIEM (Security Information and Event Management)</strong> \u05d0\u05d5\u05e1\u05e3 \u05dc\u05d5\u05d2\u05d9\u05dd \u05de\u05db\u05dc \u05d4\u05de\u05e7\u05d5\u05e8\u05d5\u05ea, \u05de\u05e0\u05ea\u05d7 \u05d5\u05de\u05ea\u05d0\u05dd \u05d0\u05d9\u05e8\u05d5\u05e2\u05d9\u05dd. \u05db\u05dc\u05d9\u05dd: Splunk, QRadar, Elastic SIEM, Microsoft Sentinel.",
"\u05d4-SIEM \u05de\u05e8\u05d0\u05d4 5 \u05db\u05e9\u05dc\u05d5\u05e0\u05d5\u05ea login \u05de\u05d0\u05d5\u05ea\u05d5 IP \u05ea\u05d5\u05da 2 \u05d3\u05e7\u05d5\u05ea, \u05d5\u05d0\u05d7\u05e8\u05d9\u05d4\u05dd login \u05de\u05d5\u05e6\u05dc\u05d7 \u05dc\u05d7\u05e9\u05d1\u05d5\u05df admin.",
"\u05de\u05d4 \u05e1\u05d5\u05d2 \u05d4\u05d4\u05ea\u05e7\u05e4\u05d4?",
["DDoS \u05e2\u05dc \u05e9\u05e8\u05ea \u05d4-authentication","Brute Force \u05e9\u05d4\u05e6\u05dc\u05d9\u05d7","SQL Injection \u05d3\u05e8\u05da \u05d3\u05e3 \u05d4-login","Port scan \u05e9\u05d1\u05de\u05e7\u05e8\u05d4 \u05e4\u05d2\u05e2 \u05d1\u05e4\u05d5\u05e8\u05d8 \u05e9\u05dc SSH"],1,
"5 \u05db\u05e9\u05dc\u05d5\u05e0\u05d5\u05ea \u05d5\u05d0\u05d7\u05e8\u05d9\u05d4\u05dd \u05d4\u05e6\u05dc\u05d7\u05d4 = Brute Force \u05e7\u05dc\u05d0\u05e1\u05d9. DDoS = \u05d4\u05e8\u05d1\u05d4 \u05d9\u05d5\u05ea\u05e8 \u05e0\u05d9\u05e1\u05d9\u05d5\u05e0\u05d5\u05ea. SQLi = \u05dc\u05d0 \u05e0\u05e8\u05d0\u05d4 \u05db\u05da \u05d1\u05dc\u05d5\u05d2\u05d9\u05dd. Port scan = \u05e4\u05d5\u05e8\u05d8\u05d9\u05dd \u05e9\u05d5\u05e0\u05d9\u05dd, \u05dc\u05d0 login."],

["<strong>IOC (Indicator of Compromise)</strong> = \u05e2\u05d3\u05d5\u05ea \u05dc\u05e4\u05e8\u05d9\u05e6\u05d4. \u05e1\u05d5\u05d2\u05d9\u05dd: IP \u05d6\u05d3\u05d5\u05e0\u05d9, \u05d3\u05d5\u05de\u05d9\u05d9\u05df C2, hash \u05e9\u05dc malware, email \u05e9\u05dc \u05e9\u05d5\u05dc\u05d7 phishing, registry key \u05d7\u05e9\u05d5\u05d3.",
null,
"\u05d0\u05d9\u05d6\u05d4 \u05de\u05d4\u05d1\u05d0\u05d9\u05dd \u05d4\u05d5\u05d0 IOC?",
["IP \u05e9\u05dc \u05e9\u05e8\u05ea C2 \u05d9\u05d3\u05d5\u05e2","Firewall rule \u05e9\u05d7\u05d5\u05e1\u05dd \u05ea\u05e2\u05d1\u05d5\u05e8\u05d4","SLA \u05e9\u05dc \u05e1\u05e4\u05e7 \u05d4\u05d0\u05d9\u05e0\u05d8\u05e8\u05e0\u05d8","\u05d4\u05d3\u05e8\u05db\u05d4 \u05e9\u05dc \u05d4\u05e2\u05d5\u05d1\u05d3\u05d9\u05dd \u05dc\u05e2\u05d3\u05db\u05df \u05e1\u05d9\u05e1\u05de\u05d0\u05d5\u05ea"],0,
"IOC = \u05e2\u05d3\u05d5\u05ea \u05dc\u05e4\u05e8\u05d9\u05e6\u05d4 \u05e9\u05db\u05d1\u05e8 \u05e7\u05e8\u05ea\u05d4. IP/domain/hash \u05d6\u05d3\u05d5\u05e0\u05d9 = IOC. Firewall rule = \u05d4\u05d2\u05e0\u05d4. SLA = \u05d4\u05e1\u05db\u05dd. \u05d4\u05d3\u05e8\u05db\u05d4 = \u05de\u05d3\u05d9\u05e0\u05d9\u05d5\u05ea."],

["<strong>Incident Response</strong> \u05dc\u05e4\u05d9 NIST: 1) Preparation, 2) Detection & Analysis, 3) Containment, 4) Eradication & Recovery, 5) Lessons Learned.",
"\u05d6\u05d9\u05d4\u05d9\u05ea ransomware \u05e9\u05de\u05e6\u05e4\u05d9\u05df \u05e7\u05d1\u05e6\u05d9\u05dd \u05d1\u05e9\u05e8\u05ea. \u05e2\u05d3\u05d9\u05d9\u05df \u05dc\u05d0 \u05d4\u05ea\u05e4\u05e9\u05d8 \u05dc\u05e9\u05e8\u05ea\u05d9\u05dd \u05d0\u05d7\u05e8\u05d9\u05dd.",
"\u05de\u05d4 \u05d4\u05e6\u05e2\u05d3 \u05d4\u05e8\u05d0\u05e9\u05d5\u05df?",
["Eradication \u2014 \u05de\u05d7\u05d9\u05e7\u05ea \u05d4-malware \u05d5\u05e0\u05d9\u05e7\u05d5\u05d9 \u05d4\u05e9\u05e8\u05ea","\u05ea\u05e9\u05dc\u05d5\u05dd \u05d4\u05db\u05d5\u05e4\u05e8 \u05dc\u05ea\u05d5\u05e7\u05e3","\u05d4\u05e4\u05e2\u05dc\u05ea \u05d4\u05d2\u05d9\u05d1\u05d5\u05d9 \u05d4\u05d0\u05d7\u05e8\u05d5\u05df","Containment \u2014 \u05d1\u05d9\u05d3\u05d5\u05d3 \u05d4\u05de\u05db\u05d5\u05e0\u05d4 \u05de\u05d4\u05e8\u05e9\u05ea"],3,
"Containment \u05e7\u05d5\u05d3\u05dd! \u05dc\u05e0\u05ea\u05e7 \u05d0\u05ea \u05d4\u05de\u05db\u05d5\u05e0\u05d4 \u05de\u05d4\u05e8\u05e9\u05ea \u05db\u05d3\u05d9 \u05e9\u05d4-ransomware \u05dc\u05d0 \u05d9\u05ea\u05e4\u05e9\u05d8. \u05e8\u05e7 \u05d0\u05d7\u05e8\u05d9 containment: eradication, recovery, lessons learned. \u05ea\u05e9\u05dc\u05d5\u05dd \u05db\u05d5\u05e4\u05e8 = \u05dc\u05d0 \u05de\u05d5\u05de\u05dc\u05e5."],

["<strong>Log Analysis</strong> \u2014 \u05dc\u05d5\u05d2\u05d9\u05dd \u05d4\u05dd \u05e2\u05d9\u05e0\u05d9 \u05d4-SOC. \u05de\u05e7\u05d5\u05e8\u05d5\u05ea: Firewall, IDS/IPS, OS (Windows Event Log, syslog), Application, Authentication, DNS, Proxy.",
"\u05d1\u05dc\u05d5\u05d2 DNS \u05e8\u05d5\u05d0\u05d9\u05dd \u05e9\u05de\u05db\u05d5\u05e0\u05d4 \u05e4\u05e0\u05d9\u05de\u05d9\u05ea \u05e4\u05d5\u05e0\u05d4 \u05dc\u05d3\u05d5\u05de\u05d9\u05d9\u05df x7k2m.evil.com \u05db\u05dc 30 \u05e9\u05e0\u05d9\u05d5\u05ea.",
"\u05de\u05d4 \u05d6\u05d4 \u05de\u05e6\u05d9\u05e2 \u05e2\u05dc?",
["\u05d2\u05dc\u05d9\u05e9\u05d4 \u05e8\u05d2\u05d9\u05dc\u05d4 \u05dc\u05d0\u05ea\u05e8 \u05e2\u05dd \u05e9\u05dd \u05de\u05d5\u05d6\u05e8","\u05e9\u05d2\u05d9\u05d0\u05ea DNS \u05d6\u05de\u05e0\u05d9\u05ea \u05d1\u05d4\u05d2\u05d3\u05e8\u05d5\u05ea","DNS beaconing \u2014 C2 communication","Windows Update \u05d1\u05e8\u05e7\u05e2"],2,
"DNS beaconing: malware \u05de\u05ea\u05e7\u05e9\u05e8 \u05e2\u05dd C2 server \u05d3\u05e8\u05da DNS queries \u05e7\u05d1\u05d5\u05e2\u05d9\u05dd. \u05e9\u05dd \u05d3\u05d5\u05de\u05d9\u05d9\u05df \u05d0\u05e7\u05e8\u05d0\u05d9 + \u05ea\u05d3\u05d9\u05e8\u05d5\u05ea \u05e7\u05d1\u05d5\u05e2\u05d4 = C2 \u05e7\u05dc\u05d0\u05e1\u05d9. \u05d4\u05d2\u05e0\u05d4: \u05d7\u05e1\u05d9\u05de\u05ea \u05d4\u05d3\u05d5\u05de\u05d9\u05d9\u05df, \u05d1\u05d9\u05d3\u05d5\u05d3 \u05d4\u05de\u05db\u05d5\u05e0\u05d4."],
