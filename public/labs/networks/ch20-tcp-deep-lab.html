<style>

.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(96,165,250,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(96,165,250,0.03) 1px,transparent 1px);background-size:40px 40px;}

.logo{display:flex;align-items:center;gap:10px;}.icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--acc),#2563eb);display:flex;align-items:center;justify-content:center;font-size:18px;}.logo h1{font-family:'Space Mono',monospace;font-size:14px;color:var(--acc);}.logo .sub{font-size:11px;color:var(--t2);}

.opt.ok{border-color:var(--green);background:var(--gd);}.opt.ok .ol{background:var(--green);color:var(--bg);}.opt.no{border-color:var(--red);background:var(--rd);}.opt.no .ol{background:var(--red);color:#fff;}.opt.dis{pointer-events:none;opacity:.5;}
.fb{margin-top:10px;padding:10px;border-radius:8px;font-size:11px;line-height:1.7;display:none;}.fb.show{display:block;animation:up .3s;}.fb.fok{background:var(--gd);border:1px solid rgba(74,222,128,0.2);color:#86efac;}.fb.fno{background:var(--rd);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.foot{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 70%,transparent);padding:14px 16px 10px;z-index:50;}.foot-in{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}.fts{display:flex;gap:14px;}.fs{text-align:center;}.fv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--acc);}.fl{font-size:8px;color:var(--t2);}

.rg{display:inline-block;font-family:'Space Mono',monospace;font-size:36px;font-weight:700;padding:8px 24px;border-radius:12px;margin-bottom:16px;}.ga{background:var(--gd);color:var(--green);border:2px solid var(--green);}.gb{background:var(--ad);color:var(--acc);border:2px solid var(--acc);}.gc{background:rgba(251,146,60,0.1);color:var(--gold);border:2px solid var(--gold);}.gf{background:var(--rd);color:var(--red);border:2px solid var(--red);}
.retry{margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 24px;color:var(--acc);font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}

<header><div class="logo"><div class="icon">🔬</div><div><h1>Lab — פרק 20</h1><div class="sub">TCP בעומק — Flow Control, Congestion, States</div></div></div><div class="badge"><div class="dot"></div><span id="timer">00:00</span></div></header>
<div class="pbar"><div class="ptr"><div class="pfl" id="pfl" style="width:0%"></div></div><div class="plbl" id="plbl">0 / 8</div></div>
<div class="wrap" id="area"></div><div class="res" id="resScr"></div>
<div class="foot" id="foot"><div class="foot-in"><div class="fts"><div class="fs"><div class="fv" id="sS">0</div><div class="fl">נקודות</div></div><div class="fs"><div class="fv" id="sC">0</div><div class="fl">נכונות</div></div><div class="fs"><div class="fv" id="sK">0</div><div class="fl">רצף🔥</div></div></div><button class="nb" id="nBtn" disabled onclick="nextQ()">הבא ←</button></div></div>
<script>
(function(){
var QS=[
["<strong>TCP States</strong> מתארים את מצב החיבור בכל רגע. החיבור עובר דרך מצבים מוגדרים: LISTEN (שרת מחכה), SYN_SENT (לקוח שלח SYN), SYN_RECEIVED (שרת קיבל), <strong>ESTABLISHED</strong> (חיבור פעיל!), FIN_WAIT/CLOSE_WAIT (סוגרים), ו-<strong>TIME_WAIT</strong> (מחכה שpackets ישנים ימותו). בnetstat/ss רואים את המצבים האלה.",
"למה חיבור TCP נשאר ב-TIME_WAIT אחרי סגירה?",
["באג במערכת","מחכה 2×MSL כדי לוודא שpackets ישנים מהחיבור הקודם לא יתבלבלו עם חיבור חדש","כי השרת עדיין שולח","כי ה-Firewall חוסם"],1,
"TIME_WAIT = 2×MSL (Maximum Segment Lifetime, בד\"כ 60 שניות). מטרות: 1) וידוא שה-ACK האחרון הגיע. 2) ניקוי packets תקועים ברשת. בלי TIME_WAIT, packet ישן יכול להגיע לחיבור חדש באותו port ולשבש אותו.",
"TCP State Machine (simplified):\n\n  CLOSED\n    |\n  [Server: bind+listen]\n    v\n  LISTEN ----[SYN received]----> SYN_RCVD\n                                    |\n  [Client: connect]              [SYN-ACK sent]\n    v                               |\n  SYN_SENT --[SYN-ACK rcvd]--> ESTABLISHED\n                                    |\n                              [FIN sent/rcvd]\n                                    v\n                              FIN_WAIT / CLOSE_WAIT\n                                    |\n                                    v\n                              TIME_WAIT (2*MSL = ~60s)\n                                    |\n                                    v\n                                 CLOSED"],

["<strong>Sliding Window</strong> הוא המנגנון שמאפשר לTCP לשלוח כמה packets לפני שמקבל ACK. בלעדיו, היינו שולחים packet, מחכים ל-ACK, שולחים עוד אחד — סופר איטי. עם Sliding Window, השולח שולח window מלא של packets ברצף, וה-window \"מחליק\" קדימה ככל שACKs חוזרים.",
"למה Sliding Window מהיר מStop-and-Wait?",
["כי הוא מצפין","שולח מספר packets ברצף בלי לחכות לACK על כל אחד — מנצל את ה-bandwidth","כי הוא UDP","כי הוא לא בודק שגיאות"],1,
"Stop-and-Wait: שלח→חכה→ACK→שלח. אם RTT=100ms, שולח 1 packet כל 100ms. Sliding Window=4: שולח 4 packets, ACK על הראשון חוזר, שולח עוד אחד. Pipeline מלא = 4× throughput.",
"Stop-and-Wait (slow!):\n  Send #1 -> wait -> ACK -> Send #2 -> wait -> ACK\n  1 packet per RTT\n\nSliding Window=4 (fast!):\n  Send #1, #2, #3, #4\n  ACK #1 arrives -> Send #5\n  ACK #2 arrives -> Send #6\n  Window slides forward!\n  4 packets in flight = 4x throughput"],

["<strong>Congestion Control</strong> מונע הצפה של הרשת. TCP מתחיל בזהירות (<strong>Slow Start</strong>): window=1, שולח, ACK חוזר, window=2, שולח, ACK, window=4... מכפיל כל RTT. כשמגיע ל-<strong>Threshold</strong>, עובר ל-<strong>Congestion Avoidance</strong> (גדל ב-1 כל RTT). אם יש loss — חוזר אחורה. האלגוריתם המודרני הנפוץ הוא <strong>Cubic</strong> (Linux) ו-<strong>BBR</strong> (Google).",
"מה ההבדל בין Slow Start ל-Congestion Avoidance?",
["אין הבדל","Slow Start מכפיל window כל RTT (אקספוננציאלי); Congestion Avoidance מגדיל ב-1 (לינארי)","Slow Start מהיר יותר תמיד","Congestion Avoidance רק ב-UDP"],1,
"Slow Start: 1→2→4→8→16 (exponential). מהר! אבל מסוכן — יכול להציף. ברגע שמגיעים ל-ssthresh (slow start threshold), עוברים ל-CA: 16→17→18→19 (linear). אם loss — ssthresh = window/2, חזרה ל-Slow Start.",
"Congestion Window over time:\n\n  cwnd\n  32 |            * loss!\n  16 |           /|\n   8 |         /  | ssthresh=16\n   4 |       /    | Congestion\n   2 |     / SS   | Avoidance\n   1 |   /        | (linear)\n     +--/--+------+-------->\n     Slow    threshold   time\n     Start\n     (exp)\n\n  After loss:\n    ssthresh = cwnd/2\n    cwnd = 1 (TCP Reno)\n    cwnd = cwnd/2 (TCP Cubic)"],

["<strong>TCP Keepalive</strong> פותר בעיה: מה קורה אם חיבור TCP פעיל אבל אין תעבורה? אם הצד השני נפל, אין דרך לדעת. Keepalive שולח probe packets ריקים כל כמה זמן (בד\"כ 2 שעות ב-Linux). אם אין תשובה אחרי כמה ניסיונות — סוגר את החיבור.",
"מה קורה ללא TCP Keepalive כשצד אחד נפל?",
["החיבור נסגר אוטומטית","החיבור נשאר 'פתוח' לנצח בצד השני — חיבור רפאים שצורך משאבים","ה-OS מזהה תוך שנייה","Router סוגר"],1,
"Half-open connection: צד A נפל (כיבוי, crash, כבל נשלף). צד B לא יודע — החיבור נראה ESTABLISHED. ללא Keepalive, הוא ישאר כך לנצח וישמור socket + זיכרון. עם Keepalive: אחרי ~2 שעות + 9 probes = timeout → close.",
"TCP Keepalive (Linux defaults):\n\n  tcp_keepalive_time  = 7200  (2 hours)\n  tcp_keepalive_intvl = 75    (75 seconds)\n  tcp_keepalive_probes = 9    (9 retries)\n\n  Timeline:\n    0h   Last data sent/received\n    2h   First keepalive probe\n    2h+75s  Second probe\n    ...     (9 probes total)\n    2h+11m  Connection closed (no response)\n\n  setsockopt(sock, SOL_SOCKET, SO_KEEPALIVE, 1)"],

["<strong>Nagle's Algorithm</strong> אוסף bytes קטנים ושולח אותם יחד ב-segment אחד גדול — במקום לשלוח segment לכל byte. זה חוסך bandwidth (40 bytes header ל-1 byte payload = בזבוז). אבל ל-real-time apps (SSH, gaming) זה מוסיף delay. לכן יש <strong>TCP_NODELAY</strong> שמכבה את Nagle.",
"מתי כדאי להפעיל TCP_NODELAY?",
["תמיד","ב-real-time apps כמו SSH, gaming, trading — שם latency חשוב יותר מ-bandwidth","כשרוצים חיסכון bandwidth","כשמעבירים קבצים גדולים"],1,
"Nagle: אוסף data קטן, מחכה ל-ACK או ל-MSS מלא. טוב ל-bulk transfer. רע ל-interactive: SSH keystroke = delay עד שנאספו מספיק bytes. TCP_NODELAY = שלח מיד, בלי לחכות. כל trading platform ו-game server מפעיל TCP_NODELAY.",
"Without Nagle (TCP_NODELAY):\n  Type 'H' -> [H] sent immediately\n  Type 'i' -> [i] sent immediately\n  Fast response! But: 2 packets with 40B header each\n\nWith Nagle (default):\n  Type 'H' -> buffer...\n  Type 'i' -> buffer...\n  ACK arrives or buffer full -> [Hi] sent\n  Saves bandwidth! But: typing delay in SSH\n\nsetsockopt(sock, IPPROTO_TCP, TCP_NODELAY, 1)"],

["<strong>TCP Fast Open (TFO)</strong> מאפשר לשלוח data כבר ב-SYN הראשון — חוסך RTT שלם! בחיבור TCP רגיל: SYN→SYN-ACK→ACK→Data (1.5 RTT). עם TFO: SYN+Data→SYN-ACK+Data (0.5 RTT!). עובד עם cookie שנשמר מחיבור קודם. Google משתמש ב-TFO ב-Chrome.",
"מה TFO חוסך?",
["bandwidth","RTT שלם — שולח data כבר ב-SYN במקום לחכות ל-handshake מלא","זיכרון","CPU"],1,
"Regular: SYN→SYN-ACK→ACK→GET / = 2 RTT before first byte. TFO: SYN+GET /→SYN-ACK+200 OK = 1 RTT! חסכון של 50%. עובד רק לrepeated connections (צריך TFO cookie מביקור קודם). HTTP/3 (QUIC) מרחיב את הרעיון ל-0-RTT."],

["<strong>MSS (Maximum Segment Size)</strong> הוא הגודל המקסימלי של data ב-TCP segment (בלי header). הוא מוסכם ב-SYN במהלך ה-handshake. ברוב המקרים MSS = MTU - 40 (20 IP + 20 TCP). עם MTU=1500, MSS=1460. אם MSS גדול מדי → fragmentation. אם קטן מדי → overhead.",
"למה MSS מוגדר ב-SYN ולא מאוחר יותר?",
["אקראי","כי שני הצדדים צריכים להסכים על גודל מקסימלי לפני שמתחילים לשלוח data","כי TCP לא תומך בשינוי","כי Router קובע"],1,
"MSS negotiation ב-SYN: כל צד מודיע על ה-MSS שלו. הצד עם ה-MSS הקטן יותר קובע. למה? כדי למנוע fragmentation. Path MTU Discovery יכול להקטין בהמשך אם יש Router בדרך עם MTU נמוך יותר.",
"SYN Handshake with MSS:\n\n  Client: SYN, MSS=1460\n  Server: SYN-ACK, MSS=1400\n  -> Use MSS=1400 (minimum!)\n\n  Calculation:\n    MTU = 1500\n    IP header = 20\n    TCP header = 20\n    MSS = 1500 - 40 = 1460\n\n  With VPN (extra header):\n    MTU = 1500 - 40 (VPN) = 1460\n    MSS = 1460 - 40 = 1420"],

["<strong>Selective Acknowledgment (SACK)</strong> משפר את ביצועי TCP כשpackets אובדים. בלי SACK, אם packets 1,2,3,5,6 הגיעו אבל 4 אבד — השולח צריך לשלוח מחדש את 4,5,6. עם SACK, המקבל אומר: \"קיבלתי 1-3 ו-5-6, חסר רק 4\" — השולח שולח רק את 4. חיסכון משמעותי.",
"מה SACK מייעל?",
["הצפנה","retransmission — המקבל מדווח בדיוק מה חסר, והשולח שולח רק את החסר","ניתוב","compression"],1,
"Without SACK (Go-Back-N): lost #4 → retransmit #4,5,6,7... (הכל מ-4 ואילך). With SACK: lost #4 → retransmit only #4! בקישורים עם packet loss גבוה (WiFi, satellite), SACK משפר throughput משמעותית. מופעל כברירת מחדל ברוב ה-OSes.",
"Without SACK:\n  Sent: [1][2][3][4][5][6]\n  Rcvd: [1][2][3][ ][5][6]  #4 lost!\n  ACK: \"I have up to 3\"\n  Retransmit: [4][5][6]  (3 packets!)\n\nWith SACK:\n  Sent: [1][2][3][4][5][6]\n  Rcvd: [1][2][3][ ][5][6]  #4 lost!\n  ACK: \"I have 1-3, SACK: 5-6\"\n  Retransmit: [4]          (1 packet!)\n\n  Huge improvement with packet loss!"]
];
var L="\u05D0\u05D1\u05D2\u05D3",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){var a=document.getElementById('area');a.innerHTML='';for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;var codeH=q[5]?'<div class="code">'+esc(q[5])+'</div>':'';var optsH='<div class="opts">';for(var j=0;j<q[2].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[2][j])+'</span></button>';}optsH+='</div>';card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="theory">'+q[0]+'</div><div class="qt">'+esc(q[1])+'</div>'+codeH+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';a.appendChild(card);}a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});}
function handleA(qi,oi){if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[3];var ok=oi===ci;ans[qi]=ok;var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}var fb=document.getElementById('fb-'+qi);if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 נכון! +10'+(sk>=3?' (+5 רצף!)':'');}else{sk=0;fb.className='fb show fno';fb.textContent='\u274C לא נכון';}fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[4]));document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='📊 תוצאות';}
window.nextQ=function(){if(cur>=QS.length-1){showRes();return;}document.getElementById('qc-'+cur).classList.remove('active');cur++;document.getElementById('qc-'+cur).classList.add('active');document.getElementById('nBtn').disabled=true;document.getElementById('qc-'+cur).scrollIntoView({behavior:'smooth',block:'center'});};
function showRes(){document.getElementById('area').style.display='none';document.getElementById('foot').style.display='none';var rs=document.getElementById('resScr');rs.classList.add('show');var pct=sc/(QS.length*10);var g,gc;if(pct>=.9){g='A+';gc='ga';}else if(pct>=.75){g='B';gc='gb';}else if(pct>=.55){g='C';gc='gc';}else{g='F';gc='gf';}var m=String(Math.floor(ts/60)).padStart(2,'0');var s=String(ts%60).padStart(2,'0');rs.innerHTML='<div class="re">'+(pct>=.9?'🏆':pct>=.75?'🎯':pct>=.55?'📚':'💪')+'</div><div class="rt" style="color:'+(pct>=.75?'var(--acc)':'var(--gold)')+'">'+  (pct>=.9?'TCP Deep Master!':pct>=.75?'מצוין!':pct>=.55?'בדרך הנכונה':'צריך חזרה')+'</div><div class="rsu">'+cc+'/'+QS.length+' | '+sc+' נק\' | '+m+':'+s+' | רצף: '+mx+'</div><div class="rg '+gc+'">'+g+'</div><br><button class="retry" onclick="location.reload()">נסה שוב ↻</button>';}render();})();
</script></body></html>
