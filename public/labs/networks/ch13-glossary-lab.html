<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק 13 — מילון מושגים</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--bg2:#0c1119;--bg3:#141c28;--border:#1e2d42;--acc:#a3e635;--ad:rgba(163,230,53,0.1);--green:#4ade80;--gd:rgba(74,222,128,0.08);--red:#ef4444;--rd:rgba(239,68,68,0.1);--gold:#fbbf24;--text:#dfe6f0;--t2:#7b8da4;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(163,230,53,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(163,230,53,0.03) 1px,transparent 1px);background-size:40px 40px;}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#080e16,rgba(6,10,16,.97));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}.icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--acc),#65a30d);display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo h1{font-family:'Space Mono',monospace;font-size:14px;color:var(--acc);}.logo .sub{font-size:11px;color:var(--t2);}
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:b 2s infinite;}@keyframes b{0%,100%{opacity:1;}50%{opacity:.3;}}
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:10px;}.ptr{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}.pfl{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--acc),#65a30d);}.plbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);}
.wrap{padding:14px;padding-bottom:100px;position:relative;z-index:1;}
.qc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;display:none;}.qc.active{display:block;animation:up .3s ease;}@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.qh{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}.qtag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--ad);color:var(--acc);}.qpts{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);}
.qb{padding:14px;}.theory{font-size:13px;color:var(--t2);line-height:1.9;margin-bottom:14px;padding:12px 14px;background:var(--bg3);border-radius:10px;border-right:3px solid var(--acc);}.theory strong{color:var(--text);}
.qt{font-size:14px;font-weight:700;line-height:1.6;margin-bottom:12px;color:var(--acc);}
.opts{display:flex;flex-direction:column;gap:6px;}.opt{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;text-align:right;width:100%;color:var(--text);font-family:'Heebo',sans-serif;font-size:12px;line-height:1.5;}.opt:hover{border-color:var(--acc);background:var(--ad);}
.ol{width:24px;height:24px;flex-shrink:0;background:var(--ad);border:1px solid rgba(163,230,53,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--acc);}
.opt.ok{border-color:var(--green);background:var(--gd);}.opt.ok .ol{background:var(--green);color:var(--bg);}.opt.no{border-color:var(--red);background:var(--rd);}.opt.no .ol{background:var(--red);color:#fff;}.opt.dis{pointer-events:none;opacity:.5;}
.fb{margin-top:10px;padding:10px;border-radius:8px;font-size:11px;line-height:1.7;display:none;}.fb.show{display:block;animation:up .3s;}.fb.fok{background:var(--gd);border:1px solid rgba(74,222,128,0.2);color:#86efac;}.fb.fno{background:var(--rd);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.foot{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 70%,transparent);padding:14px 16px 10px;z-index:50;}.foot-in{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}.fts{display:flex;gap:14px;}.fs{text-align:center;}.fv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--acc);}.fl{font-size:8px;color:var(--t2);}
.nb{background:linear-gradient(135deg,var(--acc),#65a30d);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:'Heebo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}.nb:disabled{opacity:.3;cursor:not-allowed;}
.res{display:none;text-align:center;padding:30px 16px;position:relative;z-index:1;}.res.show{display:block;animation:up .5s;}.re{font-size:50px;margin-bottom:10px;}.rt{font-size:20px;font-weight:900;margin-bottom:6px;}.rsu{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:16px;}
.rg{display:inline-block;font-family:'Space Mono',monospace;font-size:36px;font-weight:700;padding:8px 24px;border-radius:12px;margin-bottom:16px;}.ga{background:var(--gd);color:var(--green);border:2px solid var(--green);}.gb{background:var(--ad);color:var(--acc);border:2px solid var(--acc);}.gc{background:rgba(251,146,60,0.1);color:var(--gold);border:2px solid var(--gold);}.gf{background:var(--rd);color:var(--red);border:2px solid var(--red);}
.retry{margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 24px;color:var(--acc);font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
</style></head><body><div class="grid"></div>
<header><div class="logo"><div class="icon">📖</div><div><h1>Lab — פרק 13</h1><div class="sub">מילון מושגים — Networking Glossary</div></div></div><div class="badge"><div class="dot"></div><span id="timer">00:00</span></div></header>
<div class="pbar"><div class="ptr"><div class="pfl" id="pfl" style="width:0%"></div></div><div class="plbl" id="plbl">0 / 8</div></div>
<div class="wrap" id="area"></div><div class="res" id="resScr"></div>
<div class="foot" id="foot"><div class="foot-in"><div class="fts"><div class="fs"><div class="fv" id="sS">0</div><div class="fl">נקודות</div></div><div class="fs"><div class="fv" id="sC">0</div><div class="fl">נכונות</div></div><div class="fs"><div class="fv" id="sK">0</div><div class="fl">רצף🔥</div></div></div><button class="nb" id="nBtn" disabled onclick="nextQ()">הבא ←</button></div></div>
<script>
(function(){
var QS=[
["<strong>Throughput</strong> הוא כמות הנתונים שבאמת עוברת ברשת ביחידת זמן. שימו לב להבדל מ-Bandwidth: Bandwidth הוא הקיבולת המקסימלית התיאורטית (כמו רוחב הכביש), ואילו Throughput הוא מה שבאמת עובר בפועל (כמה מכוניות באמת נוסעות). Throughput תמיד נמוך מ-Bandwidth בגלל overhead, עומסים, ושגיאות.",
"מה ההבדל בין Bandwidth ל-Throughput?",
["אין הבדל","Bandwidth = קיבולת מקסימלית תיאורטית; Throughput = מה שעובר בפועל (תמיד פחות)","Bandwidth = download; Throughput = upload","Bandwidth = WiFi; Throughput = Ethernet"],1,
"חיבור 100Mbps bandwidth לא אומר שתקבל 100Mbps throughput. Headers, retransmissions, congestion, ו-protocol overhead מורידים. Throughput אמיתי בד\"כ = 60-90% מה-Bandwidth. כלים למדידה: iperf3, speedtest."],

["<strong>Jitter</strong> הוא השונות בהשהיה (Latency) בין packets עוקבים. אם Packet 1 מגיע אחרי 10ms, Packet 2 אחרי 15ms, ו-Packet 3 אחרי 8ms — ה-Jitter הוא ההפרש הזה. Latency קבוע = Jitter נמוך = טוב. Latency משתנה = Jitter גבוה = בעיה ל-VoIP ווידאו.",
"למה Jitter בעייתי לשיחות VoIP?",
["כי הוא מצפין את הקול","כי שינויים בהשהיה גורמים לקול קטוע ומעוות — הצד השני שומע הפסקות","כי הוא מגדיל bandwidth","כי הוא חוסם UDP"],1,
"VoIP צריך packets שמגיעים בקצב קבוע. Jitter גבוה = packets לא מסונכרנים = קול קטוע. Jitter Buffer (מאגר זמני) יכול לפצות על jitter קטן, אבל jitter גדול = שיחה לא שמישה. מקסימום מומלץ: 30ms."],

["<strong>QoS (Quality of Service)</strong> הוא מנגנון שנותן עדיפויות שונות לסוגי תעבורה ברשת. למשל: שיחות VoIP מקבלות עדיפות על הורדת קבצים, כי שיחה צריכה latency נמוך בזמן אמת. QoS מסמן packets, מתעדף, ומקצה bandwidth לכל סוג.",
"איזה סוג תעבורה צריך עדיפות QoS הגבוהה ביותר?",
["הורדת קבצים","VoIP ווידאו בזמן אמת — כי הם רגישים ל-Latency ו-Jitter","גלישה באתרים","עדכוני תוכנה"],1,
"VoIP/Video = real-time, רגיש ל-latency ו-jitter. גלישה באתרים = חשוב אבל סובל עיכוב קל. הורדות/גיבויים = best effort, יכול לחכות. QoS מגדיר תורים (queues): Priority Queue ל-voice, Weighted Queue לשאר."],

["<strong>RFC (Request for Comments)</strong> הם המסמכים הרשמיים שמגדירים את הפרוטוקולים של האינטרנט. כל פרוטוקול חשוב מוגדר ב-RFC עם מספר. למשל: RFC 791 = IP, RFC 793 = TCP, RFC 2616 = HTTP/1.1. הם נכתבים ע\"י IETF (Internet Engineering Task Force) ופתוחים לכולם.",
"מה RFC 793 מגדיר?",
["HTTP","TCP (Transmission Control Protocol)","DNS","Ethernet"],1,
"RFCs חשובים: 791=IP, 793=TCP, 768=UDP, 2616=HTTP/1.1, 7540=HTTP/2, 1035=DNS, 5246=TLS 1.2, 1918=Private IPs. לקריאה: tools.ietf.org/html/rfc793. הם המקור האמיתי — כשיש ספק, קוראים את ה-RFC."],

["<strong>Unicast, Broadcast, Multicast</strong> הם שלושת סוגי השליחה ברשת. Unicast = שליחה למכשיר אחד ספציפי (1:1). Broadcast = שליחה לכל המכשירים ברשת (1:All). Multicast = שליחה לקבוצה מסוימת שנרשמה מראש (1:Many). רוב התעבורה היא Unicast.",
"מהו Multicast?",
["שליחה לכל המכשירים ברשת","שליחה לקבוצה שנרשמה מראש — 1:Many","שליחה למכשיר אחד","שידור רדיו"],1,
"Multicast IP range: 224.0.0.0 - 239.255.255.255. דוגמאות: IPTV (טלוויזיה ברשת), video conferencing, routing protocols (OSPF=224.0.0.5). יעיל כי השולח שולח פעם אחת, הרשת מכפילה רק למי שצריך."],

["<strong>Latency vs Bandwidth</strong> — שני מדדים שונים לגמרי. Bandwidth = כמה נתונים אפשר להעביר בשנייה (100Mbps). Latency = כמה זמן לוקח לpacket להגיע (10ms). דוגמה קלאסית: משאית מלאה ב-hard drives יש bandwidth עצום (TB/s!) אבל latency של שעות. חיבור fiber יש bandwidth טוב ו-latency נמוך.",
"רשת עם Bandwidth של 1Gbps ו-Latency של 200ms — טובה למה?",
["שיחות VoIP","הורדת קבצים גדולים — bandwidth גבוה לVolume, אבל VoIP יסבול מlatency","משחקים","גלישה מהירה"],1,
"Bandwidth גבוה = טוב להעברת כמויות. Latency נמוך = טוב לזמן אמת (gaming, VoIP, trading). הרשת הזו טובה להורדות (1Gbps = 125MB/s) אבל גרועה ל-VoIP (200ms = שיחה עם delay מורגש, מעל 150ms = בעייתי)."],

["<strong>Collision Domain</strong> הוא האזור ברשת שבו שני שידורים בו-זמנית גורמים להתנגשות. Hub = כל הפורטים באותו Collision Domain (כולם חולקים medium). Switch = כל פורט הוא CD נפרד (אין collisions!). זו הסיבה העיקרית ש-Switch החליף את ה-Hub.",
"כמה Collision Domains יש ב-Switch עם 24 פורטים?",
["1","24 — כל פורט = Collision Domain נפרד","12","0"],1,
"Switch = כל פורט עם נתיב נפרד = CD נפרד. Hub 24 פורטים = CD אחד (כולם מתנגשים). Switch 24 פורטים = 24 CDs + 1 Broadcast Domain. Switch עם VLANs = 24 CDs + BD per VLAN."],

["<strong>Encapsulation vs Tunneling</strong> — שניהם עוטפים נתונים, אבל בצורה שונה. Encapsulation = התהליך הרגיל של הוספת headers בכל שכבה (עטיפה מלמעלה למטה). Tunneling = לוקחים packet שלם ושמים אותו בתוך packet אחר, כמו מכתב בתוך מכתב. VPN משתמש ב-tunneling.",
"מה ההבדל בין Encapsulation רגיל ל-Tunneling?",
["אין הבדל","Encapsulation = הוספת headers בכל שכבה; Tunneling = עטיפת packet שלם בתוך packet אחר","Tunneling מהיר יותר","Encapsulation רק ל-UDP"],1,
"Tunneling: GRE, IPsec, WireGuard, SSH Tunnel — כולם לוקחים packet מקורי, מצפינים (אופציונלי), ועוטפים ב-IP header חדש. כך packet פרטי (192.168.x.x) יכול לעבור באינטרנט הציבורי בתוך מנהרה מוצפנת."]
];
var L="\u05D0\u05D1\u05D2\u05D3",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){var a=document.getElementById('area');a.innerHTML='';for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;var optsH='<div class="opts">';for(var j=0;j<q[2].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[2][j])+'</span></button>';}optsH+='</div>';card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="theory">'+q[0]+'</div><div class="qt">'+esc(q[1])+'</div>'+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';a.appendChild(card);}a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});}
function handleA(qi,oi){if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[3];var ok=oi===ci;ans[qi]=ok;var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}var fb=document.getElementById('fb-'+qi);if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 נכון! +10'+(sk>=3?' (+5 רצף!)':'');}else{sk=0;fb.className='fb show fno';fb.textContent='\u274C לא נכון';}fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[4]));document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='📊 תוצאות';}
window.nextQ=function(){if(cur>=QS.length-1){showRes();return;}document.getElementById('qc-'+cur).classList.remove('active');cur++;document.getElementById('qc-'+cur).classList.add('active');document.getElementById('nBtn').disabled=true;document.getElementById('qc-'+cur).scrollIntoView({behavior:'smooth',block:'center'});};
function showRes(){document.getElementById('area').style.display='none';document.getElementById('foot').style.display='none';var rs=document.getElementById('resScr');rs.classList.add('show');var pct=sc/(QS.length*10);var g,gc;if(pct>=.9){g='A+';gc='ga';}else if(pct>=.75){g='B';gc='gb';}else if(pct>=.55){g='C';gc='gc';}else{g='F';gc='gf';}var m=String(Math.floor(ts/60)).padStart(2,'0');var s=String(ts%60).padStart(2,'0');rs.innerHTML='<div class="re">'+(pct>=.9?'🏆':pct>=.75?'🎯':pct>=.55?'📚':'💪')+'</div><div class="rt" style="color:'+(pct>=.75?'var(--acc)':'var(--gold)')+'">'+  (pct>=.9?'Glossary Master!':pct>=.75?'מצוין!':pct>=.55?'בדרך הנכונה':'צריך חזרה')+'</div><div class="rsu">'+cc+'/'+QS.length+' | '+sc+' נק\' | '+m+':'+s+' | רצף: '+mx+'</div><div class="rg '+gc+'">'+g+'</div><br><button class="retry" onclick="location.reload()">נסה שוב ↻</button>';}render();})();
</script></body></html>
