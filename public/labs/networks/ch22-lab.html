<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק 22 — ארכיטקטורות אינטרנט</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--bg2:#0c1119;--bg3:#141c28;--border:#1e2d42;--acc:#a78bfa;--ad:rgba(0,0,0,0.1);--green:#4ade80;--gd:rgba(74,222,128,0.08);--red:#ef4444;--rd:rgba(239,68,68,0.1);--gold:#fbbf24;--text:#dfe6f0;--t2:#7b8da4;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#080e16,rgba(6,10,16,.97));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}.icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--acc),#7c3aed);display:flex;align-items:center;justify-content:center;font-size:18px;}.logo h1{font-family:'Space Mono',monospace;font-size:14px;color:var(--acc);}.logo .sub{font-size:11px;color:var(--t2);}
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:b 2s infinite;}@keyframes b{0%,100%{opacity:1;}50%{opacity:.3;}}
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:10px;}.ptr{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}.pfl{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--acc),#7c3aed);}.plbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);}
.wrap{padding:14px;padding-bottom:100px;position:relative;z-index:1;}
.qc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;display:none;}.qc.active{display:block;animation:up .3s ease;}@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.qh{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}.qtag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:rgba(255,255,255,0.05);color:var(--acc);}.qpts{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);}
.qb{padding:14px;}.theory{font-size:13px;color:var(--t2);line-height:1.9;margin-bottom:14px;padding:12px 14px;background:var(--bg3);border-radius:10px;border-right:3px solid var(--acc);}.theory strong{color:var(--text);}
.qt{font-size:14px;font-weight:700;line-height:1.6;margin-bottom:12px;color:var(--acc);}
.opts{display:flex;flex-direction:column;gap:6px;}.opt{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;text-align:right;width:100%;color:var(--text);font-family:'Heebo',sans-serif;font-size:12px;line-height:1.5;}.opt:hover{border-color:var(--acc);}
.ol{width:24px;height:24px;flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--acc);}
.opt.ok{border-color:var(--green);background:var(--gd);}.opt.ok .ol{background:var(--green);color:var(--bg);}.opt.no{border-color:var(--red);background:var(--rd);}.opt.no .ol{background:var(--red);color:#fff;}.opt.dis{pointer-events:none;opacity:.5;}
.fb{margin-top:10px;padding:10px;border-radius:8px;font-size:11px;line-height:1.7;display:none;}.fb.show{display:block;animation:up .3s;}.fb.fok{background:var(--gd);border:1px solid rgba(74,222,128,0.2);color:#86efac;}.fb.fno{background:var(--rd);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.foot{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 70%,transparent);padding:14px 16px 10px;z-index:50;}.foot-in{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}.fts{display:flex;gap:14px;}.fs{text-align:center;}.fv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--acc);}.fl{font-size:8px;color:var(--t2);}
.nb{background:linear-gradient(135deg,var(--acc),#7c3aed);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:'Heebo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}.nb:disabled{opacity:.3;cursor:not-allowed;}
.res{display:none;text-align:center;padding:30px 16px;position:relative;z-index:1;}.res.show{display:block;animation:up .5s;}.re{font-size:50px;margin-bottom:10px;}.rt{font-size:20px;font-weight:900;margin-bottom:6px;}.rsu{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:16px;}
.rg{display:inline-block;font-family:'Space Mono',monospace;font-size:36px;font-weight:700;padding:8px 24px;border-radius:12px;margin-bottom:16px;}.ga{background:var(--gd);color:var(--green);border:2px solid var(--green);}.gb{background:rgba(255,255,255,0.05);color:var(--acc);border:2px solid var(--acc);}.gc{background:rgba(251,146,60,0.1);color:var(--gold);border:2px solid var(--gold);}.gf{background:var(--rd);color:var(--red);border:2px solid var(--red);}
.retry{margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 24px;color:var(--acc);font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
</style></head><body>
<header><div class="logo"><div class="icon">🏗️</div><div><h1>Lab — פרק 22</h1><div class="sub">ארכיטקטורות אינטרנט</div></div></div><div class="badge"><div class="dot"></div><span id="timer">00:00</span></div></header>
<div class="pbar"><div class="ptr"><div class="pfl" id="pfl" style="width:0%"></div></div><div class="plbl" id="plbl">0 / 8</div></div>
<div class="wrap" id="area"></div><div class="res" id="resScr"></div>
<div class="foot" id="foot"><div class="foot-in"><div class="fts"><div class="fs"><div class="fv" id="sS">0</div><div class="fl">נקודות</div></div><div class="fs"><div class="fv" id="sC">0</div><div class="fl">נכונות</div></div><div class="fs"><div class="fv" id="sK">0</div><div class="fl">רצף🔥</div></div></div><button class="nb" id="nBtn" disabled onclick="nextQ()">הבא ←</button></div></div>
<script>
(function(){
var QS=[
["<strong>CDN (Content Delivery Network)</strong> הוא רשת של שרתים מפוזרים גיאוגרפית שמחזיקים עותקים של התוכן שלך. משתמש בישראל? מקבל תוכן מ-edge server בתל אביב. משתמש ביפן? מ-Tokyo. זה מקטין latency דרמטית ומגן מ-DDoS. Cloudflare, Akamai, AWS CloudFront = CDN.","מה היתרון העיקרי של CDN?",["הצפנה","תוכן מגיע משרת קרוב גיאוגרפית — latency נמוך + עומס מופחת על שרת המקור","DNS מהיר","חיסכון בזיכרון"],1,"CDN: Origin server בUS, edge servers ב-50 מדינות. Static content (images, CSS, JS) cached ב-edge. פחות RTT, פחות load על origin, הגנת DDoS (edge סופג)."],
["<strong>Anycast</strong> הוא שיטת ניתוב שבה כמה שרתים חולקים את אותו IP. כשpacket נשלח ל-IP, הרשת מנתבת אותו לשרת הקרוב ביותר (BGP shortest path). Cloudflare 1.1.1.1 = Anycast DNS — יש שרתים בעשרות ערים, כולם אותו IP.","איך Anycast יודע לאיזה שרת לנתב?",["DNS מחליט","BGP routing — ה-packet מגיע לשרת הקרוב ברשת לפי shortest path","Round Robin","המשתמש בוחר"],1,"Anycast = Network layer routing. מספר locations מפרסמים אותו IP prefix ב-BGP. Routers מנתבים לclosest (shortest AS path). יתרון: automatic failover (שרת נפל = BGP מסיר, traffic עובר לבא בתור)."],
["<strong>Microservices</strong> הוא מודל ארכיטקטורה שבו אפליקציה מחולקת לשירותים קטנים ועצמאיים. כל שירות עושה דבר אחד, רץ בcontainer משלו, ומתקשר עם אחרים דרך API. ההפך מ-Monolith — אפליקציה אחת גדולה. Netflix, Uber, Amazon = microservices.","מה החיסרון העיקרי של Microservices?",["איטי יותר","מורכבות — צריך service discovery, load balancing, monitoring, ו-debugging בין עשרות שירותים","לא מאובטח","לא scalable"],1,"Microservices: קל ל-scale שירות ספציפי, קל להחליף טכנולוגיה, teams עצמאיים. אבל: network calls במקום function calls (latency), distributed debugging (קשה!), eventual consistency, DevOps overhead. לא לכל פרויקט."],
["<strong>Load Balancing Algorithms</strong> מתוחכמים: <strong>Round Robin</strong> = בתור. <strong>Weighted RR</strong> = שרת חזק מקבל יותר. <strong>Least Connections</strong> = שולח לפחות עמוס. <strong>IP Hash</strong> = session persistence. <strong>Health Checks</strong> = מוציא שרת שנפל. L4 LB = לפי TCP/IP. L7 LB = לפי HTTP content (URL, headers).","מה ההבדל בין L4 ל-L7 Load Balancing?",["אין הבדל","L4 מנתב לפי IP/Port; L7 קורא HTTP content — יכול לנתב לפי URL, cookie, header","L4 מהיר יותר תמיד","L7 רק ל-UDP"],1,"L4 (TCP): מהיר, פשוט, NAT-based. לא רואה תוכן. L7 (HTTP): קורא URL (api.com/users → Service A, api.com/orders → Service B), cookies (session routing), headers. איטי יותר אבל חכם יותר. Nginx, HAProxy תומכים בשניהם."],
["<strong>DNS-based Load Balancing</strong> ו-<strong>GeoDNS</strong>: DNS מחזיר IPs שונים לפי מיקום גיאוגרפי. משתמש בישראל שואל \"מה ה-IP של cdn.example.com?\" ← מקבל IP של שרת באירופה. משתמש בUS ← IP של שרת ב-Virginia. AWS Route 53 ו-Cloudflare תומכים ב-GeoDNS.","מה GeoDNS עושה?",["מצפין DNS","מחזיר כתובות IP שונות לפי מיקום גיאוגרפי — מנתב לשרת הקרוב","מאיץ DNS","חוסם DNS"],1,"GeoDNS: edns-client-subnet (ECS) מעביר את subnet הלקוח ל-DNS. DNS resolver יודע שהלקוח בישראל → מחזיר EU server IP. יתרון: automatic geo-routing. חיסרון: DNS caching יכול לשבש (user ב-IL עם Google DNS מ-US)."],
["<strong>Reverse Proxy</strong> יושב לפני שרתים ומטפל ב: TLS termination (מפענח HTTPS), caching (שומר תשובות), compression (gzip/brotli), load balancing, security (WAF, rate limiting). Nginx ו-Caddy הם reverse proxies פופולריים. כמעט כל אתר production משתמש ב-reverse proxy.","למה Reverse Proxy עושה TLS Termination?",["כי הוא מהיר","משחרר את שרתי ה-backend מעומס ההצפנה — הProxy מטפל ב-TLS, ה-backend מקבל HTTP רגיל","כי backend לא תומך TLS","כי זה מאובטח יותר"],1,"TLS Termination: Client ↔ HTTPS ↔ Reverse Proxy ↔ HTTP ↔ Backend. ה-Proxy מטפל בcertificates, handshakes, encryption. ה-Backend מקבל HTTP נקי — פשוט ומהיר. ב-Zero Trust, לפעמים גם הקטע הפנימי מוצפן (mTLS)."],
["<strong>API Gateway</strong> הוא שער כניסה יחיד לכל ה-APIs של המערכת. במקום שהלקוח ידבר ישירות עם 20 microservices, הוא מדבר עם Gateway אחד שמנתב, מאמת (authentication), מגביל קצב (rate limiting), ומתרגם פרוטוקולים. Kong, AWS API Gateway = דוגמאות.","מה הבעיה בלי API Gateway?",["אין בעיה","הלקוח צריך לדעת כתובת של כל microservice, לנהל auth בכל אחד, ואין rate limiting מרכזי","חוסר הצפנה","בעיית DNS"],1,"בלי Gateway: Client צריך לדעת 20 URLs, כל שירות מנהל auth בנפרד, אין rate limiting אחיד, אין logging מרכזי. עם Gateway: URL אחד, auth מרכזי, rate limiting, monitoring, protocol translation (REST→gRPC)."],
["<strong>Service Mesh</strong> (כמו Istio, Linkerd) מנהל תקשורת בין microservices. כל שירות מקבל <strong>Sidecar Proxy</strong> שמטפל ב: mTLS (הצפנה בין שירותים), retries, timeouts, circuit breaking, observability. המפתח כותב business logic בלבד — ה-mesh מטפל ברשת.","מה Sidecar Proxy עושה ב-Service Mesh?",["מאחסן נתונים","רץ ליד כל שירות ומטפל בתקשורת — mTLS, retries, load balancing — בלי לשנות את הקוד","מנהל DNS","בונה containers"],1,"Sidecar (Envoy proxy): כל request יוצא ונכנס דרכו. הוא מוסיף mTLS אוטומטית, retry logic, circuit breaking (אם שירות נפל — עוצר לשלוח), distributed tracing. Zero code changes — infrastructure concern."]
];
var L="\u05D0\u05D1\u05D2\u05D3",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){var a=document.getElementById('area');a.innerHTML='';for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;var optsH='<div class="opts">';for(var j=0;j<q[2].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[2][j])+'</span></button>';}optsH+='</div>';card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="theory">'+q[0]+'</div><div class="qt">'+esc(q[1])+'</div>'+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';a.appendChild(card);}a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});}
function handleA(qi,oi){if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[3];var ok=oi===ci;ans[qi]=ok;var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}var fb=document.getElementById('fb-'+qi);if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 נכון! +10'+(sk>=3?' (+5 רצף!)':'');}else{sk=0;fb.className='fb show fno';fb.textContent='\u274C לא נכון';}fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[4]));document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='📊 תוצאות';}
window.nextQ=function(){if(cur>=QS.length-1){showRes();return;}document.getElementById('qc-'+cur).classList.remove('active');cur++;document.getElementById('qc-'+cur).classList.add('active');document.getElementById('nBtn').disabled=true;document.getElementById('qc-'+cur).scrollIntoView({behavior:'smooth',block:'center'});};
function showRes(){document.getElementById('area').style.display='none';document.getElementById('foot').style.display='none';var rs=document.getElementById('resScr');rs.classList.add('show');var pct=sc/(QS.length*10);var g,gc;if(pct>=.9){g='A+';gc='ga';}else if(pct>=.75){g='B';gc='gb';}else if(pct>=.55){g='C';gc='gc';}else{g='F';gc='gf';}var m=String(Math.floor(ts/60)).padStart(2,'0');var s=String(ts%60).padStart(2,'0');rs.innerHTML='<div class="re">'+(pct>=.9?'🏆':pct>=.75?'🎯':pct>=.55?'📚':'💪')+'</div><div class="rt" style="color:'+(pct>=.75?'var(--acc)':'var(--gold)')+'">'+  (pct>=.9?'Master!':pct>=.75?'מצוין!':pct>=.55?'בדרך הנכונה':'צריך חזרה')+'</div><div class="rsu">'+cc+'/'+QS.length+' | '+sc+' נק\' | '+m+':'+s+' | רצף: '+mx+'</div><div class="rg '+gc+'">'+g+'</div><br><button class="retry" onclick="location.reload()">נסה שוב ↻</button>';}render();})();
</script></body></html>
