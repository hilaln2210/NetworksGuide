<script>
(function(){
var QS=[
["<strong>IPv6</strong> נולד מצורך פשוט: נגמרו כתובות IPv4. עם 32 ביט, IPv4 מספק רק 4.3 מיליארד כתובות — לא מספיק ל-30+ מיליארד מכשירים מחוברים. IPv6 משתמש ב-<strong>128 ביט</strong> ומספק מספר כתובות שקשה לתפוס: 340 undecillion (3.4×10^38). מספיק לתת כתובת ייחודית לכל אטום על פני כדור הארץ.",
"כמה ביט בכתובת IPv6?",
["32","64","128","256"],2,
"128 ביט = 2^128 = 340,282,366,920,938,463,463,374,607,431,768,211,456 כתובות. IPv4 = 32 ביט = 4.3 מיליארד. IPv6 גם כולל IPsec מובנה, ללא צורך ב-NAT, ו-auto-configuration.",
"IPv4: 32 bits  = ~4.3 billion\n  192.168.1.1\n\nIPv6: 128 bits = ~340 undecillion\n  2001:0db8:85a3:0000:0000:8a2e:0370:7334\n\n  8 groups of 4 hex digits, separated by :\n  Each group = 16 bits\n  8 x 16 = 128 bits"],

["כתובת IPv6 נכתבת כ-8 קבוצות של 4 ספרות הקסדצימליות, מופרדות בנקודתיים. זה ארוך, אז יש כללי קיצור: <strong>אפשר להשמיט אפסים מובילים</strong> בכל קבוצה (0042 → 42), ו<strong>אפשר להחליף רצף של קבוצות-אפסים ב-::</strong> (פעם אחת בלבד). למשל: 2001:0db8:0000:0000:0000:0000:0000:0001 → 2001:db8::1.",
"מהו הקיצור של 2001:0db8:0000:0000:0000:ff00:0042:8329?",
["2001:db8:0:0:0:ff00:42:8329","2001:db8::ff00:42:8329","2001:db8::ff00::42:8329","שניהם א' ו-ב' נכונים"],1,
"אפסים מובילים: 0db8→db8, 0000→0, 0042→42. רצף אפסים: :0000:0000:0000: → ::. אבל :: מותר רק פעם אחת! תשובה ג' לא חוקית (:: פעמיים). שתי התשובות הראשונות נכונות, אבל ב' מקוצרת יותר.",
"Full:  2001:0db8:0000:0000:0000:ff00:0042:8329\nStep1: 2001:db8:0:0:0:ff00:42:8329  (drop leading 0s)\nStep2: 2001:db8::ff00:42:8329       (:: replaces 0:0:0)\n\nRules:\n  1. Drop leading zeros: 0042 -> 42\n  2. Replace longest run of :0: with ::\n  3. :: only ONCE per address!\n\nExamples:\n  ::1           = loopback (like 127.0.0.1)\n  ::            = all zeros (like 0.0.0.0)\n  fe80::1       = link-local"],

["<strong>SLAAC (Stateless Address Autoconfiguration)</strong> הוא אחד הפיצ'רים החזקים של IPv6 — מכשיר יכול להגדיר לעצמו כתובת IP בלי DHCP server. הוא לוקח את ה-prefix (64 ביט ראשונים) מה-Router, ומשלים את 64 הביט האחרונים מה-MAC Address שלו (EUI-64) או באקראי. Plug & Play.",
"מה היתרון של SLAAC על DHCP?",
["מהיר יותר","לא צריך שרת DHCP — המכשיר מגדיר IP בעצמו מה-prefix של ה-Router","מאובטח יותר","תומך ב-IPv4"],1,
"SLAAC: Router מפרסם prefix (2001:db8:1::/64) ב-Router Advertisement. המכשיר לוקח את ה-prefix ומוסיף host part ייחודי. אפס תשתית נוספת. DHCPv6 עדיין קיים למי שרוצה שליטה (DNS servers, options נוספים).",
"SLAAC Process:\n\n  1. Router sends Router Advertisement:\n     \"Network prefix is 2001:db8:1::/64\"\n\n  2. Device generates host part:\n     From MAC: aa:bb:cc:dd:ee:ff\n     -> EUI-64: aabb:ccff:fedd:eeff\n\n  3. Full address:\n     2001:db8:1::aabb:ccff:fedd:eeff/64\n\n  4. Duplicate Address Detection (DAD):\n     \"Is anyone using this address?\" (multicast)\n     No response -> address is mine!\n\n  No DHCP server needed!"],

["ב-IPv6 אין Broadcast! במקום זה יש <strong>Multicast</strong> ו-<strong>Anycast</strong>. Multicast = שליחה לקבוצה (ff02::1 = כל הנודים). Anycast = שליחה לאחד מתוך קבוצה (הקרוב ביותר). בנוסף יש <strong>Link-Local</strong> (fe80::) — כתובת שעובדת רק ברשת המקומית, נוצרת אוטומטית תמיד.",
"מה מיוחד ב-fe80:: ב-IPv6?",
["זה Broadcast","זו כתובת Link-Local — עובדת רק ברשת המקומית ונוצרת אוטומטית","זו כתובת Multicast","זו כתובת של Google"],1,
"fe80::/10 = Link-Local. כל מכשיר IPv6 מקבל אותה אוטומטית (בלי Router, בלי DHCP). עובדת רק באותו link (segment). שימושים: גילוי שכנים (NDP), Router Discovery, תקשורת לפני שיש כתובת גלובלית.",
"IPv6 Address Types:\n\n  Global Unicast: 2000::/3\n    Like public IPv4. Routable on Internet.\n    Example: 2001:db8::1\n\n  Link-Local: fe80::/10\n    Auto-generated on every interface.\n    Only works on local link (not routed).\n    Example: fe80::1\n\n  Multicast: ff00::/8\n    ff02::1 = All nodes on link\n    ff02::2 = All routers on link\n\n  Loopback: ::1\n    Like 127.0.0.1\n\n  NO BROADCAST in IPv6! Use multicast."],

["<strong>NDP (Neighbor Discovery Protocol)</strong> מחליף את ARP ב-IPv6. במקום ARP Request/Reply (broadcast), NDP משתמש ב-<strong>Neighbor Solicitation/Advertisement</strong> (multicast — יעיל יותר). NDP גם מטפל ב-Router Discovery, Duplicate Address Detection, ו-Redirect.",
"מה מחליף את ARP ב-IPv6?",
["עדיין ARP","NDP (Neighbor Discovery Protocol) עם Neighbor Solicitation/Advertisement","DNS","DHCP"],1,
"NDP = ICMPv6. NS (Neighbor Solicitation) = \"מי בעל ה-IP הזה?\" ב-multicast (לא broadcast!). NA (Neighbor Advertisement) = \"אני, הנה ה-MAC שלי\". יעיל יותר כי multicast מגיע רק למכשירים רלוונטיים, לא לכולם.",
"ARP (IPv4):              NDP (IPv6):\n  ARP Request            Neighbor Solicitation\n  (broadcast)            (multicast - efficient!)\n  ARP Reply              Neighbor Advertisement\n  (unicast)              (unicast)\n\nNDP also handles:\n  - Router Solicitation/Advertisement (SLAAC)\n  - Redirect (better route)\n  - Duplicate Address Detection (DAD)\n\nAll NDP = ICMPv6 messages (type 133-137)"],

["מעבר מ-IPv4 ל-IPv6 לא קורה ביום אחד. יש שלוש שיטות עיקריות ל<strong>מעבר</strong>: <strong>Dual-Stack</strong> (המכשיר מריץ גם IPv4 וגם IPv6 במקביל), <strong>Tunneling</strong> (IPv6 packets עטופים בתוך IPv4 כדי לעבור רשתות ישנות), ו-<strong>Translation</strong> (NAT64 מתרגם בין IPv4 ל-IPv6).",
"מהי שיטת Dual-Stack?",
["המרה אוטומטית","המכשיר מריץ גם IPv4 וגם IPv6 במקביל — מדבר בשפה שהצד השני תומך","חסימת IPv4","שימוש ב-VPN בלבד"],1,
"Dual-Stack = הגישה הנפוצה ביותר. כל מכשיר מודרני תומך בשניהם. אם השרת תומך IPv6 → משתמש בו. אם לא → fallback ל-IPv4. Happy Eyeballs (RFC 6555) = הדפדפן מנסה שניהם במקביל ובוחר את המהיר.",
"Transition Methods:\n\n  1. Dual-Stack (most common):\n     Device has both IPv4 AND IPv6\n     Uses whichever works with destination\n\n  2. Tunneling (6to4, Teredo, ISATAP):\n     [IPv6 packet] wrapped in [IPv4 packet]\n     Crosses IPv4-only networks\n\n  3. Translation (NAT64/DNS64):\n     IPv6-only client <-> NAT64 <-> IPv4 server\n     Translates between protocols\n\n  Happy Eyeballs (RFC 6555):\n     Browser tries IPv4 + IPv6 in parallel\n     Uses whichever connects first"],

["<strong>IPv6 Header</strong> פשוט יותר מ-IPv4! הוא קבוע ב-40 bytes (IPv4 = משתנה 20-60). הסירו שדות מיותרים: אין Header Checksum (שכבות אחרות מטפלות), אין Fragmentation fields (השולח אחראי), אין Options (עברו ל-Extension Headers). התוצאה: ניתוב מהיר יותר כי ה-Router עושה פחות עבודה.",
"למה אין Header Checksum ב-IPv6?",
["באג בעיצוב","מיותר — Ethernet FCS ו-TCP/UDP checksums כבר מגנים, וזה חוסך זמן עיבוד בRouters","כי IPv6 מוצפן תמיד","כי הHeader קבוע"],1,
"בIPv4, כל Router חייב לחשב checksum מחדש (כי TTL משתנה) = עומס. IPv6 הסיר את זה: L2 (Ethernet FCS) ו-L4 (TCP/UDP checksum) כבר בודקים. Router רק קורא dst address ומנתב — מהיר יותר. Hop Limit (כמו TTL) לא דורש checksum.",
"IPv4 Header: 20-60 bytes (variable)\n  Version, IHL, TOS, Total Length,\n  ID, Flags, Fragment Offset,   <-- removed in IPv6!\n  TTL, Protocol, Header Checksum, <-- checksum removed!\n  Src IP, Dst IP, Options         <-- options removed!\n\nIPv6 Header: 40 bytes (FIXED)\n  Version (6), Traffic Class, Flow Label,\n  Payload Length, Next Header, Hop Limit,\n  Source Address (128 bit),\n  Destination Address (128 bit)\n\n  Simpler = Faster routing!"],

["<strong>IPv6 Addresses שחשוב לדעת:</strong> ::1 = Loopback (כמו 127.0.0.1). :: = Unspecified (כמו 0.0.0.0). fe80::/10 = Link-Local. 2000::/3 = Global Unicast (כתובות רגילות). fc00::/7 = Unique Local (כמו Private IPs ב-IPv4). ff00::/8 = Multicast.",
"מהו המקביל של 127.0.0.1 ב-IPv6?",
["fe80::1","::1","ff02::1","2001::1"],1,
"::1 = loopback address. 127 אפסים ואחד בסוף. ping6 ::1 = ping localhost. fe80::1 = link-local (לא loopback). ff02::1 = multicast all-nodes. 2001::1 = global unicast כלשהו.",
"Key IPv6 Addresses:\n\n  ::1       = Loopback (127.0.0.1)\n  ::        = Unspecified (0.0.0.0)\n  fe80::/10 = Link-Local (auto, not routed)\n  2000::/3  = Global Unicast (public)\n  fc00::/7  = Unique Local (like 10.x.x.x)\n  ff02::1   = All Nodes multicast\n  ff02::2   = All Routers multicast\n\n  $ ping6 ::1\n  $ ping6 fe80::1%eth0  (need interface for link-local!)"]
];
var L="\u05D0\u05D1\u05D2\u05D3",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){var a=document.getElementById('area');a.innerHTML='';for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;var codeH=q[5]?'<div class="code">'+esc(q[5])+'</div>':'';var optsH='<div class="opts">';for(var j=0;j<q[2].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[2][j])+'</span></button>';}optsH+='</div>';card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="theory">'+q[0]+'</div><div class="qt">'+esc(q[1])+'</div>'+codeH+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';a.appendChild(card);}a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});}
function handleA(qi,oi){if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[3];var ok=oi===ci;ans[qi]=ok;var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}var fb=document.getElementById('fb-'+qi);if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 נכון! +10'+(sk>=3?' (+5 רצף!)':'');}else{sk=0;fb.className='fb show fno';fb.textContent='\u274C לא נכון';}fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[4]));document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='📊 תוצאות';}
window.nextQ=function(){if(cur>=QS.length-1){showRes();return;}document.getElementById('qc-'+cur).classList.remove('active');cur++;document.getElementById('qc-'+cur).classList.add('active');document.getElementById('nBtn').disabled=true;document.getElementById('qc-'+cur).scrollIntoView({behavior:'smooth',block:'center'});};
function showRes(){document.getElementById('area').style.display='none';document.getElementById('foot').style.display='none';var rs=document.getElementById('resScr');rs.classList.add('show');var pct=sc/(QS.length*10);var g,gc;if(pct>=.9){g='A+';gc='ga';}else if(pct>=.75){g='B';gc='gb';}else if(pct>=.55){g='C';gc='gc';}else{g='F';gc='gf';}var m=String(Math.floor(ts/60)).padStart(2,'0');var s=String(ts%60).padStart(2,'0');rs.innerHTML='<div class="re">'+(pct>=.9?'🏆':pct>=.75?'🎯':pct>=.55?'📚':'💪')+'</div><div class="rt" style="color:'+(pct>=.75?'var(--acc)':'var(--gold)')+'">'+  (pct>=.9?'IPv6 Master!':pct>=.75?'מצוין!':pct>=.55?'בדרך הנכונה':'צריך חזרה')+'</div><div class="rsu">'+cc+'/'+QS.length+' | '+sc+' נק\' | '+m+':'+s+' | רצף: '+mx+'</div><div class="rg '+gc+'">'+g+'</div><br><button class="retry" onclick="location.reload()">נסה שוב ↻</button>';}render();})();
</script></body></html>
