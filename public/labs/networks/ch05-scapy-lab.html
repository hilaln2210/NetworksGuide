<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק 5 — Scapy</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--bg2:#0c1119;--bg3:#141c28;--border:#1e2d42;--lime:#84cc16;--ld:rgba(132,204,22,0.1);--blue:#3b82f6;--green:#4ade80;--gd:rgba(74,222,128,0.08);--red:#ef4444;--rd:rgba(239,68,68,0.1);--gold:#fbbf24;--text:#dfe6f0;--t2:#7b8da4;--t3:#3d4f66;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(132,204,22,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(132,204,22,0.03) 1px,transparent 1px);background-size:40px 40px;}
.glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 20% 25%,rgba(132,204,22,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 75%,rgba(59,130,246,0.04) 0%,transparent 50%);}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#080e16,rgba(6,10,16,.97));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}.icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--lime),#65a30d);display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo h1{font-family:'Space Mono',monospace;font-size:14px;color:var(--lime);}.logo .sub{font-size:11px;color:var(--t2);}
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:b 2s infinite;}@keyframes b{0%,100%{opacity:1;}50%{opacity:.3;}}
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:10px;}
.ptr{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}.pfl{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--lime),#65a30d);}
.plbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);}
.wrap{padding:14px;padding-bottom:100px;position:relative;z-index:1;}
.topo{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
.topo-lbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--lime);letter-spacing:1px;margin-bottom:8px;}
.topo-art{background:#040810;border:1px solid var(--border);border-radius:8px;padding:14px 10px;font-family:'Space Mono',monospace;font-size:10px;line-height:1.6;color:var(--t2);direction:ltr;text-align:left;overflow-x:auto;white-space:pre;}
.qc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;display:none;}
.qc.active{display:block;animation:up .3s ease;}@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.qh{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.qtag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--ld);color:var(--lime);}
.qpts{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);}
.qb{padding:14px;}.qt{font-size:14px;font-weight:700;line-height:1.6;margin-bottom:12px;}
.code{background:#040810;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:12px;font-family:'Space Mono',monospace;font-size:10px;line-height:1.7;direction:ltr;text-align:left;color:var(--t2);overflow-x:auto;white-space:pre-wrap;}
.opts{display:flex;flex-direction:column;gap:6px;}
.opt{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;text-align:right;width:100%;color:var(--text);font-family:'Heebo',sans-serif;font-size:12px;line-height:1.5;}
.opt:hover{border-color:var(--lime);background:var(--ld);}
.ol{width:24px;height:24px;flex-shrink:0;background:var(--ld);border:1px solid rgba(132,204,22,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--lime);}
.opt.ok{border-color:var(--green);background:var(--gd);}.opt.ok .ol{background:var(--green);color:var(--bg);border-color:var(--green);}
.opt.no{border-color:var(--red);background:var(--rd);}.opt.no .ol{background:var(--red);color:#fff;border-color:var(--red);}
.opt.dis{pointer-events:none;opacity:.5;}
.fb{margin-top:10px;padding:10px;border-radius:8px;font-size:11px;line-height:1.7;display:none;}
.fb.show{display:block;animation:up .3s;}.fb.fok{background:var(--gd);border:1px solid rgba(74,222,128,0.2);color:#86efac;}.fb.fno{background:var(--rd);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.foot{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 70%,transparent);padding:14px 16px 10px;z-index:50;}
.foot-in{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.fts{display:flex;gap:14px;}.fs{text-align:center;}.fv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--lime);}.fl{font-size:8px;color:var(--t2);}
.nb{background:linear-gradient(135deg,var(--lime),#65a30d);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:'Heebo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}.nb:disabled{opacity:.3;cursor:not-allowed;}
.res{display:none;text-align:center;padding:30px 16px;position:relative;z-index:1;}.res.show{display:block;animation:up .5s;}
.re{font-size:50px;margin-bottom:10px;}.rt{font-size:20px;font-weight:900;margin-bottom:6px;}.rsu{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:16px;}
.rg{display:inline-block;font-family:'Space Mono',monospace;font-size:36px;font-weight:700;padding:8px 24px;border-radius:12px;margin-bottom:16px;}
.ga{background:var(--gd);color:var(--green);border:2px solid var(--green);}.gb{background:var(--ld);color:var(--lime);border:2px solid var(--lime);}.gc{background:rgba(251,146,60,0.1);color:var(--gold);border:2px solid var(--gold);}.gf{background:var(--rd);color:var(--red);border:2px solid var(--red);}
.retry{margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 24px;color:var(--lime);font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
</style>
</head>
<body>
<div class="grid"></div><div class="glow"></div>
<header>
  <div class="logo"><div class="icon">🐍</div><div><h1>Lab — פרק 5</h1><div class="sub">Scapy — Packet Crafting</div></div></div>
  <div class="badge"><div class="dot"></div><span id="timer">00:00</span></div>
</header>
<div class="pbar"><div class="ptr"><div class="pfl" id="pfl" style="width:0%"></div></div><div class="plbl" id="plbl">0 / 8</div></div>
<div class="wrap" id="area"></div>
<div class="res" id="resScr"></div>
<div class="foot" id="foot"><div class="foot-in"><div class="fts"><div class="fs"><div class="fv" id="sS">0</div><div class="fl">נקודות</div></div><div class="fs"><div class="fv" id="sC">0</div><div class="fl">נכונות</div></div><div class="fs"><div class="fv" id="sK">0</div><div class="fl">רצף🔥</div></div></div><button class="nb" id="nBtn" disabled onclick="nextQ()">הבא ←</button></div></div>

<script>
(function(){
var QS=[
["מה האופרטור / עושה ב-Scapy?",["חילוק מתמטי","מחבר שכבות רשת — כל שכבה נערמת על הקודמת","מפריד בין פקודות","משווה packets"],1,"האופרטור / ב-Scapy = stacking layers. IP()/TCP() = IP packet עם TCP header מעליו. אפשר להוסיף כמה שכבות שרוצים: Ether()/IP()/TCP()/Raw().","from scapy.all import *\n\n# Stack layers with /\npkt = IP(dst=\"1.1.1.1\") / TCP(dport=80) / Raw(b\"Hello\")\n\n# This creates:\n#   Layer 3: IP  (src=auto, dst=1.1.1.1)\n#   Layer 4: TCP (sport=random, dport=80)\n#   Layer 7: Raw payload \"Hello\"\n\n# More examples:\nping = IP(dst=\"8.8.8.8\") / ICMP()\ndns  = IP(dst=\"8.8.8.8\") / UDP(dport=53) / DNS()\narp  = Ether(dst=\"ff:ff:ff:ff:ff:ff\") / ARP()"],
["מה ההבדל בין send(), sr1(), sr()?",["כולם עושים אותו דבר","send=שולח בלי לחכות, sr1=שולח ומחכה לתשובה 1, sr=שולח ומחכה לכל התשובות","send=TCP, sr1=UDP, sr=ICMP","send=שכבה 2, sr1=שכבה 3, sr=שכבה 4"],1,"send() = fire & forget (שכבה 3). sr1() = Send & Receive 1 response. sr() = Send & Receive all. sendp/srp = שכבה 2 (Ethernet).","# send() - Fire and forget (Layer 3)\nsend(IP(dst=\"1.1.1.1\")/ICMP())\n# No return value, just sends\n\n# sr1() - Send & Receive ONE reply\nreply = sr1(IP(dst=\"1.1.1.1\")/ICMP(), timeout=2)\n# Returns single packet or None\nreply.show()  # See the response\n\n# sr() - Send & Receive ALL replies\nans, unans = sr(IP(dst=\"1.1.1.0/30\")/ICMP())\n# ans = answered packets (list of tuples)\n# unans = unanswered packets\n\n# Layer 2 versions (with Ethernet header):\nsendp()   # send at Layer 2\nsrp1()    # sr1 at Layer 2\nsrp()     # sr at Layer 2"],
["איך בונים ICMP Ping ב-Scapy?",["ping('8.8.8.8')","sr1(IP(dst='8.8.8.8')/ICMP())","socket.ping('8.8.8.8')","ICMP.send('8.8.8.8')"],1,"IP(dst='8.8.8.8')/ICMP() בונה ping packet. sr1() שולח ומחכה לתשובה. אם חוזר ICMP Echo Reply = המכונה חיה.","from scapy.all import *\n\n# Build and send ping\nreply = sr1(IP(dst=\"8.8.8.8\") / ICMP(), timeout=2)\n\nif reply:\n    print(f\"Host is UP!\")\n    print(f\"TTL: {reply.ttl}\")\n    print(f\"Time: {reply.time - reply.sent_time:.3f}s\")\n    reply.show()  # Full packet details\nelse:\n    print(\"Host is DOWN or filtered\")\n\n# Output:\n# Begin emission:\n# Finished sending 1 packets.\n# Received 1 packets\n# Host is UP!\n# TTL: 117"],
["מה מראה ls(TCP)?",["פורטים פתוחים במכונה","את כל השדות (fields) של TCP header עם ערכי ברירת מחדל","כתובות IP ברשת","חיבורי TCP פעילים"],1,"ls(TCP) מציג כל שדה ב-TCP header: sport, dport, seq, ack, flags, window, chksum וכו'. כלי מעולה ללמוד מבנה פרוטוקולים.",">>> ls(TCP)\nsport      : ShortEnumField    = 20     (ftp-data)\ndport      : ShortEnumField    = 80     (http)\nseq        : IntField           = 0\nack        : IntField           = 0\ndataofs    : BitField           = None\nreserved   : BitField           = 0\nflags      : FlagsField         = S      (SYN)\nwindow     : ShortField         = 8192\nchksum     : XShortField        = None\nurgptr     : ShortField         = 0\noptions    : TCPOptionsField    = []\n\n# Also try:\n>>> ls(IP)      # IP header fields\n>>> ls(DNS)     # DNS fields\n>>> ls(ARP)     # ARP fields"],
["איך עושים SYN Scan על פורט 80?",["nmap('target')","sr1(IP(dst='target')/TCP(dport=80,flags='S'))","scan(target,80)","connect(target,80)"],1,"SYN Scan: שולחים TCP SYN. אם חוזר SYN-ACK (flags=SA) = פורט פתוח. RST (flags=RA) = סגור. אין תשובה = filtered. זה הבסיס של nmap -sS.","from scapy.all import *\n\ntarget = \"192.168.1.1\"\n\n# Single port SYN scan\nresp = sr1(IP(dst=target)/TCP(dport=80, flags=\"S\"), timeout=2)\n\nif resp is None:\n    print(\"Filtered (no response)\")\nelif resp.haslayer(TCP):\n    if resp[TCP].flags == 0x12:   # SYN-ACK\n        print(\"Port 80 is OPEN!\")\n        # Send RST to close (be polite)\n        send(IP(dst=target)/TCP(dport=80, flags=\"R\"))\n    elif resp[TCP].flags == 0x14: # RST-ACK\n        print(\"Port 80 is CLOSED\")\n\n# Multi-port scan:\nfor port in [22, 80, 443, 8080]:\n    resp = sr1(IP(dst=target)/TCP(dport=port, flags=\"S\"),\n               timeout=1, verbose=0)\n    if resp and resp[TCP].flags == 0x12:\n        print(f\"Port {port}: OPEN\")"],
["מה עושה sniff() ב-Scapy?",["שולח packets","לוכד packets מהרשת בזמן אמת — כמו Wireshark","סורק פורטים","מצפין תעבורה"],1,"sniff() = Wireshark בקוד Python. לוכד packets לפי פילטר, כמות, או callback function. אפשר לנתח כל packet בזמן אמת.","from scapy.all import *\n\n# Capture 10 packets\npkts = sniff(count=10)\npkts.summary()\n\n# Capture with BPF filter\npkts = sniff(filter=\"tcp port 80\", count=5)\n\n# Capture with timeout\npkts = sniff(timeout=30)\n\n# Live callback - process each packet\ndef handle(pkt):\n    if pkt.haslayer(DNS):\n        print(f\"DNS: {pkt[DNS].qd.qname}\")\n\nsniff(filter=\"udp port 53\", prn=handle)\n# Output:\n# DNS: b'google.com.'\n# DNS: b'github.com.'\n\n# Save to pcap file\nwritepcap(\"capture.pcap\", pkts)\n# Load from pcap\npkts = rdpcap(\"capture.pcap\")"],
["איך שולחים ARP Request לגילוי מכונות ברשת?",["send(ARP())","srp(Ether(dst='ff:ff:ff:ff:ff:ff')/ARP(pdst='192.168.1.0/24'))","arp('192.168.1.0/24')","ping('192.168.1.0/24')"],1,"ARP scan: שולחים ARP Request ב-broadcast (Ether dst=ff:ff:ff:ff:ff:ff). כל מכונה חיה עונה עם ה-MAC שלה. srp כי ARP עובד בשכבה 2.","from scapy.all import *\n\n# ARP scan - discover hosts on network\nans, unans = srp(\n    Ether(dst=\"ff:ff:ff:ff:ff:ff\") /\n    ARP(pdst=\"192.168.1.0/24\"),\n    timeout=2, verbose=0\n)\n\nprint(\"IP Address\\t\\tMAC Address\")\nprint(\"-\" * 40)\nfor sent, received in ans:\n    print(f\"{received.psrc}\\t\\t{received.hwsrc}\")\n\n# Output:\n# IP Address        MAC Address\n# ----------------------------------------\n# 192.168.1.1       aa:bb:cc:dd:ee:01\n# 192.168.1.50      aa:bb:cc:dd:ee:02\n# 192.168.1.100     aa:bb:cc:dd:ee:03\n\n# Why srp() not sr()?\n# ARP works at Layer 2, needs Ethernet header\n# srp = Send/Receive at Layer 2 (with Ether)"],
["איך בונים traceroute ב-Scapy?",["traceroute('target')","שולחים ICMP עם TTL הולך וגדל: 1, 2, 3...","DNS lookup חוזר","ping רגיל"],1,"Traceroute ב-Scapy: שולחים packets עם TTL=1,2,3... כל Router מחזיר ICMP Time Exceeded כש-TTL=0, חושף את ה-IP שלו.","from scapy.all import *\n\ntarget = \"8.8.8.8\"\n\n# Manual traceroute\nfor ttl in range(1, 20):\n    pkt = IP(dst=target, ttl=ttl) / ICMP()\n    reply = sr1(pkt, timeout=1, verbose=0)\n    \n    if reply is None:\n        print(f\"{ttl}  * * * (timeout)\")\n    elif reply.type == 11:  # Time Exceeded\n        print(f\"{ttl}  {reply.src}\")\n    elif reply.type == 0:   # Echo Reply = reached!\n        print(f\"{ttl}  {reply.src} (destination!)\")\n        break\n\n# Output:\n# 1  192.168.1.1\n# 2  10.0.0.1\n# 3  72.14.239.1\n# 4  8.8.8.8 (destination!)\n\n# Built-in Scapy traceroute:\nresult, _ = traceroute(\"8.8.8.8\", maxttl=20)\nresult.graph()  # Visual graph!"]
];
var L="\u05D0\u05D1\u05D2\u05D3";var cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){
  var a=document.getElementById('area');a.innerHTML='';
  var topo=document.createElement('div');topo.className='topo';
  topo.innerHTML='<div class="topo-lbl">SCAPY CHEAT SHEET — הפקודות החשובות</div><div class="topo-art">'+esc(
"  from scapy.all import *\n"+
"\n"+
"  BUILD PACKETS:\n"+
"    pkt = IP(dst=\"1.1.1.1\") / TCP(dport=80)    # Layer stacking\n"+
"    pkt = Ether() / IP() / ICMP()               # With L2 header\n"+
"\n"+
"  SEND & RECEIVE:\n"+
"    send(pkt)           # Send L3, no reply wait\n"+
"    sendp(pkt)          # Send L2, no reply wait\n"+
"    sr1(pkt)            # Send L3, get 1 reply\n"+
"    srp1(pkt)           # Send L2, get 1 reply\n"+
"    sr(pkt)             # Send L3, get all replies\n"+
"    srp(pkt)            # Send L2, get all replies\n"+
"\n"+
"  INSPECT:\n"+
"    ls(TCP)             # Show protocol fields\n"+
"    pkt.show()          # Show packet layers\n"+
"    pkt.summary()       # One-line summary\n"+
"    pkt[TCP].flags      # Access specific field\n"+
"\n"+
"  CAPTURE:\n"+
"    sniff(count=10)     # Capture 10 packets\n"+
"    sniff(filter=\"tcp\") # With BPF filter\n"+
"    wrpcap(\"f.pcap\",p)  # Save to file\n"+
"    rdpcap(\"f.pcap\")    # Load from file"
  )+'</div>';
  a.appendChild(topo);
  for(var i=0;i<QS.length;i++){
    var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;
    var codeH=q[4]?'<div class="code">'+esc(q[4])+'</div>':'';
    var optsH='<div class="opts">';
    for(var j=0;j<q[1].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[1][j])+'</span></button>';}
    optsH+='</div>';
    card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="qt">'+esc(q[0])+'</div>'+codeH+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';
    a.appendChild(card);
  }
  a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});
}
function handleA(qi,oi){
  if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[2];var ok=oi===ci;ans[qi]=ok;
  var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');
  for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}
  var fb=document.getElementById('fb-'+qi);
  if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 נכון! +10'+(sk>=3?' (+5 בונוס רצף!)':'');}
  else{sk=0;fb.className='fb show fno';fb.textContent='\u274C לא נכון';}
  fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[3]));
  document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;
  document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;
  var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='📊 תוצאות';
}
window.nextQ=function(){
  if(cur>=QS.length-1){showRes();return;}
  document.getElementById('qc-'+cur).classList.remove('active');cur++;document.getElementById('qc-'+cur).classList.add('active');
  document.getElementById('nBtn').disabled=true;document.getElementById('qc-'+cur).scrollIntoView({behavior:'smooth',block:'center'});
};
function showRes(){
  document.getElementById('area').style.display='none';document.getElementById('foot').style.display='none';
  var rs=document.getElementById('resScr');rs.classList.add('show');
  var pct=sc/(QS.length*10);var g,gc;if(pct>=.9){g='A+';gc='ga';}else if(pct>=.75){g='B';gc='gb';}else if(pct>=.55){g='C';gc='gc';}else{g='F';gc='gf';}
  var m=String(Math.floor(ts/60)).padStart(2,'0');var s=String(ts%60).padStart(2,'0');
  rs.innerHTML='<div class="re">'+(pct>=.9?'🏆':pct>=.75?'🎯':pct>=.55?'📚':'💪')+'</div>'+
    '<div class="rt" style="color:'+(pct>=.75?'var(--lime)':'var(--gold)')+'">'+
    (pct>=.9?'Scapy Master!':pct>=.75?'מצוין!':pct>=.55?'בדרך הנכונה':'צריך חזרה')+'</div>'+
    '<div class="rsu">'+cc+'/'+QS.length+' נכונות | '+sc+' נקודות | '+m+':'+s+' | רצף מקסימלי: '+mx+'</div>'+
    '<div class="rg '+gc+'">'+g+'</div><br>'+
    '<button class="retry" onclick="location.reload()">נסה שוב ↻</button>';
}
render();
})();
</script>
