<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק 4 – מעבדה | שכבת האפליקציה</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--surf:#111827;--surf2:#1a2235;--brd:#1e2d45;--ac:#00d4ff;--ac2:#7c3aed;--gr:#10b981;--rd:#ef4444;--tx:#e2e8f0;--mt:#64748b;--mono:'IBM Plex Mono',monospace;--sans:'Heebo',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{max-width:900px;margin:0 auto;padding:32px 20px 60px;position:relative;z-index:1;}
.hdr{margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--brd);}
.row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.badge{background:linear-gradient(135deg,var(--ac2),#4f46e5);color:#fff;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:2px;padding:4px 10px;border-radius:4px;}
.ch{font-family:var(--mono);font-size:12px;color:var(--ac);}
.title{font-size:26px;font-weight:900;color:#fff;line-height:1.2;}
.sub{font-size:14px;color:var(--mt);margin-top:4px;}
.prog{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:16px 20px;margin-bottom:32px;display:flex;align-items:center;gap:20px;}
.pl{font-family:var(--mono);font-size:12px;color:var(--mt);}
.pb{flex:1;height:6px;background:var(--brd);border-radius:99px;overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,var(--ac2),var(--ac));border-radius:99px;transition:width .5s;width:0%;}
.ps{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--ac);}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:16px;overflow:hidden;}
.ch2{background:var(--surf2);border-bottom:1px solid var(--brd);padding:16px 24px;display:flex;align-items:center;gap:12px;}
.qn{font-family:var(--mono);font-size:11px;color:var(--mt);}
.qc{font-family:var(--mono);font-size:11px;color:var(--ac);background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);padding:2px 8px;border-radius:4px;}
.body{padding:28px 24px 20px;}
.snip{background:#0d1117;border:1px solid var(--brd);border-radius:8px;padding:14px 18px;margin-bottom:22px;font-family:var(--mono);font-size:13px;line-height:1.85;overflow-x:auto;direction:ltr;text-align:left;}
.kw{color:#ff79c6;}.fn{color:#50fa7b;}.st{color:#f1fa8c;}.nu{color:#bd93f9;}.va{color:#8be9fd;}.cm{color:#6272a4;}
.qt{font-size:18px;font-weight:600;color:#fff;line-height:1.5;margin-bottom:28px;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{background:var(--bg);border:1px solid var(--brd);border-radius:10px;padding:14px 18px;cursor:pointer;text-align:right;display:flex;align-items:center;gap:12px;width:100%;font-family:var(--sans);font-size:15px;color:var(--tx);transition:all .15s;}
.opt:hover{border-color:var(--ac);background:rgba(0,212,255,.04);color:#fff;}
.opt.done{cursor:default;pointer-events:none;}
.opt.correct{border-color:var(--gr);background:rgba(16,185,129,.1);color:#fff;}
.opt.correct .lb{color:var(--gr);}
.opt.wrong{border-color:var(--rd);background:rgba(239,68,68,.08);color:var(--mt);}
.opt.wrong .lb{color:var(--rd);}
.opt.show{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05);}
.lb{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--mt);min-width:20px;text-align:center;flex-shrink:0;}
.ot{flex:1;text-align:right;}
.ic{font-size:16px;min-width:20px;text-align:center;flex-shrink:0;}
.exp{margin:20px 0 0;padding:16px 18px;border-radius:10px;border-right:3px solid var(--gr);background:rgba(16,185,129,.06);display:none;}
.exp.bad{border-color:var(--rd);background:rgba(239,68,68,.06);}
.et{font-family:var(--mono);font-size:11px;color:var(--gr);margin-bottom:6px;text-transform:uppercase;}
.exp.bad .et{color:var(--rd);}
.eb{font-size:14px;color:#94a3b8;line-height:1.7;}
.foot{padding:20px 24px;border-top:1px solid var(--brd);display:flex;justify-content:space-between;}
.btn{background:transparent;border:1px solid var(--brd);color:var(--mt);padding:10px 20px;border-radius:8px;font-family:var(--sans);font-size:14px;cursor:pointer;transition:all .15s;}
.btn:hover:not(:disabled){border-color:var(--ac);color:var(--ac);}
.btn:disabled{opacity:.3;cursor:default;}
.btn.pri{background:linear-gradient(135deg,var(--ac2),#4f46e5);border-color:transparent;color:#fff;font-weight:600;}
.btn.pri:hover{opacity:.9;}
.res{display:none;text-align:center;padding:60px 24px;}
.ring{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;position:relative;}
.ring::after{content:'';position:absolute;inset:12px;border-radius:50%;background:var(--surf);}
.rn{font-family:var(--mono);font-size:36px;font-weight:600;color:#fff;position:relative;z-index:1;}
.rt{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px;}
.rs{font-size:15px;color:var(--mt);margin-bottom:32px;}
.bks{display:flex;gap:20px;justify-content:center;margin-bottom:36px;flex-wrap:wrap;}
.bk{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:14px 24px;text-align:center;}
.bv{font-family:var(--mono);font-size:22px;font-weight:600;color:#fff;}
.bl{font-size:12px;color:var(--mt);margin-top:2px;}
.rbtn{background:linear-gradient(135deg,var(--ac2),#4f46e5);border:none;color:#fff;padding:14px 36px;border-radius:10px;font-family:var(--sans);font-size:16px;font-weight:600;cursor:pointer;}
</style>
<style id="mobile-fix">
@media (max-width: 600px) {
  body { padding: 12px 10px 60px !important; }
  .wrap, .container { padding-left: 10px !important; padding-right: 10px !important; }
  pre, table { max-width: 100%; overflow-x: auto; }
  img, svg { max-width: 100% !important; height: auto !important; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="row"><span class="badge">PRO LAB</span><span class="ch">פרק 4 מתוך 12</span></div>
    <div class="title">שכבת האפליקציה</div>
    <div class="sub">12 שאלות &middot; HTTP &middot; Status Codes &middot; Headers &middot; GET vs POST &middot; DNS &middot; URL</div>
  </div>
  <div class="prog">
    <span class="pl">התקדמות</span>
    <div class="pb"><div class="pf" id="pf"></div></div>
    <span class="ps" id="ps">0 / 12</span>
  </div>
  <div class="card" id="card">
    <div class="ch2"><span class="qn" id="qn">שאלה 1</span><span class="qc" id="qc"></span></div>
    <div class="body">
      <div id="snip"></div>
      <div class="qt" id="qt"></div>
      <div class="opts" id="opts"></div>
      <div class="exp" id="exp"><div class="et" id="et"></div><div class="eb" id="eb"></div></div>
    </div>
    <div class="foot">
      <button class="btn" id="prev" onclick="go(-1)" disabled>&#x2192; הקודם</button>
      <button class="btn pri" id="next" onclick="go(1)" disabled>הבא &#x2190;</button>
    </div>
  </div>
  <div class="res" id="res">
    <div class="ring" id="ring"><span class="rn" id="rpct">0%</span></div>
    <div class="rt" id="rt"></div><div class="rs" id="rs"></div>
    <div class="bks">
      <div class="bk"><div class="bv" id="rok" style="color:var(--gr)"></div><div class="bl">נכון</div></div>
      <div class="bk"><div class="bv" id="rbd" style="color:var(--rd)"></div><div class="bl">שגוי</div></div>
      <div class="bk"><div class="bv" id="rtt" style="color:var(--ac)"></div><div class="bl">סהכ</div></div>
    </div>
    <button class="rbtn" onclick="restart()">התחל מחדש</button>
  </div>
</div>
<script>
var Q = [
  {
    cat: "HTTP בסיס",
    sn: '<span class="kw">GET</span> /hypertext/WWW/TheProject.html <span class="nu">HTTP/1.1</span>\n<span class="va">Host:</span> info.cern.ch\n<span class="va">Accept-Language:</span> he\n<span class="cm">(שורה ריקה)</span>',
    q: "מה שלושת חלקי הבקשה שמוצגת? מה תפקיד השורה הריקה?",
    a: [
      "שורת בקשה (METHOD + URL + גרסה) + Headers + גוף ריק. שורה ריקה = סיום Headers",
      "כתובת IP + פורט + תוכן. שורה ריקה = תחילת הצפנה",
      "שם משתמש + סיסמה + תוכן. שורה ריקה = אימות",
      "פרוטוקול + שם קובץ + Headers. שורה ריקה = סוף תגובה"
    ],
    c: 0,
    e: "בפרק: בקשת HTTP מורכבת מ-3 חלקים: (1) שורת בקשה: METHOD URL HTTP/version. (2) Headers: שדות name: value. (3) Body: ריק ב-GET. מפריד בין שורות: \\r\\n. שורה ריקה (\\r\\n\\r\\n) = סיום Headers."
  },
  {
    cat: "HTTP בסיס",
    sn: '<span class="nu">HTTP/1.1</span> <span class="fn">200</span> <span class="fn">OK</span>\n<span class="va">Content-Type:</span> text/html\n<span class="va">Content-Length:</span> 1234\n<span class="cm">(שורה ריקה)</span>\n<span class="st">&lt;html&gt;...&lt;/html&gt;</span>',
    q: "מה שלושת הנתונים שמכילה שורת התגובה? מה Content-Type אומר ללקוח?",
    a: [
      "גרסת פרוטוקול (HTTP/1.1) + קוד תגובה (200) + תיאור (OK). Content-Type אומר מה סוג המידע",
      "IP השרת + פורט + גרסה. Content-Type = גודל הקובץ",
      "שם המשאב + קוד שגיאה + timestamp. Content-Type = הצפנה",
      "שם הפרוטוקול + משתמש + גרסת דפדפן. Content-Type = קוד ה-HTML"
    ],
    c: 0,
    e: "בפרק: שורת תגובה = גרסת פרוטוקול + קוד תגובה + תיאור. Content-Type: text/html אומר לדפדפן שהתוכן הוא HTML ולא תמונה/JSON. הלקוח קורא Content-Type לפני שמציג את ה-Body."
  },
  {
    cat: "Status Codes",
    sn: null,
    q: "מה קוד 200, 301, 404 ו-500 אומרים? לאיזה קטגוריה כל אחד שייך?",
    a: [
      "200=OK (2xx הצלחה), 301=Moved Permanently (3xx הפניה), 404=Not Found (4xx שגיאת לקוח), 500=Server Error (5xx שגיאת שרת)",
      "200=שגיאה, 301=הצלחה, 404=הפניה, 500=לא נמצא",
      "200=פקטה קטנה, 301=פקטה בינונית, 404=פקטה גדולה, 500=פקטה שנאבדה",
      "כולם קודי הצלחה, המספר מייצג זמן תגובה במילישניות"
    ],
    c: 0,
    e: "בפרק: 2xx=הצלחה. 3xx=הפניה. 4xx=שגיאת לקוח (הלקוח ביקש משהו שגוי). 5xx=שגיאת שרת (הסרת תקין אבל השרת נשבר). 200=OK, 301=הועבר לצמיתות, 302=הועבר זמנית, 403=אסור, 404=לא נמצא, 500=תקלה פנימית."
  },
  {
    cat: "Status Codes",
    sn: null,
    q: "מה הלקוח עושה כשמקבל 301 Moved Permanently? מה ההבדל מ-302?",
    a: [
      "301: הדפדפן שולח בקשה חדשה לכתובת ב-Location ושומר בcache לתמיד. 302: גם שולח לכתובת חדשה אבל לא שומר",
      "301: מציג שגיאה. 302: מנסה שוב אחרי דקה",
      "301: מוחק את הקובץ מהשרת. 302: מוחק זמנית",
      "הם זהים, רק המספר שונה לצורכי תאימות"
    ],
    c: 0,
    e: "בפרק: 301 Moved Permanently = הדפדפן יזכור לתמיד שהכתובת שינתה, לא יחזור לכתובת המקורית. גם Google מעביר PageRank. 302 = הפניה זמנית, הדפדפן יבדוק שוב בפעם הבאה. שניהם שולחים Location Header עם הכתובת החדשה."
  },
  {
    cat: "GET vs POST",
    sn: '<span class="kw">GET</span>  /search?q=python&lang=he HTTP/1.1\n<span class="kw">POST</span> /upload HTTP/1.1\n<span class="va">Content-Length:</span> 1048576\n<span class="cm">(שורה ריקה)</span>\n<span class="st">[תמונה בינארית 1MB]</span>',
    q: "מדוע לא ניתן להעלות תמונה של 1MB ב-GET? מה ההבדל המהותי בין GET ל-POST?",
    a: [
      "GET מעביר מידע ב-URL (מוגבל ל~2000 תווים). POST מעביר ב-Body ללא הגבלת גודל",
      "GET מהיר, POST איטי. 1MB לוקח יותר מדי זמן ב-GET",
      "GET מוצפן, POST לא. תמונות חייבות שידור לא מוצפן",
      "GET לשרת, POST ללקוח. תמונות תמיד נשלחות מלקוח ללקוח"
    ],
    c: 0,
    e: "בפרק: אורך URL מקסימלי בדפדפנים = 2000 תווים. GET parameters עוברים ב-URL. תמונה של 1MB = מיליון בתים. לכן Facebook משתמש ב-POST שמעביר את התמונה ב-Body של הבקשה, בלי הגבלת גודל."
  },
  {
    cat: "GET Parameters",
    sn: '<span class="kw">GET</span> /search?q=obama&mode=users HTTP/1.1',
    q: "כיצד מעבירים כמה פרמטרים בבקשת GET? מה תפקיד ? ו-&?",
    a: [
      "? מפריד בין הנתיב לפרמטרים הראשון. & מפריד בין פרמטרים נוספים. פורמט: name=value",
      "? = סוף URL, & = הצפנה, = = השמה לכתובת IP",
      "? = מצביע על GET, & = AND בין שאילתות SQL",
      "& = תחילת URL, ? = תחילת פרמטרים, = = header"
    ],
    c: 0,
    e: "בפרק: ? מפריד בין הנתיב לבין פרמטרי הבקשה. & מפריד בין פרמטרים. כל פרמטר: name=value. דוגמה מגוגל: GET /search?q=python HTTP/1.1. מרובה: ?q=obama&mode=users&lang=en."
  },
  {
    cat: "HTTP Headers",
    sn: '<span class="va">Host:</span> info.cern.ch\n<span class="va">Accept:</span> text/html,image/*\n<span class="va">Accept-Language:</span> he\n<span class="va">Connection:</span> keep-alive\n<span class="va">Content-Length:</span> 1234',
    q: "מה תפקיד HTTP Headers? מי יכול לשלוח אותם — לקוח, שרת, או שניהם?",
    a: [
      "Headers מכילים מטא-מידע על הבקשה/תגובה. חלק רק בבקשה (כמו Accept), חלק רק בתגובה (כמו Server), חלק בשניהם (כמו Content-Length)",
      "Headers מצפינים את ה-Body. רק הלקוח שולח אותם",
      "Headers הם רק לצורכי debugging. השרת מתעלם מהם",
      "Headers מחליפים את ה-Body בבקשות קטנות. השרת שולח אותם בלבד"
    ],
    c: 0,
    e: "בפרק: Headers = שדות מידע נוספים מעבר לתוכן. פורמט: name: value. חלק רק בבקשה: Accept (מה הלקוח מוכן לקבל), Accept-Language. חלק רק בתגובה: Server (סוג השרת). חלק בשניהם: Content-Length, Content-Type."
  },
  {
    cat: "שרת HTTP",
    sn: '<span class="kw">GET</span> /calculate-next?num=16 HTTP/1.1\n<span class="cm">──────────────────────────────</span>\n<span class="nu">HTTP/1.0</span> <span class="fn">200</span> OK\n<span class="va">Content-Length:</span> 2\n<span class="cm">(שורה ריקה)</span>\n<span class="st">17</span>',
    q: "מה ההבדל בין שרת HTTP סטטי לדינמי? איזה סוג בנינו בתרגיל calculate-next?",
    a: [
      "סטטי: מחזיר קבצים קיימים מהדיסק. דינמי: בונה תגובה בקוד לפי הפרמטרים. calculate-next = דינמי",
      "סטטי: מהיר. דינמי: איטי. calculate-next = סטטי כי עונה תמיד 5",
      "סטטי: למשתמש אחד. דינמי: לכמה משתמשים. calculate-next = סטטי",
      "הם זהים, ההבדל רק בשפת תכנות שכותבים את השרת"
    ],
    c: 0,
    e: "בפרק: שרת סטטי = מגיש קבצים מתיקיית root. שרת דינמי = מריץ קוד ובונה תשובה לפי פרמטרים. calculate-next?num=16 מחזיר 17, calculate-next?num=4 מחזיר 5. כמו Facebook שבונה דף אחר לכל משתמש."
  },
  {
    cat: "URL ו-Root",
    sn: '<span class="kw">GET</span> /folder_a/folder_b/file.txt HTTP/1.1\n<span class="cm"># root directory = C:\\wwwroot</span>\n<span class="cm"># קובץ: C:\\wwwroot\\folder_a\\folder_b\\file.txt</span>',
    q: "מה זה Root Directory? כשלקוח מבקש / (slash בודד) — מה השרת מחזיר?",
    a: [
      "תיקיית הבסיס של השרת. / = עמוד הבית (index.html בדרך כלל)",
      "תיקיית המשתמש הנוכחי. / = תיקיית C:\\",
      "תיקיית המערכת. / = הגדרות Windows",
      "כל הדיסק. / = רשימת כל הקבצים בשרת"
    ],
    c: 0,
    e: "בפרק: Root Directory = תיקייה שהמתכנת הגדיר כבסיס האתר (למשל C:\\wwwroot). בקשה ל /page.html ← C:\\wwwroot\\page.html. בקשה ל / (ללא נתיב ספציפי) = השרת מחזיר עמוד ברירת מחדל, לרוב index.html."
  },
  {
    cat: "Wireshark + HTTP",
    sn: null,
    q: "בתרגיל 4.1 הסנפנו HTTP. כמה פקטות ראינו לגלישה פשוטה? מה כל אחת?",
    a: [
      "שתי שורות: פקטת הבקשה (GET מהלקוח) ופקטת התגובה (200 OK + HTML מהשרת)",
      "שלוש: SYN, בקשה, תגובה",
      "עשרות: DNS + TCP handshake + HTTP + TCP teardown",
      "אחת: הפרוטוקול HTTP שולח הכל בפקטה יחידה"
    ],
    c: 0,
    e: "בפרק תרגיל 4.1: הסנפנו עם פילטר http. ראינו שתי שורות: שורה ראשונה = GET מהדפדפן אל השרת. שורה שנייה = תגובה מהשרת. (הסנפנו רק HTTP, לא TCP/DNS שנמסכו על ידי הפילטר)."
  },
  {
    cat: "DNS",
    sn: null,
    q: "מה ההבדל בין DNS record מסוג A לבין CNAME? מאיפה הדפדפן יודע לאיפה לשלוח HTTP?",
    a: [
      "A: שם דומיין → כתובת IPv4. CNAME: שם → שם אחר (alias). הדפדפן שואל DNS לפני כל HTTP",
      "A: IPv4. CNAME: IPv6. הדפדפן שואל Router ישירות",
      "A: Mail server. CNAME: Web server. הדפדפן שואל Google DNS בלבד",
      "הם זהים. הדפדפן מנחש את ה-IP לפי שם הדומיין"
    ],
    c: 0,
    e: "בפרק: DNS A record = שם → IP. CNAME = alias (www.site.com → site.com). כל גלישה: תחילה שאילתת DNS לשרת DNS (UDP:53) ← מקבל IP ← שולח HTTP לאותו IP. פרוטוקול DNS עובד על UDP פורט 53."
  },
  {
    cat: "GET vs POST – עמוק",
    sn: '<span class="cm"># תגובת Ynet לטופס תגובה</span>\n<span class="kw">POST</span> /talkback/submit HTTP/1.1\n<span class="va">Content-Type:</span> application/x-www-form-urlencoded\n<span class="va">Content-Length:</span> 89\n<span class="cm">(שורה ריקה)</span>\n<span class="st">name=Israel&city=TLV&content=great+article</span>',
    q: "בתרגיל Ynet בפרק: למה שליחת תגובה לכתבה משתמשת ב-POST ולא ב-GET?",
    a: [
      "הטופס מכיל שם + עיר + תוכן תגובה ארוך — נתונים שמשנים מצב בשרת ועלולים לחרוג מ-2000 תווים",
      "כי Ynet נבנה בשנות ה-90 ולא תומך ב-GET",
      "כי GET לא עובד עם עברית",
      "כי POST מהיר יותר לשידור טפסים"
    ],
    c: 0,
    e: "בפרק: ממלאים שם + מקום מגורים + כתובת מייל + כותרת + תוכן תגובה. POST נועד לשליחת נתונים שמשנים מצב בשרת (יצירת רשומה בDB). GET לא מתאים: (1) הנתונים ב-URL גלויים לכולם. (2) יכול לחרוג ממגבלת 2000 תווים."
  }
];

var LBL = ["א","ב","ג","ד"];
var cur = 0;
var ans = [];
for (var i = 0; i < Q.length; i++) { ans.push(-1); }

function shuf(q) {
  var idx = [0,1,2,3];
  for (var i = 3; i > 0; i--) {
    var j = Math.floor(Math.random() * (i+1));
    var t = idx[i]; idx[i] = idx[j]; idx[j] = t;
  }
  var na = [];
  for (var k = 0; k < 4; k++) { na.push(q.a[idx[k]]); }
  var nc = -1;
  for (var k = 0; k < 4; k++) { if (idx[k] === q.c) { nc = k; break; } }
  return {cat:q.cat, sn:q.sn, q:q.q, a:na, c:nc, e:q.e};
}

var SQ = [];
for (var i = 0; i < Q.length; i++) { SQ.push(shuf(Q[i])); }

function render() {
  var q = SQ[cur];
  document.getElementById("qn").textContent = "שאלה " + (cur+1);
  document.getElementById("qc").textContent = q.cat;
  var sn = document.getElementById("snip");
  sn.innerHTML = q.sn ? '<div class="snip">' + q.sn + '</div>' : "";
  document.getElementById("qt").textContent = q.q;
  var oc = document.getElementById("opts");
  oc.innerHTML = "";
  for (var i = 0; i < 4; i++) {
    var b = document.createElement("button");
    b.className = "opt";
    b.innerHTML = '<span class="lb">' + LBL[i] + '</span><span class="ot">' + q.a[i] + '</span><span class="ic"></span>';
    b.setAttribute("data-i", i);
    b.onclick = pick;
    oc.appendChild(b);
  }
  var ex = document.getElementById("exp");
  ex.style.display = "none"; ex.className = "exp";
  if (ans[cur] !== -1) { showA(cur); }
  document.getElementById("prev").disabled = (cur === 0);
  document.getElementById("next").disabled = (ans[cur] === -1);
  upProg();
}

function pick() {
  if (ans[cur] !== -1) { return; }
  var i = parseInt(this.getAttribute("data-i"));
  ans[cur] = i; showA(cur);
  document.getElementById("next").disabled = false;
}

function showA(idx) {
  var q = SQ[idx]; var ch = ans[idx]; var ok = (ch === q.c);
  var bs = document.querySelectorAll(".opt");
  for (var i = 0; i < bs.length; i++) {
    bs[i].className = "opt done"; bs[i].onclick = null;
    var ic = bs[i].querySelector(".ic");
    if (i === q.c) { bs[i].classList.add(ok ? "correct" : "show"); if (!ok) { ic.textContent = "\u2713"; } }
    if (i === ch && !ok) { bs[i].classList.add("wrong"); ic.textContent = "\u2717"; }
    if (i === ch && ok) { ic.textContent = "\u2713"; }
  }
  var ex = document.getElementById("exp");
  document.getElementById("et").textContent = ok ? "\u2713 \u05e0\u05db\u05d5\u05df!" : "\u2717 \u05dc\u05d0 \u05d1\u05d3\u05d9\u05d5\u05e7...";
  document.getElementById("eb").textContent = q.e;
  ex.className = ok ? "exp" : "exp bad"; ex.style.display = "block";
}

function upProg() {
  var n = 0;
  for (var i = 0; i < ans.length; i++) { if (ans[i] !== -1) { n++; } }
  document.getElementById("pf").style.width = (n / Q.length * 100) + "%";
  document.getElementById("ps").textContent = n + " / " + Q.length;
}

function go(d) {
  var n = cur + d;
  if (n < 0) { return; }
  if (n >= Q.length) { showRes(); return; }
  cur = n; render();
}

function showRes() {
  document.getElementById("card").style.display = "none";
  document.getElementById("res").style.display = "block";
  var ok = 0, bd = 0;
  for (var i = 0; i < ans.length; i++) {
    if (ans[i] === SQ[i].c) { ok++; } else if (ans[i] !== -1) { bd++; }
  }
  var pct = Math.round(ok / Q.length * 100);
  document.getElementById("ring").style.background = "conic-gradient(var(--ac) 0%,var(--ac2) " + pct + "%,var(--brd) " + pct + "%)";
  document.getElementById("rpct").textContent = pct + "%";
  document.getElementById("rok").textContent = ok;
  document.getElementById("rbd").textContent = bd;
  document.getElementById("rtt").textContent = Q.length;
  var t, s;
  if (pct >= 80) { t = "\u05de\u05e6\u05d5\u05d9\u05df! \ud83c\udfaf"; s = "HTTP \u05d1\u05e9\u05dc\u05d9\u05d8\u05d4"; }
  else if (pct >= 50) { t = "\u05dc\u05d0 \u05e8\u05e2 \ud83d\udcaa"; s = "\u05d7\u05d6\u05d5\u05e8 \u05e2\u05dc GET/POST \u05d5-Status Codes"; }
  else { t = "\u05d9\u05e9 \u05de\u05d4 \u05dc\u05d7\u05d6\u05e7 \ud83d\udcda"; s = "\u05e7\u05e8\u05d0 \u05e9\u05d5\u05d1 \u05d0\u05ea \u05e4\u05e8\u05e7 4"; }
  document.getElementById("rt").textContent = t;
  document.getElementById("rs").textContent = s;
  upProg();
}

function restart() {
  SQ = [];
  for (var i = 0; i < Q.length; i++) { SQ.push(shuf(Q[i])); }
  cur = 0; ans = [];
  for (var i = 0; i < Q.length; i++) { ans.push(-1); }
  document.getElementById("card").style.display = "block";
  document.getElementById("res").style.display = "none";
  render();
}

render();
</script>
</body>
</html>
