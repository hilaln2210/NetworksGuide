<script>
(function(){
var QS=[
["<strong>CIDR (Classless Inter-Domain Routing)</strong> הוא הסימון המודרני לגדלי רשתות. במקום לומר \"Subnet Mask 255.255.255.0\", כותבים <strong>/24</strong> — שאומר ש-24 הביטים הראשונים הם חלק הרשת. ככל שהמספר אחרי / גדול יותר, הרשת קטנה יותר: /24 = 256 כתובות, /25 = 128, /26 = 64, /27 = 32, /28 = 16, /30 = 4 (point-to-point).",
"כמה כתובות יש ברשת /26?",
["256","128","64","32"],2,
"/26 = 26 ביט רשת, 6 ביט hosts. 2^6 = 64 כתובות סה\"כ. מתוכן: 1 Network Address + 1 Broadcast = 62 כתובות שמישות. הנוסחה: 2^(32-CIDR) = סה\"כ כתובות, מינוס 2 = שמישות.",
"/24 = 256 addresses (254 usable)\n/25 = 128 addresses (126 usable)\n/26 = 64  addresses (62 usable)  <--\n/27 = 32  addresses (30 usable)\n/28 = 16  addresses (14 usable)\n/29 = 8   addresses (6 usable)\n/30 = 4   addresses (2 usable)\n/31 = 2   addresses (point-to-point)\n/32 = 1   address  (single host)\n\nFormula: 2^(32-CIDR) = total\n         total - 2 = usable"],

["<strong>Network Address</strong> היא הכתובת הראשונה ב-subnet — כל ביטי ה-host הם 0. היא מזהה את הרשת עצמה ולא ניתנת לשימוש למכשיר. <strong>Broadcast Address</strong> היא האחרונה — כל ביטי ה-host הם 1. כדי למצוא את ה-Network Address, עושים AND בינארי בין ה-IP ל-Subnet Mask.",
"מהי Network Address של 192.168.10.130/26?",
["192.168.10.0","192.168.10.128","192.168.10.64","192.168.10.192"],1,
"/26 = 64 כתובות per subnet. חלוקה: .0, .64, .128, .192. הכתובת 130 נופלת בטווח 128-191, לכן Network = 192.168.10.128, Broadcast = 192.168.10.191, Usable = .129-.190.",
"/26 = blocks of 64:\n  192.168.10.0   - 192.168.10.63   (block 1)\n  192.168.10.64  - 192.168.10.127  (block 2)\n  192.168.10.128 - 192.168.10.191  (block 3) <-- 130 is here!\n  192.168.10.192 - 192.168.10.255  (block 4)\n\n  Network:   192.168.10.128\n  First:     192.168.10.129\n  Last:      192.168.10.190\n  Broadcast: 192.168.10.191\n  Usable:    62 hosts"],

["<strong>Subnet Mask</strong> היא הדרך הישנה (אבל עדיין נפוצה) לציין את גודל הרשת. היא מספר בן 32 ביט שבו כל ה-1 בהתחלה = חלק הרשת, וכל ה-0 בסוף = חלק ה-host. למשל: /24 = 255.255.255.0, /25 = 255.255.255.128, /26 = 255.255.255.192. השיטה המהירה: /25 = 128, /26 = 192, /27 = 224, /28 = 240.",
"מהי Subnet Mask של /27?",
["255.255.255.128","255.255.255.192","255.255.255.224","255.255.255.240"],2,
"/27 = 27 ביטים של 1. באוקטט הרביעי: 11100000 = 224. אז 255.255.255.224. טריק: /25=128, /26=192, /27=224, /28=240, /29=248, /30=252. כל צעד = מוסיפים ביט (256 - 2^(32-CIDR)).",
"CIDR to Subnet Mask:\n  /24 = 255.255.255.0   (11111111.11111111.11111111.00000000)\n  /25 = 255.255.255.128 (11111111.11111111.11111111.10000000)\n  /26 = 255.255.255.192 (11111111.11111111.11111111.11000000)\n  /27 = 255.255.255.224 (11111111.11111111.11111111.11100000) <--\n  /28 = 255.255.255.240 (11111111.11111111.11111111.11110000)\n  /29 = 255.255.255.248\n  /30 = 255.255.255.252\n\nQuick trick: 256 - block_size = mask\n  /27 = 32 per block -> 256-32 = 224"],

["כשיש לנו רשת גדולה ואנחנו רוצים לחלק אותה לרשתות קטנות יותר, זה נקרא <strong>Subnetting</strong>. למשל: יש לנו 192.168.1.0/24 (254 hosts) וצריכים 4 מחלקות. מחלקים ל-/26 (4 subnets × 62 hosts). הרעיון: \"שואלים\" ביטים מחלק ה-host ומעבירים לחלק הרשת.",
"יש לך 192.168.1.0/24 וצריך לחלק ל-8 subnets. מה ה-CIDR החדש?",
["/25","/26","/27","/28"],2,
"צריך 8 subnets. 2^3 = 8, אז צריכים 3 ביטים נוספים. /24 + 3 = /27. כל subnet = 2^(32-27) = 32 כתובות (30 usable). 8 subnets × 32 = 256 = כל ה-/24.",
"Original: 192.168.1.0/24 (256 addresses)\n\nNeed 8 subnets: 2^3=8, add 3 bits: /24+3 = /27\n\n  Subnet 1: 192.168.1.0/27   (.1-.30)\n  Subnet 2: 192.168.1.32/27  (.33-.62)\n  Subnet 3: 192.168.1.64/27  (.65-.94)\n  Subnet 4: 192.168.1.96/27  (.97-.126)\n  Subnet 5: 192.168.1.128/27 (.129-.158)\n  Subnet 6: 192.168.1.160/27 (.161-.190)\n  Subnet 7: 192.168.1.192/27 (.193-.222)\n  Subnet 8: 192.168.1.224/27 (.225-.254)\n\n  8 subnets x 30 usable = 240 hosts"],

["<strong>VLSM (Variable Length Subnet Masking)</strong> מאפשר subnets בגדלים שונים באותה רשת. בעולם האמיתי, לא כל מחלקה צריכה אותו מספר hosts. מחלקה A צריכה 100 hosts? /25 (126 usable). מחלקה B צריכה 25? /27 (30 usable). חיבור point-to-point בין Routers? /30 (2 usable).",
"לחיבור בין שני Routers, מה ה-CIDR המתאים ביותר?",
["/24 (254 hosts)","/27 (30 hosts)","/30 (2 hosts)","/32 (1 host)"],2,
"/30 = 4 כתובות: 1 network + 2 usable + 1 broadcast. בדיוק מספיק לשני Routers. /31 (2 כתובות, ללא broadcast) גם אפשרי ב-point-to-point מודרני (RFC 3021). /24 = בזבוז של 252 כתובות.",
"Point-to-point link:\n\n  RouterA ---- /30 ---- RouterB\n\n  /30 = 4 addresses:\n    .0 = Network\n    .1 = RouterA  <-- usable\n    .2 = RouterB  <-- usable\n    .3 = Broadcast\n\n  Perfect! No wasted addresses.\n\n  /31 (RFC 3021) = 2 addresses, no broadcast\n    .0 = RouterA\n    .1 = RouterB\n    Even more efficient!"],

["<strong>Supernetting (Route Aggregation)</strong> הוא ההפך מ-Subnetting — מאחד כמה רשתות קטנות לרשת גדולה אחת. במקום לפרסם 4 routes נפרדים (192.168.0.0/24, .1.0/24, .2.0/24, .3.0/24), מפרסמים route אחד: 192.168.0.0/22. זה מקטין את טבלאות הניתוב ומשפר ביצועים.",
"איזה CIDR מאחד את 192.168.0.0/24, .1.0/24, .2.0/24, .3.0/24?",
["/22","/23","/25","/20"],0,
"4 רשתות /24 = 4 × 256 = 1024 כתובות. /22 = 2^(32-22) = 1024 כתובות. בדיקה: 192.168.0.0 עד 192.168.3.255 — בול 4 × /24 רציפים שמתאחדים ל-/22.",
"Route Aggregation (Supernetting):\n\nBefore (4 routes in routing table):\n  192.168.0.0/24  (256 addr)\n  192.168.1.0/24  (256 addr)\n  192.168.2.0/24  (256 addr)\n  192.168.3.0/24  (256 addr)\n\nAfter (1 summary route):\n  192.168.0.0/22  (1024 addr)\n\n/24 - 2 bits = /22\n4 contiguous /24 = one /22\nSmaller routing table = faster lookups!"],

["האם שני מכשירים יכולים לדבר ישירות? תלוי אם הם <strong>באותו subnet</strong>. כל מכשיר עושה AND בינארי בין ה-IP שלו לSubnet Mask, ואותו דבר ל-IP של היעד. אם התוצאה זהה — הם באותו subnet ויכולים לדבר ישירות (דרך Switch). אם שונה — חייבים לעבור דרך Router (Default Gateway).",
"192.168.1.100/25 ו-192.168.1.200/25 — באותו subnet?",
["כן, שניהם 192.168.1.x","לא — 100 ב-subnet .0, ו-200 ב-subnet .128 (blocks של 128)","תלוי ב-Router","אי אפשר לדעת"],1,
"/25 = blocks של 128. Subnet 1: .0-.127. Subnet 2: .128-.255. הכתובת 100 ב-subnet 1, 200 ב-subnet 2. הם לא באותו subnet! צריכים Router כדי לדבר.",
"/25 splits into 2 subnets of 128:\n\n  Subnet A: 192.168.1.0   - 192.168.1.127\n    -> 192.168.1.100 is HERE\n\n  Subnet B: 192.168.1.128 - 192.168.1.255\n    -> 192.168.1.200 is HERE\n\n  DIFFERENT subnets! Need a Router!\n\n  Check: IP AND Mask\n    100: 192.168.1.100 AND 255.255.255.128 = 192.168.1.0\n    200: 192.168.1.200 AND 255.255.255.128 = 192.168.1.128\n    0 != 128 -> different subnets"],

["הנה <strong>מחשבון Subnet</strong> — הכניסו IP/CIDR ובדקו את עצמכם. נסו לחשב קודם בראש, ואז בדקו עם המחשבון. הכלל: מצאו את גודל הblock (2^host_bits), חלקו את האוקטט האחרון לblocks, ומצאו באיזה block ה-IP נופל.",
"מהי Broadcast Address של 10.0.50.0/23?",
["10.0.50.255","10.0.51.255","10.0.49.255","10.0.52.255"],1,
"/23 = blocks של 512 (2 אוקטטים, 2^9). 10.0.50.0/23 מכסה .50.0 עד .51.255 (שני /24 ביחד). Network = 10.0.50.0, Broadcast = 10.0.51.255, Usable = 10.0.50.1 - 10.0.51.254 (510 hosts)."]
];
var L="\u05D0\u05D1\u05D2\u05D3",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function calcSub(idx){var input=document.getElementById('si-'+idx).value.trim();var res=document.getElementById('sr-'+idx);try{var p=input.split('/');var ip=p[0];var cidr=parseInt(p[1]);var oc=ip.split('.').map(Number);var mask=(0xFFFFFFFF<<(32-cidr))>>>0;var ipN=((oc[0]<<24)|(oc[1]<<16)|(oc[2]<<8)|oc[3])>>>0;var net=(ipN&mask)>>>0;var bc=(net|(~mask>>>0))>>>0;var hosts=Math.pow(2,32-cidr)-2;function toI(n){return[(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');}function toM(m){return[(m>>>24)&255,(m>>>16)&255,(m>>>8)&255,m&255].join('.');}res.innerHTML='Network:   '+toI(net)+'\nBroadcast: '+toI(bc)+'\nMask:      '+toM(mask)+'\nHosts:     '+hosts+'\nRange:     '+toI(net+1)+' - '+toI(bc-1);res.classList.add('show');}catch(e){res.textContent='Invalid. Use: 192.168.1.0/24';res.classList.add('show');}}
function render(){var a=document.getElementById('area');a.innerHTML='';for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;var codeH=q[5]?'<div class="code">'+esc(q[5])+'</div>':'';
