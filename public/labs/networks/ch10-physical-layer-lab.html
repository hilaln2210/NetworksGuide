<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק 10 — השכבה הפיזית</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--bg2:#0c1119;--bg3:#141c28;--border:#1e2d42;--acc:#fb923c;--ad:rgba(251,146,60,0.1);--green:#4ade80;--gd:rgba(74,222,128,0.08);--red:#ef4444;--rd:rgba(239,68,68,0.1);--gold:#fbbf24;--text:#dfe6f0;--t2:#7b8da4;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(251,146,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(251,146,60,0.03) 1px,transparent 1px);background-size:40px 40px;}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#080e16,rgba(6,10,16,.97));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}.icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--acc),#ea580c);display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo h1{font-family:'Space Mono',monospace;font-size:14px;color:var(--acc);}.logo .sub{font-size:11px;color:var(--t2);}
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:b 2s infinite;}@keyframes b{0%,100%{opacity:1;}50%{opacity:.3;}}
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:10px;}.ptr{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}.pfl{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--acc),#ea580c);}.plbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);}
.wrap{padding:14px;padding-bottom:100px;position:relative;z-index:1;}
.qc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;display:none;}.qc.active{display:block;animation:up .3s ease;}@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.qh{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}.qtag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--ad);color:var(--acc);}.qpts{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);}
.qb{padding:14px;}.theory{font-size:13px;color:var(--t2);line-height:1.9;margin-bottom:14px;padding:12px 14px;background:var(--bg3);border-radius:10px;border-right:3px solid var(--acc);}.theory strong{color:var(--text);}
.qt{font-size:14px;font-weight:700;line-height:1.6;margin-bottom:12px;color:var(--acc);}
.opts{display:flex;flex-direction:column;gap:6px;}.opt{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;text-align:right;width:100%;color:var(--text);font-family:'Heebo',sans-serif;font-size:12px;line-height:1.5;}.opt:hover{border-color:var(--acc);background:var(--ad);}
.ol{width:24px;height:24px;flex-shrink:0;background:var(--ad);border:1px solid rgba(251,146,60,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--acc);}
.opt.ok{border-color:var(--green);background:var(--gd);}.opt.ok .ol{background:var(--green);color:var(--bg);}.opt.no{border-color:var(--red);background:var(--rd);}.opt.no .ol{background:var(--red);color:#fff;}.opt.dis{pointer-events:none;opacity:.5;}
.fb{margin-top:10px;padding:10px;border-radius:8px;font-size:11px;line-height:1.7;display:none;}.fb.show{display:block;animation:up .3s;}.fb.fok{background:var(--gd);border:1px solid rgba(74,222,128,0.2);color:#86efac;}.fb.fno{background:var(--rd);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.foot{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 70%,transparent);padding:14px 16px 10px;z-index:50;}.foot-in{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}.fts{display:flex;gap:14px;}.fs{text-align:center;}.fv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--acc);}.fl{font-size:8px;color:var(--t2);}
.nb{background:linear-gradient(135deg,var(--acc),#ea580c);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:'Heebo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}.nb:disabled{opacity:.3;cursor:not-allowed;}
.res{display:none;text-align:center;padding:30px 16px;position:relative;z-index:1;}.res.show{display:block;animation:up .5s;}.re{font-size:50px;margin-bottom:10px;}.rt{font-size:20px;font-weight:900;margin-bottom:6px;}.rsu{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:16px;}
.rg{display:inline-block;font-family:'Space Mono',monospace;font-size:36px;font-weight:700;padding:8px 24px;border-radius:12px;margin-bottom:16px;}.ga{background:var(--gd);color:var(--green);border:2px solid var(--green);}.gb{background:var(--ad);color:var(--acc);border:2px solid var(--acc);}.gc{background:rgba(251,146,60,0.1);color:var(--gold);border:2px solid var(--gold);}.gf{background:var(--rd);color:var(--red);border:2px solid var(--red);}
.retry{margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 24px;color:var(--acc);font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
</style></head><body><div class="grid"></div>
<header><div class="logo"><div class="icon">⚡</div><div><h1>Lab — פרק 10</h1><div class="sub">השכבה הפיזית — Physical Layer</div></div></div><div class="badge"><div class="dot"></div><span id="timer">00:00</span></div></header>
<div class="pbar"><div class="ptr"><div class="pfl" id="pfl" style="width:0%"></div></div><div class="plbl" id="plbl">0 / 8</div></div>
<div class="wrap" id="area"></div><div class="res" id="resScr"></div>
<div class="foot" id="foot"><div class="foot-in"><div class="fts"><div class="fs"><div class="fv" id="sS">0</div><div class="fl">נקודות</div></div><div class="fs"><div class="fv" id="sC">0</div><div class="fl">נכונות</div></div><div class="fs"><div class="fv" id="sK">0</div><div class="fl">רצף🔥</div></div></div><button class="nb" id="nBtn" disabled onclick="nextQ()">הבא ←</button></div></div>
<script>
(function(){
var QS=[
["<strong>כבל נחושת (Copper)</strong> מעביר נתונים כאותות חשמליים דרך חוטי נחושת. הסוג הנפוץ ביותר הוא Twisted Pair — זוגות חוטים שזורים יחד כדי להפחית הפרעות אלקטרומגנטיות. הקטגוריות: Cat5e (עד 1Gbps), Cat6 (עד 10Gbps למרחק קצר), Cat6a (10Gbps ל-100 מטר).","מה היתרון של Cat6 על Cat5e?",["Cat6 ארוך יותר","Cat6 תומך ב-10Gbps למרחקים קצרים; Cat5e מוגבל ל-1Gbps","Cat6 אלחוטי","Cat6 זול יותר"],1,"Cat5e: עד 1Gbps, 100m. Cat6: עד 10Gbps ל-55m, או 1Gbps ל-100m. Cat6a: 10Gbps ל-100m. Cat7/Cat8 לdata centers מהירים במיוחד. ככל שהקטגוריה גבוהה = יותר שיכוך הפרעות."],
["<strong>סיב אופטי (Fiber Optic)</strong> מעביר נתונים כפולסי אור דרך חוט זכוכית דק. יתרונות: מהירויות גבוהות מאוד (עד Terabits), מרחקים ארוכים (עד עשרות ק\"מ), חסינות להפרעות אלקטרומגנטיות. יש שני סוגים: <strong>Single-Mode</strong> (קרן אחת, מרחק ארוך) ו-<strong>Multi-Mode</strong> (קרנות רבות, מרחק קצר, זול).","מתי נבחר Single-Mode Fiber על פני Multi-Mode?",["תמיד","למרחקים ארוכים (קילומטרים) — כמו חיבורי WAN בין בניינים או ערים","לרשת ביתית","לחיבור WiFi"],1,"Single-Mode: קרן אחת, ליבה דקה (9μm), עד 100 ק\"מ, יקר יותר. Multi-Mode: קרנות מרובות, ליבה עבה (50/62.5μm), עד 2 ק\"מ, זול. בdata center = Multi-Mode. בין אתרים = Single-Mode."],
["<strong>RJ45</strong> הוא הconnector הסטנדרטי לכבלי Ethernet. יש לו 8 פינים (4 זוגות) ומתחבר ל-NIC, Switch, או Router. יש שני תקנים לחיווט: <strong>T568A</strong> ו-<strong>T568B</strong>. כבל Straight = שני הקצוות אותו תקן (מחשב↔Switch). כבל Crossover = תקנים שונים (מחשב↔מחשב).","מתי צריך כבל Crossover?",["תמיד","כשמחברים שני מכשירים זהים ישירות — מחשב למחשב או Switch ל-Switch","כשמחברים מחשב ל-Switch","כשמחברים לאינטרנט"],1,"Crossover מחליף TX ו-RX בין הקצוות. בפועל, רוב המכשירים המודרניים תומכים ב-Auto-MDI/MDIX — מזהים אוטומטית ומתאימים, אז כבל Straight עובד בכל מצב."],
["<strong>NIC (Network Interface Card)</strong> הוא כרטיס הרשת שמחבר מחשב לרשת. הוא ממיר Frames דיגיטליים לsignals פיזיים (חשמל, אור, או אלחוטי) ולהפך. לכל NIC יש כתובת MAC ייחודית צרובה בחומרה. NIC מודרני תומך ב-offloading — מעביר חישובים (checksum, segmentation) מה-CPU לחומרת הכרטיס.","מה TCP Offload Engine (TOE) עושה?",["מצפין תעבורה","מעביר חישובי TCP מה-CPU לכרטיס הרשת — מפחית עומס על המעבד","מגדיל MTU","מנהל DNS"],1,"TOE מעביר checksum, segmentation, ו-reassembly מה-CPU ל-NIC hardware. בשרתים עמוסים זה חוסך 20-30% CPU. גם RSS (Receive Side Scaling) מפזר עומס בין CPU cores."],
["<strong>WiFi (802.11)</strong> משתמש בגלי רדיו להעברת נתונים אלחוטית. יש שני תדרים עיקריים: <strong>2.4GHz</strong> (טווח ארוך, מהירות נמוכה, יותר הפרעות) ו-<strong>5GHz</strong> (טווח קצר, מהירות גבוהה, פחות הפרעות). WiFi 6 (802.11ax) שיפר ביצועים בסביבות צפופות.","למה 5GHz מהיר יותר אבל עם טווח קצר?",["כי הוא ישן","תדר גבוה = יותר bandwidth אבל נבלע מהר יותר ע\"י קירות ומכשולים","כי צריך אנטנה מיוחדת","כי הוא מוצפן"],1,"תדר גבוה = יותר נתונים/שנייה (bandwidth), אבל גלים קצרים נבלעים ע\"י חומרים מוצקים. 2.4GHz עובר דרך קירות טוב יותר. WiFi 6E מוסיף תדר 6GHz — עוד יותר מהיר, טווח עוד יותר קצר."],
["<strong>MTU (Maximum Transmission Unit)</strong> הוא גודל ה-payload המקסימלי שFrame יכול לשאת. ב-Ethernet הסטנדרטי, MTU = 1500 bytes. אם packet גדול מדי, הוא חייב להתפצל (fragmentation) או שהשולח מקטין אותו. Jumbo Frames (MTU=9000) משמשים ב-data centers לביצועים.","מה קורה כשPacket גדול מה-MTU?",["נשלח כרגיל","הוא מתפצל (fragmented) למספר Frames קטנים — או נזרק אם DF flag דלוק","הוא נדחס","הוא מוצפן"],1,"אם Packet > MTU: Router יכול לפצל (fragment), אבל IP flag DF (Don't Fragment) מונע זאת. עם DF, ה-Router שולח ICMP 'Packet Too Big' והשולח מקטין. Path MTU Discovery מוצא את ה-MTU הקטן ביותר בנתיב."],
["<strong>PoE (Power over Ethernet)</strong> מאפשר להעביר חשמל דרך כבל הרשת יחד עם הנתונים. במקום לחבר כבל חשמל נפרד למצלמות IP, טלפונים, ו-Access Points, הם מקבלים חשמל מה-Switch דרך כבל ה-Ethernet. PoE = 15W, PoE+ = 30W, PoE++ = 60-100W.","מה היתרון העיקרי של PoE?",["מהירות גבוהה","מפשט התקנה — כבל אחד לנתונים + חשמל, בלי צורך בשקע חשמל ליד המכשיר","הצפנה","טווח ארוך"],1,"PoE = התקנה פשוטה וזולה יותר. מצלמה בתקרה? רק כבל Ethernet. AP בקומה? כבל אחד. גם מאפשר כיבוי/הדלקה מרחוק דרך ה-Switch (remote power management)."],
["<strong>Encoding</strong> בשכבה הפיזית הוא הדרך שבה ביטים (0 ו-1) מיוצגים כsignals פיזיים. ב-Manchester Encoding כל ביט מיוצג כמעבר: 0 = מעבר למטה, 1 = מעבר למעלה. זה מבטיח שתמיד יש מעבר — כך המקבל יכול לסנכרן שעון גם בלי signal נפרד.","למה Manchester Encoding כולל מעבר בכל ביט?",["כי זה יותר מהיר","כדי שהמקבל יוכל לסנכרן שעון — בלי מעברים אי אפשר לדעת מתי מתחיל כל ביט","כי זה יותר מאובטח","כי זה דורש פחות חשמל"],1,"בלי מעברים, רצף של 0000000 נראה כמו signal שטוח — המקבל לא יודע כמה ביטים עברו. Manchester פותר את בעיית ה-clock synchronization. החיסרון: צריך כפול bandwidth. לכן 10Mbps Ethernet עובד על 20MHz."]
];
var L="\u05D0\u05D1\u05D2\u05D3",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){var a=document.getElementById('area');a.innerHTML='';for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;var optsH='<div class="opts">';for(var j=0;j<q[2].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[2][j])+'</span></button>';}optsH+='</div>';card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="theory">'+q[0]+'</div><div class="qt">'+esc(q[1])+'</div>'+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';a.appendChild(card);}a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});}
function handleA(qi,oi){if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[3];var ok=oi===ci;ans[qi]=ok;var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}var fb=document.getElementById('fb-'+qi);if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 נכון! +10'+(sk>=3?' (+5 רצף!)':'');}else{sk=0;fb.className='fb show fno';fb.textContent='\u274C לא נכון';}fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[4]));document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='📊 תוצאות';}
window.nextQ=function(){if(cur>=QS.length-1){showRes();return;}document.getElementById('qc-'+cur).classList.remove('active');cur++;document.getElementById('qc-'+cur).classList.add('active');document.getElementById('nBtn').disabled=true;document.getElementById('qc-'+cur).scrollIntoView({behavior:'smooth',block:'center'});};
function showRes(){document.getElementById('area').style.display='none';document.getElementById('foot').style.display='none';var rs=document.getElementById('resScr');rs.classList.add('show');var pct=sc/(QS.length*10);var g,gc;if(pct>=.9){g='A+';gc='ga';}else if(pct>=.75){g='B';gc='gb';}else if(pct>=.55){g='C';gc='gc';}else{g='F';gc='gf';}var m=String(Math.floor(ts/60)).padStart(2,'0');var s=String(ts%60).padStart(2,'0');rs.innerHTML='<div class="re">'+(pct>=.9?'🏆':pct>=.75?'🎯':pct>=.55?'📚':'💪')+'</div><div class="rt" style="color:'+(pct>=.75?'var(--acc)':'var(--gold)')+'">'+  (pct>=.9?'Physical Layer Master!':pct>=.75?'מצוין!':pct>=.55?'בדרך הנכונה':'צריך חזרה')+'</div><div class="rsu">'+cc+'/'+QS.length+' | '+sc+' נק\' | '+m+':'+s+' | רצף: '+mx+'</div><div class="rg '+gc+'">'+g+'</div><br><button class="retry" onclick="location.reload()">נסה שוב ↻</button>';}render();})();
</script></body></html>
