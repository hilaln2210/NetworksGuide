<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק 9 — רכיבי רשת</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--bg2:#0c1119;--bg3:#141c28;--border:#1e2d42;--acc:#f472b6;--ad:rgba(244,114,182,0.1);--green:#4ade80;--gd:rgba(74,222,128,0.08);--red:#ef4444;--rd:rgba(239,68,68,0.1);--gold:#fbbf24;--text:#dfe6f0;--t2:#7b8da4;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(244,114,182,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(244,114,182,0.03) 1px,transparent 1px);background-size:40px 40px;}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#080e16,rgba(6,10,16,.97));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}.icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--acc),#db2777);display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo h1{font-family:'Space Mono',monospace;font-size:14px;color:var(--acc);}.logo .sub{font-size:11px;color:var(--t2);}
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:b 2s infinite;}@keyframes b{0%,100%{opacity:1;}50%{opacity:.3;}}
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:10px;}.ptr{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}.pfl{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--acc),#db2777);}.plbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);}
.wrap{padding:14px;padding-bottom:100px;position:relative;z-index:1;}
.qc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;display:none;}.qc.active{display:block;animation:up .3s ease;}@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.qh{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}.qtag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--ad);color:var(--acc);}.qpts{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);}
.qb{padding:14px;}.theory{font-size:13px;color:var(--t2);line-height:1.9;margin-bottom:14px;padding:12px 14px;background:var(--bg3);border-radius:10px;border-right:3px solid var(--acc);}.theory strong{color:var(--text);}
.qt{font-size:14px;font-weight:700;line-height:1.6;margin-bottom:12px;color:var(--acc);}
.code{background:#040810;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:12px;font-family:'Space Mono',monospace;font-size:10px;line-height:1.7;direction:ltr;text-align:left;color:var(--t2);overflow-x:auto;white-space:pre-wrap;}
.opts{display:flex;flex-direction:column;gap:6px;}.opt{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;text-align:right;width:100%;color:var(--text);font-family:'Heebo',sans-serif;font-size:12px;line-height:1.5;}.opt:hover{border-color:var(--acc);background:var(--ad);}
.ol{width:24px;height:24px;flex-shrink:0;background:var(--ad);border:1px solid rgba(244,114,182,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--acc);}
.opt.ok{border-color:var(--green);background:var(--gd);}.opt.ok .ol{background:var(--green);color:var(--bg);}.opt.no{border-color:var(--red);background:var(--rd);}.opt.no .ol{background:var(--red);color:#fff;}.opt.dis{pointer-events:none;opacity:.5;}
.fb{margin-top:10px;padding:10px;border-radius:8px;font-size:11px;line-height:1.7;display:none;}.fb.show{display:block;animation:up .3s;}.fb.fok{background:var(--gd);border:1px solid rgba(74,222,128,0.2);color:#86efac;}.fb.fno{background:var(--rd);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.foot{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 70%,transparent);padding:14px 16px 10px;z-index:50;}.foot-in{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.fts{display:flex;gap:14px;}.fs{text-align:center;}.fv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--acc);}.fl{font-size:8px;color:var(--t2);}
.nb{background:linear-gradient(135deg,var(--acc),#db2777);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:'Heebo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}.nb:disabled{opacity:.3;cursor:not-allowed;}
.res{display:none;text-align:center;padding:30px 16px;position:relative;z-index:1;}.res.show{display:block;animation:up .5s;}.re{font-size:50px;margin-bottom:10px;}.rt{font-size:20px;font-weight:900;margin-bottom:6px;}.rsu{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:16px;}
.rg{display:inline-block;font-family:'Space Mono',monospace;font-size:36px;font-weight:700;padding:8px 24px;border-radius:12px;margin-bottom:16px;}.ga{background:var(--gd);color:var(--green);border:2px solid var(--green);}.gb{background:var(--ad);color:var(--acc);border:2px solid var(--acc);}.gc{background:rgba(251,146,60,0.1);color:var(--gold);border:2px solid var(--gold);}.gf{background:var(--rd);color:var(--red);border:2px solid var(--red);}
.retry{margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 24px;color:var(--acc);font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
</style></head><body><div class="grid"></div>
<header><div class="logo"><div class="icon">🔧</div><div><h1>Lab — פרק 9</h1><div class="sub">רכיבי רשת — Network Devices</div></div></div><div class="badge"><div class="dot"></div><span id="timer">00:00</span></div></header>
<div class="pbar"><div class="ptr"><div class="pfl" id="pfl" style="width:0%"></div></div><div class="plbl" id="plbl">0 / 8</div></div>
<div class="wrap" id="area"></div><div class="res" id="resScr"></div>
<div class="foot" id="foot"><div class="foot-in"><div class="fts"><div class="fs"><div class="fv" id="sS">0</div><div class="fl">נקודות</div></div><div class="fs"><div class="fv" id="sC">0</div><div class="fl">נכונות</div></div><div class="fs"><div class="fv" id="sK">0</div><div class="fl">רצף🔥</div></div></div><button class="nb" id="nBtn" disabled onclick="nextQ()">הבא ←</button></div></div>
<script>
(function(){
var QS=[
["<strong>Router</strong> הוא רכיב שכבה 3 שמנתב packets בין רשתות שונות. הוא קורא את כתובת ה-IP של היעד, בודק בטבלת ניתוב, ומעביר את הpacket דרך הפורט הנכון לכיוון הרשת הבאה. הוא גם יוצר גבול של Broadcast Domain — Broadcast לא עובר דרכו.","מה ההבדל העיקרי בין Router ל-Switch?",["Router מהיר יותר","Router מנתב לפי IP בין רשתות (L3); Switch מעביר לפי MAC בתוך רשת (L2)","Switch יקר יותר","אין הבדל"],1,"Router = שכבה 3, בין רשתות, לפי IP. Switch = שכבה 2, בתוך רשת, לפי MAC. Router = gateway לאינטרנט. Switch = מחבר מכשירים ברשת מקומית."],
["<strong>Firewall</strong> הוא שומר הסף של הרשת. הוא בודק כל packet שעובר דרכו ומחליט: להעביר או לחסום — לפי חוקים שהוגדרו מראש. החוקים מבוססים על IP מקור/יעד, פורט, פרוטוקול, וכיוון התעבורה. יש Firewalls בחומרה (Fortinet, Palo Alto) ובתוכנה (iptables, Windows Firewall).","מה Stateful Firewall עושה שונה מ-Stateless?",["Stateful מצפין, Stateless לא","Stateful עוקב אחרי חיבורים שלמים ומבין הקשר; Stateless בודק כל packet בנפרד","Stateful רק לTCP","אין הבדל"],1,"Stateless: בודק כל packet בנפרד לפי חוקים (IP, port). Stateful: זוכר חיבורים — אם יצאה בקשה, התשובה מותרת אוטומטית. הרבה יותר מאובטח כי מבין context."],
["<strong>Load Balancer</strong> מפזר תעבורה בין מספר שרתים כדי שאף אחד לא יהיה עמוס מדי. הוא יושב בין המשתמשים לשרתים ומחליט לאיזה שרת לנתב כל בקשה. יש כמה שיטות: Round Robin (בתור), Least Connections (לשרת הכי פנוי), IP Hash (לפי IP הלקוח).","מתי IP Hash עדיף על Round Robin?",["תמיד","כשצריך שאותו לקוח תמיד יגיע לאותו שרת (Session Persistence)","כשיש שרת אחד","כשלא צריך HTTPS"],1,"IP Hash מבטיח שלקוח מסוים תמיד מנותב לאותו שרת — חשוב ל-sessions. Round Robin פשוט מסובב בתור. Least Connections שולח לשרת עם הכי פחות חיבורים פעילים."],
["<strong>Access Point (AP)</strong> הוא הגשר בין העולם האלחוטי לקווי. הוא משדר רשת WiFi (SSID), מקבל חיבורים ממכשירים אלחוטיים, וממיר את ה-Frames האלחוטיים (802.11) ל-Frames קוויים (Ethernet) ולהפך.","מה ההבדל בין AP לRouter WiFi ביתי?",["אין הבדל","AP רק מגשר WiFi→Ethernet; Router ביתי = AP + Router + Switch + DHCP + NAT הכל בקופסה","AP יקר יותר","Router ביתי תומך ביותר מכשירים"],1,"Router ביתי = All-in-One: AP (WiFi) + Router (ניתוב) + Switch (פורטים) + DHCP (חלוקת IP) + NAT + Firewall. AP ארגוני = רק WiFi, מחובר ל-Switch ול-Router נפרדים."],
["<strong>Proxy Server</strong> יושב בין הלקוח לאינטרנט ומשמש כמתווך. Forward Proxy פועל מצד הלקוח — כל הבקשות עוברות דרכו (אנונימיות, סינון, cache). Reverse Proxy פועל מצד השרת — מקבל בקשות ומפנה לשרתים פנימיים (אבטחה, load balancing, SSL termination).","מה Reverse Proxy עושה?",["מסתיר את זהות הלקוח","יושב לפני השרתים, מקבל בקשות בשמם ומפנה פנימה — מגן ומאזן","מצפין DNS","חוסם אתרים"],1,"Reverse Proxy (כמו Nginx, HAProxy): הלקוח לא יודע על השרתים מאחור. יתרונות: SSL termination, caching, load balancing, הסתרת מבנה פנימי, הגנת DDoS."],
["<strong>DHCP Server</strong> מחלק כתובות IP אוטומטית. כשמכשיר חדש מתחבר, הוא שולח Broadcast: \"אני צריך IP!\". שרת DHCP עונה עם IP, Subnet Mask, Default Gateway, ו-DNS server. בלי DHCP היינו צריכים להגדיר IP ידנית בכל מכשיר.","מה 4 השלבים של DHCP?",["SYN, SYN-ACK, ACK, DATA","Discover, Offer, Request, Acknowledge (DORA)","Query, Response, Confirm, Done","Hello, Welcome, Accept, Start"],1,"DORA: 1) Discover (client broadcast: מי DHCP?), 2) Offer (server: הנה IP), 3) Request (client: רוצה את ה-IP הזה), 4) Acknowledge (server: אושר, הIP שלך ל-X שעות). הכל ב-UDP פורטים 67/68."],
["<strong>IDS ו-IPS</strong> הם מערכות לזיהוי ומניעת חדירות. IDS (Intrusion Detection System) מנטר תעבורה ומתריע על פעילות חשודה — אבל לא חוסם. IPS (Intrusion Prevention System) גם מנטר וגם חוסם אוטומטית. IDS = מצלמת אבטחה, IPS = מצלמה + שומר שחוסם.","מה ההבדל בין IDS ל-IPS?",["IDS חוסם, IPS לא","IDS רק מתריע; IPS מתריע וגם חוסם אוטומטית","IDS לWiFi, IPS לEthernet","אין הבדל"],1,"IDS = Passive — מנטר, מתריע, הoprator מחליט. IPS = Active — מזהה ומפיל packets חשודים בזמן אמת. IPS מוסיף latency אבל מגיב מהר יותר."],
["<strong>Switch Layer 3</strong> הוא Switch שיודע גם לנתב. Switch רגיל (L2) עובד רק לפי MAC. Switch L3 יכול גם לקרוא כתובות IP ולבצע ניתוב בין VLANs — בלי צורך ב-Router נפרד. יותר מהיר מRouter כי עושה את זה בחומרה.","מתי Switch L3 עדיף על Router רגיל?",["תמיד","לניתוב מהיר בין VLANs בתוך אותו Switch — ללא צורך בRouter חיצוני","לחיבור לאינטרנט","ל-WiFi"],1,"Switch L3 מנתב בין VLANs ב-wire speed (חומרה). Router מתאים יותר לחיבורי WAN, NAT, ו-firewall מתקדם. בפרקטיקה: L3 Switch לניתוב פנימי, Router לקצה הרשת."]
];
var L="\u05D0\u05D1\u05D2\u05D3",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){var a=document.getElementById('area');a.innerHTML='';for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;var codeH=q[5]?'<div class="code">'+esc(q[5])+'</div>':'';var optsH='<div class="opts">';for(var j=0;j<q[2].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[2][j])+'</span></button>';}optsH+='</div>';card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="theory">'+q[0]+'</div><div class="qt">'+esc(q[1])+'</div>'+codeH+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';a.appendChild(card);}a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});}
function handleA(qi,oi){if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[3];var ok=oi===ci;ans[qi]=ok;var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}var fb=document.getElementById('fb-'+qi);if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 נכון! +10'+(sk>=3?' (+5 רצף!)':'');}else{sk=0;fb.className='fb show fno';fb.textContent='\u274C לא נכון';}fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[4]));document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='📊 תוצאות';}
window.nextQ=function(){if(cur>=QS.length-1){showRes();return;}document.getElementById('qc-'+cur).classList.remove('active');cur++;document.getElementById('qc-'+cur).classList.add('active');document.getElementById('nBtn').disabled=true;document.getElementById('qc-'+cur).scrollIntoView({behavior:'smooth',block:'center'});};
function showRes(){document.getElementById('area').style.display='none';document.getElementById('foot').style.display='none';var rs=document.getElementById('resScr');rs.classList.add('show');var pct=sc/(QS.length*10);var g,gc;if(pct>=.9){g='A+';gc='ga';}else if(pct>=.75){g='B';gc='gb';}else if(pct>=.55){g='C';gc='gc';}else{g='F';gc='gf';}var m=String(Math.floor(ts/60)).padStart(2,'0');var s=String(ts%60).padStart(2,'0');rs.innerHTML='<div class="re">'+(pct>=.9?'🏆':pct>=.75?'🎯':pct>=.55?'📚':'💪')+'</div><div class="rt" style="color:'+(pct>=.75?'var(--acc)':'var(--gold)')+'">'+  (pct>=.9?'Network Devices Master!':pct>=.75?'מצוין!':pct>=.55?'בדרך הנכונה':'צריך חזרה')+'</div><div class="rsu">'+cc+'/'+QS.length+' | '+sc+' נק\' | '+m+':'+s+' | רצף: '+mx+'</div><div class="rg '+gc+'">'+g+'</div><br><button class="retry" onclick="location.reload()">נסה שוב ↻</button>';}render();})();
</script></body></html>
