<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק 9 – מעבדה Pro | רכיבי רשת</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--surf:#111827;--surf2:#1a2235;--brd:#1e2d45;--ac:#00d4ff;--ac2:#7c3aed;--gr:#10b981;--rd:#ef4444;--yw:#f59e0b;--tx:#e2e8f0;--mt:#64748b;--mono:'IBM Plex Mono',monospace;--sans:'Heebo',sans-serif;--hub:#f59e0b;--sw:#10b981;--rt:#00d4ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{max-width:900px;margin:0 auto;padding:32px 20px 60px;position:relative;z-index:1;}
.hdr{margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--brd);}
.row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.badge{background:linear-gradient(135deg,var(--ac2),#4f46e5);color:#fff;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:2px;padding:4px 10px;border-radius:4px;}
.ch{font-family:var(--mono);font-size:12px;color:var(--ac);}
.title{font-size:26px;font-weight:900;color:#fff;line-height:1.2;}
.sub{font-size:14px;color:var(--mt);margin-top:4px;}
.prog{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:16px 20px;margin-bottom:32px;display:flex;align-items:center;gap:20px;}
.pl{font-family:var(--mono);font-size:12px;color:var(--mt);}
.pb{flex:1;height:6px;background:var(--brd);border-radius:99px;overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,var(--ac2),var(--ac));border-radius:99px;transition:width .5s;width:0%;}
.ps{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--ac);}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:16px;overflow:hidden;}
.ch2{background:var(--surf2);border-bottom:1px solid var(--brd);padding:16px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.qn{font-family:var(--mono);font-size:11px;color:var(--mt);}
.qc{font-family:var(--mono);font-size:11px;color:var(--ac);background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);padding:2px 8px;border-radius:4px;}
.qdev{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 10px;border-radius:4px;}
.qdev.hub{background:rgba(245,158,11,.12);color:var(--hub);border:1px solid rgba(245,158,11,.3);}
.qdev.sw{background:rgba(16,185,129,.12);color:var(--sw);border:1px solid rgba(16,185,129,.3);}
.qdev.rt{background:rgba(0,212,255,.12);color:var(--rt);border:1px solid rgba(0,212,255,.3);}
.qdev.all{background:rgba(124,58,237,.12);color:#a78bfa;border:1px solid rgba(124,58,237,.3);}
.body{padding:28px 24px 20px;}
.snip{background:#0d1117;border:1px solid var(--brd);border-radius:10px;padding:14px 18px;margin-bottom:22px;font-family:var(--mono);font-size:13px;line-height:1.9;overflow-x:auto;}
/* network diagram in snip */
.nd{display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 0;flex-wrap:wrap;}
.nd-node{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;text-align:center;white-space:nowrap;}
.nd-hub{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.4);}
.nd-sw{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.4);}
.nd-rt{background:rgba(0,212,255,.15);color:#00d4ff;border:1px solid rgba(0,212,255,.4);}
.nd-pc{background:rgba(244,114,182,.12);color:#f472b6;border:1px solid rgba(244,114,182,.3);}
.nd-pc.b{color:#818cf8;border-color:rgba(129,140,248,.3);background:rgba(129,140,248,.08);}
.nd-pc.c{color:#34d399;border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.08);}
.nd-pc.s{color:#fb923c;border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.08);}
.nd-arrow{color:#475569;font-size:16px;}
.kw{color:#ff79c6;}.fn{color:#50fa7b;}.st{color:#f1fa8c;}.nu{color:#bd93f9;}.va{color:#8be9fd;}.cm{color:#6272a4;}.yw{color:#f59e0b;}.gr2{color:#50fa7b;}.rd2{color:#ff5555;}.pk{color:#f472b6;}.pr{color:#818cf8;}.tl{color:#34d399;}
.qt{font-size:18px;font-weight:600;color:#fff;line-height:1.5;margin-bottom:28px;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{background:var(--bg);border:1px solid var(--brd);border-radius:10px;padding:14px 18px;cursor:pointer;text-align:right;display:flex;align-items:center;gap:12px;width:100%;font-family:var(--sans);font-size:15px;color:var(--tx);transition:all .15s;}
.opt:hover{border-color:var(--ac);background:rgba(0,212,255,.04);color:#fff;}
.opt.done{cursor:default;pointer-events:none;}
.opt.correct{border-color:var(--gr);background:rgba(16,185,129,.1);color:#fff;}
.opt.correct .lb{color:var(--gr);}
.opt.wrong{border-color:var(--rd);background:rgba(239,68,68,.08);color:var(--mt);}
.opt.wrong .lb{color:var(--rd);}
.opt.show{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05);}
.lb{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--mt);min-width:20px;text-align:center;flex-shrink:0;}
.ot{flex:1;text-align:right;}
.ic{font-size:16px;min-width:20px;text-align:center;flex-shrink:0;}
.exp{margin:20px 0 0;padding:16px 18px;border-radius:10px;border-right:3px solid var(--gr);background:rgba(16,185,129,.06);display:none;}
.exp.bad{border-color:var(--rd);background:rgba(239,68,68,.06);}
.et{font-family:var(--mono);font-size:11px;color:var(--gr);margin-bottom:6px;text-transform:uppercase;}
.exp.bad .et{color:var(--rd);}
.eb{font-size:14px;color:#94a3b8;line-height:1.8;}
.foot{padding:20px 24px;border-top:1px solid var(--brd);display:flex;justify-content:space-between;}
.btn{background:transparent;border:1px solid var(--brd);color:var(--mt);padding:10px 20px;border-radius:8px;font-family:var(--sans);font-size:14px;cursor:pointer;transition:all .15s;}
.btn:hover:not(:disabled){border-color:var(--ac);color:var(--ac);}
.btn:disabled{opacity:.3;cursor:default;}
.btn.pri{background:linear-gradient(135deg,var(--ac2),#4f46e5);border-color:transparent;color:#fff;font-weight:600;}
.res{display:none;text-align:center;padding:60px 24px;}
.ring{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;position:relative;}
.ring::after{content:'';position:absolute;inset:12px;border-radius:50%;background:var(--surf);}
.rn{font-family:var(--mono);font-size:36px;font-weight:600;color:#fff;position:relative;z-index:1;}
.rt2{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px;}
.rs{font-size:15px;color:var(--mt);margin-bottom:32px;}
.bks{display:flex;gap:20px;justify-content:center;margin-bottom:36px;flex-wrap:wrap;}
.bk{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:14px 24px;text-align:center;}
.bv{font-family:var(--mono);font-size:22px;font-weight:600;color:#fff;}
.bl{font-size:12px;color:var(--mt);margin-top:2px;}
.rbtn{background:linear-gradient(135deg,var(--ac2),#4f46e5);border:none;color:#fff;padding:14px 36px;border-radius:10px;font-family:var(--sans);font-size:16px;font-weight:600;cursor:pointer;}
</style>
<style id="mobile-fix">
@media (max-width: 600px) {
  body { padding: 8px 8px 40px !important; overflow-x: hidden !important; }
  .wrap, .container, [class*="wrap"], [class*="container"] {
    padding-left: 8px !important;
    padding-right: 8px !important;
    max-width: 100% !important;
  }
  pre, code { font-size: 12px !important; white-space: pre-wrap !important; word-break: break-word !important; }
  table { display: block; overflow-x: auto; max-width: 100%; font-size: 13px !important; }
  img, svg { max-width: 100% !important; height: auto !important; }
  * { min-width: 0 !important; box-sizing: border-box; }
  .hero, [class*="hero"] { padding: 20px 12px !important; border-radius: 12px !important; }
  h1 { font-size: 1.5rem !important; }
  h2 { font-size: 1.2rem !important; }
  .card, [class*="card"] { padding: 14px 12px !important; border-radius: 12px !important; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="row">
      <span class="badge">PRO LAB</span>
      <span class="ch">פרק 9 מתוך 12</span>
    </div>
    <div class="title">רכיבי רשת</div>
    <div class="sub">15 שאלות &middot; Hub &middot; Switch &middot; Router &middot; ARP &middot; Routing &middot; סימולציות רשת</div>
  </div>
  <div class="prog">
    <span class="pl">התקדמות</span>
    <div class="pb"><div class="pf" id="pf"></div></div>
    <span class="ps" id="ps">0 / 15</span>
  </div>
  <div class="card" id="card">
    <div class="ch2">
      <span class="qn" id="qn">שאלה 1</span>
      <span class="qc" id="qc"></span>
      <span class="qdev" id="qdev"></span>
    </div>
    <div class="body">
      <div id="snip"></div>
      <div class="qt" id="qt"></div>
      <div class="opts" id="opts"></div>
      <div class="exp" id="exp"><div class="et" id="et"></div><div class="eb" id="eb"></div></div>
    </div>
    <div class="foot">
      <button class="btn" id="prev" onclick="go(-1)" disabled>&#x2192; הקודם</button>
      <button class="btn pri" id="next" onclick="go(1)" disabled>הבא &#x2190;</button>
    </div>
  </div>
  <div class="res" id="res">
    <div class="ring" id="ring"><span class="rn" id="rpct">0%</span></div>
    <div class="rt2" id="rt"></div><div class="rs" id="rs"></div>
    <div class="bks">
      <div class="bk"><div class="bv" id="rok" style="color:var(--gr)"></div><div class="bl">נכון</div></div>
      <div class="bk"><div class="bv" id="rbd" style="color:var(--rd)"></div><div class="bl">שגוי</div></div>
      <div class="bk"><div class="bv" id="rtt" style="color:var(--ac)"></div><div class="bl">סהכ</div></div>
    </div>
    <button class="rbtn" onclick="restart()">התחל מחדש</button>
  </div>
</div>
<script>
var Q = [
  {
    cat:"רכיב נכון", dev:"all",
    sn:'<div class="nd"><div class="nd-node nd-pc">A 📧 מייל</div><div class="nd-arrow">→</div><div class="nd-node nd-pc b">B 🌐 HTTP</div></div><div style="font-size:12px;color:#6272a4;margin-top:6px;">שניהם על אותה IP. הרשה מבקש שני שירותים שונים.</div>',
    q:"איזה רכיב מבדיל בין בקשת מייל לבקשת HTTP על אותו שרת? באיזה שכבה?",
    a:["Layer 4 (Transport) — פורטים! פורט 25=SMTP, פורט 80=HTTP. לא רכיב רשת אלא פרוטוקול שכבת תעבורה","Switch — מסיכה MAC ייחודי לכל שירות","Router — טבלת ניתוב נפרדת לכל שירות","Hub — כל שירות מגיע לפורט אחר"],
    c:0,
    e:"ההבחנה בין שירותים על אותה IP = פורטים = Layer 4. Hub/Switch/Router = Layer 1/2/3. הם לא מבדילים בין שירותים על אותה כתובת IP. זה בדיוק התפקיד של Layer 4."
  },
  {
    cat:"Hub", dev:"hub",
    sn:'<div class="nd"><div class="nd-node nd-pc">A</div><div class="nd-arrow">→</div><div class="nd-node nd-hub">HUB<br><small>4 ports</small></div><div class="nd-arrow">→</div><div class="nd-node nd-pc b">B</div></div><div style="color:#34d399;font-size:12px;margin-top:4px;font-family:IBM Plex Mono;">C, D מחוברים גם הם ל-Hub</div>',
    q:"A שולח מסגרת מיועדת ל-B. מה מקבלים B, C, D בפועל?",
    a:["כולם מקבלים: B, C, D. כרטיס C ו-D מזהה שהמסגרת לא מיועדת אליהם ופשוט זורק","רק B מקבל — Hub חכם מספיק","רק B ו-C — Hub שולח לשניים הקרובים","Hub לא שולח כלום, רק מחכה לאישור"],
    c:0,
    e:"Hub = Layer 1. לא מכיר MAC. כל מסגרת → Flood לכל הפורטים חוץ ממקור. B, C, D מקבלים. C ו-D קוראים Dst MAC, מזהים שלא מיועד אליהם → זורקים. B מעביר למעלה לעיבוד."
  },
  {
    cat:"Switch — למידה", dev:"sw",
    sn:'<div style="font-family:IBM Plex Mono;font-size:12px;line-height:2;"><div style="color:#f59e0b;">MAC Table (ריקה):</div><div style="color:#475569;">————————————————</div><div style="color:#64748b;">[ ריק ]</div></div>',
    q:"Switch חדש, A שולח ל-B (MAC של B לא בטבלה). מה Switch עושה? מה הוא לומד?",
    a:["Flooding לכל הפורטים חוץ ממקור. לומד: MAC_A → Port_A מה-src של המסגרת","זורק כי לא מכיר B","שולח רק ל-Port_B כי מנחש","שולח ARP לגילוי B"],
    c:0,
    e:"Switch חדש = Flooding (כמו Hub) עבור כתובת לא מוכרת. אבל: Switch לומד מ-src! כל מסגרת נכנסת → Switch שומר src_MAC → Port. אחרי ש-B שולח — Switch ילמד גם את B. מעתה → Unicast."
  },
  {
    cat:"Switch — טבלה", dev:"sw",
    sn:'<div style="font-family:IBM Plex Mono;font-size:12px;line-height:2;"><div style="color:#10b981;">MAC Table:</div><div><span style="color:#f472b6;">MAC_A</span> → <span style="color:#64748b;">Port 1</span></div><div><span style="color:#818cf8;">MAC_B</span> → <span style="color:#64748b;">Port 3</span></div><div style="color:#6272a4;">[ MAC_C לא ידוע ]</div></div>',
    q:"B שולח מסגרת ל-A. C שולח מסגרת ל-A. מה שונה בין שתי הפעולות?",
    a:["B→A: Unicast לPort 1 בלבד. C→A: Flooding לכל הפורטים (C לא בטבלה אז Switch לא יודע src Port שלו עדיין, אבל dst=A כן ידוע → רק Port 1)","שניהם Flooding","שניהם Unicast","B→A: Flooding. C→A: Unicast"],
    c:0,
    e:"מה Switch בודק: (1) dst_MAC בטבלה? A → Port 1 ✓ → שולח רק ל-Port 1 בשניהם. (2) לומד src: B→Port 3 כבר ידוע. C→Port כלשהו ← Switch לומד עכשיו. ה-dst ידוע בשני המקרים → Unicast לPort 1."
  },
  {
    cat:"Switch — Broadcast", dev:"sw",
    sn:'<div class="nd"><div class="nd-node nd-pc">A</div><div class="nd-arrow">⟶</div><div class="nd-node nd-sw">SWITCH</div><div class="nd-arrow">⟶?</div><div class="nd-node nd-pc b">B,C,D</div></div><div style="font-family:IBM Plex Mono;font-size:12px;margin-top:6px;color:#f59e0b;">A שולח ל: ff:ff:ff:ff:ff:ff</div>',
    q:"A שולח Broadcast (FF:FF:FF:FF:FF:FF). Switch מכיר את כל המחשבים. מה קורה?",
    a:["Switch שולח לכל הפורטים חוץ ממקור — Broadcast תמיד Flood, גם ב-Switch","Switch מזהה Broadcast ולא מעביר","Switch שולח רק למחשב שביקש","Switch שולח לפי Routing Table"],
    c:0,
    e:"גם ב-Switch מתוחכם: FF:FF:FF:FF:FF:FF = Broadcast → Flood לכל הפורטים חוץ ממקור. זה חיוני! ARP request שולח Broadcast כך שכולם ישמעו. Switch לא יכול לסנן Broadcast."
  },
  {
    cat:"Router", dev:"rt",
    sn:'<div class="nd"><div class="nd-node nd-pc">A<br><small>10.0.0.1/24</small></div><div class="nd-arrow">→</div><div class="nd-node nd-rt">ROUTER</div><div class="nd-arrow">→</div><div class="nd-node nd-pc b">B<br><small>20.0.0.5/24</small></div></div>',
    q:"למה A לא יכול לשלוח ל-B ישירות ב-Layer 2? מה תפקיד ה-Router כאן?",
    a:["A ו-B ב-Subnets שונים — לא מחוברים ישירות. Router = גשר בין רשתות. Layer 2 לא חוצה Subnet","Router צריך כי A לא יודע MAC של B","Router הכרחי כי B נמצא בשרת","A לא יכול לשלוח בלי ARP"],
    c:0,
    e:"ARP = Layer 2 → לא עובר בין Subnets. A רואה ש-20.0.0.5 לא ב-Subnet שלו → שולח ל-Default Gateway (Router). Router מקבל, בודק Routing Table, שולח לרשת 20.0.0.0/24 → B."
  },
  {
    cat:"ARP + Router", dev:"rt",
    sn:'<div style="font-family:IBM Plex Mono;font-size:12px;line-height:2;"><div><span style="color:#f472b6;">A: 10.0.0.1/8</span></div><div><span style="color:#818cf8;">Google: 142.250.74.4</span></div><div style="color:#6272a4;">A רוצה לשלוח ל-Google</div></div>',
    q:"A שולח ARP — לאיזה IP? ומדוע לא לGoogleישירות?",
    a:["ARP ל-Default Gateway של A (הנתב הביתי). לא לGoogle כי Google לא ב-Subnet. ARP לא מועבר ע\"י Routers","ARP ל-Google ישירות","ARP ל-DNS Server","לא שולח ARP בכלל"],
    c:0,
    e:"כלל ברזל: ARP = Layer 2 בלבד → Routers לא מעבירים ARP. A בודק: 142.250.74.4 ב-Subnet 10.0.0.0/8? לא! → שולח ARP ל-Default Gateway. אחרי שמקבל MAC של Router → שולח חבילה. Router יטפל בהמשך."
  },
  {
    cat:"שכבות", dev:"all",
    sn:'<div style="font-family:IBM Plex Mono;font-size:12px;line-height:2.2;"><div><span style="color:#f59e0b;">Hub</span> ← <span style="color:#64748b;">Layer ?</span></div><div><span style="color:#10b981;">Switch</span> ← <span style="color:#64748b;">Layer ?</span></div><div><span style="color:#00d4ff;">Router</span> ← <span style="color:#64748b;">Layer ?</span></div></div>',
    q:"התאם שכבה לרכיב. מה כל שכבה אומרת על יכולות הרכיב?",
    a:["Hub=L1 (לא מכיר כתובות). Switch=L2 (MAC). Router=L3 (IP). גבוה יותר = יותר חכם + יותר מידע","Hub=L2, Switch=L1, Router=L3","Hub=L1, Switch=L3, Router=L2","כולם Layer 2 אבל שמות שונים"],
    c:0,
    e:"Layer 1 (פיזי) = Hub: רק זרם חשמלי, ללא כתובות. Layer 2 (קו) = Switch: מכיר MAC, מבין Ethernet frames. Layer 3 (רשת) = Router: מכיר IP, Subnet Masks, מנתב בין רשתות. גבוה יותר = יותר הקשר + יותר עיבוד."
  },
  {
    cat:"Switch vs Hub — פרטיות", dev:"sw",
    sn:'<div class="nd"><div class="nd-node nd-pc">מישהו רע 😈</div><div class="nd-arrow">↕</div><div class="nd-node nd-hub">HUB</div></div><div style="margin-top:8px;" class="nd"><div class="nd-node nd-pc">מישהו רע 😈</div><div class="nd-arrow">↕</div><div class="nd-node nd-sw">SWITCH</div></div>',
    q:"Wireshark מופעל על 'מישהו רע' המחובר ל-Hub, ועל אחד אחר המחובר ל-Switch. מה כל אחד רואה?",
    a:["Hub: רואה כל תעבורת הרשת! Switch: רואה רק מה שמיועד אליו (+ Broadcast/Multicast)","Hub: רואה רק שלו. Switch: רואה הכל","שניהם רואים הכל בגלל Promiscuous Mode","שניהם רואים רק שלהם"],
    c:0,

  {

    sn:'<div style="font-family:IBM Plex Mono;font-size:12px;line-height:2;"><div><span style="color:#f472b6;">A (10.0.0.1)</span> שולח HTTP ל<span style="color:#818cf8;">B (20.0.0.5)</span></div><div style="color:#475569;">——————————————</div><div>Eth Src: <span style="color:#f472b6;">MAC_A</span>  Eth Dst: <span style="color:#00d4ff;">MAC_Router</span></div><div>IP Src: <span style="color:#f472b6;">10.0.0.1</span>   IP Dst: <span style="color:#818cf8;">20.0.0.5</span></div></div>',
    q:"Router מקבל את הפקטה. מה הוא משנה לפני שמעביר לB?",
    a:["Layer 2: בונה Ethernet frame חדש עם src=MAC_Router ו-dst=MAC_B. Layer 3: IP src/dst לא משתנים!","מחליף גם src IP ל-IP שלו (כמו NAT)","לא משנה כלום, מעביר as-is","מחליף רק dst MAC, src MAC נשאר של A"],
    c:0,
    e:"עיקרון מרכזי: IP src/dst = נקודות קצה = לא משתנות (אלא אם NAT). Ethernet src/dst = hop נוכחי = מתחלפות בכל Router. Router מוריד Ethernet frame ישן, בונה חדש: src=MAC כרטיס הנתב לרשת B, dst=MAC_B."
  },
  {
    cat:"Switch — Collision Domain", dev:"sw",
    sn:'<div class="nd"><div class="nd-node nd-pc">A</div><div class="nd-arrow">↕</div><div class="nd-node nd-hub">HUB</div><div class="nd-arrow">↕</div><div class="nd-node nd-pc b">B</div></div><div style="color:#94a3b8;font-size:12px;text-align:center;margin-top:4px;">A ו-B שולחים בו-זמנית →<span style="color:#ef4444;"> התנגשות!</span></div>',
    q:"Switch פותר התנגשויות, Hub לא. מדוע Switch מונע התנגשויות?",
    a:["כל פורט ב-Switch = Collision Domain נפרד. A ו-B יכולים לשלוח בו-זמנית כי הם לא על אותו ערוץ","Switch מחכה שהקו פנוי לפני שליחה","Switch מצפין את המידע","Switch יש TTL שמונע לולאות"],

  },
  {
    cat:"ה-Router הביתי", dev:"rt",
    sn:'<div style="font-family:IBM Plex Mono;font-size:12px;line-height:2;"><div style="color:#00d4ff;">🏠 הראוטר הביתי שלך:</div><div>• DHCP Server</div><div>• NAT</div><div>• Switch (4 LAN ports)</div><div>• WiFi Access Point</div><div>• Firewall</div><div>• DNS Relay</div></div>',
    q:"מה ה-Router הביתי שלך עושה שRouter 'טהור' לא עושה?",
    a:["כל הנ\"ל: הראוטר הביתי = Router + Switch + WAP + DHCP + NAT + Firewall + DNS במכשיר אחד","Router טהור עושה הכל, ביתי רק Switch","ביתי יותר מהיר מ-Router ארגוני","ביתי פחות מאובטח כי Layer 2 בלבד"],
    c:0,
    e:"Router 'ביתי' = שם שגוי! זה multi-function device: Switch (ב-LAN Ports), Router (L3 routing + NAT), DHCP (מחלק IP), WiFi AP, Firewall (מגן), DNS Relay. Router ארגוני 'טהור' בדרך כלל עושה רק routing."

  {
    cat:"Switch — סיכום", dev:"sw",
    sn:'<div style="font-family:IBM Plex Mono;font-size:12px;line-height:2;"><div style="color:#10b981;">Switch עם MAC Table מלאה:</div><div><span style="color:#f472b6;">MAC_A</span> → Port 1</div><div><span style="color:#818cf8;">MAC_B</span> → Port 3</div><div><span style="color:#34d399;">MAC_C</span> → Port 7</div></div><div style="margin-top:6px;font-family:IBM Plex Mono;font-size:12px;color:#f59e0b;">C שולח Broadcast ל-ff:ff:ff:ff:ff:ff</div>',
    q:"C שולח Broadcast. Switch מכיר את כולם. מה הוא עושה?",
    a:["שולח לכולם (A ב-Port1, B ב-Port3) חוץ מ-C עצמו (Port7). Broadcast תמיד Flood","שולח רק ל-Port 1 כי זה הקרוב","לא מעביר כי Broadcast לא בטבלה","זורק — אין MAC של ff:ff:ff:ff:ff:ff בטבלה"],
    c:0,
    e:"Broadcast = FF:FF:FF:FF:FF:FF → תמיד Flood לכל הפורטים חוץ ממקור, גם כש-MAC Table מלאה. Switch לא שומר Broadcast בטבלה — כי Broadcast מיועד לכולם תמיד. C (Port7) לא מקבל חזרה."
  },
  {
    cat:"השוואה סופית", dev:"all",
    sn: null,
    q:"מה ההבדל הבסיסי ביותר בין Hub, Switch, Router — בשתי מילים לכל אחד?",
    a:["Hub=Flood-All, Switch=Learn-MAC, Router=Route-IP","Hub=Layer2, Switch=Layer3, Router=Layer4","Hub=Wired, Switch=Wireless, Router=Internet","Hub=Fast, Switch=Secure, Router=Smart"],
    c:0,
    e:"ה-3 רכיבים בתמצית: Hub = שולח הכל לכולם (Layer 1, אין חכמה). Switch = לומד MAC ושולח רק ליעד (Layer 2). Router = מנתב בין רשתות לפי IP (Layer 3, Routing Table, NAT). זה הסיכום של פרק 9."
  }
];

var LBL = ["א","ב","ג","ד"];
var cur = 0;
var ans = [];
for (var i = 0; i < Q.length; i++) { ans.push(-1); }

function shuf(q) {
  var idx=[0,1,2,3];
  for(var i=3;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=idx[i];idx[i]=idx[j];idx[j]=t;}
  var na=[];
  for(var k=0;k<4;k++){na.push(q.a[idx[k]]);}
  var nc=-1;
  for(var k=0;k<4;k++){if(idx[k]===q.c){nc=k;break;}}
  return {cat:q.cat,dev:q.dev,sn:q.sn,q:q.q,a:na,c:nc,e:q.e};
}

var SQ=[];
for(var i=0;i<Q.length;i++){SQ.push(shuf(Q[i]));}

function render() {
  var q=SQ[cur];
  document.getElementById("qn").textContent="שאלה "+(cur+1);
  document.getElementById("qc").textContent=q.cat;
  var qd=document.getElementById("qdev");
  var devMap={hub:"Hub &#x1F4E1;",sw:"Switch &#x1F5A7;&#xFE0F;",rt:"Router &#x1F310;",all:"השוואה &#x1F504;"};
  var clsMap={hub:"hub",sw:"sw",rt:"rt",all:"all"};
  qd.innerHTML=devMap[q.dev]||"";
  qd.className="qdev "+(clsMap[q.dev]||"all");
  var sn=document.getElementById("snip");
  sn.innerHTML=q.sn?'<div class="snip">'+q.sn+'</div>':"";
  document.getElementById("qt").textContent=q.q;
  var oc=document.getElementById("opts");
  oc.innerHTML="";
  for(var i=0;i<4;i++){
    var b=document.createElement("button");
    b.className="opt";
    b.innerHTML='<span class="lb">'+LBL[i]+'</span><span class="ot">'+q.a[i]+'</span><span class="ic"></span>';
    b.setAttribute("data-i",i);
    b.onclick=pick;
    oc.appendChild(b);
  }
  var ex=document.getElementById("exp");
  ex.style.display="none";ex.className="exp";
  if(ans[cur]!==-1){showA(cur);}
  document.getElementById("prev").disabled=(cur===0);
  document.getElementById("next").disabled=(ans[cur]===-1);
  upProg();
}

function pick(){
  if(ans[cur]!==-1){return;}
  var i=parseInt(this.getAttribute("data-i"));
  ans[cur]=i;showA(cur);
  document.getElementById("next").disabled=false;
}

function showA(idx){
  var q=SQ[idx];var ch=ans[idx];var ok=(ch===q.c);
  var bs=document.querySelectorAll(".opt");
  for(var i=0;i<bs.length;i++){
    bs[i].className="opt done";bs[i].onclick=null;
    var ic=bs[i].querySelector(".ic");
    if(i===q.c){bs[i].classList.add(ok?"correct":"show");if(!ok){ic.textContent="\u2713";}}
    if(i===ch&&!ok){bs[i].classList.add("wrong");ic.textContent="\u2717";}
    if(i===ch&&ok){ic.textContent="\u2713";}
  }
  var ex=document.getElementById("exp");
  document.getElementById("et").textContent=ok?"\u2713 \u05e0\u05db\u05d5\u05df!":"\u2717 \u05dc\u05d0 \u05d1\u05d3\u05d9\u05d5\u05e7...";
  document.getElementById("eb").textContent=q.e;
  ex.className=ok?"exp":"exp bad";ex.style.display="block";
}

function upProg(){
  var n=0;
  for(var i=0;i<ans.length;i++){if(ans[i]!==-1){n++;}}
  document.getElementById("pf").style.width=(n/Q.length*100)+"%";
  document.getElementById("ps").textContent=n+" / "+Q.length;
}

function go(d){
  var n=cur+d;
  if(n<0){return;}
  if(n>=Q.length){showRes();return;}
  cur=n;render();
}

function showRes(){
  document.getElementById("card").style.display="none";
  document.getElementById("res").style.display="block";
  var ok=0,bd=0;
  for(var i=0;i<ans.length;i++){
    if(ans[i]===SQ[i].c){ok++;}else if(ans[i]!==-1){bd++;}
  }
  var pct=Math.round(ok/Q.length*100);
  document.getElementById("ring").style.background="conic-gradient(var(--ac) 0%,var(--ac2) "+pct+"%,var(--brd) "+pct+"%)";
  document.getElementById("rpct").textContent=pct+"%";
  document.getElementById("rok").textContent=ok;
  document.getElementById("rbd").textContent=bd;
  document.getElementById("rtt").textContent=Q.length;
  var t,s;
  if(pct>=80){t="\u05de\u05e6\u05d5\u05d9\u05df! \ud83c\udfaf";s="\u05e9\u05dc\u05d9\u05d8\u05d4 \u05de\u05dc\u05d0\u05d4 \u05d1\u05e8\u05db\u05d9\u05d1\u05d9 \u05e8\u05e9\u05ea";}
  else if(pct>=60){t="\u05dc\u05d0 \u05e8\u05e2 \ud83d\udcaa";s="\u05d7\u05d6\u05d5\u05e8 \u05e2\u05dc \u05d4\u05e9\u05d5\u05d5\u05d0\u05ea Switch/Hub/Router";}
  else{t="\u05d9\u05e9 \u05de\u05d4 \u05dc\u05d7\u05d6\u05e7 \ud83d\udcda";s="\u05e7\u05e8\u05d0 \u05e9\u05d5\u05d1 \u05d0\u05ea \u05e4\u05e8\u05e7\u05d9\u05dd 7-9";}
  document.getElementById("rt").textContent=t;
  document.getElementById("rs").textContent=s;
  upProg();
}

function restart(){
  SQ=[];
  for(var i=0;i<Q.length;i++){SQ.push(shuf(Q[i]));}
  cur=0;ans=[];
  for(var i=0;i<Q.length;i++){ans.push(-1);}
  document.getElementById("card").style.display="block";
  document.getElementById("res").style.display="none";
  render();
}

render();
</script>
</body>
</html>
