<script>
(function(){
var QS=[
["שרת Socket רגיל עם accept() הוא <strong>Blocking</strong> — הוא תקוע על accept() ומחכה ללקוח. כל עוד הוא מטפל בלקוח אחד, לקוחות אחרים ממתינים. כדי לטפל במספר לקוחות במקביל, צריך מנגנון כמו <strong>Threads</strong>, <strong>select()</strong>, או <strong>async I/O</strong>. כל גישה עם יתרונות וחסרונות.",
"למה שרת עם accept() רגיל לא יכול לטפל ב-100 לקוחות במקביל?",
["כי הוא מוגבל ל-TCP","כי accept() ו-recv() חוסמים — השרת תקוע על לקוח אחד עד שמסיים","כי פורט 80 תפוס","כי אין מספיק RAM"],1,
"Blocking I/O: accept() חוסם עד לקוח חדש, recv() חוסם עד נתונים. שרת לינארי = לקוח אחד בכל רגע. פתרונות: Thread per client, select()/poll()/epoll, async/await."],

["<strong>Threading</strong> הוא הפתרון הפשוט ביותר למקביליות: כל לקוח מקבל Thread משלו. Thread הוא כמו עובד נוסף — יכול לחכות ל-recv() בזמן שthread אחר מטפל בלקוח אחר. החיסרון: כל Thread צורך זיכרון (~1-8MB stack), ועם 10,000 לקוחות — נגמר הזיכרון.",
"מה החיסרון העיקרי של Thread-per-Client?",
["לא עובד עם TCP","צריכת זיכרון גבוהה — כל Thread צורך MB, ועם אלפי לקוחות המערכת קורסת","לא תומך Windows","לא מאובטח"],1,
"10,000 threads × 2MB = 20GB RAM רק ל-stacks. גם context switching בין threads יקר ל-CPU. לכן שרתים גדולים (Nginx, Node.js) משתמשים ב-event loop במקום threads. Python: asyncio, Go: goroutines (קלים מ-threads)."],

["<strong>select()</strong> הוא מנגנון I/O Multiplexing — הוא מאפשר לthread בודד לנטר מספר sockets בו-זמנית. במקום לחסום על recv() של socket אחד, select() אומר: \"תגיד לי מתי אחד מה-sockets האלה מוכן לקריאה\". כשsocket מוכן, הקוד קורא ממנו. כך thread אחד מטפל באלפי חיבורים.",
"מה היתרון של select() על Threading?",
["מהיר יותר תמיד","Thread אחד מנהל הרבה חיבורים — חוסך זיכרון ו-context switching","פשוט יותר לכתוב","תומך ביותר פרוטוקולים"],1,
"select() = single thread, many connections. חיסרון: select() מוגבל ל-1024 sockets ב-Linux. פתרונות: poll() (ללא מגבלה), epoll() (Linux, הכי מהיר), kqueue (macOS). Nginx ו-Redis משתמשים ב-epoll.",
"# select() example\nimport select\n\nreadable, _, _ = select.select(\n    [server_socket, client1, client2],  # monitor these\n    [], [], 1.0  # timeout 1 second\n)\n\nfor sock in readable:\n    if sock is server_socket:\n        new_client, addr = sock.accept()\n    else:\n        data = sock.recv(1024)\n\n# One thread handles ALL clients!"],

["<strong>Non-blocking Sockets</strong> הם sockets שלא חוסמים את הקוד. כשקוראים recv() על non-blocking socket ואין נתונים — במקום לחכות, הוא מחזיר שגיאה מיד (EAGAIN/EWOULDBLOCK). זה מאפשר לקוד להמשיך לרוץ ולבדוק שוב מאוחר יותר. משתמשים בזה יחד עם select()/epoll.",
"מה קורה כש-recv() נקרא על non-blocking socket ואין נתונים?",
["השרת קורס","מחזיר מיד עם שגיאת EAGAIN — הקוד ממשיך לרוץ","מחכה לנצח","סוגר את החיבור"],1,
"Blocking recv() = תקוע עד שיש data. Non-blocking recv() = EAGAIN אם אין data, הקוד ממשיך. Busy-waiting (לולאה אינסופית עם recv) = בזבוז CPU. לכן משלבים עם select() שמחכה בצורה יעילה.",
"# Non-blocking socket\nsock.setblocking(False)\n\ntry:\n    data = sock.recv(1024)\n    # Got data! Process it.\nexcept BlockingIOError:\n    # No data available yet.\n    # Do something else...\n    pass\n\n# Better: combine with select()\nready = select.select([sock], [], [], 0.1)\nif ready[0]:\n    data = sock.recv(1024)"],

["<strong>SO_REUSEADDR</strong> הוא Socket Option חשוב. כשסוגרים שרת TCP, הפורט נתקע במצב TIME_WAIT למשך 2-4 דקות — ה-OS לא מאפשר לפתוח שרת חדש על אותו פורט. SO_REUSEADDR אומר ל-OS: \"תן לי להשתמש בפורט הזה גם אם הוא ב-TIME_WAIT\". כמעט כל שרת משתמש בזה.",
"למה שרת שהופעל מחדש לא יכול להאזין על אותו פורט ללא SO_REUSEADDR?",
["הפורט נמחק","ה-OS מחזיק את הפורט ב-TIME_WAIT — מחכה לpackets תקועים מהחיבור הקודם","הport עבר ללקוח","DNS חוסם"],1,
"TIME_WAIT = ~60-240s. ה-OS רוצה לוודא שpackets ישנים מהחיבור הקודם לא יתבלבלו עם חיבור חדש. SO_REUSEADDR = פתרון סטנדרטי בצד שרת. ב-Python: s.setsockopt(SOL_SOCKET, SO_REUSEADDR, 1).",
"# Without SO_REUSEADDR:\n$ python server.py  # runs on port 8080\n^C  # stop server\n$ python server.py  # restart immediately\nOSError: Address already in use!  # port in TIME_WAIT\n\n# With SO_REUSEADDR:\ns = socket.socket(AF_INET, SOCK_STREAM)\ns.setsockopt(SOL_SOCKET, SO_REUSEADDR, 1)  # <-- fix!\ns.bind(('0.0.0.0', 8080))\n# Works immediately after restart!"],

["<strong>SSL/TLS Wrapping</strong> מאפשר להוסיף הצפנה ל-socket קיים. בPython, מודול ssl עוטף socket רגיל ב-TLS — כל send()/recv() מוצפנים אוטומטית. השרת צריך certificate (תעודה), והלקוח מאמת שהתעודה לגיטימית. ככה עובד HTTPS.",
"מה ssl.wrap_socket() עושה?",
["מגביר מהירות","עוטף socket רגיל בשכבת TLS — כל התקשורת מוצפנת אוטומטית","משנה מTCP לUDP","מוסיף compression"],1,
"wrap_socket() = plain TCP → encrypted TLS. השרת צריך cert.pem + key.pem. הלקוח מאמת certificate. אחרי wrapping, send()/recv() עובדים רגיל — ההצפנה שקופה. ב-Python 3: ssl.SSLContext מומלץ יותר.",
"# Server with TLS\nimport ssl\n\ncontext = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)\ncontext.load_cert_chain('cert.pem', 'key.pem')\n\nserver = socket.socket(AF_INET, SOCK_STREAM)\nserver.bind(('0.0.0.0', 443))\nserver.listen()\n\nsecure_sock = context.wrap_socket(server, server_side=True)\nclient, addr = secure_sock.accept()\n# Now all communication is encrypted!"],

["<strong>sendall()</strong> שונה מ-send() בדבר חשוב: send() עלול לשלוח רק חלק מהנתונים (אם buffer ה-OS מלא) ומחזיר כמה bytes באמת נשלחו. sendall() ממשיך לנסות עד שהכל נשלח — או שזורק exception. בצד הקבלה, צריך לולאה דומה כי recv() יכול להחזיר חלקי הודעות.",
"למה send() עשוי לשלוח פחות bytes ממה שביקשנו?",
["באג בpython","buffer ה-kernel מלא — send() שולח רק מה שנכנס ומחזיר את הכמות בפועל","כי TCP איטי","כי הPacket גדול מדי"],1,
"TCP = stream protocol. send(10000 bytes) יכול לשלוח רק 4096 אם הbuffer מלא. לכן: sendall() בצד השולח (או לולאה). recv() בצד המקבל תמיד יכול להחזיר חלקי — צריך protocol שמגדיר גבולות הודעה (length prefix, delimiter).",
"# send() - might send partial!\nsent = sock.send(big_data)  # sent < len(big_data)!\n\n# sendall() - sends everything or raises error\nsock.sendall(big_data)  # guaranteed all sent\n\n# recv() - always might be partial!\ndata = sock.recv(4096)  # might get 1 byte!\n\n# Solution: recv loop with length prefix\ndef recv_all(sock, length):\n    data = b''\n    while len(data) < length:\n        chunk = sock.recv(length - len(data))\n        if not chunk:\n            raise ConnectionError\n        data += chunk\n    return data"],

["<strong>Socket Timeout</strong> קובע כמה זמן socket מחכה לפעולה לפני שמוותר. בלי timeout, recv() יכול לחכות לנצח אם הצד השני נפל. settimeout(5.0) = אם אין תגובה תוך 5 שניות, נזרקת socket.timeout exception. חיוני לשרתים יציבים — מונע \"חיבורי רפאים\" שתופסים משאבים.",
"מה קורה אם socket עם timeout=5 לא מקבל נתונים תוך 5 שניות?",
["ממשיך לחכות","נזרקת socket.timeout exception — הקוד יכול לטפל בזה","השרת נכבה","החיבור מתאפס אוטומטית"],1,
"timeout = הגנה חיונית. בלעדיו, לקוח שנתק בלי לסגור חיבור = socket תקוע לנצח. עם timeout, אפשר לזהות, לסגור, ולשחרר משאבים. גם connect() יכול לקבל timeout — חשוב כשמנסים להתחבר לשרת שלא מגיב.",
"sock.settimeout(5.0)  # 5 second timeout\n\ntry:\n    data = sock.recv(1024)\nexcept socket.timeout:\n    print('No response in 5s, closing...')\n    sock.close()\n\n# Different timeout modes:\nsock.setblocking(True)   # infinite wait (default)\nsock.setblocking(False)  # never wait (EAGAIN)\nsock.settimeout(5.0)     # wait up to 5 seconds"]
];
var L="\u05D0\u05D1\u05D2\u05D3",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){var a=document.getElementById('area');a.innerHTML='';for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;var codeH=q[5]?'<div class="code">'+esc(q[5])+'</div>':'';var optsH='<div class="opts">';for(var j=0;j<q[2].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[2][j])+'</span></button>';}optsH+='</div>';card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="theory">'+q[0]+'</div><div class="qt">'+esc(q[1])+'</div>'+codeH+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';a.appendChild(card);}a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});}
function handleA(qi,oi){if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[3];var ok=oi===ci;ans[qi]=ok;var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}var fb=document.getElementById('fb-'+qi);if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 נכון! +10'+(sk>=3?' (+5 רצף!)':'');}else{sk=0;fb.className='fb show fno';fb.textContent='\u274C לא נכון';}fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[4]));document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='📊 תוצאות';}
window.nextQ=function(){if(cur>=QS.length-1){showRes();return;}document.getElementById('qc-'+cur).classList.remove('active');cur++;document.getElementById('qc-'+cur).classList.add('active');document.getElementById('nBtn').disabled=true;document.getElementById('qc-'+cur).scrollIntoView({behavior:'smooth',block:'center'});};
function showRes(){document.getElementById('area').style.display='none';document.getElementById('foot').style.display='none';var rs=document.getElementById('resScr');rs.classList.add('show');var pct=sc/(QS.length*10);var g,gc;if(pct>=.9){g='A+';gc='ga';}else if(pct>=.75){g='B';gc='gb';}else if(pct>=.55){g='C';gc='gc';}else{g='F';gc='gf';}var m=String(Math.floor(ts/60)).padStart(2,'0');var s=String(ts%60).padStart(2,'0');rs.innerHTML='<div class="re">'+(pct>=.9?'🏆':pct>=.75?'🎯':pct>=.55?'📚':'💪')+'</div><div class="rt" style="color:'+(pct>=.75?'var(--acc)':'var(--gold)')+'">'+  (pct>=.9?'Advanced Sockets Master!':pct>=.75?'מצוין!':pct>=.55?'בדרך הנכונה':'צריך חזרה')+'</div><div class="rsu">'+cc+'/'+QS.length+' | '+sc+' נק\' | '+m+':'+s+' | רצף: '+mx+'</div><div class="rg '+gc+'">'+g+'</div><br><button class="retry" onclick="location.reload()">נסה שוב ↻</button>';}render();})();
</script></body></html>
