<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק 11 — איך הכל מתחבר</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--bg2:#0c1119;--bg3:#141c28;--border:#1e2d42;--acc:#2dd4bf;--ad:rgba(45,212,191,0.1);--green:#4ade80;--gd:rgba(74,222,128,0.08);--red:#ef4444;--rd:rgba(239,68,68,0.1);--gold:#fbbf24;--text:#dfe6f0;--t2:#7b8da4;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(45,212,191,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(45,212,191,0.03) 1px,transparent 1px);background-size:40px 40px;}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#080e16,rgba(6,10,16,.97));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}.icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--acc),#0d9488);display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo h1{font-family:'Space Mono',monospace;font-size:14px;color:var(--acc);}.logo .sub{font-size:11px;color:var(--t2);}
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:b 2s infinite;}@keyframes b{0%,100%{opacity:1;}50%{opacity:.3;}}
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:10px;}.ptr{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}.pfl{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--acc),#0d9488);}.plbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);}
.wrap{padding:14px;padding-bottom:100px;position:relative;z-index:1;}
.qc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;display:none;}.qc.active{display:block;animation:up .3s ease;}@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.qh{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}.qtag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--ad);color:var(--acc);}.qpts{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);}
.qb{padding:14px;}.theory{font-size:13px;color:var(--t2);line-height:1.9;margin-bottom:14px;padding:12px 14px;background:var(--bg3);border-radius:10px;border-right:3px solid var(--acc);}.theory strong{color:var(--text);}
.qt{font-size:14px;font-weight:700;line-height:1.6;margin-bottom:12px;color:var(--acc);}
.code{background:#040810;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:12px;font-family:'Space Mono',monospace;font-size:10px;line-height:1.7;direction:ltr;text-align:left;color:var(--t2);overflow-x:auto;white-space:pre-wrap;}
.opts{display:flex;flex-direction:column;gap:6px;}.opt{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;text-align:right;width:100%;color:var(--text);font-family:'Heebo',sans-serif;font-size:12px;line-height:1.5;}.opt:hover{border-color:var(--acc);background:var(--ad);}
.ol{width:24px;height:24px;flex-shrink:0;background:var(--ad);border:1px solid rgba(45,212,191,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--acc);}
.opt.ok{border-color:var(--green);background:var(--gd);}.opt.ok .ol{background:var(--green);color:var(--bg);}.opt.no{border-color:var(--red);background:var(--rd);}.opt.no .ol{background:var(--red);color:#fff;}.opt.dis{pointer-events:none;opacity:.5;}
.fb{margin-top:10px;padding:10px;border-radius:8px;font-size:11px;line-height:1.7;display:none;}.fb.show{display:block;animation:up .3s;}.fb.fok{background:var(--gd);border:1px solid rgba(74,222,128,0.2);color:#86efac;}.fb.fno{background:var(--rd);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.foot{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 70%,transparent);padding:14px 16px 10px;z-index:50;}.foot-in{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}.fts{display:flex;gap:14px;}.fs{text-align:center;}.fv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--acc);}.fl{font-size:8px;color:var(--t2);}
.nb{background:linear-gradient(135deg,var(--acc),#0d9488);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:'Heebo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}.nb:disabled{opacity:.3;cursor:not-allowed;}
.res{display:none;text-align:center;padding:30px 16px;position:relative;z-index:1;}.res.show{display:block;animation:up .5s;}.re{font-size:50px;margin-bottom:10px;}.rt{font-size:20px;font-weight:900;margin-bottom:6px;}.rsu{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:16px;}
.rg{display:inline-block;font-family:'Space Mono',monospace;font-size:36px;font-weight:700;padding:8px 24px;border-radius:12px;margin-bottom:16px;}.ga{background:var(--gd);color:var(--green);border:2px solid var(--green);}.gb{background:var(--ad);color:var(--acc);border:2px solid var(--acc);}.gc{background:rgba(251,146,60,0.1);color:var(--gold);border:2px solid var(--gold);}.gf{background:var(--rd);color:var(--red);border:2px solid var(--red);}
.retry{margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 24px;color:var(--acc);font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
</style></head><body><div class="grid"></div>
<header><div class="logo"><div class="icon">📦</div><div><h1>Lab — פרק 11</h1><div class="sub">איך הכל מתחבר — Encapsulation</div></div></div><div class="badge"><div class="dot"></div><span id="timer">00:00</span></div></header>
<div class="pbar"><div class="ptr"><div class="pfl" id="pfl" style="width:0%"></div></div><div class="plbl" id="plbl">0 / 8</div></div>
<div class="wrap" id="area"></div><div class="res" id="resScr"></div>
<div class="foot" id="foot"><div class="foot-in"><div class="fts"><div class="fs"><div class="fv" id="sS">0</div><div class="fl">נקודות</div></div><div class="fs"><div class="fv" id="sC">0</div><div class="fl">נכונות</div></div><div class="fs"><div class="fv" id="sK">0</div><div class="fl">רצף🔥</div></div></div><button class="nb" id="nBtn" disabled onclick="nextQ()">הבא ←</button></div></div>
<script>
(function(){
var QS=[
["<strong>Encapsulation</strong> הוא התהליך המרכזי שמחבר את כל השכבות. כשאפליקציה שולחת מידע, כל שכבה מוסיפה header משלה — כמו מעטפה בתוך מעטפה. האפליקציה יוצרת Data, שכבת Transport עוטפת אותו ב-TCP/UDP header (נהיה Segment), שכבת Network מוסיפה IP header (נהיה Packet), שכבת Data Link מוסיפה MAC header (נהיה Frame), והשכבה הפיזית הופכת הכל לביטים. בצד המקבל — התהליך ההפוך: De-encapsulation.",
"מה הסדר הנכון של Encapsulation מלמעלה למטה?",
["Frame → Packet → Segment → Data","Data → Segment → Packet → Frame → Bits","Bits → Frame → Data → Packet","Packet → Frame → Segment → Data"],1,
"Data (L5 App) → Segment (L4 TCP adds ports) → Packet (L3 IP adds addresses) → Frame (L2 Ethernet adds MACs) → Bits (L1 physical signals). כל שכבה מוסיפה את ה-header שלה ומעבירה למטה.",
"Encapsulation (sending):\n\n  [HTTP Data]                          Layer 5\n  [TCP Header | HTTP Data]             Layer 4 = Segment\n  [IP Header | TCP | HTTP Data]        Layer 3 = Packet\n  [ETH Header | IP | TCP | Data | FCS] Layer 2 = Frame\n  [101010010110010...]                  Layer 1 = Bits"],

["<strong>PDU (Protocol Data Unit)</strong> הוא השם הרשמי של יחידת המידע בכל שכבה. לכל שכבה יש PDU משלה עם שם אחר. חשוב לדעת את השמות כי כשמדברים על \"Frame\" — ברור שזה שכבה 2, ו\"Packet\" — ברור שזה שכבה 3. זה כמו שפה משותפת בין אנשי רשתות.",
"מהו ה-PDU של שכבה 4 (Transport)?",
["Frame","Packet","Segment","Bit"],2,
"L1 = Bit, L2 = Frame, L3 = Packet, L4 = Segment, L5 = Data (או Message). Segment כולל את ה-TCP/UDP header עם פורטים, sequence numbers וכו'. ב-UDP לפעמים קוראים Datagram.",
"PDU Names:\n  Layer 5 (Application): Data / Message\n  Layer 4 (Transport):   Segment (TCP) / Datagram (UDP)\n  Layer 3 (Network):     Packet\n  Layer 2 (Data Link):   Frame\n  Layer 1 (Physical):    Bit"],

["כש-Packet עובר דרך <strong>Router</strong>, קורה דבר מעניין: ה-Router מפרק את ה-Frame (שכבה 2), קורא את כתובת ה-IP (שכבה 3), מחליט לאן לנתב, ואז בונה <strong>Frame חדש לגמרי</strong> עם כתובות MAC חדשות — של עצמו כ-Source ושל ה-next hop כ-Destination. ה-IP header נשאר כמעט זהה (רק TTL יורד ב-1).",
"מה משתנה כש-Packet עובר Router?",
["הכל נשאר זהה","ה-Frame header (MAC) משתנה, ה-IP header נשאר (פרט ל-TTL)","ה-IP header משתנה לגמרי","ה-Payload נמחק"],1,
"Router = L3 device. הוא מחליף את ה-Frame (L2 MACs) אבל לא נוגע ב-IP src/dst (L3). TTL יורד ב-1 ו-checksum מחושב מחדש. זה מאפשר ל-Packet לעבור רשתות שונות (Ethernet → WiFi → Fiber) בלי לאבד את ה-addressing שלו.",
"Packet through Router:\n\nBEFORE Router:\n  [MAC-A -> MAC-Router | IP: PC->Server | TCP | Data]\n\nRouter processes:\n  1. Strip Frame header (MAC-A, MAC-Router)\n  2. Read IP: destination = Server\n  3. Lookup routing table -> next hop\n  4. Decrement TTL: 64 -> 63\n  5. Build NEW Frame with new MACs\n\nAFTER Router:\n  [MAC-Router -> MAC-B | IP: PC->Server | TCP | Data]\n           changed!         same!          same!"],

["<strong>De-encapsulation</strong> קורה בצד המקבל — התהליך ההפוך מ-Encapsulation. כל שכבה קוראת את ה-header שלה, עושה את העבודה (בדיקת MAC, בדיקת IP, בדיקת פורטים), ומסירה אותו לפני שמעבירה למעלה. בסוף, האפליקציה מקבלת את ה-Data הנקי — בלי שום headers.",
"באיזה סדר קורה De-encapsulation?",
["Data → Segment → Packet → Frame","Bits → Frame → Packet → Segment → Data","Frame → Segment → Data → Packet","לא משנה הסדר"],1,
"ההפך מ-Encapsulation: הביטים הפיזיים נהפכים ל-Frame (בודק FCS), ל-Packet (בודק IP dst), ל-Segment (בודק port), ולבסוף ה-Data מגיע לאפליקציה. כל שכבה מסירה את ה-header שלה.",
"De-encapsulation (receiving):\n\n  [10101001...signals...]             Layer 1\n  [ETH | IP | TCP | Data | FCS]      Layer 2: check FCS, read MACs\n  [IP | TCP | Data]                  Layer 3: check dst IP\n  [TCP | Data]                       Layer 4: check dst port\n  [Data]                             Layer 5: deliver to app!"],

["כשמדברים על <strong>Header Overhead</strong>, מתכוונים לכמות הנתונים \"בזבוז\" שה-headers מוסיפים. Ethernet header = 14 bytes, IP header = 20 bytes, TCP header = 20 bytes. סה\"כ לפחות 54 bytes של headers לכל Packet. עם MTU של 1500 bytes, ה-Payload האפקטיבי הוא 1460 bytes — כלומר כ-3.6% overhead.",
"למה ב-UDP ה-overhead קטן יותר מ-TCP?",
["כי UDP מוצפן","UDP header = 8 bytes בלבד; TCP header = 20+ bytes כי צריך seq, ack, flags, window","כי UDP לא משתמש ב-IP","כי UDP דוחס את הנתונים"],1,
"TCP header מינימום 20 bytes (עם options עד 60). UDP header רק 8 bytes: src port (2B), dst port (2B), length (2B), checksum (2B). ולכן UDP overhead = ~42B (Eth+IP+UDP) לעומת TCP ~54B.",
"Header sizes:\n  Ethernet: 14 bytes (+ 4 FCS)\n  IP:       20 bytes (no options)\n  TCP:      20 bytes (no options)\n  UDP:       8 bytes\n\n  TCP total overhead: 14+20+20 = 54 bytes\n  UDP total overhead: 14+20+8  = 42 bytes\n\n  MTU 1500:\n    TCP payload: 1500-40 = 1460 bytes\n    UDP payload: 1500-28 = 1472 bytes"],

["כל שכבה ברשת עובדת בצורה <strong>עצמאית</strong> — היא לא צריכה לדעת איך השכבות מעליה או מתחתיה עובדות. הדבר היחיד שמחבר אותן הוא ה-interface ביניהן. למשל: TCP (L4) לא יודע אם הוא רץ על Ethernet, WiFi, או סיב אופטי. IP (L3) לא יודע אם מעליו רץ TCP או UDP. זו העוצמה של <strong>Layer Abstraction</strong>.",
"למה Layer Abstraction חשוב?",
["כי הוא מהיר יותר","אפשר להחליף טכנולוגיה בשכבה אחת בלי לשבור את השאר — למשל WiFi במקום Ethernet","כי הוא מאובטח","כי הוא חוסך חשמל"],1,
"Abstraction = חופש. שיניתם מ-Ethernet ל-WiFi? רק שכבה 1-2 משתנה, TCP/IP ממשיכים לעבוד בדיוק אותו דבר. שדרגתם מ-IPv4 ל-IPv6? שכבה 3 משתנה, Ethernet למטה ו-TCP למעלה לא צריכים לדעת. כל שכבה = מודול עצמאי."],

["<strong>Switch</strong> קורא רק עד שכבה 2 — הוא מסתכל על כתובות MAC ב-Frame header ומעביר. <strong>Router</strong> מגיע עד שכבה 3 — הוא מפרק את ה-Frame, קורא את ה-IP, ובונה Frame חדש. <strong>Firewall מתקדם</strong> (ו-Load Balancer) מגיעים עד שכבה 7 — הם יכולים לקרוא HTTP headers, URLs, ותוכן. ככל שהמכשיר \"עולה\" בשכבות, הוא יותר חכם אבל גם יותר איטי.",
"באיזו שכבה Firewall מודרני (NGFW) מנתח תעבורה?",
["שכבה 1 בלבד","שכבה 2 בלבד","עד שכבה 7 — כולל תוכן HTTP, DNS queries, ואפילו זיהוי אפליקציות","רק שכבה 4"],2,
"NGFW (Next-Generation Firewall) = Deep Packet Inspection עד L7. הוא יכול לזהות שFlux VPN מסתתר בתוך HTTPS, לחסום אתרים לפי URL, ולזהות malware בתוכן. Traditional Firewall = רק L3-L4 (IP+Port)."],

["כש-PC שולח HTTP request ל-Server שנמצא ברשת אחרת, כל המנגנונים עובדים ביחד: <strong>DNS</strong> מתרגם שם ל-IP, <strong>ARP</strong> מוצא MAC של ה-Gateway, <strong>TCP</strong> פותח חיבור, <strong>Router</strong> מנתב בין רשתות, ו-<strong>HTTP</strong> שולח את הבקשה. זו הזרימה המלאה מקצה לקצה.",
"מה הצעד הראשון כש-PC רוצה לגשת ל-google.com?",
["שולח HTTP GET ישר","TCP 3-way handshake","DNS query — מתרגם את google.com לכתובת IP","שולח ARP ל-Google"],0,
"לפני הכל צריך IP! 1) DNS: google.com→142.250.x.x. 2) ARP: מוצא MAC של Gateway (אם לא ב-cache). 3) TCP: SYN→SYN-ACK→ACK ל-IP של Google. 4) TLS: אם HTTPS. 5) HTTP: GET /. כל שכבה עושה את שלה בזמן הנכון.",
"Full flow: PC -> google.com\n\n1. DNS Query (UDP:53)\n   google.com -> 142.250.190.14\n\n2. ARP (if gateway MAC not cached)\n   Who has 192.168.1.1? -> MAC=AA:BB\n\n3. TCP 3-Way Handshake (port 443)\n   SYN -> SYN-ACK -> ACK\n\n4. TLS Handshake\n   ClientHello -> ServerHello -> Keys\n\n5. HTTP Request (encrypted in TLS)\n   GET / HTTP/2\n   Host: google.com\n\n6. Response -> Render page"]
];
var L="\u05D0\u05D1\u05D2\u05D3",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){var a=document.getElementById('area');a.innerHTML='';for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;var codeH=q[5]?'<div class="code">'+esc(q[5])+'</div>':'';var optsH='<div class="opts">';for(var j=0;j<q[2].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[2][j])+'</span></button>';}optsH+='</div>';card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="theory">'+q[0]+'</div><div class="qt">'+esc(q[1])+'</div>'+codeH+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';a.appendChild(card);}a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});}
function handleA(qi,oi){if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[3];var ok=oi===ci;ans[qi]=ok;var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}var fb=document.getElementById('fb-'+qi);if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 נכון! +10'+(sk>=3?' (+5 רצף!)':'');}else{sk=0;fb.className='fb show fno';fb.textContent='\u274C לא נכון';}fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[4]));document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='📊 תוצאות';}
window.nextQ=function(){if(cur>=QS.length-1){showRes();return;}document.getElementById('qc-'+cur).classList.remove('active');cur++;document.getElementById('qc-'+cur).classList.add('active');document.getElementById('nBtn').disabled=true;document.getElementById('qc-'+cur).scrollIntoView({behavior:'smooth',block:'center'});};
function showRes(){document.getElementById('area').style.display='none';document.getElementById('foot').style.display='none';var rs=document.getElementById('resScr');rs.classList.add('show');var pct=sc/(QS.length*10);var g,gc;if(pct>=.9){g='A+';gc='ga';}else if(pct>=.75){g='B';gc='gb';}else if(pct>=.55){g='C';gc='gc';}else{g='F';gc='gf';}var m=String(Math.floor(ts/60)).padStart(2,'0');var s=String(ts%60).padStart(2,'0');rs.innerHTML='<div class="re">'+(pct>=.9?'🏆':pct>=.75?'🎯':pct>=.55?'📚':'💪')+'</div><div class="rt" style="color:'+(pct>=.75?'var(--acc)':'var(--gold)')+'">'+  (pct>=.9?'Encapsulation Master!':pct>=.75?'מצוין!':pct>=.55?'בדרך הנכונה':'צריך חזרה')+'</div><div class="rsu">'+cc+'/'+QS.length+' | '+sc+' נק\' | '+m+':'+s+' | רצף: '+mx+'</div><div class="rg '+gc+'">'+g+'</div><br><button class="retry" onclick="location.reload()">נסה שוב ↻</button>';}render();})();
</script></body></html>
