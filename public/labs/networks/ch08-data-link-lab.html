<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק 8 — שכבת הקו</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--bg2:#0c1119;--bg3:#141c28;--border:#1e2d42;--acc:#c084fc;--ad:rgba(192,132,252,0.1);--green:#4ade80;--gd:rgba(74,222,128,0.08);--red:#ef4444;--rd:rgba(239,68,68,0.1);--gold:#fbbf24;--text:#dfe6f0;--t2:#7b8da4;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(192,132,252,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(192,132,252,0.03) 1px,transparent 1px);background-size:40px 40px;}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#080e16,rgba(6,10,16,.97));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}.icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--acc),#7c3aed);display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo h1{font-family:'Space Mono',monospace;font-size:14px;color:var(--acc);}.logo .sub{font-size:11px;color:var(--t2);}
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:b 2s infinite;}@keyframes b{0%,100%{opacity:1;}50%{opacity:.3;}}
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:10px;}
.ptr{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}.pfl{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--acc),#7c3aed);}
.plbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);}
.wrap{padding:14px;padding-bottom:100px;position:relative;z-index:1;}
.qc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;display:none;}
.qc.active{display:block;animation:up .3s ease;}@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.qh{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.qtag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--ad);color:var(--acc);}
.qpts{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);}
.qb{padding:14px;}
.theory{font-size:13px;color:var(--t2);line-height:1.9;margin-bottom:14px;padding:12px 14px;background:var(--bg3);border-radius:10px;border-right:3px solid var(--acc);}
.theory strong{color:var(--text);}
.qt{font-size:14px;font-weight:700;line-height:1.6;margin-bottom:12px;color:var(--acc);}
.code{background:#040810;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:12px;font-family:'Space Mono',monospace;font-size:10px;line-height:1.7;direction:ltr;text-align:left;color:var(--t2);overflow-x:auto;white-space:pre-wrap;}
.opts{display:flex;flex-direction:column;gap:6px;}
.opt{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;text-align:right;width:100%;color:var(--text);font-family:'Heebo',sans-serif;font-size:12px;line-height:1.5;}
.opt:hover{border-color:var(--acc);background:var(--ad);}
.ol{width:24px;height:24px;flex-shrink:0;background:var(--ad);border:1px solid rgba(192,132,252,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--acc);}
.opt.ok{border-color:var(--green);background:var(--gd);}.opt.ok .ol{background:var(--green);color:var(--bg);}
.opt.no{border-color:var(--red);background:var(--rd);}.opt.no .ol{background:var(--red);color:#fff;}
.opt.dis{pointer-events:none;opacity:.5;}
.fb{margin-top:10px;padding:10px;border-radius:8px;font-size:11px;line-height:1.7;display:none;}
.fb.show{display:block;animation:up .3s;}.fb.fok{background:var(--gd);border:1px solid rgba(74,222,128,0.2);color:#86efac;}.fb.fno{background:var(--rd);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.foot{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 70%,transparent);padding:14px 16px 10px;z-index:50;}
.foot-in{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.fts{display:flex;gap:14px;}.fs{text-align:center;}.fv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--acc);}.fl{font-size:8px;color:var(--t2);}
.nb{background:linear-gradient(135deg,var(--acc),#7c3aed);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:'Heebo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}.nb:disabled{opacity:.3;cursor:not-allowed;}
.res{display:none;text-align:center;padding:30px 16px;position:relative;z-index:1;}.res.show{display:block;animation:up .5s;}
.re{font-size:50px;margin-bottom:10px;}.rt{font-size:20px;font-weight:900;margin-bottom:6px;}.rsu{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:16px;}
.rg{display:inline-block;font-family:'Space Mono',monospace;font-size:36px;font-weight:700;padding:8px 24px;border-radius:12px;margin-bottom:16px;}
.ga{background:var(--gd);color:var(--green);border:2px solid var(--green);}.gb{background:var(--ad);color:var(--acc);border:2px solid var(--acc);}.gc{background:rgba(251,146,60,0.1);color:var(--gold);border:2px solid var(--gold);}.gf{background:var(--rd);color:var(--red);border:2px solid var(--red);}
.retry{margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 24px;color:var(--acc);font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
</style>
</head>
<body>
<div class="grid"></div>
<header><div class="logo"><div class="icon">🔗</div><div><h1>Lab — פרק 8</h1><div class="sub">שכבת הקו — Data Link Layer</div></div></div><div class="badge"><div class="dot"></div><span id="timer">00:00</span></div></header>
<div class="pbar"><div class="ptr"><div class="pfl" id="pfl" style="width:0%"></div></div><div class="plbl" id="plbl">0 / 8</div></div>
<div class="wrap" id="area"></div><div class="res" id="resScr"></div>
<div class="foot" id="foot"><div class="foot-in"><div class="fts"><div class="fs"><div class="fv" id="sS">0</div><div class="fl">נקודות</div></div><div class="fs"><div class="fv" id="sC">0</div><div class="fl">נכונות</div></div><div class="fs"><div class="fv" id="sK">0</div><div class="fl">רצף🔥</div></div></div><button class="nb" id="nBtn" disabled onclick="nextQ()">הבא ←</button></div></div>
<script>
(function(){
var QS=[
["<strong>כתובת MAC</strong> היא כתובת פיזית בת 48 ביט, צרובה בכרטיס הרשת בייצור. נכתבת כ-6 זוגות הקסדצימליים (AA:BB:CC:DD:EE:FF). שלושת הבתים הראשונים = יצרן (OUI), שלושת האחרונים = מזהה ייחודי. בניגוד ל-IP שמשתנה, MAC בד\"כ קבוע.","מה מזהים 3 הבתים הראשונים בכתובת MAC?",["גרסת פרוטוקול","יצרן כרטיס הרשת (OUI)","מספר פורט","סוג הצפנה"],1,"OUI = Organizationally Unique Identifier. 00:1A:2B=Cisco, DC:A6:32=Raspberry Pi, 3C:22:FB=Apple. אפשר לחפש יצרן לפי OUI.","MAC: AA:BB:CC:DD:EE:FF\n     [OUI---] [Device-]\nFF:FF:FF:FF:FF:FF = Broadcast"],
["<strong>Ethernet Frame</strong> = המעטפה של שכבת הקו. מכיל: Dst MAC, Src MAC, Type (0x0800=IPv4), Payload (46-1500 בתים), ו-<strong>FCS</strong> — סיכום ביקורת CRC32. המקבל מחשב CRC ומשווה — אם שונה, ה-Frame נפגם ונזרק.","מה תפקיד FCS?",["הצפנה","זיהוי שגיאות — בדיקה שהFrame שלם","ניתוב","דחיסה"],1,"FCS = CRC-32 checksum. מזהה פגמים אבל לא מתקן. Frame פגום = נזרק. TCP מעליו ידאג לretransmission.","[Dst MAC][Src MAC][Type][Payload][FCS]\n 6B       6B       2B   46-1500  4B"],
["<strong>ARP</strong> ממפה IP→MAC. כשצריך לשלוח Frame למישהו ברשת המקומית, חייבים MAC שלו. ARP שואל ב-Broadcast (כולם שומעים): \"מי בעל IP הזה?\" — הבעלים עונה ב-Unicast עם ה-MAC. התוצאה נשמרת ב-ARP Cache.","למה ARP שולח Broadcast?",["הוא מוצפן","לא יודע MAC של היעד — חייב לשאול כולם","Broadcast מהיר","זה UDP"],1,"FF:FF:FF:FF:FF:FF = כולם שומעים. רק בעל ה-IP עונה. ARP Spoofing = תוקף עונה עם MAC שלו → Man-in-the-Middle.","ARP Request (Broadcast):\n  Who has 192.168.1.1? Tell AA:AA\nARP Reply (Unicast):\n  192.168.1.1 is at BB:BB"],
["<strong>Switch</strong> לומד אוטומטית: כשFrame נכנס, הוא קורא Source MAC ושומר בטבלה (MAC→Port). בפעם הבאה שולח ישירות לפורט הנכון. Hub ישן שולח לכולם (Flooding). Switch = חכם, Hub = טיפש.","איך Switch לומד MAC→Port?",["הגדרה ידנית","שומר Source MAC + Port מכל Frame שנכנס","שולח ARP","שואל Router"],1,"Frame נכנס Port 3 עם Src=AA:BB → טבלה: AA:BB=Port3. MAC לא בטבלה? Flood לכל הפורטים (פעם אחת).","Frame in Port 1, Src=AA:11\n  Table: AA:11 -> Port 1\nFrame to AA:11? -> Port 1!\nUnknown MAC? -> Flood"],
["<strong>VLAN</strong> מחלק Switch פיזי אחד לרשתות לוגיות נפרדות. פורטים 1-12=VLAN10, פורטים 13-24=VLAN20. Broadcast ב-VLAN10 לא מגיע ל-20. תקשורת בין VLANs דורשת Router.","למה VLAN מגביר אבטחה?",["מצפין","מבודד — מכשירים ב-VLANs שונים לא רואים אחד את השני","חוסם וירוסים","מחליף Firewall"],1,"בידוד = אבטחה. מחשב נדבק? נזק מוגבל ל-VLAN שלו. Inter-VLAN צריך Router שיכול להחיל firewall rules."],
["<strong>Broadcast Domain</strong> = הגבול שעד אליו Broadcast מגיע. Switch רגיל = BD אחד. Router תמיד חוסם Broadcast. VLAN יוצר BD נפרד בתוך Switch.","מי יוצר גבול Broadcast Domain?",["Switch רגיל","Router (ו-VLAN)","Hub","כבל"],1,"Switch ללא VLAN = BD אחד. כל VLAN = BD נפרד. Router = תמיד מפריד. Hub = BD אחד + Collision Domain אחד."],
["<strong>STP</strong> מונע לולאות: שני כבלים בין Switches = Frames מסתובבים אינסופית (Broadcast Storm). STP חוסם נתיבים כפולים, משאיר אחד פעיל. כבל נופל? מפעיל חלופי.","מה קורה בלי STP עם כבלים כפולים?",["רשת מהירה פי 2","לולאה — Broadcast Storm שמציפה את הרשת","הצפנה כפולה","אין בעיה"],1,"Broadcast Storm: Frame בלולאה אינסופית, 100% bandwidth תוך שניות. STP Classic = 30-50s התאוששות, RSTP = 1-2s.","Without STP: LOOP! crash.\nWith STP:\n  cable1 = active\n  cable2 = BLOCKED\n  cable1 fails? cable2 activates"],
["<strong>Half vs Full Duplex:</strong> Half (ווקי-טוקי) = שליחה או קבלה. Full (טלפון) = שניהם במקביל. Hub = Half כי חוט משותף, שניים בו-זמנית = Collision. Switch = Full כי נתיב נפרד לכל פורט.","למה Hub = Half Duplex?",["ישן מדי","שולח לכולם — שניים בו-זמנית = Collision","חשמל","לא Ethernet"],1,"Hub = Shared medium + CSMA/CD (שמע→שלח, התנגשות→חכה→נסה). Switch = נתיב נפרד per port = Full Duplex, אפס Collisions."]
];
var L="\u05D0\u05D1\u05D2\u05D3",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){var a=document.getElementById('area');a.innerHTML='';
for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;
var codeH=q[5]?'<div class="code">'+esc(q[5])+'</div>':'';
var optsH='<div class="opts">';for(var j=0;j<q[2].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[2][j])+'</span></button>';}optsH+='</div>';
card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="theory">'+q[0]+'</div><div class="qt">'+esc(q[1])+'</div>'+codeH+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';
a.appendChild(card);}
a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});}
function handleA(qi,oi){if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[3];var ok=oi===ci;ans[qi]=ok;
var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}
var fb=document.getElementById('fb-'+qi);if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 נכון! +10'+(sk>=3?' (+5 רצף!)':'');}else{sk=0;fb.className='fb show fno';fb.textContent='\u274C לא נכון';}
fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[4]));
document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;
document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;
var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='📊 תוצאות';}
window.nextQ=function(){if(cur>=QS.length-1){showRes();return;}document.getElementById('qc-'+cur).classList.remove('active');cur++;document.getElementById('qc-'+cur).classList.add('active');document.getElementById('nBtn').disabled=true;document.getElementById('qc-'+cur).scrollIntoView({behavior:'smooth',block:'center'});};
function showRes(){document.getElementById('area').style.display='none';document.getElementById('foot').style.display='none';var rs=document.getElementById('resScr');rs.classList.add('show');
var pct=sc/(QS.length*10);var g,gc;if(pct>=.9){g='A+';gc='ga';}else if(pct>=.75){g='B';gc='gb';}else if(pct>=.55){g='C';gc='gc';}else{g='F';gc='gf';}
var m=String(Math.floor(ts/60)).padStart(2,'0');var s=String(ts%60).padStart(2,'0');
rs.innerHTML='<div class="re">'+(pct>=.9?'🏆':pct>=.75?'🎯':pct>=.55?'📚':'💪')+'</div><div class="rt" style="color:'+(pct>=.75?'var(--acc)':'var(--gold)')+'">'+
(pct>=.9?'Data Link Master!':pct>=.75?'מצוין!':pct>=.55?'בדרך הנכונה':'צריך חזרה')+'</div><div class="rsu">'+cc+'/'+QS.length+' | '+sc+' נק\' | '+m+':'+s+' | רצף: '+mx+'</div><div class="rg '+gc+'">'+g+'</div><br><button class="retry" onclick="location.reload()">נסה שוב ↻</button>';}
render();})();
</script>
</body>
</html>
