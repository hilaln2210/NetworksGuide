<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק 6 — שכבת התעבורה</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--bg2:#0c1119;--bg3:#141c28;--border:#1e2d42;--sky:#38bdf8;--sd:rgba(56,189,248,0.1);--blue:#3b82f6;--green:#4ade80;--gd:rgba(74,222,128,0.08);--red:#ef4444;--rd:rgba(239,68,68,0.1);--gold:#fbbf24;--text:#dfe6f0;--t2:#7b8da4;--t3:#3d4f66;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(56,189,248,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.03) 1px,transparent 1px);background-size:40px 40px;}
.glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 25% 20%,rgba(56,189,248,0.06) 0%,transparent 50%),radial-gradient(ellipse at 75% 80%,rgba(59,130,246,0.04) 0%,transparent 50%);}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#080e16,rgba(6,10,16,.97));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}.icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--sky),var(--blue));display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo h1{font-family:'Space Mono',monospace;font-size:14px;color:var(--sky);}.logo .sub{font-size:11px;color:var(--t2);}
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:b 2s infinite;}@keyframes b{0%,100%{opacity:1;}50%{opacity:.3;}}
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:10px;}
.ptr{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}.pfl{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--sky),var(--blue));}
.plbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);}
.wrap{padding:14px;padding-bottom:100px;position:relative;z-index:1;}
.topo{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
.topo-lbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--sky);letter-spacing:1px;margin-bottom:8px;}
.topo-art{background:#040810;border:1px solid var(--border);border-radius:8px;padding:14px 10px;font-family:'Space Mono',monospace;font-size:10px;line-height:1.6;color:var(--t2);direction:ltr;text-align:left;overflow-x:auto;white-space:pre;}
.qc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;display:none;}
.qc.active{display:block;animation:up .3s ease;}@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.qh{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.qtag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--sd);color:var(--sky);}
.qpts{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);}
.qb{padding:14px;}.qt{font-size:14px;font-weight:700;line-height:1.6;margin-bottom:12px;}
.code{background:#040810;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:12px;font-family:'Space Mono',monospace;font-size:10px;line-height:1.7;direction:ltr;text-align:left;color:var(--t2);overflow-x:auto;white-space:pre-wrap;}
.opts{display:flex;flex-direction:column;gap:6px;}
.opt{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;text-align:right;width:100%;color:var(--text);font-family:'Heebo',sans-serif;font-size:12px;line-height:1.5;}
.opt:hover{border-color:var(--sky);background:var(--sd);}
.ol{width:24px;height:24px;flex-shrink:0;background:var(--sd);border:1px solid rgba(56,189,248,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--sky);}
.opt.ok{border-color:var(--green);background:var(--gd);}.opt.ok .ol{background:var(--green);color:var(--bg);border-color:var(--green);}
.opt.no{border-color:var(--red);background:var(--rd);}.opt.no .ol{background:var(--red);color:#fff;border-color:var(--red);}
.opt.dis{pointer-events:none;opacity:.5;}
.fb{margin-top:10px;padding:10px;border-radius:8px;font-size:11px;line-height:1.7;display:none;}
.fb.show{display:block;animation:up .3s;}.fb.fok{background:var(--gd);border:1px solid rgba(74,222,128,0.2);color:#86efac;}.fb.fno{background:var(--rd);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.foot{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 70%,transparent);padding:14px 16px 10px;z-index:50;}
.foot-in{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.fts{display:flex;gap:14px;}.fs{text-align:center;}.fv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--sky);}.fl{font-size:8px;color:var(--t2);}
.nb{background:linear-gradient(135deg,var(--sky),var(--blue));color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:'Heebo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}.nb:disabled{opacity:.3;cursor:not-allowed;}
.res{display:none;text-align:center;padding:30px 16px;position:relative;z-index:1;}.res.show{display:block;animation:up .5s;}
.re{font-size:50px;margin-bottom:10px;}.rt{font-size:20px;font-weight:900;margin-bottom:6px;}.rsu{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:16px;}
.rg{display:inline-block;font-family:'Space Mono',monospace;font-size:36px;font-weight:700;padding:8px 24px;border-radius:12px;margin-bottom:16px;}
.ga{background:var(--gd);color:var(--green);border:2px solid var(--green);}.gb{background:var(--sd);color:var(--sky);border:2px solid var(--sky);}.gc{background:rgba(251,146,60,0.1);color:var(--gold);border:2px solid var(--gold);}.gf{background:var(--rd);color:var(--red);border:2px solid var(--red);}
.retry{margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 24px;color:var(--sky);font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
</style>
</head>
<body>
<div class="grid"></div><div class="glow"></div>
<header>
  <div class="logo"><div class="icon">🚚</div><div><h1>Lab — פרק 6</h1><div class="sub">שכבת התעבורה — Transport Layer</div></div></div>
  <div class="badge"><div class="dot"></div><span id="timer">00:00</span></div>
</header>
<div class="pbar"><div class="ptr"><div class="pfl" id="pfl" style="width:0%"></div></div><div class="plbl" id="plbl">0 / 8</div></div>
<div class="wrap" id="area"></div>
<div class="res" id="resScr"></div>
<div class="foot" id="foot"><div class="foot-in"><div class="fts"><div class="fs"><div class="fv" id="sS">0</div><div class="fl">נקודות</div></div><div class="fs"><div class="fv" id="sC">0</div><div class="fl">נכונות</div></div><div class="fs"><div class="fv" id="sK">0</div><div class="fl">רצף🔥</div></div></div><button class="nb" id="nBtn" disabled onclick="nextQ()">הבא ←</button></div></div>

<script>
(function(){
var QS=[
["מה ההבדל המרכזי בין TCP ל-UDP?",["TCP מהיר יותר מ-UDP","TCP מחייב חיבור ומבטיח אמינות; UDP שולח בלי חיבור ובלי אחריות","UDP מוצפן, TCP לא","TCP רק ל-IPv4, UDP גם ל-IPv6"],1,"TCP = Connection-oriented, reliable, ordered. UDP = Connectionless, fast, no guarantees. TCP ל-HTTP/SSH/FTP. UDP ל-DNS/VoIP/Gaming/Streaming.","TCP vs UDP Comparison:\n\n         TCP                    UDP\n  ┌──────────────┐       ┌──────────────┐\n  │ Connection   │       │ Connectionless│\n  │ 3-Way Shake  │       │ Just send!   │\n  │ Reliable     │       │ Unreliable   │\n  │ Ordered      │       │ Unordered    │\n  │ Flow Control │       │ No control   │\n  │ Slower       │       │ Faster       │\n  │              │       │              │\n  │ HTTP, SSH    │       │ DNS, VoIP    │\n  │ FTP, SMTP    │       │ Gaming       │\n  │ Database     │       │ Streaming    │\n  └──────────────┘       └──────────────┘\n  Header: 20 bytes        Header: 8 bytes"],
["מהו 3-Way Handshake ומה הסדר שלו?",["ACK → SYN → SYN-ACK","SYN → SYN-ACK → ACK","FIN → FIN-ACK → ACK","HELLO → OK → START"],1,"3-Way Handshake: 1) Client שולח SYN (seq=x), 2) Server עונה SYN-ACK (seq=y, ack=x+1), 3) Client שולח ACK (ack=y+1). עכשיו החיבור פתוח.","TCP 3-Way Handshake:\n\n  Client                          Server\n    |                               |\n    |------ SYN (seq=100) --------->|  1. \"I want to connect\"\n    |                               |\n    |<-- SYN-ACK (seq=300,ack=101) -|  2. \"OK, me too\"\n    |                               |\n    |------ ACK (ack=301) --------->|  3. \"Great, let's go\"\n    |                               |\n    |====== DATA TRANSFER =========>|  Connection established!\n    |                               |\n\n  SYN = Synchronize (establish)\n  ACK = Acknowledge (confirm)\n  seq = Sequence number\n  ack = Acknowledgment number = seq + 1"],
["איך TCP סוגר חיבור (Connection Termination)?",["פשוט מפסיקים לשלוח","4-Way Handshake: FIN → ACK → FIN → ACK","RST בלבד","timeout אוטומטי"],1,"TCP 4-Way Teardown: 1) צד A שולח FIN, 2) צד B שולח ACK, 3) צד B שולח FIN, 4) צד A שולח ACK. שני הצדדים מאשרים סגירה. RST = סגירה כוחנית.","TCP 4-Way Teardown (graceful close):\n\n  Client                          Server\n    |                               |\n    |------- FIN (seq=500) -------->|  1. \"I'm done sending\"\n    |                               |\n    |<------ ACK (ack=501) ---------|  2. \"OK, got it\"\n    |                               |\n    |<------ FIN (seq=700) ---------|  3. \"I'm done too\"\n    |                               |\n    |------- ACK (ack=701) -------->|  4. \"OK, goodbye\"\n    |                               |\n    |      CONNECTION CLOSED        |\n\n  RST = Reset (abrupt/forced close)\n  Used when: error, port closed, firewall"],
["מה Sequence Number ו-Acknowledgment Number?",["מספרי פורט","Seq = מספר סידורי לכל byte שנשלח; Ack = הbyte הבא שמצפים לקבל","Seq = גודל packet; Ack = TTL","Seq = מספר חיבור; Ack = מספר session"],1,"Seq number עוקב אחרי כל byte. אם Seq=100 ושלחנו 50 bytes, ה-Seq הבא=150. Ack=151 אומר: קיבלתי הכל עד 150, תן לי 151.","Sequence & Acknowledgment Numbers:\n\n  Client                          Server\n    |                               |\n    |-- Seq=100, 50 bytes --------->|  \"Here's bytes 100-149\"\n    |<-- Ack=150 -------------------|  \"Got it, send 150 next\"\n    |                               |\n    |-- Seq=150, 100 bytes -------->|  \"Here's bytes 150-249\"\n    |<-- Ack=250 -------------------|  \"Got it, send 250 next\"\n    |                               |\n    |-- Seq=250, 30 bytes --------->|  \"Here's bytes 250-279\"\n    |<-- Ack=280 -------------------|  \"Got it, send 280 next\"\n\n  Rule: ACK = last_byte_received + 1\n  This ensures ORDERING and COMPLETENESS"],
["מה קורה כשpacket אובד ב-TCP?",["החיבור נסגר","המקבל שולח duplicate ACKs, אחרי 3 השולח עושה Fast Retransmit","עוברים ל-UDP","מתעלמים ומשלימים אחר כך"],1,"TCP Retransmission: אם packet אובד, המקבל ממשיך לשלוח את אותו ACK (duplicate). אחרי 3 duplicate ACKs, השולח מזהה אובדן ושולח מחדש מיד (Fast Retransmit).","Packet Loss & Retransmission:\n\n  Client                          Server\n    |-- Seq=100, Data A ----------->|  OK\n    |-- Seq=200, Data B ----X       |  LOST!\n    |-- Seq=300, Data C ----------->|  Got C but missing B!\n    |<-- Ack=200 -------------------|  \"I still need 200\"\n    |-- Seq=400, Data D ----------->|  \n    |<-- Ack=200 -------------------|  Dup ACK #2\n    |-- Seq=500, Data E ----------->|\n    |<-- Ack=200 -------------------|  Dup ACK #3\n    |                               |\n    |== FAST RETRANSMIT! ===========|\n    |-- Seq=200, Data B (resend) -->|  Retransmit!\n    |<-- Ack=600 -------------------|  \"Got everything now!\""],
["מהו TCP Window Size ומה קורה כשהוא מתכווץ?",["גודל ה-packet","מספר ה-bytes שהמקבל מוכן לקבל — כשמתכווץ השולח מאיט (Flow Control)","מספר חיבורים מקסימלי","timeout בשניות"],1,"Window Size = כמה bytes המקבל מוכן לקבל בלי ACK. Flow Control: כשהמקבל עמוס, הוא מקטין Window. Window=0 = השולח עוצר לגמרי (Zero Window).","TCP Flow Control (Window):\n\n  Sender                          Receiver\n    |-- 1000B, Seq=0 -------------->|  Buffer: [####____] 50% full\n    |<-- Ack=1000, Win=4000 --------|  \"I can take 4KB more\"\n    |                               |\n    |-- 1000B ---------------------->|  Buffer: [######__] 75% full\n    |<-- Ack=2000, Win=2000 --------|  \"Slowing down, 2KB only\"\n    |                               |\n    |-- 1000B ---------------------->|  Buffer: [########] full!\n    |<-- Ack=3000, Win=0 -----------|  \"STOP! Buffer full!\"\n    |                               |\n    |     [Sender PAUSES]           |  Waiting...\n    |                               |  (Receiver processes data)\n    |<-- Ack=3000, Win=4000 --------|  \"OK, buffer cleared!\"\n    |     [Sender RESUMES]          |"],
["מהו Congestion Control ב-TCP?",["בקרת סיסמאות","מנגנון שמאט שליחה כשהרשת עמוסה — Slow Start, Congestion Avoidance","הצפנת נתונים","ניתוב חכם"],1,"Congestion Control: TCP מתחיל איטי (Slow Start), מכפיל window עד threshold, ואז גדל לינארית (Congestion Avoidance). אם יש loss — חוזר לאיטי. מונע הצפת הרשת.","TCP Congestion Control:\n\n  Window\n  Size\n    |          * Threshold\n    |         /|\n    |        / |   Congestion\n    |       /  |   Avoidance\n    |      /   |   (linear)\n    |     /    |\n    |    /     |     * Loss!\n    |   / Slow |    /|\n    |  /  Start|   / | Back to\n    | /  (exp) |  /  | Slow Start\n    |/         | /   |\n    +----------+-----+---------> Time\n\n  Phases:\n  1. Slow Start: window doubles each RTT\n  2. Threshold: switch to linear growth\n  3. Congestion Avoidance: +1 per RTT\n  4. Loss detected: reset window, restart\n\n  Algorithms: Reno, Cubic, BBR"],
["מהו Port Multiplexing?",["חיבור כבלים רבים","היכולת לנהל חיבורים רבים במקביל דרך פורטים שונים על אותו IP","הצפנה מרובה","סוג VLAN"],1,"Port Multiplexing: מחשב אחד, IP אחד, אבל פורטים שונים = שירותים שונים במקביל. כל חיבור מזוהה ע\"י 4-tuple: (src IP, src port, dst IP, dst port).","Port Multiplexing:\n\n  Your Computer (192.168.1.10)\n  ┌─────────────────────────────────┐\n  │ Chrome tab 1:  :54321 --> google.com:443    │\n  │ Chrome tab 2:  :54322 --> github.com:443    │\n  │ SSH terminal:  :54323 --> server.com:22     │\n  │ Email client:  :54324 --> mail.com:993      │\n  │ Spotify:       :54325 --> spotify.com:443   │\n  └─────────────────────────────────┘\n\n  Each connection = unique 4-tuple:\n    (src_ip, src_port, dst_ip, dst_port)\n\n  Same destination IP+port, different src ports:\n    (192.168.1.10, 54321, 142.250.0.1, 443)\n    (192.168.1.10, 54322, 142.250.0.1, 443)\n    = Two DIFFERENT connections!"]
];
var L="\u05D0\u05D1\u05D2\u05D3";var cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){
  var a=document.getElementById('area');a.innerHTML='';
  var topo=document.createElement('div');topo.className='topo';
  topo.innerHTML='<div class="topo-lbl">TRANSPORT LAYER — TCP vs UDP</div><div class="topo-art">'+esc(
"  ┌─────────────────────────────────────────────┐\n"+
"  │            TRANSPORT LAYER (L4)             │\n"+
"  │                                             │\n"+
"  │   TCP (Transmission Control Protocol)       │\n"+
"  │   ┌───┬───┬───┬───┬───┬───┬───────┐        │\n"+
"  │   │src│dst│seq│ack│flg│win│payload │  20B+  │\n"+
"  │   └───┴───┴───┴───┴───┴───┴───────┘        │\n"+
"  │   Connection: SYN > SYN-ACK > ACK           │\n"+
"  │   Close:      FIN > ACK > FIN > ACK         │\n"+
"  │   Features:   Reliable, Ordered, Flow Ctrl  │\n"+
"  │                                             │\n"+
"  │   UDP (User Datagram Protocol)              │\n"+
"  │   ┌───┬───┬───┬───────┐                     │\n"+
"  │   │src│dst│len│payload │  8 bytes only!      │\n"+
"  │   └───┴───┴───┴───────┘                     │\n"+
"  │   No connection, no guarantees, just fast!  │\n"+
"  ├─────────────────────────────────────────────┤\n"+
"  │  App data --> [Segment] --> IP --> Frame     │\n"+
"  └─────────────────────────────────────────────┘"
  )+'</div>';
  a.appendChild(topo);
  for(var i=0;i<QS.length;i++){
    var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;
    var codeH=q[4]?'<div class="code">'+esc(q[4])+'</div>':'';
    var optsH='<div class="opts">';
    for(var j=0;j<q[1].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[1][j])+'</span></button>';}
    optsH+='</div>';
    card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="qt">'+esc(q[0])+'</div>'+codeH+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';
    a.appendChild(card);
  }
  a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});
}
function handleA(qi,oi){
  if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[2];var ok=oi===ci;ans[qi]=ok;
  var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');
  for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}
  var fb=document.getElementById('fb-'+qi);
  if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 נכון! +10'+(sk>=3?' (+5 בונוס רצף!)':'');}
  else{sk=0;fb.className='fb show fno';fb.textContent='\u274C לא נכון';}
  fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[3]));
  document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;
  document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;
  var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='📊 תוצאות';
}
window.nextQ=function(){
  if(cur>=QS.length-1){showRes();return;}
  document.getElementById('qc-'+cur).classList.remove('active');cur++;document.getElementById('qc-'+cur).classList.add('active');
  document.getElementById('nBtn').disabled=true;document.getElementById('qc-'+cur).scrollIntoView({behavior:'smooth',block:'center'});
};
function showRes(){
  document.getElementById('area').style.display='none';document.getElementById('foot').style.display='none';
  var rs=document.getElementById('resScr');rs.classList.add('show');
  var pct=sc/(QS.length*10);var g,gc;if(pct>=.9){g='A+';gc='ga';}else if(pct>=.75){g='B';gc='gb';}else if(pct>=.55){g='C';gc='gc';}else{g='F';gc='gf';}
  var m=String(Math.floor(ts/60)).padStart(2,'0');var s=String(ts%60).padStart(2,'0');
