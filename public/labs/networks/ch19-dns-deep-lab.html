<style>
:root{--bg:#060a10;--bg2:#0c1119;--bg3:#141c28;--border:#1e2d42;--acc:#38bdf8;--ad:rgba(56,189,248,0.1);--green:#4ade80;--gd:rgba(74,222,128,0.08);--red:#ef4444;--rd:rgba(239,68,68,0.1);--gold:#fbbf24;--text:#dfe6f0;--t2:#7b8da4;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(56,189,248,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.03) 1px,transparent 1px);background-size:40px 40px;}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#080e16,rgba(6,10,16,.97));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}.icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--acc),#0284c7);display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo h1{font-family:'Space Mono',monospace;font-size:14px;color:var(--acc);}.logo .sub{font-size:11px;color:var(--t2);}
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:b 2s infinite;}@keyframes b{0%,100%{opacity:1;}50%{opacity:.3;}}
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:10px;}.ptr{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}.pfl{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--acc),#0284c7);}.plbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);}

.qc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;display:none;}.qc.active{display:block;animation:up .3s ease;}@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.qh{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}.qtag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--ad);color:var(--acc);}.qpts{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);}

.code{background:#040810;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:12px;font-family:'Space Mono',monospace;font-size:10px;line-height:1.7;direction:ltr;text-align:left;color:var(--t2);overflow-x:auto;white-space:pre-wrap;}
.opts{display:flex;flex-direction:column;gap:6px;}.opt{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;text-align:right;width:100%;color:var(--text);font-family:'Heebo',sans-serif;font-size:12px;line-height:1.5;}.opt:hover{border-color:var(--acc);background:var(--ad);}

.opt.ok{border-color:var(--green);background:var(--gd);}.opt.ok .ol{background:var(--green);color:var(--bg);}.opt.no{border-color:var(--red);background:var(--rd);}.opt.no .ol{background:var(--red);color:#fff;}.opt.dis{pointer-events:none;opacity:.5;}
.fb{margin-top:10px;padding:10px;border-radius:8px;font-size:11px;line-height:1.7;display:none;}.fb.show{display:block;animation:up .3s;}.fb.fok{background:var(--gd);border:1px solid rgba(74,222,128,0.2);color:#86efac;}.fb.fno{background:var(--rd);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.foot{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 70%,transparent);padding:14px 16px 10px;z-index:50;}.foot-in{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}.fts{display:flex;gap:14px;}.fs{text-align:center;}.fv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--acc);}.fl{font-size:8px;color:var(--t2);}
.nb{background:linear-gradient(135deg,var(--acc),#0284c7);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:'Heebo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}.nb:disabled{opacity:.3;cursor:not-allowed;}
.res{display:none;text-align:center;padding:30px 16px;position:relative;z-index:1;}.res.show{display:block;animation:up .5s;}.re{font-size:50px;margin-bottom:10px;}.rt{font-size:20px;font-weight:900;margin-bottom:6px;}.rsu{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:16px;}
.rg{display:inline-block;font-family:'Space Mono',monospace;font-size:36px;font-weight:700;padding:8px 24px;border-radius:12px;margin-bottom:16px;}.ga{background:var(--gd);color:var(--green);border:2px solid var(--green);}.gb{background:var(--ad);color:var(--acc);border:2px solid var(--acc);}.gc{background:rgba(251,146,60,0.1);color:var(--gold);border:2px solid var(--gold);}.gf{background:var(--rd);color:var(--red);border:2px solid var(--red);}
.retry{margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 24px;color:var(--acc);font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}

<header><div class="logo"><div class="icon">🔎</div><div><h1>Lab — פרק 19</h1><div class="sub">DNS בעומק — הספר הטלפוני של האינטרנט</div></div></div><div class="badge"><div class="dot"></div><span id="timer">00:00</span></div></header>

<div class="wrap" id="area"></div><div class="res" id="resScr"></div>
<div class="foot" id="foot"><div class="foot-in"><div class="fts"><div class="fs"><div class="fv" id="sS">0</div><div class="fl">נקודות</div></div><div class="fs"><div class="fv" id="sC">0</div><div class="fl">נכונות</div></div><div class="fs"><div class="fv" id="sK">0</div><div class="fl">רצף🔥</div></div></div><button class="nb" id="nBtn" disabled onclick="nextQ()">הבא ←</button></div></div>
<script>
(function(){
var QS=[
["שאילתת DNS עוברת <strong>היררכיה</strong>: קודם הדפדפן בודק cache מקומי, אחר כך OS cache, אחר כך Router cache, ואז פונה ל-<strong>Recursive Resolver</strong> (בד\"כ של ה-ISP או 8.8.8.8). ה-Resolver פונה ל-<strong>Root Server</strong> (\"מי אחראי על .com?\"), אחר כך ל-<strong>TLD Server</strong> (\"מי אחראי על google.com?\"), ולבסוף ל-<strong>Authoritative Server</strong> שנותן את ה-IP.",
"מה הסדר הנכון של DNS resolution?",
["Authoritative → Root → TLD → Cache","Cache → Recursive Resolver → Root → TLD → Authoritative","Root → Cache → Resolver → TLD","Authoritative → Cache → Root"],1,
"Cache (browser→OS→router) → Recursive Resolver → Root (.→.com) → TLD (.com→google.com) → Authoritative (google.com→142.250.x.x). כל תשובה נשמרת ב-cache לפי TTL.",
"DNS Resolution Chain:\n\n  Browser cache -> OS cache -> Router cache\n     |\n     v (cache miss)\n  Recursive Resolver (8.8.8.8)\n     |\n     v \"Where is google.com?\"\n  Root Server (.) -> \"Ask .com TLD\"\n     |\n     v\n  TLD Server (.com) -> \"Ask ns1.google.com\"\n     |\n     v\n  Authoritative (ns1.google.com)\n     -> \"google.com = 142.250.190.14\"\n\n  Result cached at every level (TTL=300s)"],

["<strong>DNS Caching ו-TTL</strong>: כל תשובת DNS מגיעה עם TTL (Time to Live) שאומר כמה שניות לשמור את התשובה ב-cache. TTL גבוה (86400 = יום) = פחות שאילתות, אבל שינויים לוקחים זמן. TTL נמוך (60 = דקה) = שינויים מהירים, אבל יותר עומס על DNS servers. בfailover, TTL נמוך קריטי.",
"למה TTL נמוך חשוב ל-failover?",
["כי הוא מהיר","אם שרת נפל, TTL נמוך מבטיח שלקוחות יקבלו את ה-IP החדש תוך דקות ולא שעות","כי הוא מאובטח","כי הוא חוסך bandwidth"],1,
"TTL=3600 (שעה): שרת נפל → כולם עדיין מנסים IP ישן לשעה! TTL=60 (דקה): תוך דקה כולם מקבלים IP חדש. לפני failover מתוכנן: להוריד TTL מראש (למשל מ-3600 ל-60), לחכות שה-TTL הישן יפוג, ואז לבצע."],

["<strong>DNS Poisoning (Cache Poisoning)</strong> הוא התקפה שבה תוקף מזריק רשומות DNS מזויפות ל-cache של resolver. אם מצליח, כל מי שפונה לresolver מקבל IP מזויף — למשל של אתר phishing שנראה בדיוק כמו הבנק. ההגנה: <strong>DNSSEC</strong> שמוסיף חתימות דיגיטליות לרשומות DNS.",
"מה DNSSEC מוסיף לDNS?",
["הצפנה של השאילתות","חתימות דיגיטליות שמאמתות שהתשובה מקורית ולא זויפה","מהירות","דחיסה"],1,
"DNSSEC חותם רשומות עם מפתח פרטי. ה-Resolver מאמת עם המפתח הציבורי. אם התשובה שונתה — החתימה לא מתאימה → נדחית. חשוב: DNSSEC מוסיף authentication, לא encryption! התוכן עדיין גלוי. DoH/DoT מוסיפים הצפנה."],

["<strong>DoH (DNS over HTTPS)</strong> ו-<strong>DoT (DNS over TLS)</strong> מצפינים את שאילתות ה-DNS. ב-DNS רגיל, ה-ISP (או כל מי שמאזין) רואה בדיוק לאיזה אתר ניגשתם — כי שאילתת DNS היא טקסט גלוי ב-UDP 53. DoH עוטף DNS בHTTPS (פורט 443), DoT בTLS (פורט 853). שניהם מסתירים את השאילתות.",
"מה היתרון של DoH על DNS רגיל?",
["מהיר יותר","מצפין שאילתות — ה-ISP ותוקפים לא רואים לאיזה אתר ניגשתם","לא צריך שרת","תומך ביותר record types"],1,
"DNS רגיל: UDP 53, טקסט גלוי, כל מי שעל הרשת רואה. DoH: HTTPS 443, מוצפן, נראה כמו תעבורת web רגילה (קשה לחסום). DoT: TLS 853, מוצפן אבל פורט ייעודי (קל לחסום). Firefox ו-Chrome תומכים ב-DoH.",
"Regular DNS:              DoH:\n  UDP port 53              HTTPS port 443\n  Plaintext!               Encrypted!\n  ISP sees: \"google.com\"   ISP sees: encrypted blob\n\nDoT:\n  TLS port 853\n  Encrypted!\n  But: easy to block port 853\n\nDoH advantage: looks like normal HTTPS\n  -> hard to block without blocking all HTTPS\n\nProviders:\n  Cloudflare: 1.1.1.1 (DoH/DoT)\n  Google: 8.8.8.8 (DoH/DoT)\n  Quad9: 9.9.9.9 (DoH/DoT + malware blocking)"],

["<strong>DNS Zones ו-Zone Transfer</strong>: כל דומיין מנוהל ב-Zone — קובץ שמכיל את כל הרשומות (A, MX, CNAME, NS...). Primary DNS server מחזיק את ה-zone file המקורי. Secondary server מקבל עותק דרך <strong>Zone Transfer (AXFR)</strong>. אם AXFR פתוח לכולם — תוקף יכול להוריד את כל רשומות הDNS שלך.",
"למה AXFR (Zone Transfer) פתוח הוא סיכון אבטחתי?",
["כי הוא איטי","תוקף יכול להוריד את כל רשומות ה-DNS — חושף שרתים פנימיים, subdomains, ומבנה הרשת","כי הוא מצפין","כי הוא מוחק רשומות"],1,
"AXFR חושף: subdomains נסתרים (dev.company.com, staging.company.com), שרתים פנימיים, כתובות IP, מבנה הארגון. שלב ראשון של reconnaissance בpenetration testing. הפתרון: הגביל AXFR רק ל-Secondary DNS servers (by IP)."],

["<strong>Recursive vs Iterative</strong> DNS query: ב-Recursive, הלקוח שולח שאילתה ל-Resolver והוא עושה את כל העבודה — פונה ל-Root, TLD, Authoritative — ומחזיר תשובה סופית. ב-Iterative, השרת מחזיר \"תשאל מישהו אחר\" והלקוח שואל בעצמו. בפרקטיקה: הלקוח עושה Recursive ל-Resolver, וה-Resolver עושה Iterative לשרשרת.",
"מה ההבדל בין Recursive ל-Iterative query?",
["אין הבדל","Recursive: ה-Resolver עושה את כל העבודה ומחזיר תשובה; Iterative: מחזיר referral והשואל ממשיך בעצמו","Recursive לTCP, Iterative לUDP","Recursive מהיר, Iterative מאובטח"],1,
"Client → Resolver: \"מה ה-IP של google.com?\" (Recursive — תן לי תשובה!). Resolver → Root: \"מי אחראי על .com?\" (Iterative — קיבל referral). Resolver → TLD: \"מי אחראי על google.com?\" (Iterative). Resolver → Authoritative: \"מה ה-IP?\" → תשובה → מחזיר ל-Client."],

["<strong>DNS Load Balancing</strong> (Round-Robin DNS) הוא שיטה פשוטה לפזר עומס: דומיין אחד מצביע על מספר כתובות IP. כל שאילתה מחזירה את הכתובות בסדר אחר. לא מושלם (לא בודק אם שרת חי, לא באמת אקראי בגלל caching), אבל פשוט ועובד כ-first layer.",
"מה החיסרון העיקרי של Round-Robin DNS?",
["לא עובד עם HTTPS","לא בודק אם השרת חי — ימשיך לשלוח לשרת שנפל עד שה-TTL יפוג","יקר מדי","לא תומך IPv6"],1,
"Round-Robin DNS לא health-aware. שרת נפל? DNS עדיין מפנה אליו. פתרון: שילוב עם Load Balancer אמיתי (AWS ALB, Cloudflare) שבודק health ומוריד שרתים מהpool. GeoDNS = מפנה לשרת הקרוב גיאוגרפית.",
"Round-Robin DNS:\n\n  $ dig example.com\n  example.com  A  1.2.3.4    (Server A)\n  example.com  A  5.6.7.8    (Server B)\n  example.com  A  9.10.11.12 (Server C)\n\n  Query 1: returns A, B, C\n  Query 2: returns B, C, A\n  Query 3: returns C, A, B\n\n  Problem: Server B goes down\n  DNS still returns B's IP!\n  Clients get errors until TTL expires.\n\n  Better: Use with health-checking LB\n  or GeoDNS (route by location)"],

["<strong>Reverse DNS (PTR Record)</strong> הוא ההפך מ-DNS רגיל: במקום שם → IP, הוא ממפה IP → שם. PTR Records חיים ב-zone מיוחד שנקרא in-addr.arpa. למשל: 1.1.168.192.in-addr.arpa → router.home. שימושים: אימות מיילים (SPF/DKIM בודקים reverse DNS), לוגים, ואבטחה.",
"למה שרתי מייל בודקים Reverse DNS?",
["כי זה מהיר","כדי לוודא שה-IP ששלח את המייל שייך באמת לדומיין — ללא PTR, מייל נחשב ספאם","כי PTR מצפין","כי DNS דורש את זה"],1,
"שרת מייל מקבל מייל מ-IP 1.2.3.4 שטוען שהוא mail.company.com. Reverse DNS: 4.3.2.1.in-addr.arpa → mail.company.com? אם כן = לגיטימי. אם לא (או אין PTR) = חשוד → ספאם. רוב ה-MTA (Postfix, Exchange) בודקים PTR."]
];
var L="\u05D0\u05D1\u05D2\u05D3",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){var a=document.getElementById('area');a.innerHTML='';for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;var codeH=q[5]?'<div class="code">'+esc(q[5])+'</div>':'';var optsH='<div class="opts">';for(var j=0;j<q[2].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[2][j])+'</span></button>';}optsH+='</div>';card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="theory">'+q[0]+'</div><div class="qt">'+esc(q[1])+'</div>'+codeH+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';a.appendChild(card);}a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});}
function handleA(qi,oi){if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[3];var ok=oi===ci;ans[qi]=ok;var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}var fb=document.getElementById('fb-'+qi);if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 נכון! +10'+(sk>=3?' (+5 רצף!)':'');}else{sk=0;fb.className='fb show fno';fb.textContent='\u274C לא נכון';}fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[4]));document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='📊 תוצאות';}
