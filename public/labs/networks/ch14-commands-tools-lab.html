<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק 14 — פקודות וכלים</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--bg2:#0c1119;--bg3:#141c28;--border:#1e2d42;--acc:#f97316;--ad:rgba(249,115,22,0.1);--green:#4ade80;--gd:rgba(74,222,128,0.08);--red:#ef4444;--rd:rgba(239,68,68,0.1);--gold:#fbbf24;--text:#dfe6f0;--t2:#7b8da4;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(249,115,22,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,0.03) 1px,transparent 1px);background-size:40px 40px;}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#080e16,rgba(6,10,16,.97));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}.icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--acc),#c2410c);display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo h1{font-family:'Space Mono',monospace;font-size:14px;color:var(--acc);}.logo .sub{font-size:11px;color:var(--t2);}
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:b 2s infinite;}@keyframes b{0%,100%{opacity:1;}50%{opacity:.3;}}
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:10px;}.ptr{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}.pfl{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--acc),#c2410c);}.plbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);}
.wrap{padding:14px;padding-bottom:100px;position:relative;z-index:1;}
.qc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;display:none;}.qc.active{display:block;animation:up .3s ease;}@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.qh{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}.qtag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--ad);color:var(--acc);}.qpts{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);}
.qb{padding:14px;}.theory{font-size:13px;color:var(--t2);line-height:1.9;margin-bottom:14px;padding:12px 14px;background:var(--bg3);border-radius:10px;border-right:3px solid var(--acc);}.theory strong{color:var(--text);}
.qt{font-size:14px;font-weight:700;line-height:1.6;margin-bottom:12px;color:var(--acc);}
.code{background:#040810;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:12px;font-family:'Space Mono',monospace;font-size:10px;line-height:1.7;direction:ltr;text-align:left;color:var(--t2);overflow-x:auto;white-space:pre-wrap;}
.opts{display:flex;flex-direction:column;gap:6px;}.opt{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;text-align:right;width:100%;color:var(--text);font-family:'Heebo',sans-serif;font-size:12px;line-height:1.5;}.opt:hover{border-color:var(--acc);background:var(--ad);}
.ol{width:24px;height:24px;flex-shrink:0;background:var(--ad);border:1px solid rgba(249,115,22,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--acc);}
.opt.ok{border-color:var(--green);background:var(--gd);}.opt.ok .ol{background:var(--green);color:var(--bg);}.opt.no{border-color:var(--red);background:var(--rd);}.opt.no .ol{background:var(--red);color:#fff;}.opt.dis{pointer-events:none;opacity:.5;}
.fb{margin-top:10px;padding:10px;border-radius:8px;font-size:11px;line-height:1.7;display:none;}.fb.show{display:block;animation:up .3s;}.fb.fok{background:var(--gd);border:1px solid rgba(74,222,128,0.2);color:#86efac;}.fb.fno{background:var(--rd);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.foot{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 70%,transparent);padding:14px 16px 10px;z-index:50;}.foot-in{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}.fts{display:flex;gap:14px;}.fs{text-align:center;}.fv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--acc);}.fl{font-size:8px;color:var(--t2);}
.nb{background:linear-gradient(135deg,var(--acc),#c2410c);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:'Heebo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}.nb:disabled{opacity:.3;cursor:not-allowed;}
.res{display:none;text-align:center;padding:30px 16px;position:relative;z-index:1;}.res.show{display:block;animation:up .5s;}.re{font-size:50px;margin-bottom:10px;}.rt{font-size:20px;font-weight:900;margin-bottom:6px;}.rsu{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:16px;}
.rg{display:inline-block;font-family:'Space Mono',monospace;font-size:36px;font-weight:700;padding:8px 24px;border-radius:12px;margin-bottom:16px;}.ga{background:var(--gd);color:var(--green);border:2px solid var(--green);}.gb{background:var(--ad);color:var(--acc);border:2px solid var(--acc);}.gc{background:rgba(251,146,60,0.1);color:var(--gold);border:2px solid var(--gold);}.gf{background:var(--rd);color:var(--red);border:2px solid var(--red);}
.retry{margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 24px;color:var(--acc);font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
</style></head><body><div class="grid"></div>
<header><div class="logo"><div class="icon">🛠️</div><div><h1>Lab — פרק 14</h1><div class="sub">פקודות וכלים — Commands & Tools</div></div></div><div class="badge"><div class="dot"></div><span id="timer">00:00</span></div></header>
<div class="pbar"><div class="ptr"><div class="pfl" id="pfl" style="width:0%"></div></div><div class="plbl" id="plbl">0 / 8</div></div>
<div class="wrap" id="area"></div><div class="res" id="resScr"></div>
<div class="foot" id="foot"><div class="foot-in"><div class="fts"><div class="fs"><div class="fv" id="sS">0</div><div class="fl">נקודות</div></div><div class="fs"><div class="fv" id="sC">0</div><div class="fl">נכונות</div></div><div class="fs"><div class="fv" id="sK">0</div><div class="fl">רצף🔥</div></div></div><button class="nb" id="nBtn" disabled onclick="nextQ()">הבא ←</button></div></div>
<script>
(function(){
var QS=[
["<strong>ping</strong> הוא הכלי הבסיסי ביותר לבדיקת קישוריות. הוא שולח ICMP Echo Request ומחכה ל-Echo Reply. אם מקבלים תשובה — המכונה חיה ונגישה. ping גם מראה את ה-Latency (round-trip time) ואם יש packet loss. זו הפקודה הראשונה שמריצים כשמשהו לא עובד ברשת.",
"ping מראה RTT של 150ms. מה זה אומר?",
["המכונה כבויה","החבילה לקחה 150 אלפיות שנייה ללכת ולחזור — Latency סביר אבל לא מצוין","המכונה מהירה מאוד","יש 150 hops בדרך"],1,
"RTT (Round Trip Time) = הזמן ללכת + לחזור. פחות מ-20ms = מצוין. 20-100ms = טוב. 100-200ms = סביר. מעל 200ms = בעייתי ל-real-time. ping גם מראה TTL שעוזר לזהות את ה-OS של היעד (64=Linux, 128=Windows).",
"$ ping google.com\nPING google.com (142.250.190.14)\n64 bytes: ttl=117 time=12.3 ms\n64 bytes: ttl=117 time=11.8 ms\n64 bytes: ttl=117 time=12.1 ms\n\n--- statistics ---\n3 packets sent, 3 received, 0% loss\nrtt min/avg/max = 11.8/12.1/12.3 ms"],

["<strong>traceroute</strong> (או tracert ב-Windows) מראה את כל ה-Routers (hops) בדרך ליעד. הוא שולח packets עם TTL עולה: TTL=1 (Router ראשון), TTL=2 (שני), וכן הלאה. כל Router שמקבל packet עם TTL=0 מחזיר ICMP Time Exceeded וחושף את ה-IP שלו. ככה מקבלים מפה מלאה של הנתיב.",
"רואים * * * ב-traceroute בhop מסוים. מה זה אומר?",
["היעד לא קיים","ה-Router בhop הזה חוסם ICMP או לא מגיב בזמן — לא בהכרח בעיה","הרשת קרסה","יש וירוס"],1,
"* * * = timeout (אין תשובה). סיבות: Router מוגדר לא לענות ל-ICMP, Firewall חוסם, או rate limiting. אם ה-hops אחריו עובדים — אין בעיה. אם הכל * מנקודה מסוימת — כנראה חסימה.",
"$ traceroute google.com\n 1  192.168.1.1    1.2 ms\n 2  10.0.0.1      5.4 ms\n 3  * * *                  <-- no response\n 4  72.14.239.1   12.1 ms\n 5  142.250.190.14 18.3 ms\n\nhop 3 didn't respond (firewall/config)\nbut hop 4-5 work fine = no problem!"],

["<strong>nslookup / dig</strong> הם כלים לשאילתות DNS. nslookup פשוט יותר (עובד בכל OS), dig מפורט יותר (Linux/Mac). שניהם מאפשרים לבדוק: לאיזו IP מפנה דומיין, מי שרת ה-DNS, מה ה-TTL של הרשומה, ואיזה סוגי רשומות קיימים (A, MX, CNAME, TXT).",
"מה הפקודה לבדוק את שרת המייל (MX record) של דומיין?",
["ping mail.domain.com","dig domain.com MX (או nslookup -type=MX domain.com)","traceroute mail.domain.com","curl domain.com"],1,
"dig domain.com MX מחזיר רשומות MX עם priority — שרת עם מספר נמוך יותר מקבל עדיפות. nslookup -type=MX domain.com עושה אותו דבר בWindows. dig +short לתשובה מקוצרת.",
"$ dig google.com MX\ngoogle.com  MX  10 smtp.google.com.\ngoogle.com  MX  20 smtp2.google.com.\n\n$ nslookup -type=MX google.com\nMX preference = 10, mail exchanger = smtp.google.com\n\n$ dig google.com A +short\n142.250.190.14\n\n$ dig google.com TXT +short\n\"v=spf1 include:_spf.google.com ~all\""],

["<strong>netstat / ss</strong> מראים את כל החיבורים הפעילים במחשב. netstat ישן יותר אבל נפוץ. ss (Socket Statistics) חדש ומהיר יותר ב-Linux. שניהם מראים: פורטים פתוחים, חיבורים פעילים, מצב TCP (ESTABLISHED, LISTENING, TIME_WAIT), ואיזה תהליך מאזין על כל פורט.",
"איך רואים איזה תהליך מאזין על פורט 80?",
["ping localhost:80","ss -tlnp (או netstat -tlnp) — מראה listening ports עם שם התהליך","traceroute localhost","dig localhost"],1,
"ss -tlnp: t=TCP, l=listening, n=numeric (לא resolve DNS), p=process name. חשוב לדיאגנוסטיקה: \"למה פורט 80 תפוס?\" → ss -tlnp | grep 80 → רואים שApache/Nginx מאזין.",
"$ ss -tlnp\nState   Local Address:Port  Process\nLISTEN  0.0.0.0:22          sshd\nLISTEN  0.0.0.0:80          nginx\nLISTEN  0.0.0.0:443         nginx\nLISTEN  127.0.0.1:5432      postgres\n\n$ ss -tn  (active connections)\nState   Local            Remote\nESTAB   192.168.1.10:443 203.0.113.5:54321\nESTAB   192.168.1.10:22  10.0.0.50:61234"],

["<strong>curl</strong> הוא כלי שורת פקודה לשליחת HTTP requests. הוא מאפשר לבדוק APIs, להוריד קבצים, לשלוח POST requests עם data, ולראות headers מפורטים. curl -v מראה את כל התקשורת כולל TLS handshake. הוא הכלי הכי חשוב לdebug של בעיות HTTP.",
"מה curl -I עושה?",
["מוריד את הדף המלא","שולח HEAD request — מקבל רק headers בלי body (בודק status code, content-type, server)","מצפין את הבקשה","שולח POST"],1,
"curl -I = HEAD request = רק headers. שימושי לבדיקה מהירה: האם השרת חי? מה ה-status code? מה הגודל? מה ה-content-type? בלי להוריד את כל הדף. curl -v = verbose (כל הפרטים). curl -o file = שמור לקובץ.",
"$ curl -I https://google.com\nHTTP/2 301\nlocation: https://www.google.com/\ncontent-type: text/html\n\n$ curl -v https://api.example.com/users\n> GET /users HTTP/2\n> Host: api.example.com\n< HTTP/2 200\n< content-type: application/json\n[{\"id\":1,\"name\":\"Hila\"}]\n\n$ curl -X POST -d '{\"name\":\"test\"}' \\\n  -H 'Content-Type: application/json' \\\n  https://api.example.com/users"],

["<strong>tcpdump</strong> הוא Wireshark של שורת הפקודה. הוא לוכד packets בזמן אמת ומציג אותם בטרמינל. מושלם לשרתים בלי GUI. אפשר לסנן לפי פורט, IP, פרוטוקול, ולשמור ל-pcap לניתוח מאוחר ב-Wireshark. צריך הרשאות root.",
"מה הפקודה ללכוד רק תעבורת DNS?",
["tcpdump -i eth0 port 53","tcpdump dns","tcpdump -filter dns","ping dns"],0,
"tcpdump -i eth0 port 53 לוכד כל תעבורה בפורט 53 (DNS). אפשר גם: tcpdump -i any host 8.8.8.8, tcpdump -w capture.pcap (שמור לקובץ), tcpdump -r capture.pcap (קרא מקובץ). -nn = לא resolve DNS/ports.",
"$ sudo tcpdump -i eth0 port 53 -nn\n14:23:01 192.168.1.10.54321 > 8.8.8.8.53: A? google.com\n14:23:01 8.8.8.8.53 > 192.168.1.10.54321: A 142.250.190.14\n\n# Save to file:\n$ sudo tcpdump -i eth0 -w capture.pcap\n# Open later in Wireshark!\n\n# Common filters:\ntcpdump port 80          # HTTP\ntcpdump host 10.0.0.1    # specific IP\ntcpdump tcp              # TCP only\ntcpdump -c 100           # capture 100 packets"],

["<strong>nmap</strong> הוא סורק הרשת הפופולרי ביותר. הוא מגלה מכונות חיות, סורק פורטים פתוחים, מזהה שירותים וגרסאות, ואפילו מנחש את ה-OS. nmap חיוני לאבטחת מידע — הוא הצעד הראשון ב-Penetration Testing. חשוב להשתמש רק ברשתות שיש לך אישור לסרוק.",
"מה ההבדל בין nmap -sS ל-nmap -sT?",
["אין הבדל","sS = SYN scan (שקט, לא משלים handshake); sT = Connect scan (משלים TCP handshake מלא)","sS = UDP; sT = TCP","sS = מהיר; sT = מדויק"],1,
"SYN scan (sS): שולח SYN, מקבל SYN-ACK (פתוח) או RST (סגור), שולח RST (לא משלים). \"חצי חיבור\" — פחות נראה בלוגים. Connect scan (sT): TCP connect() מלא — נרשם בלוגים אבל לא צריך root. sS = ברירת מחדל עם root.",
"$ nmap -sS 192.168.1.1        # SYN scan\nPORT    STATE SERVICE\n22/tcp  open  ssh\n80/tcp  open  http\n443/tcp open  https\n\n$ nmap -sV 192.168.1.1        # Version detection\n22/tcp  OpenSSH 8.9\n80/tcp  nginx 1.24.0\n443/tcp nginx 1.24.0\n\n$ nmap -O 192.168.1.1         # OS detection\nOS: Linux 5.x\n\n$ nmap -sn 192.168.1.0/24     # Ping sweep (discover hosts)"],

["<strong>ifconfig / ip</strong> מציגים ומגדירים כרטיסי רשת. ifconfig ישן (עדיין עובד). ip (iproute2) חדש ועשיר יותר. הם מראים: כתובת IP, MAC, Subnet Mask, סטטיסטיקות (bytes sent/received), ומצב (UP/DOWN). ip route מראה את טבלת הניתוב.",
"מה ההבדל בין ifconfig ל-ip?",
["ifconfig ל-Windows בלבד","ip חדש יותר, עשיר יותר, ותומך בפיצ'רים מודרניים (namespaces, policy routing); ifconfig legacy","ifconfig מהיר יותר","אין הבדל"],1,
"ip = הכלי המודרני ב-Linux. ip addr = כתובות, ip route = ניתוב, ip link = מצב interfaces, ip neigh = ARP table. ifconfig לא תומך בnetwork namespaces, policy routing, ועוד. ב-Windows: ipconfig.",
"$ ip addr show eth0\n  inet 192.168.1.100/24\n  ether aa:bb:cc:dd:ee:ff\n\n$ ip route\n  default via 192.168.1.1\n  192.168.1.0/24 dev eth0\n\n$ ip neigh  (ARP table)\n  192.168.1.1 lladdr aa:bb:cc:11:22:33\n\n# Windows equivalent:\n$ ipconfig /all\n$ route print"]
];
var L="\u05D0\u05D1\u05D2\u05D3",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){var a=document.getElementById('area');a.innerHTML='';for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;var codeH=q[5]?'<div class="code">'+esc(q[5])+'</div>':'';var optsH='<div class="opts">';for(var j=0;j<q[2].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[2][j])+'</span></button>';}optsH+='</div>';card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="theory">'+q[0]+'</div><div class="qt">'+esc(q[1])+'</div>'+codeH+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';a.appendChild(card);}a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});}
function handleA(qi,oi){if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[3];var ok=oi===ci;ans[qi]=ok;var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}var fb=document.getElementById('fb-'+qi);if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 נכון! +10'+(sk>=3?' (+5 רצף!)':'');}else{sk=0;fb.className='fb show fno';fb.textContent='\u274C לא נכון';}fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[4]));document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='📊 תוצאות';}
window.nextQ=function(){if(cur>=QS.length-1){showRes();return;}document.getElementById('qc-'+cur).classList.remove('active');cur++;document.getElementById('qc-'+cur).classList.add('active');document.getElementById('nBtn').disabled=true;document.getElementById('qc-'+cur).scrollIntoView({behavior:'smooth',block:'center'});};
function showRes(){document.getElementById('area').style.display='none';document.getElementById('foot').style.display='none';var rs=document.getElementById('resScr');rs.classList.add('show');var pct=sc/(QS.length*10);var g,gc;if(pct>=.9){g='A+';gc='ga';}else if(pct>=.75){g='B';gc='gb';}else if(pct>=.55){g='C';gc='gc';}else{g='F';gc='gf';}var m=String(Math.floor(ts/60)).padStart(2,'0');var s=String(ts%60).padStart(2,'0');rs.innerHTML='<div class="re">'+(pct>=.9?'🏆':pct>=.75?'🎯':pct>=.55?'📚':'💪')+'</div><div class="rt" style="color:'+(pct>=.75?'var(--acc)':'var(--gold)')+'">'+  (pct>=.9?'CLI Tools Master!':pct>=.75?'מצוין!':pct>=.55?'בדרך הנכונה':'צריך חזרה')+'</div><div class="rsu">'+cc+'/'+QS.length+' | '+sc+' נק\' | '+m+':'+s+' | רצף: '+mx+'</div><div class="rg '+gc+'">'+g+'</div><br><button class="retry" onclick="location.reload()">נסה שוב ↻</button>';}render();})();
</script></body></html>
