<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק 10 – מעבדה Pro | השכבה הפיזית</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--surf:#111827;--surf2:#1a2235;--brd:#1e2d45;--ac:#00d4ff;--ac2:#7c3aed;--gr:#10b981;--rd:#ef4444;--yw:#f59e0b;--tx:#e2e8f0;--mt:#64748b;--mono:'IBM Plex Mono',monospace;--sans:'Heebo',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{max-width:900px;margin:0 auto;padding:32px 20px 60px;position:relative;z-index:1;}
.hdr{margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--brd);}
.row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.badge{background:linear-gradient(135deg,var(--ac2),#4f46e5);color:#fff;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:2px;padding:4px 10px;border-radius:4px;}
.badge2{background:rgba(245,158,11,.12);color:var(--yw);border:1px solid rgba(245,158,11,.3);font-family:var(--mono);font-size:10px;font-weight:600;padding:4px 10px;border-radius:4px;}
.ch{font-family:var(--mono);font-size:12px;color:var(--ac);}
.title{font-size:26px;font-weight:900;color:#fff;line-height:1.2;}
.sub{font-size:14px;color:var(--mt);margin-top:4px;}
.prog{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:16px 20px;margin-bottom:32px;display:flex;align-items:center;gap:20px;}
.pl{font-family:var(--mono);font-size:12px;color:var(--mt);}
.pb{flex:1;height:6px;background:var(--brd);border-radius:99px;overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,var(--yw),var(--ac));border-radius:99px;transition:width .5s;width:0%;}
.ps{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--yw);}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:16px;overflow:hidden;}
.ch2{background:var(--surf2);border-bottom:1px solid var(--brd);padding:16px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.qn{font-family:var(--mono);font-size:11px;color:var(--mt);}
.qc{font-family:var(--mono);font-size:11px;color:var(--yw);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);padding:2px 8px;border-radius:4px;}
.body{padding:28px 24px 20px;}
.snip{background:#0d1117;border:1px solid var(--brd);border-radius:10px;padding:14px 18px;margin-bottom:22px;font-family:var(--mono);font-size:13px;line-height:1.9;overflow-x:auto;}
.kw{color:#ff79c6;}.fn{color:#50fa7b;}.st{color:#f1fa8c;}.nu{color:#bd93f9;}.va{color:#8be9fd;}.cm{color:#6272a4;}.yw{color:#f59e0b;}.gr2{color:#50fa7b;}.rd2{color:#ff5555;}.pr{color:#a78bfa;}.tl{color:#06b6d4;}
/* wave visual */
.wave-vis{margin:8px 0;}
.wav-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px;}
.wav-label{color:var(--mt);min-width:30px;font-family:var(--mono);}
.wav-bar{height:20px;border-radius:4px;display:flex;align-items:center;padding:0 6px;}
.wav-am-1{background:rgba(245,158,11,.4);width:120px;}
.wav-am-0{background:rgba(245,158,11,.15);width:60px;}
.wav-fm-1{background:rgba(6,182,212,.4);width:60px;}
.wav-fm-0{background:rgba(6,182,212,.2);width:100px;}
.qt{font-size:18px;font-weight:600;color:#fff;line-height:1.5;margin-bottom:28px;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{background:var(--bg);border:1px solid var(--brd);border-radius:10px;padding:14px 18px;cursor:pointer;text-align:right;display:flex;align-items:center;gap:12px;width:100%;font-family:var(--sans);font-size:15px;color:var(--tx);transition:all .15s;}
.opt:hover{border-color:var(--yw);background:rgba(245,158,11,.04);color:#fff;}
.opt.done{cursor:default;pointer-events:none;}
.opt.correct{border-color:var(--gr);background:rgba(16,185,129,.1);color:#fff;}
.opt.correct .lb{color:var(--gr);}
.opt.wrong{border-color:var(--rd);background:rgba(239,68,68,.08);color:var(--mt);}
.opt.wrong .lb{color:var(--rd);}
.opt.show{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05);}
.lb{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--mt);min-width:20px;text-align:center;flex-shrink:0;}
.ot{flex:1;text-align:right;}
.ic{font-size:16px;min-width:20px;text-align:center;flex-shrink:0;}
.exp{margin:20px 0 0;padding:16px 18px;border-radius:10px;border-right:3px solid var(--gr);background:rgba(16,185,129,.06);display:none;}
.exp.bad{border-color:var(--rd);background:rgba(239,68,68,.06);}
.et{font-family:var(--mono);font-size:11px;color:var(--gr);margin-bottom:6px;text-transform:uppercase;}
.exp.bad .et{color:var(--rd);}
.eb{font-size:14px;color:#94a3b8;line-height:1.8;}
.foot{padding:20px 24px;border-top:1px solid var(--brd);display:flex;justify-content:space-between;}
.btn{background:transparent;border:1px solid var(--brd);color:var(--mt);padding:10px 20px;border-radius:8px;font-family:var(--sans);font-size:14px;cursor:pointer;transition:all .15s;}
.btn:hover:not(:disabled){border-color:var(--yw);color:var(--yw);}
.btn:disabled{opacity:.3;cursor:default;}
.btn.pri{background:linear-gradient(135deg,var(--yw),#ff6b35);border-color:transparent;color:#000;font-weight:600;}
.res{display:none;text-align:center;padding:60px 24px;}
.ring{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;position:relative;}
.ring::after{content:'';position:absolute;inset:12px;border-radius:50%;background:var(--surf);}
.rn{font-family:var(--mono);font-size:36px;font-weight:600;color:#fff;position:relative;z-index:1;}
.rt2{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px;}
.rs{font-size:15px;color:var(--mt);margin-bottom:32px;}
.bks{display:flex;gap:20px;justify-content:center;margin-bottom:36px;flex-wrap:wrap;}
.bk{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:14px 24px;text-align:center;}
.bv{font-family:var(--mono);font-size:22px;font-weight:600;color:#fff;}
.bl{font-size:12px;color:var(--mt);margin-top:2px;}
.rbtn{background:linear-gradient(135deg,var(--yw),#ff6b35);border:none;color:#000;padding:14px 36px;border-radius:10px;font-family:var(--sans);font-size:16px;font-weight:700;cursor:pointer;}
</style>
<style id="mobile-fix">
@media (max-width: 600px) {
  body { padding: 12px 10px 60px !important; }
  .wrap, .container { padding-left: 10px !important; padding-right: 10px !important; }
  pre, table { max-width: 100%; overflow-x: auto; }
  img, svg { max-width: 100% !important; height: auto !important; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="row">
      <span class="badge">PRO LAB</span>
      <span class="badge2">⚡ פיזית</span>
      <span class="ch">פרק 10 מתוך 12</span>
    </div>
    <div class="title">השכבה הפיזית</div>
    <div class="sub">15 שאלות &middot; ביטים &middot; גלים &middot; AM/FM &middot; מודם &middot; CAT5 &middot; WiFi &middot; סיב אופטי</div>
  </div>
  <div class="prog">
    <span class="pl">התקדמות</span>
    <div class="pb"><div class="pf" id="pf"></div></div>
    <span class="ps" id="ps">0 / 15</span>
  </div>
  <div class="card" id="card">
    <div class="ch2"><span class="qn" id="qn">שאלה 1</span><span class="qc" id="qc"></span></div>
    <div class="body">
      <div id="snip"></div>
      <div class="qt" id="qt"></div>
      <div class="opts" id="opts"></div>
      <div class="exp" id="exp"><div class="et" id="et"></div><div class="eb" id="eb"></div></div>
    </div>
    <div class="foot">
      <button class="btn" id="prev" onclick="go(-1)" disabled>&#x2192; הקודם</button>
      <button class="btn pri" id="next" onclick="go(1)" disabled>הבא &#x2190;</button>
    </div>
  </div>
  <div class="res" id="res">
    <div class="ring" id="ring"><span class="rn" id="rpct">0%</span></div>
    <div class="rt2" id="rt"></div><div class="rs" id="rs"></div>
    <div class="bks">
      <div class="bk"><div class="bv" id="rok" style="color:var(--gr)"></div><div class="bl">נכון</div></div>
      <div class="bk"><div class="bv" id="rbd" style="color:var(--rd)"></div><div class="bl">שגוי</div></div>
      <div class="bk"><div class="bv" id="rtt" style="color:var(--yw)"></div><div class="bl">סהכ</div></div>
    </div>
    <button class="rbtn" onclick="restart()">התחל מחדש</button>
  </div>
</div>
<script>
var Q = [
  {
    cat:"שכבה פיזית", sn:null,
    q:"מה מטרת השכבה הפיזית? מה ההבדל שלה מכל שאר השכבות?",
    a:["להעביר ביט בודד בין שני רכיבים. שאר השכבות מסתמכות עליה. היא הממשק בין תוכנה לחומרה פיזית","להצפין מידע לפני שליחה","לנתב מסגרות לפי MAC Address","להגדיר פרוטוקולי TCP/IP"],
    c:0, e:"בפרק: 'מטרת השכבה הפיזית היא להעביר ביט יחיד בין רכיבי מחשוב.' כל ארבע השכבות שמעליה מניחות שאפשר להעביר ביטים. היא הממשק בין עולם המחשבים המופשט לחומר הפיזי: נחושת, אוויר, זכוכית."
  },
  {
    cat:"קוד מורס", sn:'<div style="font-family:IBM Plex Mono;font-size:13px;line-height:2.2;"><div><span style="color:#fff;">A</span> = <span style="color:#f59e0b;">· −</span></div><div><span style="color:#fff;">S</span> = <span style="color:#f59e0b;">· · ·</span></div><div><span style="color:#fff;">O</span> = <span style="color:#f59e0b;">− − −</span></div></div>',
    q:"מה ההבדל בין נקודה לקו בקוד מורס? מה עיקרון הקידוד?",
    a:["משך הזמן — נקודה=קצר, קו=ארוך. כל אות = רצף ייחודי של ביטים (קצר/ארוך). עיקרון: יש אות=1, אין=0","צבע — נקודה=כחול, קו=אדום","עוצמת הקול — נקודה=חזק, קו=חלש","כיוון — נקודה=ימין, קו=שמאל"],
    c:0, e:"בפרק: 'ההבדל בין קו לנקודה הוא האורך, או משך הזמן של הבהוב האור.' נקודה = הבהוב קצר. קו = הבהוב ארוך. הגדרת משכים מדויקת = ניתן להאיץ שידור. הזכרנו גם 300bps של מודמים ראשונים."
  },
  {
    cat:"מאפייני גל", sn:'<svg viewBox="0 0 300 80" style="width:100%;max-height:80px;display:block;background:rgba(0,0,0,.3);border-radius:8px;"><path d="M0,40 C20,10 40,10 60,40 C80,70 100,70 120,40 C140,10 160,10 180,40 C200,70 220,70 240,40 C260,10 280,10 300,40" fill="none" stroke="url(#g2)" stroke-width="2"/><defs><linearGradient id="g2" x1="0%" y1="0%"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs><line x1="30" y1="40" x2="30" y2="10" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/><text x="32" y="22" fill="#ef4444" font-size="9" font-family="IBM Plex Mono">A</text><line x1="0" y1="70" x2="120" y2="70" stroke="#a78bfa" stroke-width="1.5"/><text x="45" y="78" fill="#a78bfa" font-size="9" font-family="IBM Plex Mono">λ</text></svg>',
    q:"בשרטוט: מה A מסמל? מה λ מסמל? איזה קשר בין תדר לאורך גל?",
    a:["A = משרעת (אמפליטודה) — גובה הגל. λ = אורך גל — מרחק מחזור. תדר גבוה = אורך גל קצר (קשר הפוך)","A = תדר. λ = אמפליטודה. קשר ישיר","A = זמן מחזור. λ = מהירות גל","A ו-λ שניהם מודדים את אותו דבר"],
    c:0, e:"בפרק: משרעת = 'גובה' מקסימלי של הגל. אורך גל (λ) = מרחק שהגל עובר במחזור אחד. תדר = מחזורים לשניה = 1/זמן מחזור. אורך הגל ∝ 1/תדר. WiFi 5GHz = אורך גל קצר יותר מ-2.4GHz."
  },
  {
    cat:"AM לעומת FM", sn:'<div style="font-size:13px;line-height:2;"><div><span style="color:#f59e0b;">AM:</span> <span style="color:#94a3b8;">האמפליטודה משתנה, התדר קבוע</span></div><div><span style="color:#06b6d4;">FM:</span> <span style="color:#94a3b8;">התדר משתנה, האמפליטודה קבועה</span></div></div>',
    q:"למה רדיו FM נשמע טוב יותר מ-AM? מה הסיבה הפיזית?",
    a:["FM עמיד לרעשים — רעש חשמלי = שינוי אמפליטודה, לא תדר. AM רגיש לרעש כי מידע נשמר באמפליטודה","FM משדר בתדרים גבוהים יותר","FM משתמש בכבל, AM אלחוטי","AM מיועד לרדיו, FM לטלוויזיה"],
    c:0, e:"בפרק: AM = מידע מקודד באמפליטודה. כל רעש חשמלי בסביבה = שינוי אמפליטודה = עיוות הקול. FM = מידע מקודד בתדר. רעש חשמלי = שינוי אמפליטודה — לא משפיע על תדר → FM עמיד יותר!"
  },
  {
    cat:"אנלוגי vs דיגיטלי", sn:'<div style="font-size:13px;line-height:2;"><div><span style="color:#a78bfa;">📼 תקליט:</span> <span style="color:#94a3b8;">גל קול נחרט ישירות</span></div><div><span style="color:#10b981;">💿 CD:</span> <span style="color:#94a3b8;">44,100 דגימות לשניה → ביטים</span></div></div>',
    q:"מה ההבדל בין תקליט ל-CD? מה יתרון הדיגיטלי?",
    a:["תקליט=אנלוגי (גל רציף נחרט). CD=דיגיטלי (דגימות בדידות). יתרון: תיקון שגיאות — ביט שגוי ניתן לזיהוי ותיקון","תקליט=דיגיטלי, CD=אנלוגי","שניהם דיגיטליים, רק פורמט שונה","תקליט=קצב גבוה, CD=קצב נמוך"],
    c:0, e:"בפרק: תקליט = אנלוגי — החריטה מייצגת את גל הקול בדיוק. CD = דיגיטלי — דוגמים 44,100 פעמים לשניה ומאחסנים ביטים. יתרון עצום: קידוד דיגיטלי + תיקון שגיאות. scratches בCD ניתן לתקן!"
  },
  {
    cat:"טלפון — שכבה פיזית", sn:null,
    q:"הטלפון פועל בשכבה הפיזית בלבד — מה זה אומר? מה הוא לא עושה?",
    a:["מעביר גל קול ישירות לזרם חשמלי ללא קידוד ל-0/1. אין IP, אין MAC, אין שכבות גבוהות. קצב = קצב הדוברים","טלפון = Layer 4, מסתמך על TCP","טלפון = Layer 2, עם כתובת MAC","טלפון לא קיים בשכבה הפיזית"],
    c:0, e:"בפרק: 'הטלפון פועל בשכבה הפיזית בלבד: הזרם החשמלי מעביר את המידע—עוצמת גל הקול—ללא המרה למידע אחר (כגון 0 ו-1). קצב התקשורת תלוי בדוברים. הטלפון הינו דו כיווני.' = Full Duplex טהור."
  },
  {
    cat:"מודם ADSL", sn:'<div style="font-family:IBM Plex Mono;font-size:12px;line-height:2;"><div><span style="color:#f59e0b;">מודם 1956:</span> <span style="color:#94a3b8;">300 bps</span></div><div><span style="color:#06b6d4;">ADSL 2000s:</span> <span style="color:#94a3b8;">100 Mbps</span></div><div><span style="color:#a78bfa;">שיפור:</span> <span style="color:#94a3b8;">×333,333!</span></div></div>',
    q:"מה הסיבה העיקרית ש-ADSL מהיר פי 333,000 ממודם 300bps?",
    a:["קרבה פיזית למרכזיה → ניצול תדרים גבוהים הרבה יותר (מעל 20KHz) → קצב גבוה. כבל הנחושת עצמו לא השתנה!","ADSL משתמש בכבל סיב אופטי","ADSL = Layer 3, לא Layer 1","ADSL מעביר יותר ביטים במקביל בכבלים נוספים"],
    c:0, e:"בפרק: 'קפיצת המדרגה האמיתית נעשתה כאשר חברות הטלפוניה החליטו לקרב את המרכזיה אל בתי הלקוחות. קרבה זו אפשרה למודמים לנצל תדרים גבוהים בהרבה מ-20KHz.' אותו כבל נחושת — תדרים גבוהים יותר → קצבים גבוהים יותר."
  },
  {
    cat:"פילטר ADSL", sn:'<div style="font-size:13px;line-height:2;"><div>☎️ <span style="color:#a78bfa;">טלפון:</span> <span style="color:#94a3b8;">50Hz – 20KHz</span></div><div>🌐 <span style="color:#06b6d4;">ADSL:</span> <span style="color:#94a3b8;">&gt;20KHz</span></div><div style="color:#6272a4;">שניהם על אותו כבל!</div></div>',
    q:"מה פילטר ADSL עושה? למה נקרא פילטר ולא מפצל פשוט?",
    a:["מסנן תדרים: שולח תדרי קול (50Hz-20KHz) לטלפון, תדרים גבוהים למודם. מונע הפרעות — לכן פילטר","מגביר את האות של המודם","מצפין את התקשורת בין טלפון למודם","מחלק את כוח החשמל בין שני מכשירים"],
    c:0, e:"בפרק: 'תפקידו של הפילטר הוא להפריד ולסנן תדרים.' הוא לא סתם מפצל חוטים — הוא מסנן אלקטרונית. טלפון מחובר ללא פילטר = מכניס תדרים גבוהים שמפריעים לסנכרון ADSL."
  },
  {
    cat:"CAT5 ו-Ethernet", sn:'<div style="font-family:IBM Plex Mono;font-size:12px;line-height:2;"><div><span style="color:#ff6b35;">TX: כבל כתום</span> — שידור</div><div><span style="color:#4ade80;">RX: כבל ירוק</span> — קבלה</div><div style="color:#6272a4;">מחשב ↔ Switch: כתום TX → ירוק TX</div></div>',

var LBL=["א","ב","ג","ד"];
var cur=0, ans=[];
for(var i=0;i<Q.length;i++){ans.push(-1);}

function shuf(q){
  var idx=[0,1,2,3];
  for(var i=3;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=idx[i];idx[i]=idx[j];idx[j]=t;}
  var na=[];for(var k=0;k<4;k++){na.push(q.a[idx[k]]);}
  var nc=-1;for(var k=0;k<4;k++){if(idx[k]===q.c){nc=k;break;}}
  return{cat:q.cat,sn:q.sn,q:q.q,a:na,c:nc,e:q.e};
}

var SQ=[];for(var i=0;i<Q.length;i++){SQ.push(shuf(Q[i]));}

function render(){
  var q=SQ[cur];
  document.getElementById("qn").textContent="שאלה "+(cur+1);
  document.getElementById("qc").textContent=q.cat;
  var sn=document.getElementById("snip");
  sn.innerHTML=q.sn?'<div class="snip">'+q.sn+'</div>':"";
  document.getElementById("qt").textContent=q.q;
  var oc=document.getElementById("opts");oc.innerHTML="";
  for(var i=0;i<4;i++){
    var b=document.createElement("button");b.className="opt";
    b.innerHTML='<span class="lb">'+LBL[i]+'</span><span class="ot">'+q.a[i]+'</span><span class="ic"></span>';
    b.setAttribute("data-i",i);b.onclick=pick;oc.appendChild(b);
  }
  var ex=document.getElementById("exp");ex.style.display="none";ex.className="exp";
  if(ans[cur]!==-1){showA(cur);}
  document.getElementById("prev").disabled=(cur===0);
  document.getElementById("next").disabled=(ans[cur]===-1);
  upProg();
}

function pick(){
  if(ans[cur]!==-1){return;}
  var i=parseInt(this.getAttribute("data-i"));
  ans[cur]=i;showA(cur);document.getElementById("next").disabled=false;
}

function showA(idx){
  var q=SQ[idx];var ch=ans[idx];var ok=(ch===q.c);
  var bs=document.querySelectorAll(".opt");
  for(var i=0;i<bs.length;i++){
    bs[i].className="opt done";bs[i].onclick=null;
    var ic=bs[i].querySelector(".ic");
    if(i===q.c){bs[i].classList.add(ok?"correct":"show");if(!ok){ic.textContent="\u2713";}}
    if(i===ch&&!ok){bs[i].classList.add("wrong");ic.textContent="\u2717";}
    if(i===ch&&ok){ic.textContent="\u2713";}
  }
  var ex=document.getElementById("exp");
  document.getElementById("et").textContent=ok?"\u2713 \u05e0\u05db\u05d5\u05df!":"\u2717 \u05dc\u05d0 \u05d1\u05d3\u05d9\u05d5\u05e7...";
  document.getElementById("eb").textContent=q.e;
  ex.className=ok?"exp":"exp bad";ex.style.display="block";
}

function upProg(){
  var n=0;for(var i=0;i<ans.length;i++){if(ans[i]!==-1){n++;}}
  document.getElementById("pf").style.width=(n/Q.length*100)+"%";
  document.getElementById("ps").textContent=n+" / "+Q.length;
}

function go(d){
  var n=cur+d;if(n<0){return;}
  if(n>=Q.length){showRes();return;}
  cur=n;render();
}

function showRes(){
  document.getElementById("card").style.display="none";
  document.getElementById("res").style.display="block";
  var ok=0,bd=0;
  for(var i=0;i<ans.length;i++){if(ans[i]===SQ[i].c){ok++;}else if(ans[i]!==-1){bd++;}}
  var pct=Math.round(ok/Q.length*100);
  document.getElementById("ring").style.background="conic-gradient(var(--yw) 0%,var(--ac) "+pct+"%,var(--brd) "+pct+"%)";
  document.getElementById("rpct").textContent=pct+"%";
  document.getElementById("rok").textContent=ok;document.getElementById("rbd").textContent=bd;document.getElementById("rtt").textContent=Q.length;
  var t,s;
  if(pct>=80){t="\u05de\u05e6\u05d5\u05d9\u05df! \u26a1";s="\u05e9\u05dc\u05d9\u05d8\u05d4 \u05de\u05dc\u05d0\u05d4 \u05d1\u05e9\u05db\u05d1\u05d4 \u05d4\u05e4\u05d9\u05d6\u05d9\u05ea";}
  else if(pct>=60){t="\u05dc\u05d0 \u05e8\u05e2 \ud83d\udcaa";s="\u05d7\u05d6\u05d5\u05e8 \u05e2\u05dc AM/FM \u05d5\u05e1\u05d9\u05d1 \u05d0\u05d5\u05e4\u05d8\u05d9";}
  else{t="\u05d9\u05e9 \u05de\u05d4 \u05dc\u05d7\u05d6\u05e7 \ud83d\udcda";s="\u05e7\u05e8\u05d0 \u05e9\u05d5\u05d1 \u05d0\u05ea \u05e4\u05e8\u05e7 10";}
  document.getElementById("rt").textContent=t;document.getElementById("rs").textContent=s;
  upProg();
}

function restart(){
  SQ=[];for(var i=0;i<Q.length;i++){SQ.push(shuf(Q[i]));}
  cur=0;ans=[];for(var i=0;i<Q.length;i++){ans.push(-1);}
  document.getElementById("card").style.display="block";
  document.getElementById("res").style.display="none";
  render();
}

render();
</script>
