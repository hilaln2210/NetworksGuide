<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעבדה: Bug Bounty CTF</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f14;
    --bg2: #13171f;
    --bg3: #1a1f2b;
    --border: #252d3d;
    --lime: #a3e635;
    --lime-dim: rgba(163,230,53,0.12);
    --red: #f43f5e;
    --red-dim: rgba(244,63,94,0.1);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.1);
    --sky: #38bdf8;
    --sky-dim: rgba(56,189,248,0.1);
    --text: #e8ecf1;
    --text2: #8994a8;
    --text3: #4b5563;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .grain {
    position:fixed; inset:0; pointer-events:none; z-index:99;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }

  header {
    background: linear-gradient(180deg, #101420 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top:0; z-index:50;
  }

  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon {
    width:38px; height:38px; border-radius:10px;
    background: linear-gradient(135deg, var(--lime), #65a30d);
    display:flex; align-items:center; justify-content:center;
    font-size:20px;
  }
  .logo h1 { font-family:'JetBrains Mono',monospace; font-size:15px; color:var(--lime); }
  .logo .sub { font-size:11px; color:var(--text2); font-weight:400; }

  .lives { display:flex; gap:4px; font-size:18px; }
  .lives .heart { transition: opacity 0.3s; }
  .lives .heart.lost { opacity:0.15; filter: grayscale(1); }

  .progress-wrap {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display:flex; align-items:center; gap:10px;
  }
  .progress-track { flex:1; height:5px; background:var(--bg3); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background: linear-gradient(90deg, var(--lime), #84cc16); border-radius:3px; transition: width 0.6s ease; }
  .progress-lbl { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text2); white-space:nowrap; }

  .challenge-container { padding: 16px; padding-bottom: 110px; }

  .challenge-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    margin-bottom: 14px; display: none;
  }
  .challenge-card.active { display:block; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }

  .card-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .difficulty { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; letter-spacing:1px; }
  .diff-easy { background:rgba(46,213,115,0.12); color:#2ed573; }
  .diff-medium { background:var(--amber-dim); color:var(--amber); }
  .diff-hard { background:var(--red-dim); color:var(--red); }
  .bounty-tag { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--lime); }

  .card-body { padding: 16px; }
  .challenge-title { font-size:17px; font-weight:700; margin-bottom:8px; line-height:1.5; }
  .challenge-desc { font-size:13px; color:var(--text2); line-height:1.7; margin-bottom:16px; }

  .code-block {
    background: #0a0d12; border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; margin-bottom: 16px;
    font-family:'JetBrains Mono',monospace; font-size: 12px; line-height: 1.8;
    overflow-x: auto; direction: ltr; text-align: left;
    color: var(--text2); position: relative; white-space: pre-wrap; word-break: break-word;
  }
  .code-block .label {
    position:absolute; top:8px; right:10px; font-size:9px; color:var(--text3);
    background: var(--bg3); padding:2px 8px; border-radius:4px;
  }

  .vuln-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .vuln-tag {
    font-family:'JetBrains Mono',monospace; font-size:10px;
    padding:3px 10px; border-radius:20px;
    background:var(--sky-dim); color:var(--sky); letter-spacing:0.5px;
  }

  .options { display:flex; flex-direction:column; gap:8px; }
  .opt-btn {
    display:flex; align-items:center; gap:10px;
    background: var(--bg3); border:1px solid var(--border);
    border-radius:10px; padding:12px 14px;
    cursor:pointer; transition:all 0.2s;
    text-align:right; width:100%;
    color:var(--text); font-family:'Heebo',sans-serif; font-size:13px; line-height:1.5;
  }
  .opt-btn:hover { border-color:var(--lime); background:var(--lime-dim); }
  .opt-letter {
    width:28px; height:28px; flex-shrink:0;
    background:var(--lime-dim); border:1px solid rgba(163,230,53,0.2);
    border-radius:7px; display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:var(--lime);
  }
  .opt-btn.correct { border-color:#2ed573; background:rgba(46,213,115,0.1); }
  .opt-btn.correct .opt-letter { background:#2ed573; color:var(--bg); border-color:#2ed573; }
  .opt-btn.wrong { border-color:var(--red); background:var(--red-dim); }
  .opt-btn.wrong .opt-letter { background:var(--red); color:#fff; border-color:var(--red); }
  .opt-btn.disabled { pointer-events:none; opacity:0.5; }

  .feedback { margin-top:14px; padding:12px; border-radius:10px; font-size:13px; line-height:1.7; display:none; }
  .feedback.show { display:block; animation: fadeUp 0.3s ease; }
  .feedback.ok { background:rgba(46,213,115,0.06); border:1px solid rgba(46,213,115,0.2); color:#86efac; }
  .feedback.fail { background:var(--red-dim); border:1px solid rgba(244,63,94,0.2); color:#fda4af; }

  .footer-bar {
    position:fixed; bottom:0; left:0; right:0;
    background:linear-gradient(0deg, var(--bg) 70%, transparent);
    padding:20px 16px 16px; z-index:50;
  }
  .footer-inner {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:14px; padding:12px 16px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow: 0 0 30px rgba(163,230,53,0.06);
  }
  .stat { text-align:center; }
  .stat .val { font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; color:var(--lime); }
  .stat .lbl { font-size:10px; color:var(--text2); margin-top:2px; }

  .next-btn {
    background: linear-gradient(135deg, var(--lime), #65a30d);
    color:var(--bg); border:none; border-radius:10px;
    padding:10px 22px; font-family:'Heebo',sans-serif;
    font-weight:700; font-size:14px; cursor:pointer; transition: transform 0.15s;
  }
  .next-btn:hover { transform:scale(1.03); }
  .next-btn:disabled { opacity:0.3; cursor:not-allowed; transform:none; }

  .flag-input-wrap { display:flex; gap:8px; margin-bottom:16px; direction:ltr; }
  .flag-input {
    flex:1; background:#0a0d12; border:1px solid var(--border);
    border-radius:8px; padding:10px 12px;
    font-family:'JetBrains Mono',monospace; font-size:13px;
    color:var(--lime); outline:none;
  }
  .flag-input::placeholder { color:var(--text3); }
  .flag-input:focus { border-color:var(--lime); }
  .flag-submit {
    background:var(--lime-dim); border:1px solid rgba(163,230,53,0.25);
    color:var(--lime); border-radius:8px; padding:10px 16px;
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; cursor:pointer;
  }

  .hint-btn {
    background:var(--amber-dim); border:1px solid rgba(251,191,36,0.2);
    color:var(--amber); border-radius:8px; padding:6px 12px;
    font-size:12px; cursor:pointer; margin-top:10px; font-family:'Heebo',sans-serif;
  }
  .hint-box {
    display:none; margin-top:8px; padding:10px;
    background:var(--amber-dim); border:1px solid rgba(251,191,36,0.2);
    border-radius:8px; font-size:12px; color:var(--amber); line-height:1.6;
  }
  .hint-box.show { display:block; animation: fadeUp 0.3s ease; }

  .result-screen { display:none; text-align:center; padding:40px 20px; }
  .result-screen.show { display:block; }
  .result-emoji { font-size:60px; margin-bottom:16px; }
  .result-title { font-size:24px; font-weight:900; margin-bottom:8px; color:var(--lime); }
  .result-sub { font-size:14px; color:var(--text2); line-height:1.7; margin-bottom:24px; }
  .result-stats { display:flex; gap:20px; justify-content:center; }
  .result-stat .rval { font-family:'JetBrains Mono',monospace; font-size:28px; font-weight:700; color:var(--lime); }
  .result-stat .rlbl { font-size:11px; color:var(--text2); }
</style>
</head>
<body>
<div class="grain"></div>

<header>
  <div class="logo">
    <div class="logo-icon">🐛</div>
    <div>
      <h1>Bug Bounty CTF</h1>
      <div class="sub">פרק 6 — Bug Bounty ו-CTF</div>
    </div>
  </div>
  <div class="lives" id="lives">
    <span class="heart">❤️</span>
    <span class="heart">❤️</span>
    <span class="heart">❤️</span>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-lbl" id="progressLbl">0 / 5</div>
</div>

<div class="challenge-container" id="challengeArea"></div>

<div class="result-screen" id="resultScreen">
  <div class="result-emoji" id="resultEmoji">🏆</div>
  <div class="result-title" id="resultTitle"></div>
  <div class="result-sub" id="resultSub"></div>
  <div class="result-stats">
    <div class="result-stat"><div class="rval" id="rBounty">$0</div><div class="rlbl">Bounty</div></div>
    <div class="result-stat"><div class="rval" id="rScore">0/5</div><div class="rlbl">Correct</div></div>
    <div class="result-stat"><div class="rval" id="rXP">0</div><div class="rlbl">XP</div></div>
  </div>
</div>

<div class="footer-bar" id="footerBar">
  <div class="footer-inner">
    <div class="stat"><div class="val" id="sBounty">$0</div><div class="lbl">💰 Bounty</div></div>
    <div class="stat"><div class="val" id="sXP">0</div><div class="lbl">⚡ XP</div></div>
    <button class="next-btn" id="nextBtn" disabled onclick="nextChallenge()">אתגר הבא ←</button>
  </div>
</div>

<script>
(function() {
  // ── DATA ──
  var challenges = [
    {
      title: "XSS בשדה חיפוש",
      desc: "קיבלת גישה לאתר e-commerce במסגרת Bug Bounty. בדקת את שדה החיפוש ומצאת שהוא מחזיר את הקלט ישירות ל-HTML.",
      diff: "EASY", diffClass: "diff-easy", bounty: 500,
      tags: ["XSS", "Reflected", "Input Validation"],
      code: "// Server response for search query\napp.get('/search', (req, res) => {\n  const query = req.query.q;\n  res.send(`\n    <h2>Results for: ${query}</h2>\n    <div>No results found</div>\n  `);\n});\n\n// DANGER: query is inserted directly into HTML!\n// No sanitization or escaping applied.",
      codeLabel: "server.js",
      type: "choice",
      options: [
        { letter: "\u05D0", text: "Reflected XSS — הקלט מוזרק ישירות ל-DOM ללא sanitization", correct: true },
        { letter: "\u05D1", text: "SQL Injection — הקלט נכנס ישירות לשאילתת SQL", correct: false },
        { letter: "\u05D2", text: "CSRF — חסר טוקן אימות בטופס", correct: false },
        { letter: "\u05D3", text: "SSRF — השרת מבצע בקשה לכתובת חיצונית", correct: false }
      ],
      explanation: "הקוד מכניס את query ישירות לתוך ה-HTML ללא escaping. תוקף יכול להזריק תגית script דרך הפרמטר q. זהו Reflected XSS קלאסי."
    },
    {
      title: "IDOR — גישה לנתוני משתמשים אחרים",
      desc: "באתר של חברת SaaS, כשניגשת לפרופיל שלך ב-URL, שמת לב שה-API מחזיר מידע לפי מספר ID בלבד.",
      diff: "MEDIUM", diffClass: "diff-medium", bounty: 2000,
      tags: ["IDOR", "Broken Access Control", "API"],
      code: "// Your profile request\nGET /api/users/1337/profile\nAuthorization: Bearer eyJhbG...\n\n// Response: 200 OK\n{\n  \"id\": 1337,\n  \"name\": \"Hila\",\n  \"email\": \"hila@example.com\",\n  \"role\": \"user\"\n}\n\n// What if you change the ID?\nGET /api/users/1/profile\nAuthorization: Bearer eyJhbG...  // same token!\n// --> Returns 200 OK with admin data!",
      codeLabel: "HTTP Request",
      type: "choice",
      options: [
        { letter: "\u05D0", text: "Authentication Bypass — אפשר להיכנס בלי סיסמה", correct: false },
        { letter: "\u05D1", text: "IDOR — אפשר לגשת לפרופיל של כל משתמש ע\"י שינוי ה-ID", correct: true },
        { letter: "\u05D2", text: "Rate Limiting — אין הגבלה על מספר בקשות", correct: false },
        { letter: "\u05D3", text: "Information Disclosure — הודעות שגיאה חושפות מידע", correct: false }
      ],
      explanation: "ה-API בודק רק שיש טוקן תקין, אבל לא בודק שה-ID שייך למשתמש שמחזיק את הטוקן. זה IDOR — חולשה ב-Access Control שמאפשרת גישה לנתונים של משתמשים אחרים."
    },
    {
      title: "מצא את ה-Flag!",
      desc: "במסגרת CTF, קיבלת את קוד ה-Python הבא שמנהל אימות. מצא את הסיסמה הסודית ותשלח אותה כ-Flag.",
      diff: "MEDIUM", diffClass: "diff-medium", bounty: 1500,
      tags: ["CTF", "Reverse Engineering", "Python"],
      code: "import base64\n\ndef check_password(user_input):\n    secret = base64.b64decode(\n        \"Q1RGe2I0czNfNjRfZDNjMGQzfQ==\"\n    )\n    if user_input == secret.decode():\n        return \"Access Granted!\"\n    return \"Wrong password\"\n\n# Hint: Decode the base64 string\n# Terminal: echo 'Q1RGe2I0czNfNjRfZDNjMGQzfQ==' | base64 -d",
      codeLabel: "auth.py",
      type: "flag",
      flag: "CTF{b4s3_64_d3c0d3}",
      hint: "הריצו base64 decode על המחרוזת Q1RGe2I0czNfNjRfZDNjMGQzfQ==",
      explanation: "המחרוזת Q1RGe2I0czNfNjRfZDNjMGQzfQ== היא Base64 encoding של CTF{b4s3_64_d3c0d3}. ב-CTF אמיתי, זיהוי encoding נפוצים (Base64, hex, ROT13) הוא כישור בסיסי."
    },
    {
      title: "SQL Injection בעמוד Login",
      desc: "בודק חדירה מצא את קוד ההתחברות הבא. מה הקלט שיאפשר כניסה ללא סיסמה?",
      diff: "HARD", diffClass: "diff-hard", bounty: 5000,
      tags: ["SQLi", "Auth Bypass", "OWASP Top 10"],
      code: "// Login endpoint\napp.post('/login', (req, res) => {\n  const { username, password } = req.body;\n  \n  // VULNERABLE: String concatenation!\n  const query = `SELECT * FROM users\n    WHERE username='${username}'\n    AND password='${password}'`;\n  \n  db.execute(query, (err, rows) => {\n    if (rows.length > 0)\n      res.send(\"Login successful\");\n  });\n});",
      codeLabel: "login.js",
      type: "choice",
      options: [
        { letter: "\u05D0", text: "username: admin' OR '1'='1' --   password: כל דבר", correct: true },
        { letter: "\u05D1", text: "username: &lt;script&gt;alert(1)&lt;/script&gt;   password: admin", correct: false },
        { letter: "\u05D2", text: "username: admin   password: ' DROP TABLE users; --", correct: false },
        { letter: "\u05D3", text: "username: admin   password: admin (brute force)", correct: false }
      ],
      explanation: "הקלט admin' OR '1'='1' -- הופך את השאילתה ל:\nSELECT * FROM users WHERE username='admin' OR '1'='1' --\nהתנאי '1'='1' תמיד true, וה-- הופך את השאר להערה.\nהתיקון: שימוש ב-Prepared Statements."
    },
    {
      title: "כתיבת Bug Bounty Report",
      desc: "מצאת חולשת Open Redirect באתר — הפרמטר redirect_url לא מאומת. איך תדווח על זה בצורה מקצועית?",
      diff: "MEDIUM", diffClass: "diff-medium", bounty: 1000,
      tags: ["Reporting", "Open Redirect", "Methodology"],
      code: "// Vulnerable redirect\nGET /auth/callback?redirect_url=https://evil.com/phish\n\n// Server code\napp.get('/auth/callback', (req, res) => {\n  // No validation on redirect_url!\n  res.redirect(req.query.redirect_url);\n});\n\n// Attack: user clicks legitimate login link\n// but gets redirected to attacker's phishing page",
      codeLabel: "redirect.js",
      type: "choice",
      options: [
        { letter: "\u05D0", text: "Title + Severity + Steps to Reproduce + Impact + Fix Recommendation", correct: true },
        { letter: "\u05D1", text: "לשלוח מייל קצר: \"מצאתי באג, תתקנו\"", correct: false },
        { letter: "\u05D2", text: "לפרסם את הבאג בטוויטר לפני דיווח לחברה", correct: false },
        { letter: "\u05D3", text: "לנצל את הבאג כדי להראות השפעה ואז לדווח", correct: false }
      ],
      explanation: "דוח Bug Bounty מקצועי חייב לכלול: כותרת ברורה, דירוג חומרה (CVSS), שלבים מדויקים לשחזור, הוכחת השפעה (Impact), והמלצה לתיקון. פרסום פומבי לפני דיווח = Irresponsible Disclosure, וניצול הבאג = לא חוקי."
    }
  ];

  var current = 0, score = 0, xp = 0, bounty = 0, livesLeft = 3, answered = {};

  function esc(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function render() {
    var area = document.getElementById('challengeArea');
    area.innerHTML = '';

    for (var i = 0; i < challenges.length; i++) {
      var c = challenges[i];
      var card = document.createElement('div');
      card.className = 'challenge-card' + (i === current ? ' active' : '');
      card.id = 'ch-' + i;

      var tagsHTML = '';
      for (var t = 0; t < c.tags.length; t++) {
        tagsHTML += '<span class="vuln-tag">' + esc(c.tags[t]) + '</span>';
      }

      var bodyHTML = '';
      if (c.type === 'choice') {
        bodyHTML = '<div class="options">';
        for (var oi = 0; oi < c.options.length; oi++) {
          bodyHTML += '<button class="opt-btn" id="opt-' + i + '-' + oi + '" data-ci="' + i + '" data-oi="' + oi + '" data-correct="' + c.options[oi].correct + '">' +
            '<span class="opt-letter">' + c.options[oi].letter + '</span>' +
            '<span>' + esc(c.options[oi].text) + '</span></button>';
        }
        bodyHTML += '</div>';
      } else if (c.type === 'flag') {
        bodyHTML = '<div class="flag-input-wrap">' +
          '<input class="flag-input" id="flagIn-' + i + '" placeholder="CTF{...}" autocomplete="off" autocapitalize="off">' +
          '<button class="flag-submit" id="flagBtn-' + i + '" data-ci="' + i + '">SUBMIT</button></div>';
      }

      var hintHTML = '';
      if (c.hint) {
        hintHTML = '<button class="hint-btn" data-hint="' + i + '">💡 רמז</button>' +
          '<div class="hint-box" id="hint-' + i + '">' + esc(c.hint) + '</div>';
      }

      card.innerHTML =
        '<div class="card-header">' +
          '<span class="difficulty ' + c.diffClass + '">' + c.diff + '</span>' +
          '<span class="bounty-tag">$' + c.bounty.toLocaleString() + '</span>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="challenge-title">' + esc(c.title) + '</div>' +
          '<div class="vuln-tags">' + tagsHTML + '</div>' +
          '<div class="challenge-desc">' + esc(c.desc) + '</div>' +
          '<div class="code-block"><span class="label">' + esc(c.codeLabel) + '</span>' + esc(c.code) + '</div>' +
          bodyHTML + hintHTML +
          '<div class="feedback" id="fb-' + i + '"></div>' +
        '</div>';

      area.appendChild(card);
    }

    // Event delegation
    area.addEventListener('click', function(e) {
      var btn = e.target.closest('.opt-btn');
      if (btn) {
        var ci = parseInt(btn.getAttribute('data-ci'));
        var oi = parseInt(btn.getAttribute('data-oi'));
        var isCorrect = btn.getAttribute('data-correct') === 'true';
        handleAnswer(ci, oi, isCorrect);
        return;
      }

      var flagBtn = e.target.closest('.flag-submit');
      if (flagBtn && flagBtn.getAttribute('data-ci')) {
        handleFlag(parseInt(flagBtn.getAttribute('data-ci')));
        return;
      }

      var hintBtn = e.target.closest('.hint-btn');
      if (hintBtn) {
        var hIdx = hintBtn.getAttribute('data-hint');
        document.getElementById('hint-' + hIdx).classList.toggle('show');
        return;
      }
    });
  }

  function handleAnswer(ci, oi, isCorrect) {
    if (answered[ci]) return;
    answered[ci] = true;

    var c = challenges[ci];
    var btns = document.querySelectorAll('[id^="opt-' + ci + '-"]');
    for (var idx = 0; idx < btns.length; idx++) {
      if (c.options[idx].correct) btns[idx].classList.add('correct');
      else if (idx === oi && !isCorrect) btns[idx].classList.add('wrong');
      btns[idx].classList.add('disabled');
    }
    showFeedback(ci, isCorrect, c);
  }

  function handleFlag(ci) {
    if (answered[ci]) return;
    var input = document.getElementById('flagIn-' + ci);
    var val = input.value.trim();
    if (!val) return;
    answered[ci] = true;
    input.disabled = true;
    var c = challenges[ci];
    showFeedback(ci, val === c.flag, c);
  }

  function showFeedback(ci, isCorrect, c) {
    var fb = document.getElementById('fb-' + ci);

    if (isCorrect) {
      score++;
      xp += 30;
      bounty += c.bounty;
      fb.className = 'feedback show ok';
      fb.textContent = '';
      var t1 = document.createTextNode('\u2705 מצוין! +$' + c.bounty.toLocaleString() + ' Bounty');
      fb.appendChild(t1);
      fb.appendChild(document.createElement('br'));
      fb.appendChild(document.createTextNode(c.explanation));
    } else {
      livesLeft--;
      updateLives();
      fb.className = 'feedback show fail';
      fb.textContent = '';
      fb.appendChild(document.createTextNode('\u274C לא מדויק'));
      fb.appendChild(document.createElement('br'));
      fb.appendChild(document.createTextNode(c.explanation));
    }

    document.getElementById('sBounty').textContent = '$' + bounty.toLocaleString();
    document.getElementById('sXP').textContent = xp;
    document.getElementById('progressFill').style.width = (((ci + 1) / challenges.length) * 100) + '%';
    document.getElementById('progressLbl').textContent = (ci + 1) + ' / ' + challenges.length;

    var nBtn = document.getElementById('nextBtn');
    nBtn.disabled = false;
    if (ci >= challenges.length - 1) nBtn.textContent = '🏆 סיכום';
  }

  function updateLives() {
    var hearts = document.querySelectorAll('#lives .heart');
    for (var i = 0; i < hearts.length; i++) {
      if (i >= livesLeft) hearts[i].classList.add('lost');
    }
  }

  // Expose to global scope for onclick
  window.nextChallenge = function() {
    if (current >= challenges.length - 1) {
      showResults();
      return;
    }
    document.getElementById('ch-' + current).classList.remove('active');
    current++;
    document.getElementById('ch-' + current).classList.add('active');
    document.getElementById('nextBtn').disabled = true;
  };

  function showResults() {
    document.getElementById('challengeArea').style.display = 'none';
    var rs = document.getElementById('resultScreen');
    rs.classList.add('show');
    var pct = score / challenges.length;
    document.getElementById('resultEmoji').textContent = pct >= 0.8 ? '🏆' : pct >= 0.5 ? '🎯' : '💪';
    document.getElementById('resultTitle').textContent = pct >= 0.8 ? 'Bug Hunter מקצועי!' : pct >= 0.5 ? 'בדרך הנכונה!' : 'צריך עוד תרגול';
    document.getElementById('resultSub').textContent = 'מצאת ' + score + ' מתוך ' + challenges.length + ' חולשות וצברת bounty של $' + bounty.toLocaleString();
    document.getElementById('rBounty').textContent = '$' + bounty.toLocaleString();
    document.getElementById('rScore').textContent = score + '/' + challenges.length;
    document.getElementById('rXP').textContent = xp;
    document.getElementById('footerBar').style.display = 'none';
  }

  render();
})();
</script>
</body>
</html>
