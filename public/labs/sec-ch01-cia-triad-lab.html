<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרק 1 — CIA Triad: יסודות אבטחת מידע</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--bg2:#0c1119;--bg3:#141c28;--border:#1e2d42;--acc:#14b8a6;--ad:rgba(20,184,166,0.1);--green:#4ade80;--gd:rgba(74,222,128,0.08);--red:#ef4444;--rd:rgba(239,68,68,0.1);--gold:#fbbf24;--text:#dfe6f0;--t2:#7b8da4;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(20,184,166,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(20,184,166,0.03) 1px,transparent 1px);background-size:40px 40px;}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#080e16,rgba(6,10,16,.97));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}.icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--acc),#0d9488);display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo h1{font-family:'Space Mono',monospace;font-size:14px;color:var(--acc);}.logo .sub{font-size:11px;color:var(--t2);}
.badge{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:b 2s infinite;}@keyframes b{0%,100%{opacity:1;}50%{opacity:.3;}}
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:10px;}.ptr{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}.pfl{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--acc),#0d9488);}.plbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--t2);}
.wrap{padding:14px;padding-bottom:100px;position:relative;z-index:1;}
.qc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;display:none;}.qc.active{display:block;animation:up .3s ease;}@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.qh{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}.qtag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--ad);color:var(--acc);}.qpts{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);}
.qb{padding:14px;}.theory{font-size:13px;color:var(--t2);line-height:1.9;margin-bottom:14px;padding:12px 14px;background:var(--bg3);border-radius:10px;border-right:3px solid var(--acc);}.theory strong{color:var(--text);}
.scenario{font-size:13px;color:var(--text);line-height:1.8;margin-bottom:14px;padding:12px 14px;background:rgba(239,68,68,0.04);border-radius:10px;border-right:3px solid var(--red);}.scenario::before{content:'\U0001f6a8 \u05ea\u05e8\u05d7\u05d9\u05e9: ';font-weight:700;color:var(--red);}
.qt{font-size:14px;font-weight:700;line-height:1.6;margin-bottom:12px;color:var(--acc);}
.opts{display:flex;flex-direction:column;gap:6px;}.opt{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;text-align:right;width:100%;color:var(--text);font-family:'Heebo',sans-serif;font-size:12px;line-height:1.5;}.opt:hover{border-color:var(--acc);background:var(--ad);}
.ol{width:24px;height:24px;flex-shrink:0;background:var(--ad);border:1px solid rgba(20,184,166,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--acc);}
.opt.ok{border-color:var(--green);background:var(--gd);}.opt.ok .ol{background:var(--green);color:var(--bg);}.opt.no{border-color:var(--red);background:var(--rd);}.opt.no .ol{background:var(--red);color:#fff;}.opt.dis{pointer-events:none;opacity:.5;}
.fb{margin-top:10px;padding:10px;border-radius:8px;font-size:11px;line-height:1.7;display:none;}.fb.show{display:block;animation:up .3s;}.fb.fok{background:var(--gd);border:1px solid rgba(74,222,128,0.2);color:#86efac;}.fb.fno{background:var(--rd);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.foot{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,var(--bg) 70%,transparent);padding:14px 16px 10px;z-index:50;}.foot-in{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}.fts{display:flex;gap:14px;}.fs{text-align:center;}.fv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--acc);}.fl{font-size:8px;color:var(--t2);}
.nb{background:linear-gradient(135deg,var(--acc),#0d9488);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:'Heebo',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}.nb:disabled{opacity:.3;cursor:not-allowed;}
.res{display:none;text-align:center;padding:30px 16px;position:relative;z-index:1;}.res.show{display:block;animation:up .5s;}.re{font-size:50px;margin-bottom:10px;}.rt{font-size:20px;font-weight:900;margin-bottom:6px;}.rsu{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:16px;}
.rg{display:inline-block;font-family:'Space Mono',monospace;font-size:36px;font-weight:700;padding:8px 24px;border-radius:12px;margin-bottom:16px;}.ga{background:var(--gd);color:var(--green);border:2px solid var(--green);}.gb{background:var(--ad);color:var(--acc);border:2px solid var(--acc);}.gc{background:rgba(251,146,60,0.1);color:var(--gold);border:2px solid var(--gold);}.gf{background:var(--rd);color:var(--red);border:2px solid var(--red);}
.retry{margin-top:14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 24px;color:var(--acc);font-family:'Heebo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
</style></head><body><div class="grid"></div>
<header><div class="logo"><div class="icon">🔒</div><div><h1>Lab — פרק 1</h1><div class="sub">CIA Triad: יסודות אבטחת מידע</div></div></div><div class="badge"><div class="dot"></div><span id="timer">00:00</span></div></header>
<div class="pbar"><div class="ptr"><div class="pfl" id="pfl" style="width:0%"></div></div><div class="plbl" id="plbl">0 / 10</div></div>
<div class="wrap" id="area"></div><div class="res" id="resScr"></div>
<div class="foot" id="foot"><div class="foot-in"><div class="fts"><div class="fs"><div class="fv" id="sS">0</div><div class="fl">נקודות</div></div><div class="fs"><div class="fv" id="sC">0</div><div class="fl">נכונות</div></div><div class="fs"><div class="fv" id="sK">0</div><div class="fl">רצף🔥</div></div></div><button class="nb" id="nBtn" disabled onclick="nextQ()">הבא ←</button></div></div>
<script>
(function(){
// [theory, scenario|null, question, [opts], correctIdx, explanation]
// BALANCED: correct answer index varies (0-3), lengths are similar
var QS=[
["<strong>CIA Triad</strong> הוא המודל הבסיסי באבטחת מידע: <strong>Confidentiality</strong> (סודיות), <strong>Integrity</strong> (שלמות), <strong>Availability</strong> (זמינות). כל התקפה פוגעת לפחות באחד מהם.",
"האקר העתיק מסד נתונים עם 10 מיליון מספרי כרטיסי אשראי. המידע בשרת נשאר שלם ולא שונה.",
"באיזה עיקרון של CIA נפגע?",
["Integrity \u2014 שלמות המידע","Availability \u2014 זמינות השירות","Confidentiality \u2014 סודיות","כל שלושת העקרונות בו-זמנית"],2,
"המידע נחשף למי שלא מורשה = פגיעה בסודיות. Integrity לא נפגעה (לא שונה). Availability לא נפגעה (השרת עובד). זו דליפת מידע קלאסית."],

["<strong>Confidentiality</strong> מבטיחה שמידע נגיש רק למורשים. כלים: הצפנה, בקרת גישה, אימות, סיווג מידע.",
null,
"תוקף השיג גישה לקובץ מוצפן ב-AES-256. מה המצב?",
["התוקף יכול לקרוא את הקובץ בקלות","ההצפנה לא רלוונטית כי הקובץ כבר אצלו","הקובץ חסר ערך בלי מפתח הפענוח","התוקף יכול לפרוץ AES-256 עם מחשב חזק"],2,
"AES-256 = ללא המפתח, הקובץ הוא ג'יבריש. גם מחשב קוונטי לא שובר AES-256. הצפנה = שכבת ההגנה האחרונה: גם אם הכל נכשל, התוכן לא קריא."],

["<strong>Integrity</strong> מבטיחה שהמידע לא שונה ללא הרשאה. כלים: Hashing (SHA-256), חתימות דיגיטליות, File Integrity Monitoring (AIDE, Tripwire).",
"קובץ configuration של Firewall שונה בלילה. אף אחד לא היה אמור לגעת בו.",
"איזה כלי היה מזהה את השינוי?",
["Firewall נוסף מאחורי הראשון","אנטי-וירוס שסורק את השרת מדי יום","הצפנת הקובץ ב-TLS כך שלא ניתן לשנות","File Integrity Monitoring שמתריע על שינויי hash"],3,
"FIM (כמו AIDE/Tripwire) מחשב hash של קבצים קריטיים. כש-hash משתנה = התראה. FIM מזהה שינויים, TLS מגן בתעבורה (לא בקבצים), AV מחפש malware (לא שינויי config)."],

["<strong>Availability</strong> מבטיחה שהמערכת נגישה כשצריך. DDoS = הדוגמה הקלאסית לפגיעה בזמינות.",
"אתר e-commerce נפל ל-6 שעות ב-Black Friday בגלל DDoS של 500Gbps.",
"מה היה מונע את הנפילה?",
["שירות DDoS mitigation כמו Cloudflare","הצפנת כל התעבורה ב-TLS 1.3","סיסמאות חזקות יותר לצוות ה-IT","הוספת אנטי-וירוס מתקדם לשרת"],0,
"Cloudflare/AWS Shield סופגים מיליוני בקשות בedge, מסננים תעבורה זדונית. 500Gbps = גדול מדי לשרת בודד, אבל CDN עם 100Tbps capacity מתמודד. הצפנה, סיסמאות, AV לא רלוונטיים ל-DDoS."],

["<strong>Authentication</strong> = מי אתה? שלוש קטגוריות: Something you know (סיסמה), Something you have (טלפון, Yubikey), Something you are (טביעת אצבע). MFA = שילוב של שתיים+.",
null,
"סיסמה + קוד SMS \u2014 האם זה MFA?",
["לא \u2014 שניהם Something you know","לא \u2014 SMS לא נחשב factor","כן \u2014 סיסמה (know) + טלפון (have)","כן \u2014 אבל רק אם הסיסמה מעל 12 תווים"],2,
"סיסמה = know, טלפון שמקבל SMS = have. זה MFA. אבל SMS לא הכי מאובטח (SIM Swapping). עדיף TOTP (Google Authenticator) או FIDO2 (Yubikey). SMS MFA עדיין הרבה יותר טוב מסיסמה בלבד."],

["<strong>Authorization</strong> = מה מותר לך? Authentication = \"מי אתה?\", Authorization = \"מה מותר?\". עיקרון Least Privilege: מינימום הרשאות הכרחי.",
"מפתח Junior קיבל הרשאות admin ב-production \"כי ככה נוח\". מחק בטעות טבלת users.",
"איזה עיקרון הופר?",
["Defense in Depth \u2014 לא היו מספיק שכבות הגנה","CIA Triad \u2014 כל שלושת העקרונות נפגעו","Separation of Duties \u2014 אותו אדם יצר ומחק","Least Privilege \u2014 קיבל יותר מדי הרשאות"],3,
"Junior צריך read-only ל-production. Admin = יכול למחוק הכל. RBAC עם תפקידים (dev_readonly, admin_prod) ותהליך approval לפעולות מסוכנות."],

["<strong>Defense in Depth</strong> = ריבוי שכבות הגנה. כמו טירה: חפיר + חומה + שומרים + דלתות. ברשת: Firewall + IDS + AV + Encryption + Access Control + Monitoring.",
"תוקף עבר Firewall בגלל zero-day. ה-IDS זיהה התנהגות חריגה ו-SOC בודד את המכונה תוך 3 דקות.",
"מה עבד כאן?",
["Least Privilege","Defense in Depth","Confidentiality בלבד","הFirewall עשה את העבודה"],1,
"שכבה 1 (Firewall) נכשלה. שכבה 2 (IDS) תפסה. שכבה 3 (SOC) הגיבה. שכבה 4 (Isolation) הכילה. בלי ריבוי שכבות, התוקף היה בפנים ללא מפריע."],

["<strong>Non-Repudiation</strong> = אי-הכחשה. מי שביצע פעולה לא יוכל להכחיש. כלים: Audit Logs, חתימות דיגיטליות, timestamps.",
"עובד העביר 100K לחשבון פרטי וטוען שלא הוא.",
"מה מוכיח שהוא ביצע?",
["הצפנת הTransaction ב-TLS","Firewall שחסם ניסיונות חיצוניים","גיבוי של מסד הנתונים מלפני ההעברה","Audit log עם MFA approval, IP, timestamp, session"],3,
"שרשרת ראיות: MFA approved מהטלפון שלו + session log + IP מהמשרד + timestamp בשעות עבודה = אי-הכחשה. TLS מגן על תעבורה, לא מוכיח זהות. Firewall לא רלוונטי. Backup לא מוכיח מי עשה."],

["<strong>Risk = Threat \u00d7 Vulnerability \u00d7 Impact</strong>. ארבע אסטרטגיות: Mitigate (הפחת), Transfer (העבר), Accept (קבל), Avoid (הימנע).",
null,
"חברה קונה ביטוח סייבר במקום לבנות SOC. איזו אסטרטגיה?",
["Avoid","Mitigate","Transfer","Accept"],2,
"Transfer = מעבירה את הסיכון הכספי לחברת הביטוח. לא מפחיתה סבירות (Mitigate), לא נמנעת (Avoid), לא מקבלת (Accept). עדיין צריך baseline security \u2014 ביטוח לא ישלם אם אין אבטחה בסיסית."],

["<strong>Security Policies</strong>: Password Policy, Acceptable Use, Incident Response, Data Classification. Policy ללא enforcement = נייר חסר ערך.",
"Password Policy: 8 תווים, ללא MFA, ללא נעילה אחרי ניסיונות כושלים, החלפה כל 90 יום.",
"מה הבעיה הגדולה?",
["8 תווים מספיקים לרוב המקרים","החלפה כל 90 יום גורמת לסיסמאות חלשות ול-Post-it על המסך","אין בעיה \u2014 זו מדיניות סטנדרטית בארגונים","ללא MFA וללא נעילה = brute force ללא הגבלה"],3,
"NIST 2024: 12+ תווים, MFA חובה, lockout אחרי 5 ניסיונות, ללא החלפה תקופתית. ללא MFA = סיסמה גנובה = גישה. ללא lockout = brute force אינסופי. גם החלפה כל 90 יום בעייתית, אבל הסיכון הגדול ביותר הוא ללא MFA+lockout."]
];
var L="\u05D0\u05D1\u05D2\u05D3",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){var a=document.getElementById('area');a.innerHTML='';
for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;
var scenH=q[1]?'<div class="scenario">'+esc(q[1])+'</div>':'';
var optsH='<div class="opts">';for(var j=0;j<q[3].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[3][j])+'</span></button>';}optsH+='</div>';
card.innerHTML='<div class="qh"><span class="qtag">\u05e9\u05d0\u05dc\u05d4 '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="theory">'+q[0]+'</div>'+scenH+'<div class="qt">'+esc(q[2])+'</div>'+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';
a.appendChild(card);}
a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});}
function handleA(qi,oi){if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[4];var ok=oi===ci;ans[qi]=ok;
var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}
var fb=document.getElementById('fb-'+qi);if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='\u2705 \u05e0\u05db\u05d5\u05df! +10'+(sk>=3?' (+5 \u05e8\u05e6\u05e3!)':'');}else{sk=0;fb.className='fb show fno';fb.textContent='\u274C \u05dc\u05d0 \u05e0\u05db\u05d5\u05df';}
fb.appendChild(document.createElement('br'));fb.appendChild(document.createTextNode(q[5]));
document.getElementById('sS').textContent=sc;document.getElementById('sC').textContent=cc;document.getElementById('sK').textContent=sk;
document.getElementById('pfl').style.width=(((qi+1)/QS.length)*100)+'%';document.getElementById('plbl').textContent=(qi+1)+' / '+QS.length;
var nb=document.getElementById('nBtn');nb.disabled=false;if(qi>=QS.length-1)nb.textContent='\U0001f4ca \u05ea\u05d5\u05e6\u05d0\u05d5\u05ea';}
window.nextQ=function(){if(cur>=QS.length-1){showRes();return;}document.getElementById('qc-'+cur).classList.remove('active');cur++;document.getElementById('qc-'+cur).classList.add('active');document.getElementById('nBtn').disabled=true;document.getElementById('qc-'+cur).scrollIntoView({behavior:'smooth',block:'center'});};
function showRes(){document.getElementById('area').style.display='none';document.getElementById('foot').style.display='none';var rs=document.getElementById('resScr');rs.classList.add('show');
var pct=sc/(QS.length*10);var g,gc;if(pct>=.9){g='A+';gc='ga';}else if(pct>=.75){g='B';gc='gb';}else if(pct>=.55){g='C';gc='gc';}else{g='F';gc='gf';}
var m=String(Math.floor(ts/60)).padStart(2,'0');var s=String(ts%60).padStart(2,'0');
rs.innerHTML='<div class="re">'+(pct>=.9?'\U0001f3c6':pct>=.75?'\U0001f3af':pct>=.55?'\U0001f4da':'\U0001f4aa')+'</div><div class="rt" style="color:'+(pct>=.75?'var(--acc)':'var(--gold)')+'">'+
(pct>=.9?'CIA Triad Master!':pct>=.75?'\u05de\u05e6\u05d5\u05d9\u05df!':pct>=.55?'\u05d1\u05d3\u05e8\u05da \u05d4\u05e0\u05db\u05d5\u05e0\u05d4':'\u05e6\u05e8\u05d9\u05da \u05d7\u05d6\u05e8\u05d4')+'</div><div class="rsu">'+cc+'/'+QS.length+' | '+sc+' \u05e0\u05e7\' | '+m+':'+s+' | \u05e8\u05e6\u05e3: '+mx+'</div><div class="rg '+gc+'">'+g+'</div><br><button class="retry" onclick="location.reload()">\u05e0\u05e1\u05d4 \u05e9\u05d5\u05d1 \u21bb</button>';}
render();})();
</script>
</body>
</html>
