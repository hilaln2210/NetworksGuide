<script>
(function(){
var QS=[

["<strong>PICERL</strong> — מחזור חיי תגובה לאירוע: <strong>P</strong>reparation (הכנה), <strong>I</strong>dentification (זיהוי), <strong>C</strong>ontainment (בלימה), <strong>E</strong>radication (מחיקה), <strong>R</strong>ecovery (שיקום), <strong>L</strong>essons Learned (לקחים). סדר הוא קריטי — דילוג שלב = כשל.",
"התגלתה מתקפת ransomware בשרת production. הצוות מיד פורמט את הדיסק ומתקין מחדש.",
"איזה שלב PICERL דולגה ומה הבעיה?",
["Preparation — לא הכינו playbook מראש","Identification — לא זיהו את סוג הנוזקה","Containment — לא בלמו את ההתפשטות ברשת לפני ניקוי","Eradication — השתמשו בפורמט במקום בכלי ייעודי"],2,
"לפני ניקוי חייבים לבלום — לנתק מהרשת, לבדוק אילו מערכות נוספות נפגעו. פורמט מיידי מוחק ראיות פורנזיות ומאפשר לנוזקה להישאר בשרתים אחרים. Containment קודם, אחר כך Eradication."],

["<strong>Order of Volatility</strong> — עיקרון פורנזי: אסוף ראיות לפי סדר ההתנדפות (הכי ארעי ראשון). RAM > Network Connections > Processes > Disk Cache > Disk > Logs > Backups.",
"חוקר פורנזי מגיע לאחר פריצה. המחשב דולק. מה עליו לאסוף ראשון?",
"מה ראשון לאיסוף?",
["לוגי מערכת מדיסק C:\\Windows\\System32\\Logs","snapshot של הדיסק השלם עם FTK Imager","תוכן ה-RAM — זיכרון נדיף שנמחק עם כיבוי","Backup האחרון מה-NAS"],2,
"RAM מכיל: passwords בזיכרון, processes פעילים, network sockets, הצפנת ransomware לפני כתיבה לדיסק. כיבוי = אובדן כל זה. כלים: Volatility, WinPmem, DumpIt. Disk image חשוב, אבל RAM קודם."],

["<strong>Containment</strong> — שתי גישות: <strong>Short-term</strong> (ניתוק מיידי, שמירת ראיות) vs <strong>Long-term</strong> (פתרון מלא). Isolate ≠ Shut down: כיבוי מוחק RAM, ניתוק שומר אותו.",
"מנהל IT שומע שיש malware ברשת. הוא כובה את כל השרתים כדי לעצור את ההתפשטות.",
"מה הבעיה בגישה זו?",
["כיבוי לוקח יותר זמן מניתוק","כיבוי מוחק ראיות נדיפות ב-RAM ומסרבל שחזור","צריך לכבות רק שרתים נפגעים, לא את כולם","כיבוי ללא הרשאת CISO אסור"],1,
"Isolate = ניתוק כבלי רשת / VLAN segmentation — שומר RAM, ממשיך לאסוף ראיות. Shutdown = מוחק כל מה שב-RAM: malware artifacts, encryption keys, active connections. IRP (Incident Response Plan) חייב להגיד Isolate, לא Shutdown."],

["<strong>IOC vs TTP</strong>: <strong>IOC</strong> (Indicators of Compromise) = סימנים שאירוע כבר קרה: IP, hash של קובץ, domain. <strong>TTP</strong> (Tactics, Techniques, Procedures) = שיטות התקיפה — רמה גבוהה יותר, שינוי IOC לא עוזר.",
null,
"תוקף משנה את ה-hash של הmalware שלו בכל גרסה. אילו IOC נשארים רלוונטיים?",
["hash של הקובץ — כי רוב הAV מסתמך עליו","IP של C2 server — לא ניתן לשנות","דפוסי ההתנהגות: process injection, registry persistence, lateral movement","שם הקובץ — תוקפים לא משנים שמות"],2,
"TTP = הכי קשה לשינוי. תוקף יכול לשנות hash, IP, שם קובץ בדקות. אבל שיטת ה-lateral movement, ה-persistence mechanism, ה-C2 communication pattern — נשארים. MITRE ATT&CK ממפה TTPs, לא IOCs."],

["<strong>Chain of Custody</strong> — עיקרון משפטי: שמירת שלמות הראיות הדיגיטליות. כל פעולה מתועדת: מי, מתי, מה, למה. ראיה ללא chain of custody = פסולה בבית משפט.",
"חוקר לוקח image של דיסק שנפגע, עובד עליו ישירות ומוחק בטעות קבצים.",
"מה ההפרה ומה הפתרון?",
["הפרת Confidentiality — צריך הצפנה","הפרת Integrity — צריך לעבוד על עותק עם hash verification","הפרת Availability — צריך backup נוסף","אין הפרה — מחיקה בשגגה היא לגיטימית"],1,
"כלל בסיסי: לעולם לא עובדים על הראיה המקורית. תהליך: 1) Image עם כלי כמו dd/FTK, 2) חישוב MD5/SHA-256 של הoriginal ו-Image, 3) עבודה על עותק. שינוי בoriginal = ראיה פסולה בבית משפט."],

["<strong>SIEM</strong> (Security Information and Event Management) — מרכז איסוף וניתוח לוגים. מגלה anomalies, מקשר אירועים, מייצר alerts. Splunk, Microsoft Sentinel, IBM QRadar.",
"SIEM מראה: 50,000 ניסיונות login כושלים ב-60 שניות מ-IP אחד, ואחריהם login מוצלח אחד.",
"מה מתרחש ומה מייצג ה-login המוצלח?",
["DDoS על שרת ה-Auth — login מוצלח הוא coincidence","Brute Force attack שהצליח — ה-IP פרץ את החשבון","Port Scanning — login מוצלח הוא סוכן פנימי","SQL Injection — login מוצלח עקף authentication"],1,
"50K ניסיונות → 1 הצלחה = Brute Force קלאסי. Login המוצלח = הפריצה. תגובה נדרשת: נעל החשבון, בלום IP, בדוק מה נגע אחרי הlogin, הפעל IR process. SIEM אמור להתריע על lockout threshold הרבה לפני הצלחה."],

["<strong>Memory Forensics</strong> — ניתוח RAM לאחר אירוע. כלי מרכזי: <strong>Volatility</strong>. ניתן לחלץ: processes, network connections, passwords, DLLs טעונים, injected shellcode.",
"חוקר מריץ Volatility ומוצא process בשם svchost.exe עם parent process של cmd.exe ו-network connection חיצוני.",
"מה חשוד?",
["svchost.exe לגיטימי — כך Windows עובד","svchost.exe תמיד מה-services.exe, לא cmd.exe — זה process injection","cmd.exe הוא parent לגיטימי של שירותי מערכת","network connection חיצוני לא מחשיד ב-svchost"],1,
"svchost.exe לגיטימי → parent חייב להיות services.exe. Parent = cmd.exe = מישהו הריץ svchost ידנית = Process Hollowing / DLL Injection. Network connection חיצוני = C2 communication. Volatility plugins: pstree, netscan, malfind."],

["<strong>Ransomware Response</strong> — אחד האירועים הנפוצים. שאלת מיליון הדולר: לשלם או לא? CISA ממליצה לא לשלם. שלבי תגובה ייחודיים: זיהוי וריאנט, בדיקת No-More-Ransom, שחזור מbackup.",
"חברה קיבלה ransomware. כל הקבצים מוצפנים. יש להם backup מלפני 3 ימים. התוקפים דורשים 50K דולר תוך 48 שעות.",
"מה הצעד הנכון ראשון?",
["לשלם — 3 ימי נתונים שווים יותר מ-50K","להפעיל backup מיידית לפני בדיקה נוספת","לזהות את וריאנט הransomware ולבדוק No-More-Ransom לפענוח חינמי","לנהל משא ומתן על הורדת המחיר"],2,
"No-More-Ransom (nomoreransom.org) מכיל decryptors חינמיים לעשרות וריאנטים. לשלם: לא מובטח שמקבלים מפתח, מממן תוקפים, עלול להיות בעיה משפטית. Backup: לפני שמפעילים — לוודא שהנוזקה מסולקת, אחרת תצפין שוב."],

["<strong>Digital Forensics Timeline</strong> — שחזור ציר זמן של האירוע. מקורות: לוגי מערכת (Event Logs), filesystem timestamps (MAC — Modified, Accessed, Created), browser history, SIEM.",
"חוקר מגלה שקובץ זדוני נוצר ב-03:17 אך timestamp ב-Windows Explorer מראה שעה אחרת.",
"למה הפער?",
["Windows Explorer מציג UTC, הקובץ נשמר בשעון מקומי","Timestomping — תוקף שינה ידנית את הtimestamp כדי לבלבל","הכונן הקשיח פגום ומציג מידע שגוי","הקובץ הועבר מ-timezone אחרת"],1,
"Timestomping = שינוי ידני של timestamps כטכניקת anti-forensics. כלים: timestomp, Meterpreter. זיהוי: חוסר עקביות בין MFT timestamps ל-$STANDARD_INFORMATION ל-$FILE_NAME. כלי: MFT2CSV, Plaso/log2timeline."],

["<strong>Lessons Learned / After Action Report (AAR)</strong> — השלב האחרון והנשכח ביותר. שאלות: מה קרה? מה עבד? מה לא? מה משנים? ללא AAR — אותה פריצה תחזור.",
null,
"מה הפלט המתאים ביותר מ-AAR?",
["דוח שמאשים את עובד ה-IT שטעה","העברת הMSP לחברת אבטחה אחרת","רשימת שיפורים: playbook מעודכן, הדרכות, כלים חדשים, KPIs","הכרזה ציבורית על האירוע ברשתות החברתיות"],2,
"AAR = Blameless Postmortem. לא מחפשים אשמים — מחפשים פגמים מערכתיים. תוצרים: עדכון IRP, הדרכות לצוות, כלים שחסרו, שיפורי monitoring. KPIs: MTTD (Mean Time to Detect), MTTR (Mean Time to Respond). חברה שלא עושה AAR תסבול מאותה פריצה שוב."]

];
var L="אבגד",cur=0,sc=0,cc=0,sk=0,mx=0,ans={},ts=0;
setInterval(function(){ts++;document.getElementById('timer').textContent=String(Math.floor(ts/60)).padStart(2,'0')+':'+String(ts%60).padStart(2,'0');},1000);
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function render(){var a=document.getElementById('area');a.innerHTML='';
for(var i=0;i<QS.length;i++){var q=QS[i];var card=document.createElement('div');card.className='qc'+(i===cur?' active':'');card.id='qc-'+i;
var scenH=q[1]?'<div class="scenario">'+esc(q[1])+'</div>':'';
var optsH='<div class="opts">';for(var j=0;j<q[3].length;j++){optsH+='<button class="opt" id="o-'+i+'-'+j+'" data-i="'+i+'" data-o="'+j+'"><span class="ol">'+L[j]+'</span><span>'+esc(q[3][j])+'</span></button>';}optsH+='</div>';
card.innerHTML='<div class="qh"><span class="qtag">שאלה '+(i+1)+'/'+QS.length+'</span><span class="qpts">+10</span></div><div class="qb"><div class="theory">'+q[0]+'</div>'+scenH+'<div class="qt">'+esc(q[2])+'</div>'+optsH+'<div class="fb" id="fb-'+i+'"></div></div>';
a.appendChild(card);}
a.addEventListener('click',function(e){var o=e.target.closest('.opt');if(o)handleA(parseInt(o.getAttribute('data-i')),parseInt(o.getAttribute('data-o')));});}
function handleA(qi,oi){if(ans[qi]!==undefined)return;var q=QS[qi];var ci=q[4];var ok=oi===ci;ans[qi]=ok;
var bs=document.querySelectorAll('[id^="o-'+qi+'-"]');for(var j=0;j<bs.length;j++){if(j===ci)bs[j].classList.add('ok');else if(j===oi&&!ok)bs[j].classList.add('no');bs[j].classList.add('dis');}
var fb=document.getElementById('fb-'+qi);if(ok){cc++;sc+=10;sk++;if(sk>mx)mx=sk;if(sk>=3)sc+=5;fb.className='fb show fok';fb.textContent='✅ נכון! +10'+(sk>=3?' (+5 רצף!)':'');}else{sk=0;fb.className='fb show fno';fb.textContent='❌ לא נכון';}
