<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעבדה: קריפטוגרפיה</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08070e;
    --bg2: #0f0e18;
    --bg3: #181624;
    --border: #2a2740;
    --violet: #a78bfa;
    --violet-dim: rgba(167,139,250,0.1);
    --pink: #f472b6;
    --pink-dim: rgba(244,114,182,0.1);
    --emerald: #34d399;
    --emerald-dim: rgba(52,211,153,0.08);
    --red: #fb7185;
    --red-dim: rgba(251,113,133,0.1);
    --gold: #fcd34d;
    --gold-dim: rgba(252,211,77,0.1);
    --text: #e4e0f0;
    --text2: #9490ab;
    --text3: #524e6a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  .matrix-bg {
    position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(167,139,250,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 30%, rgba(244,114,182,0.03) 0%, transparent 50%);
  }

  header {
    position:sticky;top:0;z-index:50;
    background:linear-gradient(180deg,#0c0b15 0%,var(--bg) 100%);
    border-bottom:1px solid var(--border);
    padding:14px 16px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .hdr-left{display:flex;align-items:center;gap:10px;}
  .hdr-icon{
    width:38px;height:38px;border-radius:10px;
    background:linear-gradient(135deg,var(--violet),var(--pink));
    display:flex;align-items:center;justify-content:center;font-size:20px;
  }
  .hdr-title{font-family:'Fira Code',monospace;font-size:15px;color:var(--violet);}
  .hdr-sub{font-size:11px;color:var(--text2);font-weight:400;}

  .key-badge{
    background:var(--bg3);border:1px solid var(--border);border-radius:20px;
    padding:5px 12px;font-family:'Fira Code',monospace;font-size:12px;color:var(--gold);
    display:flex;align-items:center;gap:6px;
  }

  .prog-bar{
    background:var(--bg2);border-bottom:1px solid var(--border);
    padding:8px 16px;display:flex;align-items:center;gap:10px;
  }
  .prog-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--violet),var(--pink));border-radius:3px;transition:width 0.6s;}
  .prog-lbl{font-family:'Fira Code',monospace;font-size:11px;color:var(--text2);white-space:nowrap;}

  .content{padding:16px;padding-bottom:110px;position:relative;z-index:1;}

  .lab-card{
    background:var(--bg2);border:1px solid var(--border);border-radius:14px;
    overflow:hidden;margin-bottom:14px;display:none;
  }
  .lab-card.active{display:block;animation:rise 0.4s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  .card-top{
    padding:14px 16px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
  }
  .topic-tag{
    font-family:'Fira Code',monospace;font-size:10px;font-weight:700;
    padding:3px 10px;border-radius:20px;letter-spacing:1px;
  }
  .tag-sym{background:var(--violet-dim);color:var(--violet);}
  .tag-asym{background:var(--pink-dim);color:var(--pink);}
  .tag-hash{background:var(--emerald-dim);color:var(--emerald);}
  .tag-attack{background:var(--red-dim);color:var(--red);}
  .tag-protocol{background:var(--gold-dim);color:var(--gold);}

  .xp-tag{font-family:'Fira Code',monospace;font-size:13px;font-weight:700;color:var(--gold);}

  .card-body{padding:16px;}
  .q-title{font-size:17px;font-weight:700;margin-bottom:8px;line-height:1.5;}
  .q-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:16px;}

  .crypto-visual{
    background:#06050c;border:1px solid var(--border);border-radius:10px;
    padding:16px;margin-bottom:16px;
    font-family:'Fira Code',monospace;font-size:12px;line-height:2;
    direction:ltr;text-align:left;
    color:var(--text2);position:relative;overflow-x:auto;
  }
  .crypto-visual .tag{
    position:absolute;top:8px;right:10px;font-size:9px;color:var(--text3);
    background:var(--bg3);padding:2px 8px;border-radius:4px;
  }
  .cv-key{color:var(--violet);}
  .cv-plain{color:var(--emerald);}
  .cv-cipher{color:var(--pink);}
  .cv-hash{color:var(--gold);}
  .cv-danger{color:var(--red);background:var(--red-dim);padding:0 4px;border-radius:3px;}
  .cv-comment{color:var(--text3);font-style:italic;}

  .opts{display:flex;flex-direction:column;gap:8px;}
  .opt{
    display:flex;align-items:center;gap:10px;
    background:var(--bg3);border:1px solid var(--border);
    border-radius:10px;padding:12px 14px;
    cursor:pointer;transition:all 0.2s;
    text-align:right;width:100%;
    color:var(--text);font-family:'Heebo',sans-serif;font-size:13px;line-height:1.5;
  }
  .opt:hover{border-color:var(--violet);background:var(--violet-dim);}
  .opt-l{
    width:28px;height:28px;flex-shrink:0;
    background:var(--violet-dim);border:1px solid rgba(167,139,250,0.2);
    border-radius:7px;display:flex;align-items:center;justify-content:center;
    font-family:'Fira Code',monospace;font-size:12px;font-weight:700;color:var(--violet);
  }
  .opt.correct{border-color:var(--emerald);background:var(--emerald-dim);}
  .opt.correct .opt-l{background:var(--emerald);color:var(--bg);border-color:var(--emerald);}
  .opt.wrong{border-color:var(--red);background:var(--red-dim);}
  .opt.wrong .opt-l{background:var(--red);color:#fff;border-color:var(--red);}
  .opt.disabled{pointer-events:none;opacity:0.5;}

  .fb{margin-top:14px;padding:12px;border-radius:10px;font-size:13px;line-height:1.7;display:none;}
  .fb.show{display:block;animation:rise 0.3s ease;}
  .fb.ok{background:var(--emerald-dim);border:1px solid rgba(52,211,153,0.2);color:#6ee7b7;}
  .fb.fail{background:var(--red-dim);border:1px solid rgba(251,113,133,0.2);color:#fda4af;}

  /* Interactive Caesar */
  .caesar-tool{
    background:#06050c;border:1px solid var(--border);border-radius:10px;
    padding:14px;margin-bottom:16px;
  }
  .caesar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;direction:ltr;}
  .caesar-label{font-family:'Fira Code',monospace;font-size:11px;color:var(--text3);min-width:60px;}
  .caesar-input{
    flex:1;background:var(--bg3);border:1px solid var(--border);
    border-radius:6px;padding:8px 10px;
    font-family:'Fira Code',monospace;font-size:13px;color:var(--emerald);outline:none;
  }
  .caesar-input:focus{border-color:var(--violet);}
  .shift-controls{display:flex;align-items:center;gap:8px;}
  .shift-btn{
    width:32px;height:32px;border-radius:6px;
    background:var(--violet-dim);border:1px solid rgba(167,139,250,0.2);
    color:var(--violet);font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-family:'Fira Code',monospace;
  }
  .shift-btn:hover{background:rgba(167,139,250,0.2);}
  .shift-val{
    font-family:'Fira Code',monospace;font-size:18px;font-weight:700;
    color:var(--violet);min-width:30px;text-align:center;
  }
  .caesar-output{
    background:var(--bg);border:1px solid var(--border);
    border-radius:6px;padding:8px 10px;
    font-family:'Fira Code',monospace;font-size:13px;color:var(--pink);
    min-height:36px;direction:ltr;
  }

  /* Footer */
  .foot{
    position:fixed;bottom:0;left:0;right:0;
    background:linear-gradient(0deg,var(--bg) 70%,transparent);
    padding:20px 16px 16px;z-index:50;
  }
  .foot-inner{
    background:var(--bg2);border:1px solid var(--border);
    border-radius:14px;padding:12px 16px;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 0 30px rgba(167,139,250,0.06);
  }
  .st{text-align:center;}
  .st .v{font-family:'Fira Code',monospace;font-size:20px;font-weight:700;color:var(--violet);}
  .st .l{font-size:10px;color:var(--text2);margin-top:2px;}

  .nbtn{
    background:linear-gradient(135deg,var(--violet),var(--pink));
    color:#fff;border:none;border-radius:10px;
    padding:10px 22px;font-family:'Heebo',sans-serif;
    font-weight:700;font-size:14px;cursor:pointer;
    transition:transform 0.15s;
  }
  .nbtn:hover{transform:scale(1.03);}
  .nbtn:disabled{opacity:0.3;cursor:not-allowed;transform:none;}

  .result{display:none;text-align:center;padding:40px 20px;}
  .result.show{display:block;}
  .result .emoji{font-size:60px;margin-bottom:16px;}
  .result .title{font-size:24px;font-weight:900;margin-bottom:8px;color:var(--violet);}
  .result .sub{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:24px;}
  .result-stats{display:flex;gap:20px;justify-content:center;}
  .rs .rv{font-family:'Fira Code',monospace;font-size:28px;font-weight:700;color:var(--violet);}
  .rs .rl{font-size:11px;color:var(--text2);}
</style>
<style id="ng-light">
[data-theme="light"] {
  --bg: #f8fafc; --bg2: #f1f5f9; --bg3: #e8eef5;
  --border: #cbd5e1;
  --lime: #65a30d; --lime-dim: rgba(101,163,13,0.1);
  --red: #dc2626; --red-dim: rgba(220,38,38,0.08);
  --amber: #d97706; --amber-dim: rgba(217,119,6,0.08);
  --sky: #0284c7; --sky-dim: rgba(2,132,199,0.08);
  --text: #0f172a; --text2: #334155; --text3: #64748b;
}
</style>
<script src="/_bridge.js"></script>
</head>
<body>
<div class="matrix-bg"></div>

<header>
  <div class="hdr-left">
    <div class="hdr-icon">🔐</div>
    <div>
      <div class="hdr-title">Crypto Lab</div>
      <div class="hdr-sub">פרק 7 — קריפטוגרפיה</div>
    </div>
  </div>
  <div class="key-badge">🔑 <span id="keysFound">0</span>/5</div>
</header>

<div class="prog-bar">
  <div class="prog-track"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
  <div class="prog-lbl" id="pLbl">0 / 5</div>
</div>

<div class="content" id="area"></div>

<div class="result" id="resultScreen">
  <div class="emoji" id="rEmoji">🔓</div>
  <div class="title" id="rTitle"></div>
  <div class="sub" id="rSub"></div>
  <div class="result-stats">
    <div class="rs"><div class="rv" id="rKeys">0/5</div><div class="rl">🔑 מפתחות</div></div>
    <div class="rs"><div class="rv" id="rXP">0</div><div class="rl">⚡ XP</div></div>
  </div>
</div>

<div class="foot" id="footBar">
  <div class="foot-inner">
    <div class="st"><div class="v" id="sCorrect">0</div><div class="l">🔑 מפתחות</div></div>
    <div class="st"><div class="v" id="sXP">0</div><div class="l">⚡ XP</div></div>
    <button class="nbtn" id="nBtn" disabled onclick="next()">הבא →</button>
  </div>
</div>

<script>
const labs = [
  {
    title: "פענח את ההצפנה — Caesar Cipher",
    desc: "יירטנו הודעה מוצפנת. השתמש בכלי למטה כדי לשחק עם ה-shift ולמצוא את הטקסט המקורי.",
    topic: "SYMMETRIC", topicClass: "tag-sym", xp: 25,
    type: "caesar",
    ciphertext: "WKLV LV D VHFUHW PHVVDJH",
    answer: "THIS IS A SECRET MESSAGE",
    shift: 3,
    explanation: "Caesar Cipher מזיז כל אות X מקומות. כאן ה-shift הוא 3: W→T, K→H, L→I... זוהי הצפנה סימטרית קלאסית — אותו מפתח (shift) משמש להצפנה ולפענוח."
  },
  {
    title: "הצפנה סימטרית vs אסימטרית",
    desc: "אליס רוצה לשלוח הודעה מוצפנת לבוב. הם מעולם לא נפגשו ואין להם ערוץ מאובטח לשתף מפתח.",
    topic: "ASYMMETRIC", topicClass: "tag-asym", xp: 30,
    visual: `<span class="cv-comment">// Scenario:</span>
Alice ──<span class="cv-cipher">[ ? ]</span>──▸ Bob

<span class="cv-comment">// Option A: Symmetric (AES)</span>
Key: <span class="cv-key">shared_secret_key</span>
Alice: <span class="cv-plain">encrypt(msg, key)</span> → <span class="cv-cipher">ciphertext</span>
Bob:   <span class="cv-plain">decrypt(ciphertext, key)</span>
<span class="cv-danger">Problem: How to share the key?</span>

<span class="cv-comment">// Option B: Asymmetric (RSA)</span>
Bob's Public Key:  <span class="cv-key">🔓 (everyone can see)</span>
Bob's Private Key: <span class="cv-key">🔐 (only Bob has)</span>
Alice: <span class="cv-plain">encrypt(msg, bob_public)</span> → <span class="cv-cipher">ciphertext</span>
Bob:   <span class="cv-plain">decrypt(ciphertext, bob_private)</span>`,
    visualLabel: "Comparison",
    type: "choice",
    options: [
      { letter:"א", text:"Symmetric (AES) — שניהם ישתמשו באותו מפתח", correct:false },
      { letter:"ב", text:"Asymmetric (RSA) — אליס תצפין עם המפתח הציבורי של בוב", correct:true },
      { letter:"ג", text:"לא צריך הצפנה — HTTPS מספיק", correct:false },
      { letter:"ד", text:"ROT13 — פשוט וקל", correct:false },
    ],
    explanation: "בלי ערוץ מאובטח, אי אפשר לשתף מפתח סימטרי. הפתרון: הצפנה אסימטרית. אליס מצפינה עם המפתח הציבורי של בוב (שכל אחד יכול לראות), ורק בוב יכול לפענח עם המפתח הפרטי שלו."
  },
  {
    title: "Hash Collision — מה לא בסדר?",
    desc: "צוות הפיתוח משתמש ב-MD5 לבדיקת תקינות קבצים. למה זה בעייתי?",
    topic: "HASH", topicClass: "tag-hash", xp: 30,
    visual: `<span class="cv-comment">// File integrity check using MD5</span>

original.exe → MD5 → <span class="cv-hash">d41d8cd98f00b204e9800998ecf8427e</span>

<span class="cv-comment">// Attacker creates a DIFFERENT file with SAME hash!</span>
malware.exe  → MD5 → <span class="cv-hash">d41d8cd98f00b204e9800998ecf8427e</span>  <span class="cv-danger">COLLISION!</span>

<span class="cv-comment">// Better alternatives:</span>
SHA-256 → <span class="cv-hash">e3b0c44298fc1c149afbf4c8996fb92427ae41e...</span> <span class="cv-plain">(256 bit)</span>
SHA-3   → <span class="cv-hash">a7ffc6f8bf1ed766... (more secure)</span>`,
    visualLabel: "Hash Demo",
    type: "choice",
    options: [
      { letter:"א", text:"MD5 איטי מדי לקבצים גדולים", correct:false },
      { letter:"ב", text:"MD5 פגיע ל-Collision Attacks — שני קבצים שונים יכולים לקבל אותו hash", correct:true },
      { letter:"ג", text:"MD5 דורש מפתח חיצוני לפעולה", correct:false },
      { letter:"ד", text:"MD5 הפיך — אפשר לשחזר את הקובץ המקורי", correct:false },
    ],
    explanation: "MD5 נשבר ב-2004 — חוקרים הדגימו collision attacks מעשיים. תוקף יכול ליצור קובץ זדוני עם אותו hash כמו הקובץ המקורי. יש להשתמש ב-SHA-256 או SHA-3 במקום."
  },
  {
    title: "Man-in-the-Middle על TLS",
    desc: "מישהו מתחבר ל-WiFi ציבורי ומקבל אזהרה על תעודת SSL לא תקינה. מה קורה כאן?",
    topic: "ATTACK", topicClass: "tag-attack", xp: 35,
    visual: `<span class="cv-comment">// Normal HTTPS Connection:</span>
Client ──<span class="cv-plain">TLS Handshake</span>──▸ <span class="cv-key">bank.com</span>
         <span class="cv-plain">Certificate: ✅ Valid, CA-signed</span>

<span class="cv-comment">// Man-in-the-Middle Attack:</span>
Client ──<span class="cv-danger">TLS</span>──▸ <span class="cv-danger">ATTACKER</span> ──<span class="cv-plain">TLS</span>──▸ <span class="cv-key">bank.com</span>
         <span class="cv-danger">Certificate: ⚠️ Self-signed!</span>
         <span class="cv-danger">Issuer: Unknown CA</span>

<span class="cv-comment">// Attacker can now:</span>
<span class="cv-danger">READ</span> all traffic (passwords, data)
<span class="cv-danger">MODIFY</span> requests and responses`,
    visualLabel: "MitM Attack",
    type: "choice",
    options: [
      { letter:"א", text:"שגיאת הגדרה בשרת הבנק — לא מסוכן", correct:false },
      { letter:"ב", text:"התעודה פגה תוקף — צריך לחכות שהבנק יחדש", correct:false },
      { letter:"ג", text:"התקפת MitM — מישהו ברשת מיירט ומפענח את התעבורה", correct:true },
      { letter:"ד", text:"בעיית DNS — הדומיין לא מצביע לשרת הנכון", correct:false },
    ],
    explanation: "אזהרת Certificate ב-WiFi ציבורי = סימן קלאסי ל-MitM. התוקף מנפיק תעודה מזויפת, מיירט את החיבור, ויכול לקרוא ולשנות את כל התעבורה. הכלל: לעולם לא ללחוץ 'Continue' על אזהרת תעודה!"
  },
  {
    title: "בחר את הפרוטוקול הנכון",
    desc: "אתה מתכנן ארכיטקטורה לאפליקציית בנקאות. איזה שילוב פרוטוקולים תבחר?",
    topic: "PROTOCOL", topicClass: "tag-protocol", xp: 35,
    visual: `<span class="cv-comment">// Requirements:</span>
✓ הצפנת תעבורה (data in transit)
✓ אימות שרת (server authentication)  
✓ אחסון מאובטח של סיסמאות (password storage)
✓ חתימה דיגיטלית (digital signatures)

<span class="cv-comment">// Option A:</span>
Transit:   <span class="cv-plain">TLS 1.3</span>
Passwords: <span class="cv-plain">bcrypt (salted hash)</span>
Signing:   <span class="cv-plain">RSA-2048 / ECDSA</span>

<span class="cv-comment">// Option B:</span>
Transit:   <span class="cv-danger">HTTP (no encryption)</span>
Passwords: <span class="cv-danger">MD5 (no salt)</span>
Signing:   <span class="cv-danger">None</span>

<span class="cv-comment">// Option C:</span>
Transit:   <span class="cv-plain">TLS 1.2</span>
Passwords: <span class="cv-danger">SHA-1 (no salt)</span>
Signing:   <span class="cv-plain">RSA-1024</span> <span class="cv-danger">(weak)</span>`,
    visualLabel: "Architecture",
    type: "choice",
    options: [
      { letter:"א", text:"Option A — TLS 1.3 + bcrypt + RSA-2048", correct:true },
      { letter:"ב", text:"Option B — מספיק לאפליקציה פנימית", correct:false },
      { letter:"ג", text:"Option C — פשרה טובה בין אבטחה לביצועים", correct:false },
      { letter:"ד", text:"כל האופציות שוות — זה לא משנה איזו בוחרים", correct:false },
    ],
    explanation: "Option A היחידה המאובטחת: TLS 1.3 (ההצפנה העדכנית ביותר), bcrypt עם salt (עמיד ל-rainbow tables), RSA-2048/ECDSA (חתימה חזקה). Option B — אסון אבטחתי. Option C — SHA-1 נשבר ו-RSA-1024 חלש מדי."
  }
];

let cur=0,score=0,xp=0,answered=[];

function caesarDecrypt(text,shift) {
  return text.split('').map(c => {
    if(c >= 'A' && c <= 'Z') return String.fromCharCode(((c.charCodeAt(0)-65-shift+26)%26)+65);
    if(c >= 'a' && c <= 'z') return String.fromCharCode(((c.charCodeAt(0)-97-shift+26)%26)+97);
    return c;
  }).join('');
}

let caesarShift = 0;

function render() {
  const area = document.getElementById('area');
  area.innerHTML = '';
  labs.forEach((lab,i) => {
    const card = document.createElement('div');
    card.className = `lab-card ${i===cur?'active':''}`;
    card.id = `lc-${i}`;

    let inner = '';
    if (lab.type === 'caesar') {
      inner = `
        <div class="caesar-tool">
          <div class="caesar-row">
            <span class="caesar-label">Cipher:</span>
            <input class="caesar-input" value="${lab.ciphertext}" readonly style="color:var(--pink);">
          </div>
          <div class="caesar-row">
            <span class="caesar-label">Shift:</span>
            <div class="shift-controls">
              <button class="shift-btn" onclick="changeShift(-1)">−</button>
              <span class="shift-val" id="shiftVal">0</span>
              <button class="shift-btn" onclick="changeShift(1)">+</button>
            </div>
          </div>
          <div class="caesar-row">
            <span class="caesar-label">Output:</span>
            <div class="caesar-output" id="caesarOut">${lab.ciphertext}</div>
          </div>
        </div>
        <button class="opt" style="justify-content:center;border-color:var(--violet);font-weight:700;" onclick="checkCaesar(${i})">
          🔓 בדוק פענוח
        </button>`;
    } else {
      inner = `
        ${lab.visual ? `<div class="crypto-visual"><span class="tag">${lab.visualLabel}</span>${lab.visual}</div>` : ''}
        <div class="opts">${lab.options.map((o,oi) => `
          <button class="opt" id="o-${i}-${oi}" onclick="pick(${i},${oi},${o.correct})">
            <span class="opt-l">${o.letter}</span>
            <span>${o.text}</span>
          </button>`).join('')}</div>`;
    }

    card.innerHTML = `
      <div class="card-top">
        <span class="topic-tag ${lab.topicClass}">${lab.topic}</span>
        <span class="xp-tag">+${lab.xp} XP</span>
      </div>
      <div class="card-body">
        <div class="q-title">${lab.title}</div>
        <div class="q-desc">${lab.desc}</div>
        ${inner}
        <div class="fb" id="fb-${i}"></div>
      </div>`;
    area.appendChild(card);
  });
}

function changeShift(delta) {
  caesarShift = ((caesarShift + delta) % 26 + 26) % 26;
  document.getElementById('shiftVal').textContent = caesarShift;
  const lab = labs[0];
  document.getElementById('caesarOut').textContent = caesarDecrypt(lab.ciphertext, caesarShift);
}

function checkCaesar(ci) {
  if(answered[ci]) return;
  const lab = labs[ci];
  const output = caesarDecrypt(lab.ciphertext, caesarShift);
  const isCorrect = output === lab.answer;
  answered[ci] = true;
  feedback(ci, isCorrect, lab);
}

function pick(ci,oi,isCorrect) {
  if(answered[ci]) return;
  answered[ci]=true;
  const lab = labs[ci];
  const btns = document.querySelectorAll(`[id^="o-${ci}-"]`);
  btns.forEach((btn,idx)=>{
    if(lab.options[idx].correct) btn.classList.add('correct');
    else if(idx===oi&&!isCorrect) btn.classList.add('wrong');
    btn.classList.add('disabled');
  });
  feedback(ci,isCorrect,lab);
}

function feedback(ci,ok,lab) {
  const fb = document.getElementById(`fb-${ci}`);
  if(ok) {
    score++; xp+=lab.xp;
    fb.className='fb show ok';
    fb.innerHTML=`🔑 מפתח נמצא! +${lab.xp} XP<br>${lab.explanation}`;
  } else {
    fb.className='fb show fail';
    fb.innerHTML=`🔒 לא מדויק<br>${lab.explanation}`;
  }
  document.getElementById('sCorrect').textContent=score;
  document.getElementById('sXP').textContent=xp;
  document.getElementById('keysFound').textContent=score;
  document.getElementById('pFill').style.width=`${((ci+1)/labs.length)*100}%`;
  document.getElementById('pLbl').textContent=`${ci+1} / ${labs.length}`;

  const btn=document.getElementById('nBtn');
  btn.disabled=false;
  if(ci>=labs.length-1) btn.textContent='🔓 סיכום';
}

function next() {
  if(cur>=labs.length-1){showResult();return;}
  document.getElementById(`lc-${cur}`).classList.remove('active');
  cur++;
  document.getElementById(`lc-${cur}`).classList.add('active');
  document.getElementById('nBtn').disabled=true;
}

function showResult() {
  document.getElementById('area').style.display='none';
  const rs=document.getElementById('resultScreen');
  rs.classList.add('show');
  const pct=score/labs.length;
  document.getElementById('rEmoji').textContent=pct>=0.8?'🔓':pct>=0.5?'🔑':'🔒';
  document.getElementById('rTitle').textContent=pct>=0.8?'מאסטר קריפטוגרפיה!':pct>=0.5?'בדרך הנכונה!':'צריך עוד תרגול';
  document.getElementById('rSub').textContent=`אספת ${score} מתוך ${labs.length} מפתחות וצברת ${xp} XP`;
  document.getElementById('rKeys').textContent=`${score}/${labs.length}`;
  document.getElementById('rXP').textContent=xp;
  document.getElementById('footBar').style.display='none';
}

render();
</script>
</body>
</html>
