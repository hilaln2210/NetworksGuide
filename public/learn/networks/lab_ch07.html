<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>⚗️ מעבדה — רשתות מחשבים PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>

/* ══════════════ RESET + TOKENS ══════════════ */
:root {
  /* ── Palette: clean blue-slate ── */
  --bg:      #f8f9fc;
  --surface: #ffffff;
  --border:  #e2e8f0;
  --border2: #cbd5e1;
  --ink:     #0f172a;
  --ink2:    #1e293b;
  --dim:     #475569;
  --dim2:    #94a3b8;
  --ac:      #2563eb;
  --ac-h:    #1d4ed8;
  --ac-lt:   #eff6ff;
  --gr:      #16a34a;
  --gr-lt:   #f0fdf4;
  --rd:      #dc2626;
  --rd-lt:   #fef2f2;
  --yw:      #d97706;
  --yw-lt:   #fffbeb;
  --pu:      #7c3aed;
  --code-bg: #1e293b;

  /* ── Fonts: normal, readable ── */
  --f-body:  'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --f-mono:  'Fira Code', 'Consolas', 'Monaco', monospace;
  --f-serif: 'Inter', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-body);
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════ SCREENS ══════════════ */
.screen { display: none; }
.screen.on { display: block; }

/* ══════════════ NAV ══════════════ */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center;
  padding: 0 20px;
  height: 54px;
  background: #ffffff;
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  gap: 4px;
}
.nav-logo {
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.01em;
  margin-inline-end: 20px;
}
.nav-logo i { font-style: italic; color: var(--ac); }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab {
  background: none; border: none; cursor: pointer;
  padding: 6px 14px;
  font-size: .875rem;
  font-weight: 500;
  color: var(--dim);
  border-radius: 6px;
  transition: background .15s, color .15s;
  font-family: var(--f-body);
}
.nav-tab:hover { background: var(--ac-lt); color: var(--ac); }
.nav-tab.on { background: var(--ac); color: #fff; }
.nav-tab:hover { color: var(--ink); border-color: var(--border); }
.nav-tab.on { color: var(--ac); border-color: var(--ac); background: rgba(26,86,219,.06); }
.nav-xp {
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--yw);
  background: rgba(161,98,7,.08);
  border: 1.5px solid rgba(161,98,7,.22);
  padding: 4px 12px;
  border-radius: 6px;
  margin-right: 12px;
}
.nav-lang {
  font-family: var(--f-mono);
  font-size: 10px;
  font-weight: 700;
  padding: 4px 10px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: none;
  color: var(--dim);
  cursor: pointer;
  transition: all .14s;
  margin-right: 8px;
}
.nav-lang:hover { color: var(--ink); border-color: var(--border2); }

/* ══════════════ LANDING ══════════════ */
#landing { min-height: 100vh; }
.land-hero {
  max-width: 980px; margin: 0 auto;
  padding: 72px 28px 56px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px; align-items: start;
}
@media(max-width:700px){ .land-hero{grid-template-columns:1fr; padding:40px 20px 32px; gap:32px;} }

.hero-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .12em;
  color: #93c5fd;
  text-transform: uppercase;
}
.hero-h {
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -.02em;
  color: #ffffff;
  margin: 12px 0 16px;
}
.hero-h i { font-style: italic; color: var(--ac); }
.hero-p {
  font-size: 1.05rem;
  color: #bfdbfe;
  margin-bottom: 28px;
}

.hero-stats { display: flex; gap: 24px; margin-bottom: 28px; }
.hs { border-right: 2px solid var(--border); padding-right: 16px; }
.hs:first-child { border-right: none; padding-right: 0; }
.hs-n { font-family: var(--f-serif); font-size: 28px; color: var(--ink); line-height: 1; }
.hs-l { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); letter-spacing: 1px; margin-top: 2px; }

.hero-btn {
  font-family: var(--f-body);
  font-size: 14px; font-weight: 700;
  padding: 11px 26px; border-radius: 8px;
  border: none; cursor: pointer;
  background: var(--ink); color: #fff;
  transition: opacity .14s;
  display: inline-block;
}
.hero-btn:hover { opacity: .85; }

/* Chapter grid on landing */
.land-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.land-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s, border-color .15s;
  border-top: 3px solid var(--cc, var(--ac));
}
.land-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
  border-top-color: var(--cc);
}
.land-card::before {
  content: '';
  position: absolute; top: 0; right: 0; width: 3px; bottom: 0;
  background: var(--cc, var(--border));
  transition: width .15s;
}
.land-card:hover { border-color: var(--cc,var(--border)); transform: translateX(-2px); }
.land-card:hover::before { width: 5px; }
.lc-num { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); letter-spacing: 2px; margin-bottom: 4px; }
.lc-icon { font-size: 18px; margin-bottom: 6px; display: block; }
.lc-name { font-size: 12px; font-weight: 600; color: var(--ink); line-height: 1.3; }

/* ══════════════ LEARN ══════════════ */
#learn { min-height: 100vh; }
.learn-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  max-width: 1020px;
  margin: 0 auto;
  min-height: calc(100vh - 52px);
}
@media(max-width:680px) { .learn-layout { grid-template-columns: 1fr; } }

/* Sidebar */
.l-sb {
  width: 220px;
  min-width: 220px;
  background: var(--surface);
  border-inline-end: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}
.l-sb::-webkit-scrollbar { width: 3px; }
.l-sb::-webkit-scrollbar-thumb { background: var(--border); }
.sb-label {
  font-family: var(--f-mono); font-size: 9px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--dim2);
  padding: 0 14px; margin-bottom: 6px; display: block;
}
.sb-ch {
  width: 100%; text-align: right;
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; background: none; border: none;
  border-right: 3px solid transparent;
  font-family: var(--f-body); font-size: 12px; font-weight: 500;
  color: var(--dim); cursor: pointer; transition: all .12s;
}
.sb-ch:hover { color: var(--ink); background: rgba(0,0,0,.03); }
.sb-ch.on { color: var(--ac); border-color: var(--ac); background: rgba(26,86,219,.04); }
.sb-ch-n { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); min-width: 18px; }

.sb-secs { display: none; }
.sb-secs.open { display: block; }
.sb-sec {
  width: 100%; text-align: right;
  display: flex; align-items: center; gap: 6px;
  padding: 4px 14px 4px 20px;
  background: none; border: none;
  font-family: var(--f-body); font-size: 11px;
  color: var(--dim2); cursor: pointer; transition: all .11s;
}
.sb-sec:hover { color: var(--ink); }
.sb-sec.on { color: var(--ac); font-weight: 600; }
.sb-sec::before { content: '·'; color: var(--dim2); font-size: 14px; }

/* Reading bar */
#rbar {
  position: fixed; top: 52px; right: 220px; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--ac), var(--ac2));
  width: 0%; z-index: 100; transition: width .15s;
}

/* Content area */
.l-content { padding: 44px 52px 100px; max-width: 720px; }
@media(max-width:860px) { .l-content { padding: 28px 22px 80px; } }

/* Chapter header */
.ch-tag { font-family: var(--f-mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim2); margin-bottom: 8px; display: block; }
.ch-h { font-family: var(--f-serif); font-size: clamp(28px,4vw,44px); line-height: 1.1; letter-spacing: -1px; color: var(--ink); margin-bottom: 10px; }
.ch-desc { font-size: 14px; color: var(--dim); line-height: 1.7; margin-bottom: 4px; }
hr.divider { border: none; border-top: 1.5px solid var(--border); margin: 28px 0; }

/* Learn sections */
.learn-section {
  padding: 32px 0 24px;
  border-bottom: 1px solid var(--border);
}
.learn-section:last-child { border-bottom: none; }
.sec-label {
  display: inline-block;
  font-size: .7rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ac);
  margin-bottom: 4px;
}
.sec-h {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--ink);
  margin: 6px 0 14px;
  letter-spacing: -.01em;
}
p { color: var(--ink2); line-height: 1.85; margin-bottom: 12px; }
p strong { color: var(--ink); font-weight: 700; }
code { font-family: var(--f-mono); font-size: 12px; background: var(--border); color: var(--ac); padding: 1px 5px; border-radius: 4px; }

/* Tables */
.tbl { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13.5px; }
.tbl th { background: var(--border); color: var(--ink); font-weight: 700; padding: 8px 13px; border: 1.5px solid var(--border); text-align: right; font-size: 12px; }
.tbl td { padding: 8px 13px; border: 1.5px solid var(--border); color: var(--ink2); vertical-align: top; line-height: 1.55; }
.tbl tr:nth-child(even) td { background: var(--bg); }
.tbl td:first-child { font-family: var(--f-mono); font-size: 12px; color: var(--ac); white-space: nowrap; font-weight: 600; }

/* Code blocks */
.code-block {
  background: var(--code-bg);
  border-radius: 10px;
  overflow: hidden;
  margin: 16px 0;
  font-family: var(--f-mono);
  font-size: .82rem;
}
.code-bar { display: flex; align-items: center; gap: 5px; padding: 7px 13px; background: rgba(255,255,255,.04); border-bottom: 1px solid rgba(255,255,255,.07); }
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
.code-title { font-family: var(--f-mono); font-size: 10px; color: rgba(255,255,255,.35); margin-right: auto; }
pre.code-body { padding: 13px 15px; font-family: var(--f-mono); font-size: 13px; line-height: 1.9; color: #cdd6f4; white-space: pre-wrap; }
.kw { color: #89b4fa; } .st { color: #a6e3a1; } .nu { color: #fab387; }
.cm { color: #6c7086; font-style: italic; } .fn { color: #f5c2e7; }

/* Callouts */
.callout { border-radius: 9px; padding: 11px 15px; margin: 14px 0; border: 1.5px solid; font-size: 13.5px; line-height: 1.65; }
.callout.tip  { background: #f0fdf4; border-color: #bbf7d0; color: #14532d; }
.callout.note {
  background: #eff6ff;
  border-inline-start: 3px solid #2563eb;
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  font-size: .88rem;
  margin: 14px 0;
  color: var(--ink2);
}
.callout.warn {
  background: #fffbeb;
  border-inline-start: 3px solid #d97706;
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  font-size: .88rem;
  margin: 14px 0;
  color: var(--ink2);
}

/* Diagrams */
.diagram { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 16px 18px; margin: 14px 0; direction: ltr; }
.dg-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.dg-box { padding: 8px 13px; border-radius: 8px; font-size: 12.5px; font-weight: 600; text-align: center; line-height: 1.35; white-space: nowrap; }
.dg-box.b  { background: #dbeafe; color: #1e40af; border: 1.5px solid #bfdbfe; }
.dg-box.g  { background: #dcfce7; color: #14532d; border: 1.5px solid #bbf7d0; }
.dg-box.gr { background: #f1f5f9; color: #334155; border: 1.5px solid #cbd5e1; }
.dg-box.p  { background: #ede9fe; color: #4c1d95; border: 1.5px solid #c4b5fd; }
.dg-arr { font-family: var(--f-mono); font-size: 12px; color: var(--dim); white-space: nowrap; }

/* Chapter nav */
.ch-nav { display: flex; gap: 10px; margin-top: 52px; padding-top: 22px; border-top: 1.5px solid var(--border); align-items: center; }
.ch-nav-btn { font-family: var(--f-mono); font-size: 11px; padding: 8px 16px; border-radius: 7px; border: 1.5px solid var(--border); background: var(--surface); color: var(--dim); cursor: pointer; transition: all .13s; }
.ch-nav-btn:hover { border-color: var(--ac); color: var(--ac); }
.ch-nav-btn.next { background: var(--ink); color: #fff; border-color: var(--ink); }
.ch-nav-btn.next:hover { opacity: .85; }

/* ══════════════ LAB ══════════════ */
#lab { min-height: 100vh; }
/* removed */
@media(max-width:680px) { /* removed */ }

.lab-sb {
  background: var(--bg);
  border-left: 1.5px solid var(--border);
  padding: 0;
  position: sticky; top: 52px;
  height: calc(100vh - 52px);
  overflow-y: auto;
}
.lab-sb::-webkit-scrollbar { width: 3px; }
.lab-sb::-webkit-scrollbar-thumb { background: var(--border); }
.lab-sb-head { padding: 16px 14px 12px; border-bottom: 1.5px solid var(--border); }
.lab-sb-title { font-family: var(--f-serif); font-size: 15px; color: var(--ink); }
.lab-sb-sub { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); margin-top: 2px; }
.lab-sb-prog { height: 2.5px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 8px; }
.lab-sb-prog-fill { height: 100%; background: var(--gr); border-radius: 99px; transition: width .5s; }

.lab-ch-btn {
  width: 100%; text-align: right;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; background: none; border: none;
  border-right: 3px solid transparent;
  cursor: pointer; transition: all .12s;
}
.lab-ch-btn:hover { background: rgba(0,0,0,.03); }
.lab-ch-btn.on { background: rgba(21,128,61,.05); border-color: var(--gr); }
.lcb-icon { font-size: 15px; flex-shrink: 0; }
.lcb-info { flex: 1; }
.lcb-name { font-size: 12px; font-weight: 600; color: var(--ink); }
.lcb-bar { height: 2px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 3px; }
.lcb-bar-fill { height: 100%; background: var(--gr); border-radius: 99px; transition: width .4s; }
.lcb-score { font-family: var(--f-mono); font-size: 10px; font-weight: 600; color: var(--dim2); flex-shrink: 0; }
.lcb-score.done { color: var(--gr); }

/* Lab main */
/* removed */
@media(max-width:860px){ /* removed */ }

/* Welcome */
.lab-welcome { text-align: center; padding: 56px 20px; }
.lw-icon { font-size: 44px; margin-bottom: 14px; }
.lw-h { font-family: var(--f-serif); font-size: 28px; color: var(--ink); margin-bottom: 8px; }
.lw-p { color: var(--dim); font-size: 14px; margin-bottom: 32px; }
.lw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 9px; max-width: 640px; margin: 0 auto; }
.lw-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--cc, var(--ac));
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  text-align: center;
}
.lw-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.09); }
.lw-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2.5px; background: var(--cc, var(--border)); }
.lw-card:hover { border-color: var(--cc, var(--ac)); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.08); }
.lwc-n { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); letter-spacing: 2px; }
.lwc-icon { font-size: 18px; margin: 5px 0; display: block; }
.lwc-name { font-size: 11.5px; font-weight: 600; color: var(--ink); }
.lwc-bar { height: 2px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 7px; }
.lwc-bar-fill { height: 100%; background: var(--gr); border-radius: 99px; }

/* Quiz area */
.lq-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1.5px solid var(--border); }
.lq-ch-icon { font-size: 22px; }
.lq-ch-name { font-family: var(--f-serif); font-size: 20px; color: var(--ink); }
.lq-ch-num { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); margin-top: 1px; }
.lq-spacer { flex: 1; }
.lq-scorebox { text-align: center; background: var(--border); border: 1.5px solid var(--border); border-radius: 9px; padding: 8px 16px; }
.lq-sv { font-family: var(--f-mono); font-size: 17px; font-weight: 700; color: var(--ink); }
.lq-sl { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); }

/* Pips */
.lq-pips { display: flex; gap: 3px; margin-bottom: 18px; flex-wrap: wrap; }
.lq-pip { width: 18px; height: 5px; border-radius: 99px; background: var(--border); transition: background .2s; }
.lq-pip.ok  { background: var(--gr); }
.lq-pip.bad { background: var(--ac2); }
.lq-pip.cur { background: var(--ac); }

/* Question card */
.lq-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 13px; padding: 22px; margin-bottom: 12px; animation: lqIn .22s ease; }
@keyframes lqIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.lq-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }
.lq-num  { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); }
.lq-cat  { font-family: var(--f-mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; background: rgba(26,86,219,.07); border: 1.5px solid rgba(26,86,219,.18); color: var(--ac); }
.lq-q { font-size: 15.5px; font-weight: 600; color: var(--ink); line-height: 1.55; }

/* Code snip in question */
.lq-snip { background: var(--code-bg); border-radius: 8px; overflow: hidden; margin-bottom: 12px; direction: ltr; text-align: left; }
.lqs-bar { display: flex; gap: 4px; padding: 6px 11px; background: rgba(255,255,255,.04); }
.lqs-body { padding: 10px 13px; font-family: var(--f-mono); font-size: 12.5px; line-height: 1.85; color: #cdd6f4; }

/* Options */
.lq-opts { display: flex; flex-direction: column; gap: 7px; margin-top: 14px; }
.lq-opt {
  display: flex; align-items: center; gap: 12px;
  width: 100%; background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 9px; padding: 12px 14px;
  cursor: pointer; text-align: start;
  font-family: var(--f-body); font-size: .9rem;
  transition: border-color .15s, background .15s;
  margin-bottom: 8px;
}
.lq-opt:hover:not(:disabled) { border-color: var(--ac); background: var(--ac-lt); }
.lq-opt.correct { border-color: var(--gr); background: var(--gr-lt); }
.lq-opt.wrong   { border-color: var(--rd); background: var(--rd-lt); }
.lq-opt:hover:not(.done) { border-color: var(--ac); background: rgba(26,86,219,.04); }
.lq-opt.done { cursor: default; }
.lq-opt.correct { background: #f0fdf4; border-color: var(--gr); }
.lq-opt.correct .lq-lbl { background: var(--gr); border-color: var(--gr); color: #fff; }
.lq-opt.wrong   { background: #fff1f1; border-color: var(--ac2); }
.lq-opt.reveal  { background: #f0fdf4; border-color: rgba(21,128,61,.35); }
.lq-opt.done:not(.correct):not(.wrong):not(.reveal) { opacity: .45; }
.lq-lbl { font-family: var(--f-mono); font-size: 10px; font-weight: 700; width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--border); border: 1.5px solid var(--border); color: var(--dim); margin-top: 1px; transition: all .13s; }

/* Explanation */

@keyframes expIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
.lq-exp.ok  { background: #f0fdf4; border-color: #bbf7d0; }
.lq-exp.bad { background: #fff1f1; border-color: #fecaca; }
.lq-exp-lbl { font-family: var(--f-mono); font-size: 10px; letter-spacing: 2px; font-weight: 700; margin-bottom: 5px; }
.lq-exp.ok  .lq-exp-lbl { color: var(--gr); }

.lq-exp-txt { font-size: 13px; color: var(--ink2); line-height: 1.75; }

/* Lab footer */

.lq-btn { font-family: var(--f-mono); font-size: 11px; font-weight: 500; padding: 8px 16px; border-radius: 7px; border: 1.5px solid var(--border); background: var(--surface); color: var(--dim); cursor: pointer; transition: all .13s; }

.lq-btn:disabled { opacity: .3; cursor: default; }
.lq-btn.next { background: var(--ink); color: #fff; border-color: var(--ink); font-weight: 600; padding: 8px 22px; }
.lq-btn.next:hover:not(:disabled) { opacity: .85; }

/* Result */
.lq-result { text-align: center; padding: 44px 20px; animation: lqIn .3s ease; }
.lqr-ring { width: 110px; height: 110px; margin: 0 auto 18px; position: relative; }
.lqr-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.lqr-bg  { fill: none; stroke: var(--border); stroke-width: 9; }
.lqr-arc { fill: none; stroke-width: 9; stroke-linecap: round; stroke-dasharray: 314; stroke-dashoffset: 314; transition: stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1); }
.lqr-inner { position: absolute; inset: 14px; border-radius: 50%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
.lqr-pct   { font-family: var(--f-serif); font-size: 24px; color: var(--ink); }
.lqr-grade { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); letter-spacing: 2px; }
.lqr-title { font-family: var(--f-serif); font-size: 22px; color: var(--ink); margin-bottom: 6px; }
.lqr-sub   { font-size: 13px; color: var(--dim); margin-bottom: 22px; }
.lqr-stats { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
.lqrs { background: var(--border); border: 1.5px solid var(--border); border-radius: 9px; padding: 10px 16px; min-width: 66px; text-align: center; }
.lqrs-v { font-family: var(--f-mono); font-size: 18px; font-weight: 700; }
.lqrs-l { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); margin-top: 1px; }
.lqr-btns { display: flex; gap: 9px; justify-content: center; }
.lqr-replay { font-family: var(--f-body); font-size: 13px; font-weight: 700; padding: 9px 22px; border-radius: 7px; border: none; cursor: pointer; background: var(--ink); color: #fff; transition: opacity .13s; }

.lqr-back { font-family: var(--f-body); font-size: 13px; font-weight: 500; padding: 9px 18px; border-radius: 7px; cursor: pointer; border: 1.5px solid var(--border); background: none; color: var(--dim); transition: all .13s; }
.lqr-back:hover { border-color: var(--ac); color: var(--ac); }

/* XP pop */

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearTerminal() {
  var body = document.getElementById('trmBody');
  var td   = TERMINAL_DATA[TERM.ch];
  if (body) {
    var title = td ? (LANG === 'he' ? td.title_he : td.title_en) : '';
    body.innerHTML = '<div class="trm-line trm-comment">── ' + title + ' ──</div>';
  }
}

function showTermHint() {
  var td   = TERMINAL_DATA[TERM.ch];
  if (!td) return;
  var isHe = LANG === 'he';
  var undone = td.missions.filter(function(m){
    return !TERM.doneMissions['ch' + TERM.ch + '_' + m.id];
  });
  if (!undone.length) {
    printTermLine('<span style="color:#3fb950">✅ ' + (isHe ? 'כל המשימות הושלמו!' : 'All missions complete!') + '</span>', 'trm-comment');
    return;
  }
  var mission  = undone[0];
  var firstCmd = Object.keys(mission.cmds)[0];
  var explain  = isHe ? (mission.explain_he || '') : (mission.explain_en || '');
  printTermLine('─'.repeat(44), 'trm-dim');
  printTermLine('<span style="color:#f0883e;font-weight:600">' + (isHe ? '💡 גלה לי:' : '💡 Show me:') + '</span>', 'trm-comment');
  if (td.os === 'python' || td.os === 'scapy') {
    printTermLine('<span class="trm-py-prompt">&gt;&gt;&gt; </span><span style="color:#79c0ff">' + escH(firstCmd) + '</span>', 'trm-cmd');
  } else {
    printTermLine('<span class="trm-user">student</span><span class="trm-at">@</span><span class="trm-host">net-lab</span><span class="trm-colon">:</span><span class="trm-path">~</span><span class="trm-dollar">$</span> <span style="color:#79c0ff">' + escH(firstCmd) + '</span>', 'trm-cmd');
  }
  if (explain) {
    printTermLine('<span style="color:#8b949e;font-style:italic"># ' + escH(explain) + '</span>', 'trm-comment');
  }
  printTermLine('─'.repeat(44), 'trm-dim');
  var inp = document.getElementById('trmInput');
  if (inp) { inp.value = firstCmd; inp.focus(); inp.select(); }
}

function onTermKey(e) {
  var inp = document.getElementById('trmInput');
  if (!inp) return;
  if (e.key === 'Enter') { runTermCmd(); return; }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (TERM.histIdx < TERM.cmdHistory.length - 1) TERM.histIdx++;
    inp.value = TERM.cmdHistory[TERM.cmdHistory.length - 1 - TERM.histIdx] || '';
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (TERM.histIdx > 0) { TERM.histIdx--; inp.value = TERM.cmdHistory[TERM.cmdHistory.length - 1 - TERM.histIdx] || ''; }
    else { TERM.histIdx = -1; inp.value = ''; }
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    // simple tab completion
    var val = inp.value.trim();
    var td  = TERMINAL_DATA[TERM.ch];
    if (!td || !val) return;
    var allCmds = [];
    td.missions.forEach(function(m){ allCmds = allCmds.concat(Object.keys(m.cmds)); });
    var match = allCmds.filter(function(c){ return c.indexOf(val) === 0; });
    if (match.length === 1) inp.value = match[0];
  }
}

function printTermLine(htmlContent, cls) {
  var body = document.getElementById('trmBody');
  if (!body) return;
  var d = document.createElement('div');
  d.className = 'trm-line' + (cls ? ' ' + cls : '');
  d.innerHTML = htmlContent;
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
}

function lookupCmd(cmd, n) {
  var td = TERMINAL_DATA[n];
  if (!td) return null;
  var cmdL = cmd.trim().replace(/\s+/g, ' ');
  var cmdLow = cmdL.toLowerCase();

  /* exact match first */
  for (var i = 0; i < td.missions.length; i++) {
    var m = td.missions[i];
    for (var key in m.cmds) {
      if (key.trim().replace(/\s+/g,' ') === cmdL) return { out: m.cmds[key], mission: m };
    }
  }
  /* case-insensitive */
  for (var i = 0; i < td.missions.length; i++) {
    var m = td.missions[i];
    for (var key in m.cmds) {
      if (key.trim().toLowerCase().replace(/\s+/g,' ') === cmdLow) return { out: m.cmds[key], mission: m };
    }
  }
  /* prefix match on first word */
  var firstWord = cmdLow.split(' ')[0];
  for (var i = 0; i < td.missions.length; i++) {
    var m = td.missions[i];
    for (var key in m.cmds) {
      if (key.trim().toLowerCase().split(' ')[0] === firstWord) {
        return { out: m.cmds[key], mission: m };
      }
    }
  }
  return null;
}

function unknownOutput(cmd, td) {
  var c = cmd.trim().split(' ')[0];
  if (td.os === 'python' || td.os === 'scapy') {
    return 'Traceback (most recent call last):\n  File "<stdin>", line 1\nNameError: name \'' + c + '\' is not defined';
  }
  return c + ': command not found';
}

function runTermCmd() {
  var inp = document.getElementById('trmInput');
  if (!inp) return;
  var cmd = inp.value.trim();
  if (!cmd) return;
  inp.value = '';
  TERM.histIdx = -1;
  TERM.cmdHistory.push(cmd);
  if (TERM.cmdHistory.length > 200) TERM.cmdHistory.shift();

  var td = TERMINAL_DATA[TERM.ch];
  if (!td) return;

  var isHe = LANG === 'he';

  /* Render input line */
  if (td.os === 'python' || td.os === 'scapy') {
    printTermLine('<span class="trm-py-prompt">&gt;&gt;&gt; </span>' + escH(cmd), 'trm-cmd');
  } else {
    printTermLine(
      '<span class="trm-user">student</span>' +
      '<span class="trm-at">@</span>' +
      '<span class="trm-host">net-lab</span>' +
      '<span class="trm-colon">:</span>' +
      '<span class="trm-path">~</span>' +
      '<span class="trm-dollar">$</span> ' + escH(cmd),
      'trm-cmd'
    );
  }

  /* Builtins */
  if (cmd === 'clear' || cmd === 'reset') { clearTerminal(); return; }
  if (cmd === 'exit' || cmd === 'quit()') {
    printTermLine(isHe ? 'logout' : 'logout', 'trm-dim'); return;
  }
  if (cmd === 'help' || cmd === '--help' || cmd === 'man') {
    printTermLine(isHe ? '# לחץ 💡 לרמז על הפקודה הבאה' : '# Press 💡 for a hint on the next command', 'trm-comment');
    return;
  }
  if (cmd === 'ls' || cmd === 'ls -la') {
    printTermLine('total 32\ndrwxr-xr-x 2 student student 4096 Mar 25 14:00 .\ndrwxr-xr-x 8 student student 4096 Mar 25 14:00 ..\n-rw-r--r-- 1 student student  612 Mar 25 14:00 server.py\n-rw-r--r-- 1 student student  234 Mar 25 14:00 client.py\n-rw-r--r-- 1 student student 1024 Mar 25 14:00 server_select.py'.replace(/\n/g,'<br>'), 'trm-out');
    return;
  }
  if (cmd === 'pwd') { printTermLine('/home/student', 'trm-out'); return; }
  if (cmd === 'whoami') { printTermLine('student', 'trm-out'); return; }
  if (cmd === 'uname -a') {
    printTermLine('Linux net-lab 5.15.0-105-generic #115-Ubuntu SMP Mon Apr 15 09:52:04 UTC 2024 x86_64 x86_64 x86_64 GNU/Linux', 'trm-out');
    return;
  }

  /* Lookup */
  var result = lookupCmd(cmd, TERM.ch);
  var out;
  if (result !== null) {
    out = result.out;
    checkMissionDone(result.mission, td);
  } else {
    out = unknownOutput(cmd, td);
  }

  if (out && out.length > 0) {
    printTermLine(escH(out).replace(/\n/g, '<br>'), 'trm-out');
  }
}

function checkMissionDone(mission, td) {
  var key = 'ch' + TERM.ch + '_' + mission.id;
  if (TERM.doneMissions[key]) return;
  TERM.doneMissions[key] = true;

  var el = document.getElementById('trmmis_' + key);
  if (el) {
    el.classList.add('done');
    var chk = document.createElement('span');
    chk.className = 'trm-m-check';
    chk.textContent = '✓';
    el.appendChild(chk);
  }

  XP += 10;
  localStorage.setItem('nw_xp', XP);
  var xpEl = document.getElementById('xpTotal');
  if (xpEl) xpEl.textContent = XP;

  printTermLine(
    '<span class="trm-success">✓ ' +
    (LANG === 'he' ? 'משימה הושלמה!' : 'Mission complete!') +
    ' +10 XP</span>',
    'trm-mission-ok'
  );

  /* Check all missions done */
  var allDone = td.missions.every(function(m){
    return !!TERM.doneMissions['ch' + TERM.ch + '_' + m.id];
  });
  if (allDone) {
    printTermLine(
      '<span class="trm-success-all">🎉 ' +
      (LANG === 'he' ? 'כל המשימות הושלמו! +50 XP בונוס' : 'All missions complete! +50 XP bonus') +
      '</span>',
      'trm-mission-ok'
    );
    XP += 50;
    localStorage.setItem('nw_xp', XP);
    if (xpEl) xpEl.textContent = XP;
  }
}

/* ══════════════════════════════════════════
   QUIZ ENGINE — trivia, timer, score
══════════════════════════════════════════ */

var QUIZ = {
  questions:  [],  // shuffled pool
  cur:        0,
  score:      0,
  streak:     0,
  maxStreak:  0,
  timer:      null,
  timeLeft:   15,
  answered:   false,
  total:      10,
  correct:    0,
  times:      []   // time taken per question
};
var QUIZ_TIME = 15; // seconds per question

/* ── helpers ── */
function qzShuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function qzAllQuestions() {
  var all = [];
  for (var n = 1; n <= 12; n++) {
    var qs = LAB_DATA[n] || [];
    qs.forEach(function(q) {
      all.push({ n: n, q: q });
    });
  }
  return all;
}

/* ── start ── */
function startQuiz(count) {
  var all = qzShuffle(qzAllQuestions());
  QUIZ.questions = count === 'all' ? all : all.slice(0, Math.min(count, all.length));
  QUIZ.total     = QUIZ.questions.length;
  QUIZ.cur       = 0;
  QUIZ.score     = 0;
  QUIZ.streak    = 0;
  QUIZ.maxStreak = 0;
  QUIZ.correct   = 0;
  QUIZ.times     = [];

  document.getElementById('quizHome').style.display   = 'none';
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizGame').style.display   = 'flex';

  renderQuizQ();
}

function quitQuiz() {
  clearInterval(QUIZ.timer);
  document.getElementById('quizGame').style.display = 'none';
  document.getElementById('quizHome').style.display = 'flex';
}

/* ── render question ── */
function renderQuizQ() {
  if (QUIZ.cur >= QUIZ.questions.length) { showQuizResult(); return; }

  var item = QUIZ.questions[QUIZ.cur];
  var q    = item.q;
  var ch   = CHAPTERS.find(function(c){ return c.n === item.n; });
  var data = LANG === 'he' ? ch.he : ch.en;
  var isHe = LANG === 'he';

  QUIZ.answered = false;
  QUIZ.timeLeft = QUIZ_TIME;

  /* HUD */
  document.getElementById('qzScore').textContent  = QUIZ.score;
  document.getElementById('qzStreak').textContent = QUIZ.streak > 0 ? '🔥' + QUIZ.streak : '0';
  document.getElementById('qzNum').textContent    = (QUIZ.cur + 1) + ' / ' + QUIZ.total;

  /* Category */
  document.getElementById('qzCat').textContent = ch.icon + ' ' + data.name + (q.cat ? ' · ' + q.cat : '');

  /* Question */
  document.getElementById('qzQ').textContent = q.q;

  /* Snippet */
  var qArea = document.getElementById('quizQArea');
  var snipEl = qArea.querySelector('.qz-snip');
  if (snipEl && snipEl.remove) snipEl.remove();
  if (q.snip) {
    var snip = document.createElement('div');
    snip.className = 'qz-snip';
    snip.innerHTML = q.snip;
    qArea.insertBefore(snip, document.getElementById('qzOpts'));
  }

  /* Options — shuffle */
  var idx   = qzShuffle([0,1,2,3]);
  var newC  = idx.indexOf(q.c);
  var LBL   = isHe ? ['א','ב','ג','ד'] : ['A','B','C','D'];
  var opts  = document.getElementById('qzOpts');
  opts.innerHTML = '';
  idx.forEach(function(origI, j) {
    var btn = document.createElement('button');
    btn.className = 'qz-opt';
    btn.dataset.correct = (origI === q.c) ? '1' : '0';
    btn.innerHTML =
      '<span class="qz-lbl">' + LBL[j] + '</span>' +
      '<span class="qz-txt">' + q.a[origI] + '</span>';
    btn.onclick = function() { onQuizPick(btn, q); };
    opts.appendChild(btn);
  });

  /* Feedback */
  document.getElementById('qzFeedback').innerHTML = '';
  document.getElementById('qzFeedback').style.display = 'none';

  /* Timer */
  clearInterval(QUIZ.timer);
  updateTimerArc(QUIZ_TIME);
  document.getElementById('qzTimerNum').textContent = QUIZ_TIME;
  var startTime = Date.now();

  QUIZ.timer = setInterval(function() {
    QUIZ.timeLeft--;
    document.getElementById('qzTimerNum').textContent = QUIZ.timeLeft;
    updateTimerArc(QUIZ.timeLeft);

    if (QUIZ.timeLeft <= 5) {
      document.getElementById('qzTimerNum').style.color = '#f85149';
    } else {
      document.getElementById('qzTimerNum').style.color = '#e6edf3';
    }

    if (QUIZ.timeLeft <= 0) {
      clearInterval(QUIZ.timer);
      if (!QUIZ.answered) {
        QUIZ.answered = true;
        QUIZ.times.push(QUIZ_TIME);
        onTimeout(q);
      }
    }
  }, 1000);

  QUIZ._startTime = Date.now();
}

function updateTimerArc(t) {
  var arc = document.getElementById('qzTimerArc');
  if (!arc) return;
  var pct    = t / QUIZ_TIME;
  var circum = 2 * Math.PI * 18; // r=18
  arc.style.strokeDashoffset = circum * (1 - pct);
  arc.style.stroke = t > 8 ? '#3fb950' : t > 4 ? '#f0883e' : '#f85149';
}

/* ── pick ── */
function onQuizPick(btn, q) {
  if (QUIZ.answered) return;
  QUIZ.answered = true;
  clearInterval(QUIZ.timer);

  var elapsed  = (Date.now() - QUIZ._startTime) / 1000;
  QUIZ.times.push(Math.min(elapsed, QUIZ_TIME));

  var correct  = btn.dataset.correct === '1';
  var isHe     = LANG === 'he';

  /* Points: faster = more points */
  var pts = 0;
  if (correct) {
    pts = Math.max(10, Math.round(100 * (1 - elapsed / QUIZ_TIME)));
    QUIZ.score  += pts;
    QUIZ.streak++;
    QUIZ.correct++;
    if (QUIZ.streak > QUIZ.maxStreak) QUIZ.maxStreak = QUIZ.streak;
    if (QUIZ.streak > 1) pts += QUIZ.streak * 5; // streak bonus
  } else {
    QUIZ.streak = 0;
  }

  /* Highlight options */
  document.querySelectorAll('.qz-opt').forEach(function(b) {
    b.disabled = true;
    if (b.dataset.correct === '1') b.classList.add('correct');
    else if (b === btn && !correct) b.classList.add('wrong');
  });

  /* Feedback */
  var fb = document.getElementById('qzFeedback');
  fb.style.display = 'block';
  fb.innerHTML =
    '<div class="qz-fb-top ' + (correct ? 'ok' : 'bad') + '">' +
      (correct
        ? '✓ ' + (isHe ? 'נכון!' : 'Correct!') + ' <span class="qz-pts">+' + pts + '</span>'
        : '✗ ' + (isHe ? 'לא נכון' : 'Wrong')) +
    '</div>' +
    '<div class="qz-fb-exp">' + (q.e || '') + '</div>' +
    '<button class="qz-next-btn" onclick="nextQuizQ()">' +
      (QUIZ.cur + 1 < QUIZ.total
        ? (isHe ? 'הבאה ←' : 'Next →')
        : (isHe ? 'תוצאה 🏆' : 'Result 🏆')) +
    '</button>';

  document.getElementById('qzScore').textContent  = QUIZ.score;
  document.getElementById('qzStreak').textContent = QUIZ.streak > 0 ? '🔥' + QUIZ.streak : '0';

  QUIZ.cur++;
}

function onTimeout(q) {
  var isHe = LANG === 'he';
  QUIZ.streak = 0;
  document.querySelectorAll('.qz-opt').forEach(function(b) {
    b.disabled = true;
    if (b.dataset.correct === '1') b.classList.add('correct');
  });
  var fb = document.getElementById('qzFeedback');
  fb.style.display = 'block';
  fb.innerHTML =
    '<div class="qz-fb-top bad">⏰ ' + (isHe ? 'הזמן נגמר!' : 'Time\'s up!') + '</div>' +
    '<div class="qz-fb-exp">' + (q.e || '') + '</div>' +
    '<button class="qz-next-btn" onclick="nextQuizQ()">' +
      (QUIZ.cur + 1 < QUIZ.total
        ? (isHe ? 'הבאה ←' : 'Next →')
        : (isHe ? 'תוצאה 🏆' : 'Result 🏆')) +
    '</button>';
  QUIZ.cur++;
}

function nextQuizQ() {
  renderQuizQ();
}

/* ── result ── */
function showQuizResult() {
  clearInterval(QUIZ.timer);
  document.getElementById('quizGame').style.display = 'none';

  var isHe  = LANG === 'he';
  var pct   = Math.round(QUIZ.correct / QUIZ.total * 100);
  var avgT  = QUIZ.times.length
    ? Math.round(QUIZ.times.reduce(function(a,b){return a+b;},0) / QUIZ.times.length * 10) / 10
    : 0;

  /* Save best */
  var bestKey = 'nw_quiz_best';
  var prevBest = parseInt(localStorage.getItem(bestKey) || '0');
  if (QUIZ.score > prevBest) {
    localStorage.setItem(bestKey, QUIZ.score);
    prevBest = QUIZ.score;
  }

  /* XP */
  var xpGain = Math.round(QUIZ.score / 10);
  XP += xpGain;
  localStorage.setItem('nw_xp', XP);
  var xpEl = document.getElementById('xpTotal');
  if (xpEl) xpEl.textContent = XP;

  var grade  = pct>=90?'S':pct>=80?'A':pct>=70?'B':pct>=60?'C':'D';
  var arcOff = 2 * Math.PI * 50 * (1 - pct/100);

  var titles = isHe
    ? ['כמעט! 📖','מתקדם! 💪','כל הכבוד! 🎯','מהיר כברק! ⚡']
    : ['Keep trying! 📖','Good work! 💪','Well done! 🎯','Lightning fast! ⚡'];
  var tier = pct>=90?3:pct>=70?2:pct>=50?1:0;

  document.getElementById('quizResult').style.display = 'flex';
  document.getElementById('quizResult').innerHTML =
    '<div class="qzr-ring">' +
      '<svg viewBox="0 0 110 110"><circle class="qzr-bg" cx="55" cy="55" r="50"/>' +
      '<circle class="qzr-arc" id="qzrArc" cx="55" cy="55" r="50"/></svg>' +
      '<div class="qzr-inner"><div class="qzr-pct">' + pct + '%</div><div class="qzr-grade">' + grade + '</div></div>' +
    '</div>' +
    '<div class="qzr-title">' + titles[tier] + '</div>' +

<section class="learn-section">
<span class="sec-label">01 — Socket</span>
<h2 class="sec-h">מה זה Socket?</h2>
<p>Socket הוא <strong>נקודת קצה של חיבור</strong> בין שתי תוכנות. דמיינו צינור — מה שנכנס בצד אחד יוצא בצד השני. Socket = קצה אחד של הצינור.</p>
<p>אנלוגיה מהפרק: <strong>כתובת IP = בניין</strong>, <strong>Port = מספר דירה</strong>. Socket = תיבת הדואר של דירה ספציפית בבניין ספציפי.</p>
<div class="callout note">📝 Socket מאפשר תקשורת בין: שתי תוכנות על אותו מחשב, או תוכנות על מחשבים שונים ברחבי העולם.</div>
</section>

<section class="learn-section">
<span class="sec-label">02 — כתובת Socket</span>
<h2 class="sec-h">IP + Port = כתובת Socket</h2>
<p>כתובת Socket = <code>IP:Port</code>. הטווח: פורטים 0–65535. Well-Known ports (0–1023) שמורים לפרוטוקולים ידועים:</p>
<table class="tbl"><tr><th>Port</th><th>פרוטוקול</th></tr>
<tr><td>80</td><td>HTTP</td></tr>
<tr><td>443</td><td>HTTPS</td></tr>
<tr><td>22</td><td>SSH</td></tr>
<tr><td>53</td><td>DNS</td></tr>
<tr><td>8820</td><td>מותאם אישית (דוגמה בספר)</td></tr>
</table>
<p><code>127.0.0.1</code> = <strong>Loopback</strong> = "אני". לחיבורים על אותו מחשב. <code>0.0.0.0</code> = "קבל חיבורים מכולם".</p>
</section>

<section class="learn-section">
<span class="sec-label">03 — API הלקוח</span>
<h2 class="sec-h">קוד לקוח — Python</h2>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">client.py</span></div>
<pre class="code-body"><span class="kw">import</span> socket

my_socket = socket.socket()
my_socket.connect((<span class="st">'1.2.3.4'</span>, <span class="nu">8820</span>))   <span class="cm"># IP + Port</span>
my_socket.send(<span class="st">'Omer'</span>.encode())
data = my_socket.recv(<span class="nu">1024</span>)              <span class="cm"># BLOCKING!</span>
<span class="kw">print</span>(<span class="st">'Server said:'</span>, data.decode())
my_socket.close()                           <span class="cm"># חשוב!</span></pre></div>
<p>לבדיקה על אותו מחשב — משתמשים ב-<code>127.0.0.1</code> במקום IP.</p>
</section>

<section class="learn-section">
<span class="sec-label">04 — API השרת</span>
<h2 class="sec-h">קוד שרת — שני Sockets!</h2>
<div class="callout warn">⚠️ <strong>לשרת יש תמיד שני Sockets:</strong> server_socket (מאזין לחיבורים), ו-client_socket (מדבר עם לקוח ספציפי). אל תבלבל!</div>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">server.py</span></div>
<pre class="code-body"><span class="kw">import</span> socket

server_socket = socket.socket()
server_socket.bind((<span class="st">'0.0.0.0'</span>, <span class="nu">8820</span>))  <span class="cm"># קבל מכל IP</span>
server_socket.listen(<span class="nu">1</span>)                  <span class="cm"># התחל להאזין</span>

(client_socket, addr) = server_socket.accept()  <span class="cm"># BLOCKING!</span>
<span class="kw">print</span>(<span class="st">'Connected from:'</span>, addr)

<div class="callout note">❓ <strong>מה זה Stateless ב-HTTP?</strong><br>HTTP לא זוכר בקשות קודמות. כל בקשה עצמאית. לכן Cookie/Session נדרשים לשמירת מצב (לדוגמה: "המשתמש מחובר").</div>
<div class="callout note">❓ <strong>מה ההבדל בין HTTP/1.0 ל-HTTP/1.1?</strong><br>HTTP/1.0 — חיבור TCP חדש לכל בקשה (סגירה אחרי כל response). HTTP/1.1 — Keep-Alive: חיבור TCP אחד לבקשות מרובות. HTTP/2 — multiplexing: בקשות מרובות על חיבור אחד במקביל.</div>

<span class="cm"># חבילה IP בלבד</span>

<span class="cm"># IP + UDP + DNS Query</span>

pkt.show()  <span class="cm"># הצגת כל השדות</span></pre></div>

<section class="learn-section">

<section class="learn-section">
<span class="sec-label">01 — פורטים</span>
<h2 class="sec-h">פורטים — מזהה התוכנה</h2>
<p>שכבת התעבורה מעבירה מידע מ<strong>תכנית לתכנית</strong> (לא רק ממחשב למחשב). הפורט מזהה את התוכנה הספציפית.</p>
<p>אנלוגיה מהפרק: IP = כתובת בניין, Port = מספר דירה. תעבורה ל-IP:80 מגיעה לדירה 80 (שרת HTTP).</p>

</table>
</section>

<tr><td>אמינות</td><td>מובטחת — ACK לכל packet</td><td>לא מובטחת</td></tr>

</table>
</section>

<section class="learn-section">
<span class="sec-label">03 — Three-Way Handshake</span>
<h2 class="sec-h">TCP Three-Way Handshake</h2>
<p>לפני שליחת נתונים ב-TCP — חייבים לבצע Handshake לפתיחת הקישור:</p>
<div class="diagram" style="direction:ltr;text-align:left">
<div style="padding:12px 16px;font-family:monospace;font-size:13px;line-height:2.2">
<div><span style="color:#3b82f6">Client</span> ──── SYN (seq=x) ──────────────▶ <span style="color:#10b981">Server</span></div>
<div><span style="color:#3b82f6">Client</span> ◀─── SYN+ACK (seq=y, ack=x+1) ── <span style="color:#10b981">Server</span></div>
<div><span style="color:#3b82f6">Client</span> ──── ACK (seq=x+1, ack=y+1) ──▶ <span style="color:#10b981">Server</span></div>
<div style="color:#6b7280;margin-top:8px">         ← Connection Established →</div>
</div></div>
<p>סגירת חיבור: ה-FIN flag. אחד הצדדים שולח FIN, השני עונה ACK + FIN, הראשון עונה ACK.</p>
</section>

<section class="learn-section">
<span class="sec-label">04 — Seq & ACK</span>
<h2 class="sec-h">Sequence & Acknowledgement Numbers</h2>
<p><strong>Seq</strong> = מספר ה-byte הראשון בסגמנט. <strong>ACK</strong> = ה-Seq הבא שמצפה לקבל (= Seq שהתקבל + גודל הנתונים).</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">דוגמה: שליחת "Hello" (5 bytes)</span></div>
<pre class="code-body">Client → Server: Seq=100, data="Hello" (5 bytes)
Server → Client: ACK=105  ← 100+5, "קיבלתי עד byte 104, מחכה ל-105"
Client → Server: Seq=105, data="World" (5 bytes)
Server → Client: ACK=110</pre></div>
<div class="callout note">📝 SYN ו-FIN נחשבים כ-1 byte לצורכי חישוב ACK — למרות שאינם מכילים נתונים.</div>
</section>

<section class="learn-section">
<span class="sec-label">05 — Checksum</span>
<h2 class="sec-h">Checksum — גילוי שגיאות</h2>
<p>Checksum מוודא שהנתונים לא נפגמו בדרך. מחושב על ה-Header <strong>וגם</strong> על הנתונים עצמם.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">דוגמה: Checksum = סכום ספרות</span></div>
<pre class="code-body">מספר טלפון: 054-5555555
Checksum = 0+5+4+5+5+5+5+5+5+5 = <span class="st">44</span>

השרת קיבל: 654-5555555  (6 במקום 0!)
בדיקה: 6+5+4+5+5+5+5+5+5+5 = <span class="kw">50 ≠ 44</span>  → שגיאה!</pre></div>
<p>ב-TCP/IP: Checksum = One's Complement Sum של כל ה-16-bit words.</p>
</section>

<section class="learn-section">
<span class="sec-label">06 — netstat</span>
<h2 class="sec-h">netstat</h2>
<p>מציג חיבורי רשת פעילים וסטטוסם:</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">netstat -an</span></div>
<pre class="code-body">Proto  Local Address        Foreign Address     State
TCP    0.0.0.0:80           0.0.0.0:*           LISTENING
TCP    192.168.1.5:54231    142.250.74.46:443   ESTABLISHED
TCP    192.168.1.5:8820     192.168.1.6:52311   ESTABLISHED
UDP    0.0.0.0:53           0.0.0.0:*</pre></div>
<table class="tbl"><tr><th>State</th><th>משמעות</th></tr>
<tr><td>LISTENING</td><td>השרת ממתין לחיבורים</td></tr>
<tr><td>ESTABLISHED</td><td>חיבור פעיל</td></tr>
<tr><td>TIME_WAIT</td><td>ממתין אחרי סגירה</td></tr>
<tr><td>CLOSE_WAIT</td><td>הצד השני ביקש לסגור</td></tr>
</table>
</section>
<section class="learn-section">
<span class="sec-label">07 — תקלות נפוצות</span>
<h2 class="sec-h">Troubleshooting — TCP/UDP</h2>
<table class="tbl"><tr><th>תסמין</th><th>סיבה</th><th>פתרון</th></tr>

<div class="callout note">❓ <strong>מה ההבדל בין RST ל-FIN?</strong><br>FIN — סגירה מסודרת: "סיימתי לשלוח, אבל עדיין יכול לקבל". RST — ניתוק מיידי: "בטל הכל עכשיו". RST נשלח גם כשמתחברים לפורט סגור.</div>

<section class="learn-section">

<h2 class="sec-h">TCP Three-Way Handshake</h2>
<p>לפני שליחת נתונים ב-TCP — חייבים לבצע Handshake לפתיחת הקישור:</p>
<div class="diagram" style="direction:ltr;text-align:left">
<div style="padding:12px 16px;font-family:monospace;font-size:13px;line-height:2.2">
<div><span style="color:#3b82f6">Client</span> ──── SYN (seq=x) ──────────────▶ <span style="color:#10b981">Server</span></div>
<div><span style="color:#3b82f6">Client</span> ◀─── SYN+ACK (seq=y, ack=x+1) ── <span style="color:#10b981">Server</span></div>
<div><span style="color:#3b82f6">Client</span> ──── ACK (seq=x+1, ack=y+1) ──▶ <span style="color:#10b981">Server</span></div>
<div style="color:#6b7280;margin-top:8px">         ← Connection Established →</div>
</div></div>
<p>סגירת חיבור: ה-FIN flag. אחד הצדדים שולח FIN, השני עונה ACK + FIN, הראשון עונה ACK.</p>
</section>

<section class="learn-section">
<span class="sec-label">04 — Seq & ACK</span>
<h2 class="sec-h">Sequence & Acknowledgement Numbers</h2>
<p><strong>Seq</strong> = מספר ה-byte הראשון בסגמנט. <strong>ACK</strong> = ה-Seq הבא שמצפה לקבל (= Seq שהתקבל + גודל הנתונים).</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">דוגמה: שליחת "Hello" (5 bytes)</span></div>
<pre class="code-body">Client → Server: Seq=100, data="Hello" (5 bytes)
Server → Client: ACK=105  ← 100+5, "קיבלתי עד byte 104, מחכה ל-105"
Client → Server: Seq=105, data="World" (5 bytes)
Server → Client: ACK=110</pre></div>
<div class="callout note">📝 SYN ו-FIN נחשבים כ-1 byte לצורכי חישוב ACK — למרות שאינם מכילים נתונים.</div>
</section>

<section class="learn-section">
<span class="sec-label">05 — Checksum</span>
<h2 class="sec-h">Checksum — גילוי שגיאות</h2>
<p>Checksum מוודא שהנתונים לא נפגמו בדרך. מחושב על ה-Header <strong>וגם</strong> על הנתונים עצמם.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">דוגמה: Checksum = סכום ספרות</span></div>
<pre class="code-body">מספר טלפון: 054-5555555
Checksum = 0+5+4+5+5+5+5+5+5+5 = <span class="st">44</span>

השרת קיבל: 654-5555555  (6 במקום 0!)
בדיקה: 6+5+4+5+5+5+5+5+5+5 = <span class="kw">50 ≠ 44</span>  → שגיאה!</pre></div>
<p>ב-TCP/IP: Checksum = One's Complement Sum של כל ה-16-bit words.</p>
</section>

<section class="learn-section">
<span class="sec-label">04 — NAT</span>
<h2 class="sec-h">NAT — Network Address Translation</h2>
<p>כתובות פרטיות (192.168.x.x / 10.x.x.x) לא ניתן לראות מהאינטרנט. NAT בנתב מתרגם:</p>

</table>

</section>

<p><strong>TTL (Time To Live)</strong>: שדה ב-IP Header. כל נתב מוריד ב-1. כשמגיע ל-0 → חבילה נזרקת + ICMP Time Exceeded. זה הבסיס ל-traceroute!</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">איך traceroute עובד</span></div>
<pre class="code-body">שלח IP(TTL=1) → R1 מוריד ל-0 → זורק + שולח ICMP Time Exceeded

שלח IP(TTL=3) → R1→R2→ R3 מוריד ל-0 → זורק + ICMP

</section>

<section class="learn-section">

<section class="learn-section">
<span class="sec-label">03 — Preamble & CRC</span>

<p><strong>Preamble</strong> (8 bytes): רצף סנכרון שמאפשר לכרטיס הרשת לזהות תחילת מסגרת. כרטיס הרשת <em>מסיר אותו</em> לפני שהתוכנה רואה את הנתונים.</p>

</section>

<section class="learn-section">

<h2 class="sec-h">ARP — Address Resolution Protocol</h2>

</div></div>
<p>התשובה נשמרת ב-<strong>ARP Cache</strong>: <code>arp -a</code> (הצגה), <code>arp -d &lt;IP&gt;</code> (מחיקה).</p>

<p>ביצועי ADSL תלויים ב<strong>מרחק ממרכזייה</strong> — ככל שרחוק יותר, איכות הסיגנל יורדת.</p>
</section>

<tr><td>CAT5e</td><td>1 Gbps</td><td>Gigabit Ethernet</td></tr>

</table>
<p>כבל CAT5 מכיל <strong>8 חוטים (4 זוגות)</strong>. ב-10Base-T: 2 זוגות בשימוש (TX + RX).</p>
</section>

<p><strong>ממסר (Relay)</strong>: לאורכים גדולים מדי — ממסרים מגבירים ומשדרים הלאה. כבלים תת-ימיים בין יבשות = עשרות ממסרים לאורך אלפי ק"מ.</p>

<div class="callout note">❓ <strong>למה FM עמיד יותר לרעש מאשר AM?</strong><br>ב-AM המידע מקודד ב-אמפליטודה. רעש חשמלי משנה אמפליטודה — קורס המידע. ב-FM המידע מקודד ב-תדר. רעש משנה אמפליטודה אבל לא תדר — FM עמיד.</div>
<div class="callout note">❓ <strong>מה CSMA/CD ולמה WiFi לא משתמש בו?</strong><br>CSMA/CD (Carrier Sense Multiple Access / Collision Detection) — Ethernet שמע לפני שידור, מגלה collision. WiFi לא יכול לשמוע תוך כדי שידור (Half-Duplex) → משתמש ב-CSMA/CA (Collision Avoidance).</div>
<div class="callout note">❓ <strong>מה זה MTU ולמה 1500?</strong><br>Maximum Transmission Unit — גודל מקסימלי של IP packet ב-Ethernet frame. 1500 bytes = standard Ethernet. גדול יותר → fragmentation. Jumbo Frames = 9000 bytes ב-data centers.</div>
</section>

)

<span class="cm"># rlist = Sockets שמוכנים עכשיו לקריאה</span>
<span class="cm"># wlist = Sockets שמוכנים עכשיו לכתיבה</span></pre></div>
</section>

<section class="learn-section">
<span class="sec-label">03 — server_socket ב-rlist</span>
<h2 class="sec-h">server_socket ב-rlist = לקוח חדש!</h2>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">server_select.py</span></div>
<pre class="code-body">open_client_sockets = []

<span class="kw">while True</span>:
    rlist, wlist, xlist = select.select(
        [server_socket] + open_client_sockets, open_client_sockets, [])

    <span class="kw">for</span> current_socket <span class="kw">in</span> rlist:
        <span class="kw">if</span> current_socket <span class="kw">is</span> server_socket:
            <span class="cm"># לקוח חדש מתחבר</span>
            (new_socket, addr) = server_socket.accept()
            open_client_sockets.append(new_socket)
        <span class="kw">else</span>:
            <span class="cm"># מידע מלקוח קיים</span>
            data = current_socket.recv(<span class="nu">1024</span>)
            <span class="kw">if</span> data == <span class="st">""</span>:
                open_client_sockets.remove(current_socket)
                current_socket.close()
            <span class="kw">else</span>:
                <span class="cm"># טפל בנתונים...</span>
                pass</pre></div>
</section>

<section class="learn-section">
<span class="sec-label">04 — client ב-rlist</span>
<h2 class="sec-h">לקוח ב-rlist = נתונים זמינים</h2>
<p>כשלקוח קיים מופיע ב-rlist — יש נתונים לקרוא. <code>recv()</code> מיד תחזיר נתונים (לא תחסום). אם מחזירה <code>""</code> — הלקוח התנתק → הסר מ-<code>open_client_sockets</code>.</p>
</section>

<section class="learn-section">
<span class="sec-label">05 — messages_to_send</span>
<h2 class="sec-h">messages_to_send — שליחה מדורגת</h2>
<p>לא ניתן לשלוח לכל לקוח מיד — Socket אולי לא מוכן. פתרון: שמור הודעות ב-<code>messages_to_send</code>, שלח רק ל-Sockets ב-wlist.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">messages_to_send</span></div>
<pre class="code-body">messages_to_send = []  <span class="cm"># list of (socket, data)</span>

<span class="kw">def</span> send_waiting_messages(wlist):
    <span class="kw">for</span> message <span class="kw">in</span> messages_to_send[:]:
        (client_socket, data) = message
        <span class="kw">if</span> client_socket <span class="kw">in</span> wlist:
            client_socket.send(data)
            messages_to_send.remove(message)</pre></div>
</section>
<section class="learn-section">
<span class="sec-label">07 — תקלות נפוצות</span>
<h2 class="sec-h">Troubleshooting — select() Server</h2>
<table class="tbl"><tr><th>שגיאה</th><th>סיבה</th><th>פתרון</th></tr>
<tr><td>select מחזיר server_socket בכל iteration</td><td>לקוח חדש מתחבר כל הזמן / server socket תמיד ב-rlist</td><td>נורמלי אם לקוחות מתחברים. אם לא — בדוק שה-server socket ב-rlist</td></tr>
<tr><td>recv מחזיר b"" בלי disconnect ברור</td><td>לקוח סגר חיבור</td><td>if data == b"": remove from open_clients; socket.close()</td></tr>
<tr><td>שגיאה: select על socket סגור</td><td>לא הסרת socket מהרשימה לפני סגירה</td><td>הסר מ-open_client_sockets לפני close()</td></tr>
<tr><td>messages_to_send גדל ללא עצור</td><td>client לא ב-wlist (עמוס) / נשלח לsocket סגור</td><td>הוסף בדיקת timeout. הסר sockets מתות</td></tr>
</table>
</section>

<section class="learn-section">
<span class="sec-label">08 — Cheat Sheet</span>
<h2 class="sec-h">Cheat Sheet — select() Server</h2>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">server_select.py — תבנית מלאה</span></div>
<pre class="code-body"><span class="kw">import</span> socket, select

server = socket.socket()
server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, <span class="nu">1</span>)
server.bind((<span class="st">''</span>, <span class="nu">9001</span>))
server.listen(<span class="nu">5</span>)
open_clients = []
messages_to_send = []  <span class="cm"># [(socket, data), ...]</span>

<span class="kw">while True</span>:
    rlist, wlist, _ = select.select(
        [server] + open_clients,
        open_clients, [])

    <span class="kw">for</span> sock <span class="kw">in</span> rlist:
        <span class="kw">if</span> sock <span class="kw">is</span> server:
            client, _ = server.accept()
            open_clients.append(client)
        <span class="kw">else</span>:
            data = sock.recv(<span class="nu">1024</span>)
            <span class="kw">if not</span> data:
                open_clients.remove(sock); sock.close()
            <span class="kw">else</span>:
                messages_to_send.append((sock, data.upper()))

    <span class="kw">for</span> sock, msg <span class="kw">in</span> messages_to_send[:]:
        <span class="kw">if</span> sock <span class="kw">in</span> wlist:
            sock.send(msg)
            messages_to_send.remove((sock, msg))</pre></div>
</section>

<section class="learn-section">
<span class="sec-label">09 — שאלות בחינה</span>
<h2 class="sec-h">שאלות בחינה נפוצות</h2>
<div class="callout note">❓ <strong>למה server_socket נמצא ב-rlist ולא ב-wlist?</strong><br>server_socket.accept() היא פעולת קריאה (מחכה ללקוח חדש). wlist = sockets מוכנות לכתיבה — לא רלוונטי לserver socket שרק מאזין.</div>
<div class="callout note">❓ <strong>מה יקרה אם לא נסיר socket ממת מ-open_clients?</strong><br>select יחזיר אותה כ-readable בכל iteration, recv תחזיר b"", נכנס ללולאה אינסופית. תמיד: if not data: remove + close.</div>
<div class="callout note">❓ <strong>למה לא לשלוח ישירות ב-rlist loop?</strong><br>Socket אולי לא מוכן לכתיבה (buffer מלא). שליחה ל-socket לא מוכן → blocking או שגיאה. messages_to_send + wlist = בטוח.</div>
</section>

function buildSidebar() {
  var sb = document.getElementById('lSidebar');
  if (!sb) return;
  sb.innerHTML = '';
  CHAPTERS.forEach(function(ch) {
    var data = LANG === 'he' ? ch.he : ch.en;
    var wrap = document.createElement('div');
    wrap.className = 'sb-ch' + (ch.n === CUR_CH ? ' active' : '');
    wrap.id = 'sbch' + ch.n;
    var btn = document.createElement('button');
    btn.className = 'sb-ch-btn';
    btn.style.setProperty('--cc', ch.color);
    btn.innerHTML = '<span class="sb-icon">' + ch.icon + '</span>' +
      '<span class="sb-name">' + data.name + '</span>';
    btn.onclick = function() { loadCh(ch.n); };
    wrap.appendChild(btn);
    var secs = document.createElement('div');
    secs.className = 'sb-secs';
    secs.id = 'sbsecs' + ch.n;
    data.sections.forEach(function(sec, i) {
      var s = document.createElement('button');
      s.className = 'sb-sec';
      s.textContent = sec;
      s.onclick = function(e) { e.stopPropagation(); scrollToSec(ch.n, i); };
      secs.appendChild(s);
    });
    wrap.appendChild(secs);
    sb.appendChild(wrap);
  });

function loadCh(n) {
  CUR_CH = n;
  var ch   = CHAPTERS.find(function(c){ return c.n===n; });
  if (!ch) return;
  var data = LANG === 'he' ? ch.he : ch.en;

  document.querySelectorAll('.sb-ch').forEach(function(b){ b.classList.remove('active'); });
  var sbch = document.getElementById('sbch' + n);
  if (sbch) sbch.classList.add('active');

  var prevN = n > 1  ? '<button class="ch-nav-btn" onclick="loadCh('+(n-1)+')">' + (LANG==='he' ? '← פרק '+(n-1) : '← Ch '+(n-1)) + '</button>' : '<span></span>';
  var nextN = n < 12 ? '<button class="ch-nav-btn" onclick="loadCh('+(n+1)+')">' + (LANG==='he' ? 'פרק '+(n+1)+' →' : 'Ch '+(n+1)+' →') + '</button>' : '<span></span>';

  document.getElementById('lContent').innerHTML =
    '<div class="ch-nav">' + prevN + '<span class="ch-nav-cur">' + ch.icon + ' ' + data.name + '</span>' + nextN + '</div>' +
    data.content() +
    '<div class="ch-nav ch-nav-bottom">' + prevN + '<span></span>' + nextN + '</div>';

  window.scrollTo(0, 0);
  updateReadBar();
}

function scrollToSec(chN, idx) {
  if (chN !== CUR_CH) {
    loadCh(chN);
    setTimeout(function(){ doScroll(idx); }, 80);
  } else {
    doScroll(idx);
  }
}

function doScroll(idx) {
  var secs = document.querySelectorAll('.learn-section');
  if (secs[idx]) {
    var top = secs[idx].getBoundingClientRect().top + window.scrollY - 70;
    window.scrollTo({ top: top, behavior: 'smooth' });
  }
}

function updateReadBar() {
  window.onscroll = function() {
    var h = document.documentElement.scrollHeight - window.innerHeight;
    var pct = h > 0 ? Math.round(window.scrollY / h * 100) : 0;
    var bar = document.getElementById('readBar');
    if (bar) bar.style.width = pct + '%';
  };
}

function goToLabWelcome() {
  var welcome = document.getElementById('labWelcome');
  var area    = document.getElementById('lqArea');
  if (welcome) welcome.style.display = '';
  if (area)    { area.style.display = 'none'; area.innerHTML = ''; }
  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('on'); });
  LAB.ch = 0;
}

function updateLabOverall() {
  var total = 0, done = 0;
  for (var n = 1; n <= 12; n++) {
    var s = labGetSaved(n);
    if (MCQ_CHAPTERS.indexOf(n) >= 0) {
      total += (LAB_DATA[n] || []).length;
      if (s) done += s.ok;
    } else {
      total += (TERMINAL_DATA[n] ? TERMINAL_DATA[n].missions.length : 0);
      var mDone = 0;
      (TERMINAL_DATA[n] ? TERMINAL_DATA[n].missions : []).forEach(function(m) {
        if (TERM.doneMissions && TERM.doneMissions['ch'+n+'_'+m.id]) mDone++;
      });
      done += mDone;
    }
  }
  var pct = total > 0 ? Math.round(done/total*100) : 0;
  var fill = document.getElementById('labOverallFill');
  if (fill) fill.style.width = pct + '%';
}

function startLab(n) {
  LAB.ch = n;
  var qs = LAB_DATA[n];
  if (!qs || !qs.length) return;
  LAB.questions = qs.slice().sort(function(){ return Math.random() - .5; });
  LAB.cur = 0; LAB.ans = []; LAB.answered = false;

  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('on'); });
  var btn = document.getElementById('labchbtn' + n);
  if (btn) btn.classList.add('on');

  var welcome = document.getElementById('labWelcome');
  var area    = document.getElementById('lqArea');
  if (welcome) welcome.style.display = 'none';
  if (area)    area.style.display = 'block';
  renderLabQ();
}

function renderLabQ() {
  var q    = LAB.questions[LAB.cur];
  var tot  = LAB.questions.length;
  var ch   = CHAPTERS.find(function(c){ return c.n === LAB.ch; });
  var data = LANG === 'he' ? ch.he : ch.en;
  LAB.answered = false;

  var pips = '';
  for (var i = 0; i < tot; i++) {
    var cls = i < LAB.cur ? (LAB.ans[i]===1?' ok':' bad') : i===LAB.cur?' cur':'';
    pips += '<div class="lq-pip'+cls+'"></div>';
  }

  var idx  = [0,1,2,3].sort(function(){ return Math.random()-.5; });
  var shuf = idx.map(function(j){ return q.a[j]; });
  var newC = idx.indexOf(q.c);
  var LBL  = LANG === 'he' ? ['א','ב','ג','ד'] : ['A','B','C','D'];

  var optsHtml = '';
  for (var j = 0; j < 4; j++) {
    optsHtml += '<button class="lq-opt" data-i="'+j+'" data-c="'+newC+'">' +
      '<span class="lq-lbl">'+LBL[j]+'</span>' +
      '<span class="lq-txt">'+shuf[j]+'</span>' +
      '<span class="lq-ic"></span></button>';
  }

  var snipHtml = q.snip
    ? '<div class="lq-snip"><div class="lqs-bar"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div><div class="lqs-body">'+q.snip+'</div></div>'
    : '';

  var ok       = LAB.ans.filter(function(x){ return x===1; }).length;
  var scoreL   = LANG === 'he' ? 'נכון' : 'correct';
  var restartL = LANG === 'he' ? '↺ התחל מחדש' : '↺ Restart';
  var nextL    = LANG === 'he' ? '← הבא' : 'Next →';

  document.getElementById('lqArea').innerHTML =
    '<div class="lq-header">' +
      '<div class="lq-ch-icon">'+ch.icon+'</div>' +
      '<div><div class="lq-ch-name">'+data.name+'</div>' +
        '<div class="lq-ch-num">'+String(LAB.ch).padStart(2,'0')+' / 12</div></div>' +
      '<div class="lq-spacer"></div>' +
      '<div class="lq-scorebox"><div class="lq-sv" id="lqSv">'+ok+' / '+LAB.cur+'</div><div class="lq-sl">'+scoreL+'</div></div>' +
    '</div>' +
    '<div class="lq-pips">'+pips+'</div>' +
    '<div class="lq-card" id="lqCard">' +
      '<div class="lq-meta"><span class="lq-num">'+(LAB.cur+1)+' / '+tot+'</span><span class="lq-cat">'+q.cat+'</span></div>' +
      snipHtml +
      '<div class="lq-q">'+q.q+'</div>' +
      '<div class="lq-opts" id="lqOpts">'+optsHtml+'</div>' +
      '<div class="lq-exp" id="lqExp"><div class="lq-exp-lbl" id="lqExpLbl"></div><div class="lq-exp-txt" id="lqExpTxt"></div></div>' +
    '</div>' +
    '<div class="lq-foot">' +
      '<button class="lq-btn" onclick="startLab(LAB.ch)">'+restartL+'</button>' +
      '<button class="lq-btn next" id="lqNext" onclick="nextLabQ()" disabled>'+nextL+'</button>' +
    '</div>';

  document.querySelectorAll('.lq-opt').forEach(function(btn) {
    btn.addEventListener('click', onLabPick);
  });
}

function onLabPick(e) {
  if (LAB.answered) return;
  LAB.answered = true;
  var btn  = e.currentTarget;
  var pick = parseInt(btn.dataset.i);
  var corr = parseInt(btn.dataset.c);
  var ok   = pick === corr;
  LAB.ans.push(ok ? 1 : 0);

  document.querySelectorAll('.lq-opt').forEach(function(b, j) {
    b.disabled = true;
    if (j === corr) b.classList.add('correct');
    else if (j === pick) b.classList.add('wrong');
  });

  var q       = LAB.questions[LAB.cur];
  var expLbl  = document.getElementById('lqExpLbl');
  var expTxt  = document.getElementById('lqExpTxt');
  var ic      = btn.querySelector('.lq-ic');
  if (ic) ic.textContent = ok ? '✓' : '✗';
  if (expLbl) expLbl.textContent = ok ? (LANG==='he'?'✓ נכון!':'✓ Correct!') : (LANG==='he'?'✗ לא נכון':'✗ Wrong');
  if (expLbl) expLbl.className   = 'lq-exp-lbl ' + (ok ? 'ok' : 'bad');
  if (expTxt) expTxt.textContent = q.e;

  var sv = document.getElementById('lqSv');
  if (sv) sv.textContent = LAB.ans.filter(function(x){return x===1;}).length + ' / ' + LAB.ans.length;

  var next = document.getElementById('lqNext');
  if (next) next.disabled = false;

  if (ok) { XP += 5; localStorage.setItem('nw_xp', XP); document.getElementById('xpTotal').textContent = XP; }
  LAB.cur++;
}

function nextLabQ() {
  if (LAB.cur >= LAB.questions.length) { showLabResult(); return; }
  renderLabQ();
}

function showLabResult() {
  var ok  = LAB.ans.filter(function(x){ return x===1; }).length;
  var tot = LAB.questions.length;
  var pct = Math.round(ok/tot*100);
  var ch  = CHAPTERS.find(function(c){ return c.n === LAB.ch; });
  var data = LANG === 'he' ? ch.he : ch.en;

  labSave(LAB.ch, ok, tot);
  var lwfill = document.getElementById('lwbf' + LAB.ch);
  if (lwfill) lwfill.style.width = pct + '%';
  var lcbfill = document.getElementById('lcbf' + LAB.ch);
  if (lcbfill) lcbfill.style.width = pct + '%';
  updateLabOverall();
  XP += ok * 5; localStorage.setItem('nw_xp', XP);
  document.getElementById('xpTotal').textContent = XP;
  // Quiz labels
  var qzHomeH = document.getElementById('qzHomeH');
  var qzHomeP = document.getElementById('qzHomeP');
  var qzNavBtn = document.getElementById('quizNavBtn');
  if (qzHomeH) qzHomeH.textContent = isHe ? 'חידון טריוויה' : 'Trivia Quiz';
  if (qzHomeP) qzHomeP.textContent = isHe
    ? 'ענה על שאלות מהר ככל האפשר — כל שנייה שווה נקודות!'
    : 'Answer as fast as you can — every second counts!';
  if (qzNavBtn) qzNavBtn.textContent = isHe ? '⚡ חידון' : '⚡ Quiz';
  var lbl10 = document.getElementById('qzLbl10');
  var lbl20 = document.getElementById('qzLbl20');
  var lblAll = document.getElementById('qzLblAll');
  if (lbl10) lbl10.textContent  = isHe ? 'שאלות מהירות' : 'Quick Round';
  if (lbl20) lbl20.textContent  = isHe ? 'מרתון' : 'Marathon';
  if (lblAll) lblAll.textContent = isHe ? 'כל השאלות' : 'All Questions';
  var qzScoreLbl  = document.getElementById('qzScoreLbl');
  var qzStreakLbl = document.getElementById('qzStreakLbl');
  var qzNumLbl    = document.getElementById('qzNumLbl');
  var qzQuit      = document.getElementById('qzQuit');
  if (qzScoreLbl)  qzScoreLbl.textContent  = isHe ? 'ניקוד' : 'Score';
  if (qzStreakLbl) qzStreakLbl.textContent  = isHe ? 'רצף'   : 'Streak';
  if (qzNumLbl)    qzNumLbl.textContent     = isHe ? 'שאלה'  : 'Q';

  var grade  = pct>=90?'S':pct>=80?'A':pct>=70?'B':pct>=60?'C':'D';
  var arcOff = 314 * (1 - pct/100);
  var arcCol = pct>=80 ? '#15803d' : pct>=60 ? '#a16207' : '#c2410c';
  var titles = LANG==='he'
    ? ['עוד לא שם... 📖','מתקדם! 💪','כל הכבוד! 🎯','מצוין! 🏆']
    : ['Keep practicing! 📖','Getting there! 💪','Well done! 🎯','Excellent! 🏆'];
  var tier = pct>=90?3:pct>=70?2:pct>=50?1:0;
  var againL  = LANG==='he' ? '↺ שחק שוב' : '↺ Play Again';
  var nextChL = LANG==='he' ? 'פרק '+(LAB.ch+1)+' →' : 'Ch '+(LAB.ch+1)+' →';
  var backL   = LANG==='he' ? '← חזרה' : '← Back';

  document.getElementById('lqArea').innerHTML =
    '<div class="lq-result">' +
      '<div class="lqr-ring"><svg viewBox="0 0 110 110"><circle class="lqr-bg" cx="55" cy="55" r="50"/><circle class="lqr-arc" id="lqrArc" cx="55" cy="55" r="50" stroke="'+arcCol+'"/></svg>' +
        '<div class="lqr-inner"><div class="lqr-pct">'+pct+'%</div><div class="lqr-grade">'+grade+'</div></div></div>' +
      '<div class="lqr-title">'+titles[tier]+'</div>' +
      '<div class="lqr-sub">'+data.name+' · '+ok+'/'+tot+'</div>' +
      '<div class="lqr-stats">' +
        '<div class="lqrs"><div class="lqrs-v" style="color:var(--gr)">'+ok+'</div><div class="lqrs-l">'+(LANG==='he'?'נכון':'correct')+'</div></div>' +
        '<div class="lqrs"><div class="lqrs-v" style="color:var(--ac2)">'+(tot-ok)+'</div><div class="lqrs-l">'+(LANG==='he'?'שגוי':'wrong')+'</div></div>' +
        '<div class="lqrs"><div class="lqrs-v">'+pct+'%</div><div class="lqrs-l">'+(LANG==='he'?'ציון':'score')+'</div></div>' +
      '</div>' +
      '<div class="lqr-btns">' +
        '<button class="lqr-replay" onclick="startLab(LAB.ch)">'+againL+'</button>' +
        (LAB.ch < 12
          ? '<button class="lqr-back" onclick="'+(isTerminalChapter(LAB.ch+1)?'startTerminal':'startLab')+'('+(LAB.ch+1)+')">'+nextChL+'</button>'
          : '<button class="lqr-back" onclick="goToLabWelcome()">'+backL+'</button>') +
      '</div>' +
    '</div>';

  setTimeout(function() {
    var arc = document.getElementById('lqrArc');
    if (arc) arc.style.strokeDashoffset = arcOff;
  }, 100);
}

function labGetSaved(n) {
  var raw = localStorage.getItem('nw_lab_' + n);
  return raw ? JSON.parse(raw) : null;
}

function labSave(n, ok, total) {
  localStorage.setItem('nw_lab_' + n, JSON.stringify({ ok: ok, total: total }));
}

   INIT
══════════════════════════════════════════ */
buildLandGrid();
buildSidebar();
buildLabSidebar();
buildLabWelcome();
applyLangUI();
initQuiz();


// Override goTo for standalone pages
var _PAGE = 'lab';
var _PAGE_MAP = {landing:'index.html',learn:'learn.html',lab:'lab.html',quiz:'quiz.html'};
function goTo(id) {
  if (id !== _PAGE) { window.location.href = _PAGE_MAP[id] || '#'; return; }
  // same page — show/hide if multiple sections
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('on'); });
  document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('on'); });
  var sc = document.getElementById(id);
  if (sc) sc.classList.add('on');
}


startLab(7);


</script>
