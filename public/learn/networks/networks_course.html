<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>רשתות תקשורת — Networks</title>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f7f7f2;
  --bg2:      #ffffff;
  --bg3:      #f0f0ea;
  --surface:  #ffffff;
  --border:   #e5e5e0;
  --border2:  #d1d1ca;
  --accent:   #0e7490;
  --accent2:  #0a5c72;
  --accentfg: #ffffff;
  --green:    #58cc02;
  --green2:   #46a302;
  --greenfg:  #ffffff;
  --yellow:   #ffd900;
  --yellowfg: #785a00;
  --red:      #ff4b4b;
  --redfg:    #ffffff;
  --blue:     #1cb0f6;
  --bluefg:   #ffffff;
  --text:     #3c3c3c;
  --text2:    #6b6b6b;
  --text3:    #afafaf;
  --mono:     'Courier New', 'Consolas', monospace;
  --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --r:        12px;
  --r2:       20px;
  --r3:       24px;
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 200;
  background: var(--bg2); border-bottom: 2px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px;
}
.header-logo {
  font-weight: 800; font-size: 16px; color: var(--accent);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  letter-spacing: -0.3px;
}
.header-logo-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--green); box-shadow: 0 2px 0 var(--green2);
}
.header-chname {
  font-size: 13px; font-weight: 600; color: var(--text2);
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lang-btn {
  font-size: 12px; font-weight: 800; padding: 6px 14px; border-radius: var(--r);
  border: 2px solid var(--border2); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text2);
  cursor: pointer; flex-shrink: 0; transition: all .1s;
  text-transform: uppercase; letter-spacing: .04em;
}
.lang-btn:hover { background: var(--accent); color: var(--accentfg); border-color: var(--accent2); border-bottom-color: var(--accent2); }
.lang-btn:active { transform: translateY(2px); border-bottom-width: 2px; }

/* ── CHAPTER NAV BAR ── */
.ch-nav {
  position: fixed; top: 60px; left: 0; right: 0; z-index: 150;
  background: var(--bg2); border-bottom: 2px solid var(--border);
  overflow-x: auto; display: flex; padding: 8px 16px; gap: 6px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.ch-nav::-webkit-scrollbar { display: none; }
.sb-label { display: none; }
.ch-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 14px; gap: 3px; border: 2px solid transparent;
  background: var(--bg3); border-radius: var(--r2);
  cursor: pointer; transition: all .15s; flex-shrink: 0;
  color: var(--text2); min-width: 52px;
  border-bottom: 4px solid var(--border);
}
.ch-btn:hover { background: var(--bg2); border-color: var(--border2); color: var(--text); }
.ch-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent2); border-bottom-color: var(--accent2);
}
.ch-num { font-size: 11px; font-weight: 800; font-family: var(--mono); }
.ch-title-text { font-size: 9px; font-weight: 600; max-width: 68px; text-align: center; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.ch-stars { font-size: 10px; min-height: 12px; }

/* ── LAYOUT ── */
.main {
  padding-top: 112px; min-height: 100vh;
  max-width: 780px; margin: 0 auto;
  padding-left: 20px; padding-right: 20px; padding-bottom: 60px;
}

/* ── CHAPTER ── */
.chapter { display: none; }
.chapter.active { display: block; }

/* ── CHAPTER HERO ── */
.ch-hero {
  padding: 28px 0 24px; border-bottom: 2px solid var(--border); margin-bottom: 28px;
}
.ch-tag {
  display: inline-block; font-size: 11px; font-weight: 800;
  color: var(--accent); background: var(--bg3);
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
  letter-spacing: .06em; text-transform: uppercase; font-family: var(--mono);
}
.ch-title { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 8px; letter-spacing: -.5px; line-height: 1.2; }
.ch-desc { font-size: 14px; color: var(--text2); margin-bottom: 20px; max-width: 560px; }
.tabs-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 18px; font-size: 13px; font-weight: 800; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text3);
  cursor: pointer; transition: all .1s; text-transform: uppercase; letter-spacing: .04em;
}
.tab-btn:hover { color: var(--text2); border-color: var(--border2); }
.tab-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
.tab-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent2); border-bottom-color: var(--accent2);
}

/* ── TAB PANELS ── */
.tab-panels { }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── LEARN CONTENT ── */
.did-you-know {
  background: linear-gradient(135deg, #fffdf0, #fff9e0);
  border: 2px solid var(--yellow); border-radius: var(--r2);
  padding: 16px 18px; font-size: 13.5px; color: #5a4a00;
  margin-bottom: 28px; line-height: 1.6;
  box-shadow: 0 3px 0 #e6c700;
}
.section-title {
  font-size: 17px; font-weight: 900; color: var(--text);
  margin: 32px 0 12px; letter-spacing: -.2px;
  display: flex; align-items: center; gap: 8px;
}
.prose {
  font-size: 15px; color: var(--text2); line-height: 1.78; margin-bottom: 16px;
}
.prose code, code {
  font-family: var(--mono); font-size: 12.5px;
  background: var(--bg3); padding: 2px 6px;
  border-radius: 6px; color: var(--accent2); font-weight: 600;
}

/* ── CODE BLOCKS ── */
.code-block {
  background: #1a1a2e; border-radius: var(--r2); padding: 18px 20px;
  margin: 16px 0; overflow-x: auto;
  border: 2px solid #2a2a4e; box-shadow: 0 4px 0 #0f0f20;
}
.code-block code {
  font-family: var(--mono); font-size: 12.5px; line-height: 1.75;
  background: none; padding: 0; color: #e2e8f0; display: block;
  font-weight: normal;
}
.comment { color: #6272a4; }

/* ── CARDS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin: 16px 0 24px; }
.card {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2);
  padding: 18px; display: flex; flex-direction: column; gap: 8px;
  transition: transform .1s;
}
.card:hover { transform: translateY(-2px); }
.card-icon { font-size: 26px; }
.card-title { font-size: 13px; font-weight: 800; color: var(--text); }
.card-body { font-size: 13px; color: var(--text2); line-height: 1.55; }

/* ── TABLE ── */
.table-wrap {
  overflow-x: auto; margin: 16px 0 24px;
  border-radius: var(--r2); border: 2px solid var(--border);
  box-shadow: 0 4px 0 var(--border);
}
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead { background: var(--bg3); }
.data-table th {
  padding: 11px 14px; text-align: left; font-weight: 800;
  color: var(--text2); font-size: 11px; text-transform: uppercase;
  letter-spacing: .06em; border-bottom: 2px solid var(--border);
}
.data-table td { padding: 11px 14px; color: var(--text2); border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg3); }

/* ── FLOW ROW ── */
.flow-row {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  margin: 16px 0 24px; padding: 20px; background: var(--bg2);
  border-radius: var(--r2); border: 2px solid var(--border);
  box-shadow: 0 4px 0 var(--border);
}
.flow-step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.flow-step-icon { font-size: 24px; }
.flow-step-label { font-size: 10px; font-weight: 700; color: var(--text3); line-height: 1.3; max-width: 64px; text-align: center; }
.flow-arrow { color: var(--accent); font-size: 18px; font-weight: 900; }

/* ── CALLOUTS ── */
.callout { padding: 14px 18px; border-radius: var(--r2); font-size: 13.5px; line-height: 1.6; margin: 16px 0; border: 2px solid; }
.callout-info  { background: #e8f4ff; border-color: #b3d9ff; color: #1a5a8a; box-shadow: 0 3px 0 #b3d9ff; }
.callout-warn  { background: #fff8e0; border-color: var(--yellow); color: #785a00; box-shadow: 0 3px 0 #e6c700; }
.callout-tip   { background: #e8fae8; border-color: #a8e6a8; color: #1a5a1a; box-shadow: 0 3px 0 #a8e6a8; }
.callout-success { background: var(--bg3); border-color: var(--border); color: var(--text2); padding: 10px 14px; }

/* ── REAL WORLD BOX ── */
.real-world-box {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2);
  padding: 20px; margin: 24px 0;
}
.real-world-title { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
.real-world-body { font-size: 13.5px; color: var(--text2); line-height: 1.7; }

/* ── END OF CHAPTER NAV ── */
.ch-end-nav {
  display: flex; gap: 12px; margin-top: 36px; padding-top: 24px;
  border-top: 2px solid var(--border); justify-content: center; flex-wrap: wrap;
}
.ch-end-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 16px 24px; border-radius: var(--r2); cursor: pointer;
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text2); font-weight: 800;
  font-size: 13px; transition: all .1s; min-width: 130px;
  text-transform: uppercase; letter-spacing: .04em;
}
.ch-end-btn:hover { transform: translateY(-2px); border-color: var(--accent); color: var(--accent); }
.ch-end-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
.ch-end-btn.primary {
  background: var(--green); color: var(--greenfg);
  border-color: var(--green2); border-bottom-color: var(--green2);
}
.ch-end-btn.primary:hover { background: var(--green2); }
.ch-end-btn-icon { font-size: 22px; }
.ch-end-btn-label { font-size: 11px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px; border-radius: var(--r2); font-size: 14px;
  font-weight: 800; border: 2px solid; cursor: pointer; transition: all .1s;
  text-transform: uppercase; letter-spacing: .04em;
}
.btn:active { transform: translateY(2px); border-bottom-width: 2px !important; }
.btn-primary {
  background: var(--green); color: var(--greenfg);
  border-color: var(--green2); border-bottom: 4px solid var(--green2);
}
.btn-primary:hover { background: var(--green2); }
.btn-ghost {
  background: var(--bg2); color: var(--text2);
  border-color: var(--border2); border-bottom: 4px solid var(--border2);
}
.btn-ghost:hover { background: var(--bg3); color: var(--text); }

/* ── GAME ── */
.game-wrap { max-width: 680px; }
.game-start-card { max-width: 420px; margin: 0 auto; text-align: center; padding: 40px 24px; }
.game-icon { font-size: 56px; margin-bottom: 16px; filter: drop-shadow(0 4px 0 rgba(0,0,0,.1)); }
.game-start-title { font-size: 24px; font-weight: 900; color: var(--text); margin-bottom: 8px; letter-spacing: -.5px; }
.game-start-desc { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
.game-rules { display: flex; justify-content: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
.game-rule {
  font-size: 13px; font-weight: 700; color: var(--text2);
  background: var(--bg3); padding: 8px 14px; border-radius: var(--r);
  border: 2px solid var(--border);
}
.game-hud {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding: 12px 18px;
  background: var(--bg2); border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
}
.hud-score { font-size: 22px; font-weight: 900; color: var(--green); font-family: var(--mono); }
.hud-timer { font-size: 15px; font-weight: 800; color: var(--text2); font-family: var(--mono); }
.game-q-text { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
.game-opts { display: flex; flex-direction: column; gap: 10px; }
.game-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); cursor: pointer; transition: all .1s;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.game-opt:hover { border-color: var(--accent); border-bottom-color: var(--accent2); transform: translateY(-1px); }
.game-opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.game-opt.correct { border-color: var(--green); border-bottom-color: var(--green2); background: #e8fae8; color: #1a5a1a; }
.game-opt.wrong   { border-color: var(--red); background: #fff0f0; color: #8a1a1a; }
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg3); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; flex-shrink: 0; color: var(--text2);
  font-family: var(--mono);
}
.game-result-card { max-width: 420px; margin: 32px auto 0; text-align: center; }
.result-score { font-size: 60px; font-weight: 900; color: var(--green); font-family: var(--mono); line-height: 1; margin-bottom: 4px; }
.result-label { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 24px; }
.result-emoji { font-size: 52px; margin-bottom: 8px; }
.result-btns { display: flex; gap: 12px; justify-content: center; }
.result-stars { font-size: 28px; margin-bottom: 8px; }

/* ── QUIZ ── */
.quiz-wrap { max-width: 680px; }
.quiz-prog { display: flex; gap: 4px; margin-bottom: 24px; }
.quiz-pip { flex: 1; height: 8px; border-radius: 4px; background: var(--border2); transition: background .2s; }
.quiz-pip.done { background: var(--green); }
.quiz-pip.cur  { background: var(--accent); }
.quiz-q-card { display: none; }
.quiz-q-card.active { display: block; }
.quiz-meta { font-size: 11px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.quiz-q { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
.quiz-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.quiz-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 18px; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); cursor: pointer; transition: all .1s;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.quiz-opt:hover { border-color: var(--accent); border-bottom-color: var(--accent2); transform: translateY(-1px); }
.quiz-opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.quiz-opt.selected { border-color: var(--accent); background: #f0f4ff; }
.quiz-opt.correct   { border-color: var(--green); border-bottom-color: var(--green2); background: #e8fae8; }
.quiz-opt.wrong     { border-color: var(--red); border-bottom-color: #cc0000; background: #fff0f0; }
.quiz-exp {
  padding: 14px 18px; background: #e8fae8; border-radius: var(--r2);
  border: 2px solid var(--green); border-bottom: 4px solid var(--green2);
  font-size: 13.5px; color: #1a5a1a; margin: 12px 0; line-height: 1.6;
}
.quiz-actions { display: flex; gap: 10px; margin-top: 8px; }
.quiz-result { display: none; text-align: center; padding: 32px 0; }
.qr-score { font-size: 56px; font-weight: 900; font-family: var(--mono); color: var(--green); margin-bottom: 4px; }
.qr-label { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 24px; }
.quiz-nav { display: flex; justify-content: space-between; margin-top: 12px; }

/* ── CHEAT / SUMMARY ── */
.cheat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 14px; margin-top: 8px; }
.cheat-card {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2); padding: 16px;
}
.cheat-card-title { font-size: 11px; font-weight: 900; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .08em; }
.cheat-item { display: flex; justify-content: space-between; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.cheat-item:last-child { border-bottom: none; }
.cheat-key { font-family: var(--mono); color: var(--accent); font-weight: 700; font-size: 11.5px; flex-shrink: 0; }
.cheat-val { color: var(--text2); text-align: right; font-size: 11.5px; }

/* ── CREDITS ── */
.credits-bar { border-top: 2px solid var(--border); padding: 32px 0; margin-top: 48px; }
.credits-title { font-size: 10px; font-weight: 900; color: var(--accent); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 16px; font-family: var(--mono); }
.credits-grid { display: flex; flex-wrap: wrap; gap: 24px; }
.credit-group { flex: 1; min-width: 140px; }
.credit-group-title { font-size: 11px; font-weight: 800; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
.credit-item { font-size: 12px; color: var(--text3); line-height: 1.9; }
.credit-item a { color: var(--accent); text-decoration: none; font-weight: 700; }
.credit-item a:hover { text-decoration: underline; }

/* ── MOBILE ── */
@media (max-width: 700px) {
  .main { padding-top: 108px; padding-left: 16px; padding-right: 16px; }
  .ch-title { font-size: 20px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .flow-row { padding: 14px; gap: 4px; }
  .flow-step-label { font-size: 9px; max-width: 52px; }
  .game-rules { gap: 10px; }
  .quiz-actions { flex-wrap: wrap; }
  .result-btns { flex-wrap: wrap; }
  .ch-end-nav { gap: 8px; }
  .ch-end-btn { min-width: 100px; padding: 14px 16px; }
}
@media (max-width: 480px) {
  .ch-nav { padding: 6px 10px; }
  .ch-btn { padding: 7px 10px; min-width: 44px; }
}


/* ── RICH SUMMARY CARDS ── */
.sum-block { margin-bottom: 28px; }
.sum-block-title {
  font-size: 13px; font-weight: 800; color: var(--accent);
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 10px; font-family: var(--mono);
  display: flex; align-items: center; gap: 8px;
}
.sum-block-title::after { content:''; flex:1; height:1px; background:var(--border); }
.sum-row {
  display: grid; grid-template-columns: 200px 1fr;
  gap: 10px 16px; padding: 9px 0;
  border-bottom: 1px solid var(--border); align-items: start;
}
.sum-row:last-child { border-bottom: none; }
.sum-k { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); line-height: 1.4; }
.sum-v { font-size: 13px; color: var(--text2); line-height: 1.6; }
.sum-v strong { color: var(--text); font-weight: 700; }
.sum-v code { font-size: 11.5px; background: var(--bg3); padding: 1px 5px; border-radius: 3px; color: var(--accent2,var(--accent)); font-family: var(--mono); }
.sum-tip { margin-top: 10px; padding: 10px 14px; background: var(--yellowbg,#fffbeb); border-radius: var(--r,8px); border: 1px solid #fde68a; font-size: 13px; color: #713f12; line-height: 1.6; }
.sum-danger { margin-top: 10px; padding: 10px 14px; background: #fff1f2; border-radius: var(--r,8px); border: 1px solid #fecaca; font-size: 13px; color: #991b1b; line-height: 1.6; }
@media (max-width: 560px) { .sum-row { grid-template-columns: 1fr; gap: 2px; } }
/* ── FULL REVIEW DRAWER ── */
.review-btn { flex-shrink:0; padding:5px 12px; background:var(--accent); color:#fff; border:none; border-radius:var(--r,8px); font-size:12px; font-weight:700; cursor:pointer; transition:all .15s; letter-spacing:.02em; margin-left:6px; }

`
<div class="section-title">האינטרנט — לא ענן, לא אלחוטי. כבלים.</div>
<p class="prose">כשאנשים אומרים "העלתי לענן" — רוב האנשים מדמיינים משהו אלחוטי שצף באוויר. האמת: <strong>האינטרנט הוא כבלים פיזיים</strong>. כבלים עבים כזרוע אדם, שמשתרעים מתחת לאוקיינוסים ומחברים יבשות. כ-400 כבלים כאלה קיימים כיום בעולם. WiFi הוא רק הקטע האחרון — מהנתב הביתי למחשב שלך.</p>

<div class="callout idea">💡 <strong>האינטרנט מול רשת האינטרנט העולמית — שני דברים שונים:</strong> האינטרנט הוא התשתית הפיזית — כבלים, נתבים, חיבורים. הרשת העולמית (WWW) היא שירות אחד שרץ עליה — האתרים שגולשים בדפדפן. מייל, זום, וואטסאפ — שירותים נוספים על אותה תשתית.</div>

<div class="section-title">Packet Switching — ההמצאה שהכל מתבסס עליה</div>
<p class="prose">לפני 1969, שיחת טלפון הייתה שומרת <strong>חוט פיזי שלם</strong> רק לשניכם. עלות: חוט שלם עסוק לאורך כל השיחה. ב-1969 המציאו: <strong>Packet Switching</strong>.</p>
<p class="prose">כל קובץ מחולק ל<strong>packets</strong> — חבילות קטנות (~1,500 bytes כל אחת). כל חבילה מקבל כותרת עם כתובת מקור, כתובת יעד, ומספר סידורי. כל חבילה בוחרת נתיב בנפרד. נתב עמוס? עוקף. כבל נחתך? מוצא דרך אחרת. מגיעים? מורכבים מחדש לפי המספר הסידורי.</p>

<table class="data-table">
<tr><th></th><th>Circuit Switching (טלפון ישן)</th><th>Packet Switching (אינטרנט)</th></tr>
<tr><td>נתיב</td><td>חוט קבוע ובלעדי לאורך כל השיחה</td><td>כל חבילה בוחרת נתיב בנפרד, בזמן אמת</td></tr>
<tr><td>כשל</td><td>נתיב נפסק = חיבור נופל לחלוטין</td><td>Packets מוצאים נתיב חלופי אוטומטית</td></tr>
<tr><td>יעילות</td><td>חוט עומד ריק בשתיקות</td><td>אלפי users משתמשים באותם כבלים בו-זמנית</td></tr>
<tr><td>עלות</td><td>יקר — חוט ייעודי לכל חיבור</td><td>זול — שיתוף מקסימלי של תשתית</td></tr>
</table>

<div class="section-title">5 השכבות שצריך להכיר</div>
<p class="prose">הרשת בנויה בשכבות — כל שכבה עושה משהו אחד ומסתירה את הפרטים מהשכבה שמעליה. כך מפתח אתר לא צריך לדעת איך כבל הנחושת מייצג 0 ו-1, ומהנדס כבלים לא צריך להבין HTTP.</p>
<p class="prose">דמיינו שאתם שולחים חבילה בדואר: אתם כותבים מה יש בה (Application), עוטפים אותה (Transport), כותבים כתובת (Network), הדוור מחלק בשכונה (Data Link), והמשאית נוסעת על הכביש (Physical). כל אחד עושה את שלו בלי לדעת מה השכבה האחרת עושה.</p>
<table class="data-table">
<tr><th>שכבה</th><th>שם</th><th>מה היא עושה</th><th>דוגמאות</th></tr>
<tr><td>5</td><td>Application</td><td>השירות עצמו — מה שהמשתמש רואה</td><td>HTTP, DNS, Email</td></tr>
<tr><td>4</td><td>Transport</td><td>מבטיחה שהמידע הגיע שלם ובסדר</td><td>TCP, UDP</td></tr>
<tr><td>3</td><td>Network</td><td>מנתבת packets בין רשתות שונות</td><td>IP</td></tr>
<tr><td>2</td><td>Data Link</td><td>מעבירה frames בתוך רשת מקומית אחת</td><td>Ethernet, WiFi</td></tr>
<tr><td>1</td><td>Physical</td><td>מייצגת 0 ו-1 כחשמל, אור, או גלי רדיו</td><td>כבל, fiber, אוויר</td></tr>
</table>
<div class="callout idea">💡 <strong>לזכור את הסדר:</strong> כשדפדפן שולח בקשה — היא יורדת מלמעלה למטה (Application → Physical). כשמגיעה לשרת — עולה חזרה (Physical → Application). כל שכבה קוראת רק את החלק שלה.</div>


<div class="section-title">ISP ו-IXP — מי מחבר את כולם לאינטרנט</div>
<p class="prose"><strong>ISP</strong> (ראשי תיבות של Internet Service Provider, כלומר: ספק שירותי אינטרנט) הוא החברה שמחברת את הבית שלך לאינטרנט — בזק, Hot, Partner.</p>
<p class="prose">אבל שאלה מעניינת: איך email שנשלח מלקוח של בזק מגיע ללקוח של Partner? הרי אלה שתי חברות שונות לגמרי.</p>
<p class="prose">בלי פתרון, כל חבילה היה צריך לנסוע מישראל לשרתי ביניים באירופה ולחזור. בזבוז ענק של זמן וכסף. הפתרון: <strong>IXP</strong> — Internet Exchange Point. זוהי נקודה פיזית (בניין, חדר שרתים) שבה כל ספקי האינטרנט בישראל מתחברים ישירות אחד לשני. בישראל: IL-IX בתל אביב — נקודת החיבור הישראלית.</p>
<table class="data-table">
<tr><th>גוף</th><th>מה הוא עושה</th><th>דוגמאות</th></tr>
<tr><td><strong>ISP Tier 1</strong></td><td>מחזיק כבלים תת-ימיים בין יבשות. מחובר לכל העולם ישירות</td><td>AT&amp;T, Deutsche Telekom</td></tr>
<tr><td><strong>ISP Tier 2</strong></td><td>קונה גישה מ-Tier 1, מוכר לך ולי</td><td>בזק, Hot, Partner</td></tr>
<tr><td><strong>IXP</strong></td><td>נקודת חיבור שבה ISPs מתחברים ישירות — חוסך עיגולים מיותרים</td><td>IL-IX (תל אביב)</td></tr>
</table>

<div class="section-title">IP Address — כתובת הבית של כל מחשב ברשת</div>
<p class="prose">כל מכשיר שמחובר לאינטרנט מקבל <strong>כתובת IP</strong>. בלעדיה, אי אפשר לשלוח data ולקבל תשובה. כמו כתובת בית: הדואר לא מגיע ללא כתובת מדויקת.</p>

<table class="data-table">
<tr><th>סוג</th><th>דוגמה</th><th>מה זה</th><th>מאיפה מגיע</th></tr>
<tr><td>IPv4 פרטי</td><td>192.168.1.5</td><td>בתוך הרשת הביתית בלבד</td><td>הנתב (DHCP)</td></tr>
<tr><td>IPv4 ציבורי</td><td>85.250.12.44</td><td>מה שהעולם רואה</td><td>ISP</td></tr>
<tr><td>IPv6</td><td>2001:db8::1 <span style="font-size:11px;color:var(--text2)">(פורמט חדש — 8 קבוצות ספרות)</span></td><td>128 סיביות — מספיק לכל מכשיר בעולם לנצח</td><td>ISP / רשת</td></tr>
<tr><td>Loopback</td><td>127.0.0.1</td><td>המחשב מדבר עם עצמו</td><td>מובנה ב-OS</td></tr>
</table>

<div class="callout warn">⚠️ <strong>IPv4 נגמר ב-2011.</strong> היו רק 4.2 מיליארד כתובות — פחות ממספר המכשירים. הפתרון: <strong>NAT</strong> — הנתב מקבל IP ציבורי אחד ומסתיר מאחוריו כל המכשירים שלך. מבחוץ נראה כמו מחשב אחד. מבפנים — עשרות מכשירים.</div>

<div class="section-title">DNS — ספר הטלפונים של האינטרנט (שעובד ב-20ms)</div>
<p class="prose">מחשבים עובדים עם מספרים (142.250.185.46). אנשים זוכרים שמות (google.com). DNS מתרגם. כשכותבים google.com, מתרחש תהליך של עד 8 שאילתות — אבל עם זיכרון מטמון הוא לרוב נגמר ב-1:</p>

<ol class="prose">
<li><strong>Cache מקומי</strong> — המחשב בדק אם הוא שאל על google.com לאחרונה. אם כן — מיד מחזיר (0ms)</li>
<li><strong>זיכרון הנתב</strong> — הנתב הביתי שומר גם הוא תשובות. אם הוא זוכר — מחזיר (1ms)</li>
<li><strong>זיכרון שרת הספק</strong> — שרת ה-DNS של הספק (5ms)</li>
<li><strong>שרתי Root</strong> (Root Name Servers) — 13 שרתים בעולם, יודעים איפה כל TLD</li>
<li><strong>שרת ה-.com</strong> (TLD Name Server) — יודע איפה כל דומיין ב-.com</li>
<li><strong>שרת google.com</strong> (Authoritative NS) — מחזיר את ה-IP הסופי</li>
</ol>

<div class="td td-dark"><div class="td-bar"><div class="td-dots"><span class="td-dot td-r"></span><span class="td-dot td-y"></span><span class="td-dot td-g"></span></div><div class="td-url td-dark-url">Terminal</div></div><div class="td-body td-body-dark"><span class="tc-prompt">$</span> <span class="tc-cmd">ping google.com</span>

<div class="section-title">Routing — כיצד Packets מוצאים את דרכם</div>
<p class="prose">כשחבילה יוצאת, כל <strong>נתב</strong> בדרך בודק את כתובת היעד ומחליט לאיפה לשלוח הלאה. החלטה זו נעשית בנאנו-שניות על בסיס <strong>Routing Table</strong> — טבלה שמתעדכנת אוטומטית בעזרת פרוטוקולים כמו BGP.</p>

<div class="td td-dark"><div class="td-bar"><div class="td-dots"><span class="td-dot td-r"></span><span class="td-dot td-y"></span><span class="td-dot td-g"></span></div><div class="td-url td-dark-url">Terminal</div></div><div class="td-body td-body-dark"><span class="tc-prompt">$</span> <span class="tc-cmd">traceroute -n google.com</span>

<div class="section-title">BGP — פרוטוקול שמחזיק את האינטרנט ביחד</div>
<p class="prose"><strong>BGP</strong> (Border Gateway Protocol — פרוטוקול ניהול הנתיבים בין ספקים) הוא הפרוטוקול שמחבר את כל ספקי האינטרנט בעולם. כל ISP מכריז: "אני מחזיק את ה-IP ranges האלה", ו-BGP מפיץ את הידע הזה לכל העולם. כשספק חדש מתחבר לאינטרנט — BGP מפיץ את ה-routes שלו תוך דקות. תקלת BGP אחת ב-2021 הורידה את Facebook, Instagram ו-WhatsApp ל-6 שעות.</p>

<div class="section-title">הבעיה — IP לא אמין בכלל</div>
<p class="prose">IP הוא <strong>best-effort</strong> — "אני עושה מיטבי". אין הבטחה שpacket יגיע. Packets יכולים: ללכת לאיבוד (נתב עמוס זורק אותה), להגיע בסדר שגוי (כל חבילה בחר נתיב אחר), להגיע כפולה (תקלה נדירה בנתב). לגלישה, מייל, קבצים — זה בלתי אפשרי. פה נכנס TCP.</p>

<div class="section-title">TCP — כיצד נוצר חיבור אמין</div>
<p class="prose">לפני שנתון ראשון עובר, TCP מבצע <strong>3-Way Handshake</strong>. שימו לב ל-sequence numbers — הם הסוד לאמינות:</p>

</div></div><div style="margin-top:10px;padding:9px 12px;direction:rtl;text-align:right;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:12px;font-family:var(--sans);color:#166534;line-height:1.6">seq numbers מאפשרים לשני הצדדים לאמת שכל חבילה הגיע ובסדר הנכון. זה הבסיס של אמינות TCP.</div></div></div>

<div class="section-title">כיצד TCP מבטיח אמינות</div>
<table class="data-table">
<tr><th>מנגנון</th><th>כיצד עובד</th></tr>
<tr><td><strong>Sequence Numbers</strong></td><td>כל byte מקבל מספר. הצד המקבל יודע בדיוק מה הגיע ומה חסר</td></tr>
<tr><td><strong>ACK</strong></td><td>הצד המקבל מאשר כל קבוצת bytes. ללא ACK — השולח שולח שוב</td></tr>
<tr><td><strong>Retransmission</strong></td><td>ללא אישור בזמן הקצוב — packet נשלח מחדש אוטומטית</td></tr>
<tr><td><strong>Flow Control</strong></td><td>גודל חלון — הצד המקבל אומר כמה bytes הוא מסוגל לעכל</td></tr>
<tr><td><strong>Congestion Control</strong></td><td>TCP מגלה עומס ברשת ומאט אוטומטית</td></tr>
</table>

<div class="section-title">TCP vs. UDP — מתי כל אחד</div>
<table class="data-table">
<tr><th>שימוש</th><th>פרוטוקול</th><th>למה</th></tr>
<tr><td>גלישה (HTTP/HTTPS)</td><td>TCP</td><td>HTML חייב להגיע שלם ובסדר</td></tr>
<tr><td>הורדת קבצים</td><td>TCP</td><td>byte אחד חסר = קובץ פגום</td></tr>
<tr><td>Email (SMTP/IMAP)</td><td>TCP</td><td>מייל חייב להגיע מלא</td></tr>
<tr><td>Gaming, Zoom</td><td>UDP</td><td>frame ישן (50ms) = זבל. עדיף לזרוק ולקבל הבא</td></tr>
<tr><td>DNS</td><td>UDP</td><td>שאלה קצרה + תשובה קצרה. TCP handshake = עלות מיותרת</td></tr>
<tr><td>Streaming (Netflix)</td><td>TCP+QUIC</td><td>TCP לבקרה, QUIC להזרמת הוידאו</td></tr>
</table>

<div class="section-title">בקרת עומס — כיצד TCP לא "שובר" את הרשת</div>
<p class="prose">כשTCP מתחיל חיבור, הוא שולח כמות קטנה של חבילות ומגדיל בהדרגה (תהליך "התחלה איטית" — Slow Start). אם מגלה שחבילות נאבדות — מאט לחצי. אם רשת פנויה — מאיץ שוב. זה האלגוריתם שמונע מכל ה-TCP connections בעולם להכביד על אותה תשתית בו-זמנית.</p>

<div class="section-title">HTTP — שפת הדפדפן</div>
<p class="prose">HTTP (HyperText Transfer Protocol) הוא פרוטוקול שאלה-תשובה: דפדפן שולח <strong>request</strong>, שרת מחזיר <strong>response</strong>. כל לחיצה, כל טעינת דף, כל שליחת טופס — אחד מהם. HTTP פועל בשכבת Application (שכבה 7) ורץ על TCP.</p>

<table class="data-table">
<tr><th>Method</th><th>מה זה עושה</th><th>דוגמה</th><th>האם שולח body?</th></tr>
<tr><td>GET</td><td>בקש מידע</td><td>פתיחת דף, חיפוש</td><td>לא</td></tr>
<tr><td>POST</td><td>שלח data חדש</td><td>התחברות, יצירת משתמש</td><td>כן</td></tr>
<tr><td>PUT</td><td>החלף משאב קיים</td><td>עדכון פרופיל מלא</td><td>כן</td></tr>
<tr><td>PATCH</td><td>עדכן חלקית</td><td>שינוי שם בלבד</td><td>כן</td></tr>
<tr><td>DELETE</td><td>מחק</td><td>מחיקת פוסט</td><td>לא בד"כ</td></tr>
<tr><td>HEAD</td><td>כמו GET, רק headers</td><td>בדיקת גודל קובץ לפני הורדה</td><td>לא</td></tr>
</table>

<table class="data-table">
<tr><th>Status Code</th><th>קטגוריה</th><th>משמעות</th></tr>
<tr><td>200 OK</td><td>2xx Success</td><td>הצליח</td></tr>
<tr><td>201 Created</td><td>2xx</td><td>משאב נוצר (אחרי POST)</td></tr>
<tr><td>301 Moved Permanently</td><td>3xx Redirect</td><td>עבר לכתובת חדשה לצמיתות</td></tr>

<div class="section-title">TLS Handshake — מה קורה מאחורי הנעילה</div>
<p class="prose">אחרי TCP, HTTPS מוסיף <strong>TLS</strong>. ב-TLS 1.3 (הגרסה הנוכחית) זה קורה ב-<strong>סבב תקשורת אחד בלבד</strong>:</p>
<ol class="prose">
<li><strong>שלב 1 — Client Hello</strong> — "תומך ב-TLS 1.3, אלו האלגוריתמים להצפנה (cipher suites) שאני תומך בהם"</li>
<li><strong>שלב 2 — Server Hello + תעודה</strong> — "בוחר AES-256-GCM, הנה תעודת הזהות שלי (חתומה ע"י DigiCert)"</li>
<li><strong>שלב 3 — חילופי מפתחות</strong> (Key Exchange) — שני הצדדים מחשבים מפתח הצפנה משותף בשיטה מתמטית (Diffie-Hellman) — כך שהמפתח הסופי <em>לעולם לא עובר ברשת</em>, אבל שניהם מגיעים לאותה תוצאה</li>
<li><strong>שלב 4 — סיום</strong> (Finished) — מעכשיו הכל מוצפן עם מפתח שלאף אחד אחר אין</li>
</ol>
<p class="prose"><strong>Perfect Forward Secrecy</strong> — מפתח חדש לכל session. גם אם מישהו ישמור את כל ה-traffic של היום ויפרוץ מפתח בעתיד — לא יוכל לפענח שיחות ישנות שהקליט.</p>

<div class="section-title">WiFi — Shared Medium ו-CSMA/CA</div>
<p class="prose">WiFi הוא <strong>Shared Medium</strong> — כולם משתמשים בתדר ביחד. כמו חדר ישיבות עם מיקרופון אחד. כדי למנוע התנגשויות, WiFi משתמש ב-<strong>CSMA/CA</strong>:</p>
<ol class="prose">
<li><strong>האזנה</strong> (Carrier Sense) — מאזין לאוויר: האם מישהו משדר?</li>
<li><strong>גישה משותפת</strong> (Multiple Access) — אם לא — ממתין זמן רנדומלי קצר</li>
<tr><td><strong>מניעת התנגשויות</strong> (Collision Avoidance) — משדר. אם שניים שידרו ביחד — שניהם מנסים שוב</td></tr>
</ol>

<div class="section-title">Bandwidth vs. Latency — שני מדדים, שני שימושים</div>
<table class="data-table">

<tr><td><strong>Latency (RTT)</strong></td><td>זמן הלוך וחזור של packet — "אורך הכביש"</td><td>ms</td><td>Gaming (&lt;20ms), Zoom, API calls</td></tr>

</table>

<div class="callout idea">💡 <strong>למה שני המדדים חשובים?</strong><br><br>
דמיינו כביש: <strong>bandwidth</strong> = כמה נתיבים יש (כמה מכוניות יכולות לנסוע ביחד). <strong>Latency</strong> = כמה זמן לוקח לנסוע מנקודה לנקודה.<br><br>
<strong>Netflix:</strong> צריך הרבה נתיבים (bandwidth גבוה) כדי להעביר וידאו — אבל זה בסדר אם כל frame מגיע חצי שנייה אחרי האחר. latency גבוהה לא מפריעה.<br><br>
<strong>Gaming:</strong> לוחצים "ירי" — השרת חייב לקבל את זה תוך פחות מ-20ms. אחרת נראה שהמשחק "קופץ". bandwidth נמוך לא בעיה — לFPS אין הרבה data — אבל latency גבוהה = המשחק בלתי ניתן למשחק.<br><br>
<strong>המסקנה:</strong> אינטרנט "מהיר" יכול להיות גרוע לgaming אם ה-latency גבוהה, גם אם ה-bandwidth ענקי.</div>

<p class="prose">הקופסה שמבזק/Hot/Partner = <strong>חמישה מכשירים שונים</strong> שאוחדו מסיבות עסקיות:</p>

<div class="section-title">Switch — כיצד לומד מי איפה</div>
<p class="prose">Switch שרק הורכב — לא יודע כלום. הוא בונה <strong>MAC Address Table</strong> בהדרגה:</p>
<ol class="prose">
<li>מחשב A שולח frame — Switch רואה: "MAC של A הגיע מ-Port 1"</li>
<li>Switch מאחסן: Port 1 = MAC של A</li>
<li>בפעם הבאה שמישהו שולח ל-MAC של A — Switch שולח רק ל-Port 1</li>
<li>לא מכיר? שולח לכולם (Flood) עד שלומד</li>
</ol>

<div class="section-title">DHCP — כיצד המחשב מקבל כתובת IP</div>
<p class="prose">כשמחשב מתחבר לרשת — הוא לא יודע את כתובת ה-IP שלו. DHCP Handshake (4 שלבים, זכרו DORA):</p>
<ol class="prose">
<li><strong>גילוי</strong> (Discover) — המחשב צועק לכל הרשת: "יש כאן DHCP Server?"</li>
<li><strong>הצעה</strong> (Offer) — השרת מציע: "הנה כתובת 192.168.1.105, תוקף ל-24 שעות"</li>
<li><strong>בקשה</strong> (Request) — המחשב: "אני מקבל את ההצעה הזו"</li>
<li><strong>אישור</strong> (Acknowledge) — השרת: "מאושר. הכתובת שלך"</li>
</ol>

</table>

<div class="section-title">The Internet — Not a Cloud, Not Wireless. Cables.</div>
<p class="prose">When people say "I uploaded to the cloud" — most imagine something wireless floating in the air. The reality: <strong>the internet is physical cables</strong>. Cables as thick as a human arm, stretching under oceans and connecting continents. About 400 such cables exist today. WiFi is only the last segment — from your router to your device.</p>

<div class="callout idea">💡 <strong>Internet vs. WWW:</strong> The Internet = roads (physical infrastructure). WWW (websites) = shops on the roads. Email, Zoom and WhatsApp also travel these roads — they're services, not "the internet" itself.</div>

<div class="section-title">Packet Switching — The Invention Everything Is Built On</div>
<p class="prose">Before 1969, a phone call reserved an <strong>entire physical wire</strong> just for you two. In 1969: <strong>Packet Switching</strong> was invented.</p>
<p class="prose">Every file is split into <strong>packets</strong> (~1,500 bytes each). Each packet gets a header with source address, destination address, and sequence number. Each packet independently chooses its own path. Congested router? Goes around it. Cable cut? Finds another route. Arrives? Reassembled using sequence numbers.</p>

<table class="data-table">
<tr><th></th><th>Circuit Switching (old phone)</th><th>Packet Switching (internet)</th></tr>
<tr><td>Path</td><td>Fixed, exclusive wire for the entire call</td><td>Each packet chooses independently in real time</td></tr>
<tr><td>Failure</td><td>Path cut = connection drops completely</td><td>Packets find alternative route automatically</td></tr>
<tr><td>Efficiency</td><td>Wire sits idle during silence</td><td>Thousands of users share same cables simultaneously</td></tr>
</table>

<div class="section-title">The OSI Model — 7 Layers That Explain Everything</div>
<table class="data-table">
<tr><th>Layer</th><th>Name</th><th>What it does</th><th>Examples</th></tr>
<tr><td>7</td><td>Application</td><td>Interface with user</td><td>HTTP, DNS, SMTP, FTP</td></tr>
<tr><td>6</td><td>Presentation</td><td>Encryption, compression, formats</td><td>TLS, gzip, JPEG</td></tr>
<tr><td>5</td><td>Session</td><td>Managing sessions</td><td>Login sessions, WebSocket</td></tr>
<tr><td>4</td><td>Transport</td><td>Reliability and ordering</td><td>TCP, UDP</td></tr>
<tr><td>3</td><td>Network</td><td>Routing between networks</td><td>IP, ICMP</td></tr>
<tr><td>2</td><td>Data Link</td><td>Communication within local network</td><td>Ethernet, WiFi (802.11)</td></tr>
<tr><td>1</td><td>Physical</td><td>Bits on wire/air</td><td>Cable, fiber, radio</td></tr>
</table>

<div class="section-title">ISP, IXP, and Backbone — Who Connects Everything</div>
<p class="prose"><strong>Tier 1 ISPs</strong> (AT&T, Deutsche Telekom, NTT) = companies that own submarine cables and are connected to everyone. <strong>Tier 2 ISPs</strong> (your local provider) = buy access from Tier 1, sell to customers. <strong>IXP</strong> = Internet Exchange Point — locations where ISPs connect directly without paying a third party. Without IXP — an email between two local providers would route through Frankfurt and back.</p>

<div class="section-title">IP Address — Every Device's Home Address on the Network</div>
<p class="prose">Every device connected to the internet gets an <strong>IP address</strong>. Without it, you can't send data and receive a reply. Like a home address: mail doesn't arrive without a precise address.</p>

<table class="data-table">
<tr><th>Type</th><th>Example</th><th>What it is</th><th>Where it comes from</th></tr>
<tr><td>Private IPv4</td><td>192.168.1.5</td><td>Inside home network only</td><td>Router (DHCP)</td></tr>
<tr><td>Public IPv4</td><td>85.250.12.44</td><td>What the world sees</td><td>ISP</td></tr>
<tr><td>IPv6</td><td>2001:db8::1</td><td>128 bits — 340 undecillion addresses</td><td>ISP / network</td></tr>
<tr><td>Loopback</td><td>127.0.0.1</td><td>Computer talking to itself</td><td>Built into OS</td></tr>
</table>

<div class="callout warn">⚠️ <strong>IPv4 ran out in 2011.</strong> Only 4.2 billion addresses — fewer than the number of devices. Solution: <strong>NAT</strong> — your router gets one public IP and hides all your devices behind it. From outside: looks like one computer. From inside: dozens of devices.</div>

<div class="section-title">DNS — The Internet's Phone Book (Working in 20ms)</div>
<p class="prose">Computers work with numbers (142.250.185.46). Humans remember names (google.com). DNS translates. When you type google.com, up to 8 queries happen — but with cache it usually finishes in 1:</p>
<ol class="prose">
<li><strong>Local cache</strong> — Computer remembers? Done (0ms)</li>
<li><strong>Router cache</strong> — Router remembers? Done (1ms)</li>
<li><strong>ISP cache</strong> — ISP's DNS server (5ms)</li>
<li><strong>שרתי Root</strong> (Root Name Servers) — 13 servers worldwide, know where every TLD is</li>
<li><strong>.com Name Server</strong> — knows where every .com domain is</li>
<li><strong>google.com Name Server</strong> — returns the final IP</li>
</ol>

<div class="section-title">Routing — How Packets Find Their Way</div>
<p class="prose">When a packet leaves, every <strong>router</strong> checks the destination address and decides where to forward it next. This decision happens in nanoseconds based on a <strong>Routing Table</strong> that updates automatically via protocols like BGP.</p>

<div class="section-title">BGP — The Protocol Holding the Internet Together</div>
<p class="prose"><strong>BGP</strong> (Border Gateway Protocol) is the protocol between ISPs — each ISP announces which IP ranges it holds, and BGP distributes this knowledge globally. A BGP misconfiguration in 2021 took Facebook, Instagram and WhatsApp offline for 6 hours.</p>

<div class="section-title">The Problem — IP Is Completely Unreliable</div>
<p class="prose">IP is <strong>best-effort</strong> — "I'll do my best". No guarantee a packet arrives. Packets can: get lost (overwhelmed router drops them), arrive out of order (each took a different path), arrive duplicated (rare router bug). For browsing, email, files — this is impossible to work with. Enter TCP.</div>

<div class="section-title">TCP — How a Reliable Connection Is Created</div>
<p class="prose">Before the first byte passes, TCP performs a <strong>3-Way Handshake</strong>. Note the sequence numbers — they're the secret to reliability:</p>

<div class="section-title">How TCP Guarantees Reliability</div>
<table class="data-table">
<tr><th>Mechanism</th><th>How it works</th></tr>
<tr><td><strong>Sequence Numbers</strong></td><td>Every byte gets a number. Receiver knows exactly what arrived and what's missing</td></tr>
<tr><td><strong>ACK</strong></td><td>Receiver acknowledges each group of bytes. Without ACK — sender retransmits</td></tr>
<tr><td><strong>Retransmission</strong></td><td>Without ACK within timeout — packet sent again automatically</td></tr>
<tr><td><strong>Flow Control</strong></td><td>Window size — receiver tells sender how many bytes it can handle</td></tr>
<tr><td><strong>Congestion Control</strong></td><td>TCP detects network congestion and slows down automatically</td></tr>
</table>

<div class="section-title">TCP vs. UDP — When to Use Each</div>

</table>

<div class="section-title">TLS Handshake — What Happens Behind the Lock</div>
<p class="prose">After TCP, HTTPS adds <strong>TLS</strong>. In TLS 1.3 (current version) this happens in <strong>one round trip only</strong>:</p>
<ol class="prose">
<li><strong>שלב 1 — Client Hello</strong> — "I support TLS 1.3, these are the cipher suites I support"</li>
<li><strong>שלב 2 — Server Hello + תעודה</strong> — "Choosing AES-256-GCM, here's my identity certificate (signed by DigiCert)"</li>
<li><strong>שלב 3 — חילופי מפתחות</strong> (Key Exchange) — Both sides compute a shared key (Diffie-Hellman) without the key itself ever traveling the network</li>
<li><strong>שלב 4 — סיום</strong> (Finished) — From now on everything is encrypted with a key nobody else has</li>
</ol>
<p class="prose"><strong>Perfect Forward Secrecy</strong> — new key for every session. Even if someone saves today's traffic and cracks a key in the future — they can't decrypt past sessions.</p>

<div class="section-title">WiFi — Shared Medium and CSMA/CA</div>
<p class="prose">WiFi is a <strong>Shared Medium</strong> — everyone uses the frequency together. Like a meeting room with one microphone. To prevent collisions, WiFi uses <strong>CSMA/CA</strong>:</p>
<ol class="prose">
<li><strong>האזנה</strong> (Carrier Sense) — Listens to the air: is anyone transmitting?</li>
<li><strong>גישה משותפת</strong> (Multiple Access) — If not — waits a short random time</li>
<li><strong>Collision Avoidance</strong> — Transmits. If two transmitted simultaneously — both try again</li>
</ol>

<tr><td>Range</td><td>Long — penetrates walls</td><td>Medium</td><td>Short — needs line of sight</td></tr>
<tr><td>Non-overlapping channels</td><td>Only 3!</td><td>25 channels</td><td>59 channels</td></tr>

<tr><td>When to use</td><td>Far room, plugged in</td><td>Near router, streaming</td><td>New router, low latency</td></tr>
</table>

<div class="section-title">Bandwidth vs. Latency — Two Metrics, Two Use Cases</div>
<table class="data-table">
<tr><th>Metric</th><th>What it is</th><th>Measured in</th><th>Critical for</th></tr>
<tr><td><strong>Bandwidth</strong></td><td>Data per second — "road width"</td><td>Mbps, Gbps</td><td>Netflix 4K (25 Mbps), downloads</td></tr>
<tr><td><strong>Latency (RTT)</strong></td><td>Round trip time of one packet — "road length"</td><td>ms</td><td>Gaming (&lt;20ms), Zoom, API calls</td></tr>
<tr><td><strong>Jitter</strong></td><td>Variability in latency between packets</td><td>ms</td><td>Zoom, voice calls</td></tr>

<div class="section-title">Your Home Router — One Box, Five Devices</div>
<table class="data-table">

<tr><td><strong>Modem</strong></td><td>Converts ISP's analog/DSL/fiber signal to digital Ethernet</td><td>1-2</td></tr>
<tr><td><strong>Router</strong></td><td>Routes between home network (192.168.x.x) and internet. Manages NAT</td><td>3</td></tr>
<tr><td><strong>Switch</strong></td><td>Connects wired devices, learns MAC addresses</td><td>2</td></tr>
<tr><td><strong>WAP</strong></td><td>Wireless Access Point — broadcasts WiFi</td><td>2</td></tr>
<tr><td><strong>DHCP Server</strong></td><td>Automatically assigns IP addresses to every connecting device</td><td>7</td></tr>

<div class="section-title">Switch — How It Learns Who's Where</div>
<p class="prose">A newly powered switch knows nothing. It builds its <strong>MAC Address Table</strong> gradually:</p>
<ol class="prose">
<li>Computer A sends a frame — Switch sees: "A's MAC came from Port 1"</li>
<li>Switch stores: Port 1 = A's MAC</li>
<li>Next time someone sends to A's MAC — Switch sends only to Port 1</li>
<li>Unknown MAC? Floods to everyone (Flood) until it learns</li>
</ol>

<div class="section-title">DHCP — How Your Computer Gets an IP Address</div>
<p class="prose">When a computer connects to a network — it doesn't know its IP address. DHCP Handshake (4 steps, remember DORA):</p>
<ol class="prose">
<li><strong>גילוי</strong> (Discover) — Computer broadcasts: "Is there a DHCP Server here?"</li>
<li><strong>הצעה</strong> (Offer) — Server proposes: "Here's address 192.168.1.105, valid for 24 hours"</li>
<li><strong>בקשה</strong> (Request) — Computer: "I'll take that offer"</li>
<li><strong>אישור</strong> (Acknowledge) — Server: "Confirmed. The address is yours"</li>
</ol>

<div class="section-title">Firewall Types</div>
<table class="data-table">
<tr><th>Type</th><th>Layer</th><th>Checks</th><th>Doesn't check</th></tr>
<tr><td>Stateless / Packet Filter</td><td>3-4</td><td>IP, Port, Protocol per packet</td><td>Doesn't understand conversation context</td></tr>
<tr><td>Stateful</td><td>3-4</td><td>Remembers connections, checks if packet belongs to legitimate connection</td><td>Doesn't understand payload content</td></tr>
<tr><td>NGFW (Next-Gen)</td><td>3-7</td><td>Opens and analyzes content, application identification, DPI</td><td>Encrypted traffic (without TLS inspection)</td></tr>
<tr><td>WAF (Web)</td><td>7</td><td>SQL injection, XSS, CSRF inside HTTP</td><td>Non-HTTP traffic</td></tr>
</table>

MATCH_DATA[6]={"pairs": [["Wireshark", "כלי לצפייה בpackets ברשת"], ["Filter", "מסנן packets בWireshark"], ["Ethernet", "פרוטוקול שכבה 2 — MAC addresses"], ["MAC Address", "כתובת פיזית של כרטיס רשת"], ["Port", "מספר שמזהה שירות ספציפי (80=HTTP, 443=HTTPS)"], ["Promiscuous Mode", "מצב שבו כרטיס רשת לוכד כל packet"]]};

MATCH_DATA[7]={"pairs": [["DNS Query", "בקשה לתרגום שם ל-IP"], ["ARP", "מגלה MAC address של IP בRשת מקומית"], ["CDN", "שרתי cache מפוזרים גיאוגרפית"], ["QUIC", "UDP + TLS מובנה — בסיס HTTP/3"], ["Round Trip", "זמן הלוך וחזור של packet"], ["HTTP/3", "HTTP שרץ על QUIC במקום TCP"]]};
MATCH_DATA_EN[7]={"pairs": [["DNS Query", "Request to translate a name to an IP"], ["ARP", "Discovers MAC address of an IP on local network"], ["CDN", "Geographically distributed cache servers"], ["QUIC", "UDP + built-in TLS — basis of HTTP/3"], ["Round Trip", "Time for a packet to travel there and back"], ["HTTP/3", "HTTP running on QUIC instead of TCP"]]};
var TOTAL_CHAPTERS = 8;
var currentLang = 'he';
var state = { cur: 0, tabs: {}, game: {} };
var COURSE_ICON = '🌐';

function L() { return C[currentLang]; }

function toggleLang() {
  currentLang = currentLang === 'he' ? 'en' : 'he';
  applyLang(currentLang);
}

function applyLang(lang) {
  currentLang = lang;
  var Lc = L();
  document.documentElement.setAttribute('dir', Lc.dir);
  document.documentElement.setAttribute('lang', Lc.lang);
  var lb = document.getElementById('langBtn');
  if(lb) lb.textContent = Lc.langBtn;
  for(var i = 0; i < TOTAL_CHAPTERS; i++) {
    var el = document.getElementById('chname-' + i);
    if(el) el.textContent = Lc.names[i] || '';
  }
  renderChapter(state.cur);
  activateTab(state.cur, state.tabs[state.cur] || 'learn');
}

function renderChapter(n) {
  var Lc = L();
  var set = function(id, val, prop) {
    var el = document.getElementById(id);
    if(el) el[prop || 'textContent'] = val;
  };
  set('chname-' + n, Lc.names[n] || '');
  set('chtag-' + n, Lc.tags[n] || '');
  set('chtitle-' + n, Lc.names[n] || '');
  set('chdesc-' + n, Lc.descs[n] || '');
  var cheatEl = document.getElementById('cheat-' + n);
  if(cheatEl) cheatEl.innerHTML = Lc.cheat[n] || '';
  var learnEl = document.getElementById('learn-' + n);
  if(learnEl) {
    learnEl.innerHTML = Lc.learn[n] || '';
    if(learnEl.innerHTML.indexOf('CHID') >= 0)
      learnEl.innerHTML = learnEl.innerHTML.replace(/CHID/g, n);
  }
  var tabsEl = document.getElementById('tabs-' + n);
  if(tabsEl) {
    var tabs = Lc.tabs, keys = Lc.tabKeys, cur = state.tabs[n] || 'learn';
    tabsEl.innerHTML = tabs.map(function(t, ti) {
      return '<button class="tab-btn' + (cur === keys[ti] ? ' active' : '') +
        '" onclick="showTab(' + n + ',\'' + keys[ti] + '\')">' + t + '</button>';
    }).join('');
  }
  var gameEl = document.getElementById('game-' + n);
  if(gameEl) { gameEl.innerHTML = ''; delete gameEl.dataset.rendered; }
}

function showChapter(n) {
  if(n < 0 || n >= TOTAL_CHAPTERS) return;
  var prev = document.getElementById('ch-' + state.cur);
  if(prev) prev.classList.remove('active');
  var prevBtn = document.getElementById('nav-' + state.cur);
  if(prevBtn) prevBtn.classList.remove('active');
  state.cur = n;
  renderChapter(n);
  var ch = document.getElementById('ch-' + n);
  if(ch) ch.classList.add('active');
  var btn = document.getElementById('nav-' + n);
  if(btn) btn.classList.add('active');
  window.scrollTo(0, 0);
  activateTab(n, state.tabs[n] || 'learn');
}

function showNextChapter(n) {
  showChapter(n + 1);
}

function showTab(chId, tabName) {
  state.tabs[chId] = tabName;
  activateTab(chId, tabName);
}

function activateTab(chId, tabName) {
  var ch = document.getElementById('ch-' + chId);
  if(!ch) return;
  ch.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.classList.remove('active');
    if(btn.getAttribute('onclick') && btn.getAttribute('onclick').indexOf("'" + tabName + "'") >= 0)
      btn.classList.add('active');
  });
  ch.querySelectorAll('.tab-panel').forEach(function(p) {
    p.classList.toggle('active', p.id === chId + '-' + tabName);
  });
  if(tabName === 'game') renderMatchGame(chId);
}

function renderMatchGame(chId) {
  var el = document.getElementById('game-' + chId);
  if(!el) return;
  if(!state.game[chId]) state.game[chId] = {phase:'idle',sel:null,matched:[],pairs:[]};
  var gs = state.game[chId];
  if(gs.phase === 'idle' || !gs.pairs.length) {
    var d = (currentLang === 'en' ? MATCH_DATA_EN : MATCH_DATA)[chId];
    if(!d || !d.pairs || !d.pairs.length) {
      el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text2)">אין זוגות לפרק זה</div>';
      return;
    }
    var p = d.pairs.slice();
    for(var i = p.length-1; i > 0; i--) {
      var j = Math.floor(Math.random()*(i+1)); var t=p[i]; p[i]=p[j]; p[j]=t;
    }
    gs.pairs=p; gs.matched=[]; gs.sel=null; gs.phase='play';
  }
  buildMatchBoard(chId);
}

function buildMatchBoard(chId) {
  var el = document.getElementById('game-'+chId);
  var gs = state.game[chId], pairs = gs.pairs;
  var rights = pairs.map(function(p,i){return{text:p[1],idx:i};});
  for(var i=rights.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=rights[i];rights[i]=rights[j];rights[j]=t;}
  var ad = gs.matched.length===pairs.length;
  var html = '<div class="match-board">';
  if(ad){
    html+='<div class="match-success">🎉 '+(currentLang==='en'?'All matched!':'!כל הזוגות הותאמו')+'</div>';
    html+='<div style="text-align:center;margin-top:12px"><button class="match-restart-btn" onclick="restartMatch('+chId+')">'+(currentLang==='en'?'↺ Play Again':'↺ שחק שוב')+'</button></div>';
  }
  html+='<div class="match-cols"><div class="match-col">';
  for(var i=0;i<pairs.length;i++){
    var dn=gs.matched.indexOf(i)>=0, sn=gs.sel&&gs.sel.side==='left'&&gs.sel.idx===i;
    html+='<div class="match-card'+(dn?' match-done':'')+(sn?' match-sel':'')+'" data-side="left" data-idx="'+i+'" onclick="matchClick('+chId+',this)">'+pairs[i][0]+'</div>';
  }
  html+='</div><div class="match-col">';
  for(var i=0;i<rights.length;i++){
    var ri=rights[i], dn=gs.matched.indexOf(ri.idx)>=0, sn=gs.sel&&gs.sel.side==='right'&&gs.sel.ridx===i;
    html+='<div class="match-card'+(dn?' match-done':'')+(sn?' match-sel':'')+'" data-side="right" data-idx="'+ri.idx+'" data-ridx="'+i+'" onclick="matchClick('+chId+',this)">'+ri.text+'</div>';
  }
  html+='</div></div></div>';
  el.innerHTML=html;
}

function matchClick(chId, el) {
  var gs=state.game[chId];
  if(!gs||gs.phase!=='play') return;
  var side=el.getAttribute('data-side'), idx=parseInt(el.getAttribute('data-idx')), ridx=el.hasAttribute('data-ridx')?parseInt(el.getAttribute('data-ridx')):-1;
  if(gs.matched.indexOf(idx)>=0) return;
  if(!gs.sel){gs.sel={side:side,idx:idx,ridx:ridx};buildMatchBoard(chId);return;}
  if(gs.sel.side===side){gs.sel={side:side,idx:idx,ridx:ridx};buildMatchBoard(chId);return;}
  var li=side==='left'?idx:gs.sel.idx, ri=side==='right'?idx:gs.sel.idx;
  gs.sel=null;
  if(li===ri){
    gs.matched.push(li);
    if(gs.matched.length===gs.pairs.length) gs.phase='done';
    buildMatchBoard(chId);
  } else {
    buildMatchBoard(chId);
    document.querySelectorAll('#game-'+chId+' .match-card').forEach(function(c){
      var ci=parseInt(c.getAttribute('data-idx')), cs=c.getAttribute('data-side');
      if((cs==='left'&&ci===li||cs==='right'&&ci===ri)&&gs.matched.indexOf(ci)<0){
        c.classList.add('match-wrong');
        setTimeout(function(){c.classList.remove('match-wrong');},600);
      }
    });
  }
}

function restartMatch(chId) {
  state.game[chId]={phase:'idle',sel:null,matched:[],pairs:[]};
  renderMatchGame(chId);
}

function buildReviewContent() {
  var Lc=L(), html='';
  for(var i=0;i<Lc.cheat.length;i++){
    html+='<div class="review-chapter">'
      +'<div class="review-ch-title">פרק '+(i<10?'0'+i:i)+' — '+(Lc.names[i]||'')+'</div>'
      +'<div style="padding:14px 16px">'+(Lc.cheat[i]||'')+'</div>'
      +'</div>';
  }
  return html;
}

function openReview() {
  var el=document.getElementById('reviewBody');
  if(el) el.innerHTML=buildReviewContent();
  var overlay=document.getElementById('reviewOverlay'), drawer=document.getElementById('reviewDrawer');
  if(overlay) overlay.classList.add('open');
  if(drawer) drawer.classList.add('open');
}

function closeReview() {
  var overlay=document.getElementById('reviewOverlay'), drawer=document.getElementById('reviewDrawer');
  if(overlay) overlay.classList.remove('open');
  if(drawer) drawer.classList.remove('open');
}

document.addEventListener('DOMContentLoaded', function() {
  applyLang('he');
  showChapter(0);
});

document.addEventListener('keydown', function(e) {
  if(e.key==='Escape') closeReview();
});

</script>
