<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetQuiz ⚡ חידון רשתות</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#070a12; --surf:#0f1520; --s2:#141c2e; --brd:#1a2540; --brd2:#243050;
  --txt:#d8e2f8; --dim:#5a6a8a; --mono:'IBM Plex Mono',monospace;
  --disp:'Syne',sans-serif; --body:'Space Grotesk',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:var(--txt);font-family:var(--body);overflow-x:hidden;}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.07) 0%,transparent 100%),
    radial-gradient(1px 1px at 35% 60%,rgba(255,255,255,.05) 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 30%,rgba(255,255,255,.06) 0%,transparent 100%),
    radial-gradient(1px 1px at 82% 75%,rgba(255,255,255,.04) 0%,transparent 100%),
    radial-gradient(1px 1px at 50% 90%,rgba(255,255,255,.05) 0%,transparent 100%);
}
#amb{position:fixed;inset:0;pointer-events:none;z-index:0;transition:background 1s;}

.wrap{max-width:740px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:1;}

/* ── SCREENS ── */
.screen{display:none;}
.screen.on{display:block;}

/* ═══════════════════════════════
   HOME
═══════════════════════════════ */
#home{padding-top:56px;text-align:center;}

.logo{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:11px;letter-spacing:3px;
  color:var(--dim);border:1px solid var(--brd);padding:5px 14px;
  border-radius:99px;background:rgba(255,255,255,.02);margin-bottom:28px;
}
.logo-dot{width:6px;height:6px;border-radius:50%;background:#34d399;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.home-title{
  font-family:var(--disp);font-weight:900;
  font-size:clamp(56px,13vw,100px);
  line-height:.95;letter-spacing:-4px;color:#fff;margin-bottom:6px;
}
.home-title span{
  background:linear-gradient(135deg,#f97316 0%,#fbbf24 40%,#a78bfa 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.home-sub{font-size:16px;color:var(--dim);margin-bottom:52px;font-weight:300;}

/* Track cards */
.tracks{display:flex;flex-direction:column;gap:12px;text-align:right;}

.track-card{
  background:var(--surf);border:1px solid var(--brd);border-radius:16px;
  padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:16px;
  position:relative;overflow:hidden;
  transition:transform .16s,border-color .16s,box-shadow .16s;
}
.track-card::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:3px;
  border-radius:0 16px 16px 0;background:var(--tc,transparent);
}
.track-card:hover{transform:translateX(5px);box-shadow:0 0 24px rgba(0,0,0,.3);}
.track-card:hover{border-color:var(--tc,var(--brd));}

.tc-icon{
  font-size:32px;width:54px;height:54px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.04);border:1px solid var(--brd);
}
.tc-info{flex:1;}
.tc-name{font-family:var(--disp);font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px;margin-bottom:2px;}
.tc-desc{font-size:12px;color:var(--dim);line-height:1.5;}
.tc-meta{flex-shrink:0;text-align:left;}
.tc-count{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:4px;}
.tc-arr{font-size:18px;color:var(--dim);transition:transform .15s;}
.track-card:hover .tc-arr{transform:translateX(-4px);color:#fff;}

/* ═══════════════════════════════
   QUIZ
═══════════════════════════════ */
#quiz{padding-top:24px;}

.quiz-top{
  display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;
}
.q-track-badge{
  font-family:var(--mono);font-size:11px;font-weight:600;
  padding:4px 12px;border-radius:6px;letter-spacing:.5px;
}
.q-spacer{flex:1;}

.xp-wrap{
  display:flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:13px;font-weight:700;color:#fbbf24;
}

.timer-box{
  font-family:var(--mono);font-size:14px;font-weight:700;
  padding:4px 14px;border-radius:8px;
  background:rgba(0,0,0,.3);border:1px solid var(--brd);
  min-width:52px;text-align:center;transition:all .2s;
}
.timer-box.hot{color:#f87171;border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.06);animation:sh .12s ease infinite alternate;}
@keyframes sh{from{transform:translateX(0)}to{transform:translateX(2px)}}

/* Progress */
.prog-bar{height:3px;background:var(--brd);border-radius:99px;margin-bottom:24px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .4s ease;}

/* Streak */
.streak-row{display:flex;gap:4px;justify-content:center;margin-bottom:14px;}
.s-pip{width:10px;height:10px;border-radius:3px;background:var(--brd);transition:background .2s;}
.s-pip.hot{background:#fbbf24;box-shadow:0 0 5px #fbbf24;}

/* Question card */
.q-card{
  background:var(--surf);border:1px solid var(--brd);border-radius:20px;
  overflow:hidden;animation:pop .28s cubic-bezier(.22,1,.36,1);
}
@keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.q-head{
  background:var(--s2);border-bottom:1px solid var(--brd);
  padding:13px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.q-num{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:1px;}
.q-cat{
  font-family:var(--mono);font-size:11px;padding:2px 9px;
  border-radius:5px;background:rgba(255,255,255,.05);border:1px solid var(--brd);color:var(--dim);
}
.q-xp{
  font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:5px;
  background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2);
  margin-right:auto;
}

.q-body{padding:24px 22px 18px;}

.q-snip{
  background:#040810;border:1px solid var(--brd);border-radius:10px;
  overflow:hidden;margin-bottom:20px;direction:ltr;text-align:left;
}
.snip-bar{
  display:flex;align-items:center;gap:5px;padding:7px 12px;
  background:rgba(255,255,255,.02);border-bottom:1px solid var(--brd);
}
.sd{width:8px;height:8px;border-radius:50%;}
.sd-r{background:#ff5f57}.sd-y{background:#febc2e}.sd-g{background:#28c840}
.snip-body{padding:12px 15px;font-family:var(--mono);font-size:12px;line-height:1.85;}

.q-text{
  font-size:18px;font-weight:500;color:#fff;line-height:1.5;
  margin-bottom:22px;letter-spacing:-.2px;
}

/* Options */
.opts{display:flex;flex-direction:column;gap:8px;}

.opt{
  background:rgba(255,255,255,.025);border:1px solid var(--brd);border-radius:11px;
  padding:13px 17px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;
  text-align:right;width:100%;font-family:var(--body);font-size:14px;
  color:var(--txt);line-height:1.5;transition:all .13s;
}
.opt:hover:not(.done){border-color:var(--brd2);background:rgba(255,255,255,.05);transform:translateX(-3px);}
.opt.done{cursor:default;pointer-events:none;}
.opt.correct{border-color:rgba(52,211,153,.5);background:rgba(52,211,153,.07);color:#fff;}
.opt.wrong{border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.05);color:var(--dim);}
.opt.reveal{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.04);}

.olbl{
  font-family:var(--mono);font-size:11px;font-weight:700;
  min-width:24px;height:24px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  color:var(--dim);background:rgba(255,255,255,.05);border:1px solid var(--brd);
  margin-top:1px;transition:all .13s;
}
.opt.correct .olbl{color:#34d399;background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.3);}
.opt.wrong   .olbl{color:#f87171;}
.otext{flex:1;text-align:right;}
.oicon{font-size:16px;min-width:20px;flex-shrink:0;margin-top:2px;text-align:center;}

/* Explanation */
.exp{
  border-radius:11px;padding:14px 17px;margin-top:13px;display:none;
  border-right:3px solid;animation:fadeUp .2s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.exp.ok {background:rgba(52,211,153,.06);border-color:#34d399;}
.exp.bad{background:rgba(248,113,113,.06);border-color:#f87171;}
.exp-lbl{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:5px;}
.exp.ok  .exp-lbl{color:#34d399;}
.exp.bad .exp-lbl{color:#f87171;}
.exp-txt{font-size:13px;color:var(--dim);line-height:1.8;}

/* Footer */
.q-foot{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}
.btn{
  font-family:var(--body);font-size:13px;font-weight:500;padding:9px 20px;
  border-radius:9px;cursor:pointer;transition:all .14s;
  border:1px solid var(--brd);background:transparent;color:var(--dim);
}
.btn:hover:not(:disabled){border-color:var(--txt);color:var(--txt);}
.btn:disabled{opacity:.3;cursor:default;}
.btn-next{
  background:var(--surf);border-color:var(--brd2);color:var(--txt);
  font-weight:600;padding:9px 26px;
}
.btn-next:hover:not(:disabled){background:var(--s2);}

/* XP pop */
.xpop{
  position:fixed;font-family:var(--mono);font-size:18px;font-weight:700;
  color:#fbbf24;pointer-events:none;z-index:9999;
  animation:xpf 1.1s ease forwards;
}
@keyframes xpf{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-64px) scale(1.25)}}

/* ═══════════════════════════════
   RESULT
═══════════════════════════════ */
#result{padding-top:56px;text-align:center;}

.ring-wrap{position:relative;width:156px;height:156px;margin:0 auto 24px;}
.ring-svg{position:absolute;inset:0;transform:rotate(-90deg);}
.ring-bg  {fill:none;stroke:var(--brd);stroke-width:10;}
.ring-arc {fill:none;stroke-width:10;stroke-linecap:round;stroke-dasharray:440;stroke-dashoffset:440;transition:stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1);}
.ring-inner{
  position:absolute;inset:18px;border-radius:50%;background:var(--surf);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ring-pct{font-family:var(--disp);font-size:34px;font-weight:900;color:#fff;line-height:1;}
.ring-grade{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:2px;margin-top:2px;}

.r-title{font-family:var(--disp);font-size:clamp(26px,6vw,42px);font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:6px;}
.r-sub{font-size:14px;color:var(--dim);margin-bottom:32px;font-weight:300;}

.r-stats{display:flex;gap:10px;justify-content:center;margin-bottom:32px;flex-wrap:wrap;}
.rs{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:14px 22px;min-width:80px;text-align:center;}
.rs-val{font-family:var(--mono);font-size:22px;font-weight:700;}
.rs-lbl{font-size:11px;color:var(--dim);margin-top:2px;font-family:var(--mono);letter-spacing:1px;}

.r-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-play{
  font-family:var(--body);font-size:14px;font-weight:600;padding:12px 32px;
  border-radius:11px;cursor:pointer;border:none;
  background:linear-gradient(135deg,#f97316,#a78bfa);color:#fff;
  transition:opacity .14s;
}
.btn-play:hover{opacity:.85;}
.btn-home{
  font-family:var(--body);font-size:14px;font-weight:500;padding:12px 24px;
  border-radius:11px;cursor:pointer;border:1px solid var(--brd);
  background:transparent;color:var(--dim);transition:all .14s;
}
.btn-home:hover{border-color:var(--txt);color:var(--txt);}

/* Fireworks */
.fw{position:fixed;pointer-events:none;z-index:9998;}
.fw-dot{position:absolute;width:7px;height:7px;border-radius:50%;animation:fwd 1s ease forwards;}
@keyframes fwd{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

/* Syntax */
.sk{color:#ff79c6}.sv{color:#8be9fd}.ss{color:#f1fa8c}.sn{color:#bd93f9}
.sc{color:#6272a4}.sg{color:#50fa7b}.so{color:#ffb86c}.sr{color:#ff5555}
</style>

<style>
/* mobile-fix */
html, body { overflow-x: hidden; max-width: 100vw; }
@media (max-width: 800px) {
  body { padding: 1rem !important; font-size: 15px; }
  .container, .chapter, .lab-container, .quiz-container { padding: 1rem !important; margin: 0 !important; border-radius: 8px !important; }
  pre, code { font-size: 12px !important; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
  table { font-size: 13px; display: block; overflow-x: auto; }
}
@media (max-width: 480px) {
  body { padding: 0.5rem !important; }
  h1 { font-size: 1.3rem !important; }
  h2 { font-size: 1.1rem !important; }
  h3 { font-size: 1rem !important; }
}
</style>
</head>
<body>
<div id="amb"></div>
<div class="wrap">

<!-- ═══ HOME ═══ -->
<section class="screen on" id="home">
  <div class="logo"><div class="logo-dot"></div>NETQUIZ</div>
  <h1 class="home-title">Net<span>Quiz</span></h1>
  <p class="home-sub">בחר מסלול — וקבל 15 שאלות מעורבות</p>

  <div class="tracks" id="trackList"></div>
</section>

<!-- ═══ QUIZ ═══ -->
<section class="screen" id="quiz">
  <div class="quiz-top">
    <span class="q-track-badge" id="qBadge"></span>
    <span class="q-spacer"></span>
    <div class="xp-wrap">⚡ <span id="xpNum">0</span></div>
    <div class="timer-box" id="timerBox">30</div>
  </div>

  <div class="streak-row" id="streakRow"></div>

  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>

  <div class="q-card" id="qCard">
    <div class="q-head">
      <span class="q-num" id="qNum">1 / 15</span>
      <span class="q-cat" id="qCat"></span>
      <span class="q-xp" id="qXp">+10 XP</span>
    </div>
    <div class="q-body">
      <div id="qSnip"></div>
      <div class="q-text" id="qText"></div>
      <div class="opts" id="qOpts"></div>
      <div class="exp" id="qExp">
        <div class="exp-lbl" id="expLbl"></div>
        <div class="exp-txt" id="expTxt"></div>
      </div>
    </div>
  </div>

  <div class="q-foot">
    <button class="btn" onclick="goHome()">← יציאה</button>
    <button class="btn btn-next" id="btnNext" onclick="nextQ()" disabled>הבא →</button>
  </div>
</section>

<!-- ═══ RESULT ═══ -->
<section class="screen" id="result">
  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 156 156">
      <circle class="ring-bg" cx="78" cy="78" r="70"/>
      <circle class="ring-arc" cx="78" cy="78" r="70" id="ringArc" stroke="url(#rg)"/>
      <defs>
        <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#f97316"/>
          <stop offset="100%" stop-color="#a78bfa"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="ring-inner">
      <div class="ring-pct" id="rPct">0%</div>
      <div class="ring-grade" id="rGrade">---</div>
    </div>
  </div>

  <div class="r-title" id="rTitle"></div>
  <div class="r-sub"   id="rSub"></div>

  <div class="r-stats">
    <div class="rs"><div class="rs-val" style="color:#34d399" id="rOk">0</div><div class="rs-lbl">נכון</div></div>
    <div class="rs"><div class="rs-val" style="color:#f87171" id="rBad">0</div><div class="rs-lbl">שגוי</div></div>
    <div class="rs"><div class="rs-val" style="color:#fbbf24" id="rXp">0</div><div class="rs-lbl">XP</div></div>
    <div class="rs"><div class="rs-val" style="color:#a78bfa" id="rStr">0</div><div class="rs-lbl">streak</div></div>
  </div>

  <div class="r-btns">
    <button class="btn-play" onclick="replayTrack()">שחק שוב 🔄</button>
    <button class="btn-home" onclick="goHome()">מסלולים 🏠</button>
  </div>
</section>

</div><!-- /wrap -->

<script>
var TRACKS = {
  1: {
    name:  "שכבה 1 — פיזית",
    icon:  "⚡",
    color: "#f97316",
    questions: [
        { cat:"ביט", q:"מה מטרת השכבה הפיזית?", a:["להעביר ביט בודד בין שני רכיבים", "לנתב חבילות IP על פי התקן", "לנהל כתובות MAC — בכל תרחיש", "להצפין מידע בכל המקרים — על פי RFC"], c:0, e:"השכבה הפיזית מתמחה בהעברת היחידה הבסיסית ביותר — ביט אחד. כל שאר השכבות מניחות שאפשר להעביר ביטים." },
        { cat:"תווך", q:"מה שלושת התווכים העיקריים בשכבה הפיזית?", a:["TCP, UDP, HTTP", "נחושת, אוויר, סיב אופטי", "MAC, IP, Port", "Ethernet, WiFi, Bluetooth"], c:1, e:"כבלי נחושת (CAT5, ADSL), אוויר (WiFi, מיקרוגל), וסיב אופטי (זכוכית/פלסטיק) — שלושת 'עמודי התווך' של שכבה 1." },
        { cat:"AM/FM", q:"ב-AM — מה משתנה כדי לקודד מידע?", a:["כיוון הגל על פי התקן", "התדר בכל המקרים — על פי RFC", "האמפליטודה (גובה הגל)", "מהירות הגל — בכל תרחיש"], c:2, e:"AM = Amplitude Modulation. המידע מקודד בשינוי גובה הגל. התדר נשאר קבוע. לעומתו FM = Frequency Modulation — התדר משתנה." },
        { cat:"ביט", q:"כמה ערכים יכול להחזיק ביט אחד?", a:["אינסוף", "8 — ספרות 0 עד 7", "256 — כמו byte", "2 — רק 0 או 1"], c:3, e:"ביט = BInary digiT. שני ערכים בלבד: 0 או 1. זו ה'אטום' של המידע הדיגיטלי. 8 ביטים = byte = 256 ערכים אפשריים." },
        { cat:"WiFi", q:"מה ההבדל בין WiFi 2.4GHz ל-5GHz?", a:["זהים — רק שמות שונים", "2.4GHz טווח ארוך יותר, 5GHz מהיר יותר", "5GHz טווח ארוך יותר, 2.4GHz מהיר יותר", "2.4GHz = IPv4, 5GHz = IPv6"], c:1, e:"תדר גבוה = אורך גל קצר = ספיגה גדולה בקירות = טווח קצר יותר. לכן 5GHz מהיר אך לא חודר קירות טוב כמו 2.4GHz." },
        { cat:"AM vs FM", q:"למה רדיו FM נשמע טוב יותר מ-AM? הסבר פיזיקלי.", a:["FM עמיד לרעשים כי רעש = שינוי אמפליטודה", "FM בתדר גבוה יותר = איכות טובה יותר", "FM דיגיטלי, AM אנלוגי", "FM משתמש בסיב אופטי — בהתאם לתקן IEEE 802"], c:0, e:"מידע ב-AM = שמור באמפליטודה. רעש חשמלי = שינוי אמפליטודה = עיוות ישיר. ב-FM המידע = בתדר. רעש = שינוי אמפליטודה → לא פוגע בתדר → FM עמיד!" },
        { cat:"ADSL", q:"מדוע ADSL מהיר פי מיליון ממודם 300bps משנות ה-70?", a:["ADSL = סיב אופטי בתחפושת — תמיד, בכל מקרה", "ADSL מנצל תדרים גבוהים בגלל קרבה למרכזייה", "ADSL משתמש ב-8 חוטים במקום 2", "ADSL מדחס את הנתונים פי מיליון"], c:1, e:"קרבת המרכזייה → ניצול תדרים מעל 20KHz. מודם קלאסי מוגבל לתדרי קול (20KHz). ADSL = 100MHz+ = קצב גבוה בהרבה. אותו כבל נחושת, שימוש חכם יותר!" },
        { cat:"סיב אופטי", q:"כמה ניתן להעביר בסיב אופטי? מה היתרון לעומת נחושת?", a:["1 Gbps — מהיר מנחושת אבל יקר יותר", "1 Mbps בלבד — אור חלש מדי", "100 Mbps — זהה ל-WiFi — ללא יוצא מן הכלל", "100 Terabit/s ל-100 ק\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\"מ"], c:3, e:"בפרק: '100Terabit/s למרחק מעל 100 ק\"מ.' 12.5 הארד-דיסקים של 1TB בשניה! בנוסף: מידע לא 'נכנס ולא יוצא' מהסיב — אין הפרעות. נחושת משדרת לסביבה." },
        { cat:"WiFi", q:"מדוע WiFi = Half Duplex? מה קורה עם 20 מחשבים על AP אחד?", a:["תדר שידור יחיד = רק אחד מדבר בכל פעם", "WiFi = Full Duplex, 20 מחשבים = אין הבדל", "20 מחשבים = 20 ערוצים מקבילים — לפי פרוטוקול TCP בלבד", "AP שולח לכולם בו-זמנית ב-Multicast"], c:0, e:"בפרק: 'WiFi = Half Duplex. ככל שיש יותר מחשבים מחוברים, הקצב יקטן ויתחלק בין כולם.' לכן WiFi ארגוני = AP אחד לכל 15-20 משתמשים מקסימום." },
        { cat:"קוד מורס", q:"מה ההבדל בין נקודה לקו בקוד מורס? מה מגדיר ביניהם?", a:["כיוון הגל — נקודה=ימין, קו=שמאל", "משך הזמן — נקודה=קצרה, קו=ארוך", "עוצמת האות — נקודה=חזק, קו=חלש", "תדר — נקודה=גבוה, קו=נמוך — בהתאם לתקן IEEE 802"], c:1, e:"משך הזמן הוא המפריד. הגדרה מדויקת של משכים = ניתן להגדיר קצב שידור גבוה יותר ולהפריד בין אותיות ומילים. ללא הגדרה = בלבול בין Q ל-MA." },
        { cat:"חישוב", q:"מודם ADSL מגיע ל-100Mbps. כמה bytes לשניה זה? כמה תמונות של 5MB לשניה?", a:["100 MB/s → 20 תמונות בכל המקרים", "12.5 MB/s → 2.5 תמונות לשניה", "1000 KB/s → 0.2 תמונות על פי התקן", "100 KB/s → 0.02 תמונות"], c:1, e:"100Mbps ÷ 8 bits/byte = 12.5 MB/s. תמונה 5MB: 12.5÷5 = 2.5 תמונות לשניה. חישוב חיוני: תמיד לחלק ב-8 כשעוברים מ-bits ל-bytes!" },
        { cat:"אינטגרציה", q:"מסע פקטה מישראל לארה\"ב — אילו שכבות פיזיות עוברת? בסדר הנכון?", a:["רדיו AM בין יבשות", "WiFi מקצה לקצה — לפי פרוטוקול TCP בלבד", "CAT5 (לנתב ביתי) → ADSL", "סיב אופטי מהבית"], c:2, e:"כל hop = שכבה פיזית שונה! ביתי: CAT5/WiFi. ספק: ADSL/נחושת. ישראל↔ארה\"ב: כבל תת-ימי (סיב אופטי). שרת: Ethernet. זהו עיקרון מרכזי — שכבה פיזית שונה בכל segment!" },
        { cat:"AM FM חישוב", q:"מודם ב-1970 קודד 0→1070Hz ו-1→1270Hz. אם משדר 300 קוד-שינויים לשניה — מה ה-bitrate?", a:["150 bps — חצי שניה לביט על פי התקן", "600 bps — שני ביטים לכל שינוי", "1070 bps — תלוי בתדר בכל המקרים", "300 bps — כל שינוי תדר = ביט אחד"], c:3, e:"כל קוד-שינוי (symbol) = ביט אחד (כי יש 2 תדרים = 1 ביט מידע). 300 symbols/s × 1 bit/symbol = 300 bps. טבלה של 4 תדרים = 2 ביטים לסימבול = 600 bps." },
        { cat:"סיב אופטי", q:"סיב אופטי בתדרים מרובים (WDM) — מה הרעיון ומה היתרון?", a:["כמה 'צבעים' (תדרי אור) שונים במקביל = מכ", "WDM = טיפול בשגיאות, לא הגברת קיבולת", "WDM = שם אחר לממסר — תמיד, בכל מקרה על פי התקן", "WDM מאפשר Half Duplex בסיב בכל המקרים"], c:0, e:"WDM = Wavelength Division Multiplexing. כמו לשלוח מספר 'ערוצי radio' שונים על אותו כבל. 10 צבעי LED שונים = 10 ערוצים מקביליים = קיבולת × 10. DWDM (Dense) = 80+ ערוצים!" },
        { cat:"שגיאות", q:"מדוע קידוד דיגיטלי עדיף על אנלוגי לתיקון שגיאות? הסבר עם דוגמה.", a:["דיגיטלי = יותר bits = יותר שגיאות על פי התקן", "אנלוגי עדיף — אין שגיאות בכל המקרים", "דיגיטלי: שגיאה ב-bit = ניתן לזהות ולתקן", "זהים מבחינת שגיאות — ללא יוצא מן הכלל"], c:2, e:"אנלוגי: גל עם רעש → עיוות קבוע. אין 'ערך נכון' לחזור אליו. דיגיטלי: bit שגוי (0→1) = ניתן לזהות עם parity/CRC ולתקן עם כפילות. CD עם שריטות: עד 25% פגום ועדיין מנגן!" }
    ]
  },
  2: {

    questions: [
        { cat:"MAC", q:"מה כתובת MAC? מה גודלה?", a:["כתובת לוגית של המחשב — 4 bytes, ניתנת לשינוי", "מספר הפורט שפתוח בחיבור", "שם הפרוטוקול של שכבה 2 — לפי פרוטוקול TCP בלבד", "כתובת פיזית של כרטיס הרשת"], c:3, e:"MAC = Media Access Control. 6 bytes = 48 bits. שלושת ה-bytes הראשונים = OUI = מזהה יצרן. שלוש האחרונים = מזהה ייחודי. צרובה על הכרטיס, לא אמורה להשתנות." },
        { cat:"Ethernet Frame", q:"אילו שדות בEthernet Frame לא מופיעים ב-Wireshark?", a:["Preamble ו-CRC32", "Destination MAC ו-Source MAC", "Type/EtherType", "Data"], c:0, e:"Preamble = 8 bytes לסנכרון — הכרטיס מוריד לפני שה-frame מגיע לתוכנה. CRC32 = checksum שנבדק ומוסר ע\"י הכרטיס. Wireshark רואה רק מה שנשאר." },
        { cat:"ARP", q:"מה ARP עושה?", a:["מנתב חבילות בין רשתות", "ממיר כתובת IP לכתובת MAC", "מחלק כתובות IP לרשת", "ממיר שם דומיין לכתובת IP"], c:1, e:"ARP = Address Resolution Protocol. IP → MAC. נחוץ כי כדי לבנות Ethernet frame צריך MAC של היעד. שולח ARP Request ב-Broadcast, מקבל ARP Reply Unicast." },
        { cat:"Hub vs Switch", q:"מה ההבדל הבסיסי בין Hub ל-Switch?", a:["Hub = WiFi, Switch = קווי — ללא יוצא מן הכלל", "Hub מהיר יותר, Switch איטי", "Hub = Layer 3, Switch = Layer 2", "Hub שולח לכולם תמיד (Layer 1)"], c:3, e:"Hub = Layer 1 — לא מכיר כתובות, שולח הכל לכולם. Switch = Layer 2 — מכיר MAC, בונה MAC Table, שולח כל frame רק ליעד. לכן Hub כמעט לא קיים היום." },
        { cat:"Broadcast", q:"מה כתובת ff:ff:ff:ff:ff:ff?", a:["Ethernet Broadcast", "כתובת של Switch", "כתובת Loopback של Layer 2", "כתובת שגויה — לא חוקית"], c:0, e:"ff:ff:ff:ff:ff:ff = כתובת Broadcast של Ethernet. מסגרת עם dst זה מגיעה לכל כרטיסי הרשת ברשת. ARP Request נשלח ל-Broadcast — כי רוצים שכולם ישמעו." },
        { cat:"MAC Table", q:"Switch עם טבלה: A→Port1, B→Port3. C שולח ל-A. מה Switch עושה?", a:["זורק כי C לא בטבלה — תמיד, בכל מקרה", "Flood לכל הפורטים כי C לא בטבלה", "שולח ל-Port1 ול-Port3", "שולח רק ל-Port1 (A ידוע)"], c:3, e:"Switch בודק dst: A → Port1 ✓ → שולח רק ל-Port1. במקביל לומד src: MAC_C → Port_C. dst ידוע = Unicast! גם אם src לא ידוע, dst שולט על ההחלטה." },
        { cat:"ARP", q:"מחשב A (10.0.0.1/8) שולח ל-Google (8.8.8.8). ל-ARP Request נשלח ל-מי?", a:["Google ישירות — ARP שואל כל IP", "Default Gateway —", "DNS — כי לא יודעים MAC של Google", "לא שולחים ARP בכלל — ללא יוצא מן הכלל"], c:1, e:"ARP = Layer 2 → לא עובר נתבים. A בודק: 8.8.8.8 ב-10.0.0.0/8? לא! → שולח ל-Default Gateway. ARP לגילוי MAC של הנתב. הנתב מטפל מכאן והלאה." },
        { cat:"Layer 2 vs 3", q:"חבילה מהמחשב שלך ל-Facebook. מה כתובת MAC dst? מה IP dst?", a:["MAC dst = Facebook, IP dst = נתב", "שניהם = Facebook", "MAC dst = נתב ביתי (hop נוכחי)", "שניהם = נתב — לפי פרוטוקול TCP בלבד"], c:2, e:"עיקרון מרכזי: Layer 2 (MAC) = hop נוכחי בלבד. Layer 3 (IP) = נקודות הקצה הסופיות. MAC dst = נתב הביתי (כי זה הhop הבא). IP dst = Facebook (כי זה היעד). בנתב הבא: MAC dst = הנתב הבא..." },
        { cat:"Collision", q:"למה Switch מונע התנגשויות ו-Hub לא?", a:["Switch מחכה לתור ממוספר — בהתאם לתקן IEEE 802", "Switch מבטל את האות אם מגלה התנגשות", "Switch יש TTL שמונע לולאות", "כל פורט ב-Switch = Collision Domain נפרד"], c:3, e:"Hub = ערוץ משותף = כולם על אותו 'חוט'. A ו-B שולחים יחד → התנגשות → מידע שגוי. Switch = כל פורט עצמאי. A שולח ל-Switch, B שולח ל-Switch → אין מגע. Switch מחכה בזיכרון ומוציא." },
        { cat:"Ethernet Frame", q:"Preamble של Ethernet = 8 bytes. למה לא מופיע ב-Wireshark?", a:["כרטיס הרשת מזהה ומסיר אותו לפני שהתוכנה רואה", "Wireshark מסתיר אותו לאבטחה — תמיד, בכל מקרה", "Preamble = חלק מה-IP header", "Preamble לא קיים ב-Ethernet II"], c:0, e:"Preamble = 8 bytes של 10101010... לסנכרון. הכרטיס מזהה אותו ויודע שהגיעה מסגרת חדשה, ואז מוריד אותו. CRC32 = נבדק: תקין → מוריד ומעביר; פגום → זורק. Wireshark = 'אחרי' הכרטיס." },
        { cat:"ARP Poisoning", q:"מה ARP Poisoning? כיצד Switch לא מגן עליו?", a:["שולחים ARP Reply מזויפים = כולם מעדכנים ARP C", "Switch מגן עם Dynamic ARP Inspection — לפי פרוטוקול TCP בלבד", "ARP Poisoning = כבלוס שגוי ב-MAC Table", "Switch מזהה ARP מזויף ע\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\"י Checksum"], c:0, e:"ARP Poisoning: תוקף שולח ARP Reply: 'IP של הנתב = MAC שלי'. הקורבן מעדכן Cache. כל תעבורה → עוברת דרך התוקף (MITM). Switch לא מגן = Layer 2 בלבד. הגנה: DHCP Snooping + Dynamic ARP Inspection." },
        { cat:"חישוב MAC Table", q:"Switch עם 8 ports. 5 מחשבים מחוברים. כמה ערכים בMAC Table לכל היותר? מה קורה אם עולה?", a:["אינסוף ערכים — בהתאם לתקן IEEE 802", "5 ערכים (מחשב אחד לפורט)", "8 ערכים — port אחד", "50,000 ערכים — MAC Table לא מוגבלת"], c:1, e:"MAC Table = ערך לכל MAC שנראה. מחשב אחד לפורט = 5 ערכים. Timeout: כל ערך שלא נראה X שניות → נמחק (aging). אם Switch מלא: MAC flooding attack — תוקף ממלא טבלה → Switch → Mode Hub." },
        { cat:"VLAN", q:"מה VLAN ומדוע Switch צריך אותו ולא רק IP Subnets?", a:["VLAN = הצפנת תעבורה ב-Switch", "VLAN = גרסה וירטואלית של Router", "VLAN = Layer 2 Isolation", "VLAN רלוונטי רק ל-WiFi — תמיד, בכל מקרה"], c:2, e:"ללא VLAN: כל Broadcast מגיע לכל מחשב ב-Switch = עומס + אבטחה. עם VLAN: מחלקת HR ו-Engineering על אותו Switch — Broadcast Domain נפרד. גם Layer 2 מבודד! Subnet רק ב-Layer 3." },
        { cat:"Spanning Tree", q:"3 Switches מחוברים בלולאה. מה קורה ללא STP?", a:["Broadcast Storm — frame נשלח ב-loop לנצח", "STP לא נחוץ — Switch זורק frames כפולים", "frames עוברים TTL ומוסרים — ללא יוצא מן הכלל", "Switch מזהה לולאה ע\\\\\\\\\\\\\\\"י MAC Table"], c:0, e:"ללא STP (Spanning Tree Protocol): Broadcast frame נכנס ל-loop, כל Switch מפציל ושולח לשאר, frame מוכפל לאינסוף → Broadcast Storm → כל הרשת קורסת תוך שניות. STP = חוסם פורט אחד לשבור לולאה." },
        { cat:"Jumbo Frames", q:"Ethernet סטנדרטי = MTU 1500 bytes. Jumbo Frames = 9000 bytes. מה היתרון? מה החיסרון?", a:["Jumbo Frame מהיר יותר בתקשורת אלחוטית", "יתרון: פחות overhead (כל frame = header אחד,", "Jumbo Frame = חיבור 10Gbps בלבד", "אין חיסרון — Jumbo תמיד עדיף — לפי פרוטוקול TCP בלבד"], c:1, e:"MTU 1500: כל IP packet גדול יותר = fragmentation = עומס. Jumbo 9000: פחות frames לאותה כמות data = פחות header overhead = יעיל יותר. חיסרון: כל frame גדול יותר לבדיקת CRC. דורש שכל ה-chain תומך." }
    ]
  },

        { cat:"IP", q:"מה גודל כתובת IPv4?", a:["16 bytes = 128 bits", "6 bytes = 48 bits", "4 bytes = 32 bits", "2 bytes = 16 bits"], c:2, e:"IPv4 = 4 bytes = 32 bits = 2^32 ≈ 4.3 מיליארד כתובות. IPv6 = 128 bits (16 bytes) = 2^128 כתובות. הסיבה למעבר ל-IPv6: 4.3 מיליארד כבר לא מספיק!" },
        { cat:"Subnet", q:"מסכת רשת 255.255.255.0 — כמה bits שייכים ל-Network ID?", a:["32 bits על פי התקן", "8 bits בכל המקרים — על פי RFC", "16 bits — בכל תרחיש", "24 bits (3 bytes של 255)"], c:3, e:"255 בינארי = 11111111 = 8 bits. 255.255.255.0 = 24 bits של 1 = Network ID, 8 bits של 0 = Host ID. בקיצור: /24. ב-/24 יש 256 כתובות, 254 שמישות (0 = network, 255 = broadcast)." },
        { cat:"NAT", q:"מה NAT עושה?", a:["מנתב חבילות בין VLANs", "מחליף כתובת IP פרטית בציבורית", "מחלק כתובות IP לרשת — ללא יוצא מן הכלל", "מבצע הצפנה של כתובות IP"], c:1, e:"NAT = Network Address Translation. ביציאה: src 192.168.x.x → 1.1.1.1. בכניסה: dst 1.1.1.1 → 192.168.x.x. 'שקוף' למחשב ולשרת. חוסך כתובות IPv4." },
        { cat:"DHCP", q:"מה DHCP מחלק?", a:["MAC Address בכל המקרים — על פי RFC", "שם הדומיין בלבד — בכל תרחיש", "IP, Subnet Mask, Default Gateway, DNS Se", "Port Numbers על פי התקן"], c:2, e:"DHCP = Dynamic Host Configuration Protocol. 4 ב-DORA: Discover → Offer → Request → ACK. מחלק: IP, Mask, Gateway, DNS. בלי DHCP = כל מחשב מוגדר ידנית." },

        { cat:"Subnet חישוב", q:"IP: 192.168.5.30, Mask: 255.255.255.0. מה Network ID? מה Broadcast?", a:["Network: 192.0.0.0, Broadcast: 192.168.5.255", "Network: 192.168.0.0, Broadcast: 192.168.5.255", "Network: 192.168.5.30, Broadcast: 255.255.255.255", "Network: 192.168.5.0, Broadcast: 192.168.5.255"], c:3, e:"Mask 255.255.255.0 = 3 bytes Network + 1 byte Host. Network = IP AND Mask = 192.168.5.0. Broadcast = Network OR (NOT Mask) = 192.168.5.255. Host range: 192.168.5.1 – 192.168.5.254." },

        { cat:"TCP + HTTP", q:"TCP Handshake הסתיים. Client שולח HTTP GET. Server Response 200 OK. מה Seq+ACK של ה-GET?", a:["Seq=ISN_server, ACK=ISN_client", "Client: Seq=ISN_client+1", "Seq=0, ACK=0 — תמיד, בכל מקרה", "Seq=1, ACK=1 תמיד"], c:1, e:"אחרי Handshake: Client Seq = ISN_client+1 (SYN נחשב byte). Client ACK = ISN_server+1. ה-GET הראשון: Seq = מה שהיה ACK של הHandshake (לקוח) = ISN_client+1. ACK = ISN_server+1. בלי data חדש = Seq לא מתקדם." },
        { cat:"select rlist/wlist", q:"select() מחזיר client_socket ב-wlist. מה זה אומר? מה עושים?", a:["client_socket = server_socket בכל המקרים", "client_socket שלח מידע — קוראים recv()", "client_socket קרס — ללא יוצא מן הכלל על פי התקן", "client_socket מוכן לקבל שליחה ללא blocki"], c:3, e:"rlist = מוכן לקריאה. wlist = מוכן לשליחה. client ב-wlist → send() לא יחסום! → שולחים הודעות מהתור. client ב-rlist → recv() לא יחסום! → קוראים מידע." },
        { cat:"NAT חזרה", q:"Facebook (3.3.3.3) שולח תשובה. מה נתב עושה?", a:["מחליף dst IP: 1.1.1.1 → 192.168.0.5", "שולח Broadcast לכולם", "שולח ל-DNS Server — לפי פרוטוקול TCP בלבד", "זורק — כתובת ציבורית לא מכירים"], c:0, e:"NAT Table: זוכר שפרטנו 1.1.1.1:PORT_X → 192.168.0.5:PORT_Y. תשובה ל-1.1.1.1:PORT_X → מחליף ל-192.168.0.5:PORT_Y. המחשב מקבל 'כאילו' Facebook ענה ישירות ל-192.168.0.5." },
        { cat:"חישוב מלא", q:"Client ISN=500, Server ISN=900. Client GET (100 bytes). Server 200 OK (500 bytes). מה ACK האחרון של Client?", a:["ACK=1500 בכל המקרים — בכל תרחיש", "ACK=1401 על פי התקן — על פי RFC", "ACK=902 — תמיד, בכל מקרה", "ACK=1402 = 900(ISN_s)+1(SYN)+1(SYN)+500("], c:3, e:"Handshake: SYN(500)→SYN+ACK(900,ACK=501)→ACK(501,ACK=901). GET: Client Seq=501, 100 bytes. Server ACK=601. 200 OK: Server Seq=901, 500 bytes. Client ACK=901+500=1401. Final: Client ACK=1401." },
        { cat:"Full Stack", q:"בקשת HTTPS לgoogle.com — רשום את כל ה-handshakes הנדרשים בסדר.", a:["HTTP GET → DNS → TCP — ללא יוצא מן הכלל", "DHCP → ARP (Gateway) → DNS", "TCP → TLS → DNS → HTTP", "DNS → TCP → UDP → TLS"], c:1, e:"DHCP (IP). ARP (MAC של Gateway). DNS Query UDP/53 (IP של Google). TCP SYN→SYN+ACK→ACK (port 443). TLS ClientHello→ServerHello→Certificate→Finished (מעל TCP). HTTP/2 GET (מעל TLS). כל שכבה = handshake משלה!" },
        { cat:"select אינטגרציה", q:"Server עם select(). Client A שולח מידע. Client B מתחבר. שניהם ב-rlist. מה הסדר הנכון?", a:["A קודם כי שלח מידע", "B קודם כי חדש — לפי פרוטוקול TCP בלבד", "לא משנה הסדר ב-rlist", "server_socket תמיד ראשון"], c:2, e:"בפרק: 'for current_socket in rlist: if current_socket is server_socket: accept() else: recv().' לולאה מטפלת בכולם באיטרציה אחת! אין עדיפות — הסדר לפי Python list. זו ה'גאונות' של select()." },
        { cat:"הכל יחד", q:"DHCP Discover נשלח. ב-Wireshark — מה src IP? dst IP? src MAC? dst MAC?", a:["src=MAC שלי, dst=MAC_DHCP", "src IP=192.168.0.1, dst IP=255.255.255.255", "src/dst הכל 0 — בהתאם לתקן IEEE 802", "src IP=0.0.0.0 (אין עדיין)"], c:3, e:"DHCP Discover = הודעה ראשונה של מחשב חדש. אין IP → src=0.0.0.0. לא יודע שרת DHCP → dst=255.255.255.255 (L3 Broadcast). L2: src=MAC שלי (ידוע). dst=ff:ff:ff:ff:ff:ff (L2 Broadcast). Switch = Flood." },
        { cat:"Multi-layer", q:"traceroute שולח packet עם TTL=3. מה בדיוק קורה ב-Router3 ולאחריו?", a:["Router3 קיבל TTL=1, מוריד ל-0, זורק, שולח ICMP Time Exceeded (type 11) עם IP_Router3. traceroute קיבל → גילה Router3","Router3 מוריד ל-0 ומשלח הלאה","Router3 מחזיר ACK","Router3 מחסיר 1 ושולח לRouter4"] , c:0, e:"TTL=3: Router1 מוריד ל-2, Router2 מוריד ל-1, Router3 מוריד ל-0 → זורק! → שולח ICMP Type 11 (Time Exceeded) מה-IP שלו → traceroute קיבל IP_Router3 → הצגה ל-user. TTL=4 → Router4 חוזר. וכן הלאה." }
    ]
  },
};


/* ═══════════════════════════════
   TRACK META (desc + q-count)
═══════════════════════════════ */
var TRACK_META = {
  1: { desc: "ביט, גלים, AM/FM, ADSL, CAT5, WiFi, סיב אופטי" },
  2: { desc: "Ethernet, MAC, ARP, Ethernet Frame, Hub vs Switch" },
  3: { desc: "IP, Subnet, NAT, DHCP, TTL, Routing, ICMP, traceroute" },
  4: { desc: "TCP vs UDP, Ports, Handshake, Seq/ACK, Checksum, select()" },
  5: { desc: "DHCP→ARP→DNS→TCP→HTTP, NAT, Sockets — כל השכבות" }
};

/* ═══════════════════════════════
   BUILD HOME
═══════════════════════════════ */
(function buildHome() {
  var list = document.getElementById('trackList');
  var ids  = [1,2,3,4,5];
  ids.forEach(function(tid) {
    var td  = TRACKS[tid];
    var meta= TRACK_META[tid];
    var card = document.createElement('div');
    card.className = 'track-card';
    card.style.setProperty('--tc', td.color);
    card.onclick = function() { startTrack(tid); };
    card.innerHTML =
      '<div class="tc-icon">' + td.icon + '</div>' +
      '<div class="tc-info">' +
        '<div class="tc-name">' + td.name + '</div>' +
        '<div class="tc-desc">' + meta.desc + '</div>' +
      '</div>' +
      '<div class="tc-meta">' +
        '<div class="tc-count">15 שאלות</div>' +
        '<div class="tc-arr">←</div>' +
      '</div>';
    list.appendChild(card);
  });
})();

/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
var G = {
  tid: null, questions: [], cur: 0,
  ans: [], xp: 0, streak: 0, maxStreak: 0,
  timer: null, timeLeft: 0,
  LBL: ['א','ב','ג','ד']
};

/* ═══════════════════════════════
   START TRACK
═══════════════════════════════ */
function startTrack(tid) {
  G.tid = tid;
  var td = TRACKS[tid];
  // shuffle all 15 questions
  G.questions = td.questions.slice().sort(function() { return Math.random() - .5; });
  G.cur = 0; G.ans = []; G.xp = 0; G.streak = 0; G.maxStreak = 0;

  // badge
  var b = document.getElementById('qBadge');
  b.textContent = td.icon + ' ' + td.name;
  b.style.background = 'rgba(0,0,0,.4)';
  b.style.border = '1px solid ' + td.color + '44';
  b.style.color = td.color;

  // progress color
  document.getElementById('progFill').style.background =
    'linear-gradient(90deg,' + td.color + ',' + td.color + '77)';

  // ambient
  document.getElementById('amb').style.background =
    'radial-gradient(ellipse 70% 45% at 50% -8%,' + td.color + '12 0%,transparent 60%)';

  buildStreakRow();
  showScreen('quiz');
  renderQ();
}

function buildStreakRow() {
  var row = document.getElementById('streakRow');
  row.innerHTML = '';
  for (var i = 0; i < 15; i++) {
    var d = document.createElement('div');
    d.className = 's-pip'; d.id = 'sp' + i;
    row.appendChild(d);
  }
}

/* ═══════════════════════════════
   RENDER QUESTION
═══════════════════════════════ */
function renderQ() {
  var q     = G.questions[G.cur];
  var total = G.questions.length;

  document.getElementById('qNum').textContent = (G.cur+1) + ' / ' + total;
  document.getElementById('qCat').textContent = q.cat;
  document.getElementById('qXp').textContent  = '+10 XP';
  document.getElementById('xpNum').textContent = G.xp;

  // snip
  var snipEl = document.getElementById('qSnip');
  snipEl.innerHTML = '';
  if (q.snip) {
    snipEl.innerHTML =
      '<div class="q-snip">' +
        '<div class="snip-bar"><div class="sd sd-r"></div><div class="sd sd-y"></div><div class="sd sd-g"></div></div>' +
        '<div class="snip-body">' + q.snip + '</div>' +
      '</div>';
  }

  document.getElementById('qText').textContent = q.q;

  // shuffle options
  var idx   = [0,1,2,3].sort(function(){ return Math.random()-.5; });
  var shufA = idx.map(function(i){ return q.a[i]; });
  var newC  = idx.indexOf(q.c);

  var oc = document.getElementById('qOpts');
  oc.innerHTML = '';
  for (var i = 0; i < 4; i++) {
    (function(i) {
      var b = document.createElement('button');
      b.className = 'opt';
      b.dataset.i = i; b.dataset.c = newC;
      b.innerHTML =
        '<span class="olbl">' + G.LBL[i] + '</span>' +
        '<span class="otext">' + shufA[i] + '</span>' +
        '<span class="oicon"></span>';
      b.addEventListener('click', onPick);
      oc.appendChild(b);
    })(i);
  }

  var ex = document.getElementById('qExp');
  ex.style.display = 'none'; ex.className = 'exp';
  document.getElementById('btnNext').disabled = true;

  // progress
  document.getElementById('progFill').style.width = (G.cur / total * 100) + '%';

  // animate card
  var card = document.getElementById('qCard');
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = 'pop .28s cubic-bezier(.22,1,.36,1)';

  startTimer();
}

/* ═══════════════════════════════
   TIMER
═══════════════════════════════ */
function startTimer() {
  clearInterval(G.timer);
  G.timeLeft = 30;
  tickTimer();
  G.timer = setInterval(function() {
    G.timeLeft--;
    tickTimer();
    if (G.timeLeft <= 0) { clearInterval(G.timer); timeUp(); }
  }, 1000);
}

function tickTimer() {
  var box = document.getElementById('timerBox');
  box.textContent = G.timeLeft;
  if (G.timeLeft <= 6) box.classList.add('hot');
  else box.classList.remove('hot');
}

function timeUp() {
  G.ans.push(0); G.streak = 0;
  setPip(G.cur, false);
  var bs = document.querySelectorAll('.opt');
  bs.forEach(function(b){ b.classList.add('done'); });
  var correctI = parseInt(bs[0].dataset.c);
  bs[correctI].classList.add('reveal');
  bs[correctI].querySelector('.oicon').textContent = '✓';
  showExp(false, G.questions[G.cur].e);
  document.getElementById('btnNext').disabled = false;
}

/* ═══════════════════════════════
   PICK
═══════════════════════════════ */
function onPick() {
  clearInterval(G.timer);
  var chosen = parseInt(this.dataset.i);
  var correct = parseInt(this.dataset.c);
  var ok = (chosen === correct);

  G.ans.push(ok ? 1 : 0);

  if (ok) {
    var xpEarned = 10;
    if (G.streak >= 2) xpEarned += G.streak * 2;
    G.xp += xpEarned;
    document.getElementById('xpNum').textContent = G.xp;
    showXpPop(xpEarned, this);
    try { window.parent.postMessage({ type: 'ng_xp', amount: xpEarned }, '*'); } catch(e) {}
    G.streak++;
    G.maxStreak = Math.max(G.maxStreak, G.streak);
  } else {
    G.streak = 0;
  }

  setPip(G.cur, ok);

  var bs = document.querySelectorAll('.opt');
  bs.forEach(function(b){ b.classList.add('done'); });
  if (ok) {
    this.classList.add('correct');
    this.querySelector('.oicon').textContent = '✓';
  } else {
    this.classList.add('wrong');
    this.querySelector('.oicon').textContent = '✗';
    bs[correct].classList.add('reveal');
    bs[correct].querySelector('.oicon').textContent = '✓';
  }

  showExp(ok, G.questions[G.cur].e);
  document.getElementById('btnNext').disabled = false;
}

function showExp(ok, txt) {
  var ex = document.getElementById('qExp');
  ex.className = 'exp ' + (ok ? 'ok' : 'bad');
  document.getElementById('expLbl').textContent = ok ? '✓  נכון!' : '✗  לא בדיוק...';
  document.getElementById('expTxt').textContent = txt;
  ex.style.display = 'block';
}

function setPip(idx, ok) {
  var pip = document.getElementById('sp' + idx);
  if (pip) pip.classList.toggle('hot', ok);
}

function showXpPop(xp, btn) {
  var r = btn.getBoundingClientRect();
  var div = document.createElement('div');
  div.className = 'xpop';
  div.textContent = '+' + xp + (G.streak >= 2 ? ' 🔥' : '');
  div.style.left = (r.left + r.width/2 - 30) + 'px';
  div.style.top  = (r.top - 20 + window.scrollY) + 'px';
  document.body.appendChild(div);
  setTimeout(function(){ div.remove(); }, 1200);
}

/* ═══════════════════════════════
   NEXT / RESULT
═══════════════════════════════ */
function nextQ() {
  G.cur++;
  if (G.cur >= G.questions.length) { clearInterval(G.timer); showResult(); }
  else renderQ();
}

function showResult() {
  var ok  = G.ans.filter(function(x){ return x===1; }).length;
  var tot = G.questions.length;
  var pct = Math.round(ok / tot * 100);

  var circ = 2 * Math.PI * 70; // r=70
  setTimeout(function(){
    document.getElementById('ringArc').style.strokeDashoffset = circ * (1 - pct/100);
  }, 150);

  document.getElementById('rPct').textContent = pct + '%';
  document.getElementById('rGrade').textContent =
    pct>=90 ? 'A+' : pct>=80 ? 'A' : pct>=70 ? 'B' : pct>=60 ? 'C' : 'F';

  var titles = ['יש מה לשפר 📖','לא רע 💪','כל הכבוד! 🎯','מצוין! 🏆'];
  var subs   = ['קרא את פרק ה-Learn ונסה שוב','חזור על הנושאים שנפלת','שליטה טובה. עוד קצת!','אתה מומחה רשתות!'];
  var tier   = pct>=90 ? 3 : pct>=70 ? 2 : pct>=50 ? 1 : 0;

  document.getElementById('rTitle').textContent = titles[tier];
  document.getElementById('rSub').textContent   = subs[tier];
  document.getElementById('rOk').textContent    = ok;
  document.getElementById('rBad').textContent   = tot - ok;
  document.getElementById('rXp').textContent    = G.xp;
  document.getElementById('rStr').textContent   = G.maxStreak;

  document.getElementById('progFill').style.width = '100%';

  if (pct >= 80) fireworks();
  showScreen('result');
}

/* ═══════════════════════════════
   NAV
═══════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('on'); });
  document.getElementById(id).classList.add('on');
}

function goHome() {
  clearInterval(G.timer);
  document.getElementById('amb').style.background = '';
  showScreen('home');
}

function replayTrack() { startTrack(G.tid); }

/* ═══════════════════════════════
   FIREWORKS
═══════════════════════════════ */
function fireworks() {
  var cols = ['#f97316','#a78bfa','#06b6d4','#34d399','#fbbf24'];
  for (var i = 0; i < 28; i++) {
    (function(i) {
      setTimeout(function() {
        var fw = document.createElement('div');
        fw.className = 'fw';
        fw.style.left = (Math.random() * window.innerWidth) + 'px';
        fw.style.top  = (Math.random() * window.innerHeight * .55 + 80) + 'px';
        for (var j = 0; j < 8; j++) {
          var dot = document.createElement('div');
          dot.className = 'fw-dot';
          dot.style.background = cols[Math.floor(Math.random()*cols.length)];
          var a = (j/8)*Math.PI*2, d = 40+Math.random()*55;
          dot.style.setProperty('--dx', Math.cos(a)*d+'px');
          dot.style.setProperty('--dy', Math.sin(a)*d+'px');
          fw.appendChild(dot);
        }
        document.body.appendChild(fw);
        setTimeout(function(){ fw.remove(); }, 1100);
      }, i * 75);
    })(i);
  }
}
</script>
