<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רשתות מחשבים Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --ink:   #0f1117;
  --ink2:  #1a2030;
  --paper: #f5f4f0;
  --warm:  #ece9e2;
  --warm2: #e2ddd5;
  --line:  #ccc8bf;
  --dim:   #6b6560;
  --dim2:  #9c968e;
  --ac:    #1a4fcf;
  --ac2:   #c7440e;
  --gr:    #16724a;
  --yw:    #b87c0e;
  --code:  #1e2533;

  --mono:  'DM Mono', monospace;
  --disp:  'Fraunces', serif;
  --body:  'Heebo', sans-serif;
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ══ SCREEN SYSTEM ══ */
.screen { display:none; }
.screen.on { display:block; }

/* ══════════════════════════════════════════
   NAV
══════════════════════════════════════════ */
nav {
  position: sticky; top:0; z-index:100;
  background: rgba(245,244,240,.96);
  backdrop-filter: blur(12px);
  border-bottom: 1.5px solid var(--line);
  height: 54px;
  display: flex; align-items: center;
  padding: 0 28px; gap: 6px;
}

.nav-logo {
  font-family: var(--disp); font-size: 18px; font-weight: 900;
  color: var(--ink); letter-spacing: -0.5px; margin-left: auto;
}
.nav-logo em { font-style: italic; font-weight: 300; color: var(--ac); }

.nav-btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: .5px;
  padding: 6px 14px; border-radius: 6px;
  border: 1.5px solid transparent;
  background: none; cursor: pointer; color: var(--dim);
  transition: all .15s;
}
.nav-btn:hover { color: var(--ink); border-color: var(--line); }
.nav-btn.active { color: var(--ac); border-color: var(--ac); background: rgba(26,79,207,.06); }

.nav-xp {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  color: var(--yw); background: rgba(184,124,14,.08);
  border: 1.5px solid rgba(184,124,14,.25);
  padding: 4px 12px; border-radius: 6px; margin-right: 10px;
}

/* ══════════════════════════════════════════
   LANDING
══════════════════════════════════════════ */
#landing { min-height: 100vh; }

.hero {
  padding: 80px 28px 60px;
  max-width: 1000px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
  align-items: center;
}
@media(max-width:720px){ .hero{grid-template-columns:1fr;padding:48px 20px 40px;gap:32px;} }

.hero-left {}
.hero-tag {
  font-family: var(--mono); font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--ac);
  background: rgba(26,79,207,.07); border: 1.5px solid rgba(26,79,207,.2);
  padding: 4px 12px; border-radius: 4px; display: inline-block; margin-bottom: 20px;
}
.hero-h {
  font-family: var(--disp); font-weight: 900; font-size: clamp(44px,7vw,72px);
  line-height: 1; letter-spacing: -2px; color: var(--ink); margin-bottom: 16px;
}
.hero-h em { font-style: italic; font-weight: 300; color: var(--ac); }
.hero-p { font-size: 15px; color: var(--dim); line-height: 1.75; margin-bottom: 32px; }

.hero-stats {
  display: flex; gap: 28px; margin-bottom: 32px;
}
.hs { border-left: 2px solid var(--line); padding-left: 14px; }
.hs-n { font-family: var(--disp); font-size: 26px; font-weight: 700; color: var(--ink); }
.hs-l { font-size: 11px; color: var(--dim2); font-family: var(--mono); }

.hero-cta {
  font-family: var(--body); font-size: 14px; font-weight: 700;
  padding: 12px 28px; border-radius: 8px; border: none; cursor: pointer;
  background: var(--ac); color: #fff; transition: opacity .15s;
  display: inline-block;
}
.hero-cta:hover { opacity: .88; }

/* Chapter grid */
.ch-grid {
  max-width: 1000px; margin: 0 auto;
  display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
  gap: 12px; padding: 0 28px 80px;
}

.ch-card {
  background: var(--paper); border: 1.5px solid var(--line);
  border-radius: 12px; padding: 18px 20px;
  cursor: pointer; transition: all .18s;
  position: relative; overflow: hidden;
}
.ch-card::after {
  content: ''; position: absolute; bottom:0; left:0; right:0; height:3px;
  background: var(--cc, var(--line));
}
.ch-card:hover { transform: translateY(-3px); border-color: var(--cc,var(--line)); box-shadow: 0 8px 24px rgba(0,0,0,.1); }

.cc-n { font-family: var(--mono); font-size: 10px; color: var(--dim2); letter-spacing: 2px; margin-bottom: 6px; }
.cc-icon { font-size: 24px; margin-bottom: 8px; display: block; }
.cc-name { font-family: var(--disp); font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.cc-desc { font-size: 12px; color: var(--dim); line-height: 1.5; }
.cc-acts { display:flex; gap:6px; margin-top:10px; }
.cc-btn {
  font-family: var(--mono); font-size: 10px; padding: 4px 9px;
  border-radius: 5px; border: 1.5px solid var(--line);
  background: none; cursor: pointer; color: var(--dim);
  transition: all .13s;
}
.cc-btn:hover { border-color: var(--ac); color: var(--ac); }
.cc-btn.term:hover { border-color: var(--gr); color: var(--gr); }

/* ══════════════════════════════════════════
   LEARN SCREEN
══════════════════════════════════════════ */
#learn { min-height: 100vh; }

.learn-wrap {
  max-width: 1000px; margin: 0 auto;
  display: grid; grid-template-columns: 220px 1fr;
  min-height: calc(100vh - 54px);
}
@media(max-width:700px){ .learn-wrap{grid-template-columns:1fr;} }

/* Sidebar */
.l-sidebar {
  border-left: 1.5px solid var(--line);
  background: var(--warm);
  padding: 24px 0;
  position: sticky; top:54px;
  height: calc(100vh - 54px);
  overflow-y: auto;
}
.l-sidebar::-webkit-scrollbar{width:3px;}
.l-sidebar::-webkit-scrollbar-thumb{background:var(--line);}

.sb-lbl {
  font-family: var(--mono); font-size: 9px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--dim2);
  padding: 0 16px; margin-bottom: 8px; display: block;
}

.sb-ch {
  padding: 6px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 500; color: var(--dim);
  transition: all .13s; border-right: 3px solid transparent;
}
.sb-ch:hover { color: var(--ink); background: rgba(0,0,0,.03); }
.sb-ch.active { color: var(--ac); border-color: var(--ac); background: rgba(26,79,207,.04); }
.sb-ch-num { font-family: var(--mono); font-size: 10px; color: var(--dim2); min-width: 18px; }

.sb-secs { display: none; }
.sb-secs.open { display: block; }

.sb-sec {
  padding: 4px 16px 4px 30px; cursor: pointer;
  font-size: 12px; color: var(--dim2);
  transition: all .12s; display: flex; align-items: center; gap: 6px;
  background: none; border: none; width: 100%; text-align: right;
}
.sb-sec:hover { color: var(--ink); }
.sb-sec.active { color: var(--ac); font-weight: 600; }
.sb-sec::before { content:'·'; color: var(--dim2); }

/* Content */
.l-content { padding: 48px 52px 100px; }
@media(max-width:900px){ .l-content{padding:28px 20px 80px;} }

/* Reading bar */
#readBar {
  position: fixed; top:54px; right:220px; left:0; height:2.5px;
  background: linear-gradient(90deg, var(--ac), var(--ac2));
  width: 0%; z-index:90; transition: width .15s;
}

/* Chapter header */
.ch-eyebrow {
  font-family: var(--mono); font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--dim2); margin-bottom: 10px;
}
.ch-title {
  font-family: var(--disp); font-size: clamp(32px,5vw,50px);
  font-weight: 900; color: var(--ink); letter-spacing: -1.5px;
  line-height: 1.05; margin-bottom: 10px;
}
.ch-desc { font-size: 15px; color: var(--dim); margin-bottom: 4px; }
.divider { height: 1.5px; background: var(--line); margin: 32px 0; }

/* Learn sections */
.learn-section { margin-bottom: 52px; scroll-margin-top: 80px; }

.section-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; font-weight: 500;
  color: var(--ac); display: block; margin-bottom: 8px;
}
.section-h {
  font-family: var(--disp); font-size: 22px; font-weight: 700;
  color: var(--ink); letter-spacing: -.3px; margin-bottom: 14px;
}
.prose {
  font-size: 15px; color: var(--ink2); line-height: 1.85; font-weight: 400;
}
.prose strong { color: var(--ink); font-weight: 700; }

/* Concept grid */
.concept-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:16px 0; }
@media(max-width:600px){ .concept-grid{grid-template-columns:1fr;} }
.concept {
  background: var(--warm); border: 1.5px solid var(--line);
  border-radius: 10px; padding: 16px;
}
.concept-icon { font-size: 24px; margin-bottom: 8px; }
.concept-title { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.concept-body { font-size: 13px; color: var(--ink2); line-height: 1.65; }

/* Alert boxes */
.alert-box {
  border-radius: 10px; padding: 14px 18px; margin: 16px 0;
  display: flex; gap: 13px; border: 1.5px solid;
}
.alert-icon { font-size: 18px; flex-shrink:0; margin-top:1px; }
.alert-body { flex:1; }
.alert-title { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
.alert-text { font-size: 13px; color: var(--ink2); line-height: 1.7; }
.alert-box.info  { background:#eff6ff; border-color:#bfdbfe; }
.alert-box.tip   { background:#f0fdf4; border-color:#bbf7d0; }
.alert-box.warn  { background:#fffbeb; border-color:#fde68a; }

/* Code blocks */
.code-block {
  background: var(--code); border-radius: 10px;
  overflow: hidden; margin: 16px 0;
  direction: ltr; text-align: left;
}
.code-bar {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 14px; background: rgba(255,255,255,.04);
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.cd{width:9px;height:9px;border-radius:50%;}
.cd-r{background:#ff5f57}.cd-y{background:#febc2e}.cd-g{background:#28c840}
.code-label { font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.35);margin-right:auto; }
.code-body {
  padding: 14px 16px;
  font-family: var(--mono); font-size: 13px; line-height: 1.9;
  color: #cdd6f4;
}
.tp{color:#50fa7b}.tv{color:#8be9fd}.ts{color:#f1fa8c}.tn{color:#bd93f9}
.tc{color:#6272a4}.to{color:#ffb86c}.tw{color:#cdd6f4}

/* Tables */
.sum-tbl { width:100%;border-collapse:collapse;margin:16px 0;font-size:13.5px; }
.sum-tbl th {
  background:var(--warm);color:var(--ink);font-family:var(--body);font-weight:700;
  padding:9px 13px;border:1.5px solid var(--line);text-align:right;font-size:12px;
}
.sum-tbl td {
  padding:9px 13px;border:1.5px solid var(--line);color:var(--ink2);
  vertical-align:top;line-height:1.6;
}
.sum-tbl tr:nth-child(even) td { background:var(--warm); }
.sum-tbl td:first-child { font-family:var(--mono);font-size:12px;color:var(--ac);font-weight:600;white-space:nowrap; }

/* Flow */
.flow-diag {
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin:16px 0;padding:18px;background:var(--warm);
  border:1.5px solid var(--line);border-radius:10px;
}
.flow-node {
  padding:9px 14px;border-radius:8px;font-size:12.5px;
  font-weight:600;text-align:center;white-space:nowrap;line-height:1.4;
}
.fn-blue   { background:#dbeafe;color:#1d4ed8;border:1.5px solid #bfdbfe; }
.fn-green  { background:#d1fae5;color:#065f46;border:1.5px solid #a7f3d0; }
.fn-purple { background:#ede9fe;color:#5b21b6;border:1.5px solid #c4b5fd; }
.fn-gray   { background:#f3f4f6;color:#374151;border:1.5px solid #d1d5db; }
.flow-arr  { color:var(--dim);font-size:18px; }

/* Ch nav */
.ch-nav {
  display:flex;gap:12px;margin-top:56px;padding-top:24px;
  border-top:1.5px solid var(--line);align-items:center;
}
.ch-nav-btn {
  font-family:var(--mono);font-size:11px;padding:8px 16px;
  border-radius:7px;border:1.5px solid var(--line);
  background:var(--paper);color:var(--dim);cursor:pointer;transition:all .14s;
}
.ch-nav-btn:hover{border-color:var(--ac);color:var(--ac);}
.ch-nav-next{background:var(--ac);color:#fff;border-color:var(--ac);}
.ch-nav-next:hover{opacity:.88;}

/* ══════════════════════════════════════════
   TERMINAL SCREEN
══════════════════════════════════════════ */
#terminal-screen { min-height:100vh; }

.term-wrap {
  max-width: 1000px; margin: 0 auto;
  display: grid; grid-template-columns: 240px 1fr;
  min-height: calc(100vh - 54px);
}
@media(max-width:700px){ .term-wrap{grid-template-columns:1fr;} }

/* Mission sidebar */
.m-sidebar {
  border-left: 1.5px solid var(--line);
  background: var(--warm);
  padding: 20px 0;
  position: sticky; top:54px;
  height: calc(100vh - 54px);
  overflow-y: auto;
}
.m-sidebar::-webkit-scrollbar{width:3px;}
.m-sidebar::-webkit-scrollbar-thumb{background:var(--line);}

.ms-head { padding: 0 16px 16px; border-bottom:1.5px solid var(--line); margin-bottom:12px; }
.ms-title { font-family:var(--disp);font-size:16px;font-weight:700;color:var(--ink); }
.ms-sub { font-family:var(--mono);font-size:10px;color:var(--dim2);margin-top:3px; }

.ms-prog { height:3px;background:var(--line);border-radius:99px;margin-top:10px;overflow:hidden; }
.ms-prog-fill { height:100%;background:var(--gr);border-radius:99px;transition:width .5s; }

.m-item {
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;cursor:pointer;transition:all .13s;
  border-right:3px solid transparent;
}
.m-item:hover { background:rgba(0,0,0,.03); }
.m-item.active { background:rgba(22,114,74,.05);border-color:var(--gr); }
.m-item.done { opacity:.7; }

.m-num {
  font-family:var(--mono);font-size:9px;
  width:22px;height:22px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  background:var(--warm2);border:1.5px solid var(--line);
  color:var(--dim2);flex-shrink:0;font-weight:500;
}
.m-item.active .m-num { background:rgba(22,114,74,.1);border-color:var(--gr);color:var(--gr); }
.m-item.done   .m-num { background:rgba(22,114,74,.08);border-color:rgba(22,114,74,.3);color:var(--gr); }

.m-info { flex:1; }
.m-name { font-size:12px;font-weight:600;color:var(--ink); }
.m-ch   { font-family:var(--mono);font-size:10px;color:var(--dim2);margin-top:1px; }
.m-check { color:var(--gr);font-size:13px;flex-shrink:0; }

/* Terminal area */
.term-main { display:flex;flex-direction:column;height:calc(100vh - 54px);overflow:hidden; }

.mission-card {
  background:var(--warm);border-bottom:1.5px solid var(--line);
  padding:20px 24px;flex-shrink:0;
}
.mc-badge {
  font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--gr);background:rgba(22,114,74,.08);border:1.5px solid rgba(22,114,74,.25);
  padding:3px 9px;border-radius:4px;display:inline-block;margin-bottom:10px;
}
.mc-title { font-family:var(--disp);font-size:20px;font-weight:700;color:var(--ink);margin-bottom:6px; }
.mc-desc  { font-size:13px;color:var(--dim);margin-bottom:10px;line-height:1.6; }
.mc-hints { display:flex;flex-direction:column;gap:4px; }
.mc-hint  { font-size:12.5px;color:var(--dim);display:flex;gap:6px;align-items:flex-start; }
.mc-hint::before { content:'›';color:var(--ac);flex-shrink:0;font-family:var(--mono); }

/* Terminal window */
.terminal {
  flex:1;display:flex;flex-direction:column;
  background:#0d1117;overflow:hidden;
}

.term-topbar {
  display:flex;align-items:center;gap:5px;padding:9px 16px;
  background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.06);
  flex-shrink:0;
}
.tb-dot{width:10px;height:10px;border-radius:50%;}
.tb-r{background:#ff5f57}.tb-y{background:#febc2e}.tb-g{background:#28c840}
.term-name { font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.3);margin-right:auto; }
.term-clear-btn {
  font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.3);
  background:none;border:1px solid rgba(255,255,255,.12);padding:2px 8px;
  border-radius:4px;cursor:pointer;transition:all .13s;
}
.term-clear-btn:hover { color:rgba(255,255,255,.6); }

.term-out {
  flex:1;padding:14px 18px;overflow-y:auto;
  font-family:var(--mono);font-size:13px;line-height:1.8;
  direction:ltr;text-align:left;
}
.term-out::-webkit-scrollbar{width:4px;}
.term-out::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);}

.out-line { margin-bottom:1px; }
.out-ps1  { color:#50fa7b; }
.out-cmd  { color:#f8f8f2; }
.out-ok   { color:#50fa7b; }
.out-err  { color:#ff5555; }
.out-info { color:#8be9fd; }
.out-dim  { color:#6272a4; }
.out-yw   { color:#f1fa8c; }
.out-pur  { color:#bd93f9; }

.out-success {
  background:rgba(80,250,123,.07);border:1px solid rgba(80,250,123,.2);
  border-radius:6px;padding:8px 12px;margin:6px 0;
  color:#50fa7b;display:flex;align-items:center;gap:8px;
}
.out-fail {
  background:rgba(255,85,85,.07);border:1px solid rgba(255,85,85,.2);
  border-radius:6px;padding:8px 12px;margin:6px 0;
  color:#ff5555;display:flex;align-items:center;gap:8px;
}

.term-input-row {
  display:flex;align-items:center;
  padding:9px 18px;border-top:1px solid rgba(255,255,255,.07);
  background:rgba(0,0,0,.2);flex-shrink:0;
}
.term-ps { font-family:var(--mono);font-size:13px;color:#50fa7b;white-space:nowrap;direction:ltr; }
.term-in {
  flex:1;background:none;border:none;outline:none;
  font-family:var(--mono);font-size:13px;color:#f8f8f2;
  padding:0 8px;direction:ltr;caret-color:#8be9fd;
}

/* XP Pop */
.xp-pop {
  position:fixed;font-family:var(--mono);font-size:16px;font-weight:700;
  color:var(--yw);pointer-events:none;z-index:9999;
  animation:xpfloat 1.2s ease forwards;
}
@keyframes xpfloat {
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-56px) scale(1.2)}
}

/* ══════════════════════════════════════════
   LAB SCREEN
══════════════════════════════════════════ */
.lab-wrap {
  max-width: 1000px; margin: 0 auto;
  display: grid; grid-template-columns: 210px 1fr;
  min-height: calc(100vh - 54px);
}
@media(max-width:700px){ .lab-wrap{grid-template-columns:1fr;} }

/* sidebar */
.lab-sidebar {
  border-left: 1.5px solid var(--line);
  background: var(--warm);
  padding: 0;
  position: sticky; top:54px;
  height: calc(100vh - 54px);
  overflow-y: auto;
}
.lab-sidebar::-webkit-scrollbar{width:3px;}
.lab-sidebar::-webkit-scrollbar-thumb{background:var(--line);}

.lsb-head {
  padding: 18px 16px 14px;
  border-bottom: 1.5px solid var(--line);
  margin-bottom: 6px;
}
.lsb-title { font-family:var(--disp);font-size:15px;font-weight:700;color:var(--ink); }
.lsb-sub   { font-family:var(--mono);font-size:10px;color:var(--dim2);margin-top:2px; }

.lab-overall-prog {
  height: 3px; background: var(--line);
  border-radius: 99px; overflow: hidden; margin-top: 10px;
}
.lop-fill { height:100%;background:var(--gr);border-radius:99px;transition:width .5s; }

.lab-ch-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; cursor: pointer; transition: all .13s;
  border-right: 3px solid transparent; position: relative;
}
.lab-ch-item:hover { background: rgba(0,0,0,.03); }
.lab-ch-item.active { background:rgba(22,114,74,.05);border-color:var(--gr); }

.lci-icon { font-size:16px; flex-shrink:0; }
.lci-info { flex:1; }
.lci-name { font-size:12px;font-weight:600;color:var(--ink); }
.lci-prog { height:2px;background:var(--line);border-radius:99px;margin-top:4px;overflow:hidden; }
.lci-prog-fill { height:100%;background:var(--gr);border-radius:99px;transition:width .4s; }
.lci-score {
  font-family:var(--mono);font-size:10px;font-weight:600;
  color:var(--dim2);flex-shrink:0;
}
.lci-score.done { color:var(--gr); }

/* welcome */
.lab-welcome { padding: 60px 40px; text-align: center; }
.lw-icon { font-size: 48px; margin-bottom: 16px; }
.lw-h { font-family:var(--disp);font-size:28px;font-weight:700;color:var(--ink);margin-bottom:8px; }
.lw-p { color:var(--dim);margin-bottom:36px;font-size:14px; }
.lw-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap: 10px; max-width: 680px; margin: 0 auto;
}
.lw-card {
  background:var(--paper);border:1.5px solid var(--line);border-radius:10px;
  padding:14px;cursor:pointer;transition:all .16s;text-align:right;
  position:relative;overflow:hidden;
}
.lw-card::after {
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:var(--cc,var(--line));
}
.lw-card:hover { border-color:var(--cc,var(--ac));transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08); }
.lwc-icon { font-size:20px;margin-bottom:6px;display:block; }
.lwc-name { font-size:12px;font-weight:600;color:var(--ink); }
.lwc-n    { font-family:var(--mono);font-size:10px;color:var(--dim2);margin-bottom:4px; }
.lwc-prog { height:2px;background:var(--line);border-radius:99px;margin-top:8px;overflow:hidden; }
.lwc-prog-fill { height:100%;background:var(--gr);border-radius:99px; }

/* Lab quiz area */
.lab-quiz { padding: 32px 40px 80px; }
@media(max-width:900px){ .lab-quiz{padding:20px 20px 60px;} }

.lq-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px; padding-bottom: 16px;
  border-bottom: 1.5px solid var(--line);
}
.lq-ch-icon { font-size: 24px; }
.lq-ch-name { font-family:var(--disp);font-size:20px;font-weight:700;color:var(--ink); }
.lq-ch-num  { font-family:var(--mono);font-size:10px;color:var(--dim2);margin-top:1px; }
.lq-spacer  { flex:1; }

.lq-score-box {
  text-align: center;
  background:var(--warm);border:1.5px solid var(--line);
  border-radius:10px;padding:10px 18px;
}
.lqsb-val { font-family:var(--mono);font-size:18px;font-weight:700;color:var(--ink); }
.lqsb-lbl { font-family:var(--mono);font-size:10px;color:var(--dim2); }

/* Progress pips */
.lq-pips { display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap; }
.lq-pip {
  width: 18px; height: 6px; border-radius: 99px;
  background: var(--line); transition: background .2s;
}
.lq-pip.ok   { background: var(--gr); }
.lq-pip.bad  { background: var(--ac2); }
.lq-pip.cur  { background: var(--ac); }

/* Question card */
.lq-card {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 14px; padding: 24px;
  margin-bottom: 14px;
  animation: lqSlide .25s cubic-bezier(.22,1,.36,1);
}
@keyframes lqSlide { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

.lq-meta { display:flex;align-items:center;gap:8px;margin-bottom:14px; }
.lq-num  { font-family:var(--mono);font-size:10px;color:var(--dim2); }
.lq-cat  {
  font-family:var(--mono);font-size:10px;letter-spacing:.5px;
  padding:2px 8px;border-radius:4px;
  background:rgba(26,79,207,.07);border:1.5px solid rgba(26,79,207,.2);color:var(--ac);
}
.lq-q {
  font-size:16px;font-weight:600;color:var(--ink);
  line-height:1.6;margin-bottom:0;
}

/* Code snip in question */
.lq-snip {
  background:var(--code);border-radius:8px;
  overflow:hidden;margin-bottom:14px;direction:ltr;text-align:left;
}
.lqs-bar { display:flex;gap:5px;padding:6px 12px;background:rgba(255,255,255,.04); }
.lqs-body {
  padding:10px 14px;font-family:var(--mono);font-size:12.5px;
  line-height:1.85;color:#cdd6f4;
}

/* Options */
.lq-opts { display:flex;flex-direction:column;gap:8px;margin-top:16px; }
.lq-opt {
  display:flex;align-items:flex-start;gap:12px;
  background:var(--warm);border:1.5px solid var(--line);border-radius:10px;
  padding:12px 15px;cursor:pointer;transition:all .14s;text-align:right;width:100%;
}
.lq-opt:hover:not(.done) { border-color:var(--ac);background:#eff6ff; }
.lq-opt.done { cursor:default; }
.lq-opt.correct { background:#f0fdf4;border-color:var(--gr); }
.lq-opt.correct .lq-lbl { background:var(--gr);border-color:var(--gr);color:#fff; }
.lq-opt.wrong   { background:#fff1f1;border-color:var(--ac2);opacity:.8; }
.lq-opt.reveal  { background:#f0fdf4;border-color:rgba(22,114,74,.4); }
.lq-opt.reveal  .lq-lbl { background:rgba(22,114,74,.15);border-color:var(--gr);color:var(--gr); }

.lq-lbl {
  font-family:var(--mono);font-size:11px;font-weight:600;
  width:22px;height:22px;border-radius:5px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--warm2);border:1.5px solid var(--line);color:var(--dim2);
  transition:all .14s; margin-top:1px;
}
.lq-text { flex:1;font-size:13.5px;color:var(--ink2);line-height:1.5;font-weight:400; }
.lq-icon { font-size:14px;flex-shrink:0;width:18px;text-align:center; }

/* Explanation */
.lq-exp {
  border-radius:10px;padding:13px 16px;margin-top:10px;
  border:1.5px solid;display:none;
  animation:expIn .2s ease;
}
@keyframes expIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.lq-exp.ok  { background:#f0fdf4;border-color:#bbf7d0; }
.lq-exp.bad { background:#fff1f1;border-color:#fecaca; }
.lq-exp-lbl { font-family:var(--mono);font-size:10px;letter-spacing:2px;font-weight:700;margin-bottom:5px; }
.lq-exp.ok  .lq-exp-lbl { color:var(--gr); }
.lq-exp.bad .lq-exp-lbl { color:var(--ac2); }
.lq-exp-txt { font-size:13px;color:var(--ink2);line-height:1.75; }

/* Footer */
.lq-foot {
  display:flex;align-items:center;justify-content:space-between;
  padding-top:4px;
}
.lq-btn {
  font-family:var(--mono);font-size:12px;
  padding:9px 20px;border-radius:8px;
  border:1.5px solid var(--line);background:var(--paper);
  color:var(--dim);cursor:pointer;transition:all .14s;
}
.lq-btn:hover:not(:disabled){ border-color:var(--ac);color:var(--ac); }
.lq-btn:disabled{ opacity:.3;cursor:default; }
.lq-btn-next {
  background:var(--ac);color:#fff;border-color:var(--ac);
  font-weight:600;padding:9px 24px;
}
.lq-btn-next:hover:not(:disabled){ opacity:.88; }

/* Result banner */
.lq-result {
  text-align:center;padding:48px 24px;
  animation:lqSlide .3s ease;
}
.lqr-ring {
  width:120px;height:120px;margin:0 auto 20px;position:relative;
}
.lqr-ring svg { position:absolute;inset:0;transform:rotate(-90deg); }
.lqr-bg  { fill:none;stroke:var(--line);stroke-width:9; }
.lqr-arc { fill:none;stroke-width:9;stroke-linecap:round;
  stroke-dasharray:330;stroke-dashoffset:330;
  transition:stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1); }
.lqr-inner {
  position:absolute;inset:14px;border-radius:50%;background:var(--warm);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.lqr-pct   { font-family:var(--disp);font-size:26px;font-weight:800;color:var(--ink); }
.lqr-grade { font-family:var(--mono);font-size:10px;color:var(--dim2);letter-spacing:2px; }
.lqr-title { font-family:var(--disp);font-size:22px;font-weight:700;color:var(--ink);margin-bottom:6px; }
.lqr-sub   { font-size:13px;color:var(--dim);margin-bottom:24px; }
.lqr-stats { display:flex;gap:10px;justify-content:center;margin-bottom:24px;flex-wrap:wrap; }
.lqrs { background:var(--warm);border:1.5px solid var(--line);border-radius:10px;padding:12px 18px;min-width:70px;text-align:center; }
.lqrs-v { font-family:var(--mono);font-size:20px;font-weight:700; }
.lqrs-l { font-family:var(--mono);font-size:10px;color:var(--dim2);margin-top:2px; }
.lqr-btns { display:flex;gap:10px;justify-content:center; }
.lqr-btn-replay {
  font-family:var(--body);font-size:13px;font-weight:600;
  padding:10px 24px;border-radius:8px;border:none;cursor:pointer;
  background:var(--ac);color:#fff;transition:opacity .14s;
}
.lqr-btn-replay:hover{ opacity:.88; }
.lqr-btn-back {
  font-family:var(--body);font-size:13px;font-weight:500;
  padding:10px 18px;border-radius:8px;cursor:pointer;
  border:1.5px solid var(--line);background:var(--paper);color:var(--dim);
  transition:all .14s;
}
.lqr-btn-back:hover{ border-color:var(--ac);color:var(--ac); }

<script>



var LAB_DATA = {
  1: [
  {
    cat: "Client & Server",
    snip: null,
    q: "מה ההגדרה של Client ומה של Server? מי יוזם את התקשורת?",
    a: [
      "Client = יוזם ושולח Requests. Server = מחכה, מקבל ומחזיר Responses. תמיד ה-Client מתחיל.",
      "Server = יוזם, Client = מגיב. השרת שולח דוא\"ל ללקוחות.",
      "Client ו-Server זהים, רק צדדים שונים של אותו חיבור.",
      "Client = מחשב, Server = נתב. ה-Server מנתב את הבקשות."
    ],
    c: 0,
    e: "בפרק: 'כאשר אתם פונים אל YouTube, הלקוח הוא המחשב שלכם, והשרת הוא שרת YouTube. הדפדפן שלכם שולח בקשה לשרת, והשרת מחזיר לכם תשובה.' Client תמיד יוזם. Server תמיד מאזין ומגיב."
  },
  {
    cat: "Request & Response",
    snip: null,
    q: "מה ההבדל בין Request לבין Response? מה כל אחד מכיל?",
    a: [
      "Request = בקשה מהלקוח לשרת ('שלח לי את העמוד'). Response = תגובת השרת ללקוח (HTML+CSS+JS שמרכיב את הדף).",
      "Request = קובץ HTML. Response = כתובת IP.",
      "שניהם זהים, רק כיוון שונה.",
      "Request = תשובה, Response = בקשה. (ההיפך מהנכון)"
    ],
    c: 0,
    e: "בפרק: 'הדפדפן צריך לשלוח הודעת בקשה (Request) אל Facebook, ובה להגיד שלח לי את המידע הנדרש. כאשר Facebook מקבל את הבקשה, הוא שולח תגובה (Response) שמכילה את המידע הדרוש.' ניתן לראות את ה-Response ב-View Page Source."
  },
  {
    cat: "כתובות IP",
    snip: '<div class="qsnip" style="direction:ltr;text-align:left;"><span class="t-i">192.168.14.51</span>  &larr; <span class="t-cm">תקינה</span>\n<span class="t-i">10.0.0.255</span>     &larr; <span class="t-cm">תקינה</span>\n<span class="t-rd">300.5.1.8</span>      &larr; <span class="t-cm">???</span></div>',
    q: "מה מבנה כתובת IP? למה 300.5.1.8 אינה כתובת חוקית?",
    a: [
      "4 bytes, כל byte ערך 0–255. 300 גדול מ-255 — לא ניתן לייצג ב-byte אחד — כתובת לא חוקית.",
      "4 bytes, כל byte 0–999. 300 תקין כי המחשב מוסיף 0 לפניו.",
      "IP = שם דומיין בספרות. 300 תקין בגרסאות חדשות.",
      "IP = 6 bytes. 300.5.1.8 לא חוקית כי חסרים שני bytes."
    ],
    c: 0,
    e: "בפרק: 'כתובות IP מורכבות מארבעה בתים. כל בית יכול לקבל ערך בין 0 ל-255.' 300 > 255 → לא ניתן לייצג ב-byte אחד → כתובת לא חוקית. הטווח החוקי: 0.0.0.0 עד 255.255.255.255."
  },
  {
    cat: "ping",
    snip: '<div class="qterm"><div class="qterm-bar"><div class="qt-dot qt-r"></div><div class="qt-dot qt-y"></div><div class="qt-dot qt-g"></div></div><div class="qterm-body"><span class="t-p">C:\\&gt; </span><span class="t-c">ping www.facebook.com</span>\n<span class="t-o">Pinging facebook.com [</span><span class="t-i">31.13.72.65</span><span class="t-o">]</span>\n<span class="t-o">Reply from 31.13.72.65: time=</span><span class="t-m">180ms</span></div></div>',
    q: "מה הכלי ping נועד לעשות? מה ניתן ללמוד מהפלט הזה?",
    a: [
      "בודק קישוריות: שולח בקשת הד ומחכה לתשובה. מהפלט: ה-IP של Facebook הוא 31.13.72.65, החיבור עובד, זמן תגובה 180ms.",
      "מוריד את קוד ה-HTML של Facebook ומציג בטרמינל.",
      "מבצע שאילתת DNS ומדפיס את כל רשומות ה-DNS.",
      "מציג את המסלול המלא של כל ה-Hops עד ל-Facebook."
    ],
    c: 0,
    e: "בפרק: 'הכלי ping נועד לבדוק האם מחשב בעל כתובת IP מסויימת מחובר לרשת, ולמדוד כמה זמן לוקח להודעה להישלח ולחזור.' כתוצר לוואי — מציג IP. הוא לא כלי DNS ולא כלי הורדה."
  },
  {
    cat: "DNS",
    snip: null,
    q: "למה צריך DNS? מה הבעיה שהוא פותר?",
    a: [
      "בני אדם זוכרים שמות (facebook.com), מחשבים צריכים IP. DNS ממיר שם דומיין → כתובת IP בזמן אמת.",
      "DNS = Domain Network Security. מאבטח את התעבורה מפני האקרים.",
      "DNS מאיץ גלישה על ידי שמירת דפים שלמים במטמון.",
      "DNS = שם אחר ל-DHCP. מחלק כתובות IP לכל מחשב ברשת."
    ],
    c: 0,
    e: "בפרק: 'לבני אדם קל יותר לזכור שמות דומיין מאשר כתובות IP. DNS הוא הדרך לתרגם בין השניים. ההמרה מתרחשת בכל פעם שאנו מציינים שם דומיין — בין אם בדפדפן, ובין אם בכלים כמו ping או tracert.'"
  },
  {
    cat: "nslookup",
    snip: '<div class="qterm"><div class="qterm-bar"><div class="qt-dot qt-r"></div><div class="qt-dot qt-y"></div><div class="qt-dot qt-g"></div></div><div class="qterm-body"><span class="t-p">C:\\&gt; </span><span class="t-c">nslookup www.google.com</span>\n<span class="t-o">Name:    www.google.com</span>\n<span class="t-o">Address: </span><span class="t-i">142.250.74.46</span></div></div>',
    q: "מה nslookup עושה? מה ההבדל בינו ל-ping?",
    a: [
      "nslookup = שאילתת DNS טהורה (שם→IP). ping = בדיקת קישוריות + מדידת זמן. שניהם מציגים IP אך למטרות שונות.",
      "nslookup = מהיר. ping = איטי. אחרת זהים לחלוטין.",
      "nslookup = ל-Windows. ping = ל-Linux. לא עובדים אותו דבר.",
      "nslookup = בודק אם האתר עלה. ping = מוריד קבצים."

/* ════════════════════════
   LAB STATE
════════════════════════ */
var LAB = {
  chN: null,
  questions: [],
  cur: 0,
  ans: [],
  answered: false,
  LBL: ['א','ב','ג','ד']
};

/* ════════════════════════
   BUILD WELCOME GRID
════════════════════════ */
function buildLabHome() {
  var grid = document.getElementById('labWelcomeGrid');
  if (!grid) return;
  CHAPTERS.forEach(function(ch) {
    var saved = labGetSaved(ch.n);
    var pct = saved ? Math.round(saved.ok / saved.total * 100) : 0;
    var card = document.createElement('div');
    card.className = 'lw-card';
    card.style.setProperty('--cc', ch.color);
    card.onclick = function() { startLab(ch.n); };
    card.innerHTML =
      '<div class="lwc-n">פרק ' + String(ch.n).padStart(2,'0') + '</div>' +
      '<span class="lwc-icon">' + ch.icon + '</span>' +
      '<div class="lwc-name">' + ch.name + '</div>' +
      '<div class="lwc-prog"><div class="lwc-prog-fill" id="lwpf'+ch.n+'" style="width:' + (saved?pct:0) + '%"></div></div>';
    grid.appendChild(card);
  });

  // Build sidebar chapter list
  buildLabSidebar();
}

function buildLabSidebar() {
  var list = document.getElementById('labChList');
  if (!list) return;
  CHAPTERS.forEach(function(ch) {
    var saved = labGetSaved(ch.n);
    var pct = saved ? Math.round(saved.ok / saved.total * 100) : 0;
    var qTotal = (LAB_DATA[ch.n] || []).length;

    var item = document.createElement('div');
    item.className = 'lab-ch-item';
    item.id = 'labchi' + ch.n;
    item.onclick = function() { startLab(ch.n); };
    item.innerHTML =
      '<div class="lci-icon">' + ch.icon + '</div>' +
      '<div class="lci-info">' +
        '<div class="lci-name">' + ch.name + '</div>' +
        '<div class="lci-prog"><div class="lci-prog-fill" id="lcipf'+ch.n+'" style="width:' + (saved?pct:0) + '%"></div></div>' +
      '</div>' +
      '<div class="lci-score' + (saved && pct===100 ? ' done' : '') + '" id="lcscore'+ch.n+'">' +
        (saved ? pct+'%' : qTotal+'q') +
      '</div>';
    list.appendChild(item);
  });
  updateOverallProg();
}

function updateOverallProg() {
  var total = 0, done = 0;
  for (var n = 1; n <= 12; n++) {
    var qs = LAB_DATA[n];
    if (!qs) continue;
    total += qs.length;
    var saved = labGetSaved(n);
    if (saved) done += saved.ok;
  }
  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  var el = document.getElementById('labOverallProg');
  if (el) el.style.width = pct + '%';
}

function labGetSaved(n) {
  try {
    var raw = localStorage.getItem('lab_ch' + n);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function labSave(n, ok, total) {
  try {
    localStorage.setItem('lab_ch' + n, JSON.stringify({ok:ok, total:total, ts:Date.now()}));
  } catch(e) {}
}

/* ════════════════════════
   START LAB CHAPTER
════════════════════════ */
function startLab(n) {
  LAB.chN = n;
  var qs = LAB_DATA[n];
  if (!qs || !qs.length) return;

  // shuffle
  LAB.questions = qs.slice().sort(function(){ return Math.random() - .5; });
  LAB.cur = 0; LAB.ans = []; LAB.answered = false;

  var ch = CHAPTERS.find(function(c){ return c.n === n; });

  // sidebar active
  document.querySelectorAll('.lab-ch-item').forEach(function(x){ x.classList.remove('active'); });
  var si = document.getElementById('labchi'+n);
  if (si) si.classList.add('active');

  // render
  renderLabQ();
}

/* ════════════════════════
   RENDER QUESTION
════════════════════════ */
function renderLabQ() {
  var q    = LAB.questions[LAB.cur];
  var tot  = LAB.questions.length;
  var ch   = CHAPTERS.find(function(c){ return c.n === LAB.chN; });
  LAB.answered = false;

  // build pips
  var pips = '';
  for (var i = 0; i < tot; i++) {
    var cls = i < LAB.cur
      ? (LAB.ans[i] === 1 ? ' ok' : ' bad')
      : i === LAB.cur ? ' cur' : '';
    pips += '<div class="lq-pip' + cls + '"></div>';
  }

  // ok count
  var okCount = LAB.ans.filter(function(x){ return x===1; }).length;

  // shuffle options
  var idx  = [0,1,2,3].sort(function(){ return Math.random() - .5; });
  var shuf = idx.map(function(i){ return q.a[i]; });
  var newC = idx.indexOf(q.c);

  var optsHTML = '';
  for (var j = 0; j < 4; j++) {
    optsHTML +=
      '<button class="lq-opt" data-i="' + j + '" data-c="' + newC + '">' +
      '<span class="lq-lbl">' + LAB.LBL[j] + '</span>' +
      '<span class="lq-text">' + shuf[j] + '</span>' +
      '<span class="lq-icon"></span>' +
      '</button>';
  }

  var snipHTML = q.snip
    ? '<div class="lq-snip"><div class="lqs-bar"><div class="cd cd-r"></div><div class="cd cd-y"></div><div class="cd cd-g"></div></div><div class="lqs-body">' + q.snip + '</div></div>'
    : '';

  var lm = document.getElementById('labMain');
  lm.innerHTML =
    '<div class="lab-quiz">' +
      '<div class="lq-header">' +
        '<div class="lq-ch-icon">' + ch.icon + '</div>' +
        '<div><div class="lq-ch-name">' + ch.name + '</div>' +
          '<div class="lq-ch-num">פרק ' + String(LAB.chN).padStart(2,'0') + '</div></div>' +
        '<div class="lq-spacer"></div>' +
        '<div class="lq-score-box">' +
          '<div class="lqsb-val" id="lqScore">' + okCount + ' / ' + LAB.cur + '</div>' +
          '<div class="lqsb-lbl">נכון</div>' +
        '</div>' +
      '</div>' +
      '<div class="lq-pips" id="lqPips">' + pips + '</div>' +
      '<div class="lq-card" id="lqCard">' +
        '<div class="lq-meta">' +
          '<span class="lq-num">' + (LAB.cur+1) + ' / ' + tot + '</span>' +
          '<span class="lq-cat">' + q.cat + '</span>' +
        '</div>' +
        snipHTML +
        '<div class="lq-q">' + q.q + '</div>' +
        '<div class="lq-opts" id="lqOpts">' + optsHTML + '</div>' +
        '<div class="lq-exp" id="lqExp">' +
          '<div class="lq-exp-lbl" id="lqExpLbl"></div>' +
          '<div class="lq-exp-txt" id="lqExpTxt"></div>' +
        '</div>' +
      '</div>' +
      '<div class="lq-foot">' +
        '<button class="lq-btn" onclick="startLab(LAB.chN)">↺ התחל מחדש</button>' +
        '<button class="lq-btn lq-btn-next" id="lqNext" onclick="nextLabQ()" disabled>הבא →</button>' +
      '</div>' +
    '</div>';

  // attach click handlers
  document.querySelectorAll('.lq-opt').forEach(function(btn) {
    btn.addEventListener('click', onLabPick);
  });
}

/* ════════════════════════
   PICK ANSWER
════════════════════════ */
function onLabPick() {
  if (LAB.answered) return;
  LAB.answered = true;

  var chosen  = parseInt(this.dataset.i);
  var correct = parseInt(this.dataset.c);
  var ok = (chosen === correct);

  LAB.ans.push(ok ? 1 : 0);

  // disable all
  document.querySelectorAll('.lq-opt').forEach(function(b){ b.classList.add('done'); });

  if (ok) {
    this.classList.add('correct');
    this.querySelector('.lq-icon').textContent = '✓';
  } else {
    this.classList.add('wrong');
    this.querySelector('.lq-icon').textContent = '✗';
    document.querySelectorAll('.lq-opt')[correct].classList.add('reveal');
    document.querySelectorAll('.lq-opt')[correct].querySelector('.lq-icon').textContent = '✓';
  }

  // explanation
  var exp = document.getElementById('lqExp');
  if (exp) {
    exp.className = 'lq-exp ' + (ok ? 'ok' : 'bad');
    document.getElementById('lqExpLbl').textContent = ok ? '✓  נכון!' : '✗  לא בדיוק...';
    document.getElementById('lqExpTxt').textContent = LAB.questions[LAB.cur].e;
    exp.style.display = 'block';
  }

  // enable next
  var nxt = document.getElementById('lqNext');
  if (nxt) nxt.disabled = false;

  // update score
  var okCount = LAB.ans.filter(function(x){ return x===1; }).length;
  var sc = document.getElementById('lqScore');
  if (sc) sc.textContent = okCount + ' / ' + (LAB.cur + 1);
}

/* ════════════════════════
   NEXT QUESTION
════════════════════════ */
function nextLabQ() {
  LAB.cur++;
  if (LAB.cur >= LAB.questions.length) {
    showLabResult();
  } else {
    renderLabQ();
  }
}

/* ════════════════════════
   RESULT
════════════════════════ */
function showLabResult() {
  var ok  = LAB.ans.filter(function(x){ return x===1; }).length;
  var tot = LAB.questions.length;
  var pct = Math.round(ok / tot * 100);
  var ch  = CHAPTERS.find(function(c){ return c.n === LAB.chN; });

  // save
  labSave(LAB.chN, ok, tot);

  // update sidebar
  var pf = document.getElementById('lcipf'+LAB.chN);
  if (pf) pf.style.width = pct + '%';
  var sc = document.getElementById('lcscore'+LAB.chN);
  if (sc) { sc.textContent = pct + '%'; if(pct===100) sc.classList.add('done'); }

  // update welcome grid
  var lwpf = document.getElementById('lwpf'+LAB.chN);
  if (lwpf) lwpf.style.width = pct + '%';

  updateOverallProg();

  var grade = pct>=90?'A+':pct>=80?'A':pct>=70?'B':pct>=60?'C':'D';
  var arcOffset = 330 * (1 - pct/100);
  var arcColor  = pct>=80 ? '#16724a' : pct>=60 ? '#b87c0e' : '#c7440e';

  var titles = ['עוד צריך לתרגל 📖','בדרך הנכונה 💪','כל הכבוד! 🎯','מצוין! 🏆'];
  var tier   = pct>=90?3:pct>=70?2:pct>=50?1:0;

  var lm = document.getElementById('labMain');
  lm.innerHTML =
    '<div class="lq-result">' +
      '<div class="lqr-ring">' +
        '<svg viewBox="0 0 110 110">' +
          '<circle class="lqr-bg" cx="55" cy="55" r="52"/>' +
          '<circle class="lqr-arc" id="lqrArc" cx="55" cy="55" r="52" stroke="'+arcColor+'"/>' +
        '</svg>' +
        '<div class="lqr-inner">' +
          '<div class="lqr-pct">' + pct + '%</div>' +
          '<div class="lqr-grade">' + grade + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="lqr-title">' + titles[tier] + '</div>' +
      '<div class="lqr-sub">' + ch.name + ' · ' + ok + '/' + tot + ' נכון</div>' +
      '<div class="lqr-stats">' +
        '<div class="lqrs"><div class="lqrs-v" style="color:var(--gr)">' + ok + '</div><div class="lqrs-l">נכון</div></div>' +
        '<div class="lqrs"><div class="lqrs-v" style="color:var(--ac2)">' + (tot-ok) + '</div><div class="lqrs-l">שגוי</div></div>' +
        '<div class="lqrs"><div class="lqrs-v">' + pct + '%</div><div class="lqrs-l">ציון</div></div>' +
      '</div>' +
      '<div class="lqr-btns">' +
        '<button class="lqr-btn-replay" onclick="startLab(LAB.chN)">שחק שוב 🔁</button>' +
        (LAB.chN < 12
          ? '<button class="lqr-btn-back" onclick="startLab('+(LAB.chN+1)+')">פרק '+(LAB.chN+1)+' →</button>'
          : '<button class="lqr-btn-back" onclick="go(\'lab-screen\')">כל הפרקים</button>') +
      '</div>' +
    '</div>';

  // animate ring
  setTimeout(function() {
    var arc = document.getElementById('lqrArc');
    if (arc) arc.style.strokeDashoffset = arcOffset;
  }, 100);
}

function buildCh12(){
  return (
    '<div class="learn-section">' +
    '<span class="section-label">01 — הבעיה</span>' +
    '<h2 class="section-h">ריבוי לקוחות — למה זו בעיה?</h2>' +
    '<p class="prose">בפרק 2 כתבנו שרת שמטפל בלקוח אחד. כדי לטפל בלקוח נוסף — נאלצנו <strong>לסגור את החיבור עם הראשון</strong>. עם Facebook שעובד כך — לא ניתן לשני משתמשים להתחבר בו-זמנית!</p>' +
    '<div class="concept-grid">' +
    '<div class="concept"><div class="concept-icon">❌</div><div class="concept-title" style="color:var(--rd)">הבעיה</div>' +
    '<div class="concept-body">accept() ו-recv() הן blocking — מקפיאות. בזמן שמחכים ל-recv מלקוח A, לקוח B לא יכול להתחבר.</div></div>' +
    '<div class="concept"><div class="concept-icon">✅</div><div class="concept-title" style="color:var(--gr)">הפתרון — select()</div>' +
    '<div class="concept-body">select() בודקת מי מוכן ללא blocking. מחזירה rlist (מוכן לקריאה), wlist (מוכן לשליחה), xlist (שגיאות).</div></div>' +
    '</div></div>' +

    '<div class="learn-section">' +
    '<span class="section-label">02 — select()</span>' +
    '<h2 class="section-h">שימוש ב-select()</h2>' +
    '<p class="prose">select() מקבלת 3 רשימות: Sockets לקריאה, Sockets לשליחה, Sockets לשגיאות. מחזירה רק את ה-Sockets <strong>שמוכנים עכשיו</strong>.</p>' +
    '<div class="code-block"><div class="code-bar"><div class="cd cd-r"></div><div class="cd cd-y"></div><div class="cd cd-g"></div><span class="code-label">server_select.py</span></div>' +
    '<div class="code-body">' +
    '<span class="to">import</span> socket, select<br><br>' +
    'server = socket.<span class="tp">socket</span>()<br>' +
    'server.<span class="tp">bind</span>((<span class="ts">\'0.0.0.0\'</span>, <span class="tn">9000</span>))<br>' +
    'server.<span class="tp">listen</span>(<span class="tn">5</span>)<br>' +
    'open_client_sockets = []<br>' +
    'messages_to_send = []<br><br>' +
    '<span class="to">while True</span>:<br>' +
    '&nbsp;&nbsp;rlist, wlist, xlist = select.<span class="tp">select</span>(<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;[server] + open_client_sockets,<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;open_client_sockets, []<br>' +
    '&nbsp;&nbsp;)<br>' +
    '&nbsp;&nbsp;<span class="to">for</span> current_socket <span class="to">in</span> rlist:<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;<span class="to">if</span> current_socket <span class="to">is</span> server:<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="tc"># לקוח חדש</span><br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(new_socket, address) = server.<span class="tp">accept</span>()<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;open_client_sockets.<span class="tp">append</span>(new_socket)<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;<span class="to">else</span>:<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="tc"># מידע מלקוח קיים</span><br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;data = current_socket.<span class="tp">recv</span>(<span class="tn">1024</span>)<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="to">if</span> data == <span class="ts">\'\'</span>:<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;open_client_sockets.<span class="tp">remove</span>(current_socket)<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;current_socket.<span class="tp">close</span>()' +
    '</div></div></div>' +

    '<div class="learn-section">' +
    '<span class="section-label">03 — messages_to_send</span>' +
    '<h2 class="section-h">שליחה מדורגת</h2>' +
    '<p class="prose">לא ניתן לשלוח לכל לקוח מיד — Socket אולי לא מוכן. פתרון: שמור הודעות ב-<strong>messages_to_send</strong> (רשימה של (socket, data)), ושלח רק דרך wlist.</p>' +
    '<div class="code-block"><div class="code-bar"><div class="cd cd-r"></div><div class="cd cd-y"></div><div class="cd cd-g"></div><span class="code-label">send_waiting_messages</span></div>' +
    '<div class="code-body">' +
    '<span class="to">def</span> <span class="tp">send_waiting_messages</span>(wlist):<br>' +
    '&nbsp;&nbsp;<span class="to">for</span> message <span class="to">in</span> messages_to_send[:]:<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;(client_socket, data) = message<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;<span class="to">if</span> client_socket <span class="to">in</span> wlist:<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;client_socket.<span class="tp">send</span>(data)<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;messages_to_send.<span class="tp">remove</span>(message)' +
    '</div></div></div>'
  );
}

function pingOutput(host, ip, count, times) {
  var lines = ['<span class="out-dim">PING '+host+' ('+ip+'): 56 data bytes</span>'];
  for (var i=0; i<count; i++)
    lines.push('<span class="out-ok">64 bytes from '+ip+': icmp_seq='+i+' ttl=55 time='+times[i]+' ms</span>');
  lines.push('<span class="out-dim">--- '+host+' ping statistics ---</span>');
  lines.push('<span class="out-ok">'+count+' packets transmitted, '+count+' received, 0% packet loss</span>');
  return lines;
}

  var ips = ['192.168.1.1','212.179.0.1','62.219.0.1','80.77.64.1','104.26.0.1','142.250.74.46'];
  var times = [1,8,12,35,95,180];
  var lines = ['<span class="out-dim">traceroute to '+host+', 30 hops max</span>'];

}

function loadCh(n) {
  S.curCh = n;
  var ch = CHAPTERS.find(function(c){ return c.n===n; });
  if (!ch) return;

  // sidebar active
  document.querySelectorAll('.sb-ch').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.sb-secs').forEach(function(s){ s.classList.remove('open'); });
  var sb = document.getElementById('sbch'+n);
  if (sb) sb.classList.add('active');
  var ss = document.getElementById('sbsecs'+n);
  if (ss) ss.classList.add('open');

  // content
  var prev = n>1  ? '<button class="ch-nav-btn" onclick="loadCh('+(n-1)+')">← פרק '+(n-1)+'</button>' : '<span></span>';
  var next = n<12 ? '<button class="ch-nav-btn ch-nav-next" onclick="loadCh('+(n+1)+')">פרק '+(n+1)+' →</button>' : '<span></span>';

  var lc = (document.getElementById('lContent')||{});
  lc.innerHTML =
    '<div class="ch-eyebrow">פרק ' + String(n).padStart(2,'0') + ' מתוך 12</div>' +
    '<h1 class="ch-title">' + ch.icon + ' ' + ch.name + '</h1>' +
    '<p class="ch-desc">' + ch.desc + '</p>' +
    '<div class="divider"></div>' +
    ch.content() +
    '<div class="ch-nav">' + prev +
      '<span style="flex:1;text-align:center;font-family:var(--mono);font-size:11px;color:var(--dim2)">' + n + ' / 12</span>' +
      next +
    '</div>';

  window.scrollTo({top:0, behavior:'instant'});

  // scroll highlight
  window.onscroll = function() { highlightSections(n); updateReadBar(); };
  updateReadBar();
}

function updateReadBar() {
  var total = document.documentElement.scrollHeight - window.innerHeight;
  var pct = total > 0 ? Math.min(100, window.scrollY / total * 100) : 0;
  document.getElementById('readBar').style.width = pct + '%';
}

function highlightSections(chN) {

  secs.forEach(function(s, i) {

  var ab = document.getElementById('sbsec_'+chN+'_'+active);
  if (ab) ab.classList.add('active');

function runCmd(raw) {
  raw = raw.trim();
  if (!raw) return;

  S.hist.unshift(raw); S.histIdx = -1;

  tPrint('<span class="out-ps1">student@lab:~$</span> <span class="out-cmd">' + esc(raw) + '</span>');

  var lines = [];

  if (BUILT_IN[raw]) {
    lines = BUILT_IN[raw]();
  } else if (S.curMission && S.curMission.commands && S.curMission.commands[raw]) {
    lines = S.curMission.commands[raw]();
    if (raw === S.curMission.successCmd) completeMission(S.curMission);
  } else {
    lines = globalCmds(raw);
  }

  lines.forEach(function(l){ tPrint(l); });
  tPrint('');
}

function globalCmds(cmd) {
  for (var i = 0; i < MISSIONS.length; i++) {
    var m = MISSIONS[i];
    if (m.commands && m.commands[cmd]) {
      return m.commands[cmd]();
    }
  }
  var base = cmd.split(' ')[0];
  var known = ['ping','traceroute','tracert','nslookup','ip','ifconfig','netstat',
               'arp','iwconfig','tcpdump','curl','nc','arping','bridge','ss',
               'route','dhclient','sudo','python3','cat'];
  if (known.indexOf(base) >= 0) {
    return ['<span class="out-err">'+esc(cmd)+': ארגומנטים שגויים. נסה: help</span>'];
  }
  return ['<span class="out-err">command not found: '+esc(base)+'</span>'];
}

function completeMission(m) {
  if (S.done.indexOf(m.id) >= 0) return;
  S.done.push(m.id);
  localStorage.setItem('nwpro_done', JSON.stringify(S.done));
  S.xp += m.xp;
  localStorage.setItem('nwpro_xp', S.xp);
  (document.getElementById('xpTotal')||{}).textContent = S.xp;

  var el = document.createElement('div');
  el.className = 'out-success';
  el.innerHTML = '🎯 משימה הושלמה! <strong>+'+m.xp+' XP</strong>';
  document.getElementById('termOut').appendChild(el);
  document.getElementById('termOut').scrollTop = 99999;

  var mi = document.getElementById('mi_'+m.id);
  if (mi) {
    mi.classList.add('done');
    if (!mi.querySelector('.m-check')) {
      var ck = document.createElement('div'); ck.className='m-check'; ck.textContent='✓';
      mi.appendChild(ck);
    }
  }

  showXpPop(m.xp);
  updateProgress();
}

function showXpPop(xp) {
  var d = document.createElement('div');
  d.className = 'xp-pop';
  d.textContent = '+' + xp + ' XP ⚡';
  d.style.left = (window.innerWidth/2 - 40) + 'px';
  d.style.top  = (window.innerHeight/2) + 'px';
  document.body.appendChild(d);
  setTimeout(function(){ d.remove(); }, 1300);
}

function onKey(e) {
  var inp = document.getElementById('termIn');
  if (e.key === 'Enter') {
    var v = inp.value; inp.value = ''; runCmd(v);
  } else if (e.key === 'ArrowUp') {
    S.histIdx = Math.min(S.histIdx+1, S.hist.length-1);
    inp.value = S.hist[S.histIdx] || ''; e.preventDefault();
  } else if (e.key === 'ArrowDown') {
    S.histIdx = Math.max(S.histIdx-1, -1);
    inp.value = S.histIdx >= 0 ? S.hist[S.histIdx] : ''; e.preventDefault();
  } else if (e.key === 'Tab') {
    e.preventDefault();
    var v = inp.value;
    var all = Object.keys(BUILT_IN);
    MISSIONS.forEach(function(m){ if(m.commands) all = all.concat(Object.keys(m.commands)); });
    var match = all.find(function(c){ return c.startsWith(v) && c !== v; });
    if (match) inp.value = match;
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

    '<div class="learn-section">' +
    '<span class="section-label">02 — בניית חבילה</span>' +

    '<div class="code-body">' +
    '<span class="tc"># חבילה IP/ICMP</span><br>' +
    'my_packet = IP(dst=<span class="ts">"8.8.8.8"</span>) / ICMP()<br><br>' +
    '<span class="tc"># שליחה</span><br>' +
    'send(my_packet)<br>' +
    '<span class="tc"># Sent 1 packets.</span>' +
    '</div></div></div>' +

    '<span class="section-label">03 — sniff</span>' +

    '<div class="code-block"><div class="code-bar"><div class="cd cd-r"></div><div class="cd cd-y"></div><div class="cd cd-g"></div><span class="code-label">sniff דוגמה</span></div>' +

    'sniff(<br>' +

    '&nbsp;&nbsp;prn=<span class="to">lambda</span> p: p[DNS].qd.qname,<br>' +
    '&nbsp;&nbsp;store=<span class="tn">0</span><br>' +

    '<div class="learn-section">' +

    '</table></div>'
  );
}

function buildCh12(){
  return (
    '<div class="learn-section">' +
    '<span class="section-label">01 — הבעיה</span>' +
    '<h2 class="section-h">ריבוי לקוחות — למה זו בעיה?</h2>' +
    '<p class="prose">בפרק 2 כתבנו שרת שמטפל בלקוח אחד. כדי לטפל בלקוח נוסף — נאלצנו <strong>לסגור את החיבור עם הראשון</strong>. עם Facebook שעובד כך — לא ניתן לשני משתמשים להתחבר בו-זמנית!</p>' +
    '<div class="concept-grid">' +
    '<div class="concept"><div class="concept-icon">❌</div><div class="concept-title" style="color:var(--rd)">הבעיה</div>' +
    '<div class="concept-body">accept() ו-recv() הן blocking — מקפיאות. בזמן שמחכים ל-recv מלקוח A, לקוח B לא יכול להתחבר.</div></div>' +
    '<div class="concept"><div class="concept-icon">✅</div><div class="concept-title" style="color:var(--gr)">הפתרון — select()</div>' +
    '<div class="concept-body">select() בודקת מי מוכן ללא blocking. מחזירה rlist (מוכן לקריאה), wlist (מוכן לשליחה), xlist (שגיאות).</div></div>' +
    '</div></div>' +

    '<div class="learn-section">' +
    '<span class="section-label">02 — select()</span>' +
    '<h2 class="section-h">שימוש ב-select()</h2>' +
    '<p class="prose">select() מקבלת 3 רשימות: Sockets לקריאה, Sockets לשליחה, Sockets לשגיאות. מחזירה רק את ה-Sockets <strong>שמוכנים עכשיו</strong>.</p>' +
    '<div class="code-block"><div class="code-bar"><div class="cd cd-r"></div><div class="cd cd-y"></div><div class="cd cd-g"></div><span class="code-label">server_select.py</span></div>' +
    '<div class="code-body">' +
    '<span class="to">import</span> socket, select<br><br>' +
    'server = socket.<span class="tp">socket</span>()<br>' +
    'server.<span class="tp">bind</span>((<span class="ts">\'0.0.0.0\'</span>, <span class="tn">9000</span>))<br>' +
    'server.<span class="tp">listen</span>(<span class="tn">5</span>)<br>' +
    'open_client_sockets = []<br>' +
    'messages_to_send = []<br><br>' +
    '<span class="to">while True</span>:<br>' +
    '&nbsp;&nbsp;rlist, wlist, xlist = select.<span class="tp">select</span>(<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;[server] + open_client_sockets,<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;open_client_sockets, []<br>' +
    '&nbsp;&nbsp;)<br>' +
    '&nbsp;&nbsp;<span class="to">for</span> current_socket <span class="to">in</span> rlist:<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;<span class="to">if</span> current_socket <span class="to">is</span> server:<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="tc"># לקוח חדש</span><br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(new_socket, address) = server.<span class="tp">accept</span>()<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;open_client_sockets.<span class="tp">append</span>(new_socket)<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;<span class="to">else</span>:<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="tc"># מידע מלקוח קיים</span><br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;data = current_socket.<span class="tp">recv</span>(<span class="tn">1024</span>)<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="to">if</span> data == <span class="ts">\'\'</span>:<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;open_client_sockets.<span class="tp">remove</span>(current_socket)<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;current_socket.<span class="tp">close</span>()' +
    '</div></div></div>' +

    '<div class="learn-section">' +
    '<span class="section-label">03 — messages_to_send</span>' +
    '<h2 class="section-h">שליחה מדורגת</h2>' +
    '<p class="prose">לא ניתן לשלוח לכל לקוח מיד — Socket אולי לא מוכן. פתרון: שמור הודעות ב-<strong>messages_to_send</strong> (רשימה של (socket, data)), ושלח רק דרך wlist.</p>' +
    '<div class="code-block"><div class="code-bar"><div class="cd cd-r"></div><div class="cd cd-y"></div><div class="cd cd-g"></div><span class="code-label">send_waiting_messages</span></div>' +
    '<div class="code-body">' +
    '<span class="to">def</span> <span class="tp">send_waiting_messages</span>(wlist):<br>' +
    '&nbsp;&nbsp;<span class="to">for</span> message <span class="to">in</span> messages_to_send[:]:<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;(client_socket, data) = message<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;<span class="to">if</span> client_socket <span class="to">in</span> wlist:<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;client_socket.<span class="tp">send</span>(data)<br>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;messages_to_send.<span class="tp">remove</span>(message)' +
    '</div></div></div>'
  );
}

function pingOutput(host, ip, count, times) {
  var lines = ['<span class="out-dim">PING '+host+' ('+ip+'): 56 data bytes</span>'];
  for (var i=0; i<count; i++)
    lines.push('<span class="out-ok">64 bytes from '+ip+': icmp_seq='+i+' ttl=55 time='+times[i]+' ms</span>');
  lines.push('<span class="out-dim">--- '+host+' ping statistics ---</span>');
  lines.push('<span class="out-ok">'+count+' packets transmitted, '+count+' received, 0% packet loss</span>');
  return lines;
}

function tracertOutput(host) {
  var ips = ['192.168.1.1','212.179.0.1','62.219.0.1','80.77.64.1','104.26.0.1','142.250.74.46'];
  var times = [1,8,12,35,95,180];
  var lines = ['<span class="out-dim">traceroute to '+host+', 30 hops max</span>'];
  for (var i=0; i<ips.length; i++) {
    var t = times[i];
    lines.push('<span class="out-'+(t>100?'yw':'ok')+'">'+(i+1)+'  '+t+'ms  '+ips[i]+'</span>');
  }
  lines.push('<span class="out-dim">Trace complete.</span>');
  return lines;
}

function loadCh(n) {
  S.curCh = n;
  var ch = CHAPTERS.find(function(c){ return c.n===n; });
  if (!ch) return;

  // sidebar active
  document.querySelectorAll('.sb-ch').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.sb-secs').forEach(function(s){ s.classList.remove('open'); });
  var sb = document.getElementById('sbch'+n);
  if (sb) sb.classList.add('active');
  var ss = document.getElementById('sbsecs'+n);
  if (ss) ss.classList.add('open');

  // content
  var prev = n>1  ? '<button class="ch-nav-btn" onclick="loadCh('+(n-1)+')">← פרק '+(n-1)+'</button>' : '<span></span>';
  var next = n<12 ? '<button class="ch-nav-btn ch-nav-next" onclick="loadCh('+(n+1)+')">פרק '+(n+1)+' →</button>' : '<span></span>';

  var lc = (document.getElementById('lContent')||{});
  lc.innerHTML =
    '<div class="ch-eyebrow">פרק ' + String(n).padStart(2,'0') + ' מתוך 12</div>' +
    '<h1 class="ch-title">' + ch.icon + ' ' + ch.name + '</h1>' +
    '<p class="ch-desc">' + ch.desc + '</p>' +
    '<div class="divider"></div>' +
    ch.content() +
    '<div class="ch-nav">' + prev +
      '<span style="flex:1;text-align:center;font-family:var(--mono);font-size:11px;color:var(--dim2)">' + n + ' / 12</span>' +
      next +
    '</div>';

  window.scrollTo({top:0, behavior:'instant'});

  // scroll highlight
  window.onscroll = function() { highlightSections(n); updateReadBar(); };
  updateReadBar();
}

function updateReadBar() {
  var total = document.documentElement.scrollHeight - window.innerHeight;
  var pct = total > 0 ? Math.min(100, window.scrollY / total * 100) : 0;
  document.getElementById('readBar').style.width = pct + '%';
}

function highlightSections(chN) {
  var secs = document.querySelectorAll('.learn-section');
  var active = 0;
  secs.forEach(function(s, i) {
    if (s.getBoundingClientRect().top < 120) active = i;
  });
  document.querySelectorAll('.sb-sec').forEach(function(b){ b.classList.remove('active'); });
  var ab = document.getElementById('sbsec_'+chN+'_'+active);
  if (ab) ab.classList.add('active');
}

function tPrint(html) {

  d.innerHTML = html;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;

function clearTerm() {
  document.getElementById('termOut').innerHTML = '';
}

function runCmd(raw) {
  raw = raw.trim();
  if (!raw) return;

  S.hist.unshift(raw); S.histIdx = -1;

  tPrint('<span class="out-ps1">student@lab:~$</span> <span class="out-cmd">' + esc(raw) + '</span>');

  var lines = [];

  if (BUILT_IN[raw]) {
    lines = BUILT_IN[raw]();
  } else if (S.curMission && S.curMission.commands && S.curMission.commands[raw]) {
    lines = S.curMission.commands[raw]();
    if (raw === S.curMission.successCmd) completeMission(S.curMission);
  } else {
    lines = globalCmds(raw);
  }

  lines.forEach(function(l){ tPrint(l); });
  tPrint('');
}

function globalCmds(cmd) {
  for (var i = 0; i < MISSIONS.length; i++) {
    var m = MISSIONS[i];
    if (m.commands && m.commands[cmd]) {
      return m.commands[cmd]();
    }
  }
  var base = cmd.split(' ')[0];
  var known = ['ping','traceroute','tracert','nslookup','ip','ifconfig','netstat',
               'arp','iwconfig','tcpdump','curl','nc','arping','bridge','ss',
               'route','dhclient','sudo','python3','cat'];
  if (known.indexOf(base) >= 0) {
    return ['<span class="out-err">'+esc(cmd)+': ארגומנטים שגויים. נסה: help</span>'];
  }
  return ['<span class="out-err">command not found: '+esc(base)+'</span>'];
}

function completeMission(m) {
  if (S.done.indexOf(m.id) >= 0) return;
  S.done.push(m.id);
  localStorage.setItem('nwpro_done', JSON.stringify(S.done));
  S.xp += m.xp;
  localStorage.setItem('nwpro_xp', S.xp);
  (document.getElementById('xpTotal')||{}).textContent = S.xp;

  var el = document.createElement('div');
  el.className = 'out-success';
  el.innerHTML = '🎯 משימה הושלמה! <strong>+'+m.xp+' XP</strong>';
  document.getElementById('termOut').appendChild(el);
  document.getElementById('termOut').scrollTop = 99999;

  var mi = document.getElementById('mi_'+m.id);
  if (mi) {
    mi.classList.add('done');
    if (!mi.querySelector('.m-check')) {
      var ck = document.createElement('div'); ck.className='m-check'; ck.textContent='✓';
      mi.appendChild(ck);
    }
  }

  showXpPop(m.xp);
  updateProgress();
}

function showXpPop(xp) {
  var d = document.createElement('div');
  d.className = 'xp-pop';
  d.textContent = '+' + xp + ' XP ⚡';
  d.style.left = (window.innerWidth/2 - 40) + 'px';
  d.style.top  = (window.innerHeight/2) + 'px';
  document.body.appendChild(d);
  setTimeout(function(){ d.remove(); }, 1300);
}

function onKey(e) {
  var inp = document.getElementById('termIn');
  if (e.key === 'Enter') {
    var v = inp.value; inp.value = ''; runCmd(v);
  } else if (e.key === 'ArrowUp') {
    S.histIdx = Math.min(S.histIdx+1, S.hist.length-1);
    inp.value = S.hist[S.histIdx] || ''; e.preventDefault();
  } else if (e.key === 'ArrowDown') {
    S.histIdx = Math.max(S.histIdx-1, -1);
    inp.value = S.histIdx >= 0 ? S.hist[S.histIdx] : ''; e.preventDefault();
  } else if (e.key === 'Tab') {
    e.preventDefault();
    var v = inp.value;
    var all = Object.keys(BUILT_IN);
    MISSIONS.forEach(function(m){ if(m.commands) all = all.concat(Object.keys(m.commands)); });
    var match = all.find(function(c){ return c.startsWith(v) && c !== v; });
    if (match) inp.value = match;
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* INIT */
buildSidebar();


</script>
<script>
/* Force mission list build after all scripts have run and MISSIONS is final */
(function() {
  var list = document.getElementById('missionList');
  if (!list || list.children.length > 0) return;
  MISSIONS.forEach(function(m, idx) {
    var done = S.done.indexOf(m.id) >= 0;
    var item = document.createElement('div');
    item.className = 'm-item' + (done ? ' done' : '');
    item.id = 'mi_' + m.id;
    item.innerHTML =
      '<div class="m-num">' + (idx + 1) + '</div>' +
      '<div class="m-info"><div class="m-name">' + m.name + '</div>' +
      '<div class="m-ch">פרק ' + m.ch + '</div></div>' +
      (done ? '<div class="m-check">✓</div>' : '');
    item.onclick = function() { loadMission(m); };
    list.appendChild(item);
  });
  if (typeof updateProgress === 'function') updateProgress();
})();
</script>
</body>
