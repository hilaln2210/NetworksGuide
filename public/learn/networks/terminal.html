<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רשתות מחשבים Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════ RESET + TOKENS ══════════════ */
:root {
  --bg:    #fafaf8;
  --surf:  #ffffff;
  --warm:  #f5f3ee;
  --warm2: #ede9e2;
  --line:  #d8d3c8;
  --line2: #c4bdb0;
  --ink:   #1a1a18;
  --ink2:  #2e2e2a;
  --dim:   #5c5850;
  --dim2:  #8a8478;
  --ac:    #1a56db;
  --ac2:   #c2410c;
  --gr:    #15803d;
  --yw:    #a16207;
  --pu:    #6d28d9;
  --code-bg: #1a1e2e;
  --f-serif: 'Instrument Serif', serif;
  --f-mono:  'JetBrains Mono', monospace;
  --f-body:  'Heebo', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-body);
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════ SCREENS ══════════════ */
.screen { display: none; }
.screen.on { display: block; }

/* ══════════════ NAV ══════════════ */
nav {
  position: sticky; top: 0; z-index: 200;
  background: rgba(250,250,248,.95);
  backdrop-filter: blur(12px);
  border-bottom: 1.5px solid var(--line);
  height: 52px;
  display: flex; align-items: center;
  padding: 0 24px; gap: 0;
}
.nav-logo {
  font-family: var(--f-serif);
  font-size: 20px;
  color: var(--ink);
  letter-spacing: -0.3px;
  margin-left: auto;
  padding-left: 20px;
}
.nav-logo i { font-style: italic; color: var(--ac); }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab {
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.3px;
  padding: 6px 14px;
  border: 1.5px solid transparent;
  border-radius: 7px;
  background: none;
  color: var(--dim);
  cursor: pointer;
  transition: all .14s;
  white-space: nowrap;
}
.nav-tab:hover { color: var(--ink); border-color: var(--line); }
.nav-tab.on { color: var(--ac); border-color: var(--ac); background: rgba(26,86,219,.06); }
.nav-xp {
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--yw);
  background: rgba(161,98,7,.08);
  border: 1.5px solid rgba(161,98,7,.22);
  padding: 4px 12px;
  border-radius: 6px;
  margin-right: 12px;
}
.nav-lang {
  font-family: var(--f-mono);
  font-size: 10px;
  font-weight: 700;
  padding: 4px 10px;
  border: 1.5px solid var(--line);
  border-radius: 6px;
  background: none;
  color: var(--dim);
  cursor: pointer;
  transition: all .14s;
  margin-right: 8px;
}
.nav-lang:hover { color: var(--ink); border-color: var(--line2); }

/* ══════════════ LANDING ══════════════ */
#landing { min-height: 100vh; }
.land-hero {
  max-width: 980px; margin: 0 auto;
  padding: 72px 28px 56px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px; align-items: start;
}
@media(max-width:700px){ .land-hero{grid-template-columns:1fr; padding:40px 20px 32px; gap:32px;} }

.hero-tag {
  font-family: var(--f-mono);
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--ac);
  background: rgba(26,86,219,.07);
  border: 1.5px solid rgba(26,86,219,.2);
  display: inline-block;
  padding: 4px 12px; border-radius: 4px;
  margin-bottom: 18px;
}
.hero-h {
  font-family: var(--f-serif);
  font-size: clamp(42px,6vw,68px);
  font-weight: 400;
  line-height: 1.05;
  letter-spacing: -1.5px;
  color: var(--ink);
  margin-bottom: 16px;
}
.hero-h i { font-style: italic; color: var(--ac); }
.hero-p { font-size: 15px; color: var(--dim); line-height: 1.75; margin-bottom: 28px; }

.hero-stats { display: flex; gap: 24px; margin-bottom: 28px; }
.hs { border-right: 2px solid var(--line); padding-right: 16px; }
.hs:first-child { border-right: none; padding-right: 0; }
.hs-n { font-family: var(--f-serif); font-size: 28px; color: var(--ink); line-height: 1; }
.hs-l { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); letter-spacing: 1px; margin-top: 2px; }

.hero-btn {
  font-family: var(--f-body);
  font-size: 14px; font-weight: 700;
  padding: 11px 26px; border-radius: 8px;
  border: none; cursor: pointer;
  background: var(--ink); color: #fff;
  transition: opacity .14s;
  display: inline-block;
}
.hero-btn:hover { opacity: .85; }

/* Chapter grid on landing */
.land-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.land-card {
  background: var(--surf);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all .15s;
  position: relative;
  overflow: hidden;
}
.land-card::before {
  content: '';
  position: absolute; top: 0; right: 0; width: 3px; bottom: 0;
  background: var(--cc, var(--line));
  transition: width .15s;
}
.land-card:hover { border-color: var(--cc,var(--line)); transform: translateX(-2px); }
.land-card:hover::before { width: 5px; }
.lc-num { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); letter-spacing: 2px; margin-bottom: 4px; }
.lc-icon { font-size: 18px; margin-bottom: 6px; display: block; }
.lc-name { font-size: 12px; font-weight: 600; color: var(--ink); line-height: 1.3; }

/* ══════════════ LEARN ══════════════ */
#learn { min-height: 100vh; }
.learn-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  max-width: 1020px;
  margin: 0 auto;
  min-height: calc(100vh - 52px);
}
@media(max-width:680px) { .learn-layout { grid-template-columns: 1fr; } }

/* Sidebar */
.l-sb {
  background: var(--warm);
  border-left: 1.5px solid var(--line);
  padding: 20px 0;
  position: sticky; top: 52px;
  height: calc(100vh - 52px);
  overflow-y: auto;
}
.l-sb::-webkit-scrollbar { width: 3px; }
.l-sb::-webkit-scrollbar-thumb { background: var(--line); }
.sb-label {
  font-family: var(--f-mono); font-size: 9px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--dim2);
  padding: 0 14px; margin-bottom: 6px; display: block;
}
.sb-ch {
  width: 100%; text-align: right;
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; background: none; border: none;
  border-right: 3px solid transparent;
  font-family: var(--f-body); font-size: 12px; font-weight: 500;
  color: var(--dim); cursor: pointer; transition: all .12s;
}
.sb-ch:hover { color: var(--ink); background: rgba(0,0,0,.03); }
.sb-ch.on { color: var(--ac); border-color: var(--ac); background: rgba(26,86,219,.04); }
.sb-ch-n { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); min-width: 18px; }

.sb-secs { display: none; }
.sb-secs.open { display: block; }
.sb-sec {
  width: 100%; text-align: right;
  display: flex; align-items: center; gap: 6px;
  padding: 4px 14px 4px 20px;
  background: none; border: none;
  font-family: var(--f-body); font-size: 11px;
  color: var(--dim2); cursor: pointer; transition: all .11s;
}
.sb-sec:hover { color: var(--ink); }
.sb-sec.on { color: var(--ac); font-weight: 600; }
.sb-sec::before { content: '·'; color: var(--dim2); font-size: 14px; }

/* Reading bar */
#rbar {
  position: fixed; top: 52px; right: 220px; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--ac), var(--ac2));
  width: 0%; z-index: 100; transition: width .15s;
}

/* Content area */
.l-content { padding: 44px 52px 100px; max-width: 720px; }
@media(max-width:860px) { .l-content { padding: 28px 22px 80px; } }

/* Chapter header */
.ch-tag { font-family: var(--f-mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim2); margin-bottom: 8px; display: block; }
.ch-h { font-family: var(--f-serif); font-size: clamp(28px,4vw,44px); line-height: 1.1; letter-spacing: -1px; color: var(--ink); margin-bottom: 10px; }
.ch-desc { font-size: 14px; color: var(--dim); line-height: 1.7; margin-bottom: 4px; }
hr.divider { border: none; border-top: 1.5px solid var(--line); margin: 28px 0; }

/* Learn sections */
.learn-section { margin-bottom: 48px; scroll-margin-top: 76px; }
.sec-label { font-family: var(--f-mono); font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 700; color: var(--ac); display: block; margin-bottom: 7px; }
.sec-h { font-family: var(--f-serif); font-size: 22px; line-height: 1.25; color: var(--ink); margin-bottom: 12px; }
p { color: var(--ink2); line-height: 1.85; margin-bottom: 12px; }
p strong { color: var(--ink); font-weight: 700; }
code { font-family: var(--f-mono); font-size: 12px; background: var(--warm2); color: var(--ac); padding: 1px 5px; border-radius: 4px; }

/* Tables */
.tbl { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13.5px; }
.tbl th { background: var(--warm2); color: var(--ink); font-weight: 700; padding: 8px 13px; border: 1.5px solid var(--line); text-align: right; font-size: 12px; }
.tbl td { padding: 8px 13px; border: 1.5px solid var(--line); color: var(--ink2); vertical-align: top; line-height: 1.55; }
.tbl tr:nth-child(even) td { background: var(--warm); }
.tbl td:first-child { font-family: var(--f-mono); font-size: 12px; color: var(--ac); white-space: nowrap; font-weight: 600; }

/* Code blocks */
.code-block { background: var(--code-bg); border-radius: 10px; overflow: hidden; margin: 14px 0; direction: ltr; text-align: left; }
.code-bar { display: flex; align-items: center; gap: 5px; padding: 7px 13px; background: rgba(255,255,255,.04); border-bottom: 1px solid rgba(255,255,255,.07); }
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
.code-title { font-family: var(--f-mono); font-size: 10px; color: rgba(255,255,255,.35); margin-right: auto; }
pre.code-body { padding: 13px 15px; font-family: var(--f-mono); font-size: 13px; line-height: 1.9; color: #cdd6f4; white-space: pre-wrap; }
.kw { color: #89b4fa; } .st { color: #a6e3a1; } .nu { color: #fab387; }
.cm { color: #6c7086; font-style: italic; } .fn { color: #f5c2e7; }

/* Callouts */
.callout { border-radius: 9px; padding: 11px 15px; margin: 14px 0; border: 1.5px solid; font-size: 13.5px; line-height: 1.65; }
.callout.tip  { background: #f0fdf4; border-color: #bbf7d0; color: #14532d; }
.callout.note { background: #eff6ff; border-color: #bfdbfe; color: #1e3a5f; }
.callout.warn { background: #fffbeb; border-color: #fde68a; color: #78350f; }

/* Diagrams */
.diagram { background: var(--warm); border: 1.5px solid var(--line); border-radius: 10px; padding: 16px 18px; margin: 14px 0; direction: ltr; }
.dg-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.dg-box { padding: 8px 13px; border-radius: 8px; font-size: 12.5px; font-weight: 600; text-align: center; line-height: 1.35; white-space: nowrap; }
.dg-box.b  { background: #dbeafe; color: #1e40af; border: 1.5px solid #bfdbfe; }
.dg-box.g  { background: #dcfce7; color: #14532d; border: 1.5px solid #bbf7d0; }
.dg-box.gr { background: #f1f5f9; color: #334155; border: 1.5px solid #cbd5e1; }
.dg-box.p  { background: #ede9fe; color: #4c1d95; border: 1.5px solid #c4b5fd; }
.dg-arr { font-family: var(--f-mono); font-size: 12px; color: var(--dim); white-space: nowrap; }

/* Chapter nav */
.ch-nav { display: flex; gap: 10px; margin-top: 52px; padding-top: 22px; border-top: 1.5px solid var(--line); align-items: center; }
.ch-nav-btn { font-family: var(--f-mono); font-size: 11px; padding: 8px 16px; border-radius: 7px; border: 1.5px solid var(--line); background: var(--surf); color: var(--dim); cursor: pointer; transition: all .13s; }
.ch-nav-btn:hover { border-color: var(--ac); color: var(--ac); }
.ch-nav-btn.next { background: var(--ink); color: #fff; border-color: var(--ink); }
.ch-nav-btn.next:hover { opacity: .85; }

/* ══════════════ LAB ══════════════ */
#lab { min-height: 100vh; }
.lab-layout {
  display: grid;
  grid-template-columns: 210px 1fr;
  max-width: 1020px;
  margin: 0 auto;
  min-height: calc(100vh - 52px);
}
@media(max-width:680px) { .lab-layout { grid-template-columns: 1fr; } }

.lab-sb {
  background: var(--warm);
  border-left: 1.5px solid var(--line);
  padding: 0;
  position: sticky; top: 52px;
  height: calc(100vh - 52px);
  overflow-y: auto;
}
.lab-sb::-webkit-scrollbar { width: 3px; }
.lab-sb::-webkit-scrollbar-thumb { background: var(--line); }
.lab-sb-head { padding: 16px 14px 12px; border-bottom: 1.5px solid var(--line); }
.lab-sb-title { font-family: var(--f-serif); font-size: 15px; color: var(--ink); }
.lab-sb-sub { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); margin-top: 2px; }
.lab-sb-prog { height: 2.5px; background: var(--line); border-radius: 99px; overflow: hidden; margin-top: 8px; }
.lab-sb-prog-fill { height: 100%; background: var(--gr); border-radius: 99px; transition: width .5s; }

.lab-ch-btn {
  width: 100%; text-align: right;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; background: none; border: none;
  border-right: 3px solid transparent;
  cursor: pointer; transition: all .12s;
}
.lab-ch-btn:hover { background: rgba(0,0,0,.03); }
.lab-ch-btn.on { background: rgba(21,128,61,.05); border-color: var(--gr); }
.lcb-icon { font-size: 15px; flex-shrink: 0; }
.lcb-info { flex: 1; }
.lcb-name { font-size: 12px; font-weight: 600; color: var(--ink); }
.lcb-bar { height: 2px; background: var(--line); border-radius: 99px; overflow: hidden; margin-top: 3px; }
.lcb-bar-fill { height: 100%; background: var(--gr); border-radius: 99px; transition: width .4s; }
.lcb-score { font-family: var(--f-mono); font-size: 10px; font-weight: 600; color: var(--dim2); flex-shrink: 0; }
.lcb-score.done { color: var(--gr); }

/* Lab main */
.lab-main { padding: 32px 44px 100px; }
@media(max-width:860px){ .lab-main { padding: 20px 20px 80px; } }

/* Welcome */
.lab-welcome { text-align: center; padding: 56px 20px; }
.lw-icon { font-size: 44px; margin-bottom: 14px; }
.lw-h { font-family: var(--f-serif); font-size: 28px; color: var(--ink); margin-bottom: 8px; }
.lw-p { color: var(--dim); font-size: 14px; margin-bottom: 32px; }
.lw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 9px; max-width: 640px; margin: 0 auto; }
.lw-card { background: var(--surf); border: 1.5px solid var(--line); border-radius: 9px; padding: 13px 14px; cursor: pointer; transition: all .15s; text-align: right; position: relative; overflow: hidden; }
.lw-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2.5px; background: var(--cc, var(--line)); }
.lw-card:hover { border-color: var(--cc, var(--ac)); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.08); }
.lwc-n { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); letter-spacing: 2px; }
.lwc-icon { font-size: 18px; margin: 5px 0; display: block; }
.lwc-name { font-size: 11.5px; font-weight: 600; color: var(--ink); }
.lwc-bar { height: 2px; background: var(--line); border-radius: 99px; overflow: hidden; margin-top: 7px; }
.lwc-bar-fill { height: 100%; background: var(--gr); border-radius: 99px; }

/* Quiz area */
.lq-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1.5px solid var(--line); }
.lq-ch-icon { font-size: 22px; }
.lq-ch-name { font-family: var(--f-serif); font-size: 20px; color: var(--ink); }
.lq-ch-num { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); margin-top: 1px; }
.lq-spacer { flex: 1; }
.lq-scorebox { text-align: center; background: var(--warm2); border: 1.5px solid var(--line); border-radius: 9px; padding: 8px 16px; }
.lq-sv { font-family: var(--f-mono); font-size: 17px; font-weight: 700; color: var(--ink); }
.lq-sl { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); }

/* Pips */
.lq-pips { display: flex; gap: 3px; margin-bottom: 18px; flex-wrap: wrap; }
.lq-pip { width: 18px; height: 5px; border-radius: 99px; background: var(--line); transition: background .2s; }
.lq-pip.ok  { background: var(--gr); }
.lq-pip.bad { background: var(--ac2); }
.lq-pip.cur { background: var(--ac); }

/* Question card */
.lq-card { background: var(--surf); border: 1.5px solid var(--line); border-radius: 13px; padding: 22px; margin-bottom: 12px; animation: lqIn .22s ease; }
@keyframes lqIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.lq-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }
.lq-num  { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); }
.lq-cat  { font-family: var(--f-mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; background: rgba(26,86,219,.07); border: 1.5px solid rgba(26,86,219,.18); color: var(--ac); }
.lq-q { font-size: 15.5px; font-weight: 600; color: var(--ink); line-height: 1.55; }

/* Code snip in question */
.lq-snip { background: var(--code-bg); border-radius: 8px; overflow: hidden; margin-bottom: 12px; direction: ltr; text-align: left; }
.lqs-bar { display: flex; gap: 4px; padding: 6px 11px; background: rgba(255,255,255,.04); }
.lqs-body { padding: 10px 13px; font-family: var(--f-mono); font-size: 12.5px; line-height: 1.85; color: #cdd6f4; }

/* Options */
.lq-opts { display: flex; flex-direction: column; gap: 7px; margin-top: 14px; }
.lq-opt { display: flex; align-items: flex-start; gap: 11px; background: var(--warm); border: 1.5px solid var(--line); border-radius: 9px; padding: 11px 14px; cursor: pointer; transition: all .13s; text-align: right; width: 100%; }
.lq-opt:hover:not(.done) { border-color: var(--ac); background: rgba(26,86,219,.04); }
.lq-opt.done { cursor: default; }
.lq-opt.correct { background: #f0fdf4; border-color: var(--gr); }
.lq-opt.correct .lq-lbl { background: var(--gr); border-color: var(--gr); color: #fff; }
.lq-opt.wrong   { background: #fff1f1; border-color: var(--ac2); }
.lq-opt.reveal  { background: #f0fdf4; border-color: rgba(21,128,61,.35); }
.lq-opt.done:not(.correct):not(.wrong):not(.reveal) { opacity: .45; }
.lq-lbl { font-family: var(--f-mono); font-size: 10px; font-weight: 700; width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--warm2); border: 1.5px solid var(--line); color: var(--dim); margin-top: 1px; transition: all .13s; }
.lq-txt { flex: 1; font-size: 13.5px; color: var(--ink2); line-height: 1.5; font-weight: 400; }
.lq-ic  { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }

/* Explanation */
.lq-exp { border-radius: 9px; padding: 11px 14px; margin-top: 9px; border: 1.5px solid; display: none; animation: expIn .2s ease; }
@keyframes expIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
.lq-exp.ok  { background: #f0fdf4; border-color: #bbf7d0; }
.lq-exp.bad { background: #fff1f1; border-color: #fecaca; }
.lq-exp-lbl { font-family: var(--f-mono); font-size: 10px; letter-spacing: 2px; font-weight: 700; margin-bottom: 5px; }
.lq-exp.ok  .lq-exp-lbl { color: var(--gr); }
.lq-exp.bad .lq-exp-lbl { color: var(--ac2); }
.lq-exp-txt { font-size: 13px; color: var(--ink2); line-height: 1.75; }

/* Lab footer */
.lq-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding-top: 4px; }

<section class="learn-section">
<span class="sec-label">01 — מה Scapy?</span>
<h2 class="sec-h">Scapy — כלי רשת ב-Python</h2>
<p>Scapy היא ספריית Python חיצונית שמאפשרת: <strong>בניית חבילות</strong> לכל שכבה, <strong>הסנפה</strong>, <strong>שליחה וקבלה</strong>. Sockets = שכבת אפליקציה בלבד. Scapy = כל שכבה.</p>
<div class="callout note">📝 Scapy רצה <em>מעל</em> Python — כל הפונקציות של Python עובדות גם בתוכה (<code>print</code>, <code>dir</code>, לולאות וכו').</div>
</section>

<section class="learn-section">
<span class="sec-label">02 — בניית חבילה</span>
<h2 class="sec-h">בניית חבילות — אופרטור /</h2>
<p>חבילה בנויה שכבה על שכבה עם האופרטור <code>/</code>:</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">Scapy</span></div>
<pre class="code-body"><span class="kw">from</span> scapy.all <span class="kw">import</span> *

<span class="cm"># חבילה IP בלבד</span>
pkt = IP(dst=<span class="st">"8.8.8.8"</span>)

<span class="cm"># IP + ICMP (ping)</span>
pkt = IP(dst=<span class="st">"8.8.8.8"</span>) / ICMP()

<span class="cm"># IP + TCP</span>
pkt = IP(dst=<span class="st">"1.2.3.4"</span>) / TCP(dport=<span class="nu">80</span>)

<span class="cm"># IP + UDP + DNS Query</span>
pkt = IP(dst=<span class="st">"8.8.8.8"</span>) / UDP(dport=<span class="nu">53</span>) / DNS(rd=<span class="nu">1</span>, qd=DNSQR(qname=<span class="st">"google.com"</span>))

pkt.show()  <span class="cm"># הצגת כל השדות</span></pre></div>
</section>

<section class="learn-section">
<span class="sec-label">03 — sniff()</span>
<h2 class="sec-h">הסנפה עם sniff()</h2>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">sniff parameters</span></div>
<pre class="code-body"><span class="cm"># lfilter = פונקציית סינון (True = לכד, False = דלג)</span>
<span class="cm"># prn = callback לכל חבילה שנלכדה</span>
<span class="cm"># count = כמה לכוד (0 = אינסוף)</span>
<span class="cm"># store = 0 → לא שמור בזיכרון</span>

sniff(
    lfilter=<span class="kw">lambda</span> p: DNS <span class="kw">in</span> p,
    prn=<span class="kw">lambda</span> p: p[DNS].qd.qname,
    store=<span class="nu">0</span>
)

<span class="cm"># שרשרת הקריאות:</span>
<span class="cm"># חבילה נלכדת → lfilter בודק → אם True → prn מופעל</span></pre></div>
</section>

<section class="learn-section">
<span class="sec-label">04 — send/sr/sr1</span>
<h2 class="sec-h">שליחה — Layer 3</h2>
<table class="tbl"><tr><th>פונקציה</th><th>Layer</th><th>מה עושה</th></tr>
<tr><td><code>send(pkt)</code></td><td>L3</td><td>שולח, לא מחכה לתגובה</td></tr>
<tr><td><code>sr(pkt)</code></td><td>L3</td><td>שולח ומחכה לתגובות מרובות. מחזיר (answered, unanswered)</td></tr>
<tr><td><code>sr1(pkt)</code></td><td>L3</td><td>שולח ומחכה לתגובה <strong>אחת בלבד</strong></td></tr>
</table>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">sr1 example — ping</span></div>
<pre class="code-body">resp = sr1(IP(dst=<span class="st">"8.8.8.8"</span>) / ICMP())
<span class="kw">print</span>(resp[IP].src)   <span class="cm"># 8.8.8.8</span></pre></div>
</section>

<pre class="code-body"><span class="cm"># שליחה עם Ethernet header מלא</span>

sendp(pkt)

<span class="cm">#         sendp() = Layer 2 (אתה שולט על Ethernet)</span></pre></div>
</section>`; }

<section class="learn-section">

<h2 class="sec-h">פורטים — מזהה התוכנה</h2>
<p>שכבת התעבורה מעבירה מידע מ<strong>תכנית לתכנית</strong> (לא רק ממחשב למחשב). הפורט מזהה את התוכנה הספציפית.</p>
<p>אנלוגיה מהפרק: IP = כתובת בניין, Port = מספר דירה. תעבורה ל-IP:80 מגיעה לדירה 80 (שרת HTTP).</p>
<table class="tbl"><tr><th>Port</th><th>פרוטוקול</th><th>הערה</th></tr>

<tr><td>1024–65535</td><td>Dynamic Ports</td><td>כל אחד יכול להשתמש</td></tr>
</table>

<section class="learn-section">

<section class="learn-section">

<table class="tbl"><tr><th>כיוון</th><th>מה קורה</th></tr>

</section>

<p>כתובות פרטיות (192.168.x.x / 10.x.x.x) לא ניתן לראות מהאינטרנט. NAT בנתב מתרגם:</p>
<table class="tbl"><tr><th>כיוון</th><th>מה קורה</th></tr>
<tr><td>יציאה (LAN → WAN)</td><td>src IP: 192.168.x.x → IP ציבורי של הנתב</td></tr>
<tr><td>כניסה (WAN → LAN)</td><td>dst IP: IP ציבורי → 192.168.x.x המקורי</td></tr>
</table>

</section>

<section class="learn-section">
<span class="sec-label">05 — Routing + TTL</span>
<h2 class="sec-h">Routing Table ו-TTL</h2>
<p>לכל נתב יש <strong>Routing Table</strong> — טבלה שמחליטה לאן לשלוח כל חבילה. כל חבילה שלא מתאימה לחוק ספציפי → <strong>Default Gateway</strong>.</p>
<p><strong>TTL (Time To Live)</strong>: שדה ב-IP Header. כל נתב מוריד ב-1. כשמגיע ל-0 → חבילה נזרקת + ICMP Time Exceeded. זה הבסיס ל-traceroute!</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">איך traceroute עובד</span></div>
<pre class="code-body">שלח IP(TTL=1) → R1 מוריד ל-0 → זורק + שולח ICMP Time Exceeded

שלח IP(TTL=3) → R1→R2→ R3 מוריד ל-0 → זורק + ICMP
...עד שמגיעים ליעד</pre></div>
</section>

</section>

<p>שלושה תווכים עיקריים: <strong>כבלי מתכת</strong> (נחושת), <strong>אוויר</strong> (WiFi, מיקרוגל), <strong>סיבים אופטיים</strong> (זכוכית/פלסטיק).</p>
</section>

<section class="learn-section">
<span class="sec-label">02 — AM vs FM</span>
<h2 class="sec-h">AM ו-FM — שיטות אפנון</h2>
<p><strong>Modulation (אפנון)</strong> = הרכבת גל מידע על גבי גל "נושא". שתי שיטות עיקריות:</p>
<table class="tbl"><tr><th>שיטה</th><th>מה משתנה</th><th>עמידות לרעשים</th></tr>
<tr><td><strong>AM</strong> (Amplitude Modulation)</td><td>גובה הגל (אמפליטודה)</td><td>חלשה — רעש = שינוי אמפליטודה</td></tr>
<tr><td><strong>FM</strong> (Frequency Modulation)</td><td>תדר הגל</td><td>חזקה — רעש משנה אמפליטודה, לא תדר</td></tr>
</table>
<div class="callout tip">💡 <strong>למה FM נשמע טוב יותר מ-AM?</strong> כי מידע ב-FM מוצפן בתדר. רעש חשמלי = שינוי אמפליטודה — לא פוגע בתדר → FM עמיד!</div>
</section>

<section class="learn-section">
<span class="sec-label">03 — ADSL</span>

<p>ביצועי ADSL תלויים ב<strong>מרחק ממרכזייה</strong> — ככל שרחוק יותר, איכות הסיגנל יורדת.</p>
</section>

<section class="learn-section">
<span class="sec-label">04 — CAT5 & Ethernet</span>

<table class="tbl"><tr><th>כבל</th><th>מהירות מקסימלית</th><th>שימוש</th></tr>
<tr><td>CAT3</td><td>10 Mbps</td><td>ישן, טלפוניה</td></tr>
<tr><td>CAT5</td><td>100 Mbps</td><td>Fast Ethernet</td></tr>
<tr><td>CAT5e</td><td>1 Gbps</td><td>Gigabit Ethernet</td></tr>

</table>
<p>כבל CAT5 מכיל <strong>8 חוטים (4 זוגות)</strong>. ב-10Base-T: 2 זוגות בשימוש (TX + RX).</p>
</section>

    c:0,e:"בפרק: 'אפשרו למנהלים למנות באופן דינאמי מנהלים נוספים. שימו לב: מי שאינו מנהל לא יכול למנות.' ו: 'דאגו לכך שמשתמשים לא יוכלו להשתמש בשם שמתחיל ב-@, כדי לא לגרום לאחרים לחשוב שהם מנהלים.' @ = prefix ייחודי למנהלים."

    c:0,e:"בפרק: 'לפני select: נאלצנו לסגור את החיבור עם הלקוח הראשון על מנת לטפל בבקשה מלקוח נוסף.' select() = non-blocking multiplexing: select() מחכה לאירוע כלשהו, ואז מטפלים רק במי שמוכן. מאפשר Facebook-style שרת — אלפי לקוחות בו-זמנית."

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
var CUR_CH = null;
var LAB = { ch: null, questions: [], cur: 0, ans: [], answered: false };
var XP = parseInt(localStorage.getItem('nw_xp') || '0');
(document.getElementById('xpTotal')||{}).textContent = XP;

/* ══════════════════════════════════════════
   NAV
══════════════════════════════════════════ */
function goTo(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('on'); });
  document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('on'); });
  document.getElementById(id).classList.add('on');
  document.querySelector('[data-screen="'+id+'"]').classList.add('on');
  window.scrollTo(0,0);
}

/* ══════════════════════════════════════════
   LANDING GRID
══════════════════════════════════════════ */
function buildLandGrid() {
  var g = document.getElementById('landGrid');
  g.innerHTML = '';
  CHAPTERS.forEach(function(ch) {
    var card = document.createElement('div');
    card.className = 'land-card';
    card.style.setProperty('--cc', ch.color);
    card.onclick = function() { goTo('learn'); loadCh(ch.n); };
    card.innerHTML =
      '<div class="lc-num">CH ' + String(ch.n).padStart(2,'0') + '</div>' +
      '<span class="lc-icon">' + ch.icon + '</span>' +
      '<div class="lc-name">' + (LANG === 'he' ? ch.he.name : ch.en.name) + '</div>';
    g.appendChild(card);
  });
}

/* ══════════════════════════════════════════
   LEARN SIDEBAR
══════════════════════════════════════════ */
function buildSidebar() {
  var sb = document.getElementById('lSb');
  sb.innerHTML = '<span class="sb-label">' + (LANG==='he'?'תוכן עניינים':'Contents') + '</span>';
  CHAPTERS.forEach(function(ch) {
    var data = LANG === 'he' ? ch.he : ch.en;
    var wrap = document.createElement('div');

    var btn = document.createElement('button');
    btn.className = 'sb-ch' + (CUR_CH === ch.n ? ' on' : '');
    btn.id = 'sbch' + ch.n;
    btn.innerHTML = '<span class="sb-ch-n">' + String(ch.n).padStart(2,'0') + '</span>' + ch.icon + ' ' + data.name;
    btn.onclick = function() { loadCh(ch.n); };

    var secs = document.createElement('div');
    secs.className = 'sb-secs' + (CUR_CH === ch.n ? ' open' : '');
    secs.id = 'sbsecs' + ch.n;

    data.sections.forEach(function(sec, i) {
      var s = document.createElement('button');
      s.className = 'sb-sec';
      s.id = 'sbsec_' + ch.n + '_' + i;
      s.textContent = sec;
      s.onclick = function(e) {
        e.stopPropagation();
        scrollToSec(ch.n, i);
      };
      secs.appendChild(s);
    });

    wrap.appendChild(btn);
    wrap.appendChild(secs);
    sb.appendChild(wrap);
  });
}

/* ══════════════════════════════════════════
   LOAD CHAPTER
══════════════════════════════════════════ */
function loadCh(n) {
  CUR_CH = n;
  var ch = CHAPTERS.find(function(c){ return c.n === n; });
  if (!ch) return;
  var data = LANG === 'he' ? ch.he : ch.en;

  // Update sidebar
  document.querySelectorAll('.sb-ch').forEach(function(b){ b.classList.remove('on'); });
  document.querySelectorAll('.sb-secs').forEach(function(s){ s.classList.remove('open'); });
  var sbBtn = document.getElementById('sbch' + n);
  if (sbBtn) sbBtn.classList.add('on');
  var sbSecs = document.getElementById('sbsecs' + n);
  if (sbSecs) sbSecs.classList.add('open');

  // Nav arrows
  var prevN = n > 1 ? '<button class="ch-nav-btn" onclick="loadCh(' + (n-1) + ')">' + (LANG==='he'?'← פרק '+(n-1):'← Ch '+(n-1)) + '</button>' : '<span></span>';
  var nextN = n < 12 ? '<button class="ch-nav-btn next" onclick="loadCh(' + (n+1) + ')">' + (LANG==='he'?'פרק '+(n+1)+' →':'Ch '+(n+1)+' →') + '</button>' : '<span></span>';

  (document.getElementById('lContent')||{}).innerHTML =
    '<span class="ch-tag">' + (LANG==='he'?'פרק':'CHAPTER') + ' ' + String(n).padStart(2,'0') + ' / 12</span>' +
    '<h1 class="ch-h">' + ch.icon + ' ' + data.name + '</h1>' +
    '<p class="ch-desc">' + data.desc + '</p>' +
    '<hr class="divider">' +
    data.content +
    '<div class="ch-nav">' + prevN +
      '<span style="flex:1;text-align:center;font-family:var(--f-mono);font-size:10px;color:var(--dim2)">' + n + ' / 12</span>' +
      nextN +
    '</div>';

  window.scrollTo({ top: 0, behavior: 'instant' });
  window.onscroll = function() { updateRbar(); highlightSecs(n); };
  updateRbar();
}

function updateRbar() {
  var tot = document.documentElement.scrollHeight - window.innerHeight;
  var pct = tot > 0 ? Math.min(100, window.scrollY / tot * 100) : 0;
  document.getElementById('rbar').style.width = pct + '%';
}

function highlightSecs(chN) {
  var secs = document.querySelectorAll('.learn-section');
  var active = 0;
  secs.forEach(function(s, i) { if (s.getBoundingClientRect().top < 110) active = i; });
  document.querySelectorAll('.sb-sec').forEach(function(b){ b.classList.remove('on'); });
  var ab = document.getElementById('sbsec_' + chN + '_' + active);
  if (ab) ab.classList.add('on');
}

function scrollToSec(chN, idx) {
  if (chN !== CUR_CH) {
    loadCh(chN);
    setTimeout(function() { doScroll(idx); }, 80);
  } else { doScroll(idx); }
}

function doScroll(idx) {
  var secs = document.querySelectorAll('.learn-section');
  if (secs[idx]) {
    var top = secs[idx].getBoundingClientRect().top + window.scrollY - 76;
    window.scrollTo({ top: top, behavior: 'smooth' });
  }
}

/* ══════════════════════════════════════════
   LAB SIDEBAR + WELCOME
══════════════════════════════════════════ */
function buildLabSidebar() {
  var list = document.getElementById('labChList');
  list.innerHTML = '';
  CHAPTERS.forEach(function(ch) {
    var data = LANG === 'he' ? ch.he : ch.en;
    var saved = labGetSaved(ch.n);
    var pct = saved ? Math.round(saved.ok / saved.total * 100) : 0;
    var qs = (LAB_DATA[ch.n] || []).length;

    var btn = document.createElement('button');
    btn.className = 'lab-ch-btn' + (LAB.ch === ch.n ? ' on' : '');
    btn.id = 'labchbtn' + ch.n;
    btn.onclick = function() { startLab(ch.n); };
    btn.innerHTML =
      '<span class="lcb-icon">' + ch.icon + '</span>' +
      '<div class="lcb-info">' +
        '<div class="lcb-name">' + data.name + '</div>' +
        '<div class="lcb-bar"><div class="lcb-bar-fill" id="lcbf'+ch.n+'" style="width:' + (saved?pct:0) + '%"></div></div>' +
      '</div>' +
      '<div class="lcb-score' + (saved&&pct===100?' done':'') + '" id="lcbs'+ch.n+'">' + (saved?pct+'%':qs+'q') + '</div>';
    list.appendChild(btn);
  });
  updateLabOverall();
}

function buildLabWelcome() {
  var g = document.getElementById('lwGrid');
  g.innerHTML = '';
  CHAPTERS.forEach(function(ch) {
    var data = LANG === 'he' ? ch.he : ch.en;
    var saved = labGetSaved(ch.n);
    var pct = saved ? Math.round(saved.ok / saved.total * 100) : 0;
    var card = document.createElement('div');
    card.className = 'lw-card';
    card.style.setProperty('--cc', ch.color);
    card.onclick = function() { startLab(ch.n); };
    card.innerHTML =
      '<div class="lwc-n">CH ' + String(ch.n).padStart(2,'0') + '</div>' +
      '<span class="lwc-icon">' + ch.icon + '</span>' +
      '<div class="lwc-name">' + data.name + '</div>' +
      '<div class="lwc-bar"><div class="lwc-bar-fill" id="lwbf'+ch.n+'" style="width:'+(saved?pct:0)+'%"></div></div>';
    g.appendChild(card);
  });
}

function updateLabOverall() {
  var tot = 0, done = 0;
  for (var n = 1; n <= 12; n++) {
    var qs = LAB_DATA[n]; if (!qs) continue;
    tot += qs.length;
    var s = labGetSaved(n); if (s) done += s.ok;
  }
  var el = document.getElementById('labOverallFill');
  if (el) el.style.width = (tot > 0 ? Math.round(done/tot*100) : 0) + '%';
}

function labGetSaved(n) {
  try { var r = localStorage.getItem('lab_ch'+n); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function labSave(n, ok, total) {
  try { localStorage.setItem('lab_ch'+n, JSON.stringify({ok:ok,total:total})); } catch(e) {}
}

/* ══════════════════════════════════════════
   START LAB
══════════════════════════════════════════ */
function startLab(n) {
  LAB.ch = n;
  var qs = LAB_DATA[n];
  if (!qs || !qs.length) return;
  LAB.questions = qs.slice().sort(function(){ return Math.random() - .5; });
  LAB.cur = 0; LAB.ans = []; LAB.answered = false;

  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('on'); });
  var btn = document.getElementById('labchbtn' + n);
  if (btn) btn.classList.add('on');

  var welcome = document.getElementById('labWelcome');
  var area = document.getElementById('lqArea');
  if (welcome) welcome.style.display = 'none';
  if (area) area.style.display = 'block';
  renderLabQ();
}

function renderLabQ() {
  var q = LAB.questions[LAB.cur];
  var tot = LAB.questions.length;
  var ch = CHAPTERS.find(function(c){ return c.n === LAB.ch; });
  var data = LANG === 'he' ? ch.he : ch.en;
  LAB.answered = false;

  // Pips
  var pips = '';
  for (var i = 0; i < tot; i++) {
    var cls = i < LAB.cur ? (LAB.ans[i] === 1 ? ' ok' : ' bad') : i === LAB.cur ? ' cur' : '';
    pips += '<div class="lq-pip' + cls + '"></div>';
  }

  // Shuffle options
  var idx = [0,1,2,3].sort(function(){ return Math.random() - .5; });
  var shuf = idx.map(function(j){ return q.a[j]; });
  var newC = idx.indexOf(q.c);
  var LBL = LANG === 'he' ? ['א','ב','ג','ד'] : ['A','B','C','D'];

  var optsHtml = '';
  for (var j = 0; j < 4; j++) {
    optsHtml += '<button class="lq-opt" data-i="'+j+'" data-c="'+newC+'">' +
      '<span class="lq-lbl">'+LBL[j]+'</span>' +
      '<span class="lq-txt">'+shuf[j]+'</span>' +
      '<span class="lq-ic"></span></button>';
  }

  var snipHtml = q.snip
    ? '<div class="lq-snip"><div class="lqs-bar"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div><div class="lqs-body">'+q.snip+'</div></div>'
    : '';

  var okCount = LAB.ans.filter(function(x){ return x===1; }).length;
  var numLabel = LANG === 'he' ? (LAB.cur+1)+' / '+tot : (LAB.cur+1)+' / '+tot;
  var scoreLabel = LANG === 'he' ? 'נכון' : 'correct';
  var restartLabel = LANG === 'he' ? '↺ התחל מחדש' : '↺ Restart';
  var nextLabel = LANG === 'he' ? '← הבא' : 'Next →';

  document.getElementById('lqArea').innerHTML =
    '<div class="lq-header">' +
      '<div class="lq-ch-icon">'+ch.icon+'</div>' +
      '<div><div class="lq-ch-name">'+data.name+'</div>' +
        '<div class="lq-ch-num">'+String(LAB.ch).padStart(2,'0')+' / 12</div></div>' +
      '<div class="lq-spacer"></div>' +
      '<div class="lq-scorebox"><div class="lq-sv" id="lqSv">'+okCount+' / '+LAB.cur+'</div><div class="lq-sl">'+scoreLabel+'</div></div>' +
    '</div>' +
    '<div class="lq-pips">'+pips+'</div>' +
    '<div class="lq-card" id="lqCard">' +
      '<div class="lq-meta">' +
        '<span class="lq-num">'+numLabel+'</span>' +
        '<span class="lq-cat">'+q.cat+'</span>' +
      '</div>' +
      snipHtml +
      '<div class="lq-q">'+q.q+'</div>' +
      '<div class="lq-opts" id="lqOpts">'+optsHtml+'</div>' +
      '<div class="lq-exp" id="lqExp"><div class="lq-exp-lbl" id="lqExpLbl"></div><div class="lq-exp-txt" id="lqExpTxt"></div></div>' +
    '</div>' +
    '<div class="lq-foot">' +
      '<button class="lq-btn" onclick="startLab(LAB.ch)">'+restartLabel+'</button>' +
      '<button class="lq-btn next" id="lqNext" onclick="nextLabQ()" disabled>'+nextLabel+'</button>' +
    '</div>';

  document.querySelectorAll('.lq-opt').forEach(function(btn) {
    btn.addEventListener('click', onLabPick);
  });
}

function onLabPick() {
  if (LAB.answered) return;
  LAB.answered = true;
  var chosen  = parseInt(this.dataset.i);
  var correct = parseInt(this.dataset.c);
  var ok = (chosen === correct);
  LAB.ans.push(ok ? 1 : 0);
  document.querySelectorAll('.lq-opt').forEach(function(b){ b.classList.add('done'); });
  if (ok) {
    this.classList.add('correct');
    this.querySelector('.lq-ic').textContent = '✓';
  } else {
    this.classList.add('wrong');
    this.querySelector('.lq-ic').textContent = '✗';
    document.querySelectorAll('.lq-opt')[correct].classList.add('reveal');
    document.querySelectorAll('.lq-opt')[correct].querySelector('.lq-ic').textContent = '✓';
  }
  var exp = document.getElementById('lqExp');
  exp.className = 'lq-exp ' + (ok ? 'ok' : 'bad');
  document.getElementById('lqExpLbl').textContent = ok ? (LANG==='he'?'✓  נכון!':'✓  Correct!') : (LANG==='he'?'✗  לא בדיוק...':'✗  Not quite...');
  document.getElementById('lqExpTxt').textContent = LAB.questions[LAB.cur].e;
  exp.style.display = 'block';
  document.getElementById('lqNext').disabled = false;
  var sv = document.getElementById('lqSv');
  if (sv) sv.textContent = LAB.ans.filter(function(x){return x===1;}).length + ' / ' + (LAB.cur+1);
}

function nextLabQ() {
  LAB.cur++;
  if (LAB.cur >= LAB.questions.length) showLabResult();
  else renderLabQ();
}

function showLabResult() {
  var ok  = LAB.ans.filter(function(x){ return x===1; }).length;
  var tot = LAB.questions.length;
  var pct = Math.round(ok / tot * 100);
  var ch  = CHAPTERS.find(function(c){ return c.n === LAB.ch; });
  var data = LANG === 'he' ? ch.he : ch.en;

  labSave(LAB.ch, ok, tot);

  var fill = document.getElementById('lcbf' + LAB.ch);
  if (fill) fill.style.width = pct + '%';
  var score = document.getElementById('lcbs' + LAB.ch);
  if (score) { score.textContent = pct + '%'; if (pct===100) score.classList.add('done'); }
  var lwfill = document.getElementById('lwbf' + LAB.ch);
  if (lwfill) lwfill.style.width = pct + '%';
  updateLabOverall();

  XP += ok * 5;
  localStorage.setItem('nw_xp', XP);
  (document.getElementById('xpTotal')||{}).textContent = XP;

  var grade = pct>=90?'S':pct>=80?'A':pct>=70?'B':pct>=60?'C':'D';
  var arcOff = 314 * (1 - pct/100);
  var arcCol = pct>=80 ? '#15803d' : pct>=60 ? '#a16207' : '#c2410c';

  var titles = LANG==='he'
    ? ['עוד לא שם... 📖','מתקדם! 💪','כל הכבוד! 🎯','מצוין! 🏆']
    : ['Keep practicing! 📖','Getting there! 💪','Well done! 🎯','Excellent! 🏆'];
  var tier = pct>=90?3:pct>=70?2:pct>=50?1:0;

  var againLabel  = LANG==='he' ? 'שחק שוב 🔁' : 'Play Again 🔁';
  var nextChLabel = LANG==='he' ? 'פרק '+(LAB.ch+1)+' →' : 'Ch '+(LAB.ch+1)+' →';
  var backLabel   = LANG==='he' ? '← חזרה' : '← Back';
  var correctLbl  = LANG==='he' ? 'נכון' : 'correct';
  var wrongLbl    = LANG==='he' ? 'שגוי' : 'wrong';
  var scoreLbl    = LANG==='he' ? 'ציון' : 'score';

  document.getElementById('lqArea').innerHTML =
    '<div class="lq-result">' +
      '<div class="lqr-ring">' +
        '<svg viewBox="0 0 110 110"><circle class="lqr-bg" cx="55" cy="55" r="50"/><circle class="lqr-arc" id="lqrArc" cx="55" cy="55" r="50" stroke="'+arcCol+'"/></svg>' +
        '<div class="lqr-inner"><div class="lqr-pct">'+pct+'%</div><div class="lqr-grade">'+grade+'</div></div>' +
      '</div>' +
      '<div class="lqr-title">'+titles[tier]+'</div>' +
      '<div class="lqr-sub">'+data.name+' · '+ok+'/'+tot+'</div>' +
      '<div class="lqr-stats">' +
        '<div class="lqrs"><div class="lqrs-v" style="color:var(--gr)">'+ok+'</div><div class="lqrs-l">'+correctLbl+'</div></div>' +
        '<div class="lqrs"><div class="lqrs-v" style="color:var(--ac2)">'+(tot-ok)+'</div><div class="lqrs-l">'+wrongLbl+'</div></div>' +
        '<div class="lqrs"><div class="lqrs-v">'+pct+'%</div><div class="lqrs-l">'+scoreLbl+'</div></div>' +
      '</div>' +
      '<div class="lqr-btns">' +
        '<button class="lqr-replay" onclick="startLab(LAB.ch)">'+againLabel+'</button>' +
        (LAB.ch < 12
          ? '<button class="lqr-back" onclick="startLab('+(LAB.ch+1)+')">'+nextChLabel+'</button>'
          : '<button class="lqr-back" onclick="goToLabWelcome()">'+backLabel+'</button>') +
      '</div>' +
    '</div>';

  setTimeout(function() {
    var arc = document.getElementById('lqrArc');
    if (arc) arc.style.strokeDashoffset = arcOff;
  }, 100);
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
buildLandGrid();
buildSidebar();
buildLabSidebar();
buildLabWelcome();

</script>
