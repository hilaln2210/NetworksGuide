  {
    cat: "\u05e9\u05db\u05d1\u05ea \u05d4\u05e7\u05d5",
    cat_en: "Data Link Layer",
    snip: null,
    q: "\u05de\u05d4 \u05d4\u05d4\u05d1\u05d3\u05dc \u05d1\u05d9\u05df \u05ea\u05e4\u05e7\u05d9\u05d3 \u05e9\u05db\u05d1\u05ea \u05d4\u05e7\u05d5 \u05dc\u05d1\u05d9\u05df \u05e9\u05db\u05d1\u05ea \u05d4\u05e8\u05e9\u05ea?",
    q_en: "What is a MAC address? How is it structured?",
    a: ["\u05e9\u05db\u05d1\u05ea \u05d4\u05e7\u05d5 = \u05ea\u05e7\u05e9\u05d5\u05e8\u05ea \u05d1\u05d9\u05df \u05d9\u05e9\u05d5\u05d9\u05d5\u05ea \u05de\u05d7\u05d5\u05d1\u05e8\u05d5\u05ea \u05d9\u05e9\u05d9\u05e8\u05d5\u05ea (hop \u05d0\u05d7\u05d3). \u05e9\u05db\u05d1\u05ea \u05d4\u05e8\u05e9\u05ea = \u05de\u05e1\u05dc\u05d5\u05dc \u05de\u05dc\u05d0 \u05de\u05e7\u05e6\u05d4 \u05dc\u05e7\u05e6\u05d4", "\u05e9\u05db\u05d1\u05ea \u05d4\u05e7\u05d5 = \u05de\u05d4\u05d9\u05e8\u05d4 \u05d9\u05d5\u05ea\u05e8. \u05e9\u05db\u05d1\u05ea \u05d4\u05e8\u05e9\u05ea = \u05d0\u05de\u05d9\u05e0\u05d4 \u05d9\u05d5\u05ea\u05e8", "\u05e9\u05db\u05d1\u05ea \u05d4\u05e7\u05d5 = TCP. \u05e9\u05db\u05d1\u05ea \u05d4\u05e8\u05e9\u05ea = UDP", "\u05d4\u05df \u05d6\u05d4\u05d5\u05ea, \u05e8\u05e7 \u05e9\u05de\u05d5\u05ea \u05e9\u05d5\u05e0\u05d9\u05dd"],
    a_en: ["48-bit physical address burned into the NIC. First 3 bytes = OUI (vendor), last 3 bytes = unique host ID. Written as d4:be:d9:d6:0c:2a.", "A 32-bit logical address assigned by DHCP.", "A 128-bit IPv6 address.", "A name for a network interface."],
    c: 0,
    e: "\u05d1\u05e4\u05e8\u05e7: \u05e9\u05db\u05d1\u05ea \u05d4\u05e7\u05d5 \u05d0\u05d7\u05e8\u05d0\u05d9\u05ea \u05e2\u05dc hop \u05d0\u05d7\u05d3 \u05d1\u05dc\u05d1\u05d3 \u2014 \u05d1\u05d9\u05df \u05d9\u05e9\u05d5\u05d9\u05d5\u05ea \u05de\u05d7\u05d5\u05d1\u05e8\u05d5\u05ea \u05d9\u05e9\u05d9\u05e8\u05d5\u05ea. \u05e9\u05db\u05d1\u05ea \u05d4\u05e8\u05e9\u05ea \u05de\u05ea\u05de\u05d5\u05d3\u05d3\u05ea \u05e2\u05dd \u05d4\u05de\u05e1\u05dc\u05d5\u05dc \u05d4\u05de\u05dc\u05d0. \u05d1-Waze: Layer 3 = \u05e7\u05d1\u05d9\u05e2\u05ea \u05d4\u05de\u05e1\u05dc\u05d5\u05dc, Layer 2 = \u05d4\u05d5\u05e8\u05d0\u05d5\u05ea \u05dc\u05e0\u05d4\u05d2 (\u05dc\u05d7\u05e5 \u05d2\u05d6, \u05d0\u05d5\u05ea\u05ea, \u05e2\u05e6\u05d5\u05e8 \u05d1\u05e8\u05de\u05d6\u05d5\u05e8).",
    e_en: "MAC = Media Access Control. Globally unique (manufacturer guarantees). OUI lookup: d4:be:d9 \u2192 Intel. MAC can be changed in software (MAC spoofing). Used only within L2 domain."
  },
  {
    cat: "MAC Address",

    q: "\u05de\u05d4 \u05d4\u05d4\u05d1\u05d3\u05dc \u05d1\u05d9\u05df \u05db\u05ea\u05d5\u05d1\u05ea MAC \u05dc\u05db\u05ea\u05d5\u05d1\u05ea IP? \u05de\u05d4 \u05db\u05dc \u05d0\u05d7\u05ea \u05de\u05d9\u05d9\u05e6\u05d2\u05ea?",

    a_en: ["IP = end-to-end (constant throughout journey, Layer 3). MAC = hop-to-hop (changes at each router, Layer 2). Router replaces MAC at each hop, IP stays same.", "MAC is more secure than IP.", "MAC is used for internet, IP for local network.", "They are the same \u2014 different names for same address."],
    c: 0,
    e: "\u05d1\u05e4\u05e8\u05e7: MAC = Media Access Control. \u05e6\u05e8\u05d5\u05d1\u05d4 \u05e2\u05dc \u05db\u05e8\u05d8\u05d9\u05e1 \u05d4\u05e8\u05e9\u05ea, 6 bytes, \u05d0\u05de\u05d5\u05e8\u05d4 \u05dc\u05d4\u05d9\u05d5\u05ea \u05d9\u05d9\u05d7\u05d5\u05d3\u05d9\u05ea \u05d1\u05e2\u05d5\u05dc\u05dd, \u05dc\u05d0 \u05de\u05e9\u05ea\u05e0\u05d4 (\u05d1\u05d3\u05e8\u05da \u05db\u05dc\u05dc). IP = \u05db\u05ea\u05d5\u05d1\u05ea \u05dc\u05d5\u05d2\u05d9\u05ea \u05e9\u05de\u05d5\u05e7\u05e6\u05d9\u05ea \u05e2\"\u05d9 \u05d4\u05e8\u05e9\u05ea (DHCP \u05d0\u05d5 \u05d9\u05d3\u05e0\u05d9\u05ea), 4 bytes, \u05d9\u05db\u05d5\u05dc\u05d4 \u05dc\u05d4\u05e9\u05ea\u05e0\u05d5\u05ea.",
    e_en: "Packet from PC to Google: IP src=192.168.1.5, dst=142.250.74.46 (constant). MAC src=PC_MAC\u2192router_MAC\u2192ISP_MAC (changes per hop). Each router does ARP for next hop's MAC."

    a_en: ["L2 data unit: Preamble(7B) + SFD(1B) + Dst MAC(6B) + Src MAC(6B) + EtherType(2B) + Payload(46-1500B) + CRC(4B).", "L3 data unit containing IP header and data.", "The same as an IP packet.", "A wireless data unit."],
    c: 0,
    e: "\u05d1\u05e4\u05e8\u05e7: 3 bytes \u05e8\u05d0\u05e9\u05d5\u05e0\u05d9\u05dd = OUI = Vendor ID = \u05de\u05d6\u05d4\u05d4 \u05d9\u05e6\u05e8\u05df. D4:BE:D9 \u05e9\u05d9\u05d9\u05da \u05dc-Dell. \u05d0\u05e4\u05e9\u05e8 \u05dc\u05d1\u05d3\u05d5\u05e7 \u05d1-coffer.com/mac_find. \u05dc\u05db\u05dc \u05d9\u05e6\u05e8\u05df \u05d9\u05e9 OUI \u05d0\u05d7\u05d3 \u05d5\u05d9\u05d5\u05ea\u05e8. 3 bytes \u05d0\u05d7\u05e8\u05d5\u05e0\u05d9\u05dd = Host ID = \u05de\u05d6\u05d4\u05d4 \u05db\u05e8\u05d8\u05d9\u05e1 \u05e1\u05e4\u05e6\u05d9\u05e4\u05d9.",
    e_en: "EtherType: 0x0800=IPv4, 0x0806=ARP, 0x86DD=IPv6. Preamble+SFD: sync, not shown in Wireshark. CRC32: error detection, verified and stripped by NIC. Min frame = 64 bytes (padding if needed)."

    q_en: "Why don't Preamble and CRC appear in Wireshark?",
    a: ["Type \u05de\u05e6\u05d9\u05d9\u05df \u05de\u05d4\u05d5 \u05e4\u05e8\u05d5\u05d8\u05d5\u05e7\u05d5\u05dc \u05d4-Data \u05e9\u05de\u05db\u05d9\u05dc \u05d4\u05de\u05e1\u05d2\u05e8\u05ea. 0x0800 = IP (\u05db\u05e8\u05d8\u05d9\u05e1 \u05d4\u05e8\u05e9\u05ea \u05de\u05e4\u05e0\u05d4 \u05dc-IP stack)", "Type = \u05d2\u05d5\u05d3\u05dc \u05d4-Data. 0x0800 = 2048 bytes", "Type = \u05de\u05e1\u05e4\u05e8 \u05d4\u05e9\u05d2\u05d9\u05d0\u05d5\u05ea \u05e9\u05e0\u05de\u05e6\u05d0\u05d5. 0x0800 = \u05dc\u05dc\u05d0 \u05e9\u05d2\u05d9\u05d0\u05d5\u05ea", "Type = \u05d2\u05e8\u05e1\u05ea Ethernet. 0x0800 = Ethernet II"],
    a_en: ["Preamble: NIC strips it before passing frame to OS. CRC: NIC verifies it \u2014 discards frame if bad, strips it if good. OS (and Wireshark) never sees them.", "They are encrypted.", "Wireshark only shows Layer 3+.", "They are too large to display."],
    c: 0,
    e: "\u05d1\u05e4\u05e8\u05e7: Type \u05de\u05e6\u05d9\u05d9\u05df \u05e1\u05d5\u05d2 \u05d4-Data. 0x0800 = IP, 0x0806 = ARP. \u05d4\u05db\u05e8\u05d8\u05d9\u05e1 \u05e7\u05d5\u05e8\u05d0 Type \u05d5\u05de\u05d7\u05dc\u05d9\u05d8 \u05dc\u05d0\u05df \u05dc\u05d4\u05e4\u05e0\u05d5\u05ea: 0x0800 \u2192 IP stack. \u05db\u05da \u05db\u05e8\u05d8\u05d9\u05e1 Layer 2 \u05d9\u05db\u05d5\u05dc \u05dc\u05d4\u05e2\u05d1\u05d9\u05e8 \u05de\u05d9\u05d3\u05e2 \u05dc-Layer 3 \u05d1\u05dc\u05d9 \u05dc\u05d3\u05e2\u05ea \u05de\u05d4 \u05d9\u05e9 \u05d1\u05e4\u05e0\u05d9\u05dd.",

    q: "\u05dc\u05de\u05d4 Preamble \u05d5-CRC32 \u05dc\u05d0 \u05de\u05d5\u05e4\u05d9\u05e2\u05d9\u05dd \u05d1-Wireshark?",
    q_en: "What is ARP Request vs ARP Reply?",
    a: ["Preamble \u05de\u05d8\u05d5\u05e4\u05dc \u05e2\"\u05d9 \u05db\u05e8\u05d8\u05d9\u05e1 \u05d4\u05e8\u05e9\u05ea \u05dc\u05e4\u05e0\u05d9 Wireshark. CRC32 \u05e0\u05d1\u05d3\u05e7 \u05d5\u05d0\u05dd \u05ea\u05e7\u05d9\u05df \u2014 \u05de\u05d5\u05e1\u05e8 \u05e2\"\u05d9 \u05d4\u05db\u05e8\u05d8\u05d9\u05e1 \u05dc\u05e4\u05e0\u05d9 \u05e9\u05d4\u05ea\u05d5\u05db\u05e0\u05d4 \u05e8\u05d5\u05d0\u05d4", "\u05d4\u05dd \u05dc\u05d0 \u05d7\u05dc\u05e7 \u05de\u05d4\u05de\u05e1\u05d2\u05e8\u05ea, Wireshark \u05de\u05d5\u05e1\u05d9\u05e3 \u05d0\u05d5\u05ea\u05dd \u05d1\u05e2\u05e6\u05de\u05d5", "Wireshark \u05de\u05e1\u05ea\u05d9\u05e8 \u05d0\u05d5\u05ea\u05dd \u05dc\u05d0\u05d1\u05d8\u05d7\u05d4", "\u05d4\u05dd \u05e7\u05d9\u05d9\u05de\u05d9\u05dd \u05e8\u05e7 \u05d1-TCP, \u05dc\u05d0 \u05d1-Ethernet"],
    a_en: ["Request: broadcast to all (ff:ff:ff:ff:ff:ff) asking 'Who has IP X?'. Reply: unicast back to requester with 'IP X is at MAC Y'.", "Both are broadcast.", "Request is unicast, Reply is broadcast.", "They are DNS messages, not ARP."],
    c: 0,
    e: "\u05d1\u05e4\u05e8\u05e7: Preamble = 8 bytes \u05e9\u05dc \u05e1\u05e0\u05db\u05e8\u05d5\u05df. \u05db\u05e8\u05d8\u05d9\u05e1 \u05d4\u05e8\u05e9\u05ea \u05de\u05d6\u05d4\u05d4 \u05d0\u05d5\u05ea\u05d5 \u05d5\u05de\u05e1\u05d9\u05e8 \u05d0\u05d5\u05ea\u05d5 \u05dc\u05e4\u05e0\u05d9 \u05e9\u05d4\u05de\u05e1\u05d2\u05e8\u05ea \u05de\u05d2\u05d9\u05e2\u05d4 \u05dc\u05ea\u05d5\u05db\u05e0\u05d4. CRC32 = Checksum. \u05db\u05e8\u05d8\u05d9\u05e1 \u05d4\u05e8\u05e9\u05ea \u05de\u05d0\u05de\u05ea \u2014 \u05d0\u05dd \u05ea\u05e7\u05d9\u05df: \u05de\u05e1\u05d9\u05e8 \u05d5\u05de\u05e2\u05d1\u05d9\u05e8 \u05d4\u05dc\u05d0\u05d4. \u05d0\u05dd \u05e4\u05d2\u05d5\u05dd: \u05d6\u05d5\u05e8\u05e7. Wireshark \u05e8\u05d5\u05d0\u05d4 \u05e8\u05e7 \u05de\u05d4 \u05e9\u05e0\u05e9\u05d0\u05e8.",

    cat_en: "Layer 2 vs 3",
    snip: null,
    q: "\u05de\u05d4 \u05db\u05ea\u05d5\u05d1\u05ea \u05d4-MAC \u05e9\u05dc \u05d4\u05d9\u05e2\u05d3 \u05d1\u05e9\u05db\u05d1\u05d4 2 \u05db\u05e9\u05d4\u05de\u05d7\u05e9\u05d1 \u05e9\u05d5\u05dc\u05d7 \u05dc-Ynet? \u05d5\u05dc\u05de\u05d4 \u05d6\u05d5 \u05dc\u05d0 \u05db\u05ea\u05d5\u05d1\u05ea MAC \u05e9\u05dc Ynet?",
    q_en: "What is the difference between Broadcast, Unicast, and Multicast?",
    a: ["MAC \u05e9\u05dc \u05d4\u05e0\u05ea\u05d1 \u05d4\u05d1\u05d9\u05ea\u05d9 \u2014 \u05db\u05d9 \u05e9\u05db\u05d1\u05d4 2 \u05de\u05ea\u05d0\u05e8\u05ea hop \u05d9\u05e9\u05d9\u05e8, \u05d5\u05d4\u05e0\u05ea\u05d1 \u05d4\u05d5\u05d0 \u05d4\u05d9\u05e9\u05d5\u05ea \u05d4\u05d9\u05e9\u05d9\u05e8\u05d4 \u05d4\u05d1\u05d0\u05d4, \u05dc\u05d0 Ynet", "MAC \u05e9\u05dc Ynet \u2014 \u05db\u05d9 Layer 2 \u05d2\u05dd \u05d9\u05d5\u05d3\u05e2 \u05d0\u05ea \u05d4\u05db\u05ea\u05d5\u05d1\u05ea \u05d4\u05e1\u05d5\u05e4\u05d9\u05ea", "FF:FF:FF:FF:FF:FF (Broadcast) \u2014 \u05db\u05d9 \u05dc\u05d0 \u05d9\u05d5\u05d3\u05e2\u05d9\u05dd \u05d0\u05ea MAC \u05e9\u05dc Ynet", "00:00:00:00:00:00 \u2014 \u05db\u05d9 \u05de\u05d7\u05d5\u05e5 \u05dc\u05e8\u05e9\u05ea \u05d4\u05de\u05e7\u05d5\u05de\u05d9\u05ea"],
    a_en: ["Unicast: one-to-one (specific MAC). Broadcast: one-to-all (ff:ff:ff:ff:ff:ff, everyone in subnet). Multicast: one-to-group (01:00:5e:xx:xx:xx, subscribed devices only).", "No difference \u2014 all deliver to all devices.", "Broadcast is encrypted, Unicast is not.", "Multicast only works in IPv6."],
    c: 0,
    e: "\u05d1\u05e4\u05e8\u05e7: \u05e9\u05db\u05d1\u05d4 2 = hop \u05d9\u05e9\u05d9\u05e8 \u05d1\u05dc\u05d1\u05d3. \u05de\u05d7\u05e9\u05d1 \u05dc\u05d0 \u05d9\u05db\u05d5\u05dc \u05dc\u05e9\u05dc\u05d5\u05d7 \u05d9\u05e9\u05d9\u05e8\u05d5\u05ea \u05dc-Ynet \u05d1-Layer 2 \u2014 \u05d4\u05dd \u05dc\u05d0 \u05de\u05d7\u05d5\u05d1\u05e8\u05d9\u05dd \u05d9\u05e9\u05d9\u05e8\u05d5\u05ea. \u05d4\u05de\u05d7\u05e9\u05d1 \u05e9\u05d5\u05dc\u05d7 \u05dc\u05e0\u05ea\u05d1 \u05d4\u05d1\u05d9\u05ea\u05d9. \u05d4\u05e0\u05ea\u05d1 \u05e9\u05d5\u05dc\u05d7 \u05dc\u05e0\u05ea\u05d1 \u05d4\u05d1\u05d0. \u05d1\u05db\u05dc \u05e9\u05dc\u05d1: Layer 2 src/dst = \u05d4\u05d9\u05e9\u05d5\u05d9\u05d5\u05ea \u05d4\u05e1\u05de\u05d5\u05db\u05d5\u05ea. Layer 3 IP \u05dc\u05d0 \u05de\u05e9\u05ea\u05e0\u05d4!",
    e_en: "Unicast: direct delivery. Broadcast: ARP, DHCP Discover \u2014 all receive (can't cross router). Multicast: OSPF (01:00:5e:00:00:05), video streaming \u2014 only interested parties receive."
  },

    c: 0,

    c: 0,
    e: "\u05d1\u05e4\u05e8\u05e7: ARP Request \u05e0\u05e9\u05dc\u05d7 \u05dc-Broadcast (ff:ff:ff:ff:ff:ff) = \u05db\u05dc \u05db\u05e8\u05d8\u05d9\u05e1\u05d9 \u05d4\u05e8\u05e9\u05ea \u05de\u05e7\u05d1\u05dc\u05d9\u05dd. \u05db\u05dc \u05de\u05d7\u05e9\u05d1 \u05d1\u05d5\u05d3\u05e7: '\u05d4\u05d0\u05dd \u05d4-IP \u05d1\u05e9\u05d0\u05d9\u05dc\u05ea\u05d0 \u05e9\u05dc\u05d9?' \u05d2' \u05e8\u05d5\u05d0\u05d4 10.0.0.2, \u05d1\u05d5\u05d3\u05e7, \u05de\u05d1\u05d9\u05df \u05e9\u05d6\u05d4 \u05dc\u05d0 \u05e9\u05dc\u05d5, \u05de\u05ea\u05e2\u05dc\u05dd. \u05d1' \u05de\u05d6\u05d4\u05d4 \u05e9\u05d6\u05d4 \u05e9\u05dc\u05d5 \u05d5\u05e2\u05d5\u05e0\u05d4 Unicast.",
    e_en: "ARP has no authentication \u2014 anyone can send ARP Reply for any IP. Defense: Dynamic ARP Inspection (DAI) on managed switches, static ARP entries, ARP monitoring tools."

  {
    cat: "Layer 2 vs 3",

    q_en: "What is Promiscuous Mode?",
    a: ["Layer 2 \u05d9\u05e9\u05ea\u05e0\u05d4: src_mac=MAC \u05d4\u05e0\u05ea\u05d1 \u05d4\u05e0\u05d5\u05db\u05d7\u05d9, dst_mac=MAC \u05d4\u05e0\u05ea\u05d1 \u05d4\u05d1\u05d0. Layer 3 \u05dc\u05d0 \u05d9\u05e9\u05ea\u05e0\u05d4: IP src/dst \u05e0\u05e9\u05d0\u05e8\u05d9\u05dd \u05d6\u05d4\u05d9\u05dd", "Layer 2 \u05d5-3 \u05d9\u05e9\u05ea\u05e0\u05d5 \u05e9\u05e0\u05d9\u05d4\u05dd \u05d1\u05db\u05dc \u05e0\u05ea\u05d1", "Layer 2 \u05dc\u05d0 \u05d9\u05e9\u05ea\u05e0\u05d4, Layer 3 \u05d9\u05e9\u05ea\u05e0\u05d4", "\u05e8\u05e7 dst_mac \u05d9\u05e9\u05ea\u05e0\u05d4, src_mac \u05e0\u05e9\u05d0\u05e8 \u05e9\u05dc \u05d4\u05de\u05d7\u05e9\u05d1 \u05d4\u05de\u05e7\u05d5\u05e8\u05d9"],
    a_en: ["NIC mode where ALL frames on the network are captured, not just those addressed to this device. Required for Wireshark/tcpdump to capture all traffic.", "A mode that increases transmit power.", "Encryption mode for sensitive data.", "A mode for wireless bridging."],
    c: 0,
    e: "\u05d1\u05e4\u05e8\u05e7: \u05d6\u05d4\u05d5 \u05e2\u05d9\u05e7\u05e8\u05d5\u05df \u05de\u05e8\u05db\u05d6\u05d9. IP src/dst = \u05e0\u05e7\u05d5\u05d3\u05d5\u05ea \u05e7\u05e6\u05d4 \u2014 \u05dc\u05d0 \u05de\u05e9\u05ea\u05e0\u05d9\u05dd \u05dc\u05d0\u05d5\u05e8\u05da \u05db\u05dc \u05d4\u05d3\u05e8\u05da. MAC src/dst = hop \u05e0\u05d5\u05db\u05d7\u05d9 \u2014 \u05de\u05ea\u05d7\u05dc\u05e4\u05d9\u05dd \u05d1\u05db\u05dc \u05e0\u05ea\u05d1. \u05db\u05dc \u05e0\u05ea\u05d1 \u05d1\u05d5\u05e0\u05d4 Ethernet frame \u05d7\u05d3\u05e9 \u05e2\u05dd src_mac \u05e9\u05dc\u05d5 \u05d5-dst_mac \u05e9\u05dc \u05d4\u05e0\u05ea\u05d1 \u05d4\u05d1\u05d0.",
    e_en: "Normally: NIC discards frames not addressed to it. Promiscuous mode: accept all. On switch: only see broadcast + traffic to/from you (unless SPAN/mirror port configured)."
  },

    q_en: "What is Spanning Tree Protocol (STP)?",
    a: ["send() = Layer 3, Scapy \u05d1\u05d5\u05e0\u05d4 Ethernet \u05d0\u05d5\u05d8\u05d5\u05de\u05d8\u05d9\u05ea. sendp() = Layer 2, \u05d0\u05e0\u05d7\u05e0\u05d5 \u05e9\u05d5\u05dc\u05d8\u05d9\u05dd \u05d1-MAC", "send() = UDP, sendp() = TCP. \u05d4\u05d4\u05d1\u05d3\u05dc \u05d4\u05d5\u05d0 \u05d1\u05e4\u05e8\u05d5\u05d8\u05d5\u05e7\u05d5\u05dc Transport", "send() = Unicast, sendp() = Broadcast", "\u05d4\u05dd \u05d6\u05d4\u05d9\u05dd, sendp() \u05d4\u05d5\u05d0 \u05e8\u05e7 alias"],
    a_en: ["Protocol that prevents loops in switched networks by blocking redundant paths. Without STP, frames would loop forever causing broadcast storm.", "A routing protocol for routers.", "An encryption protocol for switches.", "A protocol for wireless mesh networks."],
    c: 0,
    e: "\u05d1\u05e4\u05e8\u05e7: send() = \u05e9\u05d5\u05dc\u05d7 \u05d1-Layer 3 \u2192 Scapy \u05d1\u05d5\u05e0\u05d4 Ethernet \u05d0\u05d5\u05d8\u05d5\u05de\u05d8\u05d9\u05ea (src=MAC \u05e9\u05dc\u05e0\u05d5, dst=MAC \u05e9\u05dc \u05e0\u05ea\u05d1, type=0x0800). sendp() = \u05e9\u05dc\u05d9\u05d7\u05d4 \u05d1-Layer 2, \u05d0\u05e0\u05d7\u05e0\u05d5 \u05de\u05d2\u05d3\u05d9\u05e8\u05d9\u05dd \u05d0\u05ea Ether() \u05e2\u05dd \u05db\u05dc \u05d4\u05e9\u05d3\u05d5\u05ea. \u05e9\u05d9\u05de\u05d5\u05e9\u05d9 \u05db\u05e9\u05e8\u05d5\u05e6\u05d9\u05dd \u05dc\u05e9\u05e0\u05d5\u05ea MAC src/dst \u05d9\u05d3\u05e0\u05d9\u05ea.",
    e_en: "STP: elects root bridge, then blocks redundant links. Failover: if active link fails, STP unblocks alternate. Modern: RSTP (Rapid STP) converges in ~1 second vs 30-50s for STP."
  },

    q_en: "What is a Hub and how does it work?",
    a: ["Layer 4 (Transport) \u2014 \u05e4\u05d5\u05e8\u05d8\u05d9\u05dd! \u05e4\u05d5\u05e8\u05d8 25=SMTP, \u05e4\u05d5\u05e8\u05d8 80=HTTP. \u05dc\u05d0 \u05e8\u05db\u05d9\u05d1 \u05e8\u05e9\u05ea \u05d0\u05dc\u05d0 \u05e4\u05e8\u05d5\u05d8\u05d5\u05e7\u05d5\u05dc \u05e9\u05db\u05d1\u05ea \u05ea\u05e2\u05d1\u05d5\u05e8\u05d4", "Switch \u2014 \u05de\u05e1\u05d9\u05db\u05d4 MAC \u05d9\u05d9\u05d7\u05d5\u05d3\u05d9 \u05dc\u05db\u05dc \u05e9\u05d9\u05e8\u05d5\u05ea", "Router \u2014 \u05d8\u05d1\u05dc\u05ea \u05e0\u05d9\u05ea\u05d5\u05d1 \u05e0\u05e4\u05e8\u05d3\u05ea \u05dc\u05db\u05dc \u05e9\u05d9\u05e8\u05d5\u05ea", "Hub \u2014 \u05db\u05dc \u05e9\u05d9\u05e8\u05d5\u05ea \u05de\u05d2\u05d9\u05e2 \u05dc\u05e4\u05d5\u05e8\u05d8 \u05d0\u05d7\u05e8"],
    a_en: ["Layer 1 device \u2014 copies incoming frame to ALL ports except source. No MAC awareness, no intelligence. All devices share one collision domain.", "A smart switch that filters by MAC.", "A Layer 3 device that routes packets.", "A device that connects different networks."],

    a_en: ["Layer 2 device \u2014 learns MAC addresses and forwards frames only to the correct port. Separate collision domain per port. Checks CRC and drops corrupted frames.", "Layer 1 device like Hub but with more ports.", "Layer 3 device that routes IP packets.", "A wireless access point."],
    c: 0,
    e: "Hub = Layer 1. \u05dc\u05d0 \u05de\u05db\u05d9\u05e8 MAC. \u05db\u05dc \u05de\u05e1\u05d2\u05e8\u05ea \u2192 Flood \u05dc\u05db\u05dc \u05d4\u05e4\u05d5\u05e8\u05d8\u05d9\u05dd \u05d7\u05d5\u05e5 \u05de\u05de\u05e7\u05d5\u05e8. B, C, D \u05de\u05e7\u05d1\u05dc\u05d9\u05dd. C \u05d5-D \u05e7\u05d5\u05e8\u05d0\u05d9\u05dd Dst MAC, \u05de\u05d6\u05d4\u05d9\u05dd \u05e9\u05dc\u05d0 \u05de\u05d9\u05d5\u05e2\u05d3 \u05d0\u05dc\u05d9\u05d4\u05dd \u2192 \u05d6\u05d5\u05e8\u05e7\u05d9\u05dd. B \u05de\u05e2\u05d1\u05d9\u05e8 \u05dc\u05de\u05e2\u05dc\u05d4 \u05dc\u05e2\u05d9\u05d1\u05d5\u05d3.",

    a_en: ["When destination MAC is unknown, switch sends frame to all ports (flood). New switch has empty MAC table so it floods everything until it learns all MACs.", "A security attack that overflows the MAC table.", "A method to synchronize MAC tables between switches.", "Normal behavior when network is idle."],
    c: 0,

    e_en: "Switch learning: frame arrives from PC-A \u2192 record 'A's MAC \u2192 Port 3'. Send to unknown dst \u2192 flood all. After learning: unicast only. MAC entries expire (typically 300s TTL) and are relearned."

    a: ["2.4GHz = \u05d8\u05d5\u05d5\u05d7 \u05d0\u05e8\u05d5\u05da \u05d9\u05d5\u05ea\u05e8 (\u05d0\u05d5\u05e8\u05da \u05d2\u05dc \u05d0\u05e8\u05d5\u05da \u05d9\u05d5\u05ea\u05e8), \u05e2\u05de\u05d5\u05e1 \u05d9\u05d5\u05ea\u05e8. 5GHz = \u05e7\u05e6\u05d1 \u05d2\u05d1\u05d5\u05d4 \u05d9\u05d5\u05ea\u05e8, \u05d8\u05d5\u05d5\u05d7 \u05e7\u05e6\u05e8 \u05d9\u05d5\u05ea\u05e8", "2.4GHz = \u05de\u05d4\u05d9\u05e8, 5GHz = \u05d0\u05d9\u05d8\u05d9", "5GHz = WiFi 4, 2.4GHz = WiFi 6", "\u05d4\u05d4\u05d1\u05d3\u05dc \u05e8\u05e7 \u05d1\u05e9\u05dd, \u05d4\u05d1\u05d9\u05e6\u05d5\u05e2\u05d9\u05dd \u05d6\u05d4\u05d9\u05dd"],
    a_en: ["Delivers electrical power over Ethernet cable along with data. Powers IP cameras, WiFi access points, VoIP phones without separate power adapter.", "A faster Ethernet standard.", "A cable type for long distances.", "A wireless charging protocol."],
    c: 0,
    e: "",
    e_en: "PoE (802.3af): 15.4W. PoE+ (802.3at): 30W. PoE++ (802.3bt): 60-100W. Unused pairs (4,5,7,8 in 100Mbps) carry DC power. Switch must be PoE-capable or use injector."
  },

    q_en: "What is the difference between Single-Mode and Multi-Mode fiber?",

    a_en: ["Single-mode: thin core (9\u03bcm), one light path, long distances (10km+), expensive laser. Multi-mode: thick core (50/62.5\u03bcm), multiple light paths, short distances (<550m), cheaper LED.", "Multi-mode is always faster.", "Single-mode is only for local networks.", "No difference \u2014 same performance."],
    c: 0,
    e: "",
    e_en: "Multi-mode: modal dispersion limits distance. OM3 (aqua): 10Gbps at 300m. OM4: 10Gbps at 550m. Single-mode: no modal dispersion, laser source. OS2: 100Gbps at 10km+."

   LANDING
══════════════════════════════════════════ */
function buildLandGrid() {
  var grid = document.getElementById('landGrid');
  if (!grid) return;
  grid.innerHTML = '';
  CHAPTERS.forEach(function(ch) {
    var data = LANG === 'he' ? ch.he : ch.en;
    var card = document.createElement('div');
    card.className = 'land-card';
    card.style.setProperty('--cc', ch.color);
    card.onclick = function() { goTo('learn'); loadCh(ch.n); };
    card.innerHTML =
      '<span class="lc-icon">' + ch.icon + '</span>' +
      '<div class="lc-n">CH ' + String(ch.n).padStart(2,'0') + '</div>' +
      '<div class="lc-name">' + data.name + '</div>' +
      '<div class="lc-desc">' + data.desc + '</div>';
    grid.appendChild(card);
  });
}

/* ══════════════════════════════════════════
   LEARN — SIDEBAR + CONTENT
══════════════════════════════════════════ */
function buildSidebar() {
  var sb = document.getElementById('lSidebar');
  if (!sb) return;
  sb.innerHTML = '';
  CHAPTERS.forEach(function(ch) {
    var data = LANG === 'he' ? ch.he : ch.en;
    var wrap = document.createElement('div');
    wrap.className = 'sb-ch' + (ch.n === CUR_CH ? ' active' : '');
    wrap.id = 'sbch' + ch.n;
    var btn = document.createElement('button');
    btn.className = 'sb-ch-btn';
    btn.style.setProperty('--cc', ch.color);
    btn.innerHTML = '<span class="sb-icon">' + ch.icon + '</span>' +
      '<span class="sb-name">' + data.name + '</span>';
    btn.onclick = function() { loadCh(ch.n); };
    wrap.appendChild(btn);
    var secs = document.createElement('div');
    secs.className = 'sb-secs';
    secs.id = 'sbsecs' + ch.n;
    data.sections.forEach(function(sec, i) {
      var s = document.createElement('button');
      s.className = 'sb-sec';
      s.textContent = sec;
      s.onclick = function(e) { e.stopPropagation(); scrollToSec(ch.n, i); };
      secs.appendChild(s);
    });
    wrap.appendChild(secs);
    sb.appendChild(wrap);
  });
}

function loadCh(n) {
  CUR_CH = n;
  var ch   = CHAPTERS.find(function(c){ return c.n===n; });
  if (!ch) return;
  var data = LANG === 'he' ? ch.he : ch.en;

  document.querySelectorAll('.sb-ch').forEach(function(b){ b.classList.remove('active'); });
  var sbch = document.getElementById('sbch' + n);
  if (sbch) sbch.classList.add('active');

  var prevN = n > 1  ? '<button class="ch-nav-btn" onclick="loadCh('+(n-1)+')">' + (LANG==='he' ? '← פרק '+(n-1) : '← Ch '+(n-1)) + '</button>' : '<span></span>';
  var nextN = n < 12 ? '<button class="ch-nav-btn" onclick="loadCh('+(n+1)+')">' + (LANG==='he' ? 'פרק '+(n+1)+' →' : 'Ch '+(n+1)+' →') + '</button>' : '<span></span>';

  document.getElementById('lContent').innerHTML =
    '<div class="ch-nav">' + prevN + '<span class="ch-nav-cur">' + ch.icon + ' ' + data.name + '</span>' + nextN + '</div>' +
    data.content() +
    '<div class="ch-nav ch-nav-bottom">' + prevN + '<span></span>' + nextN + '</div>';

  window.scrollTo(0, 0);
  updateReadBar();
}

function scrollToSec(chN, idx) {
  if (chN !== CUR_CH) {
    loadCh(chN);
    setTimeout(function(){ doScroll(idx); }, 80);
  } else {
    doScroll(idx);
  }
}

function doScroll(idx) {
  var secs = document.querySelectorAll('.learn-section');
  if (secs[idx]) {
    var top = secs[idx].getBoundingClientRect().top + window.scrollY - 70;
    window.scrollTo({ top: top, behavior: 'smooth' });
  }
}

function updateReadBar() {
  window.onscroll = function() {
    var h = document.documentElement.scrollHeight - window.innerHeight;
    var pct = h > 0 ? Math.round(window.scrollY / h * 100) : 0;
    var bar = document.getElementById('readBar');
    if (bar) bar.style.width = pct + '%';
  };
}

      else startLab(ch.n);

    btn.innerHTML =
      '<span class="lcb-icon">' + ch.icon + '</span>' +
      '<div class="lcb-info">' +
        '<div class="lcb-name">' + data.name + '</div>' +

      '<div class="lcb-prog"><div class="lcb-fill" id="lcbf'+ch.n+'" style="width:'+pct+'%"></div></div>';

function buildLabWelcome() {

function goToLabWelcome() {
  var welcome = document.getElementById('labWelcome');
  var area    = document.getElementById('lqArea');
  if (welcome) welcome.style.display = '';
  if (area)    { area.style.display = 'none'; area.innerHTML = ''; }
  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('on'); });
  LAB.ch = 0;
}

function updateLabOverall() {
  var total = 0, done = 0;
  for (var n = 1; n <= 12; n++) {
    var s = labGetSaved(n);
    if (MCQ_CHAPTERS.indexOf(n) >= 0) {
      total += (LAB_DATA[n] || []).length;
      if (s) done += s.ok;
    } else {
      total += (TERMINAL_DATA[n] ? TERMINAL_DATA[n].missions.length : 0);
      var mDone = 0;
      (TERMINAL_DATA[n] ? TERMINAL_DATA[n].missions : []).forEach(function(m) {
        if (TERM.doneMissions && TERM.doneMissions['ch'+n+'_'+m.id]) mDone++;
      });
      done += mDone;
    }
  }
  var pct = total > 0 ? Math.round(done/total*100) : 0;
  var fill = document.getElementById('labOverallFill');
  if (fill) fill.style.width = pct + '%';
}

function startLab(n) {
  LAB.ch = n;
  var qs = LAB_DATA[n];
  if (!qs || !qs.length) return;
  LAB.questions = qs.slice().sort(function(){ return Math.random() - .5; });
  LAB.cur = 0; LAB.ans = []; LAB.answered = false;

  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('on'); });
  var btn = document.getElementById('labchbtn' + n);
  if (btn) btn.classList.add('on');

  var welcome = document.getElementById('labWelcome');
  var area    = document.getElementById('lqArea');
  if (welcome) welcome.style.display = 'none';
  if (area)    area.style.display = 'block';
  renderLabQ();
}

function renderLabQ() {
  var q    = LAB.questions[LAB.cur];
  var isHe = LANG === 'he';
  var qText = isHe ? q.q : (q.q_en || q.q);
  var aList = isHe ? q.a : (q.a_en || q.a);
  var eText = isHe ? q.e : (q.e_en || q.e);
  var tot  = LAB.questions.length;
  var ch   = CHAPTERS.find(function(c){ return c.n === LAB.ch; });
  var data = LANG === 'he' ? ch.he : ch.en;
  LAB.answered = false;

  var pips = '';
  for (var i = 0; i < tot; i++) {
    var cls = i < LAB.cur ? (LAB.ans[i]===1?' ok':' bad') : i===LAB.cur?' cur':'';
    pips += '<div class="lq-pip'+cls+'"></div>';
  }

  var idx  = [0,1,2,3].sort(function(){ return Math.random()-.5; });
  var shuf = idx.map(function(j){ return aList[j]; });
  var newC = idx.indexOf(q.c);
  var LBL  = LANG === 'he' ? ['א','ב','ג','ד'] : ['A','B','C','D'];

  var optsHtml = '';
  for (var j = 0; j < 4; j++) {
    optsHtml += '<button class="lq-opt" data-i="'+j+'" data-c="'+newC+'">' +
      '<span class="lq-lbl">'+LBL[j]+'</span>' +
      '<span class="lq-txt">'+shuf[j]+'</span>' +
      '<span class="lq-ic"></span></button>';
  }

  var snipHtml = q.snip
    ? '<div class="lq-snip"><div class="lqs-bar"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div><div class="lqs-body">'+q.snip+'</div></div>'
    : '';

  var ok       = LAB.ans.filter(function(x){ return x===1; }).length;
  var scoreL   = LANG === 'he' ? 'נכון' : 'correct';
  var restartL = LANG === 'he' ? '↺ התחל מחדש' : '↺ Restart';
  var nextL    = LANG === 'he' ? '← הבא' : 'Next →';

  document.getElementById('lqArea').innerHTML =
    '<div class="lq-header">' +
      '<div class="lq-ch-icon">'+ch.icon+'</div>' +
      '<div><div class="lq-ch-name">'+data.name+'</div>' +
        '<div class="lq-ch-num">'+String(LAB.ch).padStart(2,'0')+' / 12</div></div>' +
      '<div class="lq-spacer"></div>' +
      '<div class="lq-scorebox"><div class="lq-sv" id="lqSv">'+ok+' / '+LAB.cur+'</div><div class="lq-sl">'+scoreL+'</div></div>' +
    '</div>' +
    '<div class="lq-pips">'+pips+'</div>' +
    '<div class="lq-card" id="lqCard">' +
      '<div class="lq-meta"><span class="lq-num">'+(LAB.cur+1)+' / '+tot+'</span><span class="lq-cat">'+q.cat+'</span></div>' +
      snipHtml +
      '<div class="lq-q">'+qText+'</div>' +
      '<div class="lq-opts" id="lqOpts">'+optsHtml+'</div>' +
      '<div class="lq-exp" id="lqExp"><div class="lq-exp-lbl" id="lqExpLbl"></div><div class="lq-exp-txt" id="lqExpTxt"></div></div>' +
    '</div>' +
    '<div class="lq-foot">' +
      '<button class="lq-btn" onclick="startLab(LAB.ch)">'+restartL+'</button>' +
      '<button class="lq-btn next" id="lqNext" onclick="nextLabQ()" disabled>'+nextL+'</button>' +
    '</div>';

  document.querySelectorAll('.lq-opt').forEach(function(btn) {
    btn.addEventListener('click', onLabPick);
  });
}

function onLabPick(e) {
  if (LAB.answered) return;
  LAB.answered = true;
  var btn  = e.currentTarget;
  var pick = parseInt(btn.dataset.i);
  var corr = parseInt(btn.dataset.c);
  var ok   = pick === corr;
  LAB.ans.push(ok ? 1 : 0);

  document.querySelectorAll('.lq-opt').forEach(function(b, j) {
    b.disabled = true;
    if (j === corr) b.classList.add('correct');
    else if (j === pick) b.classList.add('wrong');
  });

  var q       = LAB.questions[LAB.cur];
  var expLbl  = document.getElementById('lqExpLbl');
  var expTxt  = document.getElementById('lqExpTxt');
  var ic      = btn.querySelector('.lq-ic');
  if (ic) ic.textContent = ok ? '✓' : '✗';
  if (expLbl) expLbl.textContent = ok ? (LANG==='he'?'✓ נכון!':'✓ Correct!') : (LANG==='he'?'✗ לא נכון':'✗ Wrong');
  if (expLbl) expLbl.className   = 'lq-exp-lbl ' + (ok ? 'ok' : 'bad');
  if (expTxt) expTxt.textContent = q.e;

  var sv = document.getElementById('lqSv');
  if (sv) sv.textContent = LAB.ans.filter(function(x){return x===1;}).length + ' / ' + LAB.ans.length;

  var next = document.getElementById('lqNext');
  if (next) next.disabled = false;

  if (ok) { XP += 5; localStorage.setItem('nw_xp', XP); document.getElementById('xpTotal').textContent = XP; }
  LAB.cur++;
}

function nextLabQ() {
  if (LAB.cur >= LAB.questions.length) { showLabResult(); return; }
  renderLabQ();
}

  if (lbl20) lbl20.textContent  = isHe ? 'מרתון' : 'Marathon';
  if (lblAll) lblAll.textContent = isHe ? 'כל השאלות' : 'All Questions';
  var qzScoreLbl  = document.getElementById('qzScoreLbl');
  var qzStreakLbl = document.getElementById('qzStreakLbl');

  var grade  = pct>=90?'S':pct>=80?'A':pct>=70?'B':pct>=60?'C':'D';
  var arcOff = 314 * (1 - pct/100);
  var arcCol = pct>=80 ? '#15803d' : pct>=60 ? '#a16207' : '#c2410c';
  var titles = LANG==='he'
    ? ['עוד לא שם... 📖','מתקדם! 💪','כל הכבוד! 🎯','מצוין! 🏆']
    : ['Keep practicing! 📖','Getting there! 💪','Well done! 🎯','Excellent! 🏆'];
  var tier = pct>=90?3:pct>=70?2:pct>=50?1:0;
  var againL  = LANG==='he' ? '↺ שחק שוב' : '↺ Play Again';
  var nextChL = LANG==='he' ? 'פרק '+(LAB.ch+1)+' →' : 'Ch '+(LAB.ch+1)+' →';
  var backL   = LANG==='he' ? '← חזרה' : '← Back';

  document.getElementById('lqArea').innerHTML =
    '<div class="lq-result">' +
      '<div class="lqr-ring"><svg viewBox="0 0 110 110"><circle class="lqr-bg" cx="55" cy="55" r="50"/><circle class="lqr-arc" id="lqrArc" cx="55" cy="55" r="50" stroke="'+arcCol+'"/></svg>' +
        '<div class="lqr-inner"><div class="lqr-pct">'+pct+'%</div><div class="lqr-grade">'+grade+'</div></div></div>' +
      '<div class="lqr-title">'+titles[tier]+'</div>' +
      '<div class="lqr-sub">'+data.name+' · '+ok+'/'+tot+'</div>' +
      '<div class="lqr-stats">' +
        '<div class="lqrs"><div class="lqrs-v" style="color:var(--gr)">'+ok+'</div><div class="lqrs-l">'+(LANG==='he'?'נכון':'correct')+'</div></div>' +
        '<div class="lqrs"><div class="lqrs-v" style="color:var(--ac2)">'+(tot-ok)+'</div><div class="lqrs-l">'+(LANG==='he'?'שגוי':'wrong')+'</div></div>' +
        '<div class="lqrs"><div class="lqrs-v">'+pct+'%</div><div class="lqrs-l">'+(LANG==='he'?'ציון':'score')+'</div></div>' +

    '</div>';

  setTimeout(function() {
    var arc = document.getElementById('lqrArc');
    if (arc) arc.style.strokeDashoffset = arcOff;

function labGetSaved(n) {
  var raw = localStorage.getItem('nw_lab_' + n);
  return raw ? JSON.parse(raw) : null;
}

function labSave(n, ok, total) {
  localStorage.setItem('nw_lab_' + n, JSON.stringify({ ok: ok, total: total }));
}

function buildSidebar() {
  var sb = document.getElementById('lSidebar');
  if (!sb) return;
  sb.innerHTML = '';
  CHAPTERS.forEach(function(ch) {
    var data = LANG === 'he' ? ch.he : ch.en;
    var wrap = document.createElement('div');
    wrap.className = 'sb-ch' + (ch.n === CUR_CH ? ' active' : '');
    wrap.id = 'sbch' + ch.n;
    var btn = document.createElement('button');
    btn.className = 'sb-ch-btn';
    btn.style.setProperty('--cc', ch.color);
    btn.innerHTML = '<span class="sb-icon">' + ch.icon + '</span>' +
      '<span class="sb-name">' + data.name + '</span>';
    btn.onclick = function() { loadCh(ch.n); };
    wrap.appendChild(btn);
    var secs = document.createElement('div');
    secs.className = 'sb-secs';
    secs.id = 'sbsecs' + ch.n;
    data.sections.forEach(function(sec, i) {
      var s = document.createElement('button');
      s.className = 'sb-sec';
      s.textContent = sec;
      s.onclick = function(e) { e.stopPropagation(); scrollToSec(ch.n, i); };
      secs.appendChild(s);
    });
    wrap.appendChild(secs);
    sb.appendChild(wrap);
  });
}

function loadCh(n) {
  CUR_CH = n;
  var ch   = CHAPTERS.find(function(c){ return c.n===n; });
  if (!ch) return;
  var data = LANG === 'he' ? ch.he : ch.en;

  document.querySelectorAll('.sb-ch').forEach(function(b){ b.classList.remove('active'); });
  var sbch = document.getElementById('sbch' + n);
  if (sbch) sbch.classList.add('active');

  var prevN = n > 1  ? '<button class="ch-nav-btn" onclick="loadCh('+(n-1)+')">' + (LANG==='he' ? '← פרק '+(n-1) : '← Ch '+(n-1)) + '</button>' : '<span></span>';
  var nextN = n < 12 ? '<button class="ch-nav-btn" onclick="loadCh('+(n+1)+')">' + (LANG==='he' ? 'פרק '+(n+1)+' →' : 'Ch '+(n+1)+' →') + '</button>' : '<span></span>';

  document.getElementById('lContent').innerHTML =
    '<div class="ch-nav">' + prevN + '<span class="ch-nav-cur">' + ch.icon + ' ' + data.name + '</span>' + nextN + '</div>' +
    data.content() +
    '<div class="ch-nav ch-nav-bottom">' + prevN + '<span></span>' + nextN + '</div>';

  window.scrollTo(0, 0);
  updateReadBar();
}

function scrollToSec(chN, idx) {
  if (chN !== CUR_CH) {
    loadCh(chN);
    setTimeout(function(){ doScroll(idx); }, 80);
  } else {
    doScroll(idx);
  }
}

function doScroll(idx) {
  var secs = document.querySelectorAll('.learn-section');
  if (secs[idx]) {
    var top = secs[idx].getBoundingClientRect().top + window.scrollY - 70;
    window.scrollTo({ top: top, behavior: 'smooth' });
  }
}

function updateReadBar() {
  window.onscroll = function() {
    var h = document.documentElement.scrollHeight - window.innerHeight;
    var pct = h > 0 ? Math.round(window.scrollY / h * 100) : 0;
    var bar = document.getElementById('readBar');
    if (bar) bar.style.width = pct + '%';
  };
}

/* ══════════════════════════════════════════
   LAB — SIDEBAR + WELCOME
══════════════════════════════════════════ */
function buildLabSidebar() {
  var list = document.getElementById('labChList');
  if (!list) return;
  list.innerHTML = '';
  CHAPTERS.forEach(function(ch) {
    var data  = LANG === 'he' ? ch.he : ch.en;
    var saved = labGetSaved(ch.n);
    var pct   = saved ? Math.round(saved.ok / saved.total * 100) : 0;
    var isTerm = isTerminalChapter(ch.n);

    var btn = document.createElement('button');
    btn.className = 'lab-ch-btn' + (LAB.ch === ch.n ? ' on' : '');
    btn.id = 'labchbtn' + ch.n;
    btn.onclick = function() {
      if (isTerminalChapter(ch.n)) startTerminal(ch.n);
      else startLab(ch.n);
    };
    btn.innerHTML =
      '<span class="lcb-icon">' + ch.icon + '</span>' +
      '<div class="lcb-info">' +
        '<div class="lcb-name">' + data.name + '</div>' +
        '<div class="lcb-badge">' + (isTerm ? '⌨ terminal' : '❓ MCQ') + '</div>' +
      '</div>' +
      '<div class="lcb-prog"><div class="lcb-fill" id="lcbf'+ch.n+'" style="width:'+pct+'%"></div></div>';
    list.appendChild(btn);
  });
  updateLabOverall();
}

function buildLabWelcome() {
  var g = document.getElementById('lwGrid');
  if (!g) return;
  g.innerHTML = '';
  CHAPTERS.forEach(function(ch) {
    var data  = LANG === 'he' ? ch.he : ch.en;
    var saved = labGetSaved(ch.n);
    var pct   = saved ? Math.round(saved.ok / saved.total * 100) : 0;
    var isTerm = isTerminalChapter(ch.n);

    var card = document.createElement('div');
    card.className = 'lw-card';
    card.style.setProperty('--cc', ch.color);
    card.onclick = function() {
      if (isTerminalChapter(ch.n)) startTerminal(ch.n);
      else startLab(ch.n);
    };
    card.innerHTML =
      '<div class="lwc-n">CH ' + String(ch.n).padStart(2,'0') + '</div>' +
      '<span class="lwc-icon">' + ch.icon + '</span>' +
      '<div class="lwc-name">' + data.name + '</div>' +
      '<div class="lwc-type">' + (isTerm ? '⌨' : '❓') + '</div>' +
      '<div class="lwc-bar"><div class="lwc-bar-fill" id="lwbf'+ch.n+'" style="width:'+(saved?pct:0)+'%"></div></div>';
    g.appendChild(card);
  });
}

function goToLabWelcome() {
  var welcome = document.getElementById('labWelcome');
  var area    = document.getElementById('lqArea');
  if (welcome) welcome.style.display = '';
  if (area)    { area.style.display = 'none'; area.innerHTML = ''; }
  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('on'); });
  LAB.ch = 0;
}

function updateLabOverall() {
  var total = 0, done = 0;
  for (var n = 1; n <= 12; n++) {
    var s = labGetSaved(n);
    if (MCQ_CHAPTERS.indexOf(n) >= 0) {
      total += (LAB_DATA[n] || []).length;
      if (s) done += s.ok;
    } else {
      total += (TERMINAL_DATA[n] ? TERMINAL_DATA[n].missions.length : 0);
      var mDone = 0;
      (TERMINAL_DATA[n] ? TERMINAL_DATA[n].missions : []).forEach(function(m) {
        if (TERM.doneMissions && TERM.doneMissions['ch'+n+'_'+m.id]) mDone++;
      });
      done += mDone;
    }
  }
  var pct = total > 0 ? Math.round(done/total*100) : 0;
  var fill = document.getElementById('labOverallFill');
  if (fill) fill.style.width = pct + '%';
}

/* ══════════════════════════════════════════
   MCQ LAB
══════════════════════════════════════════ */
function startLab(n) {
  LAB.ch = n;
  var qs = LAB_DATA[n];
  if (!qs || !qs.length) return;
  LAB.questions = qs.slice().sort(function(){ return Math.random() - .5; });
  LAB.cur = 0; LAB.ans = []; LAB.answered = false;

  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('on'); });
  var btn = document.getElementById('labchbtn' + n);
  if (btn) btn.classList.add('on');

  var welcome = document.getElementById('labWelcome');
  var area    = document.getElementById('lqArea');
  if (welcome) welcome.style.display = 'none';
  if (area)    area.style.display = 'block';
  renderLabQ();
}

function renderLabQ() {
  var q    = LAB.questions[LAB.cur];
  var isHe = LANG === 'he';
  var qText = isHe ? q.q : (q.q_en || q.q);
  var aList = isHe ? q.a : (q.a_en || q.a);
  var eText = isHe ? q.e : (q.e_en || q.e);
  var tot  = LAB.questions.length;
  var ch   = CHAPTERS.find(function(c){ return c.n === LAB.ch; });
  var data = LANG === 'he' ? ch.he : ch.en;
  LAB.answered = false;

  var pips = '';
  for (var i = 0; i < tot; i++) {
    var cls = i < LAB.cur ? (LAB.ans[i]===1?' ok':' bad') : i===LAB.cur?' cur':'';
    pips += '<div class="lq-pip'+cls+'"></div>';
  }

  var idx  = [0,1,2,3].sort(function(){ return Math.random()-.5; });
  var shuf = idx.map(function(j){ return aList[j]; });
  var newC = idx.indexOf(q.c);
  var LBL  = LANG === 'he' ? ['א','ב','ג','ד'] : ['A','B','C','D'];

  var optsHtml = '';
  for (var j = 0; j < 4; j++) {
    optsHtml += '<button class="lq-opt" data-i="'+j+'" data-c="'+newC+'">' +
      '<span class="lq-lbl">'+LBL[j]+'</span>' +
      '<span class="lq-txt">'+shuf[j]+'</span>' +
      '<span class="lq-ic"></span></button>';
  }

  var snipHtml = q.snip
    ? '<div class="lq-snip"><div class="lqs-bar"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div><div class="lqs-body">'+q.snip+'</div></div>'
    : '';

  var ok       = LAB.ans.filter(function(x){ return x===1; }).length;
  var scoreL   = LANG === 'he' ? 'נכון' : 'correct';
  var restartL = LANG === 'he' ? '↺ התחל מחדש' : '↺ Restart';
  var nextL    = LANG === 'he' ? '← הבא' : 'Next →';

  document.getElementById('lqArea').innerHTML =
    '<div class="lq-header">' +
      '<div class="lq-ch-icon">'+ch.icon+'</div>' +
      '<div><div class="lq-ch-name">'+data.name+'</div>' +
        '<div class="lq-ch-num">'+String(LAB.ch).padStart(2,'0')+' / 12</div></div>' +
      '<div class="lq-spacer"></div>' +
      '<div class="lq-scorebox"><div class="lq-sv" id="lqSv">'+ok+' / '+LAB.cur+'</div><div class="lq-sl">'+scoreL+'</div></div>' +
    '</div>' +
    '<div class="lq-pips">'+pips+'</div>' +
    '<div class="lq-card" id="lqCard">' +
      '<div class="lq-meta"><span class="lq-num">'+(LAB.cur+1)+' / '+tot+'</span><span class="lq-cat">'+q.cat+'</span></div>' +
      snipHtml +
      '<div class="lq-q">'+qText+'</div>' +
      '<div class="lq-opts" id="lqOpts">'+optsHtml+'</div>' +
      '<div class="lq-exp" id="lqExp"><div class="lq-exp-lbl" id="lqExpLbl"></div><div class="lq-exp-txt" id="lqExpTxt"></div></div>' +
    '</div>' +
    '<div class="lq-foot">' +
      '<button class="lq-btn" onclick="startLab(LAB.ch)">'+restartL+'</button>' +
      '<button class="lq-btn next" id="lqNext" onclick="nextLabQ()" disabled>'+nextL+'</button>' +
    '</div>';

  document.querySelectorAll('.lq-opt').forEach(function(btn) {
    btn.addEventListener('click', onLabPick);
  });
}

function onLabPick(e) {
  if (LAB.answered) return;
  LAB.answered = true;
  var btn  = e.currentTarget;
  var pick = parseInt(btn.dataset.i);
  var corr = parseInt(btn.dataset.c);
  var ok   = pick === corr;
  LAB.ans.push(ok ? 1 : 0);

  document.querySelectorAll('.lq-opt').forEach(function(b, j) {
    b.disabled = true;
    if (j === corr) b.classList.add('correct');
    else if (j === pick) b.classList.add('wrong');
  });

  var q       = LAB.questions[LAB.cur];
  var expLbl  = document.getElementById('lqExpLbl');
  var expTxt  = document.getElementById('lqExpTxt');
  var ic      = btn.querySelector('.lq-ic');
  if (ic) ic.textContent = ok ? '✓' : '✗';
  if (expLbl) expLbl.textContent = ok ? (LANG==='he'?'✓ נכון!':'✓ Correct!') : (LANG==='he'?'✗ לא נכון':'✗ Wrong');
  if (expLbl) expLbl.className   = 'lq-exp-lbl ' + (ok ? 'ok' : 'bad');
  if (expTxt) expTxt.textContent = q.e;

  var sv = document.getElementById('lqSv');
  if (sv) sv.textContent = LAB.ans.filter(function(x){return x===1;}).length + ' / ' + LAB.ans.length;

  var next = document.getElementById('lqNext');
  if (next) next.disabled = false;

  if (ok) { XP += 5; localStorage.setItem('nw_xp', XP); document.getElementById('xpTotal').textContent = XP; }
  LAB.cur++;
}

function nextLabQ() {
  if (LAB.cur >= LAB.questions.length) { showLabResult(); return; }
  renderLabQ();
}

function showLabResult() {
  var ok  = LAB.ans.filter(function(x){ return x===1; }).length;
  var tot = LAB.questions.length;
  var pct = Math.round(ok/tot*100);
  var ch  = CHAPTERS.find(function(c){ return c.n === LAB.ch; });
  var data = LANG === 'he' ? ch.he : ch.en;

  labSave(LAB.ch, ok, tot);
  var lwfill = document.getElementById('lwbf' + LAB.ch);
  if (lwfill) lwfill.style.width = pct + '%';
  var lcbfill = document.getElementById('lcbf' + LAB.ch);
  if (lcbfill) lcbfill.style.width = pct + '%';
  updateLabOverall();
  XP += ok * 5; localStorage.setItem('nw_xp', XP);
  document.getElementById('xpTotal').textContent = XP;
  // Quiz labels
  var qzHomeH = document.getElementById('qzHomeH');
  var qzHomeP = document.getElementById('qzHomeP');
  var qzNavBtn = document.getElementById('quizNavBtn');
  if (qzHomeH) qzHomeH.textContent = isHe ? 'חידון טריוויה' : 'Trivia Quiz';
  if (qzHomeP) qzHomeP.textContent = isHe
    ? 'ענה על שאלות מהר ככל האפשר — כל שנייה שווה נקודות!'
    : 'Answer as fast as you can — every second counts!';
  if (qzNavBtn) qzNavBtn.textContent = isHe ? '⚡ חידון' : '⚡ Quiz';
  var lbl10 = document.getElementById('qzLbl10');
  var lbl20 = document.getElementById('qzLbl20');
  var lblAll = document.getElementById('qzLblAll');
  if (lbl10) lbl10.textContent  = isHe ? 'שאלות מהירות' : 'Quick Round';
  if (lbl20) lbl20.textContent  = isHe ? 'מרתון' : 'Marathon';
  if (lblAll) lblAll.textContent = isHe ? 'כל השאלות' : 'All Questions';
  var qzScoreLbl  = document.getElementById('qzScoreLbl');
  var qzStreakLbl = document.getElementById('qzStreakLbl');
  var qzNumLbl    = document.getElementById('qzNumLbl');
  var qzQuit      = document.getElementById('qzQuit');
  if (qzScoreLbl)  qzScoreLbl.textContent  = isHe ? 'ניקוד' : 'Score';
  if (qzStreakLbl) qzStreakLbl.textContent  = isHe ? 'רצף'   : 'Streak';
  if (qzNumLbl)    qzNumLbl.textContent     = isHe ? 'שאלה'  : 'Q';

  var grade  = pct>=90?'S':pct>=80?'A':pct>=70?'B':pct>=60?'C':'D';
  var arcOff = 314 * (1 - pct/100);
  var arcCol = pct>=80 ? '#15803d' : pct>=60 ? '#a16207' : '#c2410c';
  var titles = LANG==='he'
    ? ['עוד לא שם... 📖','מתקדם! 💪','כל הכבוד! 🎯','מצוין! 🏆']
    : ['Keep practicing! 📖','Getting there! 💪','Well done! 🎯','Excellent! 🏆'];
  var tier = pct>=90?3:pct>=70?2:pct>=50?1:0;
  var againL  = LANG==='he' ? '↺ שחק שוב' : '↺ Play Again';
  var nextChL = LANG==='he' ? 'פרק '+(LAB.ch+1)+' →' : 'Ch '+(LAB.ch+1)+' →';
  var backL   = LANG==='he' ? '← חזרה' : '← Back';

  document.getElementById('lqArea').innerHTML =
    '<div class="lq-result">' +
      '<div class="lqr-ring"><svg viewBox="0 0 110 110"><circle class="lqr-bg" cx="55" cy="55" r="50"/><circle class="lqr-arc" id="lqrArc" cx="55" cy="55" r="50" stroke="'+arcCol+'"/></svg>' +
        '<div class="lqr-inner"><div class="lqr-pct">'+pct+'%</div><div class="lqr-grade">'+grade+'</div></div></div>' +
      '<div class="lqr-title">'+titles[tier]+'</div>' +
      '<div class="lqr-sub">'+data.name+' · '+ok+'/'+tot+'</div>' +
      '<div class="lqr-stats">' +
        '<div class="lqrs"><div class="lqrs-v" style="color:var(--gr)">'+ok+'</div><div class="lqrs-l">'+(LANG==='he'?'נכון':'correct')+'</div></div>' +
        '<div class="lqrs"><div class="lqrs-v" style="color:var(--ac2)">'+(tot-ok)+'</div><div class="lqrs-l">'+(LANG==='he'?'שגוי':'wrong')+'</div></div>' +
        '<div class="lqrs"><div class="lqrs-v">'+pct+'%</div><div class="lqrs-l">'+(LANG==='he'?'ציון':'score')+'</div></div>' +
      '</div>' +
      '<div class="lqr-btns">' +
        '<button class="lqr-replay" onclick="startLab(LAB.ch)">'+againL+'</button>' +
        (LAB.ch < 12
          ? '<button class="lqr-back" onclick="'+(isTerminalChapter(LAB.ch+1)?'startTerminal':'startLab')+'('+(LAB.ch+1)+')">'+nextChL+'</button>'
          : '<button class="lqr-back" onclick="goToLabWelcome()">'+backL+'</button>') +
      '</div>' +
    '</div>';

  setTimeout(function() {
    var arc = document.getElementById('lqrArc');
    if (arc) arc.style.strokeDashoffset = arcOff;
  }, 100);
}

function labGetSaved(n) {
  var raw = localStorage.getItem('nw_lab_' + n);
  return raw ? JSON.parse(raw) : null;
}

function labSave(n, ok, total) {
  localStorage.setItem('nw_lab_' + n, JSON.stringify({ ok: ok, total: total }));
}

   INIT
══════════════════════════════════════════ */
buildLandGrid();
buildSidebar();
buildLabSidebar();
buildLabWelcome();
applyLangUI();
initQuiz();


/* ═══════════════════════════════════════════
   MOBILE SIDEBAR — Networks Course
═══════════════════════════════════════════ */
function isMobWidth() { return window.innerWidth <= 768; }

function openMobSidebar(id) {
  var sb = document.getElementById(id);
  var ov = document.getElementById('mobOverlay');
  if (sb) { sb.classList.add('open'); sb.style.display = 'block'; }
  if (ov) ov.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeMobSidebar() {
  ['lSidebar','labSb'].forEach(function(id) {
    var sb = document.getElementById(id);
    if (sb) { sb.classList.remove('open'); if (isMobWidth()) sb.style.display = ''; }
  });
  var ov = document.getElementById('mobOverlay');
  if (ov) ov.classList.remove('show');
  document.body.style.overflow = '';
}

function injectNetworksMobileToggles() {
  if (!isMobWidth()) return;

  // Learn sidebar toggle
  var lc = document.getElementById('lContent');
  if (lc && !document.getElementById('netLearnToggle')) {
    var btn = document.createElement('button');
    btn.id = 'netLearnToggle';
    btn.className = 'sb-mob-toggle';
    var isHe = (typeof LANG !== 'undefined') ? LANG === 'he' : true;
    btn.innerHTML = '📚 <span id="netLearnToggleLbl">' + (isHe ? 'בחר פרק' : 'Choose chapter') + '</span><span class="sb-mob-toggle-arrow">▾</span>';
    btn.onclick = function() { openMobSidebar('lSidebar'); };
    lc.insertBefore(btn, lc.firstChild);
  }

  // Lab sidebar toggle
  var labMain = document.getElementById('labMain');
  if (labMain && !document.getElementById('netLabToggle')) {
    var btn2 = document.createElement('button');
    btn2.id = 'netLabToggle';
    btn2.className = 'sb-mob-toggle';
    var isHe2 = (typeof LANG !== 'undefined') ? LANG === 'he' : true;
    btn2.innerHTML = '🧪 <span id="netLabToggleLbl">' + (isHe2 ? 'בחר פרק' : 'Choose chapter') + '</span><span class="sb-mob-toggle-arrow">▾</span>';
    btn2.onclick = function() { openMobSidebar('labSb'); };
    labMain.insertBefore(btn2, labMain.firstChild);
  }
}

// Patch goTo to close sidebar + inject toggles
(function() {
  var _goTo = typeof goTo === 'function' ? goTo : null;
  if (_goTo) {
    goTo = function(screen) {
      _goTo(screen);
      closeMobSidebar();
      setTimeout(injectNetworksMobileToggles, 80);
    };
  }
})();

// Patch loadCh to close sidebar on mobile
(function() {
  var _loadCh = typeof loadCh === 'function' ? loadCh : null;
  if (_loadCh) {
    loadCh = function(n) {
      _loadCh(n);
      if (isMobWidth()) closeMobSidebar();
    };
  }
})();

// Patch startLab
(function() {
  var _startLab = typeof startLab === 'function' ? startLab : null;
  if (_startLab) {
    startLab = function(n) {
      _startLab(n);
      if (isMobWidth()) closeMobSidebar();
    };
  }
})();

// Toggle label update on lang change
(function() {
  var _applyLangUI = typeof applyLangUI === 'function' ? applyLangUI : null;
  if (_applyLangUI) {
    applyLangUI = function() {
      _applyLangUI();
      var isHe = (typeof LANG !== 'undefined') ? LANG === 'he' : true;
      var tl = document.getElementById('netLearnToggleLbl');
      var ll = document.getElementById('netLabToggleLbl');
      if (tl) tl.textContent = isHe ? 'בחר פרק' : 'Choose chapter';
      if (ll) ll.textContent = isHe ? 'בחר פרק' : 'Choose chapter';
    };
  }
})();

// Resize handler
window.addEventListener('resize', function() {
  if (!isMobWidth()) {
    closeMobSidebar();
    var sb  = document.getElementById('lSidebar');
    var lsb = document.getElementById('labSb');
    if (sb)  { sb.style.display  = ''; sb.classList.remove('open'); }
    if (lsb) { lsb.style.display = ''; lsb.classList.remove('open'); }
  }
});

// Swipe gestures
(function() {
  var sx = 0;
  document.addEventListener('touchstart', function(e) { sx = e.touches[0].clientX; }, {passive:true});
  document.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - sx;
    var screen = document.querySelector('.screen.active, section.active');
    if (!screen) return;
    var sid = screen.id;
    if (dx > 60 && sx < 30) {
      if (sid === 'learn') openMobSidebar('lSidebar');
      if (sid === 'lab')   openMobSidebar('labSb');
    }
    if (dx < -60) closeMobSidebar();
  }, {passive:true});
})();

// Init on load
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(injectNetworksMobileToggles, 200);
});


/* Auto-navigate to chapter 2 */
setTimeout(function(){ goTo('learn'); loadCh(2); }, 200);
