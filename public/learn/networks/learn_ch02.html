<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רשתות מחשבים Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════ RESET + TOKENS ══════════════ */
:root {
  /* ── Palette: clean blue-slate ── */
  --bg:      #f8f9fc;
  --surface: #ffffff;
  --border:  #e2e8f0;
  --border2: #cbd5e1;
  --ink:     #0f172a;
  --ink2:    #1e293b;
  --dim:     #475569;
  --dim2:    #94a3b8;
  --ac:      #2563eb;
  --ac-h:    #1d4ed8;
  --ac-lt:   #eff6ff;
  --gr:      #16a34a;
  --gr-lt:   #f0fdf4;
  --rd:      #dc2626;
  --rd-lt:   #fef2f2;
  --yw:      #d97706;
  --yw-lt:   #fffbeb;
  --pu:      #7c3aed;
  --code-bg: #1e293b;

  /* ── Fonts: normal, readable ── */
  --f-body:  'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --f-mono:  'Fira Code', 'Consolas', 'Monaco', monospace;
  --f-serif: 'Inter', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-body);
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════ SCREENS ══════════════ */
.screen { display: none; }
.screen.on { display: block; }

/* ══════════════ NAV ══════════════ */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center;
  padding: 0 20px;
  height: 54px;
  background: #ffffff;
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  gap: 4px;
}
.nav-logo {
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.01em;
  margin-inline-end: 20px;
}
.nav-logo i { font-style: italic; color: var(--ac); }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab {
  background: none; border: none; cursor: pointer;
  padding: 6px 14px;
  font-size: .875rem;
  font-weight: 500;
  color: var(--dim);
  border-radius: 6px;
  transition: background .15s, color .15s;
  font-family: var(--f-body);
}
.nav-tab:hover { background: var(--ac-lt); color: var(--ac); }
.nav-tab.on { background: var(--ac); color: #fff; }
.nav-tab:hover { color: var(--ink); border-color: var(--border); }
.nav-tab.on { color: var(--ac); border-color: var(--ac); background: rgba(26,86,219,.06); }
.nav-xp {
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--yw);
  background: rgba(161,98,7,.08);
  border: 1.5px solid rgba(161,98,7,.22);
  padding: 4px 12px;
  border-radius: 6px;
  margin-right: 12px;
}
.nav-lang {
  font-family: var(--f-mono);
  font-size: 10px;
  font-weight: 700;
  padding: 4px 10px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: none;
  color: var(--dim);
  cursor: pointer;
  transition: all .14s;
  margin-right: 8px;
}
.nav-lang:hover { color: var(--ink); border-color: var(--border2); }

/* ══════════════ LANDING ══════════════ */
#landing { min-height: 100vh; }
.land-hero {
  max-width: 980px; margin: 0 auto;
  padding: 72px 28px 56px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px; align-items: start;
}
@media(max-width:700px){ .land-hero{grid-template-columns:1fr; padding:40px 20px 32px; gap:32px;} }

.hero-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .12em;
  color: #93c5fd;
  text-transform: uppercase;
}
.hero-h {
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -.02em;
  color: #ffffff;
  margin: 12px 0 16px;
}
.hero-h i { font-style: italic; color: var(--ac); }
.hero-p {
  font-size: 1.05rem;
  color: #bfdbfe;
  margin-bottom: 28px;
}

.hero-stats { display: flex; gap: 24px; margin-bottom: 28px; }
.hs { border-right: 2px solid var(--border); padding-right: 16px; }
.hs:first-child { border-right: none; padding-right: 0; }
.hs-n { font-family: var(--f-serif); font-size: 28px; color: var(--ink); line-height: 1; }
.hs-l { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); letter-spacing: 1px; margin-top: 2px; }

.hero-btn {
  font-family: var(--f-body);
  font-size: 14px; font-weight: 700;
  padding: 11px 26px; border-radius: 8px;
  border: none; cursor: pointer;
  background: var(--ink); color: #fff;
  transition: opacity .14s;
  display: inline-block;
}
.hero-btn:hover { opacity: .85; }

/* Chapter grid on landing */
.land-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.land-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s, border-color .15s;
  border-top: 3px solid var(--cc, var(--ac));
}
.land-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
  border-top-color: var(--cc);
}
.land-card::before {
  content: '';
  position: absolute; top: 0; right: 0; width: 3px; bottom: 0;
  background: var(--cc, var(--border));
  transition: width .15s;
}
.land-card:hover { border-color: var(--cc,var(--border)); transform: translateX(-2px); }
.land-card:hover::before { width: 5px; }
.lc-num { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); letter-spacing: 2px; margin-bottom: 4px; }
.lc-icon { font-size: 18px; margin-bottom: 6px; display: block; }
.lc-name { font-size: 12px; font-weight: 600; color: var(--ink); line-height: 1.3; }

/* ══════════════ LEARN ══════════════ */
#learn { min-height: 100vh; }
.learn-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  max-width: 1020px;
  margin: 0 auto;
  min-height: calc(100vh - 52px);
}
@media(max-width:680px) { .learn-layout { grid-template-columns: 1fr; } }

/* Sidebar */
.l-sb {
  width: 220px;
  min-width: 220px;
  background: var(--surface);
  border-inline-end: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}
.l-sb::-webkit-scrollbar { width: 3px; }
.l-sb::-webkit-scrollbar-thumb { background: var(--border); }
.sb-label {
  font-family: var(--f-mono); font-size: 9px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--dim2);
  padding: 0 14px; margin-bottom: 6px; display: block;
}
.sb-ch {
  width: 100%; text-align: right;
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; background: none; border: none;
  border-right: 3px solid transparent;
  font-family: var(--f-body); font-size: 12px; font-weight: 500;
  color: var(--dim); cursor: pointer; transition: all .12s;
}
.sb-ch:hover { color: var(--ink); background: rgba(0,0,0,.03); }
.sb-ch.on { color: var(--ac); border-color: var(--ac); background: rgba(26,86,219,.04); }
.sb-ch-n { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); min-width: 18px; }

.sb-secs { display: none; }
.sb-secs.open { display: block; }
.sb-sec {
  width: 100%; text-align: right;
  display: flex; align-items: center; gap: 6px;
  padding: 4px 14px 4px 20px;
  background: none; border: none;
  font-family: var(--f-body); font-size: 11px;
  color: var(--dim2); cursor: pointer; transition: all .11s;
}
.sb-sec:hover { color: var(--ink); }
.sb-sec.on { color: var(--ac); font-weight: 600; }
.sb-sec::before { content: '·'; color: var(--dim2); font-size: 14px; }

/* Reading bar */
#rbar {
  position: fixed; top: 52px; right: 220px; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--ac), var(--ac2));
  width: 0%; z-index: 100; transition: width .15s;
}

/* Content area */
.l-content { padding: 44px 52px 100px; max-width: 720px; }
@media(max-width:860px) { .l-content { padding: 28px 22px 80px; } }

/* Chapter header */
.ch-tag { font-family: var(--f-mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim2); margin-bottom: 8px; display: block; }
.ch-h { font-family: var(--f-serif); font-size: clamp(28px,4vw,44px); line-height: 1.1; letter-spacing: -1px; color: var(--ink); margin-bottom: 10px; }
.ch-desc { font-size: 14px; color: var(--dim); line-height: 1.7; margin-bottom: 4px; }
hr.divider { border: none; border-top: 1.5px solid var(--border); margin: 28px 0; }

/* Learn sections */
.learn-section {
  padding: 32px 0 24px;
  border-bottom: 1px solid var(--border);
}
.learn-section:last-child { border-bottom: none; }
.sec-label {
  display: inline-block;
  font-size: .7rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ac);
  margin-bottom: 4px;
}
.sec-h {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--ink);
  margin: 6px 0 14px;
  letter-spacing: -.01em;
}
p { color: var(--ink2); line-height: 1.85; margin-bottom: 12px; }
p strong { color: var(--ink); font-weight: 700; }
code { font-family: var(--f-mono); font-size: 12px; background: var(--border); color: var(--ac); padding: 1px 5px; border-radius: 4px; }

/* Tables */
.tbl { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13.5px; }
.tbl th { background: var(--border); color: var(--ink); font-weight: 700; padding: 8px 13px; border: 1.5px solid var(--border); text-align: right; font-size: 12px; }
.tbl td { padding: 8px 13px; border: 1.5px solid var(--border); color: var(--ink2); vertical-align: top; line-height: 1.55; }
.tbl tr:nth-child(even) td { background: var(--bg); }
.tbl td:first-child { font-family: var(--f-mono); font-size: 12px; color: var(--ac); white-space: nowrap; font-weight: 600; }

/* Code blocks */
.code-block {
  background: var(--code-bg);
  border-radius: 10px;
  overflow: hidden;
  margin: 16px 0;
  font-family: var(--f-mono);
  font-size: .82rem;
}
.code-bar { display: flex; align-items: center; gap: 5px; padding: 7px 13px; background: rgba(255,255,255,.04); border-bottom: 1px solid rgba(255,255,255,.07); }
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
.code-title { font-family: var(--f-mono); font-size: 10px; color: rgba(255,255,255,.35); margin-right: auto; }
pre.code-body { padding: 13px 15px; font-family: var(--f-mono); font-size: 13px; line-height: 1.9; color: #cdd6f4; white-space: pre-wrap; }
.kw { color: #89b4fa; } .st { color: #a6e3a1; } .nu { color: #fab387; }
.cm { color: #6c7086; font-style: italic; } .fn { color: #f5c2e7; }

/* Callouts */
.callout { border-radius: 9px; padding: 11px 15px; margin: 14px 0; border: 1.5px solid; font-size: 13.5px; line-height: 1.65; }
.callout.tip  { background: #f0fdf4; border-color: #bbf7d0; color: #14532d; }
.callout.note {
  background: #eff6ff;
  border-inline-start: 3px solid #2563eb;
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  font-size: .88rem;
  margin: 14px 0;
  color: var(--ink2);
}
.callout.warn {
  background: #fffbeb;
  border-inline-start: 3px solid #d97706;
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  font-size: .88rem;
  margin: 14px 0;
  color: var(--ink2);
}

/* Diagrams */
.diagram { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 16px 18px; margin: 14px 0; direction: ltr; }
.dg-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.dg-box { padding: 8px 13px; border-radius: 8px; font-size: 12.5px; font-weight: 600; text-align: center; line-height: 1.35; white-space: nowrap; }
.dg-box.b  { background: #dbeafe; color: #1e40af; border: 1.5px solid #bfdbfe; }
.dg-box.g  { background: #dcfce7; color: #14532d; border: 1.5px solid #bbf7d0; }
.dg-box.gr { background: #f1f5f9; color: #334155; border: 1.5px solid #cbd5e1; }
.dg-box.p  { background: #ede9fe; color: #4c1d95; border: 1.5px solid #c4b5fd; }
.dg-arr { font-family: var(--f-mono); font-size: 12px; color: var(--dim); white-space: nowrap; }

/* Chapter nav */
.ch-nav { display: flex; gap: 10px; margin-top: 52px; padding-top: 22px; border-top: 1.5px solid var(--border); align-items: center; }
.ch-nav-btn { font-family: var(--f-mono); font-size: 11px; padding: 8px 16px; border-radius: 7px; border: 1.5px solid var(--border); background: var(--surface); color: var(--dim); cursor: pointer; transition: all .13s; }
.ch-nav-btn:hover { border-color: var(--ac); color: var(--ac); }
.ch-nav-btn.next { background: var(--ink); color: #fff; border-color: var(--ink); }
.ch-nav-btn.next:hover { opacity: .85; }

/* ══════════════ LAB ══════════════ */
#lab { min-height: 100vh; }
/* removed */
@media(max-width:680px) { /* removed */ }

.lab-sb {
  background: var(--bg);
  border-left: 1.5px solid var(--border);
  padding: 0;
  position: sticky; top: 52px;
  height: calc(100vh - 52px);
  overflow-y: auto;
}
.lab-sb::-webkit-scrollbar { width: 3px; }
.lab-sb::-webkit-scrollbar-thumb { background: var(--border); }
.lab-sb-head { padding: 16px 14px 12px; border-bottom: 1.5px solid var(--border); }
.lab-sb-title { font-family: var(--f-serif); font-size: 15px; color: var(--ink); }
.lab-sb-sub { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); margin-top: 2px; }
.lab-sb-prog { height: 2.5px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 8px; }
.lab-sb-prog-fill { height: 100%; background: var(--gr); border-radius: 99px; transition: width .5s; }

.lab-ch-btn {
  width: 100%; text-align: right;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; background: none; border: none;
  border-right: 3px solid transparent;
  cursor: pointer; transition: all .12s;
}
.lab-ch-btn:hover { background: rgba(0,0,0,.03); }
.lab-ch-btn.on { background: rgba(21,128,61,.05); border-color: var(--gr); }
.lcb-icon { font-size: 15px; flex-shrink: 0; }
.lcb-info { flex: 1; }
.lcb-name { font-size: 12px; font-weight: 600; color: var(--ink); }
.lcb-bar { height: 2px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 3px; }
.lcb-bar-fill { height: 100%; background: var(--gr); border-radius: 99px; transition: width .4s; }
.lcb-score { font-family: var(--f-mono); font-size: 10px; font-weight: 600; color: var(--dim2); flex-shrink: 0; }
.lcb-score.done { color: var(--gr); }

/* Lab main */
/* removed */
@media(max-width:860px){ /* removed */ }

/* Welcome */
.lab-welcome { text-align: center; padding: 56px 20px; }
.lw-icon { font-size: 44px; margin-bottom: 14px; }
.lw-h { font-family: var(--f-serif); font-size: 28px; color: var(--ink); margin-bottom: 8px; }
.lw-p { color: var(--dim); font-size: 14px; margin-bottom: 32px; }
.lw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 9px; max-width: 640px; margin: 0 auto; }
.lw-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--cc, var(--ac));
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  text-align: center;
}
.lw-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.09); }
.lw-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2.5px; background: var(--cc, var(--border)); }
.lw-card:hover { border-color: var(--cc, var(--ac)); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.08); }
.lwc-n { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); letter-spacing: 2px; }
.lwc-icon { font-size: 18px; margin: 5px 0; display: block; }
.lwc-name { font-size: 11.5px; font-weight: 600; color: var(--ink); }
.lwc-bar { height: 2px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 7px; }
.lwc-bar-fill { height: 100%; background: var(--gr); border-radius: 99px; }

/* Quiz area */
.lq-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1.5px solid var(--border); }
.lq-ch-icon { font-size: 22px; }
.lq-ch-name { font-family: var(--f-serif); font-size: 20px; color: var(--ink); }
.lq-ch-num { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); margin-top: 1px; }
.lq-spacer { flex: 1; }
.lq-scorebox { text-align: center; background: var(--border); border: 1.5px solid var(--border); border-radius: 9px; padding: 8px 16px; }
.lq-sv { font-family: var(--f-mono); font-size: 17px; font-weight: 700; color: var(--ink); }
.lq-sl { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); }

/* Pips */
.lq-pips { display: flex; gap: 3px; margin-bottom: 18px; flex-wrap: wrap; }
.lq-pip { width: 18px; height: 5px; border-radius: 99px; background: var(--border); transition: background .2s; }
.lq-pip.ok  { background: var(--gr); }
.lq-pip.bad { background: var(--ac2); }
.lq-pip.cur { background: var(--ac); }

/* Question card */
.lq-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 13px; padding: 22px; margin-bottom: 12px; animation: lqIn .22s ease; }
@keyframes lqIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.lq-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }
.lq-num  { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); }
.lq-cat  { font-family: var(--f-mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; background: rgba(26,86,219,.07); border: 1.5px solid rgba(26,86,219,.18); color: var(--ac); }
.lq-q { font-size: 15.5px; font-weight: 600; color: var(--ink); line-height: 1.55; }

/* Code snip in question */
.lq-snip { background: var(--code-bg); border-radius: 8px; overflow: hidden; margin-bottom: 12px; direction: ltr; text-align: left; }
.lqs-bar { display: flex; gap: 4px; padding: 6px 11px; background: rgba(255,255,255,.04); }
.lqs-body { padding: 10px 13px; font-family: var(--f-mono); font-size: 12.5px; line-height: 1.85; color: #cdd6f4; }

/* Options */
.lq-opts { display: flex; flex-direction: column; gap: 7px; margin-top: 14px; }
.lq-opt {
  display: flex; align-items: center; gap: 12px;
  width: 100%; background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 9px; padding: 12px 14px;
  cursor: pointer; text-align: start;
  font-family: var(--f-body); font-size: .9rem;
  transition: border-color .15s, background .15s;
  margin-bottom: 8px;
}
.lq-opt:hover:not(:disabled) { border-color: var(--ac); background: var(--ac-lt); }
.lq-opt.correct { border-color: var(--gr); background: var(--gr-lt); }
.lq-opt.wrong   { border-color: var(--rd); background: var(--rd-lt); }
.lq-opt:hover:not(.done) { border-color: var(--ac); background: rgba(26,86,219,.04); }
.lq-opt.done { cursor: default; }
.lq-opt.correct { background: #f0fdf4; border-color: var(--gr); }
.lq-opt.correct .lq-lbl { background: var(--gr); border-color: var(--gr); color: #fff; }
.lq-opt.wrong   { background: #fff1f1; border-color: var(--ac2); }
.lq-opt.reveal  { background: #f0fdf4; border-color: rgba(21,128,61,.35); }
.lq-opt.done:not(.correct):not(.wrong):not(.reveal) { opacity: .45; }
.lq-lbl { font-family: var(--f-mono); font-size: 10px; font-weight: 700; width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--border); border: 1.5px solid var(--border); color: var(--dim); margin-top: 1px; transition: all .13s; }
.lq-txt { flex: 1; font-size: 13.5px; color: var(--ink2); line-height: 1.5; font-weight: 400; }

/* Explanation */

@keyframes expIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
.lq-exp.ok  { background: #f0fdf4; border-color: #bbf7d0; }
.lq-exp.bad { background: #fff1f1; border-color: #fecaca; }
.lq-exp-lbl { font-family: var(--f-mono); font-size: 10px; letter-spacing: 2px; font-weight: 700; margin-bottom: 5px; }

/* Lab footer */

.lq-btn:disabled { opacity: .3; cursor: default; }

.lq-btn.next:hover:not(:disabled) { opacity: .85; }

/* Result */

.lqr-ring { width: 110px; height: 110px; margin: 0 auto 18px; position: relative; }

.lqr-bg  { fill: none; stroke: var(--border); stroke-width: 9; }
.lqr-arc { fill: none; stroke-width: 9; stroke-linecap: round; stroke-dasharray: 314; stroke-dashoffset: 314; transition: stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1); }
.lqr-inner { position: absolute; inset: 14px; border-radius: 50%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
.lqr-pct   { font-family: var(--f-serif); font-size: 24px; color: var(--ink); }
.lqr-grade { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); letter-spacing: 2px; }
.lqr-title { font-family: var(--f-serif); font-size: 22px; color: var(--ink); margin-bottom: 6px; }
.lqr-sub   { font-size: 13px; color: var(--dim); margin-bottom: 22px; }
.lqr-stats { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
.lqrs { background: var(--border); border: 1.5px solid var(--border); border-radius: 9px; padding: 10px 16px; min-width: 66px; text-align: center; }
.lqrs-v { font-family: var(--f-mono); font-size: 18px; font-weight: 700; }
.lqrs-l { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); margin-top: 1px; }
.lqr-btns { display: flex; gap: 9px; justify-content: center; }
.lqr-replay { font-family: var(--f-body); font-size: 13px; font-weight: 700; padding: 9px 22px; border-radius: 7px; border: none; cursor: pointer; background: var(--ink); color: #fff; transition: opacity .13s; }
.lqr-replay:hover { opacity: .85; }
.lqr-back { font-family: var(--f-body); font-size: 13px; font-weight: 500; padding: 9px 18px; border-radius: 7px; cursor: pointer; border: 1.5px solid var(--border); background: none; color: var(--dim); transition: all .13s; }
.lqr-back:hover { border-color: var(--ac); color: var(--ac); }

/* XP pop */

}
.land-hero > div:first-child {
  padding: 60px 40px;
  background: linear-gradient(150deg, #0f172a 0%, #1e3a5f 55%, #1e40af 100%);
  color: #f8fafc;
  display: flex; flex-direction: column; justify-content: center;
  min-width: 320px;
}
.hero-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: #fff; color: #1d4ed8;
  font-weight: 700; font-size: .95rem;
  padding: 11px 26px; border-radius: 8px;
  border: none; cursor: pointer;
  box-shadow: 0 2px 10px rgba(0,0,0,.2);
  transition: transform .15s, box-shadow .15s;
  font-family: var(--f-body); margin-top: 8px;
}
.hero-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,0,0,.25); }
.hero-tag { font-size: .7rem; font-weight: 700; letter-spacing: .12em; color: #93c5fd; text-transform: uppercase; }
.hero-h { font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 800; line-height: 1.1; letter-spacing: -.02em; color: #fff; margin: 10px 0 12px; }
.hero-h i { color: #93c5fd; font-style: normal; }
.hero-p { font-size: .95rem; color: #bfdbfe; margin-bottom: 20px; }
.hero-stats { display: flex; gap: 20px; margin-bottom: 24px; }
.hs-n { font-size: 1.4rem; font-weight: 800; color: #fff; }
.hs-l { font-size: .65rem; letter-spacing: .1em; color: #93c5fd; font-weight: 600; }
.land-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px; padding: 24px; align-content: start;
  overflow-y: auto; background: var(--bg);
}
@media (max-width: 700px) {
  .land-hero { grid-template-columns: 1fr; }
  .land-hero > div:first-child { min-width: 0; padding: 36px 20px; }
  .land-grid { grid-template-columns: repeat(2, 1fr); }
}



/* ══ LAB LAYOUT FIX ══ */
section#lab {
  height: calc(100vh - 52px);
  overflow: hidden;
}
.lab-layout {
  display: grid !important;
  grid-template-columns: 220px 1fr !important;
  height: 100% !important;
  overflow: hidden;
}
.lab-sb {
  height: 100%;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.lab-main {
  height: 100%;
  overflow-y: auto;
  padding: 0 !important;
  position: relative;
}
.lab-welcome {
  padding: 32px;
  height: 100%;
  overflow-y: auto;
  box-sizing: border-box;
}
#lqArea {
  display: none;
  height: 100%;
  overflow-y: auto;
}
.trm-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 16px;
  padding: 16px;
  height: 100%;
  box-sizing: border-box;
  min-height: 0;
}
.trm-missions {
  height: fit-content;
  max-height: 100%;
  overflow-y: auto;
}
.trm-wrap {
  display: flex;
  flex-direction: column;
  min-height: 0;
  height: 100%;
  max-height: calc(100vh - 100px);
}
.trm-body {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  padding: 12px 14px;
}
/* MCQ inside lqArea */
.lq-header {
  position: sticky;
  top: 0;
  z-index: 5;
  background: var(--surface);
}
.lq-foot {
  position: sticky;
  bottom: 0;
  background: var(--surface);
  z-index: 5;
}

/* ══ TERMINAL v2 — Linux look ══ */
.trm-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 0;
  height: 100%;
  min-height: 0;
}
.trm-missions {
  background: #0d1117;
  border-inline-end: 1px solid #21262d;
  padding: 12px;
  overflow-y: auto;
  height: 100%;
  box-sizing: border-box;
}
.trm-m-title {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #8b949e;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #21262d;
}
.trm-mission {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 7px 8px;
  border-radius: 6px;
  margin-bottom: 4px;
  font-size: .78rem;
  line-height: 1.4;
  color: #8b949e;
  border: 1px solid transparent;
  transition: background .15s;
  cursor: default;
}
.trm-mission:not(.done):hover { background: #161b22; border-color: #30363d; }
.trm-mission.done {
  color: #238636;
  text-decoration: line-through;
  opacity: .7;
}
.trm-m-num {
  font-size: .68rem;
  font-weight: 700;
  color: #388bfd;
  min-width: 14px;
  flex-shrink: 0;
}
.trm-m-text { flex: 1; }
.trm-m-check { color: #238636; margin-inline-start: auto; }

/* Terminal window */
.trm-wrap {
  background: #0d1117;
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 0;
  font-family: 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
}
.trm-top {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: #161b22;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
}
.trm-title {
  flex: 1;
  text-align: center;
  font-size: .75rem;
  color: #8b949e;
  font-family: 'Inter', sans-serif;
}
.trm-os-badge {
  font-size: .65rem;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 3px;
  margin-inline-start: 6px;
}
.trm-os-badge.linux  { background: #1c4b27; color: #3fb950; }
.trm-os-badge.python { background: #1c3149; color: #388bfd; }
.trm-os-badge.scapy  { background: #2d1f4e; color: #bc8cff; }
.trm-clear {
  background: none;
  border: 1px solid #30363d;
  color: #8b949e;
  font-size: .7rem;
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: background .15s;
}
.trm-clear:hover { background: #21262d; color: #e6edf3; }

/* Body */
.trm-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  min-height: 0;
  scroll-behavior: smooth;
}
.trm-line {
  font-size: .82rem;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-all;
  color: #e6edf3;
}
.trm-comment { color: #8b949e; }
.trm-dim     { color: #6e7681; }
.trm-cmd     { color: #e6edf3; }
.trm-out     { color: #cdd9e5; }
.trm-mission-ok { }
.trm-success     { color: #3fb950; font-weight: 600; }
.trm-success-all { color: #f0883e; font-weight: 700; }

/* Shell prompt colors */
.trm-user   { color: #3fb950; font-weight: 600; }
.trm-at     { color: #8b949e; }
.trm-host   { color: #388bfd; font-weight: 600; }
.trm-colon  { color: #8b949e; }
.trm-path   { color: #79c0ff; }
.trm-dollar { color: #e6edf3; }

/* Python prompt */
.trm-py-prompt { color: #bc8cff; font-weight: 600; }

/* Input row */
.trm-input-row {
  display: flex;
  align-items: center;
  padding: 6px 12px;
  background: #161b22;
  border-top: 1px solid #21262d;
  gap: 6px;
  flex-shrink: 0;
}
.trm-prompt-sh {
  font-size: .82rem;
  white-space: nowrap;
  flex-shrink: 0;
}
.trm-prompt-py {
  color: #bc8cff;
  font-size: .82rem;
  white-space: nowrap;
  flex-shrink: 0;
  font-weight: 600;
}
.trm-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #e6edf3;
  font-family: 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  font-size: .82rem;
  caret-color: #3fb950;
  min-width: 0;
}
.trm-input::placeholder { color: #484f58; }
.trm-run {
  background: #238636;
  border: none;
  color: #fff;
  font-size: .75rem;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s;
}
.trm-run:hover { background: #2ea043; }
.trm-enter { font-size: .85rem; }

/* Hint row */
.trm-hint-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 12px;
  background: #0d1117;
  border-top: 1px solid #161b22;
  flex-shrink: 0;
}
.trm-hint-btn {
  background: none;
  border: 1px solid #30363d;
  color: #8b949e;
  font-size: .72rem;
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: background .15s;
}
.trm-hint-btn:hover { background: #161b22; color: #e6edf3; }
.trm-hint-txt {
  color: #f0883e;
  font-size: .78rem;
  font-family: 'Fira Code', 'JetBrains Mono', monospace;
  opacity: 0;
  transition: opacity .3s;
}

/* ══ QUIZ ══ */
section#quiz { height: calc(100vh - 52px); overflow: hidden; }
.quiz-layout { height: 100%; display: flex; flex-direction: column; }

/* Home screen */
.quiz-home {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; text-align: center; gap: 16px;
}
.quiz-home-icon { font-size: 3rem; }
.quiz-home-h { font-size: 1.6rem; font-weight: 800; color: var(--ink); }
.quiz-home-p { font-size: .95rem; color: var(--dim); max-width: 400px; }
.quiz-home-modes { display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }
.qz-mode-btn {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 20px 28px;
  background: var(--surface); border: 2px solid var(--border);
  border-radius: 14px; cursor: pointer; transition: all .15s;
  font-family: var(--f-body); min-width: 120px;
}
.qz-mode-btn:hover { border-color: var(--ac); background: var(--ac-lt); transform: translateY(-2px); }
.qz-mode-icon { font-size: 1.5rem; }
.qz-mode-n { font-size: 1.8rem; font-weight: 800; color: var(--ac); }
.qz-mode-l { font-size: .78rem; color: var(--dim); font-weight: 600; }
.quiz-best {
  font-size: .85rem; color: var(--dim);
  padding: 6px 16px; background: var(--bg);
  border-radius: 20px; border: 1px solid var(--border);
}

/* Game */
.quiz-game {
  flex: 1; display: flex; flex-direction: column;
  min-height: 0; background: var(--bg);
}

/* HUD */
.quiz-hud {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.qz-hud-left, .qz-hud-right { display: flex; gap: 16px; align-items: center; min-width: 100px; }
.qz-hud-right { justify-content: flex-end; }
.qz-stat { text-align: center; }
.qz-stat-v { display: block; font-size: 1.1rem; font-weight: 800; color: var(--ink); }
.qz-stat-l { display: block; font-size: .65rem; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }

/* Timer */
.qz-timer-wrap { position: relative; width: 44px; height: 44px; }
.qz-timer-svg { transform: rotate(-90deg); width: 44px; height: 44px; }
.qz-timer-bg  { fill: none; stroke: var(--border); stroke-width: 4; }
.qz-timer-arc {
  fill: none; stroke: #3fb950; stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 113.1; stroke-dashoffset: 0;
  transition: stroke-dashoffset .9s linear, stroke .3s;
}
.qz-timer-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem; font-weight: 800; color: #e6edf3;
}
.qz-quit-btn {
  background: none; border: 1px solid var(--border);
  color: var(--dim); width: 28px; height: 28px;
  border-radius: 50%; cursor: pointer; font-size: .8rem;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.qz-quit-btn:hover { background: var(--rd-lt); color: var(--rd); border-color: var(--rd); }

/* Question area */
.quiz-q-area {
  flex: 1; overflow-y: auto; padding: 20px 24px 24px;
  display: flex; flex-direction: column; gap: 12px;
  max-width: 720px; margin: 0 auto; width: 100%;
  box-sizing: border-box;
}
.qz-cat {
  font-size: .72rem; font-weight: 700; color: var(--ac);
  text-transform: uppercase; letter-spacing: .08em;
}
.qz-q {
  font-size: 1.05rem; font-weight: 700; color: var(--ink);
  line-height: 1.45;
}
.qz-snip {
  background: var(--code-bg); border-radius: 8px;
  padding: 10px 12px; font-family: var(--f-mono);
  font-size: .78rem; color: #e2e8f0;
  overflow-x: auto;
}
.qz-opts { display: flex; flex-direction: column; gap: 8px; }
.qz-opt {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 9px; padding: 10px 14px; cursor: pointer;
  font-family: var(--f-body); font-size: .9rem; text-align: start;
  transition: border-color .12s, background .12s;
}
.qz-opt:hover:not(:disabled) { border-color: var(--ac); background: var(--ac-lt); }
.qz-opt.correct { border-color: var(--gr); background: var(--gr-lt); }
.qz-opt.wrong   { border-color: var(--rd); background: var(--rd-lt); }
.qz-opt:disabled { cursor: default; }
.qz-lbl {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--border); color: var(--dim);
  font-size: .72rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.qz-opt.correct .qz-lbl { background: var(--gr); color: #fff; }
.qz-opt.wrong   .qz-lbl { background: var(--rd); color: #fff; }
.qz-txt { flex: 1; line-height: 1.4; }

/* Feedback */
.qz-feedback { display: none; }
.qz-fb-top {
  font-size: 1rem; font-weight: 700; padding: 8px 12px;
  border-radius: 8px; margin-bottom: 8px;
}
.qz-fb-top.ok  { background: var(--gr-lt); color: var(--gr); }
.qz-fb-top.bad { background: var(--rd-lt); color: var(--rd); }
.qz-pts { font-size: .85rem; background: rgba(0,0,0,.08); padding: 1px 6px; border-radius: 20px; margin-inline-start: 6px; }
.qz-fb-exp {
  font-size: .85rem; color: var(--dim); line-height: 1.55;
  padding: 8px 12px; background: var(--bg);
  border-radius: 8px; border: 1px solid var(--border);
  margin-bottom: 10px;
}
.qz-next-btn {
  background: var(--ac); color: #fff; border: none;
  padding: 10px 24px; border-radius: 8px; cursor: pointer;
  font-family: var(--f-body); font-size: .9rem; font-weight: 600;
  transition: background .15s;
}
.qz-next-btn:hover { background: var(--ac-h); }

/* Result */
.quiz-result {
  flex: 1; display: none; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; text-align: center; gap: 16px;
}
.qzr-ring { position: relative; width: 130px; height: 130px; }
.qzr-ring svg { transform: rotate(-90deg); width: 130px; height: 130px; }
.qzr-bg  { fill: none; stroke: var(--border); stroke-width: 8; }
.qzr-arc { fill: none; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 314; stroke-dashoffset: 314; transition: stroke-dashoffset 1s ease; }
.qzr-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.qzr-pct   { font-size: 1.5rem; font-weight: 800; color: var(--ink); }
.qzr-grade { font-size: .9rem; font-weight: 700; color: var(--dim); }
.qzr-title { font-size: 1.2rem; font-weight: 700; }
.qzr-stats { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.qzrs      { text-align: center; }
.qzrs-v    { font-size: 1.4rem; font-weight: 800; }
.qzrs-l    { font-size: .68rem; color: var(--dim); text-transform: uppercase; letter-spacing: .05em; }
.qzr-score { font-size: 1rem; font-weight: 700; color: var(--ac); }
.qzr-btns  { display: flex; gap: 12px; }
.qzr-btn-again {
  background: var(--ac); color: #fff; border: none;
  padding: 10px 22px; border-radius: 8px; cursor: pointer;
  font-family: var(--f-body); font-size: .9rem; font-weight: 600;
}
.qzr-btn-home {
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--dim); padding: 10px 22px; border-radius: 8px;
  cursor: pointer; font-family: var(--f-body); font-size: .9rem;
}

/* ══ RTL fixes ══ */
.code-block, pre.code-body, .code-body {
  direction: ltr;
  text-align: left;
  unicode-bidi: embed;
}
.diagram {
  direction: ltr;
  text-align: left;
}
.tbl {
  direction: inherit;
}
.tbl th, .tbl td {
  text-align: start;
}

/* ═══════════════════════════════════════════
   NETWORKS COURSE — RESPONSIVE
   Breakpoints: 1024px | 768px | 480px
═══════════════════════════════════════════ */

/* ── TABLET (≤1024px) ── */
@media (max-width: 1024px) {
  .land-hero {
    grid-template-columns: 1fr;
    padding: 48px 32px 40px;
    gap: 28px;
    text-align: center;
  }
  .land-hero > div:first-child { min-width: 0; }
  .land-grid { grid-template-columns: repeat(3, 1fr); }
  .l-content { padding: 32px 28px 80px; }
  .lab-layout { grid-template-columns: 200px 1fr; }
  .learn-layout { grid-template-columns: 200px 1fr; }
}

/* ── MOBILE (≤768px) ── */
@media (max-width: 768px) {
  /* NAV */
  .nav {
    padding: 0 8px;
    gap: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .nav-logo { font-size: .85rem; white-space: nowrap; flex-shrink: 0; }
  .nav-tab  { font-size: .72rem; padding: 4px 9px; white-space: nowrap; flex-shrink: 0; }
  .nav-right, .nav-actions { gap: 5px; }
  .lang-btn { font-size: .68rem; padding: 3px 8px; }
  .xp-pill, .xp-badge { font-size: .68rem; padding: 2px 8px; }

  /* HERO */
  .land-hero {
    grid-template-columns: 1fr;
    padding: 28px 16px 32px;
    gap: 20px;
    text-align: center;
  }
  .land-hero > div:first-child { min-width: 0; }
  .hero-h { font-size: clamp(1.7rem, 7vw, 2.4rem); }
  .hero-p { font-size: .9rem; }
  .hero-stats { justify-content: center; flex-wrap: wrap; gap: 16px; }
  .hero-cta, .hero-btn { width: 100%; max-width: 260px; }

  /* LAND GRID */
  .land-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .land-card { padding: 12px 10px; }

  /* LEARN LAYOUT — sidebar hidden, full width */
  .learn-layout {
    display: block;
    max-width: 100%;
  }
  .l-sb {
    display: none;
    position: fixed;
    top: 52px;
    inset-inline-start: 0;
    inset-inline-end: 0;
    bottom: 0;
    width: 100% !important;
    min-width: 0 !important;
    z-index: 200;
    height: calc(100vh - 52px);
    border: none;
    border-bottom: 1px solid var(--border);
    overflow-y: auto;
  }
  .l-sb.open { display: block; }
  .l-content {
    padding: 16px 14px 60px;
    max-width: 100%;
  }

  /* LAB LAYOUT */
  .lab-layout {
    display: block;
    height: auto;
  }
  section#lab {
    height: auto;
    overflow: visible;
  }
  .lab-sb {
    display: none;
    position: fixed;
    top: 52px;
    left: 0; right: 0; bottom: 0;
    width: 100% !important;
    z-index: 200;
    height: calc(100vh - 52px);
    overflow-y: auto;
    border: none;
  }
  .lab-sb.open { display: block; }
  #labMain {
    height: auto;
    overflow: visible;
    padding: 16px 14px;
  }

  /* MOBILE SIDEBAR TOGGLE */
  .sb-mob-toggle {
    display: flex !important;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: var(--f-body, sans-serif);
    font-size: .82rem;
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .sb-mob-toggle-arrow { margin-inline-start: auto; }

  /* OVERLAY */
  .mob-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 199;
  }
  .mob-overlay.show { display: block; }

  /* TABLES */
  .tbl, table.tbl {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    min-width: 0;
    width: 100%;
  }
  .tbl th, .tbl td,
  table.tbl th, table.tbl td {
    font-size: .78rem;
    padding: 6px 10px;
    min-width: 72px;
    white-space: normal;

var TERM = {

function isTerminalChapter(n) {

}

function startTerminal(n) {
  TERM.ch = n;
  TERM.cmdHistory = [];
  TERM.histIdx = -1;

  var welcome = document.getElementById('labWelcome');
  var area    = document.getElementById('lqArea');
  if (welcome) welcome.style.display = 'none';
  if (area)    area.style.display    = 'block';

  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('on'); });
  var btn = document.getElementById('labchbtn' + n);
  if (btn) btn.classList.add('on');

  renderTerminal(n);
}

function getPrompt(n) {
  var td = TERMINAL_DATA[n];
  if (!td) return '$ ';
  if (td.os === 'python' || td.os === 'scapy') return '>>> ';
  return td.prompt || 'student@net-lab:~$ ';
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearTerminal() {
  var body = document.getElementById('trmBody');

    body.innerHTML = '<div class="trm-line trm-comment">── ' + title + ' ──</div>';
  }
}

function showTermHint() {
  var td   = TERMINAL_DATA[TERM.ch];
  if (!td) return;
  var isHe = LANG === 'he';
  var undone = td.missions.filter(function(m){
    return !TERM.doneMissions['ch' + TERM.ch + '_' + m.id];
  });

  printTermLine('<span style="color:#f0883e;font-weight:600">' + (isHe ? '💡 גלה לי:' : '💡 Show me:') + '</span>', 'trm-comment');

  } else {
    printTermLine('<span class="trm-user">student</span><span class="trm-at">@</span><span class="trm-host">net-lab</span><span class="trm-colon">:</span><span class="trm-path">~</span><span class="trm-dollar">$</span> <span style="color:#79c0ff">' + escH(firstCmd) + '</span>', 'trm-cmd');
  }
  if (explain) {
    printTermLine('<span style="color:#8b949e;font-style:italic"># ' + escH(explain) + '</span>', 'trm-comment');
  }

function onTermKey(e) {
  var inp = document.getElementById('trmInput');
  if (!inp) return;
  if (e.key === 'Enter') { runTermCmd(); return; }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (TERM.histIdx < TERM.cmdHistory.length - 1) TERM.histIdx++;
    inp.value = TERM.cmdHistory[TERM.cmdHistory.length - 1 - TERM.histIdx] || '';
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (TERM.histIdx > 0) { TERM.histIdx--; inp.value = TERM.cmdHistory[TERM.cmdHistory.length - 1 - TERM.histIdx] || ''; }
    else { TERM.histIdx = -1; inp.value = ''; }
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    // simple tab completion
    var val = inp.value.trim();
    var td  = TERMINAL_DATA[TERM.ch];
    if (!td || !val) return;
    var allCmds = [];
    td.missions.forEach(function(m){ allCmds = allCmds.concat(Object.keys(m.cmds)); });
    var match = allCmds.filter(function(c){ return c.indexOf(val) === 0; });
    if (match.length === 1) inp.value = match[0];
  }
}

function printTermLine(htmlContent, cls) {
  var body = document.getElementById('trmBody');
  if (!body) return;
  var d = document.createElement('div');
  d.className = 'trm-line' + (cls ? ' ' + cls : '');
  d.innerHTML = htmlContent;
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
}

function lookupCmd(cmd, n) {
  var td = TERMINAL_DATA[n];
  if (!td) return null;
  var cmdL = cmd.trim().replace(/\s+/g, ' ');
  var cmdLow = cmdL.toLowerCase();

  /* exact match first */
  for (var i = 0; i < td.missions.length; i++) {
    var m = td.missions[i];
    for (var key in m.cmds) {
      if (key.trim().replace(/\s+/g,' ') === cmdL) return { out: m.cmds[key], mission: m };
    }
  }
  /* case-insensitive */
  for (var i = 0; i < td.missions.length; i++) {
    var m = td.missions[i];
    for (var key in m.cmds) {
      if (key.trim().toLowerCase().replace(/\s+/g,' ') === cmdLow) return { out: m.cmds[key], mission: m };
    }
  }
  /* prefix match on first word */
  var firstWord = cmdLow.split(' ')[0];
  for (var i = 0; i < td.missions.length; i++) {
    var m = td.missions[i];
    for (var key in m.cmds) {
      if (key.trim().toLowerCase().split(' ')[0] === firstWord) {
        return { out: m.cmds[key], mission: m };
      }
    }
  }
  return null;
}

function unknownOutput(cmd, td) {
  var c = cmd.trim().split(' ')[0];
  if (td.os === 'python' || td.os === 'scapy') {
    return 'Traceback (most recent call last):\n  File "<stdin>", line 1\nNameError: name \'' + c + '\' is not defined';
  }
  return c + ': command not found';
}

function runTermCmd() {
  var inp = document.getElementById('trmInput');
  if (!inp) return;
  var cmd = inp.value.trim();
  if (!cmd) return;
  inp.value = '';
  TERM.histIdx = -1;
  TERM.cmdHistory.push(cmd);
  if (TERM.cmdHistory.length > 200) TERM.cmdHistory.shift();

  var td = TERMINAL_DATA[TERM.ch];
  if (!td) return;

  var isHe = LANG === 'he';

  /* Render input line */
  if (td.os === 'python' || td.os === 'scapy') {
    printTermLine('<span class="trm-py-prompt">&gt;&gt;&gt; </span>' + escH(cmd), 'trm-cmd');
  } else {
    printTermLine(
      '<span class="trm-user">student</span>' +
      '<span class="trm-at">@</span>' +
      '<span class="trm-host">net-lab</span>' +
      '<span class="trm-colon">:</span>' +
      '<span class="trm-path">~</span>' +
      '<span class="trm-dollar">$</span> ' + escH(cmd),
      'trm-cmd'
    );
  }

  /* Builtins */
  if (cmd === 'clear' || cmd === 'reset') { clearTerminal(); return; }
  if (cmd === 'exit' || cmd === 'quit()') {
    printTermLine(isHe ? 'logout' : 'logout', 'trm-dim'); return;
  }
  if (cmd === 'help' || cmd === '--help' || cmd === 'man') {
    printTermLine(isHe ? '# לחץ 💡 לרמז על הפקודה הבאה' : '# Press 💡 for a hint on the next command', 'trm-comment');
    return;
  }
  if (cmd === 'ls' || cmd === 'ls -la') {
    printTermLine('total 32\ndrwxr-xr-x 2 student student 4096 Mar 25 14:00 .\ndrwxr-xr-x 8 student student 4096 Mar 25 14:00 ..\n-rw-r--r-- 1 student student  612 Mar 25 14:00 server.py\n-rw-r--r-- 1 student student  234 Mar 25 14:00 client.py\n-rw-r--r-- 1 student student 1024 Mar 25 14:00 server_select.py'.replace(/\n/g,'<br>'), 'trm-out');
    return;
  }
  if (cmd === 'pwd') { printTermLine('/home/student', 'trm-out'); return; }
  if (cmd === 'whoami') { printTermLine('student', 'trm-out'); return; }
  if (cmd === 'uname -a') {
    printTermLine('Linux net-lab 5.15.0-105-generic #115-Ubuntu SMP Mon Apr 15 09:52:04 UTC 2024 x86_64 x86_64 x86_64 GNU/Linux', 'trm-out');
    return;
  }

  /* Lookup */
  var result = lookupCmd(cmd, TERM.ch);
  var out;
  if (result !== null) {
    out = result.out;
    checkMissionDone(result.mission, td);
  } else {
    out = unknownOutput(cmd, td);
  }

  if (out && out.length > 0) {
    printTermLine(escH(out).replace(/\n/g, '<br>'), 'trm-out');
  }
}

function checkMissionDone(mission, td) {
  var key = 'ch' + TERM.ch + '_' + mission.id;
  if (TERM.doneMissions[key]) return;
  TERM.doneMissions[key] = true;

  var el = document.getElementById('trmmis_' + key);
  if (el) {
    el.classList.add('done');
    var chk = document.createElement('span');
    chk.className = 'trm-m-check';
    chk.textContent = '✓';
    el.appendChild(chk);
  }

  XP += 10;
  localStorage.setItem('nw_xp', XP);
  var xpEl = document.getElementById('xpTotal');
  if (xpEl) xpEl.textContent = XP;

  printTermLine(
    '<span class="trm-success">✓ ' +
    (LANG === 'he' ? 'משימה הושלמה!' : 'Mission complete!') +
    ' +10 XP</span>',
    'trm-mission-ok'
  );

  /* Check all missions done */
  var allDone = td.missions.every(function(m){
    return !!TERM.doneMissions['ch' + TERM.ch + '_' + m.id];
  });
  if (allDone) {
    printTermLine(
      '<span class="trm-success-all">🎉 ' +
      (LANG === 'he' ? 'כל המשימות הושלמו! +50 XP בונוס' : 'All missions complete! +50 XP bonus') +
      '</span>',
      'trm-mission-ok'
    );
    XP += 50;
    localStorage.setItem('nw_xp', XP);
    if (xpEl) xpEl.textContent = XP;
  }
}

  times:      []   // time taken per question
};
var QUIZ_TIME = 15; // seconds per question

/* ── helpers ── */
function qzShuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function qzAllQuestions() {
  var all = [];
  for (var n = 1; n <= 12; n++) {
    var qs = LAB_DATA[n] || [];
    qs.forEach(function(q) {
      all.push({ n: n, q: q });
    });
  }
  return all;
}

/* ── start ── */
function startQuiz(count) {
  var all = qzShuffle(qzAllQuestions());
  QUIZ.questions = count === 'all' ? all : all.slice(0, Math.min(count, all.length));
  QUIZ.total     = QUIZ.questions.length;
  QUIZ.cur       = 0;
  QUIZ.score     = 0;
  QUIZ.streak    = 0;
  QUIZ.maxStreak = 0;
  QUIZ.correct   = 0;
  QUIZ.times     = [];

  document.getElementById('quizHome').style.display   = 'none';
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizGame').style.display   = 'flex';

  renderQuizQ();
}

function quitQuiz() {
  clearInterval(QUIZ.timer);
  document.getElementById('quizGame').style.display = 'none';
  document.getElementById('quizHome').style.display = 'flex';
}

/* ── render question ── */
function renderQuizQ() {
  var isHe = LANG === 'he';
  if (QUIZ.cur >= QUIZ.questions.length) { showQuizResult(); return; }

  var item = QUIZ.questions[QUIZ.cur];
  var q    = item.q;
  var ch   = CHAPTERS.find(function(c){ return c.n === item.n; });
  var data = LANG === 'he' ? ch.he : ch.en;
  var isHe = LANG === 'he';

  QUIZ.answered = false;
  QUIZ.timeLeft = QUIZ_TIME;

  /* HUD */
  document.getElementById('qzScore').textContent  = QUIZ.score;
  document.getElementById('qzStreak').textContent = QUIZ.streak > 0 ? '🔥' + QUIZ.streak : '0';
  document.getElementById('qzNum').textContent    = (QUIZ.cur + 1) + ' / ' + QUIZ.total;

  /* Category */
  document.getElementById('qzCat').textContent = ch.icon + ' ' + data.name + (q.cat ? ' · ' + (LANG==='he' ? q.cat : (q.cat_en || q.cat)) : '');

  /* Question */
  document.getElementById('qzQ').textContent = isHe ? q.q : (q.q_en || q.q);

  /* Snippet */
  var qArea = document.getElementById('quizQArea');
  var snipEl = qArea.querySelector('.qz-snip');
  if (snipEl && snipEl.remove) snipEl.remove();
  if (q.snip) {
    var snip = document.createElement('div');
    snip.className = 'qz-snip';
    snip.innerHTML = q.snip;
    qArea.insertBefore(snip, document.getElementById('qzOpts'));
  }

  /* Options — shuffle */
  var idx   = qzShuffle([0,1,2,3]);
  var newC  = idx.indexOf(q.c);
  var LBL   = isHe ? ['א','ב','ג','ד'] : ['A','B','C','D'];
  var opts  = document.getElementById('qzOpts');
  opts.innerHTML = '';
  idx.forEach(function(origI, j) {
    var btn = document.createElement('button');
    btn.className = 'qz-opt';
    btn.dataset.correct = (origI === q.c) ? '1' : '0';
    btn.innerHTML =
      '<span class="qz-lbl">' + LBL[j] + '</span>' +
      '<span class="qz-txt">' + (isHe ? q.a : (q.a_en || q.a))[origI] + '</span>';
    btn.onclick = function() { onQuizPick(btn, q); };
    opts.appendChild(btn);
  });

  /* Feedback */
  document.getElementById('qzFeedback').innerHTML = '';
  document.getElementById('qzFeedback').style.display = 'none';

  /* Timer */
  clearInterval(QUIZ.timer);
  updateTimerArc(QUIZ_TIME);
  document.getElementById('qzTimerNum').textContent = QUIZ_TIME;
  var startTime = Date.now();

  QUIZ.timer = setInterval(function() {
    QUIZ.timeLeft--;
    document.getElementById('qzTimerNum').textContent = QUIZ.timeLeft;
    updateTimerArc(QUIZ.timeLeft);

    if (QUIZ.timeLeft <= 5) {
      document.getElementById('qzTimerNum').style.color = '#f85149';
    } else {
      document.getElementById('qzTimerNum').style.color = '#e6edf3';
    }

    if (QUIZ.timeLeft <= 0) {
      clearInterval(QUIZ.timer);
      if (!QUIZ.answered) {
        QUIZ.answered = true;
        QUIZ.times.push(QUIZ_TIME);
        onTimeout(q);
      }
    }
  }, 1000);

  QUIZ._startTime = Date.now();
}

function updateTimerArc(t) {
  var arc = document.getElementById('qzTimerArc');
  if (!arc) return;
  var pct    = t / QUIZ_TIME;
  var circum = 2 * Math.PI * 18; // r=18
  arc.style.strokeDashoffset = circum * (1 - pct);
  arc.style.stroke = t > 8 ? '#3fb950' : t > 4 ? '#f0883e' : '#f85149';
}

/* ── pick ── */
function onQuizPick(btn, q) {
  if (QUIZ.answered) return;
  QUIZ.answered = true;
  clearInterval(QUIZ.timer);

  var elapsed  = (Date.now() - QUIZ._startTime) / 1000;
  QUIZ.times.push(Math.min(elapsed, QUIZ_TIME));

  var correct  = btn.dataset.correct === '1';
  var isHe     = LANG === 'he';

  /* Points: faster = more points */
  var pts = 0;
  if (correct) {
    pts = Math.max(10, Math.round(100 * (1 - elapsed / QUIZ_TIME)));
    QUIZ.score  += pts;
    QUIZ.streak++;
    QUIZ.correct++;
    if (QUIZ.streak > QUIZ.maxStreak) QUIZ.maxStreak = QUIZ.streak;
    if (QUIZ.streak > 1) pts += QUIZ.streak * 5; // streak bonus
  } else {
    QUIZ.streak = 0;
  }

  /* Highlight options */
  document.querySelectorAll('.qz-opt').forEach(function(b) {
    b.disabled = true;
    if (b.dataset.correct === '1') b.classList.add('correct');
    else if (b === btn && !correct) b.classList.add('wrong');
  });

  /* Feedback */
  var fb = document.getElementById('qzFeedback');
  fb.style.display = 'block';
  fb.innerHTML =
    '<div class="qz-fb-top ' + (correct ? 'ok' : 'bad') + '">' +
      (correct
        ? '✓ ' + (isHe ? 'נכון!' : 'Correct!') + ' <span class="qz-pts">+' + pts + '</span>'
        : '✗ ' + (isHe ? 'לא נכון' : 'Wrong')) +
    '</div>' +
    '<div class="qz-fb-exp">' + (q.e || '') + '</div>' +
    '<button class="qz-next-btn" onclick="nextQuizQ()">' +
      (QUIZ.cur + 1 < QUIZ.total
        ? (isHe ? 'הבאה ←' : 'Next →')
        : (isHe ? 'תוצאה 🏆' : 'Result 🏆')) +
    '</button>';

  document.getElementById('qzScore').textContent  = QUIZ.score;
  document.getElementById('qzStreak').textContent = QUIZ.streak > 0 ? '🔥' + QUIZ.streak : '0';

  QUIZ.cur++;
}

function onTimeout(q) {
  var isHe = LANG === 'he';
  QUIZ.streak = 0;
  document.querySelectorAll('.qz-opt').forEach(function(b) {
    b.disabled = true;
    if (b.dataset.correct === '1') b.classList.add('correct');
  });
  var fb = document.getElementById('qzFeedback');
  fb.style.display = 'block';
  fb.innerHTML =
    '<div class="qz-fb-top bad">⏰ ' + (isHe ? 'הזמן נגמר!' : 'Time\'s up!') + '</div>' +
    '<div class="qz-fb-exp">' + (q.e || '') + '</div>' +
    '<button class="qz-next-btn" onclick="nextQuizQ()">' +
      (QUIZ.cur + 1 < QUIZ.total
        ? (isHe ? 'הבאה ←' : 'Next →')
        : (isHe ? 'תוצאה 🏆' : 'Result 🏆')) +
    '</button>';
  QUIZ.cur++;
}

function nextQuizQ() {
  renderQuizQ();
}

/* ── result ── */
function showQuizResult() {
  clearInterval(QUIZ.timer);
  document.getElementById('quizGame').style.display = 'none';

  var isHe  = LANG === 'he';
  var pct   = Math.round(QUIZ.correct / QUIZ.total * 100);
  var avgT  = QUIZ.times.length
    ? Math.round(QUIZ.times.reduce(function(a,b){return a+b;},0) / QUIZ.times.length * 10) / 10
    : 0;

  /* Save best */
  var bestKey = 'nw_quiz_best';
  var prevBest = parseInt(localStorage.getItem(bestKey) || '0');
  if (QUIZ.score > prevBest) {
    localStorage.setItem(bestKey, QUIZ.score);
    prevBest = QUIZ.score;
  }

  /* XP */
  var xpGain = Math.round(QUIZ.score / 10);
  XP += xpGain;
  localStorage.setItem('nw_xp', XP);
  var xpEl = document.getElementById('xpTotal');
  if (xpEl) xpEl.textContent = XP;

  var grade  = pct>=90?'S':pct>=80?'A':pct>=70?'B':pct>=60?'C':'D';
  var arcOff = 2 * Math.PI * 50 * (1 - pct/100);

  var titles = isHe
    ? ['כמעט! 📖','מתקדם! 💪','כל הכבוד! 🎯','מהיר כברק! ⚡']
    : ['Keep trying! 📖','Good work! 💪','Well done! 🎯','Lightning fast! ⚡'];
  var tier = pct>=90?3:pct>=70?2:pct>=50?1:0;

  document.getElementById('quizResult').style.display = 'flex';
  document.getElementById('quizResult').innerHTML =
    '<div class="qzr-ring">' +
      '<svg viewBox="0 0 110 110"><circle class="qzr-bg" cx="55" cy="55" r="50"/>' +
      '<circle class="qzr-arc" id="qzrArc" cx="55" cy="55" r="50"/></svg>' +
      '<div class="qzr-inner"><div class="qzr-pct">' + pct + '%</div><div class="qzr-grade">' + grade + '</div></div>' +
    '</div>' +
    '<div class="qzr-title">' + titles[tier] + '</div>' +
    '<div class="qzr-stats">' +
      '<div class="qzrs"><div class="qzrs-v" style="color:#3fb950">' + QUIZ.correct + '</div><div class="qzrs-l">' + (isHe?'נכון':'correct') + '</div></div>' +
      '<div class="qzrs"><div class="qzrs-v" style="color:#f85149">' + (QUIZ.total-QUIZ.correct) + '</div><div class="qzrs-l">' + (isHe?'שגוי':'wrong') + '</div></div>' +
      '<div class="qzrs"><div class="qzrs-v" style="color:#f0883e">' + QUIZ.maxStreak + '</div><div class="qzrs-l">' + (isHe?'רצף':'streak') + '</div></div>' +
      '<div class="qzrs"><div class="qzrs-v">' + avgT + 's</div><div class="qzrs-l">' + (isHe?'ממוצע':'avg time') + '</div></div>' +
    '</div>' +
    '<div class="qzr-score">⚡ ' + QUIZ.score + ' ' + (isHe?'נקודות':'points') + ' · +' + xpGain + ' XP</div>' +
    '<div class="qzr-btns">' +
      '<button class="qzr-btn-again" onclick="startQuiz(' + QUIZ.total + ')">' + (isHe?'🔁 שחק שוב':'🔁 Play Again') + '</button>' +
      '<button class="qzr-btn-home" onclick="quitQuiz()">' + (isHe?'🏠 תפריט':'🏠 Menu') + '</button>' +
    '</div>';

  setTimeout(function() {
    var arc = document.getElementById('qzrArc');
    if (arc) {
      var circum = 2 * Math.PI * 50;
      arc.style.strokeDasharray  = circum;
      arc.style.strokeDashoffset = circum * (1 - pct/100);
      arc.style.stroke = pct>=80?'#3fb950':pct>=60?'#f0883e':'#f85149';
    }
  }, 100);

  /* Update best on home */
  updateQuizBest();
}

function updateQuizBest() {
  var best   = parseInt(localStorage.getItem('nw_quiz_best') || '0');
  var isHe   = LANG === 'he';
  var bestEl = document.getElementById('quizBest');

  }
}

/* Call on init */
function initQuiz() {
  updateQuizBest();
}

<section class="learn-section">
<span class="sec-label">01 — Socket</span>
<h2 class="sec-h">What is a Socket?</h2>
<p>A socket is a software endpoint for network communication — like a telephone handset. Two programs communicate by each opening a socket and connecting them together.</p>
<p>In Python: <code>import socket</code> gives access to the network. Every TCP connection requires two sockets — one on each end.</p>
<div class="callout tip">💡 <strong>Analogy:</strong> Socket = phone jack. IP = phone number. Port = extension number. You call a specific extension at a specific number.</div>
</section>

<section class="learn-section">
<span class="sec-label">02 — IP + Port</span>
<h2 class="sec-h">IP Address + Port Number</h2>
<p>Every network message needs two pieces of information: <strong>IP address</strong> (which machine) and <strong>Port</strong> (which application on that machine).</p>
<table class="tbl"><tr><th>Port</th><th>Service</th></tr>
<tr><td>80</td><td>HTTP (web)</td></tr>
<tr><td>443</td><td>HTTPS (secure web)</td></tr>
<tr><td>22</td><td>SSH (remote shell)</td></tr>
<tr><td>53</td><td>DNS</td></tr>
</table>
<div class="callout note">📝 Ports 0–1023 are <strong>Well-Known</strong> — require root/admin to bind. Ports 1024–65535 are available to any application.</div>
</section>

<div class="callout tip">💡 Always send <strong>bytes</strong> (b'...'), not strings. Use <code>.encode()</code> to convert string → bytes and <code>.decode()</code> for bytes → string.</div>

client_socket, addr = server.accept() <span class="cm"># BLOCKS until client connects</span>
<span class="kw">print</span>(<span class="st">f'Connected: </span>{addr}<span class="st">'</span>)
data = client_socket.recv(<span class="nu">1024</span>)
client_socket.send(<span class="st">b'Got it!'</span>)
client_socket.close()
server.close()</pre></div>
</section>

<section class="learn-section">
<span class="sec-label">05 — Empty recv()</span>
<h2 class="sec-h">What does empty recv() mean?</h2>
<p>When <code>recv()</code> returns <code>b''</code> (empty bytes) — the other side has <strong>closed the connection</strong>. This is not an error — it is the normal TCP close signal.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">Handling disconnect</span></div>
<pre class="code-body"><span class="kw">while True</span>:
    data = client_socket.recv(<span class="nu">1024</span>)
    <span class="kw">if</span> data == <span class="st">b''</span>:              <span class="cm"># client disconnected</span>
        client_socket.close()
        <span class="kw">break</span>
    <span class="kw">print</span>(<span class="st">'Received:'</span>, data.decode())</pre></div>
<div class="callout warn">⚠️ Never ignore empty recv(). If you do, select() will keep returning that socket as "readable" and you'll loop forever receiving empty data.</div>
</section>

<section class="learn-section">
<span class="sec-label">06 — Command Server</span>
<h2 class="sec-h">Request-Response Protocol</h2>
<p>A common pattern: client sends a command, server responds. This is how HTTP, FTP, and many custom protocols work.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">Command server pattern</span></div>
<pre class="code-body"><span class="kw">while True</span>:
    cmd = client.recv(<span class="nu">1024</span>).decode().strip()
    <span class="kw">if</span> cmd == <span class="st">'TIME'</span>:
        client.send(<span class="kw">str</span>(__import__(<span class="st">'time'</span>).time()).encode())
    <span class="kw">elif</span> cmd == <span class="st">'QUIT'</span>:
        client.close(); <span class="kw">break</span>
    <span class="kw">else</span>:
        client.send(<span class="st">b'UNKNOWN COMMAND'</span>)</pre></div>
</section>

<section class="learn-section">
<span class="sec-label">07 — Troubleshooting</span>
<h2 class="sec-h">Common Errors</h2>
<table class="tbl"><tr><th>Error</th><th>Cause</th><th>Fix</th></tr>
<tr><td><code>ConnectionRefusedError</code></td><td>No server listening on that port</td><td>Start server first, check correct port</td></tr>
<tr><td><code>Address already in use</code></td><td>Port taken from previous run</td><td>Add <code>SO_REUSEADDR</code> before bind()</td></tr>

<section class="learn-section">
<span class="sec-label">01 — 5-Layer Model</span>
<h2 class="sec-h">The 5-Layer TCP/IP Model</h2>
<p>The internet consists of billions of devices from different manufacturers all communicating seamlessly. This is possible because of the layered model — each layer does one job and talks to adjacent layers through defined interfaces.</p>
<table class="tbl"><tr><th>Layer</th><th>Name</th><th>Protocols</th><th>Device</th></tr>
<tr><td>5</td><td>Application</td><td>HTTP, DNS, FTP, SSH</td><td>Browser, App</td></tr>
<tr><td>4</td><td>Transport</td><td>TCP, UDP</td><td>OS</td></tr>
<tr><td>3</td><td>Network</td><td>IP, ICMP</td><td>Router</td></tr>
<tr><td>2</td><td>Data Link</td><td>Ethernet, WiFi, ARP</td><td>Switch, NIC</td></tr>

</table>
</section>

<section class="learn-section">
<span class="sec-label">02 — Encapsulation</span>
<h2 class="sec-h">Encapsulation — Wrapping Data</h2>
<p>As data travels down the layers, each layer <strong>wraps</strong> the data with its own header. This is called encapsulation. At the receiver, each layer <strong>unwraps</strong> its header (decapsulation).</p>
<div class="diagram"><div class="dg-row">
  <div class="dg-box b" style="font-size:11px">HTTP Data</div>

</div><div class="dg-row" style="margin-top:6px">

</div><div class="dg-row" style="margin-top:6px">
  <div class="dg-box p" style="font-size:11px">IP Packet</div>
  <div class="dg-arr">+Ethernet header ──▶</div>

<section class="learn-section">
<span class="sec-label">03 — Headers</span>

<table class="tbl"><tr><th>Layer</th><th>Unit</th><th>Header Contains</th></tr>

<div class="callout note">📝 <strong>Key insight:</strong> IP addresses (Layer 3) stay constant end-to-end. MAC addresses (Layer 2) change at every router hop.</div>
</section>

<section class="learn-section">
<span class="sec-label">04 — Wireshark</span>
<h2 class="sec-h">Wireshark — Packet Analyzer</h2>
<p>Wireshark captures live network traffic and displays it decoded by protocol. It puts the NIC into <strong>promiscuous mode</strong> — capturing all frames, not just those addressed to your machine.</p>
<p>Each row in Wireshark = one packet. Clicking a row shows all layers decoded: Frame → Ethernet → IP → TCP → HTTP.</p>
<div class="callout tip">💡 On a <strong>Switch</strong> you only see your own traffic + broadcasts. On a <strong>Hub</strong> you see everyone's traffic. For switch capture: use port mirroring (SPAN).</div>
</section>

<section class="learn-section">
<span class="sec-label">08 — Exam Questions</span>
<h2 class="sec-h">Common Exam Questions</h2>
<div class="callout note">❓ <strong>What is encapsulation?</strong><br>Each layer adds its own header to the data from the layer above. The result is nested headers. Decapsulation reverses this at the receiver.</div>
<div class="callout note">❓ <strong>What does promiscuous mode do?</strong><br>Tells the NIC to capture ALL frames on the network, not just those addressed to it. Required for Wireshark to see other machines' traffic.</div>

<tr><td>Application (5)</td><td>Application (7) + Presentation (6) + Session (5)</td></tr>

<section class="learn-section">
<span class="sec-label">01 — HTTP Request</span>
<h2 class="sec-h">HTTP Request Structure</h2>
<p>An HTTP request has three parts: <strong>Request Line</strong> (method + URL + version), <strong>Headers</strong>, and optionally a <strong>Body</strong>. The blank line separates headers from body.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">HTTP GET Request</span></div>
<pre class="code-body">GET /index.html HTTP/1.1\r\n
Host: www.example.com\r\n
User-Agent: Mozilla/5.0\r\n
Accept: text/html\r\n
\r\n
(no body for GET)</pre></div>
<table class="tbl"><tr><th>Method</th><th>Purpose</th><th>Has Body?</th></tr>
<tr><td>GET</td><td>Retrieve resource</td><td>No</td></tr>
<tr><td>POST</td><td>Submit data</td><td>Yes</td></tr>
<tr><td>PUT</td><td>Update resource</td><td>Yes</td></tr>
<tr><td>DELETE</td><td>Remove resource</td><td>No</td></tr>
<tr><td>HEAD</td><td>Headers only (no body)</td><td>No</td></tr>
</table>
<div class="callout note">📝 <code>\r\n</code> = CRLF (Carriage Return + Line Feed) — required by HTTP spec. Blank line (<code>\r\n\r\n</code>) marks end of headers.</div>
</section>

<section class="learn-section">
<span class="sec-label">02 — HTTP Response</span>
<h2 class="sec-h">HTTP Response Structure</h2>
<p>A response starts with the <strong>Status Line</strong>, then headers, then the body (HTML, JSON, image, etc.).</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">HTTP Response</span></div>
<pre class="code-body">HTTP/1.1 200 OK\r\n
Content-Type: text/html; charset=UTF-8\r\n
Content-Length: 1256\r\n
Date: Mon, 25 Mar 2026 14:00:00 GMT\r\n
\r\n
&lt;!DOCTYPE html&gt;
&lt;html&gt;...&lt;/html&gt;</pre></div>
<div class="callout tip">💡 <strong>Important headers:</strong> Content-Type (what type of data), Content-Length (size in bytes), Cache-Control (caching rules), Set-Cookie (create cookie).</div>
</section>

<section class="learn-section">
<span class="sec-label">03 — URL</span>
<h2 class="sec-h">URL Structure</h2>
<p>A URL (Uniform Resource Locator) identifies a specific resource on the web:</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">URL anatomy</span></div>
<pre class="code-body">https://www.example.com:443/path/page.html?key=val#section
^^^^^   ^^^^^^^^^^^^^^^ ^^^  ^^^^^^^^^^^^^^ ^^^^^^^^ ^^^^^^^
scheme  hostname        port path           query    fragment</pre></div>
<p><strong>Root Directory:</strong> The folder the server configured as the website base. A request to <code>/page.html</code> maps to <code>rootdir/page.html</code>. A request to <code>/</code> returns <code>index.html</code> by default.</p>
</section>

<section class="learn-section">
<span class="sec-label">04 — Status Codes</span>
<h2 class="sec-h">HTTP Status Codes</h2>
<table class="tbl"><tr><th>Code</th><th>Meaning</th><th>When</th></tr>
<tr><td><strong>200</strong></td><td>OK</td><td>Request succeeded</td></tr>
<tr><td><strong>201</strong></td><td>Created</td><td>POST created resource</td></tr>
<tr><td><strong>301</strong></td><td>Moved Permanently</td><td>HTTP→HTTPS redirect</td></tr>
<tr><td><strong>302</strong></td><td>Found (Temp Redirect)</td><td>Login redirects</td></tr>
<tr><td><strong>400</strong></td><td>Bad Request</td><td>Malformed syntax</td></tr>
<tr><td><strong>401</strong></td><td>Unauthorized</td><td>Authentication required</td></tr>
<tr><td><strong>403</strong></td><td>Forbidden</td><td>No permission</td></tr>
<tr><td><strong>404</strong></td><td>Not Found</td><td>Resource doesn't exist</td></tr>
<tr><td><strong>500</strong></td><td>Internal Server Error</td><td>Bug in server code</td></tr>
<tr><td><strong>503</strong></td><td>Service Unavailable</td><td>Overloaded / maintenance</td></tr>
</table>
<div class="callout tip">💡 <strong>Rule of thumb:</strong> 2xx = success, 3xx = redirect, 4xx = client error, 5xx = server error</div>
</section>

<section class="learn-section">
<span class="sec-label">05 — DNS Records</span>
<h2 class="sec-h">DNS Record Types</h2>
<table class="tbl"><tr><th>Record</th><th>Maps</th><th>Example</th></tr>
<tr><td><strong>A</strong></td><td>Domain → IPv4</td><td>google.com → 142.250.74.46</td></tr>
<tr><td><strong>AAAA</strong></td><td>Domain → IPv6</td><td>google.com → 2607:f8b0:...</td></tr>
<tr><td><strong>CNAME</strong></td><td>Alias → another domain</td><td>www.site.com → site.com</td></tr>
<tr><td><strong>MX</strong></td><td>Domain → mail server</td><td>example.com → mail.example.com</td></tr>
<tr><td><strong>TXT</strong></td><td>Domain → text</td><td>SPF, DKIM, verification</td></tr>
<tr><td><strong>NS</strong></td><td>Zone → nameservers</td><td>example.com → ns1.registrar.com</td></tr>
</table>
<div class="callout note">📝 DNS TTL (Time To Live) = how long to cache the result. Low TTL = quick updates, more queries. High TTL = fewer queries, slow to update.</div>
</section>

<span class="cm"># store = 0 → לא שמור בזיכרון</span>

sniff(
    lfilter=<span class="kw">lambda</span> p: DNS <span class="kw">in</span> p,
    prn=<span class="kw">lambda</span> p: p[DNS].qd.qname,
    store=<span class="nu">0</span>
)

<span class="cm"># שרשרת הקריאות:</span>
<span class="cm"># חבילה נלכדת → lfilter בודק → אם True → prn מופעל</span></pre></div>
</section>

<section class="learn-section">

<h2 class="sec-h">שליחה — Layer 3</h2>
<table class="tbl"><tr><th>פונקציה</th><th>Layer</th><th>מה עושה</th></tr>

</section>

<section class="learn-section">
<span class="sec-label">05 — sendp</span>
<h2 class="sec-h">sendp — שליחה Layer 2</h2>
<p><code>sendp()</code> שולח ברמת Layer 2 — כולל Ethernet header. מאפשר שליטה מלאה ב-MAC source/destination.</p>

sendp(pkt)

<span class="cm"># ההבדל: send() = Layer 3 (OS מוסיף Ethernet)</span>
<span class="cm">#         sendp() = Layer 2 (אתה שולט על Ethernet)</span></pre></div>
</section>

<section class="learn-section">
<span class="sec-label">01 — What is Scapy?</span>
<h2 class="sec-h">Scapy — Python Packet Crafter</h2>
<p>Scapy is a Python library that lets you <strong>build, send, receive, and analyze</strong> network packets at any layer — from Ethernet frames to HTTP requests. It bypasses the OS network stack, giving you full control over every bit.</p>
<div class="callout warn">⚠️ Scapy requires <strong>root/admin</strong> privileges because raw sockets need kernel-level access. Always run: <code>sudo scapy</code> or <code>sudo python3 script.py</code></div>
</section>

<section class="learn-section">
<span class="sec-label">02 — Building Packets</span>
<h2 class="sec-h">Building Packets — The / Operator</h2>
<p>Scapy uses <strong>/</strong> to stack protocol layers. Each layer wraps the one above it:</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">Scapy</span></div>
<pre class="code-body"><span class="kw">from</span> scapy.all <span class="kw">import</span> *

pkt = IP(dst=<span class="st">"1.2.3.4"</span>) / TCP(dport=<span class="nu">80</span>)   <span class="cm"># TCP SYN</span>
pkt = IP(dst=<span class="st">"8.8.8.8"</span>) / UDP(dport=<span class="nu">53</span>) / DNS(rd=<span class="nu">1</span>, qd=DNSQR(qname=<span class="st">"google.com"</span>))

pkt.show()   <span class="cm"># display all fields</span></pre></div>
</section>

<section class="learn-section">
<span class="sec-label">03 — sniff()</span>
<h2 class="sec-h">Capturing with sniff()</h2>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">sniff parameters</span></div>
<pre class="code-body"><span class="cm"># lfilter = Python function: True = capture, False = skip</span>
<span class="cm"># prn = callback for each captured packet</span>
<span class="cm"># count = how many (0 = infinite)</span>
<span class="cm"># store = 0 → don't keep in memory</span>

)
<span class="cm"># Flow: packet captured → lfilter checks → if True → prn called</span></pre></div>

<section class="learn-section">
<span class="sec-label">04 — send/sr/sr1</span>
<h2 class="sec-h">Sending — Layer 3</h2>
<table class="tbl"><tr><th>Function</th><th>Layer</th><th>What it does</th></tr>

<tr><td><code>sr(pkt)</code></td><td>L3</td><td>Send and receive multiple responses. Returns (answered, unanswered)</td></tr>
<tr><td><code>sr1(pkt)</code></td><td>L3</td><td>Send and wait for <strong>one response only</strong></td></tr>

<span class="kw">print</span>(resp[IP].src)   <span class="cm"># 8.8.8.8</span></pre></div>
</section>

<section class="learn-section">

sendp(pkt)

</section>

<section class="learn-section">
<span class="sec-label">01 — פורטים</span>
<h2 class="sec-h">פורטים — מזהה התוכנה</h2>

<section class="learn-section">
<span class="sec-label">02 — TCP vs UDP</span>
<h2 class="sec-h">TCP ו-UDP</h2>
<table class="tbl"><tr><th>תכונה</th><th>TCP</th><th>UDP</th></tr>
<tr><td>חיבור</td><td>מבוסס-חיבור (Handshake)</td><td>ללא חיבור</td></tr>
<tr><td>אמינות</td><td>מובטחת — ACK לכל packet</td><td>לא מובטחת</td></tr>
<tr><td>סדר</td><td>שמור — Seq numbers</td><td>לא מובטח</td></tr>
<tr><td>מהירות</td><td>איטי יותר (overhead)</td><td>מהיר</td></tr>

</table>
</section>

<section class="learn-section">
<span class="sec-label">03 — Three-Way Handshake</span>
<h2 class="sec-h">TCP Three-Way Handshake</h2>
<p>לפני שליחת נתונים ב-TCP — חייבים לבצע Handshake לפתיחת הקישור:</p>
<div class="diagram" style="direction:ltr;text-align:left">
<div style="padding:12px 16px;font-family:monospace;font-size:13px;line-height:2.2">
<div><span style="color:#3b82f6">Client</span> ──── SYN (seq=x) ──────────────▶ <span style="color:#10b981">Server</span></div>
<div><span style="color:#3b82f6">Client</span> ◀─── SYN+ACK (seq=y, ack=x+1) ── <span style="color:#10b981">Server</span></div>
<div><span style="color:#3b82f6">Client</span> ──── ACK (seq=x+1, ack=y+1) ──▶ <span style="color:#10b981">Server</span></div>
<div style="color:#6b7280;margin-top:8px">         ← Connection Established →</div>
</div></div>
<p>סגירת חיבור: ה-FIN flag. אחד הצדדים שולח FIN, השני עונה ACK + FIN, הראשון עונה ACK.</p>
</section>

<section class="learn-section">
<span class="sec-label">04 — Seq & ACK</span>
<h2 class="sec-h">Sequence & Acknowledgement Numbers</h2>
<p><strong>Seq</strong> = מספר ה-byte הראשון בסגמנט. <strong>ACK</strong> = ה-Seq הבא שמצפה לקבל (= Seq שהתקבל + גודל הנתונים).</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">דוגמה: שליחת "Hello" (5 bytes)</span></div>
<pre class="code-body">Client → Server: Seq=100, data="Hello" (5 bytes)
Server → Client: ACK=105  ← 100+5, "קיבלתי עד byte 104, מחכה ל-105"
Client → Server: Seq=105, data="World" (5 bytes)
Server → Client: ACK=110</pre></div>
<div class="callout note">📝 SYN ו-FIN נחשבים כ-1 byte לצורכי חישוב ACK — למרות שאינם מכילים נתונים.</div>
</section>

<section class="learn-section">
<span class="sec-label">05 — Checksum</span>
<h2 class="sec-h">Checksum — גילוי שגיאות</h2>
<p>Checksum מוודא שהנתונים לא נפגמו בדרך. מחושב על ה-Header <strong>וגם</strong> על הנתונים עצמם.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">דוגמה: Checksum = סכום ספרות</span></div>
<pre class="code-body">מספר טלפון: 054-5555555
Checksum = 0+5+4+5+5+5+5+5+5+5 = <span class="st">44</span>

השרת קיבל: 654-5555555  (6 במקום 0!)
בדיקה: 6+5+4+5+5+5+5+5+5+5 = <span class="kw">50 ≠ 44</span>  → שגיאה!</pre></div>
<p>ב-TCP/IP: Checksum = One's Complement Sum של כל ה-16-bit words.</p>
</section>

<section class="learn-section">
<span class="sec-label">06 — netstat</span>
<h2 class="sec-h">netstat</h2>
<p>מציג חיבורי רשת פעילים וסטטוסם:</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">netstat -an</span></div>
<pre class="code-body">Proto  Local Address        Foreign Address     State
TCP    0.0.0.0:80           0.0.0.0:*           LISTENING
TCP    192.168.1.5:54231    142.250.74.46:443   ESTABLISHED
TCP    192.168.1.5:8820     192.168.1.6:52311   ESTABLISHED
UDP    0.0.0.0:53           0.0.0.0:*</pre></div>
<table class="tbl"><tr><th>State</th><th>משמעות</th></tr>
<tr><td>LISTENING</td><td>השרת ממתין לחיבורים</td></tr>
<tr><td>ESTABLISHED</td><td>חיבור פעיל</td></tr>
<tr><td>TIME_WAIT</td><td>ממתין אחרי סגירה</td></tr>
