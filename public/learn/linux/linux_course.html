tree: (chId, args, ts) => {
  const path = args.find(a=>!a.startsWith('-')) || '.';
  const target = vfsResolve(path, ts.cwd);
  const depth = parseInt((args[args.indexOf('-L')+1])||'3');
  const lines = [target];
  function walk(p, prefix, d) {
    if (d > depth) return;
    const ch = vfsChildren(p);
    ch.forEach((c,i) => {
      const last = i === ch.length-1;
      lines.push(prefix + (last?'└── ':'├── ') + c.name + (c.node.type==='d'?'/':''));
      if (c.node.type==='d') walk(c.path, prefix+(last?'    ':'│   '), d+1);
    });
  }
  walk(target, '', 1);
  lines.push(`\n${lines.length-1} files`);
  return { text: lines.join('\n') };
},

// ---- Inject terminal tab into chapters that have it ----
// Called by applyLang after render
function injectTermTabs() {
  // This is handled in the tab rendering - TERM_CHAPTERS determines which chapters get a terminal tab
}
// ===== STATE =====
const state = {cur:0, tabs:{}, quiz:{}, game:{}, xp:0, stars:{}};
let currentLang = 'he';
let gameTimer = null;
const TOTAL_CHAPTERS = 12;
// Chapters that get an embedded terminal in learn tab
const HAS_TERM = new Set([2,3,4,5,7,8,9,10,11]);

// ===== HELPERS =====
function L() { return currentLang==='he' ? mergedC('he') : mergedC('en'); }
function mergedC(lang) {
  const base = C[lang];
  const extra = EXTRA_CONTENT[lang];
  return {
    ...base,
    names:  [...base.names,  ...extra.names],
    tags:   [...base.tags,   ...extra.tags],
    descs:  [...base.descs,  ...extra.descs],
    learn:  [...base.learn,  ...extra.learn],
    cheat:  [...base.cheat,  ...extra.cheat],
  };
}

function getQ(i) { return (currentLang==='en' ? (QUIZZES_EN[i]||QUIZZES[i]) : QUIZZES[i]) || QUIZZES[0]; }
function getL(i) { return (currentLang==='en' ? (LABS_EN[i]||LABS[i]) : LABS[i]) || LABS[0]; }
function getG(i) { return (currentLang==='en' ? (GAME_QS_EN[i]||GAME_QS[i]) : GAME_QS[i]) || GAME_QS[0]; }

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  applyLang('he');
  showChapter(0);
});

// ===== LANG =====
function toggleLang() {
  currentLang = currentLang==='he'?'en':'he';
  applyLang(currentLang);
}

function applyLang(lang) {
  currentLang = lang;
  const Lc = L();
  document.documentElement.setAttribute('lang', lang==='he'?'he':'en');
  document.documentElement.setAttribute('dir', lang==='he'?'rtl':'ltr');
  document.getElementById('langBtn').textContent = lang==='he'?'🇬🇧 EN':'🇮🇱 HE';
  document.getElementById('sbLabel').textContent = Lc.sbLabel;
  document.getElementById('headerChName').textContent = Lc.names[state.cur]||'';

  for (let i=0; i<TOTAL_CHAPTERS; i++) {
    const $= id => document.getElementById(id);
    if($('chname-'+i))  $('chname-'+i).textContent  = Lc.names[i]||'';
    if($('chtag-'+i))   $('chtag-'+i).textContent   = Lc.tags[i]||'';
    if($('chtitle-'+i)) $('chtitle-'+i).textContent = Lc.names[i]||'';
    if($('chdesc-'+i))  $('chdesc-'+i).textContent  = Lc.descs[i]||'';
    if($('cheat-'+i))   $('cheat-'+i).innerHTML     = Lc.cheat[i]||'';

    // Rebuild learn content + inject terminal placeholder
    const learnEl = $('learn-'+i);
    if (learnEl) {
      learnEl.innerHTML = (Lc.learn[i]||'') +
        (HAS_TERM.has(i) ? `<div class="section-title" id="term-section-title-${i}"></div><div id="term-${i}"></div>` : '');
      updateTermTitle(i);
      // Re-render terminal if it was already initialized
      if (HAS_TERM.has(i)) {
        delete $('term-'+i)?.dataset?.rendered;
        renderTerm(i);
      }
    }

    // Tabs — no terminal tab
    const tabsEl = $('tabs-'+i);
    if (tabsEl) {
      const tabs = lang==='he'
        ? ['📖 למידה','🎯 חידון','🛠️ מעבדה','🎮 משחק','📋 סיכום']
        : ['📖 Learn','🎯 Quiz','🛠️ Lab','🎮 Game','📋 Summary'];
      const keys = ['learn','quiz','lab','game','cheat'];
      const cur = state.tabs[i] || 'learn';
      tabsEl.innerHTML = tabs.map((t,ti) =>
        `<button class="tab-btn${cur===keys[ti]?' active':''}" onclick="showTab(${i},'${keys[ti]}')">${t}</button>`
      ).join('');
    }

    // Clear interactive panels (not learn — already rebuilt above)
    ['quiz','lab','game'].forEach(p => {
      const el = $(p+'-'+i);
      if(el){el.innerHTML='';delete el.dataset.rendered;}
    });
    state.quiz[i] = null;
    state.game[i] = {phase:'idle'};
  }

  // Re-render active tab
  const t = state.tabs[state.cur] || 'learn';
  if(t==='quiz') renderQuiz(state.cur);
  if(t==='lab')  renderLab(state.cur);
  if(t==='game') renderGame(state.cur);
}

function updateTermTitle(i) {
  const el = document.getElementById('term-section-title-'+i);
  if (!el) return;
  el.textContent = currentLang==='he' ? '💻 טרמינל — תרגול מעשי' : '💻 Terminal — Hands-on Practice';
}

// ===== NAV =====
function showChapter(n) {
  document.querySelectorAll('.chapter').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.ch-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('ch-'+n)?.classList.add('active');
  document.getElementById('nav-'+n)?.classList.add('active');
  state.cur = n;
  document.getElementById('headerChName').textContent = L().names[n]||'';
  document.getElementById('sidebar')?.classList.remove('open');
  window.scrollTo(0,0);
  activateTab(n, state.tabs[n]||'learn');
}

function toggleSidebar() { document.getElementById('sidebar')?.classList.toggle('open'); }

function showTab(chId, tabName) {
  state.tabs[chId] = tabName;
  activateTab(chId, tabName);
}

function activateTab(chId, tabName) {
  const ch = document.getElementById('ch-'+chId);
  if (!ch) return;
  ch.querySelectorAll('.tab-btn').forEach(btn => {
    const m = btn.getAttribute('onclick').match(/'(\w+)'\)/);
    btn.classList.toggle('active', m && m[1]===tabName);
  });
  ch.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id===chId+'-'+tabName);
  });
  if(tabName==='quiz') renderQuiz(chId);
  if(tabName==='lab')  renderLab(chId);
  if(tabName==='game') renderGame(chId);
}

// ===== QUIZ =====
function renderQuiz(chId) {
  const el = document.getElementById('quiz-'+chId);
  if(!el||el.dataset.rendered) return;
  el.dataset.rendered='1';
  if(!state.quiz[chId]) state.quiz[chId]={qi:0,ans:{},done:false,score:0};
  const qs = getQ(chId);
  const pips = qs.map((_,i)=>`<div class="quiz-pip" id="qpip-${chId}-${i}"></div>`).join('');
  const cards = qs.map((q,i)=>`
    <div class="quiz-q-card" id="qcard-${chId}-${i}">
      <div class="quiz-meta"><span id="qmeta-${chId}-${i}"></span><span></span></div>
      <div class="quiz-q">${q.q}</div>
      <div class="quiz-opts">
        ${q.o.map((opt,oi)=>`
          <button class="quiz-opt" id="qopt-${chId}-${i}-${oi}" onclick="quizPick(${chId},${i},${oi})">
            <span class="opt-letter" id="qltr-${chId}-${i}-${oi}"></span>${opt}
          </button>`).join('')}
      </div>
      <div class="quiz-exp" id="qexp-${chId}-${i}" style="display:none">
        <strong id="qexplbl-${chId}-${i}"></strong> ${q.e||''}
      </div>
    </div>`).join('');
  el.innerHTML=`
    <div class="quiz-prog" id="qprog-${chId}">${pips}</div>
    ${cards}
    <div class="quiz-result" id="qres-${chId}">
      <div class="result-emoji" id="qemoji-${chId}">🎉</div>
      <div class="result-score" id="qscore-${chId}"></div>
      <div class="result-label" id="qlabel-${chId}"></div>
      <div class="result-stars" id="qstars-${chId}"></div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:6px">
        <button class="btn btn-ghost" id="qbtn-reset-${chId}" onclick="quizReset(${chId})"></button>
        <button class="btn btn-primary" id="qbtn-lab-${chId}" onclick="showTab(${chId},'lab')"></button>
      </div>
    </div>
    <div class="quiz-nav" id="qnav-${chId}">
      <button class="btn btn-ghost" id="qprev-${chId}" onclick="quizNav(${chId},-1)"></button>
      <button class="btn btn-primary" id="qnext-${chId}" onclick="quizNav(${chId},1)"></button>
    </div>`;
  refreshQuiz(chId);
}

function refreshQuiz(chId) {
  const st = state.quiz[chId]; if(!st) return;
  const qs = getQ(chId); const Lc = L();
  qs.forEach((_,i) => {
    const card = document.getElementById(`qcard-${chId}-${i}`);
    if(card) card.classList.toggle('active', i===st.qi);
    const pip = document.getElementById(`qpip-${chId}-${i}`);
    if(pip) pip.className='quiz-pip'+(i<st.qi||st.done?' done':i===st.qi?' cur':'');
    const meta = document.getElementById(`qmeta-${chId}-${i}`);
    if(meta) meta.textContent=`${Lc.question} ${i+1} ${Lc.of} ${qs.length}`;
    qs[i].o.forEach((_,oi)=>{
      const ltr = document.getElementById(`qltr-${chId}-${i}-${oi}`);
      if(ltr) ltr.textContent=Lc.optLetters[oi];
    });
    const explbl = document.getElementById(`qexplbl-${chId}-${i}`);
    if(explbl) explbl.textContent=Lc.quizExplain;
  });
  const prev=document.getElementById(`qprev-${chId}`);
  const next=document.getElementById(`qnext-${chId}`);
  const rb=document.getElementById(`qbtn-reset-${chId}`);
  const lb=document.getElementById(`qbtn-lab-${chId}`);
  if(rb) rb.textContent=Lc.quizAgain;
  if(lb) lb.textContent=Lc.quizToLab;
  if(prev){prev.textContent=Lc.quizPrev;prev.disabled=st.qi===0;}
  if(next){
    const ans=st.ans[st.qi]!==undefined;
    if(st.qi<qs.length-1){next.textContent=Lc.quizNext;next.disabled=!ans;next.onclick=()=>quizNav(chId,1);}
    else{next.textContent=Lc.quizSubmit;next.disabled=Object.keys(st.ans).length<qs.length;next.onclick=()=>quizSubmit(chId);}
  }
}

function quizPick(chId,qi,oi){
  const st=state.quiz[chId];if(!st||st.done)return;
  st.ans[qi]=oi;
  const qs=getQ(chId);
  qs[qi].o.forEach((_,o)=>{
    const btn=document.getElementById(`qopt-${chId}-${qi}-${o}`);
    if(btn) btn.classList.toggle('selected',o===oi);
  });
  refreshQuiz(chId);
}

function quizNav(chId,dir){
  const st=state.quiz[chId];if(!st)return;
  st.qi=Math.max(0,Math.min(getQ(chId).length-1,st.qi+dir));
  refreshQuiz(chId);
}

function quizSubmit(chId){
  const st=state.quiz[chId];if(!st)return;
  const qs=getQ(chId);const Lc=L();
  let score=0;
  qs.forEach((q,i)=>{
    const chosen=st.ans[i];const correct=q.a;
    q.o.forEach((_,oi)=>{
      const btn=document.getElementById(`qopt-${chId}-${i}-${oi}`);
      if(!btn)return;
      btn.classList.add('disabled');
      if(oi===correct)btn.classList.add('correct');
      else if(oi===chosen)btn.classList.add('wrong');
      btn.classList.remove('selected');
    });
    const exp=document.getElementById(`qexp-${chId}-${i}`);
    if(exp)exp.style.display='block';
    if(chosen===correct)score++;
  });
  st.done=true;st.score=score;
  const stars=score>=5?3:score>=4?2:score>=3?1:0;
  state.stars[chId]=Math.max(state.stars[chId]||0,stars);
  addXP(score*10);updateStars(chId);
  document.getElementById(`qnav-${chId}`).style.display='none';
  const res=document.getElementById(`qres-${chId}`);
  res.classList.add('visible');
  document.getElementById(`qscore-${chId}`).textContent=`${score}/${qs.length}`;
  const emojis=['😔','😅','🙂','😊','🎉','🏆'];
  document.getElementById(`qemoji-${chId}`).textContent=emojis[score]||'🎉';
  document.getElementById(`qlabel-${chId}`).textContent=Lc.resultLabels[score]||'';
  document.getElementById(`qstars-${chId}`).textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  const rb2=document.getElementById(`qbtn-reset-${chId}`);
  const lb2=document.getElementById(`qbtn-lab-${chId}`);
  if(rb2)rb2.textContent=Lc.quizAgain;
  if(lb2)lb2.textContent=Lc.quizToLab;
  qs.forEach((_,i)=>{const c=document.getElementById(`qcard-${chId}-${i}`);if(c)c.classList.add('active');});
}

function quizReset(chId){
  state.quiz[chId]=null;
  const el=document.getElementById('quiz-'+chId);
  if(el){el.innerHTML='';delete el.dataset.rendered;}
  renderQuiz(chId);
}

// ===== LAB =====
function renderLab(chId){
  const el=document.getElementById('lab-'+chId);
  if(!el||el.dataset.rendered)return;
  el.dataset.rendered='1';
  const exs=getL(chId);const Lc=L();
  el.innerHTML=exs.map((ex,i)=>`
    <div class="lab-ex" id="labex-${chId}-${i}">
      <div class="lab-ex-hdr" onclick="toggleLab(${chId},${i})">
        <span class="lab-num">${i+1}</span>
        <span class="lab-q">${ex.q}</span>
        <span class="lab-chevron">▼</span>
      </div>
      <div class="lab-ans-wrap">
        <div class="lab-ans-inner">
          <div class="lab-ans-pre">${ex.a}</div>
          <div class="lab-explain"><strong>${Lc.labExplain}</strong> ${ex.e}</div>
        </div>
      </div>
    </div>`).join('');
}

function toggleLab(chId,i){
  const el=document.getElementById(`labex-${chId}-${i}`);
  if(el){el.classList.toggle('open');if(el.classList.contains('open'))addXP(5);}
}

// ===== GAME =====
function renderGame(chId){
  const el=document.getElementById('game-'+chId);
  if(!el)return;
  if(!state.game[chId])state.game[chId]={phase:'idle'};
  const gs=state.game[chId];const Lc=L();
  if(gs.phase==='idle'){
    const gqs=getG(chId);
    el.innerHTML=`
      <div class="game-start-card">
        <div class="game-icon">🎮</div>
        <div class="game-start-title">${Lc.gameTitle}</div>
        <p class="game-start-desc">${Lc.gameDesc}</p>
        <div class="game-rules">
          <div class="game-rule">⏱️ <span>60</span> ${Lc.gameSeconds}</div>
          <div class="game-rule">❓ <span>${gqs.length}</span> ${Lc.gameQuestions}</div>
          <div class="game-rule">🏆 <span>${Lc.gameXP}</span></div>
        </div>
        <button class="btn btn-primary" style="font-size:14px;padding:12px 36px" onclick="gameStart(${chId})">${Lc.gameStart}</button>
        ${buildLB(chId)}
      </div>`;
  } else if(gs.phase==='playing'){
    renderGamePlay(chId);
  } else {
    renderGameOver(chId);
  }
}

function gameStart(chId){
  const gqs=getG(chId);
  state.game[chId]={phase:'playing',qs:[...gqs].sort(()=>Math.random()-.5),qi:0,score:0,time:60,answered:false};
  renderGame(chId);startTimer(chId);
}

function renderGamePlay(chId){
  const el=document.getElementById('game-'+chId);
  const gs=state.game[chId];const Lc=L();
  if(!gs||gs.phase!=='playing')return;
  const q=gs.qs[gs.qi];
  if(!q){gameOver(chId);return;}
  el.innerHTML=`
    <div class="game-hud">
      <div class="hud-timer${gs.time<=10?' urgent':''}" id="gtimer-${chId}">${gs.time}</div>
      <div class="hud-qnum">${gs.qi+1}/${gs.qs.length}</div>
      <div class="hud-score">⭐ ${gs.score}</div>
    </div>
    <div class="game-q">${q.q}</div>
    <div class="game-opts">
      ${q.o.map((opt,i)=>`<button class="game-opt" id="gopt-${chId}-${i}" onclick="gameAnswer(${chId},${i})">${opt}</button>`).join('')}
    </div>
    <div class="game-fb" id="gfb-${chId}"></div>`;
}

function startTimer(chId){
  clearInterval(gameTimer);
  gameTimer=setInterval(()=>{
    const gs=state.game[chId];
    if(!gs||gs.phase!=='playing'){clearInterval(gameTimer);return;}
    gs.time--;
    const t=document.getElementById(`gtimer-${chId}`);
    if(t){t.textContent=gs.time;t.className='hud-timer'+(gs.time<=10?' urgent':'');}
    if(gs.time<=0){clearInterval(gameTimer);gameOver(chId);}
  },1000);
}

function gameAnswer(chId,chosen){
  const gs=state.game[chId];if(!gs||gs.answered)return;
  gs.answered=true;
  const q=gs.qs[gs.qi];const ok=q.a===chosen;
  document.querySelectorAll(`#game-${chId} .game-opt`).forEach(b=>b.classList.add('disabled'));
  document.getElementById(`gopt-${chId}-${chosen}`)?.classList.add(ok?'correct':'wrong');
  if(!ok)document.getElementById(`gopt-${chId}-${q.a}`)?.classList.add('correct');
  const fb=document.getElementById(`gfb-${chId}`);
  if(fb){fb.textContent=ok?'+10 ✓':'✗';fb.className='game-fb '+(ok?'ok':'bad');}
  if(ok){gs.score+=10;addXP(10);}
  setTimeout(()=>{
    gs.qi++;gs.answered=false;
    if(gs.qi>=gs.qs.length){gameOver(chId);return;}
    renderGamePlay(chId);startTimer(chId);
  },850);
}

function gameOver(chId){
  clearInterval(gameTimer);
  const gs=state.game[chId];if(!gs)return;
  gs.phase='over';const Lc=L();
  try{
    let lb=JSON.parse(localStorage.getItem(`lx-${chId}`)||'[]');
    lb.push({name:Lc.playerName,score:gs.score,ts:Date.now()});
    lb.sort((a,b)=>b.score-a.score);lb=lb.slice(0,5);
    localStorage.setItem(`lx-${chId}`,JSON.stringify(lb));
  }catch(e){}
  const total=gs.qs.length*10;const pct=Math.round((gs.score/total)*100);
  const medal=gs.score>=total*.8?'🏆':gs.score>=total*.5?'🥈':'🥉';
  document.getElementById('game-'+chId).innerHTML=`
    <div class="game-over-card">
      <div style="font-size:50px;margin-bottom:10px">${medal}</div>
      <div class="game-over-score">${gs.score}</div>
      <div class="game-over-title">${Lc.points} · ${pct}${Lc.pct}</div>
      ${buildLB(chId)}
      <div style="display:flex;gap:8px;justify-content:center;margin-top:18px">
        <button class="btn btn-ghost" onclick="gameRestart(${chId})">${Lc.gameAgain}</button>
        <button class="btn btn-primary" onclick="showTab(${chId},'cheat')">${Lc.gameToCheat}</button>
      </div>
    </div>`;
}

function gameRestart(chId){
  state.game[chId]={phase:'idle'};
  const el=document.getElementById('game-'+chId);
  if(el)el.innerHTML='';
  renderGame(chId);
}

function buildLB(chId){
  let lb=[];
  try{lb=JSON.parse(localStorage.getItem(`lx-${chId}`)||'[]');}catch(e){}
  if(!lb.length)return'';
  const medals=['🥇','🥈','🥉','4','5'];
  const cls=['gold','silver','bronze','normal','normal'];
  const Lc=L();
  return`<div class="leaderboard"><div class="lb-title">${Lc.lbTitle}</div>${lb.map((e,i)=>`
    <div class="lb-row ${cls[i]}">
      <span class="lb-rank">${medals[i]}</span>
      <span class="lb-name">${e.name||Lc.unknownPlayer}</span>
      <span class="lb-pts">${e.score} ${Lc.points}</span>
    </div>`).join('')}</div>`;
}

// ===== XP & STARS =====
function addXP(n){
  state.xp+=n;
  const max=TOTAL_CHAPTERS*(5*10+4*5+8*10);
  const pct=Math.min(100,(state.xp/max)*100);
  document.getElementById('xpBar').style.width=pct+'%';
  document.getElementById('xpLabel').textContent=state.xp+' XP';
}

function updateStars(chId){
  const el=document.getElementById('stars-'+chId);
  if(!el)return;
  const s=state.stars[chId]||0;
  el.textContent='⭐'.repeat(s)+'☆'.repeat(3-s);
}
</script></body></html>
