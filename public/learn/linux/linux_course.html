<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Linux Course</title><style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f7f7f2;
  --bg2:      #ffffff;
  --bg3:      #f0f0ea;
  --surface:  #ffffff;
  --border:   #e5e5e0;
  --border2:  #d1d1ca;
  --accent:   #2d6a4f;
  --accent2:  #1e4f3a;
  --accentfg: #ffffff;
  --green:    #58cc02;
  --green2:   #46a302;
  --greenfg:  #ffffff;
  --yellow:   #ffd900;
  --yellowfg: #785a00;
  --red:      #ff4b4b;
  --redfg:    #ffffff;
  --blue:     #1cb0f6;
  --bluefg:   #ffffff;
  --text:     #3c3c3c;
  --text2:    #6b6b6b;
  --text3:    #afafaf;
  --mono:     'Courier New', 'Consolas', monospace;
  --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --r:        12px;
  --r2:       20px;
  --r3:       24px;
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 200;
  background: var(--bg2); border-bottom: 2px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px;
}
.header-logo {
  font-weight: 800; font-size: 16px; color: var(--accent);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  letter-spacing: -0.3px;
}
.header-logo-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--green); box-shadow: 0 2px 0 var(--green2);
}
.header-chname {
  font-size: 13px; font-weight: 600; color: var(--text2);
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lang-btn {
  font-size: 12px; font-weight: 800; padding: 6px 14px; border-radius: var(--r);
  border: 2px solid var(--border2); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text2);
  cursor: pointer; flex-shrink: 0; transition: all .1s;
  text-transform: uppercase; letter-spacing: .04em;
}
.lang-btn:hover { background: var(--accent); color: var(--accentfg); border-color: var(--accent2); border-bottom-color: var(--accent2); }
.lang-btn:active { transform: translateY(2px); border-bottom-width: 2px; }

/* ── CHAPTER NAV BAR ── */
.ch-nav {
  position: fixed; top: 60px; left: 0; right: 0; z-index: 150;
  background: var(--bg2); border-bottom: 2px solid var(--border);
  overflow-x: auto; display: flex; padding: 8px 16px; gap: 6px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.ch-nav::-webkit-scrollbar { display: none; }
.sb-label { display: none; }
.ch-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 14px; gap: 3px; border: 2px solid transparent;
  background: var(--bg3); border-radius: var(--r2);
  cursor: pointer; transition: all .15s; flex-shrink: 0;
  color: var(--text2); min-width: 52px;
  border-bottom: 4px solid var(--border);
}
.ch-btn:hover { background: var(--bg2); border-color: var(--border2); color: var(--text); }
.ch-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent2); border-bottom-color: var(--accent2);
}
.ch-num { font-size: 11px; font-weight: 800; font-family: var(--mono); }
.ch-title-text { font-size: 9px; font-weight: 600; max-width: 68px; text-align: center; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.ch-stars { font-size: 10px; min-height: 12px; }

/* ── LAYOUT ── */
.main {
  padding-top: 112px; min-height: 100vh;
  max-width: 780px; margin: 0 auto;
  padding-left: 20px; padding-right: 20px; padding-bottom: 60px;
}

/* ── CHAPTER ── */
.chapter { display: none; }
.chapter.active { display: block; }

/* ── CHAPTER HERO ── */
.ch-hero {
  padding: 28px 0 24px; border-bottom: 2px solid var(--border); margin-bottom: 28px;
}
.ch-tag {
  display: inline-block; font-size: 11px; font-weight: 800;
  color: var(--accent); background: var(--bg3);
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
  letter-spacing: .06em; text-transform: uppercase; font-family: var(--mono);
}
.ch-title { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 8px; letter-spacing: -.5px; line-height: 1.2; }
.ch-desc { font-size: 14px; color: var(--text2); margin-bottom: 20px; max-width: 560px; }
.tabs-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 18px; font-size: 13px; font-weight: 800; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text3);
  cursor: pointer; transition: all .1s; text-transform: uppercase; letter-spacing: .04em;
}
.tab-btn:hover { color: var(--text2); border-color: var(--border2); }
.tab-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
.tab-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent2); border-bottom-color: var(--accent2);
}

/* ── TAB PANELS ── */
.tab-panels { }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── LEARN CONTENT ── */
.did-you-know {
  background: linear-gradient(135deg, #fffdf0, #fff9e0);
  border: 2px solid var(--yellow); border-radius: var(--r2);
  padding: 16px 18px; font-size: 13.5px; color: #5a4a00;
  margin-bottom: 28px; line-height: 1.6;
  box-shadow: 0 3px 0 #e6c700;
}
.section-title {
  font-size: 17px; font-weight: 900; color: var(--text);
  margin: 32px 0 12px; letter-spacing: -.2px;
  display: flex; align-items: center; gap: 8px;
}
.prose {
  font-size: 15px; color: var(--text2); line-height: 1.78; margin-bottom: 16px;
}
.prose code, code {
  font-family: var(--mono); font-size: 12.5px;
  background: var(--bg3); padding: 2px 6px;
  border-radius: 6px; color: var(--accent2); font-weight: 600;
}

/* ── CODE BLOCKS ── */
.code-block {
  background: #1a1a2e; border-radius: var(--r2); padding: 18px 20px;
  margin: 16px 0; overflow-x: auto;
  border: 2px solid #2a2a4e; box-shadow: 0 4px 0 #0f0f20;
}
.code-block code {
  font-family: var(--mono); font-size: 12.5px; line-height: 1.75;
  background: none; padding: 0; color: #e2e8f0; display: block;
  font-weight: normal;
}
.comment { color: #6272a4; }

/* ── CARDS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin: 16px 0 24px; }
.card {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2);
  padding: 18px; display: flex; flex-direction: column; gap: 8px;
  transition: transform .1s;
}
.card:hover { transform: translateY(-2px); }
.card-icon { font-size: 26px; }
.card-title { font-size: 13px; font-weight: 800; color: var(--text); }
.card-body { font-size: 13px; color: var(--text2); line-height: 1.55; }

/* ── TABLE ── */
.table-wrap {
  overflow-x: auto; margin: 16px 0 24px;
  border-radius: var(--r2); border: 2px solid var(--border);
  box-shadow: 0 4px 0 var(--border);
}
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead { background: var(--bg3); }
.data-table th {
  padding: 11px 14px; text-align: left; font-weight: 800;
  color: var(--text2); font-size: 11px; text-transform: uppercase;
  letter-spacing: .06em; border-bottom: 2px solid var(--border);
}
.data-table td { padding: 11px 14px; color: var(--text2); border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg3); }

/* ── FLOW ROW ── */
.flow-row {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  margin: 16px 0 24px; padding: 20px; background: var(--bg2);
  border-radius: var(--r2); border: 2px solid var(--border);
  box-shadow: 0 4px 0 var(--border);
}
.flow-step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.flow-step-icon { font-size: 24px; }
.flow-step-label { font-size: 10px; font-weight: 700; color: var(--text3); line-height: 1.3; max-width: 64px; text-align: center; }
.flow-arrow { color: var(--accent); font-size: 18px; font-weight: 900; }

/* ── CALLOUTS ── */
.callout { padding: 14px 18px; border-radius: var(--r2); font-size: 13.5px; line-height: 1.6; margin: 16px 0; border: 2px solid; }
.callout-info  { background: #e8f4ff; border-color: #b3d9ff; color: #1a5a8a; box-shadow: 0 3px 0 #b3d9ff; }
.callout-warn  { background: #fff8e0; border-color: var(--yellow); color: #785a00; box-shadow: 0 3px 0 #e6c700; }
.callout-tip   { background: #e8fae8; border-color: #a8e6a8; color: #1a5a1a; box-shadow: 0 3px 0 #a8e6a8; }
.callout-success { background: var(--bg3); border-color: var(--border); color: var(--text2); padding: 10px 14px; }

/* ── REAL WORLD BOX ── */
.real-world-box {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2);
  padding: 20px; margin: 24px 0;
}
.real-world-title { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
.real-world-body { font-size: 13.5px; color: var(--text2); line-height: 1.7; }

/* ── END OF CHAPTER NAV ── */
.ch-end-nav {
  display: flex; gap: 12px; margin-top: 36px; padding-top: 24px;
  border-top: 2px solid var(--border); justify-content: center; flex-wrap: wrap;
}
.ch-end-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 16px 24px; border-radius: var(--r2); cursor: pointer;
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text2); font-weight: 800;
  font-size: 13px; transition: all .1s; min-width: 130px;
  text-transform: uppercase; letter-spacing: .04em;
}
.ch-end-btn:hover { transform: translateY(-2px); border-color: var(--accent); color: var(--accent); }
.ch-end-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
.ch-end-btn.primary {
  background: var(--green); color: var(--greenfg);
  border-color: var(--green2); border-bottom-color: var(--green2);
}
.ch-end-btn.primary:hover { background: var(--green2); }
.ch-end-btn-icon { font-size: 22px; }
.ch-end-btn-label { font-size: 11px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px; border-radius: var(--r2); font-size: 14px;
  font-weight: 800; border: 2px solid; cursor: pointer; transition: all .1s;
  text-transform: uppercase; letter-spacing: .04em;
}
.btn:active { transform: translateY(2px); border-bottom-width: 2px !important; }
.btn-primary {
  background: var(--green); color: var(--greenfg);
  border-color: var(--green2); border-bottom: 4px solid var(--green2);
}
.btn-primary:hover { background: var(--green2); }
.btn-ghost {
  background: var(--bg2); color: var(--text2);
  border-color: var(--border2); border-bottom: 4px solid var(--border2);
}
.btn-ghost:hover { background: var(--bg3); color: var(--text); }

/* ── GAME ── */
.game-wrap { max-width: 680px; }
.game-start-card { max-width: 420px; margin: 0 auto; text-align: center; padding: 40px 24px; }
.game-icon { font-size: 56px; margin-bottom: 16px; filter: drop-shadow(0 4px 0 rgba(0,0,0,.1)); }
.game-start-title { font-size: 24px; font-weight: 900; color: var(--text); margin-bottom: 8px; letter-spacing: -.5px; }
.game-start-desc { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
.game-rules { display: flex; justify-content: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
.game-rule {
  font-size: 13px; font-weight: 700; color: var(--text2);
  background: var(--bg3); padding: 8px 14px; border-radius: var(--r);
  border: 2px solid var(--border);
}
.game-hud {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding: 12px 18px;
  background: var(--bg2); border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
}
.hud-score { font-size: 22px; font-weight: 900; color: var(--green); font-family: var(--mono); }
.hud-timer { font-size: 15px; font-weight: 800; color: var(--text2); font-family: var(--mono); }
.game-q-text { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
.game-opts { display: flex; flex-direction: column; gap: 10px; }
.game-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); cursor: pointer; transition: all .1s;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.game-opt:hover { border-color: var(--accent); border-bottom-color: var(--accent2); transform: translateY(-1px); }
.game-opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.game-opt.correct { border-color: var(--green); border-bottom-color: var(--green2); background: #e8fae8; color: #1a5a1a; }
.game-opt.wrong   { border-color: var(--red); background: #fff0f0; color: #8a1a1a; }
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg3); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; flex-shrink: 0; color: var(--text2);
  font-family: var(--mono);
}
.game-result-card { max-width: 420px; margin: 32px auto 0; text-align: center; }
.result-score { font-size: 60px; font-weight: 900; color: var(--green); font-family: var(--mono); line-height: 1; margin-bottom: 4px; }
.result-label { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 24px; }
.result-emoji { font-size: 52px; margin-bottom: 8px; }
.result-btns { display: flex; gap: 12px; justify-content: center; }
.result-stars { font-size: 28px; margin-bottom: 8px; }

/* ── QUIZ ── */
.quiz-wrap { max-width: 680px; }
.quiz-prog { display: flex; gap: 4px; margin-bottom: 24px; }
.quiz-pip { flex: 1; height: 8px; border-radius: 4px; background: var(--border2); transition: background .2s; }
.quiz-pip.done { background: var(--green); }
.quiz-pip.cur  { background: var(--accent); }
.quiz-q-card { display: none; }
.quiz-q-card.active { display: block; }
.quiz-meta { font-size: 11px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.quiz-q { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
.quiz-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.quiz-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 18px; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); cursor: pointer; transition: all .1s;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.quiz-opt:hover { border-color: var(--accent); border-bottom-color: var(--accent2); transform: translateY(-1px); }
.quiz-opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.quiz-opt.selected { border-color: var(--accent); background: #f0f4ff; }
.quiz-opt.correct   { border-color: var(--green); border-bottom-color: var(--green2); background: #e8fae8; }
.quiz-opt.wrong     { border-color: var(--red); border-bottom-color: #cc0000; background: #fff0f0; }
.quiz-exp {
  padding: 14px 18px; background: #e8fae8; border-radius: var(--r2);
  border: 2px solid var(--green); border-bottom: 4px solid var(--green2);
  font-size: 13.5px; color: #1a5a1a; margin: 12px 0; line-height: 1.6;
}
.quiz-actions { display: flex; gap: 10px; margin-top: 8px; }
.quiz-result { display: none; text-align: center; padding: 32px 0; }
.qr-score { font-size: 56px; font-weight: 900; font-family: var(--mono); color: var(--green); margin-bottom: 4px; }
.qr-label { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 24px; }
.quiz-nav { display: flex; justify-content: space-between; margin-top: 12px; }

/* ── CHEAT / SUMMARY ── */
.cheat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 14px; margin-top: 8px; }
.cheat-card {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2); padding: 16px;
}
.cheat-card-title { font-size: 11px; font-weight: 900; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .08em; }
.cheat-item { display: flex; justify-content: space-between; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.cheat-item:last-child { border-bottom: none; }
.cheat-key { font-family: var(--mono); color: var(--accent); font-weight: 700; font-size: 11.5px; flex-shrink: 0; }
.cheat-val { color: var(--text2); text-align: right; font-size: 11.5px; }

/* ── CREDITS ── */
.credits-bar { border-top: 2px solid var(--border); padding: 32px 0; margin-top: 48px; }
.credits-title { font-size: 10px; font-weight: 900; color: var(--accent); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 16px; font-family: var(--mono); }
.credits-grid { display: flex; flex-wrap: wrap; gap: 24px; }
.credit-group { flex: 1; min-width: 140px; }
.credit-group-title { font-size: 11px; font-weight: 800; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
.credit-item { font-size: 12px; color: var(--text3); line-height: 1.9; }
.credit-item a { color: var(--accent); text-decoration: none; font-weight: 700; }
.credit-item a:hover { text-decoration: underline; }

/* ── MOBILE ── */
@media (max-width: 700px) {
  .main { padding-top: 108px; padding-left: 16px; padding-right: 16px; }
  .ch-title { font-size: 20px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .flow-row { padding: 14px; gap: 4px; }
  .flow-step-label { font-size: 9px; max-width: 52px; }
  .game-rules { gap: 10px; }
  .quiz-actions { flex-wrap: wrap; }
  .result-btns { flex-wrap: wrap; }
  .ch-end-nav { gap: 8px; }
  .ch-end-btn { min-width: 100px; padding: 14px 16px; }
}
@media (max-width: 480px) {
  .ch-nav { padding: 6px 10px; }
  .ch-btn { padding: 7px 10px; min-width: 44px; }
}
</style></head>
<body>
<header class="header">
  <div class="header-logo"><div class="header-logo-dot"></div><span>Linux</span></div>
  <span class="header-chname" id="headerChName"></span>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()">🇬🇧 EN</button>
</header>
<nav class="ch-nav" id="sidebar">
  <div class="sb-label" id="sbLabel" style="display:none"></div>
  
  <button class="ch-btn" id="nav-0" onclick="showChapter(0)"><span class="ch-num">00</span><span class="ch-title-text" id="chname-0"></span><span class="ch-stars" id="stars-0"></span></button>
  <button class="ch-btn" id="nav-1" onclick="showChapter(1)"><span class="ch-num">01</span><span class="ch-title-text" id="chname-1"></span><span class="ch-stars" id="stars-1"></span></button>
  <button class="ch-btn" id="nav-2" onclick="showChapter(2)"><span class="ch-num">02</span><span class="ch-title-text" id="chname-2"></span><span class="ch-stars" id="stars-2"></span></button>
  <button class="ch-btn" id="nav-3" onclick="showChapter(3)"><span class="ch-num">03</span><span class="ch-title-text" id="chname-3"></span><span class="ch-stars" id="stars-3"></span></button>
  <button class="ch-btn" id="nav-4" onclick="showChapter(4)"><span class="ch-num">04</span><span class="ch-title-text" id="chname-4"></span><span class="ch-stars" id="stars-4"></span></button>
  <button class="ch-btn" id="nav-5" onclick="showChapter(5)"><span class="ch-num">05</span><span class="ch-title-text" id="chname-5"></span><span class="ch-stars" id="stars-5"></span></button>

`<div class="did-you-know">💡 <strong>ידעת?</strong> ב-1991, Linus Torvalds היה סטודנט בן 21 בהלסינקי שרצה מערכת הפעלה שתרוץ על המחשב הביתי שלו. הוא כתב הודעה קצרה לפורום: "אני עושה מערכת הפעלה חינמית (כבדרך אגב, רק תחביב)." כיום, 96% מהשרתים בעולם, כל מכשיר Android, ו-100% מהמחשבים העל-יכולת בעולם — מריצים את ה-kernel שלו.</div>

<div class="section-title">מה זה Linux ולמה כולם משתמשים בו?</div>
<p class="prose">Linux הוא לא מערכת הפעלה שלמה — הוא <em>kernel</em>. ה-kernel הוא הליבה שמנהלת את החומרה: מי מקבל זמן מעבד, מי יכול לגשת לדיסק, איך הזיכרון מחולק. Linux לבדו לא עושה כלום. מה שאנחנו מכירים כ-"Linux" הוא שילוב של Linux kernel עם אלפי תוכניות שפותחו על ידי מפתחים ברחבי העולם תחת רישיון GPL — חינמי לשימוש, שינוי, והפצה.</p>
<p class="prose">למה Linux ניצח? כי הוא חינמי, יציב, ניתן להתאמה, ורץ על כל דבר — מהגלקסי בכיסך ועד לשרתי Google שמשרתים מיליארדי משתמשים. כשתפתחי שרת cloud, תכתבי Docker container, תבני CI/CD pipeline — את עובדת על Linux. אין בחירה אחרת. זו השפה שהאינטרנט כתוב בה.</p>

<div class="grid-3">
<div class="card"><div class="card-icon">🐧</div><div class="card-title">Linux Kernel</div><div class="card-body">ה-kernel עצמו — שכבת התוכנה שמדברת עם החומרה. מנהל memory, CPU scheduling, device drivers, system calls.</div></div>
<div class="card"><div class="card-icon">🐚</div><div class="card-title">Shell</div><div class="card-body">ממשק שמאפשר לך לדבר עם ה-kernel. Bash, Zsh, Fish — כולם מתרגמים פקודות שלך לsystem calls שה-kernel מבין.</div></div>
<div class="card"><div class="card-icon">📦</div><div class="card-title">Distribution</div><div class="card-body">Kernel + כלים + package manager + הגדרות. Ubuntu, Debian, Fedora, Arch — הפצות שונות, אותו kernel.</div></div>
</div>

<div class="section-title">ארכיטקטורה — כיצד Linux בנוי</div>
<p class="prose">חשבי על Linux כעוגה בשכבות. בתחתית — החומרה: CPU, RAM, דיסק, כרטיס רשת. מעליה — ה-kernel שמדבר עם החומרה דרך drivers. מעליו — System Libraries (כמו glibc) שמספקות API נוח לתוכנות. ומעל הכל — תוכנות המשתמש: shell, editors, servers, כל מה שמריצים.</p>
<div class="flow-row">

  <div class="flow-step"><div class="flow-step-icon">📚</div><div class="flow-step-label">Libraries<br>glibc, POSIX</div></div>
  <div class="flow-arrow">←</div>
  <div class="flow-step"><div class="flow-step-icon">🐚</div><div class="flow-step-label">Shell<br>Bash, Zsh</div></div>
  <div class="flow-arrow">←</div>
  <div class="flow-step"><div class="flow-step-icon">👩‍💻</div><div class="flow-step-label">Apps<br>nginx, python</div></div>
</div>

<div class="section-title">הפצות — איזו לבחור ולמה?</div>
<p class="prose">ההפצה היא "הטעם" של Linux שאת בוחרת. כולן מריצות את אותו kernel, אבל שונות בpackage manager, בתדירות עדכונים, ובקהל היעד. אם את עובדת בענן — כמעט בטוח Ubuntu או Amazon Linux. אם enterprise — Red Hat. אם אהבת ניסויים — Arch.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>הפצה</th><th>Package Manager</th><th>מי משתמש</th><th>מאפיין</th></tr></thead><tbody>

<tr><td><strong>Debian</strong></td><td>apt</td><td>Servers, Sysadmins</td><td>יציבות מעל הכל, עדכונים איטיים</td></tr>
<tr><td><strong>RHEL / CentOS Stream</strong></td><td>dnf</td><td>Enterprise, בנקים, ממשלות</td><td>תמיכה מסחרית, מחזור חיים ארוך</td></tr>

<tr><td><strong>Arch Linux</strong></td><td>pacman</td><td>Power users</td><td>rolling release, בני תמותה לא מומלצים</td></tr>
<tr><td><strong>Alpine Linux</strong></td><td>apk</td><td>Docker containers</td><td>5MB בלבד — Docker images זעירים</td></tr>

    כשמקימים שרת AWS EC2, תקבלי Amazon Linux (מבוסס RHEL) או Ubuntu Server. כשבונים Docker image — הבסיס הוא Alpine או Ubuntu. כשכותבים Kubernetes manifest — ה-nodes רצים Linux. כשמגדירים nginx, PostgreSQL, Redis, Kafka — כולם תוכנות Linux שנוצרו לLinux.<br><br>
    Windows Server קיים ומשמש בארגונים מסוימים, אבל ב-2025 — אם את בונה web infrastructure, microservices, ו-cloud-native applications — Linux הוא הבית שלך. המוקדם שלומדים אותו, כך חוסכים חודשים של frustration.

<p class="prose">הדרך המהירה ביותר להתחיל: WSL2 ב-Windows (הפעל ב-PowerShell: <code>wsl --install</code>), או כל אחד מהterminals הבאים בdirect בdrowser.</p>

<span class="comment"># ← reboot, ואז Ubuntu זמין מ-Start menu</span>

<span class="comment"># בדיקה ראשונה — מה הפצה ומה kernel?</span>
cat /etc/os-release  <span class="comment"># Ubuntu 22.04 LTS</span>
uname -r             <span class="comment"># kernel version</span>
uname -a             <span class="comment"># כל פרטי kernel</span>

`<div class="did-you-know">💡 <strong>ידעת?</strong> ב-Linux, "הכל הוא קובץ" — זה לא מטאפורה. הדיסק הקשיח שלך? קובץ ב-/dev/sda. כרטיס הרשת? קובץ ב-/dev/eth0. רשימת התהליכים הרצים? קובץ ב-/proc. המדפסת? /dev/lp0. הרעיון הזה מ-1969 עדיין בלב Linux כיום, ומה שהופך אותו לגמיש בצורה שאין לה מקבילה.</div>

<div class="section-title">מבנה תיקיות Linux — מפה לשטח</div>
<p class="prose">בניגוד ל-Windows שבו כל דיסק מקבל אות משלו (C:, D:), Linux הוא עץ אחד שמתחיל מ-root — הנקודה "/" בראש הכל. מתחת ל-"/" מסתעפות תיקיות שלכל אחת תפקיד מוגדר. זה לא שרירותי — זה תקן FHS (Filesystem Hierarchy Standard) שמגדיר מה שייך לאן.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>תיקייה</th><th>מה יש שם</th><th>דוגמה</th></tr></thead><tbody>
<tr><td><code>/</code></td><td>Root — שורש כל מה שיש</td><td>הנקודה הגבוהה ביותר</td></tr>
<tr><td><code>/etc</code></td><td>קבצי תצורה של המערכת</td><td>/etc/nginx/nginx.conf, /etc/passwd</td></tr>
<tr><td><code>/var</code></td><td>נתונים שמשתנים (logs, databases)</td><td>/var/log/syslog</td></tr>
<tr><td><code>/usr</code></td><td>תוכנות שמותקנות למשתמשים</td><td>/usr/bin/python3</td></tr>
<tr><td><code>/home</code></td><td>תיקיות בית של משתמשים</td><td>/home/alice</td></tr>
<tr><td><code>/tmp</code></td><td>קבצים זמניים — נמחקים ב-reboot</td><td>temp files</td></tr>
<tr><td><code>/proc</code></td><td>Virtual FS — מידע על processes</td><td>/proc/1234/status</td></tr>
<tr><td><code>/dev</code></td><td>Device files — כל חומרה</td><td>/dev/sda, /dev/null</td></tr>
</tbody></table></div>

<div class="section-title">הרשאות קבצים — rwx ומה שמאחוריהם</div>
<p class="prose">כשמריצים <code>ls -l</code> ורואים <code>-rwxr-xr--</code> — זה לא אקראי. כל תו מספר סיפור. בואי נפרק את זה לחלקים:</p>
<pre class="code-block"><code>-rwxr-xr--  2  alice  devs  4096  Jan 15 10:30  script.sh
│││││││││└─ others: r-- = קריאה בלבד
│││││││└──── group: r-x = קריאה + הרצה
│││││└──────── owner: rwx = קריאה + כתיבה + הרצה
│└──────────── סוג: - = קובץ, d = תיקייה, l = symlink
└───────────── 10 תווי permissions</code></pre>
<p class="prose">כל קובץ שייך ל<strong>owner</strong> (בעלים), ל<strong>group</strong> (קבוצה), ולכולם (<strong>others</strong>). לכל אחד יש שלוש הרשאות: r=read (קריאה, ערך=4), w=write (כתיבה, ערך=2), x=execute (הרצה, ערך=1). מחברים לקבל מספר: 7=rwx, 6=rw-, 5=r-x, 4=r--.</p>
<pre class="code-block"><code><span class="comment"># chmod — שינוי הרשאות</span>
chmod 755 script.sh   <span class="comment"># owner=rwx, group=r-x, others=r-x</span>
chmod 600 id_rsa      <span class="comment"># owner=rw-, אחרים=--- (SSH key!)</span>
chmod +x deploy.sh    <span class="comment"># הוסף הרצה לכולם</span>
chmod u+x,g-w file    <span class="comment"># symbolic: הוסף x לowner, הסר w מgroup</span>

<span class="comment"># chown — שינוי בעלות</span>
chown alice:devs file     <span class="comment"># owner=alice, group=devs</span>
chown -R www-data /var/www <span class="comment"># recursive — לכל מה שבתיקייה</span></code></pre>

<div class="section-title">Inodes — מה Linux באמת שומר על קבצים</div>
<p class="prose">ב-Linux, שם הקובץ והנתונים שלו הם שני דברים נפרדים. ה-inode הוא הרשומה הפנימית שמכילה את כל המידע על קובץ: גודל, הרשאות, timestamps, ואיפה הנתונים בדיסק — אבל לא את השם. השם הוא רק pointer ל-inode. זה מאפשר דברים מרתקים:</p>
<pre class="code-block"><code><span class="comment"># Hard link — שני שמות לאותו inode</span>
ln file.txt backup.txt
<span class="comment"># מחיקת file.txt לא מוחקת הנתונים — backup.txt עדיין מצביע ל-inode</span>

<span class="comment"># Soft link (symlink) — קיצור דרך</span>
ln -s /var/log/nginx/access.log ~/logs/nginx
<span class="comment"># כמו shortcut ב-Windows — אם מקור נמחק, הlink שבור</span>

<span class="comment"># בדיקת inode number</span>
ls -li file.txt backup.txt
<span class="comment"># אם מספר ה-inode זהה — hard link</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 למה chmod 600 על SSH keys?</div>
  <div class="real-world-body">
    כשמנסים להתחבר ב-SSH עם key שהרשאות שלו "פתוחות מדי", SSH מסרב עם שגיאה: "Permissions 0644 for id_rsa are too open." למה? כי SSH מניח שאם אחרים יכולים לקרוא את ה-private key שלך — ה-key נפגע.<br><br>
    600 = rw------- = רק owner יכול לקרוא ולכתוב. אף אחד אחר לא רואה כלום. זה לא נוחות — זה דרישת אבטחה שSSH enforces בקפדנות. כלל אצבע: כל private key, קובץ עם סיסמאות, ו-.env — chmod 600 תמיד.
  </div>
</div>

<pre class="code-block"><code><span class="comment"># מיפוי מהיר של מה יש</span>

`<div class="did-you-know">💡 <strong>ידעת?</strong> Doug McIlroy המציא את pipe ( | ) ב-1973 ואמר שזה "הרעיון הכי טוב שיצא מ-Unix." כל pipeline שאת כותבת היום — cat file | grep error | sort | uniq -c — הוא ירושה ישירה ממנו. במקום תוכנות ענקיות שעושות הכל, Unix בנה כלים קטנים שכל אחד עושה דבר אחד מצוין — ומחבר אותם יחד.</div>

<div class="section-title">ניווט וצפייה בקבצים — הבסיס שחוזרים אליו</div>
<p class="prose">לפני שרצים ל-vim ו-docker — צריך לדעת לנוע. הפקודות האלה הן כמו ללכת ברחוב: pwd אומרת "איפה אני", cd מזיזה, ls מראה מה סביבי. נשמע פשוט — אבל flags הנכונים חוסכים דקות של scroll.</p>
<pre class="code-block"><code><span class="comment"># ls — הרשמה האמיתית</span>
ls -lah           <span class="comment"># l=long, a=hidden files, h=human readable sizes</span>
ls -lt            <span class="comment"># מיון לפי זמן שינוי (החדש ביותר למעלה)</span>
ls -lS            <span class="comment"># מיון לפי גודל</span>
ls -R /etc        <span class="comment"># recursive — כל תת-תיקייה</span>

<span class="comment"># find — חיפוש קבצים (חזק מgrep לחיפוש לפי metadata)</span>
find /var/log -name "*.log" -mtime -7    <span class="comment"># logs שהשתנו ב-7 ימים האחרונים</span>
find /home -size +100M -type f           <span class="comment"># קבצים גדולים מ-100MB</span>
find . -perm /222 -type f               <span class="comment"># קבצים שניתן לכתוב אליהם</span>
find /tmp -name "*.tmp" -delete          <span class="comment"># מצא ומחק</span></code></pre>

<div class="section-title">grep — אמנות החיפוש בטקסט</div>
<p class="prose">grep הוא אחד הכלים הכי חזקים שיש לך. הוא קורא שורות, בודק אם הן תואמות pattern, ומחזיר את אלה שכן. מה שהופך אותו לחזק הם ה-flags — כל אחד מוסיף יכולת.</p>
<pre class="code-block"><code><span class="comment"># grep — חיפוש בסיסי ומתקדם</span>
grep "ERROR" app.log               <span class="comment"># חפש "ERROR" בקובץ</span>
grep -i "error" app.log            <span class="comment"># case-insensitive</span>
grep -n "ERROR" app.log            <span class="comment"># הצג מספרי שורות</span>
grep -r "TODO" ./src               <span class="comment"># recursive בכל ה-src</span>
grep -v "DEBUG" app.log            <span class="comment"># הוצא שורות עם DEBUG (invert)</span>
grep -c "ERROR" app.log            <span class="comment"># ספור כמה שורות</span>
grep -A 3 "CRITICAL" app.log       <span class="comment"># 3 שורות אחרי כל match</span>
grep -E "^(ERROR|WARN)" app.log    <span class="comment"># Extended regex — OR</span>

<span class="comment"># awk — עיבוד עמודות</span>
awk '{print $1, $4}' access.log    <span class="comment"># הדפס עמודה 1 ו-4</span>
awk -F: '{print $1}' /etc/passwd   <span class="comment"># delimiter=: פרינט username</span>
awk '$7 == 404' access.log         <span class="comment"># שורות שה-status code הוא 404</span>

<span class="comment"># sed — חיפוש והחלפה</span>
sed 's/old/new/g' file.txt         <span class="comment"># החלף כל "old" ב-"new"</span>
sed -i 's/localhost/prod.db/g' config.env  <span class="comment"># ישירות בקובץ (-i = in-place)</span>
sed -n '10,20p' file.txt           <span class="comment"># הדפס שורות 10 עד 20</span></code></pre>

<div class="section-title">Pipes ו-Redirects — הדבק שמחבר הכל</div>
<p class="prose">Pipe ( | ) לוקח את ה-output של פקודה אחת ומזין אותו כ-input לפקודה הבאה. זה הרעיון שבנה את Unix. כל כלי עושה דבר אחד מצוין — ו-pipe מחבר אותם לpipeline חזק.</p>
<pre class="code-block"><code><span class="comment"># Redirects — ניתוב output</span>
command > file.txt     <span class="comment"># כתוב output לקובץ (דרוס)</span>
command >> file.txt    <span class="comment"># הוסף לסוף הקובץ (append)</span>
command 2> errors.txt  <span class="comment"># כתוב stderr לקובץ</span>
command &> all.txt     <span class="comment"># stdout + stderr יחד</span>
command < input.txt    <span class="comment"># קרא stdin מקובץ</span>
command 2>/dev/null    <span class="comment"># זרוק שגיאות לאפס</span>

<span class="comment"># Pipelines אמיתיים שתשתמשי בהם</span>
cat access.log | grep "404" | awk '{print $7}' | sort | uniq -c | sort -rn | head -10
<span class="comment"># ← מוצאת 10 ה-URLs הכי נפוצות עם 404</span>

ps aux | grep nginx | grep -v grep | awk '{print $2}'
<span class="comment"># ← מוצאת PIDs של nginx processes</span>

df -h | awk 'NR>1 {print $5, $6}' | sort -rn
<span class="comment"># ← מוצאת partition-ים עם אחוז שימוש גבוה</span></code></pre>

<div class="section-title">כלי טקסט חיוניים</div>
<pre class="code-block"><code><span class="comment"># צפייה בקבצים</span>
cat file.txt          <span class="comment"># הדפס כל הקובץ</span>
less file.txt         <span class="comment"># דפדוף (q ליציאה, /search)</span>
head -n 20 file.txt   <span class="comment"># 20 שורות ראשונות</span>
tail -n 50 file.txt   <span class="comment"># 50 שורות אחרונות</span>
tail -f /var/log/syslog  <span class="comment"># live — עוקב אחרי קובץ בזמן אמת</span>
wc -l file.txt        <span class="comment"># ספור שורות</span>

<span class="comment"># sort ו-uniq — לניתוח נתונים</span>
sort -u names.txt         <span class="comment"># מיון + הסרת כפילויות</span>
sort -rn numbers.txt      <span class="comment"># מיון מספרי הפוך</span>
uniq -c sorted.txt        <span class="comment"># ספור כפילויות (חייב sort לפני)</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 One-liner שחוסך שעות: ניתוח access log</div>
  <div class="real-world-body">
    השרת איטי? לפני שפותחים APM יקר, מריצים:<br>
    <code>cat /var/log/nginx/access.log | awk '{print $7}' | sort | uniq -c | sort -rn | head -20</code><br><br>
    תקבלי את 20 ה-endpoints הכי נפוצים. אם /api/search מופיע 50,000 פעם ב-hour ו-/api/checkout פעם אחת — יש לך caching opportunity ברורה. ניתוח שDBA גובה עליו $500 — נגמר ב-10 שניות עם pipes.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 בפועל</strong></div>
<div class="section-title">One-liners שימושיים לכל יום</div>
<pre class="code-block"><code><span class="comment"># Top 10 IPs מ-access log</span>
awk '{print $1}' /var/log/nginx/access.log | sort | uniq -c | sort -rn | head -10

<span class="comment"># מצא הקובץ הכי גדול שהשתנה היום</span>
find / -type f -newer /tmp -size +10M 2>/dev/null | head -5

<span class="comment"># חפש string בכל קבצי config</span>
grep -r "password" /etc/ 2>/dev/null | grep -v "^Binary"

<span class="comment"># עקוב אחרי כמה logs בבת אחת</span>
tail -f /var/log/nginx/error.log /var/log/syslog

<span class="comment"># ספור שגיאות לפי שעה</span>
grep "ERROR" app.log | awk '{print $4}' | cut -d: -f1 | uniq -c

<span class="comment"># pipeline: מי שולח הכי הרבה 404?</span>
awk '$9==404 {print $1}' access.log | sort | uniq -c | sort -rn | head -5</code></pre>

tail -f /var/log/nginx/error.log /var/log/syslog

<span class="comment"># ספור שגיאות לפי שעה</span>
grep "ERROR" app.log | awk '{print $4}' | cut -d: -f1 | uniq -c

<span class="comment"># pipeline: מי שולח הכי הרבה 404?</span>
awk '$9==404 {print $1}' access.log | sort | uniq -c | sort -rn | head -5</code></pre>

`<div class="did-you-know">💡 <strong>ידעת?</strong> ה-permission model של Linux מבוסס על Unix משנות ה-70 — ועדיין מהווה ברית ברזל של אבטחה. כשגוגל, אמזון ומיקרוסופט מריצות containers בשרתים שלהן, כל container רץ כ-user עם UID ייחודי, permissions מינימליות, ומבודד מה-host. Principle of Least Privilege — העיקרון שכל משתמש וכל תהליך מקבלים בדיוק מה שהם צריכים ולא יותר — הוא עמוד השדרה של כל מערכת לינוקס מאובטחת.</div>

<div class="section-title">משתמשים וקבוצות — מי הם ומה הם עושים</div>
<p class="prose">בLinux, כל תהליך שרץ, כל קובץ שנשמר, כל פעולה שמבוצעת — שייכת למשתמש. root הוא המשתמש הכי-עוצמתי — הוא יכול הכל, לגעת בכל קובץ, להרוג כל תהליך, למחוק את עצמו. לכן עובדים עם users רגילים ומשתמשים ב-sudo רק כשצריך, ולא יותר.</p>
<pre class="code-block"><code><span class="comment"># ניהול משתמשים</span>
useradd -m -s /bin/bash alice      <span class="comment"># -m=צור home, -s=default shell</span>
passwd alice                        <span class="comment"># קבע/שנה סיסמה</span>
usermod -aG sudo alice             <span class="comment"># הוסף לgroup sudo (-a=append!)</span>
usermod -aG docker alice           <span class="comment"># הוסף לgroup docker</span>
userdel -r alice                   <span class="comment"># מחק משתמש + home (-r=remove home)</span>

<span class="comment"># מידע על משתמשים</span>
id alice                           <span class="comment"># uid=1001 gid=1001 groups=1001,27(sudo)</span>
whoami                             <span class="comment"># מי אני עכשיו</span>
who                                <span class="comment"># מי מחובר</span>
last -n 20                         <span class="comment"># 20 כניסות אחרונות</span>
cat /etc/passwd | grep alice       <span class="comment"># שורת passwd: user:x:uid:gid:name:home:shell</span>

<span class="comment"># קבוצות</span>
groupadd devteam                   <span class="comment"># צור קבוצה</span>
gpasswd -a alice devteam           <span class="comment"># הוסף משתמש לקבוצה</span>
groups alice                       <span class="comment"># אילו קבוצות יש לalice</span></code></pre>

<div class="section-title">sudo — הדרך הנכונה לבצע פעולות root</div>
<p class="prose">sudo (Super User DO) מאפשר למשתמש רגיל לבצע פקודות ספציפיות כ-root — עם log של כל פעולה, עם דרישת סיסמה, ועם שליטה מדויקת על מה מותר. זו הדרך הנכונה לתת הרשאות — לא "פשוט תיכנסו כroot".</p>
<pre class="code-block"><code><span class="comment"># שימוש ב-sudo</span>
sudo apt update                    <span class="comment"># הרץ פקודה אחת כroot</span>
sudo -u postgres psql              <span class="comment"># הרץ כמשתמש ספציפי</span>
sudo -i                            <span class="comment"># פתח shell כroot (שים לב!)</span>
sudo !!                            <span class="comment"># הרץ מחדש את הפקודה האחרונה עם sudo</span>

<span class="comment"># /etc/sudoers — מי יכול מה</span>
<span class="comment"># ערוך תמיד עם visudo — מונע שגיאות תחביר שיסגרו אותך</span>
sudo visudo

<span class="comment"># דוגמאות לrules:</span>
alice ALL=(ALL:ALL) ALL            <span class="comment"># alice יכולה הכל</span>
bob ALL=(ALL) NOPASSWD: /bin/systemctl restart nginx  <span class="comment"># בלי סיסמה לפקודה ספציפית</span>
%devteam ALL=(ALL) /usr/bin/apt    <span class="comment"># כל קבוצת devteam יכולה apt</span></code></pre>

<div class="section-title">chmod ו-chown — שליטה מלאה בהרשאות</div>
<p class="prose">chmod ו-chown הן שתי הפקודות הכי חשובות לניהול הרשאות. chmod משנה <em>מה מותר לעשות</em> עם קובץ. chown משנה <em>למי שייך</em> הקובץ.</p>
<pre class="code-block"><code><span class="comment"># chmod — שינוי הרשאות (numeric)</span>
chmod 755 script.sh    <span class="comment"># rwxr-xr-x: owner=rwx, group=r-x, others=r-x</span>
chmod 644 index.html   <span class="comment"># rw-r--r--: owner=rw, כולם=r</span>
chmod 600 ~/.ssh/id_rsa  <span class="comment"># rw-------: רק owner, SSH key!</span>
chmod 700 private_dir  <span class="comment"># rwx------: רק owner רואה</span>

<span class="comment"># chmod — symbolic (קריא יותר)</span>
chmod u+x script.sh    <span class="comment"># הוסף execute לuser</span>
chmod g-w file.txt     <span class="comment"># הסר write מgroup</span>
chmod o= file.txt      <span class="comment"># הסר הכל מothers</span>
chmod -R 755 /var/www  <span class="comment"># recursive לכל התיקייה</span>

<span class="comment"># chown — שינוי בעלות</span>
chown alice file.txt          <span class="comment"># שנה owner</span>
chown alice:devs file.txt     <span class="comment"># שנה owner + group</span>
chown -R www-data:www-data /var/www  <span class="comment"># recursive</span>

<span class="comment"># umask — ברירת מחדל לקבצים חדשים</span>
umask 022              <span class="comment"># קבצים חדשים יוצאים 644, תיקיות 755</span>
umask 077              <span class="comment"># קבצים חדשים יוצאים 600 — פרטיות מקסימלית</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 הרשאות שגויות — הטעות הכי נפוצה ב-production</div>
  <div class="real-world-body">
    תרחיש אמיתי שקורה כל הזמן: מפתח מעלה קבצים לשרת nginx ורץ <code>chmod 777 /var/www/html</code> כי "זה הכי קל". הוא צודק — זה עובד. אבל עכשיו כל משתמש בשרת (כולל www-data שמריץ nginx, כולל ה-attacker שמצא injection) יכול לכתוב קבצים לשם.<br><br>
    הגדרה נכונה: <code>chown -R www-data:www-data /var/www/html</code> + <code>chmod -R 755 /var/www/html</code>. nginx יכול לקרוא. המפתח (אם באותה group) יכול לכתוב. כולם אחרים — קריאה בלבד.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 בפועל</strong></div>
<div class="section-title">הגדרת משתמש חדש לשרת production</div>
<pre class="code-block"><code><span class="comment"># 1. צור משתמש deploy ללא login password</span>

sudo passwd -l deploy    <span class="comment"># lock password — SSH key בלבד</span>

<span class="comment"># 2. הוסף SSH key</span>

`<div class="did-you-know">💡 <strong>ידעת?</strong> כל תוכנית שרצה ב-Linux היא תהליך (process) עם PID ייחודי. גם ה-shell שאת עובדת בו הוא תהליך. גם הbrowser שפתח את הקורס הזה. systemd עם PID 1 הוא ה-"אב" של כל התהליכים — הדבר הראשון שה-kernel מריץ, שמריץ כל השאר.</div>

<div class="section-title">מה קורה כשמריצים פקודה?</div>
<p class="prose">כשמקלידים <code>python3 server.py</code> ולוחצים Enter, הshell קורא ל-fork() — יוצר עותק של עצמו — ואחר כך קורא ל-exec() שמחליף את העותק בתוכנית החדשה. ה-process החדש מקבל PID משלו, יורש environment variables, ו-file descriptors מהshell, ומתחיל לרוץ.</p>
<pre class="code-block"><code><span class="comment"># ps — Process Status</span>
ps aux                   <span class="comment"># כל התהליכים + user, CPU, RAM, command</span>
ps aux | grep nginx      <span class="comment"># מצא תהליכי nginx</span>
ps -ef --forest          <span class="comment"># עץ תהליכים — מי הוליד מי</span>

<span class="comment"># top / htop — מוניטור real-time</span>
top                      <span class="comment"># קרא: CPU%, MEM%, PID, COMMAND</span>
htop                     <span class="comment"># גרסה יפה יותר (צריך apt install htop)</span>
<span class="comment"># ב-top: P=מיין לפי CPU, M=לפי RAM, k=kill, q=quit</span>

<span class="comment"># pgrep/pkill — חיפוש לפי שם</span>
pgrep nginx              <span class="comment"># החזר PIDs של nginx</span>
pgrep -la python         <span class="comment"># PIDs + command line</span>

<span class="comment"># מידע על תהליך ספציפי</span>
ls /proc/1234/           <span class="comment"># כל המידע על PID 1234</span>
cat /proc/1234/status    <span class="comment"># state, memory, uid</span>
lsof -p 1234             <span class="comment"># קבצים שפתוחים על ידי process</span></code></pre>

<div class="section-title">Signals — שפת התקשורת עם תהליכים</div>
<p class="prose">הדרך לדבר עם תהליכים היא דרך signals. Signal הוא הודעה קצרה שה-kernel שולח לתהליך. לכל signal יש מספר ושם. חלקם אפשר לתפוס ולטפל בהם, חלקם אי אפשר.</p>
<pre class="code-block"><code><span class="comment"># Signals חשובים</span>
kill -15 PID    <span class="comment"># SIGTERM — "אנא סגור בצורה מסודרת" (ברירת מחדל)</span>
kill -9 PID     <span class="comment"># SIGKILL — "מת עכשיו, אין ברירה" (לא ניתן לתפוס)</span>
kill -1 PID     <span class="comment"># SIGHUP — "reload config" (nginx, apache)</span>
kill -2 PID     <span class="comment"># SIGINT — מה שCtrl+C שולח</span>

<span class="comment"># killall / pkill — לפי שם</span>
killall nginx           <span class="comment"># SIGTERM לכל nginx</span>
pkill -9 python         <span class="comment"># SIGKILL לכל python</span>
pkill -HUP nginx        <span class="comment"># reload nginx</span>

<span class="comment"># תמיד נסי SIGTERM לפני SIGKILL</span>
<span class="comment"># SIGKILL לא מאפשר cleanup — נתונים עלולים לאבד</span></code></pre>

<div class="section-title">Background Jobs ו-nohup</div>
<p class="prose">כשרצים תהליך בשרת, לא רוצים שהוא יפסיק כשסוגרים את הsession. יש כמה דרכים להשאיר תהליכים חיים:</p>
<pre class="code-block"><code><span class="comment"># & — הרץ ב-background</span>
python3 server.py &         <span class="comment"># מחזיר PID, ממשיכה לעבוד</span>
jobs                        <span class="comment"># רשימת background jobs</span>
fg 1                        <span class="comment"># החזר job 1 ל-foreground</span>
bg 1                        <span class="comment"># המשך job 1 ב-background</span>

<span class="comment"># nohup — המשך גם אחרי logout</span>
nohup python3 server.py > server.log 2>&1 &
<span class="comment"># nohup: מתעלם מSIGHUP</span>
<span class="comment"># > server.log: stdout לקובץ</span>
<span class="comment"># 2>&1: stderr גם לשם</span>
<span class="comment"># &: ב-background</span>

<span class="comment"># screen / tmux — הרבה יותר טוב מnohup</span>
screen -S mysession    <span class="comment"># פתח session חדשה</span>
<span class="comment"># Ctrl+A D לנתק (הsession ממשיכה)</span>
screen -r mysession    <span class="comment"># חזור לsession</span></code></pre>

<div class="section-title">Cron — תזמון משימות</div>
<p class="prose">Cron הוא scheduler שמריץ פקודות בזמנים מוגדרים. כל user יכול להגדיר cron jobs משלו. הsyntax נראה מפחיד בהתחלה אבל יש pattern פשוט.</p>
<pre class="code-block"><code><span class="comment"># crontab -e — ערוך cron jobs</span>
# דקה  שעה  יום_בחודש  חודש  יום_בשבוע  פקודה
  0     2      *          *      *         /home/alice/backup.sh
  <span class="comment"># ← כל יום ב-2:00 בלילה</span>

  */15  *      *          *      *         /usr/bin/check_health.sh
  <span class="comment"># ← כל 15 דקות</span>

  0     9      *          *      1         /home/alice/weekly_report.py
  <span class="comment"># ← כל שני ב-9:00</span>

  0     0      1          *      *         /usr/bin/monthly_cleanup.sh
  <span class="comment"># ← ב-1 לכל חודש</span>

<span class="comment"># crontab -l — הצג jobs</span>
<span class="comment"># crontab -r — מחק הכל (היזהרי!)</span>

<span class="comment"># לוגים של cron</span>
grep CRON /var/log/syslog   <span class="comment"># Ubuntu</span>
journalctl -u cron          <span class="comment"># systemd</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 SIGTERM vs SIGKILL — הטעות של Beginners</div>
  <div class="real-world-body">
    כשתהליך לא מגיב, הreaction הראשוני הוא <code>kill -9</code>. זה עובד — אבל יכול לגרום נזק. אפליקציה שמבצעת כתיבה למסד נתונים ומקבלת SIGKILL — עלולה להשאיר transaction פתוחה, לשחית נתונים, או להשאיר lock שלא ישוחרר.<br><br>
    הסדר הנכון: (1) <code>kill -15 PID</code> — אנא צא בצורה מסודרת. המתן 10 שניות. (2) עדיין חי? <code>kill -9 PID</code>. SIGTERM נותן לתהליך להתנקות: לסגור connections, לשמור state, לשחרר locks. SIGKILL הוא emergency brake — רק כשאין ברירה.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 בפועל</strong></div>
<div class="section-title">Process Management בscenarios אמיתיים</div>
<pre class="code-block"><code><span class="comment"># מצא ותרוג process שתופס port</span>
lsof -i :8080              <span class="comment"># מי על port 8080?</span>
kill -15 $(lsof -ti:8080)  <span class="comment"># תרוג אותו</span>

<span class="comment"># הרץ long job ואל תחכה</span>
nohup python3 train.py > train.log 2>&1 &
echo "PID: $!"             <span class="comment"># זכור את ה-PID</span>
tail -f train.log          <span class="comment"># עקוב אחרי progress</span>

<span class="comment"># cron לbackup יומי</span>
crontab -e
<span class="comment"># הוסף:</span>
0 3 * * * /home/user/backup.sh >> /var/log/backup.log 2>&1

<span class="comment"># מצא memory hogs</span>
ps aux --sort=-%mem | head -6
<span class="comment"># כמה RAM כל process תופס?</span>

<span class="comment"># Process שלא מת עם SIGTERM</span>
kill -15 PID    <span class="comment"># נסה קודם</span>
sleep 5
kill -9 PID     <span class="comment"># רק אם צריך</span></code></pre>

kill -15 PID    <span class="comment"># נסה קודם</span>
sleep 5
kill -9 PID     <span class="comment"># רק אם צריך</span></code></pre>

`<div class="did-you-know">💡 <strong>ידעת?</strong> כשמריצים פינג לשרת שנמצא ביפן מישראל, הpackets עוברים דרך עשרות routers ב-4 יבשות — ומחזירים תשובה בפחות מ-200ms. כל ה-routing, ה-NAT, ה-DNS — עובד שקוף מאחורי הקלעים. הפקודות שנלמד כאן חושפות בדיוק מה קורה.</div>

<div class="section-title">כלי אבחון רשת — הסיפור מאחורי הפקודות</div>
<p class="prose">לפני שנלמד את הפקודות, חשוב להבין מה הן בודקות. רשת Linux פועלת בשכבות: physical (כרטיס רשת), network (IP), transport (TCP/UDP), application. כל כלי בודק שכבה שונה — וביחד הם נותנים תמונה מלאה.</p>
<pre class="code-block"><code><span class="comment"># ip — הכלי המודרני (מחליף ifconfig)</span>
ip addr                    <span class="comment"># כל ה-interfaces + IP addresses</span>
ip addr show eth0          <span class="comment"># ספציפי לinterface</span>
ip route                   <span class="comment"># routing table — איפה כל packet יוצא</span>
ip route add 10.0.0.0/8 via 192.168.1.1  <span class="comment"># הוסף route</span>
ip link set eth0 up/down   <span class="comment"># הדלק/כבה interface</span>

<span class="comment"># ss — בדיקת ports ו-connections (מחליף netstat)</span>
ss -tlnp                   <span class="comment"># t=TCP, l=listening, n=numeric, p=process</span>
ss -tulnp                  <span class="comment"># גם UDP</span>
ss -tnp | grep ESTABLISHED <span class="comment"># חיבורים פעילים</span>
ss -tnp sport = :443       <span class="comment"># רק port 443</span>

<span class="comment"># ping ו-traceroute</span>
ping -c 4 google.com       <span class="comment"># 4 packets — בדיקת חיבור</span>
traceroute google.com      <span class="comment"># כל ה-hops בדרך</span>
mtr google.com             <span class="comment"># traceroute + ping real-time (apt install mtr)</span>

<span class="comment"># DNS</span>
nslookup google.com        <span class="comment"># שאל DNS</span>
dig google.com A           <span class="comment"># DNS query מפורט</span>
dig +short google.com      <span class="comment"># רק ה-IPs</span>
cat /etc/resolv.conf       <span class="comment"># DNS servers שמוגדרים</span>
cat /etc/hosts             <span class="comment"># local overrides</span></code></pre>

<div class="section-title">SSH — יותר מסתם Remote Shell</div>
<p class="prose">SSH (Secure Shell) הוא פרוטוקול מוצפן שמאפשר remote access לשרתים. אבל SSH הוא הרבה יותר מ-"shell מרחוק" — הוא tunnel מוצפן שאפשר להעביר דרכו קבצים, tunnels, port forwarding, ואפילו GUI applications.</p>
<pre class="code-block"><code><span class="comment"># SSH בסיסי</span>
ssh alice@server.com           <span class="comment"># התחבר כ-alice</span>
ssh -p 2222 alice@server.com  <span class="comment"># port שאינו 22</span>
ssh -i ~/.ssh/mykey alice@server.com  <span class="comment"># עם key ספציפי</span>

<span class="comment"># SSH keys — הדרך הנכונה (לא סיסמאות)</span>
ssh-keygen -t ed25519 -C "alice@company.com"  <span class="comment"># צור key pair</span>
ssh-copy-id alice@server.com                  <span class="comment"># העתק public key לשרת</span>
<span class="comment"># מעכשיו: ssh ללא סיסמה</span>

<span class="comment"># ~/.ssh/config — קיצורי דרך</span>
Host prod
    HostName server.company.com
    User alice
    IdentityFile ~/.ssh/prod_key
    Port 2222
<span class="comment"># עכשיו פשוט: ssh prod</span>

<span class="comment"># SCP ו-rsync — העברת קבצים</span>
scp file.txt alice@server.com:~/     <span class="comment"># העלה קובץ</span>
scp alice@server.com:~/log.txt .     <span class="comment"># הורד קובץ</span>
rsync -avz ./src alice@server.com:~/ <span class="comment"># sync תיקייה (רק שינויים)</span>
rsync -avz --delete ./web/ alice@server.com:/var/www/  <span class="comment"># deploy</span>

<span class="comment"># SSH Tunneling — port forwarding</span>
ssh -L 8080:localhost:80 alice@server.com
<span class="comment"># ← local:8080 מועבר לserver:80</span>
<span class="comment"># ← גישה לservicess פנימיים דרך SSH tunnel</span></code></pre>

<div class="section-title">Firewall — iptables ו-ufw</div>
<p class="prose">iptables הוא ה-firewall המובנה בLinux. הוא חזק מאוד — ומסובך מאוד. ufw (Uncomplicated Firewall) הוא wrapper שהופך את זה לניהול פשוט. בשרתי production, השניים נמצאים — iptables עובד מאחורי הקלעים, ufw נותן interface נוח.</p>
<pre class="code-block"><code><span class="comment"># ufw — פשוט ויעיל לשרתי Ubuntu</span>
sudo ufw status            <span class="comment"># מצב נוכחי</span>
sudo ufw enable            <span class="comment"># הפעל</span>
sudo ufw allow 22          <span class="comment"># אפשר SSH</span>
sudo ufw allow 80          <span class="comment"># אפשר HTTP</span>
sudo ufw allow 443         <span class="comment"># אפשר HTTPS</span>
sudo ufw allow from 10.0.0.0/8 to any port 5432  <span class="comment"># Postgres רק מ-private network</span>
sudo ufw deny 8080         <span class="comment"># חסום</span>
sudo ufw delete allow 8080 <span class="comment"># מחק rule</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 SSH key לעומת סיסמה — למה זה לא אופציונלי</div>
  <div class="real-world-body">
    שרת עם SSH פתוח לinternett ללא הגדרת key-only יקבל עשרות אלפי ניסיונות brute force ביום — bots אוטומטיים שמנסים שמות משתמש וסיסמאות נפוצות. מנהלי מערכת שמסתכלים ב-/var/log/auth.log בשרת חדש רואים לפעמים עשרות ניסיונות לדקה.<br><br>
    הגדרת <code>PasswordAuthentication no</code> ב-/etc/ssh/sshd_config מסיימת את הבעיה. עם key-based auth, brute force בלתי אפשרי — הkey הוא 2048+ bits, מה שלוקח יותר זמן לפרוץ מגיל היקום.
  </div>
</div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> ה-Package Manager של Linux פתר ב-1998 בעיה שWindows עדיין לא פתרה לגמרי ב-2025: dependency hell. כשמתקינים תוכנה, apt/dnf מחשבים אוטומטית את כל ה-dependencies, מורידים הכל לפי הסדר הנכון, ומתקינים בצורה אטומית. להסרה — אותו הדבר. זה נשמע פשוט. זה לא.</div>

<div class="section-title">apt — Package Manager של Debian/Ubuntu</div>
<p class="prose">apt (Advanced Package Tool) הוא ה-package manager שמנהל תוכנות בUbuntu ובDebian. הוא מחזיק registry של עשרות אלפי packages, יודע מה תלוי במה, ומבצע התקנה/עדכון/הסרה בצורה אמינה. apt עובד עם repositories — שרתים שמחזיקים packages. כשמריצים apt update, הוא מוריד את הרשימה העדכנית מהrepositories.</p>
<pre class="code-block"><code><span class="comment"># עדכון ראשוני — תמיד לפני התקנה</span>
sudo apt update             <span class="comment"># עדכן רשימת packages (לא מתקין כלום)</span>
sudo apt upgrade            <span class="comment"># עדכן packages מותקנים</span>
sudo apt full-upgrade       <span class="comment"># עדכן + טפל בconflicts</span>

<span class="comment"># התקנה</span>
sudo apt install nginx      <span class="comment"># התקן nginx</span>
sudo apt install -y nginx   <span class="comment"># אשר אוטומטית (לscripts)</span>
sudo apt install nginx postgresql python3  <span class="comment"># כמה packages</span>

<span class="comment"># הסרה</span>
sudo apt remove nginx       <span class="comment"># הסר (שמור config files)</span>
sudo apt purge nginx        <span class="comment"># הסר כולל config</span>
sudo apt autoremove         <span class="comment"># נקה dependencies שלא צריך</span>

<span class="comment"># חיפוש ומידע</span>
apt search "web server"     <span class="comment"># חפש packages</span>
apt show nginx              <span class="comment"># מידע על package</span>
dpkg -l | grep nginx        <span class="comment"># האם מותקן?</span>
dpkg -L nginx               <span class="comment"># אילו קבצים package מותקן</span>

<span class="comment"># repositories — איפה apt מחפש</span>
cat /etc/apt/sources.list
ls /etc/apt/sources.list.d/  <span class="comment"># repos נוספים (PPA)</span>
sudo add-apt-repository ppa:deadsnakes/python  <span class="comment"># הוסף PPA</span></code></pre>

<div class="section-title">dnf/yum — Package Manager של RHEL/Fedora</div>
<p class="prose">dnf (Dandified YUM) הוא ה-package manager של Red Hat Enterprise Linux, Fedora, וCentOS Stream. הsyntax דומה מאוד לapt אבל יש הבדלים. ב-RHEL-based systems, ה-repositories נקראים repos ומנוהלים קצת שונה.</p>
<pre class="code-block"><code><span class="comment"># dnf — מקביל ל-apt</span>
sudo dnf check-update       <span class="comment"># בדוק עדכונים (כמו apt update)</span>
sudo dnf update             <span class="comment"># עדכן הכל</span>
sudo dnf install nginx      <span class="comment"># התקן</span>
sudo dnf remove nginx       <span class="comment"># הסר</span>
sudo dnf search postgresql  <span class="comment"># חפש</span>
sudo dnf info nginx         <span class="comment"># מידע</span>

<span class="comment"># repositories ב-RHEL</span>
sudo dnf repolist           <span class="comment"># repos פעילים</span>
sudo dnf config-manager --enable epel  <span class="comment"># הפעל EPEL repo</span></code></pre>

<div class="section-title">systemd — ניהול שירותים</div>
<p class="prose">systemd הוא ה-init system של רוב הDistributions המודרניות. הוא מריץ services, מנהל אותם, מפקח עליהם, ומאפשר לראות logs שלהם. כשמתקינים nginx, הוא לא מופעל אוטומטית — צריך לנהל אותו דרך systemctl.</p>
<pre class="code-block"><code><span class="comment"># systemctl — ניהול שירותים</span>
sudo systemctl start nginx    <span class="comment"># הפעל</span>
sudo systemctl stop nginx     <span class="comment"># עצור</span>
sudo systemctl restart nginx  <span class="comment"># הפעל מחדש</span>
sudo systemctl reload nginx   <span class="comment"># reload config ללא restart</span>
sudo systemctl status nginx   <span class="comment"># מצב + לוגים אחרונים</span>
sudo systemctl enable nginx   <span class="comment"># הפעל אוטומטית בboot</span>
sudo systemctl disable nginx  <span class="comment"># בטל הפעלה בboot</span>
systemctl list-units --type=service  <span class="comment"># כל השירותים</span>

<span class="comment"># journalctl — לוגים של systemd</span>
journalctl -u nginx           <span class="comment"># לוגים של nginx</span>
journalctl -u nginx -f        <span class="comment"># live (כמו tail -f)</span>
journalctl -u nginx --since "1 hour ago"  <span class="comment"># שעה אחרונה</span>
journalctl -p err             <span class="comment"># רק errors</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 apt vs pip vs npm — מתי כל אחד?</div>
  <div class="real-world-body">
    כלל אצבע שחוסך כאבי ראש: apt מתקין system-level software (nginx, postgresql, python3-dev). pip מתקין Python libraries (django, requests). npm מתקין Node packages (express, react). אל תערבבי.<br><br>
    הטעות הנפוצה: <code>sudo pip install requests</code> במקום <code>pip install requests</code> בvirtual environment. התקנה עם sudo כותבת ל-system Python ועלולה לשבור packages שהמערכת מסתמכת עליהם. כלל: pip תמיד בתוך venv, npm תמיד בתוך project directory.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 בפועל</strong></div>
<div class="section-title">Package Management Best Practices</div>
<pre class="code-block"><code><span class="comment"># שגרת עדכונים (automation)</span>
sudo apt update && sudo apt upgrade -y
sudo apt autoremove -y    <span class="comment"># נקה dependencies ישנות</span>
sudo apt clean            <span class="comment"># נקה cache</span>

<span class="comment"># בדוק מה מותקן</span>
dpkg -l | grep nginx      <span class="comment"># גרסה מותקנת?</span>
apt-cache policy nginx    <span class="comment"># installed vs candidate</span>

<span class="comment"># Unattended upgrades — security patches אוטומטיים</span>
sudo apt install unattended-upgrades
sudo dpkg-reconfigure --priority=low unattended-upgrades

<span class="comment"># Python בvenv — תמיד!</span>
python3 -m venv /opt/myapp/venv
source /opt/myapp/venv/bin/activate
pip install -r requirements.txt
<span class="comment"># NEVER: sudo pip install</span>

<span class="comment"># בדוק security updates בלבד</span>
apt list --upgradable 2>/dev/null | grep security</code></pre>

`<div class="did-you-know">💡 <strong>ידעת?</strong> Shell scripting הוא ה-"דבק" של DevOps. כל CI/CD pipeline, כל deployment script, כל monitoring check — תחת הקישוט היפה של YAML ו-JSON — מריץ bash scripts. לא צריך להיות מומחה ב-bash, אבל להבין את הבסיס חוסך שעות של debugging וגם מאפשר לקרוא ולהבין scripts שאחרים כתבו.</div>

<div class="section-title">Bash Script — מהתחלה</div>
<p class="prose">Script הוא קובץ טקסט שמכיל פקודות. כשמריצים אותו, bash מבצע כל שורה בסדר. הכוח: אפשר לאוטומט כל דבר. הסיכון: script שרץ אוטומטית בלי בדיקות יכול לגרום נזק אמיתי. לכן נלמד לכתוב scripts נכון מההתחלה.</p>
<pre class="code-block"><code><span class="comment">#!/bin/bash</span>
<span class="comment"># שורה ראשונה: shebang — אמור לLinux במה להריץ</span>
<span class="comment"># bash != sh != zsh — חשוב לציין במפורש</span>
set -euo pipefail
<span class="comment"># -e: צא אם פקודה נכשלת</span>
<span class="comment"># -u: שגיאה על variable לא מוגדר</span>

<span class="comment"># ← שלושת אלה מונעים 80% מהבאגים בscripts</span>

<span class="comment"># Variables</span>

<span class="comment"># Arguments</span>

<div class="section-title">Conditionals ו-Loops — ה-logic של Scripts</div>
<pre class="code-block"><code><span class="comment"># if — בדיקות</span>

<span class="comment"># תנאים נפוצים</span>

[ -d dir ]      <span class="comment"># תיקייה קיימת</span>

<span class="comment"># for loops</span>

done

for i in {1..5}; do
    echo "Round $i"
done

<span class="comment"># while loop</span>

    curl -sf http://localhost/health || echo "DOWN!"
    sleep 30
done</code></pre>

<div class="section-title">Functions ו-Error Handling</div>
<pre class="code-block"><code><span class="comment">#!/bin/bash</span>

<span class="comment"># Functions — קוד שניתן לשימוש חוזר</span>

}

backup_db() {
    local db_name=$1     <span class="comment"># local = רק בתוך הfunction</span>
    local output_file="backup_\\\\\\\${db_name}_$(date +%Y%m%d).sql"
    log "Starting backup of $db_name"
    pg_dump "$db_name" > "$output_file"
    log "Backup complete: $output_file"
}

<span class="comment"># Exit codes — 0 = הצלחה, כל מספר אחר = שגיאה</span>
if ! command -v nginx &> /dev/null; then
    echo "Error: nginx not installed" >&2    <span class="comment"># stderr</span>
    exit 1
fi

<span class="comment"># trap — cleanup כשscript נכשל</span>
cleanup() {
    log "Cleaning up temp files..."
    rm -f /tmp/myapp_lock
}
trap cleanup EXIT    <span class="comment"># קרא לcleanup כשscript יוצא (גם בשגיאה)</span>

<span class="comment"># שימוש</span>
log "Starting deployment"
backup_db "production"
log "Deployment complete"</code></pre>

`<div class="did-you-know">💡 <strong>ידעת?</strong> Vim נוצר ב-1991 כשיפור על vi משנת 1976. StackOverflow שאל ב-2017 "כיצד יוצאים מ-Vim?" — 1.4 מיליון צפיות. זה לא בדיחה — המעבר בין מצבים הוא ה-mental model שמבלבל כולם בהתחלה. ברגע שמבינים את הלוגיקה, Vim הופך לכלי העריכה המהיר ביותר שיש.</div>

<div class="section-title">Modal Editing — הרעיון שמאחורי Vim</div>
<p class="prose">Vim הוא editor "modal" — יש לו מצבים שונים, וכל מצב מפרש את לחיצות המקלדת בצורה שונה. Normal Mode הוא ברירת המחדל: כל אות היא פקודה, לא תו לכתיבה. Insert Mode הוא לכתיבה. Visual Mode לסימון. Command Mode לפקודות מתקדמות. ה-confusion תמיד מגיע מלחוץ אותיות ב-Normal Mode ולתהות "מה קרה לקובץ שלי?"</p>
<p class="prose">הכלל הראשון: ESC תמיד מחזיר ל-Normal Mode. תמיד. גם אם לא יודעים איפה נמצאים — ESC מחזיר לבסיס.</p>

<div class="grid-2">
<div class="card"><div class="card-icon">📋</div><div class="card-title">Normal Mode — ברירת מחדל</div><div class="card-body">ניווט, מחיקה, העתקה, חיפוש. כל לחיצת מקש היא פקודה. ESC = תמיד חוזר לכאן.</div></div>
<div class="card"><div class="card-icon">✏️</div><div class="card-title">Insert Mode — כתיבה</div><div class="card-body">i = לפני cursor. a = אחרי cursor. o = שורה חדשה מתחת. I = תחילת שורה. A = סוף שורה. ESC = יציאה.</div></div>
<div class="card"><div class="card-icon">🔲</div><div class="card-title">Visual Mode — סימון</div><div class="card-body">v = תווים. V = שורות שלמות. Ctrl+v = עמודות (block mode). לאחר סימון: y=copy, d=cut, c=change.</div></div>
<div class="card"><div class="card-icon">⌨️</div><div class="card-title">Command Mode — פקודות</div><div class="card-body">: מ-Normal Mode. :w = שמור. :q = צא. :wq = שמור וצא. :q! = צא בלי לשמור. :set nu = מספרי שורות.</div></div>
</div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> systemd החליף את SysV init ב-2010 ויצר מחלוקת עצומה בקהילת Linux — חלק טענו שהוא "too complex" ו"does too much". כיום systemd רץ ב-Ubuntu, Fedora, Debian, CentOS, Arch, ו-כמעט כל distribution מודרנית. להבין systemd = להבין איך Linux מנהל services, dependencies, ו-boot sequence.</div>

<div class="section-title">systemd — מה זה ואיך עובד</div>
<p class="prose">systemd הוא ה-init system של Linux המודרני — ה-process הראשון שרץ אחרי הkernel (PID 1), שמריץ הכל אחר כך. systemd מנהל services (daemon processes), מגדיר סדר הפעלה עם dependencies, מאזין ל-sockets, מנטר processes, ו-מציג logs. כשמריצים <code>systemctl start nginx</code> — systemd יוצר את ה-process, מנטר אותו, ומפעיל מחדש אם מת.</p>
<p class="prose">systemd עובד עם "units" — קבצי configuration שמתארים מה להריץ ואיך. כל service, socket, timer, ו-mount point הוא unit. Unit files נמצאים ב-/lib/systemd/system (system) ו-/etc/systemd/system (user overrides).</p>

<div class="section-title">systemctl — ניהול Services</div>
<pre class="code-block"><code><span class="comment"># פעולות בסיסיות</span>
sudo systemctl start nginx      <span class="comment"># הפעל</span>
sudo systemctl stop nginx       <span class="comment"># עצור</span>
sudo systemctl restart nginx    <span class="comment"># restart מלא</span>
sudo systemctl reload nginx     <span class="comment"># reload config בלי restart</span>
sudo systemctl status nginx     <span class="comment"># מצב + לוגים אחרונים</span>
sudo systemctl enable nginx     <span class="comment"># הפעל בboot</span>
sudo systemctl disable nginx    <span class="comment"># בטל הפעלה בboot</span>
sudo systemctl is-active nginx  <span class="comment"># active / inactive</span>

<span class="comment"># רשימות</span>
systemctl list-units --type=service          <span class="comment"># כל services רצים</span>
systemctl list-units --type=service --all    <span class="comment"># כולל stopped</span>
systemctl list-unit-files                    <span class="comment"># כל unit files</span></code></pre>

<div class="section-title">כתיבת Service Unit</div>
<pre class="code-block"><code><span class="comment"># /etc/systemd/system/myapp.service</span>
[Unit]
Description=My Python App
After=network.target postgresql.service
Requires=postgresql.service

[Service]
Type=simple
User=www-data
WorkingDirectory=/opt/myapp
ExecStart=/usr/bin/python3 /opt/myapp/server.py
Restart=on-failure
RestartSec=5
Environment=PORT=8080
Environment=DB_HOST=localhost

[Install]
WantedBy=multi-user.target</code></pre>
<pre class="code-block"><code><span class="comment"># אחרי יצירת הקובץ</span>
sudo systemctl daemon-reload        <span class="comment"># טען unit חדש</span>
sudo systemctl enable --now myapp  <span class="comment"># הפעל + enable בboot</span>
sudo systemctl status myapp</code></pre>

<div class="section-title">journalctl — לוגים</div>
<pre class="code-block"><code>journalctl -u nginx                 <span class="comment"># לוגים של nginx</span>
journalctl -u nginx -f              <span class="comment"># live (כמו tail -f)</span>
journalctl -u nginx --since "1h ago"
journalctl -p err -u nginx          <span class="comment"># errors בלבד</span>
journalctl --disk-usage             <span class="comment"># כמה מקום לוגים תופסים</span>
journalctl --vacuum-time=7d         <span class="comment"># מחק לוגים מעל שבוע</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 Service שמת ולא חוזר — איך מאבחנים</div>
  <div class="real-world-body">
    <code>systemctl status myapp</code> מראה "failed". הצעד הבא: <code>journalctl -u myapp -n 50 --no-pager</code> — 50 שורות אחרונות ללא pagination. בד"כ שם נמצאת השגיאה: ImportError, PermissionError, port already in use. אחרי תיקון: <code>systemctl restart myapp</code> ו-<code>systemctl status</code> מיד אחר כך לאמת.
  </div>
</div>

<div class="section-title">Service לאפליקציה שלך — Checklist</div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> "/" שפוסלת disk space ב-Linux היא אחת הסיבות הנפוצות ביותר ל-downtime ב-production. שרתים שמריצים לוגים ללא rotation, containers שמצטברים, ו-temp files שלא נמחקים — כולם גורמים ל-100% disk usage שגורם לapplications לקרוס. <code>df -h</code> ו-<code>du</code> הם ה-first responders לבעיות כאלה.</div>

<div class="section-title">Disk Structure — כיצד Linux רואה דיסקים</div>
<p class="prose">ב-Linux, כל דיסק פיזי מיוצג כ-device file ב-/dev. דיסק SATA ראשון = /dev/sda, שני = /dev/sdb. Partitions של /dev/sda = /dev/sda1, /dev/sda2. NVMe SSD = /dev/nvme0n1, partitions = /dev/nvme0n1p1. Virtual disks ב-VMs ובcloud לרוב = /dev/vda. הבנת השמות האלה קריטית לניהול storage.</p>
<pre class="code-block"><code><span class="comment"># בדיקת מצב דיסקים</span>
df -h                  <span class="comment"># disk free — מה מחובר וכמה מקום</span>
df -hi                 <span class="comment"># גם inodes (חשוב! יכול לאזול לפני space)</span>
lsblk                  <span class="comment"># tree של block devices</span>
lsblk -f               <span class="comment"># + filesystem type ו-UUID</span>
fdisk -l               <span class="comment"># partition table מפורטת (root)</span>
blkid                  <span class="comment"># UUID וtype לכל device</span></code></pre>

<div class="section-title">מציאת מה אוכל disk space</div>
<pre class="code-block"><code><span class="comment"># du — disk usage</span>
du -sh /var/log/         <span class="comment"># כמה לוגים תופסים</span>
du -sh /* 2>/dev/null | sort -rh | head -10
<span class="comment"># ← top 10 תיקיות הכי גדולות ב-root</span>

du -sh /var/log/* | sort -rh | head -5
<span class="comment"># ← מה הכי גדול בlogs</span>

<span class="comment"># מצא קבצים גדולים</span>
find / -size +500M -type f 2>/dev/null | sort -k5 -rn

<span class="comment"># מצא קבצים ישנים</span>
find /var/log -name "*.log" -mtime +30 -delete   <span class="comment"># מחק logs מעל 30 ימים</span></code></pre>

<div class="section-title">Mount ו-fstab</div>
<p class="prose">Mount הוא החיבור של filesystem לנקודה בעץ הקבצים. כל partition, network share, ו-device חייב להיות "mounted" לפני שניתן לגשת לתוכנו. fstab (/etc/fstab) הוא קובץ שמגדיר מה mount אוטומטית בboot.</p>
<pre class="code-block"><code><span class="comment"># mount ידני</span>
sudo mount /dev/sdb1 /mnt/data     <span class="comment"># mount partition</span>
sudo umount /mnt/data              <span class="comment"># unmount</span>

<span class="comment"># /etc/fstab — mount אוטומטי בboot</span>
UUID=a1b2c3d4  /data  ext4  defaults  0  2
<span class="comment"># UUID   mountpoint  fstype  options  dump  fsck</span>

<span class="comment"># בדוק fstab תקין לפני reboot!</span>
sudo mount -a              <span class="comment"># נסה mount כל fstab entries</span>
<span class="comment"># אם אין שגיאות — בטוח לreboot</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 Disk Full — Production Down</div>
  <div class="real-world-body">
    אפליקציה קרסה בshרת production. הלוג: "No space left on device". <code>df -h</code>: / at 100%. <code>du -sh /var/log/*</code> חשף: /var/log/app.log — 85GB. אפליקציה ללא log rotation. פתרון מיידי: <code>truncate -s 0 /var/log/app.log</code> (לא rm! — process עדיין מחזיק file descriptor פתוח). פתרון קבוע: הוסף logrotate config. לקח: monitoring על disk usage עם alert ב-80% מונע את ה-100% הבא.

<div class="section-title">Troubleshooting Methodology — לא מנחשים</div>
<p class="prose">הגישה הנכונה לבעיות Linux: (1) Define — מה בדיוק לא עובד? מה השגיאה המדויקת? (2) Collect — אסוף data לפני שנוגעים בכלום. (3) Narrow — מצמצם את האפשרויות. (4) Fix — מתקן דבר אחד בכל פעם. (5) Verify — מאמת שהתיקון פתר את הבעיה. לדלג על שלבים = לפספס root cause ולפתור symptom במקום הבעיה.</p>

<div class="section-title">כלי Debugging מרכזיים</div>
<pre class="code-block"><code><span class="comment"># dmesg — kernel messages</span>
dmesg | tail -20           <span class="comment"># הודעות kernel אחרונות</span>
dmesg -T | grep -i error   <span class="comment"># errors עם timestamp</span>
dmesg | grep -i "oom"      <span class="comment"># Out of Memory killer?</span>
dmesg | grep -i "disk"     <span class="comment"># בעיות disk?</span>

<span class="comment"># journalctl — system logs</span>
journalctl -b              <span class="comment"># מהboot הנוכחי</span>
journalctl -b -1           <span class="comment"># מהboot הקודם (crash?)</span>
journalctl -p err -b       <span class="comment"># errors בלבד מהboot</span>
journalctl --since "10 min ago"

<span class="comment"># strace — מה process עושה</span>
strace -p 1234             <span class="comment"># attach לprocess קיים</span>
strace -e trace=network ls <span class="comment"># רק network syscalls</span>
strace -o /tmp/trace.txt command

<span class="comment"># lsof — קבצים ו-ports פתוחים</span>
lsof -i :8080              <span class="comment"># מי מאזין על port 8080?</span>
lsof -p 1234               <span class="comment"># קבצים פתוחים על ידי PID</span>
lsof | grep deleted        <span class="comment"># קבצים "נמחקים" שעדיין פתוחים</span></code></pre>

<div class="section-title">בעיות נפוצות ו-First Response</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>תסמין</th><th>First Check</th><th>כלי</th></tr></thead><tbody>

<tr><td>Disk full</td><td>איפה המקום אזל?</td><td>df -h, du -sh /* | sort -rh</td></tr>
<tr><td>Memory אזל</td><td>OOM killer פעל?</td><td>dmesg | grep oom, free -h</td></tr>
<tr><td>Port לא מאזין</td><td>Service רץ? Port נכון?</td><td>ss -tlnp, systemctl status</td></tr>
<tr><td>Permission denied</td><td>מי מריץ? מה הרשאות?</td><td>ls -la, id, sudo -l</td></tr>
<tr><td>CPU גבוה</td><td>מי אוכל CPU?</td><td>top, ps aux --sort=-%cpu</td></tr>
</tbody></table></div>

<div class="section-title">Performance Analysis</div>
<pre class="code-block"><code><span class="comment"># CPU</span>
top                        <span class="comment"># real-time</span>

ps aux --sort=-%cpu | head -10

<span class="comment"># Memory</span>
free -h                    <span class="comment"># RAM ו-swap usage</span>
vmstat 1 5                 <span class="comment"># virtual memory stats</span>

<span class="comment"># Network</span>
ss -tlnp                   <span class="comment"># listening ports</span>
ss -tnp                    <span class="comment"># established connections</span>
nethogs                    <span class="comment"># bandwidth per process</span>

<span class="comment"># I/O</span>
iostat -x 1 5              <span class="comment"># disk I/O stats</span>
iotop                      <span class="comment"># top לdisk I/O</span></code></pre>

<div class="real-world-box">

<div class="section-title">What is Linux?</div>
<p class="prose">Linux is a Unix-family kernel developed in 1991 by Linus Torvalds. The kernel is the software layer that manages hardware and provides services to applications. What most people call "Linux" is actually GNU/Linux — the Linux kernel combined with GNU tools.</p>

<div class="card"><div class="card-icon">📦</div><div class="card-title">Distros</div><div class="card-body">Ubuntu, Fedora, Debian, Arch — same kernel, different package managers and configurations.</div></div>

 <div class="perm-seg"><span class="perm-r">r</span><span class="perm-dash">-</span><span class="perm-dash">-</span></div>
</div>
<p class="prose">type · owner (rwx) · group (r-x) · others (r--) · read=4, write=2, execute=1</p>
<pre class="code-block"><code>chmod 755 script.sh   <span class="comment"># rwxr-xr-x</span>
chmod u+x file        <span class="comment"># add execute to owner</span>
chown alice:devs file <span class="comment"># change owner and group</span>
ls -la /etc/passwd    <span class="comment"># -rw-r--r-- 1 root root</span></code></pre>
<div class="section-title">Inodes and Links</div>
<div class="grid-2">
<div class="card"><div class="card-icon">🔗</div><div class="card-title">Hard Link</div><div class="card-body">Another pointer to the same inode. Deleting the original doesn't delete data. Doesn't work on directories or cross-filesystem.</div></div>
<div class="card"><div class="card-icon">↪️</div><div class="card-title">Symbolic Link (Symlink)</div><div class="card-body">A file that points to a path. Like a Windows shortcut. Works on directories, can be broken.</div></div>
</div>
<pre class="code-block"><code>ln /etc/hosts /tmp/hosts_hard  <span class="comment"># hard link</span>
ln -s /etc/nginx/nginx.conf ~/nginx.conf  <span class="comment"># symlink</span>
stat /etc/passwd  <span class="comment"># show inode, data</span>
df -i  <span class="comment"># check inode usage</span></code></pre>

tree -L 2 /etc                  <span class="comment"># display tree depth 2</span></code></pre>
<div class="section-title">Search and Text Processing</div>
<pre class="code-block"><code>grep -rn "ERROR" /var/log/    <span class="comment"># recursive search with line numbers</span>
grep -v "DEBUG" app.log       <span class="comment"># exclude DEBUG lines</span>
grep -E "^(ERROR|WARN)" log   <span class="comment"># extended regex</span>
awk '{print $1,$4}' access.log <span class="comment"># print columns 1 and 4</span>
sed 's/old/new/g' file.txt    <span class="comment"># replace text</span>
cut -d: -f1 /etc/passwd        <span class="comment"># cut column 1 (usernames)</span>
sort -k2 -n data.txt | uniq -c <span class="comment"># sort and count unique</span></code></pre>
<div class="section-title">Pipes and Redirects</div>
<pre class="code-block"><code>cat access.log | grep 404 | wc -l   <span class="comment"># count 404 errors</span>
ps aux | grep nginx | grep -v grep   <span class="comment"># find nginx processes</span>
command > out.txt    <span class="comment"># redirect stdout</span>
command 2> err.txt   <span class="comment"># redirect stderr</span>
