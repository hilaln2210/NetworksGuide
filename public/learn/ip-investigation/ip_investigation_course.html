<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IP Investigation Course</title>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f7f7f2;
  --bg2:      #ffffff;
  --bg3:      #f0f0ea;
  --surface:  #ffffff;
  --border:   #e5e5e0;
  --border2:  #d1d1ca;
  --accent:   #0e7490;
  --accent2:  #0a5c72;
  --accentfg: #ffffff;
  --green:    #58cc02;
  --green2:   #46a302;
  --greenfg:  #ffffff;
  --yellow:   #ffd900;
  --yellowfg: #785a00;
  --red:      #ff4b4b;
  --redfg:    #ffffff;
  --blue:     #1cb0f6;
  --bluefg:   #ffffff;
  --text:     #3c3c3c;
  --text2:    #6b6b6b;
  --text3:    #afafaf;
  --mono:     'Courier New', 'Consolas', monospace;
  --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --r:        12px;
  --r2:       20px;
  --r3:       24px;
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 200;
  background: var(--bg2); border-bottom: 2px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px;
}
.header-logo {
  font-weight: 800; font-size: 16px; color: var(--accent);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  letter-spacing: -0.3px;
}
.header-logo-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--green); box-shadow: 0 2px 0 var(--green2);
}
.header-chname {
  font-size: 13px; font-weight: 600; color: var(--text2);
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lang-btn {
  font-size: 12px; font-weight: 800; padding: 6px 14px; border-radius: var(--r);
  border: 2px solid var(--border2); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text2);
  cursor: pointer; flex-shrink: 0; transition: all .1s;
  text-transform: uppercase; letter-spacing: .04em;
}
.lang-btn:hover { background: var(--accent); color: var(--accentfg); border-color: var(--accent2); border-bottom-color: var(--accent2); }
.lang-btn:active { transform: translateY(2px); border-bottom-width: 2px; }

/* ── CHAPTER NAV BAR ── */
.ch-nav {
  position: fixed; top: 60px; left: 0; right: 0; z-index: 150;
  background: var(--bg2); border-bottom: 2px solid var(--border);
  overflow-x: auto; display: flex; padding: 8px 16px; gap: 6px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.ch-nav::-webkit-scrollbar { display: none; }
.sb-label { display: none; }
.ch-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 14px; gap: 3px; border: 2px solid transparent;
  background: var(--bg3); border-radius: var(--r2);
  cursor: pointer; transition: all .15s; flex-shrink: 0;
  color: var(--text2); min-width: 52px;
  border-bottom: 4px solid var(--border);
}
.ch-btn:hover { background: var(--bg2); border-color: var(--border2); color: var(--text); }
.ch-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent2); border-bottom-color: var(--accent2);
}
.ch-num { font-size: 11px; font-weight: 800; font-family: var(--mono); }
.ch-title-text { font-size: 9px; font-weight: 600; max-width: 68px; text-align: center; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.ch-stars { font-size: 10px; min-height: 12px; }

/* ── LAYOUT ── */
.main {
  padding-top: 112px; min-height: 100vh;
  max-width: 780px; margin: 0 auto;
  padding-left: 20px; padding-right: 20px; padding-bottom: 60px;
}

/* ── CHAPTER ── */
.chapter { display: none; }
.chapter.active { display: block; }

/* ── CHAPTER HERO ── */
.ch-hero {
  padding: 28px 0 24px; border-bottom: 2px solid var(--border); margin-bottom: 28px;
}
.ch-tag {
  display: inline-block; font-size: 11px; font-weight: 800;
  color: var(--accent); background: var(--bg3);
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
  letter-spacing: .06em; text-transform: uppercase; font-family: var(--mono);
}
.ch-title { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 8px; letter-spacing: -.5px; line-height: 1.2; }
.ch-desc { font-size: 14px; color: var(--text2); margin-bottom: 20px; max-width: 560px; }
.tabs-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 18px; font-size: 13px; font-weight: 800; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text3);
  cursor: pointer; transition: all .1s; text-transform: uppercase; letter-spacing: .04em;
}
.tab-btn:hover { color: var(--text2); border-color: var(--border2); }
.tab-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
.tab-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent2); border-bottom-color: var(--accent2);
}

/* ── TAB PANELS ── */
.tab-panels { }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── LEARN CONTENT ── */
.did-you-know {
  background: linear-gradient(135deg, #fffdf0, #fff9e0);
  border: 2px solid var(--yellow); border-radius: var(--r2);
  padding: 16px 18px; font-size: 13.5px; color: #5a4a00;
  margin-bottom: 28px; line-height: 1.6;
  box-shadow: 0 3px 0 #e6c700;
}
.section-title {
  font-size: 17px; font-weight: 900; color: var(--text);
  margin: 32px 0 12px; letter-spacing: -.2px;
  display: flex; align-items: center; gap: 8px;
}
.prose {
  font-size: 15px; color: var(--text2); line-height: 1.78; margin-bottom: 16px;
}
.prose code, code {
  font-family: var(--mono); font-size: 12.5px;
  background: var(--bg3); padding: 2px 6px;
  border-radius: 6px; color: var(--accent2); font-weight: 600;
}

/* ── CODE BLOCKS ── */
.code-block {
  background: #1a1a2e; border-radius: var(--r2); padding: 18px 20px;
  margin: 16px 0; overflow-x: auto;
  border: 2px solid #2a2a4e; box-shadow: 0 4px 0 #0f0f20;
}
.code-block code {
  font-family: var(--mono); font-size: 12.5px; line-height: 1.75;
  background: none; padding: 0; color: #e2e8f0; display: block;
  font-weight: normal;
}
.comment { color: #6272a4; }

/* ── CARDS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin: 16px 0 24px; }
.card {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2);
  padding: 18px; display: flex; flex-direction: column; gap: 8px;
  transition: transform .1s;
}
.card:hover { transform: translateY(-2px); }
.card-icon { font-size: 26px; }
.card-title { font-size: 13px; font-weight: 800; color: var(--text); }
.card-body { font-size: 13px; color: var(--text2); line-height: 1.55; }

/* ── TABLE ── */
.table-wrap {
  overflow-x: auto; margin: 16px 0 24px;
  border-radius: var(--r2); border: 2px solid var(--border);
  box-shadow: 0 4px 0 var(--border);
}
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead { background: var(--bg3); }
.data-table th {
  padding: 11px 14px; text-align: left; font-weight: 800;
  color: var(--text2); font-size: 11px; text-transform: uppercase;
  letter-spacing: .06em; border-bottom: 2px solid var(--border);
}
.data-table td { padding: 11px 14px; color: var(--text2); border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg3); }

/* ── FLOW ROW ── */
.flow-row {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  margin: 16px 0 24px; padding: 20px; background: var(--bg2);
  border-radius: var(--r2); border: 2px solid var(--border);
  box-shadow: 0 4px 0 var(--border);
}
.flow-step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.flow-step-icon { font-size: 24px; }
.flow-step-label { font-size: 10px; font-weight: 700; color: var(--text3); line-height: 1.3; max-width: 64px; text-align: center; }
.flow-arrow { color: var(--accent); font-size: 18px; font-weight: 900; }

/* ── CALLOUTS ── */
.callout { padding: 14px 18px; border-radius: var(--r2); font-size: 13.5px; line-height: 1.6; margin: 16px 0; border: 2px solid; }
.callout-info  { background: #e8f4ff; border-color: #b3d9ff; color: #1a5a8a; box-shadow: 0 3px 0 #b3d9ff; }
.callout-warn  { background: #fff8e0; border-color: var(--yellow); color: #785a00; box-shadow: 0 3px 0 #e6c700; }
.callout-tip   { background: #e8fae8; border-color: #a8e6a8; color: #1a5a1a; box-shadow: 0 3px 0 #a8e6a8; }
.callout-success { background: var(--bg3); border-color: var(--border); color: var(--text2); padding: 10px 14px; }

/* ── REAL WORLD BOX ── */
.real-world-box {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2);
  padding: 20px; margin: 24px 0;
}
.real-world-title { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
.real-world-body { font-size: 13.5px; color: var(--text2); line-height: 1.7; }

/* ── END OF CHAPTER NAV ── */
.ch-end-nav {
  display: flex; gap: 12px; margin-top: 36px; padding-top: 24px;
  border-top: 2px solid var(--border); justify-content: center; flex-wrap: wrap;
}
.ch-end-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 16px 24px; border-radius: var(--r2); cursor: pointer;
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text2); font-weight: 800;
  font-size: 13px; transition: all .1s; min-width: 130px;
  text-transform: uppercase; letter-spacing: .04em;
}
.ch-end-btn:hover { transform: translateY(-2px); border-color: var(--accent); color: var(--accent); }
.ch-end-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
.ch-end-btn.primary {
  background: var(--green); color: var(--greenfg);
  border-color: var(--green2); border-bottom-color: var(--green2);
}
.ch-end-btn.primary:hover { background: var(--green2); }
.ch-end-btn-icon { font-size: 22px; }
.ch-end-btn-label { font-size: 11px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px; border-radius: var(--r2); font-size: 14px;
  font-weight: 800; border: 2px solid; cursor: pointer; transition: all .1s;
  text-transform: uppercase; letter-spacing: .04em;
}
.btn:active { transform: translateY(2px); border-bottom-width: 2px !important; }
.btn-primary {
  background: var(--green); color: var(--greenfg);
  border-color: var(--green2); border-bottom: 4px solid var(--green2);
}
.btn-primary:hover { background: var(--green2); }
.btn-ghost {
  background: var(--bg2); color: var(--text2);
  border-color: var(--border2); border-bottom: 4px solid var(--border2);
}
.btn-ghost:hover { background: var(--bg3); color: var(--text); }

/* ── GAME ── */
.game-wrap { max-width: 680px; }
.game-start-card { max-width: 420px; margin: 0 auto; text-align: center; padding: 40px 24px; }
.game-icon { font-size: 56px; margin-bottom: 16px; filter: drop-shadow(0 4px 0 rgba(0,0,0,.1)); }
.game-start-title { font-size: 24px; font-weight: 900; color: var(--text); margin-bottom: 8px; letter-spacing: -.5px; }
.game-start-desc { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
.game-rules { display: flex; justify-content: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
.game-rule {
  font-size: 13px; font-weight: 700; color: var(--text2);
  background: var(--bg3); padding: 8px 14px; border-radius: var(--r);
  border: 2px solid var(--border);
}
.game-hud {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding: 12px 18px;
  background: var(--bg2); border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
}
.hud-score { font-size: 22px; font-weight: 900; color: var(--green); font-family: var(--mono); }
.hud-timer { font-size: 15px; font-weight: 800; color: var(--text2); font-family: var(--mono); }
.game-q-text { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
.game-opts { display: flex; flex-direction: column; gap: 10px; }
.game-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); cursor: pointer; transition: all .1s;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.game-opt:hover { border-color: var(--accent); border-bottom-color: var(--accent2); transform: translateY(-1px); }
.game-opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.game-opt.correct { border-color: var(--green); border-bottom-color: var(--green2); background: #e8fae8; color: #1a5a1a; }
.game-opt.wrong   { border-color: var(--red); background: #fff0f0; color: #8a1a1a; }
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg3); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; flex-shrink: 0; color: var(--text2);
  font-family: var(--mono);
}
.game-result-card { max-width: 420px; margin: 32px auto 0; text-align: center; }
.result-score { font-size: 60px; font-weight: 900; color: var(--green); font-family: var(--mono); line-height: 1; margin-bottom: 4px; }
.result-label { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 24px; }
.result-emoji { font-size: 52px; margin-bottom: 8px; }
.result-btns { display: flex; gap: 12px; justify-content: center; }
.result-stars { font-size: 28px; margin-bottom: 8px; }

/* ── QUIZ ── */
.quiz-wrap { max-width: 680px; }
.quiz-prog { display: flex; gap: 4px; margin-bottom: 24px; }
.quiz-pip { flex: 1; height: 8px; border-radius: 4px; background: var(--border2); transition: background .2s; }
.quiz-pip.done { background: var(--green); }
.quiz-pip.cur  { background: var(--accent); }
.quiz-q-card { display: none; }
.quiz-q-card.active { display: block; }
.quiz-meta { font-size: 11px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.quiz-q { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
.quiz-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.quiz-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 18px; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); cursor: pointer; transition: all .1s;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.quiz-opt:hover { border-color: var(--accent); border-bottom-color: var(--accent2); transform: translateY(-1px); }
.quiz-opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.quiz-opt.selected { border-color: var(--accent); background: #f0f4ff; }
.quiz-opt.correct   { border-color: var(--green); border-bottom-color: var(--green2); background: #e8fae8; }
.quiz-opt.wrong     { border-color: var(--red); border-bottom-color: #cc0000; background: #fff0f0; }
.quiz-exp {
  padding: 14px 18px; background: #e8fae8; border-radius: var(--r2);
  border: 2px solid var(--green); border-bottom: 4px solid var(--green2);
  font-size: 13.5px; color: #1a5a1a; margin: 12px 0; line-height: 1.6;
}
.quiz-actions { display: flex; gap: 10px; margin-top: 8px; }
.quiz-result { display: none; text-align: center; padding: 32px 0; }
.qr-score { font-size: 56px; font-weight: 900; font-family: var(--mono); color: var(--green); margin-bottom: 4px; }
.qr-label { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 24px; }
.quiz-nav { display: flex; justify-content: space-between; margin-top: 12px; }

/* ── CHEAT / SUMMARY ── */
.cheat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 14px; margin-top: 8px; }
.cheat-card {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2); padding: 16px;
}
.cheat-card-title { font-size: 11px; font-weight: 900; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .08em; }
.cheat-item { display: flex; justify-content: space-between; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.cheat-item:last-child { border-bottom: none; }
.cheat-key { font-family: var(--mono); color: var(--accent); font-weight: 700; font-size: 11.5px; flex-shrink: 0; }
.cheat-val { color: var(--text2); text-align: right; font-size: 11.5px; }

/* ── CREDITS ── */
.credits-bar { border-top: 2px solid var(--border); padding: 32px 0; margin-top: 48px; }
.credits-title { font-size: 10px; font-weight: 900; color: var(--accent); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 16px; font-family: var(--mono); }
.credits-grid { display: flex; flex-wrap: wrap; gap: 24px; }
.credit-group { flex: 1; min-width: 140px; }
.credit-group-title { font-size: 11px; font-weight: 800; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
.credit-item { font-size: 12px; color: var(--text3); line-height: 1.9; }
.credit-item a { color: var(--accent); text-decoration: none; font-weight: 700; }
.credit-item a:hover { text-decoration: underline; }

/* ── MOBILE ── */
@media (max-width: 700px) {
  .main { padding-top: 108px; padding-left: 16px; padding-right: 16px; }
  .ch-title { font-size: 20px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .flow-row { padding: 14px; gap: 4px; }
  .flow-step-label { font-size: 9px; max-width: 52px; }
  .game-rules { gap: 10px; }
  .quiz-actions { flex-wrap: wrap; }
  .result-btns { flex-wrap: wrap; }
  .ch-end-nav { gap: 8px; }
  .ch-end-btn { min-width: 100px; padding: 14px 16px; }
}
@media (max-width: 480px) {
  .ch-nav { padding: 6px 10px; }
  .ch-btn { padding: 7px 10px; min-width: 44px; }
}



/* ── SUMMARY CARDS (sc) ── */
.sc { margin-bottom: 28px; }
.sc:last-child { margin-bottom: 0; }
.sc-head {
  font-size: 13px; font-weight: 800; color: var(--accent);
  text-transform: uppercase; letter-spacing: .07em;
  margin-bottom: 12px; padding-bottom: 9px;
  border-bottom: 2px solid var(--accent);
  display: flex; align-items: center; gap: 8px;
  line-height: 1.3;
}
.sc-card {
  display: grid; grid-template-columns: 200px 1fr;
  gap: 10px 16px; padding: 10px 0;
  border-bottom: 1px solid var(--border);
  align-items: start;
}
.sc-card:last-child { border-bottom: none; }
.sc-label {
  font-family: var(--mono, monospace); font-size: 12px; font-weight: 700;
  color: var(--accent); line-height: 1.4;
}
.sc-text {
  font-size: 13.5px; line-height: 1.75; color: var(--text2, #555);
}
.sc-text strong { color: var(--text, #111); font-weight: 700; }
.sc-text em { color: var(--accent); font-style: normal; }
.sc-text code {
  font-size: 11.5px; background: var(--bg3, var(--bg2, #f3f4f6));
  padding: 1px 6px; border-radius: 4px;
  font-family: var(--mono, monospace);
  color: var(--accent); border: 1px solid var(--border);
}
.sc-tip {
  margin-top: 10px; padding: 10px 14px;
  background: var(--yellowbg, #fffbeb);
  border-radius: 8px; border: 1px solid #fde68a;
  font-size: 13px; color: #713f12; line-height: 1.65;
}
.sc-warn {
  margin-top: 10px; padding: 10px 14px;
  background: #fff1f2; border-radius: 8px;
  border: 1px solid #fecaca; font-size: 13px;
  color: #991b1b; line-height: 1.65;
}
@media (max-width: 560px) {
  .sc-card {
    display: block;
    padding: 16px 0;

<div class="section-title">מה זה בכלל IP Investigation?</div>
<p class="prose">כשמחשב מתחבר לאינטרנט — הוא מקבל <strong>כתובת IP</strong>. כמו כתובת בית, אבל לרשת. כל שרת שאתה מבקר בו רושם אותה. כל מייל שאתה שולח — מכיל אותה.</p>
<p class="prose"><strong>IP Investigation</strong> = לקחת כתובת כזו ולגלות מיהי — מאיפה הגיעה, מי מחזיק בה, האם היא מסוכנת, ומה היא עשתה. כל זה ממידע ציבורי, <em>בלי לגעת ב-IP</em>.</p>

<div class="section-title">חוק הזהב — Passive בלבד</div>
<p class="prose">יש שני סוגי חקירה. <strong>Passive</strong> = שואלים מאגרי מידע ציבוריים — הIP לא יודע שחוקרים אותו. <strong>Active</strong> = שולחים packets ישירות אליו — הוא רואה. Passive תמיד מותר. Active <em>אסור ללא הרשאה</em>, גם אם ה-IP נראה זדוני לחלוטין.</p>

<div class="callout warn">⚠️ <code>nmap IP</code> על IP שלא שייך לך = עבירה פלילית. גם אם ה-IP תקף אתכם. <strong>Passive בלבד בכל הקורס.</strong></div>

<div class="sc-card"><div class="sc-label">כלי</div><div class="sc-text"><code>curl ipinfo.io/IP</code> — מחזיר מדינה, עיר, ISP, ASN. חינמי עד 50K בקשות/חודש.</div></div>
<div class="sc-card"><div class="sc-label">מתי מוטעה</div><div class="sc-text">Tor exit nodes, VPN providers, שרתי ענן — מראים מיקום של הספק, <strong>לא</strong> של התוקף.</div></div></div>`,
`<div class="sc"><div class="sc-head">🏢 WHOIS ו-ASN</div>
<div class="sc-card"><div class="sc-label">WHOIS ל-IP</div><div class="sc-text">שואל "מי קיבל הקצאה של ה-block שמכיל את ה-IP". מגיע מ-5 מאגרים: RIPE (אירופה), ARIN (USA), APNIC (אסיה), LACNIC, AFRINIC.</div></div>
<div class="sc-card"><div class="sc-label">ASN</div><div class="sc-text">מספר שמזהה רשת. AS24940=Hetzner (hosting זול, נפוץ אצל תוקפים). AS13335=Cloudflare (CDN, IP אמיתי מוסתר). AS15169=Google.</div></div>
<div class="sc-card"><div class="sc-label">Red flag</div><div class="sc-text">Bulletproof hosting = provider שמתעלם מדיווחי abuse. Inferno Solutions, Frantech, Incognet — מוכרים ככאלה.</div></div></div>`,
`<div class="sc"><div class="sc-head">🏷️ Reverse DNS</div>
<div class="sc-card"><div class="sc-label">מה זה</div><div class="sc-text">IP → שם. <code>host IP</code> או <code>dig -x IP</code>. השם נקרא PTR record — מוגדר ע"י בעל ה-IP, לא חובה.</div></div>
<div class="sc-card"><div class="sc-label">פרשנות</div><div class="sc-text"><code>tor-exit.*</code> = Tor. <code>ec2-*.amazonaws.com</code> = AWS. <code>broadband-*.isp.com</code> = ביתי. <strong>NXDOMAIN (אין תשובה)</strong> = דגל אדום — throwaway server.</div></div>
<div class="sc-card"><div class="sc-label">FCrDNS</div><div class="sc-text">לאמת שהשם אמיתי: תרגם את ה-PTR חזרה ל-IP. אם מתאים — אמין. אם לא — PTR מזויף.</div></div></div>`,
`<div class="sc"><div class="sc-head">⚠️ Reputation</div>
<div class="sc-card"><div class="sc-label">כלים עיקריים</div><div class="sc-text"><strong>VirusTotal</strong> — 87 engines, רוחב. <strong>AbuseIPDB</strong> — דיווחים ישירים מאדמינים, מידע טרי. תמיד שניהם, לא אחד.</div></div>
<div class="sc-card"><div class="sc-label">VirusTotal</div><div class="sc-text">0/87 = לא מוכר (לא בהכרח בטוח). 1–3 = false positive אפשרי. 4–15 = חשוד. <strong>15+ = זדוני בוודאות.</strong></div></div>
<div class="sc-card"><div class="sc-label">False Positives</div><div class="sc-text">Tor, Cloudflare, shared hosting — תמיד נראים חשודים כי הרבה משתמשים בהם. IP חדש עם 0 history = יכול להיות תוקף חדש.</div></div></div>`,
`<div class="sc"><div class="sc-head">🔭 Shodan</div>
<div class="sc-card"><div class="sc-label">מה זה</div><div class="sc-text">סורק את כל ה-IPv4 בעולם (4.29 מיליארד) ומאנדקס: ports פתוחים, banner, גרסת software, SSL certificates. כמו Wireshark לכל האינטרנט.</div></div>
<div class="sc-card"><div class="sc-label">מה לחפש</div><div class="sc-text">Ports: 3306 (MySQL), 27017 (MongoDB), 5432 (PostgreSQL) = DB חשוף. גרסה ישנה = חפש CVEs. HTTP title "phpMyAdmin" = admin panel חשוף.</div></div>
<div class="sc-card"><div class="sc-label">Port ריק</div><div class="sc-text">Port 80 פתוח אבל ריק = לא שרת web לגיטימי. כנראה attack infrastructure — מיועד לשלוח, לא לקבל.</div></div></div>`,
`<div class="sc"><div class="sc-head">📋 ניתוח לוגים</div>
<div class="sc-card"><div class="sc-label">שדות auth.log</div><div class="sc-text">IP, timestamp, sshd, "Invalid user USERNAME" = ניסיון login כושל. הרבה invalid users בסדר = dictionary attack אוטומטי.</div></div>
<div class="sc-card"><div class="sc-label">שדות access.log</div><div class="sc-text">IP | timestamp | method+URL | <strong>status</strong> | user-agent. 401=כשל, 200=הצליח(!), 404=סריקה. user-agent "python-requests" = script.</div></div>
<div class="sc-card"><div class="sc-label">פקודות</div><div class="sc-text"><code>grep -c "IP" access.log</code> — כמה פעמים. <code>grep "IP" auth.log | grep "Invalid"</code> — SSH failures.</div></div></div>`,
`<div class="sc"><div class="sc-head">🎯 חקירה מלאה</div>
<div class="sc-card"><div class="sc-label">סדר הצעדים</div><div class="sc-text">1. ipinfo.io → מיקום וASN. 2. whois → בעלים. 3. dig -x → שם. 4. VirusTotal + AbuseIPDB → reputation. 5. Shodan → מה חשוף. 6. Logs → מה עשה אצלנו.</div></div>
<div class="sc-card"><div class="sc-label">Red flags מחייבי חסימה</div><div class="sc-text">Bulletproof hosting + AbuseIPDB 80%+ + אין PTR + 5+ מקורות מדווחים = חסום ב-<code>ufw deny from IP</code>. שקול לחסום את כל ה-/24.</div></div>
<div class="sc-card"><div class="sc-label">תמיד לבסוף</div><div class="sc-text">דווח ב-AbuseIPDB — תעזור לאחרים. ודא fail2ban פעיל. שמור את הממצאים לticketing.</div></div></div>`
]
},

`
<div class="section-title">What Is IP Investigation?</div>
<p class="prose">When a computer connects to the internet — it gets an <strong>IP address</strong>. Like a home address, but for the network. Every server you visit logs it. Every email you send — contains it.</p>
<p class="prose"><strong>IP Investigation</strong> = take such an address and find out who it is — where it came from, who owns it, whether it's dangerous, and what it's exposed. All from public information, <em>without touching the IP.</em></p>

<div class="callout idea">💡 <strong>Scenario:</strong> A server admin sees someone tried 503 times to connect in 2 hours. He has one number: <code>45.141.215.111</code>. The last chapter investigates it step by step to a clear conclusion.</div>

<div class="section-title">The Golden Rule — Passive Only</div>
<p class="prose">There are two types of investigation. <strong>Passive</strong> = query public databases — the IP doesn't know you're investigating it. <strong>Active</strong> = send packets directly to it — it sees them. Passive is always allowed. Active is <em>illegal without permission</em>, even if the IP looks completely malicious.</p>

<div class="callout warn">⚠️ Running <code>nmap IP</code> on an IP you don't own = criminal offense. Even if that IP attacked you. <strong>Passive only throughout this course.</strong></div>

<div class="section-title">Six Questions We'll Learn to Answer</div>
<table class="data-table">
<tr><th>Question</th><th>Tool</th><th>What we get</th></tr>
<tr><td>📍 Where did it come from?</td><td>ipinfo.io</td><td>Country, city (roughly), ISP</td></tr>
<tr><td>🏢 Who owns it?</td><td>WHOIS</td><td>Company, ISP, organization</td></tr>
<tr><td>🏷️ Does it have a name?</td><td>dig -x</td><td>Name revealing server type</td></tr>
<tr><td>⚠️ Is it dangerous?</td><td>VirusTotal, AbuseIPDB</td><td>Reports, confidence score</td></tr>
<tr><td>🔭 What's running on it?</td><td>Shodan</td><td>Open ports, versions</td></tr>
<tr><td>📋 What did it do to us?</td><td>Logs</td><td>Exact actions with timestamps</td></tr>
</table>
<div class="ch-end-nav"><button class="ch-end-btn primary" onclick="showNextChapter(CHID)"><span class="ch-end-btn-icon">▶</span><span class="ch-end-btn-label">Next Chapter</span></button><button class="ch-end-btn" onclick="showTab(CHID,'cheat')"><span class="ch-end-btn-icon">📋</span><span class="ch-end-btn-label">Summary</span></button><button class="ch-end-btn" onclick="showTab(CHID,'game')"><span class="ch-end-btn-icon">🔗</span><span class="ch-end-btn-label">Match</span></button></div>`,
`
<div class="section-title">Geolocation — Placing an IP on the Map</div>
<p class="prose"><strong>Why is this useful?</strong> An IP from Russia trying to access a server gives completely different context than an IP from within your own organization. Geolocation provides the initial context.</p>
<p class="prose">The simplest check: open <code>ipinfo.io/IP</code> in a browser, or in terminal:</p>
<pre><code>curl ipinfo.io/185.220.101.5</code></pre>

<div class="td"><div class="td-bar"><div class="td-dots"><span class="td-dot td-r"></span><span class="td-dot td-y"></span><span class="td-dot td-g"></span></div><div class="td-url">📍&nbsp;ipinfo.io/185.220.101.5</div></div><div class=td-title>🌍 ipinfo.io</div><div class="td-body"><div class="td-row"><span class="td-k">ip</span><span class="td-v">"185.220.101.5"</span></div><div class="td-row"><span class="td-k">hostname</span><span class="td-v"><span style="color:#d97706;font-weight:600">tor-exit0.freki.lu</span></span></div><div class="td-row"><span class="td-k">city</span><span class="td-v">"Luxembourg City"</span></div><div class="td-row"><span class="td-k">country</span><span class="td-v">"LU" 🇱🇺</span></div><div class="td-row"><span class="td-k">org</span><span class="td-v"><span style="color:#d97706">"AS24940 Hetzner Online GmbH"</span></span></div><div class="td-row"><span class="td-k">timezone</span><span class="td-v">"Europe/Luxembourg"</span></div><div style="margin-top:10px;padding:9px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:12px;font-family:var(--sans);color:#78350f;line-height:1.5">⚠️ hostname מכיל "tor-exit" ← זה Tor exit node. <strong>המיקום בלוקסמבורג לא שייך לתוקף</strong> — הוא פשוט שם שמסתיר זהות.</div></div></div>

<div class="section-title">How Accurate Is It?</div>
<table class="data-table">
<tr><th>Level</th><th>Accuracy</th><th>Correct use</th></tr>
<tr><td>Country</td><td>~99.8%</td><td>Reliable — "IP from Russia" is probably right</td></tr>
<tr><td>City</td><td>~66%</td><td>Indication only — not evidence</td></tr>
<tr><td>Street/Building</td><td>Near zero</td><td>Don't rely on this</td></tr>
</table>

<div class="callout warn">⚠️ <strong>The Potwin, Kansas story:</strong> MaxMind (largest geolocation database) set the geographic center of the US as the default for unidentified IPs. A town of 800 residents got FBI visits for crimes they never committed. <strong>Geolocation = estimate, not fact.</strong></div>

<div class="section-title">When Geolocation Misleads</div>
<table class="data-table">
<tr><th>What you see</th><th>Explanation</th></tr>
<tr><td>IP from Luxembourg + "tor-exit" in name</td><td>Tor exit node — location doesn't belong to attacker</td></tr>
<tr><td>IP from Netherlands always</td><td>VPN provider — user could be anywhere</td></tr>
<tr><td>IP from Russia + AWS hostname</td><td>Cloud server — anonymous identity</td></tr>
</table>
<div class="ch-end-nav"><button class="ch-end-btn primary" onclick="showNextChapter(CHID)"><span class="ch-end-btn-icon">▶</span><span class="ch-end-btn-label">Next Chapter</span></button><button class="ch-end-btn" onclick="showTab(CHID,'cheat')"><span class="ch-end-btn-icon">📋</span><span class="ch-end-btn-label">Summary</span></button><button class="ch-end-btn" onclick="showTab(CHID,'game')"><span class="ch-end-btn-icon">🔗</span><span class="ch-end-btn-label">Match</span></button></div>`,
`
<div class="section-title">WHOIS — Who Owns This IP?</div>
<p class="prose"><strong>Why is this useful?</strong> Knowing whether the IP belongs to Google, Amazon, a home ISP, or bulletproof hosting for attackers — gives critical context for every decision.</p>
<p class="prose">Every IP in the world belongs to an organization that received it from one of 5 global registries (RIPE for Europe, ARIN for the US, etc.). WHOIS queries the relevant registry:</p>

<div class="td td-dark"><div class="td-bar"><div class="td-dots"><span class="td-dot td-r"></span><span class="td-dot td-y"></span><span class="td-dot td-g"></span></div><div class="td-url td-dark-url">Terminal</div></div><div class="td-body td-body-dark"><span class="tc-prompt">$</span> <span class="tc-cmd">whois 45.141.215.111</span>
<span style="color:#6b7280">% Information related to '45.141.215.0/24'</span>
<span class="tc-key">inetnum:</span>   <span class="tc-val">45.141.215.0 - 45.141.215.255</span>
<span class="tc-key">netname:</span>   <span style="color:#f59e0b;font-weight:700">INFERNO-SOLUTIONS</span>
<span class="tc-key">country:</span>   <span style="color:#f87171;font-weight:700">RU</span>
<span class="tc-key">descr:</span>     <span class="tc-val">Inferno Solutions Ltd.</span>
<span class="tc-key">aut-num:</span>   <span class="tc-val">AS208091</span>
<span class="tc-key">as-name:</span>   <span style="color:#f87171">INFERNO-AS</span>
<div style="margin-top:10px;padding:9px 12px;background:#fff1f2;border:1px solid #fecaca;border-radius:8px;font-size:12px;font-family:var(--sans);color:#991b1b;line-height:1.5">🔴 "Inferno Solutions" = bulletproof hosting — provider שמתעלם מדיווחי abuse. <strong>מקלט ידוע לתוקפים.</strong></div></div></div>

<div class="section-title">ASN — The IP's Network "Neighborhood"</div>
<p class="prose">Every organization on the network gets an ASN number. The ASN is the fastest way to understand the context:</p>
<table class="data-table">
<tr><th>ASN</th><th>Organization</th><th>What it means</th></tr>
<tr><td>AS15169</td><td>Google</td><td>Google itself — crawlers, legitimate services</td></tr>
<tr><td>AS16509</td><td>Amazon AWS</td><td>Cloud server — any content possible, check hostname</td></tr>
<tr><td>AS13335</td><td>Cloudflare</td><td>CDN — real IP is hidden behind it</td></tr>
<tr><td>AS24940</td><td>Hetzner</td><td>Cheap hosting — very popular with attackers</td></tr>
</table>

<div class="callout idea">💡 <strong>Why Hetzner in every attack log?</strong> A server there = €5/month. Attacker rents, runs attack, deletes. Cheap, fast, relatively anonymous. ASN gives context in seconds.</div>
<div class="ch-end-nav"><button class="ch-end-btn primary" onclick="showNextChapter(CHID)"><span class="ch-end-btn-icon">▶</span><span class="ch-end-btn-label">Next Chapter</span></button><button class="ch-end-btn" onclick="showTab(CHID,'cheat')"><span class="ch-end-btn-icon">📋</span><span class="ch-end-btn-label">Summary</span></button><button class="ch-end-btn" onclick="showTab(CHID,'game')"><span class="ch-end-btn-icon">🔗</span><span class="ch-end-btn-label">Match</span></button></div>`,
`
<div class="section-title">Reverse DNS — Does the IP Have a Name?</div>
<p class="prose"><strong>Why is this useful?</strong> A name can reveal the <em>purpose</em> of a server — mail server, Tor exit, home server, VPN. Sometimes one name is worth an hour of investigation.</p>
<p class="prose">Regular DNS goes from name to IP. Reverse DNS goes the other way:</p>
<pre><code>host 45.141.215.111   # or:  dig -x 45.141.215.111</code></pre>

<div class="td td-dark"><div class="td-bar"><div class="td-dots"><span class="td-dot td-r"></span><span class="td-dot td-y"></span><span class="td-dot td-g"></span></div><div class="td-url td-dark-url">Terminal</div></div><div class="td-body td-body-dark"><span class="tc-prompt">$</span> <span class="tc-cmd">host 45.141.215.111</span>
Host 45.141.215.111 not found: <span style="color:#f87171">NXDOMAIN</span>
<div style="margin-top:10px;padding:9px 12px;background:#fff1f2;border:1px solid #fecaca;border-radius:8px;font-size:12px;font-family:var(--sans);color:#991b1b;line-height:1.5">❌ <strong>אין PTR record</strong> — השרת לא הגדיר שם. שרתים לגיטימיים כמעט תמיד מגדירים. אין שם = throwaway server שהוקם רק למתקפה.</div></div></div>

<div class="section-title">What Different Names Reveal</div>
<table class="data-table">
<tr><th>Name</th><th>What it means</th></tr>
<tr><td><code>mail.company.com</code></td><td>Email server of company.com</td></tr>
<tr><td><code>tor-exit.riseup.net</code></td><td>Tor exit node — user identity hidden</td></tr>
<tr><td><code>ec2-52-23-198-1.compute-1.amazonaws.com</code></td><td>AWS server, us-east-1 region</td></tr>
<tr><td><code>broadband-185-220.customer.isp.com</code></td><td>Home connection — ISP customer</td></tr>
<tr><td>No answer (NXDOMAIN)</td><td>⚠️ Red flag — server set up in a hurry without DNS</td></tr>
</table>

<div class="callout idea">💡 <strong>FCrDNS — verify the name is real:</strong> Someone can lie and set a fake name. Translate it back — if the IP matches, the name is real. If not — fake PTR.</div>
<div class="ch-end-nav"><button class="ch-end-btn primary" onclick="showNextChapter(CHID)"><span class="ch-end-btn-icon">▶</span><span class="ch-end-btn-label">Next Chapter</span></button><button class="ch-end-btn" onclick="showTab(CHID,'cheat')"><span class="ch-end-btn-icon">📋</span><span class="ch-end-btn-label">Summary</span></button><button class="ch-end-btn" onclick="showTab(CHID,'game')"><span class="ch-end-btn-icon">🔗</span><span class="ch-end-btn-label">Match</span></button></div>`,
`
<div class="section-title">Reputation — Is This IP Known as Malicious?</div>
<p class="prose"><strong>Why is this useful?</strong> An IP that has already attacked thousands of other organizations — is probably attacking you too. Reputation databases collect reports from across the internet.</p>
<p class="prose"><strong>Key rule:</strong> Always check at least two — VirusTotal and AbuseIPDB. Each might miss something the other knows.</p>

<div class="section-title">VirusTotal — 87 Engines Check the Same IP</div>

// ── MATCH GAME ENGINE ────────────────────────────────────────────────────
function getMatchPairs(chId) {
  var lang = currentLang === 'en' ? MATCH_DATA_EN : MATCH_DATA;
  var d = lang[chId];
  if(!d || !d.pairs || !d.pairs.length) return [];
  // shuffle
  var p = d.pairs.slice();
  for(var i = p.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = p[i]; p[i] = p[j]; p[j] = tmp;
  }
  return p;
}

function renderMatchGame(chId) {
  var el = document.getElementById('game-' + chId);
  if(!el) return;

  if(!state.game[chId]) state.game[chId] = { phase: 'idle', sel: null, matched: [], pairs: [] };
  var gs = state.game[chId];

  if(gs.phase === 'idle' || !gs.pairs.length) {
    gs.pairs = getMatchPairs(chId);
    if(!gs.pairs.length) {
      el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text2)">אין זוגות לפרק זה</div>';
      return;
    }
    gs.matched = [];
    gs.sel = null;
    gs.phase = 'play';
  }

  buildMatchBoard(chId);
}

function buildMatchBoard(chId) {
  var el = document.getElementById('game-' + chId);
  var gs = state.game[chId];
  var pairs = gs.pairs;

  // Build left (terms) and right (definitions) columns
  // Shuffle right column independently
  var rights = pairs.map(function(p, i) { return { text: p[1], idx: i }; });
  for(var i = rights.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = rights[i]; rights[i] = rights[j]; rights[j] = tmp;
  }

  var allMatched = gs.matched.length === pairs.length;

  var html = '<div class="match-board">';

  if(allMatched) {
    html += '<div class="match-success">🎉 ' + (currentLang === 'en' ? 'All matched!' : '!כל הזוגות הותאמו') + '</div>';
    html += '<div style="text-align:center;margin-top:12px"><button class="match-restart-btn" onclick="restartMatch(' + chId + ')">' +
      (currentLang === 'en' ? '↺ Play Again' : '↺ שחק שוב') + '</button></div>';
  }

  html += '<div class="match-cols">';

  // Left column — terms
  html += '<div class="match-col">';
  for(var i = 0; i < pairs.length; i++) {
    var isMatched = gs.matched.indexOf(i) >= 0;
    var isSel = gs.sel !== null && gs.sel.side === 'left' && gs.sel.idx === i;
    var cls = 'match-card match-left' + (isMatched ? ' match-done' : '') + (isSel ? ' match-sel' : '');
    html += '<div class="' + cls + '" data-side="left" data-idx="' + i + '" onclick="matchClick(' + chId + ',this)">' +
      pairs[i][0] + '</div>';
  }
  html += '</div>';

  // Right column — definitions (shuffled)
  html += '<div class="match-col">';
  for(var i = 0; i < rights.length; i++) {
    var ri = rights[i];
    var isMatched = gs.matched.indexOf(ri.idx) >= 0;
    var isSel = gs.sel !== null && gs.sel.side === 'right' && gs.sel.ridx === i;
    var cls = 'match-card match-right' + (isMatched ? ' match-done' : '') + (isSel ? ' match-sel' : '');
    html += '<div class="' + cls + '" data-side="right" data-idx="' + ri.idx + '" data-ridx="' + i + '" onclick="matchClick(' + chId + ',this)">' +
      ri.text + '</div>';
  }
  html += '</div>';

  html += '</div></div>'; // match-cols, match-board
  el.innerHTML = html;
}

function matchClick(chId, el) {
  var gs = state.game[chId];
  if(!gs || gs.phase !== 'play') return;

  var side = el.getAttribute('data-side');
  var idx = parseInt(el.getAttribute('data-idx'));
  var ridx = el.hasAttribute('data-ridx') ? parseInt(el.getAttribute('data-ridx')) : -1;

  // Already matched
  if(gs.matched.indexOf(idx) >= 0) return;

  if(!gs.sel) {
    // First selection
    gs.sel = { side: side, idx: idx, ridx: ridx };
    buildMatchBoard(chId);
    return;
  }

  // Same side clicked again — deselect or switch
  if(gs.sel.side === side) {
    gs.sel = { side: side, idx: idx, ridx: ridx };
    buildMatchBoard(chId);
    return;
  }

  // Different sides — check match
  var leftIdx  = side === 'left'  ? idx       : gs.sel.idx;
  var rightIdx = side === 'right' ? idx       : gs.sel.idx;

  gs.sel = null;

  if(leftIdx === rightIdx) {
    // Correct!
    gs.matched.push(leftIdx);
    if(gs.matched.length === gs.pairs.length) gs.phase = 'done';
    buildMatchBoard(chId);
    // Flash green
    var cards = document.querySelectorAll('#game-' + chId + ' .match-done');
    cards.forEach(function(c) {
      c.style.animation = 'matchPop .3s ease';
      setTimeout(function() { c.style.animation = ''; }, 300);
    });
  } else {
    // Wrong — flash red briefly
    buildMatchBoard(chId);
    var allCards = document.querySelectorAll('#game-' + chId + ' .match-card');
    allCards.forEach(function(c) {
      var ci = parseInt(c.getAttribute('data-idx'));
      var cs = c.getAttribute('data-side');
      var isWrong = (cs === 'left' && ci === leftIdx && gs.matched.indexOf(ci) < 0) ||
                    (cs === 'right' && ci === rightIdx && gs.matched.indexOf(ci) < 0);
      if(isWrong) {
        c.classList.add('match-wrong');
        setTimeout(function() { c.classList.remove('match-wrong'); }, 600);
      }
    });
  }
}

function restartMatch(chId) {
  state.game[chId] = { phase: 'idle', sel: null, matched: [], pairs: [] };
  renderMatchGame(chId);
}

}

function showTab(chId, tabName) {
  state.tabs[chId] = tabName;
  activateTab(chId, tabName);
}

function activateTab(chId, tabName) {
  var ch = document.getElementById('ch-' + chId);
  if(!ch) return;
  ch.querySelectorAll('.tab-btn').forEach(function(btn) {
    var m = btn.getAttribute('onclick').match(/'(\w+)'\)/);
    btn.classList.toggle('active', !!(m && m[1] === tabName));
  });
  ch.querySelectorAll('.tab-panel').forEach(function(p) {
    p.classList.toggle('active', p.id === chId + '-' + tabName);
  });
  if(tabName === 'game') renderMatchGame(chId);
}

// ── GAME ENGINE ──────────────────────────────────────────────
function getG(i) {
  var raw = (currentLang === 'en' ? (GAME_QS_EN[i] || GAME_QS[i]) : GAME_QS[i]) || [];
  if(!raw.length) return [];
  return raw.map(function(q) { return shuffleOpts(q); });
}

function shuffleOpts(q) {
  var idx = [0,1,2,3];
  for(var i = idx.length-1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i+1));
    var tmp = idx[i]; idx[i] = idx[j]; idx[j] = tmp;
  }
  return { q: q.q, o: idx.map(function(k){ return q.o[k]; }), a: idx.indexOf(q.a) };
}

function renderGame(chId) {
  var el = document.getElementById('game-' + chId);
  if(!el) return;
  if(!state.game[chId]) state.game[chId] = { phase: 'idle' };
  var gs = state.game[chId];
  var Lc = L();
  var gqs = getG(chId);

  if(!gqs.length) {
    el.innerHTML = '<div class="game-empty"><span>' + (Lc.noGame || 'אין שאלות לפרק זה') + '</span></div>';
    return;
  }

  if(gs.phase === 'idle') {
    el.innerHTML =
      '<div class="game-start-card">' +
        '<div class="game-start-icon">' + COURSE_ICON + '</div>' +
        '<div class="game-start-title">' + Lc.gameTitle + '</div>' +
        '<p class="game-start-desc">' + Lc.gameDesc + '</p>' +
        '<div class="game-rules">' +
          '<span class="game-rule">⏱️ 60 ' + Lc.gameSeconds + '</span>' +
          '<span class="game-rule">❓ ' + gqs.length + ' ' + Lc.gameQuestions + '</span>' +
        '</div>' +
        '<button class="btn-start" onclick="gameStart(' + chId + ')">' + Lc.gameStart + '</button>' +
      '</div>';
  } else if(gs.phase === 'playing') {
    renderGamePlay(chId);
  } else {
    renderGameOver(chId);
  }
}

function gameStart(chId) {
  var gqs = getG(chId);
  state.game[chId] = { phase:'playing', qs: gqs.slice().sort(function(){ return Math.random()-.5; }), qi:0, score:0, time:60, answered:false };
  renderGame(chId);
  startTimer(chId);
}

function renderGamePlay(chId) {
  var el = document.getElementById('game-' + chId);
  var gs = state.game[chId];
  var Lc = L();
  if(!gs || gs.phase !== 'playing') return;
  var q = gs.qs[gs.qi];
  if(!q) { gameOver(chId); return; }

  el.innerHTML =
    '<div class="game-hud">' +
      '<span class="hud-timer' + (gs.time <= 10 ? ' urgent' : '') + '" id="gtimer-' + chId + '">' + gs.time + '</span>' +
      '<span class="hud-qnum">' + (gs.qi+1) + '/' + gs.qs.length + '</span>' +
      '<span class="hud-score">⭐ ' + gs.score + '</span>' +
    '</div>' +
    '<div class="game-question">' + q.q + '</div>' +
    '<div class="game-opts">' +
      q.o.map(function(opt, i) {
        return '<button class="game-opt" id="gopt-' + chId + '-' + i + '" onclick="gameAnswer(' + chId + ',' + i + ')">' +
          '<span class="opt-letter">' + (Lc.optLetters[i] || i) + '</span>' + opt + '</button>';
      }).join('') +
    '</div>' +
    '<div class="game-feedback" id="gfb-' + chId + '"></div>';
}

function startTimer(chId) {
  clearInterval(gameTimer);
  gameTimer = setInterval(function() {
    var gs = state.game[chId];
    if(!gs || gs.phase !== 'playing') { clearInterval(gameTimer); return; }
    gs.time--;
    var t = document.getElementById('gtimer-' + chId);
    if(t) { t.textContent = gs.time; t.className = 'hud-timer' + (gs.time <= 10 ? ' urgent' : ''); }
    if(gs.time <= 0) { clearInterval(gameTimer); gameOver(chId); }
  }, 1000);
}

function gameAnswer(chId, chosen) {
  var gs = state.game[chId];
  if(!gs || gs.answered) return;
  gs.answered = true;
  var q = gs.qs[gs.qi];
  var correct = chosen === q.a;
  if(correct) gs.score += 10;

  for(var i = 0; i < q.o.length; i++) {
    var btn = document.getElementById('gopt-' + chId + '-' + i);
    if(!btn) continue;
    if(i === q.a) btn.classList.add('correct');
    else if(i === chosen) btn.classList.add('wrong');
  }
  var fb = document.getElementById('gfb-' + chId);
  if(fb) fb.innerHTML = correct ?
    '<span class="fb-correct">✓ ' + (L().correct || 'נכון!') + '</span>' :
    '<span class="fb-wrong">✗ ' + q.o[q.a] + '</span>';

  setTimeout(function() {
    gs.qi++;
    gs.answered = false;
    if(gs.qi >= gs.qs.length) gameOver(chId);
    else renderGamePlay(chId);
  }, 1200);
}

function gameOver(chId) {
  clearInterval(gameTimer);
  var gs = state.game[chId];
  if(!gs) return;
  gs.phase = 'over';
  var Lc = L();
  var total = gs.qs.length * 10;
  var pct   = total ? Math.round((gs.score / total) * 100) : 0;
  var medal = gs.score >= total * .8 ? '🏆' : gs.score >= total * .5 ? '🥈' : '🥉';
  var lbIdx = Lc.resultLabels ? Math.min(Math.floor(pct/20), Lc.resultLabels.length-1) : 0;
  var label = Lc.resultLabels ? Lc.resultLabels[lbIdx] : '';

  document.getElementById('game-' + chId).innerHTML =
    '<div class="game-over-card">' +
      '<div class="game-over-medal">' + medal + '</div>' +
      '<div class="game-over-score">' + gs.score + '</div>' +
      '<div class="game-over-pct">' + pct + '% ' + (Lc.correct || '') + '</div>' +
      '<div class="game-over-label">' + label + '</div>' +
      '<div class="game-over-btns">' +
        '<button class="nav-btn ghost" onclick="gameRestart(' + chId + ')">' + Lc.gameAgain + '</button>' +
        '<button class="nav-btn primary" onclick="showNextChapter(' + chId + ')">' + (Lc.nextChapter || '◀ הבא') + '</button>' +
        '<button class="nav-btn ghost" onclick="showTab(' + chId + ',\'cheat\')">' + Lc.gameToCheat + '</button>' +
      '</div>' +
    '</div>';
}

function gameRestart(chId) {
  state.game[chId] = { phase: 'idle' };
  var el = document.getElementById('game-' + chId);
  if(el) el.innerHTML = '';
  renderGame(chId);
}

// ── QUIZ ENGINE ──────────────────────────────────────────────
function getQ(i) {
  var raw = (currentLang === 'en' ? (QUIZZES_EN[i] || QUIZZES[i]) : QUIZZES[i]) || [];
  return raw.filter(function(q){ return q.q; });
}

function renderQuiz(chId) {
  var el = document.getElementById('quiz-' + chId);
  if(!el || el.dataset.rendered) return;
  el.dataset.rendered = '1';
  var qs = getQ(chId);
  var Lc = L();
  if(!qs.length) {
    el.innerHTML = '<div class="game-empty"><span>' + (Lc.noQuiz || 'אין חידון לפרק זה') + '</span></div>';
    return;
  }
  if(!state.quiz[chId]) state.quiz[chId] = { qi:0, ans:{}, done:false, score:0 };

  var pips = qs.map(function(_,i){
    return '<div class="qpip" id="qpip-' + chId + '-' + i + '"></div>';
  }).join('');

  var cards = qs.map(function(q,i){
    return '<div class="quiz-card' + (i===0?' active':'') + '" id="qcard-' + chId + '-' + i + '">' +
      '<div class="quiz-meta" id="qmeta-' + chId + '-' + i + '"></div>' +
      '<div class="quiz-q">' + q.q + '</div>' +
      '<div class="quiz-opts">' +
        q.o.map(function(opt,oi){
          return '<button class="quiz-opt" id="qopt-' + chId + '-' + i + '-' + oi +
            '" onclick="quizPick(' + chId + ',' + i + ',' + oi + ')">' +
            '<span class="opt-letter" id="qltr-' + chId + '-' + i + '-' + oi + '"></span>' + opt + '</button>';
        }).join('') +
      '</div>' +
      '<div class="quiz-explain" id="qexp-' + chId + '-' + i + '" style="display:none">' +
        '<strong>' + Lc.quizExplain + '</strong> ' + (q.e || '') +
      '</div>' +
    '</div>';
  }).join('');

  el.innerHTML =
    '<div class="quiz-pips" id="qprog-' + chId + '">' + pips + '</div>' +
    cards +
    '<div class="quiz-result" id="qres-' + chId + '" style="display:none">' +
      '<div class="game-over-medal" id="qemoji-' + chId + '">🎉</div>' +
      '<div class="game-over-score" id="qscore-' + chId + '"></div>' +
      '<div class="game-over-label" id="qlabel-' + chId + '"></div>' +
      '<div class="game-over-btns">' +
        '<button class="nav-btn ghost" id="qbtn-reset-' + chId + '" onclick="quizReset(' + chId + ')">' + Lc.quizAgain + '</button>' +
        '<button class="nav-btn primary" id="qbtn-next-' + chId + '" onclick="showNextChapter(' + chId + ')">' + (Lc.nextChapter||'◀ הבא') + '</button>' +
        '<button class="nav-btn ghost" id="qbtn-cheat-' + chId + '" onclick="showTab(' + chId + ',\'cheat\')">' + Lc.gameToCheat + '</button>' +
      '</div>' +
    '</div>' +
    '<div class="quiz-nav" id="qnav-' + chId + '">' +
      '<button class="nav-btn ghost" id="qprev-' + chId + '" onclick="quizNav(' + chId + ',-1)">' + Lc.quizPrev + '</button>' +
      '<button class="nav-btn primary" id="qnext-' + chId + '" onclick="quizNav(' + chId + ',1)">' + Lc.quizNext + '</button>' +
    '</div>';

  refreshQuiz(chId);
}

function refreshQuiz(chId) {
  var st = state.quiz[chId];
  if(!st) return;
  var qs = getQ(chId);
  var Lc = L();
  qs.forEach(function(_,i) {
    var card = document.getElementById('qcard-' + chId + '-' + i);
    if(card) card.classList.toggle('active', i === st.qi && !st.done);
    var pip = document.getElementById('qpip-' + chId + '-' + i);
    if(pip) pip.className = 'qpip' + (st.ans[i] !== undefined ? ' done' : i === st.qi ? ' cur' : '');
    var meta = document.getElementById('qmeta-' + chId + '-' + i);
    if(meta) meta.textContent = Lc.question + ' ' + (i+1) + ' ' + Lc.of + ' ' + qs.length;
    for(var oi=0;oi<4;oi++) {
      var ltr = document.getElementById('qltr-' + chId + '-' + i + '-' + oi);
      if(ltr) ltr.textContent = Lc.optLetters[oi] || oi;
    }
  });
  var res = document.getElementById('qres-' + chId);
  var nav = document.getElementById('qnav-' + chId);
  if(res) res.style.display = st.done ? 'block' : 'none';
  if(nav) nav.style.display = st.done ? 'none' : 'flex';
  if(st.done) {
    var sc = document.getElementById('qscore-' + chId);
    var lb = document.getElementById('qlabel-' + chId);
    if(sc) sc.textContent = st.score + '/' + (qs.length*10);
    var lbIdx = Lc.resultLabels ? Math.min(Math.floor((st.score/(qs.length*10))*Lc.resultLabels.length), Lc.resultLabels.length-1) : 0;
    if(lb && Lc.resultLabels) lb.textContent = Lc.resultLabels[lbIdx];
  }
  var prev = document.getElementById('qprev-' + chId);
  var next = document.getElementById('qnext-' + chId);
  if(prev) prev.disabled = st.qi === 0;
  if(next) next.textContent = st.qi === qs.length-1 ? (Lc.quizSubmit||'שלח') : Lc.quizNext;
}

function quizPick(chId, qi, oi) {
  var st = state.quiz[chId];
  if(!st || st.done || st.ans[qi] !== undefined) return;
  st.ans[qi] = oi;
  var qs = getQ(chId);
  var q  = qs[qi];
  var correct = oi === q.a;
  if(correct) st.score += 10;
  for(var k=0;k<q.o.length;k++) {
    var btn = document.getElementById('qopt-' + chId + '-' + qi + '-' + k);
    if(!btn) continue;
    if(k === q.a) btn.classList.add('correct');
    else if(k === oi) btn.classList.add('wrong');
    btn.disabled = true;
  }
  var exp = document.getElementById('qexp-' + chId + '-' + qi);
  if(exp) exp.style.display = 'block';
  refreshQuiz(chId);
}

function quizNav(chId, dir) {
  var st = state.quiz[chId];
  if(!st) return;
  var qs = getQ(chId);
  if(dir === 1 && st.qi === qs.length-1) {
    st.done = true;
  } else {
    st.qi = Math.max(0, Math.min(qs.length-1, st.qi + dir));
  }
  refreshQuiz(chId);
}

function quizReset(chId) {
  state.quiz[chId] = { qi:0, ans:{}, done:false, score:0 };
  var el = document.getElementById('quiz-' + chId);
  if(el) { el.innerHTML = ''; delete el.dataset.rendered; }
  renderQuiz(chId);
}

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  applyLang('he');
  showChapter(0);
});


function buildReviewContent() {
  var Lc = L(); var html = '';
  for (var i = 0; i < Lc.cheat.length; i++) {
    var num = (i<10?'0':'')+i;
    html += '<div class="review-chapter-block"><div class="review-chapter-title"><span class="review-chapter-num">'+num+'</span><span class="review-chapter-name">'+Lc.names[i]+'</span></div><div class="review-chapter-body">'+Lc.cheat[i]+'</div></div>';
  }
  return html;
}
function openReview() {
  var total = typeof TOTAL_CHAPTERS!=='undefined'?TOTAL_CHAPTERS:9;
  document.getElementById('reviewTitle').textContent = currentLang==='he'?'📚 סיכום מלא':'📚 Full Review';
  document.getElementById('reviewSub').textContent = currentLang==='he'?'כל '+total+' הפרקים בעמוד אחד':'All '+total+' chapters on one page';
  document.getElementById('reviewBody').innerHTML = buildReviewContent();
  document.getElementById('reviewOverlay').classList.add('open');
  document.getElementById('reviewDrawer').classList.add('open');
  document.documentElement.classList.add('review-open');
}
function closeReview() {
  document.getElementById('reviewOverlay').classList.remove('open');
  document.getElementById('reviewDrawer').classList.remove('open');
  document.documentElement.classList.remove('review-open');
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeReview();});
