<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IP Investigation Course</title>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f7f7f2;
  --bg2:      #ffffff;
  --bg3:      #f0f0ea;
  --surface:  #ffffff;
  --border:   #e5e5e0;
  --border2:  #d1d1ca;
  --accent:   #0e7490;
  --accent2:  #0a5c72;
  --accentfg: #ffffff;
  --green:    #58cc02;
  --green2:   #46a302;
  --greenfg:  #ffffff;
  --yellow:   #ffd900;
  --yellowfg: #785a00;
  --red:      #ff4b4b;
  --redfg:    #ffffff;
  --blue:     #1cb0f6;
  --bluefg:   #ffffff;
  --text:     #3c3c3c;
  --text2:    #6b6b6b;
  --text3:    #afafaf;
  --mono:     'Courier New', 'Consolas', monospace;
  --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --r:        12px;
  --r2:       20px;
  --r3:       24px;
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 200;
  background: var(--bg2); border-bottom: 2px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px;
}
.header-logo {
  font-weight: 800; font-size: 16px; color: var(--accent);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  letter-spacing: -0.3px;
}
.header-logo-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--green); box-shadow: 0 2px 0 var(--green2);
}
.header-chname {
  font-size: 13px; font-weight: 600; color: var(--text2);
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lang-btn {
  font-size: 12px; font-weight: 800; padding: 6px 14px; border-radius: var(--r);
  border: 2px solid var(--border2); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text2);
  cursor: pointer; flex-shrink: 0; transition: all .1s;
  text-transform: uppercase; letter-spacing: .04em;
}
.lang-btn:hover { background: var(--accent); color: var(--accentfg); border-color: var(--accent2); border-bottom-color: var(--accent2); }
.lang-btn:active { transform: translateY(2px); border-bottom-width: 2px; }

/* ── CHAPTER NAV BAR ── */
.ch-nav {
  position: fixed; top: 60px; left: 0; right: 0; z-index: 150;
  background: var(--bg2); border-bottom: 2px solid var(--border);
  overflow-x: auto; display: flex; padding: 8px 16px; gap: 6px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.ch-nav::-webkit-scrollbar { display: none; }
.sb-label { display: none; }
.ch-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 14px; gap: 3px; border: 2px solid transparent;
  background: var(--bg3); border-radius: var(--r2);
  cursor: pointer; transition: all .15s; flex-shrink: 0;
  color: var(--text2); min-width: 52px;
  border-bottom: 4px solid var(--border);
}
.ch-btn:hover { background: var(--bg2); border-color: var(--border2); color: var(--text); }
.ch-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent2); border-bottom-color: var(--accent2);
}
.ch-num { font-size: 11px; font-weight: 800; font-family: var(--mono); }
.ch-title-text { font-size: 9px; font-weight: 600; max-width: 68px; text-align: center; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.ch-stars { font-size: 10px; min-height: 12px; }

/* ── LAYOUT ── */
.main {
  padding-top: 112px; min-height: 100vh;
  max-width: 780px; margin: 0 auto;
  padding-left: 20px; padding-right: 20px; padding-bottom: 60px;
}

/* ── CHAPTER ── */
.chapter { display: none; }
.chapter.active { display: block; }

/* ── CHAPTER HERO ── */
.ch-hero {
  padding: 28px 0 24px; border-bottom: 2px solid var(--border); margin-bottom: 28px;
}
.ch-tag {
  display: inline-block; font-size: 11px; font-weight: 800;
  color: var(--accent); background: var(--bg3);
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
  letter-spacing: .06em; text-transform: uppercase; font-family: var(--mono);
}
.ch-title { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 8px; letter-spacing: -.5px; line-height: 1.2; }
.ch-desc { font-size: 14px; color: var(--text2); margin-bottom: 20px; max-width: 560px; }
.tabs-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 18px; font-size: 13px; font-weight: 800; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text3);
  cursor: pointer; transition: all .1s; text-transform: uppercase; letter-spacing: .04em;
}
.tab-btn:hover { color: var(--text2); border-color: var(--border2); }
.tab-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
.tab-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent2); border-bottom-color: var(--accent2);
}

/* ── TAB PANELS ── */
.tab-panels { }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── LEARN CONTENT ── */
.did-you-know {
  background: linear-gradient(135deg, #fffdf0, #fff9e0);
  border: 2px solid var(--yellow); border-radius: var(--r2);
  padding: 16px 18px; font-size: 13.5px; color: #5a4a00;
  margin-bottom: 28px; line-height: 1.6;
  box-shadow: 0 3px 0 #e6c700;
}
.section-title {
  font-size: 17px; font-weight: 900; color: var(--text);
  margin: 32px 0 12px; letter-spacing: -.2px;
  display: flex; align-items: center; gap: 8px;
}
.prose {
  font-size: 15px; color: var(--text2); line-height: 1.78; margin-bottom: 16px;
}
.prose code, code {
  font-family: var(--mono); font-size: 12.5px;
  background: var(--bg3); padding: 2px 6px;
  border-radius: 6px; color: var(--accent2); font-weight: 600;
}

/* ── CODE BLOCKS ── */
.code-block {
  background: #1a1a2e; border-radius: var(--r2); padding: 18px 20px;
  margin: 16px 0; overflow-x: auto;
  border: 2px solid #2a2a4e; box-shadow: 0 4px 0 #0f0f20;
}
.code-block code {
  font-family: var(--mono); font-size: 12.5px; line-height: 1.75;
  background: none; padding: 0; color: #e2e8f0; display: block;
  font-weight: normal;
}
.comment { color: #6272a4; }

/* ── CARDS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin: 16px 0 24px; }
.card {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2);
  padding: 18px; display: flex; flex-direction: column; gap: 8px;
  transition: transform .1s;
}
.card:hover { transform: translateY(-2px); }
.card-icon { font-size: 26px; }
.card-title { font-size: 13px; font-weight: 800; color: var(--text); }
.card-body { font-size: 13px; color: var(--text2); line-height: 1.55; }

/* ── TABLE ── */
.table-wrap {
  overflow-x: auto; margin: 16px 0 24px;
  border-radius: var(--r2); border: 2px solid var(--border);
  box-shadow: 0 4px 0 var(--border);
}
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead { background: var(--bg3); }
.data-table th {
  padding: 11px 14px; text-align: left; font-weight: 800;
  color: var(--text2); font-size: 11px; text-transform: uppercase;
  letter-spacing: .06em; border-bottom: 2px solid var(--border);
}
.data-table td { padding: 11px 14px; color: var(--text2); border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg3); }

/* ── FLOW ROW ── */
.flow-row {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  margin: 16px 0 24px; padding: 20px; background: var(--bg2);
  border-radius: var(--r2); border: 2px solid var(--border);
  box-shadow: 0 4px 0 var(--border);
}
.flow-step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.flow-step-icon { font-size: 24px; }
.flow-step-label { font-size: 10px; font-weight: 700; color: var(--text3); line-height: 1.3; max-width: 64px; text-align: center; }
.flow-arrow { color: var(--accent); font-size: 18px; font-weight: 900; }

/* ── CALLOUTS ── */
.callout { padding: 14px 18px; border-radius: var(--r2); font-size: 13.5px; line-height: 1.6; margin: 16px 0; border: 2px solid; }
.callout-info  { background: #e8f4ff; border-color: #b3d9ff; color: #1a5a8a; box-shadow: 0 3px 0 #b3d9ff; }
.callout-warn  { background: #fff8e0; border-color: var(--yellow); color: #785a00; box-shadow: 0 3px 0 #e6c700; }
.callout-tip   { background: #e8fae8; border-color: #a8e6a8; color: #1a5a1a; box-shadow: 0 3px 0 #a8e6a8; }
.callout-success { background: var(--bg3); border-color: var(--border); color: var(--text2); padding: 10px 14px; }

/* ── REAL WORLD BOX ── */
.real-world-box {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2);
  padding: 20px; margin: 24px 0;
}
.real-world-title { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
.real-world-body { font-size: 13.5px; color: var(--text2); line-height: 1.7; }

/* ── END OF CHAPTER NAV ── */
.ch-end-nav {
  display: flex; gap: 12px; margin-top: 36px; padding-top: 24px;
  border-top: 2px solid var(--border); justify-content: center; flex-wrap: wrap;
}
.ch-end-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 16px 24px; border-radius: var(--r2); cursor: pointer;
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text2); font-weight: 800;
  font-size: 13px; transition: all .1s; min-width: 130px;
  text-transform: uppercase; letter-spacing: .04em;
}
.ch-end-btn:hover { transform: translateY(-2px); border-color: var(--accent); color: var(--accent); }
.ch-end-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
.ch-end-btn.primary {
  background: var(--green); color: var(--greenfg);
  border-color: var(--green2); border-bottom-color: var(--green2);
}
.ch-end-btn.primary:hover { background: var(--green2); }
.ch-end-btn-icon { font-size: 22px; }
.ch-end-btn-label { font-size: 11px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px; border-radius: var(--r2); font-size: 14px;
  font-weight: 800; border: 2px solid; cursor: pointer; transition: all .1s;
  text-transform: uppercase; letter-spacing: .04em;
}
.btn:active { transform: translateY(2px); border-bottom-width: 2px !important; }
.btn-primary {
  background: var(--green); color: var(--greenfg);
  border-color: var(--green2); border-bottom: 4px solid var(--green2);
}
.btn-primary:hover { background: var(--green2); }
.btn-ghost {
  background: var(--bg2); color: var(--text2);
  border-color: var(--border2); border-bottom: 4px solid var(--border2);
}
.btn-ghost:hover { background: var(--bg3); color: var(--text); }

/* ── GAME ── */
.game-wrap { max-width: 680px; }
.game-start-card { max-width: 420px; margin: 0 auto; text-align: center; padding: 40px 24px; }
.game-icon { font-size: 56px; margin-bottom: 16px; filter: drop-shadow(0 4px 0 rgba(0,0,0,.1)); }
.game-start-title { font-size: 24px; font-weight: 900; color: var(--text); margin-bottom: 8px; letter-spacing: -.5px; }
.game-start-desc { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
.game-rules { display: flex; justify-content: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
.game-rule {
  font-size: 13px; font-weight: 700; color: var(--text2);
  background: var(--bg3); padding: 8px 14px; border-radius: var(--r);
  border: 2px solid var(--border);
}
.game-hud {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding: 12px 18px;
  background: var(--bg2); border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
}
.hud-score { font-size: 22px; font-weight: 900; color: var(--green); font-family: var(--mono); }
.hud-timer { font-size: 15px; font-weight: 800; color: var(--text2); font-family: var(--mono); }
.game-q-text { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
.game-opts { display: flex; flex-direction: column; gap: 10px; }
.game-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); cursor: pointer; transition: all .1s;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.game-opt:hover { border-color: var(--accent); border-bottom-color: var(--accent2); transform: translateY(-1px); }
.game-opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.game-opt.correct { border-color: var(--green); border-bottom-color: var(--green2); background: #e8fae8; color: #1a5a1a; }
.game-opt.wrong   { border-color: var(--red); background: #fff0f0; color: #8a1a1a; }
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg3); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; flex-shrink: 0; color: var(--text2);
  font-family: var(--mono);
}
.game-result-card { max-width: 420px; margin: 32px auto 0; text-align: center; }
.result-score { font-size: 60px; font-weight: 900; color: var(--green); font-family: var(--mono); line-height: 1; margin-bottom: 4px; }
.result-label { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 24px; }
.result-emoji { font-size: 52px; margin-bottom: 8px; }
.result-btns { display: flex; gap: 12px; justify-content: center; }
.result-stars { font-size: 28px; margin-bottom: 8px; }

/* ── QUIZ ── */
.quiz-wrap { max-width: 680px; }
.quiz-prog { display: flex; gap: 4px; margin-bottom: 24px; }
.quiz-pip { flex: 1; height: 8px; border-radius: 4px; background: var(--border2); transition: background .2s; }
.quiz-pip.done { background: var(--green); }
.quiz-pip.cur  { background: var(--accent); }
.quiz-q-card { display: none; }
.quiz-q-card.active { display: block; }
.quiz-meta { font-size: 11px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.quiz-q { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
.quiz-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.quiz-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 18px; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); cursor: pointer; transition: all .1s;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.quiz-opt:hover { border-color: var(--accent); border-bottom-color: var(--accent2); transform: translateY(-1px); }
.quiz-opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.quiz-opt.selected { border-color: var(--accent); background: #f0f4ff; }
.quiz-opt.correct   { border-color: var(--green); border-bottom-color: var(--green2); background: #e8fae8; }
.quiz-opt.wrong     { border-color: var(--red); border-bottom-color: #cc0000; background: #fff0f0; }
.quiz-exp {
  padding: 14px 18px; background: #e8fae8; border-radius: var(--r2);
  border: 2px solid var(--green); border-bottom: 4px solid var(--green2);
  font-size: 13.5px; color: #1a5a1a; margin: 12px 0; line-height: 1.6;
}
.quiz-actions { display: flex; gap: 10px; margin-top: 8px; }
.quiz-result { display: none; text-align: center; padding: 32px 0; }
.qr-score { font-size: 56px; font-weight: 900; font-family: var(--mono); color: var(--green); margin-bottom: 4px; }
.qr-label { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 24px; }
.quiz-nav { display: flex; justify-content: space-between; margin-top: 12px; }

/* ── CHEAT / SUMMARY ── */
.cheat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 14px; margin-top: 8px; }
.cheat-card {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2); padding: 16px;
}
.cheat-card-title { font-size: 11px; font-weight: 900; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .08em; }
.cheat-item { display: flex; justify-content: space-between; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.cheat-item:last-child { border-bottom: none; }
.cheat-key { font-family: var(--mono); color: var(--accent); font-weight: 700; font-size: 11.5px; flex-shrink: 0; }
.cheat-val { color: var(--text2); text-align: right; font-size: 11.5px; }

/* ── CREDITS ── */
.credits-bar { border-top: 2px solid var(--border); padding: 32px 0; margin-top: 48px; }
.credits-title { font-size: 10px; font-weight: 900; color: var(--accent); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 16px; font-family: var(--mono); }
.credits-grid { display: flex; flex-wrap: wrap; gap: 24px; }
.credit-group { flex: 1; min-width: 140px; }
.credit-group-title { font-size: 11px; font-weight: 800; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
.credit-item { font-size: 12px; color: var(--text3); line-height: 1.9; }
.credit-item a { color: var(--accent); text-decoration: none; font-weight: 700; }
.credit-item a:hover { text-decoration: underline; }

/* ── MOBILE ── */
@media (max-width: 700px) {
  .main { padding-top: 108px; padding-left: 16px; padding-right: 16px; }
  .ch-title { font-size: 20px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .flow-row { padding: 14px; gap: 4px; }
  .flow-step-label { font-size: 9px; max-width: 52px; }
  .game-rules { gap: 10px; }
  .quiz-actions { flex-wrap: wrap; }
  .result-btns { flex-wrap: wrap; }
  .ch-end-nav { gap: 8px; }
  .ch-end-btn { min-width: 100px; padding: 14px 16px; }
}
@media (max-width: 480px) {
  .ch-nav { padding: 6px 10px; }
  .ch-btn { padding: 7px 10px; min-width: 44px; }
}

</style>
</head>
<body>
<header class="header">
  <div class="header-logo">
    <div class="header-logo-dot"></div>
    <span>IP OSINT</span>
  </div>
  <span class="header-chname" id="headerChName"></span>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()">🇬🇧 EN</button>
</header>
<nav class="ch-nav" id="sidebar">
  <div class="sb-label" id="sbLabel" style="display:none"></div>
  
  <button class="ch-btn" id="nav-0" onclick="showChapter(0)"><span class="ch-num">00</span><span class="ch-title-text" id="chname-0"></span><span class="ch-stars" id="stars-0"></span></button>
  <button class="ch-btn" id="nav-1" onclick="showChapter(1)"><span class="ch-num">01</span><span class="ch-title-text" id="chname-1"></span><span class="ch-stars" id="stars-1"></span></button>
  <button class="ch-btn" id="nav-2" onclick="showChapter(2)"><span class="ch-num">02</span><span class="ch-title-text" id="chname-2"></span><span class="ch-stars" id="stars-2"></span></button>
  <button class="ch-btn" id="nav-3" onclick="showChapter(3)"><span class="ch-num">03</span><span class="ch-title-text" id="chname-3"></span><span class="ch-stars" id="stars-3"></span></button>
  <button class="ch-btn" id="nav-4" onclick="showChapter(4)"><span class="ch-num">04</span><span class="ch-title-text" id="chname-4"></span><span class="ch-stars" id="stars-4"></span></button>

`<div class="did-you-know">💡 <strong>ידעת?</strong> כל פעם שאתה גולש לאתר, שולח email, או מתחבר לשירות — כתובת ה-IP שלך נרשמת. ב-2025, ממוצע ה-logs שנוצרים מ-IP אחד ביום עולה על 50,000 רשומות ברחבי האינטרנט. חוקר מנוסה יכול לבנות תמונה מפורטת על מקור, ארגון, ו-infrastructure של כל IP — מבלי לשלוח packet אחד למטרה.</div>

<div class="section-title">מה זה IP Investigation?</div>
<p class="prose">IP Investigation (או IP OSINT) הוא תהליך של איסוף ואנליזה של מידע ציבורי על כתובת IP. המטרות יכולות להיות מגוונות: אבחון תקיפה שמגיעה מ-IP מסוים, בדיקה האם IP הוא malicious לפני שמאפשרים לו גישה, tracing מקור של spam campaign, או הבנת ה-infrastructure של תוקף. בכל המקרים האלה, המידע הוא ציבורי — השאלה היא איך לקרוא אותו נכון.</p>
<p class="prose">ההבדל בין חוקר טוב למתחיל הוא לא בגישה לכלים — כל הכלים חינמיים. ההבדל הוא בהבנת <em>מה</em> כל מידע אומר, <em>כמה</em> לסמוך עליו, ו<em>איך</em> לחבר נקודות ממקורות שונים לתמונה אחת.</p>

<div class="section-title">Passive vs Active Investigation</div>
<div class="grid-2">
<div class="card"><div class="card-icon">👁️</div><div class="card-title">Passive — ללא מגע</div><div class="card-body">שאילתות ל-databases ציבוריים (WHOIS, Shodan, VirusTotal). המטרה לא יודעת שחוקרים אותה. זה החלק שנלמד — לגיטימי, חוקי, ויעיל.</div></div>
<div class="card"><div class="card-icon">📡</div><div class="card-title">Active — שולחים packets</div><div class="card-body">Port scanning, ping, traceroute ישירות למטרה. המטרה עשויה לזהות. דורש הרשאה על targets חיצוניים — בלי הרשאה זה עלול להיחשב unauthorised access.</div></div>
</div>

<div class="section-title">מה אפשר לגלות על IP?</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>מידע</th><th>מקור</th><th>רמת דיוק</th></tr></thead><tbody>
<tr><td>מדינה / עיר משוערת</td><td>Geolocation DB</td><td>מדינה=95%, עיר=60-80%</td></tr>
<tr><td>ISP / ארגון</td><td>WHOIS, ASN lookup</td><td>גבוה מאוד</td></tr>
<tr><td>שם ה-hostname</td><td>Reverse DNS</td><td>גבוה אם קיים</td></tr>
<tr><td>Ports פתוחים</td><td>Shodan, Censys</td><td>תלוי בזמן scan</td></tr>
<tr><td>Reputation / blacklists</td><td>AbuseIPDB, VirusTotal</td><td>בינוני — false positives</td></tr>
<tr><td>ניצול בעבר</td><td>Threat feeds</td><td>היסטורי בלבד</td></tr>
</tbody></table></div>

<div class="section-title">חוקיות ו-Ethics</div>
<p class="prose">Passive OSINT על IPs הוא חוקי בכל מקום — כי המידע ציבורי. אבל יש גבולות. GDPR מגביל שימוש ב-PII של אירופאים — IP של אדם פרטי יכול להיחשב PII. Attribution — "ה-IP הזה הוא של X" — דורש הרבה יותר מ-IP אחד. IP addresses יכולים להיות shared (NAT, VPN, Tor exit nodes) ו-attribution שגויה יכולה לגרום נזק אמיתי.</p>

<div class="callout callout-warn"><strong>⚠️ כלל אחד תמיד:</strong> IP address ≠ אדם. IP address = נקודת כניסה לרשת בזמן מסוים. לפני שמסיקים מסקנות על מי עומד מאחורי IP — צריך הרבה יותר ראיות.</div>

<div class="real-world-box">
  <div class="real-world-title">🌍 Case Study: IP שנחקר — מה גילינו</div>
  <div class="real-world-body">
    IP: 185.220.101.45. מה גילינו ב-5 דקות passive research: ASN = AS205100 (F3 Netze e.V., גרמניה). Reverse DNS: tor-exit.example.onion. AbuseIPDB: 1,247 דיווחים ב-90 ימים. Shodan: port 9001 פתוח (Tor relay port). VirusTotal: flagged על ידי 12 vendors.<br><br>
    מסקנה: Tor exit node — כל traffic שמגיע מ-IP זה עשוי להיות ממישהו אחר לגמרי. Attribution בלתי אפשרי. Block — כן. Investigate person behind it — לא רלוונטי.

<div class="section-title">כלי Quick Lookup — הדרך המהירה</div>
<p class="prose">לפני שפותחים כלים מתקדמים — יש three one-liners שנותנים תמונה ראשונית תוך שניות:</p>
<pre class="code-block"><code><span class="comment"># 1. מידע בסיסי מ-command line</span>

<span class="comment"># מחזיר: IP, hostname, city, region, country, org, ASN</span>

<span class="comment"># 3. ASN lookup</span>
whois 185.220.101.45 | grep -E "OrgName|org-name|netname|country"
<span class="comment"># מחזיר: ארגון שהIP שייך לו</span></code></pre>

<div class="section-title">Investigation Checklist</div>
<p class="prose">כל IP investigation עוקב אחרי אותה שיטה. אין לדלג על שלבים — כל שלב נותן context לשלב הבא:</p>
<pre class="code-block"><code><span class="comment"># IP Investigation Checklist</span>
□ 1. ipinfo.io / ip-api.com    ← מדינה, ISP, ASN
□ 2. whois IP                  ← בעלות, registration
□ 3. dig -x IP                 ← Reverse DNS
□ 4. shodan.io/host/IP         ← ports, services, history
□ 5. abuseipdb.com             ← reputation, reports
□ 6. virustotal.com/ip/IP      ← malware associations
□ 7. bgp.tools / ipinfo.io/AS  ← BGP, routing context
□ 8. censys.io                 ← certificates, banners</code></pre>

<div class="section-title">כיצד Geolocation עובד</div>
<p class="prose">Geolocation databases בנויות משלוש שיטות עיקריות. הראשונה — registry data: כשISP מקבל block של IPs הוא מצהיר על מיקום בregistration. השנייה — BGP routing analysis: routing table entries מראים לאיזה רשת ב-AS שייך ה-IP. השלישית — active probing: חברות כמו MaxMind שולחות packets ומודדות RTT מנקודות ידועות ברחבי העולם כדי לחשב מיקום.</p>
<p class="prose">הדיוק יורד ככל שמתקרבים לרמה הספציפית יותר. מדינה — כמעט מושלם. עיר — שני שלישים מהמקרים. כתובת — לא אמין בכלל. וחשוב מזה: VPN ו-proxy מבלבלים את כל השיטות האלה, כי ה-IP שנראה הוא של שרת ה-VPN ולא של המשתמש האמיתי.</p>

<div class="grid-2">
<div class="card"><div class="card-icon">🌍</div><div class="card-title">רמות דיוק Geolocation</div><div class="card-body">מדינה: ~99%. אזור/מדינה פנימית: ~80%. עיר: 60-70%. ZIP/postal: 30-50%. כתובת: לא אמין.</div></div>
<div class="card"><div class="card-icon">⚠️</div><div class="card-title">מקרים שמבלבלים</div><div class="card-body">VPN / Proxy / Tor: מציג שרת, לא משתמש. Satellite internet (Starlink): IP בארה"ב גם למשתמש ישראלי. CDN: IP של Cloudflare, לא של האתר.</div></div>

<span class="comment"># ip-api.com — ללא registration</span>

import requests
def lookup(ip):

<div class="section-title">VPN ו-Proxy Detection</div>
<p class="prose">כשחוקרים IP חשוד, אחד השלבים הראשונים הוא לבדוק האם ה-IP הוא VPN, proxy, hosting, או Tor exit node. IP של hosting provider (AWS, DigitalOcean, OVH) שגולש לאתר שלך הוא כמעט בוודאות bot או תוקף שמסתיר זהות — לא משתמש לגיטימי.</p>

<p class="prose">חשוב להבין: WHOIS ל-IP address שונה מ-WHOIS ל-domain. Domain WHOIS מציג מי רשם את הדומיין. IP WHOIS מציג מי <em>מחזיק</em> בblock של IPs — לרוב ISP, hosting company, או ארגון גדול. ה-ISP עצמו לא מגלה מי הלקוח הספציפי שמשתמש ב-IP — זה דורש צו שיפוטי.</p>

<div class="section-title">ASN — Autonomous System Number</div>
<p class="prose">ASN הוא מספר שמזהה רשת תחת ניהול אחד — ISP, חברה, אוניברסיטה. לדעת מה ה-ASN של IP זה מעשית לדעת "מי מנהל את הרשת שה-IP שייך לה". AS15169 הוא Google. AS16509 הוא Amazon AWS. AS13335 הוא Cloudflare. כשרואים IP מ-AS של hosting provider — זה סימן מיידי שזה שרת ולא אדם פרטי.</p>

<div class="section-title">מה זה Reverse DNS?</div>
<p class="prose">בדרך כלל DNS ממיר שם דומיין לIP. Reverse DNS הולך הפוך: מ-IP לשם. זה מתבצע דרך PTR records ב-zone מיוחדת בשם in-addr.arpa. לא כל IP יש PTR record — ISPs ו-hosting providers לרוב מגדירים, אבל IPs דינמיים לרוב לא. העדר PTR record יכול בפני עצמו להיות סימן — legitimate mail servers חייבים PTR.</p>

<span class="comment"># 8.8.8.8.in-addr.arpa name = dns.google.</span>

<span class="comment"># host command</span>

<span class="comment"># 1.1.1.1.in-addr.arpa domain name pointer one.one.one.one.</span></code></pre>

<div class="section-title">Blacklists — SPAMHAUS ו-DNSBL</div>
<p class="prose">Blacklists (או DNS Blocklists) הן רשימות של IPs שנחסמים על ידי mail servers, firewalls, ו-ISPs. SPAMHAUS היא הנפוצה והסמכותית ביותר. אם IP נמצא ב-SPAMHAUS, כנראה שmail ממנו נחסם על ידי רוב ה-mail providers בעולם.</p>

<span class="comment"># 127.0.0.x = ב-blacklist! (רע)</span>

import dns.resolver

def check_spamhaus(ip):
    reversed_ip = '.'.join(reversed(ip.split('.')))
    query = f"{reversed_ip}.zen.spamhaus.org"

<div class="section-title">מה מכיל Web Access Log</div>
<p class="prose">כל בקשה HTTP שמגיעה לשרת נרשמת ב-access log. כל שורה מכילה: IP המקור, timestamp, method, URL, status code, bytes, ו-user agent. מתוך שורה אחת אפשר לדעת: מאיפה הגיעה הבקשה, מה ביקשה, האם הצליחה, ומי (browser? bot?) שלח אותה.</p>

`<div class="did-you-know">💡 <strong>Did you know?</strong> Every time you browse a website, send an email, or connect to a service — your IP address is logged. In 2025, the average number of log entries created per IP per day across the internet exceeds 50,000 records. An experienced investigator can build a detailed picture of the origin, organization, and infrastructure behind any IP — without sending a single packet to the target.</div>

<div class="section-title">What is IP Investigation?</div>
<p class="prose">IP Investigation (or IP OSINT) is the process of collecting and analyzing public information about an IP address. The goals can vary: diagnosing an attack coming from a specific IP, checking whether an IP is malicious before granting it access, tracing the origin of a spam campaign, or understanding an attacker's infrastructure. In all these cases, the information is public — the question is how to read it correctly.</p>
<p class="prose">The difference between a good investigator and a beginner is not access to tools — all the tools are free. The difference is understanding <em>what</em> each piece of information means, <em>how much</em> to trust it, and <em>how</em> to connect dots from different sources into a single picture.</p>

<div class="section-title">Passive vs Active Investigation</div>
<div class="grid-2">
<div class="card"><div class="card-icon">👁️</div><div class="card-title">Passive — No Contact</div><div class="card-body">Queries to public databases (WHOIS, Shodan, VirusTotal). The target does not know it is being investigated. This is what we learn — legitimate, legal, and effective.</div></div>
<div class="card"><div class="card-icon">📡</div><div class="card-title">Active — Sending Packets</div><div class="card-body">Port scanning, ping, traceroute directly to the target. The target may detect this. Requires authorization on external targets — without it, this can be considered unauthorised access.</div></div>
</div>

<div class="section-title">What Can You Discover About an IP?</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Information</th><th>Source</th><th>Accuracy Level</th></tr></thead><tbody>
<tr><td>Country / approximate city</td><td>Geolocation DB</td><td>Country=95%, City=60-80%</td></tr>
<tr><td>ISP / Organization</td><td>WHOIS, ASN lookup</td><td>Very high</td></tr>
<tr><td>Hostname</td><td>Reverse DNS</td><td>High if exists</td></tr>
<tr><td>Open ports</td><td>Shodan, Censys</td><td>Depends on scan time</td></tr>
<tr><td>Reputation / blacklists</td><td>AbuseIPDB, VirusTotal</td><td>Medium — false positives exist</td></tr>
<tr><td>Past exploitation</td><td>Threat feeds</td><td>Historical only</td></tr>
</tbody></table></div>

<div class="section-title">Legality and Ethics</div>
<p class="prose">Passive OSINT on IPs is legal everywhere — because the information is public. But there are limits. GDPR restricts use of PII for Europeans — a private person's IP can be considered PII. Attribution — "this IP belongs to X" — requires much more than a single IP. IP addresses can be shared (NAT, VPN, Tor exit nodes) and incorrect attribution can cause real harm.</p>

<div class="callout callout-warn"><strong>⚠️ One rule always:</strong> IP address does not equal a person. IP address equals a network entry point at a specific time. Before drawing conclusions about who is behind an IP — you need much more evidence.</div>

<div class="real-world-box">
  <div class="real-world-title">🌍 Case Study: An IP Investigated — What We Found</div>
  <div class="real-world-body">
    IP: 185.220.101.45. What we found in 5 minutes of passive research: ASN = AS205100 (F3 Netze e.V., Germany). Reverse DNS: tor-exit.example.onion. AbuseIPDB: 1,247 reports in 90 days. Shodan: port 9001 open (Tor relay port). VirusTotal: flagged by 12 vendors.<br><br>
    Conclusion: Tor exit node — all traffic from this IP may be from someone completely different. Attribution is impossible. Block — yes. Investigate the person behind it — not relevant.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<pre class="code-block"><code><span class="comment"># 1. Basic info from command line</span>
curl -s ipinfo.io/185.220.101.45

`<div class="did-you-know">💡 <strong>Did you know?</strong> MaxMind GeoIP2, the most widely used IP geolocation database, is accurate at country level in 99.8% of cases — but at city level only 66%. And there is a strange exception: in the US, IPs that cannot be located are pinned to Hutchinson, Kansas — the geographic center of the US. Its residents received thousands of complaints and police visits about "crimes" they never committed.</div>

<div class="section-title">How Geolocation Works</div>
<p class="prose">Geolocation databases are built using three main methods. First — registry data: when an ISP receives a block of IPs it declares a location in the registration. Second — BGP routing analysis: routing table entries show which network within an AS the IP belongs to. Third — active probing: companies like MaxMind send packets and measure RTT from known points around the world to calculate location.</p>
<p class="prose">Accuracy drops as you get more specific. Country — almost perfect. City — two thirds of cases. Address — unreliable. And critically: VPN and proxy confuse all these methods, because the visible IP is that of the VPN server, not the real user.</p>

<div class="grid-2">
<div class="card"><div class="card-icon">🌍</div><div class="card-title">Geolocation Accuracy Levels</div><div class="card-body">Country: ~99%. Region/state: ~80%. City: 60-70%. ZIP/postal: 30-50%. Address: unreliable.</div></div>
<div class="card"><div class="card-icon">⚠️</div><div class="card-title">Cases That Confuse It</div><div class="card-body">VPN / Proxy / Tor: shows server, not user. Satellite internet (Starlink): US IP even for Israeli user. CDN: Cloudflare's IP, not the website's.</div></div>
</div>

<div class="section-title">Core Geolocation Tools</div>
<pre class="code-block"><code><span class="comment"># ipinfo.io — most complete for free</span>
curl -s ipinfo.io/8.8.8.8
<span class="comment"># {"ip":"8.8.8.8","hostname":"dns.google","city":"Mountain View",</span>
<span class="comment">#  "region":"California","country":"US","org":"AS15169 Google LLC"}</span>

<span class="comment"># ip-api.com — no registration needed</span>
curl -s "ip-api.com/json/8.8.8.8"

<span class="comment"># Python — batch lookup</span>
import requests
def lookup(ip):
    r = requests.get(f'https://ipinfo.io/{ip}/json')
    return r.json()

ips = ['8.8.8.8', '1.1.1.1', '185.220.101.45']
for ip in ips:
    data = lookup(ip)
    print(f"{ip}: {data.get('country')} | {data.get('org')}")</code></pre>

<div class="section-title">VPN and Proxy Detection</div>
<p class="prose">When investigating a suspicious IP, one of the first steps is checking whether the IP is a VPN, proxy, hosting server, or Tor exit node. A hosting provider IP (AWS, DigitalOcean, OVH) visiting your site is almost certainly a bot or attacker hiding their identity — not a legitimate user.</p>
<pre class="code-block"><code><span class="comment"># ipinfo.io privacy detection (API)</span>
curl -s "ipinfo.io/185.220.101.45/privacy?token=YOUR_TOKEN"
<span class="comment"># {"vpn":false,"proxy":false,"tor":true,"relay":false,"hosting":false}</span>

<span class="comment"># Check ASN against hosting ASN list</span>
<span class="comment"># If org contains: AWS, Google Cloud, Azure, DigitalOcean,</span>
<span class="comment"># OVH, Hetzner, Linode — probably hosting, not residential</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 Geolocation in Court — The Kansas Story</div>
  <div class="real-world-body">
    When MaxMind could not locate an IP in the US, they pinned it to coordinates 38.0000N, 97.0000W — the geographic center of the US. This fell exactly on Joyce Taylor's farm in Salina, Kansas. For years, people investigated for fraud, stalking, and other crimes recorded from an "unidentified American IP" showed up at her door. FBI, police, endless stress.<br><br>
    MaxMind fixed the bug in 2016 after a BuzzFeed article. The lesson: Geolocation is a statistical estimate, not a fact. Never send investigators to an address based solely on Geolocation.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<div class="section-title">Multi-source Geolocation — Getting a Reliable Picture</div>
<p class="prose">Never rely on a single source. Three sources that agree — high confidence. Two that agree and one different — the majority is probably right. Three that differ — the data is unreliable, document the uncertainty.</p>
<pre class="code-block"><code><span class="comment"># Check 3 sources on one IP</span>
IP="185.220.101.45"

echo "=== ipinfo.io ==="
curl -s ipinfo.io/$IP | python3 -m json.tool | grep -E "city|country|org"

echo "=== ip-api.com ==="
curl -s "ip-api.com/json/$IP" | python3 -m json.tool | grep -E "city|country|isp"

echo "=== whois ==="
whois $IP | grep -iE "country|netname|descr|org" | head -8</code></pre>

`<div class="did-you-know">💡 <strong>Did you know?</strong> WHOIS has existed since 1982 — one of the oldest protocols on the internet. Originally, every IP address and domain was registered with a real name, address, and email. Today GDPR and other regulations have hidden much of this information — but for organizational IP ranges, WHOIS still contains very useful information.</div>

<div class="section-title">WHOIS for IP Addresses — Different from Domains</div>
<p class="prose">It is important to understand: WHOIS for an IP address is different from WHOIS for a domain. Domain WHOIS shows who registered the domain. IP WHOIS shows who <em>holds</em> the block of IPs — usually an ISP, hosting company, or large organization. The ISP itself does not reveal which specific customer is using the IP — that requires a court order.</p>
<pre class="code-block"><code><span class="comment"># WHOIS on an IP — what you get</span>
whois 8.8.8.8
<span class="comment"># NetRange: 8.0.0.0 - 8.255.255.255</span>
<span class="comment"># CIDR: 8.0.0.0/8</span>
<span class="comment"># NetName: LVLT-ORG-8-8</span>
<span class="comment"># Organization: Level 3 Parent, LLC (LPL-141)</span>
<span class="comment"># RegDate: 1992-12-01</span></code></pre>

<div class="section-title">Regional Internet Registries — Who Manages What</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>RIR</th><th>Region</th><th>WHOIS Address</th></tr></thead><tbody>
<tr><td><strong>ARIN</strong></td><td>North America</td><td>whois.arin.net</td></tr>
<tr><td><strong>RIPE NCC</strong></td><td>Europe, Middle East, Central Asia</td><td>whois.ripe.net</td></tr>
<tr><td><strong>APNIC</strong></td><td>Asia Pacific</td><td>whois.apnic.net</td></tr>
<tr><td><strong>LACNIC</strong></td><td>Latin America</td><td>whois.lacnic.net</td></tr>
<tr><td><strong>AFRINIC</strong></td><td>Africa</td><td>whois.afrinic.net</td></tr>
</tbody></table></div>

<div class="section-title">ASN — Autonomous System Number</div>
<p class="prose">An ASN is a number that identifies a network under single management — an ISP, company, or university. Knowing the ASN of an IP is practically knowing "who manages the network this IP belongs to." AS15169 is Google. AS16509 is Amazon AWS. AS13335 is Cloudflare. When you see an IP from a hosting provider ASN — that is an immediate sign it is a server, not a private person.</p>
<pre class="code-block"><code><span class="comment"># ASN lookup from terminal</span>
whois -h whois.cymru.com " -v 8.8.8.8"
<span class="comment"># AS | IP | BGP Prefix | CC | Registry | Allocated | AS Name</span>
<span class="comment"># 15169 | 8.8.8.8 | 8.8.8.0/24 | US | arin | 2023-12 | GOOGLE</span>

<span class="comment"># Python: ipwhois library</span>
from ipwhois import IPWhois
obj = IPWhois('185.220.101.45')
result = obj.lookup_rdap()
print(result['asn'])
print(result['asn_description'])
print(result['network']['name'])</code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 ASN Investigation — Who Is Behind the Attack?</div>
  <div class="real-world-body">
    Attack traffic log from 47 different IPs. They all look different — but ASN lookup shows: 38 of them belong to AS44477 (STARK INDUSTRIES, UK) and 9 to AS209588 (Flyservers, Cyprus). Both are known bulletproof hosting providers that host cybercriminals.<br><br>
    The lesson: blocking individual IPs takes time and is inefficient. Blocking an entire bulletproof provider ASN — takes down 38 IPs with a single rule. Solution: firewall rule blocking the entire ASN prefix.
  </div>
</div>

def ip_report(ip):

        'asn': r.get('asn'),
        'asn_description': r.get('asn_description'),
        'asn_country': r.get('asn_country_code'),
        'network_name': r['network'].get('name'),
        'network_cidr': r['network'].get('cidr'),
    }

<div class="section-title">What is Reverse DNS?</div>
<p class="prose">Normally DNS converts a domain name to an IP. Reverse DNS goes the other way: from IP to name. This is done through PTR records in a special zone called in-addr.arpa. Not every IP has a PTR record — ISPs and hosting providers usually configure them, but dynamic IPs usually do not. The absence of a PTR record can itself be a sign — legitimate mail servers must have PTR records.</p>
<pre class="code-block"><code><span class="comment"># Reverse DNS lookup</span>
dig -x 8.8.8.8 +short
<span class="comment"># dns.google.</span>

<span class="comment"># tor-exit-se1.privacyfirst.se. ← Tor exit node!</span>

<span class="comment"># nslookup alternative</span>
nslookup 8.8.8.8

<span class="comment"># host command</span>
host 1.1.1.1
<span class="comment"># 1.1.1.1.in-addr.arpa domain name pointer one.one.one.one.</span></code></pre>

<tr><td>tor-exit / exit.</td><td>Tor exit node</td><td>tor-exit.riseup.net</td></tr>
<tr><td>.amazonaws.com</td><td>AWS EC2 — region readable</td><td>ec2-3-94-1-1.compute-1.amazonaws.com</td></tr>
<tr><td>.googleusercontent.com</td><td>Google Cloud</td><td>123.456.789.gce.googleusercontent.com</td></tr>

<tr><td>cloudflare.com / akamai</td><td>CDN — not the origin</td><td>104-16-0-1.cloudflare.com</td></tr>
</tbody></table></div>

<div class="section-title">CDN Detection — The IP That Does Not Belong to the Site</div>
<p class="prose">When investigating a domain and getting a Cloudflare, Akamai, or Fastly IP — you are seeing the CDN, not the real origin server. The origin can be completely hidden. But there are ways to try to find it: certificate transparency logs, Shodan scan by cert, and historical DNS records.</p>
<pre class="code-block"><code><span class="comment"># Check if domain is behind Cloudflare</span>

<span class="comment"># 104.21.x.x ← Cloudflare IP range</span>

<span class="comment"># Try to find origin — Shodan</span>
<span class="comment"># shodan.io/search?query=http.title:"Company Name" -org:Cloudflare</span>

<span class="comment"># Certificate Transparency — crt.sh</span>
<span class="comment"># https://crt.sh/?q=%.company.com</span>
<span class="comment"># shows subdomains with certificates — direct.company.com?</span>

<span class="comment"># Historical DNS — viewdns.info / securitytrails.com</span>
<span class="comment"># what was the IP before they moved to Cloudflare?</span></code></pre>

import socket
from concurrent.futures import ThreadPoolExecutor

<div class="section-title">Reputation Sources — What Each One Gives</div>
<p class="prose">No single source is enough. Each reputation database is built differently, contains different data, and has a different false positive rate. A good investigator uses multiple sources and weighs results — not drawing conclusions from a single database.</p>
<div class="grid-2">
<div class="card"><div class="card-icon">🦠</div><div class="card-title">VirusTotal</div><div class="card-body">70+ security vendors check the IP. Shows: malware associations, URL scans, community comments, passive DNS. What to look at: how many vendors flagged? In what categories? When?</div></div>
<div class="card"><div class="card-icon">🚨</div><div class="card-title">AbuseIPDB</div><div class="card-body">Crowdsourced reports on IP abuse. Shows: confidence score (0-100), report count, categories (SSH brute force, spam, port scan). Important: check comments too — they sometimes explain the context.</div></div>

        headers={"x-apikey": VIRUSTOTAL_KEY}

<div class="section-title">Shodan — The Internet's Search Engine</div>
<p class="prose">Shodan is a search engine that scans the internet and indexes service banners — what servers respond when you connect to them. Instead of searching website content (like Google), Shodan searches service metadata: versions, certificates, banners, open ports. It is a research tool, not an attack tool — but the information it exposes shows how much infrastructure is public that many thought was "internal."</p>

<div class="section-title">What a Web Access Log Contains</div>
<p class="prose">Every HTTP request that reaches the server is recorded in the access log. Each line contains: source IP, timestamp, method, URL, status code, bytes, and user agent. From a single line you can know: where the request came from, what it requested, whether it succeeded, and who (browser? bot?) sent it.</p>
<pre class="code-block"><code><span class="comment"># nginx access log format</span>
185.220.101.45 - - [15/Jan/2025:14:23:01 +0000] "GET /wp-admin HTTP/1.1" 404 162 "-" "Mozilla/5.0"
<span class="comment"># IP | timestamp | method+URL | status | bytes | referrer | user-agent</span>

<span class="comment"># Questions worth asking:</span>
<span class="comment"># Who sends the most requests? (top IPs)</span>
<span class="comment"># Which URLs are requested most? (404 scanning?)</span>
<span class="comment"># Who tries /wp-admin, /phpmyadmin, /.env?</span>
<span class="comment"># Suspicious user agents (python-requests, sqlmap, nikto)?</span></code></pre>

<div class="section-title">Log Analysis — Command Line</div>
<pre class="code-block"><code><span class="comment"># Top 10 IPs by request count</span>
awk '{print $1}' access.log | sort | uniq -c | sort -rn | head -10

<span class="comment"># All requests from a specific IP</span>
grep "185.220.101.45" access.log

<span class="comment"># All 404 errors — scanning patterns</span>
awk '$9==404 {print $1, $7}' access.log | sort | uniq -c | sort -rn | head -20

<span class="comment"># Suspicious user agents</span>
awk -F'"' '{print $6}' access.log | sort | uniq -c | sort -rn | grep -iE "sqlmap|nikto|python-requests|masscan"

<span class="comment"># Requests per hour graph</span>
awk '{print $4}' access.log | cut -d: -f2 | sort | uniq -c</code></pre>

<div class="section-title">GeoIP Enrichment — Add Context to Every IP</div>
<p class="prose">A log without context is a list of numbers. With GeoIP enrichment, every IP gets: country, ISP, ASN. Suddenly you see: "90% of the 404 errors come from 4 specific ASNs that are all bulletproof hosting." This turns a list of IPs into real intelligence.</p>
<pre class="code-block"><code><span class="comment"># Python: enrichment with ipinfo.io</span>
import requests
from collections import Counter

def get_country(ip):
    try:
        r = requests.get(f"https://ipinfo.io/{ip}/json", timeout=2)
        return r.json().get("country", "??")
    except:
        return "??"

with open("access.log") as f:
    ips = [line.split()[0] for line in f if "404" in line]

unique_ips = list(set(ips))[:100]
countries = Counter(get_country(ip) for ip in unique_ips)
print(countries.most_common(10))</code></pre>

<div class="section-title">What an IP Investigation Report Needs</div>
<p class="prose">A good IP investigation report serves two audiences: the technical team that needs to know exactly what to block and how, and management that needs to understand the business impact. A report that only speaks technically will not drive action. A report that only speaks business language cannot be implemented by the technical team.</p>

<div class="section-title">Python Automation — Full IP Report</div>
<pre class="code-block"><code><span class="comment"># ip_investigate.py — full automated report</span>
import requests, socket, subprocess, json
from datetime import datetime

def investigate(ip):
    report = {"ip": ip, "timestamp": datetime.now().isoformat()}

    try:
        r = requests.get(f"https://ipinfo.io/{ip}/json", timeout=5)
        info = r.json()
        report["country"] = info.get("country")
        report["org"] = info.get("org")
        report["hostname"] = info.get("hostname")
    except: pass

    try:
        report["ptr"] = socket.gethostbyaddr(ip)[0]
    except:
        report["ptr"] = None

    try:
        r = requests.get(
            "https://api.abuseipdb.com/api/v2/check",
            headers={"Key": "YOUR_KEY", "Accept": "application/json"},
            params={"ipAddress": ip, "maxAgeInDays": 90},
            timeout=5
        )
        d = r.json()["data"]
        report["abuse_confidence"] = d["abuseConfidenceScore"]
        report["abuse_reports"] = d["totalReports"]
    except: pass

    return report

result = investigate("185.220.101.45")
print(json.dumps(result, indent=2))</code></pre>

  <div class="real-world-title">🌍 Attribution Mistake — Defamation in Court</div>
  <div class="real-world-body">
    In 2018, a security company published a report attributing a cyberattack to "an Israeli company" based on IP geolocation. The problem: the IP was a Tor exit node. The real user could have been anywhere in the world. The Israeli company sued for defamation. It ended in a settlement.<br><br>
    The iron rule: attribution requires much more than an IP. Geolocation + ASN + PTR are circumstantial evidence. Attributing to a specific organization requires: corroborating evidence from additional sources, TTPs matching, infrastructure overlap, and an explicit confidence level in the report.

function renderLab(chId) {
  const el = document.getElementById('lab-' + chId);
  if (!el || el.dataset.rendered) return;
  el.dataset.rendered = '1';
  const exs = getL(chId);
  const Lc = L();
  const labTypeNames = currentLang==='he'
    ? {fill:'✏️ השלמה', classify:'🗂️ סיווג', order:'🔢 סידור', mchoice:'🎭 תרחיש', complete:'הושלמו', orderSeq:'הסדר שבחרת:', orderCheck:'בדקי ✓', allDone:'כל התרגילים הושלמו!'}
    : {fill:'✏️ Fill in', classify:'🗂️ Classify', order:'🔢 Order', mchoice:'🎭 Scenario', complete:'completed', orderSeq:'Your order:', orderCheck:'Check ✓', allDone:'All exercises done!'};

  el.innerHTML = `<div class="lab-header">
    <div class="lab-progress-row">
      <span class="lab-progress-label" id="lab-prog-label-${chId}">0/${exs.length} ${labTypeNames.complete}</span>
      <div class="lab-progress-bar"><div class="lab-progress-fill" id="lab-prog-fill-${chId}" style="width:0%"></div></div>
    </div>
  </div>` + exs.map((ex, i) => {
    if (ex.type === 'fill')     return renderFill(chId, i, ex, Lc, labTypeNames);
    if (ex.type === 'classify') return renderClassify(chId, i, ex, Lc, labTypeNames, exs.length);
    if (ex.type === 'order')    return renderOrder(chId, i, ex, Lc, labTypeNames, exs.length);
    if (ex.type === 'mchoice')  return renderMChoice(chId, i, ex, Lc, labTypeNames, exs.length);
    return '';
  }).join('') +
  `<div class="lab-done-banner" id="lab-done-${chId}" style="display:none">
    <span>🏆</span><span id="lab-done-txt-${chId}"></span>
  </div>`;
}

function renderFill(chId, i, ex, Lc, T) {
  const total = getL(chId).length;
  const fields = ex.fields.map((f, fi) =>
    `<div class="fill-row" id="fill-row-${chId}-${i}-${fi}">
      <label class="fill-label">${f.label}</label>
      <div class="fill-input-wrap">
        <input class="fill-input" id="fill-inp-${chId}-${i}-${fi}" placeholder="${f.placeholder}"
          oninput="fillCheck(${chId},${i},${fi})" autocomplete="off" spellcheck="false">
        <span class="fill-icon" id="fill-icon-${chId}-${i}-${fi}"></span>
      </div>
    </div>`).join('');
  return `<div class="lab-card" id="labcard-${chId}-${i}">
    <div class="lab-card-hdr"><span class="lab-type-badge">${T.fill}</span><span class="lab-card-num">${i+1}/${total}</span></div>
    <div class="lab-card-q">${ex.q}</div>
    <div class="fill-fields">${fields}</div>
    <div class="lab-explain-box" id="labexp-${chId}-${i}" style="display:none"><strong>${Lc.labExplain}</strong> ${ex.explain||''}</div>
  </div>`;
}

function fillCheck(chId, i, fi) {
  const exs = getL(chId);
  const f = exs[i].fields[fi];
  const inp = document.getElementById(`fill-inp-${chId}-${i}-${fi}`);
  const icon = document.getElementById(`fill-icon-${chId}-${i}-${fi}`);
  const row = document.getElementById(`fill-row-${chId}-${i}-${fi}`);
  if (!inp) return;
  const val = inp.value.trim().toLowerCase();
  const alts = (f.alt || []).map(a => a.toLowerCase());
  const ok = val === f.answer.toLowerCase() || alts.includes(val);
  row.className = 'fill-row' + (val.length===0?'': ok?' fill-correct':' fill-wrong');
  icon.textContent = val.length===0?'': ok?'✓':'';
  const allOk = exs[i].fields.every((ff, ffi) => {
    const v = (document.getElementById(`fill-inp-${chId}-${i}-${ffi}`)?.value||'').trim().toLowerCase();
    return v === ff.answer.toLowerCase() || (ff.alt||[]).map(a=>a.toLowerCase()).includes(v);
  });
  if (allOk) markLabDone(chId, i);
}

function renderClassify(chId, i, ex, Lc, T, total) {
  const shuffled = [...ex.items].sort(() => Math.random() - 0.5);
  return `<div class="lab-card" id="labcard-${chId}-${i}">
    <div class="lab-card-hdr"><span class="lab-type-badge">${T.classify}</span><span class="lab-card-num">${i+1}/${total}</span></div>
    <div class="lab-card-q">${ex.q}</div>
    ${ex.desc?`<div class="lab-desc">${ex.desc}</div>`:''}
    <div class="classify-pool" id="pool-${chId}-${i}">
      ${shuffled.map(item=>`<button class="classify-chip" id="chip-${chId}-${i}-${item.id}" onclick="classifySelect(${chId},${i},'${item.id}')">${esc(item.text)}</button>`).join('')}
    </div>
    <div class="classify-cats">
      ${ex.categories.map((cat,ci)=>`
        <div class="classify-cat" onclick="classifyDrop(${chId},${i},${ci})">
          <div class="classify-cat-title">${cat}</div>
          <div class="classify-cat-zone" id="zone-${chId}-${i}-${ci}"></div>
        </div>`).join('')}
    </div>
    <div class="lab-explain-box" id="labexp-${chId}-${i}" style="display:none"><strong>${Lc.labExplain}</strong> ${ex.explain||''}</div>
  </div>`;
}

const _csel = {};
function classifySelect(chId, i, itemId) {
  _csel[`${chId}-${i}`] = itemId;
  document.querySelectorAll(`#pool-${chId}-${i} .classify-chip, #labcard-${chId}-${i} .classify-drop-chip`).forEach(c=>c.classList.remove('selected'));
  document.getElementById(`chip-${chId}-${i}-${itemId}`)?.classList.add('selected');
}
function classifyDrop(chId, i, ci) {
  const key = `${chId}-${i}`;
  const itemId = _csel[key]; if(!itemId) return;
  const ex = getL(chId)[i];
  const item = ex.items.find(it=>it.id===itemId); if(!item) return;
  const ok = item.ans === ex.catKeys[ci];
  document.getElementById(`chip-${chId}-${i}-${itemId}`)?.remove();
  const zone = document.getElementById(`zone-${chId}-${i}-${ci}`);
  if (zone) {
    const chip = document.createElement('span');
    chip.className = 'classify-drop-chip ' + (ok?'drop-correct':'drop-wrong');
    chip.textContent = (ok?'✓ ':'✗ ') + item.text;
    chip.onclick = () => { chip.remove(); const pool=document.getElementById(`pool-${chId}-${i}`); if(pool){const b=document.createElement('button');b.className='classify-chip';b.id=`chip-${chId}-${i}-${itemId}`;b.textContent=item.text;b.onclick=()=>classifySelect(chId,i,itemId);pool.appendChild(b);} };
    zone.appendChild(chip);
  }
  delete _csel[key];
  const allPlaced = ex.items.every(it => !document.getElementById(`chip-${chId}-${i}-${it.id}`));
  if (allPlaced) {
    const allOk = ex.items.every(it => { const ci2=ex.catKeys.indexOf(it.ans); const z=document.getElementById(`zone-${chId}-${i}-${ci2}`); return z && [...z.querySelectorAll('.drop-correct')].some(c=>c.textContent.includes(it.text)); });
    document.getElementById(`labexp-${chId}-${i}`)?.style && (document.getElementById(`labexp-${chId}-${i}`).style.display='block');
    if (allOk) markLabDone(chId, i);
  }
}

function renderOrder(chId, i, ex, Lc, T, total) {
  const shuffled = [...ex.items].sort(() => Math.random() - 0.5);

    <div class="lab-card-hdr"><span class="lab-type-badge">${T.order}</span><span class="lab-card-num">${i+1}/${total}</span></div>
    <div class="lab-card-q">${ex.q}</div>

    </div>

const _ostate = {};
function orderClick(chId, i, itemId) {
  const key=`${chId}-${i}`; if(!_ostate[key]) _ostate[key]=[];
  if(_ostate[key].includes(itemId)) return;
  _ostate[key].push(itemId);
  const btn = document.getElementById(`oitem-${chId}-${i}-${itemId}`);
  if(btn){btn.classList.add('order-selected');btn.disabled=true;}
  const zone = document.getElementById(`orderseq-${chId}-${i}`);
  if(zone){const s=document.createElement('div');s.className='order-seq-step';s.dataset.id=itemId;s.innerHTML=`<span class="order-seq-num">${_ostate[key].length}</span> ${btn?.textContent||''}`;s.onclick=()=>orderRemove(chId,i,itemId);zone.appendChild(s);}
}
function orderRemove(chId, i, itemId) {
  const key=`${chId}-${i}`; if(!_ostate[key]) return;
  _ostate[key]=_ostate[key].filter(id=>id!==itemId);
  const btn=document.getElementById(`oitem-${chId}-${i}-${itemId}`);
  if(btn){btn.classList.remove('order-selected');btn.disabled=false;}
  const zone=document.getElementById(`orderseq-${chId}-${i}`);
  if(zone){const s=zone.querySelector(`[data-id="${itemId}"]`);if(s)s.remove();zone.querySelectorAll('.order-seq-step').forEach((st,idx)=>{const n=st.querySelector('.order-seq-num');if(n)n.textContent=idx+1;});}
}
function orderCheck(chId, i) {
  const key=`${chId}-${i}`;
  const ex=getL(chId)[i];
  const chosen=_ostate[key]||[];
  const fb=document.getElementById(`orderfb-${chId}-${i}`);
  const isHe=currentLang==='he';
  if(chosen.length<ex.correct.length){if(fb){fb.textContent=isHe?`⚠️ בחרי את כל ${ex.correct.length} השלבים`:`⚠️ Select all ${ex.correct.length} steps`;fb.className='order-feedback warn';}return;}
  const ok=ex.correct.every((id,idx)=>chosen[idx]===id);
  if(fb){fb.textContent=ok?'✅ '+(isHe?'מצוין! סדר נכון.':'Correct! Perfect order.'):'❌ '+(isHe?'לא בדיוק. נסי שוב.':'Not quite. Try again.');fb.className='order-feedback '+(ok?'ok':'err');}
  if(ok){document.getElementById(`labexp-${chId}-${i}`)?.style&&(document.getElementById(`labexp-${chId}-${i}`).style.display='block');markLabDone(chId,i);}
  else setTimeout(()=>{_ostate[key]=[];const zone=document.getElementById(`orderseq-${chId}-${i}`);if(zone)zone.innerHTML='';document.getElementById(`orderpool-${chId}-${i}`)?.querySelectorAll('.order-item').forEach(b=>{b.classList.remove('order-selected');b.disabled=false;});if(fb){fb.textContent='';fb.className='order-feedback';}},1300);
}

function renderMChoice(chId, i, ex, Lc, T, total) {
  return `<div class="lab-card" id="labcard-${chId}-${i}">
    <div class="lab-card-hdr"><span class="lab-type-badge">${T.mchoice}</span><span class="lab-card-num">${i+1}/${total}</span></div>
    <div class="lab-card-q">${ex.q}</div>
    <div class="mch-opts">
      ${ex.options.map((opt,oi)=>`
        <button class="mch-opt" id="mchopt-${chId}-${i}-${oi}" onclick="mchoicePick(${chId},${i},${oi})">
          <span class="mch-letter">${Lc.optLetters[oi]}</span><span class="mch-text">${opt.text}</span>
        </button>
        <div class="mch-feedback" id="mchfb-${chId}-${i}-${oi}" style="display:none">${opt.feedback||''}</div>`).join('')}
    </div>
    <div class="lab-explain-box" id="labexp-${chId}-${i}" style="display:none"><strong>${Lc.labExplain}</strong> ${ex.explain||''}</div>
  </div>`;
}
function mchoicePick(chId, i, oi) {
  const ex=getL(chId)[i];
  ex.options.forEach((_,idx)=>{const b=document.getElementById(`mchopt-${chId}-${i}-${idx}`);if(b)b.disabled=true;});
  const opt=ex.options[oi];
  document.getElementById(`mchfb-${chId}-${i}-${oi}`)?.style&&(document.getElementById(`mchfb-${chId}-${i}-${oi}`).style.display='block');
  document.getElementById(`mchopt-${chId}-${i}-${oi}`)?.classList.add(opt.correct?'mch-correct':'mch-wrong');
  if(!opt.correct) ex.options.forEach((o,idx)=>{if(o.correct){document.getElementById(`mchopt-${chId}-${i}-${idx}`)?.classList.add('mch-correct');document.getElementById(`mchfb-${chId}-${i}-${idx}`)?.style&&(document.getElementById(`mchfb-${chId}-${i}-${idx}`).style.display='block');}});
  document.getElementById(`labexp-${chId}-${i}`)?.style&&(document.getElementById(`labexp-${chId}-${i}`).style.display='block');
  if(opt.correct) markLabDone(chId,i);
}

const _labDone={};
function markLabDone(chId,i){
  if(!_labDone[chId]) _labDone[chId]=new Set();
  if(_labDone[chId].has(i)) return;
  _labDone[chId].add(i);
  addXP(15);
  document.getElementById(`labcard-${chId}-${i}`)?.classList.add('lab-card-done');
  const total=getL(chId).length;
  const done=_labDone[chId].size;
  const fill=document.getElementById(`lab-prog-fill-${chId}`);
  if(fill) fill.style.width=Math.round(done/total*100)+'%';
  const label=document.getElementById(`lab-prog-label-${chId}`);
  const Lc=L();
  const T=currentLang==='he'?{complete:'הושלמו',allDone:'כל התרגילים הושלמו!'}:{complete:'completed',allDone:'All exercises done!'};
  if(label) label.textContent=`${done}/${total} ${T.complete}`;
  if(done===total){const banner=document.getElementById(`lab-done-${chId}`);if(banner)banner.style.display='flex';const txt=document.getElementById(`lab-done-txt-${chId}`);if(txt)txt.textContent=T.allDone+' +'+total*15+' XP';}
}

// ===== STATE =====
const state = {cur:0, tabs:{}, quiz:{}, game:{}, xp:0, stars:{}};
let currentLang = 'he';
let gameTimer = null;
const TOTAL_CHAPTERS = 8;

// ===== HELPERS =====
function L() { return currentLang==='he' ? C.he : C.en; }

function getQ(i) {
  const key = currentLang+'-'+i;
  if (!_sqCache[key]) {
    const raw = (currentLang==='en' ? (QUIZZES_EN[i]||QUIZZES[i]) : QUIZZES[i]) || QUIZZES[0];
    _sqCache[key] = raw.map(q => shuffleOptions(q));
  }
  return _sqCache[key];
}
function getL(i) { return (currentLang==='en' ? (ILABS_EN[i]||ILABS[i]) : ILABS[i]) || ILABS[0]; }
function getG(i) {
  const key = currentLang+'-g-'+i;
  if (!_sgCache[key]) {
    const raw = (currentLang==='en' ? (GAME_QS_EN[i]||GAME_QS[i]) : GAME_QS[i]) || GAME_QS[0];
    _sgCache[key] = raw.map(q => shuffleOptions(q));
  }
  return _sgCache[key];
}
const _sqCache = {}, _sgCache = {};

// ===== NORMALIZE + SHUFFLE (length bias fix) =====
function normalizeOptions(q) {
  const lens = q.o.map(o => o.length);
  const wrongLens = lens.filter((_, i) => i !== q.a);
  const maxWrong = Math.max(...wrongLens);
  const cap = maxWrong;
  const newOpts = q.o.map(o => {
    if (o.length <= cap) return o;
    let t = o.slice(0, cap);
    const ls = t.lastIndexOf(' ');
    if (ls > cap * 0.5) t = t.slice(0, ls);
    return t;
  });
  return { ...q, o: newOpts };
}
function shuffleOptions(q) {
  const norm = normalizeOptions(q);
  const idx = [0,1,2,3];
  for (let i = idx.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [idx[i],idx[j]] = [idx[j],idx[i]];
  }
  return { ...norm, o: idx.map(i=>norm.o[i]), a: idx.indexOf(norm.a) };
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  applyLang('he');
  showChapter(0);
});

// ===== LANG =====
function toggleLang() { currentLang = currentLang==='he'?'en':'he'; applyLang(currentLang); }

function applyLang(lang) {
  currentLang = lang;
  const Lc = L();
  document.documentElement.setAttribute('lang', lang==='he'?'he':'en');
  document.documentElement.setAttribute('dir', Lc.dir);
  document.getElementById('langBtn').textContent = Lc.langBtn;
  document.getElementById('sbLabel').textContent = Lc.sbLabel;
  document.getElementById('headerChName').textContent = Lc.names[state.cur]||'';

  for (let i=0; i<TOTAL_CHAPTERS; i++) {
    const $=id=>document.getElementById(id);
    if($('chname-'+i))  $('chname-'+i).textContent  = Lc.names[i]||'';
    if($('chtag-'+i))   $('chtag-'+i).textContent   = Lc.tags[i]||'';
    if($('chtitle-'+i)) $('chtitle-'+i).textContent = Lc.names[i]||'';
    if($('chdesc-'+i))  $('chdesc-'+i).textContent  = Lc.descs[i]||'';
    if($('cheat-'+i))   $('cheat-'+i).innerHTML     = Lc.cheat[i]||'';

    const learnEl = $('learn-'+i);
    if (learnEl) learnEl.innerHTML = (Lc.learn[i]||'');

    const tabsEl = $('tabs-'+i);
    if (tabsEl) {
      const tabs = Lc.tabs;
      const keys = Lc.tabKeys;
      const cur = state.tabs[i]||'learn';
      tabsEl.innerHTML = tabs.map((t,ti)=>
        `<button class="tab-btn${cur===keys[ti]?' active':''}" onclick="showTab(${i},'${keys[ti]}')">${t}</button>`
      ).join('');
    }

    ['quiz','lab','game'].forEach(p => {
      const el = $(p+'-'+i);
      if(el){el.innerHTML='';delete el.dataset.rendered;}
    });
    state.quiz[i]=null;
    state.game[i]={phase:'idle'};
  }

  const t = state.tabs[state.cur]||'learn';
  if(t==='quiz'&&L().tabKeys.indexOf('quiz')>=0) renderQuiz(state.cur);
  if(t==='lab'&&L().tabKeys.indexOf('lab')>=0)  renderLab(state.cur);
  if(t==='game') renderGame(state.cur);

  // Credits bar translation
  const creditsLabels = {
    he: {
      title: '// מקורות ותודות',
      research: 'מחקר ותקנים',
      incidents: 'ניתוח אירועים',
      tech: 'תיעוד טכני',
      built: 'נבנה עם',
      version: 'גרסה 2.0 — 2025'
    },
    en: {
      title: '// Sources & Credits',
      research: 'Research & Standards',
      incidents: 'Incident Analysis',
      tech: 'Technical Docs',
      built: 'Built With',
      version: 'Version 2.0 — 2025'
    }
  };
  const cl2 = creditsLabels[lang] || creditsLabels.he;
  const setT = (id, txt) => { const el = document.getElementById(id); if(el) el.textContent = txt; };
  setT('credits-title-label', cl2.title);
  setT('credits-research', cl2.research);
  setT('credits-incidents', cl2.incidents);
  setT('credits-tech', cl2.tech);
  setT('credits-built', cl2.built);
  setT('credits-version', cl2.version);
}

// ===== NAV =====
function showChapter(n) {
  document.querySelectorAll('.chapter').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.ch-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('ch-'+n)?.classList.add('active');
  document.getElementById('nav-'+n)?.classList.add('active');
  state.cur=n;
  document.getElementById('headerChName').textContent = L().names[n]||'';
  document.getElementById('sidebar')?.classList.remove('open');
  window.scrollTo(0,0);
  activateTab(n, state.tabs[n]||'learn');
}

function toggleSidebar() { document.getElementById('sidebar')?.classList.toggle('open'); }

function showTab(chId, tabName) { state.tabs[chId]=tabName; activateTab(chId, tabName); }

function activateTab(chId, tabName) {
  const ch = document.getElementById('ch-'+chId);
  if (!ch) return;
  ch.querySelectorAll('.tab-btn').forEach(btn => {
    const m = btn.getAttribute('onclick').match(/'(\w+)'\)/);
    btn.classList.toggle('active', m && m[1]===tabName);
  });
  ch.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id===chId+'-'+tabName);
  });
  if(tabName==='quiz'&&L().tabKeys.indexOf('quiz')>=0) renderQuiz(chId);
  if(tabName==='lab'&&L().tabKeys.indexOf('lab')>=0)  renderLab(chId);
  if(tabName==='game') renderGame(chId);
}

// ===== QUIZ =====
function renderQuiz(chId) {
  const el = document.getElementById('quiz-'+chId);
  if(!el||el.dataset.rendered) return;
  el.dataset.rendered='1';
  if(!state.quiz[chId]) state.quiz[chId]={qi:0,ans:{},done:false,score:0};
  const qs=getQ(chId); const Lc=L();
  const pips = qs.map((_,i)=>`<div class="quiz-pip" id="qpip-${chId}-${i}"></div>`).join('');
  const cards = qs.map((q,i)=>`
    <div class="quiz-q-card" id="qcard-${chId}-${i}">
      <div class="quiz-meta"><span id="qmeta-${chId}-${i}"></span></div>
      <div class="quiz-q">${q.q}</div>
      <div class="quiz-opts">
        ${q.o.map((opt,oi)=>`
          <button class="quiz-opt" id="qopt-${chId}-${i}-${oi}" onclick="quizPick(${chId},${i},${oi})">
            <span class="opt-letter" id="qltr-${chId}-${i}-${oi}"></span>${opt}
          </button>`).join('')}
      </div>
      <div class="quiz-exp" id="qexp-${chId}-${i}" style="display:none">
        <strong id="qexplbl-${chId}-${i}"></strong> ${q.e||''}
      </div>
    </div>`).join('');
  el.innerHTML=`
    <div class="quiz-prog" id="qprog-${chId}">${pips}</div>
    ${cards}
    <div class="quiz-result" id="qres-${chId}">
      <div class="result-emoji" id="qemoji-${chId}">🎉</div>
      <div class="result-score" id="qscore-${chId}"></div>
      <div class="result-label" id="qlabel-${chId}"></div>
      <div class="result-stars" id="qstars-${chId}"></div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:8px">
        <button class="btn btn-ghost" id="qbtn-reset-${chId}" onclick="quizReset(${chId})"></button>
        <button class="btn btn-primary" id="qbtn-lab-${chId}" onclick="showTab(${chId},'game')"></button>
      </div>
    </div>
    <div class="quiz-nav" id="qnav-${chId}">
      <button class="btn btn-ghost" id="qprev-${chId}" onclick="quizNav(${chId},-1)"></button>
      <button class="btn btn-primary" id="qnext-${chId}" onclick="quizNav(${chId},1)"></button>
    </div>`;
  refreshQuiz(chId);
}

function refreshQuiz(chId) {
  const st=state.quiz[chId]; if(!st) return;
  const qs=getQ(chId); const Lc=L();
  qs.forEach((_,i)=>{
    const card=document.getElementById(`qcard-${chId}-${i}`);
    if(card) card.classList.toggle('active',i===st.qi);
    const pip=document.getElementById(`qpip-${chId}-${i}`);
    if(pip) pip.className='quiz-pip'+(i<st.qi||st.done?' done':i===st.qi?' cur':'');
    const meta=document.getElementById(`qmeta-${chId}-${i}`);
    if(meta) meta.textContent=`${Lc.question} ${i+1} ${Lc.of} ${qs.length}`;
    qs[i].o.forEach((_,oi)=>{
      const ltr=document.getElementById(`qltr-${chId}-${i}-${oi}`);
      if(ltr) ltr.textContent=Lc.optLetters[oi];
    });
    const explbl=document.getElementById(`qexplbl-${chId}-${i}`);
    if(explbl) explbl.textContent=Lc.quizExplain;
  });
  const prev=document.getElementById(`qprev-${chId}`);
  const next=document.getElementById(`qnext-${chId}`);
  if(document.getElementById(`qbtn-reset-${chId}`)) document.getElementById(`qbtn-reset-${chId}`).textContent=Lc.quizAgain;
  if(document.getElementById(`qbtn-lab-${chId}`)) document.getElementById(`qbtn-lab-${chId}`).textContent='🎮';
  if(prev){prev.textContent=Lc.quizPrev;prev.disabled=st.qi===0;}
  if(next){
    const ans=st.ans[st.qi]!==undefined;
    if(st.qi<qs.length-1){next.textContent=Lc.quizNext;next.disabled=!ans;next.onclick=()=>quizNav(chId,1);}
    else{next.textContent=Lc.quizSubmit;next.disabled=Object.keys(st.ans).length<qs.length;next.onclick=()=>quizSubmit(chId);}
  }
}

function quizPick(chId,qi,oi){
  const st=state.quiz[chId];if(!st||st.done)return;
  st.ans[qi]=oi;
  getQ(chId)[qi].o.forEach((_,o)=>{
    const btn=document.getElementById(`qopt-${chId}-${qi}-${o}`);
    if(btn) btn.classList.toggle('selected',o===oi);
  });
  refreshQuiz(chId);
}

function quizNav(chId,dir){
  const st=state.quiz[chId];if(!st)return;
  st.qi=Math.max(0,Math.min(getQ(chId).length-1,st.qi+dir));
  refreshQuiz(chId);
}

function quizSubmit(chId){
  const st=state.quiz[chId];if(!st)return;
  const qs=getQ(chId);const Lc=L();
  let score=0;
  qs.forEach((q,i)=>{
    const chosen=st.ans[i];const correct=q.a;
    q.o.forEach((_,oi)=>{
      const btn=document.getElementById(`qopt-${chId}-${i}-${oi}`);
      if(!btn)return;
      btn.classList.add('disabled');
      if(oi===correct)btn.classList.add('correct');
      else if(oi===chosen)btn.classList.add('wrong');
      btn.classList.remove('selected');
    });
    const exp=document.getElementById(`qexp-${chId}-${i}`);
    if(exp)exp.style.display='block';
    if(chosen===correct)score++;
  });
  st.done=true;st.score=score;
  const stars=score>=5?3:score>=4?2:score>=3?1:0;
  state.stars[chId]=Math.max(state.stars[chId]||0,stars);
  addXP(score*10);updateStars(chId);
  document.getElementById(`qnav-${chId}`).style.display='none';
  const res=document.getElementById(`qres-${chId}`);
  res.classList.add('visible');
  document.getElementById(`qscore-${chId}`).textContent=`${score}/${qs.length}`;
  const emojis=['😔','😅','🙂','😊','🎉','🏆'];
  document.getElementById(`qemoji-${chId}`).textContent=emojis[score]||'🎉';
  document.getElementById(`qlabel-${chId}`).textContent=Lc.resultLabels[score]||'';
  document.getElementById(`qstars-${chId}`).textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  qs.forEach((_,i)=>{const c=document.getElementById(`qcard-${chId}-${i}`);if(c)c.classList.add('active');});
}

function quizReset(chId){
  state.quiz[chId]=null;
  const el=document.getElementById('quiz-'+chId);
  if(el){el.innerHTML='';delete el.dataset.rendered;}
  delete _sqCache[currentLang+'-'+chId];
  renderQuiz(chId);
}

// ===== LAB =====
function renderLab(chId){
  const el=document.getElementById('lab-'+chId);
  if(!el||el.dataset.rendered)return;
  el.dataset.rendered='1';
  const exs=getL(chId);const Lc=L();
  el.innerHTML=exs.map((ex,i)=>`
    <div class="lab-ex" id="labex-${chId}-${i}">
      <div class="lab-ex-hdr" onclick="toggleLab(${chId},${i})">
        <span class="lab-num">${i+1}</span>
        <span class="lab-q">${ex.q}</span>
        <span class="lab-chevron">▼</span>
      </div>
      <div class="lab-ans-wrap">
        <div class="lab-ans-inner">
          <div class="lab-ans-pre">${ex.a}</div>
          <div class="lab-explain"><strong>${Lc.labExplain}</strong> ${ex.e||''}</div>
        </div>
      </div>
    </div>`).join('');
}

function toggleLab(chId,i){
  const el=document.getElementById(`labex-${chId}-${i}`);
  if(el){el.classList.toggle('open');if(el.classList.contains('open'))addXP(5);}
}

// ===== GAME =====
function renderGame(chId){
  const el=document.getElementById('game-'+chId);
  if(!el)return;
  if(!state.game[chId])state.game[chId]={phase:'idle'};
  const gs=state.game[chId];const Lc=L();
  if(gs.phase==='idle'){
    const gqs=getG(chId);
    el.innerHTML=`
      <div class="game-start-card">
        <div class="game-icon">🛡️</div>
        <div class="game-start-title">${Lc.gameTitle}</div>
        <p class="game-start-desc">${Lc.gameDesc}</p>
        <div class="game-rules">
          <div class="game-rule">⏱️ <span>60</span> ${Lc.gameSeconds}</div>
          <div class="game-rule">❓ <span>${gqs.length}</span> ${Lc.gameQuestions}</div>
          <div class="game-rule">🏆 <span>${Lc.gameXP}</span></div>
        </div>
        <button class="btn btn-primary" style="font-size:13px;padding:11px 32px" onclick="gameStart(${chId})">${Lc.gameStart}</button>
        ${buildLB(chId)}
      </div>`;
  } else if(gs.phase==='playing'){
    renderGamePlay(chId);
  } else {
    renderGameOver(chId);
  }
}

function gameStart(chId){
  const gqs=getG(chId);
  state.game[chId]={phase:'playing',qs:[...gqs].sort(()=>Math.random()-.5),qi:0,score:0,time:60,answered:false};
  renderGame(chId);startTimer(chId);
}

function renderGamePlay(chId){
  const el=document.getElementById('game-'+chId);
  const gs=state.game[chId];const Lc=L();
  if(!gs||gs.phase!=='playing')return;
  const q=gs.qs[gs.qi];
  if(!q){gameOver(chId);return;}
  el.innerHTML=`
    <div class="game-hud">
      <div class="hud-timer${gs.time<=10?' urgent':''}" id="gtimer-${chId}">${gs.time}</div>
      <div class="hud-qnum">${gs.qi+1}/${gs.qs.length}</div>
      <div class="hud-score">⭐ ${gs.score}</div>
    </div>
    <div class="game-q">${q.q}</div>
    <div class="game-opts">
      ${q.o.map((opt,i)=>`<button class="game-opt" id="gopt-${chId}-${i}" onclick="gameAnswer(${chId},${i})">${opt}</button>`).join('')}
    </div>
    <div class="game-fb" id="gfb-${chId}"></div>`;
}

function startTimer(chId){
  clearInterval(gameTimer);
  gameTimer=setInterval(()=>{
    const gs=state.game[chId];
    if(!gs||gs.phase!=='playing'){clearInterval(gameTimer);return;}
    gs.time--;
    const t=document.getElementById(`gtimer-${chId}`);
    if(t){t.textContent=gs.time;t.className='hud-timer'+(gs.time<=10?' urgent':'');}
    if(gs.time<=0){clearInterval(gameTimer);gameOver(chId);}
  },1000);
}

function gameAnswer(chId,chosen){
  const gs=state.game[chId];if(!gs||gs.answered)return;
  gs.answered=true;
  const q=gs.qs[gs.qi];const ok=q.a===chosen;
  document.querySelectorAll(`#game-${chId} .game-opt`).forEach(b=>b.classList.add('disabled'));
  document.getElementById(`gopt-${chId}-${chosen}`)?.classList.add(ok?'correct':'wrong');
  if(!ok)document.getElementById(`gopt-${chId}-${q.a}`)?.classList.add('correct');
  const fb=document.getElementById(`gfb-${chId}`);
  if(fb){fb.textContent=ok?'+10 ✓':'✗';fb.className='game-fb '+(ok?'ok':'bad');}
  if(ok){gs.score+=10;addXP(10);}
  setTimeout(()=>{
    gs.qi++;gs.answered=false;
    if(gs.qi>=gs.qs.length){gameOver(chId);return;}
    renderGamePlay(chId);startTimer(chId);
  },850);
}

function gameOver(chId){
  clearInterval(gameTimer);
  const gs=state.game[chId];if(!gs)return;
  gs.phase='over';const Lc=L();
  try{
    let lb=JSON.parse(localStorage.getItem(`cyber-${chId}`)||'[]');
    lb.push({name:Lc.playerName,score:gs.score,ts:Date.now()});
    lb.sort((a,b)=>b.score-a.score);lb=lb.slice(0,5);
    localStorage.setItem(`cyber-${chId}`,JSON.stringify(lb));
  }catch(e){}
  const total=gs.qs.length*10;const pct=Math.round((gs.score/total)*100);
  const medal=gs.score>=total*.8?'🏆':gs.score>=total*.5?'🥈':'🥉';
  document.getElementById('game-'+chId).innerHTML=`
    <div class="game-over-card">
      <div style="font-size:50px;margin-bottom:8px">${medal}</div>
      <div class="game-over-score">${gs.score}</div>
      <div class="game-over-title">${Lc.points} · ${pct}${Lc.pct}</div>
      ${buildLB(chId)}
      <div style="display:flex;gap:8px;justify-content:center;margin-top:16px">
        <button class="btn btn-ghost" onclick="gameRestart(${chId})">${Lc.gameAgain}</button>
        <button class="btn btn-primary" onclick="showTab(${chId},'cheat')">${Lc.gameToCheat}</button>
      </div>
    </div>`;
}

function gameRestart(chId){
  state.game[chId]={phase:'idle'};
  const el=document.getElementById('game-'+chId);
  if(el)el.innerHTML='';
  delete _sgCache[currentLang+'-g-'+chId];
  renderGame(chId);
}

function buildLB(chId){
  let lb=[];
  try{lb=JSON.parse(localStorage.getItem(`cyber-${chId}`)||'[]');}catch(e){}
  if(!lb.length)return'';
  const medals=['🥇','🥈','🥉','4','5'];
  const cls=['gold','silver','bronze','normal','normal'];
  const Lc=L();
  return`<div class="leaderboard"><div class="lb-title">${Lc.lbTitle}</div>${lb.map((e,i)=>`
    <div class="lb-row ${cls[i]}">
      <span class="lb-rank">${medals[i]}</span>
      <span class="lb-name">${e.name||Lc.unknownPlayer}</span>
      <span class="lb-pts">${e.score} ${Lc.points}</span>
    </div>`).join('')}</div>`;
}

// ===== XP & STARS =====
function addXP(n){
  state.xp+=n;
  const max=TOTAL_CHAPTERS*(5*10+4*5+8*10);
  const pct=Math.min(100,(state.xp/max)*100);
  document.getElementById('xpBar').style.width=pct+'%';
  document.getElementById('xpLabel').textContent=state.xp+' XP';
}

function updateStars(chId){
  const el=document.getElementById('stars-'+chId);
  if(!el)return;
  const s=state.stars[chId]||0;
  el.textContent='⭐'.repeat(s)+'☆'.repeat(3-s);
}
