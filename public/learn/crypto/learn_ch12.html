<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crypto Forensics & Blockchain Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d1117;
  --bg2:      #161b22;
  --bg3:      #1c2128;
  --border:   #30363d;
  --ink:      #e6edf3;
  --ink2:     #8b949e;
  --ink3:     #6e7681;
  --ac:       #39d353;
  --ac2:      #58a6ff;
  --ac3:      #f78166;
  --ac4:      #e3b341;
  --red:      #f85149;
  --surface:  #21262d;
  --code-bg:  #161b22;
  --f-body:   'Space Grotesk', sans-serif;
  --f-mono:   'JetBrains Mono', monospace;
  --nav-h:    52px;
  --sb-w:     240px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--f-body);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.65}
a{color:var(--ac2);text-decoration:none}
code{font-family:var(--f-mono);font-size:.85em;background:var(--bg3);padding:2px 6px;border-radius:4px;color:var(--ac)}
/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0;z-index:100;padding:0 16px}
.nav-logo{font-family:var(--f-mono);font-weight:700;font-size:1.05rem;color:var(--ac);letter-spacing:-.02em;margin-inline-end:auto;cursor:pointer}
.nav-logo span{color:var(--ink2)}
.nav-tab{background:none;border:none;color:var(--ink2);font-family:var(--f-body);font-size:.85rem;font-weight:500;padding:6px 14px;cursor:pointer;border-radius:6px;transition:all .15s}
.nav-tab:hover{color:var(--ink);background:var(--bg3)}
.nav-tab.on{color:var(--ac);background:rgba(57,211,83,.1)}
.nav-right{display:flex;align-items:center;gap:8px;margin-inline-start:12px}
.lang-btn{font-family:var(--f-mono);font-size:.78rem;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--ink2);cursor:pointer;transition:all .15s}
.lang-btn:hover{border-color:var(--ac);color:var(--ac)}
.xp-badge{font-family:var(--f-mono);font-size:.78rem;color:var(--ac4);background:rgba(227,179,65,.12);border:1px solid rgba(227,179,65,.3);padding:3px 10px;border-radius:20px}
/* ── READ BAR ── */
.read-bar{position:fixed;top:var(--nav-h);left:0;right:0;height:3px;background:var(--border);z-index:99}
.read-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));width:0;transition:width .1s}
/* ── SCREENS ── */
.screen{display:none;padding-top:var(--nav-h)}
.screen.active{display:block}
/* ── LANDING ── */
.hero{min-height:calc(100vh - var(--nav-h));display:grid;grid-template-columns:1fr 1fr;gap:40px;padding:60px 80px;align-items:center;max-width:1280px;margin:0 auto}
.hero-tag{font-family:var(--f-mono);font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--ac);margin-bottom:16px}
.hero-h{font-size:3.2rem;font-weight:700;line-height:1.1;margin-bottom:20px}
.hero-h i{color:var(--ac);font-style:normal}
.hero-p{color:var(--ink2);font-size:1.05rem;margin-bottom:32px;line-height:1.7}
.hero-stats{display:flex;gap:32px;margin-bottom:40px}
.hs{text-align:center}
.hs-n{font-family:var(--f-mono);font-size:2rem;font-weight:700;color:var(--ac)}
.hs-l{font-size:.72rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.hero-btn{font-family:var(--f-body);font-size:1rem;font-weight:600;padding:13px 32px;border-radius:8px;border:none;background:var(--ac);color:#0d1117;cursor:pointer;transition:all .2s;letter-spacing:-.01em}
.hero-btn:hover{background:#46e564;transform:translateY(-1px);box-shadow:0 8px 24px rgba(57,211,83,.3)}
.land-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.land-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px 16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.land-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,#39d353)}
.land-card:hover{border-color:var(--cc,#39d353);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.lc-icon{font-size:1.5rem;display:block;margin-bottom:8px}
.lc-n{font-family:var(--f-mono);font-size:.65rem;color:var(--ink3);letter-spacing:.12em;margin-bottom:4px}
.lc-name{font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.lc-desc{font-size:.75rem;color:var(--ink3);line-height:1.4}
/* ── LEARN ── */
.learn-layout{display:grid;grid-template-columns:var(--sb-w) 1fr;min-height:calc(100vh - var(--nav-h))}
.sidebar{background:var(--bg2);border-inline-end:1px solid var(--border);padding:16px 0;position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow-y:auto}
.sb-title{font-family:var(--f-mono);font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding:0 16px 10px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sb-ch{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:start;color:var(--ink2);font-size:.82rem;font-family:var(--f-body)}
.sb-ch:hover{background:var(--bg3);color:var(--ink)}
.sb-ch.active{background:rgba(57,211,83,.08);color:var(--ac)}
.sb-ch-icon{font-size:.9rem;flex-shrink:0}
.sb-ch-n{font-family:var(--f-mono);font-size:.65rem;color:var(--ink3);margin-inline-end:2px}
.sb-secs{padding:0 16px 8px;border-bottom:1px solid var(--border);display:none}
.sb-secs.open{display:block}
.sb-sec{font-size:.75rem;color:var(--ink3);padding:3px 0 3px 12px;border-inline-start:2px solid var(--border);cursor:pointer}
.sb-sec:hover{color:var(--ink2)}
.learn-content{padding:40px 56px;max-width:860px}
.ch-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.ch-nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--ink2);font-family:var(--f-body);font-size:.82rem;padding:6px 16px;border-radius:6px;cursor:pointer;transition:all .15s}
.ch-nav-btn:hover{border-color:var(--ac2);color:var(--ac2)}
.ch-nav-cur{font-size:1rem;font-weight:600;color:var(--ink)}
.ch-nav-bottom{margin-top:40px;padding-top:16px;border-top:1px solid var(--border);margin-bottom:0}
/* ── LEARN SECTION ── */
.learn-section{padding:28px 0 22px;border-bottom:1px solid var(--border)}
.learn-section:last-child{border-bottom:none}
.sec-label{display:inline-block;font-family:var(--f-mono);font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ac3);margin-bottom:10px}
.sec-h{font-size:1.4rem;font-weight:700;color:var(--ink);margin-bottom:14px;line-height:1.3}
.learn-section p{color:var(--ink2);margin-bottom:12px;line-height:1.75}
.learn-section strong{color:var(--ink)}
/* ── CODE BLOCKS ── */
.code-block{background:var(--code-bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:16px 0}
.code-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--border)}
.dot{width:10px;height:10px;border-radius:50%}
.dot.r{background:#f85149}.dot.y{background:#e3b341}.dot.g{background:#39d353}
.code-title{font-family:var(--f-mono);font-size:.72rem;color:var(--ink3);margin-inline-start:6px}
pre.code-body{padding:14px 16px;font-family:var(--f-mono);font-size:.82rem;line-height:1.85;color:#adbac7;direction:ltr;text-align:left;overflow-x:auto;white-space:pre}
/* ── TABLES ── */
.tbl{width:100%;border-collapse:collapse;margin:14px 0;font-size:.85rem}
.tbl th{background:var(--bg3);color:var(--ink);font-weight:600;padding:9px 14px;border:1px solid var(--border);text-align:start}
.tbl td{padding:8px 14px;border:1px solid var(--border);color:var(--ink2);vertical-align:top}
.tbl tr:nth-child(even) td{background:rgba(255,255,255,.02)}
/* ── CALLOUTS ── */
.callout{border-radius:0 8px 8px 0;padding:11px 15px;margin:14px 0;font-size:.875rem;line-height:1.6;border-inline-start:3px solid}
.callout.tip{background:rgba(57,211,83,.07);border-color:var(--ac);color:#b1e8b1}
.callout.note{background:rgba(88,166,255,.07);border-color:var(--ac2);color:#9ecfff}
.callout.warn{background:rgba(248,81,73,.07);border-color:var(--red);color:#ffada9}
.callout strong{color:var(--ink)}
/* ── LAB ── */
.lab-layout{display:grid;grid-template-columns:var(--sb-w) 1fr;min-height:calc(100vh - var(--nav-h))}
.lab-sb{background:var(--bg2);border-inline-end:1px solid var(--border);padding:16px 0;position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow-y:auto}
.lab-sb-title{font-family:var(--f-mono);font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding:0 16px 10px;border-bottom:1px solid var(--border);margin-bottom:8px}
.lab-ch-btn{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:start;color:var(--ink2);font-size:.82rem;font-family:var(--f-body)}
.lab-ch-btn:hover{background:var(--bg3);color:var(--ink)}
.lab-ch-btn.active{background:rgba(57,211,83,.08);color:var(--ac)}
.lab-ch-badge{font-family:var(--f-mono);font-size:.65rem;color:var(--ink3);background:var(--bg3);padding:2px 7px;border-radius:10px}
.lab-content{padding:48px 56px;max-width:760px}
.lab-welcome{text-align:center;padding:80px 40px}
.lab-welcome-icon{font-size:3.5rem;margin-bottom:20px}
.lab-welcome-h{font-size:1.8rem;font-weight:700;margin-bottom:12px}
.lab-welcome-p{color:var(--ink2);margin-bottom:32px}
.lab-ch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:520px;margin:0 auto}
.lab-ch-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .15s;text-align:center}
.lab-ch-card:hover{border-color:var(--ac);transform:translateY(-1px)}
.lcc-icon{font-size:1.3rem;margin-bottom:4px}
.lcc-n{font-family:var(--f-mono);font-size:.65rem;color:var(--ink3)}
/* ── LAB MCQ ── */
.lq-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.lq-ch-icon{font-size:1.6rem}
.lq-ch-name{font-size:.95rem;font-weight:600}
.lq-ch-num{font-family:var(--f-mono);font-size:.7rem;color:var(--ink3)}
.lq-spacer{flex:1}
.lq-scorebox{text-align:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 16px}
.lq-sv{font-family:var(--f-mono);font-size:1rem;font-weight:700;color:var(--ac)}
.lq-sl{font-size:.68rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em}
.lq-pips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:24px}
.lq-pip{width:8px;height:8px;border-radius:2px;background:var(--border);transition:background .2s}
.lq-pip.cur{background:var(--ac2)}
.lq-pip.ok{background:var(--ac)}
.lq-pip.bad{background:var(--red)}
.lq-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px}
.lq-meta{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.lq-num{font-family:var(--f-mono);font-size:.72rem;color:var(--ink3)}
.lq-cat{font-family:var(--f-mono);font-size:.68rem;background:rgba(88,166,255,.12);color:var(--ac2);padding:2px 9px;border-radius:10px}
.lq-q{font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:20px;line-height:1.5}
.lq-opts{display:flex;flex-direction:column;gap:9px}
.lq-opt{display:flex;align-items:center;gap:12px;padding:11px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);cursor:pointer;transition:all .15s;text-align:start}
.lq-opt:hover:not(:disabled){border-color:var(--ac2);background:rgba(88,166,255,.06)}
.lq-opt:disabled{cursor:default}
.lq-opt.correct{border-color:var(--ac)!important;background:rgba(57,211,83,.1)!important}
.lq-opt.wrong{border-color:var(--red)!important;background:rgba(248,81,73,.08)!important}
.lq-lbl{font-family:var(--f-mono);font-size:.78rem;font-weight:700;width:22px;color:var(--ink3);flex-shrink:0}
.lq-txt{flex:1;font-size:.9rem;color:var(--ink2)}
.lq-ic{font-size:.9rem;margin-inline-start:auto}
.lq-exp{margin-top:16px;display:none}
.lq-exp.show{display:block}
.lq-exp-lbl{font-family:var(--f-mono);font-size:.72rem;font-weight:700;margin-bottom:8px}
.lq-exp-lbl.ok{color:var(--ac)}.lq-exp-lbl.bad{color:var(--red)}
.lq-exp-txt{font-size:.88rem;color:var(--ink2);line-height:1.65;background:var(--bg3);border-radius:8px;padding:12px 14px}
.lq-foot{display:flex;justify-content:space-between;align-items:center}
.lq-btn{background:var(--bg3);border:1px solid var(--border);color:var(--ink2);font-family:var(--f-body);font-size:.85rem;padding:8px 20px;border-radius:7px;cursor:pointer;transition:all .15s}
.lq-btn:hover{border-color:var(--ac2);color:var(--ac2)}
.lq-btn.next{background:var(--ac);color:#0d1117;border-color:var(--ac);font-weight:600}
.lq-btn.next:hover{background:#46e564}
.lq-btn.next:disabled{background:var(--bg3);color:var(--ink3);border-color:var(--border);cursor:default}
/* ── LAB RESULT ── */
.lq-result{text-align:center;padding:48px 24px}
.lqr-ring{position:relative;width:120px;height:120px;margin:0 auto 24px}
.lqr-svg{width:120px;height:120px;transform:rotate(-90deg)}
.lqr-bg{fill:none;stroke:var(--border);stroke-width:10}
.lqr-arc{fill:none;stroke:var(--ac);stroke-width:10;stroke-linecap:round;stroke-dasharray:314;stroke-dashoffset:314;transition:stroke-dashoffset 1s ease}
.lqr-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--f-mono);font-size:1.4rem;font-weight:700}
.lqr-title{font-size:1.6rem;font-weight:700;margin-bottom:8px}
.lqr-stats{display:flex;gap:16px;justify-content:center;margin:20px 0 32px;flex-wrap:wrap}
.lqrs{text-align:center;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 20px;min-width:80px}
.lqrs-v{font-family:var(--f-mono);font-size:1.2rem;font-weight:700;color:var(--ac)}
.lqrs-l{font-size:.7rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.lqr-btns{display:flex;gap:12px;justify-content:center}
.lqr-btn{padding:10px 24px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);color:var(--ink2);font-family:var(--f-body);font-size:.9rem;font-weight:500;cursor:pointer;transition:all .15s}
.lqr-btn:hover{border-color:var(--ac2);color:var(--ac2)}
.lqr-btn.primary{background:var(--ac);color:#0d1117;border-color:var(--ac);font-weight:600}
.lqr-btn.primary:hover{background:#46e564}
/* ── QUIZ ── */
.quiz-layout{height:calc(100vh - var(--nav-h));display:flex;flex-direction:column}
.quiz-home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
.quiz-home-icon{font-size:3rem;margin-bottom:16px}
.quiz-home-h{font-size:2rem;font-weight:700;margin-bottom:8px}
.quiz-home-p{color:var(--ink2);margin-bottom:32px}
.quiz-home-modes{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.qz-mode-btn{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:20px 28px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:110px}
.qz-mode-btn:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 8px 20px rgba(57,211,83,.15)}
.qz-mode-icon{font-size:1.5rem}
.qz-mode-n{font-family:var(--f-mono);font-size:1.6rem;font-weight:700;color:var(--ac)}
.qz-mode-l{font-size:.8rem;color:var(--ink2)}
.quiz-best{font-family:var(--f-mono);font-size:.8rem;color:var(--ink3)}
.quiz-game{flex:1;display:flex;flex-direction:column;overflow:hidden}
.quiz-hud{display:flex;align-items:center;padding:14px 24px;background:var(--bg2);border-bottom:1px solid var(--border);gap:16px}
.qz-hud-left,.qz-hud-right{display:flex;gap:20px;align-items:center}
.qz-hud-right{margin-inline-start:auto}
.qz-stat{text-align:center}
.qz-stat-v{font-family:var(--f-mono);font-size:1.1rem;font-weight:700;display:block;color:var(--ink)}
.qz-stat-l{font-size:.65rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em}
.qz-timer-wrap{position:relative;width:44px;height:44px;margin:0 auto}
.qz-timer-svg{width:44px;height:44px;transform:rotate(-90deg)}
.qz-timer-bg{fill:none;stroke:var(--border);stroke-width:5}
.qz-timer-arc{fill:none;stroke:var(--ac);stroke-width:5;stroke-linecap:round;stroke-dasharray:113;stroke-dashoffset:0;transition:stroke-dashoffset .9s linear,stroke .3s}
.qz-timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--f-mono);font-size:.8rem;font-weight:700}
.qz-quit-btn{background:none;border:1px solid var(--border);color:var(--ink3);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.8rem;transition:all .15s}
.qz-quit-btn:hover{border-color:var(--red);color:var(--red)}
.quiz-q-area{flex:1;overflow-y:auto;padding:32px 24px;max-width:720px;margin:0 auto;width:100%}
.qz-cat{font-family:var(--f-mono);font-size:.7rem;background:rgba(88,166,255,.1);color:var(--ac2);padding:3px 10px;border-radius:10px;display:inline-block;margin-bottom:14px}
.qz-q{font-size:1.1rem;font-weight:600;color:var(--ink);margin-bottom:20px;line-height:1.5}
.qz-snip{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:var(--f-mono);font-size:.8rem;line-height:1.8;color:#adbac7;direction:ltr;text-align:left;margin-bottom:14px;overflow-x:auto}
.qz-opts{display:flex;flex-direction:column;gap:8px}
.qz-opt{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .15s;text-align:start}
.qz-opt:hover:not(:disabled){border-color:var(--ac2);background:rgba(88,166,255,.06)}
.qz-opt.correct{border-color:var(--ac)!important;background:rgba(57,211,83,.1)!important}
.qz-opt.wrong{border-color:var(--red)!important;background:rgba(248,81,73,.08)!important}
.qz-opt-lbl{font-family:var(--f-mono);font-size:.75rem;font-weight:700;color:var(--ink3);width:20px;flex-shrink:0}
.qz-opt-txt{flex:1;font-size:.9rem;color:var(--ink2)}
.qz-feedback{margin-top:16px;padding:12px 16px;border-radius:8px;font-size:.88rem;display:none}
.qz-feedback.show{display:block}
.qz-feedback.good{background:rgba(57,211,83,.08);border:1px solid rgba(57,211,83,.3);color:#b1e8b1}
.qz-feedback.bad{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.3);color:#ffada9}
.quiz-result{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
.qzr-ring{position:relative;width:130px;height:130px;margin:0 auto 24px}
.qzr-svg{width:130px;height:130px;transform:rotate(-90deg)}
.qzr-bg{fill:none;stroke:var(--border);stroke-width:10}
.qzr-arc{fill:none;stroke:var(--ac);stroke-width:10;stroke-linecap:round;stroke-dasharray:340;stroke-dashoffset:340;transition:stroke-dashoffset 1s ease}

/* ── XP SYNC WITH PARENT APP ── */
function syncXPDisplay() {
  var el = document.getElementById('xpTotal');
  if (el) el.textContent = XP;
}
window.addEventListener('message', function(e) {
  if (!e.data) return;
  /* App sends current XP state */
  if (e.data.type === 'ng_xp_sync' || e.data.ng === 'xp_sync') {
    var appXP = parseInt(e.data.xp) || 0;
    if (appXP > XP) { XP = appXP; syncXPDisplay(); }
  }
  /* App sends XP increment (from other sources) */
  if (e.data.type === 'ng_xp_add') {
    XP += parseInt(e.data.amount) || 0;
    syncXPDisplay();
  }
});
/* Request initial XP from parent app on load */
try { parent.postMessage({ type: 'ng_xp_request' }, '*'); } catch(e) {}

/* ── LOAD CHAPTER ── */
function loadCh(n) {
  CUR_CH = n;
  try{parent.postMessage({type:'ng_xp',amount:5},'*')}catch(e){}
  var isHe  = LANG === 'he';
  var ch    = CHAPTERS.find(function(c){ return c.n === n; });
  var data  = isHe ? ch.he : ch.en;
  var total = CHAPTERS.length;

  // update sidebar active state
  document.querySelectorAll('.sb-ch').forEach(function(b){ b.classList.remove('active'); });
  var btns = document.querySelectorAll('.sb-ch');
  if (btns[n-1]) btns[n-1].classList.add('active');

  // prev/next labels
  var prevL = n > 0     ? (isHe ? '→ פרק ' + (n-1) : '← Ch '+(n-1)) : null;
  var nextL = n < total ? (isHe ? 'פרק '+(n+1)+' ←' : 'Ch '+(n+1)+' →') : null;

  var navTop = '<div class="ch-nav">' +
    (prevL ? '<button class="ch-nav-btn" onclick="loadCh('+(n-1)+')">' + prevL + '</button>' : '<span></span>') +
    '<span class="ch-nav-cur">' + ch.icon + ' ' + data.name + '</span>' +
    (nextL ? '<button class="ch-nav-btn" onclick="loadCh('+(n+1)+')">' + nextL + '</button>' : '<span></span>') +
    '</div>';

  var navBottom = '<div class="ch-nav ch-nav-bottom">' +
    (prevL ? '<button class="ch-nav-btn" onclick="loadCh('+(n-1)+')">' + prevL + '</button>' : '<span></span>') +
    '<span class="ch-nav-cur">' + (isHe ? 'פרק ' + n : 'Ch ' + n) + '</span>' +
    (nextL ? '<button class="ch-nav-btn" onclick="loadCh('+(n+1)+')">' + nextL + '</button>' : '<span></span>') +
    '</div>';

  var content = document.getElementById('learnContent');
  content.innerHTML = navTop + data.content() + navBottom;
  content.scrollTop = 0;

  // read progress
  content.onscroll = function() {
    var fill = document.getElementById('readFill');
    if (fill) {
      var pct = content.scrollTop / (content.scrollHeight - content.clientHeight) * 100;
      fill.style.width = Math.min(pct, 100) + '%';
    }
  };

  goTo('learn');
}

  LAB.ans = [];

  document.getElementById('labWelcome').style.display = 'none';
  var area = document.getElementById('lqArea');
  area.style.display = 'block';

  // update sidebar active
  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('active'); });
  var btns = document.querySelectorAll('.lab-ch-btn');
  if (btns[n-1]) btns[n-1].classList.add('active');

  renderLabQ();
}

function renderLabQ() {
  var area  = document.getElementById('lqArea');
  var isHe  = LANG === 'he';
  var ch    = CHAPTERS.find(function(c){ return c.n === LAB.ch; });
  var total = LAB.questions.length;
  var cur   = LAB.cur;

  if (cur >= total) { showLabResult(); return; }

  var q   = LAB.questions[cur];
  var LBL = isHe ? ['א','ב','ג','ד'] : ['A','B','C','D'];

  // shuffle answers
  var idx = [0,1,2,3];
  for (var i = idx.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp=idx[i]; idx[i]=idx[j]; idx[j]=tmp;
  }
  var newC  = idx.indexOf(q.c);
  var qText = isHe ? q.q : (q.q_en || q.q);
  var aList = isHe ? q.a : (q.a_en || q.a);
  var cat   = isHe ? q.cat : (q.cat_en || q.cat);
  var expl  = isHe ? q.e : (q.e_en || q.e);

  // pips
  var pips = '';
  for (var p=0;p<total;p++) {
    var cls = p===cur?'cur':p<cur?(LAB.ans[p]===1?'ok':'bad'):'';
    pips += '<div class="lq-pip '+cls+'"></div>';
  }

  var opts = '';
  idx.forEach(function(origIdx, di) {
    opts += '<button class="lq-opt" onclick="onLabPick(this,'+di+','+newC+','+origIdx+')">' +
      '<span class="lq-lbl">'+LBL[di]+'</span>' +
      '<span class="lq-txt">'+(aList[origIdx]||'')+'</span>' +
      '<span class="lq-ic"></span>' +
    '</button>';
  });

  var ok_cnt   = LAB.ans.filter(function(x){return x===1;}).length;
  var scoreL   = isHe ? 'נכון' : 'correct';
  var restartL = isHe ? '↺ התחל מחדש' : '↺ Restart';
  var nextL    = isHe ? 'הבא ←' : 'Next →';

  area.innerHTML =
    '<div class="lq-header">' +
      '<div class="lq-ch-icon">' + ch.icon + '</div>' +
      '<div><div class="lq-ch-name">' + (isHe?ch.he.name:ch.en.name) + '</div>' +
      '<div class="lq-ch-num">' + (cur+1) + ' / ' + total + '</div></div>' +
      '<div class="lq-spacer"></div>' +
      '<div class="lq-scorebox"><div class="lq-sv">' + ok_cnt + '</div><div class="lq-sl">' + scoreL + '</div></div>' +
    '</div>' +
    '<div class="lq-pips">' + pips + '</div>' +
    '<div class="lq-card">' +
      '<div class="lq-meta"><span class="lq-num">' + (cur+1) + '/' + total + '</span><span class="lq-cat">' + cat + '</span></div>' +
      '<div class="lq-q">' + qText + '</div>' +
      (q.snip ? '<pre class="qz-snip">'+q.snip+'</pre>' : '') +
      '<div class="lq-opts">' + opts + '</div>' +
      '<div class="lq-exp" id="lqExp"><div class="lq-exp-lbl" id="lqExpLbl"></div><div class="lq-exp-txt">' + expl + '</div></div>' +
    '</div>' +
    '<div class="lq-foot">' +
      '<button class="lq-btn" onclick="startLab(' + LAB.ch + ')">' + restartL + '</button>' +
      '<button class="lq-btn next" id="lqNext" onclick="lqAdvance()" disabled>' + nextL + '</button>' +
    '</div>';
}

function onLabPick(btn, di, correctDi, origIdx) {
  var isHe = LANG === 'he';
  var ok   = di === correctDi;
  LAB.ans[LAB.cur] = ok ? 1 : 0;

  document.querySelectorAll('.lq-opt').forEach(function(b){ b.disabled = true; });
  btn.classList.add(ok ? 'correct' : 'wrong');
  btn.querySelector('.lq-ic').textContent = ok ? '✓' : '✗';

  var correctBtn = document.querySelectorAll('.lq-opt')[correctDi];
  if (!ok && correctBtn) correctBtn.classList.add('correct');

  var lbl = document.getElementById('lqExpLbl');
  if (lbl) {
    lbl.textContent = ok ? (isHe ? '✓ נכון!' : '✓ Correct!') : (isHe ? '✗ לא נכון' : '✗ Wrong');
    lbl.className   = 'lq-exp-lbl ' + (ok ? 'ok' : 'bad');
  }
  var exp = document.getElementById('lqExp');
  if (exp) exp.classList.add('show');

  var next = document.getElementById('lqNext');
  if (next) next.disabled = false;

  if (ok) { XP += 10; var xpEl=document.getElementById('xpTotal'); if(xpEl) xpEl.textContent=XP; try{parent.postMessage({type:'ng_xp',amount:15},'*')}catch(e){} }
}

  snipEl.innerHTML = q.snip ? '<pre class="qz-snip">'+q.snip+'</pre>' : '';

  var opts = '';
  idx.forEach(function(origIdx, di) {
    opts += '<button class="qz-opt" onclick="onQuizPick(this,'+di+','+newC+','+origIdx+')">' +
      '<span class="qz-opt-lbl">'+LBL[di]+'</span>' +
      '<span class="qz-opt-txt">'+(aList[origIdx]||'')+'</span>' +
    '</button>';
  });
  document.getElementById('qzOpts').innerHTML = opts;
  document.getElementById('qzFeedback').className = 'qz-feedback';
  document.getElementById('qzFeedback').innerHTML = '';

  startTimer();
}

function startTimer() {
  clearInterval(QUIZ.timer);
  QUIZ.timerSec = TIMER_MAX;
  var arc = document.getElementById('qzArc');
  var circ = 2*Math.PI*18;
  if (arc) { arc.style.stroke = 'var(--ac)'; arc.style.strokeDashoffset = '0'; }
  document.getElementById('qzTimerNum').textContent = TIMER_MAX;

  QUIZ.timer = setInterval(function() {
    QUIZ.timerSec--;
    document.getElementById('qzTimerNum').textContent = QUIZ.timerSec;
    if (arc) {
      var pct = QUIZ.timerSec / TIMER_MAX;
      arc.style.strokeDashoffset = circ*(1-pct);
      arc.style.stroke = QUIZ.timerSec <= 5 ? 'var(--red)' : QUIZ.timerSec <= 9 ? 'var(--ac4)' : 'var(--ac)';
    }
    if (QUIZ.timerSec <= 0) { clearInterval(QUIZ.timer); onTimeout(); }
  }, 1000);
}

function onQuizPick(btn, di, correctDi, origIdx) {
  clearInterval(QUIZ.timer);
  var isHe = LANG === 'he';
  var ok   = di === correctDi;
  var pts  = ok ? Math.max(10, QUIZ.timerSec * 10) : 0;
  QUIZ.times.push(TIMER_MAX - QUIZ.timerSec);

  document.querySelectorAll('.qz-opt').forEach(function(b){ b.disabled=true; });
  btn.classList.add(ok ? 'correct' : 'wrong');
  var correctBtn = document.querySelectorAll('.qz-opt')[correctDi];
  if (!ok && correctBtn) correctBtn.classList.add('correct');

  if (ok) {
    QUIZ.score   += pts;
    QUIZ.streak++;
    QUIZ.correct++;
    QUIZ.maxStreak = Math.max(QUIZ.maxStreak, QUIZ.streak);
    XP += 15;
    var xpEl=document.getElementById('xpTotal'); if(xpEl) xpEl.textContent=XP;
    try{parent.postMessage({type:'ng_xp',amount:15},'*')}catch(e){}
  } else {
    QUIZ.streak = 0;
  }
  document.getElementById('qzScore').textContent  = QUIZ.score;
  document.getElementById('qzStreak').textContent = QUIZ.streak;

  var q    = QUIZ.questions[QUIZ.cur];
  var expl = isHe ? q.e : (q.e_en || q.e);
  var fb   = document.getElementById('qzFeedback');
  var isLast = QUIZ.cur + 1 >= QUIZ.total;
  var nextLbl= isLast ? (isHe?'תוצאה 🏆':'Results 🏆') : (isHe?'הבאה ←':'Next →');

  fb.className = 'qz-feedback show ' + (ok?'good':'bad');
  fb.innerHTML = (ok
    ? '<strong>✓ ' + (isHe?'נכון!':'Correct!') + '</strong>' + (pts>10?' <span class="qz-pts">+'+pts+'</span>':'')
    : '<strong>✗ ' + (isHe?'לא נכון':'Wrong') + '</strong>') +
    '<br><small>' + expl + '</small>' +
    '<br><br><button class="lq-btn next" onclick="nextQuizQ()">' + nextLbl + '</button>';
}

function onTimeout() {
  var isHe = LANG === 'he';
  QUIZ.streak = 0;
  document.querySelectorAll('.qz-opt').forEach(function(b){ b.disabled=true; });
  var isLast = QUIZ.cur + 1 >= QUIZ.total;
  var nextLbl= isLast ? (isHe?'תוצאה 🏆':'Results 🏆') : (isHe?'הבאה ←':'Next →');
  var fb = document.getElementById('qzFeedback');
  fb.className = 'qz-feedback show bad';
  fb.innerHTML = '<strong>⏰ ' + (isHe?'הזמן נגמר!':'Time\'s up!') + '</strong>' +
    '<br><br><button class="lq-btn next" onclick="nextQuizQ()">' + nextLbl + '</button>';
}

function nextQuizQ() {
  QUIZ.cur++;
  if (QUIZ.cur >= QUIZ.total) { showQuizResult(); return; }
  renderQuizQ();
}

function showQuizResult() {
  clearInterval(QUIZ.timer);
  var isHe = LANG === 'he';
  document.getElementById('quizGame').style.display   = 'none';
  document.getElementById('quizResult').style.display = 'flex';

  var pct    = Math.round(QUIZ.correct / QUIZ.total * 100);
  var avgT   = QUIZ.times.length ? Math.round(QUIZ.times.reduce(function(a,b){return a+b;},0)/QUIZ.times.length) : 0;
  var circ   = 2*Math.PI*55;
  var offset = circ*(1-pct/100);

  var titles = isHe
    ? ['כמעט! 📖','מתקדם! 💪','כל הכבוד! 🎯','מהיר כברק! ⚡']
    : ['Keep trying! 📖','Good work! 💪','Well done! 🎯','Lightning fast! ⚡'];
  var title   = titles[pct>=90?3:pct>=70?2:pct>=50?1:0];

  document.getElementById('quizResult').innerHTML =
    '<div class="qzr-ring"><svg class="qzr-svg" viewBox="0 0 130 130">' +
      '<circle class="qzr-bg" cx="65" cy="65" r="55"/>' +
      '<circle class="qzr-arc" id="qzrArc" cx="65" cy="65" r="55" style="stroke-dasharray:'+circ+';stroke-dashoffset:'+circ+'"/>' +
    '</svg><div class="qzr-pct">'+pct+'%</div></div>' +
    '<div class="qzr-title">' + title + '</div>' +
    '<div class="qzr-score">⚡ ' + QUIZ.score + ' ' + (isHe?'נקודות':'points') + '</div>' +
    '<div class="qzr-stats">' +
      '<div class="qzrs"><div class="qzrs-v" style="color:var(--ac)">' + QUIZ.correct + '</div><div class="qzrs-l">' + (isHe?'נכון':'correct') + '</div></div>' +
      '<div class="qzrs"><div class="qzrs-v" style="color:var(--red)">' + (QUIZ.total-QUIZ.correct) + '</div><div class="qzrs-l">' + (isHe?'שגוי':'wrong') + '</div></div>' +
      '<div class="qzrs"><div class="qzrs-v">' + avgT + 's</div><div class="qzrs-l">' + (isHe?'ממוצע':'avg') + '</div></div>' +
      '<div class="qzrs"><div class="qzrs-v">' + QUIZ.maxStreak + '</div><div class="qzrs-l">' + (isHe?'רצף':'streak') + '</div></div>' +
    '</div>' +
    '<div class="qzr-btns">' +
      '<button class="qzr-btn" onclick="quitQuiz()">🏠 ' + (isHe?'תפריט':'Menu') + '</button>' +
      '<button class="qzr-btn qzr-btn-again" onclick="startQuiz('+QUIZ.total+')">🔁 ' + (isHe?'שחק שוב':'Play Again') + '</button>' +
    '</div>';

  setTimeout(function(){
    var arc = document.getElementById('qzrArc');
    if (arc) arc.style.strokeDashoffset = offset;
  }, 100);
}

function quitQuiz() {
  clearInterval(QUIZ.timer);
  document.getElementById('quizHome').style.display   = 'flex';
  document.getElementById('quizGame').style.display   = 'none';
  document.getElementById('quizResult').style.display = 'none';
}

/* ── INIT ── */
function init() {
  buildLandGrid();
  buildSidebar();
  buildLabSidebar();
  buildLabWelcome();
  applyLangUI();
}

document.addEventListener('DOMContentLoaded', init);

/* ═══════════════════════════════════════════
   MOBILE SIDEBAR — toggle, overlay, swipe
═══════════════════════════════════════════ */
function isMobile() { return window.innerWidth <= 768; }

function openSidebar(id) {
  var sb  = document.getElementById(id);
  var ov  = document.getElementById('sbOverlay');
  if (sb) sb.classList.add('open');
  if (ov) ov.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeSidebar() {
  ['sidebar','labSb'].forEach(function(id) {
    var sb = document.getElementById(id);
    if (sb) sb.classList.remove('open');
  });
  var ov = document.getElementById('sbOverlay');
  if (ov) ov.classList.remove('show');
  document.body.style.overflow = '';
}

// Inject mobile toggle button into learn/lab content areas
function injectMobileToggles() {
  if (!isMobile()) return;

  // Learn toggle
  var lc = document.getElementById('learnContent');
  if (lc && !document.getElementById('sbToggleBtn')) {
    var btn = document.createElement('button');
    btn.id = 'sbToggleBtn';
    btn.className = 'sb-toggle';
    btn.innerHTML = '📚 <span id="sbToggleLbl">' + (LANG==='he'?'בחר פרק':'Choose chapter') + '</span><span class="sb-toggle-icon">▼</span>';
    btn.onclick = function() { openSidebar('sidebar'); };
    lc.insertBefore(btn, lc.firstChild);
  }

  // Lab toggle — add if lab content visible
  var labC = document.getElementById('labContent');
  if (labC && !document.getElementById('labSbToggleBtn')) {
    var btn2 = document.createElement('button');
    btn2.id = 'labSbToggleBtn';
    btn2.className = 'sb-toggle';
    btn2.innerHTML = '🧪 <span id="labSbToggleLbl">' + (LANG==='he'?'בחר פרק':'Choose chapter') + '</span><span class="sb-toggle-icon">▼</span>';
    btn2.onclick = function() { openSidebar('labSb'); };
    labC.insertBefore(btn2, labC.firstChild);
  }
}

// Close sidebar when chapter selected on mobile
var _origLoadCh = loadCh;
loadCh = function(n) {
  _origLoadCh(n);
  if (isMobile()) closeSidebar();
};

var _origStartLab = startLab;
startLab = function(n) {
  _origStartLab(n);
  if (isMobile()) closeSidebar();
};

// Update toggle labels on lang change
var _origApplyLangUI = applyLangUI;
applyLangUI = function() {
  _origApplyLangUI();
  var tl = document.getElementById('sbToggleLbl');
  var ll = document.getElementById('labSbToggleLbl');
  if (tl) tl.textContent = LANG==='he' ? 'בחר פרק' : 'Choose chapter';
  if (ll) ll.textContent = LANG==='he' ? 'בחר פרק' : 'Choose chapter';
};

// Re-inject on screen change
var _origGoTo = goTo;
goTo = function(screen) {
  _origGoTo(screen);
  closeSidebar();
  setTimeout(injectMobileToggles, 50);
};

// Handle resize — show/hide sidebar correctly
window.addEventListener('resize', function() {
  if (!isMobile()) {
    closeSidebar();
    var sb  = document.getElementById('sidebar');
    var lsb = document.getElementById('labSb');
    if (sb)  { sb.style.display  = ''; sb.classList.remove('open'); }
    if (lsb) { lsb.style.display = ''; lsb.classList.remove('open'); }
  }
});

// Swipe left to open sidebar (mobile gesture)
(function() {
  var startX = 0;
  document.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
  }, {passive: true});
  document.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - startX;
    var screen = document.querySelector('.screen.active');
    if (!screen) return;
    var sid = screen.id;
    // Swipe right from left edge → open sidebar
    if (dx > 60 && startX < 30) {
      if (sid === 'learn') openSidebar('sidebar');
      if (sid === 'lab')   openSidebar('labSb');
    }
    // Swipe left → close sidebar
    if (dx < -60) closeSidebar();
  }, {passive: true});
})();

// Override init to inject mobile toggles
var _origInit = init;
init = function() {
  _origInit();
  setTimeout(injectMobileToggles, 100);
};


/* Auto-navigate to chapter 12 */
setTimeout(function(){ goTo('learn'); loadCh(12); }, 200);
</script>
