<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crypto Forensics — חקירת מטבעות דיגיטליים</title>
<style>


*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f7f7f2;
  --bg2:      #ffffff;
  --bg3:      #f0f0ea;
  --surface:  #ffffff;
  --border:   #e5e5e0;
  --border2:  #d1d1ca;
  --accent:   #0e7490;
  --accent2:  #0a5c72;
  --accentfg: #ffffff;
  --green:    #58cc02;
  --green2:   #46a302;
  --greenfg:  #ffffff;
  --yellow:   #ffd900;
  --yellowfg: #785a00;
  --red:      #ff4b4b;
  --redfg:    #ffffff;
  --blue:     #1cb0f6;
  --bluefg:   #ffffff;
  --text:     #3c3c3c;
  --text2:    #6b6b6b;
  --text3:    #afafaf;
  --mono:     'Courier New', 'Consolas', monospace;
  --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --r:        12px;
  --r2:       20px;
  --r3:       24px;
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 200;
  background: var(--bg2); border-bottom: 2px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px;
}
.header-logo {
  font-weight: 800; font-size: 16px; color: var(--accent);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  letter-spacing: -0.3px;
}
.header-logo-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--green); box-shadow: 0 2px 0 var(--green2);
}
.header-chname {
  font-size: 13px; font-weight: 600; color: var(--text2);
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lang-btn {
  font-size: 12px; font-weight: 800; padding: 6px 14px; border-radius: var(--r);
  border: 2px solid var(--border2); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text2);
  cursor: pointer; flex-shrink: 0; transition: all .1s;
  text-transform: uppercase; letter-spacing: .04em;
}
.lang-btn:hover { background: var(--accent); color: var(--accentfg); border-color: var(--accent2); border-bottom-color: var(--accent2); }
.lang-btn:active { transform: translateY(2px); border-bottom-width: 2px; }

/* ── CHAPTER NAV BAR ── */
.ch-nav {
  position: fixed; top: 60px; left: 0; right: 0; z-index: 150;
  background: var(--bg2); border-bottom: 2px solid var(--border);
  overflow-x: auto; display: flex; padding: 8px 16px; gap: 6px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.ch-nav::-webkit-scrollbar { display: none; }
.sb-label { display: none; }
.ch-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 14px; gap: 3px; border: 2px solid transparent;
  background: var(--bg3); border-radius: var(--r2);
  cursor: pointer; transition: all .15s; flex-shrink: 0;
  color: var(--text2); min-width: 52px;
  border-bottom: 4px solid var(--border);
}
.ch-btn:hover { background: var(--bg2); border-color: var(--border2); color: var(--text); }
.ch-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent2); border-bottom-color: var(--accent2);
}
.ch-num { font-size: 11px; font-weight: 800; font-family: var(--mono); }
.ch-title-text { font-size: 9px; font-weight: 600; max-width: 68px; text-align: center; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.ch-stars { font-size: 10px; min-height: 12px; }

/* ── LAYOUT ── */
.main {
  padding-top: 112px; min-height: 100vh;
  max-width: 780px; margin: 0 auto;
  padding-left: 20px; padding-right: 20px; padding-bottom: 60px;
}

/* ── CHAPTER ── */
.chapter { display: none; }
.chapter.active { display: block; }

/* ── CHAPTER HERO ── */
.ch-hero {
  padding: 28px 0 24px; border-bottom: 2px solid var(--border); margin-bottom: 28px;
}
.ch-tag {
  display: inline-block; font-size: 11px; font-weight: 800;
  color: var(--accent); background: var(--bg3);
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
  letter-spacing: .06em; text-transform: uppercase; font-family: var(--mono);
}
.ch-title { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 8px; letter-spacing: -.5px; line-height: 1.2; }
.ch-desc { font-size: 14px; color: var(--text2); margin-bottom: 20px; max-width: 560px; }
.tabs-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 18px; font-size: 13px; font-weight: 800; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text3);
  cursor: pointer; transition: all .1s; text-transform: uppercase; letter-spacing: .04em;
}
.tab-btn:hover { color: var(--text2); border-color: var(--border2); }
.tab-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
.tab-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent2); border-bottom-color: var(--accent2);
}

/* ── TAB PANELS ── */
.tab-panels { }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── LEARN CONTENT ── */
.did-you-know {
  background: linear-gradient(135deg, #fffdf0, #fff9e0);
  border: 2px solid var(--yellow); border-radius: var(--r2);
  padding: 16px 18px; font-size: 13.5px; color: #5a4a00;
  margin-bottom: 28px; line-height: 1.6;
  box-shadow: 0 3px 0 #e6c700;
}
.section-title {
  font-size: 17px; font-weight: 900; color: var(--text);
  margin: 32px 0 12px; letter-spacing: -.2px;
  display: flex; align-items: center; gap: 8px;
}
.prose {
  font-size: 15px; color: var(--text2); line-height: 1.78; margin-bottom: 16px;
}
.prose code, code {
  font-family: var(--mono); font-size: 12.5px;
  background: var(--bg3); padding: 2px 6px;
  border-radius: 6px; color: var(--accent2); font-weight: 600;
}

/* ── CODE BLOCKS ── */
.code-block {
  background: #1a1a2e; border-radius: var(--r2); padding: 18px 20px;
  margin: 16px 0; overflow-x: auto;
  border: 2px solid #2a2a4e; box-shadow: 0 4px 0 #0f0f20;
}
.code-block code {
  font-family: var(--mono); font-size: 12.5px; line-height: 1.75;
  background: none; padding: 0; color: #e2e8f0; display: block;
  font-weight: normal;
}
.comment { color: #6272a4; }

/* ── CARDS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin: 16px 0 24px; }
.card {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2);
  padding: 18px; display: flex; flex-direction: column; gap: 8px;
  transition: transform .1s;
}
.card:hover { transform: translateY(-2px); }
.card-icon { font-size: 26px; }
.card-title { font-size: 13px; font-weight: 800; color: var(--text); }
.card-body { font-size: 13px; color: var(--text2); line-height: 1.55; }

/* ── TABLE ── */
.table-wrap {
  overflow-x: auto; margin: 16px 0 24px;
  border-radius: var(--r2); border: 2px solid var(--border);
  box-shadow: 0 4px 0 var(--border);
}
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead { background: var(--bg3); }
.data-table th {
  padding: 11px 14px; text-align: left; font-weight: 800;
  color: var(--text2); font-size: 11px; text-transform: uppercase;
  letter-spacing: .06em; border-bottom: 2px solid var(--border);
}
.data-table td { padding: 11px 14px; color: var(--text2); border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg3); }

/* ── FLOW ROW ── */
.flow-row {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  margin: 16px 0 24px; padding: 20px; background: var(--bg2);
  border-radius: var(--r2); border: 2px solid var(--border);
  box-shadow: 0 4px 0 var(--border);
}
.flow-step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.flow-step-icon { font-size: 24px; }
.flow-step-label { font-size: 10px; font-weight: 700; color: var(--text3); line-height: 1.3; max-width: 64px; text-align: center; }
.flow-arrow { color: var(--accent); font-size: 18px; font-weight: 900; }

/* ── CALLOUTS ── */
.callout { padding: 14px 18px; border-radius: var(--r2); font-size: 13.5px; line-height: 1.6; margin: 16px 0; border: 2px solid; }
.callout-info  { background: #e8f4ff; border-color: #b3d9ff; color: #1a5a8a; box-shadow: 0 3px 0 #b3d9ff; }
.callout-warn  { background: #fff8e0; border-color: var(--yellow); color: #785a00; box-shadow: 0 3px 0 #e6c700; }
.callout-tip   { background: #e8fae8; border-color: #a8e6a8; color: #1a5a1a; box-shadow: 0 3px 0 #a8e6a8; }
.callout-success { background: var(--bg3); border-color: var(--border); color: var(--text2); padding: 10px 14px; }

/* ── REAL WORLD BOX ── */
.real-world-box {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2);
  padding: 20px; margin: 24px 0;
}
.real-world-title { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
.real-world-body { font-size: 13.5px; color: var(--text2); line-height: 1.7; }

/* ── END OF CHAPTER NAV ── */
.ch-end-nav {
  display: flex; gap: 12px; margin-top: 36px; padding-top: 24px;
  border-top: 2px solid var(--border); justify-content: center; flex-wrap: wrap;
}
.ch-end-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 16px 24px; border-radius: var(--r2); cursor: pointer;
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text2); font-weight: 800;
  font-size: 13px; transition: all .1s; min-width: 130px;
  text-transform: uppercase; letter-spacing: .04em;
}
.ch-end-btn:hover { transform: translateY(-2px); border-color: var(--accent); color: var(--accent); }
.ch-end-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
.ch-end-btn.primary {
  background: var(--green); color: var(--greenfg);
  border-color: var(--green2); border-bottom-color: var(--green2);
}
.ch-end-btn.primary:hover { background: var(--green2); }
.ch-end-btn-icon { font-size: 22px; }
.ch-end-btn-label { font-size: 11px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px; border-radius: var(--r2); font-size: 14px;
  font-weight: 800; border: 2px solid; cursor: pointer; transition: all .1s;
  text-transform: uppercase; letter-spacing: .04em;
}
.btn:active { transform: translateY(2px); border-bottom-width: 2px !important; }
.btn-primary {
  background: var(--green); color: var(--greenfg);
  border-color: var(--green2); border-bottom: 4px solid var(--green2);
}
.btn-primary:hover { background: var(--green2); }
.btn-ghost {
  background: var(--bg2); color: var(--text2);
  border-color: var(--border2); border-bottom: 4px solid var(--border2);
}
.btn-ghost:hover { background: var(--bg3); color: var(--text); }

/* ── GAME ── */
.game-wrap { max-width: 680px; }
.game-start-card { max-width: 420px; margin: 0 auto; text-align: center; padding: 40px 24px; }
.game-icon { font-size: 56px; margin-bottom: 16px; filter: drop-shadow(0 4px 0 rgba(0,0,0,.1)); }
.game-start-title { font-size: 24px; font-weight: 900; color: var(--text); margin-bottom: 8px; letter-spacing: -.5px; }
.game-start-desc { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
.game-rules { display: flex; justify-content: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
.game-rule {
  font-size: 13px; font-weight: 700; color: var(--text2);
  background: var(--bg3); padding: 8px 14px; border-radius: var(--r);
  border: 2px solid var(--border);
}
.game-hud {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding: 12px 18px;
  background: var(--bg2); border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
}
.hud-score { font-size: 22px; font-weight: 900; color: var(--green); font-family: var(--mono); }
.hud-timer { font-size: 15px; font-weight: 800; color: var(--text2); font-family: var(--mono); }
.game-q-text { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
.game-opts { display: flex; flex-direction: column; gap: 10px; }
.game-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); cursor: pointer; transition: all .1s;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.game-opt:hover { border-color: var(--accent); border-bottom-color: var(--accent2); transform: translateY(-1px); }
.game-opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.game-opt.correct { border-color: var(--green); border-bottom-color: var(--green2); background: #e8fae8; color: #1a5a1a; }
.game-opt.wrong   { border-color: var(--red); background: #fff0f0; color: #8a1a1a; }
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg3); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; flex-shrink: 0; color: var(--text2);
  font-family: var(--mono);
}
.game-result-card { max-width: 420px; margin: 32px auto 0; text-align: center; }
.result-score { font-size: 60px; font-weight: 900; color: var(--green); font-family: var(--mono); line-height: 1; margin-bottom: 4px; }
.result-label { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 24px; }
.result-emoji { font-size: 52px; margin-bottom: 8px; }
.result-btns { display: flex; gap: 12px; justify-content: center; }
.result-stars { font-size: 28px; margin-bottom: 8px; }

/* ── QUIZ ── */
.quiz-wrap { max-width: 680px; }
.quiz-prog { display: flex; gap: 4px; margin-bottom: 24px; }
.quiz-pip { flex: 1; height: 8px; border-radius: 4px; background: var(--border2); transition: background .2s; }
.quiz-pip.done { background: var(--green); }
.quiz-pip.cur  { background: var(--accent); }
.quiz-q-card { display: none; }
.quiz-q-card.active { display: block; }
.quiz-meta { font-size: 11px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.quiz-q { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
.quiz-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.quiz-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 18px; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); cursor: pointer; transition: all .1s;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.quiz-opt:hover { border-color: var(--accent); border-bottom-color: var(--accent2); transform: translateY(-1px); }
.quiz-opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.quiz-opt.selected { border-color: var(--accent); background: #f0f4ff; }
.quiz-opt.correct   { border-color: var(--green); border-bottom-color: var(--green2); background: #e8fae8; }
.quiz-opt.wrong     { border-color: var(--red); border-bottom-color: #cc0000; background: #fff0f0; }
.quiz-exp {
  padding: 14px 18px; background: #e8fae8; border-radius: var(--r2);
  border: 2px solid var(--green); border-bottom: 4px solid var(--green2);
  font-size: 13.5px; color: #1a5a1a; margin: 12px 0; line-height: 1.6;
}
.quiz-actions { display: flex; gap: 10px; margin-top: 8px; }
.quiz-result { display: none; text-align: center; padding: 32px 0; }
.qr-score { font-size: 56px; font-weight: 900; font-family: var(--mono); color: var(--green); margin-bottom: 4px; }
.qr-label { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 24px; }
.quiz-nav { display: flex; justify-content: space-between; margin-top: 12px; }

/* ── CHEAT / SUMMARY ── */
.cheat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 14px; margin-top: 8px; }
.cheat-card {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2); padding: 16px;
}
.cheat-card-title { font-size: 11px; font-weight: 900; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .08em; }
.cheat-item { display: flex; justify-content: space-between; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.cheat-item:last-child { border-bottom: none; }
.cheat-key { font-family: var(--mono); color: var(--accent); font-weight: 700; font-size: 11.5px; flex-shrink: 0; }
.cheat-val { color: var(--text2); text-align: right; font-size: 11.5px; }

/* ── CREDITS ── */
.credits-bar { border-top: 2px solid var(--border); padding: 32px 0; margin-top: 48px; }
.credits-title { font-size: 10px; font-weight: 900; color: var(--accent); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 16px; font-family: var(--mono); }
.credits-grid { display: flex; flex-wrap: wrap; gap: 24px; }
.credit-group { flex: 1; min-width: 140px; }
.credit-group-title { font-size: 11px; font-weight: 800; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
.credit-item { font-size: 12px; color: var(--text3); line-height: 1.9; }
.credit-item a { color: var(--accent); text-decoration: none; font-weight: 700; }
.credit-item a:hover { text-decoration: underline; }

/* ── MOBILE ── */
@media (max-width: 700px) {
  .main { padding-top: 108px; padding-left: 16px; padding-right: 16px; }
  .ch-title { font-size: 20px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .flow-row { padding: 14px; gap: 4px; }
  .flow-step-label { font-size: 9px; max-width: 52px; }
  .game-rules { gap: 10px; }
  .quiz-actions { flex-wrap: wrap; }
  .result-btns { flex-wrap: wrap; }
  .ch-end-nav { gap: 8px; }
  .ch-end-btn { min-width: 100px; padding: 14px 16px; }
}
@media (max-width: 480px) {
  .ch-nav { padding: 6px 10px; }
  .ch-btn { padding: 7px 10px; min-width: 44px; }
}


/* ── RICH SUMMARY CARDS ── */
.sum-block { margin-bottom: 28px; }
.sum-block-title {
  font-size: 13px; font-weight: 800; color: var(--accent);
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 10px; font-family: var(--mono);
  display: flex; align-items: center; gap: 8px;
}
.sum-block-title::after { content:''; flex:1; height:1px; background:var(--border); }
.sum-row {
  display: grid; grid-template-columns: 200px 1fr;
  gap: 10px 16px; padding: 9px 0;
  border-bottom: 1px solid var(--border); align-items: start;
}
.sum-row:last-child { border-bottom: none; }
.sum-k { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); line-height: 1.4; }
.sum-v { font-size: 13px; color: var(--text2); line-height: 1.6; }
.sum-v strong { color: var(--text); font-weight: 700; }
.sum-v code { font-size: 11.5px; background: var(--bg3); padding: 1px 5px; border-radius: 3px; color: var(--accent2,var(--accent)); font-family: var(--mono); }
.sum-tip { margin-top: 10px; padding: 10px 14px; background: var(--yellowbg,#fffbeb); border-radius: var(--r,8px); border: 1px solid #fde68a; font-size: 13px; color: #713f12; line-height: 1.6; }
.sum-danger { margin-top: 10px; padding: 10px 14px; background: #fff1f2; border-radius: var(--r,8px); border: 1px solid #fecaca; font-size: 13px; color: #991b1b; line-height: 1.6; }
@media (max-width: 560px) { .sum-row { grid-template-columns: 1fr; gap: 2px; } }
/* ── FULL REVIEW DRAWER ── */

.review-overlay { display:none; position:fixed; inset:0; z-index:900; background:rgba(0,0,0,.45); backdrop-filter:blur(2px); }

.review-drawer { position:fixed; top:0; left:0; right:0; z-index:910; background:var(--bg,#fff); border-bottom:2px solid var(--accent); box-shadow:0 4px 16px rgba(0,0,0,.15); transform:translateY(-100%); transition:transform .3s cubic-bezier(.4,0,.2,1); max-height:90vh; display:flex; flex-direction:column; }

.review-header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); flex-shrink:0; gap:12px; background:var(--bg,#fff); }
.review-header-title { font-size:15px; font-weight:800; color:var(--text,#111); }
.review-header-sub { font-size:12px; color:var(--text3,#888); font-weight:500; }
.review-close { width:32px; height:32px; border-radius:50%; background:var(--bg2,#f8f9fa); border:1px solid var(--border); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--text2,#666); line-height:1; transition:all .15s; }
.review-close:hover { background:#fff1f2; border-color:#dc2626; color:#dc2626; }
.review-body { overflow-y:auto; padding:24px 20px 40px; flex:1; }
.review-body::-webkit-scrollbar { width:6px; }
.review-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.review-chapter-block { margin-bottom:36px; border:1px solid var(--border); border-radius:12px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.08); }
.review-chapter-title { background:var(--accentbg,rgba(14,116,144,.06)); border-bottom:1px solid var(--border); padding:12px 18px; display:flex; align-items:center; gap:10px; }
.review-chapter-num { font-family:var(--mono); font-size:11px; font-weight:800; color:var(--accent); background:var(--bg,#fff); border:1px solid var(--accent); border-radius:6px; padding:2px 8px; flex-shrink:0; }
.review-chapter-name { font-size:14px; font-weight:800; color:var(--text,#111); }
.review-chapter-body { padding:18px; background:var(--bg,#fff); }
.review-chapter-body .sum-block { margin-bottom:20px; }
.review-chapter-body .sum-block:last-child { margin-bottom:0; }
.review-chapter-body .sum-row { grid-template-columns:170px 1fr; padding:7px 0; }
.review-chapter-body .sum-v { font-size:12.5px; }
.review-chapter-body .sum-k { font-size:11.5px; }
@media (max-width:680px) { .review-drawer{max-height:95vh} .review-body{padding:16px 14px 32px} .review-chapter-body .sum-row{grid-template-columns:1fr} }

/* ── TOOL DEMOS ── */
.td{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:18px 0;box-shadow:0 1px 8px rgba(0,0,0,.07)}
.td-dark{background:#16181d}
.td-bar{display:flex;align-items:center;gap:10px;padding:9px 14px;background:#f0f0ea;border-bottom:1px solid #e5e5e0}
.td-dark .td-bar{background:#1e2025;border-color:#2d3038}
.td-dots{display:flex;gap:5px;flex-shrink:0}

.td-r{background:#ff5f57}.td-y{background:#febc2e}.td-g{background:#28c840}
.td-url{flex:1;min-width:0;background:var(--bg2);border:1px solid #ddd;border-radius:6px;padding:3px 10px;font-size:11.5px;color:var(--text2);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.td-dark-url{background:#111318;border-color:#2d3038;color:#9ca3af}
.td-title{padding:8px 16px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;font-family:var(--sans);background:var(--bg2);border-bottom:1px solid var(--bg3)}
.td-body{background:var(--bg2);padding:14px 18px;font-family:var(--mono);font-size:12.5px;line-height:1.8;direction:ltr;text-align:left;overflow-x:auto}
.td-body-dark{background:#16181d;color:#e2e8f0}

/* ── MATCH GAME ── */
.match-board{padding:16px}
.match-success{text-align:center;font-size:18px;font-weight:800;color:var(--green2);padding:16px;background:#f0fdf4;border-radius:12px;margin-bottom:16px;border:2px solid var(--green)}
.match-restart-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer}

[dir="rtl"] .match-card{direction:rtl;text-align:right}

/* ── BIDI ISOLATION — Hebrew/English mix fix ── */
p.prose, .section-title, .callout, .callout.idea, .callout.warn,
td, th, li, .sc-text, .sc-label, .td-k, .td-v,
.ch-title, .ch-desc, .tab-btn, .ch-end-btn-label,
.match-card, .review-chapter {
  unicode-bidi: isolate;
}
/* Code/pre always LTR regardless of document dir */
code, pre, .td-body, .td-body-dark, .td-url, .td-dark-url {
  unicode-bidi: isolate;
  direction: ltr;
  text-align: left;
}
/* Inline code inside RTL text */
p.prose code, td code, li code {
  unicode-bidi: isolate;
  direction: ltr;
  display: inline-block;
}


/* ── LIST BIDI FIX ── */
ol.prose, ul.prose { direction: rtl; text-align: right; }

  text-align: right;
  unicode-bidi: isolate;
}
ol.prose li strong:first-child,

  unicode-bidi: isolate;
  direction: ltr;

}

var LANG    = 'he';
var CUR_CH  = 0;
var XP      = 0;
var LAB     = { ch: 0, cur: 0, ans: [], questions: [] };

/* ── XP SYNC WITH PARENT APP ── */
function syncXPDisplay() {
  var el = document.getElementById('xpTotal');
  if (el) el.textContent = XP;
}
window.addEventListener('message', function(e) {
  if (!e.data) return;
  /* App sends current XP state */
  if (e.data.type === 'ng_xp_sync' || e.data.ng === 'xp_sync') {
    var appXP = parseInt(e.data.xp) || 0;
    if (appXP > XP) { XP = appXP; syncXPDisplay(); }
  }
  /* App sends XP increment (from other sources) */
  if (e.data.type === 'ng_xp_add') {
    XP += parseInt(e.data.amount) || 0;
    syncXPDisplay();
  }
});
/* Request initial XP from parent app on load */
try { parent.postMessage({ type: 'ng_xp_request' }, '*'); } catch(e) {}

/* ── NAVIGATION ── */
function goTo(screen) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('on'); });
  var el = document.getElementById(screen);
  if (el) el.classList.add('active');
  document.querySelectorAll('[data-screen="'+screen+'"]').forEach(function(t){ t.classList.add('on'); });
  window.scrollTo(0,0);
}

  LANG = LANG === 'he' ? 'en' : 'he';
  var btn = document.getElementById('langBtn');
  if (btn) btn.textContent = LANG === 'he' ? 'EN' : 'עב';
  document.documentElement.lang = LANG;

  if (CUR_CH) loadCh(CUR_CH);
}

/* ── LOAD CHAPTER ── */
function loadCh(n) {
  CUR_CH = n;
  try{parent.postMessage({type:'ng_xp',amount:5},'*')}catch(e){}
  var isHe  = LANG === 'he';
  var ch    = CHAPTERS.find(function(c){ return c.n === n; });
  var data  = isHe ? ch.he : ch.en;
  var total = CHAPTERS.length;

  // update sidebar active state
  document.querySelectorAll('.sb-ch').forEach(function(b){ b.classList.remove('active'); });
  var btns = document.querySelectorAll('.sb-ch');
  if (btns[n-1]) btns[n-1].classList.add('active');

  // prev/next labels
  var prevL = n > 0     ? (isHe ? '← פרק ' + (n-1) : '← Ch '+(n-1)) : null;
  var nextL = n < total ? (isHe ? 'פרק '+(n+1)+' →' : 'Ch '+(n+1)+' →') : null;

  var navTop = '<div class="ch-nav">' +
    (prevL ? '<button class="ch-nav-btn" onclick="loadCh('+(n-1)+')">' + prevL + '</button>' : '<span></span>') +
    '<span class="ch-nav-cur">' + ch.icon + ' ' + data.name + '</span>' +
    (nextL ? '<button class="ch-nav-btn" onclick="loadCh('+(n+1)+')">' + nextL + '</button>' : '<span></span>') +
    '</div>';

  var navBottom = '<div class="ch-nav ch-nav-bottom">' +
    (prevL ? '<button class="ch-nav-btn" onclick="loadCh('+(n-1)+')">' + prevL + '</button>' : '<span></span>') +
    '<span class="ch-nav-cur">' + (isHe ? 'פרק ' + n : 'Ch ' + n) + '</span>' +
    (nextL ? '<button class="ch-nav-btn" onclick="loadCh('+(n+1)+')">' + nextL + '</button>' : '<span></span>') +
    '</div>';

  var content = document.getElementById('learnContent');
  var isHe2 = LANG === 'he';
  var sumBlock = SUMMARIES[isHe2 ? 'he' : 'en'][n] ?
    '<div class="chapter-summary"><div class="chapter-summary-title">📋 ' + (isHe2 ? 'סיכום פרק' : 'Chapter Summary') + '</div>' + SUMMARIES[isHe2 ? 'he' : 'en'][n] + '</div>' : '';
  content.innerHTML = navTop + data.content() + sumBlock + navBottom;
  content.scrollTop = 0;

  // read progress
  content.onscroll = function() {
    var fill = document.getElementById('readFill');
    if (fill) {
      var pct = content.scrollTop / (content.scrollHeight - content.clientHeight) * 100;
      fill.style.width = Math.min(pct, 100) + '%';
    }
  };

  goTo('learn');
}

function startLab(n) {
  LAB.ch  = n;
  LAB.cur = 0;
  LAB.ans = [];
  LAB.questions = (LAB_DATA[n] || []).slice();

  document.getElementById('labWelcome').style.display = 'none';
  var area = document.getElementById('lqArea');
  area.style.display = 'block';

  // update sidebar active
  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('active'); });
  var btns = document.querySelectorAll('.lab-ch-btn');
  if (btns[n-1]) btns[n-1].classList.add('active');

  renderLabQ();
}

function renderLabQ() {
  var area  = document.getElementById('lqArea');
  var isHe  = LANG === 'he';
  var ch    = CHAPTERS.find(function(c){ return c.n === LAB.ch; });
  var total = LAB.questions.length;
  var cur   = LAB.cur;

  if (cur >= total) { showLabResult(); return; }

  var q   = LAB.questions[cur];
  var LBL = isHe ? ['א','ב','ג','ד'] : ['A','B','C','D'];

  // shuffle answers
  var idx = [0,1,2,3];
  for (var i = idx.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp=idx[i]; idx[i]=idx[j]; idx[j]=tmp;
  }
  var newC  = idx.indexOf(q.c);
  var qText = isHe ? q.q : (q.q_en || q.q);
  var aList = isHe ? q.a : (q.a_en || q.a);
  var cat   = isHe ? q.cat : (q.cat_en || q.cat);
  var expl  = isHe ? q.e : (q.e_en || q.e);

  // pips
  var pips = '';
  for (var p=0;p<total;p++) {
    var cls = p===cur?'cur':p<cur?(LAB.ans[p]===1?'ok':'bad'):'';
    pips += '<div class="lq-pip '+cls+'"></div>';
  }

  var opts = '';
  idx.forEach(function(origIdx, di) {
    opts += '<button class="lq-opt" onclick="onLabPick(this,'+di+','+newC+','+origIdx+')">' +
      '<span class="lq-lbl">'+LBL[di]+'</span>' +
      '<span class="lq-txt">'+(aList[origIdx]||'')+'</span>' +
      '<span class="lq-ic"></span>' +
    '</button>';
  });

  var ok_cnt   = LAB.ans.filter(function(x){return x===1;}).length;
  var scoreL   = isHe ? 'נכון' : 'correct';
  var restartL = isHe ? '↺ התחל מחדש' : '↺ Restart';
  var nextL    = isHe ? 'הבא ←' : 'Next →';

  area.innerHTML =
    '<div class="lq-header">' +
      '<div class="lq-ch-icon">' + ch.icon + '</div>' +
      '<div><div class="lq-ch-name">' + (isHe?ch.he.name:ch.en.name) + '</div>' +
      '<div class="lq-ch-num">' + (cur+1) + ' / ' + total + '</div></div>' +
      '<div class="lq-spacer"></div>' +
      '<div class="lq-scorebox"><div class="lq-sv">' + ok_cnt + '</div><div class="lq-sl">' + scoreL + '</div></div>' +
    '</div>' +
    '<div class="lq-pips">' + pips + '</div>' +
    '<div class="lq-card">' +
      '<div class="lq-meta"><span class="lq-num">' + (cur+1) + '/' + total + '</span><span class="lq-cat">' + cat + '</span></div>' +
      '<div class="lq-q">' + qText + '</div>' +
      (q.snip ? '<pre class="qz-snip">'+q.snip+'</pre>' : '') +
      '<div class="lq-opts">' + opts + '</div>' +
      '<div class="lq-exp" id="lqExp"><div class="lq-exp-lbl" id="lqExpLbl"></div><div class="lq-exp-txt">' + expl + '</div></div>' +
    '</div>' +
    '<div class="lq-foot">' +
      '<button class="lq-btn" onclick="startLab(' + LAB.ch + ')">' + restartL + '</button>' +
      '<button class="lq-btn next" id="lqNext" onclick="lqAdvance()" disabled>' + nextL + '</button>' +
    '</div>';
}

function onLabPick(btn, di, correctDi, origIdx) {
  var isHe = LANG === 'he';
  var ok   = di === correctDi;
  LAB.ans[LAB.cur] = ok ? 1 : 0;

  document.querySelectorAll('.lq-opt').forEach(function(b){ b.disabled = true; });
  btn.classList.add(ok ? 'correct' : 'wrong');
  btn.querySelector('.lq-ic').textContent = ok ? '✓' : '✗';

  var correctBtn = document.querySelectorAll('.lq-opt')[correctDi];
  if (!ok && correctBtn) correctBtn.classList.add('correct');

  var lbl = document.getElementById('lqExpLbl');
  if (lbl) {
    lbl.textContent = ok ? (isHe ? '✓ נכון!' : '✓ Correct!') : (isHe ? '✗ לא נכון' : '✗ Wrong');
    lbl.className   = 'lq-exp-lbl ' + (ok ? 'ok' : 'bad');
  }
  var exp = document.getElementById('lqExp');
  if (exp) exp.classList.add('show');

  var next = document.getElementById('lqNext');
  if (next) next.disabled = false;

  if (ok) { XP += 10; var xpEl=document.getElementById('xpTotal'); if(xpEl) xpEl.textContent=XP; try{parent.postMessage({type:'ng_xp',amount:15},'*')}catch(e){} }
}

function lqAdvance() {
  LAB.cur++;
  renderLabQ();
}

function showLabResult() {
  var isHe  = LANG === 'he';
  var total = LAB.questions.length;
  var ok    = LAB.ans.filter(function(x){return x===1;}).length;
  var pct   = Math.round(ok/total*100);
  var area  = document.getElementById('lqArea');

  var titles = isHe
    ? ['עוד לא שם... 📖','מתקדם! 💪','כל הכבוד! 🎯','מצוין! 🏆']
    : ['Keep practicing! 📖','Getting there! 💪','Well done! 🎯','Excellent! 🏆'];
  var title  = titles[pct>=90?3:pct>=70?2:pct>=50?1:0];
  var againL = isHe ? '↺ שחק שוב' : '↺ Play Again';
  var backL  = isHe ? '← חזרה' : '← Back';
  var scoreL = isHe ? 'ציון' : 'Score';
  var okL    = isHe ? 'נכון' : 'Correct';
  var wrongL = isHe ? 'שגוי' : 'Wrong';
  var circ   = 2 * Math.PI * 50;
  var offset = circ * (1 - pct/100);

  area.innerHTML =
    '<div class="lq-result">' +
      '<div class="lqr-ring"><svg class="lqr-svg" viewBox="0 0 120 120">' +
        '<circle class="lqr-bg" cx="60" cy="60" r="50"/>' +
        '<circle class="lqr-arc" id="lqrArc" cx="60" cy="60" r="50" style="stroke-dasharray:'+circ+';stroke-dashoffset:'+circ+'"/>' +
      '</svg><div class="lqr-pct">'+pct+'%</div></div>' +
      '<div class="lqr-title">' + title + '</div>' +
      '<div class="lqr-stats">' +
        '<div class="lqrs"><div class="lqrs-v" style="color:var(--ac)">' + ok + '</div><div class="lqrs-l">' + okL + '</div></div>' +
        '<div class="lqrs"><div class="lqrs-v" style="color:var(--red)">' + (total-ok) + '</div><div class="lqrs-l">' + wrongL + '</div></div>' +
        '<div class="lqrs"><div class="lqrs-v">' + pct + '%</div><div class="lqrs-l">' + scoreL + '</div></div>' +
      '</div>' +
      '<div class="lqr-btns">' +
        '<button class="lqr-btn" onclick="goBack()">' + backL + '</button>' +
        '<button class="lqr-btn primary" onclick="startLab(' + LAB.ch + ')">' + againL + '</button>' +
      '</div>' +
    '</div>';

  setTimeout(function(){
    var arc = document.getElementById('lqrArc');
    if (arc) arc.style.strokeDashoffset = offset;
  }, 100);
}

function goBack() {
  document.getElementById('labWelcome').style.display = 'block';
  document.getElementById('lqArea').style.display = 'none';
  LAB.ch = 0;
  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('active'); });
}

/* ═══════════════════════════════════════════
   QUIZ ENGINE
═══════════════════════════════════════════ */
var QUIZ = { cur:0, questions:[], total:0, score:0, streak:0, maxStreak:0, correct:0, times:[], timer:null, timerSec:0 };
var TIMER_MAX = 15;

function startQuiz(n) {
  var pool = [];
  for (var i=1; i<=12; i++) { (LAB_DATA[i]||[]).forEach(function(q){pool.push(q);}); }
  pool = pool.slice().sort(function(){ return Math.random()-.5; });
  var total = n === 'all' ? pool.length : Math.min(n, pool.length);

  QUIZ.questions  = pool.slice(0, total);
  QUIZ.total      = total;
  QUIZ.cur        = 0;
  QUIZ.score      = 0;
  QUIZ.streak     = 0;
  QUIZ.maxStreak  = 0;
  QUIZ.correct    = 0;
  QUIZ.times      = [];

  document.getElementById('quizHome').style.display   = 'none';
  document.getElementById('quizGame').style.display   = 'flex';
  document.getElementById('quizResult').style.display = 'none';

  renderQuizQ();
}

function renderQuizQ() {
  var isHe  = LANG === 'he';
  var q     = QUIZ.questions[QUIZ.cur];
  var idx   = [0,1,2,3];
  for (var i=idx.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=idx[i];idx[i]=idx[j];idx[j]=tmp;}
  var newC  = idx.indexOf(q.c);
  var LBL   = isHe ? ['א','ב','ג','ד'] : ['A','B','C','D'];
  var qText = isHe ? q.q : (q.q_en || q.q);
  var aList = isHe ? q.a : (q.a_en || q.a);
  var cat   = isHe ? q.cat : (q.cat_en || q.cat);

  document.getElementById('qzScore').textContent = QUIZ.score;
  document.getElementById('qzStreak').textContent= QUIZ.streak;
  document.getElementById('qzNum').textContent   = (QUIZ.cur+1) + '/' + QUIZ.total;
  document.getElementById('qzCat').textContent   = cat;
  document.getElementById('qzQ').textContent     = qText;
  var snipEl = document.getElementById('qzSnip');
  snipEl.innerHTML = q.snip ? '<pre class="qz-snip">'+q.snip+'</pre>' : '';

  var opts = '';
  idx.forEach(function(origIdx, di) {
    opts += '<button class="qz-opt" onclick="onQuizPick(this,'+di+','+newC+','+origIdx+')">' +
      '<span class="qz-opt-lbl">'+LBL[di]+'</span>' +
      '<span class="qz-opt-txt">'+(aList[origIdx]||'')+'</span>' +
    '</button>';
  });
  document.getElementById('qzOpts').innerHTML = opts;
  document.getElementById('qzFeedback').className = 'qz-feedback';
  document.getElementById('qzFeedback').innerHTML = '';

  startTimer();
}

function startTimer() {
  clearInterval(QUIZ.timer);
  QUIZ.timerSec = TIMER_MAX;
  var arc = document.getElementById('qzArc');
  var circ = 2*Math.PI*18;
  if (arc) { arc.style.stroke = 'var(--ac)'; arc.style.strokeDashoffset = '0'; }
  document.getElementById('qzTimerNum').textContent = TIMER_MAX;

  QUIZ.timer = setInterval(function() {
    QUIZ.timerSec--;
    document.getElementById('qzTimerNum').textContent = QUIZ.timerSec;
    if (arc) {
      var pct = QUIZ.timerSec / TIMER_MAX;
      arc.style.strokeDashoffset = circ*(1-pct);
      arc.style.stroke = QUIZ.timerSec <= 5 ? 'var(--red)' : QUIZ.timerSec <= 9 ? 'var(--ac4)' : 'var(--ac)';
    }
    if (QUIZ.timerSec <= 0) { clearInterval(QUIZ.timer); onTimeout(); }
  }, 1000);
}

function onQuizPick(btn, di, correctDi, origIdx) {
  clearInterval(QUIZ.timer);
  var isHe = LANG === 'he';
  var ok   = di === correctDi;
  var pts  = ok ? Math.max(10, QUIZ.timerSec * 10) : 0;
  QUIZ.times.push(TIMER_MAX - QUIZ.timerSec);

  document.querySelectorAll('.qz-opt').forEach(function(b){ b.disabled=true; });
  btn.classList.add(ok ? 'correct' : 'wrong');
  var correctBtn = document.querySelectorAll('.qz-opt')[correctDi];
  if (!ok && correctBtn) correctBtn.classList.add('correct');

  if (ok) {
    QUIZ.score   += pts;
    QUIZ.streak++;
    QUIZ.correct++;
    QUIZ.maxStreak = Math.max(QUIZ.maxStreak, QUIZ.streak);
    XP += 15;
    var xpEl=document.getElementById('xpTotal'); if(xpEl) xpEl.textContent=XP;
    try{parent.postMessage({type:'ng_xp',amount:15},'*')}catch(e){}
  } else {
    QUIZ.streak = 0;
  }
  document.getElementById('qzScore').textContent  = QUIZ.score;
  document.getElementById('qzStreak').textContent = QUIZ.streak;

  var q    = QUIZ.questions[QUIZ.cur];
  var expl = isHe ? q.e : (q.e_en || q.e);
  var fb   = document.getElementById('qzFeedback');
  var isLast = QUIZ.cur + 1 >= QUIZ.total;
  var nextLbl= isLast ? (isHe?'תוצאה 🏆':'Results 🏆') : (isHe?'הבאה ←':'Next →');

  fb.className = 'qz-feedback show ' + (ok?'good':'bad');
  fb.innerHTML = (ok
    ? '<strong>✓ ' + (isHe?'נכון!':'Correct!') + '</strong>' + (pts>10?' <span class="qz-pts">+'+pts+'</span>':'')
    : '<strong>✗ ' + (isHe?'לא נכון':'Wrong') + '</strong>') +
    '<br><small>' + expl + '</small>' +
    '<br><br><button class="lq-btn next" onclick="nextQuizQ()">' + nextLbl + '</button>';
}

function onTimeout() {
  var isHe = LANG === 'he';
  QUIZ.streak = 0;
  document.querySelectorAll('.qz-opt').forEach(function(b){ b.disabled=true; });
  var isLast = QUIZ.cur + 1 >= QUIZ.total;
  var nextLbl= isLast ? (isHe?'תוצאה 🏆':'Results 🏆') : (isHe?'הבאה ←':'Next →');
  var fb = document.getElementById('qzFeedback');
  fb.className = 'qz-feedback show bad';
  fb.innerHTML = '<strong>⏰ ' + (isHe?'הזמן נגמר!':'Time\'s up!') + '</strong>' +
    '<br><br><button class="lq-btn next" onclick="nextQuizQ()">' + nextLbl + '</button>';
}

function nextQuizQ() {
  QUIZ.cur++;
  if (QUIZ.cur >= QUIZ.total) { showQuizResult(); return; }
  renderQuizQ();
}

function showQuizResult() {
  clearInterval(QUIZ.timer);
  var isHe = LANG === 'he';
  document.getElementById('quizGame').style.display   = 'none';

  setTimeout(function(){
    var arc = document.getElementById('qzrArc');

  }, 100);

/* ═══════════════════════════════════════════
   MOBILE SIDEBAR — toggle, overlay, swipe
═══════════════════════════════════════════ */
function isMobile() { return window.innerWidth <= 768; }

function openSidebar(id) {
  var sb  = document.getElementById(id);
  var ov  = document.getElementById('sbOverlay');
  if (sb) sb.classList.add('open');
  if (ov) ov.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeSidebar() {
  ['sidebar','labSb'].forEach(function(id) {
    var sb = document.getElementById(id);
    if (sb) sb.classList.remove('open');
  });
  var ov = document.getElementById('sbOverlay');
  if (ov) ov.classList.remove('show');
  document.body.style.overflow = '';
}

// Inject mobile toggle button into learn/lab content areas
function injectMobileToggles() {
  if (!isMobile()) return;

  // Learn toggle
  var lc = document.getElementById('learnContent');
  if (lc && !document.getElementById('sbToggleBtn')) {
    var btn = document.createElement('button');
    btn.id = 'sbToggleBtn';
    btn.className = 'sb-toggle';
    btn.innerHTML = '📚 <span id="sbToggleLbl">' + (LANG==='he'?'בחר פרק':'Choose chapter') + '</span><span class="sb-toggle-icon">▼</span>';
    btn.onclick = function() { openSidebar('sidebar'); };
    lc.insertBefore(btn, lc.firstChild);
  }

  // Lab toggle — add if lab content visible
  var labC = document.getElementById('labContent');
  if (labC && !document.getElementById('labSbToggleBtn')) {
    var btn2 = document.createElement('button');
    btn2.id = 'labSbToggleBtn';
    btn2.className = 'sb-toggle';
    btn2.innerHTML = '🧪 <span id="labSbToggleLbl">' + (LANG==='he'?'בחר פרק':'Choose chapter') + '</span><span class="sb-toggle-icon">▼</span>';
    btn2.onclick = function() { openSidebar('labSb'); };
    labC.insertBefore(btn2, labC.firstChild);
  }
}

// Close sidebar when chapter selected on mobile
var _origLoadCh = loadCh;
loadCh = function(n) {
  _origLoadCh(n);
  if (isMobile()) closeSidebar();
};

var _origStartLab = startLab;
startLab = function(n) {
  _origStartLab(n);
  if (isMobile()) closeSidebar();
};

// Update toggle labels on lang change
var _origApplyLangUI = applyLangUI;
applyLangUI = function() {
  _origApplyLangUI();
  var tl = document.getElementById('sbToggleLbl');
  var ll = document.getElementById('labSbToggleLbl');
  if (tl) tl.textContent = LANG==='he' ? 'בחר פרק' : 'Choose chapter';
  if (ll) ll.textContent = LANG==='he' ? 'בחר פרק' : 'Choose chapter';
};

// Re-inject on screen change
var _origGoTo = goTo;
goTo = function(screen) {
  _origGoTo(screen);
  closeSidebar();
  setTimeout(injectMobileToggles, 50);
};

// Handle resize — show/hide sidebar correctly
window.addEventListener('resize', function() {
  if (!isMobile()) {
    closeSidebar();
    var sb  = document.getElementById('sidebar');
    var lsb = document.getElementById('labSb');
    if (sb)  { sb.style.display  = ''; sb.classList.remove('open'); }
    if (lsb) { lsb.style.display = ''; lsb.classList.remove('open'); }
  }
});

// Swipe left to open sidebar (mobile gesture)
(function() {
  var startX = 0;
  document.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
  }, {passive: true});
  document.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - startX;
    var screen = document.querySelector('.screen.active');
    if (!screen) return;
    var sid = screen.id;
    // Swipe right from left edge → open sidebar
    if (dx > 60 && startX < 30) {
      if (sid === 'learn') openSidebar('sidebar');
      if (sid === 'lab')   openSidebar('labSb');
    }
    // Swipe left → close sidebar
    if (dx < -60) closeSidebar();
  }, {passive: true});
})();

// Override init to inject mobile toggles
var _origInit = init;
init = function() {
  _origInit();
  setTimeout(injectMobileToggles, 100);
};

// ── MATCH GAME ENGINE ─────────────────────────────────────────
var matchState = {};
var CUR_GAME_CH = 0;

function getMatchData(n) {
  return (LANG === 'en' ? (MATCH_DATA_EN[n] || MATCH_DATA[n]) : MATCH_DATA[n]) || null;
}

function loadGame(n) {
  CUR_GAME_CH = n;
  var isHe = LANG === 'he';
  // update sidebar
  document.querySelectorAll('.game-sb-btn').forEach(function(b){ b.classList.remove('active'); });
  var btns = document.querySelectorAll('.game-sb-btn');
  if (btns[n]) btns[n].classList.add('active');
  var el = document.getElementById('gameContent');
  if (!el) return;
  var data = getMatchData(n);
  if (!data || !data.pairs || !data.pairs.length) {
    el.innerHTML = '<div style="text-align:center;padding:60px;color:var(--ink3)">אין משחק לפרק זה</div>';
    return;
  }
  if (!matchState[n]) matchState[n] = { phase: 'idle' };
  renderMatchForChapter(n);
  goTo('game');
}

function renderMatchForChapter(n) {
  var el = document.getElementById('gameContent');
  if (!el) return;
  var ms = matchState[n];
  if (!ms) return;
  if (ms.phase === 'idle') renderMatchIdle(n);
  else if (ms.phase === 'playing') renderMatchPlay(n);
  else renderMatchOver(n);
}

function renderMatchIdle(n) {
  var el = document.getElementById('gameContent');
  var data = getMatchData(n);
  var isHe = LANG === 'he';
  el.innerHTML = '<div class="game-start-card">' +
    '<div class="game-start-icon">🔗</div>' +
    '<div class="game-start-title">' + (isHe ? 'משחק התאמה' : 'Matching Game') + '</div>' +
    '<div class="game-start-desc">' + (isHe ? 'חבר כל מושג להגדרה המתאימה' : 'Connect each term to its definition') + '</div>' +
    '<div class="game-rules"><div class="game-rule">' + data.pairs.length + ' ' + (isHe ? 'זוגות' : 'pairs') + '</div></div>' +
    '<button class="match-btn-primary" onclick="matchBegin(' + n + ')">' + (isHe ? '▶ התחל' : '▶ Start') + '</button>' +
    '</div>';
}

function matchBegin(n) {
  var data = getMatchData(n);
  var pairs = data.pairs.slice(0, 8);
  function shuffle(a) {
    for (var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
    return a;
  }
  var terms = shuffle(pairs.map(function(p,i){return{idx:i,text:p[0]};}));
  var defs  = shuffle(pairs.map(function(p,i){return{idx:i,text:p[1]};}));
  matchState[n] = { phase:'playing', pairs:pairs, terms:terms, defs:defs, matched:[], errors:0, selTerm:-1, selDef:-1 };
  renderMatchPlay(n);
}

function renderMatchPlay(n) {
  var ms = matchState[n];
  var isHe = LANG === 'he';
  var total = ms.pairs.length, done = ms.matched.length;
  var pct = Math.round(done/total*100);
  var html = '<div class="match-game">' +
    '<div class="match-header"><span class="match-round-badge">' + (isHe ? 'משחק התאמה' : 'Matching') + '</span><span style="color:var(--ink3);font-size:.8rem">' + done + '/' + total + '</span></div>' +
    '<div class="match-progress-bar"><div class="match-progress-fill" style="width:' + pct + '%"></div></div>' +
    '<p class="match-instructions">' + (isHe ? 'לחץ מושג ← לחץ הגדרה' : 'Tap term → tap definition') + '</p>' +
    '<div class="match-area">' +
    '<div class="match-col"><div class="match-col-title">' + (isHe ? '📌 מושגים' : '📌 Terms') + '</div>';
  ms.terms.forEach(function(t,i){
    var isM = ms.matched.indexOf(t.idx) >= 0;
    var isSel = ms.selTerm === i;
    var cls = 'match-card' + (isM?' matched-correct':(isSel?' selected':''));
    html += '<div class="' + cls + '" data-type="t" data-n="' + n + '" data-i="' + i + '">' + t.text + '</div>';
  });
  html += '</div><div class="match-col"><div class="match-col-title">' + (isHe ? '📖 הגדרות' : '📖 Definitions') + '</div>';
  ms.defs.forEach(function(d,i){
    var isM = ms.matched.indexOf(d.idx) >= 0;
    var isSel = ms.selDef === i;
    var cls = 'match-card' + (isM?' matched-correct':(isSel?' selected':''));
    html += '<div class="' + cls + '" data-type="d" data-n="' + n + '" data-i="' + i + '">' + d.text + '</div>';
  });
  html += '</div></div>';
  if (ms.errors > 0) html += '<p style="text-align:center;font-size:.78rem;color:var(--ink3)">' + (isHe?'שגיאות':'Errors') + ': ' + ms.errors + '</p>';
  html += '</div>';
  document.getElementById('gameContent').innerHTML = html;
  // attach click handlers via event delegation
  var gc = document.getElementById('gameContent');
  if (gc) gc.addEventListener('click', function handler(e) {
    var card = e.target.closest('[data-type]');
    if (!card) return;
    gc.removeEventListener('click', handler);
    mClick(card.dataset.type, parseInt(card.dataset.n), parseInt(card.dataset.i));
  });
}

function mClick(type, n, idx) {
  var ms = matchState[n];
  if (!ms || ms.phase !== 'playing') return;
  var arr = type === 't' ? ms.terms : ms.defs;
  var item = arr[idx];
  if (ms.matched.indexOf(item.idx) >= 0) return;
  if (type === 't') ms.selTerm = idx; else ms.selDef = idx;
  if (ms.selTerm >= 0 && ms.selDef >= 0) {
    var tIdx = ms.terms[ms.selTerm].idx, dIdx = ms.defs[ms.selDef].idx;
    if (tIdx === dIdx) {
      ms.matched.push(tIdx); ms.selTerm = -1; ms.selDef = -1;
      if (ms.matched.length === ms.pairs.length) { ms.phase = 'over'; renderMatchOver(n); return; }
    } else {
      ms.errors++;
      var gc = document.getElementById('gameContent');
      var tEls = gc.querySelectorAll('.match-col:first-child .match-card');
      var dEls = gc.querySelectorAll('.match-col:last-child .match-card');
      if (tEls[ms.selTerm]) { tEls[ms.selTerm].classList.add('matched-wrong'); setTimeout(function(){tEls[ms.selTerm].classList.remove('matched-wrong','selected');},600); }
      if (dEls[ms.selDef])  { dEls[ms.selDef].classList.add('matched-wrong');  setTimeout(function(){dEls[ms.selDef].classList.remove('matched-wrong','selected');},600); }
      ms.selTerm = -1; ms.selDef = -1;
      setTimeout(function(){ renderMatchPlay(n); }, 700); return;
    }
  }
  renderMatchPlay(n);
}

function renderMatchOver(n) {
  var ms = matchState[n];
  var isHe = LANG === 'he';
  var medal = ms.errors === 0 ? '🏆' : ms.errors <= 2 ? '🥇' : ms.errors <= 5 ? '🥈' : '🥉';
  var _gc = document.getElementById('gameContent');
  _gc.innerHTML =
    '<div class="match-result">' +
    '<div style="font-size:52px;margin-bottom:8px">' + medal + '</div>' +
    '<div class="match-score-big">' + ms.pairs.length + '/' + ms.pairs.length + '</div>' +
    '<div class="match-score-label">' + (ms.errors===0?(isHe?'🎉 מושלם!':'🎉 Perfect!'):(ms.errors+' '+(isHe?'שגיאות':'errors'))) + '</div>' +
    '<div class="match-btns">' +
    '<button class="match-btn-ghost" data-again="' + n + '">' + (isHe?'🔄 שוב':'🔄 Again') + '</button>' +
    (n < CHAPTERS.length-1 ? '<button class="match-btn-primary" onclick="loadGame(' + (n+1) + ')">' + (isHe?'פרק הבא →':'Next Chapter →') + '</button>' : '') +
    '</div></div>';
  // attach again/next handlers
  var _gc2 = document.getElementById('gameContent');
  if (_gc2) {
    var againBtn = _gc2.querySelector('[data-again]');
    if (againBtn) againBtn.addEventListener('click', function() {
      var nn = parseInt(this.dataset.again);
      matchState[nn] = {phase:'idle'};
      renderMatchIdle(nn);
    });
  }
}

function buildGameSidebar() {
  var isHe = LANG === 'he';
  var sbTitle = document.getElementById('gameSbTitle');
  if (sbTitle) sbTitle.textContent = isHe ? 'פרקים' : 'Chapters';

function renderMatchGame(chId) {
  var el = document.getElementById('game-' + chId);
  if (!el) return;
  if (!state.game[chId]) state.game[chId] = {phase:'idle',sel:null,matched:[],pairs:[]};
  var gs = state.game[chId];
  if (gs.phase === 'idle' || !gs.pairs.length) {
    var d = getMatchData(chId);
    if (!d || !d.length) {
      el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text2)">אין התאמה לפרק זה</div>';
      return;
    }
    var p = d.slice();
    for (var i = p.length-1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)); var t=p[i];p[i]=p[j];p[j]=t; }
    gs.pairs = p; gs.matched = []; gs.sel = null; gs.phase = 'play';
  }
  buildMatchBoard(chId);
}

function buildMatchBoard(chId) {
  var el = document.getElementById('game-'+chId);
  var gs = state.game[chId], pairs = gs.pairs;
  var rights = pairs.map(function(p,i){return{text:p[1],idx:i};});
  for(var i=rights.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=rights[i];rights[i]=rights[j];rights[j]=t;}
  var ad = gs.matched.length===pairs.length;
  var isHe = currentLang==='he';
  var html = '<div class="match-board">';
  if(ad){html+='<div class="match-success">🎉 '+(isHe?'!כל הזוגות הותאמו':'All matched!')+'</div><div style="text-align:center;margin-top:12px"><button class="match-restart-btn" onclick="restartMatch('+chId+')">'+(isHe?'↺ שחק שוב':'↺ Play Again')+'</button></div>';}
  html+='<div class="match-cols"><div class="match-col">';
  for(var i=0;i<pairs.length;i++){var dn=gs.matched.indexOf(i)>=0,sn=gs.sel&&gs.sel.side==='left'&&gs.sel.idx===i;html+='<div class="match-card'+(dn?' match-done':'')+(sn?' match-sel':'')+'" data-side="left" data-idx="'+i+'" onclick="matchClick('+chId+',this)">'+pairs[i][0]+'</div>';}
  html+='</div><div class="match-col">';
  for(var i=0;i<rights.length;i++){var ri=rights[i],dn=gs.matched.indexOf(ri.idx)>=0,sn=gs.sel&&gs.sel.side==='right'&&gs.sel.ridx===i;html+='<div class="match-card'+(dn?' match-done':'')+(sn?' match-sel':'')+'" data-side="right" data-idx="'+ri.idx+'" data-ridx="'+i+'" onclick="matchClick('+chId+',this)">'+ri.text+'</div>';}
  html+='</div></div></div>';el.innerHTML=html;
}

function matchClick(chId,el){
  var gs=state.game[chId];if(!gs||gs.phase!=='play')return;
  var side=el.getAttribute('data-side'),idx=parseInt(el.getAttribute('data-idx')),ridx=el.hasAttribute('data-ridx')?parseInt(el.getAttribute('data-ridx')):-1;
  if(gs.matched.indexOf(idx)>=0)return;
  if(!gs.sel){gs.sel={side:side,idx:idx,ridx:ridx};buildMatchBoard(chId);return;}
  if(gs.sel.side===side){gs.sel={side:side,idx:idx,ridx:ridx};buildMatchBoard(chId);return;}
  var li=side==='left'?idx:gs.sel.idx,ri=side==='right'?idx:gs.sel.idx;
  gs.sel=null;
  if(li===ri){gs.matched.push(li);if(gs.matched.length===gs.pairs.length)gs.phase='done';buildMatchBoard(chId);}
  else{buildMatchBoard(chId);document.querySelectorAll('#game-'+chId+' .match-card').forEach(function(c){var ci=parseInt(c.getAttribute('data-idx')),cs=c.getAttribute('data-side');if((cs==='left'&&ci===li||cs==='right'&&ci===ri)&&gs.matched.indexOf(ci)<0){c.classList.add('match-wrong');setTimeout(function(){c.classList.remove('match-wrong');},600);}});}
}
