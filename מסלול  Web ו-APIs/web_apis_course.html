<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web & APIs — Professional Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=IBM+Plex+Sans+Hebrew:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --bg2: #e8edf3;
  --bg3: #dde3eb;
  --surface: #ffffff;
  --surface2: #f5f7fa;
  --border: rgba(0,180,100,0.18);
  --border2: rgba(0,180,100,0.35);
  --green: #00a85a;
  --green2: #008a49;
  --green-dim: rgba(0,168,90,0.08);
  --green-glow: rgba(0,168,90,0.25);
  --blue: #38bdf8;
  --amber: #fbbf24;
  --red: #f87171;
  --purple: #a78bfa;
  --text: #1e2530;
  --text-dim: #2d3a4a;
  --text-muted: #4a5568;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'IBM Plex Sans Hebrew', sans-serif;
  --radius: 10px;
  --sidebar: 280px;
  --tab-h: 52px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Light subtle pattern overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 80% 20%, rgba(0,168,90,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ===== HEADER ===== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: rgba(240,244,248,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 200;
}
.header-logo {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 800;
  color: var(--green);
  text-shadow: 0 0 20px var(--green-glow);
  letter-spacing: -1px;
  white-space: nowrap;
}
.header-logo span { color: var(--text-muted); font-weight: 400; }
.header-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
.header-chapter-name {
  font-size: 13px;
  color: var(--text-dim);
  flex: 1;
  font-family: var(--mono);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.header-xp {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.xp-bar-wrap {
  width: 120px;
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.xp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green2), var(--green));
  border-radius: 3px;
  transition: width 0.6s ease;
  box-shadow: 0 0 8px var(--green-glow);
}
.xp-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--green);
  white-space: nowrap;
}
.mobile-btn {
  display: none;
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--green);
  padding: 6px 10px;
  cursor: pointer;
  font-size: 16px;
}

/* ===== SIDEBAR ===== */
.sidebar {
  position: fixed;
  top: 56px; right: 0; bottom: 0;
  width: var(--sidebar);
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 100;
  padding: 16px 0;
}
.sidebar { overflow-y: auto; }
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.sidebar-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 0 16px 8px;
}
.ch-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: none;
  border: none;
  cursor: pointer;
  text-align: right;
  transition: background 0.15s;
  border-right: 3px solid transparent;
  position: relative;
}
.ch-btn:hover { background: var(--green-dim); }
.ch-btn.active {
  background: var(--green-dim);
  border-right-color: var(--green);
}
.ch-num {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--green);
  background: rgba(0,255,136,0.1);
  border: 1px solid rgba(0,255,136,0.2);
  border-radius: 4px;
  width: 28px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.ch-title-text {
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 500;
  line-height: 1.3;
}
.ch-btn.active .ch-title-text { color: var(--text); }
.ch-done {
  margin-right: auto;
  color: var(--green);
  font-size: 13px;
  flex-shrink: 0;
}
.ch-stars {
  display: flex;
  gap: 2px;
  font-size: 10px;
  flex-shrink: 0;
}

/* ===== MAIN ===== */
.main {
  margin-right: var(--sidebar);
  padding-top: 56px;
  min-height: 100vh;
}

/* ===== CHAPTER ===== */
.chapter { display: none; }
.chapter.active { display: block; }

.ch-hero {
  padding: 40px 40px 0;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(0,168,90,0.05) 0%, transparent 60%);
  position: relative;
  overflow: hidden;
}
.ch-hero::before {
  content: attr(data-num);
  position: absolute;
  left: 20px;
  top: -10px;
  font-family: var(--mono);
  font-size: 120px;
  font-weight: 800;
  color: rgba(0,168,90,0.07);
  line-height: 1;
  pointer-events: none;
}
.ch-tag {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--green);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.ch-title {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
}
.ch-desc {
  font-size: 15px;
  color: var(--text-dim);
  margin-bottom: 24px;
  max-width: 600px;
  line-height: 1.6;
}

/* ===== TABS ===== */
.tabs-bar {
  display: flex;
  gap: 0;
  border-top: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 56px;
  z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.tab-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 20px;
  height: var(--tab-h);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  transition: all 0.15s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text-dim); background: var(--green-dim); }
.tab-btn.active {
  color: var(--green);
  border-bottom-color: var(--green);
  background: var(--green-dim);
}
.tab-icon { font-size: 16px; }

/* ===== TAB PANELS ===== */
.tab-panels { padding: 32px 40px 60px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ===== CONTENT STYLES ===== */
.section-title {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin: 28px 0 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.prose {
  font-size: 15px;
  color: var(--text-dim);
  line-height: 1.75;
  margin-bottom: 16px;
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin: 16px 0; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  transition: border-color 0.2s, transform 0.2s;
}
.card:hover { border-color: var(--border2); transform: translateY(-2px); }
.card-icon { font-size: 24px; margin-bottom: 10px; }
.card-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; font-family: var(--mono); }
.card-body { font-size: 13px; color: var(--text-dim); line-height: 1.6; }

.table-wrap { overflow-x: auto; margin: 16px 0; border-radius: var(--radius); border: 1px solid var(--border); }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { background: var(--surface2); color: var(--green); font-family: var(--mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 10px 14px; text-align: right; border-bottom: 1px solid var(--border); }
.data-table td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--text-dim); vertical-align: top; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--green-dim); }

.code-block {
  background: #1e2a38;
  border: 1px solid rgba(0,168,90,0.2);
  border-radius: var(--radius);
  padding: 20px;
  font-family: var(--mono);
  font-size: 13px;
  color: #a8d8a8;
  overflow-x: auto;
  margin: 16px 0;
  position: relative;
  line-height: 1.6;
}
.code-block::before {
  content: '// code';
  position: absolute;
  top: 10px;
  left: 14px;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 1px;
}
.inline-code {
  font-family: var(--mono);
  font-size: 12px;
  background: rgba(0,255,136,0.08);
  border: 1px solid rgba(0,255,136,0.15);
  border-radius: 4px;
  padding: 1px 6px;
  color: var(--green);
}
.callout {
  border-radius: var(--radius);
  padding: 16px 20px;
  margin: 16px 0;
  font-size: 14px;
  line-height: 1.6;
  border-right: 3px solid;
}
.callout-info { background: rgba(56,189,248,0.06); border-color: var(--blue); color: var(--text-dim); }
.callout-warn { background: rgba(251,191,36,0.06); border-color: var(--amber); color: var(--text-dim); }
.callout-danger { background: rgba(248,113,113,0.06); border-color: var(--red); color: var(--text-dim); }
.callout-success { background: rgba(0,255,136,0.05); border-color: var(--green); color: var(--text-dim); }

.method { font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 3px; }
.get { background: rgba(0,255,136,0.15); color: var(--green); }
.post { background: rgba(251,191,36,0.15); color: var(--amber); }
.put { background: rgba(56,189,248,0.15); color: var(--blue); }
.delete { background: rgba(248,113,113,0.15); color: var(--red); }
.patch { background: rgba(167,139,250,0.15); color: var(--purple); }

.incident-box {
  background: rgba(248,113,113,0.04);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: var(--radius);
  padding: 20px;
  margin: 20px 0;
}
.incident-title { font-size: 13px; font-weight: 700; color: var(--red); font-family: var(--mono); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.incident-body { font-size: 14px; color: var(--text-dim); line-height: 1.65; }

.flow-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin: 16px 0; }
.flow-step { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 12px 16px; text-align: center; min-width: 90px; }
.flow-step-icon { font-size: 22px; margin-bottom: 4px; }
.flow-step-label { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
.flow-arrow { color: var(--green); font-size: 20px; font-weight: 700; flex-shrink: 0; }

.steps { margin: 16px 0; }
.step { display: flex; gap: 14px; margin-bottom: 16px; }
.step-num { min-width: 30px; height: 30px; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--green); flex-shrink: 0; }
.step-content { flex: 1; padding-top: 3px; }
.step-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.step-desc { font-size: 13px; color: var(--text-dim); line-height: 1.55; }

/* ===== QUIZ ===== */
.quiz-wrap { max-width: 720px; }
.quiz-progress-bar { display: flex; gap: 6px; margin-bottom: 24px; }
.quiz-progress-pip { flex: 1; height: 4px; border-radius: 2px; background: var(--surface2); transition: background 0.3s; }
.quiz-progress-pip.done { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }
.quiz-progress-pip.active { background: var(--amber); }

.quiz-q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  margin-bottom: 20px;
  display: none;
}
.quiz-q-card.active { display: block; animation: fadeSlideIn 0.25s ease; }
@keyframes fadeSlideIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

.quiz-q-meta { font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin-bottom: 12px; display: flex; justify-content: space-between; }
.quiz-q-text { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 20px; line-height: 1.5; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-opt {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: right;
  font-size: 14px;
  color: var(--text-dim);
  width: 100%;
}
.quiz-opt:hover:not(.disabled) { border-color: var(--border2); color: var(--text); background: var(--surface2); }
.quiz-opt.selected { border-color: var(--blue); background: rgba(56,189,248,0.08); color: var(--text); }
.quiz-opt.correct { border-color: var(--green) !important; background: rgba(0,255,136,0.08) !important; color: var(--green) !important; }
.quiz-opt.wrong { border-color: var(--red) !important; background: rgba(248,113,113,0.08) !important; color: var(--red) !important; }
.quiz-opt.disabled { cursor: not-allowed; }
.opt-letter { font-family: var(--mono); font-size: 12px; font-weight: 700; width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: var(--surface2); color: var(--text-muted); flex-shrink: 0; transition: all 0.15s; }
.quiz-opt.selected .opt-letter { background: var(--blue); color: #fff; }
.quiz-opt.correct .opt-letter { background: var(--green); color: #000; }
.quiz-opt.wrong .opt-letter { background: var(--red); color: #fff; }

.quiz-explanation { background: rgba(0,255,136,0.04); border: 1px solid rgba(0,255,136,0.15); border-radius: 8px; padding: 14px 18px; margin-top: 16px; font-size: 13px; color: var(--text-dim); line-height: 1.65; animation: fadeSlideIn 0.2s ease; }
.quiz-explanation strong { color: var(--green); font-family: var(--mono); }

.quiz-nav { display: flex; gap: 10px; justify-content: space-between; align-items: center; margin-top: 20px; }
.btn { padding: 10px 22px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; font-family: var(--sans); }
.btn-primary { background: var(--green); color: #000; }
.btn-primary:hover { background: var(--green2); box-shadow: 0 0 16px var(--green-glow); }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
.btn-ghost { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }

.quiz-result-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 36px; text-align: center; display: none; animation: fadeSlideIn 0.3s ease; }
.quiz-result-card.visible { display: block; }
.result-emoji { font-size: 56px; margin-bottom: 12px; }
.result-score { font-family: var(--mono); font-size: 48px; font-weight: 800; color: var(--green); text-shadow: 0 0 30px var(--green-glow); margin-bottom: 8px; }
.result-label { font-size: 16px; color: var(--text-dim); margin-bottom: 24px; }
.result-stars { font-size: 28px; margin-bottom: 20px; letter-spacing: 4px; }

/* ===== LAB ===== */
.lab-wrap { max-width: 800px; }
.lab-ex {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 16px;
  overflow: hidden;
}
.lab-ex-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 18px 20px;
  cursor: pointer;
  transition: background 0.15s;
}
.lab-ex-header:hover { background: var(--green-dim); }
.lab-num {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--green);
  background: rgba(0,255,136,0.1);
  border: 1px solid rgba(0,255,136,0.2);
  border-radius: 6px;
  width: 32px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.lab-q { flex: 1; font-size: 15px; color: var(--text); font-weight: 500; line-height: 1.5; }
.lab-toggle-icon { color: var(--green); font-size: 18px; transition: transform 0.2s; flex-shrink: 0; }
.lab-ex.open .lab-toggle-icon { transform: rotate(180deg); }
.lab-answer-wrap {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.lab-ex.open .lab-answer-wrap { max-height: 800px; }
.lab-answer-inner { padding: 0 20px 20px; border-top: 1px solid var(--border); padding-top: 16px; }
.lab-answer-pre {
  background: #1e2a38;
  border: 1px solid rgba(0,168,90,0.2);
  border-radius: 8px;
  padding: 16px;
  font-family: var(--mono);
  font-size: 13px;
  color: #a8d8a8;
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.6;
  margin-bottom: 12px;
}
.lab-explain { font-size: 13px; color: var(--text-muted); line-height: 1.65; background: rgba(0,255,136,0.03); border-right: 3px solid rgba(0,255,136,0.2); border-radius: 4px; padding: 10px 14px; }

/* ===== GAME ===== */
.game-wrap { max-width: 680px; }
.game-idle, .game-playing, .game-over { display: none; }
.game-idle.visible, .game-playing.visible, .game-over.visible { display: block; }

.game-start-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 44px;
  text-align: center;
}
.game-icon { font-size: 64px; margin-bottom: 16px; }
.game-start-title { font-family: var(--mono); font-size: 24px; font-weight: 800; color: var(--green); text-shadow: 0 0 20px var(--green-glow); margin-bottom: 12px; }
.game-start-desc { font-size: 15px; color: var(--text-dim); line-height: 1.6; margin-bottom: 28px; }
.game-rules { display: flex; gap: 14px; justify-content: center; margin-bottom: 28px; flex-wrap: wrap; }
.game-rule { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-family: var(--mono); font-size: 13px; color: var(--text-dim); }
.game-rule span { color: var(--green); font-weight: 700; }

.game-hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 20px;
}
.hud-timer { font-family: var(--mono); font-size: 28px; font-weight: 800; color: var(--green); text-shadow: 0 0 15px var(--green-glow); transition: color 0.3s; }
.hud-timer.urgent { color: var(--red); text-shadow: 0 0 15px rgba(248,113,113,0.4); animation: pulse 0.5s ease infinite alternate; }
@keyframes pulse { from { opacity: 1; } to { opacity: 0.6; } }
.hud-score { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--amber); }
.hud-qnum { font-family: var(--mono); font-size: 13px; color: var(--text-muted); }

.game-q-text {
  font-size: 19px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 20px;
  line-height: 1.5;
  min-height: 56px;
}
.game-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.game-opt {
  padding: 14px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;

Heartbeat:

}, 30000);

ws.onmessage = (e) => {
  if (JSON.parse(e.data).type === 'pong') clearTimeout(pongTimeout);
};`,e:"Heartbeat מזהה חיבורים מתים. ללא זה — resources מבוזבזים על connections שכבר מתו."},
    {q:"איך מממשים 'is typing...' בלי להציף שרת?",a:`Throttle — שלח לכל היותר פעם בשנייה:

});

Debounce — stopped typing אחרי 2 שניות:

input.addEventListener('input', () => {

  return userIds.map(id => orders.filter(o => o.user_id === id));

# 2 queries במקום 101!`,e:"DataLoader = batching. מאסוף IDs ומוציא בשאילתה אחת עם IN()."},

הגנות:

3. Timeout: kill אחרי 30 שניות

✅ Frontend teams רוצים אוטונומיה
✅ Real-time subscriptions

2. N+1 — כמה queries לבקשה? > 5 = בעיה
3. Redis miss rate: hit rate < 80% = בעיה
4. Response size: > 1MB = שקול pagination
5. External API calls synchronously?`,e:"DB indexes → N+1 → cache miss rate → response size → external calls."},
    {q:"Cache strategy לAPI תחזית מזג אוויר — כל 10 דקות.",a:`async function getWeather(city) {
  const key = \`weather:\${city}:\${Math.floor(Date.now()/600000)}\`;
  // time bucket = invalidation אוטומטית כל 10 דקות!
  
  const cached = await r.get(key);
  if (cached) return JSON.parse(cached); // ~0.1ms
  
  const fresh = await fetchWeatherAPI(city); // ~200ms
  await r.setex(key, 600, JSON.stringify(fresh));
  return fresh;
}

1. CDN — חוסך 80-90% תנועה לשרת
2. Horizontal scaling + load balancer
3. Rate limiting (429 + Retry-After)
4. Read replicas לDB
5. Queue לפעולות כבדות → 202 Accepted + job_id
6. Circuit Breaker — fail fast כשdownstream נכשל`,e:"CDN → Rate limit → Horizontal scale → Read replicas → Queue לasync."},
    {q:"מה gzip compression עושה ל-API responses?",a:`גדלים:

app.use(compression({threshold: 1024}));

nginx:
gzip on;
gzip_types application/json text/plain;
gzip_comp_level 6;

Brotli (br) עדיף על gzip ב-~15%, תמיכה 95%+ דפדפנים.`,e:"gzip חוסך 80-90% bandwidth. תמיד compress JSON responses. Brotli עדיף מgzip."}

// ==================== LANG TOGGLE ====================

function toggleLang() {
  currentLang = currentLang === 'he' ? 'en' : 'he';
  applyLang(currentLang);
}

function applyLang(lang) {
  const L = LANG[lang];
  const html = document.documentElement;
  html.setAttribute('lang', L.htmlLang);
  html.setAttribute('dir', L.dir);

  // Lang button
  document.getElementById('langToggleBtn').innerHTML =
    `<span class="lang-flag">${lang === 'he' ? '🇬🇧' : '🇮🇱'}</span>${lang === 'he' ? 'EN' : 'HE'}`;

  // Sidebar label
  document.querySelector('.sidebar-label').textContent = L.sidebarLabel;

  // Chapter nav buttons names
  L.chapterNames.forEach((name, i) => {
    const el = document.querySelector(`#nav-${i} .ch-title-text`);
    if (el) el.textContent = name;
  });

  // Chapter hero sections
  for (let i = 0; i <= 7; i++) {
    const ch = document.getElementById('ch-' + i);
    if (!ch) continue;

    const tagEl = ch.querySelector('.ch-tag');
    if (tagEl) tagEl.textContent = L.chapterTags[i];

    const titleEl = ch.querySelector('.ch-title');
    if (titleEl) titleEl.textContent = L.chapterNames[i];

    const descEl = ch.querySelector('.ch-desc');
    if (descEl) descEl.textContent = L.chapterDescs[i];

    // Tab buttons
    const tabBtns = ch.querySelectorAll('.tab-btn');
    tabBtns.forEach((btn, ti) => {
      if (L.tabs[ti]) btn.innerHTML = L.tabs[ti];
    });
  }

  // Header chapter name
  const nameEl = document.getElementById('headerChapterName');
  if (nameEl) nameEl.textContent = L.chapterNames[state.currentChapter];

  // Re-render all quiz/lab/game panels (clear cached renders)
  for (let i = 0; i <= 7; i++) {
    const qEl = document.getElementById('quiz-' + i);
    if (qEl) { qEl.innerHTML = ''; delete qEl.dataset.rendered; }
    const lEl = document.getElementById('lab-' + i);
    if (lEl) { lEl.innerHTML = ''; delete lEl.dataset.rendered; }
    const gEl = document.getElementById('game-' + i);
    if (gEl) { gEl.innerHTML = ''; state.gameState[i] = {phase:'idle'}; }
    // Reset quiz state
    state.quizState[i] = null;
  }

  // Re-render current chapter's active tab
  const activeTab = state.tabState[state.currentChapter] || 'learn';
  if (activeTab === 'quiz') renderQuiz(state.currentChapter);
  if (activeTab === 'lab') renderLab(state.currentChapter);
  if (activeTab === 'game') renderGame(state.currentChapter);
}

// ==================== STATE ====================
const state = {
  currentChapter: 0,
  tabState: {},      // {chId: tabName}
  quizState: {},     // {chId: {qi, answers, submitted, score}}
  gameState: {},     // {chId: {phase:'idle'|'playing'|'over', score, qi, timer, ...}}
  xp: 0,
  stars: {}          // {chId: 0-3}
};

// ==================== NAVIGATION ====================
function showChapter(n) {
  document.querySelectorAll('.chapter').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('ch-' + n).classList.add('active');
  document.getElementById('nav-' + n).classList.add('active');
  state.currentChapter = n;
  document.getElementById('headerChapterName').textContent =
    document.querySelector('#nav-' + n + ' .ch-title-text').textContent;
  document.getElementById('sidebar').classList.remove('open');
  window.scrollTo(0, 0);
  // Restore tab
  const savedTab = state.tabState[n] || 'learn';
  activateTabInternal(n, savedTab);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ==================== TABS ====================
function showTab(chId, tabName) {
  state.tabState[chId] = tabName;
  activateTabInternal(chId, tabName);
}

function activateTabInternal(chId, tabName) {
  const ch = document.getElementById('ch-' + chId);
  if (!ch) return;
  // Update buttons
  ch.querySelectorAll('.tab-btn').forEach(btn => {
    const t = btn.getAttribute('onclick').match(/'(\w+)'\)/)?.[1];
    btn.classList.toggle('active', t === tabName);
  });
  // Update panels
  ch.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === chId + '-' + tabName);
  });
  // Lazy render
  if (tabName === 'quiz') renderQuiz(chId);
  if (tabName === 'lab') renderLab(chId);
  if (tabName === 'game') renderGame(chId);
}

// ==================== QUIZ ====================
function renderQuiz(chId) {
  const container = document.getElementById('quiz-' + chId);
  if (!container || container.dataset.rendered) return;
  container.dataset.rendered = '1';

  if (!state.quizState[chId]) {
    state.quizState[chId] = {qi: 0, answers: {}, submitted: false, score: 0};
  }
  const qs = getQuizData(chId);

  const pips = qs.map((_, i) => `<div class="quiz-progress-pip" id="qpip-${chId}-${i}"></div>`).join('');
  const cards = qs.map((q, i) => `
    <div class="quiz-q-card" id="qcard-${chId}-${i}">
      <div class="quiz-q-meta">
        <span>${CONTENT[currentLang].question} ${i+1} ${CONTENT[currentLang].of} ${qs.length}</span>
        <span id="qcard-status-${chId}-${i}"></span>
      </div>
      <div class="quiz-q-text">${q.q}</div>
      <div class="quiz-options">
        ${q.o.map((opt, oi) => `
          <button class="quiz-opt" id="qopt-${chId}-${i}-${oi}" onclick="quizSelectAnswer(${chId},${i},${oi})">
            <span class="opt-letter">${(currentLang === 'en' ? ['A','B','C','D'] : ['א','ב','ג','ד'])[oi]}</span>
            ${opt}
          </button>`).join('')}
      </div>
      <div class="quiz-explanation" id="qexp-${chId}-${i}" style="display:none">
        <strong>${CONTENT[currentLang].quizExplain}</strong> ${q.e}
      </div>
    </div>`).join('');

  container.innerHTML = `
    <div class="quiz-progress-bar" id="qprogbar-${chId}">${pips}</div>
    ${cards}
    <div class="quiz-result-card" id="qresult-${chId}">
      <div class="result-emoji" id="qresult-emoji-${chId}">🎉</div>
      <div class="result-score" id="qresult-score-${chId}">0/5</div>
      <div class="result-label" id="qresult-label-${chId}"></div>
      <div class="result-stars" id="qresult-stars-${chId}">⭐⭐⭐</div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:8px">
        <button class="btn btn-ghost" id="qresult-reset-${chId}" onclick="quizReset(${chId})"></button>
        <button class="btn btn-primary" id="qresult-lab-${chId}" onclick="showTab(${chId},'lab')"></button>
      </div>
    </div>
    <div class="quiz-nav" id="qnav-${chId}">
      <button class="btn btn-ghost" id="qprev-${chId}" onclick="quizNav(${chId},-1)" disabled></button>
      <button class="btn btn-primary" id="qnext-${chId}" onclick="quizNav(${chId},1)" disabled></button>
    </div>`;

  updateQuizDisplay(chId);
}

function updateQuizDisplay(chId) {
  const st = state.quizState[chId];
  const qs = getQuizData(chId);
  if (!st) return;
  const {qi, answers, submitted} = st;

  qs.forEach((q, i) => {
    const card = document.getElementById(`qcard-${chId}-${i}`);
    if (!card) return;
    card.classList.toggle('active', i === qi);
    const pip = document.getElementById(`qpip-${chId}-${i}`);
    if (pip) {
      pip.className = 'quiz-progress-pip' + (i < qi || submitted ? ' done' : i === qi ? ' active' : '');
    }
  });

  const prevBtn = document.getElementById(`qprev-${chId}`);
  const nextBtn = document.getElementById(`qnext-${chId}`);
  const resetBtn = document.getElementById(`qresult-reset-${chId}`);
  const labBtn = document.getElementById(`qresult-lab-${chId}`);
  const L = CONTENT[currentLang];
  if (resetBtn) resetBtn.textContent = L.quizAgain;
  if (labBtn) labBtn.textContent = L.quizToLab;
  if (prevBtn) { prevBtn.textContent = L.quizPrev; prevBtn.disabled = qi === 0; }
  if (nextBtn) {
    const answered = answers[qi] !== undefined;
    if (qi < qs.length - 1) {
      nextBtn.textContent = L.quizNext;
      nextBtn.disabled = !answered;
    } else {
      nextBtn.textContent = L.quizSubmit;
      nextBtn.disabled = Object.keys(answers).length < qs.length;
      nextBtn.onclick = () => quizSubmit(chId);
    }
  }
}

function quizSelectAnswer(chId, qi, oi) {
  const st = state.quizState[chId];
  if (!st || st.submitted) return;
  st.answers[qi] = oi;

  // Update visuals
  const qs = getQuizData(chId);
  qs[qi].o.forEach((_, o) => {
    const btn = document.getElementById(`qopt-${chId}-${qi}-${o}`);
    if (btn) btn.classList.toggle('selected', o === oi);
  });
  updateQuizDisplay(chId);
}

function quizNav(chId, dir) {
  const st = state.quizState[chId];
  if (!st) return;
  st.qi = Math.max(0, Math.min(getQuizData(chId).length - 1, st.qi + dir));
  updateQuizDisplay(chId);
}

function quizSubmit(chId) {
  const st = state.quizState[chId];
  if (!st) return;
  const qs = getQuizData(chId);
  let score = 0;
  qs.forEach((q, i) => {
    const correct = q.a;
    const chosen = st.answers[i];
    qs[i].o.forEach((_, oi) => {
      const btn = document.getElementById(`qopt-${chId}-${i}-${oi}`);
      if (!btn) return;
      btn.classList.add('disabled');
      if (oi === correct) btn.classList.add('correct');
      else if (oi === chosen) btn.classList.add('wrong');
      btn.classList.remove('selected');
    });
    const exp = document.getElementById(`qexp-${chId}-${i}`);
    if (exp) exp.style.display = 'block';
    if (chosen === correct) score++;
  });
  st.submitted = true;
  st.score = score;

  // Stars
  const starCount = score >= 5 ? 3 : score >= 4 ? 2 : score >= 3 ? 1 : 0;
  state.stars[chId] = Math.max(state.stars[chId] || 0, starCount);
  addXP(score * 10);
  updateStars(chId);

  // Show result
  document.getElementById(`qnav-${chId}`).style.display = 'none';
  const result = document.getElementById(`qresult-${chId}`);
  result.classList.add('visible');
  const L = CONTENT[currentLang];
  document.getElementById(`qresult-score-${chId}`).textContent = `${score}/${qs.length}`;
  const emojis = ['😔','😅','🙂','😊','🎉','🏆'];
  document.getElementById(`qresult-emoji-${chId}`).textContent = emojis[score];
  document.getElementById(`qresult-label-${chId}`).textContent = L.resultLabels[score];
  document.getElementById(`qresult-stars-${chId}`).textContent = '⭐'.repeat(starCount) + '☆'.repeat(3 - starCount);
  const resetBtn = document.getElementById(`qresult-reset-${chId}`);
  const labBtn = document.getElementById(`qresult-lab-${chId}`);
  if (resetBtn) resetBtn.textContent = L.quizAgain;
  if (labBtn) labBtn.textContent = L.quizToLab;

  // Show all cards
  qs.forEach((_, i) => {
    const card = document.getElementById(`qcard-${chId}-${i}`);
    if (card) card.classList.add('active');
  });
}

function quizReset(chId) {
  state.quizState[chId] = {qi: 0, answers: {}, submitted: false, score: 0};
  const container = document.getElementById('quiz-' + chId);
  if (container) {
    delete container.dataset.rendered;
    container.innerHTML = '';
  }
  renderQuiz(chId);
}

// ==================== LAB ====================
function renderLab(chId) {
  const container = document.getElementById('lab-' + chId);
  if (!container || container.dataset.rendered) return;
  container.dataset.rendered = '1';
  const exs = getLabData(chId);
  container.innerHTML = exs.map((ex, i) => `
    <div class="lab-ex" id="labex-${chId}-${i}">
      <div class="lab-ex-header" onclick="toggleLab(${chId},${i})">
        <span class="lab-num">${i+1}</span>
        <span class="lab-q">${ex.q}</span>
        <span class="lab-toggle-icon">▼</span>
      </div>
      <div class="lab-answer-wrap">
        <div class="lab-answer-inner">
          <div class="lab-answer-pre">${ex.a}</div>
          <div class="lab-explain"><strong>${CONTENT[currentLang].labExplain}</strong> ${ex.e}</div>
        </div>
      </div>
    </div>`).join('');
}

function toggleLab(chId, i) {
  const el = document.getElementById(`labex-${chId}-${i}`);
  if (el) {
    el.classList.toggle('open');
    if (el.classList.contains('open')) addXP(5);
  }
}

// ==================== GAME ====================
let gameTimerInterval = null;

function renderGame(chId) {
  const container = document.getElementById('game-' + chId);
  if (!container) return;
  if (!state.gameState[chId]) state.gameState[chId] = {phase: 'idle'};
  const gs = state.gameState[chId];

  if (gs.phase === 'idle') {
    const L = CONTENT[currentLang];
    const gqs = getGameData(chId);
    container.innerHTML = `
      <div class="game-idle visible">
        <div class="game-start-card">
          <div class="game-icon">🎮</div>
          <div class="game-start-title">${L.gameTitle}</div>
          <p class="game-start-desc">${L.gameDesc}</p>
          <div class="game-rules">
            <div class="game-rule">⏱️ <span>60</span> ${L.gameSeconds}</div>
            <div class="game-rule">❓ <span>${gqs.length}</span> ${L.gameQuestions}</div>
            <div class="game-rule">🏆 <span>${L.gameXP}</span></div>
          </div>
          <button class="btn btn-primary" style="font-size:16px;padding:14px 40px" onclick="gameStart(${chId})">${L.gameStart}</button>
          ${buildLeaderboard(chId)}
        </div>
      </div>`;
  } else if (gs.phase === 'playing') {
    renderGamePlaying(chId);
  } else {
    renderGameOver(chId);
  }
}

function gameStart(chId) {
  const qs = getGameData(chId);
  const shuffled = [...qs].sort(() => Math.random() - 0.5);
  state.gameState[chId] = {
    phase: 'playing',
    qs: shuffled,
    qi: 0,
    score: 0,
    timeLeft: 60,
    answered: false
  };
  renderGame(chId);
  startGameTimer(chId);
}

function renderGamePlaying(chId) {
  const container = document.getElementById('game-' + chId);
  const gs = state.gameState[chId];
  if (!gs || gs.phase !== 'playing') return;
  const q = gs.qs[gs.qi];
  if (!q) { gameOver(chId); return; }

  container.innerHTML = `
    <div class="game-playing visible">
      <div class="game-hud">
        <div class="hud-timer ${gs.timeLeft <= 10 ? 'urgent' : ''}" id="game-timer-${chId}">${gs.timeLeft}</div>
        <div class="hud-qnum">${gs.qi + 1} / ${gs.qs.length}</div>
        <div class="hud-score">⭐ ${gs.score}</div>
      </div>
      <div class="game-q-text">${q.q}</div>
      <div class="game-opts">
        ${q.o.map((opt, i) => `<button class="game-opt" id="gopt-${chId}-${i}" onclick="gameAnswer(${chId},${i})">${opt}</button>`).join('')}
      </div>
      <div class="game-feedback" id="game-feedback-${chId}"></div>
    </div>`;
}

function startGameTimer(chId) {
  clearInterval(gameTimerInterval);
  gameTimerInterval = setInterval(() => {
    const gs = state.gameState[chId];
    if (!gs || gs.phase !== 'playing') { clearInterval(gameTimerInterval); return; }
    gs.timeLeft--;
    const timerEl = document.getElementById(`game-timer-${chId}`);
    if (timerEl) {
      timerEl.textContent = gs.timeLeft;
      timerEl.className = 'hud-timer' + (gs.timeLeft <= 10 ? ' urgent' : '');
    }
    if (gs.timeLeft <= 0) { clearInterval(gameTimerInterval); gameOver(chId); }
  }, 1000);
}

function gameAnswer(chId, chosen) {
  const gs = state.gameState[chId];
  if (!gs || gs.answered) return;
  gs.answered = true;
  const q = gs.qs[gs.qi];
  const correct = q.a === chosen;

  // Visual feedback
  document.querySelectorAll(`#game-${chId} .game-opt`).forEach(b => b.classList.add('disabled'));
  document.getElementById(`gopt-${chId}-${chosen}`)?.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) document.getElementById(`gopt-${chId}-${q.a}`)?.classList.add('correct');

  const fb = document.getElementById(`game-feedback-${chId}`);
  if (fb) {
    fb.textContent = correct ? '+10 ✓' : '✗';
    fb.className = 'game-feedback ' + (correct ? 'correct-text' : 'wrong-text');
  }

  if (correct) { gs.score += 10; addXP(10); }

  setTimeout(() => {
    gs.qi++;
    gs.answered = false;
    if (gs.qi >= gs.qs.length) { gameOver(chId); return; }
    renderGamePlaying(chId);
    startGameTimer(chId); // re-attach timer updates to new DOM
  }, 900);
}

function gameOver(chId) {
  clearInterval(gameTimerInterval);
  const gs = state.gameState[chId];
  if (!gs) return;
  gs.phase = 'over';

  // Save to leaderboard
  const lbKey = `lb-${chId}`;
  let lb = JSON.parse(localStorage.getItem(lbKey) || '[]');
  lb.push({name: currentLang === 'en' ? 'You' : 'אתה', score: gs.score, ts: Date.now()});
  lb.sort((a, b) => b.score - a.score);
  lb = lb.slice(0, 5);
  try { localStorage.setItem(lbKey, JSON.stringify(lb)); } catch(e) {}

  const container = document.getElementById('game-' + chId);
  const total = gs.qs.length * 10;
  const pct = Math.round((gs.score / total) * 100);
  const medal = gs.score >= total * 0.8 ? '🏆' : gs.score >= total * 0.5 ? '🥈' : '🥉';
  const L = CONTENT[currentLang];
  container.innerHTML = `
    <div class="game-over visible">
      <div class="game-over-card">
        <div style="font-size:52px;margin-bottom:10px">${medal}</div>
        <div class="game-over-score">${gs.score}</div>
        <div class="game-over-title">${L.points} · ${pct}${L.pct}</div>
        ${buildLeaderboard(chId)}
        <div style="display:flex;gap:10px;justify-content:center;margin-top:20px">
          <button class="btn btn-ghost" onclick="gameRestart(${chId})">${L.gameAgain}</button>
          <button class="btn btn-primary" onclick="showTab(${chId},'cheat')">${L.gameToCheat}</button>
        </div>
      </div>
    </div>`;
}

function gameRestart(chId) {
  state.gameState[chId] = {phase: 'idle'};
  const container = document.getElementById('game-' + chId);
  if (container) container.innerHTML = '';
  renderGame(chId);
}

function buildLeaderboard(chId) {
  let lb = [];
  try { lb = JSON.parse(localStorage.getItem(`lb-${chId}`) || '[]'); } catch(e) {}
  if (!lb.length) return '';
  const medals = ['🥇','🥈','🥉','4','5'];
  const cls = ['gold','silver','bronze','normal','normal'];
  const rows = lb.map((e, i) => `
    <div class="lb-row ${cls[i]}">
      <span class="lb-rank">${medals[i]}</span>
      <span class="lb-name">${e.name || (currentLang === 'en' ? 'Player' : 'שחקן')}</span>
      <span class="lb-pts">${e.score} ${CONTENT[currentLang].points}</span>
    </div>`).join('');
  return `<div class="leaderboard"><div class="lb-title">${CONTENT[currentLang].lbTitle}</div>${rows}</div>`;
}

// ==================== XP & STARS ====================
function addXP(amount) {
  state.xp += amount;
  const maxXP = 8 * (5 * 10 + 4 * 5 + 8 * 10);
  const pct = Math.min(100, (state.xp / maxXP) * 100);
  document.getElementById('xpBar').style.width = pct + '%';
  document.getElementById('xpLabel').textContent = state.xp + ' XP';
}

function updateStars(chId) {
  const el = document.getElementById('stars-' + chId);
  if (!el) return;
  const s = state.stars[chId] || 0;
  el.textContent = '⭐'.repeat(s) + '☆'.repeat(3 - s);
}

let currentLang = 'he';

// ==================== I18N ENGINE ====================

function toggleLang() {
  currentLang = currentLang === 'he' ? 'en' : 'he';
  applyLang(currentLang);
}

function applyLang(lang) {
  const L = CONTENT[lang];
  const html = document.documentElement;
  html.setAttribute('lang', L.htmlLang);
  html.setAttribute('dir', L.dir);
  document.title = L.pageTitle;

  // Header & sidebar static labels
  document.getElementById('langToggleBtn').innerHTML = L.langBtn;
  document.getElementById('sidebarLabel').textContent = L.sidebarLabel;

  // Chapter names in sidebar + header
  L.chapterNames.forEach((name, i) => {
    const el = document.getElementById('chname-' + i);
    if (el) el.textContent = name;
  });
  document.getElementById('headerChapterName').textContent =
    L.chapterNames[state.currentChapter];

  // Chapter hero: tag, title, desc, tabs
  for (let i = 0; i <= 7; i++) {
    const tagEl = document.getElementById('chtag-' + i);
    const titleEl = document.getElementById('chtitle-' + i);
    const descEl = document.getElementById('chdesc-' + i);
    const tabsEl = document.getElementById('tabs-' + i);
    if (tagEl) tagEl.textContent = L.chapterTags[i];
    if (titleEl) titleEl.textContent = L.chapterNames[i];
    if (descEl) descEl.textContent = L.chapterDescs[i];
    if (tabsEl) tabsEl.innerHTML = L.tabs.map((t, ti) =>
      `<button class="tab-btn${(state.tabState[i] || 'learn') === L.tabKeys[ti] ? ' active' : ''}" onclick="showTab(${i},'${L.tabKeys[ti]}')">${t}</button>`
    ).join('');

    // Re-render learn + cheat (pure content)
    const learnEl = document.getElementById('learn-content-' + i);
    if (learnEl) learnEl.innerHTML = L.learn[i] || '';
    const cheatEl = document.getElementById('cheat-content-' + i);
    if (cheatEl) cheatEl.innerHTML = L.cheat[i] || '';

    // Clear and re-render quiz/lab/game
    const qEl = document.getElementById('quiz-' + i);
    if (qEl) { qEl.innerHTML = ''; delete qEl.dataset.rendered; }
    const lEl = document.getElementById('lab-' + i);
    if (lEl) { lEl.innerHTML = ''; delete lEl.dataset.rendered; }
    const gEl = document.getElementById('game-' + i);
    if (gEl) { gEl.innerHTML = ''; state.gameState[i] = {phase: 'idle'}; }
    state.quizState[i] = null;
  }

  // Re-render active interactive tab
  const activeTab = state.tabState[state.currentChapter] || 'learn';
  if (activeTab === 'quiz') renderQuiz(state.currentChapter);
  if (activeTab === 'lab') renderLab(state.currentChapter);
  if (activeTab === 'game') renderGame(state.currentChapter);
}

function getQuizData(chId) {
  return currentLang === 'en' ? (QUIZZES_EN[chId] || QUIZZES[chId]) : QUIZZES[chId];
}
function getLabData(chId) {
  return currentLang === 'en' ? (LABS_EN[chId] || LABS[chId]) : LABS[chId];
}
function getGameData(chId) {
  return currentLang === 'en' ? (GAME_QS_EN[chId] || GAME_QS[chId]) : GAME_QS[chId];
}

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded', () => {
  // Render all learn/cheat content immediately
  for (let i = 0; i <= 7; i++) {
    const learnEl = document.getElementById('learn-content-' + i);
    if (learnEl) learnEl.innerHTML = CONTENT.he.learn[i] || '';
    const cheatEl = document.getElementById('cheat-content-' + i);
    if (cheatEl) cheatEl.innerHTML = CONTENT.he.cheat[i] || '';
    // Render tabs bar
    const tabsEl = document.getElementById('tabs-' + i);
    if (tabsEl) tabsEl.innerHTML = CONTENT.he.tabs.map((t, ti) =>
      `<button class="tab-btn${ti === 0 ? ' active' : ''}" onclick="showTab(${i},'${CONTENT.he.tabKeys[ti]}')">${t}</button>`
    ).join('');
    // Fill hero text
    document.getElementById('chtag-' + i).textContent = CONTENT.he.chapterTags[i];
    document.getElementById('chtitle-' + i).textContent = CONTENT.he.chapterNames[i];
    document.getElementById('chdesc-' + i).textContent = CONTENT.he.chapterDescs[i];
    document.getElementById('chname-' + i).textContent = CONTENT.he.chapterNames[i];
  }
  document.getElementById('sidebarLabel').textContent = CONTENT.he.sidebarLabel;
  showChapter(0);
});
</script></body></html>
