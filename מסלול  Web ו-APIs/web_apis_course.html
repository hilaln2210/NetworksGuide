<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Web & APIs — קורס מקצועי</title><style>/* ============================================================
   SHARED DESIGN SYSTEM v3.0 — Web APIs Course

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent:    #0ea5e9;
  --accent2:   #0284c7;
  --accentfg:  #ffffff;
  --accentbg:  rgba(14,165,233,.08);
  --bg:        #ffffff;
  --bg2:       #f8f9fa;
  --bg3:       #f1f3f5;
  --border:    #e9ecef;
  --border2:   #ced4da;
  --text:      #1a1a2e;
  --text2:     #4a4a6a;
  --text3:     #9a9ab0;
  --green:     #16a34a;
  --green2:    #166534;
  --greenbg:   #f0fdf4;
  --red:       #dc2626;
  --redbg:     #fff1f2;
  --yellow:    #d97706;
  --yellowbg:  #fffbeb;
  --nav-h:     56px;
  --tabs-h:    48px;
  --max-w:     820px;
  --radius:    10px;
  --radius2:   16px;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'Courier New', Consolas, 'Liberation Mono', monospace;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow2: 0 4px 16px rgba(0,0,0,.10);
}
html, body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.65; -webkit-font-smoothing: antialiased; min-height: 100%; }
.site-header { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); z-index: 300; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; }
.site-logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 15px; color: var(--accent); text-decoration: none; flex-shrink: 0; letter-spacing: -.02em; }
.site-logo-mark { width: 30px; height: 30px; border-radius: 8px; background: var(--accent); color: var(--accentfg); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 13px; font-weight: 900; }
.site-chapter-name { flex: 1; min-width: 0; font-size: 13px; color: var(--text3); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lang-btn { flex-shrink: 0; padding: 5px 14px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); font-size: 12px; font-weight: 700; color: var(--text2); cursor: pointer; transition: all .15s; letter-spacing: .02em; }
.lang-btn:hover { background: var(--accent); color: var(--accentfg); border-color: var(--accent); }
.ch-nav { position: fixed; top: var(--nav-h); left: 0; right: 0; height: var(--tabs-h); z-index: 200; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; gap: 4px; overflow-x: auto; overflow-y: hidden; scrollbar-width: none; }
.ch-nav::-webkit-scrollbar { display: none; }
.ch-btn { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 1px; padding: 6px 12px; border: none; background: none; cursor: pointer; border-radius: var(--radius); color: var(--text3); transition: all .15s; min-width: 44px; }
.ch-btn:hover { background: var(--bg2); color: var(--text); }
.ch-btn.active { background: var(--accentbg); color: var(--accent); }
.ch-btn.active .ch-num { color: var(--accent); font-weight: 800; }
.ch-num { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text3); }
.ch-title-text { font-size: 9px; font-weight: 600; max-width: 64px; text-align: center; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.ch-stars { font-size: 8px; min-height: 10px; }
.main { padding-top: calc(var(--nav-h) + var(--tabs-h) + 24px); padding-bottom: 80px; max-width: var(--max-w); margin: 0 auto; padding-left: 20px; padding-right: 20px; }
.chapter { display: none; }
.chapter.active { display: block; }
.ch-hero { padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
.ch-tag { display: inline-block; font-size: 10px; font-weight: 700; color: var(--accent); background: var(--accentbg); padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; letter-spacing: .08em; text-transform: uppercase; font-family: var(--mono); }
.ch-title { font-size: 26px; font-weight: 900; color: var(--text); line-height: 1.2; letter-spacing: -.02em; margin-bottom: 8px; }
.ch-desc { font-size: 14px; color: var(--text3); margin-bottom: 20px; max-width: 560px; line-height: 1.5; }
.tabs-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.tab-btn { padding: 6px 16px; font-size: 13px; font-weight: 600; color: var(--text3); background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all .15s; }
.tab-btn:hover { color: var(--text2); border-color: var(--border2); }
.tab-btn.active { background: var(--accent); color: var(--accentfg); border-color: var(--accent); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.did-you-know { background: var(--yellowbg); border: 1px solid #fde68a; border-left: 4px solid var(--yellow); padding: 14px 16px; border-radius: 0 var(--radius) var(--radius) 0; font-size: 14px; color: #713f12; line-height: 1.6; margin-bottom: 28px; }
[dir="ltr"] .did-you-know { border-left: 4px solid var(--yellow); border-right: none; }
[dir="rtl"] .did-you-know { border-right: 4px solid var(--yellow); border-left: none; }
.section-title { font-size: 17px; font-weight: 800; color: var(--text); margin: 30px 0 10px; letter-spacing: -.01em; }
.prose { font-size: 15px; color: var(--text2); line-height: 1.8; margin-bottom: 14px; max-width: 680px; }
.prose em { color: var(--accent); font-style: normal; font-weight: 600; }
code, .inline-code { font-family: var(--mono); font-size: 12.5px; background: var(--bg3); padding: 2px 5px; border-radius: 4px; color: var(--accent2); font-weight: 600; }
.code-block, pre.code-block { background: #0d1117; border-radius: var(--radius2); padding: 18px 20px; margin: 14px 0 22px; overflow-x: auto; border: 1px solid #30363d; }
.code-block code { font-family: var(--mono); font-size: 12.5px; line-height: 1.75; color: #c9d1d9; background: none; padding: 0; display: block; white-space: pre; font-weight: normal; }
.comment { color: #8b949e; } .kw { color: #ff7b72; } .fn { color: #d2a8ff; } .str { color: #a5d6ff; } .num { color: #f2cc60; } .op { color: #79c0ff; } .ann { color: #3fb950; } .err { color: #f85149; }
div.code-block { background: #0d1117; border-radius: 12px; border: 1px solid #21262d; margin: 18px 0 24px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.18); direction: ltr !important; }
.code-bar { background: #161b22; border-bottom: 1px solid #21262d; padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
.dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
.code-title { font-family: var(--mono); font-size: 11px; color: #8b949e; margin-left: 8px; }
[dir="rtl"] .code-title { margin-left: 0; margin-right: 8px; }
pre.code-body { margin: 0 !important; padding: 18px 20px !important; overflow-x: auto; background: transparent !important; border: none !important; direction: ltr !important; text-align: left !important; }
pre.code-body code { font-family: var(--mono) !important; font-size: 13px !important; line-height: 1.7 !important; color: #c9d1d9 !important; background: none !important; padding: 0 !important; display: block; direction: ltr !important; white-space: pre; }
pre, code, .code-block, .code-body { direction: ltr !important; unicode-bidi: embed !important; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 14px 0 22px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin: 14px 0 22px; }
.card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius2); padding: 18px; display: flex; flex-direction: column; gap: 6px; box-shadow: var(--shadow); transition: box-shadow .15s, transform .15s; }
.card:hover { box-shadow: var(--shadow2); transform: translateY(-1px); }
.card-icon { font-size: 24px; } .card-title { font-size: 13px; font-weight: 800; color: var(--text); } .card-body { font-size: 13px; color: var(--text2); line-height: 1.55; }
.table-wrap { overflow-x: auto; margin: 14px 0 22px; border-radius: var(--radius2); border: 1px solid var(--border); box-shadow: var(--shadow); }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead { background: var(--bg2); }
.data-table th { padding: 10px 14px; text-align: start; font-weight: 700; color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); }
.data-table td { padding: 10px 14px; color: var(--text2); border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg2); }
.callout { padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.6; margin: 14px 0 20px; border: 1px solid; border-left-width: 4px; }
[dir="rtl"] .callout { border-left-width: 1px; border-right-width: 4px; }
.callout-info    { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
.callout-warn    { background: var(--yellowbg); border-color: #fde68a; color: #92400e; }
.callout-tip     { background: var(--greenbg); border-color: #bbf7d0; color: #166534; }
.callout-danger  { background: var(--redbg); border-color: #fecaca; color: #991b1b; }
.callout-success { background: var(--bg2); border-color: var(--border); color: var(--text2); }
.real-world-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius2); padding: 18px 20px; margin: 20px 0; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.real-world-box::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent); }
[dir="rtl"] .real-world-box::before { left: auto; right: 0; }
.real-world-title { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
.real-world-body { font-size: 13.5px; color: var(--text2); line-height: 1.7; }
.ch-end-nav, .ch-end-nav-en { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 36px; padding-top: 28px; border-top: 1px solid var(--border); }
.ch-end-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 14px 22px; border-radius: var(--radius2); border: 1px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; font-weight: 700; font-size: 13px; transition: all .15s; min-width: 120px; font-family: var(--sans); }
.ch-end-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accentbg); }
.ch-end-btn.primary { background: var(--green); color: #fff; border-color: var(--green2); }
.ch-end-btn.primary:hover { background: var(--green2); }
.ch-end-btn-icon { font-size: 20px; }
.ch-end-btn-label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
.game-start-card { max-width: 400px; margin: 0 auto; text-align: center; padding: 40px 20px; }
.game-start-icon { font-size: 52px; margin-bottom: 12px; font-family: var(--mono); color: var(--accent); line-height: 1; }
.game-start-title { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 8px; }
.game-start-desc  { font-size: 14px; color: var(--text3); margin-bottom: 20px; }
.game-rules { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.game-rule { font-size: 13px; font-weight: 600; color: var(--text2); background: var(--bg2); padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border); }
.btn-start { background: var(--accent); color: var(--accentfg); border: none; padding: 12px 32px; border-radius: var(--radius2); font-size: 15px; font-weight: 800; cursor: pointer; transition: all .15s; font-family: var(--sans); letter-spacing: .02em; }
.btn-start:hover { opacity: .9; transform: translateY(-1px); }
.game-hud { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 10px 16px; background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border); }
.hud-timer { font-family: var(--mono); font-size: 18px; font-weight: 800; color: var(--text); }
.hud-timer.urgent { color: var(--red); }
.hud-qnum  { font-size: 13px; color: var(--text3); font-weight: 600; }
.hud-score { font-size: 15px; font-weight: 800; color: var(--accent); }
.game-question { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; line-height: 1.4; }
.game-opts { display: flex; flex-direction: column; gap: 10px; }
.game-opt { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); cursor: pointer; font-size: 14px; color: var(--text2); font-weight: 500; transition: all .12s; text-align: start; font-family: var(--sans); line-height: 1.4; }
.game-opt:hover { border-color: var(--accent); color: var(--text); }
.game-opt.correct { border-color: var(--green); background: var(--greenbg); color: var(--green2); }
.game-opt.wrong   { border-color: var(--red);   background: var(--redbg);   color: var(--red); }
.opt-letter { width: 26px; height: 26px; border-radius: 6px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; color: var(--text3); font-family: var(--mono); transition: all .12s; }
.game-opt:hover .opt-letter { background: var(--accentbg); color: var(--accent); }
.game-opt.correct .opt-letter { background: var(--green); color: #fff; }
.game-opt.wrong   .opt-letter { background: var(--red);   color: #fff; }
.game-feedback { min-height: 28px; margin-top: 12px; text-align: center; font-size: 14px; font-weight: 700; }
.fb-correct { color: var(--green); } .fb-wrong { color: var(--red); }
.game-over-card, .game-empty { max-width: 380px; margin: 30px auto; text-align: center; padding: 32px 20px; }
.game-empty { color: var(--text3); font-size: 14px; }
.game-over-medal { font-size: 52px; margin-bottom: 8px; }
.game-over-score { font-size: 48px; font-weight: 900; color: var(--accent); font-family: var(--mono); line-height: 1; }
.game-over-pct   { font-size: 14px; color: var(--text3); margin: 4px 0; }
.game-over-label { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; }
.game-over-btns  { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.quiz-pips { display: flex; gap: 4px; margin-bottom: 20px; }
.qpip { flex: 1; height: 4px; border-radius: 2px; background: var(--border2); transition: background .2s; }
.qpip.done { background: var(--accent); } .qpip.cur  { background: var(--accent); opacity: .5; }
.quiz-card { display: none; } .quiz-card.active { display: block; }
.quiz-meta { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.quiz-q { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; line-height: 1.4; }
.quiz-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.quiz-opt { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); cursor: pointer; font-size: 14px; color: var(--text2); font-weight: 500; transition: all .12s; text-align: start; font-family: var(--sans); line-height: 1.4; }
.quiz-opt:hover:not(:disabled) { border-color: var(--accent); }
.quiz-opt.correct { border-color: var(--green); background: var(--greenbg); }
.quiz-opt.wrong   { border-color: var(--red);   background: var(--redbg); }

.quiz-explain { padding: 12px 14px; background: var(--greenbg); border: 1px solid #bbf7d0; border-radius: var(--radius); font-size: 13.5px; color: #166534; line-height: 1.6; margin-top: 12px; }
.quiz-result { text-align: center; padding: 28px 0; }
.quiz-nav { display: flex; justify-content: space-between; margin-top: 16px; gap: 10px; }
.cheat-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 12px; margin-top: 8px; }
.cheat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); padding: 14px; }
.cheat-item { display: flex; justify-content: space-between; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.cheat-item:last-child { border-bottom: none; }
.cheat-key { font-family: var(--mono); color: var(--accent); font-weight: 700; font-size: 11.5px; flex-shrink: 0; }
.cheat-val { color: var(--text3); text-align: end; font-size: 11.5px; }
.cheat-section-title { font-size: 12px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: .08em; margin: 18px 0 8px; font-family: var(--mono); }
.cheat-section-title:first-child { margin-top: 0; }
.cheat-table { display: flex; flex-direction: column; gap: 0; margin-bottom: 6px; }
.cheat-row { display: flex; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); align-items: baseline; }
.cheat-row:last-child { border-bottom: none; }
.cheat-k { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); flex-shrink: 0; min-width: 160px; line-height: 1.4; }
.cheat-v { font-size: 13px; color: var(--text2); line-height: 1.4; flex: 1; }
.nav-btn { padding: 9px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; font-family: var(--sans); border: 1px solid; }
.nav-btn.primary { background: var(--accent); color: var(--accentfg); border-color: var(--accent); }
.nav-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
.nav-btn.ghost { background: var(--bg2); color: var(--text2); border-color: var(--border2); }
.nav-btn.ghost:hover { background: var(--bg3); color: var(--text); }
.nav-btn:disabled { opacity: .4; cursor: default; }
.match-game { padding: 8px 0; }
.match-instructions { font-size: 13px; color: var(--text3); margin-bottom: 16px; text-align: center; }
.match-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
.match-col-title { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; font-family: var(--mono); }
.match-col { display: flex; flex-direction: column; gap: 8px; }
.match-card { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 13px; cursor: pointer; transition: all .15s; background: var(--bg); font-family: var(--sans); line-height: 1.35; user-select: none; min-height: 42px; display: flex; align-items: center; }
.match-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.match-card.selected { border-color: var(--accent); background: var(--accentbg); color: var(--accent); font-weight: 700; }

.match-card.matched-correct:hover { transform: none; }
.match-term  { font-family: var(--mono); font-weight: 700; } .match-def   { color: var(--text2); }
.match-result { text-align: center; padding: 20px; }
.match-score-big { font-size: 42px; font-weight: 900; color: var(--accent); font-family: var(--mono); }
.match-score-label { font-size: 14px; color: var(--text3); margin-bottom: 16px; }
.match-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.match-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; min-height: 24px; }
.match-round-badge { font-size: 11px; font-weight: 800; font-family: var(--mono); color: var(--accent); background: var(--accentbg); border: 1px solid var(--accent); border-radius: 20px; padding: 3px 10px; letter-spacing: .04em; }

.m-get { background: rgba(14,165,233,.12); color: #0284c7; }
.m-post { background: rgba(217,119,6,.12); color: #b45309; }
.m-put { background: rgba(124,58,237,.12); color: #6d28d9; }
.m-patch { background: rgba(16,163,127,.12); color: #0f766e; }
.m-delete { background: rgba(220,38,38,.12); color: #b91c1c; }
.credits-bar { border-top: 1px solid var(--border); padding: 28px 0; margin-top: 48px; }
.credits-title { font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 14px; font-family: var(--mono); }
.credits-grid { display: flex; flex-wrap: wrap; gap: 24px; }

`<div class="did-you-know">💡 <strong>ידעת?</strong> כל פעם שאת לוחצת Like בפייסבוק — נשלחת בקשת HTTP אחת ל-Meta בתוך פחות מ-100ms. ביום ממוצע: 6 מיליארד לייקים. זה 6 מיליארד בקשות HTTP שנשלחות, מנותבות, מעובדות ומוחזרות — ממש כמו מכתב שנשלח ומקבל תגובה.</div>

<div class="section-title">מה קורה בשנייה שמקלידים URL</div>
<p class="prose">כשמקלידים <code>google.com</code> ולוחצים Enter — מתחיל תהליך שרוב האנשים לא מודעים לו. תוך פחות מ-200ms, הדפדפן עובר לפחות חמישה שלבים נפרדים לפני שאתם רואים תוצאה.</p>
<p class="prose"><strong>שלב 1 — DNS Lookup:</strong> הדפדפן צריך לדעת מה ה-IP של google.com. הוא בודק קודם את ה-cache המקומי — אולי כבר שאל אותה שאלה לפני כמה שניות. אם לא — הוא שואל את שרת ה-DNS של ספקית האינטרנט שלכם. שרת ה-DNS מחזיק טבלאות ענק שממירות שמות דומיין לכתובות IP. google.com הופך ל-142.250.80.46.</p>
<p class="prose"><strong>שלב 2 — TCP Handshake:</strong> לפני שאפשר לשלוח כלום, צריך לפתוח חיבור. TCP דורש "לחיצת יד" של שלושה שלבים: הדפדפן שולח SYN (בקשת חיבור), השרת עונה SYN-ACK (אישור + בקשה משלו), הדפדפן שולח ACK (אישור סופי). רק אחרי שלושת ה-packets האלה — החיבור פתוח.</p>
<p class="prose"><strong>שלב 3 — TLS Handshake:</strong> אם האתר משתמש ב-HTTPS (ורוב האתרים היום כן), מתרחש משא ומתן הצפנה. הדפדפן והשרת מסכימים על אלגוריתם הצפנה, מחליפים מפתחות, ומאמתים שהשרת הוא באמת מי שהוא טוען להיות. רק אחרי זה — תעבורה מוצפנת.</p>
<p class="prose"><strong>שלב 4 — HTTP Request:</strong> הדפדפן שולח בקשת GET — "תן לי את דף הבית של google.com". הבקשה כוללת Headers כמו מה הדפדפן מקבל, מה השפה המועדפת, cookies שמורים.</p>
<p class="prose"><strong>שלב 5 — Response:</strong> השרת מעבד ושולח חזרה HTML, CSS, JavaScript. הדפדפן מפרש ומציג.</p>

<div class="section-title">HTTP Methods — הפועל של כל בקשה</div>
<p class="prose">HTTP Method הוא לא רק מילה שמידנו — הוא חוזה. הוא אומר לשרת מה הכוונה שלנו ואיך הוא צריך להתנהג. ישנם Methods שמחייבים Idempotency — כלומר, ניתן להריץ אותם כמה פעמים ותמיד תקבלו אותה תוצאה. זה קריטי לאמינות ה-API.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Method</th><th>כוונה</th><th>Idempotent?</th><th>Body?</th><th>דוגמה אמיתית</th></tr></thead><tbody>
<tr><td><span class="method-badge m-get">GET</span></td><td>קרא משאב — אל תשנה כלום</td><td>✅ תמיד</td><td>❌</td><td>טעינת feed באינסטגרם</td></tr>
<tr><td><span class="method-badge m-post">POST</span></td><td>צור משאב חדש</td><td>❌ כן ייצור כפול!</td><td>✅</td><td>פרסום תמונה, שליחת הזמנה</td></tr>
<tr><td><span class="method-badge m-put">PUT</span></td><td>החלף משאב בשלמותו</td><td>✅ תמיד</td><td>✅</td><td>עדכון פרופיל מלא</td></tr>
<tr><td><span class="method-badge m-patch">PATCH</span></td><td>שנה שדות ספציפיים בלבד</td><td>⚠️ בדרך כלל</td><td>✅</td><td>שינוי שם משתמש בלבד</td></tr>
<tr><td><span class="method-badge m-delete">DELETE</span></td><td>מחק משאב</td><td>✅ תמיד</td><td>❌</td><td>מחיקת פוסט, ביטול הזמנה</td></tr>
</tbody></table></div>

<div class="callout callout-warn"><strong>⚠️ POST vs PUT — הטעות שכולם עושים:</strong> אם ישלחי POST פעמיים לאותו endpoint, תקבלי שני משאבים חדשים. אם תשלחי PUT פעמיים — תקבלי אותה תוצאה. לכן כשמעדכנים פרופיל, משתמשים ב-PUT. כשיוצרים הזמנה חדשה — POST. זה ההבדל בין "שמור מה שיש" לבין "תמיד צור חדש".</div>

<div class="section-title">קודי Status — שפת ה-API</div>
<p class="prose">כל תשובה מ-HTTP Server מגיעה עם קוד status בין 100 ל-599. הקוד אומר בדיוק מה קרה — הצלחה, שגיאה, הפניה. חמש הקבוצות הגדולות:</p>
<div class="grid-2">
<div class="card"><div class="card-icon">✅</div><div class="card-title">2xx — הצלחה</div><div class="card-body"><strong>200 OK</strong> — בקשה רגילה הצליחה<br><strong>201 Created</strong> — משאב חדש נוצר<br><strong>204 No Content</strong> — הצליח, אין מה להחזיר<br><strong>206 Partial</strong> — streaming חלקי (Netflix)</div></div>
<div class="card"><div class="card-icon">↩️</div><div class="card-title">3xx — הפניות</div><div class="card-body"><strong>301 Moved Permanently</strong> — URL השתנה לצמיתות<br><strong>302 Found</strong> — redirect זמני<br><strong>304 Not Modified</strong> — cache תקין, אל תוריד שוב</div></div>
<div class="card"><div class="card-icon">⚠️</div><div class="card-title">4xx — הבעיה אצלך</div><div class="card-body"><strong>400 Bad Request</strong> — JSON שבור, פרמטר חסר<br><strong>401 Unauthorized</strong> — לא מאומת (חסר token)<br><strong>403 Forbidden</strong> — מאומת אבל אין הרשאה<br><strong>404 Not Found</strong> — משאב לא קיים<br><strong>429 Too Many Requests</strong> — עברת rate limit</div></div>
<div class="card"><div class="card-icon">💥</div><div class="card-title">5xx — הבעיה אצלהם</div><div class="card-body"><strong>500 Internal Error</strong> — bug בשרת<br><strong>502 Bad Gateway</strong> — proxy בעיה<br><strong>503 Unavailable</strong> — שרת עמוס<br><strong>504 Gateway Timeout</strong> — השרת לא ענה בזמן</div></div>
</div>

<div class="callout callout-info"><strong>🔍 401 vs 403 — אחת הבלבלות הנפוצות:</strong> 401 אומר "אני לא יודע מי אתה" — לא עברת authentication. 403 אומר "אני יודע מי אתה, אבל אין לך רשאה" — לא עברת authorization. ברוב הבנקים: כשנכנסים עם סיסמה שגויה קיבלו 401. כשמנסים לגשת לחשבון של מישהו אחר — 403.</div>

<div class="section-title">אנטומיה של URL</div>
<p class="prose">URL הוא לא סתם כתובת — הוא מבנה מוגדר שכל חלק ממנו נושא משמעות. הבנת המבנה חיונית לעבודה עם APIs.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>חלק</th><th>דוגמה</th><th>משמעות</th></tr></thead><tbody>
<tr><td>Protocol</td><td><code>https://</code></td><td>איך לתקשר — HTTP, HTTPS, WebSocket (ws://)</td></tr>
<tr><td>Host</td><td><code>api.github.com</code></td><td>לאיזה שרת — שם דומיין או IP</td></tr>
<tr><td>Port</td><td><code>:443</code></td><td>שער הכניסה — 443 ל-HTTPS, 80 ל-HTTP (ברירת מחדל = לא מוצג)</td></tr>
<tr><td>Path</td><td><code>/repos/user/project</code></td><td>המשאב הספציפי — ה"כתובת" של הדבר שרוצים</td></tr>
<tr><td>Query String</td><td><code>?page=2&sort=stars</code></td><td>פרמטרים נוספים — סינון, מיון, pagination</td></tr>
<tr><td>Fragment</td><td><code>#section-3</code></td><td>anchor בתוך הדף — לא נשלח לשרת!</td></tr>
</tbody></table></div>

<div class="section-title">HTTP/2 ו-HTTP/3 — האבולוציה</div>
<p class="prose">HTTP/1.1 מ-1997 עדיין עובד, אבל יש לו בעיה מרכזית: כל בקשה ממתינה לתור. אם הדפדפן צריך 30 קבצים לדף — הוא מחכה שכל אחד יסתיים לפני הבא. HTTP/2 פתר את זה עם <strong>Multiplexing</strong> — כל ה-30 הבקשות עוברות על אותו TCP connection בו-זמנית, כאשר כל אחת מקבל stream מזוהה.</p>
<p class="prose"><strong>HTTP/3</strong> הלך צעד קדימה — החליף TCP ב-QUIC (שרץ מעל UDP). היתרון: אין Head-of-Line Blocking ברמת ה-transport. ב-TCP אם packet אחד אובד, כל ה-streams ממתינים. ב-QUIC כל stream עצמאי.</p>

<div class="real-world-box"><div class="real-world-title">🔥 אירוע אמיתי: Facebook Down — אוקטובר 2021</div><div class="real-world-body">ב-4 באוקטובר 2021, פייסבוק, אינסטגרם וווטסאפ היו offline כ-6 שעות. הסיבה: עדכון שגוי ל-BGP routing מחק את כל ה-DNS records של פייסבוק. הדפדפנים ניסו לשלוח HTTP requests — אבל לא יכלו למצוא את ה-IP של השרת. הכשל לא היה ב-HTTP עצמו — HTTP עבד מצוין. אבל בלי DNS, לא ניתן להגיע לשרת. <strong>הפסד: כ-164 מיליון דולר בהכנסות.</strong> הלקח: HTTP תלוי ב-DNS, שתלוי ב-BGP — כל שכבה תשתית קריטית.</div></div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> Stripe, טוויטר, GitHub ו-Shopify בנו את ה-API שלהם על עקרונות REST. ה-Stripe API נחשב ל"benchmark" בתעשייה — מפתחים מדרגים אותו כ-API הכי קל לשימוש שקיים, לפעמים בלי לקרוא תיעוד.</div>

<div class="section-title">REST — הרעיון שמאחורי כל API שמכבד את עצמו</div>
<p class="prose">REST (Representational State Transfer) הומצא ב-2000 על ידי Roy Fielding בדיסרטציה שלו ב-UC Irvine. לפני REST, APIs היו מבולגנים — כל חברה המציאה שפה משלה. Fielding הציע שישה עקרונות שהיו אמורים להפוך APIs לאחידים, מדרגיים וקלים לשימוש.</p>
<p class="prose"><strong>Stateless:</strong> זה העיקרון הכי חשוב. כל בקשה חייבת להכיל את כל המידע הדרוש לעיבודה — השרת לא זוכר כלום מבקשה לבקשה. אין "סשן" שהשרת מנהל. זה מה שמאפשר ל-Netflix לפרוס אלפי שרתי API זהים — כל בקשה יכולה להגיע לכל שרת, כי אף שרת לא שומר state.</p>
<p class="prose"><strong>Uniform Interface:</strong> URI לזיהוי משאב, HTTP method לפעולה. <code>DELETE /posts/99</code> ברור לכל מפתח בעולם, בלי לקרוא תיעוד. <code>GET /users/42</code> אומר "תן לי את המשתמש עם ID 42".</p>
<p class="prose"><strong>Cacheable:</strong> תגובות מציינות אם ניתן לשמור אותן. Twitter מחזיק cache על ה-feed של כל משתמש — בלי cache, 350 מיליון משתמשים פעילים ביום היו מפילים כל שרת.</p>

<div class="section-title">עיצוב URLs — המדריך המקיף</div>
<p class="prose">URL של REST API הוא לא רק כתובת — הוא חוזה עם המשתמשים שלך. URL טוב מסביר בדיוק מה הוא עושה, עקבי, ועמיד לשינויים. URL רע גורם לבאגים, בלבול, ועלויות תחזוקה גבוהות.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>✅ נכון</th><th>❌ שגוי</th><th>למה?</th></tr></thead><tbody>
<tr><td><code>GET /users</code></td><td><code>GET /getUsers</code></td><td>ה-Method כבר אומר "get". אל תכפול</td></tr>
<tr><td><code>GET /users/42</code></td><td><code>GET /user/42</code></td><td>Resources הם תמיד רבים (plural)</td></tr>
<tr><td><code>POST /users</code></td><td><code>POST /createUser</code></td><td>POST לאוסף = יצירה. לא צריך לכתוב זאת</td></tr>
<tr><td><code>GET /users/42/orders</code></td><td><code>GET /getUserOrders?id=42</code></td><td>נסטינג מבטא קשר. Query params לסינון בלבד</td></tr>
<tr><td><code>DELETE /posts/99</code></td><td><code>POST /deletePost</code></td><td>DELETE Method קיים. אל תשתמשי ב-POST לכל דבר</td></tr>
<tr><td><code>/api/v2/users</code></td><td><code>/api/users-new</code></td><td>גרסאות דרך URI — ברור, ניהל, לא יישבר</td></tr>
</tbody></table></div>

<div class="section-title">Query Parameters — סינון, מיון, Pagination</div>
<p class="prose">Query parameters (כל מה שאחרי <code>?</code>) נועדו לצרכים משניים — לא לזהות את המשאב עצמו, אלא להגדיר <em>איך</em> לקבל אותו.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>שימוש</th><th>דוגמה</th><th>הסבר</th></tr></thead><tbody>
<tr><td>Filtering</td><td><code>/users?role=admin&active=true</code></td><td>רק משתמשים פעילים עם role=admin</td></tr>
<tr><td>Sorting</td><td><code>/products?sort=price&order=asc</code></td><td>מוצרים ממוינים לפי מחיר עולה</td></tr>
<tr><td>Pagination (Offset)</td><td><code>/posts?page=3&limit=20</code></td><td>עמוד 3, 20 פריטים לעמוד</td></tr>
<tr><td>Pagination (Cursor)</td><td><code>/feed?cursor=eyJpZCI6MTIzfQ==</code></td><td>מה שאחרי פריט מסוים — עדיף לfeeds גדולים</td></tr>
<tr><td>Field Selection</td><td><code>/users?fields=id,name,email</code></td><td>רק שדות ספציפיים — חוסך bandwidth</td></tr>
<tr><td>Search</td><td><code>/products?q=iphone&category=phones</code></td><td>חיפוש טקסט חופשי + סינון</td></tr>
</tbody></table></div>

<div class="section-title">Versioning — איך לשנות API בלי לשבור לקוחות</div>
<p class="prose">אחת הבעיות הקשות ביותר ב-API design: איך לשנות את ה-API כשיש כבר לקוחות שמשתמשים בו? שינוי ב-response format יכול לשבור אפליקציות שלא עודכנו. הפתרון: versioning.</p>
<p class="prose"><strong>URL Versioning</strong> (<code>/api/v1/users</code> vs <code>/api/v2/users</code>) הוא הנפוץ ביותר — ברור, קל לdebug, תומך בגרסאות מקביל. Stripe, GitHub וטוויטר משתמשים בגישה זו.</p>
<p class="prose"><strong>Header Versioning</strong> (<code>Accept: application/vnd.api.v2+json</code>) — URL "נקי" יותר, אבל קשה יותר לבדיקה דרך דפדפן וקשה יותר לcaching.</p>

<div class="callout callout-tip"><strong>💡 עיקרון אצבע מ-Stripe:</strong> לעולם אל תשברי backward compatibility. הוסיפי שדות חדשים — לעולם אל תמחקי. הכניסי גרסה חדשה רק כשמוכרחה לשבור שינוי. שמרי על v1 לפחות שנה אחרי שהוצאת v2.</div>

<div class="real-world-box"><div class="real-world-title">📖 Case Study: GitHub API Design</div><div class="real-world-body">GitHub REST API הוא דוגמה מושלמת. <code>GET /repos/{owner}/{repo}</code> מחזיר repository. <code>GET /repos/{owner}/{repo}/issues</code> מחזיר את ה-issues. <code>POST /repos/{owner}/{repo}/issues</code> יוצר issue חדש. כל URL הוא קריא כמו משפט אנגלי, כל method ברור, כל nested resource מתאר קשר אמיתי. זה לא מקרה — זה תוצאה של שנים של design מחושב.</div></div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> JSON נוצר ב-2001 על ידי Douglas Crockford כחלופה קלת-משקל ל-XML. היום JSON היא פורמט ה-data הנפוץ ביותר באינטרנט — כ-90% מה-APIs הציבוריים מחזירים JSON. XML ירד מ-50% ל-פחות מ-15%.</div>

<div class="section-title">JSON — השפה שה-APIs מדברים בה</div>
<p class="prose">JSON (JavaScript Object Notation) הוא פורמט להחלפת נתונים. הסיבה להצלחתו אחת: פשטות. כל שפת תכנות יכולה לקרוא ולכתוב JSON בשתי שורות קוד. אין schema מחייב, אין namespace, אין attribute.</p>
<p class="prose">JSON תומך בשישה סוגי ערכים בלבד: <strong>String</strong> (טקסט במרכאות כפולות), <strong>Number</strong> (מספר — שלם או עשרוני), <strong>Boolean</strong> (true/false בדיוק כך), <strong>null</strong> (ערך ריק מפורש), <strong>Object</strong> (מפתח-ערך בתוך {}) ו-<strong>Array</strong> (רשימה בתוך []).</p>
<p class="prose">כלל מספר אחד שחייבים לזכור: <em>מפתחות (keys) בתוך Object חייבים להיות String עם מרכאות כפולות</em>. לא מרכאות יחידות, לא בלי מרכאות — <strong>דווקא מרכאות כפולות</strong>. זה ההבדל בין JSON תקני לפורמט קרוב-אבל-לא-תקני שנקרא JSON5.</p>

<div class="section-title">עומק ומורכבות — Nested Objects ו-Arrays</div>
<p class="prose">הכוח האמיתי של JSON הוא יכולת הnesting — Object בתוך Object, Array של Objects, Array בתוך Object. אבל עומק גדול מדי יוצר בעיות תחזוקה ו-performance. הכלל שמשתמשים בו בתעשייה: עומק מקסימלי של 3-4 רמות. יותר מזה — סימן שצריך לחשוב מחדש על ה-data model.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>טיפוס</th><th>דוגמה</th><th>הערה</th></tr></thead><tbody>
<tr><td>String</td><td><code>"name": "Alice"</code></td><td>תמיד מרכאות כפולות</td></tr>
<tr><td>Number</td><td><code>"age": 30</code> / <code>"price": 9.99</td><td>אין מרכאות. אין הבדל int/float ב-JSON</td></tr>
<tr><td>Boolean</td><td><code>"active": true</code></td><td>lowercase! לא True, לא "true"</td></tr>
<tr><td>null</td><td><code>"middle_name": null</code></td><td>ערך ריק מכוון — שונה מ-missing field</td></tr>
<tr><td>Object</td><td><code>"address": {"city": "Tel Aviv"}</code></td><td>מפתח-ערך נסתרים</td></tr>
<tr><td>Array</td><td><code>"tags": ["api", "rest"]</code></td><td>רשימה מסודרת של ערכים</td></tr>
</tbody></table></div>

<div class="section-title">תאריכים ו-Gotchas נפוצים</div>
<p class="prose">JSON לא מגדיר פורמט לתאריכים — זו אחת הנפות השכיחות ביותר. כל API בוחר בעצמו: Unix timestamp (<code>1704067200</code>), ISO 8601 (<code>"2024-01-01T00:00:00Z"</code>), או פורמט קנייני. הכלל הזהב: תמיד תשמרו ISO 8601 עם timezone — זה מה שכל שפה מבינה ללא עמימות.</p>
<p class="prose"><strong>מספרים גדולים:</strong> JavaScript מייצג numbers כ-IEEE 754 double-precision. מספרים גדולים מ-2^53 יאבדו דיוק. פתרון: מחזירים IDs גדולים כ-String (<code>"id": "123456789012345678"</code>). טוויטר עשתה את זה בדיוק — Tweet IDs הפכו ל-Strings אחרי שנתפסו bugs של IDs שנחתכו ב-JavaScript.</p>

<div class="section-title">JSON Schema — איך לתעד ולאמת</div>
<p class="prose">JSON Schema הוא מסמך שמתאר איזה JSON תקין ואיזה לא. הוא מאפשר לתעד APIs, לאמת קלט, ולהפיק קוד אוטומטי. כשמגדירים <code>"type": "string", "minLength": 3</code> — כל מי שמשתמש ב-API יודע בדיוק מה מצפים.</p>
<p class="prose"><strong>OpenAPI/Swagger</strong> בנוי מעל JSON Schema ומוסיף תיאורים של endpoints, parameters ו-authentication. הוא הפך לסטנדרט התעשייתי לתיעוד APIs. כשגוגל, Stripe, או AWS מתעדים API — הם משתמשים ב-OpenAPI.</p>

<div class="callout callout-warn"><strong>⚠️ null vs undefined vs missing field:</strong> ב-JSON יש הבדל חשוב: <code>"field": null</code> אומר "השדה קיים ויש לו ערך ריק מכוון". שדה שחסר לגמרי מה-JSON אומר "אנחנו לא יודעים". null ו-missing field הם שתי מצבים שונים לגמרי — חשוב להגדיר מה המשמעות שלהם ב-API שלכם.</div>

<div class="real-world-box"><div class="real-world-title">📖 Case Study: Twitter Tweet ID Bug</div><div class="real-world-body">ב-2014 Twitter הגיעה ל-Tweet IDs מעל 2^53. JavaScript clients קיבלו את ה-ID כ-number, ו-JavaScript עגל אותו לdouble precision — וה-ID השתנה. תוצאה: לייקים ותגובות הלכו למקום הלא נכון. Twitter תיקנה בהוספת שדה <code>id_str</code> — אותו ID כ-String. היום כל API שמחזיר IDs גדולים עושה את זה.</div></div>

<div class="ch-end-nav"><button class="ch-end-btn" onclick="showTab(CHID,'match')"><span class="ch-end-btn-icon">🔗</span><span class="ch-end-btn-label">התאמה</span></button><button class="ch-end-btn primary" onclick="showNextChapter(CHID)"><span class="ch-end-btn-icon">◀</span><span class="ch-end-btn-label">פרק הבא</span></button><button class="ch-end-btn" onclick="showTab(CHID,'cheat')"><span class="ch-end-btn-icon">📋</span><span class="ch-end-btn-label">סיכום</span></button></div>`,
`<div class="did-you-know">💡 <strong>ידעת?</strong> 95% מההתקפות על APIs הן ניצול של authentication/authorization שגוי — לא vulnerability טכני מתוחכם. כלומר, רוב הפריצות מתרחשות כי מישהו לא בדק אם למשתמש יש הרשאה. זה לא בעיה של קריפטוגרפיה — זה בעיה של design.</div>

<div class="section-title">Authentication vs Authorization — ההבדל הקריטי</div>
<p class="prose"><strong>Authentication</strong> שואל: "מי אתה?" — תהליך האימות של זהות. "האם הסיסמה שסיפקת מתאימה לחשבון הזה?"</p>
<p class="prose"><strong>Authorization</strong> שואל: "מה מותר לך לעשות?" — בדיקת הרשאות לאחר שזהות אומתה. "גם אם אני יודע שאתה Alice, האם Alice מורשית למחוק את הפוסט הזה?"</p>
<p class="prose">הבלבול בין השניים גורם לפגיעויות קריטיות. IDOR (Insecure Direct Object Reference) הוא הדוגמה הקלאסית: משתמש מאומת שולח <code>GET /invoices/12345</code> — ה-API בדק authentication (האם יש token) אבל לא authorization (האם ה-invoice הזה שייך לאותו משתמש).</p>

<div class="section-title">API Keys — הדרך הפשוטה</div>
<p class="prose">API Key הוא מחרוזת ייחודית (בדרך כלל 32-64 תווים) שהשרת מנפיק ללקוח. הלקוח שולח אותה בכל בקשה — בדרך כלל ב-Header. <code>Authorization: ApiKey sk_live_abc123...</code> הוא הדפוס הנפוץ.</p>
<p class="prose">היתרון: פשוט להטמיע, קל לנהל, ניתן לבטל מיידית. החיסרון: API Key היא "passwords לצמיתות" — אם דולפת, כל מי שיש לה יכול לעשות כל מה שמותר לי. אין הבחנה בין "מה המחשב הזה יכול לעשות" לבין "מה המשתמש הזה יכול לעשות".</p>
<p class="prose">Stripe, OpenAI, Twilio ורוב ה-B2B APIs משתמשים ב-API Keys. הן מתאימות כשיש ישות אחת (server-to-server) ולא צריך להבחין בין משתמשים.</p>

<div class="section-title">JWT — Token שנושא מידע</div>
<p class="prose">JWT (JSON Web Token) הוא token שמורכב משלושה חלקים מופרדים בנקודה: <code>header.payload.signature</code>. ה-payload הוא JSON רגיל עם claims — טענות על המשתמש. ה-signature מאמת שה-token לא זויף.</p>
<p class="prose">הכוח של JWT: <em>השרת לא צריך לשאול database</em>. הוא יכול לאמת את ה-token בעצמו — כי הוא יחיד שיכול ליצור signature תקנית (בעזרת ה-secret שרק הוא יודע). זה מה שמאפשר לscale לאלפי שרתים — כל שרת מאמת בעצמו, ללא תקשורת.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>חלק</th><th>מה יש שם</th><th>מקודד?</th></tr></thead><tbody>
<tr><td>Header</td><td>algorithm: HS256/RS256, type: JWT</td><td>Base64URL — לא מוצפן!</td></tr>
<tr><td>Payload</td><td>sub (user id), exp (expiry), iat (issued at), roles</td><td>Base64URL — לא מוצפן!</td></tr>
<tr><td>Signature</td><td>HMAC(header+payload, secret)</td><td>חתימה — לא ניתן לזייף בלי ה-secret</td></tr>
</tbody></table></div>

<div class="callout callout-danger"><strong>⚠️ JWT אינו מוצפן!</strong> ה-payload ב-JWT הוא Base64 encoded — כל מי שמחזיק ב-token יכול לקרוא את ה-payload (לא לשנות, אבל לקרוא). לעולם אל תשמרו מידע רגיש (סיסמה, CC number) ב-JWT payload. הוא מאמת אמינות, לא מוצפן.</div>

<div class="section-title">OAuth2 — כניסה עם Google/Facebook</div>
<p class="prose">OAuth2 פותר בעיה ספציפית: אפליקציה של צד שלישי רוצה גישה למשאבים של המשתמש (קרוא מיילים, פרסם בפייסבוק) — בלי שהמשתמש יתן לה את הסיסמה שלו.</p>
<p class="prose">הזרימה הנפוצה (Authorization Code Flow): המשתמש לוחץ "התחבר עם Google" → מופנה ל-Google → Google שואל "האפליקציה רוצה לגשת לGmail שלך, מאשר?" → המשתמש מאשר → Google מחזיר Authorization Code לאפליקציה → האפליקציה מחליפה את ה-Code ב-Access Token → מכאן ה-Token משמש לגישה.</p>
<p class="prose">למה לא לתת ישירות token? כי Authorization Code עובר דרך browser redirect (חשוף ל-logs), ואילו החלפת Code ב-Token מתרחשת server-to-server — הרבה יותר בטוח.</p>

<div class="real-world-box"><div class="real-world-title">🔥 אירוע אמיתי: Optus Breach 2022</div><div class="real-world-body">ב-2022, ספקית הסלולר האוסטרלית Optus חשפה נתונים של 10 מיליון לקוחות. הסיבה: API endpoint ציבורי שלא דרש authentication. מישהו שלח בקשות עם IDs עולים (1, 2, 3...) וקיבל פרטים של לקוחות שונים — ללא authentication כלל. <strong>הסנקציה: 1.5 מיליארד דולר אוסטרלי</strong> בתביעות. הלקח: כל endpoint שמחזיר מידע אישי חייב authentication + authorization.</div></div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> CORS גורם ליותר שאלות ב-Stack Overflow מכל נושא אחר ב-web development. הביטוי "CORS error" מופיע במיליוני threads. כמעט כל מפתח web פגש אותו, ורובם לא מבינים בדיוק למה הוא קיים.</div>

<div class="section-title">CORS — למה הדפדפן חוסם requests שלך</div>
<p class="prose">דמיינו שאתם גולשים לאתר זדוני. האתר הזה מנסה לשלוח JavaScript request ל-api.yourbank.com עם ה-cookies שיש לכם. אם זה יעבוד — ה-bank יחשוב שאתם מבקשים ויחזיר את פרטי החשבון שלכם לאתר הזדוני.</p>
<p class="prose">ה-Same-Origin Policy נוצרה כדי למנוע בדיוק את זה. ברירת המחדל: דפדפן מרשה ל-JavaScript לשלוח requests רק לאותו origin (domain + protocol + port). כל דבר אחר — חסום.</p>
<p class="prose">CORS (Cross-Origin Resource Sharing) הוא המנגנון שמאפשר לשרת להגיד "אני מסכים לקבל requests מ-origins שונים". השרת מוסיף Headers שאומרים לדפדפן "בסדר, מ-app.example.com מותר".</p>

<div class="section-title">Preflight Request — מה זה ולמה קיים</div>
<p class="prose">לפני שדפדפן שולח "בקשה מורכבת" (כל בקשה שאינה GET/POST פשוטה, או כל בקשה עם headers שאינם סטנדרטים), הוא שולח קודם <strong>Preflight request</strong> — בקשת OPTIONS לאותו URL שואלת "מה מותר?"</p>
<p class="prose">זהו מנגנון אבטחה: השרת יכול לסרב לפני שה-browser שולח את הבקשה האמיתית. זה מונע מהאתר הזדוני לשלוח DELETE request לשרת שלכם — גם אם תגובת ה-Preflight נחסמת, ה-DELETE לא נשלח.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Header</th><th>מי שולח</th><th>משמעות</th></tr></thead><tbody>
<tr><td><code>Origin</code></td><td>Browser (בכל request)</td><td>מאיזה origin הגיעה הבקשה</td></tr>
<tr><td><code>Access-Control-Allow-Origin</code></td><td>Server</td><td>אילו origins מותרים (<code>*</code> = כולם)</td></tr>
<tr><td><code>Access-Control-Allow-Methods</code></td><td>Server</td><td>אילו HTTP methods מותרים</td></tr>
<tr><td><code>Access-Control-Allow-Headers</code></td><td>Server</td><td>אילו headers מותרים בבקשה</td></tr>
<tr><td><code>Access-Control-Allow-Credentials</code></td><td>Server</td><td>האם מותר לשלוח cookies</td></tr>
<tr><td><code>Access-Control-Max-Age</code></td><td>Server</td><td>כמה זמן לcache את תשובת ה-Preflight</td></tr>
</tbody></table></div>

<div class="callout callout-warn"><strong>⚠️ <code>*</code> + Credentials = אי אפשר:</strong> אם מגדירים <code>Access-Control-Allow-Origin: *</code> (כל origin), לא ניתן להגדיר <code>Access-Control-Allow-Credentials: true</code>. זו הגנת ביטחון מכוונת — כי credentials + כל origin = פגיעות. חייבים לציין origin ספציפי אם רוצים cookies.</div>

<div class="section-title">Headers חשובים — Request ו-Response</div>
<p class="prose">Headers הם metadata של ה-request/response. הם לא חלק מה-body, אבל הם לעיתים חשובים יותר ממנו. כל HTTP developer חייב להכיר את ה-headers הנפוצים:</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Header</th><th>כיוון</th><th>שימוש</th></tr></thead><tbody>
<tr><td><code>Content-Type</code></td><td>שניהם</td><td>פורמט ה-body — <code>application/json</code>, <code>multipart/form-data</code></td></tr>
<tr><td><code>Authorization</code></td><td>Request</td><td>Bearer token, API key, Basic auth</td></tr>
<tr><td><code>Cache-Control</code></td><td>שניהם</td><td>כמה זמן ניתן לcache — <code>max-age=300</code>, <code>no-store</code></td></tr>
<tr><td><code>ETag</code></td><td>Response</td><td>גרסה של המשאב — לbrowser לדעת אם השתנה</td></tr>
<tr><td><code>If-None-Match</code></td><td>Request</td><td>שלח רק אם השתנה מ-ETag זה (304 אם לא)</td></tr>
<tr><td><code>X-Request-ID</code></td><td>שניהם</td><td>מזהה ייחודי לבקשה — לdebug ולtracing</td></tr>
<tr><td><code>Retry-After</code></td><td>Response</td><td>כמה שניות להמתין לפני rate limit retry</td></tr>
</tbody></table></div>

<div class="section-title">Security Headers — הגנה חינמית</div>
<p class="prose">Security headers הם שורה אחת בקוד השרת שמוסיפה שכבת הגנה בדפדפן. חינמיים לחלוטין, ובכל זאת רוב האתרים לא מגדירים אותם.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Header</th><th>מה הוא עושה</th></tr></thead><tbody>
<tr><td><code>X-Frame-Options: DENY</code></td><td>מונע טעינת האתר ב-iframe — מגן מ-Clickjacking</td></tr>
<tr><td><code>X-Content-Type-Options: nosniff</code></td><td>מונע מהדפדפן "לנחש" את ה-Content-Type</td></tr>
<tr><td><code>Strict-Transport-Security</code></td><td>מכריח HTTPS — גם אם המשתמש כתב http://</td></tr>
<tr><td><code>Content-Security-Policy</code></td><td>מגדיר מאילו sources מותר לטעון scripts — XSS protection</td></tr>
<tr><td><code>Referrer-Policy</code></td><td>כמה מידע לשלוח ב-Referer header לאתרים אחרים</td></tr>
</tbody></table></div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> WebSockets הומצאו ב-2011 כתגובה לבעיה אמיתית: לפני כן, אתרי chat ואפליקציות real-time היו צריכים לשאול את השרת כל שנייה "יש חדש?" — טכניקה שנקראת Polling. זה בזבז bandwidth עצום ויצר עיכוב. WebSocket פתר את זה בחיבור דו-כיווני פתוח.</div>

<div class="section-title">WebSockets — חיבור פתוח לצמיתות</div>
<p class="prose">HTTP הוא פרוטוקול request-response: client שולח, server עונה, החיבור נסגר (או נשמר בעזרת keep-alive). לכל בקשה יש overhead של headers, handshake, ולעיתים TLS negotiation. לאפליקציות שצריכות עדכונים בזמן אמת — זה יקר מאוד.</p>
<p class="prose">WebSocket מתחיל כ-HTTP request רגיל — אבל עם header מיוחד: <code>Upgrade: websocket</code>. אם השרת מסכים, הם "משדרגים" את החיבור — HTTP הופך ל-WebSocket protocol. מעכשיו החיבור פתוח לשני הכיוונים: client יכול לשלוח לserver, ו<em>server יכול לשלוח ל-client בלי שביקשו</em>. זה השינוי הגדול.</p>
<p class="prose">frame ב-WebSocket הוא הרבה יותר קטן מ-HTTP request. אחרי שהחיבור פתוח, כל message הוא 2-14 bytes overhead בלבד (במקום מאות bytes של HTTP headers). זה הופך אותו ליעיל מאוד ל-high-frequency messages.</p>

<div class="section-title">מתי להשתמש ב-WebSockets — ומתי לא</div>
<p class="prose">WebSockets מצוינים לתרחישים ספציפיים — אבל הם לא תחליף ל-REST. הם מוסיפים מורכבות: צריך לנהל reconnection, heartbeat, state של חיבורים פתוחים. לפני שבוחרים WebSocket, שאלו: "האם באמת צריך real-time, או שעדכון כל 5 שניות מספיק?"</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>✅ WebSocket מתאים</th><th>❌ REST מתאים יותר</th></tr></thead><tbody>
<tr><td>Chat — כל הודעה צריכה להגיע מיד</td><td>טעינת פרופיל משתמש</td></tr>
<tr><td>Multiplayer game — latency קריטי</td><td>שמירת הגדרות</td></tr>
<tr><td>Live trading — מחיר מניה בזמן אמת</td><td>הצגת רשימת מוצרים</td></tr>
<tr><td>Collaborative editing (Google Docs)</td><td>חיפוש וסינון</td></tr>
<tr><td>Live dashboard — מטריקות משתנות</td><td>אימות משתמש</td></tr>
<tr><td>Notifications push מה-server</td><td>העלאת קבצים</td></tr>
</tbody></table></div>

<div class="section-title">SSE — אלטרנטיבה פשוטה יותר</div>
<p class="prose">Server-Sent Events (SSE) הם פתרון פשוט יותר כשצריך push רק ממצד השרת לclient — בלי הצורך לשלוח מה-client לשרת. זה HTTP רגיל עם response שלא נסגר, והשרת שולח chunks של data כשיש חדש.</p>
<p class="prose">ChatGPT משתמש ב-SSE — הוא שולח tokens בזמן שהם נוצרים, ואתם רואים אותם מופיעים בזמן אמת. כל token הוא chunk קטן שמגיע מהשרת ללא בקשה חדשה. פשוט, יעיל, ועובד על כל HTTP server קיים ללא שינויים.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th></th><th>WebSocket</th><th>SSE</th><th>Polling</th></tr></thead><tbody>
<tr><td>כיוון</td><td>דו-כיווני</td><td>שרת → client בלבד</td><td>client שואל, server עונה</td></tr>
<tr><td>Protocol</td><td>ws:// / wss://</td><td>HTTP רגיל</td><td>HTTP רגיל</td></tr>
<tr><td>מורכבות</td><td>גבוהה</td><td>נמוכה</td><td>נמוכה</td></tr>
<tr><td>Reconnect</td><td>ידני</td><td>אוטומטי בדפדפן</td><td>לא רלוונטי</td></tr>
<tr><td>מתאים ל-</td><td>Chat, games</td><td>Notifications, AI streaming</td><td>עדכונים לא תכופים</td></tr>
</tbody></table></div>

<div class="section-title">Socket.io — WebSockets עם batteries included</div>
<p class="prose">Socket.io היא ספרייה שעוטפת WebSocket ומוסיפה תכונות שחסרות ב-raw WebSocket: reconnection אוטומטי, rooms (קבוצות), broadcasting, fallback ל-polling אם WebSocket לא זמין, ו-namespaces. רוב אפליקציות chat ו-gaming ב-Node.js משתמשות בה.</p>

<div class="real-world-box"><div class="real-world-title">📖 Case Study: Figma Real-Time Collaboration</div><div class="real-world-body">Figma — כלי עיצוב שאפשר שיתוף פעולה בזמן אמת — בנתה את המנוע שלה מעל WebSockets. כשמשתמש מזיז אובייקט, העדכון נשלח כ-WebSocket message לכל המחוברים ל"מסמך" אותו. האתגר: merge conflicts כש-2 משתמשים עורכים בו-זמנית. Figma פתרה עם CRDT (Conflict-free Replicated Data Types) — מבנה נתונים שמאפשר merge אוטומטי ללא conflicts. זה מה שמבדיל real-time collaboration מסתם WebSocket.</div></div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> GraphQL הומצאה בפייסבוק ב-2012 ושוחררה לציבור ב-2015. הסיבה: האפליקציה הניידת של פייסבוק הייתה איטית כי REST API שלהם החזיר יותר מדי מידע — כל endpoint הכיל עשרות שדות שה-mobile app לא צריך. GraphQL פתרה את ה-Overfetching הזה.</div>

<div class="section-title">הבעיה שGraphQL פתרה</div>
<p class="prose">ב-REST, ה-server מחליט מה ה-response מכיל. אם endpoint <code>/users/42</code> מחזיר 40 שדות — הclient מקבל 40 שדות, גם אם צריך רק 3. זה <strong>Overfetching</strong>.</p>
<p class="prose">הבעיה ההפוכה קיימת גם: לדף פרופיל שמציג מידע על משתמש + הפוסטים שלו + התגובות על כל פוסט — צריך 3 requests נפרדים ב-REST. זה <strong>Underfetching</strong> — מקבלים פחות מדי בכל request ומוכרחים לשלוח עוד ועוד.</p>
<p class="prose">GraphQL מוסיפה endpoint אחד בלבד (<code>/graphql</code>) שמקבל query שמתאר בדיוק מה ה-client צריך. ה-server מחזיר בדיוק את זה — לא יותר, לא פחות.</p>

<div class="section-title">Query — שאלה שמתארת את הנתונים</div>
<p class="prose">GraphQL query דומה ל-JSON שאותו רוצים לקבל בחזרה. אם רוצים שם ואימייל של משתמש ו-3 הפוסטים האחרונים שלו — מצייניים בדיוק את זה:</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">GraphQL Query</span></div><pre class="code-body"><code><span class="kw">query</span> {
  user(id: <span class="str">"42"</span>) {
    name
    email
    posts(last: <span class="num">3</span>) {
      title
      createdAt
    }
  }
}</code></pre></div>
<p class="prose">ה-response יהיה בדיוק אותה מבנה — JSON עם user שמכיל name, email, ו-posts. שום שדה נוסף. זה מה שמייחד GraphQL.</p>

<div class="section-title">Mutation ו-Subscription</div>
<p class="prose"><strong>Mutation</strong> הוא הequivalent של POST/PUT/DELETE ב-REST — פעולה שמשנה נתונים. הformat דומה ל-query אבל מתחיל במילה <code>mutation</code>.</p>
<p class="prose"><strong>Subscription</strong> הוא המנגנון ל-real-time ב-GraphQL — ה-client נרשם לאירועים, והשרת שולח updates בזמן שהם קורים (בדרך כלל מעל WebSocket). שווה למשל לchats ו-notifications.</p>

<div class="section-title">Schema — החוזה של GraphQL</div>
<p class="prose">כל GraphQL API מוגדר על ידי Schema — קובץ שמתאר כל type, כל שדה, ואיזה queries ו-mutations קיימים. ה-Schema הוא הtrue source — גם documentation וגם validation. אם query שואל שדה שלא מוגדר ב-Schema — השרת דוחה אוטומטית.</p>
<p class="prose">היתרון הגדול: <strong>Introspection</strong>. ה-client יכול לשאול את השרת "מה ה-Schema שלך?" וה-server עונה בפירוט. כלים כמו GraphiQL ו-Apollo Studio משתמשים בזה ליצור IDE אינטראקטיבי שמציע auto-complete ל-queries.</p>

<div class="section-title">GraphQL vs REST — מתי כל אחד</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th></th><th>GraphQL</th><th>REST</th></tr></thead><tbody>
<tr><td>Clients שונים</td><td>✅ כל client מבקש מה שצריך</td><td>⚠️ צריך endpoints שונים או over-fetch</td></tr>
<tr><td>Caching</td><td>⚠️ מורכב יותר (POST לrequests)</td><td>✅ HTTP caching עובד מהקופסה</td></tr>
<tr><td>Learning curve</td><td>גבוה — Schema, resolvers, types</td><td>נמוך — HTTP + JSON</td></tr>
<tr><td>File uploads</td><td>⚠️ מורכב</td><td>✅ Multipart פשוט</td></tr>
<tr><td>ביצועים ל-mobile</td><td>✅ פחות bandwidth, פחות requests</td><td>⚠️ Over/underfetching</td></tr>
<tr><td>ב-production</td><td>GitHub, Shopify, Facebook</td><td>Stripe, Twitter, AWS</td></tr>
</tbody></table></div>

<div class="callout callout-info"><strong>💡 N+1 Problem — הבעיה הגדולה של GraphQL:</strong> אם יש query של 100 users ולכל user מושכים פוסטים — GraphQL יבצע 1 query לusers + 100 queries לפוסטים = 101 queries. ב-REST זה פחות נפוץ כי ה-endpoint כבר joinואי. הפתרון הנפוץ: DataLoader — batch שמאגד כל ה-ID requests לשאילתה אחת.</div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> Amazon חישבה שכל 100ms של latency עולה להם 1% במכירות. אם האתר לוקח 500ms יותר לטעון — 5% פחות רכישות. בהכנסות שנתיות של 500 מיליארד דולר, זה 25 מיליארד דולר. ביצועי API הם לא "nice to have" — הם עניין עסקי קריטי.</div>

<div class="section-title">Caching — לא לשאול שוב מה שכבר ידוע</div>
<p class="prose">Caching הוא העיקרון הפשוט ביותר לשיפור ביצועים: אם חישבנו משהו פעם אחת — נשמור את התוצאה ונחזיר אותה בפעם הבאה. אבל caching לא חינמי — צריך לנהל מתי ה-cache תקף ומתי מיושן.</p>
<p class="prose"><strong>Browser Cache:</strong> הדפדפן שומר responses לפי ה-Cache-Control header. <code>max-age=3600</code> אומר "שמור שעה". הdפדפן לא ישלח request כלל — יחזיר מה שיש בזיכרון. זה הcaching המהיר ביותר האפשרי.</p>
<p class="prose"><strong>CDN (Content Delivery Network):</strong> שרתי cache שמפוזרים גיאוגרפית. במקום שכל request יגיע לשרת בארה"ב — CDN כמו Cloudflare מחזיק cache בכ-300 locations בעולם. בקשה מישראל מוגשת מFrankfurt או מ-Tel Aviv — latency של 10ms במקום 150ms.</p>
<p class="prose"><strong>Application Cache (Redis):</strong> Cache בצד השרת. במקום שכל request לדף הבית יריץ SQL query שמחשב top 100 products — מחשבים פעם ביום ושומרים ב-Redis. כל request קורא מRedis תוך <1ms.</p>

<div class="section-title">Cache-Control Headers — השפה של Caching</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Directive</th><th>משמעות</th><th>מתי להשתמש</th></tr></thead><tbody>
<tr><td><code>max-age=300</code></td><td>תקין 5 דקות</td><td>נתוני מוצרים, פרופיל משתמש</td></tr>
<tr><td><code>no-cache</code></td><td>תמיד אמת עם שרת (ETag)</td><td>מחירי מניות, לוח זמנים</td></tr>
<tr><td><code>no-store</code></td><td>אל תשמור בכלל</td><td>פרטי בנק, מסמכים רפואיים</td></tr>
<tr><td><code>public</code></td><td>CDN וdפדפן יכולים לcache</td><td>תמונות, CSS, JS סטטי</td></tr>
<tr><td><code>private</code></td><td>רק הdפדפן — לא CDN</td><td>תוכן פרסונלי (feed, inbox)</td></tr>
<tr><td><code>immutable</code></td><td>לא ישתנה — cache לנצח</td><td>assets עם content hash בשם</td></tr>
</tbody></table></div>

<div class="section-title">Rate Limiting — הגנה על ה-API</div>
<p class="prose">Rate Limiting מגביל כמה requests לקוח יכול לשלוח בפרק זמן. בלי rate limiting, שרת יכול ליפול מ: DoS attack, scraper שמוריד כל ה-data, bug בclient שנשלח infinite loop.</p>
<p class="prose">כשחורגים מה-rate limit — השרת מחזיר <strong>429 Too Many Requests</strong> עם header <code>Retry-After: 30</code> (המתן 30 שניות). Client טוב מכבד את ה-header הזה ולא שולח requests מיותרים.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>אסטרטגיה</th><th>איך עובד</th><th>שימוש</th></tr></thead><tbody>
<tr><td>Fixed Window</td><td>100 requests לדקה — counter מתאפס בדקה</td><td>פשוט, אבל burst אפשרי בגבול הwindow</td></tr>
<tr><td>Sliding Window</td><td>100 requests בכל 60 שניות אחרונות</td><td>הוגן יותר, מורכב יותר</td></tr>
<tr><td>Token Bucket</td><td>דלי מתמלא ב-rate קבוע, כל request מוציא token</td><td>מאפשר bursts קצרים — AWS, Stripe</td></tr>
</tbody></table></div>

<div class="section-title">Pagination — איך להחזיר מיליוני רשומות</div>
<p class="prose"><strong>Offset Pagination</strong> (<code>?page=3&limit=20</code>) — הכי פשוט. בCloudflare cache אפילו HTML דינמי — אם 1000 אנשים מבקשים את אותו דף חדשות תוך שנייה, רק request אחד הולך לשרת. ה-999 האחרים מקבלים cache. זה מה שמאפשר לאתרים קטנים לעמוד ב-traffic עצום ללא עלות.</div></div>

`<div class="sum-block"><div class="sum-block-title">🌐 מה זה HTTP ואיך הוא עובד</div>
<div class="sum-row"><span class="sum-k">HTTP (HyperText Transfer Protocol)</span><span class="sum-v">הפרוטוקול שמגדיר איך מחשבים מדברים אחד עם השני ברשת. כל פעם שגולשים לאתר, שולחים API request, או מורידים קובץ — זה HTTP. הוא עובד לפי מודל request/response: ה-client שולח בקשה, ה-server עונה.</span></div>
<div class="sum-row"><span class="sum-k">TCP Handshake לפני כל דבר</span><span class="sum-v">לפני שנשלח בייט אחד של HTTP, נפתח חיבור TCP. שלושה packets: <strong>SYN</strong> (client מבקש חיבור) → <strong>SYN-ACK</strong> (server מאשר) → <strong>ACK</strong> (client מאשר חזרה). רק אז מתחילה השיחה האמיתית.</span></div>
<div class="sum-row"><span class="sum-k">HTTPS = HTTP + TLS</span><span class="sum-v">HTTPS מוסיף שכבת הצפנה מעל HTTP. ה-TLS handshake מתרחש אחרי ה-TCP handshake: הצדדים מסכימים על שיטת הצפנה, מחליפים מפתחות, ומאמתים תעודת זהות (certificate). אחרי זה — כל תוכן מוצפן ובלתי קריא לצד שלישי.</span></div>
</div>
<div class="sum-block"><div class="sum-block-title">📡 HTTP Methods</div>
<div class="sum-row"><span class="sum-k">GET</span><span class="sum-v"><strong>קרא משאב.</strong> לא משנה שום דבר בשרת. Idempotent (ריצה כפולה = אותה תוצאה). אין body בבקשה. דוגמה: טעינת feed, הצגת פרופיל.</span></div>
<div class="sum-row"><span class="sum-k">POST</span><span class="sum-v"><strong>צור משאב חדש.</strong> לא Idempotent — שתי בקשות זהות יצרו שני משאבים. יש body. דוגמה: פרסום תמונה, שליחת הזמנה.</span></div>
<div class="sum-row"><span class="sum-k">PUT</span><span class="sum-v"><strong>החלף משאב בשלמותו.</strong> Idempotent. שולחים את כל השדות — מה שלא נשלח, נמחק. דוגמה: עדכון מלא של פרופיל משתמש.</span></div>
<div class="sum-row"><span class="sum-k">PATCH</span><span class="sum-v"><strong>עדכן שדות ספציפיים בלבד.</strong> שולחים רק מה שצריך לשנות. דוגמה: שינוי שם משתמש בלבד מבלי לשלוח שאר הפרופיל.</span></div>
<div class="sum-row"><span class="sum-k">DELETE</span><span class="sum-v"><strong>מחק משאב.</strong> Idempotent — מחיקה כפולה של אותו משאב נותנת אותה תוצאה. בדרך כלל מחזיר 204 No Content.</span></div>
</div>
<div class="sum-block"><div class="sum-block-title">🔢 Status Codes</div>
<div class="sum-row"><span class="sum-k">2xx — הצלחה</span><span class="sum-v"><code>200 OK</code> — הצלחה רגילה. <code>201 Created</code> — משאב חדש נוצר (תשובה לPOST). <code>204 No Content</code> — הצליח, אין body (תשובה לDELETE). <code>206 Partial</code> — streaming חלקי.</span></div>
<div class="sum-row"><span class="sum-k">3xx — הפניות</span><span class="sum-v"><code>301 Moved Permanently</code> — URL השתנה לצמיתות, עדכן bookmarks. <code>302 Found</code> — redirect זמני. <code>304 Not Modified</code> — cache תקין, אל תוריד שוב, חסוך bandwidth.</span></div>
<div class="sum-row"><span class="sum-k">4xx — שגיאת client</span><span class="sum-v"><code>400</code> — JSON שבור / פרמטר חסר. <code>401</code> — לא מאומת, חסר token. <code>403</code> — מאומת אבל אין הרשאה. <code>404</code> — משאב לא קיים. <code>429</code> — עברת rate limit, המתן לפי Retry-After.</span></div>
<div class="sum-row"><span class="sum-k">5xx — שגיאת server</span><span class="sum-v"><code>500</code> — bug בשרת. <code>502 Bad Gateway</code> — proxy בעיה. <code>503</code> — שרת עמוס/down. <code>504 Gateway Timeout</code> — השרת לא ענה בזמן.</span></div>
<div class="sum-tip">⚠️ <strong>401 vs 403:</strong> 401 = "מי אתה?" (authentication חסר). 403 = "אני יודע מי אתה, אבל לא תוכל" (authorization חסר). זוהי הטעות הנפוצה ביותר בAPI design.</div>
</div>
<div class="sum-block"><div class="sum-block-title">🔗 URL Anatomy</div>
<div class="sum-row"><span class="sum-k"><code>https://api.github.com/repos/user/proj?page=2</code></span><span class="sum-v"><code>https://</code> = protocol. <code>api.github.com</code> = host. <code>/repos/user/proj</code> = path (המשאב). <code>?page=2</code> = query string (פרמטרים). fragment (<code>#section</code>) לא נשלח לשרת!</span></div>
</div>
<div class="sum-block"><div class="sum-block-title">⚡ HTTP/2 ו-HTTP/3</div>
<div class="sum-row"><span class="sum-k">HTTP/1.1 — הבעיה</span><span class="sum-v">כל request מחכה לסיום הקודם (Head-of-Line Blocking). לדף עם 30 קבצים — 30 requests בתור.</span></div>

<div class="sum-row"><span class="sum-k">HTTP/3 — QUIC</span><span class="sum-v">מחליף TCP ב-QUIC (מעל UDP). אם packet אחד אובד — רק ה-stream שלו מחכה, לא כל שאר הrequests. מצוין לרשתות סלולריות.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🏗️ מה זה REST</div>

<div class="sum-row"><span class="sum-k">null</span><span class="sum-v">ערך ריק מכוון: <code>null</code>. שונה מ"שדה חסר לגמרי". <code>"middleName": null</code> אומר "יש שדה, אבל אין ערך". שדה שנעדר מה-JSON אומר "אנחנו לא יודעים".</span></div>
<div class="sum-row"><span class="sum-k">Object</span><span class="sum-v">מפתח-ערך בתוך <code>{}</code>: <code>{"city": "Tel Aviv", "zip": "63405"}</code>. ניתן לנסט — object בתוך object עד כמה רמות שרוצים (בפועל: עד 3-4).</span></div>
<div class="sum-row"><span class="sum-k">Array</span><span class="sum-v">רשימה מסודרת בתוך <code>[]</code>: <code>["red", "green", "blue"]</code>. Array של objects: <code>[{"id":1},{"id":2}]</code>. זו הצורה הנפוצה ביותר ב-API responses.</span></div>
</div>
<div class="sum-block"><div class="sum-block-title">⚠️ Gotchas נפוצים</div>
<div class="sum-row"><span class="sum-k">תאריכים</span><span class="sum-v">JSON אין לו type לתאריכים. Standard: ISO 8601 עם timezone — <code>"createdAt": "2024-01-15T09:30:00Z"</code>. ה-Z בסוף = UTC. אל תשתמשו ב-Unix timestamp לבד — לא קריא לאדם.</span></div>
<div class="sum-row"><span class="sum-k">IDs גדולים → String</span><span class="sum-v">JavaScript מייצג numbers כ-IEEE 754 double. מעל 2^53 (≈9 קוודריליון) יאבד דיוק. פתרון: שלחו IDs גדולים כ-String. טוויטר גילתה זאת בדרך הקשה ב-2014.</span></div>
<div class="sum-row"><span class="sum-k">Trailing comma — אסור!</span><span class="sum-v"><code>{"a":1, "b":2,}</code> ❌ — הפסיק האחרון שגוי ב-JSON. JavaScript מסלח, JSON.parse() לא.</span></div>
<div class="sum-row"><span class="sum-k">Comments — אסורים!</span><span class="sum-v">אין תגובות ב-JSON. לא <code>// comment</code>, לא <code>/* comment */</code>. אם צריך תיעוד — שימשו בשדה <code>"_comment"</code> או תיעדו בנפרד.</span></div>
<div class="sum-tip">💡 <strong>null vs missing field:</strong> <code>"score": null</code> = יש ציון, הוא ריק מכוון (אולי עוד לא ניתן). שדה שחסר לגמרי = לא ידוע / לא רלוונטי. הגדירו מה כל אחד אומר ב-API שלכם.</div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🔐 Authentication vs Authorization</div>
<div class="sum-row"><span class="sum-k">Authentication (אימות זהות)</span><span class="sum-v"><strong>מי אתה?</strong> — תהליך הוכחת זהות. שם משתמש + סיסמה, token, טביעת אצבע. מתרחש לפני authorization. אם נכשל — מחזירים <code>401 Unauthorized</code>.</span></div>
<div class="sum-row"><span class="sum-k">Authorization (בדיקת הרשאות)</span><span class="sum-v"><strong>מה מותר לך?</strong> — בדיקת מה מותר לזהות המאומתת לעשות. "Alice מאומתת, אבל האם מותר לה למחוק פוסט של Bob?" אם נכשל — מחזירים <code>403 Forbidden</code>.</span></div>
<div class="sum-danger">🚨 <strong>IDOR — הפגיעות הנפוצה ביותר:</strong> Insecure Direct Object Reference — כשAPI בודק authentication (האם יש token) אבל לא authorization (האם המשאב שייך לך). <code>GET /invoices/12345</code> — אם לא בודקים ש-12345 שייך למשתמש המבקש, כל משתמש מאומת יכול לגשת לחשבונית של כולם.</div>
</div>
<div class="sum-block"><div class="sum-block-title">🔑 שיטות Authentication</div>
<div class="sum-row"><span class="sum-k">API Key</span><span class="sum-v">מחרוזת ייחודית (32-64 תווים) שהשרת מנפיק. נשלחת בכל request ב-header: <code>Authorization: ApiKey sk_live_abc123</code>. פשוט ויעיל לserver-to-server. אם דולפת — חייבים לבטל ולהנפיק חדשה.</span></div>
<div class="sum-row"><span class="sum-k">Bearer Token</span><span class="sum-v">הפורמט הנפוץ: <code>Authorization: Bearer eyJhbGc...</code>. ה-token יכול להיות JWT, opaque string, או כל דבר אחר. ה-header תמיד זהה.</span></div>
<div class="sum-row"><span class="sum-k">Basic Auth</span><span class="sum-v"><code>username:password</code> ב-Base64: <code>Authorization: Basic dXNlcjpwYXNz</code>. פשוט, אבל שולח credentials בכל request. חייב HTTPS. מיושן לרוב השימושים החדשים.</span></div>
</div>
<div class="sum-block"><div class="sum-block-title">🎫 JWT — JSON Web Token</div>
<div class="sum-row"><span class="sum-k">מבנה: header.payload.signature</span><span class="sum-v"><strong>Header</strong>: algorithm (HS256/RS256), type. <strong>Payload</strong>: claims — sub (user ID), exp (expiry timestamp), iat (issued at), roles, permissions. <strong>Signature</strong>: HMAC של header+payload עם secret.</span></div>
<div class="sum-row"><span class="sum-k">למה JWT שימושי</span><span class="sum-v">השרת לא צריך database לאמת JWT — הוא מאמת את ה-signature בעצמו. מאפשר scale לאלפי שרתים ללא תקשורת ביניהם. כל שרת עצמאי.</span></div>
<div class="sum-row"><span class="sum-k">exp — תפוגה</span><span class="sum-v">כל JWT חייב תפוגה (<code>"exp": 1735689600</code> = Unix timestamp). ללא תפוגה — token גנוב תקף לנצח. בדרך כלל: access token תקף 15-60 דקות, refresh token שבוע-חודש.</span></div>
<div class="sum-danger">⚠️ <strong>JWT לא מוצפן!</strong> ה-payload הוא Base64URL — כל אחד שמחזיק בtoken יכול לקרוא אותו. אל תשמרו סיסמאות, מספרי כרטיס אשראי, או מידע רגיש ב-payload. השתמשו ב-JWE (encrypted JWT) אם צריכים הצפנה.</div>
</div>
<div class="sum-block"><div class="sum-block-title">🔄 OAuth2 — הרשאות צד שלישי</div>
<div class="sum-row"><span class="sum-k">הבעיה שOAuth2 פותר</span><span class="sum-v">אפליקציה רוצה גישה למשאבי המשתמש (Gmail, photos, contacts) — בלי שהמשתמש יתן לה את הסיסמה שלו. OAuth2 יוצר Authorization Code שהאפליקציה מחליפה ב-Access Token.</span></div>
<div class="sum-row"><span class="sum-k">Authorization Code Flow</span><span class="sum-v">1. User לוחץ "Login with Google" → 2. מופנה ל-Google, מאשר → 3. Google מחזיר Code לאפליקציה → 4. אפליקציה מחליפה Code ב-Access Token (server-to-server) → 5. Token משמש לגישה.</span></div>
<div class="sum-row"><span class="sum-k">Access Token vs Refresh Token</span><span class="sum-v"><strong>Access Token</strong>: short-lived (15-60 דקות), משמש לAPI calls. <strong>Refresh Token</strong>: long-lived (שבועות), משמש לקבלת Access Token חדש. אם Access Token גנוב — נזק מוגבל.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🌐 Same-Origin Policy — הבסיס</div>
<div class="sum-row"><span class="sum-k">מה זו Same-Origin Policy?</span><span class="sum-v">מנגנון אבטחה שהדפדפן מאכף: JavaScript רץ ב-<code>app.example.com</code> לא יכול לשלוח XHR/Fetch request ל-<code>api.other.com</code> — אלא אם ה-server מסכים. זה מונע מאתרים זדוניים לגנוב נתונים מ-APIs אחרים בשמכם.</span></div>
<div class="sum-row"><span class="sum-k">Origin = Protocol + Host + Port</span><span class="sum-v"><code>https://app.com:443</code> ≠ <code>http://app.com:80</code> (protocol שונה). <code>https://app.com</code> ≠ <code>https://api.app.com</code> (subdomain שונה). גם subdomain נחשב origin שונה!</span></div>
<div class="sum-row"><span class="sum-k">CORS (Cross-Origin Resource Sharing)</span><span class="sum-v">המנגנון שמאפשר לשרת להגיד לדפדפן "אני מסכים לקבל requests מ-origin X". השרת מחזיר headers שהדפדפן קורא ומחליט לפיהם אם לאפשר את ה-request.</span></div>
<div class="sum-tip">💡 CORS הוא מנגנון של הדפדפן בלבד. curl, Postman, server-to-server — לא מושפעים. אם Postman עובד אבל הדפדפן לא — זו בעיית CORS.</div>
</div>
<div class="sum-block"><div class="sum-block-title">✈️ Preflight Request</div>
<div class="sum-row"><span class="sum-k">מתי נשלח Preflight?</span><span class="sum-v">לפני כל "בקשה מורכבת" — כלומר: כל Method שאינו GET/POST/HEAD, או כל POST עם Content-Type שאינו form/text, או כל בקשה עם headers שאינם סטנדרטיים (כמו Authorization).</span></div>
<div class="sum-row"><span class="sum-k">מה זה Preflight?</span><span class="sum-v">בקשת OPTIONS שהדפדפן שולח קודם: "הנה מה שאני מתכנן לשלוח — האם מותר?" השרת עונה עם CORS headers. רק אם השרת מאשר — הדפדפן שולח את הבקשה האמיתית.</span></div>
<div class="sum-row"><span class="sum-k">Access-Control-Max-Age</span><span class="sum-v">כמה זמן (בשניות) לcache את תשובת ה-Preflight. <code>Access-Control-Max-Age: 86400</code> = יום שלם. חוסך Preflight request לא נחוץ בכל request.</span></div>
</div>
<div class="sum-block"><div class="sum-block-title">📋 CORS Headers חשובים</div>
<div class="sum-row"><span class="sum-k">Access-Control-Allow-Origin</span><span class="sum-v"><code>*</code> = כל origin מותר (לא עם credentials). <code>https://app.example.com</code> = רק origin ספציפי. לא ניתן להגדיר כמה origins — צריך לוגיקה בשרת שבוחרת origin מהרשימה לפי ה-Origin header של ה-request.</span></div>
<div class="sum-row"><span class="sum-k">Access-Control-Allow-Credentials</span><span class="sum-v"><code>true</code> = מותר לשלוח cookies ו-auth headers. חייב לשלב עם origin ספציפי (לא <code>*</code>). גם ה-client צריך <code>credentials: 'include'</code>.</span></div>
<div class="sum-row"><span class="sum-k">Access-Control-Expose-Headers</span><span class="sum-v">headers ב-response שה-JavaScript יכול לקרוא. כברירת מחדל, רק headers בסיסיים זמינים. אם הוסיפו <code>X-Request-ID</code> — צריך לחשוף אותו מפורשות.</span></div>
</div>
<div class="sum-block"><div class="sum-block-title">🛡️ Security Headers</div>
<div class="sum-row"><span class="sum-k">Strict-Transport-Security (HSTS)</span><span class="sum-v">מכריח HTTPS. <code>max-age=31536000; includeSubDomains</code> = שנה, כולל subdomains. הדפדפן ישלח רק HTTPS גם אם המשתמש כתב http://.</span></div>
<div class="sum-row"><span class="sum-k">Content-Security-Policy (CSP)</span><span class="sum-v">מגדיר מאילו sources מותר לטעון scripts, styles, images. מגן מ-XSS attacks. <code>script-src 'self' cdn.example.com</code> = רק scripts מהדומיין עצמו ומ-cdn.</span></div>
<div class="sum-row"><span class="sum-k">X-Frame-Options: DENY</span><span class="sum-v">מונע טעינת האתר ב-<code>&lt;iframe&gt;</code>. מגן מ-Clickjacking — התקפה שמכסה כפתור שקוף מעל הממשק ומכשילה קליקים.</span></div>
<div class="sum-row"><span class="sum-k">X-Content-Type-Options: nosniff</span><span class="sum-v">מונע מהדפדפן "לנחש" את ה-Content-Type. אם השרת אמר <code>text/plain</code>, הדפדפן לא ינסה להריץ את זה כ-JavaScript.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🔌 WebSocket — הבסיס</div>
<div class="sum-row"><span class="sum-k">מה זה WebSocket?</span><span class="sum-v">פרוטוקול שמספק <strong>חיבור דו-כיווני מתמשך</strong> בין client לserver. אחרי שהחיבור נפתח — גם client וגם server יכולים לשלוח messages בכל עת, ללא צורך בבקשה חדשה. הפוך ל-HTTP שהוא request-response בלבד.</span></div>
<div class="sum-row"><span class="sum-k">Upgrade מ-HTTP ל-WebSocket</span><span class="sum-v">מתחיל כ-HTTP request עם headers מיוחדים: <code>Upgrade: websocket</code>, <code>Connection: Upgrade</code>, <code>Sec-WebSocket-Key</code>. אם השרת מסכים — מחזיר <code>101 Switching Protocols</code> וה-connection הופך ל-WebSocket.</span></div>
<div class="sum-row"><span class="sum-k">ws:// ו-wss://</span><span class="sum-v"><code>ws://</code> = WebSocket רגיל (לא מוצפן). <code>wss://</code> = WebSocket מוצפן (TLS) — מקביל ל-HTTPS. <strong>תמיד השתמשו ב-wss:// בproduction</strong>. ws:// פגיע ל-MITM attacks.</span></div>
<div class="sum-row"><span class="sum-k">Frame — יחידת message</span><span class="sum-v">אחרי פתיחת החיבור, הנתונים עוברים כ-frames. overhead של 2-14 bytes בלבד (לעומת מאות bytes של HTTP headers). יעיל מאוד לmessages תכופים.</span></div>
</div>
<div class="sum-block"><div class="sum-block-title">📊 WebSocket vs החלופות</div>
<div class="sum-row"><span class="sum-k">Polling רגיל</span><span class="sum-v">Client שואל כל X שניות: "יש חדש?" הפשוט ביותר לממש. חיסרון: עיכוב של עד X שניות, מבזבז bandwidth (רוב הpollים מקבלים "לא"), עמוס את ה-server.</span></div>
<div class="sum-row"><span class="sum-k">Long Polling</span><span class="sum-v">Client שולח request שהשרת "מחזיק פתוח" עד שיש חדשות. מהיר יותר מpolling רגיל, אבל עדיין overhead גבוה. שימוש: Comet, chat של Gmail הישן.</span></div>
<div class="sum-row"><span class="sum-k">SSE (Server-Sent Events)</span><span class="sum-v">HTTP response שלא נסגר. השרת שולח data כשיש חדשות. <strong>חד-כיווני</strong>: server→client בלבד. Reconnect אוטומטי בדפדפן. פשוט ממש, עובד מעל HTTP רגיל. ChatGPT streaming משתמש בSSE.</span></div>
<div class="sum-row"><span class="sum-k">WebSocket</span><span class="sum-v"><strong>דו-כיווני</strong>. נמוך overhead. מתאים כשגם ה-client שולח הרבה. מורכב יותר לממש (reconnect, heartbeat, auth). Socket.io מוסיף שכבה נוחה מעליו.</span></div>
</div>
<div class="sum-block"><div class="sum-block-title">🎯 מתי לבחור מה</div>
<div class="sum-row"><span class="sum-k">בחר WebSocket</span><span class="sum-v">Chat, multiplayer games, collaborative editing (Google Docs), live trading, כל מקום שה-client שולח הרבה messages בחזרה לserver.</span></div>
<div class="sum-row"><span class="sum-k">בחר SSE</span><span class="sum-v">AI streaming (ChatGPT), live notifications, dashboards, ticker prices — כל מקום שה-server דוחף updates אבל ה-client רק מאזין.</span></div>
<div class="sum-row"><span class="sum-k">בחר Polling</span><span class="sum-v">עדכונים לא תכופים (כל דקה+), כשפשטות חשובה יותר מ-latency, כשאין תמיכה בWebSocket/SSE.</span></div>
<div class="sum-tip">💡 <strong>Heartbeat / Ping-Pong:</strong> WebSocket connections יכולות ליפול בשקט (timeout בrouter, proxy). שלחו ping כל 30 שניות וצפו לpong. אם לא מגיע — reconnect.</div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">📊 הבעיות שGraphQL פותר</div>
<div class="sum-row"><span class="sum-k">Overfetching</span><span class="sum-v">ב-REST, ה-server מחליט מה בResponse. <code>GET /users/42</code> מחזיר 40 שדות — גם אם ה-mobile app צריך רק name ו-avatar. GraphQL מאפשר לclient לבקש בדיוק מה שהוא צריך.</span></div>
<div class="sum-row"><span class="sum-k">Underfetching</span><span class="sum-v">דף פרופיל שמציג: user + posts + comments על כל post. ב-REST: 3 requests נפרדים (waterfall). ב-GraphQL: query אחד שמביא הכל. מפחית round-trips, קריטי למשתמשי mobile.</span></div>
<div class="sum-row"><span class="sum-k">Endpoint יחיד</span><span class="sum-v">כל GraphQL API חי ב-<code>/graphql</code>. אין צורך לתכנן עשרות endpoints. הquery עצמו מגדיר מה מוחזר. זה מפשט את ה-API surface.</span></div>
</div>
<div class="sum-block"><div class="sum-block-title">📝 שלושה סוגי Operations</div>
<div class="sum-row"><span class="sum-k">Query (קריאה)</span><span class="sum-v">קרא נתונים — שקול ל-GET. הquery נראה כמו ה-JSON שרוצים לקבל: מציינים שדות ספציפיים, ו-response מגיע בדיוק באותה מבנה. ניתן לתת לquery שם לdebugging.</span></div>
<div class="sum-row"><span class="sum-k">Mutation (שינוי)</span><span class="sum-v">שנה נתונים — שקול ל-POST/PUT/PATCH/DELETE. Mutation יכול גם להחזיר נתונים. לדוגמה: <code>createUser(name: "Alice") { id name email }</code> — יוצר ומחזיר את המשתמש שנוצר.</span></div>
<div class="sum-row"><span class="sum-k">Subscription (Real-time)</span><span class="sum-v">הירשם לאירועים — השרת שולח updates כשהם קורים. עובד מעל WebSocket. דוגמה: <code>subscription { newMessage { text author } }</code> — מקבל כל הודעה חדשה בchat בזמן אמת.</span></div>
</div>
<div class="sum-block"><div class="sum-block-title">🗂️ Schema — החוזה</div>
<div class="sum-row"><span class="sum-k">מה זה Schema?</span><span class="sum-v">קובץ SDL (Schema Definition Language) שמגדיר כל type, שדה, וoperations האפשריות. Schema הוא ה-single source of truth — גם תיעוד, גם validation. Query שמבקש שדה לא מוגדר — נדחה אוטומטית.</span></div>
<div class="sum-row"><span class="sum-k">Type System</span><span class="sum-v">כל שדה מוגדר עם type: <code>String</code>, <code>Int</code>, <code>Float</code>, <code>Boolean</code>, <code>ID</code>, או custom types. <code>!</code> אחרי type = Non-nullable (חייב להיות ערך). <code>[User]</code> = array של Users.</span></div>
<div class="sum-row"><span class="sum-k">Introspection</span><span class="sum-v">client יכול לשאול את השרת "מה ה-Schema שלך?" — ה-server עונה בפירוט. זה מה שמאפשר ל-GraphiQL ל-Apollo Studio לבנות IDE עם auto-complete. שימושי לdevelopment, בדרך כלל מנותק ב-production.</span></div>
</div>
<div class="sum-block"><div class="sum-block-title">⚠️ אתגרים של GraphQL</div>
<div class="sum-row"><span class="sum-k">N+1 Problem</span><span class="sum-v">Query של 100 users שלכל אחד מושכים posts: 1 query לusers + 100 queries לposts = 101 queries. ב-REST זה פחות נפוץ כי ה-endpoint כבר מבצע JOIN. פתרון: <strong>DataLoader</strong> — מאגד IDs ושולח batch query אחד.</span></div>
<div class="sum-row"><span class="sum-k">Caching מורכב</span><span class="sum-v">HTTP cache עובד לפי URL. כל GraphQL requests הולכים ל-<code>/graphql</code> בPOST — לא ניתן לcache ב-CDN ישירות. פתרון: Persisted Queries, response caching ברמת ה-resolver.</span></div>
<div class="sum-row"><span class="sum-k">מתי REST עדיף</span><span class="sum-v">File uploads, APIs פשוטים עם מעט endpoints, כשcaching קריטי, כשהteam לא מכיר GraphQL, כשיש client אחד בלבד. GraphQL מבריק כשיש clients שונים (web, mobile, TV) עם צרכי data שונים.</span></div>
</div>`,
