var COURSE_ICON='⚡';var TOTAL_CHAPTERS=8;

function getMatchData(chId) {
  return (currentLang === 'en' ? (MATCH_DATA_EN[chId] || MATCH_DATA[chId]) : MATCH_DATA[chId]) || null;
}

function renderMatch(chId) {
  var el = document.getElementById('match-' + chId);
  if (!el) return;
  var data = getMatchData(chId);
  if (!data || !data.pairs || !data.pairs.length) {
    el.innerHTML = '<div class="game-empty"><span>' + (L().noMatch || 'אין משחק התאמה') + '</span></div>';
    return;
  }
  if (!matchState[chId]) matchState[chId] = { phase: 'idle' };
  var ms = matchState[chId];
  if      (ms.phase === 'idle')    renderMatchIdle(chId, data);
  else if (ms.phase === 'playing') renderMatchPlay(chId);
  else                             renderMatchOver(chId);
}

function renderMatchIdle(chId, data) {
  var Lc = L();
  var el = document.getElementById('match-' + chId);
  el.innerHTML =
    '<div class="game-start-card">' +
    '<div class="game-start-icon">🔗</div>' +
    '<div class="game-start-title">' + (Lc.matchTitle || 'משחק התאמה') + '</div>' +
    '<p class="game-start-desc">' + (Lc.matchDesc || 'חבר כל מושג להגדרה המתאימה') + '</p>' +
    '<div class="game-rules"><span class="game-rule">🔗 ' + data.pairs.length + ' ' + (Lc.matchPairs || 'זוגות') + '</span></div>' +
    '<button class="btn-start" id="match-start-' + chId + '">' + (Lc.gameStart || '▶ התחל') + '</button>' +
    '</div>';
  document.getElementById('match-start-' + chId).addEventListener('click', function() {
    matchBegin(chId);
  });
}

function matchBegin(chId) {
  var data = getMatchData(chId);
  var pairs = data.pairs.slice().sort(function() { return Math.random() - 0.5; });
  var terms = pairs.map(function(p, i) { return { id: i, text: p[0] }; }).sort(function() { return Math.random() - 0.5; });
  var defs  = pairs.map(function(p, i) { return { id: i, text: p[1] }; }).sort(function() { return Math.random() - 0.5; });
  matchState[chId] = { phase: 'playing', pairs: pairs, terms: terms, defs: defs,
    selected: null, matched: {}, errors: 0, total: pairs.length };
  renderMatchPlay(chId);
}

function renderMatchPlay(chId) {
  var el = document.getElementById('match-' + chId);
  var ms = matchState[chId];
  var Lc = L();
  var matched = Object.keys(ms.matched).length;

  var termsHTML = ms.terms.map(function(t, idx) {
    var cls = 'match-card match-term';
    if (ms.matched[t.id])                                              cls += ' matched-correct';
    else if (ms.selected && ms.selected.type === 0 && ms.selected.idx === idx) cls += ' selected';
    return '<div class="' + cls + '" data-type="0" data-ch="' + chId + '" data-idx="' + idx + '">' + t.text + '</div>';
  }).join('');

  var defsHTML = ms.defs.map(function(d, idx) {
    var cls = 'match-card match-def';
    if (ms.matched[d.id])                                              cls += ' matched-correct';
    else if (ms.selected && ms.selected.type === 1 && ms.selected.idx === idx) cls += ' selected';
    return '<div class="' + cls + '" data-type="1" data-ch="' + chId + '" data-idx="' + idx + '">' + d.text + '</div>';
  }).join('');

  el.innerHTML =
    '<div class="match-round-badge">' + matched + ' / ' + ms.total + '</div>' +
    '<div class="match-game">' +
    '<div class="match-instructions">' + (Lc.matchInstr || 'לחץ מושג → לחץ הגדרה') + '</div>' +
    '<div class="match-area">' +
      '<div><div class="match-col-title">' + (Lc.matchTerms || '📌 מושגים') + '</div>' +
           '<div class="match-col">' + termsHTML + '</div></div>' +
      '<div><div class="match-col-title">' + (Lc.matchDefs  || '📖 הגדרות') + '</div>' +
           '<div class="match-col">' + defsHTML  + '</div></div>' +
    '</div></div>';

  el.querySelectorAll('.match-card').forEach(function(card) {
    card.addEventListener('click', function() {
      matchClick(parseInt(card.getAttribute('data-type')),
                 parseInt(card.getAttribute('data-ch')),
                 parseInt(card.getAttribute('data-idx')));
    });
  });
}

function matchClick(type, chId, idx) {
  var ms = matchState[chId];
  if (!ms || ms.phase !== 'playing') return;
  var item = type === 0 ? ms.terms[idx] : ms.defs[idx];
  if (ms.matched[item.id]) return;

  if (!ms.selected) {
    ms.selected = { type: type, id: item.id, idx: idx };
    renderMatchPlay(chId); return;
  }
  if (ms.selected.type === type) {
    ms.selected = { type: type, id: item.id, idx: idx };
    renderMatchPlay(chId); return;
  }

  var termId = type === 0 ? item.id : ms.selected.id;
  var defId  = type === 1 ? item.id : ms.selected.id;

  if (termId === defId) {
    ms.matched[termId] = true;
    ms.selected = null;
    renderMatchPlay(chId);
    if (Object.keys(ms.matched).length === ms.total)
      setTimeout(function() { renderMatchOver(chId); }, 400);
  } else {
    ms.errors++;
    var el = document.getElementById('match-' + chId);
    el.querySelectorAll('.match-card.selected').forEach(function(c) { c.classList.add('matched-wrong'); });
    setTimeout(function() { ms.selected = null; renderMatchPlay(chId); }, 600);
  }
}

function renderMatchOver(chId) {
  matchState[chId].phase = 'over';
  var ms = matchState[chId];
  var Lc = L();
  var pct = Math.max(0, Math.round(((ms.total - Math.min(ms.errors, ms.total)) / ms.total) * 100));
  var medal = pct >= 90 ? '🏆' : pct >= 60 ? '🥈' : '🥉';
  var el = document.getElementById('match-' + chId);
  el.innerHTML =
    '<div class="match-result">' +
    '<div style="font-size:52px">' + medal + '</div>' +
    '<div class="match-score-big">' + pct + '%</div>' +
    '<div class="match-score-label">' + ms.errors + ' ' + (Lc.matchErrors || 'שגיאות') + '</div>' +
    '<div class="match-btns">' +
      '<button class="nav-btn ghost" id="match-again-' + chId + '">' + (Lc.gameAgain || '🔄 שוב') + '</button>' +
      '<button class="nav-btn primary" id="match-next-' + chId  + '">' + (Lc.nextChapter || '▶ הבא') + '</button>' +
    '</div></div>';
  document.getElementById('match-again-' + chId).addEventListener('click', function() { matchRestart(chId); });
  document.getElementById('match-next-'  + chId).addEventListener('click', function() { showNextChapter(chId); });
}

function matchRestart(chId) {
  matchState[chId] = { phase: 'idle' };
  renderMatch(chId);
}

// ============================================================
// SHARED ENGINE v3.0 — works for all courses
// ============================================================

var currentLang = 'he';
var state = { cur: 0, tabs: {}, game: {}, quiz: {} };
var gameTimer = null;

function L() { return C[currentLang]; }

function toggleLang() {
  currentLang = currentLang === 'he' ? 'en' : 'he';
  applyLang(currentLang);
}

function applyLang(lang) {
  currentLang = lang;
  var Lc = L();
  document.documentElement.setAttribute('lang', lang === 'he' ? 'he' : 'en');
  document.documentElement.setAttribute('dir', Lc.dir);
  document.getElementById('langBtn').textContent = Lc.langBtn;

  var headerEl = document.getElementById('headerChName');
  if(headerEl) headerEl.textContent = Lc.names[state.cur] || '';

  for(var i = 0; i < TOTAL_CHAPTERS; i++) {
    var set = function(id, val, prop) {
      var el = document.getElementById(id);
      if(el) el[prop || 'textContent'] = val;
    };
    set('chname-' + i, Lc.names[i] || '');
    set('chtag-' + i,  Lc.tags[i]  || '');
    set('chtitle-' + i, Lc.names[i] || '');
    set('chdesc-' + i,  Lc.descs[i] || '');

    var cheatEl = document.getElementById('cheat-' + i);
    if(cheatEl) cheatEl.innerHTML = Lc.cheat[i] || '';

    var learnEl = document.getElementById('learn-' + i);
    if(learnEl) {
      learnEl.innerHTML = Lc.learn[i] || '';
      if(learnEl.innerHTML.indexOf('CHID') >= 0)
        learnEl.innerHTML = learnEl.innerHTML.replace(/CHID/g, i);
    }

    // Rebuild tabs bar
    var tabsEl = document.getElementById('tabs-' + i);
    if(tabsEl) {
      var tabs = Lc.tabs;
      var keys = Lc.tabKeys;
      var cur  = state.tabs[i] || 'learn';
      tabsEl.innerHTML = tabs.map(function(t, ti) {
        return '<button class="tab-btn' + (cur === keys[ti] ? ' active' : '') +
          '" onclick="showTab(' + i + ',\'' + keys[ti] + '\')">' + t + '</button>';
      }).join('');
    }

    // Clear rendered state for game/quiz so they re-render in new lang
    ['game', 'quiz'].forEach(function(p) {
      var el = document.getElementById(p + '-' + i);
      if(el) { el.innerHTML = ''; delete el.dataset.rendered; }
    });
  }

  activateTab(state.cur, state.tabs[state.cur] || 'learn');
}

// ── NAVIGATION ──────────────────────────────────────────────
function showChapter(n) {
  document.querySelectorAll('.chapter').forEach(function(c) { c.classList.remove('active'); });
  document.querySelectorAll('.ch-btn').forEach(function(b) { b.classList.remove('active'); });
  var ch = document.getElementById('ch-' + n);
  var nb = document.getElementById('nav-' + n);
  if(ch) ch.classList.add('active');
  if(nb) nb.classList.add('active');
  state.cur = n;
  var hEl = document.getElementById('headerChName');
  if(hEl) hEl.textContent = L().names[n] || '';
  window.scrollTo(0, 0);
  activateTab(n, state.tabs[n] || 'learn');
}

function showNextChapter(chId) {
  var next = chId + 1;
  if(next < TOTAL_CHAPTERS) showChapter(next);
  else showTab(chId, 'cheat');
}

function showTab(chId, tabName) {
  state.tabs[chId] = tabName;
  activateTab(chId, tabName);
}

function activateTab(chId, tabName) {
  var ch = document.getElementById('ch-' + chId);
  if(!ch) return;
  ch.querySelectorAll('.tab-btn').forEach(function(btn) {
    var m = btn.getAttribute('onclick').match(/'(\w+)'\)/);
    btn.classList.toggle('active', !!(m && m[1] === tabName));
  });
  ch.querySelectorAll('.tab-panel').forEach(function(p) {
    p.classList.toggle('active', p.id === chId + '-' + tabName);
  });
  if(tabName === 'match') renderMatch(chId);
  if(tabName === 'quiz' && L().tabKeys.indexOf('quiz') >= 0) renderQuiz(chId);
}

// ── GAME ENGINE ──────────────────────────────────────────────
function getG(i) {
  var raw = (currentLang === 'en' ? (GAME_QS_EN[i] || GAME_QS[i]) : GAME_QS[i]) || [];
  if(!raw.length) return [];
  return raw.map(function(q) { return shuffleOpts(q); });
}

function shuffleOpts(q) {
  var idx = [0,1,2,3];
  for(var i = idx.length-1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i+1));
    var tmp = idx[i]; idx[i] = idx[j]; idx[j] = tmp;
  }
  return { q: q.q, o: idx.map(function(k){ return q.o[k]; }), a: idx.indexOf(q.a) };
}

function renderGame(chId) {
  var el = document.getElementById('game-' + chId);
  if(!el) return;
  if(!state.game[chId]) state.game[chId] = { phase: 'idle' };
  var gs = state.game[chId];
  var Lc = L();
  var gqs = getG(chId);

  if(!gqs.length) {
    el.innerHTML = '<div class="game-empty"><span>' + (Lc.noGame || 'אין שאלות לפרק זה') + '</span></div>';
    return;
  }

  if(gs.phase === 'idle') {
    el.innerHTML =
      '<div class="game-start-card">' +
        '<div class="game-start-icon">' + COURSE_ICON + '</div>' +
        '<div class="game-start-title">' + Lc.gameTitle + '</div>' +
        '<p class="game-start-desc">' + Lc.gameDesc + '</p>' +
        '<div class="game-rules">' +
          '<span class="game-rule">⏱️ 60 ' + Lc.gameSeconds + '</span>' +
          '<span class="game-rule">❓ ' + gqs.length + ' ' + Lc.gameQuestions + '</span>' +
        '</div>' +
        '<button class="btn-start" onclick="gameStart(' + chId + ')">' + Lc.gameStart + '</button>' +
      '</div>';
  } else if(gs.phase === 'playing') {
    renderGamePlay(chId);
  } else {
    renderGameOver(chId);
  }
}

function gameStart(chId) {
  var gqs = getG(chId);
  state.game[chId] = { phase:'playing', qs: gqs.slice().sort(function(){ return Math.random()-.5; }), qi:0, score:0, time:60, answered:false };
  renderGame(chId);
  startTimer(chId);
}

function renderGamePlay(chId) {
  var el = document.getElementById('game-' + chId);
  var gs = state.game[chId];
  var Lc = L();
  if(!gs || gs.phase !== 'playing') return;
  var q = gs.qs[gs.qi];
  if(!q) { gameOver(chId); return; }

  el.innerHTML =
    '<div class="game-hud">' +
      '<span class="hud-timer' + (gs.time <= 10 ? ' urgent' : '') + '" id="gtimer-' + chId + '">' + gs.time + '</span>' +
      '<span class="hud-qnum">' + (gs.qi+1) + '/' + gs.qs.length + '</span>' +
      '<span class="hud-score">⭐ ' + gs.score + '</span>' +
    '</div>' +
    '<div class="game-question">' + q.q + '</div>' +
    '<div class="game-opts">' +
      q.o.map(function(opt, i) {
        return '<button class="game-opt" id="gopt-' + chId + '-' + i + '" onclick="gameAnswer(' + chId + ',' + i + ')">' +
          '<span class="opt-letter">' + (Lc.optLetters[i] || i) + '</span>' + opt + '</button>';
      }).join('') +
    '</div>' +
    '<div class="game-feedback" id="gfb-' + chId + '"></div>';
}

function startTimer(chId) {
  clearInterval(gameTimer);
  gameTimer = setInterval(function() {
    var gs = state.game[chId];
    if(!gs || gs.phase !== 'playing') { clearInterval(gameTimer); return; }
    gs.time--;
    var t = document.getElementById('gtimer-' + chId);
    if(t) { t.textContent = gs.time; t.className = 'hud-timer' + (gs.time <= 10 ? ' urgent' : ''); }
    if(gs.time <= 0) { clearInterval(gameTimer); gameOver(chId); }
  }, 1000);
}

function gameAnswer(chId, chosen) {
  var gs = state.game[chId];
  if(!gs || gs.answered) return;
  gs.answered = true;
  var q = gs.qs[gs.qi];
  var correct = chosen === q.a;
  if(correct) gs.score += 10;

  for(var i = 0; i < q.o.length; i++) {
    var btn = document.getElementById('gopt-' + chId + '-' + i);
    if(!btn) continue;
    if(i === q.a) btn.classList.add('correct');
    else if(i === chosen) btn.classList.add('wrong');
  }
  var fb = document.getElementById('gfb-' + chId);
  if(fb) fb.innerHTML = correct ?
    '<span class="fb-correct">✓ ' + (L().correct || 'נכון!') + '</span>' :
    '<span class="fb-wrong">✗ ' + q.o[q.a] + '</span>';

  setTimeout(function() {
    gs.qi++;
    gs.answered = false;
    if(gs.qi >= gs.qs.length) gameOver(chId);
    else renderGamePlay(chId);
  }, 1200);
}

function gameOver(chId) {
  clearInterval(gameTimer);
  var gs = state.game[chId];
  if(!gs) return;
  gs.phase = 'over';
  var Lc = L();
  var total = gs.qs.length * 10;
  var pct   = total ? Math.round((gs.score / total) * 100) : 0;
  var medal = gs.score >= total * .8 ? '🏆' : gs.score >= total * .5 ? '🥈' : '🥉';
  var lbIdx = Lc.resultLabels ? Math.min(Math.floor(pct/20), Lc.resultLabels.length-1) : 0;
  var label = Lc.resultLabels ? Lc.resultLabels[lbIdx] : '';

  document.getElementById('game-' + chId).innerHTML =
    '<div class="game-over-card">' +
      '<div class="game-over-medal">' + medal + '</div>' +
      '<div class="game-over-score">' + gs.score + '</div>' +
      '<div class="game-over-pct">' + pct + '% ' + (Lc.correct || '') + '</div>' +
      '<div class="game-over-label">' + label + '</div>' +
      '<div class="game-over-btns">' +
        '<button class="nav-btn ghost" onclick="gameRestart(' + chId + ')">' + Lc.gameAgain + '</button>' +
        '<button class="nav-btn primary" onclick="showNextChapter(' + chId + ')">' + (Lc.nextChapter || '▶ הבא') + '</button>' +
        '<button class="nav-btn ghost" onclick="showTab(' + chId + ',\'cheat\')">' + Lc.gameToCheat + '</button>' +
      '</div>' +
    '</div>';
}

function gameRestart(chId) {
  state.game[chId] = { phase: 'idle' };
  var el = document.getElementById('game-' + chId);
  if(el) el.innerHTML = '';
  renderGame(chId);
}

// ── QUIZ ENGINE ──────────────────────────────────────────────
function getQ(i) {
  var raw = (currentLang === 'en' ? (QUIZZES_EN[i] || QUIZZES[i]) : QUIZZES[i]) || [];
  return raw.filter(function(q){ return q.q; });
}

function renderQuiz(chId) {
  var el = document.getElementById('quiz-' + chId);
  if(!el || el.dataset.rendered) return;
  el.dataset.rendered = '1';
  var qs = getQ(chId);
  var Lc = L();
  if(!qs.length) {
    el.innerHTML = '<div class="game-empty"><span>' + (Lc.noQuiz || 'אין חידון לפרק זה') + '</span></div>';
    return;
  }
  if(!state.quiz[chId]) state.quiz[chId] = { qi:0, ans:{}, done:false, score:0 };

  var pips = qs.map(function(_,i){
    return '<div class="qpip" id="qpip-' + chId + '-' + i + '"></div>';
  }).join('');

  var cards = qs.map(function(q,i){
    return '<div class="quiz-card' + (i===0?' active':'') + '" id="qcard-' + chId + '-' + i + '">' +
      '<div class="quiz-meta" id="qmeta-' + chId + '-' + i + '"></div>' +
      '<div class="quiz-q">' + q.q + '</div>' +
      '<div class="quiz-opts">' +
        q.o.map(function(opt,oi){
          return '<button class="quiz-opt" id="qopt-' + chId + '-' + i + '-' + oi +
            '" onclick="quizPick(' + chId + ',' + i + ',' + oi + ')">' +
            '<span class="opt-letter" id="qltr-' + chId + '-' + i + '-' + oi + '"></span>' + opt + '</button>';
        }).join('') +
      '</div>' +
      '<div class="quiz-explain" id="qexp-' + chId + '-' + i + '" style="display:none">' +
        '<strong>' + Lc.quizExplain + '</strong> ' + (q.e || '') +
      '</div>' +
    '</div>';
  }).join('');

  el.innerHTML =
    '<div class="quiz-pips" id="qprog-' + chId + '">' + pips + '</div>' +
    cards +
    '<div class="quiz-result" id="qres-' + chId + '" style="display:none">' +
      '<div class="game-over-medal" id="qemoji-' + chId + '">🎉</div>' +
      '<div class="game-over-score" id="qscore-' + chId + '"></div>' +
      '<div class="game-over-label" id="qlabel-' + chId + '"></div>' +
      '<div class="game-over-btns">' +
        '<button class="nav-btn ghost" id="qbtn-reset-' + chId + '" onclick="quizReset(' + chId + ')">' + Lc.quizAgain + '</button>' +
        '<button class="nav-btn primary" id="qbtn-next-' + chId + '" onclick="showNextChapter(' + chId + ')">' + (Lc.nextChapter||'▶ הבא') + '</button>' +
        '<button class="nav-btn ghost" id="qbtn-cheat-' + chId + '" onclick="showTab(' + chId + ',\'cheat\')">' + Lc.gameToCheat + '</button>' +
      '</div>' +
    '</div>' +
    '<div class="quiz-nav" id="qnav-' + chId + '">' +
      '<button class="nav-btn ghost" id="qprev-' + chId + '" onclick="quizNav(' + chId + ',-1)">' + Lc.quizPrev + '</button>' +
      '<button class="nav-btn primary" id="qnext-' + chId + '" onclick="quizNav(' + chId + ',1)">' + Lc.quizNext + '</button>' +
    '</div>';

  refreshQuiz(chId);
}

function refreshQuiz(chId) {
  var st = state.quiz[chId];
  if(!st) return;
  var qs = getQ(chId);
  var Lc = L();
  qs.forEach(function(_,i) {
    var card = document.getElementById('qcard-' + chId + '-' + i);
    if(card) card.classList.toggle('active', i === st.qi && !st.done);
    var pip = document.getElementById('qpip-' + chId + '-' + i);
    if(pip) pip.className = 'qpip' + (st.ans[i] !== undefined ? ' done' : i === st.qi ? ' cur' : '');
    var meta = document.getElementById('qmeta-' + chId + '-' + i);
    if(meta) meta.textContent = Lc.question + ' ' + (i+1) + ' ' + Lc.of + ' ' + qs.length;
    for(var oi=0;oi<4;oi++) {
      var ltr = document.getElementById('qltr-' + chId + '-' + i + '-' + oi);
      if(ltr) ltr.textContent = Lc.optLetters[oi] || oi;
    }
  });
  var res = document.getElementById('qres-' + chId);
  var nav = document.getElementById('qnav-' + chId);
  if(res) res.style.display = st.done ? 'block' : 'none';
  if(nav) nav.style.display = st.done ? 'none' : 'flex';
  if(st.done) {
    var sc = document.getElementById('qscore-' + chId);
    var lb = document.getElementById('qlabel-' + chId);
    if(sc) sc.textContent = st.score + '/' + (qs.length*10);
    var lbIdx = Lc.resultLabels ? Math.min(Math.floor((st.score/(qs.length*10))*Lc.resultLabels.length), Lc.resultLabels.length-1) : 0;
    if(lb && Lc.resultLabels) lb.textContent = Lc.resultLabels[lbIdx];
  }
  var prev = document.getElementById('qprev-' + chId);
  var next = document.getElementById('qnext-' + chId);
  if(prev) prev.disabled = st.qi === 0;
  if(next) next.textContent = st.qi === qs.length-1 ? (Lc.quizSubmit||'שלח') : Lc.quizNext;
}

function quizPick(chId, qi, oi) {
  var st = state.quiz[chId];
  if(!st || st.done || st.ans[qi] !== undefined) return;
  st.ans[qi] = oi;
  var qs = getQ(chId);
  var q  = qs[qi];
  var correct = oi === q.a;
  if(correct) st.score += 10;
  for(var k=0;k<q.o.length;k++) {
    var btn = document.getElementById('qopt-' + chId + '-' + qi + '-' + k);
    if(!btn) continue;
    if(k === q.a) btn.classList.add('correct');
    else if(k === oi) btn.classList.add('wrong');
    btn.disabled = true;
  }
  var exp = document.getElementById('qexp-' + chId + '-' + qi);
  if(exp) exp.style.display = 'block';
  refreshQuiz(chId);
}

function quizNav(chId, dir) {
  var st = state.quiz[chId];
  if(!st) return;
  var qs = getQ(chId);
  if(dir === 1 && st.qi === qs.length-1) {
    st.done = true;
  } else {
    st.qi = Math.max(0, Math.min(qs.length-1, st.qi + dir));
  }
  refreshQuiz(chId);
}

function quizReset(chId) {
  state.quiz[chId] = { qi:0, ans:{}, done:false, score:0 };
  var el = document.getElementById('quiz-' + chId);
  if(el) { el.innerHTML = ''; delete el.dataset.rendered; }
  renderQuiz(chId);
}

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  applyLang('he');
  showChapter(0);
});



// ── FULL REVIEW ─────────────────────────────────────────────
function buildReviewContent() {
  var Lc = C[currentLang];
  var html = '';
  for (var i = 0; i < TOTAL_CHAPTERS; i++) {
    var num = (i < 10 ? '0' : '') + i;
    var cheat = Lc.cheat[i] || '';
    html += '<div class="review-chapter-block">' +
      '<div class="review-chapter-title">' +
        '<span class="review-chapter-num">' + num + '</span>' +
        '<span class="review-chapter-name">' + Lc.names[i] + '</span>' +
      '</div>' +
      '<div class="review-chapter-body">' + cheat + '</div>' +
    '</div>';
  }
  return html;
}

function openReview() {
  var total = TOTAL_CHAPTERS;
  document.getElementById('reviewTitle').textContent = currentLang === 'he' ? '📚 סיכום מלא' : '📚 Full Review';
  document.getElementById('reviewSub').textContent = currentLang === 'he'
    ? 'כל ' + total + ' הפרקים בעמוד אחד'
    : 'All ' + total + ' chapters on one page';
  document.getElementById('reviewBody').innerHTML = buildReviewContent();
  document.getElementById('reviewOverlay').classList.add('open');
  document.getElementById('reviewDrawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeReview() {
  document.getElementById('reviewOverlay').classList.remove('open');
  document.getElementById('reviewDrawer').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeReview();
});

</script>

<div class="review-overlay" id="reviewOverlay" onclick="closeReview()"></div>
<div class="review-drawer" id="reviewDrawer">
  <div class="review-header">
    <div>
      <div class="review-header-title" id="reviewTitle">📚 סיכום מלא</div>
      <div class="review-header-sub" id="reviewSub">כל 8 הפרקים בעמוד אחד</div>
    </div>
    <button class="review-close" onclick="closeReview()">×</button>
  </div>
  <div class="review-body" id="reviewBody"></div>
</div>
