`<div class="did-you-know">💡 <strong>Did you know?</strong> Linux runs 96.3% of the top 1 million web servers, 100% of the world's 500 fastest supercomputers, every Android device, and the ISS. You probably use it dozens of times a day without knowing it.</div>
<div class="section-title">What is Linux?</div>
<p class="prose">Linux is a Unix-family kernel developed in 1991 by Linus Torvalds. The kernel is the software layer that manages hardware and provides services to applications. What most people call "Linux" is actually GNU/Linux — the Linux kernel combined with GNU tools.</p>
<div class="grid-3">
<div class="card"><div class="card-icon">🐧</div><div class="card-title">Kernel</div><div class="card-body">System core — manages CPU, memory, I/O, device drivers and processes.</div></div>
<div class="card"><div class="card-icon">🔧</div><div class="card-title">GNU Tools</div><div class="card-body">System utilities: bash, ls, grep, gcc. Without them the kernel alone isn't usable.</div></div>
<div class="card"><div class="card-icon">📦</div><div class="card-title">Distros</div><div class="card-body">Ubuntu, Fedora, Debian, Arch — same kernel, different package managers and configurations.</div></div>
</div>
<div class="section-title">Architecture</div>
<div class="table-wrap"><table class="data-table">
  <thead><tr><th>Layer</th><th>Examples</th><th>Role</th></tr></thead>
  <tbody>
    <tr><td>👩‍💻 Apps</td><td>nginx, python, bash scripts</td><td>Programs you run</td></tr>
    <tr><td>🐚 Shell</td><td>Bash, Zsh, Fish</td><td>Human interface — translates commands</td></tr>
    <tr><td>📚 Libraries</td><td>glibc, POSIX, libc++</td><td>Shared code for all programs</td></tr>
    <tr><td>🐧 Kernel</td><td>Linux 6.x</td><td>Manages hardware, memory, processes</td></tr>
    <tr><td>💻 Hardware</td><td>CPU, RAM, Disk, NIC</td><td>Physical components</td></tr>
  </tbody>
</table></div>
<div class="section-title">Common Distributions</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Distro</th><th>Base</th><th>Package Manager</th><th>Use Case</th></tr></thead><tbody>
<tr><td>Ubuntu</td><td>Debian</td><td>apt / snap</td><td>Desktop, cloud, beginners</td></tr>
<tr><td>Debian</td><td>-</td><td>apt</td><td>Stable servers</td></tr>
<tr><td>RHEL/CentOS</td><td>Red Hat</td><td>yum / dnf</td><td>Enterprise</td></tr>
<tr><td>Fedora</td><td>Red Hat</td><td>dnf</td><td>Developers, bleeding edge</td></tr>
<tr><td>Arch Linux</td><td>-</td><td>pacman</td><td>Advanced, full flexibility</td></tr>
<tr><td>Alpine</td><td>-</td><td>apk</td><td>Docker, minimal</td></tr>
</tbody></table></div>
<div class="callout callout-info"><strong>💡 Kernel vs OS:</strong> Linux = kernel only. When people say "Linux" in a server context they usually mean a full distro like Ubuntu 22.04 LTS.</div>
<div class="incident-box"><div class="incident-title">🔥 Real Incident: CrowdStrike — July 2024, 8.5M Windows machines crashed</div><div class="incident-body">A faulty Falcon sensor update caused 8.5M Windows machines to BSOD simultaneously. Flights cancelled, hospitals shut down, banks closed. Loss: over $5 billion. Linux systems were far less affected — kernel module isolation, fast rollback, controlled versioning. <strong>Update strategy = infrastructure strategy.</strong></div></div>

`<div class="did-you-know">💡 <strong>Did you know?</strong> When you delete a file in Linux only the directory entry is removed — data stays on disk until overwritten. Recovery tools like <code class="inline-code">extundelete</code> can restore "deleted" files.</div>
<div class="section-title">Filesystem Hierarchy Standard (FHS)</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Directory</th><th>Contents</th></tr></thead><tbody>
<tr><td><code class="inline-code">/</code></td><td>Root — everything exists below here</td></tr>
<tr><td><code class="inline-code">/etc</code></td><td>System configuration files</td></tr>
<tr><td><code class="inline-code">/var</code></td><td>Variable data: logs, databases, spool</td></tr>
<tr><td><code class="inline-code">/home</code></td><td>User home directories</td></tr>
<tr><td><code class="inline-code">/tmp</code></td><td>Temporary files, cleared on reboot</td></tr>
<tr><td><code class="inline-code">/proc</code></td><td>Virtual FS — process and kernel info</td></tr>
<tr><td><code class="inline-code">/dev</code></td><td>Device files — disks, TTY, null</td></tr>
<tr><td><code class="inline-code">/usr/bin</code></td><td>User executables</td></tr>
<tr><td><code class="inline-code">/sbin</code></td><td>Admin commands (shutdown, fdisk...)</td></tr>
</tbody></table></div>
<div class="section-title">File Permissions</div>
<div class="perm-box">
 <div class="perm-seg perm-d">d</div>
 <div class="perm-seg"><span class="perm-r">r</span><span class="perm-w">w</span><span class="perm-x">x</span></div>
 <div class="perm-seg"><span class="perm-r">r</span><span class="perm-dash">-</span><span class="perm-x">x</span></div>
 <div class="perm-seg"><span class="perm-r">r</span><span class="perm-dash">-</span><span class="perm-dash">-</span></div>
</div>
<p class="prose">type · owner (rwx) · group (r-x) · others (r--) · read=4, write=2, execute=1</p>
<pre class="code-block"><code>chmod 755 script.sh   <span class="comment"># rwxr-xr-x</span>
chmod u+x file        <span class="comment"># add execute to owner</span>
chown alice:devs file <span class="comment"># change owner and group</span>
ls -la /etc/passwd    <span class="comment"># -rw-r--r-- 1 root root</span></code></pre>
<div class="section-title">Inodes and Links</div>
<div class="grid-2">
<div class="card"><div class="card-icon">🔗</div><div class="card-title">Hard Link</div><div class="card-body">Another pointer to the same inode. Deleting the original doesn't delete data. Doesn't work on directories or cross-filesystem.</div></div>
<div class="card"><div class="card-icon">↪️</div><div class="card-title">Symbolic Link (Symlink)</div><div class="card-body">A file that points to a path. Like a Windows shortcut. Works on directories, can be broken.</div></div>
</div>
<pre class="code-block"><code>ln /etc/hosts /tmp/hosts_hard  <span class="comment"># hard link</span>
ln -s /etc/nginx/nginx.conf ~/nginx.conf  <span class="comment"># symlink</span>
stat /etc/passwd  <span class="comment"># show inode, data</span>
df -i  <span class="comment"># check inode usage</span></code></pre>
<div class="incident-box"><div class="incident-title">🔥 Real Incident: GitLab — accidental Production DB deletion (2017)</div><div class="incident-body">A GitLab engineer tried to delete staging data but was connected to production. Ran <code class="inline-code">rm -rf</code> on 300GB. An LVM snapshot from 6 hours earlier partially saved them — ~6 hours of data from 5000 users was lost. <strong>Production processes shouldn't have delete permissions.</strong></div></div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>
<div class="section-title">Navigating and Exploring the Filesystem</div>
<pre class="code-block"><code><span class="comment"># Quick mapping of what is there</span>
tree -L 2 /etc      <span class="comment"># tree depth 2 of /etc</span>
ls -lah /var/log    <span class="comment"># logs — sizes and timestamps</span>

<span class="comment"># Check permissions of a specific file</span>
stat /etc/passwd    <span class="comment"># everything about a file: inode, permissions, timestamps</span>

<span class="comment"># Find files by permissions</span>
find / -perm -4000 -type f 2>/dev/null  <span class="comment"># SUID files</span>
find /home -perm /o+w 2>/dev/null       <span class="comment"># writable by others</span></code></pre>

`<div class="did-you-know">💡 <strong>Did you know?</strong> grep is named after the vi command <code class="inline-code">g/re/p</code>. Doug McIlroy invented the pipe (<code class="inline-code">|</code>) in 1973 and called it "the best idea that ever came out of Unix". Every pipeline you write today is his direct legacy.</div>
<div class="section-title">Navigation and File Viewing</div>
<pre class="code-block"><code>ls -lah --color    <span class="comment"># detailed list with human-readable sizes</span>
ls -lt             <span class="comment"># sort by modification time</span>
find / -name "*.log" -mtime -7  <span class="comment"># log files changed in 7 days</span>
find /var -size +100M           <span class="comment"># files larger than 100MB</span>
tree -L 2 /etc                  <span class="comment"># display tree depth 2</span></code></pre>
<div class="section-title">Search and Text Processing</div>
<pre class="code-block"><code>grep -rn "ERROR" /var/log/    <span class="comment"># recursive search with line numbers</span>
grep -v "DEBUG" app.log       <span class="comment"># exclude DEBUG lines</span>
grep -E "^(ERROR|WARN)" log   <span class="comment"># extended regex</span>
awk '{print $1,$4}' access.log <span class="comment"># print columns 1 and 4</span>
sed 's/old/new/g' file.txt    <span class="comment"># replace text</span>
cut -d: -f1 /etc/passwd        <span class="comment"># cut column 1 (usernames)</span>
sort -k2 -n data.txt | uniq -c <span class="comment"># sort and count unique</span></code></pre>
<div class="section-title">Pipes and Redirects</div>
<pre class="code-block"><code>cat access.log | grep 404 | wc -l   <span class="comment"># count 404 errors</span>
ps aux | grep nginx | grep -v grep   <span class="comment"># find nginx processes</span>
command > out.txt    <span class="comment"># redirect stdout</span>
command 2> err.txt   <span class="comment"># redirect stderr</span>
command &> all.txt   <span class="comment"># both to same file</span>
command >> log.txt   <span class="comment"># append (don't overwrite)</span></code></pre>
<div class="callout callout-warn"><strong>⚠️ rm -rf:</strong> No Trash in Linux CLI. <code class="inline-code">rm -rf /</code> deletes everything instantly. Always double-check before running!</div>
<div class="incident-box"><div class="incident-title">🔥 Real Incident: Knight Capital — $440M vanished in 45 minutes (2012)</div><div class="incident-body">Knight Capital deployed an update to 8 servers — one was missed. The script didn't check exit codes. Within 45 minutes: 4M erroneous trades, $440M loss. <strong>Checking exit codes, <code class="inline-code">set -e</code>, and <code class="inline-code">diff</code> for deployment validation — the difference between a deploy and a disaster.</strong></div></div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>
<div class="section-title">Useful Daily One-liners</div>
<pre class="code-block"><code><span class="comment"># Top 10 IPs from access log</span>
awk '{print $1}' /var/log/nginx/access.log | sort | uniq -c | sort -rn | head -10

<span class="comment"># Find the largest file changed today</span>
find / -type f -newer /tmp -size +10M 2>/dev/null | head -5

<span class="comment"># Search string across all config files</span>
grep -r "password" /etc/ 2>/dev/null | grep -v "^Binary"

<span class="comment"># Watch multiple logs at once</span>
tail -f /var/log/nginx/error.log /var/log/syslog

<span class="comment"># Who sends the most 404s?</span>
awk '$9==404 {print $1}' access.log | sort | uniq -c | sort -rn | head -5</code></pre>

`<div class="did-you-know">💡 <strong>Did you know?</strong> Linux's permission model dates to Unix in the 1970s. When Google runs containers, each runs as a specific user with minimal permissions — Principle of Least Privilege. That's the idea behind <code class="inline-code">chmod 600</code> for SSH keys.</div>
<div class="section-title">User Management</div>
<pre class="code-block"><code>useradd -m -s /bin/bash alice  <span class="comment"># create user with home and shell</span>
passwd alice                    <span class="comment"># set password</span>
usermod -aG sudo alice          <span class="comment"># add to sudo group</span>
userdel -r alice                <span class="comment"># delete user + home</span>
id alice                        <span class="comment"># uid=1001 gid=1001 groups=...</span>
who / w                         <span class="comment"># who is logged in now</span>
last -n 20                      <span class="comment"># last 20 logins</span></code></pre>
<div class="section-title">sudo and Privileges</div>
<div class="grid-2">
<div class="card"><div class="card-icon">⚡</div><div class="card-title">sudo</div><div class="card-body">Runs one command as root. Logged in /var/log/auth.log. Preferred over su for all uses.</div></div>
<div class="card"><div class="card-icon">📋</div><div class="card-title">sudoers</div><div class="card-body">/etc/sudoers defines who can do what. <code class="inline-code">alice ALL=(ALL) NOPASSWD: /bin/systemctl</code></div></div>
</div>
<div class="section-title">chmod — Numbers and Symbols</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Command</th><th>Meaning</th></tr></thead><tbody>
<tr><td><code class="inline-code">chmod 755 file</code></td><td>rwxr-xr-x — owner all, others r+x</td></tr>
<tr><td><code class="inline-code">chmod 644 file</code></td><td>rw-r--r-- — regular files</td></tr>
<tr><td><code class="inline-code">chmod 600 key</code></td><td>rw------- — SSH private key</td></tr>
<tr><td><code class="inline-code">chmod +x script</code></td><td>add execute for everyone</td></tr>
<tr><td><code class="inline-code">chmod -R 750 dir</code></td><td>recursive on entire directory</td></tr>
</tbody></table></div>
<div class="callout callout-danger"><strong>🚨 SSH Key Permissions:</strong> If the private key isn't <code class="inline-code">chmod 600</code>, SSH will refuse to use it with "Permissions too open" error.</div>
<div class="incident-box"><div class="incident-title">🔥 Real Incident: Uber Data Breach — 2016, 57M users</div><div class="incident-body">Hackers found a private Uber GitHub repo with AWS credentials in the code. They accessed S3 buckets with data of 57M users and 600K drivers. Uber paid $100K to stay quiet. <strong><code class="inline-code">chmod 600</code> on credentials, <code class="inline-code">.gitignore</code> for <code class="inline-code">*.env</code>, <code class="inline-code">git-secrets</code> — credentials in code = guaranteed breach.</strong></div></div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>
<div class="section-title">Creating a Production Server User</div>
<pre class="code-block"><code><span class="comment"># 1. Create deploy user without login password</span>
sudo useradd -m -s /bin/bash deploy
sudo passwd -l deploy    <span class="comment"># lock password — SSH key only</span>

<span class="comment"># 2. Add SSH key</span>
sudo mkdir -p /home/deploy/.ssh
sudo chmod 700 /home/deploy/.ssh
sudo chmod 600 /home/deploy/.ssh/authorized_keys
sudo chown -R deploy:deploy /home/deploy/.ssh

<span class="comment"># 3. Allow deploy to restart a specific service</span>
sudo visudo
<span class="comment"># add: deploy ALL=(ALL) NOPASSWD: /bin/systemctl restart myapp</span></code></pre>

`<div class="did-you-know">💡 <strong>Did you know?</strong> When your browser freezes and you click Force Quit — that's SIGKILL. On macOS and Windows too. Every modern process manager — Docker, Kubernetes, systemd — uses the same signals invented in Unix in the 1970s.</div>
<div class="section-title">Viewing Processes</div>
<pre class="code-block"><code>ps aux                  <span class="comment"># all processes with %CPU, %MEM</span>
ps aux --sort=-%cpu | head -10  <span class="comment"># top 10 by CPU</span>
pstree -p               <span class="comment"># process tree with PIDs</span>
top / htop              <span class="comment"># real-time (htop = colorful and friendlier)</span>
lsof -p 1234            <span class="comment"># open files of process 1234</span>
lsof -i :80             <span class="comment"># who is listening on port 80</span></code></pre>
<div class="section-title">Signals and Kill</div>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Signal</th><th>Number</th><th>Meaning</th></tr></thead><tbody>
<tr><td>SIGTERM</td><td>15</td><td>Polite termination request (can be caught)</td></tr>
<tr><td>SIGKILL</td><td>9</td><td>Immediate kill — cannot be caught</td></tr>
<tr><td>SIGHUP</td><td>1</td><td>Reload config (nginx, sshd...)</td></tr>
<tr><td>SIGINT</td><td>2</td><td>Ctrl+C from terminal</td></tr>
<tr><td>SIGSTOP</td><td>19</td><td>Stop process (Ctrl+Z)</td></tr>
</tbody></table></div>
<pre class="code-block"><code>kill -15 1234    <span class="comment"># request graceful shutdown</span>
kill -9 1234     <span class="comment"># force kill (last resort)</span>
killall nginx    <span class="comment"># kill by name</span>
pkill -u alice   <span class="comment"># kill all of alice's processes</span></code></pre>
<div class="section-title">Jobs and Background</div>
<pre class="code-block"><code>command &         <span class="comment"># run in background</span>

fg %1             <span class="comment"># bring job 1 to foreground</span>
nohup cmd &       <span class="comment"># keep running after logout</span></code></pre>

<pre class="code-block"><code>crontab -e   <span class="comment"># edit cron jobs</span>
<span class="comment"># min hour day-of-month month day-of-week</span>

`<div class="did-you-know">💡 <strong>Did you know?</strong> Vim was created in 1991 as an improvement on vi from 1976. In 2017, StackOverflow asked "How do I exit Vim?" — 1.4 million views. The transition between modes is the mental model that confuses everyone at first. Once you understand the logic, Vim becomes the fastest editing tool available.</div>

<div class="section-title">Modal Editing — The Idea Behind Vim</div>
<p class="prose">Vim is a modal editor — it has different modes, and each mode interprets keystrokes differently. Normal Mode is the default: every letter is a command, not a character to type. Insert Mode is for writing. Visual Mode for selecting. Command Mode for advanced commands. The confusion always comes from pressing letters in Normal Mode and wondering what happened to your file.</p>
<p class="prose">The first rule: ESC always returns to Normal Mode. Always. Even if you do not know where you are — ESC brings you back to the base.</p>

<div class="grid-2">
<div class="card"><div class="card-icon">📋</div><div class="card-title">Normal Mode — Default</div><div class="card-body">Navigation, deletion, copy, search. Every keypress is a command. ESC always returns here.</div></div>
<div class="card"><div class="card-icon">✏️</div><div class="card-title">Insert Mode — Writing</div><div class="card-body">i = before cursor. a = after cursor. o = new line below. I = start of line. A = end of line. ESC = exit.</div></div>
<div class="card"><div class="card-icon">🔲</div><div class="card-title">Visual Mode — Selection</div><div class="card-body">v = characters. V = full lines. Ctrl+v = columns (block). After selecting: y=copy, d=cut, c=change.</div></div>
<div class="card"><div class="card-icon">⌨️</div><div class="card-title">Command Mode — Commands</div><div class="card-body">: from Normal Mode. :w = save. :q = quit. :wq = save and quit. :q! = quit without saving.</div></div>
</div>

<div class="section-title">Vim — Essential Commands</div>
<pre class="code-block"><code><span class="comment"># Navigation in Normal Mode</span>
h j k l        <span class="comment"># left, down, up, right</span>
w              <span class="comment"># next word</span>
b              <span class="comment"># previous word</span>
0              <span class="comment"># start of line</span>
$              <span class="comment"># end of line</span>
gg             <span class="comment"># start of file</span>
G              <span class="comment"># end of file</span>
:42            <span class="comment"># jump to line 42</span>

<span class="comment"># Editing</span>
dd             <span class="comment"># delete line</span>
yy             <span class="comment"># copy line</span>
p              <span class="comment"># paste</span>
u              <span class="comment"># undo</span>
Ctrl+r         <span class="comment"># redo</span>
.              <span class="comment"># repeat last action</span>
ciw            <span class="comment"># change inner word</span>

<span class="comment"># Search and replace</span>
/pattern       <span class="comment"># search (n = next, N = previous)</span>
:%s/old/new/g  <span class="comment"># replace all in file</span></code></pre>

<div class="real-world-box">

    nano is the immediate solution: simple, Ctrl+X to exit, instructions at the bottom. For quick config file edits — nano is perfect. vim is an investment: steep learning curve, but once mastered — editing 5x faster. For editing code on production servers, for sysadmins, for anyone who spends hours in a terminal — vim is worth learning.

`<div class="did-you-know">💡 <strong>Did you know?</strong> systemd replaced SysV init in 2010 and sparked huge controversy in the Linux community — some argued it was "too complex" and "does too much." Today systemd runs on Ubuntu, Fedora, Debian, CentOS, Arch, and nearly every modern distribution. Understanding systemd means understanding how Linux manages services, dependencies, and the boot sequence.</div>

<div class="section-title">systemd — What It Is and How It Works</div>
<p class="prose">systemd is the init system of modern Linux — the first process that runs after the kernel (PID 1), which starts everything else. systemd manages services (daemon processes), defines startup order with dependencies, listens to sockets, monitors processes, and displays logs. When you run <code>systemctl start nginx</code> — systemd creates the process, monitors it, and restarts it if it dies.</p>
<p class="prose">systemd works with "units" — configuration files that describe what to run and how. Every service, socket, timer, and mount point is a unit. Unit files live in /lib/systemd/system (system) and /etc/systemd/system (user overrides).</p>

<div class="section-title">systemctl — Managing Services</div>
<pre class="code-block"><code><span class="comment"># Basic operations</span>
sudo systemctl start nginx
sudo systemctl stop nginx
sudo systemctl restart nginx
sudo systemctl reload nginx     <span class="comment"># reload config without restart</span>
sudo systemctl status nginx
sudo systemctl enable nginx     <span class="comment"># start at boot</span>
sudo systemctl disable nginx
sudo systemctl is-active nginx

<span class="comment"># Lists</span>
systemctl list-units --type=service
systemctl list-units --type=service --all
systemctl list-unit-files</code></pre>

<div class="section-title">Writing a Service Unit</div>
<pre class="code-block"><code><span class="comment"># /etc/systemd/system/myapp.service</span>
[Unit]
Description=My Python App
After=network.target postgresql.service
Requires=postgresql.service

[Service]
Type=simple
User=www-data
WorkingDirectory=/opt/myapp
ExecStart=/usr/bin/python3 /opt/myapp/server.py
Restart=on-failure
RestartSec=5
Environment=PORT=8080

[Install]
WantedBy=multi-user.target</code></pre>
<pre class="code-block"><code><span class="comment"># After creating the file</span>
sudo systemctl daemon-reload
sudo systemctl enable --now myapp
sudo systemctl status myapp</code></pre>

<div class="section-title">journalctl — Logs</div>
<pre class="code-block"><code>journalctl -u nginx
journalctl -u nginx -f              <span class="comment"># live (like tail -f)</span>
journalctl -u nginx --since "1h ago"
journalctl -p err -u nginx
journalctl --disk-usage
journalctl --vacuum-time=7d</code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 Service Dies and Does Not Return — How to Diagnose</div>
  <div class="real-world-body">
    <code>systemctl status myapp</code> shows "failed." Next step: <code>journalctl -u myapp -n 50 --no-pager</code> — last 50 lines without pagination. Usually the error is right there: ImportError, PermissionError, port already in use. After fixing: <code>systemctl restart myapp</code> and <code>systemctl status</code> immediately to verify.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>
<div class="section-title">Service for Your App — Checklist</div>
<pre class="code-block"><code><span class="comment"># 1. Verify app runs manually</span>
/usr/bin/python3 /opt/myapp/server.py

<span class="comment"># 2. Create unit file</span>
sudo vim /etc/systemd/system/myapp.service

<span class="comment"># 3. Start and check</span>
sudo systemctl daemon-reload
sudo systemctl start myapp
sudo systemctl status myapp

<span class="comment"># 4. If working — enable at boot</span>
sudo systemctl enable myapp

<span class="comment"># 5. Verify survives reboot</span>
sudo reboot
systemctl is-active myapp</code></pre>

`<div class="did-you-know">💡 <strong>Did you know?</strong> Running out of disk space on "/" in Linux is one of the most common causes of production downtime. Servers running logs without rotation, accumulating containers, and temp files that are never cleaned — all cause 100% disk usage that crashes applications. <code>df -h</code> and <code>du</code> are the first responders for these situations.</div>

<div class="section-title">Disk Structure — How Linux Sees Disks</div>
<p class="prose">In Linux, every physical disk is represented as a device file in /dev. First SATA disk = /dev/sda, second = /dev/sdb. Partitions of /dev/sda = /dev/sda1, /dev/sda2. NVMe SSD = /dev/nvme0n1. Virtual disks in VMs and cloud are usually /dev/vda. Understanding these names is critical for storage management.</p>
<pre class="code-block"><code><span class="comment"># Check disk status</span>
df -h                  <span class="comment"># disk free — what is mounted and how much space</span>
df -hi                 <span class="comment"># also inodes (important! can run out before space)</span>
lsblk                  <span class="comment"># tree of block devices</span>
lsblk -f               <span class="comment"># + filesystem type and UUID</span>
fdisk -l               <span class="comment"># detailed partition table (root)</span>
blkid                  <span class="comment"># UUID and type for each device</span></code></pre>

<div class="section-title">Finding What Is Eating Disk Space</div>
<pre class="code-block"><code><span class="comment"># du — disk usage</span>
du -sh /var/log/
du -sh /* 2>/dev/null | sort -rh | head -10
<span class="comment"># top 10 largest directories from root</span>

<span class="comment"># Find large files</span>

<span class="comment"># Delete old logs</span>
find /var/log -name "*.log" -mtime +30 -delete</code></pre>

<div class="section-title">Mount and fstab</div>
<p class="prose">A mount is the connection of a filesystem to a point in the file tree. Every partition, network share, and device must be "mounted" before its contents can be accessed. fstab (/etc/fstab) is a file that defines what mounts automatically at boot.</p>
<pre class="code-block"><code><span class="comment"># Manual mount</span>
sudo mount /dev/sdb1 /mnt/data
sudo umount /mnt/data

<span class="comment"># /etc/fstab — auto mount at boot</span>
UUID=a1b2c3d4  /data  ext4  defaults  0  2

<span class="comment"># Test fstab before rebooting!</span>
sudo mount -a              <span class="comment"># try mounting all fstab entries</span></code></pre>

<div class="section-title">Troubleshooting Methodology — No Guessing</div>
<p class="prose">The correct approach to Linux problems: (1) Define — what exactly is not working? What is the exact error? (2) Collect — gather data before touching anything. (3) Narrow — reduce the possibilities. (4) Fix — fix one thing at a time. (5) Verify — confirm the fix actually solved the problem. Skipping steps means missing the root cause and fixing a symptom instead of the actual issue.</p>

<div class="section-title">Core Debugging Tools</div>
<pre class="code-block"><code><span class="comment"># dmesg — kernel messages</span>
dmesg | tail -20
dmesg -T | grep -i error
dmesg | grep -i "oom"      <span class="comment"># Out of Memory killer?</span>
dmesg | grep -i "disk"

<span class="comment"># journalctl — system logs</span>
journalctl -b              <span class="comment"># from current boot</span>
journalctl -b -1           <span class="comment"># from previous boot (crash?)</span>
journalctl -p err -b
journalctl --since "10 min ago"

<span class="comment"># strace — what is the process doing?</span>
strace -p 1234
strace -e trace=network ls
strace -o /tmp/trace.txt command

<span class="comment"># lsof — open files and ports</span>
lsof -i :8080              <span class="comment"># who is listening on port 8080?</span>
lsof -p 1234
lsof | grep deleted        <span class="comment"># deleted files still open</span></code></pre>

  <div class="real-world-body">
    nginx crashed every night between 02:00-03:00. <code>journalctl -b -1 -u nginx</code>: "worker_connections are not enough." <code>dmesg | grep oom</code>: "Out of memory: Kill process nginx." <code>free -h</code>: memory exhausted at 03:00. <code>journalctl --since "01:00" --until "03:00"</code>: cron job at 02:30 running a backup script using 6GB RAM.<br><br>
    Fix: add <code>nice -n 19 ionice -c 3</code> to backup script to reduce priority, add <code>ulimit -v</code> to limit memory. Server has not crashed since.

// ============================================================
// SHARED ENGINE v3.0 — works for all courses
// ============================================================

var currentLang = 'he';
var state = { cur: 0, tabs: {}, game: {}, quiz: {} };
var gameTimer = null;

function L() { return C[currentLang]; }

function toggleLang() {
  currentLang = currentLang === 'he' ? 'en' : 'he';
  applyLang(currentLang);
}

function applyLang(lang) {
  currentLang = lang;
  var Lc = L();
  document.documentElement.setAttribute('lang', lang === 'he' ? 'he' : 'en');
  document.documentElement.setAttribute('dir', Lc.dir);
  document.getElementById('langBtn').textContent = Lc.langBtn;

  var headerEl = document.getElementById('headerChName');
  if(headerEl) headerEl.textContent = Lc.names[state.cur] || '';

  for(var i = 0; i < TOTAL_CHAPTERS; i++) {
    var set = function(id, val, prop) {
      var el = document.getElementById(id);
      if(el) el[prop || 'textContent'] = val;
    };
    set('chname-' + i, Lc.names[i] || '');
    set('chtag-' + i,  Lc.tags[i]  || '');
    set('chtitle-' + i, Lc.names[i] || '');
    set('chdesc-' + i,  Lc.descs[i] || '');

    var cheatEl = document.getElementById('cheat-' + i);
    if(cheatEl) cheatEl.innerHTML = Lc.cheat[i] || '';

    var learnEl = document.getElementById('learn-' + i);
    if(learnEl) {
      learnEl.innerHTML = Lc.learn[i] || '';
      if(learnEl.innerHTML.indexOf('CHID') >= 0)
        learnEl.innerHTML = learnEl.innerHTML.replace(/CHID/g, i);
    }

    // Rebuild tabs bar
    var tabsEl = document.getElementById('tabs-' + i);
    if(tabsEl) {
      var tabs = Lc.tabs;
      var keys = Lc.tabKeys;
      var cur  = state.tabs[i] || 'learn';
      tabsEl.innerHTML = tabs.map(function(t, ti) {
        return '<button class="tab-btn' + (cur === keys[ti] ? ' active' : '') +
          '" onclick="showTab(' + i + ',\'' + keys[ti] + '\')">' + t + '</button>';
      }).join('');
    }

    // Clear rendered state for game/quiz so they re-render in new lang
    ['game', 'quiz'].forEach(function(p) {
      var el = document.getElementById(p + '-' + i);
      if(el) { el.innerHTML = ''; delete el.dataset.rendered; }
    });
  }

  activateTab(state.cur, state.tabs[state.cur] || 'learn');
}

// ── NAVIGATION ──────────────────────────────────────────────
function showChapter(n) {
  document.querySelectorAll('.chapter').forEach(function(c) { c.classList.remove('active'); });
  document.querySelectorAll('.ch-btn').forEach(function(b) { b.classList.remove('active'); });
  var ch = document.getElementById('ch-' + n);
  var nb = document.getElementById('nav-' + n);
  if(ch) ch.classList.add('active');
  if(nb) nb.classList.add('active');
  state.cur = n;
  var hEl = document.getElementById('headerChName');
  if(hEl) hEl.textContent = L().names[n] || '';
  window.scrollTo(0, 0);
  activateTab(n, state.tabs[n] || 'learn');
}

function showNextChapter(chId) {
  var next = chId + 1;
  if(next < TOTAL_CHAPTERS) showChapter(next);
  else showTab(chId, 'cheat');
}

function showTab(chId, tabName) {
  state.tabs[chId] = tabName;
  activateTab(chId, tabName);
}

function activateTab(chId, tabName) {
  var ch = document.getElementById('ch-' + chId);
  if(!ch) return;
  ch.querySelectorAll('.tab-btn').forEach(function(btn) {
    var m = btn.getAttribute('onclick').match(/'(\w+)'\)/);
    btn.classList.toggle('active', !!(m && m[1] === tabName));
  });
  ch.querySelectorAll('.tab-panel').forEach(function(p) {
    p.classList.toggle('active', p.id === chId + '-' + tabName);
  });
  if(tabName === 'game') renderGame(chId);
  if(tabName === 'quiz' && L().tabKeys.indexOf('quiz') >= 0) renderQuiz(chId);
}

// ── GAME ENGINE ──────────────────────────────────────────────
function getG(i) {
  var raw = (currentLang === 'en' ? (GAME_QS_EN[i] || GAME_QS[i]) : GAME_QS[i]) || [];
  if(!raw.length) return [];
  return raw.map(function(q) { return shuffleOpts(q); });
}

function shuffleOpts(q) {
  var idx = [0,1,2,3];
  for(var i = idx.length-1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i+1));
    var tmp = idx[i]; idx[i] = idx[j]; idx[j] = tmp;
  }
  return { q: q.q, o: idx.map(function(k){ return q.o[k]; }), a: idx.indexOf(q.a) };
}

function renderGame(chId) {
  var el = document.getElementById('game-' + chId);
  if(!el) return;
  if(!state.game[chId]) state.game[chId] = { phase: 'idle' };
  var gs = state.game[chId];
  var Lc = L();
  var gqs = getG(chId);

  if(!gqs.length) {
    el.innerHTML = '<div class="game-empty"><span>' + (Lc.noGame || 'אין שאלות לפרק זה') + '</span></div>';
    return;
  }

  if(gs.phase === 'idle') {
    el.innerHTML =
      '<div class="game-start-card">' +
        '<div class="game-start-icon">' + COURSE_ICON + '</div>' +
        '<div class="game-start-title">' + Lc.gameTitle + '</div>' +
        '<p class="game-start-desc">' + Lc.gameDesc + '</p>' +
        '<div class="game-rules">' +
          '<span class="game-rule">⏱️ 60 ' + Lc.gameSeconds + '</span>' +
          '<span class="game-rule">❓ ' + gqs.length + ' ' + Lc.gameQuestions + '</span>' +
        '</div>' +
        '<button class="btn-start" onclick="gameStart(' + chId + ')">' + Lc.gameStart + '</button>' +
      '</div>';
  } else if(gs.phase === 'playing') {
    renderGamePlay(chId);
  } else {
    renderGameOver(chId);
  }
}

function gameStart(chId) {
  var gqs = getG(chId);
  state.game[chId] = { phase:'playing', qs: gqs.slice().sort(function(){ return Math.random()-.5; }), qi:0, score:0, time:60, answered:false };
  renderGame(chId);
  startTimer(chId);
}

function renderGamePlay(chId) {
  var el = document.getElementById('game-' + chId);
  var gs = state.game[chId];
  var Lc = L();
  if(!gs || gs.phase !== 'playing') return;
  var q = gs.qs[gs.qi];
  if(!q) { gameOver(chId); return; }

  el.innerHTML =
    '<div class="game-hud">' +
      '<span class="hud-timer' + (gs.time <= 10 ? ' urgent' : '') + '" id="gtimer-' + chId + '">' + gs.time + '</span>' +
      '<span class="hud-qnum">' + (gs.qi+1) + '/' + gs.qs.length + '</span>' +
      '<span class="hud-score">⭐ ' + gs.score + '</span>' +
    '</div>' +
    '<div class="game-question">' + q.q + '</div>' +
    '<div class="game-opts">' +
      q.o.map(function(opt, i) {
        return '<button class="game-opt" id="gopt-' + chId + '-' + i + '" onclick="gameAnswer(' + chId + ',' + i + ')">' +
          '<span class="opt-letter">' + (Lc.optLetters[i] || i) + '</span>' + opt + '</button>';
      }).join('') +
    '</div>' +
    '<div class="game-feedback" id="gfb-' + chId + '"></div>';
}

function startTimer(chId) {
  clearInterval(gameTimer);
  gameTimer = setInterval(function() {
    var gs = state.game[chId];
    if(!gs || gs.phase !== 'playing') { clearInterval(gameTimer); return; }
    gs.time--;
    var t = document.getElementById('gtimer-' + chId);
    if(t) { t.textContent = gs.time; t.className = 'hud-timer' + (gs.time <= 10 ? ' urgent' : ''); }
    if(gs.time <= 0) { clearInterval(gameTimer); gameOver(chId); }
  }, 1000);
}

function gameAnswer(chId, chosen) {
  var gs = state.game[chId];
  if(!gs || gs.answered) return;
  gs.answered = true;
  var q = gs.qs[gs.qi];
  var correct = chosen === q.a;
  if(correct) gs.score += 10;

  for(var i = 0; i < q.o.length; i++) {
    var btn = document.getElementById('gopt-' + chId + '-' + i);
    if(!btn) continue;
    if(i === q.a) btn.classList.add('correct');
    else if(i === chosen) btn.classList.add('wrong');
  }
  var fb = document.getElementById('gfb-' + chId);
  if(fb) fb.innerHTML = correct ?
    '<span class="fb-correct">✓ ' + (L().correct || 'נכון!') + '</span>' :
    '<span class="fb-wrong">✗ ' + q.o[q.a] + '</span>';

  setTimeout(function() {
    gs.qi++;
    gs.answered = false;
    if(gs.qi >= gs.qs.length) gameOver(chId);
    else renderGamePlay(chId);
  }, 1200);
}

function gameOver(chId) {
  clearInterval(gameTimer);
  var gs = state.game[chId];
  if(!gs) return;
  gs.phase = 'over';
  var Lc = L();
  var total = gs.qs.length * 10;
  var pct   = total ? Math.round((gs.score / total) * 100) : 0;
  var medal = gs.score >= total * .8 ? '🏆' : gs.score >= total * .5 ? '🥈' : '🥉';
  var lbIdx = Lc.resultLabels ? Math.min(Math.floor(pct/20), Lc.resultLabels.length-1) : 0;
  var label = Lc.resultLabels ? Lc.resultLabels[lbIdx] : '';

  document.getElementById('game-' + chId).innerHTML =
    '<div class="game-over-card">' +
      '<div class="game-over-medal">' + medal + '</div>' +
      '<div class="game-over-score">' + gs.score + '</div>' +
      '<div class="game-over-pct">' + pct + '% ' + (Lc.correct || '') + '</div>' +
      '<div class="game-over-label">' + label + '</div>' +
      '<div class="game-over-btns">' +
        '<button class="nav-btn ghost" onclick="gameRestart(' + chId + ')">' + Lc.gameAgain + '</button>' +
        '<button class="nav-btn primary" onclick="showNextChapter(' + chId + ')">' + (Lc.nextChapter || '▶ הבא') + '</button>' +
        '<button class="nav-btn ghost" onclick="showTab(' + chId + ',\'cheat\')">' + Lc.gameToCheat + '</button>' +
      '</div>' +
    '</div>';
}

function gameRestart(chId) {
  state.game[chId] = { phase: 'idle' };
  var el = document.getElementById('game-' + chId);
  if(el) el.innerHTML = '';
  renderGame(chId);
}

// ── QUIZ ENGINE ──────────────────────────────────────────────
function getQ(i) {
  var raw = (currentLang === 'en' ? (QUIZZES_EN[i] || QUIZZES[i]) : QUIZZES[i]) || [];
  return raw.filter(function(q){ return q.q; });
}

function renderQuiz(chId) {
  var el = document.getElementById('quiz-' + chId);
  if(!el || el.dataset.rendered) return;
  el.dataset.rendered = '1';
  var qs = getQ(chId);
  var Lc = L();
  if(!qs.length) {
    el.innerHTML = '<div class="game-empty"><span>' + (Lc.noQuiz || 'אין חידון לפרק זה') + '</span></div>';
    return;
  }
  if(!state.quiz[chId]) state.quiz[chId] = { qi:0, ans:{}, done:false, score:0 };

  var pips = qs.map(function(_,i){
    return '<div class="qpip" id="qpip-' + chId + '-' + i + '"></div>';
  }).join('');

  var cards = qs.map(function(q,i){
    return '<div class="quiz-card' + (i===0?' active':'') + '" id="qcard-' + chId + '-' + i + '">' +
      '<div class="quiz-meta" id="qmeta-' + chId + '-' + i + '"></div>' +
      '<div class="quiz-q">' + q.q + '</div>' +
      '<div class="quiz-opts">' +
        q.o.map(function(opt,oi){
          return '<button class="quiz-opt" id="qopt-' + chId + '-' + i + '-' + oi +
            '" onclick="quizPick(' + chId + ',' + i + ',' + oi + ')">' +
            '<span class="opt-letter" id="qltr-' + chId + '-' + i + '-' + oi + '"></span>' + opt + '</button>';
        }).join('') +
      '</div>' +
      '<div class="quiz-explain" id="qexp-' + chId + '-' + i + '" style="display:none">' +
        '<strong>' + Lc.quizExplain + '</strong> ' + (q.e || '') +
      '</div>' +
    '</div>';
  }).join('');

  el.innerHTML =
    '<div class="quiz-pips" id="qprog-' + chId + '">' + pips + '</div>' +
    cards +
    '<div class="quiz-result" id="qres-' + chId + '" style="display:none">' +
      '<div class="game-over-medal" id="qemoji-' + chId + '">🎉</div>' +
      '<div class="game-over-score" id="qscore-' + chId + '"></div>' +
      '<div class="game-over-label" id="qlabel-' + chId + '"></div>' +
      '<div class="game-over-btns">' +
        '<button class="nav-btn ghost" id="qbtn-reset-' + chId + '" onclick="quizReset(' + chId + ')">' + Lc.quizAgain + '</button>' +
        '<button class="nav-btn primary" id="qbtn-next-' + chId + '" onclick="showNextChapter(' + chId + ')">' + (Lc.nextChapter||'▶ הבא') + '</button>' +
        '<button class="nav-btn ghost" id="qbtn-cheat-' + chId + '" onclick="showTab(' + chId + ',\'cheat\')">' + Lc.gameToCheat + '</button>' +
      '</div>' +
    '</div>' +
    '<div class="quiz-nav" id="qnav-' + chId + '">' +
      '<button class="nav-btn ghost" id="qprev-' + chId + '" onclick="quizNav(' + chId + ',-1)">' + Lc.quizPrev + '</button>' +
      '<button class="nav-btn primary" id="qnext-' + chId + '" onclick="quizNav(' + chId + ',1)">' + Lc.quizNext + '</button>' +
    '</div>';

  refreshQuiz(chId);
}

function refreshQuiz(chId) {
  var st = state.quiz[chId];
  if(!st) return;
  var qs = getQ(chId);
  var Lc = L();
  qs.forEach(function(_,i) {
    var card = document.getElementById('qcard-' + chId + '-' + i);
    if(card) card.classList.toggle('active', i === st.qi && !st.done);
    var pip = document.getElementById('qpip-' + chId + '-' + i);
    if(pip) pip.className = 'qpip' + (st.ans[i] !== undefined ? ' done' : i === st.qi ? ' cur' : '');
    var meta = document.getElementById('qmeta-' + chId + '-' + i);
    if(meta) meta.textContent = Lc.question + ' ' + (i+1) + ' ' + Lc.of + ' ' + qs.length;
    for(var oi=0;oi<4;oi++) {
      var ltr = document.getElementById('qltr-' + chId + '-' + i + '-' + oi);
      if(ltr) ltr.textContent = Lc.optLetters[oi] || oi;
    }
  });
  var res = document.getElementById('qres-' + chId);
  var nav = document.getElementById('qnav-' + chId);
  if(res) res.style.display = st.done ? 'block' : 'none';
  if(nav) nav.style.display = st.done ? 'none' : 'flex';
  if(st.done) {
    var sc = document.getElementById('qscore-' + chId);
    var lb = document.getElementById('qlabel-' + chId);
    if(sc) sc.textContent = st.score + '/' + (qs.length*10);
    var lbIdx = Lc.resultLabels ? Math.min(Math.floor((st.score/(qs.length*10))*Lc.resultLabels.length), Lc.resultLabels.length-1) : 0;
    if(lb && Lc.resultLabels) lb.textContent = Lc.resultLabels[lbIdx];
  }
  var prev = document.getElementById('qprev-' + chId);
  var next = document.getElementById('qnext-' + chId);
  if(prev) prev.disabled = st.qi === 0;
  if(next) next.textContent = st.qi === qs.length-1 ? (Lc.quizSubmit||'שלח') : Lc.quizNext;
}

function quizPick(chId, qi, oi) {
  var st = state.quiz[chId];
  if(!st || st.done || st.ans[qi] !== undefined) return;
  st.ans[qi] = oi;
  var qs = getQ(chId);
  var q  = qs[qi];
  var correct = oi === q.a;
  if(correct) st.score += 10;
  for(var k=0;k<q.o.length;k++) {
    var btn = document.getElementById('qopt-' + chId + '-' + qi + '-' + k);
    if(!btn) continue;
    if(k === q.a) btn.classList.add('correct');
    else if(k === oi) btn.classList.add('wrong');
    btn.disabled = true;
  }
  var exp = document.getElementById('qexp-' + chId + '-' + qi);
  if(exp) exp.style.display = 'block';
  refreshQuiz(chId);
}

function quizNav(chId, dir) {
  var st = state.quiz[chId];
  if(!st) return;
  var qs = getQ(chId);
  if(dir === 1 && st.qi === qs.length-1) {
    st.done = true;
  } else {
    st.qi = Math.max(0, Math.min(qs.length-1, st.qi + dir));
  }
  refreshQuiz(chId);
}

function quizReset(chId) {
  state.quiz[chId] = { qi:0, ans:{}, done:false, score:0 };
  var el = document.getElementById('quiz-' + chId);
  if(el) { el.innerHTML = ''; delete el.dataset.rendered; }
  renderQuiz(chId);
}

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  applyLang('he');
  showChapter(0);
});

</script>
