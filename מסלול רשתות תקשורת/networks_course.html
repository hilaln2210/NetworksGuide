<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רשתות מחשבים Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════ RESET + TOKENS ══════════════ */
:root {
  /* ── Palette: clean blue-slate ── */
  --bg:      #f8f9fc;
  --surface: #ffffff;
  --border:  #e2e8f0;
  --border2: #cbd5e1;
  --ink:     #0f172a;
  --ink2:    #1e293b;
  --dim:     #475569;
  --dim2:    #94a3b8;
  --ac:      #2563eb;
  --ac-h:    #1d4ed8;
  --ac-lt:   #eff6ff;
  --gr:      #16a34a;
  --gr-lt:   #f0fdf4;
  --rd:      #dc2626;
  --rd-lt:   #fef2f2;
  --yw:      #d97706;
  --yw-lt:   #fffbeb;
  --pu:      #7c3aed;
  --code-bg: #1e293b;

  /* ── Fonts: normal, readable ── */
  --f-body:  'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --f-mono:  'Fira Code', 'Consolas', 'Monaco', monospace;
  --f-serif: 'Inter', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-body);
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════ SCREENS ══════════════ */
.screen { display: none; }
.screen.on { display: block; }

/* ══════════════ NAV ══════════════ */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center;
  padding: 0 20px;
  height: 54px;
  background: #ffffff;
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  gap: 4px;
}
.nav-logo {
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.01em;
  margin-inline-end: 20px;
}
.nav-logo i { font-style: italic; color: var(--ac); }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab {
  background: none; border: none; cursor: pointer;
  padding: 6px 14px;
  font-size: .875rem;
  font-weight: 500;
  color: var(--dim);
  border-radius: 6px;
  transition: background .15s, color .15s;
  font-family: var(--f-body);
}
.nav-tab:hover { background: var(--ac-lt); color: var(--ac); }
.nav-tab.on { background: var(--ac); color: #fff; }
.nav-tab:hover { color: var(--ink); border-color: var(--border); }
.nav-tab.on { color: var(--ac); border-color: var(--ac); background: rgba(26,86,219,.06); }
.nav-xp {
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--yw);
  background: rgba(161,98,7,.08);
  border: 1.5px solid rgba(161,98,7,.22);
  padding: 4px 12px;
  border-radius: 6px;
  margin-right: 12px;
}
.nav-lang {
  font-family: var(--f-mono);
  font-size: 10px;
  font-weight: 700;
  padding: 4px 10px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: none;
  color: var(--dim);
  cursor: pointer;
  transition: all .14s;
  margin-right: 8px;
}
.nav-lang:hover { color: var(--ink); border-color: var(--border2); }

/* ══════════════ LANDING ══════════════ */
#landing { min-height: 100vh; }
.land-hero {
  max-width: 980px; margin: 0 auto;
  padding: 72px 28px 56px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px; align-items: start;
}

.hero-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .12em;
  color: #93c5fd;
  text-transform: uppercase;
}
.hero-h {
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -.02em;
  color: #ffffff;
  margin: 12px 0 16px;
}
.hero-h i { font-style: italic; color: var(--ac); }
.hero-p {
  font-size: 1.05rem;
  color: #bfdbfe;
  margin-bottom: 28px;
}

.hero-stats { display: flex; gap: 24px; margin-bottom: 28px; }
.hs { border-right: 2px solid var(--border); padding-right: 16px; }
.hs:first-child { border-right: none; padding-right: 0; }
.hs-n { font-family: var(--f-serif); font-size: 28px; color: var(--ink); line-height: 1; }
.hs-l { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); letter-spacing: 1px; margin-top: 2px; }

.hero-btn {
  font-family: var(--f-body);
  font-size: 14px; font-weight: 700;
  padding: 11px 26px; border-radius: 8px;
  border: none; cursor: pointer;
  background: var(--ink); color: #fff;
  transition: opacity .14s;
  display: inline-block;
}
.hero-btn:hover { opacity: .85; }

/* Chapter grid on landing */
.land-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.land-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s, border-color .15s;
  border-top: 3px solid var(--cc, var(--ac));
}
.land-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
  border-top-color: var(--cc);
}
.land-card::before {
  content: '';
  position: absolute; top: 0; right: 0; width: 3px; bottom: 0;
  background: var(--cc, var(--border));
  transition: width .15s;
}
.land-card:hover { border-color: var(--cc,var(--border)); transform: translateX(-2px); }
.land-card:hover::before { width: 5px; }
.lc-num { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); letter-spacing: 2px; margin-bottom: 4px; }
.lc-icon { font-size: 18px; margin-bottom: 6px; display: block; }
.lc-name { font-size: 12px; font-weight: 600; color: var(--ink); line-height: 1.3; }

/* ══════════════ LEARN ══════════════ */
#learn { min-height: 100vh; }
.learn-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  max-width: 1020px;
  margin: 0 auto;
  min-height: calc(100vh - 52px);
}

/* Sidebar */
.l-sb {
  width: 220px;
  min-width: 220px;
  background: var(--surface);
  border-inline-end: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}
.l-sb::-webkit-scrollbar { width: 3px; }
.l-sb::-webkit-scrollbar-thumb { background: var(--border); }
.sb-label {
  font-family: var(--f-mono); font-size: 9px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--dim2);
  padding: 0 14px; margin-bottom: 6px; display: block;
}
.sb-ch {
  width: 100%; text-align: right;
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; background: none; border: none;
  border-right: 3px solid transparent;
  font-family: var(--f-body); font-size: 12px; font-weight: 500;
  color: var(--dim); cursor: pointer; transition: all .12s;
}
.sb-ch:hover { color: var(--ink); background: rgba(0,0,0,.03); }
.sb-ch.on { color: var(--ac); border-color: var(--ac); background: rgba(26,86,219,.04); }
.sb-ch-n { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); min-width: 18px; }

.sb-secs { display: none; }
.sb-secs.open { display: block; }
.sb-sec {
  width: 100%; text-align: right;
  display: flex; align-items: center; gap: 6px;
  padding: 4px 14px 4px 20px;
  background: none; border: none;
  font-family: var(--f-body); font-size: 11px;
  color: var(--dim2); cursor: pointer; transition: all .11s;
}
.sb-sec:hover { color: var(--ink); }
.sb-sec.on { color: var(--ac); font-weight: 600; }
.sb-sec::before { content: '·'; color: var(--dim2); font-size: 14px; }

/* Reading bar */
#rbar {
  position: fixed; top: 52px; right: 220px; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--ac), var(--ac2));
  width: 0%; z-index: 100; transition: width .15s;
}

/* Content area */
.l-content { padding: 44px 52px 100px; max-width: 720px; }

/* Chapter header */
.ch-tag { font-family: var(--f-mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim2); margin-bottom: 8px; display: block; }
.ch-h { font-family: var(--f-serif); font-size: clamp(28px,4vw,44px); line-height: 1.1; letter-spacing: -1px; color: var(--ink); margin-bottom: 10px; }
.ch-desc { font-size: 14px; color: var(--dim); line-height: 1.7; margin-bottom: 4px; }
hr.divider { border: none; border-top: 1.5px solid var(--border); margin: 28px 0; }

/* Learn sections */
.learn-section {
  padding: 32px 0 24px;
  border-bottom: 1px solid var(--border);
}
.learn-section:last-child { border-bottom: none; }
.sec-label {
  display: inline-block;
  font-size: .7rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ac);
  margin-bottom: 4px;
}
.sec-h {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--ink);
  margin: 6px 0 14px;
  letter-spacing: -.01em;
}
p { color: var(--ink2); line-height: 1.85; margin-bottom: 12px; }
p strong { color: var(--ink); font-weight: 700; }
code { font-family: var(--f-mono); font-size: 12px; background: var(--border); color: var(--ac); padding: 1px 5px; border-radius: 4px; }

/* Tables */
.tbl { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13.5px; }
.tbl th { background: var(--border); color: var(--ink); font-weight: 700; padding: 8px 13px; border: 1.5px solid var(--border); text-align: right; font-size: 12px; }
.tbl td { padding: 8px 13px; border: 1.5px solid var(--border); color: var(--ink2); vertical-align: top; line-height: 1.55; }
.tbl tr:nth-child(even) td { background: var(--bg); }
.tbl td:first-child { font-family: var(--f-mono); font-size: 12px; color: var(--ac); white-space: nowrap; font-weight: 600; }

/* Code blocks */
.code-block {
  background: var(--code-bg);
  border-radius: 10px;
  overflow: hidden;
  margin: 16px 0;
  font-family: var(--f-mono);
  font-size: .82rem;
}
.code-bar { display: flex; align-items: center; gap: 5px; padding: 7px 13px; background: rgba(255,255,255,.04); border-bottom: 1px solid rgba(255,255,255,.07); }
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
.code-title { font-family: var(--f-mono); font-size: 10px; color: rgba(255,255,255,.35); margin-right: auto; }
pre.code-body { padding: 13px 15px; font-family: var(--f-mono); font-size: 13px; line-height: 1.9; color: #cdd6f4; white-space: pre-wrap; }
.kw { color: #89b4fa; } .st { color: #a6e3a1; } .nu { color: #fab387; }
.cm { color: #6c7086; font-style: italic; } .fn { color: #f5c2e7; }

/* Callouts */
.callout { border-radius: 9px; padding: 11px 15px; margin: 14px 0; border: 1.5px solid; font-size: 13.5px; line-height: 1.65; }
.callout.tip  { background: #f0fdf4; border-color: #bbf7d0; color: #14532d; }
.callout.note {
  background: #eff6ff;
  border-inline-start: 3px solid #2563eb;
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  font-size: .88rem;
  margin: 14px 0;
  color: var(--ink2);
}
.callout.warn {
  background: #fffbeb;
  border-inline-start: 3px solid #d97706;
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  font-size: .88rem;
  margin: 14px 0;
  color: var(--ink2);
}

/* Diagrams */
.diagram { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 16px 18px; margin: 14px 0; direction: ltr; }
.dg-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.dg-box { padding: 8px 13px; border-radius: 8px; font-size: 12.5px; font-weight: 600; text-align: center; line-height: 1.35; white-space: nowrap; }
.dg-box.b  { background: #dbeafe; color: #1e40af; border: 1.5px solid #bfdbfe; }
.dg-box.g  { background: #dcfce7; color: #14532d; border: 1.5px solid #bbf7d0; }
.dg-box.gr { background: #f1f5f9; color: #334155; border: 1.5px solid #cbd5e1; }
.dg-box.p  { background: #ede9fe; color: #4c1d95; border: 1.5px solid #c4b5fd; }
.dg-arr { font-family: var(--f-mono); font-size: 12px; color: var(--dim); white-space: nowrap; }

/* Chapter nav */
.ch-nav { display: flex; gap: 10px; margin-top: 52px; padding-top: 22px; border-top: 1.5px solid var(--border); align-items: center; }
.ch-nav-btn { font-family: var(--f-mono); font-size: 11px; padding: 8px 16px; border-radius: 7px; border: 1.5px solid var(--border); background: var(--surface); color: var(--dim); cursor: pointer; transition: all .13s; }
.ch-nav-btn:hover { border-color: var(--ac); color: var(--ac); }
.ch-nav-btn.next { background: var(--ink); color: #fff; border-color: var(--ink); }
.ch-nav-btn.next:hover { opacity: .85; }

/* ══════════════ LAB ══════════════ */
#lab { min-height: 100vh; }
/* removed */

.lab-sb {
  background: var(--bg);
  border-left: 1.5px solid var(--border);
  padding: 0;
  position: sticky; top: 52px;
  height: calc(100vh - 52px);
  overflow-y: auto;
}
.lab-sb::-webkit-scrollbar { width: 3px; }
.lab-sb::-webkit-scrollbar-thumb { background: var(--border); }
.lab-sb-head { padding: 16px 14px 12px; border-bottom: 1.5px solid var(--border); }
.lab-sb-title { font-family: var(--f-serif); font-size: 15px; color: var(--ink); }
.lab-sb-sub { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); margin-top: 2px; }
.lab-sb-prog { height: 2.5px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 8px; }
.lab-sb-prog-fill { height: 100%; background: var(--gr); border-radius: 99px; transition: width .5s; }

.lab-ch-btn {
  width: 100%; text-align: right;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; background: none; border: none;
  border-right: 3px solid transparent;
  cursor: pointer; transition: all .12s;
}
.lab-ch-btn:hover { background: rgba(0,0,0,.03); }
.lab-ch-btn.on { background: rgba(21,128,61,.05); border-color: var(--gr); }
.lcb-icon { font-size: 15px; flex-shrink: 0; }
.lcb-info { flex: 1; }
.lcb-name { font-size: 12px; font-weight: 600; color: var(--ink); }
.lcb-bar { height: 2px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 3px; }
.lcb-bar-fill { height: 100%; background: var(--gr); border-radius: 99px; transition: width .4s; }
.lcb-score { font-family: var(--f-mono); font-size: 10px; font-weight: 600; color: var(--dim2); flex-shrink: 0; }
.lcb-score.done { color: var(--gr); }

/* Lab main */
/* removed */

/* Welcome */
.lab-welcome { text-align: center; padding: 56px 20px; }
.lw-icon { font-size: 44px; margin-bottom: 14px; }
.lw-h { font-family: var(--f-serif); font-size: 28px; color: var(--ink); margin-bottom: 8px; }
.lw-p { color: var(--dim); font-size: 14px; margin-bottom: 32px; }
.lw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 9px; max-width: 640px; margin: 0 auto; }
.lw-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--cc, var(--ac));
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  text-align: center;
}
.lw-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.09); }
.lw-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2.5px; background: var(--cc, var(--border)); }
.lw-card:hover { border-color: var(--cc, var(--ac)); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.08); }
.lwc-n { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); letter-spacing: 2px; }
.lwc-icon { font-size: 18px; margin: 5px 0; display: block; }
.lwc-name { font-size: 11.5px; font-weight: 600; color: var(--ink); }
.lwc-bar { height: 2px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 7px; }
.lwc-bar-fill { height: 100%; background: var(--gr); border-radius: 99px; }

/* Quiz area */
.lq-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1.5px solid var(--border); }
.lq-ch-icon { font-size: 22px; }
.lq-ch-name { font-family: var(--f-serif); font-size: 20px; color: var(--ink); }
.lq-ch-num { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); margin-top: 1px; }
.lq-spacer { flex: 1; }
.lq-scorebox { text-align: center; background: var(--border); border: 1.5px solid var(--border); border-radius: 9px; padding: 8px 16px; }
.lq-sv { font-family: var(--f-mono); font-size: 17px; font-weight: 700; color: var(--ink); }
.lq-sl { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); }

/* Pips */
.lq-pips { display: flex; gap: 3px; margin-bottom: 18px; flex-wrap: wrap; }
.lq-pip { width: 18px; height: 5px; border-radius: 99px; background: var(--border); transition: background .2s; }
.lq-pip.ok  { background: var(--gr); }
.lq-pip.bad { background: var(--ac2); }
.lq-pip.cur { background: var(--ac); }

/* Question card */
.lq-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 13px; padding: 22px; margin-bottom: 12px; animation: lqIn .22s ease; }
@keyframes lqIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.lq-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }
.lq-num  { font-family: var(--f-mono); font-size: 10px; color: var(--dim2); }
.lq-cat  { font-family: var(--f-mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; background: rgba(26,86,219,.07); border: 1.5px solid rgba(26,86,219,.18); color: var(--ac); }
.lq-q { font-size: 15.5px; font-weight: 600; color: var(--ink); line-height: 1.55; }

/* Code snip in question */
.lq-snip { background: var(--code-bg); border-radius: 8px; overflow: hidden; margin-bottom: 12px; direction: ltr; text-align: left; }
.lqs-bar { display: flex; gap: 4px; padding: 6px 11px; background: rgba(255,255,255,.04); }
.lqs-body { padding: 10px 13px; font-family: var(--f-mono); font-size: 12.5px; line-height: 1.85; color: #cdd6f4; }

/* Options */
.lq-opts { display: flex; flex-direction: column; gap: 7px; margin-top: 14px; }
.lq-opt {
  display: flex; align-items: center; gap: 12px;
  width: 100%; background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 9px; padding: 12px 14px;
  cursor: pointer; text-align: start;
  font-family: var(--f-body); font-size: .9rem;
  transition: border-color .15s, background .15s;
  margin-bottom: 8px;
}
.lq-opt:hover:not(:disabled) { border-color: var(--ac); background: var(--ac-lt); }
.lq-opt.correct { border-color: var(--gr); background: var(--gr-lt); }
.lq-opt.wrong   { border-color: var(--rd); background: var(--rd-lt); }
.lq-opt:hover:not(.done) { border-color: var(--ac); background: rgba(26,86,219,.04); }
.lq-opt.done { cursor: default; }
.lq-opt.correct { background: #f0fdf4; border-color: var(--gr); }
.lq-opt.correct .lq-lbl { background: var(--gr); border-color: var(--gr); color: #fff; }
.lq-opt.wrong   { background: #fff1f1; border-color: var(--ac2); }
.lq-opt.reveal  { background: #f0fdf4; border-color: rgba(21,128,61,.35); }
.lq-opt.done:not(.correct):not(.wrong):not(.reveal) { opacity: .45; }
.lq-lbl { font-family: var(--f-mono); font-size: 10px; font-weight: 700; width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--border); border: 1.5px solid var(--border); color: var(--dim); margin-top: 1px; transition: all .13s; }
.lq-txt { flex: 1; font-size: 13.5px; color: var(--ink2); line-height: 1.5; font-weight: 400; }
.lq-ic  { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }

/* Explanation */
.lq-exp { border-radius: 9px; padding: 11px 14px; margin-top: 9px; border: 1.5px solid; display: none; animation: expIn .2s ease; }
@keyframes expIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
.lq-exp.ok  { background: #f0fdf4; border-color: #bbf7d0; }
.lq-exp.bad { background: #fff1f1; border-color: #fecaca; }

.lqr-bg  { fill: none; stroke: var(--border); stroke-width: 9; }

.lqr-stats { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
.lqrs { background: var(--border); border: 1.5px solid var(--border); border-radius: 9px; padding: 10px 16px; min-width: 66px; text-align: center; }

.lqrs-l { font-family: var(--f-mono); font-size: 9px; color: var(--dim2); margin-top: 1px; }
.lqr-btns { display: flex; gap: 9px; justify-content: center; }

.lqr-back { font-family: var(--f-body); font-size: 13px; font-weight: 500; padding: 9px 18px; border-radius: 7px; cursor: pointer; border: 1.5px solid var(--border); background: none; color: var(--dim); transition: all .13s; }

  transition: transform .15s, box-shadow .15s;
  font-family: var(--f-body); margin-top: 8px;
}
.hero-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,0,0,.25); }
.hero-tag { font-size: .7rem; font-weight: 700; letter-spacing: .12em; color: #93c5fd; text-transform: uppercase; }
.hero-h { font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 800; line-height: 1.1; letter-spacing: -.02em; color: #fff; margin: 10px 0 12px; }
.hero-h i { color: #93c5fd; font-style: normal; }
.hero-p { font-size: .95rem; color: #bfdbfe; margin-bottom: 20px; }
.hero-stats { display: flex; gap: 20px; margin-bottom: 24px; }
.hs-n { font-size: 1.4rem; font-weight: 800; color: #fff; }
.hs-l { font-size: .65rem; letter-spacing: .1em; color: #93c5fd; font-weight: 600; }
.land-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px; padding: 24px; align-content: start;
  overflow-y: auto; background: var(--bg);
}

/* ══ LAB LAYOUT FIX ══ */
section#lab {
  height: calc(100vh - 52px);
  overflow: hidden;
}
.lab-layout {
  display: grid !important;
  grid-template-columns: 220px 1fr !important;
  height: 100% !important;
  overflow: hidden;
}
.lab-sb {
  height: 100%;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.lab-main {
  height: 100%;
  overflow-y: auto;
  padding: 0 !important;
  position: relative;
}
.lab-welcome {
  padding: 32px;
  height: 100%;
  overflow-y: auto;
  box-sizing: border-box;
}
#lqArea {
  display: none;
  height: 100%;
  overflow-y: auto;
}
.trm-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 16px;
  padding: 16px;
  height: 100%;
  box-sizing: border-box;
  min-height: 0;
}
.trm-missions {
  height: fit-content;
  max-height: 100%;
  overflow-y: auto;
}
.trm-wrap {
  display: flex;
  flex-direction: column;
  min-height: 0;
  height: 100%;
  max-height: calc(100vh - 100px);
}
.trm-body {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  padding: 12px 14px;
}
/* MCQ inside lqArea */
.lq-header {
  position: sticky;
  top: 0;
  z-index: 5;
  background: var(--surface);
}
.lq-foot {
  position: sticky;
  bottom: 0;
  background: var(--surface);
  z-index: 5;
}

/* ══ TERMINAL v2 — Linux look ══ */
.trm-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 0;
  height: 100%;
  min-height: 0;
}
.trm-missions {
  background: #0d1117;
  border-inline-end: 1px solid #21262d;
  padding: 12px;
  overflow-y: auto;
  height: 100%;
  box-sizing: border-box;
}
.trm-m-title {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #8b949e;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #21262d;
}
.trm-mission {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 7px 8px;
  border-radius: 6px;
  margin-bottom: 4px;
  font-size: .78rem;
  line-height: 1.4;
  color: #8b949e;
  border: 1px solid transparent;
  transition: background .15s;
  cursor: default;
}
.trm-mission:not(.done):hover { background: #161b22; border-color: #30363d; }
.trm-mission.done {
  color: #238636;
  text-decoration: line-through;
  opacity: .7;
}
.trm-m-num {
  font-size: .68rem;
  font-weight: 700;
  color: #388bfd;
  min-width: 14px;
  flex-shrink: 0;
}
.trm-m-text { flex: 1; }
.trm-m-check { color: #238636; margin-inline-start: auto; }

/* Terminal window */
.trm-wrap {
  background: #0d1117;
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 0;
  font-family: 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
}
.trm-top {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: #161b22;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
}
.trm-title {
  flex: 1;
  text-align: center;
  font-size: .75rem;
  color: #8b949e;
  font-family: 'Inter', sans-serif;
}
.trm-os-badge {
  font-size: .65rem;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 3px;
  margin-inline-start: 6px;
}
.trm-os-badge.linux  { background: #1c4b27; color: #3fb950; }
.trm-os-badge.python { background: #1c3149; color: #388bfd; }
.trm-os-badge.scapy  { background: #2d1f4e; color: #bc8cff; }
.trm-clear {
  background: none;
  border: 1px solid #30363d;
  color: #8b949e;
  font-size: .7rem;
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: background .15s;
}
.trm-clear:hover { background: #21262d; color: #e6edf3; }

/* Body */
.trm-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  min-height: 0;
  scroll-behavior: smooth;
}
.trm-line {
  font-size: .82rem;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-all;
  color: #e6edf3;
}
.trm-comment { color: #8b949e; }
.trm-dim     { color: #6e7681; }
.trm-cmd     { color: #e6edf3; }
.trm-out     { color: #cdd9e5; }
.trm-mission-ok { }
.trm-success     { color: #3fb950; font-weight: 600; }
.trm-success-all { color: #f0883e; font-weight: 700; }

/* Shell prompt colors */
.trm-user   { color: #3fb950; font-weight: 600; }
.trm-at     { color: #8b949e; }
.trm-host   { color: #388bfd; font-weight: 600; }
.trm-colon  { color: #8b949e; }
.trm-path   { color: #79c0ff; }
.trm-dollar { color: #e6edf3; }

/* Python prompt */
.trm-py-prompt { color: #bc8cff; font-weight: 600; }

/* Input row */
.trm-input-row {
  display: flex;
  align-items: center;
  padding: 6px 12px;
  background: #161b22;
  border-top: 1px solid #21262d;
  gap: 6px;
  flex-shrink: 0;
}
.trm-prompt-sh {
  font-size: .82rem;
  white-space: nowrap;
  flex-shrink: 0;
}
.trm-prompt-py {
  color: #bc8cff;
  font-size: .82rem;
  white-space: nowrap;
  flex-shrink: 0;
  font-weight: 600;
}
.trm-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #e6edf3;
  font-family: 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  font-size: .82rem;
  caret-color: #3fb950;
  min-width: 0;
}
.trm-input::placeholder { color: #484f58; }
.trm-run {
  background: #238636;
  border: none;
  color: #fff;
  font-size: .75rem;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s;
}
.trm-run:hover { background: #2ea043; }
.trm-enter { font-size: .85rem; }

/* Hint row */
.trm-hint-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 12px;
  background: #0d1117;
  border-top: 1px solid #161b22;
  flex-shrink: 0;
}
.trm-hint-btn {
  background: none;
  border: 1px solid #30363d;
  color: #8b949e;
  font-size: .72rem;
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: background .15s;
}
.trm-hint-btn:hover { background: #161b22; color: #e6edf3; }
.trm-hint-txt {
  color: #f0883e;
  font-size: .78rem;
  font-family: 'Fira Code', 'JetBrains Mono', monospace;
  opacity: 0;
  transition: opacity .3s;
}

/* ══ QUIZ ══ */
section#quiz { height: calc(100vh - 52px); overflow: hidden; }
.quiz-layout { height: 100%; display: flex; flex-direction: column; }

/* Home screen */
.quiz-home {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; text-align: center; gap: 16px;
}
.quiz-home-icon { font-size: 3rem; }
.quiz-home-h { font-size: 1.6rem; font-weight: 800; color: var(--ink); }
.quiz-home-p { font-size: .95rem; color: var(--dim); max-width: 400px; }
.quiz-home-modes { display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }
.qz-mode-btn {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 20px 28px;
  background: var(--surface); border: 2px solid var(--border);
  border-radius: 14px; cursor: pointer; transition: all .15s;
  font-family: var(--f-body); min-width: 120px;
}
.qz-mode-btn:hover { border-color: var(--ac); background: var(--ac-lt); transform: translateY(-2px); }
.qz-mode-icon { font-size: 1.5rem; }
.qz-mode-n { font-size: 1.8rem; font-weight: 800; color: var(--ac); }
.qz-mode-l { font-size: .78rem; color: var(--dim); font-weight: 600; }
.quiz-best {
  font-size: .85rem; color: var(--dim);
  padding: 6px 16px; background: var(--bg);
  border-radius: 20px; border: 1px solid var(--border);
}

/* Game */
.quiz-game {
  flex: 1; display: flex; flex-direction: column;
  min-height: 0; background: var(--bg);
}

/* HUD */
.quiz-hud {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.qz-hud-left, .qz-hud-right { display: flex; gap: 16px; align-items: center; min-width: 100px; }
.qz-hud-right { justify-content: flex-end; }
.qz-stat { text-align: center; }
.qz-stat-v { display: block; font-size: 1.1rem; font-weight: 800; color: var(--ink); }
.qz-stat-l { display: block; font-size: .65rem; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }

/* Timer */
.qz-timer-wrap { position: relative; width: 44px; height: 44px; }
.qz-timer-svg { transform: rotate(-90deg); width: 44px; height: 44px; }
.qz-timer-bg  { fill: none; stroke: var(--border); stroke-width: 4; }
.qz-timer-arc {
  fill: none; stroke: #3fb950; stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 113.1; stroke-dashoffset: 0;
  transition: stroke-dashoffset .9s linear, stroke .3s;
}
.qz-timer-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem; font-weight: 800; color: #e6edf3;
}
.qz-quit-btn {
  background: none; border: 1px solid var(--border);
  color: var(--dim); width: 28px; height: 28px;
  border-radius: 50%; cursor: pointer; font-size: .8rem;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.qz-quit-btn:hover { background: var(--rd-lt); color: var(--rd); border-color: var(--rd); }

/* Question area */
.quiz-q-area {
  flex: 1; overflow-y: auto; padding: 20px 24px 24px;
  display: flex; flex-direction: column; gap: 12px;
  max-width: 720px; margin: 0 auto; width: 100%;
  box-sizing: border-box;
}
.qz-cat {
  font-size: .72rem; font-weight: 700; color: var(--ac);
  text-transform: uppercase; letter-spacing: .08em;
}
.qz-q {
  font-size: 1.05rem; font-weight: 700; color: var(--ink);
  line-height: 1.45;
}
.qz-snip {
  background: var(--code-bg); border-radius: 8px;
  padding: 10px 12px; font-family: var(--f-mono);
  font-size: .78rem; color: #e2e8f0;
  overflow-x: auto;
}
.qz-opts { display: flex; flex-direction: column; gap: 8px; }
.qz-opt {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 9px; padding: 10px 14px; cursor: pointer;
  font-family: var(--f-body); font-size: .9rem; text-align: start;
  transition: border-color .12s, background .12s;
}
.qz-opt:hover:not(:disabled) { border-color: var(--ac); background: var(--ac-lt); }
.qz-opt.correct { border-color: var(--gr); background: var(--gr-lt); }
.qz-opt.wrong   { border-color: var(--rd); background: var(--rd-lt); }
.qz-opt:disabled { cursor: default; }
.qz-lbl {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--border); color: var(--dim);
  font-size: .72rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.qz-opt.correct .qz-lbl { background: var(--gr); color: #fff; }
.qz-opt.wrong   .qz-lbl { background: var(--rd); color: #fff; }
.qz-txt { flex: 1; line-height: 1.4; }

/* Feedback */
.qz-feedback { display: none; }
.qz-fb-top {
  font-size: 1rem; font-weight: 700; padding: 8px 12px;
  border-radius: 8px; margin-bottom: 8px;
}
.qz-fb-top.ok  { background: var(--gr-lt); color: var(--gr); }
.qz-fb-top.bad { background: var(--rd-lt); color: var(--rd); }
.qz-pts { font-size: .85rem; background: rgba(0,0,0,.08); padding: 1px 6px; border-radius: 20px; margin-inline-start: 6px; }
.qz-fb-exp {
  font-size: .85rem; color: var(--dim); line-height: 1.55;
  padding: 8px 12px; background: var(--bg);
  border-radius: 8px; border: 1px solid var(--border);
  margin-bottom: 10px;
}
.qz-next-btn {
  background: var(--ac); color: #fff; border: none;
  padding: 10px 24px; border-radius: 8px; cursor: pointer;
  font-family: var(--f-body); font-size: .9rem; font-weight: 600;
  transition: background .15s;
}
.qz-next-btn:hover { background: var(--ac-h); }

/* Result */
.quiz-result {
  flex: 1; display: none; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; text-align: center; gap: 16px;
}
.qzr-ring { position: relative; width: 130px; height: 130px; }
.qzr-ring svg { transform: rotate(-90deg); width: 130px; height: 130px; }
.qzr-bg  { fill: none; stroke: var(--border); stroke-width: 8; }
.qzr-arc { fill: none; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 314; stroke-dashoffset: 314; transition: stroke-dashoffset 1s ease; }
.qzr-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.qzr-pct   { font-size: 1.5rem; font-weight: 800; color: var(--ink); }
.qzr-grade { font-size: .9rem; font-weight: 700; color: var(--dim); }
.qzr-title { font-size: 1.2rem; font-weight: 700; }
.qzr-stats { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.qzrs      { text-align: center; }
.qzrs-v    { font-size: 1.4rem; font-weight: 800; }
.qzrs-l    { font-size: .68rem; color: var(--dim); text-transform: uppercase; letter-spacing: .05em; }
.qzr-score { font-size: 1rem; font-weight: 700; color: var(--ac); }
.qzr-btns  { display: flex; gap: 12px; }
.qzr-btn-again {
  background: var(--ac); color: #fff; border: none;
  padding: 10px 22px; border-radius: 8px; cursor: pointer;
  font-family: var(--f-body); font-size: .9rem; font-weight: 600;
}
.qzr-btn-home {
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--dim); padding: 10px 22px; border-radius: 8px;
  cursor: pointer; font-family: var(--f-body); font-size: .9rem;
}

/* ══ RTL fixes ══ */
.code-block, pre.code-body, .code-body {
  direction: ltr;
  text-align: left;
  unicode-bidi: embed;
}
.diagram {
  direction: ltr;
  text-align: left;
}
.tbl {
  direction: inherit;
}
.tbl th, .tbl td {
  text-align: start;
}

/* ═══════════════════════════════════════════════════════════════
   MOBILE — complete responsive overhaul
   Strategy:
   • < 768px : single column, bottom nav bar, drawer sidebars
   • < 480px : tighter padding, larger tap targets
   ═══════════════════════════════════════════════════════════════ */

/* ── Smooth scrolling & box-sizing everywhere ── */
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }

/* ── Mobile nav becomes bottom bar ── */
@media (max-width: 768px) {

  /* Hide the top nav completely */
  nav {
    display: none !important;
  }

  /* Bottom tab bar */
  .mob-bottom-bar {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 58px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 200;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .mob-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-size: .62rem;
    color: var(--dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 4px;
    -webkit-tap-highlight-color: transparent;
    transition: color .15s;
    min-height: 44px;
  }
  .mob-tab .mob-tab-icon { font-size: 1.2rem; line-height: 1; }
  .mob-tab.on { color: var(--acc); }

  /* Mobile top bar (replaces nav) */
  .mob-top-bar {
    display: flex;
    align-items: center;
    height: 52px;
    padding: 0 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 10px;
  }
  .mob-top-title {
    flex: 1;
    font-size: .9rem;
    font-weight: 700;
    color: var(--fg);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mob-sb-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--fg);
    padding: 6px 10px;
    font-size: .8rem;
    cursor: pointer;
    min-height: 36px;
    -webkit-tap-highlight-color: transparent;
  }
  .mob-lang-btn {
    background: none;
    border: 1px solid var(--acc);
    border-radius: 6px;
    color: var(--acc);
    padding: 5px 10px;
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    min-height: 36px;
    -webkit-tap-highlight-color: transparent;
  }
  .mob-xp {
    font-size: .78rem;
    color: var(--dim);
    white-space: nowrap;
  }

  /* All screens get bottom padding for the bottom bar */
  .screen { padding-bottom: 58px !important; }

  /* ── Landing ── */
  .land-hero {
    grid-template-columns: 1fr !important;
    padding: 28px 18px 24px !important;
    gap: 20px !important;
    text-align: center;
  }
  .land-grid {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 10px !important;
    padding: 0 14px 24px !important;
  }
  .land-card {
    padding: 14px 10px !important;
    min-height: 80px !important;
  }
  .hero-h { font-size: 1.6rem !important; }
  .hero-stats { justify-content: center; gap: 14px !important; }

  /* ── Learn layout — sidebar becomes drawer ── */
  .learn-layout {
    display: block !important;
    position: relative;
  }
  .l-sb {
    position: fixed !important;
    top: 0 !important;
    inset-inline-start: -100% !important;
    width: 80vw !important;
    max-width: 300px !important;
    height: 100% !important;
    z-index: 300 !important;
    transition: inset-inline-start .25s ease !important;
    overflow-y: auto !important;
    padding-top: 60px !important;
    padding-bottom: 80px !important;
  }
  .l-sb.mob-open {
    inset-inline-start: 0 !important;
  }
  .l-content {
    padding: 18px 16px 80px !important;
    max-width: 100% !important;
  }

  /* ── Lab layout — sidebar becomes drawer ── */
  .lab-layout {
    display: block !important;
    height: auto !important;
  }
  .lab-sb {
    position: fixed !important;
    top: 0 !important;
    inset-inline-end: -100% !important;
    width: 80vw !important;
    max-width: 300px !important;
    height: 100% !important;
    z-index: 300 !important;
    transition: inset-inline-end .25s ease !important;
    overflow-y: auto !important;
    padding-top: 60px !important;
    padding-bottom: 80px !important;
  }
  .lab-sb.mob-open {
    inset-inline-end: 0 !important;
  }
  .lab-main {
    height: auto !important;
    overflow-y: visible !important;

var TERM = {

function isTerminalChapter(n) {
  return TERMINAL_CHAPTERS.indexOf(n) >= 0;
}

function startTerminal(n) {
  TERM.ch = n;
  TERM.cmdHistory = [];
  TERM.histIdx = -1;

  var welcome = document.getElementById('labWelcome');
  var area    = document.getElementById('lqArea');
  if (welcome) welcome.style.display = 'none';
  if (area)    area.style.display    = 'block';

  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('on'); });
  var btn = document.getElementById('labchbtn' + n);
  if (btn) btn.classList.add('on');

  renderTerminal(n);
}

function getPrompt(n) {
  var td = TERMINAL_DATA[n];
  if (!td) return '$ ';
  if (td.os === 'python' || td.os === 'scapy') return '>>> ';
  return td.prompt || 'student@net-lab:~$ ';
}

  }

  }

function onTermKey(e) {
  var inp = document.getElementById('trmInput');
  if (!inp) return;
  if (e.key === 'Enter') { runTermCmd(); return; }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (TERM.histIdx < TERM.cmdHistory.length - 1) TERM.histIdx++;
    inp.value = TERM.cmdHistory[TERM.cmdHistory.length - 1 - TERM.histIdx] || '';
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (TERM.histIdx > 0) { TERM.histIdx--; inp.value = TERM.cmdHistory[TERM.cmdHistory.length - 1 - TERM.histIdx] || ''; }
    else { TERM.histIdx = -1; inp.value = ''; }
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    // simple tab completion
    var val = inp.value.trim();
    var td  = TERMINAL_DATA[TERM.ch];
    if (!td || !val) return;
    var allCmds = [];
    td.missions.forEach(function(m){ allCmds = allCmds.concat(Object.keys(m.cmds)); });
    var match = allCmds.filter(function(c){ return c.indexOf(val) === 0; });
    if (match.length === 1) inp.value = match[0];
  }
}

function printTermLine(htmlContent, cls) {
  var body = document.getElementById('trmBody');
  if (!body) return;
  var d = document.createElement('div');
  d.className = 'trm-line' + (cls ? ' ' + cls : '');
  d.innerHTML = htmlContent;
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
}

function lookupCmd(cmd, n) {
  var td = TERMINAL_DATA[n];
  if (!td) return null;
  var cmdL = cmd.trim().replace(/\s+/g, ' ');
  var cmdLow = cmdL.toLowerCase();

  /* exact match first */
  for (var i = 0; i < td.missions.length; i++) {
    var m = td.missions[i];
    for (var key in m.cmds) {
      if (key.trim().replace(/\s+/g,' ') === cmdL) return { out: m.cmds[key], mission: m };
    }
  }
  /* case-insensitive */
  for (var i = 0; i < td.missions.length; i++) {
    var m = td.missions[i];
    for (var key in m.cmds) {
      if (key.trim().toLowerCase().replace(/\s+/g,' ') === cmdLow) return { out: m.cmds[key], mission: m };
    }
  }
  /* prefix match on first word */
  var firstWord = cmdLow.split(' ')[0];
  for (var i = 0; i < td.missions.length; i++) {
    var m = td.missions[i];
    for (var key in m.cmds) {
      if (key.trim().toLowerCase().split(' ')[0] === firstWord) {
        return { out: m.cmds[key], mission: m };
      }
    }
  }
  return null;
}

function unknownOutput(cmd, td) {
  var c = cmd.trim().split(' ')[0];
  if (td.os === 'python' || td.os === 'scapy') {
    return 'Traceback (most recent call last):\n  File "<stdin>", line 1\nNameError: name \'' + c + '\' is not defined';
  }
  return c + ': command not found';
}

function runTermCmd() {
  var inp = document.getElementById('trmInput');
  if (!inp) return;
  var cmd = inp.value.trim();
  if (!cmd) return;
  inp.value = '';
  TERM.histIdx = -1;
  TERM.cmdHistory.push(cmd);
  if (TERM.cmdHistory.length > 200) TERM.cmdHistory.shift();

  var td = TERMINAL_DATA[TERM.ch];
  if (!td) return;

  var isHe = LANG === 'he';

  /* Render input line */
  if (td.os === 'python' || td.os === 'scapy') {
    printTermLine('<span class="trm-py-prompt">&gt;&gt;&gt; </span>' + escH(cmd), 'trm-cmd');
  } else {
    printTermLine(
      '<span class="trm-user">student</span>' +
      '<span class="trm-at">@</span>' +
      '<span class="trm-host">net-lab</span>' +
      '<span class="trm-colon">:</span>' +
      '<span class="trm-path">~</span>' +
      '<span class="trm-dollar">$</span> ' + escH(cmd),
      'trm-cmd'
    );
  }

  /* Builtins */
  if (cmd === 'clear' || cmd === 'reset') { clearTerminal(); return; }
  if (cmd === 'exit' || cmd === 'quit()') {
    printTermLine(isHe ? 'logout' : 'logout', 'trm-dim'); return;
  }
  if (cmd === 'help' || cmd === '--help' || cmd === 'man') {
    printTermLine(isHe ? '# לחץ 💡 לרמז על הפקודה הבאה' : '# Press 💡 for a hint on the next command', 'trm-comment');
    return;
  }
  if (cmd === 'ls' || cmd === 'ls -la') {
    printTermLine('total 32\ndrwxr-xr-x 2 student student 4096 Mar 25 14:00 .\ndrwxr-xr-x 8 student student 4096 Mar 25 14:00 ..\n-rw-r--r-- 1 student student  612 Mar 25 14:00 server.py\n-rw-r--r-- 1 student student  234 Mar 25 14:00 client.py\n-rw-r--r-- 1 student student 1024 Mar 25 14:00 server_select.py'.replace(/\n/g,'<br>'), 'trm-out');
    return;
  }
  if (cmd === 'pwd') { printTermLine('/home/student', 'trm-out'); return; }
  if (cmd === 'whoami') { printTermLine('student', 'trm-out'); return; }
  if (cmd === 'uname -a') {
    printTermLine('Linux net-lab 5.15.0-105-generic #115-Ubuntu SMP Mon Apr 15 09:52:04 UTC 2024 x86_64 x86_64 x86_64 GNU/Linux', 'trm-out');
    return;
  }

  /* Lookup */
  var result = lookupCmd(cmd, TERM.ch);
  var out;
  if (result !== null) {
    out = result.out;
    checkMissionDone(result.mission, td);
  } else {
    out = unknownOutput(cmd, td);
  }

  if (out && out.length > 0) {
    printTermLine(escH(out).replace(/\n/g, '<br>'), 'trm-out');
  }
}

function checkMissionDone(mission, td) {
  var key = 'ch' + TERM.ch + '_' + mission.id;
  if (TERM.doneMissions[key]) return;
  TERM.doneMissions[key] = true;

  var el = document.getElementById('trmmis_' + key);
  if (el) {
    el.classList.add('done');
    var chk = document.createElement('span');
    chk.className = 'trm-m-check';
    chk.textContent = '✓';
    el.appendChild(chk);
  }

  XP += 10;
  localStorage.setItem('nw_xp', XP);
  var xpEl = document.getElementById('xpTotal');
  if (xpEl) xpEl.textContent = XP;

  printTermLine(
    '<span class="trm-success">✓ ' +
    (LANG === 'he' ? 'משימה הושלמה!' : 'Mission complete!') +
    ' +10 XP</span>',
    'trm-mission-ok'
  );

  /* Check all missions done */
  var allDone = td.missions.every(function(m){
    return !!TERM.doneMissions['ch' + TERM.ch + '_' + m.id];
  });
  if (allDone) {
    printTermLine(
      '<span class="trm-success-all">🎉 ' +
      (LANG === 'he' ? 'כל המשימות הושלמו! +50 XP בונוס' : 'All missions complete! +50 XP bonus') +
      '</span>',
      'trm-mission-ok'
    );
    XP += 50;
    localStorage.setItem('nw_xp', XP);
    if (xpEl) xpEl.textContent = XP;
  }
}

/* QE */
/* ══════════════════════════════════════════
   QUIZ ENGINE — trivia, timer, score
══════════════════════════════════════════ */

var QUIZ = {
  questions:  [],  // shuffled pool
  cur:        0,
  score:      0,
  streak:     0,
  maxStreak:  0,
  timer:      null,
  timeLeft:   15,
  answered:   false,
  total:      10,
  correct:    0,
  times:      []   // time taken per question
};
var QUIZ_TIME = 15; // seconds per question

/* ── helpers ── */
function qzShuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function qzAllQuestions() {
  var all = [];
  for (var n = 1; n <= 13; n++) {
    // ch1 uses QUIZ_DATA (GfG-style knowledge questions)
    // other chapters use LAB_DATA
    var pool = (QUIZ_DATA && QUIZ_DATA[n]) ? QUIZ_DATA[n] : (LAB_DATA[n] || []);
    pool.forEach(function(q) {
      all.push({ n: n, q: q });
    });
  }
  return all;
}

/* ── start ── */
function startQuiz(count, chN) {
  var all = qzAllQuestions();
  if (chN) all = all.filter(function(item){ return item.n === chN; });
  all = qzShuffle(all);
  QUIZ.questions = count === 'all' ? all : all.slice(0, Math.min(count, all.length));
  QUIZ._chFilter = chN || 0;
  QUIZ.total     = QUIZ.questions.length;
  QUIZ.cur       = 0;
  QUIZ.score     = 0;
  QUIZ.streak    = 0;
  QUIZ.maxStreak = 0;
  QUIZ.correct   = 0;
  QUIZ.times     = [];

  document.getElementById('quizHome').style.display   = 'none';
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizGame').style.display   = 'flex';

  renderQuizQ();
}

function quitQuiz() {
  clearInterval(QUIZ.timer);
  document.getElementById('quizGame').style.display = 'none';
  document.getElementById('quizHome').style.display = 'flex';
}

/* ── render question ── */
function renderQuizQ() {
  var isHe = LANG === 'he';
  if (QUIZ.cur >= QUIZ.questions.length) { showQuizResult(); return; }

  var item = QUIZ.questions[QUIZ.cur];
  var q    = item.q;
  var ch   = CHAPTERS.find(function(c){ return c.n === item.n; });
  var data = LANG === 'he' ? ch.he : ch.en;
  var isHe = LANG === 'he';

  QUIZ.answered = false;
  QUIZ.timeLeft = QUIZ_TIME;

  /* HUD */
  document.getElementById('qzScore').textContent  = QUIZ.score;
  document.getElementById('qzStreak').textContent = QUIZ.streak > 0 ? '🔥' + QUIZ.streak : '0';
  document.getElementById('qzNum').textContent    = (QUIZ.cur + 1) + ' / ' + QUIZ.total;

  /* Category */
  document.getElementById('qzCat').textContent = ch.icon + ' ' + data.name + (q.cat ? ' · ' + (LANG==='he' ? q.cat : (q.cat_en || q.cat)) : '');

  /* Question */
  document.getElementById('qzQ').textContent = isHe ? q.q : (q.q_en || q.q);

  /* Snippet */
  var qArea = document.getElementById('quizQArea');
  var snipEl = qArea.querySelector('.qz-snip');
  if (snipEl && snipEl.remove) snipEl.remove();
  if (q.snip) {
    var snip = document.createElement('div');
    snip.className = 'qz-snip';
    snip.innerHTML = q.snip;
    qArea.insertBefore(snip, document.getElementById('qzOpts'));
  }

  /* Options — shuffle */
  var idx   = qzShuffle([0,1,2,3]);
  var newC  = idx.indexOf(q.c);
  var LBL   = isHe ? ['א','ב','ג','ד'] : ['A','B','C','D'];
  var opts  = document.getElementById('qzOpts');
  opts.innerHTML = '';
  idx.forEach(function(origI, j) {
    var btn = document.createElement('button');
    btn.className = 'qz-opt';
    btn.dataset.correct = (origI === q.c) ? '1' : '0';
    btn.innerHTML =
      '<span class="qz-lbl">' + LBL[j] + '</span>' +
      '<span class="qz-txt">' + (isHe ? q.a : (q.a_en || q.a))[origI] + '</span>';
    btn.onclick = function() { onQuizPick(btn, q); };
    opts.appendChild(btn);
  });

  /* Feedback */
  document.getElementById('qzFeedback').innerHTML = '';
  document.getElementById('qzFeedback').style.display = 'none';

  /* Timer */
  clearInterval(QUIZ.timer);
  updateTimerArc(QUIZ_TIME);
  document.getElementById('qzTimerNum').textContent = QUIZ_TIME;
  var startTime = Date.now();

  QUIZ.timer = setInterval(function() {
    QUIZ.timeLeft--;
    document.getElementById('qzTimerNum').textContent = QUIZ.timeLeft;
    updateTimerArc(QUIZ.timeLeft);

    if (QUIZ.timeLeft <= 5) {
      document.getElementById('qzTimerNum').style.color = '#f85149';
    } else {
      document.getElementById('qzTimerNum').style.color = '#e6edf3';
    }

    if (QUIZ.timeLeft <= 0) {
      clearInterval(QUIZ.timer);
      if (!QUIZ.answered) {
        QUIZ.answered = true;
        QUIZ.times.push(QUIZ_TIME);
        onTimeout(q);
      }
    }
  }, 1000);

  QUIZ._startTime = Date.now();
}

function updateTimerArc(t) {
  var arc = document.getElementById('qzTimerArc');
  if (!arc) return;
  var pct    = t / QUIZ_TIME;
  var circum = 2 * Math.PI * 18; // r=18
  arc.style.strokeDashoffset = circum * (1 - pct);
  arc.style.stroke = t > 8 ? '#3fb950' : t > 4 ? '#f0883e' : '#f85149';
}

/* ── pick ── */
function onQuizPick(btn, q) {
  if (QUIZ.answered) return;
  QUIZ.answered = true;
  clearInterval(QUIZ.timer);

  var elapsed  = (Date.now() - QUIZ._startTime) / 1000;
  QUIZ.times.push(Math.min(elapsed, QUIZ_TIME));

  var correct  = btn.dataset.correct === '1';
  var isHe     = LANG === 'he';

  /* Points: faster = more points */
  var pts = 0;
  if (correct) {
    pts = Math.max(10, Math.round(100 * (1 - elapsed / QUIZ_TIME)));
    QUIZ.score  += pts;
    QUIZ.streak++;
    QUIZ.correct++;
    if (QUIZ.streak > QUIZ.maxStreak) QUIZ.maxStreak = QUIZ.streak;
    if (QUIZ.streak > 1) pts += QUIZ.streak * 5; // streak bonus
  } else {
    QUIZ.streak = 0;
  }

  /* Highlight options */
  document.querySelectorAll('.qz-opt').forEach(function(b) {
    b.disabled = true;
    if (b.dataset.correct === '1') b.classList.add('correct');
    else if (b === btn && !correct) b.classList.add('wrong');
  });

  /* Feedback */
  var fb = document.getElementById('qzFeedback');
  fb.style.display = 'block';
  fb.innerHTML =
    '<div class="qz-fb-top ' + (correct ? 'ok' : 'bad') + '">' +
      (correct
        ? '✓ ' + (isHe ? 'נכון!' : 'Correct!') + ' <span class="qz-pts">+' + pts + '</span>'
        : '✗ ' + (isHe ? 'לא נכון' : 'Wrong')) +
    '</div>' +
    '<div class="qz-fb-exp">' + (q.e || '') + '</div>' +
    '<button class="qz-next-btn" onclick="nextQuizQ()">' +
      (QUIZ.cur + 1 < QUIZ.total
        ? (isHe ? 'הבאה ←' : 'Next →')
        : (isHe ? 'תוצאה 🏆' : 'Result 🏆')) +
    '</button>';

  document.getElementById('qzScore').textContent  = QUIZ.score;
  document.getElementById('qzStreak').textContent = QUIZ.streak > 0 ? '🔥' + QUIZ.streak : '0';

  QUIZ.cur++;
}

function onTimeout(q) {
  var isHe = LANG === 'he';
  QUIZ.streak = 0;
  document.querySelectorAll('.qz-opt').forEach(function(b) {
    b.disabled = true;
    if (b.dataset.correct === '1') b.classList.add('correct');
  });
  var fb = document.getElementById('qzFeedback');
  fb.style.display = 'block';
  fb.innerHTML =
    '<div class="qz-fb-top bad">⏰ ' + (isHe ? 'הזמן נגמר!' : 'Time\'s up!') + '</div>' +
    '<div class="qz-fb-exp">' + (q.e || '') + '</div>' +
    '<button class="qz-next-btn" onclick="nextQuizQ()">' +
      (QUIZ.cur + 1 < QUIZ.total
        ? (isHe ? 'הבאה ←' : 'Next →')
        : (isHe ? 'תוצאה 🏆' : 'Result 🏆')) +
    '</button>';
  QUIZ.cur++;
}

function nextQuizQ() {
  renderQuizQ();
}

/* ── result ── */
function showQuizResult() {
  clearInterval(QUIZ.timer);
  document.getElementById('quizGame').style.display = 'none';

  var isHe  = LANG === 'he';
  var pct   = Math.round(QUIZ.correct / QUIZ.total * 100);
  var avgT  = QUIZ.times.length
    ? Math.round(QUIZ.times.reduce(function(a,b){return a+b;},0) / QUIZ.times.length * 10) / 10
    : 0;

  /* Save best */
  var bestKey = 'nw_quiz_best';
  var prevBest = parseInt(localStorage.getItem(bestKey) || '0');
  if (QUIZ.score > prevBest) {
    localStorage.setItem(bestKey, QUIZ.score);
    prevBest = QUIZ.score;
  }

  /* XP */
  var xpGain = Math.round(QUIZ.score / 10);
  XP += xpGain;
  localStorage.setItem('nw_xp', XP);
  var xpEl = document.getElementById('xpTotal');
  if (xpEl) xpEl.textContent = XP;

  var grade  = pct>=90?'S':pct>=80?'A':pct>=70?'B':pct>=60?'C':'D';
  var arcOff = 2 * Math.PI * 50 * (1 - pct/100);

  var titles = isHe
    ? ['כמעט! 📖','מתקדם! 💪','כל הכבוד! 🎯','מהיר כברק! ⚡']
    : ['Keep trying! 📖','Good work! 💪','Well done! 🎯','Lightning fast! ⚡'];
  var tier = pct>=90?3:pct>=70?2:pct>=50?1:0;

  document.getElementById('quizResult').style.display = 'flex';
  document.getElementById('quizResult').innerHTML =
    '<div class="qzr-ring">' +
      '<svg viewBox="0 0 110 110"><circle class="qzr-bg" cx="55" cy="55" r="50"/>' +
      '<circle class="qzr-arc" id="qzrArc" cx="55" cy="55" r="50"/></svg>' +
      '<div class="qzr-inner"><div class="qzr-pct">' + pct + '%</div><div class="qzr-grade">' + grade + '</div></div>' +
    '</div>' +
    '<div class="qzr-title">' + titles[tier] + '</div>' +
    '<div class="qzr-stats">' +
      '<div class="qzrs"><div class="qzrs-v" style="color:#3fb950">' + QUIZ.correct + '</div><div class="qzrs-l">' + (isHe?'נכון':'correct') + '</div></div>' +
      '<div class="qzrs"><div class="qzrs-v" style="color:#f85149">' + (QUIZ.total-QUIZ.correct) + '</div><div class="qzrs-l">' + (isHe?'שגוי':'wrong') + '</div></div>' +
      '<div class="qzrs"><div class="qzrs-v" style="color:#f0883e">' + QUIZ.maxStreak + '</div><div class="qzrs-l">' + (isHe?'רצף':'streak') + '</div></div>' +
      '<div class="qzrs"><div class="qzrs-v">' + avgT + 's</div><div class="qzrs-l">' + (isHe?'ממוצע':'avg time') + '</div></div>' +
    '</div>' +
    '<div class="qzr-score">⚡ ' + QUIZ.score + ' ' + (isHe?'נקודות':'points') + ' · +' + xpGain + ' XP</div>' +
    '<div class="qzr-btns">' +
      '<button class="qzr-btn-again" onclick="startQuiz(' + QUIZ.total + ')">' + (isHe?'🔁 שחק שוב':'🔁 Play Again') + '</button>' +
      '<button class="qzr-btn-home" onclick="quitQuiz()">' + (isHe?'🏠 תפריט':'🏠 Menu') + '</button>' +
    '</div>';

  setTimeout(function() {
    var arc = document.getElementById('qzrArc');
    if (arc) {
      var circum = 2 * Math.PI * 50;
      arc.style.strokeDasharray  = circum;
      arc.style.strokeDashoffset = circum * (1 - pct/100);
      arc.style.stroke = pct>=80?'#3fb950':pct>=60?'#f0883e':'#f85149';
    }
  }, 100);

  /* Update best on home */
  updateQuizBest();
}

function updateQuizBest() {
  var best   = parseInt(localStorage.getItem('nw_quiz_best') || '0');
  var isHe   = LANG === 'he';
  var bestEl = document.getElementById('quizBest');
  if (bestEl && best > 0) {
    bestEl.innerHTML = '🏆 ' + (isHe ? 'שיא:' : 'Best:') + ' <strong>' + best + '</strong> ' + (isHe ? 'נקודות' : 'pts');
  }
}

/* Call on init */
function initQuiz() {
  updateQuizBest();
}

<span class="sec-label">05 — Hops</span>
<h2 class="sec-h">התחנות בדרך</h2>
<p>Packet לא עובר ישירות ממחשבך לשרת. הוא עובר דרך עשרות נתבים — כל נתב הוא Hop.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">traceroute</span></div>
<pre class="code-body">traceroute -n 8.8.8.8   # Linux/Mac
tracert -d 8.8.8.8      # Windows

 1   2ms  192.168.1.1    ← נתב ביתי
 2   9ms  212.179.37.1   ← ISP
 3  88ms  74.125.50.237  ← Google backbone
 4  90ms  8.8.8.8        ← יעד!
 *  * *                  ← חסימת ICMP, לא בעיה</pre></div>
<div class="callout note">📝 <strong>TTL</strong> — כל packet יוצא עם TTL (64 או 128). כל hop מוריד 1. כש-TTL=0 הנתב זורק ושולח ICMP Time Exceeded. traceroute מנצל זאת.</div>
</section>

<section class="learn-section">
<span class="sec-label">01 — WWW vs Internet</span>
<h2 class="sec-h">Not the Same Thing</h2>
<p><strong>Internet</strong> — global physical infrastructure: undersea fiber cables, routers, ISPs. Exists since 1969 (ARPANET).<br>
<strong>WWW</strong> — a service running <em>on top</em> of the internet: HTML pages connected by links. Invented at CERN in 1991.</p>
<table class="tbl"><tr><th>Service</th><th>Protocol</th><th>What</th></tr>
<tr><td>WWW</td><td>HTTP/HTTPS</td><td>Web pages</td></tr>
<tr><td>Email</td><td>SMTP, IMAP</td><td>Electronic mail</td></tr>
<tr><td>Files</td><td>FTP, SFTP</td><td>File transfer</td></tr>
<tr><td>Calls</td><td>VoIP, WebRTC</td><td>Zoom, WhatsApp</td></tr>
</table>
</section>

<section class="learn-section">
<span class="sec-label">02 — Client-Server</span>
<h2 class="sec-h">Who Initiates?</h2>
<p><strong>Client</strong> — initiates and sends Request.<br><strong>Server</strong> — waits and returns Response.<br>Client <em>always</em> initiates. Always.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">HTTP GET</span></div>
<pre class="code-body">Client → GET /index.html HTTP/1.1
Server → HTTP/1.1 200 OK ...</pre></div>
<table class="tbl"><tr><th>Scenario</th><th>Client</th><th>Server</th></tr>
<tr><td>Browsing YouTube</td><td>Browser</td><td>Google servers</td></tr>
<tr><td>WhatsApp</td><td>Phone</td><td>Meta servers</td></tr>
<tr><td>Minecraft Multiplayer</td><td>Your game</td><td>Game Server</td></tr>
</table>
<div class="callout note">📝 <strong>P2P</strong> — In BitTorrent every peer is both Client and Server. No central server.</div>
</section>

<section class="learn-section">
<span class="sec-label">03 — IP Address</span>
<h2 class="sec-h">The Network's Postal Address</h2>
<p>IPv4 — 32 bits, 4 numbers 0–255 separated by dots.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">Important Addresses</span></div>
<pre class="code-body">127.0.0.1        loopback — never leaves the machine
192.168.0.0/16   private — home network
10.0.0.0/8       private — enterprise
172.16.0.0/12    private — datacenter
8.8.8.8          Google DNS
1.1.1.1          Cloudflare DNS</pre></div>
<table class="tbl"><tr><th>Address</th><th>Valid?</th><th>Why</th></tr>
<tr><td>192.168.1.5</td><td>✅</td><td>Each octet 0–255</td></tr>
<tr><td>256.0.0.1</td><td>❌</td><td>256 &gt; 255</td></tr>
<tr><td>10.0.0.256</td><td>❌</td><td>256 &gt; 255</td></tr>
</table>
</section>

<section class="learn-section">
<span class="sec-label">04 — DNS</span>
<h2 class="sec-h">The Internet's Phone Book</h2>
<p>DNS translates domain names to IP addresses. Without DNS we'd type IPs instead of names.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">Resolution Process</span></div>
<pre class="code-body">1. Check local cache
2. Ask Recursive Resolver (ISP)
3. Root DNS (.)
4. TLD DNS (.com)
5. Authoritative DNS (google.com)
6. Answer: 142.250.80.46

dig google.com          # lookup
dig +trace google.com   # all steps</pre></div>
<table class="tbl"><tr><th>Record</th><th>Contains</th><th>Example</th></tr>
<tr><td>A</td><td>name — IPv4</td><td>google.com — 142.250.80.46</td></tr>
<tr><td>AAAA</td><td>name — IPv6</td><td>google.com — 2607:f8b0::200e</td></tr>
<tr><td>CNAME</td><td>name — another name</td><td>www — example.com</td></tr>
<tr><td>MX</td><td>mail server</td><td>gmail.com — mail.google.com</td></tr>
</table>
<div class="callout note">📝 DNS uses <strong>UDP port 53</strong>. Short query — no TCP handshake needed. When response exceeds 512 bytes — switches to TCP.</div>
</section>

<section class="learn-section">
<span class="sec-label">05 — Hops</span>
<h2 class="sec-h">Stops Along the Way</h2>
<p>Packets don't travel directly from your machine to the server. They pass through dozens of routers — each is a Hop.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">traceroute</span></div>
<pre class="code-body">traceroute -n 8.8.8.8   # Linux/Mac
tracert -d 8.8.8.8      # Windows

 1   2ms  192.168.1.1    ← home router
 2   9ms  212.179.37.1   ← ISP
 3  88ms  74.125.50.237  ← Google backbone
 4  90ms  8.8.8.8        ← destination!
 *  * *                  ← ICMP blocked, not a problem</pre></div>
<div class="callout note">📝 <strong>TTL</strong> — each packet starts with TTL (64 or 128). Each hop decrements by 1. When TTL=0 the router drops it and sends ICMP Time Exceeded. traceroute exploits this.</div>
</section>

<section class="learn-section">
<span class="sec-label">🔥 — Real Story</span>
<h2 class="sec-h">Pakistan "Steals" YouTube — 2008</h2>
<p>On February 24, 2008, Pakistan Telecom accidentally announced itself as the route to YouTube. BGP — the protocol connecting ISPs — believed it. Within minutes <strong>75 million users</strong> lost access to YouTube for two hours. YouTube itself was running — just unreachable.</p>
<div class="callout warn">⚡ BGP is trust-based. RPKI adds cryptographic signing — but adoption is still partial.</div>
</section>

<section class="learn-section">
<span class="sec-label">01 — מה זה Socket</span>
<h2 class="sec-h">נקודת קצה של חיבור</h2>
<p>Socket — שילוב של <strong>IP + Port</strong> שמזהה חיבור ספציפי בין שתי תוכניות. כמו כתובת דירה מדויקת: IP הוא הבניין, Port הוא מספר הדירה.</p>
<table class="tbl"><tr><th>Port</th><th>שירות</th><th>פרוטוקול</th></tr>
<tr><td>80</td><td>HTTP</td><td>TCP</td></tr>
<tr><td>443</td><td>HTTPS</td><td>TCP</td></tr>
<tr><td>22</td><td>SSH</td><td>TCP</td></tr>
<tr><td>53</td><td>DNS</td><td>UDP</td></tr>
<tr><td>0–1023</td><td>Well-Known</td><td>דורשים root</td></tr>
<tr><td>1024–65535</td><td>Dynamic</td><td>כל אחד</td></tr>
</table>
</section>

<section class="learn-section">
<span class="sec-label">02 — API לקוח</span>
<h2 class="sec-h">4 פקודות לחיבור</h2>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">client.py</span></div>
<pre class="code-body">import socket

s = socket.socket()                    # צור socket
s.connect(('93.184.216.34', 80))       # התחבר לשרת
s.send(b'GET / HTTP/1.0\\r\\n\\r\\n')      # שלח בקשה
data = s.recv(4096)                    # קבל תשובה
s.close()
print(data.decode())</pre></div>
</section>

<section class="learn-section">
<span class="sec-label">03 — API שרת</span>
<h2 class="sec-h">5 פקודות להאזנה</h2>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">server.py</span></div>
<pre class="code-body">import socket

server = socket.socket()
server.bind(('0.0.0.0', 8080))    # הקשב על כל ממשק
server.listen(5)                   # תור לקוחות ממתינים

while True:
    client, addr = server.accept() # BLOCKING — מחכה ללקוח
    data = client.recv(1024)       # BLOCKING — מחכה לנתונים
    if not data:                   # מחרוזת ריקה = נתק
        client.close()
        continue
    client.send(b'Hello! ' + data)
    client.close()</pre></div>
<div class="callout note">📝 <code>0.0.0.0</code> — הקשב על כל ממשקי הרשת. <code>127.0.0.1</code> — רק מהמחשב עצמו.</div>
</section>

<section class="learn-section">
<span class="sec-label">04 — recv() ריקה</span>
<h2 class="sec-h">איתות ניתוק</h2>
<p><code>recv()</code> מחזירה <code>b''</code> (מחרוזת ריקה) כשהחיבור נסגר. תמיד בדוק זאת.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">טיפול נכון</span></div>
<pre class="code-body">data = client.recv(1024)
if not data:           # ריק = ניתוק
    client.close()
    break
# אחרת — עבד את הנתונים</pre></div>
</section>

<section class="learn-section">
<span class="sec-label">05 — C10K ו-asyncio</span>
<h2 class="sec-h">מדוע Thread לכל לקוח לא עובד</h2>
<p>Thread בלינוקס — 8MB RAM. מיליון לקוחות — 8TB RAM. לא ריאלי. הפתרון: event loop.</p>
<table class="tbl"><tr><th>גישה</th><th>מקסימום connections</th><th>שימוש</th></tr>
<tr><td>Thread per client</td><td>~10,000</td><td>legacy</td></tr>
<tr><td>select()</td><td>~1,000 (FD_SETSIZE)</td><td>Python 2</td></tr>
<tr><td>epoll (Linux)</td><td>1M+</td><td>nginx, Node.js</td></tr>
<tr><td>asyncio</td><td>1M+</td><td>FastAPI, aiohttp</td></tr>
</table>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">asyncio server</span></div>
<pre class="code-body">import asyncio

async def handle(reader, writer):
    data = await reader.read(1024)
    writer.write(b'Echo: ' + data)
    await writer.drain()
    writer.close()

async def main():
    server = await asyncio.start_server(handle, '0.0.0.0', 8888)
    async with server:
        await server.serve_forever()

asyncio.run(main())</pre></div>
</section>

<section class="learn-section">
<span class="sec-label">06 — WebSockets</span>

<section class="learn-section">

<h2 class="sec-h">שגיאות Socket נפוצות</h2>

<section class="learn-section">

<pre class="code-body">Slow Start:
  cwnd = 1 MSS
  כל ACK → cwnd × 2  (אקספוננציאלי)
  1 → 2 → 4 → 8 ...

Congestion Avoidance (אחרי ssthresh):
  כל RTT → cwnd + 1  (ליניארי)

Packet Loss:
  ssthresh = cwnd / 2
  cwnd = 1  → Slow Start מחדש</pre></div>

<h2 class="sec-h">שרת שמטפל בלקוח אחד</h2>
<p><code>accept()</code> ו-<code>recv()</code> — Blocking: מקפיאות את התוכנה עד שמגיע משהו. בזמן שמחכים ל-recv מלקוח A — לקוח B לא יכול להתחבר.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">הבעיה</span></div>
<pre class="code-body">while True:
    client = server.accept()  # מחכה ללקוח
    data = client.recv(1024)  # מחכה לdata
    # בזמן שמחכים — אף לקוח אחר לא יכול להתחבר!</pre></div>
</section>

<section class="learn-section">
<span class="sec-label">02 — select()</span>
<h2 class="sec-h">הפתרון — IO Multiplexing</h2>
<p><code>select()</code> בודקת אילו sockets מוכנים — ללא blocking.</p>
<div class="code-block"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">select() loop</span></div>
<pre class="code-body">import select, socket

server = socket.socket()
server.bind(('0.0.0.0', 8080))
server.listen()

open_clients = []

while True:
    rlist, wlist, _ = select.select(
        [server] + open_clients,  # מי מוכן לקריאה?
        open_clients,              # מי מוכן לכתיבה?
        []
    )
    for s in rlist:
        if s is server:
            client, addr = server.accept()
            open_clients.append(client)
        else:
            data = s.recv(1024)
            if not data:
                open_clients.remove(s)
                s.close()</pre></div>

<pre class="code-body"># IPv4: 32 bits = 4.3 מיליארד כתובות (נגמרו 2011)

  { cat: "תרחיש: latency גבוה", cat_en: "Scenario: High latency", snip: null, q: "ping 8.8.8.8 מחזיר RTT ממוצע של 450ms (רגיל: 40ms). mtr מראה שהבעיה מ-hop 2. מה הסיבה הסבירה ביותר?", q_en: "ping 8.8.8.8 returns average RTT of 450ms (normal: 40ms). mtr shows problem from hop 2. Most likely cause?", a: ["עומס על ה-ISP router — congestion, QoS throttling, או בעיית backbone", "Google server עמוס — לא הצעד הראשון", "כרטיס הרשת המקומי פגום — אינו הגורם", "DNS איטי — גורם לעיכוב בכל ping — אינו הכלי המתאים"], a_en: ["Load on ISP router — congestion, QoS throttling, or backbone issue", "Google server overloaded", "Local network card faulty", "DNS slow — causing delay in every ping"], c: 0, e: "Hop 2 = ה-ISP router הראשון. בעיה שם = ISP congestion, line quality, או throttling. ping ישיר ל-IP לא קשור ל-DNS בכלל. בדוק: mtr --report 8.8.8.8 לראות loss% per hop.", e_en: "Hop 2 = first ISP router. Problem there = ISP congestion, line quality, or throttling. Direct ping to IP has nothing to do with DNS. Check: mtr --report 8.8.8.8 to see loss% per hop." },
  { cat: "תרחיש: DHCP כשל", cat_en: "Scenario: DHCP Failure", snip: null, q: "מחשב חדש התחבר לרשת, ip addr show מראה 169.254.x.x. מה קרה ומה עושים?", q_en: "New computer connected to network, ip addr show shows 169.254.x.x. What happened and what to do?", a: ["169.254.x.x = APIPA — DHCP לא ענה, OS הקצה כתובת עצמאית. תיקון: sudo dhclient eth0", "169.254.x.x = IPv6 כתובת תקינה — הכל בסדר — לא הצעד הראשון", "169.254.x.x = IP פרטי תקין לרשת ביתית — אינו הגורם", "שרת DNS לא עובד — שנה ל-8.8.8.8 — אינו הכלי המתאים"], a_en: ["169.254.x.x = APIPA — DHCP did not respond, OS assigned self-assigned address. Fix: sudo dhclient eth0", "169.254.x.x = valid IPv6 address — all is fine", "169.254.x.x = valid private IP for home network", "DNS server not working — change to 8.8.8.8"], c: 0, e: "APIPA (Automatic Private IP Addressing): אם DHCP לא ענה ב-5 שניות — OS מקצה 169.254.0.0/16 אוטומטית. לא ניתן לגלוש לאינטרנט. תיקון: sudo dhclient eth0 (Linux) / ipconfig /renew (Windows).", e_en: "APIPA (Automatic Private IP Addressing): if DHCP did not respond in 5 seconds — OS assigns 169.254.0.0/16 automatically. Cannot browse the internet. Fix: sudo dhclient eth0 (Linux) / ipconfig /renew (Windows)." },
  { cat: "תרחיש: איזה כלי", cat_en: "Scenario: Which Tool", snip: null, q: "מנהל רשת צריך לראות בזמן אמת: כמה packet loss יש לכל hop בדרך לשרת, ממוצע RTT לכל hop, ואם הבעיה קבועה או משתנה. איזה כלי?", q_en: "Network admin needs to see in real time: packet loss per hop to server, average RTT per hop, whether problem is stable or changing. Which tool?", a: ["mtr — משלב traceroute + ping ברציפות עם סטטיסטיקות per-hop", "traceroute — מציג hops חד-פעמית — לא הצעד הראשון", "ping — מציג RTT לyעד בלבד, לא per-hop — אינו הגורם", "netstat — מציג connections פעילים — אינו הכלי המתאים"], a_en: ["mtr — combines traceroute + continuous ping with per-hop statistics", "traceroute — shows hops once", "ping — shows RTT to destination only, not per-hop", "netstat — shows active connections"], c: 0, e: "mtr (My Traceroute) = traceroute בזמן אמת. מציג loss%, avg/best/worst RTT לכל hop. מתעדכן כל שנייה. הכלי הכי שימושי לאבחון intermittent issues. מקבילה ל-WinMTR ב-Windows.", e_en: "mtr (My Traceroute) = real-time traceroute. Shows loss%, avg/best/worst RTT per hop. Updates every second. Most useful tool for diagnosing intermittent issues. Windows equivalent: WinMTR." },
  { cat: "תרחיש: אתר איטי", cat_en: "Scenario: Slow Website", snip: null, q: "אתר לוקח 8 שניות לטעון. curl -w \"%{time_namelookup} %{time_connect} %{time_total}\" מראה: 0.002 0.004 7.998. מה האיטיות?", q_en: "Website takes 8 seconds to load. curl -w \"%{time_namelookup} %{time_connect} %{time_total}\" shows: 0.002 0.004 7.998. Where is the slowness?", a: ["השרת עצמו — DNS (2ms) וTCP connect (4ms) מהירים, כל הזמן בשרת", "DNS — 2ms זה איטי מדי — לא הצעד הראשון", "TCP Handshake — 4ms זה חריג — אינו הגורם", "ISP — congestion בין הlקוח לשרת — אינו הכלי המתאים"], a_en: ["The server itself — DNS (2ms) and TCP connect (4ms) are fast, all time is in the server", "DNS — 2ms is too slow", "TCP Handshake — 4ms is abnormal", "ISP — congestion between client and server"], c: 0, e: "curl timing: time_namelookup=0.002s (DNS מהיר), time_connect=0.004s (TCP Handshake מהיר), time_total=7.998s (כמעט 8s בשרת). הבעיה: server-side — application code איטי, database query, או server overload.", e_en: "curl timing: time_namelookup=0.002s (DNS fast), time_connect=0.004s (TCP Handshake fast), time_total=7.998s (almost 8s in server). Problem: server-side — slow application code, database query, or server overload." },
  { cat: "תרחיש: Anycast בעיה", cat_en: "Scenario: Anycast Issue", snip: null, q: "מפתח בדבאי מדווח שping ל-1.1.1.1 = 180ms. בישראל אותו ping = 5ms. שניהם פונים ל-1.1.1.1. מה ההסבר?", q_en: "Developer in Dubai reports ping to 1.1.1.1 = 180ms. In Israel same ping = 5ms. Both query 1.1.1.1. What is the explanation?", a: ["Anycast routing מפנה כל user לשרת הקרוב — ישראל לFrankfurt, דובאי לשרת רחוק יותר", "שרת 1.1.1.1 בדובאי כבוי זמנית — לא הצעד הראשון", "ISP בדובאי מגביל מהירות ל-Cloudflare — אינו הגורם", "1.1.1.1 בדובאי מנותב דרך ישראל — אינו הכלי המתאים"], a_en: ["Anycast routing sends each user to nearest server — Israel to Frankfurt, Dubai to farther server", "The 1.1.1.1 server in Dubai is temporarily down", "Dubai ISP throttling speed to Cloudflare", "1.1.1.1 in Dubai is routed through Israel"], c: 0, e: "1.1.1.1 = Anycast. Cloudflare מריץ 250+ PoPs בעולם. BGP routing מפנה כל user לנקודת הקצה הקרובה. ישראל קרובה לFrankfurt PoP. דובאי — עלולה להגיע לPoP רחוק יותר, תלוי ב-peering agreements.", e_en: "1.1.1.1 = Anycast. Cloudflare runs 250+ PoPs worldwide. BGP routing sends each user to nearest edge. Israel close to Frankfurt PoP. Dubai may reach farther PoP depending on peering agreements." },
  ],
  2: [
  { cat: "Socket בסיס", cat_en: "Socket Basics", snip: null, q: "מה Socket ב-networking? מה שני המרכיבים שמגדירים אותו?", q_en: "What is a network Socket? What two components define it?", a: ["נקודת קצה של חיבור = IP:Port. IP מזהה את המחשב, Port מזהה את התוכנה", "פרוטוקול לשליחת נתונים בין מחשבים שמשתמש ב-MAC Address", "שם של תוכנה שמאזינה לחיבורים נכנסים על port מסוים", "קובץ ווירטואלי שמייצג חיבור רשת ב-file system של Linux"], a_en: ["Endpoint of a connection = IP:Port. IP identifies the machine, Port identifies the app", "Protocol for sending data between computers using MAC Address", "Name of a program listening for incoming connections on a specific port", "Virtual file representing a network connection in Linux file system"], c: 0, e: "Socket = IP:Port. כמו כתובת דירה מדויקת: IP = הבניין, Port = מספר הדירה. תוכנה \"מאזינה\" על port מסוים וכל connection אליו = socket ייחודי.", e_en: "Socket = IP:Port. Like a precise apartment address: IP = the building, Port = apartment number. A program \"listens\" on a specific port, each connection to it = unique socket." },
  { cat: "כתובת Socket", cat_en: "Socket Address", snip: null, q: "מה שני המרכיבים של כתובת Socket? מה תפקיד כל אחד?", q_en: "What is the difference between bind() and connect()?", a: ["IP = מזהה את הרכיב (מחשב/שרת).", "IP = פורט, Port = כתובת", "IP = שם הדומיין, Port = הפרוטוקול", "IP ו-Port זהים, רק שמות שונים"], a_en: ["bind() = Server — attaches to a port to listen.", "bind() = send data, connect() = receive data.", "They are the same function with different names.", "bind() = UDP, connect() = TCP."], c: 0, e: "", e_en: "Server: bind(('', 9001)) — listen() — accept(). Client: connect(('server_ip', 9001)). bind() tells OS which port to use. connect() initiates TCP handshake." },
  { cat: "סדר פונקציות — לקוח", cat_en: "Function Order — Client", snip: null, q: "מה הסדר הנכון של קריאות ה-API בצד הלקוח?", q_en: "Why doesn't recv() always return all the data?", a: ["socket() — connect() — send() — recv() — close()", "socket() — bind() — listen() — accept() — close()", "socket() — listen() — connect() — recv() — close()", "bind() — socket() — connect() — close()"], a_en: ["TCP is a stream — data can arrive in fragments.", "recv() only reads 1 byte at a time.", "UDP is unreliable so some data is lost.", "The buffer size is always exactly 1024."], c: 0, e: "", e_en: "TCP stream: data may arrive in multiple recv() calls. To receive a complete message: use a length prefix, or read until a delimiter (e.g. \\n), or use Content-Length header." },
  { cat: "סדר פונקציות — שרת", cat_en: "Function Order — Server", snip: null, q: "מה הסדר הנכון של קריאות ה-API בצד השרת?", q_en: "What does recv() return when the other side closes the connection?", a: ["socket() — bind() — listen() — accept() — recv() — send() — close()", "socket() — connect() — recv() — send() — close()", "bind() — listen() — socket() — accept() בדרך כלל בסביבת production.", "socket() — accept() — bind() — listen() בהתאם לפרוטוקול."], a_en: ["Returns b'' (empty bytes)", "Raises ConnectionError exception.", "Returns None. typically in production environments.", "Blocks forever waiting for data."], c: 0, e: "", e_en: "if data == b'': the other side closed. Must handle: close the socket and remove from list. Not checking this causes infinite loop (select keeps returning the closed socket as readable)." },
  { cat: "accept() — blocking", cat_en: "accept() — blocking", snip: null, q: "מה accept() עושה? למה היא blocking?", q_en: "What is SO_REUSEADDR used for?", a: ["מחכה עד שלקוח מתחבר (blocking", "accept() = שולחת בקשת חיבור לשרת", "accept() = בודקת אם הפורט פנוי", "accept() = מחזירה מיד None אם אין לקוח"], a_en: ["Allows reusing a port immediately after a server restarts", "Increases the receive buffer size.", "Allows multiple processes to use the same socket.", "Enables UDP broadcast."], c: 0, e: "", e_en: "Without SO_REUSEADDR: after server restart — 'Address already in use' error because the port is in TIME_WAIT state. Add before bind(): s.setsockopt(SOL_SOCKET, SO_REUSEADDR, 1)" },
  { cat: "recv() — blocking", cat_en: "recv() — blocking", snip: null, q: "מה recv() עושה? מה מחרוזת ריקה מציינת?", q_en: "What is the difference between blocking and non-blocking socket?", a: ["recv() = blocking, מחכה למידע.", "recv() מחזירה None כשאין מידע", "data==\"\" = הלקוח שלח הודעה ריקה בכוונה", "recv() = non-blocking, מחזירה מיד"], a_en: ["Blocking: recv/accept pause the program until data arrives.", "Blocking is faster. Non-blocking is slower.", "Blocking = TCP. Non-blocking = UDP.", "No difference in practice."], c: 0, e: "", e_en: "Blocking (default): recv() freezes until data arrives. Non-blocking: raises BlockingIOError if no data. select() solution: check multiple sockets without blocking any one." },
