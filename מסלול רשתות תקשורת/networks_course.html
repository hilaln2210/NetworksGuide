  { cat: "Troubleshooting", cat_en: "Troubleshooting L2", snip: null, q: "מנהל מערכת מזהה Broadcast Storm ברשת — כל Switch ב-CPU 100%. מה סדר הפעולות?", q_en: "Sysadmin identifies Broadcast Storm — all switches at CPU 100%. What is the action order?", a: ["1) נתק switch/כבל חשוד 2) בדוק STP status 3) זהה loop פיזי 4) הפעל STP אם מכובה", "1) Restart כל ה-Switches 2) עדכן Firmware 3) הגדר VLAN חדש 4) פנה לספק", "1) שנה כל MAC Addresses 2) נקה ARP Cache 3) Restart Servers 4) הפעל DHCP", "1) פנה ל-ISP 2) בדוק חיבור אינטרנט 3) Restart Router 4) חכה לייצוב"], a_en: ["1) Disconnect suspected switch/cable 2) Check STP status 3) Identify physical loop 4) Enable STP if disabled", "1) Restart all Switches 2) Update Firmware 3) Configure new VLAN 4) Contact vendor", "1) Change all MAC Addresses 2) Clear ARP Cache 3) Restart Servers 4) Enable DHCP", "1) Contact ISP 2) Check internet 3) Restart Router 4) Wait for stabilization"], c: 0, e: "Broadcast Storm = loop פיזי או STP מכובה. Disconnect switch שנוסף לאחרונה. show spanning-tree (Cisco) / bridge -d (Linux). הפעל RSTP.", e_en: "Broadcast Storm = physical loop or STP disabled. Disconnect recently added switch. show spanning-tree (Cisco) / bridge -d (Linux). Enable RSTP." },
  ],
  9: [
  { cat: "רכיב נכון", cat_en: "Correct Component", snip: null, q: "איזה רכיב מבדיל בין בקשת מייל לבקשת HTTP על אותו שרת? באיזה שכבה?", q_en: "What is a Hub and how does it work?", a: ["Layer 4 (Transport) — פורטים! פורט 25=SMTP, פורט 80=HTTP.", "Switch — מסיכה MAC ייחודי לכל שירות", "Router — טבלת ניתוב נפרדת לכל שירות", "Hub — כל שירות מגיע לפורט אחר בהתאם לפרוטוקול."], a_en: ["Layer 1 device — copies incoming frame to ALL ports except source.", "A smart switch that filters by MAC. as defined in the standard.", "A Layer 3 device that routes packets. typically in production environments.", "A device that connects different networks."], c: 0, e: "ההבחנה בין שירותים על אותה IP = פורטים = Layer 4. Hub/Switch/Router = Layer 1/2/3. הם לא מבדילים בין שירותים על אותה כתובת IP. זה בדיוק התפקיד של Layer 4.", e_en: "Hub = dumb repeater. Every frame sent to every port. Security risk: Wireshark on any device sees all traffic. Performance: collision domain shared — only one device can transmit at a time (CSMA/CD)." },
  { cat: "Hub", cat_en: "Hub", snip: null, q: "A שולח מסגרת מיועדת ל-B. מה מקבלים B, C, D בפועל?", q_en: "What is a Switch and how does it differ from a Hub?", a: ["כולם מקבלים: B, C, D. כרטיס C ו-D מזהה", "רק B מקבל — Hub חכם מספיק", "רק B ו-C — Hub שולח לשניים הקרובים", "Hub לא שולח כלום, רק מחכה לאישור"], a_en: ["Layer 2 device — learns MAC addresses and forwards frames only to the correct port.", "Layer 1 device like Hub but with more ports.", "Layer 3 device that routes IP packets.", "A wireless access point."], c: 0, e: "Hub = Layer 1. לא מכיר MAC. כל מסגרת — Flood לכל הפורטים חוץ ממקור. B, C, D מקבלים. C ו-D קוראים Dst MAC, מזהים שלא מיועד אליהם — זורקים. B מעביר למעלה לעיבוד.", e_en: "Switch builds MAC table by learning source MAC from each arriving frame. If destination MAC known — unicast to correct port. If unknown — flood (like hub). Hub: always floods." },
  { cat: "Switch — למידה", cat_en: "Switch — Learning", snip: null, q: "Switch חדש, A שולח ל-B (MAC של B לא בטבלה). מה Switch עושה? מה הוא לומד?", q_en: "What is MAC Table Flooding and why does a new switch do it?", a: ["Flooding לכל הפורטים חוץ ממקור.", "זורק כי לא מכיר B כך מוגדר בתקן.", "שולח רק ל-Port_B כי מנחש", "שולח ARP לגילוי B בהתאם לפרוטוקול."], a_en: ["When destination MAC is unknown, switch sends frame to all ports (flood).", "A security attack that overflows the MAC table.", "A method to synchronize MAC tables between switches.", "Normal behavior when network is idle. according to the protocol."], c: 0, e: "Switch חדש = Flooding (כמו Hub) עבור כתובת לא מוכרת. אבל: Switch לומד מ-src! כל מסגרת נכנסת — Switch שומר src_MAC — Port. אחרי ש-B שולח — Switch ילמד גם את B. מעתה — Unicast.", e_en: "Switch learning: frame arrives from PC-A — record 'A's MAC — Port 3'. Send to unknown dst — flood all. After learning: unicast only. MAC entries expire (typically 300s TTL) and are relearned." },
  { cat: "Switch — טבלה", cat_en: "Switch — Table", snip: null, q: "B שולח מסגרת ל-A. C שולח מסגרת ל-A. מה שונה בין שתי הפעולות?", q_en: "What is a Router and why is it Layer 3?", a: ["B→A: Unicast לPort 1 בלבד.", "שניהם Flooding", "שניהם Unicast", "B→A: Flooding. C→A: Unicast"], a_en: ["Routes packets between different networks using IP addresses and routing table.", "Connects devices within the same network.", "Amplifies network signals.", "Assigns IP addresses to devices."], c: 0, e: "מה Switch בודק: (1) dst_MAC בטבלה? A — Port 1 ✓ — שולח רק ל-Port 1 בשניהם. (2) לומד src: B→Port 3 כבר ידוע. C→Port כלשהו ← Switch לומד עכשיו. ה-dst ידוע בשני המקרים — Unicast לPort 1.", e_en: "Router: reads IP dst — looks up routing table — forwards to next hop. Replaces Ethernet frame (new src+dst MAC) at each hop. Separates broadcast domains (unlike switches)." },
  { cat: "Switch — Broadcast", cat_en: "Switch — Broadcast", snip: null, q: "A שולח Broadcast (FF:FF:FF:FF:FF:FF). Switch מכיר את כל המחשבים. מה קורה?", q_en: "What is the difference between a Collision Domain and a Broadcast Domain?", a: ["Switch שולח לכל הפורטים חוץ ממקור", "Switch מזהה Broadcast ולא מעביר", "Switch שולח רק למחשב שביקש", "Switch שולח לפי Routing Table"], a_en: ["Collision domain: area where frame collisions can occur (Hub=1", "They are the same concept.", "Broadcast domain is larger than collision domain.", "Routers extend both domains."], c: 0, e: "גם ב-Switch מתוחכם: FF:FF:FF:FF:FF:FF = Broadcast — Flood לכל הפורטים חוץ ממקור. זה חיוני! ARP request שולח Broadcast כך שכולם ישמעו. Switch לא יכול לסנן Broadcast.", e_en: "Hub: one collision domain (shared), one broadcast domain. Switch: collision domain per port (no collisions), one broadcast domain. Router: separates BOTH. VLAN also separates broadcast domains." },
  { cat: "Router", cat_en: "Router", snip: null, q: "למה A לא יכול לשלוח ל-B ישירות ב-Layer 2? מה תפקיד ה-Router כאן?", q_en: "What is MAC Address Spoofing?", a: ["A ו-B ב-Subnets שונים", "Router צריך כי A לא יודע MAC של B", "Router הכרחי כי B נמצא בשרת", "A לא יכול לשלוח בלי ARP"], a_en: ["Changing a device's MAC address in software to impersonate another", "A hardware failure in the NIC.", "Automatically assigning MAC addresses.", "Encrypting MAC addresses."], c: 0, e: "ARP = Layer 2 — לא עובר בין Subnets. A רואה ש-20.0.0.5 לא ב-Subnet שלו — שולח ל-Default Gateway (Router). Router מקבל, בודק Routing Table, שולח לרשת 20.0.0.0/24 — B.", e_en: "Linux: ip link set eth0 address 00:11:22:33:44:55. Uses: bypass MAC filtering, privacy (randomize MAC on WiFi), test ARP. Detection: monitor ARP table for MAC changes on same IP." },
  { cat: "ARP + Router", cat_en: "ARP + Router", snip: null, q: "A שולח ARP — לאיזה IP? ומדוע לא לGoogleישירות?", q_en: "What is the difference between Half-Duplex and Full-Duplex?", a: ["ARP ל-Default Gateway של A (הנתב הביתי).", "ARP ל-Google ישירות כך מוגדר בתקן.", "ARP ל-DNS Server בדרך כלל בסביבת production.", "לא שולח ARP בכלל בהתאם לפרוטוקול."], a_en: ["Half-Duplex: one direction at a time (like walkie-talkie) — WiFi,", "Half-Duplex is faster. as defined in the standard.", "Full-Duplex requires special cables. typically in production environments.", "WiFi supports Full-Duplex. according to the protocol."], c: 0, e: "כלל ברזל: ARP = Layer 2 בלבד — Routers לא מעבירים ARP. A בודק: 142.250.74.4 ב-Subnet 10.0.0.0/8? לא! — שולח ARP ל-Default Gateway. אחרי שמקבל MAC של Router — שולח חבילה. Router יטפל בהמשך.", e_en: "Hub/WiFi = Half-Duplex (CSMA/CD for hub, CSMA/CA for WiFi). Switch port = Full-Duplex (no collisions, wire can carry in both directions simultaneously). Full-Duplex doubles effective bandwidth." },
  { cat: "שכבות", cat_en: "Layers", snip: null, q: "התאם שכבה לרכיב. מה כל שכבה אומרת על יכולות הרכיב?", q_en: "What is SPAN/Port Mirroring on a Switch?", a: ["Hub=L1 (לא מכיר כתובות).", "Hub=L2, Switch=L1, Router=L3", "Hub=L1, Switch=L3, Router=L2", "כולם Layer 2 אבל שמות שונים"], a_en: ["Copies traffic from one port (or VLAN) to another port where Wireshark is connected.", "A protocol for switch synchronization.", "A method to increase switch performance.", "A backup mechanism for switch configuration."], c: 0, e: "Layer 1 (פיזי) = Hub: רק זרם חשמלי, ללא כתובות. Layer 2 (קו) = Switch: מכיר MAC, מבין Ethernet frames. Layer 3 (רשת) = Router: מכיר IP, Subnet Masks, מנתב בין רשתות. גבוה יותר = יותר הקשר + יותר עיבוד.", e_en: "Problem: Switch sends you only your traffic. Solution: SPAN (Switched Port Analyzer) = configure switch to mirror port X traffic to port Y (where your Wireshark laptop is connected)." },
  { cat: "Switch vs Hub — פרטיות", cat_en: "Switch vs Hub — Privacy", snip: null, q: "Wireshark מופעל על 'מישהו רע' המחובר ל-Hub, ועל אחד אחר המחובר ל-Switch. מה כל אחד רואה?", q_en: "What is CAM Table Overflow attack?", a: ["Hub: רואה כל תעבורת הרשת! Switch: רואה רק מה שמיועד אליו (+", "Hub: רואה רק שלו. Switch: רואה הכל כך מוגדר בתקן.", "שניהם רואים הכל בגלל Promiscuous Mode", "שניהם רואים רק שלהם בהתאם לפרוטוקול."], a_en: ["Attacker floods switch with random src MACs — fills MAC table — switch", "A physical attack on the switch hardware. as defined in the standard.", "Overloading the switch CPU. typically in production environments.", "A wireless interference attack. according to the protocol."], c: 0, e: "Hub = Flood לכולם — Wireshark ב-Promiscuous Mode רואה כל מסגרת של כולם! בעיית אבטחה ענקית. Switch = כל מסגרת הולכת רק ליעד — Wireshark רואה רק מה שמיועד לאותו מחשב. לכן Hub כמעט לא קיים היום.", e_en: "CAM (Content Addressable Memory) = MAC table storage. Attack tool: macof (sends ~155K frames/sec with random MACs). Defense: Port Security (limit MACs per port)." },
  { cat: "Router — Routing Table", cat_en: "Router — Routing Table", snip: null, q: "חבילה עם dst=192.168.0.55 — לאן? חבילה עם dst=8.8.8.8 — לאן?", q_en: "What is a Layer 3 Switch?", a: ["192.168.0.55 — LAN Port (שורה 2 מתאימה).", "192.168.0.55 — ISP. 8.8.8.8 — LAN", "שניהם — VPN tunnel בדרך כלל בסביבת production.", "שניהם — Default Route בהתאם לפרוטוקול."], a_en: ["A switch that also does IP routing between VLANs at hardware speed.", "A faster version of a normal switch. as defined in the standard.", "A switch that works at Layer 3 without routing.", "A router with more Ethernet ports. according to the protocol."], c: 0, e: "Router בודק מלמטה למעלה (ספציפי — כללי). 192.168.0.55: בודק 192.168.0.0/24 — Network ID 192.168.0 ✓ — LAN Port. 8.8.8.8: לא מתאים ל-192.168.0.0 ולא ל-10.0.0.0 — Default 0.0.0.0/0 — ISP.", e_en: "L3 Switch: wire-speed routing between VLANs (ASIC hardware). Traditional router: slower (CPU-based). L3 Switch used inside data centers for inter-VLAN routing. External routing still needs router." },
  { cat: "שאלת אתגר — שכבות", cat_en: "Challenge — Layers", snip: null, q: "Router מקבל את הפקטה. מה הוא משנה לפני שמעביר לB?", q_en: "What is a Switch's MAC Table (CAM Table)?", a: ["Layer 2: בונה Ethernet frame חדש עם", "מחליף גם src IP ל-IP שלו (כמו NAT)", "לא משנה כלום, מעביר as-is", "מחליף רק dst MAC, src MAC נשאר של A"], a_en: ["Table mapping MAC addresses to switch ports.", "A list of IP addresses on the network.", "Router's routing table.", "A list of VLANs configured on the switch."], c: 0, e: "עיקרון מרכזי: IP src/dst = נקודות קצה = לא משתנות (אלא אם NAT). Ethernet src/dst = hop נוכחי = מתחלפות בכל Router. Router מוריד Ethernet frame ישן, בונה חדש: src=MAC כרטיס הנתב לרשת B, dst=MAC_B.", e_en: "MAC Table entry: MAC_address — Port — TTL. Show on Cisco: 'show mac address-table'. Entries age out (default 300s). Full table — flooding (treat as unknown). Max size varies (4K-128K entries)." },
  { cat: "Switch — Collision Domain", cat_en: "Switch — Collision Domain", snip: null, q: "Switch פותר התנגשויות, Hub לא. מדוע Switch מונע התנגשויות?", q_en: "What is Broadcast Storm and how is it caused?", a: ["כל פורט ב-Switch = Collision Domain נפרד.", "Switch מחכה שהקו פנוי לפני שליחה", "Switch מצפין את המידע בדרך כלל בסביבת production.", "Switch יש TTL שמונע לולאות"], a_en: ["Broadcast frames loop endlessly between switches in a network loop", "A DDoS attack from outside. as defined in the standard.", "Too many DHCP requests simultaneously. typically in production environments.", "WiFi interference causing retransmissions."], c: 0, e: "Hub = ערוץ משותף אחד = אם A ו-B שולחים יחד — התנגשות. Switch = כל פורט עצמאי. A שולח ל-Switch, B שולח ל-Switch = אין התנגשות בין A ל-B. Switch מחזיק את המסגרות בזיכרון ושולח בתור.", e_en: "Without STP: Switch A sends broadcast — Switch B floods — Switch A floods — loop. Frames multiply exponentially. Solution: STP blocks one link. BPDUs detect loops." },
  { cat: "ה-Router הביתי", cat_en: "Home Router", snip: null, q: "מה ה-Router הביתי שלך עושה שRouter 'טהור' לא עושה?", q_en: "What is the difference between Access Port and Trunk Port on a Switch?", a: ["כל הנ\"ל: הראוטר הביתי = Router + Switch + WAP + DHCP + NAT +", "Router טהור עושה הכל, ביתי רק Switch", "ביתי יותר מהיר מ-Router ארגוני בדרך כלל בסביבת production.", "ביתי פחות מאובטח כי Layer 2 בלבד בהתאם לפרוטוקול."], a_en: ["Access Port: connects to end device, carries one VLAN (untagged).", "Access Port is faster than Trunk Port. as defined in the standard.", "Trunk Port is only for internet connectivity.", "No difference in modern switches. according to the protocol."], c: 0, e: "Router 'ביתי' = שם שגוי! זה multi-function device: Switch (ב-LAN Ports), Router (L3 routing + NAT), DHCP (מחלק IP), WiFi AP, Firewall (מגן), DNS Relay. Router ארגוני 'טהור' בדרך כלל עושה רק routing.", e_en: "Access port: PC connects here, sees only its VLAN, no VLAN tag. Trunk port (802.1Q): each frame tagged with 4-byte VLAN ID. Native VLAN = untagged traffic on trunk." },
  { cat: "Switch — סיכום", cat_en: "Switch — Summary", snip: null, q: "C שולח Broadcast. Switch מכיר את כולם. מה הוא עושה?", q_en: "What is ARP Poisoning and how does it work?", a: ["שולח לכולם (A ב-Port1, B ב-Port3) חוץ מ-C עצמו (Port7).", "שולח רק ל-Port 1 כי זה הקרוב כך מוגדר בתקן.", "לא מעביר כי Broadcast לא בטבלה בדרך כלל בסביבת production.", "זורק — אין MAC של ff:ff:ff:ff:ff:ff בטבלה"], a_en: ["Attacker sends unsolicited ARP Replies claiming their MAC for a", "A physical attack on network equipment.", "Overflowing the ARP table. typically in production environments.", "A DNS-based attack. according to the protocol."], c: 0, e: "Broadcast = FF:FF:FF:FF:FF:FF — תמיד Flood לכל הפורטים חוץ ממקור, גם כש-MAC Table מלאה. Switch לא שומר Broadcast בטבלה — כי Broadcast מיועד לכולם תמיד. C (Port7) לא מקבל חזרה.", e_en: "Gratuitous ARP: unsolicited ARP reply. Arpspoof tool sends continuous gratuitous ARPs. Defense: Dynamic ARP Inspection (DAI) validates ARP against DHCP snooping database." },
  { cat: "השוואה סופית", cat_en: "Final Comparison", snip: null, q: "מה ההבדל הבסיסי ביותר בין Hub, Switch, Router — בשתי מילים לכל אחד?", q_en: "What happens when a Switch receives a frame with destination ff:ff:ff:ff:ff:ff?", a: ["Hub=Flood-All, Switch=Learn-MAC, Router=Route-IP", "Hub=Layer2, Switch=Layer3, Router=Layer4", "Hub=Wired, Switch=Wireless, Router=Internet", "Hub=Fast, Switch=Secure, Router=Smart"], a_en: ["Floods the frame out ALL ports except the incoming port", "Drops the frame as invalid.", "Sends only to the router.", "Sends to a designated broadcast server."], c: 0, e: "ה-3 רכיבים בתמצית: Hub = שולח הכל לכולם (Layer 1, אין חכמה). Switch = לומד MAC ושולח רק ליעד (Layer 2). Router = מנתב בין רשתות לפי IP (Layer 3, Routing Table, NAT). זה הסיכום של פרק 9.", e_en: "ff:ff:ff:ff:ff:ff = Ethernet broadcast. Switch always floods broadcasts (never cached in MAC table). ARP Requests and DHCP Discover use this. Broadcasts don't cross routers (separate broadcast domain)." },
  ],
  10: [
  { cat: "Physical Layer", cat_en: "Physical Layer", snip: null, q: "מה מטרת השכבה הפיזית?", q_en: "What is the purpose of the Physical Layer?", a: ["להעביר ביטים בין שני רכיבים על תווך פיזי — כבל, אוויר, סיב אופטי", "לארגן packets ולנתב אותם לפי IP Address — אינו הגורם", "לנהל sessions בין clients ל-servers — לא הפתרון", "להצפין נתונים לפני שידור — שגוי"], a_en: ["To transmit bits between two devices over physical medium — cable, air, fiber", "To organize packets and route them by IP Address", "To manage sessions between clients and servers", "To encrypt data before transmission"], c: 0, e: "שכבה 1 = העברת ביט אחד. היא לא מבינה frames, packets, או sessions. מניחה שאמצעי ההעברה קיים — ובודקת רק שהביטים עוברים.", e_en: "Layer 1 = transmitting one bit. Does not understand frames, packets, or sessions. Assumes transmission medium exists — only checks bits pass." },
  { cat: "Modulation", cat_en: "Modulation", snip: null, q: "מה ההבדל בין AM ל-FM מבחינת עמידות ל-noise?", q_en: "What is the difference between AM and FM in noise resistance?", a: ["FM עמיד הרבה יותר ל-noise כי שינוי תדר קשה לזיוף. AM רגיש כי noise משנה אמפליטודה", "AM עמיד יותר כי אמפליטודה קשה לשינוי — אינו הגורם", "שניהם שווים בעמידות ל-noise — לא הפתרון", "רק QAM עמיד ל-noise — AM ו-FM לא — שגוי"], a_en: ["FM much more noise-resistant because frequency change is hard to fake. AM sensitive because noise changes amplitude", "AM more resistant because amplitude hard to change", "Both equal in noise resistance", "Only QAM is noise-resistant — AM and FM are not"], c: 0, e: "Noise = שינוי מקרי באמפליטודה. AM מסתמך על אמפליטודה → noise שוחק אותה. FM מסתמך על תדר → noise לא משנה תדר בקלות. לכן רדיו FM נשמע טוב יותר.", e_en: "Noise = random amplitude change. AM relies on amplitude → noise corrupts it. FM relies on frequency → noise does not easily change frequency. Hence FM radio sounds better." },
  { cat: "Fiber Optic", cat_en: "Fiber Optic", snip: null, q: "מה ההבדל בין Single-Mode ל-Multi-Mode Fiber?", q_en: "What is the difference between Single-Mode and Multi-Mode Fiber?", a: ["Single-Mode: ליבה דקה 9μm, laser, 80+ ק\"מ. Multi-Mode: ליבה 50μm, LED, 550m בלבד", "Single-Mode: מהיר יותר לmulticast. Multi-Mode: מהיר לunicast", "Single-Mode: IPv4. Multi-Mode: IPv6 — לא הפתרון", "Single-Mode: לחוץ לבניין. Multi-Mode: לבניין בלבד — שגוי"], a_en: ["Single-Mode: thin core 9μm, laser, 80+ km. Multi-Mode: core 50μm, LED, 550m only", "Single-Mode: faster for multicast. Multi-Mode: faster for unicast", "Single-Mode: IPv4. Multi-Mode: IPv6", "Single-Mode: outdoors. Multi-Mode: indoors only"], c: 0, e: "Single-Mode: ליבה 9μm → רק mode אחד של אור → פחות dispersion → 80+ ק\"מ. Multi-Mode: 50μm → modes מרובים → dispersion גבוה → 550m.", e_en: "Single-Mode: 9μm core → only one light mode → less dispersion → 80+ km. Multi-Mode: 50μm → multiple modes → high dispersion → 550m." },
  { cat: "WiFi", cat_en: "WiFi Standards", snip: null, q: "מה OFDMA ב-WiFi 6 ולמה זה שיפור?", q_en: "What is OFDMA in WiFi 6 and why is it an improvement?", a: ["WiFi 6 מפצל channel ל-sub-channels ושולח לעשרות משתמשים בו-זמנית. WiFi 5 שלח לאחד בכל פעם", "OFDMA = אנטנות חיצוניות מרובות שמגדילות טווח — אינו הגורם", "OFDMA = שיטת הצפנה חדשה שמחליפה WPA2 — לא הפתרון", "OFDMA = Protocol לשיתוף קובץ אלחוטי — שגוי"], a_en: ["WiFi 6 splits channel into sub-channels sending to dozens simultaneously. WiFi 5 sent to one at a time", "OFDMA = multiple external antennas that increase range", "OFDMA = new encryption method replacing WPA2", "OFDMA = protocol for wireless file sharing"], c: 0, e: "OFDMA: AP מפצל 80MHz channel ל-Resource Units קטנים. כל RU הולך ללקוח אחר בו-זמנית. תוצאה: throughput כפול בסביבות צפופות.", e_en: "OFDMA: AP splits 80MHz channel into small Resource Units. Each RU goes to different client simultaneously. Result: doubled throughput in dense environments." },
  { cat: "WiFi", cat_en: "WiFi Half Duplex", snip: null, q: "מדוע WiFi הוא Half Duplex?", q_en: "Why is WiFi Half Duplex?", a: ["אוויר הוא תווך משותף — אי אפשר לשדר ולקלוט בו-זמנית על אותה תדר", "Ethernet הוא Full Duplex אבל WiFi תומך רק ב-IPv4", "WiFi chips אינם חזקים מספיק לשדר ולקלוט", "Half Duplex הוא תקן WiFi 4 בלבד — WiFi 6 הוא Full Duplex"], a_en: ["Air is shared medium — cannot transmit and receive simultaneously on same frequency", "Ethernet is Full Duplex but WiFi only supports IPv4", "WiFi chips not powerful enough to transmit and receive", "Half Duplex is WiFi 4 standard only — WiFi 6 is Full Duplex"], c: 0, e: "CSMA/CA: לפני שידור — \"בדוק שהאוויר פנוי\". אם מישהו אחר שידר — חכה. 10 מכשירים על AP אחד = חולקים bandwidth בתורות.", e_en: "CSMA/CA: before transmitting — \"check air is clear\". If someone else transmitted — wait. 10 devices on one AP = share bandwidth in turns." },
  { cat: "Fiber Optic", cat_en: "Fiber EMI", snip: null, q: "מה יתרון גדול של סיב אופטי על פני כבל נחושת בסביבת מפעל?", q_en: "What is a major advantage of fiber optic over copper cable in a factory environment?", a: ["סיב אופטי חסין לשדות אלקטרומגנטיים (EMI) שמנועים ומכונות יוצרים", "סיב אופטי זול יותר מנחושת בנפחים גדולים — אינו הגורם", "סיב אופטי תומך ב-Power over Ethernet — לא הפתרון", "סיב אופטי מהיר יותר רק בטמפרטורות גבוהות"], a_en: ["Fiber optic immune to electromagnetic interference (EMI) from motors and machinery", "Fiber optic cheaper than copper in large volumes", "Fiber optic supports Power over Ethernet", "Fiber optic faster only at high temperatures"], c: 0, e: "נחושת מושפעת מ-EMI → bit errors → retransmissions → ביצועים גרועים. סיב אופטי = אור, לא חשמל → חסין לחלוטין ל-EMI.", e_en: "Copper affected by EMI → bit errors → retransmissions → poor performance. Fiber = light, not electricity → completely immune to EMI." },
  { cat: "CAT Cable", cat_en: "Ethernet Cable", snip: null, q: "מה המרחק המקסימלי של Ethernet על CAT5e/CAT6 ומה קורה אחריו?", q_en: "What is max distance of Ethernet on CAT5e/CAT6 and what happens after?", a: ["100 מטר — אחריו signal נחלש (attenuation) ויש bit errors. פתרון: Switch נוסף או Fiber", "500 מטר — אחריו צריך Repeater — אינו הגורם", "1000 מטר — תקן Gigabit Ethernet — לא הפתרון", "אין הגבלת מרחק — תלוי בSwitches — שגוי"], a_en: ["100 meters — after that signal weakens (attenuation) causing bit errors. Fix: additional Switch or Fiber", "500 meters — after that need Repeater", "1000 meters — Gigabit Ethernet standard", "No distance limit — depends on switches"], c: 0, e: "100m = IEEE 802.3 limit. Signal מתחלש exponentially. Switch מגביר ומחדש signal. למרחקים ארוכים — Single-Mode Fiber עד 80 ק\"מ.", e_en: "100m = IEEE 802.3 limit. Signal weakens exponentially. Switch regenerates signal. For long distances — Single-Mode Fiber up to 80 km." },
  { cat: "ethtool", cat_en: "ethtool", snip: null, q: "מה הפקודה לבדיקת מהירות וDuplex של כרטיס רשת בLinux?", q_en: "What command checks NIC speed and Duplex on Linux?", a: ["ethtool eth0", "ip addr show eth0", "ifconfig eth0 speed", "ss -i eth0"], a_en: ["ethtool eth0", "ip addr show eth0", "ifconfig eth0 speed", "ss -i eth0"], c: 0, e: "ethtool eth0: מציג Speed (100Mb/s, 1000Mb/s, 10Gb/s), Duplex (Half/Full), Autoneg, Link. חלק מpackage ethtool.", e_en: "ethtool eth0: shows Speed (100Mb/s, 1000Mb/s, 10Gb/s), Duplex (Half/Full), Autoneg, Link. Part of ethtool package." },
  { cat: "5G", cat_en: "5G vs WiFi", snip: null, q: "מה ההבדל העיקרי בין 5G ל-WiFi 6 מבחינת שימוש?", q_en: "What is the main difference between 5G and WiFi 6 in terms of use?", a: ["5G = wide-area (ק\"מ), מנוהל ע\"י operator. WiFi 6 = local (עשרות מטרים), מנוהל ע\"י בעל הרשת", "5G = ביתי בלבד. WiFi 6 = ארגוני בלבד — אינו הגורם", "5G = IPv4. WiFi 6 = IPv6 בלבד — לא הפתרון", "5G = מהיר יותר תמיד. WiFi 6 = אמין יותר תמיד — שגוי"], a_en: ["5G = wide-area (km range), managed by operator. WiFi 6 = local (tens of meters), managed by network owner", "5G = home only. WiFi 6 = enterprise only", "5G = IPv4. WiFi 6 = IPv6 only", "5G = always faster. WiFi 6 = always more reliable"], c: 0, e: "5G Sub-6GHz: ק\"מ, מנוי, handover בין towers. WiFi 6: בניין/קמפוס, AP נייד, אין handover. ב-2025: Private 5G בנמלים/מפעלים.", e_en: "5G Sub-6GHz: km range, subscription, handover between towers. WiFi 6: building/campus, fixed AP, no handover. In 2025: Private 5G in ports/factories." },
  { cat: "Bits", cat_en: "Bandwidth Calculation", snip: null, q: "קישור 100 Mbps. כמה זמן להוריד קובץ 100 MB?", q_en: "100 Mbps link. How long to download a 100 MB file?", a: ["8 שניות — 100 MB = 800 Mbit. 800 Mbit ÷ 100 Mbps = 8 שניות", "1 שנייה — 100 MB ÷ 100 Mbps = 1 — אינו הגורם", "100 שניות — MB לMbps = ×100 — לא הפתרון", "10 שניות — overhead מוסיף 10% — שגוי"], a_en: ["8 seconds — 100 MB = 800 Mbit. 800 Mbit ÷ 100 Mbps = 8 seconds", "1 second — 100 MB ÷ 100 Mbps = 1", "100 seconds — MB to Mbps = ×100", "10 seconds — overhead adds 10%"], c: 0, e: "1 Byte = 8 bits. 100 MB = 100 × 8 = 800 Mbit. 800 Mbit ÷ 100 Mbps = 8 שניות. תמיד המר bytes ל-bits לפני חישוב.", e_en: "1 Byte = 8 bits. 100 MB = 100 × 8 = 800 Mbit. 800 Mbit ÷ 100 Mbps = 8 seconds. Always convert bytes to bits before calculating." },
  { cat: "WiFi", cat_en: "WiFi Frequency", snip: null, q: "מתי עדיף להשתמש ב-2.4GHz על פני 5GHz?", q_en: "When is 2.4GHz preferable over 5GHz?", a: ["כשצריך טווח גדול יותר ו/או חדירה דרך קירות — 2.4GHz חודר טוב יותר", "כשצריך מהירות גבוהה יותר — 2.4GHz מהיר יותר", "בסביבות צפופות — 2.4GHz פחות עמוס — לא הפתרון", "2.4GHz תמיד עדיף — 5GHz מיושן — שגוי"], a_en: ["When needing greater range and/or penetration through walls — 2.4GHz penetrates better", "When needing higher speed — 2.4GHz is faster", "In dense environments — 2.4GHz less congested", "2.4GHz always better — 5GHz is outdated"], c: 0, e: "2.4GHz: גלים ארוכים → חדירה טובה, טווח עד 70m. 5GHz: גלים קצרים → מהיר יותר (פחות interference), טווח עד 35m. 5GHz עמוס פחות כי יש channels יותר.", e_en: "2.4GHz: longer waves → good penetration, up to 70m range. 5GHz: shorter waves → faster (less interference), up to 35m. 5GHz less congested as more channels." },
  { cat: "Physical", cat_en: "Physical Troubleshoot", snip: null, q: "מנהל מערכת מזהה ש-interface eth0 ב-Linux עומד ב-100Mbps Half Duplex בעוד Switch מוגדר ל-1Gbps Full. מה הבעיה?", q_en: "Sysadmin finds eth0 at 100Mbps Half Duplex while Switch configured 1Gbps Full. What is the problem?", a: ["Duplex Mismatch — Auto-negotiation כשל. אחד קבוע, השני AUTO. פתרון: הגדר שניהם ל-AUTO", "כרטיס הרשת לא תומך ב-Gigabit — אינו הגורם", "Switch firmware מיושן — לא הפתרון", "כבל CAT5 לא מתאים ל-Gigabit — שגוי"], a_en: ["Duplex Mismatch — Auto-negotiation failed. One is fixed, other is AUTO. Fix: set both to AUTO", "Network card does not support Gigabit", "Switch firmware is outdated", "CAT5 cable not suitable for Gigabit"], c: 0, e: "Duplex Mismatch: Half+Full = late collisions, retransmissions, throughput ירוד. תיקון: ethtool -s eth0 autoneg on, ו-Switch port ל-auto.", e_en: "Duplex Mismatch: Half+Full = late collisions, retransmissions, reduced throughput. Fix: ethtool -s eth0 autoneg on, and Switch port to auto." },
  { cat: "Physical", cat_en: "Physical Troubleshoot", snip: null, q: "תסמין: interface eth0 עולה ויורד כל כמה שניות. מה הסיבה הסבירה?", q_en: "Symptom: eth0 interface goes up and down every few seconds. Most likely cause?", a: ["כבל פגום או חיבור רופף — signal נקטע לסירוגין", "DNS Server לא מגיב — אינו הגורם", "IP כפול ברשת — ARP conflict — לא הפתרון", "Firewall חוסם את ה-interface — שגוי"], a_en: ["Damaged cable or loose connection — signal intermittently cut", "DNS server not responding", "Duplicate IP on network — ARP conflict", "Firewall blocking the interface"], c: 0, e: "Flapping interface = Layer 1. בדוק: כבל, RJ45 connector, port ב-switch. ip link show eth0 מציג \"UP/DOWN\" events. אחכ ethtool eth0 לstatistics.", e_en: "Flapping interface = Layer 1. Check: cable, RJ45 connector, switch port. ip link show eth0 shows UP/DOWN events. Then ethtool eth0 for statistics." },
  { cat: "Fiber", cat_en: "Fiber vs Copper", snip: null, q: "DC מעוניין לחבר שני datacenters במרחק של 30 ק\"מ. איזה תווך מתאים?", q_en: "DC wants to connect two datacenters 30 km apart. Which medium is suitable?", a: ["Single-Mode Fiber — 80+ ק\"מ ללא amplification, 400 Gbps+", "CAT6 Ethernet — מספיק ל-30 ק\"מ", "Multi-Mode Fiber — מהיר יותר ל-distances ארוכות", "WiFi 6E — מגיע ל-30 ק\"מ בline-of-sight"], a_en: ["Single-Mode Fiber — 80+ km without amplification, 400 Gbps+", "CAT6 Ethernet — sufficient for 30 km", "Multi-Mode Fiber — faster for long distances", "WiFi 6E — reaches 30 km in line-of-sight"], c: 0, e: "CAT6 = 100m מקסימום. Multi-Mode = 550m. רק Single-Mode מגיע ל-30 ק\"מ ללא amplification. ISP backbones ורשתות בין-ערוניות = Single-Mode.", e_en: "CAT6 = 100m max. Multi-Mode = 550m. Only Single-Mode reaches 30 km without amplification. ISP backbones and inter-city networks = Single-Mode." },
  { cat: "WiFi", cat_en: "WiFi Security", snip: null, q: "מה ההבדל בין WPA2 ל-WPA3?", q_en: "What is the difference between WPA2 and WPA3?", a: ["WPA3 מוסיף SAE (Simultaneous Authentication of Equals) — מגן מ-brute force גם עם סיסמה חלשה", "WPA3 מהיר יותר כי אינו משתמש בהצפנה — אינו הגורם", "WPA3 = IPv6 בלבד. WPA2 = IPv4 — לא הפתרון", "WPA3 נדרש רק ל-WiFi 6 ומעלה — שגוי"], a_en: ["WPA3 adds SAE (Simultaneous Authentication of Equals) — protects from brute force even with weak password", "WPA3 faster because it does not use encryption", "WPA3 = IPv6 only. WPA2 = IPv4", "WPA3 required only for WiFi 6 and above"], c: 0, e: "WPA2 PMKID attack: offline brute force על handshake. WPA3 SAE: מפתח session חדש לכל חיבור, offline attack בלתי אפשרי. WPA3 גם מגן על networks פתוחות (OWE).", e_en: "WPA2 PMKID attack: offline brute force on handshake. WPA3 SAE: new session key per connection, offline attack impossible. WPA3 also protects open networks (OWE)." },
  ],
  11: [
  { cat: "DHCP — שלב 1", cat_en: "DHCP — Step 1", snip: null, q: "מחשב מתחבר לרשת. מה הוא יודע כרגע, ומה הוא צריך לגלות? מה הודעת DHCP Discover כוללת?", q_en: "What does a computer know when it first connects to a network?", a: ["יודע: MAC שלו בלבד. צריך: IP, Mask, Gateway, DNS.", "יודע: IP. צריך: MAC. Discover=Unicast לשרת DHCP", "יודע: IP ו-MAC. Discover=Multicast לשרת DNS", "יודע הכל, Discover רק מאשר"], a_en: ["Only its own MAC address (burned into NIC hardware).", "Its IP address and gateway from factory settings.", "Its public IP from the ISP.", "Everything — modern OS configures automatically."], c: 0, e: "", e_en: "MAC is burned into NIC at manufacturing (though software-changeable). Everything else (IP, mask, gateway, DNS) must be learned through DHCP or manual configuration." },
  { cat: "DHCP — Switch", cat_en: "DHCP — Switch", snip: null, q: "כשהמחשב שולח DHCP Discover — מה Switch לומד? מה הוא עושה עם המסגרת?", q_en: "What is the order of protocols when you open a website for the first time?", a: ["Flood לכל הפורטים (כי", "Drop — Switch לא מעביר Broadcast", "שולח רק לשרת DHCP", "שולח רק לנתב"], a_en: ["DHCP (get IP) — ARP (find gateway MAC) — DNS (resolve", "HTTP — DNS — TCP — ARP — DHCP.", "TCP — HTTP — DNS — ARP.", "DNS — HTTP — TCP — DHCP — ARP."], c: 0, e: "", e_en: "Full sequence: 1.DHCP DORA (get network config) 2.ARP for gateway MAC 3.DNS query (name→IP) 4.ARP for DNS server MAC (if different subnet) 5.TCP 3-way handshake 6.HTTP GET 7.HTTP Response." },
  { cat: "ARP — שלב 2", cat_en: "ARP — Step 2", snip: null, q: "המחשב צריך לשלוח DNS Query ל-2.2.2.2. הוא שולח ARP — לאיזה IP? למה?", q_en: "Why must DHCP Discover be sent as Broadcast?", a: ["ARP ל-Default Gateway (192", "ARP ל-2.2.2.2 ישירות", "ARP ל-DNS Server", "לא שולח ARP, שולח ישירות ב-IP"], a_en: ["Because the computer doesn't know the DHCP server's IP yet.", "Because DHCP requires broadcast.", "To notify all devices of the new computer.", "Because unicast is too slow."], c: 0, e: "", e_en: "Chicken-and-egg: to send to DHCP server you need its IP, but you need DHCP to get the IP. Solution: broadcast (255.255.255.255) reaches everyone. DHCP server responds with Offer." },
  { cat: "Layer 2 vs 3 — ARP Reply", cat_en: "Layer 2 vs 3 — ARP Reply", snip: null, q: "מה יהיו כתובות MAC ו-IP בחבילת ה-DNS Query שנשלחת?", q_en: "What happens to MAC addresses as a packet travels across the internet?", a: ["MAC src=MAC_מחשב, MAC dst=MAC_נתב_LAN, IP src=192", "MAC src=MAC_מחשב, MAC dst=MAC_DNS, IP src=192.168.0.5, IP dst=2.2.2.2", "MAC src ו-dst = IPs, IP src=MAC_מחשב", "כולם של המחשב בשתי השכבות"], a_en: ["MAC address changes at every router hop", "MAC address stays constant throughout.", "Both MAC and IP change.", "MAC is removed after leaving the LAN."], c: 0, e: "", e_en: "PC→Router1: src=PC_MAC, dst=R1_MAC. R1→R2: src=R1_MAC, dst=R2_MAC. R2→Google: src=R2_MAC, dst=Google_MAC. IP src/dst = PC_IP/Google_IP throughout (until NAT)." },
  { cat: "TTL — נתבים", cat_en: "TTL — Routers", snip: null, q: "מה ה-TTL כשמגיע ל-DNS? מה Switch עושה ל-TTL?", q_en: "What does NAT change in the packet as it leaves the network?", a: ["TTL=124 (128-4 נתבים).", "TTL=123 (Switch גם מוריד)", "TTL=128 (אף אחד לא מוריד)", "TTL=0 אחרי DNS"], a_en: ["Changes source IP from private (192.168.x.x) to public IP", "Changes destination IP.", "Changes both source and destination.", "Changes only the port number."], c: 0, e: "", e_en: "PAT (most common): src_ip: 192.168.1.105 — 1.2.3.4 (public), src_port: 54231 — 41000 (NAT table maps this). Return packet: dst 1.2.3.4:41000 — 192.168.1.105:54231." },
  { cat: "DNS — שלב 3", cat_en: "DNS — Step 3", snip: null, q: "מה Transaction ID ב-DNS? מה קורה לו בתשובה?", q_en: "What is a Broadcast Domain and why doesn't DHCP cross routers?", a: ["מזהה ייחודי לשאלה", "מספר סידורי של הפקטה כמו TCP Seq", "גרסת פרוטוקול DNS", "מספר שאילתות שנשלחו"], a_en: ["Area where broadcast frames reach.", "All devices on the internet.", "Devices connected to the same switch only.", "Devices with the same IP prefix."], c: 0, e: "", e_en: "Broadcast = Layer 2, stopped at routers. DHCP Discover = broadcast. If DHCP server is on different subnet: need DHCP Relay Agent (router ip helper-address command) to forward as unicast." },
  { cat: "TCP — שלב 4", cat_en: "TCP — Step 4", snip: null, q: "מה יהיו פורטי src ו-dst בקישור TCP למחשב Facebook בבקשת HTTP?", q_en: "What is the difference between same-subnet and different-subnet communication?", a: ["dst=80 (HTTP well-known).", "dst=443, src=80", "dst=53, src=80 בדרך כלל בסביבת production.", "dst=80, src=80 בהתאם לפרוטוקול."], a_en: ["Same subnet: ARP directly to destination IP, no router needed.", "Different subnet is always slower. as defined in the standard.", "Same subnet uses UDP, different uses TCP.", "No difference — IP handles everything."], c: 0, e: "", e_en: "Same subnet (192.168.1.5 — 192.168.1.10): ARP for 192.168.1.10 MAC, send directly. Different subnet (192.168.1.5 — 8.8.8.8): ARP for gateway MAC (192.168.1.1), send to gateway." },
  { cat: "TCP Handshake — חישוב", cat_en: "TCP Handshake — Calculation", snip: null, q: "השלם את שדות Seq ו-ACK בשלושת הצעדים:", q_en: "What happens during the TCP Handshake phase when opening a website?", a: ["SYN: ACK=0. SYN+ACK: ACK=334. ACK: Seq=334, ACK=501", "SYN: ACK=1. SYN+ACK: ACK=333. ACK: Seq=333, ACK=500", "SYN: ACK=333. SYN+ACK: ACK=500. ACK: Seq=500, ACK=501", "הכל 0 כי Handshake לא מעביר מידע"], a_en: ["Client SYN — Server SYN+ACK — Client ACK.", "HTTP GET is sent first, then handshake.", "Only one packet is exchanged.", "UDP connection is established first."], c: 0, e: "", e_en: "TCP Handshake: SYN(seq=x) — SYN+ACK(seq=y,ack=x+1) — ACK(ack=y+1). ~1.5 RTT latency before first byte of data. HTTPS adds TLS: ~2 more RTTs (TLS 1.2) or ~1 RTT (TLS 1.3)." },
  { cat: "HTTP — שלב 5", cat_en: "HTTP — Step 5", snip: null, q: "אחרי Handshake — איך נראית בקשת HTTP לדף הבית של Facebook? מה התשובה הצפויה?", q_en: "What does the ARP process look like when connecting to a new router?", a: ["GET / HTTP/1.0 + Host: www", "POST / HTTP/1.0. תשובה: 404", "DNS GET. תשובה: 302 Redirect", "TCP SYN. תשובה: SYN+ACK"], a_en: ["Computer broadcasts ARP Request ('Who has 192.168.1.1?').", "Computer already knows router's MAC.", "ARP is only needed for DNS servers.", "Router broadcasts its MAC to all devices."], c: 0, e: "", e_en: "First boot: ARP table empty — broadcast ARP for gateway — router responds — cache updated. After lease expires (default 20min): ARP again. ip neigh shows current ARP cache." },
  { cat: "NAT — שלב 6", cat_en: "NAT — Step 6", snip: null, q: "מחשב שולח HTTP ל-Facebook. מה Facebook רואה? מה מחשב רואה בתשובה?", q_en: "What is a DNS Recursive Query?", a: ["Facebook רואה: src=1.1.1.1 (לא 192.168.0.5!).", "Facebook רואה: src=192.168.0.5. מחשב רואה: dst=3.3.3.3", "שניהם רואים את הכתובות האמיתיות", "NAT מונע את התקשורת לגמרי"], a_en: ["Local DNS resolver queries root servers — TLD servers — authoritative", "Client queries each DNS server directly.", "DNS server asks the client for more info.", "A circular DNS query that loops."], c: 0, e: "", e_en: "Recursive: client asks local resolver — resolver does all work — returns final answer. Iterative: resolver tells client where to ask next. ISP resolvers do recursive; clients do recursive to resolver." },
  { cat: "MAC בכל Hop", cat_en: "MAC at Each Hop", snip: null, q: "מה קורה ל-MAC src ו-dst בכל hop? ומה לא משתנה?", q_en: "What is DNS TTL and DNS Caching?", a: ["MAC משתנה בכל hop", "הכל משתנה", "MAC קבוע, IP משתנה", "MAC ו-IP משתנים"], a_en: ["TTL in DNS = how long (seconds) the response is cached before re-querying.", "TTL = number of hops the DNS packet can travel.", "DNS caching is a security vulnerability.", "TTL only applies to A records."], c: 0, e: "", e_en: "dig google.com shows TTL: '299'. Browser caches DNS. OS has DNS cache (ipconfig /flushdns). Low TTL (60s): fast failover for load balancers. High TTL (86400s): stable, reduces DNS load." },
  { cat: "אינטגרציה", cat_en: "Integration", snip: null, q: "Switch מוריד TTL? Switch מחליף MAC? Switch מנתב לפי IP? מה נכון?", q_en: "What is HTTP Keep-Alive and why does it matter for website performance?", a: ["Switch לא מוריד TTL, לא מנתב לפי IP.", "Switch מוריד TTL כמו נתב", "Switch מנתב לפי IP בדרך כלל בסביבת production.", "Switch ו-Router זהים בפונקציה"], a_en: ["Reuses the same TCP connection for multiple HTTP requests instead of", "Keeps the browser tab open. as defined in the standard.", "Maintains user session on server. typically in production environments.", "Prevents the connection from timing out."], c: 0, e: "", e_en: "A webpage = HTML + CSS + JS + images (many resources). Without Keep-Alive: TCP handshake per resource (50+ RTTs). With Keep-Alive: one handshake, multiple requests. HTTP/2: multiplexing (parallel requests)." },
  { cat: "סדר הפרוטוקולים", cat_en: "Protocol Order", snip: null, q: "מה הסדר הנכון של הפרוטוקולים כשמחשב מתחבר לרשת וגולש לFacebook בפעם הראשונה?", q_en: "What is TLS and why is it used with HTTPS?", a: ["DHCP — ARP — DNS — TCP Handshake — HTTP GET — HTTP 200 OK", "DNS — DHCP — ARP — TCP — HTTP כך מוגדר בתקן.", "TCP — DHCP — DNS — HTTP — ARP בדרך כלל בסביבת production.", "HTTP — DNS — TCP — DHCP — ARP בהתאם לפרוטוקול."], a_en: ["Transport Layer Security — adds encryption,", "A faster version of TCP. as defined in the standard.", "A compression protocol. typically in production environments.", "An alternative to DNS. according to the protocol."], c: 0, e: "", e_en: "TLS handshake: exchange certificates + negotiate cipher suite + derive session keys. After handshake: symmetric encryption (AES). Certificate signed by trusted CA (Certificate Authority)." },
  { cat: "מה נתב עושה לפקטה", cat_en: "What Router Does to Packet", snip: null, q: "נתב מקבל פקטה. מה הוא עושה לה לפני שמעביר הלאה? (3 פעולות)", q_en: "What is the role of the Default Gateway in the full packet journey?", a: ["(1) מחשב Checksum ומוודא תקינות.", "מעביר as-is ללא שינוי", "מוסיף Header חדש בדרך כלל בסביבת production.", "מפצל לחבילות קטנות בהתאם לפרוטוקול."], a_en: ["First hop for all traffic destined outside the local subnet.", "Assigns IP addresses. as defined in the standard.", "Resolves domain names. typically in production environments.", "Connects wireless devices. according to the protocol."], c: 0, e: "", e_en: "Without default gateway: can reach local subnet only. With gateway: all unknown destinations forwarded to it. ip route: 'default via 192.168.1.1' = send everything not local to 192.168.1.1." },
  { cat: "שאלת סיכום", cat_en: "Summary Question", snip: null, q: "מה עובר את כל חמש השכבות כשמחשב מקבל IP ואז גולש? מה ייחודי לכל שכבה?", q_en: "What is DHCP Lease and what happens when it expires?", a: ["L5:DHCP/DNS/HTTP לוגיקת אפליקציה.", "כל השכבות עושות אותו דבר", "רק L3 ו-L4 פעילים בדרך כלל בסביבת production.", "L5 ו-L1 בלבד בהתאם לפרוטוקול."], a_en: ["Time limit for the assigned IP.", "DHCP lease never expires.", "Device is permanently assigned that IP.", "The device must be restarted."], c: 0, e: "", e_en: "Default lease: 24h (home), 8h (corporate). ipconfig /all shows 'Lease Obtained' and 'Lease Expires'. Renewal at T/2: unicast to same server. T/2 fails — broadcast at T7/8. Expire — start DORA." },
  ],
  12: [
  { cat: "Blocking", cat_en: "Blocking Problem", snip: null, q: "מה הבעיה עם accept() ו-recv() כש-server צריך לטפל בלקוחות מרובים?", q_en: "What is the problem with accept() and recv() when server needs to handle multiple clients?", a: ["הן Blocking — מקפיאות את התוכנה עד שמגיע משהו. בזמן recv מלקוח A, B לא יכול להתחבר", "הן מאפשרות רק חיבור אחד לכל Port — אינו הגורם", "הן לא תומכות ב-IPv6 — לא הפתרון", "הן מוגבלות ל-1024 bytes per call — שגוי"], a_en: ["They are Blocking — freeze program until something arrives. During recv from client A, B cannot connect", "They allow only one connection per Port", "They do not support IPv6", "They are limited to 1024 bytes per call"], c: 0, e: "accept() מחכה ללקוח חדש. recv() מחכה לdata. בזמן המתנה — thread תקוע. פתרון: select(), epoll, asyncio.", e_en: "accept() waits for new client. recv() waits for data. While waiting — thread is frozen. Solution: select(), epoll, asyncio." },
  { cat: "select()", cat_en: "select()", snip: null, q: "select() מקבלת 3 רשימות של sockets. מה כל רשימה?", q_en: "select() takes 3 lists of sockets. What is each list?", a: ["rlist=מוכנים לקריאה, wlist=מוכנים לכתיבה, xlist=שגיאות (לרוב [])", "rlist=clients, wlist=servers, xlist=errors", "rlist=UDP, wlist=TCP, xlist=ICMP — לא הפתרון", "rlist=incoming, wlist=outgoing, xlist=buffer"], a_en: ["rlist=ready to read, wlist=ready to write, xlist=errors (usually [])", "rlist=clients, wlist=servers, xlist=errors", "rlist=UDP, wlist=TCP, xlist=ICMP", "rlist=incoming, wlist=outgoing, xlist=buffer"], c: 0, e: "select(rlist, wlist, xlist). מחזירה 3 רשימות: מה בpractice מוכן. בדוק: if server_socket in rlist → accept חדש. if client in rlist → recv data.", e_en: "select(rlist, wlist, xlist). Returns 3 lists: what is actually ready. Check: if server_socket in rlist → accept new. if client in rlist → recv data." },
  { cat: "select()", cat_en: "select() Server", snip: null, q: "למה מוסיפים את server_socket ל-rlist ב-select()?", q_en: "Why add server_socket to rlist in select()?", a: ["כשserver_socket מוכן לקריאה — פירושו לקוח חדש רוצה להתחבר. select מתריע על כך", "כדי לאפשר שליחה מהשרת — אינו הגורם", "כדי לנטר שגיאות ב-server_socket — לא הפתרון", "server_socket לא צריך להיות ב-rlist — רק client sockets"], a_en: ["When server_socket ready to read — means new client wants to connect. select notifies of this", "To allow sending from server", "To monitor errors on server_socket", "server_socket should not be in rlist — only client sockets"], c: 0, e: "server_socket \"מוכן לקריאה\" = accept() לא תחסום. לקוח חדש ממתין. בלי server_socket ב-rlist — לא נדע על לקוחות חדשים.", e_en: "server_socket \"ready to read\" = accept() will not block. New client waiting. Without server_socket in rlist — would not know about new clients." },
  { cat: "select()", cat_en: "Empty recv", snip: null, q: "ב-select() loop — client_socket ב-rlist, recv מחזיר b\"\". מה עושים?", q_en: "In select() loop — client_socket in rlist, recv returns b\"\". What to do?", a: ["הלקוח ניתק — סגור את client_socket והסר מopen_clients list", "שלח ACK חזרה ללקוח — אינו הגורם", "קרא שוב recv — ייתכן packet מפוצל — לא הפתרון", "חכה 1 שנייה ואחר כך נסה שוב — שגוי"], a_en: ["Client disconnected — close client_socket and remove from open_clients list", "Send ACK back to client", "Call recv again — possible split packet", "Wait 1 second then try again"], c: 0, e: "recv() = b\"\" → signal ניתוק TCP. אם לא מסירים מopen_clients — select() ימשיך להתריע על ה-socket הזה לנצח (busy loop).", e_en: "recv() = b\"\" → TCP disconnect signal. If not removed from open_clients — select() will keep alerting on this socket forever (busy loop)." },
  { cat: "messages_to_send", cat_en: "Delayed Send", snip: null, q: "למה שומרים הודעות ב-messages_to_send list במקום לשלוח מיד?", q_en: "Why store messages in messages_to_send list instead of sending immediately?", a: ["send() יכול לחסום אם buffer הlקוח מלא. wlist ב-select מציין מתי Socket מוכן לכתיבה", "כדי לסדר הודעות לפי גודל לפני שליחה — אינו הגורם", "הפרוטוקול מחייב השהייה של 100ms בין הודעות — לא הפתרון", "כדי להצפין הודעות לפני שליחה — שגוי"], a_en: ["send() can block if client buffer is full. wlist in select indicates when Socket ready to write", "To sort messages by size before sending", "Protocol requires 100ms delay between messages", "To encrypt messages before sending"], c: 0, e: "send() blocking: אם client איטי/buffer מלא → send() תחסום הכל. wlist = \"מוכן לכתיבה עכשיו\". שולחים רק כשSocket מוכן.", e_en: "send() blocking: if client slow/buffer full → send() blocks everything. wlist = \"ready to write now\". Send only when Socket is ready." },
  { cat: "gRPC", cat_en: "gRPC vs REST", snip: null, q: "מה היתרון העיקרי של gRPC על REST לתקשורת בין microservices?", q_en: "What is the main advantage of gRPC over REST for microservice communication?", a: ["Protocol Buffers (binary) מהיר פי 5-10 מJSON. Streaming מובנה. Type safety בcompile time", "gRPC פשוט יותר לimplementation — אינו הגורם", "gRPC תומך ב-HTTP/1.1, REST לא — לא הפתרון", "gRPC מוצפן, REST לא — שגוי"], a_en: ["Protocol Buffers (binary) 5-10x faster than JSON. Built-in streaming. Type safety at compile time", "gRPC simpler to implement", "gRPC supports HTTP/1.1, REST does not", "gRPC encrypted, REST is not"], c: 0, e: "Protobuf: binary serialization → פי 3-10 קטן מJSON → פי 5-10 מהיר. Streaming: bidirectional (REST לא). Type safety: schema מוגדר מראש.", e_en: "Protobuf: binary serialization → 3-10x smaller than JSON → 5-10x faster. Streaming: bidirectional (REST cannot). Type safety: schema defined upfront." },
  { cat: "gRPC", cat_en: "Protocol Buffers", snip: null, q: "מה Protocol Buffer Streaming ומה הבדלו מREST?", q_en: "What is Protocol Buffer Streaming and how does it differ from REST?", a: ["gRPC מאפשר Server Streaming, Client Streaming, Bidirectional. REST = Request-Response בלבד", "Protocol Buffer Streaming = WebSocket עם binary encoding — אינו הגורם", "Streaming ב-gRPC = שליחת קבצים גדולים בלבד — לא הפתרון", "REST גם תומך ב-Streaming — אין הבדל — שגוי"], a_en: ["gRPC allows Server Streaming, Client Streaming, Bidirectional. REST = Request-Response only", "Protocol Buffer Streaming = WebSocket with binary encoding", "Streaming in gRPC = sending large files only", "REST also supports Streaming — no difference"], c: 0, e: "4 סוגי gRPC calls: Unary (כמו REST), Server Streaming (Server דוחף), Client Streaming, Bidirectional. ML inference, real-time data = gRPC streaming.", e_en: "4 gRPC call types: Unary (like REST), Server Streaming (server pushes), Client Streaming, Bidirectional. ML inference, real-time data = gRPC streaming." },
  { cat: "Circuit Breaker", cat_en: "Circuit Breaker", snip: null, q: "מה Circuit Breaker pattern ומתי הוא מופעל?", q_en: "What is the Circuit Breaker pattern and when does it activate?", a: ["עוטף קריאות ל-service. לאחר N כשלים → OPEN: חוסם הכל ומחזיר error מיידי ללא timeout", "מנהל TCP connections pool לביצועים טובים יותר — אינו הגורם", "מגן מ-DDoS על ידי חסימת IPs חשודים — לא הפתרון", "מבצע retry אוטומטי עם exponential backoff — שגוי"], a_en: ["Wraps calls to service. After N failures → OPEN: blocks all and returns immediate error without timeout", "Manages TCP connections pool for better performance", "Protects from DDoS by blocking suspicious IPs", "Performs automatic retry with exponential backoff"], c: 0, e: "CLOSED→(N failures)→OPEN→(timeout)→HALF-OPEN→(success)→CLOSED. מונע cascade failure: אם B נפל, A לא ממתין timeout × אלף requests.", e_en: "CLOSED→(N failures)→OPEN→(timeout)→HALF-OPEN→(success)→CLOSED. Prevents cascade failure: if B fell, A does not wait timeout × thousand requests." },
  { cat: "asyncio", cat_en: "asyncio vs select", snip: null, q: "מה ההבדל בין select() ל-asyncio?", q_en: "What is the difference between select() and asyncio?", a: ["select() = low-level, FD_SETSIZE ~1000 sockets. asyncio = high-level, event loop, 1M+ connections", "select() = Python 3 בלבד. asyncio = Python 2 ומעלה — אינו הגורם", "asyncio = synchronous, select() = asynchronous — לא הפתרון", "select() = TCP בלבד. asyncio = UDP בלבד — שגוי"], a_en: ["select() = low-level, FD_SETSIZE ~1000 sockets. asyncio = high-level, event loop, 1M+ connections", "select() = Python 3 only. asyncio = Python 2 and above", "asyncio = synchronous, select() = asynchronous", "select() = TCP only. asyncio = UDP only"], c: 0, e: "select(): O(n) scan, מוגבל ל-FD_SETSIZE (1024 ב-Linux). asyncio: מבוסס epoll, O(1) per event, coroutines, אין thread overhead.", e_en: "select(): O(n) scan, limited to FD_SETSIZE (1024 on Linux). asyncio: epoll-based, O(1) per event, coroutines, no thread overhead." },
  { cat: "select()", cat_en: "select() wlist", snip: null, q: "מתי socket יופיע ב-wlist שחוזר מselect()?", q_en: "When will a socket appear in wlist returned by select()?", a: ["כשBuffer שלו פנוי ויכול לקבל כתיבה — send() לא תחסום", "כשקיבל נתונים חדשים — אינו הגורם", "כשהחיבור נסגר — לא הפתרון", "כשחלה שגיאה בSocket — שגוי"], a_en: ["When its buffer is free and can accept writes — send() will not block", "When it received new data", "When connection closed", "When error occurred in Socket"], c: 0, e: "wlist = מוכן לכתיבה. בדרך כלל תמיד מוכן אלא אם buffer מלא. לכן: שמור הודעות ב-messages_to_send, ורק כשsocket ב-wlist — שלח.", e_en: "wlist = ready to write. Usually always ready unless buffer full. Therefore: store messages in messages_to_send, and only when socket in wlist — send." },
  { cat: "Sockets", cat_en: "Server Architecture", snip: null, q: "מה ההבדל בין Thread-per-Client ל-select() לטיפול בלקוחות מרובים?", q_en: "What is the difference between Thread-per-Client and select() for multiple clients?", a: ["Thread-per-Client: 8MB RAM לthread, ~10K clients מקסימום. select(): event loop, 1M+ clients בthread אחד", "Thread-per-Client: מהיר יותר. select(): אמין יותר — אינו הגורם", "select(): מתאים לUDP. Thread-per-Client: לTCP — לא הפתרון", "אין הבדל — שניהם מגיעים לאותה throughput — שגוי"], a_en: ["Thread-per-Client: 8MB RAM per thread, ~10K clients max. select(): event loop, 1M+ clients in one thread", "Thread-per-Client: faster. select(): more reliable", "select(): suitable for UDP. Thread-per-Client: for TCP", "No difference — both reach same throughput"], c: 0, e: "C10K Problem (1999): מיליון clients × 8MB = 8TB RAM לThread-per-Client. select()/epoll/asyncio: coroutines ב-KB, לא MB.", e_en: "C10K Problem (1999): million clients × 8MB = 8TB RAM for Thread-per-Client. select()/epoll/asyncio: coroutines in KB, not MB." },
  { cat: "Sockets", cat_en: "Socket Options", snip: null, q: "שרת Python מקבל \"Address already in use\" בהפעלה. מה הפתרון המהיר?", q_en: "Python server gets \"Address already in use\" on startup. What is the quick fix?", a: ["server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1) — לפני bind()", "שנה את ה-Port ל-Port אחר — אינו הגורם", "Restart המחשב לנקות TIME_WAIT — לא הפתרון", "הוסף sleep(60) לפני bind() — שגוי"], a_en: ["server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1) — before bind()", "Change to different Port", "Restart machine to clear TIME_WAIT", "Add sleep(60) before bind()"], c: 0, e: "SO_REUSEADDR מאפשר bind על Port ב-TIME_WAIT. תמיד הוסף לפני bind() ב-production servers. אחרת — 60 שניות בין restarts.", e_en: "SO_REUSEADDR allows bind on Port in TIME_WAIT. Always add before bind() in production servers. Otherwise — 60 second wait between restarts." },
  { cat: "WebSockets", cat_en: "WebSockets vs HTTP", snip: null, q: "מדוע WebSockets נדרשים ל-live chat ו-REST לא מספיק?", q_en: "Why are WebSockets required for live chat and REST is insufficient?", a: ["REST = client שואל, server עונה. WebSocket = bidirectional — server יכול לדחוף הודעות ללא שאילה", "REST לא תומך ב-JSON — לכן צריך WebSocket — אינו הגורם", "WebSocket מהיר יותר מHTTP בגלל UDP — לא הפתרון", "REST מוגבל ל-10 connections בו-זמנית — שגוי"], a_en: ["REST = client asks, server answers. WebSocket = bidirectional — server can push messages without asking", "REST does not support JSON — so need WebSocket", "WebSocket faster than HTTP because UDP", "REST limited to 10 simultaneous connections"], c: 0, e: "Polling: client שואל כל שנייה \"יש הודעות?\" = בזבוז. WebSocket: connection פתוח, server דוחף מיידי. WhatsApp, Slack, Trading platforms = WebSocket.", e_en: "Polling: client asks every second \"any messages?\" = waste. WebSocket: connection open, server pushes immediately. WhatsApp, Slack, Trading platforms = WebSocket." },
  { cat: "asyncio", cat_en: "asyncio Pattern", snip: null, q: "מה היתרון של asyncio.start_server() על select() ב-Python?", q_en: "What is the advantage of asyncio.start_server() over select() in Python?", a: ["קוד ברור יותר עם async/await. epoll-based = מגיע ל-1M+ connections. אין GIL בעיה", "asyncio מהיר יותר כי משתמש בC מתחת — אינו הגורם", "asyncio תומך ב-UDP, select() רק TCP — לא הפתרון", "asyncio מאפשר multiple threads בעוד select() single-threaded בלבד"], a_en: ["Cleaner code with async/await. epoll-based = reaches 1M+ connections. No GIL problem", "asyncio faster because uses C underneath", "asyncio supports UDP, select() only TCP", "asyncio allows multiple threads while select() single-threaded only"], c: 0, e: "select() = O(n) scan של כל sockets. asyncio/epoll = O(1) per event. Coroutines = אין context switch overhead של threads. FastAPI/aiohttp מבוססים asyncio.", e_en: "select() = O(n) scan of all sockets. asyncio/epoll = O(1) per event. Coroutines = no thread context switch overhead. FastAPI/aiohttp based on asyncio." },
  { cat: "Troubleshooting", cat_en: "Socket Debug", snip: null, q: "שרת Python רץ אבל client מקבל Connection Refused. מה הצעד הראשון?", q_en: "Python server running but client gets Connection Refused. First step?", a: ["ss -tlnp | grep :PORT — בדוק אם השרת מאזין על ה-Port ו-Interface הנכונים", "Restart המחשב — אינו הגורם", "בדוק DNS של השרת — לא הפתרון", "הגדל timeout ב-client — שגוי"], a_en: ["ss -tlnp | grep :PORT — check if server listening on correct Port and Interface", "Restart the machine", "Check server DNS", "Increase timeout in client"], c: 0, e: "Connection Refused = שום תהליך לא מאזין. ss -tlnp: -t=TCP -l=Listen -n=Numeric -p=Process. בדוק: PORT נכון? Interface 0.0.0.0 לא 127.0.0.1?", e_en: "Connection Refused = no process listening. ss -tlnp: -t=TCP -l=Listen -n=Numeric -p=Process. Check: correct PORT? Interface 0.0.0.0 not 127.0.0.1?" },
  ],
  13: [
  { cat: "QUIC", cat_en: "QUIC & HTTP/3", snip: null, q: "מה הבעיה של HTTP/2+TCP שQUIC פותר?", q_en: "What HTTP/2+TCP problem does QUIC solve?", a: ["Head-of-Line Blocking", "חוסר ב-TLS 1.3 כברירת מחדל", "חוסר תמיכה מלאה ב-IPv6", "bandwidth מוגבל על UDP"], a_en: ["Head-of-Line Blocking", "No built-in TLS 1.3 by default", "Incomplete IPv6 support", "Limited bandwidth over UDP"], c: 0, e: "ב-HTTP/2+TCP packet loss מעכב את כל ה-streams. QUIC על UDP מריץ כל stream עצמאי.", e_en: "In HTTP/2+TCP packet loss stalls all streams. QUIC over UDP runs each stream independently." },
  { cat: "eBPF", cat_en: "eBPF", snip: null, q: "מה eBPF מאפשר ב-Linux?", q_en: "What does eBPF enable in Linux?", a: ["הרצת קוד מאומת בתוך kernel ללא שינוי kernel source", "הרצת containers ישירות ב-kernel", "כתיבת kernel modules בשפות script", "גישה ישירה ל-hardware ללא drivers"], a_en: ["Running verified code inside kernel without modifying source", "Running containers in kernel", "Writing kernel modules in scripting languages", "Direct hardware access without drivers"], c: 0, e: "eBPF = sandbox מאומת בתוך kernel. משמש ל: XDP DDoS mitigation, Cilium (Kubernetes CNI), observability.", e_en: "eBPF = verified sandbox inside kernel. Used for: XDP DDoS mitigation, Cilium (Kubernetes CNI), observability." },
  { cat: "iproute2", cat_en: "iproute2", snip: null, q: "מה מחליף netstat -an ב-Linux מודרני?", q_en: "What replaces netstat -an in modern Linux?", a: ["ss -tulnp", "ip neigh show", "ip addr show", "ip route show"], a_en: ["ss -tulnp", "ip neigh show", "ip addr show", "ip route show"], c: 0, e: "ss מ-iproute2: -t=TCP -u=UDP -l=Listening -n=Numeric -p=Process. מהיר פי 10.", e_en: "ss from iproute2: -t=TCP -u=UDP -l=Listening -n=Numeric -p=Process. 10x faster." },
  { cat: "Zero Trust", cat_en: "Zero Trust", snip: null, q: "מה ההבדל בין VPN ל-Zero Trust?", q_en: "VPN vs Zero Trust key difference?", a: ["VPN = גישה לכל הרשת; Zero Trust = גישה לאפליקציה ספציפית עם אימות מתמשך", "Zero Trust מהיר יותר בגלל הצפנה קלה", "VPN מאמת זהות; Zero Trust מאמת device בלבד", "שניהם זהים — הגדרה שגויה"], a_en: ["VPN = full network access; Zero Trust = specific app with continuous verification", "Zero Trust faster due to lighter encryption", "VPN verifies identity; Zero Trust device only", "Both identical"], c: 0, e: "SolarWinds 2020: VPN נתן lateral movement לכל הרשת. Zero Trust: גישה לservice ספציפי, least privilege.", e_en: "SolarWinds 2020: VPN gave lateral movement across network. Zero Trust: specific service, least privilege." },
  { cat: "WiFi 6", cat_en: "WiFi 6", snip: null, q: "מה OFDMA ב-WiFi 6?", q_en: "What is OFDMA in WiFi 6?", a: ["שליחה ל-multiple clients בו-זמנית על sub-channels", "הגדלת טווח שידור ב-6GHz", "הצפנה חזקה יותר", "חיסכון בסוללה"], a_en: ["Transmitting to multiple clients simultaneously on sub-channels", "Extended range at 6GHz", "Stronger encryption", "Battery saving"], c: 0, e: "WiFi 5: frame שלם למשתמש אחד. WiFi 6 OFDMA: מפצל ל-Resource Units, 9+ משתמשים בו-זמנית.", e_en: "WiFi 5: full frame to one user. WiFi 6 OFDMA: splits into Resource Units, 9+ users simultaneously." },

  { cat: "eBPF/XDP", cat_en: "eBPF/XDP", snip: null, q: "למה XDP מבוסס eBPF מהיר פי 25 מ-iptables לחסימת DDoS?", q_en: "Why is XDP over eBPF 25x faster than iptables for DDoS blocking?", a: ["XDP מעבד packets לפני שנכנסים ל-TCP/IP stack של הkernel", "iptables כותב לדיסק ולכן איטי, XDP משתמש בRAM", "XDP משתמש בGPU לעיבוד מקבילי", "iptables תומך ב-IPv4 בלבד, XDP תומך גם ב-IPv6"], a_en: ["XDP processes packets before entering kernel TCP/IP stack", "iptables writes to disk so it is slow, XDP uses RAM", "XDP uses GPU for parallel processing", "iptables supports only IPv4, XDP supports IPv6 too"], c: 0, e: "XDP = hook ברמת driver, לפני ה-stack. iptables רץ אחרי שה-kernel כבר עיבד את ה-packet. Cloudflare חוסמת DDoS ב-25M packets/sec עם XDP.", e_en: "XDP = hook at driver level, before the stack. iptables runs after kernel already processed the packet. Cloudflare blocks DDoS at 25M packets/sec with XDP." },

function loadCh(n) {
  if (typeof LANG === 'undefined') LANG = 'he';
  CUR_CH = n;
  var ch   = CHAPTERS.find(function(c){ return c.n===n; });
  if (!ch) return;
  var data = LANG === 'he' ? ch.he : ch.en;

  document.querySelectorAll('.sb-ch').forEach(function(b){ b.classList.remove('active'); });
  var sbch = document.getElementById('sbch' + n);
  if (sbch) sbch.classList.add('active');

  var prevN = n > 1  ? '<button class="ch-nav-btn" onclick="loadCh('+(n-1)+')">' + (LANG==='he' ? '► פרק '+(n-1) : '◄ Ch '+(n-1)) + '</button>' : '<span></span>';
  var nextN = n < 13 ? '<button class="ch-nav-btn" onclick="loadCh('+(n+1)+')">' + (LANG==='he' ? 'פרק '+(n+1)+' ◄' : 'Ch '+(n+1)+' ►') + '</button>' : '<span></span>';

  document.getElementById('lContent').innerHTML =
    '<div class="ch-nav">' + prevN + '<span class="ch-nav-cur">' + ch.icon + ' ' + data.name + '</span>' + nextN + '</div>' +
    data.content() +
    '<div class="ch-quiz-cta">' +
      '<button class="cta-quiz-btn" data-ch="' + n + '" id="ctaQuiz' + n + '">' +
        (LANG === 'he' ? '⚡ חידון לפרק זה' : '⚡ Quiz this chapter') +
      '</button>' +
      '<button class="cta-lab-btn" data-ch="' + n + '" id="ctaLab' + n + '">' +
        (LANG === 'he' ? '⚗️ מעבדה לפרק זה' : '⚗️ Lab this chapter') +
      '</button>' +
    '</div>' +
    '<div class="ch-nav ch-nav-bottom">' + prevN + '<span></span>' + nextN + '</div>';

  // Attach CTA event handlers after innerHTML set
  var ctaQ = document.getElementById('ctaQuiz' + n);
  var ctaL = document.getElementById('ctaLab' + n);
  if (ctaQ) ctaQ.onclick = function() { closeMobSidebar(); goTo('quiz'); startQuiz(10, n); };
  if (ctaL) ctaL.onclick = function() { closeMobSidebar(); goTo('lab');  startLab(n); };

  window.scrollTo(0, 0);
  updateReadBar();
}

function scrollToSec(chN, idx) {
  if (chN !== CUR_CH) {
    loadCh(chN);
    setTimeout(function(){ doScroll(idx); }, 80);
  } else {
    doScroll(idx);
  }
}

function doScroll(idx) {
  var secs = document.querySelectorAll('.learn-section');
  if (secs[idx]) {
    var top = secs[idx].getBoundingClientRect().top + window.scrollY - 70;
    window.scrollTo({ top: top, behavior: 'smooth' });
  }
}

function updateReadBar() {
  window.onscroll = function() {
    var h = document.documentElement.scrollHeight - window.innerHeight;
    var pct = h > 0 ? Math.round(window.scrollY / h * 100) : 0;
    var bar = document.getElementById('readBar');
    if (bar) bar.style.width = pct + '%';
  };
}

function goToLabWelcome() {
  var welcome = document.getElementById('labWelcome');
  var area    = document.getElementById('lqArea');
  if (welcome) welcome.style.display = '';
  if (area)    { area.style.display = 'none'; area.innerHTML = ''; }
  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('on'); });
  LAB.ch = 0;
}

function updateLabOverall() {
  var total = 0, done = 0;
  for (var n = 1; n <= 12; n++) {
    var s = labGetSaved(n);
    if (MCQ_CHAPTERS.indexOf(n) >= 0) {
      total += (LAB_DATA[n] || []).length;
      if (s) done += s.ok;
    } else {
      total += (TERMINAL_DATA[n] ? TERMINAL_DATA[n].missions.length : 0);
      var mDone = 0;
      (TERMINAL_DATA[n] ? TERMINAL_DATA[n].missions : []).forEach(function(m) {
        if (TERM.doneMissions && TERM.doneMissions['ch'+n+'_'+m.id]) mDone++;
      });
      done += mDone;
    }
  }
  var pct = total > 0 ? Math.round(done/total*100) : 0;
  var fill = document.getElementById('labOverallFill');
  if (fill) fill.style.width = pct + '%';
}

function startLab(n) {
  LAB.ch = n;
  var qs = LAB_DATA[n];
  if (!qs || !qs.length) return;
  LAB.questions = qs.slice().sort(function(){ return Math.random() - .5; });
  LAB.cur = 0; LAB.ans = []; LAB.answered = false;

  document.querySelectorAll('.lab-ch-btn').forEach(function(b){ b.classList.remove('on'); });
  var btn = document.getElementById('labchbtn' + n);
  if (btn) btn.classList.add('on');

  var welcome = document.getElementById('labWelcome');
  var area    = document.getElementById('lqArea');
  if (welcome) welcome.style.display = 'none';
  if (area)    area.style.display = 'block';
  renderLabQ();
}

function renderLabQ() {
  var q    = LAB.questions[LAB.cur];
  var isHe = LANG === 'he';
  var qText = isHe ? q.q : (q.q_en || q.q);
  var aList = isHe ? q.a : (q.a_en || q.a);
  var eText = isHe ? q.e : (q.e_en || q.e);
  var tot  = LAB.questions.length;
  var ch   = CHAPTERS.find(function(c){ return c.n === LAB.ch; });
  var data = LANG === 'he' ? ch.he : ch.en;
  LAB.answered = false;

  var pips = '';
  for (var i = 0; i < tot; i++) {
    var cls = i < LAB.cur ? (LAB.ans[i]===1?' ok':' bad') : i===LAB.cur?' cur':'';
    pips += '<div class="lq-pip'+cls+'"></div>';
  }

  var idx  = [0,1,2,3].sort(function(){ return Math.random()-.5; });
  var shuf = idx.map(function(j){ return aList[j]; });
  var newC = idx.indexOf(q.c);
  var LBL  = LANG === 'he' ? ['א','ב','ג','ד'] : ['A','B','C','D'];

  var optsHtml = '';
  for (var j = 0; j < 4; j++) {
    optsHtml += '<button class="lq-opt" data-i="'+j+'" data-c="'+newC+'">' +
      '<span class="lq-lbl">'+LBL[j]+'</span>' +
      '<span class="lq-txt">'+shuf[j]+'</span>' +
      '<span class="lq-ic"></span></button>';
  }

  var snipHtml = q.snip
    ? '<div class="lq-snip"><div class="lqs-bar"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div><div class="lqs-body">'+q.snip+'</div></div>'
    : '';

  var ok       = LAB.ans.filter(function(x){ return x===1; }).length;
  var scoreL   = LANG === 'he' ? 'נכון' : 'correct';
  var restartL = LANG === 'he' ? '↺ התחל מחדש' : '↺ Restart';
  var nextL    = LANG === 'he' ? '← הבא' : 'Next →';

  document.getElementById('lqArea').innerHTML =
    '<div class="lq-header">' +
      '<div class="lq-ch-icon">'+ch.icon+'</div>' +
      '<div><div class="lq-ch-name">'+data.name+'</div>' +
        '<div class="lq-ch-num">'+String(LAB.ch).padStart(2,'0')+' / 12</div></div>' +
      '<div class="lq-spacer"></div>' +
      '<div class="lq-scorebox"><div class="lq-sv" id="lqSv">'+ok+' / '+LAB.cur+'</div><div class="lq-sl">'+scoreL+'</div></div>' +
    '</div>' +
    '<div class="lq-pips">'+pips+'</div>' +
    '<div class="lq-card" id="lqCard">' +
      '<div class="lq-meta"><span class="lq-num">'+(LAB.cur+1)+' / '+tot+'</span><span class="lq-cat">'+(isHe ? q.cat : (q.cat_en||q.cat))+'</span></div>' +
      snipHtml +
      '<div class="lq-q">'+qText+'</div>' +
      '<div class="lq-opts" id="lqOpts">'+optsHtml+'</div>' +
      '<div class="lq-exp" id="lqExp"><div class="lq-exp-lbl" id="lqExpLbl"></div><div class="lq-exp-txt" id="lqExpTxt"></div></div>' +
    '</div>' +
    '<div class="lq-foot">' +
      '<button class="lq-btn" onclick="startLab(LAB.ch)">'+restartL+'</button>' +
      '<button class="lq-btn next" id="lqNext" onclick="nextLabQ()" disabled>'+nextL+'</button>' +
    '</div>';

  document.querySelectorAll('.lq-opt').forEach(function(btn) {
    btn.addEventListener('click', onLabPick);
  });
}

function onLabPick(e) {
  if (LAB.answered) return;
  LAB.answered = true;
  var btn  = e.currentTarget;
  var pick = parseInt(btn.dataset.i);
  var corr = parseInt(btn.dataset.c);
  var ok   = pick === corr;
  LAB.ans.push(ok ? 1 : 0);

  document.querySelectorAll('.lq-opt').forEach(function(b, j) {
    b.disabled = true;
    if (j === corr) b.classList.add('correct');
    else if (j === pick) b.classList.add('wrong');
  });

  var q       = LAB.questions[LAB.cur];
  var expLbl  = document.getElementById('lqExpLbl');
  var expTxt  = document.getElementById('lqExpTxt');
  var ic      = btn.querySelector('.lq-ic');
  if (ic) ic.textContent = ok ? '✓' : '✗';
  if (expLbl) expLbl.textContent = ok ? (LANG==='he'?'✓ נכון!':'✓ Correct!') : (LANG==='he'?'✗ לא נכון':'✗ Wrong');
  if (expLbl) expLbl.className   = 'lq-exp-lbl ' + (ok ? 'ok' : 'bad');
  if (expTxt) expTxt.textContent = (LANG==='he') ? q.e : (q.e_en||q.e);

  var sv = document.getElementById('lqSv');
  if (sv) sv.textContent = LAB.ans.filter(function(x){return x===1;}).length + ' / ' + LAB.ans.length;

  var next = document.getElementById('lqNext');
  if (next) next.disabled = false;

  if (ok) { XP += 5; localStorage.setItem('nw_xp', XP); document.getElementById('xpTotal').textContent = XP; }
  LAB.cur++;
}

function nextLabQ() {
  if (LAB.cur >= LAB.questions.length) { showLabResult(); return; }
  renderLabQ();
}

  setTimeout(function() {
    var arc = document.getElementById('lqrArc');

}

function labGetSaved(n) {

function labSave(n, ok, total) {

function populateChapterSelect() {

  sel.options[0].text = LANG === 'he' ? 'כל הפרקים' : 'All chapters';

function isMobile() { return window.innerWidth <= 768; }

function setMobTab(btn) {
  document.querySelectorAll('.mob-tab').forEach(function(b){ b.classList.remove('on'); });
  if (btn) btn.classList.add('on');
}

function updateMobBar(screenId) {
  if (!isMobile()) return;
  var titles = {
    landing: 'רשתות מחשבים',
    learn:   'למידה',
    lab:     'מעבדה',
    quiz:    'חידון'
  };
  var titleEl = document.getElementById('mobTopTitle');
  if (titleEl) titleEl.textContent = titles[screenId] || 'רשתות מחשבים';

  // Show sidebar button only on learn/lab screens
  var sbBtn = document.getElementById('mobSbBtn');
  if (sbBtn) sbBtn.style.display = (screenId === 'learn' || screenId === 'lab') ? 'flex' : 'none';

  // Sync bottom tab
  document.querySelectorAll('.mob-tab').forEach(function(b){
    b.classList.toggle('on', b.dataset.screen === screenId);
  });

  // Sync XP
  var mobXp = document.getElementById('mobXp');
  if (mobXp) mobXp.textContent = XP;
}

function toggleMobSidebar() {
  var screen = document.querySelector('.screen.on');
  if (!screen) return;
  var screenId = screen.id;

  if (screenId === 'learn') {
    var sb = document.querySelector('.l-sb');
    if (sb) {
      var open = sb.classList.toggle('mob-open');
      var ov   = document.getElementById('mobOverlay');
      if (ov) ov.classList.toggle('on', open);
    }
  } else if (screenId === 'lab') {
    var sb = document.querySelector('.lab-sb');
    if (sb) {
      var open = sb.classList.toggle('mob-open');
      var ov   = document.getElementById('mobOverlay');
      if (ov) ov.classList.toggle('on', open);
    }
  }
}

function closeMobSidebar() {
  document.querySelectorAll('.l-sb, .lab-sb').forEach(function(sb){
    sb.classList.remove('mob-open');
  });
  var ov = document.getElementById('mobOverlay');
  if (ov) ov.classList.remove('on');
}

// Wrap tables for horizontal scroll on mobile
function wrapTablesForMobile() {
  if (!isMobile()) return;
  document.querySelectorAll('.tbl').forEach(function(tbl) {
    if (tbl.parentElement.classList.contains('tbl-wrap')) return;
    var wrap = document.createElement('div');
    wrap.className = 'tbl-wrap';
    tbl.parentNode.insertBefore(wrap, tbl);
    wrap.appendChild(tbl);
  });
}

// Swipe to open/close sidebar
(function() {
  var startX = 0, startY = 0;
  document.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!isMobile()) return;
    var dx = e.changedTouches[0].clientX - startX;
    var dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dy) > Math.abs(dx) || Math.abs(dx) < 40) return; // vertical swipe

    var screen = document.querySelector('.screen.on');
    if (!screen) return;
    var screenId = screen.id;

    if (screenId === 'learn') {
      var sb = document.querySelector('.l-sb');
      if (!sb) return;
      var isRTL = document.documentElement.dir === 'rtl';
      // RTL: swipe left opens (from right edge), swipe right closes
      if (isRTL) {
        if (dx < -40 && startX > window.innerWidth * 0.7) { sb.classList.add('mob-open'); document.getElementById('mobOverlay').classList.add('on'); }
        if (dx > 40 && sb.classList.contains('mob-open')) closeMobSidebar();
      } else {
        if (dx > 40 && startX < window.innerWidth * 0.3) { sb.classList.add('mob-open'); document.getElementById('mobOverlay').classList.add('on'); }
        if (dx < -40 && sb.classList.contains('mob-open')) closeMobSidebar();
      }
    }
  }, { passive: true });
})();

// Patch goTo to update mobile bar
var _origGoTo = typeof goTo === 'function' ? goTo : null;
function goTo(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('on'); });
  document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('on'); });
  var el = document.getElementById(id);
  if (el) el.classList.add('on');
  var tab = document.querySelector('.nav-tab[data-screen="'+id+'"]');
  if (tab) tab.classList.add('on');
  window.scrollTo(0, 0);
  closeMobSidebar();
  updateMobBar(id);
  wrapTablesForMobile();
}
