<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Computer Networks — חקר רשתות</title><style>/* ============================================================
   SHARED DESIGN SYSTEM v3.0
   Clean, readable, mobile-first, bilingual
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Course accent — overridden per course */
  --accent:    #2563eb;
  --accent2:   #1d4ed8;
  --accentfg:  #ffffff;
  --accentbg:  rgba(37,99,235,.08);

  /* Base palette */
  --bg:        #ffffff;
  --bg2:       #f8f9fa;
  --bg3:       #f1f3f5;
  --border:    #e9ecef;
  --border2:   #ced4da;

  /* Text */
  --text:      #1a1a2e;
  --text2:     #4a4a6a;
  --text3:     #9a9ab0;

  /* Semantic */
  --green:     #16a34a;
  --green2:    #166534;
  --greenbg:   #f0fdf4;
  --red:       #dc2626;
  --redbg:     #fff1f2;
  --yellow:    #d97706;
  --yellowbg:  #fffbeb;

  /* Layout */
  --nav-h:     56px;
  --tabs-h:    48px;
  --max-w:     820px;
  --radius:    10px;
  --radius2:   16px;
  --radius3:   24px;

  /* Fonts */
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'Courier New', Consolas, 'Liberation Mono', monospace;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow2: 0 4px 16px rgba(0,0,0,.10);
}

html, body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}

/* ── HEADER ── */
.site-header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h); z-index: 300;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 12px;
}
.site-logo {
  display: flex; align-items: center; gap: 8px;
  font-weight: 800; font-size: 15px; color: var(--accent);
  text-decoration: none; flex-shrink: 0;
  letter-spacing: -.02em;
}
.site-logo-mark {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--accent); color: var(--accentfg);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 13px; font-weight: 900;
}
.site-chapter-name {
  flex: 1; min-width: 0;
  font-size: 13px; color: var(--text3); font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lang-btn {
  flex-shrink: 0; padding: 5px 14px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); font-size: 12px; font-weight: 700;
  color: var(--text2); cursor: pointer; transition: all .15s;
  letter-spacing: .02em;
}
.lang-btn:hover { background: var(--accent); color: var(--accentfg); border-color: var(--accent); }

/* ── CHAPTER NAV ── */
.ch-nav {
  position: fixed; top: var(--nav-h); left: 0; right: 0;
  height: var(--tabs-h); z-index: 200;
  background: var(--bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 12px; gap: 4px;
  overflow-x: auto; overflow-y: hidden;
  scrollbar-width: none;
}
.ch-nav::-webkit-scrollbar { display: none; }
.ch-btn {
  flex-shrink: 0; display: flex; flex-direction: column;
  align-items: center; gap: 1px;
  padding: 6px 12px; border: none; background: none;
  cursor: pointer; border-radius: var(--radius);
  color: var(--text3); transition: all .15s;
  min-width: 44px;
}
.ch-btn:hover { background: var(--bg2); color: var(--text); }
.ch-btn.active { background: var(--accentbg); color: var(--accent); }
.ch-btn.active .ch-num { color: var(--accent); font-weight: 800; }
.ch-num {
  font-family: var(--mono); font-size: 11px;
  font-weight: 600; color: var(--text3);
}
.ch-title-text {
  font-size: 9px; font-weight: 600;
  max-width: 64px; text-align: center; line-height: 1.2;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.ch-stars { font-size: 8px; min-height: 10px; }

/* ── MAIN LAYOUT ── */
.main {
  padding-top: calc(var(--nav-h) + var(--tabs-h) + 24px);
  padding-bottom: 80px;
  max-width: var(--max-w);
  margin: 0 auto;
  padding-left: 20px;
  padding-right: 20px;
}

/* ── CHAPTER ── */
.chapter { display: none; }
.chapter.active { display: block; }

/* ── CHAPTER HERO ── */
.ch-hero {
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}
.ch-tag {
  display: inline-block; font-size: 10px; font-weight: 700;
  color: var(--accent); background: var(--accentbg);
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
  letter-spacing: .08em; text-transform: uppercase;
  font-family: var(--mono);
}
.ch-title {
  font-size: 26px; font-weight: 900; color: var(--text);
  line-height: 1.2; letter-spacing: -.02em; margin-bottom: 8px;
}
.ch-desc {
  font-size: 14px; color: var(--text3); margin-bottom: 20px;
  max-width: 560px; line-height: 1.5;
}

/* ── TAB BAR ── */
.tabs-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.tab-btn {
  padding: 6px 16px; font-size: 13px; font-weight: 600;
  color: var(--text3); background: var(--bg2);
  border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer; transition: all .15s;
}
.tab-btn:hover { color: var(--text2); border-color: var(--border2); }
.tab-btn.active {
  background: var(--accent); color: var(--accentfg);
  border-color: var(--accent);
}

/* ── TAB PANELS ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── LEARN CONTENT ── */
.did-you-know {
  background: var(--yellowbg); border: 1px solid #fde68a;
  border-left: 4px solid var(--yellow);
  padding: 14px 16px; border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 14px; color: #713f12; line-height: 1.6; margin-bottom: 28px;
}
[dir="ltr"] .did-you-know { border-left: 4px solid var(--yellow); border-right: none; }
[dir="rtl"] .did-you-know { border-right: 4px solid var(--yellow); border-left: none; }

.section-title {
  font-size: 17px; font-weight: 800; color: var(--text);
  margin: 30px 0 10px; letter-spacing: -.01em;
}

.prose {
  font-size: 15px; color: var(--text2); line-height: 1.8;
  margin-bottom: 14px; max-width: 680px;
}
.prose em { color: var(--accent); font-style: normal; font-weight: 600; }

code, .inline-code {
  font-family: var(--mono); font-size: 12.5px;
  background: var(--bg3); padding: 2px 5px;
  border-radius: 4px; color: var(--accent2); font-weight: 600;
}

/* ── CODE BLOCKS ── */
.code-block, pre.code-block {
  background: #0d1117; border-radius: var(--radius2);
  padding: 18px 20px; margin: 14px 0 22px;
  overflow-x: auto; border: 1px solid #30363d;
}
.code-block code {
  font-family: var(--mono); font-size: 12.5px;
  line-height: 1.75; color: #c9d1d9;
  background: none; padding: 0; display: block;
  white-space: pre; font-weight: normal;
}
.comment { color: #8b949e; }
.key     { color: #79c0ff; }
.str     { color: #a5d6ff; }
.val     { color: #ffa657; }

/* ── CARDS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 14px 0 22px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin: 14px 0 22px; }
.card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius2); padding: 18px;
  display: flex; flex-direction: column; gap: 6px;
  box-shadow: var(--shadow); transition: box-shadow .15s, transform .15s;
}
.card:hover { box-shadow: var(--shadow2); transform: translateY(-1px); }
.card-icon { font-size: 24px; }
.card-title { font-size: 13px; font-weight: 800; color: var(--text); }
.card-body { font-size: 13px; color: var(--text2); line-height: 1.55; }

/* ── TABLES ── */
.table-wrap {
  overflow-x: auto; margin: 14px 0 22px;
  border-radius: var(--radius2); border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead { background: var(--bg2); }
.data-table th {
  padding: 10px 14px; text-align: start; font-weight: 700;
  color: var(--text2); font-size: 11px;
  text-transform: uppercase; letter-spacing: .06em;
  border-bottom: 1px solid var(--border);
}
.data-table td {
  padding: 10px 14px; color: var(--text2);
  border-bottom: 1px solid var(--border);
  vertical-align: top; line-height: 1.5;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg2); }

/* ── CALLOUTS ── */
.callout {
  padding: 12px 16px; border-radius: var(--radius);
  font-size: 14px; line-height: 1.6; margin: 14px 0 20px;
  border: 1px solid; border-left-width: 4px;
}
[dir="rtl"] .callout { border-left-width: 1px; border-right-width: 4px; }
.callout-info    { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
.callout-warn    { background: var(--yellowbg); border-color: #fde68a; color: #92400e; }
.callout-tip     { background: var(--greenbg); border-color: #bbf7d0; color: #166534; }
.callout-success { background: var(--bg2); border-color: var(--border); color: var(--text2); }

/* ── REAL WORLD BOX ── */
.real-world-box {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius2); padding: 18px 20px; margin: 20px 0;
  box-shadow: var(--shadow); position: relative;
  overflow: hidden;
}
.real-world-box::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%; background: var(--accent);
}
[dir="rtl"] .real-world-box::before { left: auto; right: 0; }
.real-world-title { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
.real-world-body { font-size: 13.5px; color: var(--text2); line-height: 1.7; }
.real-world-body code { font-size: 12px; }

/* ── END OF CHAPTER NAV ── */
.ch-end-nav, .ch-end-nav-en {
  display: flex; gap: 10px; justify-content: center;
  flex-wrap: wrap; margin-top: 36px; padding-top: 28px;
  border-top: 1px solid var(--border);
}
.ch-end-btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 14px 22px; border-radius: var(--radius2);
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text2); cursor: pointer; font-weight: 700;
  font-size: 13px; transition: all .15s; min-width: 120px;
  font-family: var(--sans);
}
.ch-end-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accentbg); }
.ch-end-btn.primary {
  background: var(--green); color: #fff; border-color: var(--green2);
}
.ch-end-btn.primary:hover { background: var(--green2); }
.ch-end-btn-icon { font-size: 20px; }
.ch-end-btn-label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }

/* ── GAME ── */
.game-start-card {
  max-width: 400px; margin: 0 auto;
  text-align: center; padding: 40px 20px;
}
.game-start-icon {
  font-size: 52px; margin-bottom: 12px;
  font-family: var(--mono); color: var(--accent);
  line-height: 1;
}
.game-start-title { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 8px; }
.game-start-desc  { font-size: 14px; color: var(--text3); margin-bottom: 20px; }
.game-rules { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.game-rule {
  font-size: 13px; font-weight: 600; color: var(--text2);
  background: var(--bg2); padding: 6px 14px;
  border-radius: var(--radius); border: 1px solid var(--border);
}
.btn-start {
  background: var(--accent); color: var(--accentfg);
  border: none; padding: 12px 32px; border-radius: var(--radius2);
  font-size: 15px; font-weight: 800; cursor: pointer;
  transition: all .15s; font-family: var(--sans);
  letter-spacing: .02em;
}
.btn-start:hover { opacity: .9; transform: translateY(-1px); }

.game-hud {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; padding: 10px 16px;
  background: var(--bg2); border-radius: var(--radius);
  border: 1px solid var(--border);
}
.hud-timer { font-family: var(--mono); font-size: 18px; font-weight: 800; color: var(--text); }
.hud-timer.urgent { color: var(--red); }
.hud-qnum  { font-size: 13px; color: var(--text3); font-weight: 600; }
.hud-score { font-size: 15px; font-weight: 800; color: var(--accent); }

.game-question { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; line-height: 1.4; }

.game-opts { display: flex; flex-direction: column; gap: 10px; }
.game-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg);
  cursor: pointer; font-size: 14px; color: var(--text2);
  font-weight: 500; transition: all .12s; text-align: start;
  font-family: var(--sans); line-height: 1.4;
}
.game-opt:hover { border-color: var(--accent); color: var(--text); }
.game-opt.correct { border-color: var(--green); background: var(--greenbg); color: var(--green2); }
.game-opt.wrong   { border-color: var(--red);   background: var(--redbg);   color: var(--red); }

.opt-letter {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--bg3); display: flex; align-items: center;
  justify-content: center; font-size: 11px; font-weight: 800;
  flex-shrink: 0; color: var(--text3); font-family: var(--mono);
  transition: all .12s;
}
.game-opt:hover .opt-letter { background: var(--accentbg); color: var(--accent); }
.game-opt.correct .opt-letter { background: var(--green); color: #fff; }
.game-opt.wrong   .opt-letter { background: var(--red);   color: #fff; }

.game-feedback { min-height: 28px; margin-top: 12px; text-align: center; font-size: 14px; font-weight: 700; }
.fb-correct { color: var(--green); }
.fb-wrong   { color: var(--red); }

.game-over-card, .game-empty {
  max-width: 380px; margin: 30px auto; text-align: center; padding: 32px 20px;
}
.game-empty { color: var(--text3); font-size: 14px; }
.game-over-medal { font-size: 52px; margin-bottom: 8px; }
.game-over-score { font-size: 48px; font-weight: 900; color: var(--accent); font-family: var(--mono); line-height: 1; }
.game-over-pct   { font-size: 14px; color: var(--text3); margin: 4px 0; }
.game-over-label { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; }
.game-over-btns  { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ── QUIZ ── */
.quiz-pips { display: flex; gap: 4px; margin-bottom: 20px; }
.qpip { flex: 1; height: 4px; border-radius: 2px; background: var(--border2); transition: background .2s; }
.qpip.done { background: var(--accent); }
.qpip.cur  { background: var(--accent); opacity: .5; }
.quiz-card { display: none; }
.quiz-card.active { display: block; }
.quiz-meta { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.quiz-q { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; line-height: 1.4; }
.quiz-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.quiz-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg);
  cursor: pointer; font-size: 14px; color: var(--text2);
  font-weight: 500; transition: all .12s; text-align: start;
  font-family: var(--sans); line-height: 1.4;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--accent); }
.quiz-opt.correct { border-color: var(--green); background: var(--greenbg); }
.quiz-opt.wrong   { border-color: var(--red);   background: var(--redbg); }
.quiz-opt:disabled { cursor: default; }
.quiz-explain {
  padding: 12px 14px; background: var(--greenbg);
  border: 1px solid #bbf7d0; border-radius: var(--radius);
  font-size: 13.5px; color: #166534; line-height: 1.6; margin-top: 12px;
}
.quiz-result { text-align: center; padding: 28px 0; }
.quiz-nav { display: flex; justify-content: space-between; margin-top: 16px; gap: 10px; }

/* ── SUMMARY ── */
.cheat-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 12px; margin-top: 8px; }
.cheat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); padding: 14px; }
.cheat-item { display: flex; justify-content: space-between; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.cheat-item:last-child { border-bottom: none; }
.cheat-key { font-family: var(--mono); color: var(--accent); font-weight: 700; font-size: 11.5px; flex-shrink: 0; }
.cheat-val { color: var(--text3); text-align: end; font-size: 11.5px; }

/* ── SHARED BUTTONS ── */
.nav-btn {
  padding: 9px 20px; border-radius: var(--radius);
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all .15s; font-family: var(--sans); border: 1px solid;
}
.nav-btn.primary {
  background: var(--accent); color: var(--accentfg); border-color: var(--accent);
}
.nav-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
.nav-btn.ghost {
  background: var(--bg2); color: var(--text2); border-color: var(--border2);
}
.nav-btn.ghost:hover { background: var(--bg3); color: var(--text); }
.nav-btn:disabled { opacity: .4; cursor: default; }

/* ── CREDITS ── */
.credits-bar { border-top: 1px solid var(--border); padding: 28px 0; margin-top: 48px; }
.credits-title { font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 14px; font-family: var(--mono); }
.credits-grid { display: flex; flex-wrap: wrap; gap: 24px; }
.credit-group { flex: 1; min-width: 130px; }
.credit-group-title { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
.credit-item { font-size: 12px; color: var(--text3); line-height: 1.9; }
.credit-item a { color: var(--accent); text-decoration: none; font-weight: 600; }
.credit-item a:hover { text-decoration: underline; }

/* ── MOBILE ── */
@media (max-width: 680px) {
  :root { --nav-h: 52px; --tabs-h: 44px; }
  .main { padding-left: 16px; padding-right: 16px; }
  .ch-title { font-size: 21px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .ch-btn { padding: 6px 9px; min-width: 38px; }
  .ch-title-text { font-size: 8px; max-width: 52px; }
  .game-rules { gap: 8px; }
  .ch-end-nav, .ch-end-nav-en { gap: 8px; }
  .ch-end-btn { min-width: 100px; padding: 12px 14px; }
  .game-over-btns, .quiz-nav { flex-wrap: wrap; }
  .real-world-box { padding: 14px 16px; }
}
@media (max-width: 400px) {
  .ch-title-text { display: none; }
  .ch-btn { min-width: 32px; }
}

/* ── RICH CHEAT SHEETS ── */
.cheat-section-title {
  font-size: 12px; font-weight: 800; color: var(--accent);
  text-transform: uppercase; letter-spacing: .08em;
  margin: 18px 0 8px; font-family: var(--mono);
}
.cheat-section-title:first-child { margin-top: 0; }
.cheat-table { display: flex; flex-direction: column; gap: 0; margin-bottom: 6px; }
.cheat-row {
  display: flex; gap: 12px; padding: 6px 0;
  border-bottom: 1px solid var(--border); align-items: baseline;
}
.cheat-row:last-child { border-bottom: none; }
.cheat-k {
  font-family: var(--mono); font-size: 12px; font-weight: 700;
  color: var(--accent); flex-shrink: 0; min-width: 160px;
  line-height: 1.4;
}
.cheat-v {
  font-size: 13px; color: var(--text2); line-height: 1.4;
  flex: 1;
}
.cheat-tip {
  margin-top: 14px; padding: 10px 14px;
  background: var(--yellowbg); border-radius: var(--radius);
  border: 1px solid #fde68a; font-size: 13px; color: #713f12;
  line-height: 1.6;
}
.cheat-tip code {
  background: rgba(0,0,0,.08); padding: 1px 4px;
  border-radius: 3px; font-size: 11.5px;
}
@media (max-width: 500px) {
  .cheat-row { flex-direction: column; gap: 2px; }
  .cheat-k { min-width: unset; }
}


/* ── UPGRADED CODE BLOCKS ── */

/* Wrapper */
div.code-block {
  background: #0d1117;
  border-radius: 12px;
  border: 1px solid #21262d;
  margin: 18px 0 24px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,.18), 0 1px 4px rgba(0,0,0,.12);
  direction: ltr !important;
  font-family: var(--mono);
}

/* Title bar */
.code-bar {
  background: #161b22;
  border-bottom: 1px solid #21262d;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.dot.r { background: #ff5f57; box-shadow: 0 0 0 1px rgba(255,95,87,.3); }
.dot.y { background: #febc2e; box-shadow: 0 0 0 1px rgba(254,188,46,.3); }
.dot.g { background: #28c840; box-shadow: 0 0 0 1px rgba(40,200,64,.3); }
.code-title {
  font-family: var(--mono);
  font-size: 11px;
  color: #8b949e;
  margin-left: 8px;
  letter-spacing: .04em;
}
[dir="rtl"] .code-title { margin-left: 0; margin-right: 8px; }

/* Code content */
pre.code-body,
pre.code-block {
  margin: 0 !important;
  padding: 18px 20px !important;
  overflow-x: auto;
  background: transparent !important;
  border: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  direction: ltr !important;
  text-align: left !important;
}
pre.code-body code,
pre.code-block code {
  font-family: 'Courier New', Consolas, 'Liberation Mono', monospace !important;
  font-size: 13px !important;
  line-height: 1.7 !important;
  color: #c9d1d9 !important;
  background: none !important;
  padding: 0 !important;
  display: block;
  direction: ltr !important;
  text-align: left !important;
  tab-size: 4;
}

/* Syntax color hints via class (applied by content) */
.comment { color: #8b949e !important; font-style: italic; }
.kw { color: #ff7b72; }        /* keywords */
.fn { color: #d2a8ff; }        /* functions */
.str { color: #a5d6ff; }       /* strings */
.num { color: #f2cc60; }       /* numbers */
.op { color: #79c0ff; }        /* operators */
.ann { color: #3fb950; }       /* annotations / good */
.err { color: #f85149; }       /* errors / bad */

/* Flow diagram styling — when code contains | and --- patterns */
pre.code-body code,
pre.code-block code {
  white-space: pre !important;
}

/* Scrollbar in code blocks */
pre.code-body::-webkit-scrollbar,
pre.code-block::-webkit-scrollbar {
  height: 4px;
}
pre.code-body::-webkit-scrollbar-track,
pre.code-block::-webkit-scrollbar-track {
  background: #161b22;
}
pre.code-body::-webkit-scrollbar-thumb,
pre.code-block::-webkit-scrollbar-thumb {
  background: #30363d;
  border-radius: 2px;
}

/* Standalone pre (not inside code-block div) */
pre:not(.code-body):not(.code-block) {
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 12px;
  padding: 18px 20px;
  margin: 18px 0 24px;
  overflow-x: auto;
  direction: ltr !important;
  text-align: left !important;
  box-shadow: 0 4px 24px rgba(0,0,0,.18);
}
pre:not(.code-body):not(.code-block) code {
  color: #c9d1d9;
  font-size: 13px;
  line-height: 1.7;
  display: block;
  direction: ltr !important;
  text-align: left !important;
}

/* Force LTR everywhere in code */
pre, code, .code-block, .code-body {
  direction: ltr !important;
  unicode-bidi: embed !important;
}

/* ── MATCHING GAME ──────────────────────────────────────── */
.match-game {
  padding: 8px 0;
}
.match-instructions {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 16px;
  text-align: center;
}
.match-area {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 16px;
}
.match-col-title {
  font-size: 11px;
  font-weight: 800;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 8px;
  font-family: var(--mono);
}
.match-col {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.match-card {
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
  background: var(--bg);
  font-family: var(--sans);
  line-height: 1.35;
  user-select: none;
  min-height: 42px;
  display: flex;
  align-items: center;
}
.match-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.match-card.selected {
  border-color: var(--accent);
  background: var(--accentbg);
  color: var(--accent);
  font-weight: 700;
}
.match-card.matched-correct {
  border-color: var(--green);
  background: var(--greenbg);
  color: var(--green2);
  cursor: default;
}
.match-card.matched-wrong {
  border-color: var(--red);
  background: var(--redbg);
  color: var(--red);
  animation: shake .3s;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-4px)}
  75%{transform:translateX(4px)}
}
.match-card.matched-correct:hover { transform: none; }
.match-term  { font-family: var(--mono); font-weight: 700; }
.match-def   { color: var(--text2); }
.match-result {
  text-align: center;
  padding: 20px;
}
.match-score-big {
  font-size: 42px;
  font-weight: 900;
  color: var(--accent);
  font-family: var(--mono);
}
.match-score-label {
  font-size: 14px;
  color: var(--text3);
  margin-bottom: 16px;
}
.match-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

@media(max-width:560px){
  .match-area { grid-template-columns: 1fr; }
  .seq-entity-name { font-size: 9px; }
  .seq-msg { font-size: 10.5px; }
}

<div class="section-title">שני דברים שונים לגמרי — ורוב האנשים מבלבלים ביניהם</div>
<p class="prose">כשמישהו אומר "האינטרנט לא עובד" — הוא כנראה מתכוון ל-WWW. אבל אלו שני דברים שונים לחלוטין, ולהבין את ההבדל זו נקודת הפתיחה של כל הקורס הזה.</p>
<p class="prose"><strong>האינטרנט</strong> הוא תשתית פיזית גלובלית. הוא מורכב מכבלי fiber תת-ימיים שחוצים את האוקיינוסים, מגדלי תקשורת, נתבים (routers) בכל נקודת מפגש, ועשרות אלפי ספקיות אינטרנט (ISPs) ברחבי העולם שמחוברות אחת לשנייה. האינטרנט כבר קיים מאז 1969, כשה-ARPANET חיבר בין ארבע אוניברסיטאות אמריקאיות. בשלב ההוא — לא היה אף אתר אינטרנט. לא היה Google, לא היה פייסבוק. רק מחשבים שיכלו לשלוח מסרים זה לזה.</p>
<p class="prose"><strong>ה-WWW (World Wide Web)</strong> הוא שירות שרץ <em>מעל</em> האינטרנט — ממש כמו שאפליקציית WhatsApp רצה מעל הרשת הסלולרית. Tim Berners-Lee המציא אותו ב-1991 בזמן שעבד ב-CERN בשוויץ. הרעיון היה פשוט: עמודי HTML שמקושרים אחד לשני בקישורים. פתאום, במקום לדעת כתובת IP של כל שרת, יכולת ללחוץ קישור ולעבור ממסמך למסמך בקלות.</p>

<div class="section-title">הסכם לא כתוב שמסדיר כל תקשורת באינטרנט</div>
<p class="prose">כמעט כל תקשורת באינטרנט מתבססת על מודל אחד פשוט: יש צד אחד שמבקש (Client) וצד שני שמספק (Server). ה-Client תמיד יוזם — הוא שולח את הבקשה הראשונה. ה-Server תמיד מחכה — הוא לעולם לא "מתחיל שיחה" בעצמו.</p>
<p class="prose">תחשבו על זה כמו מסעדה. אתם (ה-Client) מחליטים מתי להיכנס, קוראים את התפריט ומזמינים. המלצר (ה-Server) יושב שם ומחכה, ורק כשאתם פונים אליו — הוא מגיב. המלצר לעולם לא יגיע לשולחן שלכם ויאמר "אתם רוצים שניצל?" בלי שביקשתם.</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">זרימת תקשורת בסיסית</span></div>
<pre class="code-body" dir="ltr"><code dir="ltr">💻 Client                           🗄️ Server
    |                                    |
    |---  GET /index.html HTTP/1.1  ---->|   ← הלקוח מבקש
    |                                    |
    |<--- HTTP/1.1 200 OK            ----|   ← השרת עונה
    |     Content-Type: text/html        |
    |     (תוכן הדף)                     |
    |                                    |</code></pre></div>
<table class="data-table">
<tr><th>תרחיש</th><th>מי ה-Client?</th><th>מי ה-Server?</th><th>מה הבקשה?</th></tr>
<tr><td>גלישה ל-YouTube</td><td>הדפדפן שלך</td><td>שרתי Google בארה"ב</td><td>GET /watch?v=xxxxx</td></tr>
<tr><td>שליחת WhatsApp</td><td>האפליקציה בטלפון</td><td>שרתי Meta</td><td>POST /send_message</td></tr>
<tr><td>Spotify מנגן שיר</td><td>האפליקציה שלך</td><td>שרתי Spotify</td><td>GET /stream/track_id</td></tr>
<tr><td>כניסה לאתר</td><td>הדפדפן</td><td>שרת האתר</td><td>POST /login</td></tr>
</table>
<div class="callout callout-warn">⚡ <strong>מה זה P2P — ולמה הוא שונה?</strong> ב-BitTorrent וב-WebRTC (Zoom), כל משתמש הוא גם Client וגם Server בו-זמנית. ב-Zoom למשל, הווידאו שלך עובר ישירות לאנשים האחרים — לא דרך שרת מרכזי. זה נקרא Peer-to-Peer. היתרון: מהיר יותר, זול יותר. החיסרון: קשה יותר לנהל, קשה לעבור Firewalls.</div>




<div class="section-title">הכתובת שכל מכשיר מחובר לאינטרנט חייב לקיים</div>
<p class="prose">דמיינו את האינטרנט כמערכת דואר עולמית ענקית. כדי שמכתב יגיע ליעדו, הוא חייב לשאת כתובת. ברשת — הכתובת הזו נקראת IP Address. כל packet (חבילת נתונים) שנשלחת ברשת נושא כתובת מקור (מי שלח) וכתובת יעד (לאן לשלוח).</p>
<p class="prose"><strong>IPv4</strong> — הגרסה הוותיקה, עדיין הנפוצה ביותר. בנויה מ-32 סיביות (bits), שמיוצגות כ-4 מספרים בין 0 ל-255 מופרדים בנקודות. לדוגמה: <code>192.168.1.5</code>. בסך הכל יש כ-4.3 מיליארד כתובות IPv4 אפשריות — מספר שנשמע עצום אבל הסתיים לאחר שכמות המכשירים המחוברים פיצחה אותו ב-2011.</p>
<p class="prose"><strong>IPv6</strong> — הגרסה החדשה. בנויה מ-128 סיביות, מספקת מספר כתובות שמספיק לתת כתובת ייחודית לכל אטום על פני כדור הארץ, ועדיין ישארו. נראה כך: <code>2607:f8b0:4004:c08::8a</code>. המעבר אליו מתקדם לאט אבל בטוח.</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">כתובות חשובות שחייבים לדעת</span></div>
<pre class="code-body" dir="ltr"><code dir="ltr">127.0.0.1        Loopback — "אני עצמי". packet לכתובת זו
                 לעולם לא יוצא לרשת. שימושי לפיתוח.

192.168.0.0/16   Private — כתובות ביתיות/משרדיות.
10.0.0.0/8       Private — כתובות ארגוניות גדולות.
172.16.0.0/12    Private — datacenters וענן.
                 → שלוש הטווחים האלה לא ניתנים לניתוב
                   באינטרנט הציבורי. NAT מאפשר להם
                   "לדבר" עם העולם.

8.8.8.8          Google Public DNS — כמעט תמיד עובד
1.1.1.1          Cloudflare DNS — הכי מהיר בעולם
169.254.x.x      APIPA — DHCP נכשל, OS הקצה כתובת
                 עצמאית. אין גישה לאינטרנט.</code></pre></div>
<div class="callout note">📝 <strong>למה 300.5.1.8 אינה כתובת חוקית?</strong> כל אחד מ-4 המספרים ב-IPv4 חייב להיות בין 0 ל-255 — כי הוא מיוצג על ידי byte אחד (8 bits), ו-2^8 = 256 ערכים אפשריים (0 עד 255). המספר 300 גדול מ-255, ולכן אי אפשר לייצג אותו ב-byte אחד.</div>




<div class="section-title">למה אתם לא צריכים לזכור 142.250.80.46 כדי לגלוש לGoogle</div>
<p class="prose">מחשבים עובדים עם מספרים. בני אדם זוכרים שמות. DNS הוא מערכת ענקית ומבוזרת שמתרגמת בין השניים — היא הופכת את <code>google.com</code> ל-<code>142.250.80.46</code>. בלי DNS, הייתם צריכים לזכור IP לכל אתר שאתם מבקרים בו.</p>
<p class="prose">כשאתם מקלידים כתובת אתר, המחשב שלכם עובר תהליך של 5 שלבים למצוא את ה-IP. ברוב המקרים התהליך הזה לוקח פחות מ-5 מילישניות — מהיר כל כך שאף פעם לא שמים לב.</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">DNS Resolution — המסע המלא</span></div>
<pre class="code-body" dir="ltr"><code dir="ltr">שלב 1: Cache מקומי
  המחשב בודק: "כבר פתרתי google.com לאחרונה?"
  אם כן — תשובה מיידית, 0ms.

שלב 2: Recursive Resolver (שרת ה-DNS של ה-ISP)
  אם לא בcache — שואל את שרת ה-DNS של Bezeq/HOT/etc.
  הוא מחזיק cache ענק — סיכוי גבוה שיש לו תשובה.

שלב 3: Root DNS Server
  אם גם שם לא — שואל אחד מ-13 Root Servers.
  הם מכירים רק שרתי TLD: "google.COM? שאל את .COM"

שלב 4: TLD Server
  .COM Server: "google.com? שאל את 216.239.34.10"

שלב 5: Authoritative DNS Server
  שרת ה-DNS של Google עצמו: "142.250.80.46"

  dig google.com          # שאל DNS
  dig +trace google.com   # ראה את כל השלבים בפועל</code></pre></div>
<table class="data-table">
<tr><th>סוג Record</th><th>מה הוא עושה</th><th>דוגמה מהחיים</th></tr>
<tr><td><strong>A</strong></td><td>שם דומיין — כתובת IPv4</td><td>google.com — 142.250.80.46</td></tr>
<tr><td><strong>AAAA</strong></td><td>שם דומיין — כתובת IPv6</td><td>google.com — 2607:f8b0::200e</td></tr>
<tr><td><strong>CNAME</strong></td><td>שם — שם אחר (alias)</td><td>www.example.com — example.com</td></tr>
<tr><td><strong>MX</strong></td><td>שרת Email לדומיין</td><td>gmail.com — aspmx.l.google.com</td></tr>
<tr><td><strong>TXT</strong></td><td>טקסט חופשי — לאימות</td><td>SPF, DKIM — אנטי-ספאם</td></tr>
<tr><td><strong>NS</strong></td><td>אילו שרתים מנהלים את הדומיין</td><td>example.com NS — ns1.example.com</td></tr>
</table>
<div class="callout callout-tip">💡 <strong>TTL — כמה זמן לזכור תשובה?</strong> לכל DNS Record יש TTL (Time To Live) — מספר שניות שעד אליהן מותר לשמור את התשובה ב-Cache. TTL של 3600 = שעה. אחרי שעה — כולם צריכים לשאול מחדש. לכן כשמחליפים IP של שרת, לוקח זמן עד שכולם "מרגישים" את השינוי.</div>
<div class="callout note">📝 <strong>DNS משתמש ב-UDP Port 53 — ולמה?</strong> DNS queries קצרות מאוד (בדרך כלל פחות מ-512 bytes). UDP פשוט יותר — אין Handshake, שולחים ומקבלים תשובה. אם הpacket אובד — שואלים שוב. TCP משמש רק כשהתשובה גדולה מ-512 bytes (למשל Zone Transfer).</div>




<div class="section-title">כשאתם שולחים הודעה, היא עוברת דרך עשרות נתבים</div>
<p class="prose">אחד המיתוסים הגדולים על האינטרנט הוא שנתונים עוברים ישירות ממחשב לשרת. במציאות, כל packet עובר דרך שרשרת של נתבים (Routers) — כל אחד מהם מחליט לאן להעביר את הpacket הלאה. כל נתב בדרך נקרא <strong>Hop</strong>.</p>
<p class="prose">חשבו על זה כמו טיסת קונקשן: אתם טסים מתל אביב לטוקיו, אבל לא ישירות. עוברים דרך פרנקפורט, אחר כך דרך בייג'ינג. כל שדה תעופה שעוצרים בו הוא Hop. הנתבים פועלים בדיוק ככה — כל אחד מסתכל על ה-IP היעד ומחליט "לאיפה הכי מהיר להעביר את זה הלאה?"</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">traceroute — ראה כל hop בדרך</span></div>
<pre class="code-body" dir="ltr"><code dir="ltr"># Linux/Mac:
traceroute -n 8.8.8.8    # -n = ללא DNS lookup (מהיר יותר)

# Windows:
tracert -d 8.8.8.8       # -d = ללא DNS lookup

# פלט אמיתי לדוגמה:
 1   1ms  192.168.1.1     ← הnתב הביתי שלך
 2   8ms  212.179.37.1    ← הISP (Bezeq/Hot)
 3  12ms  80.77.64.1      ← backbone של ISP
 4  88ms  74.125.50.237   ← Google backbone
 5  90ms  8.8.8.8         ← יעד!

# * * * = הנתב חוסם ICMP Time Exceeded
#         זה לא אומר שיש בעיה — רק שהנתב
#         לא מגיב לבקשות traceroute</code></pre></div>
<p class="prose">כל packet מתחיל עם שדה TTL (Time To Live) — מספר שמתחיל מ-64 או 128. כל נתב בדרך מוריד את ה-TTL ב-1. אם ה-TTL מגיע ל-0 לפני שהpacket הגיע ליעד — הנתב זורק אותו ושולח הודעת "ICMP Time Exceeded" חזרה. זה בדיוק המנגנון שtraceroute מנצל: הוא שולח packets עם TTL=1, TTL=2, TTL=3... ואוסף את הודעות ה-ICMP כדי לגלות את כל הנתבים בדרך.</p>
<div class="callout callout-warn">⚡ <strong>BGP — פרוטוקול שמחזיק את האינטרנט יחד</strong> איך נתב יודע לאן לשלוח packet ל-8.8.8.8? הוא מסתמך על BGP (Border Gateway Protocol) — פרוטוקול שבו כל ISP מכריז "אני יכול להגיע לכתובות האלה". הנתבים בונים Routing Tables ענקיות. ב-2008, Pakistan Telecom הכריזה בטעות שהיא הנתיב לYouTube — ו-75 מיליון משתמשים איבדו גישה במשך שעתיים.</div>




<div class="section-title">ארגז הכלים היומיומי לאבחון בעיות רשת</div>
<p class="prose">מהנדס רשת טוב לא מנחש — הוא בודק. יש קבוצה של פקודות שבכל פעם שמשהו לא עובד, תוכלו לרוץ אותן ולהבין בדיוק היכן הבעיה. ללמוד אותן בעל-פה.</p>
<table class="data-table">
<tr><th>פקודה</th><th>מה היא בודקת</th><th>דוגמה</th><th>מה לחפש</th></tr>
<tr><td><code>ping</code></td><td>האם היעד מגיב? כמה זמן לוקח?</td><td><code>ping -c 4 8.8.8.8</code></td><td>RTT ממוצע, packet loss%</td></tr>
<tr><td><code>traceroute</code></td><td>כל הnops בדרך ליעד</td><td><code>traceroute -n 8.8.8.8</code></td><td>איפה ה-hop האיטי?</td></tr>
<tr><td><code>mtr</code></td><td>traceroute + ping בזמן אמת</td><td><code>mtr 8.8.8.8</code></td><td>loss% לכל hop בנפרד</td></tr>
<tr><td><code>dig</code></td><td>שאל DNS — קבל IP</td><td><code>dig A google.com</code></td><td>כתובת IP, TTL</td></tr>
<tr><td><code>ip addr</code></td><td>מה ה-IP שלי?</td><td><code>ip addr show</code></td><td>כתובת IP, Interface</td></tr>
<tr><td><code>ip route</code></td><td>מה ה-Default Gateway?</td><td><code>ip route show</code></td><td>default via X.X.X.X</td></tr>
<tr><td><code>ss</code></td><td>אילו ports פתוחים?</td><td><code>ss -tlnp</code></td><td>מה מאזין על איזה port?</td></tr>
<tr><td><code>curl</code></td><td>שלח HTTP request</td><td><code>curl -I https://google.com</code></td><td>Status Code, Headers</td></tr>
</table>
<div class="callout callout-tip">💡 <strong>הסדר הנכון לאבחון:</strong> תמיד עבדו מהקרוב לרחוק. קודם בדקו שיש IP (<code>ip addr</code>), אחר כך שה-Gateway מגיב (<code>ping 192.168.1.1</code>), אחר כך שיש קישוריות לאינטרנט (<code>ping 8.8.8.8</code>), ורק אחר כך בדקו DNS (<code>dig google.com</code>). אל תקפצו ישירות ל"DNS לא עובד" לפני שבדקתם את הצעדים הקודמים.</div>




<div class="section-title">8 פברואר 2008 — הרגע שהאינטרנט הפסיק לעבוד</div>
<p class="prose">ב-24 בפברואר 2008, Pakistan Telecom קיבלה הוראה מהממשלה הפקיסטנית לחסום את YouTube (בגלל סרטון פוגעני). במקום לחסום גישה מקומית בלבד, הטכנאים ביצעו טעות ענקית: הם הכריזו ב-BGP שכתובות ה-IP של YouTube שייכות לרשת שלהם.</p>
<p class="prose">BGP — הפרוטוקול שמסיר את כל האינטרנט — מבוסס אמון. כשISP מכריז "אני הדרך ל-208.65.153.0/24", שאר ה-ISPs בעולם מאמינים לו ומעדכנים את ה-Routing Tables שלהם. תוך 2 דקות, כל ה-traffic לYouTube בעולם ניותב לפקיסטן — ושם נבלע. YouTube עצמו פעל מצוין, אבל איש לא יכול היה להגיע אליו.</p>
<p class="prose">75 מיליון משתמשים ברחבי העולם לא יכלו לגשת ל-YouTube. זה נמשך כשעתיים עד שISPs גדולים זיהו את הבעיה וביטלו את ה-route. זה היה הרגע שכל העולם הבין כמה ה-BGP פגיע.</p>
<div class="callout note">📝 <strong>מה השתנה מאז?</strong> RPKI (Resource Public Key Infrastructure) הוא הפתרון — מוסיף חתימה קריפטוגרפית לכל הכרזת BGP, כך שניתן לאמת שה-ISP באמת הבעלים של ה-prefix. נכון ל-2024, כ-50% מה-prefixes ברחבי העולם חתומים. לא מספיק, אבל מתקדמים.</div>




<div class="section-title">המסע המלא של בקשה אחת</div>
<p class="prose">הסתכלו על כרטיסיית הרשת בפיתוח כלי דפדפן (F12 — Network). תראו שגלישה ל-Google מלווה בעשרות requests. הנה מה שקורה ברקע בסדר מדויק:</p>
<table class="data-table">
<tr><th>#</th><th>שלב</th><th>פרוטוקול</th><th>זמן טיפוסי</th><th>מה קורה</th></tr>
<tr><td>1</td><td>בדיקת DNS Cache</td><td>OS</td><td>0ms</td><td>האם כבר פתרנו google.com?</td></tr>
<tr><td>2</td><td>DNS Query</td><td>UDP:53</td><td>5–20ms</td><td>שואלים שרת DNS — מקבלים IP</td></tr>

<div class="callout callout-tip">💡 <strong>למה Google מהיר כל כך?</strong> ראשית, Google מפעיל CDN עם נקודות נוכחות בכל העולם — כשאתם ניגשים, אתם לא מגיעים לשרת בארה"ב אלא לשרת הקרוב אליכם ביותר. שנית, Chrome ו-Google משתמשים ב-QUIC (HTTP/3) — פרוטוקול שבנו Google עצמם כדי לקצר את זמן ה-connection setup. שלישית, Google מבצע DNS prefetching — מחשב IPs לקישורים בעמוד עוד לפני שלחצתם.</div>




<div class="section-title">תהליך אבחון מסודר שעובד 95% מהפעמים</div>
<p class="prose">כשהאינטרנט לא עובד, רוב האנשים מיד פונים ל"Restart router". זה לא גישה — זו ניחוש. גישה מקצועית היא בדיקה שיטתית מהקרוב לרחוק:</p>
<table class="data-table">
<tr><th>שלב</th><th>בדיקה</th><th>פקודה</th><th>תוצאה טובה</th><th>תיקון אם נכשל</th></tr>
<tr><td>1</td><td>יש IP בכלל?</td><td><code>ip addr show</code></td><td>כתובת 192.168.x.x</td><td><code>ip link set eth0 up</code></td></tr>
<tr><td>2</td><td>ה-Gateway מגיב?</td><td><code>ping 192.168.1.1</code></td><td>reply תוך 1ms</td><td>Restart router, בדוק כבל</td></tr>
<tr><td>3</td><td>יש קישוריות לאינטרנט?</td><td><code>ping 8.8.8.8</code></td><td>reply תוך 20-100ms</td><td>בעיה ב-ISP — התקשר</td></tr>
<tr><td>4</td><td>DNS עובד?</td><td><code>dig @8.8.8.8 google.com</code></td><td>מחזיר IP</td><td><code>echo "nameserver 8.8.8.8" &gt; /etc/resolv.conf</code></td></tr>
<tr><td>5</td><td>אתר ספציפי נגיש?</td><td><code>curl -I https://google.com</code></td><td>HTTP 200</td><td><code>mtr google.com</code> — מצא hop בעייתי</td></tr>

</table>
<div class="callout callout-warn">⚡ <strong>169.254.x.x — סימן אזהרה</strong> אם <code>ip addr show</code> מחזיר כתובת שמתחילה ב-169.254, זה APIPA. המחשב ניסה לקבל IP מ-DHCP, לא קיבל תשובה, ו-הקצה לעצמו כתובת אקראית. אין גישה לאינטרנט. פתרון: <code>sudo dhclient eth0</code> (Linux) או <code>ipconfig /renew</code> (Windows).</div>




<div class="section-title">שאלות שחוזרות בראיונות ב-Google, Amazon, Cisco</div>
<div class="callout note">❓ <strong>"מה ההבדל בין Latency ל-Bandwidth, ולמה שניהם חשובים?"</strong><br><br>
Latency הוא הזמן שלוקח לpacket להגיע מנקודה א' לנקודה ב' — נמדד ב-milliseconds. Bandwidth הוא כמה נתונים ניתן להעביר בשנייה — נמדד ב-Mbps או Gbps. הטעות הנפוצה היא לחשוב שBandwidth גבוה בהכרח אומר חוויה טובה. לא נכון. בגיימינג, latency של 10ms עם bandwidth של 10Mbps עדיף הרבה על latency של 100ms עם bandwidth של 1Gbps — כי בגיימינג השרת שלח לך frame חדש, ואתה צריך שהוא יגיע מהר. Bandwidth לא עוזר אם הpackets מתמהמהים.</div>
<div class="callout note">❓ <strong>"ping ל-8.8.8.8 עובד, אבל google.com לא נטען. מה הבעיה?"</strong><br><br>
זו שאלה קלאסית. ping ל-IP מוכיח שהNetwork Layer (Layer 3) עובד — יש connectivity לאינטרנט. אבל גלישה לאתר לפי שם דורשת DNS. אם DNS לא עובד, הדפדפן לא יכול לתרגם "google.com" ל-IP. הבדיקה: <code>dig @8.8.8.8 google.com</code>. אם זה עובד = בעיה בשרת DNS המקומי. פתרון: שנה את ה-DNS Server ל-8.8.8.8 ידנית.</div>
<div class="callout note">❓ <strong>"מה יקרה אם שני שרתי DNS — ה-Primary וה-Secondary — שניהם ייפלו?"</strong><br><br>
תשובה קצרה: גישה לשמות דומיין תפסיק לעבוד. אבל גישה ב-IP ישיר תמשיך לעבוד. אם תדעו את ה-IP הישיר של שרת, אפשר לגשת אליו בלי DNS. בארגונים גדולים, תמיד מגדירים לפחות שני שרתי DNS (Primary + Secondary) ו-GeoDNS שמנתב לפי מיקום. לעולם לא לסמוך על שרת DNS אחד בלבד.</div>




<div class="section-title">פקודות שתשתמש בהן מחר בבוקר</div>
<p class="prose">פותחים Terminal ומתחילים:</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">בדיקות רשת בסיסיות</span></div>
<pre class="code-body" dir="ltr"><code dir="ltr">
# כתובת ה-IP שלך ברשת
ip addr show          # Linux

<div class="section-title">נקודת הקצה של כל חיבור רשת</div>
<p class="prose">כל פעם שאפליקציה שולחת או מקבלת נתונים ברשת — היא עושה זאת דרך Socket. Socket הוא לא חתיכת חומרה, ולא כבל. הוא <strong>abstraction תוכנתית</strong> שה-OS מספק כדי שתוכניות יוכלו לתקשר דרך הרשת מבלי להתעסק בפרטים הנמוכים.</p>
<p class="prose">הדרך הטובה ביותר להבין Socket היא לחשוב על מספר טלפון. מספר טלפון מזהה שירות ספציפי על מכשיר ספציפי. Socket עושה בדיוק את זה: <strong>IP Address</strong> מזהה מחשב ספציפי בעולם, ו-<strong>Port</strong> מזהה שירות ספציפי על אותו מחשב.</p>
<p class="prose">כשהדפדפן שלך פותח חיבור ל-google.com, ה-OS מקצה לו Socket עם IP של המחשב שלך ו-Port אקראי (נניח 52341). בצד שני, Google מקשיבה ב-Socket עם ה-IP שלהם ו-Port 443. שני הצדדים מחזיקים Socket, וביניהם זורמים הנתונים.</p>
<table class="data-table"><tr><th>Port</th><th>שירות</th><th>פרוטוקול</th><th>מי משתמש</th></tr><tr><td>80</td><td>HTTP</td><td>TCP</td><td>כל אתר ללא HTTPS</td></tr><tr><td>443</td><td>HTTPS</td><td>TCP</td><td>כל אתר מאובטח</td></tr><tr><td>22</td><td>SSH</td><td>TCP</td><td>גישה מרחוק לשרתים</td></tr><tr><td>53</td><td>DNS</td><td>UDP</td><td>תרגום שמות לכתובות</td></tr><tr><td>25</td><td>SMTP</td><td>TCP</td><td>שליחת מיילים</td></tr><tr><td>3306</td><td>MySQL</td><td>TCP</td><td>בסיס נתונים</td></tr><tr><td>6379</td><td>Redis</td><td>TCP</td><td>Cache server</td></tr><tr><td>0–1023</td><td>Well-Known Ports</td><td>—</td><td>דורשים root</td></tr><tr><td>1024–65535</td><td>Dynamic Ports</td><td>—</td><td>כל משתמש</td></tr></table>
<div class="callout note">📝 כשלקוח מתחבר לשרת, ה<strong>שרת</strong> מאזין על Port ידוע (443, 80 וכו'). הלקוח מקבל Port אקראי מעל 1024 לחיבור שלו. זו הסיבה שניתן לפתוח מאות טאבים בדפדפן — כל אחד קיבל Port שונה.</div>




<div class="section-title">ארבע פקודות לחיבור לכל שרת בעולם</div>
<p class="prose">ה-Socket API של Python הוא wrapper דק מאוד על ה-syscalls של Unix. לקוח בסיסי צריך ארבע פקודות בלבד: יצירה, חיבור, שליחה, קבלה. הקוד הבא מתחבר לשרת כלשהו ושולח HTTP Request ידני:</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">client.py — חיבור בסיסי</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr">import socket

# שלב 1: צור Socket — AF_INET=IPv4, SOCK_STREAM=TCP
s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)

# שלב 2: התחבר לשרת
s.connect(('93.184.216.34', 80))

# שלב 3: שלח HTTP Request
request = b"GET / HTTP/1.0\\\\r\\\\nHost: example.com\\\\r\\\\n\\\\r\\\\n"
s.send(request)

# שלב 4: קבל תשובה
data = s.recv(4096)
print(data.decode('utf-8', errors='replace'))

# שלב 5: תמיד סגור!
s.close()</code></pre></div>
<p class="prose">שים לב לפרטים: <code>AF_INET</code> פירושו IPv4. <code>SOCK_STREAM</code> פירושו TCP. <code>\\\\r\\\\n</code> הוא CRLF — HTTP דורש זאת. שני <code>\\\\r\\\\n\\\\r\\\\n</code> בסוף מסמנים סיום Headers.</p>
<div class="callout callout-warn">⚡ אם לא קוראים ל-<code>s.close()</code>, ה-Socket נשאר פתוח. בשרתים זה גורם ל-File Descriptor leak — אחרי אלפי connections השרת יקרוס עם "Too many open files". תמיד השתמשו ב-<code>try/finally</code>.</div>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">עם timeout וtry/finally — כך עושים בpractice</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr">s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
s.settimeout(5)   # 5 שניות — אחר כך TimeoutError

try:
    s.connect(('example.com', 80))
    s.send(b"GET / HTTP/1.0\\\\r\\\\n\\\\r\\\\n")
    data = s.recv(4096)
    print(data)
except socket.timeout:
    print("Connection timed out")
finally:
    s.close()   # תמיד יסגור, גם אחרי שגיאה</code></pre></div>




<div class="section-title">חמש פקודות להאזנה ללקוחות</div>
<p class="prose">שרת Socket הוא הצד הפסיבי — הוא לא יוזם חיבורים, הוא <strong>מחכה</strong> שלקוחות יתחברו. הסדר שלו שונה מהלקוח, וכל פקודה עושה משהו ספציפי:</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">server.py — שרת Echo בסיסי</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr">import socket

# שלב 1: צור Socket
server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)

# שלב 2: קריטי — מונע "Address already in use" בהפעלה מחדש
server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)

# שלב 3: הגדר כתובת ו-Port
# 0.0.0.0 = האזן על כל ממשקי הרשת (לא רק localhost)
server.bind(('0.0.0.0', 8080))

# שלב 4: התחל האזנה. 5 = תור לקוחות ממתינים
server.listen(5)
print("Listening on :8080")

# שלב 5: לולאה — קבל לקוח, טפל בו, המשך
while True:
    client_socket, addr = server.accept()  # BLOCKING — עוצר כאן
    print(f"Connected: {addr}")

    data = client_socket.recv(1024)
    if data:
        client_socket.send(b"Echo: " + data)

    client_socket.close()</code></pre></div>
<p class="prose">הפקודה <code>bind()</code> "תובעת" את ה-Port — אומרת ל-OS: כל packet שמגיע ל-Port 8080 תשלח אותו לתהליך שלי. ללא <code>bind()</code>, ה-OS לא ידע לאיזה תהליך לשלוח.</p>
<p class="prose">הפקודה <code>listen(5)</code> — הפרמטר 5 הוא ה<strong>backlog</strong>: כמה לקוחות יכולים להיות בתור ולחכות ל-<code>accept()</code> בזמן שאנחנו עסוקים. אם התור מלא, ה-OS דוחה חיבורים חדשים.</p>
<p class="prose">הפקודה <code>accept()</code> מחזירה tuple: Socket חדש לאותו לקוח ספציפי + כתובתו. ה-<code>server</code> Socket ממשיך להאזין. ה-<code>client_socket</code> הוא ערוץ פרטי לאותו לקוח בלבד.</p>
<table class="data-table"><tr><th>שאלה</th><th>תשובה</th></tr><tr><td>0.0.0.0 vs 127.0.0.1</td><td>0.0.0.0 = קבל מכל כתובת. 127.0.0.1 = רק מהמחשב עצמו</td></tr><tr><td>מה SO_REUSEADDR עושה?</td><td>מאפשר bind על Port שב-TIME_WAIT — שלא תצטרך לחכות 60 שניות</td></tr><tr><td>מה קורה ל-server_socket?</td><td>ממשיך לחכות. כל accept() מחזיר client_socket חדש נפרד</td></tr><tr><td>למה close() על client_socket?</td><td>OS שומר resources לכל חיבור. בלי close() — Resource Leak</td></tr></table>




<div class="section-title">האיתות שמפתחים שוכחים</div>
<p class="prose">יש פרט אחד קטן ב-Socket API שגורם לבאגים יותר מכל דבר אחר: מה מחזירה <code>recv()</code> כשהלקוח מתנתק? התשובה — <strong>מחרוזת ריקה</strong>. לא Exception. לא None. לא שגיאה. פשוט <code>b""</code>.</p>
<p class="prose">אם לא בודקים את זה, השרת נכנס ללולאה אינסופית שקוראת recv() ומקבלת b"" כל פעם. ב-CPU 100%, מבלי שיצא מהלולאה:</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">קוד שגוי — לא בודק ניתוק</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr">while True:
    data = client.recv(1024)
    # אם הלקוח התנתק — data = b""
    # הקוד ממשיך לעולם ושולח b"" בחזרה שוב ושוב
    client.send(data)</code></pre></div>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">קוד נכון — בדיקת ניתוק</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr">while True:
    data = client.recv(1024)

    if not data:   # b"" = ניתוק!
        print("Client disconnected")
        client.close()
        break

    # רק אם יש data אמיתי — עבד אותו
    client.send(b"Echo: " + data)</code></pre></div>
<div class="callout note">📝 כלל הזהב: <strong>תמיד בדוק if not data: break</strong> מיד אחרי כל recv(). זה לא אופציונלי — זה חלק בלתי נפרד מהשימוש ב-TCP Socket.</div>




<div class="section-title">כשThread אחד לכל לקוח לא עובד בסקייל</div>
<p class="prose">בשנת 1999, מהנדס בשם Dan Kegel ניסח בעיה שנקראה C10K Problem: כיצד לטפל ב-10,000 לקוחות בו-זמנית על שרת אחד? נשמע פשוט — אבל הגישה הנאיבית לא עובדת.</p>
<p class="prose">הגישה הנאיבית: Thread אחד לכל לקוח. Thread בלינוקס צורך כ-8MB RAM לstack. אלף לקוחות = 8GB RAM. עשרת אלפים = 80GB. חוץ מה-RAM, יש overhead עצום של context switching — כשיש אלפי threads, ה-OS מבזבז יותר זמן על הזזה ביניהם מאשר על עבודה אמיתית.</p>
<table class="data-table"><tr><th>גישה</th><th>מקסימום לקוחות</th><th>RAM לאלף לקוחות</th><th>דוגמה</th></tr><tr><td>Thread per client</td><td>~10,000</td><td>~8GB</td><td>Apache classic</td></tr><tr><td>select()</td><td>~1,000 (FD_SETSIZE)</td><td><100MB</td><td>קוד Python ישן</td></tr><tr><td>epoll + event loop</td><td>1,000,000+</td><td>~50MB</td><td>nginx, Node.js</td></tr><tr><td>asyncio Python</td><td>100,000+</td><td>~200MB</td><td>FastAPI, aiohttp</td></tr></table>
<p class="prose">הפתרון המודרני הוא <strong>Event Loop</strong>. במקום thread שמחכה עם recv(), יש thread אחד שבודק מי מוכן. epoll ב-Linux עושה זאת ב-O(1) לכל event — לא משנה כמה connections פתוחים.</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">asyncio server — ממשיך לעבוד עם 100,000 לקוחות</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr">import asyncio

async def handle_client(reader, writer):
    addr = writer.get_extra_info('peername')
    print(f"Connected: {addr}")

    while True:
        data = await reader.read(1024)   # async — לא חוסם את שאר הלקוחות
        if not data:
            break
        writer.write(b"Echo: " + data)
        await writer.drain()             # חכה שbuffer יתרוקן

    writer.close()
    await writer.wait_closed()

async def main():
    server = await asyncio.start_server(handle_client, '0.0.0.0', 8888)
    async with server:
        print("Serving on :8888")
        await server.serve_forever()

asyncio.run(main())</code></pre></div>
<p class="prose">כשהקוד מגיע ל-<code>await reader.read(1024)</code>, הוא לא חוסם. הוא אומר ל-event loop: "חזור אלי כשיש נתונים". בינתיים, event loop מטפל בעשרות אלפי connections אחרים. זה ה-secret של nginx, Node.js, ו-FastAPI.</p>
<div class="callout callout-warn">⚡ asyncio ו-blocking calls לא מתערבבים. אם קוראים ל-<code>time.sleep()</code> או ל-<code>requests.get()</code> מתוך coroutine — היא תחסום את <em>כל</em> event loop ותפגע בכל הלקוחות. תמיד: <code>await asyncio.sleep()</code> ו-<code>aiohttp</code>.</div>




<div class="section-title">כשHTTP לא מספיק</div>
<p class="prose">HTTP הוא פרוטוקול Request-Response: הלקוח שואל, השרת עונה, גמרנו. זה מצוין לדפי אינטרנט ו-REST APIs. אבל יש מצב אחד שבו HTTP כואב: כשה<strong>שרת</strong> צריך לדחוף מידע ללקוח בלי שביקש.</p>
<p class="prose">דוגמאות: הודעת WhatsApp חדשה שמגיעה, עדכון מחיר מניה ב-trading dashboard, הודעה שמישהו עורך את אותו Google Doc כמוך, notification שה-deploy הסתיים. בכל אלה — השרת יודע משהו חדש <em>לפני</em> שהלקוח שאל.</p>
<p class="prose">WebSocket מתחיל כ-HTTP request רגיל עם header מיוחד <code>Upgrade: websocket</code>. אחרי שהשרת מסכים (101 Switching Protocols) — החיבור הופך לduplex: <strong>שני הצדדים יכולים לשלוח בכל רגע</strong>.</p>
<table class="data-table"><tr><th>פרוטוקול</th><th>כיוון</th><th>חיבור</th><th>שימוש</th></tr><tr><td>HTTP</td><td>Client בלבד</td><td>נסגר אחרי כל request</td><td>דפים, REST APIs</td></tr><tr><td>SSE</td><td>Server — Client בלבד</td><td>פתוח, חד-כיווני</td><td>Live feeds, notifications</td></tr><tr><td>WebSocket</td><td>דו-כיווני</td><td>פתוח קבוע</td><td>Chat, gaming, trading, collab</td></tr></table>
<div class="callout note">📝 WebSocket Upgrade נראה כך: <code>GET /chat HTTP/1.1</code> עם headers <code>Upgrade: websocket</code> ו-<code>Sec-WebSocket-Key: xxx</code>. השרת עונה 101. מרגע זה — כבר לא HTTP.</div>




<div class="section-title">שגיאות Socket נפוצות ואיך לאבחן</div>
<table class="data-table"><tr><th>שגיאה</th><th>סיבה</th><th>אבחון</th><th>תיקון</th></tr><tr><td>Connection refused</td><td>שום תהליך לא מאזין</td><td>ss -tlnp | grep :PORT</td><td>הפעל שרת, בדוק Port</td></tr><tr><td>Address already in use</td><td>Port תפוס</td><td>ss -tlnp | grep :PORT</td><td>SO_REUSEADDR, kill תהליך</td></tr><tr><td>Connection timed out</td><td>Firewall חוסם</td><td>telnet HOST PORT</td><td>פתח Firewall rule</td></tr><tr><td>Broken pipe</td><td>לקוח ניתק בשליחה</td><td>logs</td><td>try/except BrokenPipeError</td></tr><tr><td>Too many open files</td><td>Socket leak</td><td>ls /proc/PID/fd | wc -l</td><td>close() ב-finally</td></tr></table>

<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr"># בדוק אם Port 8080 מאזין

# בדוק connectivity
telnet server-ip 8080

# ראה כל TCP connections

<div class="section-title">שאלות שנשאלות בראיונות</div>
<div class="callout note">📝 ❓ <strong>מה ההבדל בין TCP Socket ל-UDP Socket?</strong><br>TCP — connection-based: נדרש handshake, מובטח סדר ו-delivery, יש ACK. UDP — connectionless: שלח ושכח, אין הבטחה, מהיר יותר. TCP לdata קריטי, UDP לvideo/gaming/DNS.</div>
<div class="callout note">📝 ❓ <strong>מה הפרמטר של listen() אומר?</strong><br>גודל backlog — כמה לקוחות יכולים להיות בתור ולחכות ל-accept() בזמן שהשרת עסוק. לא מגביל מספר לקוחות מחוברים — רק התור.</div>
<div class="callout note">📝 ❓ <strong>מה ההבדל בין send() ל-sendall()?</strong><br>send() עשוי לשלוח חלק מהData ולהחזיר כמה bytes נשלחו. sendall() חוזר עד שהכל נשלח. בפועל — תמיד השתמשו ב-sendall() אלא אם יש סיבה טובה.</div>
<div class="callout note">📝 ❓ <strong>Blocking vs Non-Blocking Socket?</strong><br>Blocking (ברירת מחדל): recv() ו-accept() עוצרות עד שיש נתונים. Non-Blocking: מחזיר מיד עם BlockingIOError אם אין נתונים. asyncio עובד עם Non-Blocking ב-event loop.</div>




<div class="section-title">Socket server מינימלי ב-Python — 20 שורות</div>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">server.py</span></div>
<pre class="code-body" dir="ltr"><code dir="ltr">
import socket

s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
s.bind(('0.0.0.0', 9999))
s.listen(1)
print("Listening on port 9999...")

conn, addr = s.accept()
print(f"Connected: {addr}")

while True:
    data = conn.recv(1024)
    if not data:
        break
    print(f"Got: {data.decode()}")
    conn.send(b"Echo: " + data)

conn.close()
</code></pre></div>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">client.py — בטרמינל נפרד</span></div>
<pre class="code-body" dir="ltr"><code dir="ltr">

s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
s.connect(('127.0.0.1', 9999))
s.send(b"Hello, server!")
print(s.recv(1024).decode())
s.close()
</code></pre></div>

<div class="section-title">איך מיליארד מכשירים שונים מצליחים לדבר אחד עם השני</div>
<p class="prose">חשבו על הבעיה: יש מיליארדי מחשבים, טלפונים, מצלמות, מכוניות וטוסטרים מחוברים לאינטרנט. הם מיוצרים על ידי אלפי חברות שונות, מריצים מערכות הפעלה שונות, ועם זאת — כולם מצליחים לתקשר אחד עם השני. איך זה אפשרי?</p>
<p class="prose">התשובה היא <strong>מודל שכבות</strong>. כל שכבה מסתירה את המורכבות שמתחתיה ומספקת שירות לשכבה שמעליה. כך כל חברה יכולה לפתח מימוש שונה לאותה שכבה — כל עוד היא מכבדת את ה-interface — ולקבל תאימות מלאה.</p>
<p class="prose">המודל שבשימוש בפועל הוא TCP/IP עם 5 שכבות (לא 7 כמו OSI — OSI הוא אקדמי, TCP/IP הוא מה שרץ באינטרנט):</p>
<table class="data-table"><tr><th>#</th><th>שכבה</th><th>פרוטוקולים</th><th>כתובת</th><th>כלי debug</th></tr><tr><td>5</td><td>אפליקציה</td><td>HTTP, DNS, SMTP, FTP</td><td>—</td><td>curl, dig, nslookup</td></tr><tr><td>4</td><td>תעבורה (Transport)</td><td>TCP, UDP</td><td>Port</td><td>ss, netstat</td></tr><tr><td>3</td><td>רשת (Network)</td><td>IP, ICMP, BGP</td><td>IP Address</td><td>ping, traceroute</td></tr><tr><td>2</td><td>קו (Data Link)</td><td>Ethernet, WiFi, ARP</td><td>MAC Address</td><td>Wireshark, arp -n</td></tr><tr><td>1</td><td>פיזית</td><td>כבלים, Fiber, WiFi Radio</td><td>—</td><td>ethtool, iwconfig</td></tr></table>
<p class="prose">כל שכבה מדברת רק עם השכבה שמעליה ומתחתיה — זה הכלל הבסיסי. שכבה 4 לא יודעת ולא צריכה לדעת אם שכבה 1 היא WiFi, כבל נחושת, או סיב אופטי. זאת <strong>separation of concerns</strong> — כל אחד אחראי על דבר אחד.</p>
<div class="callout note">📝 OSI מגדיר 7 שכבות — מוסיף Session (5) ו-Presentation (6) בין Application ל-Transport. בפועל, שכבות אלו מוטמעות בשכבת האפליקציה ולא מיושמות בנפרד. בראיונות שואלים על שניהם — TCP/IP לפרקטיקה, OSI לתיאוריה.</div>




<div class="section-title">Header על Header — מה קורה כשאתה שולח הודעה</div>
<p class="prose">כשאתה שולח הודעה ב-WhatsApp, נניח "היי", מה בדיוק קורה? ה-"היי" עובר דרך כל 5 השכבות, וכל שכבה <strong>עוטפת אותו</strong> עם Header משלה — כמו מעטפות שמכניסים אחת בתוך השנייה. זה נקרא Encapsulation.</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">Encapsulation — שליחה מהמחשב</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr">                  "היי"               ← Application Layer (שכבה 5)
  [TCP Header   | "היי"]              ← Transport Layer (שכבה 4)
  [IP Header    | TCP | "היי"]        ← Network Layer (שכבה 3)
  [ETH Header   | IP | TCP | "היי" | CRC]  ← Data Link (שכבה 2)
  01001000 01101001 01101001 ...      ← Physical Layer (שכבה 1)</code></pre></div>
<p class="prose">ובצד המקבל — <strong>Decapsulation</strong>: כל שכבה מסירה את ה-Header שלה ומעבירה את מה שנשאר לשכבה שמעליה:</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">Decapsulation — קבלה</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr">שכבה 1: קיבלה ביטים, המירה ל-frame
שכבה 2: בדקה CRC, הסירה ETH Header, העבירה IP packet לשכבה 3
שכבה 3: בדקה Destination IP, הסירה IP Header, העבירה TCP segment לשכבה 4
שכבה 4: בדקה Port, הסירה TCP Header, העבירה "היי" לשכבה 5
שכבה 5: WhatsApp קיבל "היי" — הצגת הודעה</code></pre></div>
<p class="prose">כל Header מכיל מידע שרלוונטי לשכבה שלו בלבד. IP Header מכיל Destination IP אבל לא יודע מה Port. TCP Header מכיל Port אבל לא יודע מה כתוב ב-HTTP Request. זו שוב הseparation of concerns.</p>
<div class="callout note">📝 כשה-Ethernet switch שעל הדרך מקבל frame — הוא פותח רק את שכבה 2 כדי לקרוא MAC Address. הוא לא פותח את IP Header ובטח לא את TCP. זה מה שמאפשר לו לפעול מהר מאוד.</div>




<div class="section-title">מיקרוסקופ לרשת — ראה כל packet שעובר</div>
<p class="prose">Wireshark הוא כלי ה-packet analysis הנפוץ ביותר בעולם. הוא מציג כל packet שעובר בממשק הרשת שלך — בזמן אמת. כשמהנדסי Google, Facebook, ו-Cloudflare צריכים לאבחן בעיות רשת סקרטות — Wireshark בכיס.</p>
<p class="prose">הממשק של Wireshark מחולק לשלושה חלונות מרכזיים. כשלוחצים על packet בחלון העליון, שני החלונות התחתונים מתעדכנים:</p>
<table class="data-table"><tr><th>חלון</th><th>מה רואים</th><th>שימוש</th></tr><tr><td>Packet List (עליון)</td><td>רשימת כל הpackets — זמן, src, dst, פרוטוקול, info</td><td>סינון וחיפוש</td></tr><tr><td>Packet Details (אמצע)</td><td>עץ שכבות פורש — לחץ ▶ לפתוח כל שכבה</td><td>הבנת מבנה</td></tr><tr><td>Packet Bytes (תחתון)</td><td>hex dump גולמי של הbytes</td><td>forensics עמוק</td></tr></table>
<p class="prose">הפרטים בחלון האמצעי הם מה שעושה את Wireshark כל כך עוצמתי. תוכלו לפתוח כל שכבה ולראות כל שדה: TTL של IP, Seq Number של TCP, DNS query name — הכל. זה מה שמאפשר לאבחן בעיות שאי אפשר לראות בכלים אחרים.</p>
<div class="callout note">📝 <strong>Promiscuous Mode</strong> — ברירת מחדל: Wireshark רואה רק traffic של המחשב שלך. עם Promiscuous Mode ב-interface של Switch (לא Hub!) — רואים רק traffic שעובר דרך המחשב שלך עצמו. כדי לראות traffic של מחשבים אחרים ב-LAN — צריך port mirroring על ה-Switch, או ARP spoofing.</div>




<div class="section-title">איך למצוא את הpaclet שמחפשים מתוך אלפים</div>
<p class="prose">בפועל, תראו אלפי packets בשנייה. בלי סינון — Wireshark לא שמישי. Display Filters הם השפה שמאפשרת לכם לראות בדיוק מה שצריך. הם מופעלים <em>אחרי</em> capture ולא מסננים את ה-capture עצמו.</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">Display Filters — החיוניים ביותר</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr"># לפי IP
ip.addr == 8.8.8.8              # כל traffic מ-Google DNS
ip.src == 192.168.1.100         # רק packets מהמחשב הזה
ip.dst == 10.0.0.1              # רק packets לכתובת הזו

# לפי פרוטוקול
tcp                              # כל TCP
udp                              # כל UDP
dns                              # כל DNS queries ותשובות
http                             # HTTP (Port 80, לא HTTPS)

# לפי Port
tcp.port == 443                  # HTTPS
tcp.dstport == 22               # SSH

# לפי HTTP
http.response.code == 404        # שגיאות 404
http.response.code >= 500        # שגיאות שרת

# לפי TCP flags — שימושי מאוד
tcp.flags.syn == 1               # SYN packets (פתיחת חיבורים)
tcp.flags.rst == 1               # RST packets (ניתוקים כפויים)
tcp.analysis.retransmission      # Retransmissions — מצביעים על loss

# לפי DNS
dns.flags.response == 1          # רק תשובות DNS
dns.qry.name contains "google"   # DNS queries על google

# לוגיקה
tcp && ip.addr == 8.8.8.8       # TCP לGoogle DNS בלבד
http || dns                      # HTTP ו-DNS ביחד
not arp                          # הכל חוץ מARP</code></pre></div>
<p class="prose">הסינון הכי שימושי לאבחון בעיות: <code>tcp.analysis.retransmission</code>. אם רואים הרבה מהם — יש packet loss בדרך. אם הם מתרכזים בhop מסוים — שם הבעיה.</p>




<div class="section-title">Wireshark ב-Terminal — לautomation ולשרתים</div>
<p class="prose">Wireshark הוא GUI, אבל שרתים בproduction לרוב אין להם GUI. TShark הוא הגרסה הcli של Wireshark — אותן יכולות, אותם filters, אבל עובד מה-terminal. שימושי גם לautomation ול-scripting.</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">TShark — פקודות שימושיות</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr"># הקלטה חיה
tshark -i eth0                   # capture מממשק eth0
tshark -i eth0 -f "port 80"     # עם BPF filter (capture filter)

# שמירה לקובץ
tcpdump -i eth0 -w capture.pcap  # שמור לpcap
tshark -r capture.pcap           # קרא מקובץ

# ניתוח קובץ
tshark -r capture.pcap -Y "dns" # display filter
tshark -r capture.pcap -q -z io,phs   # protocol hierarchy stats

# Follow stream — ראה שיחה מלאה
# בWireshark: Click packet → Follow → TCP Stream
# בTShark:
tshark -r cap.pcap -q -z follow,tcp,ascii,0</code></pre></div>
<div class="callout note">📝 <strong>BPF Filters (Capture Filters)</strong> עובדים ברמת הkernel — מסננים לפני שWireshark/TShark בכלל רואה את הpacket. הם מהירים אבל פחות גמישים. <strong>Display Filters</strong> עובדים אחרי שWireshark כבר capture את הpackets. בpractice: השתמשו ב-Display Filters — יותר גמישים.</div>




<div class="section-title">אבחון בעיות אמיתיות</div>
<p class="prose">Wireshark הוא הכלי שמשתמשים בו כשכל שאר הכלים לא עוזרים. הנה הworkflows הנפוצים ביותר:</p>
<table class="data-table"><tr><th>בעיה</th><th>Display Filter</th><th>מה לחפש</th></tr><tr><td>אתר איטי</td><td>tcp.analysis.retransmission</td><td>הרבה retransmissions = packet loss</td></tr><tr><td>אתר לא נגיש</td><td>dns</td><td>DNS query ללא response = DNS בעיה</td></tr><tr><td>HTTPS לא עובד</td><td>ssl.handshake</td><td>Handshake נכשל = Certificate בעיה</td></tr><tr><td>חיבור נופל</td><td>tcp.flags.rst == 1</td><td>RST packets = מי מאפס?</td></tr><tr><td>API לא עונה</td><td>http.response.code >= 400</td><td>status codes בעייתיים</td></tr><tr><td>הכל איטי</td><td>tcp.window_size_value < 1000</td><td>TCP Window מצומצם = bottleneck</td></tr></table>

<div class="section-title">שאלות תיאורטיות שנשאלות</div>
<div class="callout note">📝 ❓ <strong>כמה פעמים IP Header נבנה ונהרס בדרך מ-A ל-B דרך Router?</strong><br>שתי פעמים — פעם ב-A (שכבה 3 בונה IP Header) ופעם ב-B (שכבה 3 מפרקת). ה-Router באמצע פותח רק שכבה 2-3 כדי להחליט לאן לשלוח — IP Header לא נהרס ונבנה מחדש בכל hop.</div>
<div class="callout note">📝 ❓ <strong>מה ההבדל בין Encapsulation ל-Decapsulation?</strong><br>Encapsulation = כל שכבה מוסיפה Header לnתונים מהשכבה שמעליה (שליחה). Decapsulation = כל שכבה מסירה את ה-Header שלה ומעבירה את הnתונים לשכבה שמעליה (קבלה).</div>
<div class="callout note">📝 ❓ <strong>למה המודל מחולק לשכבות ולא פרוטוקול אחד גדול?</strong><br>Modularity. אפשר להחליף שכבה 1 (WiFi במקום Ethernet) מבלי לשנות שכבה 4. אפשר לפתח פרוטוקול HTTP חדש (HTTP/3) מבלי לשנות את TCP/IP. כל שכבה יכולה להתפתח בנפרד.</div>

<div class="section-title">המבנה המדויק של כל בקשה שהדפדפן שולח</div>
<p class="prose">HTTP הוא פרוטוקול טקסטואלי — כל בקשה היא טקסט רגיל שאדם יכול לקרוא. זה היה בכוונה כדי שיהיה קל לDebug. כל HTTP Request בנוי מ<strong>שלושה חלקים</strong> שמופרדים בצורה מדויקת:</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">HTTP GET Request — מה הדפדפן שולח</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr">GET /search?q=python HTTP/1.1   ← שורת הבקשה (Method + Path + Version)
Host: www.google.com            ← Headers מתחילים כאן
User-Agent: Mozilla/5.0 ...
Accept: text/html,application/xhtml+xml
Accept-Language: he-IL,he;q=0.9
Connection: keep-alive
                                ← שורה ריקה = סיום Headers
                                ← Body ריק בGET (נתונים רק בPOST)</code></pre></div>
<p class="prose">שורת הבקשה מכילה שלושה מרכיבים: <strong>Method</strong> (מה לעשות), <strong>Path</strong> (על מה), ו-<strong>Version</strong>. שורת הheaders ממשיכה עד שורה ריקה — ה-<code>\\\\r\\\\n\\\\r\\\\n</code>. זו האמנה שה-server יודע שה-headers נגמרו ועכשיו יכול להגיע body.</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">HTTP POST Request — עם Body</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr">POST /login HTTP/1.1
Host: www.github.com
Content-Type: application/json
Content-Length: 42
                                 ← שורה ריקה
{"username": "alice", "password": "s3cr3t"}   ← Body</code></pre></div>
<p class="prose">ה-<code>Content-Type</code> header אומר לשרת <em>איך לפרש</em> את ה-Body. <code>application/json</code> — parse כJSON. <code>multipart/form-data</code> — שליחת קובץ. <code>application/x-www-form-urlencoded</code> — form רגיל. ה-<code>Content-Length</code> אומר לשרת כמה bytes לקרוא.</p>




<div class="section-title">מה השרת שולח בחזרה</div>
<p class="prose">כל HTTP Response בנוי באותה מבנה: Status Line, Headers, שורה ריקה, Body.</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">HTTP Response — ממשרת nginx</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr">HTTP/1.1 200 OK                  ← Status Line
Content-Type: text/html; charset=UTF-8
Content-Length: 12345
Cache-Control: max-age=3600
Server: nginx/1.24.0
Date: Mon, 01 Jan 2024 12:00:00 GMT
                                 ← שורה ריקה
<!DOCTYPE html>                  ← Body (HTML)
<html>...</code></pre></div>
<table class="data-table"><tr><th>Status Code</th><th>קטגוריה</th><th>משמעות</th><th>דוגמה</th></tr><tr><td>200</td><td>2xx — הצלחה</td><td>OK — הכל תקין</td><td>GET בהצלחה</td></tr><tr><td>201</td><td>2xx — הצלחה</td><td>Created — משאב נוצר</td><td>POST שיצר record</td></tr><tr><td>301</td><td>3xx — Redirect</td><td>Moved Permanently</td><td>HTTP — HTTPS</td></tr><tr><td>302</td><td>3xx — Redirect</td><td>Found — redirect זמני</td><td>login redirect</td></tr><tr><td>400</td><td>4xx — שגיאת לקוח</td><td>Bad Request — בקשה שגויה</td><td>JSON לא תקין</td></tr><tr><td>401</td><td>4xx — שגיאת לקוח</td><td>Unauthorized — צריך login</td><td>API ללא token</td></tr><tr><td>403</td><td>4xx — שגיאת לקוח</td><td>Forbidden — אין הרשאה</td><td>רשאי לראות, לא לשנות</td></tr><tr><td>404</td><td>4xx — שגיאת לקוח</td><td>Not Found — לא קיים</td><td>URL שגוי</td></tr><tr><td>429</td><td>4xx — שגיאת לקוח</td><td>Too Many Requests — Rate limit</td><td>API abuse</td></tr><tr><td>500</td><td>5xx — שגיאת שרת</td><td>Internal Server Error</td><td>באג בקוד</td></tr><tr><td>502</td><td>5xx — שגיאת שרת</td><td>Bad Gateway — שרת upstream קרס</td><td>backend down</td></tr><tr><td>503</td><td>5xx — שגיאת שרת</td><td>Service Unavailable</td><td>שרת עמוס/מושבת</td></tr></table>
<div class="callout note">📝 ההבדל בין 401 ל-403: 401 אומר "לא יודע מי אתה — היכנס". 403 אומר "יודע מי אתה — אין לך הרשאה". במערכות אמיתיות, לפעמים מחזירים 404 במקרה של 403 — כדי לא לחשוף שהמשאב קיים.</div>




<div class="section-title">יותר מסתם "שאלה לעומת שליחה"</div>
<table class="data-table"><tr><th>מאפיין</th><th>GET</th><th>POST</th></tr><tr><td>נתונים</td><td>ב-URL: ?q=python&lang=he</td><td>ב-Body (נסתר מה-URL)</td></tr><tr><td>גודל</td><td>~2,000 תווים מקסימום (תלוי browser)</td><td>ללא הגבלה פרקטית</td></tr><tr><td>Bookmark/History</td><td>ניתן לשמור, נשמר ב-logs</td><td>לא נשמר כURL</td></tr><tr><td>Cache</td><td>דפדפן יכול לcache</td><td>לא מcached ברירת מחדל</td></tr><tr><td>Idempotent</td><td>כן — קריאה חוזרת = אותה תוצאה</td><td>לא — POST יוצר record חדש</td></tr><tr><td>שימוש נכון</td><td>שאילתות, חיפוש, קריאת מידע</td><td>שליחת טפסים, יצירה, שינוי</td></tr></table>
<p class="prose"><strong>Idempotent</strong> — מונח חשוב. פעולה idempotent נותנת אותה תוצאה גם אם מריצים אותה 10 פעמים. GET /users/1 תמיד מחזיר אותו user. DELETE /users/1 — מחיקה פעם שנייה תחזיר 404 אבל לא תשנה שום דבר נוסף. POST /users — כל קריאה יוצרת user חדש, לכן לא idempotent.</p>
<div class="callout callout-warn">⚡ כרטיסי אשראי, סיסמאות, נתונים אישיים — <strong>תמיד POST</strong>. GET נשמר ב-Browser History, ב-Server Logs, ב-Proxy logs, ב-Referrer headers. POST ב-HTTPS — הBody מוצפן ולא נשמר ב-URL.</div>




<div class="section-title">ה-🔒 בדפדפן — מה קורה בפועל</div>
<p class="prose">HTTPS = HTTP על TLS. TLS (Transport Layer Security) הוא שכבת הצפנה שיושבת בין TCP ל-HTTP ומספקת שלושה דברים: <strong>סודיות</strong> (אף אחד לא יכול לקרוא), <strong>integrity</strong> (אף אחד לא יכול לשנות), <strong>authentication</strong> (אתה באמת מדבר עם Google, לא מישהו אחר).</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">TLS 1.3 Handshake — מה קורה בפועל</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr"># TLS 1.3 — 1 RTT (מהיר יותר מ-TLS 1.2 שהיה 2 RTT)

Client → Server: ClientHello
   "תומך ב-TLS 1.3, הנה cipher suites שאני תומך"
   "הנה Diffie-Hellman key share שלי (random)"

Server → Client: ServerHello + Certificate + Finished
   "נשתמש ב-TLS_AES_256_GCM_SHA384"
   "הנה Certificate שלי (חתום על ידי CA)"
   "הנה DH key share שלי"
   [שניהם מחשבים את ה-session key מה-DH shares]

Client → Server: Finished
   [מאמת Certificate מול CA שמותקן ב-OS]
   "מוכן — מכאן הכל מוצפן"

# = 1 RTT בלבד. ב-0-RTT (reconnect) — אפילו פחות</code></pre></div>
<table class="data-table"><tr><th>מושג</th><th>הסבר</th><th>דוגמה</th></tr><tr><td>CA (Certificate Authority)</td><td>גוף שחותם על תעודות — OS סומך עליו</td><td>Let's Encrypt, DigiCert, GlobalSign</td></tr><tr><td>Certificate</td><td>מסמך שמאמת ש-google.com שייך לGoogle</td><td>x509 certificate</td></tr><tr><td>Perfect Forward Secrecy</td><td>מפתח session חדש לכל חיבור</td><td>אם private key נגנב — sessions ישנים בטוחים</td></tr><tr><td>HSTS</td><td>Header שמאלץ HTTPS — לא ניתן לחזור ל-HTTP</td><td>Strict-Transport-Security</td></tr><tr><td>Certificate Pinning</td><td>App מוודא fingerprint ספציפי — לא רק CA</td><td>מניעת MITM גם עם CA מזויף</td></tr></table>
<div class="callout note">📝 TLS 1.2 (2008) = 2 RTT. TLS 1.3 (2018) = 1 RTT. ההבדל משמעותי על mobile עם latency גבוה. Google.com משתמש TLS 1.3 עם 0-RTT reconnects — כמעט לא מרגישים את ה-overhead.</div>




<div class="section-title">שלושת הdialects של שיחה בין שרתים</div>
<p class="prose">כשבונים מערכות מורכבות, services שונים צריכים לדבר אחד עם השני. יש שלוש גישות עיקריות לזה — לכל אחת יתרונות וחסרונות שחשוב להכיר.</p>
<table class="data-table"><tr><th>גישה</th><th>איך עובד</th><th>Payload</th><th>Streaming</th><th>שימוש</th></tr><tr><td>REST</td><td>HTTP verbs + URL resources</td><td>JSON (טקסט)</td><td>SSE נפרד</td><td>רוב APIs, simple, universal</td></tr><tr><td>GraphQL</td><td>Query language — בקש מה שצריך בדיוק</td><td>JSON</td><td>Subscriptions</td><td>Mobile apps, over-fetching בעיה</td></tr><tr><td>gRPC</td><td>Protocol Buffers על HTTP/2</td><td>Binary (קומפקטי)</td><td>מובנה</td><td>Microservices, מהיר פי 5-10</td></tr></table>
<p class="prose"><strong>REST</strong> — הגישה הנפוצה ביותר. <code>GET /users/1</code> מחזיר user. <code>POST /orders</code> יוצר הזמנה. ברור, readable, כולם יודעים. הבעיה: over-fetching — מקבלים 20 שדות כשצריך 3.</p>
<p class="prose"><strong>GraphQL</strong> — הלקוח שולח query מדויק ומקבל בדיוק מה שביקש. מיושם ב-GitHub API, Shopify, Twitter. הבעיה: caching מורכב, learning curve.</p>
<p class="prose"><strong>gRPC</strong> — Protocol Buffers הם schema מוגדר מראש שמסריאלז לbinary. Request שב-JSON היה 100 bytes — ב-Protobuf 15 bytes. פי 5-10 מהיר מREST. מיושם ב-Netflix, Google internal, Kubernetes. הבעיה: לא readable, דורש code generation.</p>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">gRPC .proto definition</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr">syntax = "proto3";

service UserService {
  rpc GetUser (UserRequest) returns (UserResponse);
  rpc StreamUsers (Empty) returns (stream UserResponse);   // Server streaming
}

message UserRequest { string user_id = 1; }
message UserResponse {
  string name  = 1;
  string email = 2;
  int32  age   = 3;
}</code></pre></div>




<div class="section-title">אבחון בעיות שכבת אפליקציה</div>
<table class="data-table"><tr><th>בעיה</th><th>אבחון</th><th>תיקון</th></tr><tr><td>404 בכל בקשה</td><td>curl -I URL</td><td>בדוק URL ונתיב בשרת</td></tr><tr><td>SSL Error</td><td>curl -v https://site.com</td><td>openssl s_client -connect site:443</td></tr><tr><td>CORS Error</td><td>Browser console</td><td>הוסף Access-Control-Allow-Origin header</td></tr><tr><td>401 לAPI</td><td>curl -v עם הtoken</td><td>בדוק Authorization: Bearer TOKEN</td></tr><tr><td>500 מהשרת</td><td>Server logs</td><td>journalctl -u nginx -f</td></tr><tr><td>Request timeout</td><td>curl --max-time 10 URL</td><td>בדוק latency, שרת עמוס</td></tr></table>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">curl — הswiss army knife לHTTP debug</span></div>
<pre class="code-block" dir="ltr" style="text-align:left;unicode-bidi:embed"><code dir="ltr"># בדיקת headers בלבד (HEAD request)

<div class="section-title">שאלות שנשאלות על HTTP</div>
<div class="callout note">📝 ❓ <strong>מה ההבדל בין 401 ל-403?</strong><br>401 = לא מזוהה (Unauthenticated) — צריך להתחבר תחילה. 403 = מזוהה אבל אין הרשאה (Unauthorized). הבדל עדין אבל חשוב.</div>
<div class="callout note">📝 ❓ <strong>מה Idempotent?</strong><br>פעולה שניתן לבצע פעמים רבות עם אותה תוצאה. GET, PUT, DELETE — idempotent. POST — לא (כל קריאה יוצרת resource חדש). חשוב לretry logic: מותר לretry idempotent בלבד.</div>
<div class="callout note">📝 ❓ <strong>מה ההבדל בין HTTP/1.1, HTTP/2, HTTP/3?</strong><br>HTTP/1.1: request אחד בפעם. HTTP/2: multiplexing — מרובה streams על TCP אחד, Header Compression. HTTP/3 (QUIC): על UDP, ללא Head-of-Line blocking, 0-RTT reconnect.</div>
<div class="callout note">📝 ❓ <strong>מה CORS?</strong><br>Cross-Origin Resource Sharing — מנגנון ב-browser שמונע מ-javascript.evil.com לקרוא נתונים מ-bank.com. השרת מוסיף header <code>Access-Control-Allow-Origin</code> כדי לאפשר לorigins ספציפיים לגשת.</div>




<div class="section-title">curl — לבדוק כל API מהטרמינל</div>
<div class="code-block" dir="ltr"><div class="code-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="code-title">curl — שליחת HTTP requests מהטרמינל</span></div>
<pre class="code-body" dir="ltr"><code dir="ltr">
# GET פשוט
curl https://api.github.com/users/torvalds

# ראה headers בלבד
curl -I https://google.com

# ראה headers + גוף
curl -v https://google.com 2>&1 | head -50

# POST עם JSON
curl -X POST https://httpbin.org/post   -H "Content-Type: application/json"   -d '{"name": "test", "value": 42}'

# עם authorization token
curl -H "Authorization: Bearer TOKEN"   https://api.example.com/data

# שמור תשובה לקובץ
curl -o output.json https://api.github.com/repos/torvalds/linux
</code></pre></div>
