  { cat: "0.0.0.0 ו-127.0.0.1", cat_en: "0.0.0.0 and 127.0.0.1", snip: null, q: "מה ההבדל בין 0.0.0.0 ל-127.0.0.1? למה השרת משתמש ב-0.0.0.0 והלקוח ב-127.0.0.1?", q_en: "What is the port number used for in TCP/IP?", a: ["0.0.0.0 = כל ממשק (bind לכל כתובת).", "0.0.0.0 = אינטרנט. 127.0.0.1 = LAN", "0.0.0.0 = IPv6. 127.0.0.1 = IPv4", "הם זהים, רק פורמט שונה"], a_en: ["Identifies which application (process) on the machine should receive the data.", "Identifies the physical network card.", "Determines the routing path to the destination.", "Indicates the packet size."], c: 0, e: "", e_en: "IP identifies the machine. Port identifies the application. 192.168.1.5:80 = port 80 on that machine = HTTP server. Multiple apps can run on same IP using different ports." },
  { cat: "server_socket vs client_socket", cat_en: "server_socket vs client_socket", snip: null, q: "מה ההבדל בין server_socket ל-client_socket בשרת?", q_en: "What is listen(backlog) and what does the backlog parameter mean?", a: ["server_socket = מאזין לחיבורים חדשים (bind/listen/accept).", "הם זהים, שמות שונים בלבד כך מוגדר בתקן.", "server_socket = UDP, client_socket = TCP", "server_socket = IPv6, client_socket = IPv4"], a_en: ["Puts socket in listening state.", "Number of bytes to receive per call.", "Number of seconds to wait for connection.", "Number of simultaneously open files."], c: 0, e: "", e_en: "listen(5) = accept up to 5 pending connections in the queue. If more arrive while server is busy with accept() — they wait up to the backlog limit then get refused." },
  { cat: "פורטים", cat_en: "Ports", snip: null, q: "לקוח מתחבר לשרת HTTP. מה פורט היעד? מה פורט המקור של הלקוח?", q_en: "What does s.send() return?", a: ["dst=80 (well-known HTTP).", "dst=443, src=80", "dst=8820, src=1024", "dst ו-src שניהם 80"], a_en: ["Number of bytes actually sent", "True/False indicating success.", "The server's response.", "Nothing (None)."], c: 0, e: "", e_en: "send() returns the number of bytes sent, which may be less than the full message (for large data). For guaranteed sending: use sendall() which loops internally until all data is sent." },
  { cat: "close()", cat_en: "close()", snip: null, q: "מה קורה אם לא קוראים ל-close() בסוף? מה הפתרון?", q_en: "What is the difference between SOCK_STREAM and SOCK_DGRAM?", a: ["הפורט נשאר 'תפוס'", "כלום, close() אופציונלי", "close() רק צריך ב-server_socket, לא ב-client_socket", "close() נקרא אוטומטית"], a_en: ["SOCK_STREAM = TCP (connection-based, reliable, ordered).", "STREAM is larger, DGRAM is smaller.", "STREAM is encrypted, DGRAM is not.", "They are the same, just different operating systems."], c: 0, e: "", e_en: "SOCK_STREAM (TCP): connect() + send() + recv(). SOCK_DGRAM (UDP): sendto() + recvfrom() — no connection needed. UDP is used for DNS, VoIP, gaming." },
  { cat: "asyncio", cat_en: "asyncio", snip: null, q: "מפתח מריץ שרת Python שמשתמש ב-Thread לכל לקוח. עם 10,000 לקוחות השרת קורס. מה הפתרון?", q_en: "Developer runs Python server using Thread per client. With 10,000 clients server crashes. Solution?", a: ["החלף ל-asyncio או select() — event loop מטפל במיליון לקוחות בthread אחד ב-KB", "הוסף יותר RAM — Thread ב-MB צריך זיכרון רב — אינו הגורם", "הגדל מספר Threads ל-100,000 — לא הפתרון", "עבור ל-UDP שלא צריך connections — שגוי"], a_en: ["Switch to asyncio or select() — event loop handles million clients in one thread in KB", "Add more RAM — Thread in MB needs lots of memory", "Increase Threads to 100,000", "Switch to UDP which needs no connections"], c: 0, e: "Thread per client: 8MB × 10,000 = 80GB RAM. asyncio/select(): coroutines ב-KB, epoll O(1). nginx, Node.js, FastAPI — כולם event loop.", e_en: "Thread per client: 8MB × 10,000 = 80GB RAM. asyncio/select(): coroutines in KB, epoll O(1). nginx, Node.js, FastAPI — all event loop." },
  { cat: "WebSockets", cat_en: "WebSockets", snip: null, q: "אפליקציית real-time dashboard צריכה עדכוני מחירי מניות כל שנייה. מדוע WebSocket עדיף על polling?", q_en: "Real-time dashboard app needs stock price updates every second. Why WebSocket beats polling?", a: ["WebSocket = חיבור פתוח קבוע — server דוחף עדכון מיידי. Polling = client שואל כל שנייה = 86,400 requests ביום", "WebSocket מהיר יותר כי משתמש ב-UDP — אינו הגורם", "Polling מוגבל ל-10 requests בדקה על ידי דפדפנים — לא הפתרון", "WebSocket תומך ב-IPv6, Polling לא — שגוי"], a_en: ["WebSocket = persistent open connection — server pushes update immediately. Polling = client asks every second = 86,400 requests/day", "WebSocket faster because it uses UDP", "Polling limited to 10 requests per minute by browsers", "WebSocket supports IPv6, Polling does not"], c: 0, e: "Polling: עומס מיותר + latency = זמן בין requests. WebSocket Handshake פעם אחת → connection פתוח → server דוחף בזמן אמת. Slack, Trading platforms, WhatsApp Web.", e_en: "Polling: unnecessary load + latency = time between requests. WebSocket Handshake once → open connection → server pushes in real time. Slack, Trading platforms, WhatsApp Web." },
  { cat: "listen() — פרמטר", cat_en: "listen() — parameter", snip: null, q: "מה הפרמטר של listen() מגדיר?", q_en: "How does s.connect() initiate a TCP handshake?", a: ["תור ההמתנה — כמה לקוחות יכולים לחכות בתור לפני", "מספר הפורטים שיאזינו כך מוגדר בתקן.", "מספר שניות ל-timeout בדרך כלל בסביבת production.", "מספר הבתים שניתן לקבל בהתאם לפרוטוקול."], a_en: ["Sends SYN. Server responds SYN+ACK.", "Sends a plain 'hello' message.", "Checks if the port is open without connecting.", "Sends UDP packet to test the path."], c: 0, e: "", e_en: "connect() internally: OS sends SYN — waits for SYN+ACK — sends ACK. All 3 steps are automatic. If no SYN+ACK within timeout — ConnectionRefusedError or TimeoutError." },
  { cat: "שרת הדים", cat_en: "Echo Server", snip: null, q: "מה שרת הדים (echo server) עושה? איך מממשים אותו?", q_en: "What is the UnicodeDecodeError when working with sockets?", a: ["מחזיר כל מידע שמקבל בחזרה ללקוח.", "מחזיר תמיד 'Hello World'", "מדפיס למסך ולא שולח חזרה", "מצפין ומחזיר בהתאם לפרוטוקול."], a_en: ["recv() returns bytes, not string.", "The IP address is invalid.", "The port is above 65535.", "The server sent non-ASCII characters."], c: 0, e: "", e_en: "Python sockets work with bytes. send() requires bytes: b'hello' or 'hello'.encode(). recv() returns bytes: must decode() to get string. Always specify encoding: 'utf-8'." },
  { cat: "סיכום — שרת vs לקוח", cat_en: "Summary — Server vs Client", snip: null, q: "אילו פונקציות שייכות ללקוח בלבד? אילו לשרת בלבד? אילו לשניהם?", q_en: "What is the maximum valid port number and why?", a: ["לקוח בלבד: connect().", "לקוח: bind, listen. שרת: connect", "הכל לשניהם", "לקוח: accept(). שרת: connect()"], a_en: ["65535 — because the port field in TCP/UDP header is 16", "1024 — system limit.", "9999 — arbitrary convention.", "No limit — determined by OS."], c: 0, e: "", e_en: "Port is 16 bits in TCP/UDP header — 0-65535. Ports 0-1023 = Well-Known (require root). 1024-49151 = Registered. 49152-65535 = Dynamic/Ephemeral (clients use these)." },
  ],
  3: [
  { cat: "מודל שכבות - למה", cat_en: "Layer Model — Why", snip: null, q: "מדוע נוצר מודל השכבות לרשתות? איזו בעיה הוא בא לפתור?", q_en: "What is the OSI model? How many layers does it have?", a: ["כל יצרן פיתח פרוטוקול קנייני משלו ומכשירים של יצרנים שונים לא יכלו לתקשר.", "רשתות היו איטיות מדי, המודל חולק את העבודה בין שכבות להאצה", "הממשלות דרשו תקינה כדי לגבות מסים על תעבורת רשת", "בעיות אבטחה בפרוטוקולים ישנים גרמו להאקרים לפרוץ לכל מחשב"], a_en: ["A 7-layer theoretical framework for network communication.", "A 4-layer protocol used in the internet.", "A programming language for networks.", "A hardware standard for network cards."], c: 0, e: "בפרק: יצרניות שיווקו מכשירים שתומכים רק בתקן שלהן, ולקוחות היו מחויבים לאותה יצרנית. ISO יצר את מודל OSI כדי לסטנדרטיז ולאפשר לכל מכשיר לדבר עם כל מכשיר אחר.", e_en: "OSI: 7 layers — Physical, Data Link, Network, Transport, Session, Presentation, Application. TCP/IP model: 5 layers. OSI is theoretical; TCP/IP is practical." },
  { cat: "מודל שכבות - עיקרון", cat_en: "Layer Model — Principle", snip: null, q: "מהו העיקרון המרכזי של מודל שכבות? מה מסתירה כל שכבה מהשכבה שמעליה?", q_en: "What is the role of the Network (Layer 3) layer?", a: ["כל שכבה מספקת שירות לשכבה שמעליה מבלי לחשוף את האופן שבו", "כל שכבה מצפינה את הנתונים לפני העברה לשכבה הבאה", "כל שכבה בודקת שגיאות ושולחת שוב אם הנתונים פגומים", "כל שכבה מחכה לאישור מהשכבה שמתחתיה לפני המשך"], a_en: ["End-to-end addressing and routing using IP addresses.", "Physical transmission of bits over cable.", "Reliable data transfer between adjacent nodes.", "User interface and application protocols like HTTP."], c: 0, e: "בפרק: כמו שכבת השערים בשדה התעופה לא יודעת אם הנוסע הגיע ברכב או אוטובוס, כל שכבה לא מתעניינת במימוש של השכבות שמתחתיה. כל עוד השירות מסופק, המימוש יכול להשתנות ללא השפעה.", e_en: "Layer 3 adds IP header (src IP, dst IP, TTL, protocol). Routers operate at Layer 3. IP addresses identify end devices; MAC addresses identify adjacent hops." },
  { cat: "5 השכבות - זיהוי", cat_en: "5 Layers — Identification", snip: null, q: "פקטה TCP/IP נשלחת. שכבה 3 מוסיפה Header. מה מכיל ה-Header של שכבה 3?", q_en: "What is Wireshark used for?", a: ["כתובות IP של מקור ויעד - כי שכבה 3 (Network)", "פורטים TCP - כי צריך לזהות את האפליקציה", "כתובות MAC - כי אלו הכתובות של שכבת הקו", "שם הפרוטוקול בלבד - HTTP, FTP וכו'"], a_en: ["Packet capture and analysis tool", "A firewall that blocks malicious traffic.", "A tool for testing website performance.", "A network configuration manager."], c: 0, e: "שכבה 3 (Network / IP) אחראית על ניתוב בין רשתות. ה-Header שלה מכיל IP מקור ויעד. שכבה 4 (Transport) מוסיפה פורטים. שכבה 2 (Data Link) מוסיפה MAC. כל שכבה מוסיפה Header בראש הפקטה.", e_en: "Wireshark = packet sniffer. Puts NIC in promiscuous mode — captures all frames — displays decoded protocol layers. Used for debugging, learning, and security analysis." },
  { cat: "Encapsulation", cat_en: "Encapsulation", snip: null, q: "מה זה Encapsulation (כימוס) ומה ה-Decapsulation? היכן כל תהליך מתרחש?", q_en: "What is Encapsulation in the OSI model?", a: ["Encapsulation = כל שכבה עוטפת את הנתונים בשולח.", "Encapsulation = הצפנת הנתונים. Decapsulation = פענוח אצל הנמען", "שניהם מתרחשים על אותו מחשב, זה תהליך דחיסה ופריסה", "Encapsulation = חלוקה לפקטות. Decapsulation = איחוד פקטות בסוף"], a_en: ["Each layer adds its own header to the data from the layer above.", "Encrypting data at the Application layer.", "Compressing data to reduce size.", "Converting data between different formats."], c: 0, e: "בפרק: Encapsulation בשולח - כל שכבה מוסיפה Header (כמו חבילה עוברת שמקבלת עוד שכבת עטיפה). Decapsulation ביעד - קולפים שכבה אחרי שכבה מלמטה למעלה. השכבה הפיזית היא הכבל עצמו.", e_en: "HTTP data — Transport adds TCP header — Network adds IP header — Data Link adds Ethernet header — Physical sends bits. Each 'wraps' the previous = encapsulation." },
  { cat: "פרוטוקול", cat_en: "Protocol", snip: null, q: "מהו פרוטוקול ומדוע הוא הכרחי בתקשורת רשתות?", q_en: "In Wireshark: what does a filter like 'http' or 'tcp.port==80' do?", a: ["הסכם שמחייב שני צדדים לסט כללים על פורמט התקשורת -", "תוכנה שמתרגמת בין שפות תכנות שונות (Python, Java, C++)", "חומרה שמחברת בין כרטיסי רשת שונים", "מסמך משפטי שמגדיר מי אחראי כשהתקשורת נכשלת"], a_en: ["Shows only packets matching the filter", "Blocks the specified traffic.", "Saves only the filtered packets to disk.", "Decrypts the filtered packets."], c: 0, e: "בפרק: בלי פרוטוקולים - מגדל בבל שבו כל רכיב מדבר שפה שלו. HTTP הוא פרוטוקול שמגדיר איך דפדפן מדבר עם שרת. גם הפרוטוקול שכתבתם בתרגיל 2.6 (4 בתים לפקודה) הוא פרוטוקול.", e_en: "Wireshark display filters (not capture filters) hide non-matching packets. 'http' = HTTP only. 'ip.addr==8.8.8.8' = traffic to/from that IP. 'tcp.port==443' = HTTPS." },
  { cat: "מדוע פקטות?", cat_en: "Why Packets?", snip: null, q: "למה מידע מחולק לפקטות ולא נשלח כרצף ביטים רציף אחד? ציינו שתי סיבות מהפרק.", q_en: "What is the role of the Transport layer (Layer 4)?", a: ["1) בקרת שגיאות טובה יותר - שולחים רק פקטה פגומה מחדש. 2) שיתוף הקו בין כמה תוכניות במקביל", "1) פקטות קטנות מהירות יותר מרצף ארוך. 2) הצפנה קלה יותר על פקטות קטנות", "1) חסכון בזיכרון. 2) יכולת לשלוח לכמה יעדים שונים בו זמנית", "1) תקן ISO מחייב. 2) כרטיסי רשת לא יכולים לשלוח יותר מ-1500 בתים ברצף"], a_en: ["Process-to-process communication using port numbers.", "IP routing between networks.", "Physical bit transmission.", "Encryption and compression."], c: 0, e: "בפרק: 3 סיבות עיקריות. (1) שגיאה? שולחים רק את הפקטה הפגומה ולא הכל מחדש. (2) כמה תוכניות משתפות את הקו - בסוף כל פקטה מישות אחרת יכולה לשלוח. (3) סנכרון חומרה קל יותר.", e_en: "Layer 4 adds ports (src port, dst port) to identify which application gets the data. TCP = reliable, ordered, with handshake. UDP = connectionless, faster, no guarantee." },
  { cat: "Wireshark - Display Filter", cat_en: "Wireshark - Display Filter", snip: null, q: "מה יציג הפילטר הזה ב-Wireshark? מה ההבדל בין ip.src לבין ip.addr?", q_en: "What is the difference between a capture filter and a display filter in Wireshark?", a: ["פקטות שכתובת IP שלהן (מקור או יעד) היא 192", "רק פקטות שיצאו מ-192.168.1.1 לפורט 80 - ip.src ו-ip.addr זהים", "פקטות HTTP בלבד מ-192.168.1.1, כי פורט 80 = HTTP", "כל פקטות ה-TCP ברשת שמגיעות לכתובת זו"], a_en: ["Capture filter: decides what to capture (BPF syntax, e.g.", "No difference — both do the same thing.", "Capture filter is for saving, display filter is for printing.", "Display filter works in real-time, capture filter works on files."], c: 0, e: "ip.addr == X מציג פקטות שבהן X הוא מקור OR יעד. ip.src == X = רק אם X הוא השולח. ip.dst == X = רק אם X הוא המקבל. tcp.port == 80 = פורט 80 בצד כלשהו (מקור או יעד).", e_en: "Capture filter (BPF): set before capture, reduces what's saved. Display filter: applied after capture, doesn't delete data. For learning: capture all, filter display." },
  { cat: "Wireshark - Capture vs Display", cat_en: "Wireshark - Capture vs Display", snip: null, q: "מה ההבדל בין Display Filter לבין Capture Filter ב-Wireshark?", q_en: "What is the role of the Data Link layer (Layer 2)?", a: ["Display Filter משפיע על תצוגה בלבד, פקטות שנסוננו עדיין קיימות.", "הם זהים לחלוטין, רק נמצאים בתפריטים שונים", "Capture Filter מהיר יותר כי הוא פועל בתוכנה, Display Filter פועל בחומרה", "Display Filter ל-TCP בלבד, Capture Filter ל-UDP בלבד"], a_en: ["Frame-to-frame transfer between adjacent nodes using MAC addresses.", "End-to-end routing across the internet.", "Managing application sessions.", "Translating DNS names to IPs."], c: 0, e: "בפרק: Display Filter = סינון תצוגה - פקטות מוסתרות אך קיימות, אפשר לשנות בכל עת. Capture Filter = פועל ב-Driver (מערכת הפעלה) - פקטות שלא עוברות הפילטר לא נקלטות בכלל. Capture Filter מהיר יותר.", e_en: "Layer 2: Ethernet frames, MAC addresses, switches. MAC only identifies the NEXT hop. Routers replace src/dst MAC at each hop while IP stays constant." },
  { cat: "Wireshark ממשק", cat_en: "Wireshark Interface", snip: null, q: "Wireshark מציג 4 אזורים מרכזיים. מה תפקיד ה-Packet Details pane?", q_en: "Wireshark shows 4 main areas. What is the role of the Packet Details pane?", a: ["מציג את כל השכבות של ה-packet הנבחר", "מציג רשימת כל ה-packets שנתפסו עם זמן, IP, פרוטוקול", "מציג את ה-bytes הגולמיים ב-hexadecimal", "מציג גרף של קצב ה-traffic לאורך זמן"], a_en: ["Shows all layers of the selected packet", "Shows list of all captured packets with time, IP, protocol", "Shows raw bytes in hexadecimal", "Shows a graph of traffic rate over time"], c: 0, e: "Wireshark: 1) Packet List (רשימה) 2) Packet Details (שכבות מפורטות) 3) Packet Bytes (hex) 4) Filter bar. ה-Details pane = לחץ על▶ Ethernet — IP — TCP — HTTP ורואים כל שדה.", e_en: "Wireshark: 1) Packet List 2) Packet Details (detailed layers) 3) Packet Bytes (hex) 4) Filter bar. Details pane = click ▶ Ethernet — IP — TCP — HTTP and see every field." },
  { cat: "Wireshark - Promiscuous Mode", cat_en: "Wireshark - Promiscuous Mode", snip: null, q: "מה זה Promiscuous Mode ('מצב פרוץ') ב-Wireshark? מה רואים בו שלא רואים בלעדיו?", q_en: "In which layer does IP operate? What does it add?", a: ["כרטיס הרשת קולט את כל המסגרות שרואה ולא רק אלו המיועדות אליו - רואים גם תעבורה של", "מצב שמאפשר לשלוח פקטות מזויפות ברשת לצרכי בדיקה כך מוגדר בתקן.", "מצב מהיר יותר שמסנן פקטות בחומרה לפני שמגיעות לתוכנה", "הצפנת ההסנפה כדי שאחרים לא יוכלו לקרוא את הקבצים"], a_en: ["Layer 3 — Network. Adds IP header: src IP, dst IP, TTL,", "Layer 2 — adds MAC address. as defined in the standard.", "Layer 4 — adds port numbers. typically in production environments.", "Layer 7 — adds HTTP headers. according to the protocol."], c: 0, e: "בפרק: ב-Promiscuous Mode כרטיס הרשת קולט כל מסגרת שרואה, גם כאלו שלא מיועדות למחשב שלנו. בלי מצב זה, הכרטיס זורק מסגרות לא עבורו. מצב זה הכרחי לסנפה אמיתית ברשת.", e_en: "IP Header: 20+ bytes. Key fields: src/dst IP (4 bytes each), TTL (1 byte — decremented per hop), Protocol (1 byte — identifies next layer), Checksum." },
  { cat: "Follow TCP Stream", cat_en: "Follow TCP Stream", snip: null, q: "מה רואים בחלון Follow TCP Stream ב-Wireshark? מה ה'קסם' שהוא מאפשר?", q_en: "What is the 5-layer TCP/IP model?", a: ["רק את ה-Data של שכבת האפליקציה ללא כל ה-Headers -", "את כל הפקטות הגולמיות כולל כל ה-Headers של כל השכבות", "גרף שמציג את קצב ההעברה לאורך זמן", "רשימת כל ה-TCP connections שנפתחו ונסגרו"], a_en: ["Physical, Data Link, Network, Transport, Application", "Application, Presentation, Session, Transport, Network, Data Link, Physical — the theoretical OSI model.", "TCP, UDP, IP, Ethernet, WiFi.", "Client, Server, Router, Switch, Hub."], c: 0, e: "בפרק תרגיל 3.4: Follow TCP Stream מפלטר את כל הפקטות של אותו Socket ומציג רק את ה-Data (שכבה 5) ללא Headers. אדום = Client→Server, כחול = Server→Client. ניתן לזהות את הפרוטוקול שכתבתם.", e_en: "TCP/IP (5 layers): Application (HTTP/DNS), Transport (TCP/UDP), Network (IP), Data Link (Ethernet/WiFi), Physical (cables/signals). OSI adds Session+Presentation between Transport and Application." },
  { cat: "HTTP vs HTTPS", cat_en: "HTTP vs HTTPS", snip: null, q: "מדוע סיסמה שנשלחת ב-HTTP (לא HTTPS) ניתנת ליירוט? מה מגן עלינו כיום?", q_en: "Why can a password sent over HTTP (not HTTPS) be intercepted? What protects us today?", a: ["HTTP = plain text, Wireshark רואה הכל", "HTTP מוגן כי נשלח על port 80 שהוא well-known ומוגן", "הסיסמה תמיד מוצפנת לפני שליחה, ללא קשר ל-HTTP/HTTPS", "רק ISP יכול ליירט HTTP, לא משתמשים רגילים"], a_en: ["HTTP = plain text, Wireshark sees everything", "HTTP is protected because it uses well-known port 80", "Passwords are always encrypted before sending, regardless of HTTP/HTTPS", "Only ISPs can intercept HTTP, not regular users"], c: 0, e: "HTTP שולח הכל כטקסט גלוי — כל מי שמריץ Wireshark ברשת יכול לקרוא. HTTPS = TLS מוסיף שכבת הצפנה. גם אם תופסים packets, מקבלים noise מוצפן ולא תוכן.", e_en: "HTTP sends everything as plain text — anyone running Wireshark on the network can read it. HTTPS = TLS adds encryption layer. Even if packets captured, you get encrypted noise, not content." },
  ],
  4: [
  { cat: "HTTP Request", cat_en: "HTTP Request", snip: null, q: "מה שלושת חלקי HTTP Request ומה תפקיד השורה הריקה?", q_en: "What are the three parts of an HTTP Request and what is the blank line for?", a: ["Request Line (Method+URL+Version), Headers (מידע נוסף), Body (נתונים ב-POST). שורה ריקה = מפרידה Headers מ-Body", "Method, URL, Body. שורה ריקה = סיום הבקשה — אינו הגורם", "Host, Port, Path. שורה ריקה = מתחיל TLS — לא הפתרון", "Version, Status, Headers. שורה ריקה = מתחיל data — שגוי"], a_en: ["Request Line (Method+URL+Version), Headers (extra info), Body (data in POST). Blank line = separates Headers from Body", "Method, URL, Body. Blank line = end of request", "Host, Port, Path. Blank line = starts TLS", "Version, Status, Headers. Blank line = starts data"], c: 0, e: "HTTP Request: 1) \"GET /path HTTP/1.1\" 2) Headers: Host, User-Agent, Accept... 3) (שורה ריקה) 4) Body (ב-POST בלבד). שורה ריקה = signal לשרת שHeaders נגמרו.", e_en: "HTTP Request: 1) \"GET /path HTTP/1.1\" 2) Headers: Host, User-Agent, Accept... 3) (blank line) 4) Body (POST only). Blank line = signal to server that Headers ended." },
  { cat: "HTTP Response", cat_en: "HTTP Response", snip: null, q: "HTTP Response מגיע עם Status Code 200 ו-Content-Type: text/html. מה זה אומר ללקוח?", q_en: "HTTP Response arrives with Status Code 200 and Content-Type: text/html. What does this tell the client?", a: ["200 = הצלחה, הבקשה טופלה. Content-Type: text/html = הBody הוא HTML — הדפדפן יפרש ויצג", "200 = ה-URL השתנה, יש redirect. Content-Type = encoding", "200 = בקשה נשלחה בהצלחה. Content-Type = גודל ה-response", "200 = Server מוכן. Content-Type = authentication method"], a_en: ["200 = success, request handled. Content-Type: text/html = Body is HTML — browser will parse and display", "200 = URL changed, there is redirect. Content-Type = encoding", "200 = request sent successfully. Content-Type = response size", "200 = Server ready. Content-Type = authentication method"], c: 0, e: "Status Line: HTTP/1.1 200 OK. Content-Type: text/html אומר לClient איך לפרש את הBody. text/json → parse כJSON. image/png → הצג תמונה.", e_en: "Status Line: HTTP/1.1 200 OK. Content-Type: text/html tells Client how to interpret Body. text/json → parse as JSON. image/png → display image." },
  { cat: "Status Codes", cat_en: "Status Codes", snip: null, q: "מה קוד 200, 301, 404 ו-500 אומרים? לאיזה קטגוריה כל אחד שייך?", q_en: "What does HTTP status code 404 mean? What about 200 and 500?", a: ["200=OK (2xx הצלחה), 301=Moved Permanently (3xx הפניה), 404=Not", "200=שגיאה, 301=הצלחה, 404=הפניה, 500=לא נמצא", "200=פקטה קטנה, 301=פקטה בינונית, 404=פקטה גדולה, 500=פקטה שנאבדה", "כולם קודי הצלחה, המספר מייצג זמן תגובה במילישניות"], a_en: ["404 = Not Found (resource doesn't exist).", "404 = server down. 200 = redirect. 500 = client error.", "All three mean success but for different request types.", "404 = timeout. 200 = empty response. 500 = connection refused."], c: 0, e: "בפרק: 2xx=הצלחה. 3xx=הפניה. 4xx=שגיאת לקוח (הלקוח ביקש משהו שגוי). 5xx=שגיאת שרת (הסרת תקין אבל השרת נשבר). 200=OK, 301=הועבר לצמיתות, 302=הועבר זמנית, 403=אסור, 404=לא נמצא, 500=תקלה פנימית.", e_en: "2xx = success (200 OK). 3xx = redirect (301 Moved, 302 Found). 4xx = client error (400 Bad Request, 401 Unauthorized, 403 Forbidden, 404 Not Found). 5xx = server error." },
  { cat: "Status Codes", cat_en: "Status Codes", snip: null, q: "מה הלקוח עושה כשמקבל 301 Moved Permanently? מה ההבדל מ-302?", q_en: "What is the difference between HTTP/1.0 and HTTP/1.1?", a: ["301: הדפדפן שולח בקשה חדשה לכתובת ב-Location ושומר בcache לתמיד.", "301: מציג שגיאה. 302: מנסה שוב אחרי דקה", "301: מוחק את הקובץ מהשרת. 302: מוחק זמנית", "הם זהים, רק המספר שונה לצורכי תאימות בהתאם לפרוטוקול."], a_en: ["HTTP/1.0: new TCP connection per request (closed after each response).", "HTTP/1.1 is encrypted, HTTP/1.0 is not. as defined in the standard.", "HTTP/1.0 supports cookies, HTTP/1.1 does not.", "No practical difference. according to the protocol."], c: 0, e: "בפרק: 301 Moved Permanently = הדפדפן יזכור לתמיד שהכתובת שינתה, לא יחזור לכתובת המקורית. גם Google מעביר PageRank. 302 = הפניה זמנית, הדפדפן יבדוק שוב בפעם הבאה. שניהם שולחים Location Header עם הכתובת החדשה.", e_en: "HTTP/1.0: every request = new TCP handshake (slow). HTTP/1.1: persistent connection + pipelining. HTTP/2: multiplexing (multiple requests over one connection simultaneously)." },
  { cat: "GET vs POST", cat_en: "GET vs POST", snip: null, q: "מדוע לא ניתן להעלות תמונה של 1MB ב-GET? מה ההבדל המהותי בין GET ל-POST?", q_en: "What does the HTTP Host header do?", a: ["GET מעביר מידע ב-URL (מוגבל ל~2000 תווים).", "GET מהיר, POST איטי. 1MB לוקח יותר מדי זמן ב-GET", "GET מוצפן, POST לא. תמונות חייבות שידור לא מוצפן", "GET לשרת, POST ללקוח. תמונות תמיד נשלחות מלקוח ללקוח"], a_en: ["Tells the server which website the client wants", "Provides the client's IP address.", "Specifies the content type of the request.", "Indicates the HTTP version used."], c: 0, e: "בפרק: אורך URL מקסימלי בדפדפנים = 2000 תווים. GET parameters עוברים ב-URL. תמונה של 1MB = מיליון בתים. לכן Facebook משתמש ב-POST שמעביר את התמונה ב-Body של הבקשה, בלי הגבלת גודל.", e_en: "One server IP can host thousands of sites. Host: google.com tells the server which site is requested. Without Host header, HTTP/1.1 returns 400 Bad Request." },
  { cat: "GET Parameters", cat_en: "GET Parameters", snip: null, q: "כיצד מעבירים כמה פרמטרים בבקשת GET? מה תפקיד ? ו-&?", q_en: "What is the difference between HTTP and HTTPS?", a: ["? מפריד בין הנתיב לפרמטרים הראשון.", "? = סוף URL, & = הצפנה, = = השמה לכתובת IP", "? = מצביע על GET, & = AND בין שאילתות SQL", "& = תחילת URL, ? = תחילת פרמטרים, = = header"], a_en: ["HTTP: plaintext, port 80, no authentication.", "HTTPS is faster than HTTP.", "HTTP uses TCP, HTTPS uses UDP.", "HTTPS only works for websites, not APIs."], c: 0, e: "בפרק: ? מפריד בין הנתיב לבין פרמטרי הבקשה. & מפריד בין פרמטרים. כל פרמטר: name=value. דוגמה מגוגל: GET /search?q=python HTTP/1.1. מרובה: ?q=obama&mode=users&lang=en.", e_en: "HTTPS = HTTP + TLS layer. TLS: encrypts data (confidentiality), validates server identity (certificate), ensures integrity (HMAC). Modern browsers block HTTP for sensitive data." },
  { cat: "HTTP Headers", cat_en: "HTTP Headers", snip: null, q: "מה תפקיד HTTP Headers? מי יכול לשלוח אותם — לקוח, שרת, או שניהם?", q_en: "What is Root Directory in an HTTP server?", a: ["Headers מכילים מטא-מידע על הבקשה/תגובה.", "Headers מצפינים את ה-Body. רק הלקוח שולח אותם", "Headers הם רק לצורכי debugging. השרת מתעלם מהם", "Headers מחליפים את ה-Body בבקשות קטנות. השרת שולח אותם בלבד"], a_en: ["The base folder the programmer defined as the website's root.", "The system's root directory (C:\\ or /).", "A special admin folder.", "The server's log directory."], c: 0, e: "בפרק: Headers = שדות מידע נוספים מעבר לתוכן. פורמט: name: value. חלק רק בבקשה: Accept (מה הלקוח מוכן לקבל), Accept-Language. חלק רק בתגובה: Server (סוג השרת). חלק בשניהם: Content-Length, Content-Type.", e_en: "If root = C:\\wwwroot: GET /page.html — C:\\wwwroot\\page.html. GET / — C:\\wwwroot\\index.html. Security: server must prevent access above root (path traversal attacks)." },
  { cat: "שרת HTTP", cat_en: "HTTP Server", snip: null, q: "מה ההבדל בין שרת HTTP סטטי לדינמי? מה יחזיר כל אחד לבקשת /time?", q_en: "What is the difference between static and dynamic HTTP server? What does each return for /time request?", a: ["סטטי: מחזיר קובץ קבוע מהדיסק", "סטטי: מהיר יותר כי ב-RAM. דינמי: מחשב תמיד מחדש", "סטטי: HTTP/1.1. דינמי: חייב HTTP/2", "אין הבדל — שניהם מחזירים HTML"], a_en: ["Static: returns fixed file from disk", "Static: faster because in RAM. Dynamic: always recomputes", "Static: HTTP/1.1. Dynamic: must use HTTP/2", "No difference — both return HTML"], c: 0, e: "שרת סטטי: מגיש קבצים (HTML, CSS, images) כמות שהם. שרת דינמי: מריץ קוד Python/Node/PHP ויוצר תוכן בזמן ריצה. /time = רק שרת דינמי יכול להחזיר את השעה הנוכחית.", e_en: "Static server: serves files (HTML, CSS, images) as-is. Dynamic server: runs Python/Node/PHP code and generates content at runtime. /time = only dynamic server can return current time." },
  { cat: "URL ו-Root", cat_en: "URL and Root Directory", snip: null, q: "מה זה Root Directory? כשלקוח מבקש / (slash בודד) — מה השרת מחזיר?", q_en: "What is Content-Type header used for?", a: ["תיקיית הבסיס של השרת. / = עמוד הבית (index.html בדרך כלל)", "תיקיית המשתמש הנוכחי. / = תיקיית C:\\\\", "תיקיית המערכת. / = הגדרות Windows בדרך כלל בסביבת production.", "כל הדיסק. / = רשימת כל הקבצים בשרת"], a_en: ["Tells receiver the type of data in the body: text/html,", "Specifies the content length in bytes.", "Indicates the HTTP version. typically in production environments.", "Specifies the compression method."], c: 0, e: "בפרק: Root Directory = תיקייה שהמתכנת הגדיר כבסיס האתר (למשל C:\\\\wwwroot). בקשה ל /page.html ← C:\\\\wwwroot\\\\page.html. בקשה ל / (ללא נתיב ספציפי) = השרת מחזיר עמוד ברירת מחדל, לרוב index.html.", e_en: "Content-Type: tells how to interpret the body. application/json — parse as JSON. text/html — render as webpage. multipart/form-data — file upload. Without it, browser guesses (MIME sniffing)." },
  { cat: "HTTP ב-Wireshark", cat_en: "HTTP in Wireshark", snip: null, q: "מה packet הראשון שנשלח כשדפדפן פונה ל-http://example.com? מה הפרוטוקול?", q_en: "What is the first packet sent when a browser connects to http://example.com? What protocol?", a: ["DNS Query (UDP:53) — לשאול \"מה ה-IP של example.com?\"", "TCP SYN — פתיחת חיבור ל-port 80", "HTTP GET / — בקשת דף הבית", "ARP — לשאול \"מה ה-MAC של example.com?\""], a_en: ["DNS Query (UDP:53) — asking \"what is the IP of example.com?\"", "TCP SYN — opening connection to port 80", "HTTP GET / — requesting the home page", "ARP — asking \"what is the MAC of example.com?\""], c: 0, e: "הסדר: 1) ARP לGateway (אם MAC לא ידוע) 2) DNS Query לשרת DNS 3) DNS Response עם IP 4) TCP SYN לשרת 5) TCP SYN-ACK 6) TCP ACK 7) HTTP GET /. DNS תמיד לפני HTTP.", e_en: "Order: 1) ARP to Gateway (if MAC unknown) 2) DNS Query to DNS server 3) DNS Response with IP 4) TCP SYN to server 5) TCP SYN-ACK 6) TCP ACK 7) HTTP GET /. DNS always before HTTP." },
  { cat: "DNS", cat_en: "DNS", snip: null, q: "מה ההבדל בין DNS record מסוג A לבין CNAME? מאיפה הדפדפן יודע לאיפה לשלוח HTTP?", q_en: "What is the HTTP request format?", a: ["A: שם דומיין — כתובת IPv4. CNAME: שם — שם אחר (alias).", "A: IPv4. CNAME: IPv6. הדפדפן שואל Router ישירות", "A: Mail server. CNAME: Web server. הדפדפן שואל Google DNS בלבד", "הם זהים. הדפדפן מנחש את ה-IP לפי שם הדומיין"], a_en: ["Method URL HTTP/version\\r\\nHeaders\\r\\n\\r\\nBody.", "JSON object with method, url, headers, body.", "Binary format with length prefix.", "Same as email format."], c: 0, e: "בפרק: DNS A record = שם — IP. CNAME = alias (www.site.com — site.com). כל גלישה: תחילה שאילתת DNS לשרת DNS (UDP:53) ← מקבל IP ← שולח HTTP לאותו IP. פרוטוקול DNS עובד על UDP פורט 53.", e_en: "HTTP request: line 1 = method + URL + version. Then headers (key: value). Blank line (\\r\\n\\r\\n) separates headers from body. GET has no body; POST/PUT have body." },
  { cat: "POST vs GET", cat_en: "POST vs GET", snip: null, q: "אתר חדשות מאפשר שליחת תגובה לכתבה. מדוע זה POST ולא GET?", q_en: "A news site allows submitting a comment. Why is this POST and not GET?", a: ["POST שולח נתונים בגוף הבקשה (לא ב-URL)", "POST מהיר יותר כי URL קצר יותר", "POST מוצפן יותר מ-GET", "GET מוגבל לתוכן סטטי בלבד"], a_en: ["POST sends data in request body (not URL)", "POST is faster because URL is shorter", "POST is more encrypted than GET", "GET is limited to static content only"], c: 0, e: "GET: נתונים ב-URL, מוגבל ל-~2KB, נשמר ב-history. POST: נתונים ב-body, ללא הגבלה, לא ב-URL. תגובה = נתונים שמשנים state בשרת — POST הוא הנורמה.", e_en: "GET: data in URL, limited to ~2KB, saved in history. POST: data in body, no limit, not in URL. Comment = data that changes server state — POST is the norm." },
  ],
  5: [
  { cat: "Scapy בסיס", cat_en: "Scapy Basics", snip: null, q: "מה ההבדל בין Sockets ל-Scapy? מה Scapy מאפשרת שSockets לא מאפשרת?", q_en: "What is Scapy and why does it require root permissions?", a: ["Sockets לשכבת אפליקציה בלבד", "Sockets מהיר יותר. Scapy איטי ולכן לא מומלץ בפרודקשן", "Sockets ל-TCP. Scapy ל-UDP בלבד", "הם זהים, Scapy היא רק ממשק גרפי ל-Sockets"], a_en: ["A Python library for building and sending raw packets at any layer.", "A network monitoring tool that only reads traffic.", "A Python web framework.", "A firewall management tool."], c: 0, e: "בפרק: Sockets = שכבת אפליקציה (Layer 5). Scapy = עובדת מעל Python ומאפשרת גישה לשכבות נמוכות: לבנות פקטת IP ידנית, לשנות TTL, לשלוח Ethernet frame, להסניף ולנתח DNS/HTTP ברמת שדה.", e_en: "Scapy = craft any packet at any layer (L2-L7). Root required for: raw socket creation (bypasses OS TCP stack), sending custom Ethernet frames, capturing all traffic." },
  { cat: "sniff()", cat_en: "sniff()", snip: null, q: "מה עושה sniff()? למה היא blocking וזה חשוב?", q_en: "What does the / operator do in Scapy?", a: ["מסניפה פקטות מהרשת. Blocking = הקוד עוצר עד שנתפסות count פקטות", "שולחת פקטות לרשת. Blocking = מחכה לאישור משרת", "פותחת חיבור TCP. Blocking = מחכה ל-SYN-ACK", "מריצה Wireshark אוטומטית. Blocking = ממתינה לסגירת Wireshark"], a_en: ["Stacks protocol layers. IP()/ICMP() = IP packet containing ICMP.", "Division operator — divides packet size.", "Filters packets matching a criterion.", "Separates multiple packets."], c: 0, e: "בפרק: sniff() היא הפונקציה המרכזית להסנפה. Blocking = הפונקציה לא מחזירה תוצאה עד שיתפסו count פקטות שעוברות את ה-filter. אם lfilter מסנן רוב הפקטות — ייקח הרבה זמן עד שיתפסו 10 שעוברות.", e_en: "IP(dst='8.8.8.8')/ICMP() = IP header wrapping ICMP. IP()/TCP(dport=80)/Raw(b'GET / HTTP/1.0') = full HTTP in TCP in IP. Layers: Ethernet/IP/TCP/HTTP." },
  { cat: "sniff()", cat_en: "sniff() Filters", snip: null, q: "sniff(filter=\"tcp port 80\", prn=my_func, count=5) — מה עושה כל פרמטר?", q_en: "sniff(filter=\"tcp port 80\", prn=my_func, count=5) — what does each parameter do?", a: ["filter = BPF filter, מסנן packets לפני כניסה לScapy. prn = callback לכל packet שעובר. count = כמה לתפוס", "filter = Python filter function. prn = print function. count = buffer size", "filter = Wireshark display filter. prn = protocol. count = timeout בשניות", "filter = IP לסנן. prn = port. count = גודל packet מקסימלי"], a_en: ["filter = BPF filter, filters packets before entering Scapy. prn = callback per packet. count = how many to capture", "filter = Python filter function. prn = print function. count = buffer size", "filter = Wireshark display filter. prn = protocol. count = timeout in seconds", "filter = IP to filter. prn = port. count = max packet size"], c: 0, e: "BPF (Berkeley Packet Filter): \"tcp port 80\", \"udp\", \"host 8.8.8.8\". prn=my_func → Scapy קורא my_func(pkt) לכל packet. count=0 = אינסוף.", e_en: "BPF (Berkeley Packet Filter): \"tcp port 80\", \"udp\", \"host 8.8.8.8\". prn=my_func → Scapy calls my_func(pkt) per packet. count=0 = infinite." },
  { cat: "Scapy Layers", cat_en: "Scapy Layers", snip: null, q: "pkt = IP(dst=\"8.8.8.8\") / UDP(dport=53) / DNS(rd=1). מה הflag rd=1 מציין?", q_en: "pkt = IP(dst=\"8.8.8.8\") / UDP(dport=53) / DNS(rd=1). What does the rd=1 flag indicate?", a: ["rd=1 = Recursion Desired — מבקש מ-DNS Server לפתור את השם עד לתשובה סופית", "rd=1 = Response DNS — מציין שזה תשובה ולא שאלה", "rd=1 = Recursive Delay = המתן שנייה לפני שליחה", "rd=1 = Retry = נסה שוב אם אין תשובה"], a_en: ["rd=1 = Recursion Desired — asks DNS Server to resolve name to final answer", "rd=1 = Response DNS — indicates this is a reply not a query", "rd=1 = Recursive Delay = wait one second before sending", "rd=1 = Retry = try again if no response"], c: 0, e: "DNS flags: rd (Recursion Desired), qr (0=query, 1=response), aa (Authoritative Answer), tc (Truncated). rd=1 בDNS query = \"תפתור עד הסוף, לא רק תפנה לRoot\".", e_en: "DNS flags: rd (Recursion Desired), qr (0=query, 1=response), aa (Authoritative Answer), tc (Truncated). rd=1 in DNS query = \"resolve to end, do not just refer to Root\"." },
  { cat: "בניית פקטות", cat_en: "Packet Crafting", snip: null, q: "מה Scapy ממלא אוטומטית כשיוצרים IP()? מה show() מציג בנוסף על הצגה ישירה?", q_en: "What is sniff() in Scapy?", a: ["Scapy ממלא שדות עם ערכי ברירת מחדל הגיוניים (version=4, ttl=64 וכו').", "Scapy שולח הפקטה לרשת אוטומטית. show() מציג פלט בינארי", "Scapy לא ממלא כלום — חייבים להגדיר הכל. show() = שגיאה אם חסרים שדות", "show() = ייצוג גרפי. הצגה ישירה = טקסט בלבד"], a_en: ["Captures live packets from the network.", "Sends packets to a target.", "Analyzes a pcap file.", "Tests network speed."], c: 0, e: "בפרק: Scapy ממלא אוטומטית version=4, ttl=64, proto, checksum וכו'. show() מסביר כל שדה (כמו Wireshark). הצגה ישירה (my_pkt) מציגה רק שדות שונים מברירת מחדל — שימושי לראות מה שינינו.", e_en: "sniff(filter='icmp', count=10, prn=lambda p: p.summary()) = capture 10 ICMP packets, print summary of each. lfilter=lambda p: DNS in p = Python filter (more flexible than BPF)." },
  { cat: "אופרטור /", cat_en: "The / Operator", snip: null, q: "מה עושה אופרטור / בין שכבות Scapy? מה הקשר ל-Encapsulation?", q_en: "What does pkt.show() display?", a: ["מחבר (Stack) שכבות זו על גבי זו", "מחלק את הפקטה למספר פקטות קטנות לשידור", "מבצע OR בינארי בין ה-Headers", "משחרר את השכבה הקודמת מהזיכרון"], a_en: ["All fields of each protocol layer in the packet with their values.", "Only the raw bytes of the packet.", "A graphical diagram of the packet.", "Only error fields."], c: 0, e: "בפרק: / = Encapsulation בקוד. Ether()/IP()/TCP() יוצרת פקטת Ethernet שמכילה IP שמכיל TCP — בדיוק כמו שתראו ב-Wireshark. Scapy מציג: <Ether |<IP |<TCP |>>>. Raw() מוסיף Payload גולמי.", e_en: "show() displays: ###[ IP ]### version=4 ttl=64 src=... dst=... ###[ ICMP ]### type=echo-request. Fields with None are computed on send. summary() = one-line description." },
  { cat: "HTTP ב-Scapy", cat_en: "HTTP in Scapy", snip: null, q: "למה לא ניתן לכתוב 'HTTP in packet' ב-Scapy? איך מסננים HTTP GET?", q_en: "What is the difference between sr() and sr1() in Scapy?", a: ["Scapy לא מכיר HTTP כשכבה רשמית — מתייחס אליו כ-Raw.", "HTTP in packet עובד רק ב-Wireshark, לא ב-Scapy", "HTTP מוצפן תמיד ולכן לא ניתן לסנן", "Scapy מכיר HTTP אבל צריך לייבא module נפרד"], a_en: ["sr() = send and receive multiple responses", "sr() is Layer 2, sr1() is Layer 3.", "sr() is faster. sr1() is slower.", "No difference."], c: 0, e: "בפרק: Scapy מתייחס ל-HTTP כ-Raw (מחרוזת). לכן בודקים: (1) TCP in packet — HTTP רץ מעל TCP. (2) Raw in packet — יש תוכן. (3) str(packet[Raw]).startswith('GET') — מתחיל ב-GET.", e_en: "Use sr1() for: ping (one response), DNS query (one answer). Use sr() for: port scan (multiple targets), traceroute (multiple TTLs). answered = list of (sent, received) pairs." },
  { cat: "שליחה", cat_en: "Sending", snip: null, q: "מה ההבדל בין send() לבין sr() ו-sr1()?", q_en: "What is lfilter in sniff()?", a: ["send() = שלח ושכח, לא מחכה לתגובה.", "send() = Layer 3. sr() = Layer 2. sr1() = Layer 1", "send() = TCP. sr() = UDP. sr1() = ICMP", "הם זהים, רק הפלט שונה"], a_en: ["A Python function that receives a packet and returns True/False.", "The BPF capture filter string.", "The maximum number of packets.", "The network interface to capture on."], c: 0, e: "בפרק: send() = שלח פקטה ב-Layer 3, לא מחכה לתגובה. sr() = send+receive, מחזיר tuple של (answered, unanswered). sr1() = כמו sr אבל מחזיר רק הפקטה הראשונה שחזרה. sendp()/srp() = גרסאות Layer 2.", e_en: "lfilter=lambda p: DNS in p — only process packets with DNS layer. More powerful than BPF string filter. Can check any field: lfilter=lambda p: IP in p and p[IP].dst=='8.8.8.8'" },
  { cat: "Resolving", cat_en: "Resolving", snip: null, q: "מה זה Resolving ב-Scapy? מתי בפועל מתבצע תרגום השם ל-IP?", q_en: "How do you build a DNS query in Scapy?", a: ["Scapy יודע לבצע DNS בעצמו", "Resolving = שינוי כתובת ה-IP תוך כדי שידור", "Scapy לא תומך בשמות דומיין — חייבים IP מספרי", "Resolving = הצפנת הכתובת לפני שליחה"], a_en: ["IP(dst='8.8.8.8')/UDP(dport=53)/DNS(rd=1", "TCP(dport=53)/DNS(qname='google.com')", "IP()/DNS(name='google.com')", "UDP(port=53, query='google.com')"], c: 0, e: "בפרק: IP(dst='www.google.com') — Scapy שומר את שם הדומיין בפקטה. כשמסתכלים: show() מציג 'www.google.com'. אבל בזמן send() בפועל, Scapy מבצע DNS ומציב את ה-IP הנכון בשדה dst.", e_en: "DNS uses UDP port 53 by default. rd=1 = Recursion Desired (ask DNS to resolve fully). DNSQR = DNS Question Record. Response in: resp[DNS].an (answer section)." },
  { cat: "שכבות ב-Scapy", cat_en: "Layers in Scapy", snip: null, q: "מה Scapy מסיק אוטומטית כשמציינים dport=80? מה type=0x800 אומר?", q_en: "What is ARP and how do you send an ARP request with Scapy?", a: ["dport=80 = Scapy יודע שזה HTTP ומציג 'http'", "dport=80 = Scapy פותח חיבור HTTP אוטומטית. type=0x800 = גרסת Ethernet", "dport=80 = Scapy מסנן רק HTTP. type=0x800 = מספר הפורט", "שניהם שגיאות, Scapy לא מכיר ערכים מספריים"], a_en: ["ARP resolves IP — MAC.", "ARP is a routing protocol.", "ARP is a DNS variant.", "ARP is only used in IPv6."], c: 0, e: "בפרק: Scapy מכיר פורטים מוכרים — dport=80 מוצג כ-http, בדיוק כמו Wireshark. type=0x800 = EtherType שאומר שהשכבה הבאה ב-Ethernet frame היא IP. זה מה שמאפשר לכרטיס הרשת להבין מה לעשות עם ה-Frame.", e_en: "ARP Request: Ether(dst='ff:ff:ff:ff:ff:ff') = broadcast. ARP(op=1, pdst='192.168.1.1') = 'who has 192.168.1.1?'. Response: ARP(op=2) with hwsrc=the MAC. Used by switches and routers." },
  { cat: "Scapy", cat_en: "Scapy vs Wireshark", snip: null, q: "מה ההבדל בין שימוש ב-Scapy לhostile packet crafting לבין Wireshark לpassive sniffing?", q_en: "What is the difference between using Scapy for packet crafting vs Wireshark for passive sniffing?", a: ["Scapy = יוצר ושולח packets (active). Wireshark = רק מאזין לpackets קיימים (passive), לא שולח כלום", "Scapy = GUI, Wireshark = CLI — אינו הגורם", "Wireshark יכול לשלוח packets, Scapy רק לנתח — לא הפתרון", "שניהם זהים — רק interface שונה — שגוי"], a_en: ["Scapy = creates and sends packets (active). Wireshark = only listens to existing packets (passive), sends nothing", "Scapy = GUI, Wireshark = CLI", "Wireshark can send packets, Scapy only analyzes", "Both identical — only different interface"], c: 0, e: "Scapy: בנה IP/TCP/UDP מותאם אישית, שלח, קבל תשובה. Wireshark: passive capture בלבד. בpenetration testing: Scapy לsimulate attacks. Wireshark לanalyze תקשורת.", e_en: "Scapy: build custom IP/TCP/UDP, send, receive reply. Wireshark: passive capture only. In penetration testing: Scapy to simulate attacks. Wireshark to analyze traffic." },
  { cat: "DNS ב-Scapy", cat_en: "DNS with Scapy", snip: null, q: "כשמריצים Scapy ל-sniff DNS queries — מדוע חשוב לנקות DNS cache תחילה?", q_en: "When running Scapy to sniff DNS queries — why is clearing DNS cache important first?", a: ["אם DNS כבר ב-cache, לא ייצא UDP query לרשת ולא נתפוס כלום", "DNS cache מאט את Scapy בגלל conflict", "הCache עלול לגרום ל-Scapy לקרוס", "יש לנקות cache רק ב-Windows, לא ב-Linux"], a_en: ["If DNS is already cached, no UDP query goes to network", "DNS cache slows down Scapy due to conflict", "The cache might cause Scapy to crash", "Cache needs clearing only on Windows, not Linux"], c: 0, e: "מערכת ההפעלה שומרת DNS תשובות בcache. אם example.com כבר נפתר — לא יצא query חדש לרשת. ipconfig /flushdns (Windows) / systemd-resolve --flush-caches (Linux) מוחק את הcache.", e_en: "The OS caches DNS responses. If example.com was already resolved — no new query goes to network. ipconfig /flushdns (Windows) / systemd-resolve --flush-caches (Linux) clears cache." },
  ],
  6: [
  { cat: "פורטים", cat_en: "Ports", snip: null, q: "מחשב מקבל packet מ-Web server. איך הוא יודע לאיזה תוכנה להעביר אותו?", q_en: "A computer receives a packet from a Web server. How does it know which program to deliver it to?", a: ["לפי ה-Destination Port בTCP/UDP header", "לפי כתובת ה-IP — כל IP שייך לתוכנה אחת", "לפי ה-MAC Address של כרטיס הרשת", "לפי שם התוכנה שנשלח ב-HTTP header"], a_en: ["By Destination Port in TCP/UDP header", "By IP address — each IP belongs to one program", "By MAC Address of the network card", "By program name sent in HTTP header"], c: 0, e: "Port = מזהה תוכנה. כשpacket מגיע ל-port 80 — מועבר לשרת HTTP. Port 443 — HTTPS. Port 22 — SSH. Layer 4 (TCP/UDP) אחראי על ניתוב לתוכנה הנכונה.", e_en: "Port = program identifier. When packet arrives at port 80 — forwarded to HTTP server. Port 443 — HTTPS. Port 22 — SSH. Layer 4 (TCP/UDP) is responsible for routing to the right program." },
  { cat: "netstat", cat_en: "netstat", snip: null, q: "מה ההבדל בין LISTENING לבין ESTABLISHED? מתי מופיעות שתי השורות יחד?", q_en: "What is the ACK number and how is it calculated?", a: ["LISTENING = ממתין לחיבור חדש. ESTABLISHED = חיבור פעיל קיים.", "LISTENING = TCP. ESTABLISHED = UDP", "LISTENING = עבר חיבור. ESTABLISHED = עתידי", "LISTENING = כתובת מקומית. ESTABLISHED = כתובת רחוקה"], a_en: ["ACK = next expected byte = Seq of sender + bytes received.", "ACK = Seq + 1 always.", "ACK = total bytes received so far.", "ACK = random number for security."], c: 0, e: "בפרק תרגיל 6.1: כש-netstat -a מציג LISTENING — שרת מאזין, אין לקוח. כשלקוח מתחבר מופיע ESTABLISHED. ללא -a, netstat מציג רק ESTABLISHED (חיבורים קיימים). עם -a רואים גם מה שמחכה לחיבור.", e_en: "ACK = last Seq received + data length. Client sends Seq=100 with 5 bytes — server ACK=105 (expects byte 105 next). SYN and FIN each count as 1 byte for ACK calculation." },
  { cat: "TCP vs UDP", cat_en: "TCP vs UDP", snip: null, q: "מתי נבחר TCP ומתי UDP? קבע לכל מקרה: הורדת קובץ, DNS, שיחת Skype, העלאת תמונה.", q_en: "What is the difference between TCP and UDP?", a: ["קובץ=TCP, DNS=UDP, Skype=UDP, תמונה=TCP.", "כולם TCP כי הוא האמין יותר תמיד", "קובץ=UDP (מהיר), DNS=TCP (חייב להגיע), Skype=TCP, תמונה=UDP", "זה תלוי בגודל הקובץ: מתחת ל-1MB = UDP, מעלה = TCP"], a_en: ["TCP: connection-based", "TCP is encrypted, UDP is not.", "TCP is newer than UDP.", "UDP requires more bandwidth than TCP."], c: 0, e: "בפרק: TCP כשאמינות חשובה — קבצים ותמונות חייבים להגיע שלמים. UDP כשמהירות חשובה — DNS = שאלה-תשובה קצרה, אם אבדה שואלים שוב. Skype = עדיף מהירות, packet אבוד = מלמלה קלה, לא קטסטרופה.", e_en: "TCP overhead: 3-way handshake, ACKs, retransmission, ordering. UDP: just send — no guarantees. DNS uses UDP (small, fast, can retry). VoIP uses UDP (latency matters more than reliability)." },
  { cat: "UDP Header", cat_en: "UDP Header", snip: null, q: "מה שדה Length ב-UDP מציין? האם רק Header, רק Data, או שניהם?", q_en: "What does netstat -an show?", a: ["Header + Data ביחד.", "רק ה-Data, Header לא נספר", "רק ה-Header (תמיד 8)", "גודל ה-IP Packet הכולל"], a_en: ["All active TCP/UDP connections and listening ports with numeric addresses", "Only active connections, no listening ports.", "All network interfaces and their IPs.", "Routing table."], c: 0, e: "בפרק תרגיל 6.4: Wireshark מציג UDP Header=8 bytes, DNS layer=32 bytes. שדה Length=8+32=40. כלומר Length מתאר את האורך הכולל של UDP (Header + כל מה שמעליו).", e_en: "netstat -an: -a = all (listening + connected), -n = numeric (no name resolution). Shows: Proto, Local Address:Port, Foreign Address:Port, State. Modern replacement: ss -tnp." },
  { cat: "Checksum", cat_en: "Checksum", snip: null, q: "מה Checksum ומה הוא מגלה? מה הוא לא מגלה?", q_en: "What are TCP flags and what does each one mean?", a: ["Checksum מגלה ששגיאה קרתה בחבילה.", "Checksum מגלה ומתקן שגיאות אוטומטית", "Checksum מונע שגיאות על ידי הצפנת החבילה", "Checksum בודק שהחבילה הגיעה ליעד הנכון"], a_en: ["SYN=open connection, ACK=acknowledge", "SYN=speed, ACK=address, FIN=finish, RST=route.", "All flags mean the same — control packet.", "TCP flags are only used in IPv6."], c: 0, e: "בפרק: Checksum = חישוב פונקציה על המידע. שולח שולח גם את התוצאה. מקבל מחשב שוב ומשווה. אם שונה — שגיאה, חבילה נזרקת. מגבלה: אם 0 השתנה ל-6 ו-6 השתנה ל-0 — אותו סכום, שגיאה לא תתגלה.", e_en: "SYN+ACK together = Handshake step 2. RST = something went wrong or port closed. FIN = graceful close. PSH = don't buffer, send immediately to application. URG = rarely used." },
  { cat: "UDP Socket", cat_en: "UDP Socket", snip: null, q: "מה ההבדל המעשי בקוד בין TCP ל-UDP Socket? מה נעלם ב-UDP?", q_en: "What is TCP Window Size?", a: ["SOCK_STREAM=TCP, SOCK_DGRAM=UDP.", "ב-UDP: bind() לא עובד, אפשר רק לשלוח", "ב-UDP: recv() עובד כמו TCP, ההבדל רק בשם האובייקט", "ב-UDP: חייבים לציין timeout, אחרת הקוד נתקע לנצח"], a_en: ["How many bytes can be sent before receiving an ACK", "The maximum TCP packet size.", "The number of connections allowed simultaneously.", "The timeout before retransmission."], c: 0, e: "בפרק: UDP אין קישור — אין connect/listen/accept. שולחים: sendto(data, (ip, port)). מקבלים: data, addr = recvfrom(1024). addr מחזיר את כתובת השולח כי אין קישור שמנהל את זה. TCP ברירת מחדל (SOCK_STREAM).", e_en: "Window size = receiver's buffer space. Sender can't send more than Window bytes without ACK. Window scaling: modern TCP can use large windows (e.g. 64KB+). Zero window = receiver busy, stop." },
  { cat: "TCP Sequence Numbers", cat_en: "TCP Sequence Numbers", snip: null, q: "מה יהיו ערכי ה-ACK אחרי קבלת כל חבילה?", q_en: "What is the TIME_WAIT state?", a: ["ACK=106 אחרי 'Hello ' (100+6). ACK=110 אחרי 'cool' (106+4)", "ACK=101 אחרי 'Hello', ACK=102 אחרי 'cool' — ACK מונה חבילות", "ACK=107 ו-ACK=111 — ACK = Seq + len + 1", "ACK=100 בשניהם — ACK = Seq של החבילה שנשלחה"], a_en: ["State after TCP connection close", "Server waiting for a new connection.", "Packet timeout in transit.", "Connection idle period."], c: 0, e: "בפרק: ACK = Seq_last + len(data). 'Hello ' = 6 bytes, Seq=100 — ACK=106. 'cool' = 4 bytes, Seq=106 — ACK=110. ACK מציין את הבית הבא הצפוי — כלומר כל מה שלפניו הגיע תקין.", e_en: "TIME_WAIT: after sending final ACK. Waits 2×MSL (Maximum Segment Lifetime ~30s = 60s total). Prevents: reusing port before old packets expire. Many TIME_WAITs = normal for busy servers." },
  { cat: "Three-Way Handshake", cat_en: "Three-Way Handshake", snip: null, q: "מה יהיו ערכי ACK בחבילה 2, וערכי Seq ו-ACK בחבילה 3?", q_en: "What is the difference between TCP SYN and RST?", a: ["חבילה 2: ACK=124 (123+1). חבילה 3: Seq=124, ACK=556 (555+1)", "חבילה 2: ACK=123. חבילה 3: Seq=123, ACK=555", "חבילה 2: ACK=125. חבילה 3: Seq=125, ACK=557", "חבילה 2: ACK=0. חבילה 3: Seq=0, ACK=0"], a_en: ["SYN = initiate connection (polite request).", "SYN is slower than RST.", "RST is used to open connections.", "They are different names for the same flag."], c: 0, e: "בפרק: SYN נחשב כ-1 byte. חבילה 2 (SYN+ACK): שרת מאשר SYN של לקוח — ACK=123+1=124. שרת ISN=555. חבילה 3 (ACK): לקוח מאשר SYN+ACK — ACK=555+1=556. Seq=124 (הבית הבא של לקוח).", e_en: "SYN to open port — SYN+ACK (port open) or RST (port closed). RST also sent when: connection is in invalid state, firewall rejects, SO_LINGER with l_linger=0." },
  { cat: "Three-Way Handshake", cat_en: "Three-Way Handshake", snip: null, q: "בלחיצת יד: לקוח ISN=500, שרת ISN=200. מה Seq ו-ACK בכל שלב?", q_en: "What does ss -tlnp show on Linux?", a: ["SYN: Seq=500. SYN+ACK: Seq=200, ACK=501. ACK: Seq=501, ACK=201", "SYN: Seq=500. SYN+ACK: Seq=200, ACK=500. ACK: Seq=500, ACK=200", "SYN: Seq=500. SYN+ACK: Seq=200, ACK=502. ACK: Seq=502, ACK=202", "SYN: Seq=0. SYN+ACK: Seq=0, ACK=1. ACK: Seq=1, ACK=1"], a_en: ["All TCP listening sockets with process name and PID.", "All established TCP connections.", "UDP sockets only.", "All network statistics."], c: 0, e: "כלל: ACK = ISN_שלהם + 1 (SYN נחשב byte אחד). שלב 1 SYN: Seq=500. שלב 2 SYN+ACK: Seq=200 (ISN שרת), ACK=500+1=501. שלב 3 ACK: Seq=501 (בית הבא מלקוח), ACK=200+1=201.", e_en: "ss replaces netstat. -tlnp: shows LISTEN sockets with: Local Address:Port, Process (program name + PID + fd). Equivalent to: netstat -tlnp. Use to find what's listening on a port." },
  { cat: "Seq/ACK חישוב", cat_en: "Seq/ACK Calculation", snip: null, q: "מה ACK בתגובת השרת? מה Seq ו-ACK בחבילת הלקוח השלישית?", q_en: "What is TCP Checksum?", a: ["שרת ACK=129 (124+5). לקוח: Seq=129, ACK=559 (556+3)", "שרת ACK=125 (124+1). לקוח: Seq=125, ACK=557 (556+1)", "שרת ACK=130 (124+6). לקוח: Seq=130, ACK=560", "שרת ACK=124. לקוח: Seq=124, ACK=556 — לא השתנה"], a_en: ["Error detection field in TCP header", "Encryption of the packet contents.", "A sequence number for ordering.", "A timer for retransmission."], c: 0, e: "שרת מקבל 'Hello' (5B) Seq=124: ACK=124+5=129. שרת שולח 'Hi!' (3B) Seq=556. לקוח: Seq=129 (הבית הבא שלו), ACK=556+3=559 (מאשר שקיבל 'Hi!').", e_en: "TCP checksum: one's complement sum of pseudo-header + TCP header + data. If receiver's calculation doesn't match — packet silently dropped. Different from IP checksum (header only)." },
  { cat: "TCP Flags", cat_en: "TCP Flags", snip: null, q: "מה קורה כששולחים SYN לפורט סגור? מה ההשלכה לPort Scanning?", q_en: "What is a Well-Known Port?", a: ["מקבלים RST (פורט סגור) או אין תגובה (Firewall).", "מקבלים תמיד ACK עם קוד שגיאה שמציין שהפורט סגור", "החיבור נוצר בכל מקרה ורק אחרי שניות מתנתק", "מקבלים FIN כי השרת סוגר את החיבור מיד"], a_en: ["Ports 0-1023 reserved for standard services: 80=HTTP,", "Any port above 1024.", "Ports used by malware.", "Random ports assigned by OS."], c: 0, e: "בפרק תרגיל 6.19: שלחו SYN לפורט 24601 של Google — אין תגובה (סגור/Firewall). SYN לפורט 80 — SYN+ACK (פתוח!). עיקרון Port Scanner: שלח SYN לכל פורט, אם מקבלים SYN+ACK הפורט פתוח.", e_en: "0-1023: Well-Known (root required to bind). 1024-49151: Registered (IANA assigned). 49152-65535: Dynamic/Ephemeral (OS assigns to client connections automatically)." },
  { cat: "Congestion Control", cat_en: "Congestion Control", snip: null, q: "TCP Slow Start — מה קורה לחלון השליחה (cwnd) בכל ACK?", q_en: "TCP Slow Start — what happens to congestion window (cwnd) with each ACK?", a: ["cwnd מוכפל לכל ACK — גדילה אקספוננציאלית עד ssthresh, אחר כך ליניארית", "cwnd גדל ב-1 MSS לכל ACK — גדילה ליניארית מההתחלה", "cwnd נשאר קבוע עד packet loss ואז מתאפס", "cwnd גדל לפי RTT — mitoring נוכחי"], a_en: ["cwnd doubles per ACK — exponential growth until ssthresh, then linear", "cwnd grows by 1 MSS per ACK — linear growth from start", "cwnd stays fixed until packet loss then resets", "cwnd grows by RTT — current monitoring"], c: 0, e: "Slow Start: cwnd×2 לכל ACK = 1→2→4→8→16. אחרי ssthresh → Congestion Avoidance: cwnd+1 לכל RTT. Packet loss → ssthresh=cwnd/2, cwnd=1.", e_en: "Slow Start: cwnd×2 per ACK = 1→2→4→8→16. After ssthresh → Congestion Avoidance: cwnd+1 per RTT. Packet loss → ssthresh=cwnd/2, cwnd=1." },
  { cat: "BBR", cat_en: "BBR vs CUBIC", snip: null, q: "מה ההבדל בין CUBIC ל-BBR ב-TCP Congestion Control?", q_en: "What is the difference between CUBIC and BBR in TCP Congestion Control?", a: ["CUBIC ממתין ל-packet loss לפני האטה. BBR מודד bandwidth ו-RTT ישירות — לא מחכה ל-loss", "CUBIC = Linux בלבד. BBR = Windows בלבד — אינו הגורם", "CUBIC = IPv6. BBR = IPv4 בלבד — לא הפתרון", "BBR ישן יותר — CUBIC הוא האלגוריתם החדש — שגוי"], a_en: ["CUBIC waits for packet loss before slowing down. BBR measures bandwidth and RTT directly — does not wait for loss", "CUBIC = Linux only. BBR = Windows only", "CUBIC = IPv6. BBR = IPv4 only", "BBR is older — CUBIC is the new algorithm"], c: 0, e: "CUBIC: loss-based → bufferbloat → latency גבוה. BBR (Google 2016): model-based → מודד bandwidth ישיר → latency נמוך. YouTube, Gmail, Cloud Run משתמשים BBR.", e_en: "CUBIC: loss-based → bufferbloat → high latency. BBR (Google 2016): model-based → measures bandwidth directly → low latency. YouTube, Gmail, Cloud Run use BBR." },
  { cat: "ISN רנדומלי", cat_en: "Random ISN", snip: null, q: "מדוע ה-ISN נבחר באופן רנדומלי ולא תמיד 0?", q_en: "What is lsof -i :80 used for?", a: ["למנוע התנגשות: אם ISN=0 תמיד, חבילה שאבדה מחיבור ישן", "בגלל דרישות הצפנה, ISN מוצפן ולכן נראה רנדומלי", "כדי לחסוך ב-Seq Number space — אם מתחילים מ-0 גדלים מהר", "דרישת תקן RFC שלא מסבירה את הסיבה"], a_en: ["Shows which process is using port 80", "Blocks traffic on port 80.", "Lists open files on the filesystem.", "Shows HTTP log files."], c: 0, e: "בפרק: אם ISN=0 תמיד — נאמר שחיבור נפל ונוצר חדש. חבילה מהחיבור הישן (עם Seq=100 שנאבדה בדרך) תגיע לחיבור החדש. השרת יחשוב שזו חבילה לגיטימית מהחיבור הנוכחי — שגיאה. ISN רנדומלי מונע זאת.", e_en: "lsof -i :80: list open files (sockets) on port 80. Shows: process name, PID, user, fd, type (TCP/UDP), state. Alternative: ss -tlnp | grep :80 or fuser 80/tcp." },
  { cat: "טבלת השוואה", cat_en: "Comparison Table", snip: null, q: "מה שלושת המנגנונים של TCP לאמינות? האם UDP מכיל אחד מהם?", q_en: "What is nc (netcat)?", a: ["TCP: (1) ACK + שליחה מחדש אחרי timeout.", "TCP: Checksum, ISN, Port. UDP: כלום", "TCP: SYN, ACK, FIN. UDP: שולח SYN בלבד", "TCP ו-UDP זהים, ההבדל רק בגודל ה-Header"], a_en: ["The network Swiss Army knife", "A network scanner for open ports.", "A packet capture tool.", "A VPN client."], c: 0, e: "בפרק טבלת סיכום: (1) חבילה לא הגיעה — ACK + retransmit (TCP בלבד). (2) חבילות בסדר לא נכון — Sequence Numbers (TCP בלבד). (3) שגיאות בתוכן — Checksum (TCP תמיד, UDP אופציונלי). פורטים = שניהם.", e_en: "nc uses: port test (nc -zv host port), simple server (nc -l 9001), send file (nc host 9001 < file.txt), chat (nc host 9001). -u for UDP. Called 'TCP/IP Swiss Army knife'." },
  ],
  7: [
  { cat: "CIDR", cat_en: "CIDR", snip: null, q: "איזו כתובת IP שייכת לאותה /24 subnet כמו 192.168.1.50?", q_en: "Which IP belongs to the same /24 subnet as 192.168.1.50?", a: ["192.168.1.200", "192.168.2.1", "10.168.1.50", "172.16.1.50"], a_en: ["192.168.1.200", "192.168.2.1", "10.168.1.50", "172.16.1.50"], c: 0, e: "192.168.1.0/24 = כל כתובות 192.168.1.0–255. 192.168.2.x כבר subnet אחר.", e_en: "192.168.1.0/24 = all addresses 192.168.1.0–255. 192.168.2.x is a different subnet." },
  { cat: "CIDR", cat_en: "CIDR", snip: null, q: "כמה hosts אפשריים ב-192.168.5.0/26?", q_en: "How many usable hosts in 192.168.5.0/26?", a: ["62", "64", "126", "30"], a_en: ["62", "64", "126", "30"], c: 0, e: "/26 = 6 bits לhosts = 64 כתובות. מחסרים network (0) ו-broadcast (63) = 62 usable.", e_en: "/26 = 6 host bits = 64 addresses. Minus network (0) and broadcast (63) = 62 usable." },
  { cat: "NAT", cat_en: "NAT", snip: null, q: "מחשב ב-192.168.1.100 גולש ל-Google. מה Google רואה כ-Source IP?", q_en: "Computer at 192.168.1.100 browses Google. What does Google see as Source IP?", a: ["ה-IP הציבורי של הרותר (לדוגמה 82.80.5.1)", "192.168.1.100 — אינו הגורם", "127.0.0.1 — לא הפתרון", "ה-MAC של המחשב — שגוי"], a_en: ["The router public IP (e.g. 82.80.5.1)", "192.168.1.100", "127.0.0.1", "The computer MAC address"], c: 0, e: "NAT: הרותר מחליף src IP מ-192.168.1.100 ל-IP הציבורי שלו. Google רואה רק את הרותר.", e_en: "NAT: router replaces src IP from 192.168.1.100 to its public IP. Google sees only the router." },
  { cat: "NAT", cat_en: "NAT", snip: null, q: "מה קורה אם שני מחשבים ברשת הביתית שולחים בו-זמנית ל-Google?", q_en: "What happens when two home computers send simultaneously to Google?", a: ["הרותר מבדיל לפי Port המקור של כל חיבור — NAT Table שמורה את המיפוי", "הרותר שולח רק את החבילה הראשונה שהגיעה — אינו הגורם", "שני המחשבים קיבלו IP ציבורי נפרד — לא הפתרון", "הרשת נתקעת — לא ניתן לשלוח בו-זמנית — שגוי"], a_en: ["Router distinguishes by source Port of each connection — NAT Table stores mapping", "Router sends only the first packet that arrived", "Both computers received separate public IPs", "Network jams — cannot send simultaneously"], c: 0, e: "NAT Table: {public_IP:port_A ↔ 192.168.1.100:54321} ו-{public_IP:port_B ↔ 192.168.1.101:54322}. Port ייחודי לכל חיבור.", e_en: "NAT Table: {public_IP:port_A ↔ 192.168.1.100:54321} and {public_IP:port_B ↔ 192.168.1.101:54322}. Unique port per connection." },
  { cat: "DHCP", cat_en: "DHCP", snip: null, q: "מחשב חדש נדלק וצריך כתובת IP. מה סדר הודעות DHCP הנכון?", q_en: "New computer powers on needing an IP. What is the correct DHCP message order?", a: ["Discover → Offer → Request → ACK", "Request → Discover → Offer → ACK", "Offer → Discover → ACK → Request", "SYN → Discover → Offer → ACK"], a_en: ["Discover → Offer → Request → ACK", "Request → Discover → Offer → ACK", "Offer → Discover → ACK → Request", "SYN → Discover → Offer → ACK"], c: 0, e: "DORA: Discover (Broadcast) → Offer (Server) → Request (Broadcast, מאשר) → ACK (Server, מאשר).", e_en: "DORA: Discover (Broadcast) → Offer (Server) → Request (Broadcast, confirms) → ACK (Server, confirms)." },
  { cat: "DHCP", cat_en: "DHCP", snip: null, q: "מדוע DHCP Discover נשלח כ-Broadcast ולא Unicast?", q_en: "Why is DHCP Discover sent as Broadcast and not Unicast?", a: ["המחשב לא יודע את ה-IP של שרת DHCP — Broadcast מגיע לכל מי ברשת", "Broadcast מהיר יותר מ-Unicast — אינו הגורם", "DHCP חייב Broadcast לפי תקן TCP — לא הפתרון", "הרותר חוסם Unicast לפני קבלת IP — שגוי"], a_en: ["Computer does not know DHCP server IP — Broadcast reaches everyone on network", "Broadcast is faster than Unicast", "DHCP requires Broadcast per TCP standard", "Router blocks Unicast before receiving IP"], c: 0, e: "מחשב חדש לא יודע כלום — לא IP של שרת DHCP. Broadcast (255.255.255.255) מגיע לכולם. שרת DHCP שומע ועונה.", e_en: "New computer knows nothing — not even DHCP server IP. Broadcast (255.255.255.255) reaches everyone. DHCP server hears and responds." },
  { cat: "Routing", cat_en: "Routing", snip: null, q: "נתב מקבל packet ל-8.8.8.8 ובRouting Table אין route ספציפי. מה הוא עושה?", q_en: "Router receives packet to 8.8.8.8. Routing Table has no specific route. What does it do?", a: ["שולח לפי Default Route (0.0.0.0/0) — \"שלח הכל לכיוון זה אם אין route ספציפי\"", "זורק את ה-packet ומחזיר ICMP Unreachable — אינו הגורם", "שולח ARP Request ל-8.8.8.8 — לא הפתרון", "מחכה עד שRoute Table מתעדכן — שגוי"], a_en: ["Sends via Default Route (0.0.0.0/0) — \"send everything here if no specific route\"", "Drops packet and returns ICMP Unreachable", "Sends ARP Request to 8.8.8.8", "Waits until Route Table updates"], c: 0, e: "Default Route (0.0.0.0/0) = catch-all. כל packet שאין route ספציפי עליו הולך לDefault Gateway. ללא Default Route — packet נזרק.", e_en: "Default Route (0.0.0.0/0) = catch-all. Every packet with no specific route goes to Default Gateway. Without Default Route — packet dropped." },
  { cat: "BGP", cat_en: "BGP", snip: null, q: "BGP Hijack — מה קורה כש-ISP מכריז בטעות על prefix שלא שלו?", q_en: "BGP Hijack — what happens when ISP mistakenly announces a prefix it does not own?", a: ["כל ה-ISPs מאמינים ומעדכנים Routing Tables — traffic לנקודה הלא נכונה", "Firewall חוסם אוטומטית את ההכרזה השגויה", "BGP מאמת חתימה דיגיטלית ודוחה הכרזות לא חתומות", "Traffic מתפצל שווה בין ה-ISP האמיתי לISP המגנב"], a_en: ["All ISPs believe and update Routing Tables — traffic to wrong destination", "Firewall automatically blocks the incorrect announcement", "BGP validates digital signature and rejects unsigned announcements", "Traffic splits equally between real and hijacking ISP"], c: 0, e: "BGP מבוסס אמון — אין בדיקה אוטומטית. ISPs מאמינים להכרזות שכניהם. RPKI מוסיף חתימה אבל אימוץ חלקי.", e_en: "BGP is trust-based — no automatic validation. ISPs trust neighbor announcements. RPKI adds signing but adoption is partial." },
  { cat: "TTL", cat_en: "TTL", snip: null, q: "Packet יוצא עם TTL=64. אחרי 10 nתbים, מה TTL שלו?", q_en: "Packet leaves with TTL=64. After 10 routers, what is its TTL?", a: ["54", "74", "64", "10"], a_en: ["54", "74", "64", "10"], c: 0, e: "כל Router מוריד TTL ב-1. 64 - 10 = 54. אם TTL מגיע ל-0 — Router זורק ושולח ICMP Time Exceeded.", e_en: "Each router decrements TTL by 1. 64 - 10 = 54. If TTL reaches 0 — router drops and sends ICMP Time Exceeded." },
  { cat: "Subnet", cat_en: "Subnet", snip: null, q: "מה Default Gateway ולמה הוא חיוני?", q_en: "What is Default Gateway and why is it essential?", a: ["ה-IP של הRouter — בלעדיו packets לא יכולים לצאת מחוץ ל-LAN", "ה-IP של שרת DNS — בלעדיו אין תרגום שמות", "ה-IP הראשון ב-subnet — שמור לRouting — לא הפתרון", "ה-IP של שרת DHCP — מחלק כתובות — שגוי"], a_en: ["Router IP — without it packets cannot leave the LAN", "DNS server IP — without it no name resolution", "First IP in subnet — reserved for routing", "DHCP server IP — distributes addresses"], c: 0, e: "Default Gateway = Router. כשpacket מיועד לIP מחוץ ל-LAN — נשלח לRouter שיחליט לאן להמשיך.", e_en: "Default Gateway = Router. When packet destined for IP outside LAN — sent to Router which decides where to forward." },
  { cat: "CIDR", cat_en: "CIDR", snip: null, q: "כתובת 10.0.0.0/8 — כמה bits שמורים ל-Host ID?", q_en: "Address 10.0.0.0/8 — how many bits reserved for Host ID?", a: ["24", "8", "16", "32"], a_en: ["24", "8", "16", "32"], c: 0, e: "/8 = 8 bits ל-Network, 32-8=24 bits ל-Host. 2^24 = 16,777,216 כתובות אפשריות.", e_en: "/8 = 8 bits for Network, 32-8=24 bits for Host. 2^24 = 16,777,216 possible addresses." },
  { cat: "NAT", cat_en: "NAT", snip: null, q: "מה APIPA (169.254.x.x) ומתי מופיע?", q_en: "What is APIPA (169.254.x.x) and when does it appear?", a: ["כתובת עצמית שOS מקצה כש-DHCP לא ענה — מאפשר תקשורת בתוך LAN בלבד", "כתובת private שISP מקצה לרשת ביתית — אינו הגורם", "כתובת IPv6 מקבילה ל-192.168.x.x — לא הפתרון", "כתובת Loopback כשהרשת לא זמינה — שגוי"], a_en: ["Self-assigned address OS assigns when DHCP did not respond — LAN communication only", "Private address ISP assigns to home network", "IPv6 equivalent of 192.168.x.x", "Loopback address when network unavailable"], c: 0, e: "APIPA = Automatic Private IP Addressing. DHCP לא ענה ב-5s → OS לוקח 169.254.x.x אקראי. אין גישה לאינטרנט. תיקון: dhclient eth0.", e_en: "APIPA = Automatic Private IP Addressing. DHCP no response in 5s → OS takes random 169.254.x.x. No internet access. Fix: dhclient eth0." },
  { cat: "Routing", cat_en: "Routing", snip: null, q: "מה ההבדל בין Static Routing ל-Dynamic Routing?", q_en: "What is the difference between Static and Dynamic Routing?", a: ["Static — מוגדר ידנית, לא משתנה. Dynamic — פרוטוקולים (OSPF/BGP) מחשבים routes אוטומטית", "Static — מהיר יותר כי ברמת Hardware. Dynamic — מחשוב Software", "Static — IPv4 בלבד. Dynamic — תומך IPv6 — לא הפתרון", "Static — ל-LAN. Dynamic — ל-WAN בלבד — שגוי"], a_en: ["Static — configured manually, does not change. Dynamic — protocols (OSPF/BGP) compute routes automatically", "Static — faster because hardware level. Dynamic — software computation", "Static — IPv4 only. Dynamic — supports IPv6", "Static — for LAN. Dynamic — for WAN only"], c: 0, e: "Static Routing: admin מוסיף routes ידנית. פשוט, אבל לא מתאים לרשתות גדולות. Dynamic: OSPF/BGP מגלים topology אוטומטית.", e_en: "Static Routing: admin adds routes manually. Simple, but not suitable for large networks. Dynamic: OSPF/BGP discover topology automatically." },
  { cat: "ICMP", cat_en: "ICMP", snip: null, q: "ping 8.8.8.8 מצליח. ping google.com נכשל. מה הבעיה?", q_en: "ping 8.8.8.8 succeeds. ping google.com fails. What is the problem?", a: ["DNS — IP routing תקין, אבל שם הדומיין לא מתרגם לIP", "Google.com כבוי — אינו הגורם", "Firewall חוסם HTTP — לא הפתרון", "TTL נמוך מדי — שגוי"], a_en: ["DNS — IP routing works, but domain name not resolving to IP", "Google.com is down", "Firewall blocking HTTP", "TTL too low"], c: 0, e: "ping IP = בדיקת Layer 3. עובד = routing תקין. ping שם = DNS query ראשון. נכשל = DNS לא עובד. תיקון: dig @8.8.8.8 google.com.", e_en: "ping IP = Layer 3 check. Works = routing OK. ping name = DNS query first. Fails = DNS broken. Fix: dig @8.8.8.8 google.com." },
  { cat: "Traceroute", cat_en: "Traceroute", snip: null, q: "traceroute מציג * * * באמצע. ping לאותה כתובת מצליח. מה קורה?", q_en: "traceroute shows * * * in the middle. ping to same address succeeds. What is happening?", a: ["נתב בדרך חוסם ICMP Time Exceeded אבל מעביר packets רגילים — לא בעיה", "חיבור האינטרנט נותק בנקודה זו — אינו הגורם", "ה-Router כבוי — לא הפתרון", "TTL מוגדר נמוך מדי — שגוי"], a_en: ["Router along path blocks ICMP Time Exceeded but forwards regular packets — not a problem", "Internet connection dropped at this point", "The router is down", "TTL set too low"], c: 0, e: "* = Router לא שולח ICMP Time Exceeded (firewall rule). אבל packets ממשיכים לעבור. ping מצליח = ראיה שהרשת תקינה.", e_en: "* = Router not sending ICMP Time Exceeded (firewall rule). But packets continue passing. ping succeeds = proof network is fine." },
  ],
  8: [
  { cat: "MAC Address", cat_en: "MAC Address", snip: null, q: "מה שתי תת-הכתובות שמרכיבות MAC Address?", q_en: "What are the two sub-addresses that make up a MAC Address?", a: ["Vendor ID (OUI) — 3 bytes ראשונים, ו-Host ID — 3 bytes אחרונים", "IP Network + Host ID — 3 bytes כל אחד — אינו הגורם", "Port number + Device ID — 24 bits כל אחד", "Subnet Mask + Host Address — 32 bits — שגוי"], a_en: ["Vendor ID (OUI) — first 3 bytes, and Host ID — last 3 bytes", "IP Network + Host ID — 3 bytes each", "Port number + Device ID — 24 bits each", "Subnet Mask + Host Address — 32 bits"], c: 0, e: "MAC = 6 bytes: D4:BE:D9 (OUI = יצרן, נקבע בייצור) : D6:0C:2A (Host ID = ייחודי). Wireshark מציג שם היצרן אוטומטית.", e_en: "MAC = 6 bytes: D4:BE:D9 (OUI = manufacturer, set at manufacture) : D6:0C:2A (Host ID = unique). Wireshark shows manufacturer name automatically." },
  { cat: "MAC vs IP", cat_en: "MAC vs IP", snip: null, q: "מה ההבדל המהותי בין כתובת MAC לכתובת IP?", q_en: "What is the fundamental difference between MAC and IP address?", a: ["MAC — קבוע בחומרה, Layer 2, תוך LAN בלבד. IP — לוגי, Layer 3, גלובלי", "MAC — גדול יותר (6 bytes) ולכן מדויק יותר מ-IP (4 bytes)", "MAC — עבור IPv4. IP — עבור IPv6 בלבד", "MAC — ניתן לשינוי. IP — קבוע לצמיתות בחומרה"], a_en: ["MAC — fixed in hardware, Layer 2, within LAN only. IP — logical, Layer 3, global", "MAC — larger (6 bytes) so more precise than IP (4 bytes)", "MAC — for IPv4. IP — for IPv6 only", "MAC — changeable. IP — permanently fixed in hardware"], c: 0, e: "MAC = כתובת פיזית, תוך LAN, לא עוברת Routers. IP = כתובת לוגית, גלובלית, עוברת Routers. שניהם נדרשים.", e_en: "MAC = physical address, within LAN, does not cross Routers. IP = logical address, global, crosses Routers. Both are required." },
  { cat: "ARP", cat_en: "ARP", snip: null, q: "מחשב A צריך לשלוח ל-192.168.1.50 אבל לא יודע את ה-MAC. מה קורה?", q_en: "Computer A needs to send to 192.168.1.50 but does not know the MAC. What happens?", a: ["A שולח ARP Request (Broadcast) — \"מי יש לו 192.168.1.50?\" — 192.168.1.50 עונה עם MAC שלו", "A שולח ping ל-192.168.1.50 לגלות את ה-MAC — אינו הגורם", "A שואל את שרת DNS לקבל MAC Address — לא הפתרון", "A לא יכול לשלוח — חייב MAC מראש — שגוי"], a_en: ["A sends ARP Request (Broadcast) — \"Who has 192.168.1.50?\" — 192.168.1.50 replies with its MAC", "A sends ping to 192.168.1.50 to discover MAC", "A asks DNS server to get MAC Address", "A cannot send — must have MAC beforehand"], c: 0, e: "ARP = Address Resolution Protocol. Broadcast לכולם ברשת. רק 192.168.1.50 עונה. A שומר ב-ARP cache. arp -n לצפייה.", e_en: "ARP = Address Resolution Protocol. Broadcast to everyone on network. Only 192.168.1.50 replies. A saves in ARP cache. arp -n to view." },
  { cat: "ARP", cat_en: "ARP", snip: null, q: "מה ARP Spoofing ומדוע הוא מסוכן?", q_en: "What is ARP Spoofing and why is it dangerous?", a: ["תוקף שולח ARP Reply שקרי עם MAC שלו — כל traffic מגיע אליו (Man-in-the-Middle)", "תוקף שולח ARP Requests רבים כדי לעמיס את הרשת — אינו הגורם", "תוקף מחליף MAC בכרטיס הרשת שלו — לא הפתרון", "תוקף משנה Routing Table של ה-Router — שגוי"], a_en: ["Attacker sends fake ARP Reply with own MAC — all traffic goes to them (Man-in-the-Middle)", "Attacker sends many ARP Requests to overload the network", "Attacker changes MAC on own network card", "Attacker modifies Router Routing Table"], c: 0, e: "ARP Spoofing: \"אני ה-Router\" — שולח ARP Reply עם IP של Router אבל MAC של עצמו. כל traffic עובר דרכו. הגנה: Dynamic ARP Inspection.", e_en: "ARP Spoofing: \"I am the Router\" — sends ARP Reply with Router IP but own MAC. All traffic passes through attacker. Defense: Dynamic ARP Inspection." },
  { cat: "Ethernet Frame", cat_en: "Ethernet Frame", snip: null, q: "מה שדה Type ב-Ethernet Frame ומה הערך 0x0800 מציין?", q_en: "What is the Type field in Ethernet Frame and what does 0x0800 indicate?", a: ["Type מציין Protocol ב-payload: 0x0800 = IPv4, 0x0806 = ARP, 0x86DD = IPv6", "Type מציין גודל ה-frame בbytes — אינו הגורם", "Type מציין VLAN ID של ה-frame — לא הפתרון", "Type מציין TTL הנותר ל-frame — שגוי"], a_en: ["Type indicates Protocol in payload: 0x0800 = IPv4, 0x0806 = ARP, 0x86DD = IPv6", "Type indicates frame size in bytes", "Type indicates VLAN ID of the frame", "Type indicates remaining TTL for frame"], c: 0, e: "EtherType: 0x0800=IPv4, 0x0806=ARP, 0x86DD=IPv6, 0x8100=802.1Q (VLAN). Switch משתמש בזה לניתוב ברמת Layer 2.", e_en: "EtherType: 0x0800=IPv4, 0x0806=ARP, 0x86DD=IPv6, 0x8100=802.1Q (VLAN). Switch uses this for Layer 2 routing." },
  { cat: "Ethernet Frame", cat_en: "Ethernet Frame", snip: null, q: "למה Preamble ו-CRC32 לא מוצגים ב-Wireshark?", q_en: "Why are Preamble and CRC32 not shown in Wireshark?", a: ["כרטיס הרשת מסיר אותם לפני העברה ל-OS — Wireshark רואה רק מה שה-OS מקבל", "Wireshark לא תומך בהצגת שדות מוצפנים — אינו הגורם", "הם קיימים רק ב-WiFi, לא ב-Ethernet — לא הפתרון", "הם מוסתרים כברירת מחדל — ניתן להציג בהגדרות — שגוי"], a_en: ["NIC removes them before passing to OS — Wireshark sees only what OS receives", "Wireshark does not support displaying encrypted fields", "They exist only in WiFi, not Ethernet", "Hidden by default — can display in settings"], c: 0, e: "NIC (כרטיס הרשת) בודק CRC ואם תקין — מסיר Preamble ו-CRC לפני שמעביר ל-OS. Wireshark פועל אחרי NIC.", e_en: "NIC checks CRC and if valid — removes Preamble and CRC before passing to OS. Wireshark runs after NIC." },
  { cat: "VLAN", cat_en: "VLAN", snip: null, q: "מה ההבדל בין Access Port ל-Trunk Port ב-Switch?", q_en: "What is the difference between Access Port and Trunk Port on a Switch?", a: ["Access Port — חיבור לend-device, VLAN אחד, ללא tags. Trunk Port — בין switches, מרובה VLANs עם 802.1Q tags", "Access Port — חיבור לRouter. Trunk Port — חיבור לend-device — אינו הגורם", "Access Port — מהיר יותר. Trunk Port — אמין יותר — לא הפתרון", "Access Port — IPv4. Trunk Port — IPv6 — שגוי"], a_en: ["Access Port — connects end-device, one VLAN, no tags. Trunk Port — between switches, multiple VLANs with 802.1Q tags", "Access Port — connects to Router. Trunk Port — connects to end-device", "Access Port — faster. Trunk Port — more reliable", "Access Port — IPv4. Trunk Port — IPv6"], c: 0, e: "Access Port: PC/Printer/Server → אחד VLAN, frames ללא tag. Trunk Port: Switch↔Switch — מרובה VLANs, כל frame נושא VLAN ID ב-802.1Q tag.", e_en: "Access Port: PC/Printer/Server → one VLAN, frames without tag. Trunk Port: Switch↔Switch — multiple VLANs, each frame carries VLAN ID in 802.1Q tag." },
  { cat: "VLAN", cat_en: "VLAN", snip: null, q: "מדוע VLAN 1 כ-Native VLAN נחשב security risk?", q_en: "Why is VLAN 1 as Native VLAN considered a security risk?", a: ["כל port ב-Switch ב-VLAN 1 כברירת מחדל — תוקף יכול לנצל VLAN Hopping להגיע לכל VLAN", "VLAN 1 לא תומך ב-802.1Q tagging — אינו הגורם", "VLAN 1 מוגבל ל-100 משתמשים בלבד — לא הפתרון", "VLAN 1 לא מועבר על Trunk Ports — שגוי"], a_en: ["Every port on Switch is in VLAN 1 by default — attacker can exploit VLAN Hopping to reach any VLAN", "VLAN 1 does not support 802.1Q tagging", "VLAN 1 is limited to 100 users only", "VLAN 1 is not forwarded on Trunk Ports"], c: 0, e: "Native VLAN frames עוברים ללא tag. VLAN Hopping: תוקף שולח frame עם double-tag (0x8100 + VLAN ID) → מגיע ל-VLAN שלא מורשה.", e_en: "Native VLAN frames pass untagged. VLAN Hopping: attacker sends double-tagged frame (0x8100 + VLAN ID) → reaches unauthorized VLAN." },
  { cat: "STP", cat_en: "STP", snip: null, q: "מה Spanning Tree Protocol פותר?", q_en: "What does Spanning Tree Protocol solve?", a: ["Broadcast Storms מלולאות Ethernet — STP חוסם Ports ספציפיים כדי למנוע loops", "Routing Loops ב-IP — STP מנהל TTL — אינו הגורם", "Collisions ב-WiFi — STP מתאם תורות שידור — לא הפתרון", "ARP Cache poisoning — STP מאמת ARP Replies — שגוי"], a_en: ["Broadcast Storms from Ethernet loops — STP blocks specific Ports to prevent loops", "IP Routing Loops — STP manages TTL", "WiFi Collisions — STP coordinates transmission queues", "ARP Cache poisoning — STP validates ARP Replies"], c: 0, e: "Loop ב-Ethernet = frame מסתובב לנצח ומשתכפל. Broadcast Storm = כל Switch ב-100% CPU. STP בוחר Root Bridge ו-חוסם Ports לעץ ללא loops.", e_en: "Ethernet loop = frame circulates forever and multiplies. Broadcast Storm = every Switch at 100% CPU. STP selects Root Bridge and blocks Ports to form loop-free tree." },
  { cat: "Broadcast", cat_en: "Broadcast/Unicast", snip: null, q: "מה ההבדל בין Broadcast, Unicast ו-Multicast?", q_en: "What is the difference between Broadcast, Unicast and Multicast?", a: ["Unicast=למכשיר אחד, Broadcast=לכולם ברשת, Multicast=לקבוצה ספציפית שנרשמה", "Unicast=לשני מכשירים, Broadcast=למכשיר אחד, Multicast=לכולם", "Broadcast=מהיר ביותר, Unicast=אמין ביותר, Multicast=לא נתמך ב-Ethernet", "כולם זהים — רק שמות שונים לאותו מנגנון"], a_en: ["Unicast=to one device, Broadcast=to everyone on network, Multicast=to specific subscribed group", "Unicast=to two devices, Broadcast=to one device, Multicast=to everyone", "Broadcast=fastest, Unicast=most reliable, Multicast=not supported in Ethernet", "All identical — just different names for same mechanism"], c: 0, e: "Unicast: MAC ייחודי. Broadcast: FF:FF:FF:FF:FF:FF — כולם מקבלים. Multicast: 01:00:5E:xx:xx:xx — רק מי שנרשם. דוגמה: DHCP Discover = Broadcast.", e_en: "Unicast: unique MAC. Broadcast: FF:FF:FF:FF:FF:FF — everyone receives. Multicast: 01:00:5E:xx:xx:xx — only subscribed. Example: DHCP Discover = Broadcast." },
  { cat: "Switch", cat_en: "Switch Learning", snip: null, q: "Switch חדש, A שולח frame ל-B (MAC של B לא בטבלה). מה Switch עושה?", q_en: "New switch, A sends frame to B (B MAC not in table). What does switch do?", a: ["שומר MAC של A ב-Port שלו, ואחר כך Floods את ה-frame לכל הPorts חוץ מ-A", "מחזיר שגיאה ל-A — MAC לא ידוע — אינו הגורם", "שולח ARP Request לגלות MAC של B — לא הפתרון", "זורק את ה-frame ומחכה עד שB יפנה — שגוי"], a_en: ["Saves A MAC on its port, then Floods frame to all Ports except A", "Returns error to A — unknown MAC", "Sends ARP Request to discover B MAC", "Drops frame and waits for B to initiate"], c: 0, e: "Switch Learning: \"מ-Port 1 הגיע MAC של A\" → שמור בטבלה. B לא בטבלה → Flood לכל הPorts (חוץ מPort 1). B עונה → Switch לומד גם את B.", e_en: "Switch Learning: \"from Port 1 came A MAC\" → save in table. B not in table → Flood to all Ports (except Port 1). B replies → Switch learns B too." },
  { cat: "MAC Table", cat_en: "MAC Table", snip: null, q: "מה Aging ב-MAC Table ולמה הוא חשוב?", q_en: "What is Aging in MAC Table and why is it important?", a: ["הסרת MAC entries ישנות (לאחר ~300 שניות) — מונע טבלה מלאה כשמכשירים מתנתקים", "עדכון אוטומטי של firmware ב-Switch — אינו הגורם", "בדיקת תקינות Ethernet Frames — לא הפתרון", "הגבלת זמן חיבור ללקוח — שגוי"], a_en: ["Removing old MAC entries (after ~300 seconds) — prevents full table when devices disconnect", "Automatic firmware update on Switch", "Checking Ethernet Frame integrity", "Limiting connection time per client"], c: 0, e: "אם מכשיר מתנתק — MAC שלו נשאר בטבלה. Switch ימשיך לשלוח אליו. Aging מנקה entries שלא פעילים. מנגנון ניקוי אוטומטי.", e_en: "If device disconnects — its MAC stays in table. Switch continues sending to it. Aging clears inactive entries. Automatic cleanup mechanism." },
  { cat: "ARP Cache", cat_en: "ARP Cache", snip: null, q: "מה הפקודה לראות את ה-ARP Cache במחשב Linux?", q_en: "What command shows ARP cache on Linux?", a: ["ip neigh show (מודרני) או arp -n (ישן)", "netstat -arp — אינו הגורם", "ifconfig --arp — לא הפתרון", "route -arp show — שגוי"], a_en: ["ip neigh show (modern) or arp -n (old)", "netstat -arp", "ifconfig --arp", "route -arp show"], c: 0, e: "ip neigh show: חלק מiproute2, מציג IP+MAC+State. arp -n: ישן (net-tools). State: REACHABLE=תקף, STALE=ישן, FAILED=לא ענה.", e_en: "ip neigh show: part of iproute2, shows IP+MAC+State. arp -n: old (net-tools). State: REACHABLE=valid, STALE=old, FAILED=no reply." },
  { cat: "Wireshark", cat_en: "Wireshark L2", snip: null, q: "ב-Wireshark — איזה Filter מציג רק ARP packets?", q_en: "In Wireshark — which filter shows only ARP packets?", a: ["arp", "eth.type == 0x0806", "ip.proto == arp", "layer2.type == arp"], a_en: ["arp", "eth.type == 0x0806", "ip.proto == arp", "layer2.type == arp"], c: 0, e: "\"arp\" הוא ה-filter הפשוט ביותר. eth.type == 0x0806 גם עובד (0x0806 = EtherType של ARP). ב-Wireshark הfirst works.", e_en: "\"arp\" is the simplest filter. eth.type == 0x0806 also works (0x0806 = EtherType of ARP). In Wireshark first works." },
