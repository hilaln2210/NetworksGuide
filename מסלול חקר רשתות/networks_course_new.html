<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Computer Networks Course</title>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f7f7f2;
  --bg2:      #ffffff;
  --bg3:      #f0f0ea;
  --surface:  #ffffff;
  --border:   #e5e5e0;
  --border2:  #d1d1ca;
  --accent:   #1d6b9c;
  --accent2:  #155a84;
  --accentfg: #ffffff;
  --green:    #58cc02;
  --green2:   #46a302;
  --greenfg:  #ffffff;
  --yellow:   #ffd900;
  --yellowfg: #785a00;
  --red:      #ff4b4b;
  --redfg:    #ffffff;
  --blue:     #1cb0f6;
  --bluefg:   #ffffff;
  --text:     #3c3c3c;
  --text2:    #6b6b6b;
  --text3:    #afafaf;
  --mono:     'Courier New', 'Consolas', monospace;
  --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --r:        12px;
  --r2:       20px;
  --r3:       24px;
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 200;
  background: var(--bg2); border-bottom: 2px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px;
}
.header-logo {
  font-weight: 800; font-size: 16px; color: var(--accent);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  letter-spacing: -0.3px;
}
.header-logo-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--green); box-shadow: 0 2px 0 var(--green2);
}
.header-chname {
  font-size: 13px; font-weight: 600; color: var(--text2);
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lang-btn {
  font-size: 12px; font-weight: 800; padding: 6px 14px; border-radius: var(--r);
  border: 2px solid var(--border2); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text2);
  cursor: pointer; flex-shrink: 0; transition: all .1s;
  text-transform: uppercase; letter-spacing: .04em;
}
.lang-btn:hover { background: var(--accent); color: var(--accentfg); border-color: var(--accent2); border-bottom-color: var(--accent2); }
.lang-btn:active { transform: translateY(2px); border-bottom-width: 2px; }

/* ── CHAPTER NAV BAR ── */
.ch-nav {
  position: fixed; top: 60px; left: 0; right: 0; z-index: 150;
  background: var(--bg2); border-bottom: 2px solid var(--border);
  overflow-x: auto; display: flex; padding: 8px 16px; gap: 6px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.ch-nav::-webkit-scrollbar { display: none; }
.sb-label { display: none; }
.ch-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 14px; gap: 3px; border: 2px solid transparent;
  background: var(--bg3); border-radius: var(--r2);
  cursor: pointer; transition: all .15s; flex-shrink: 0;
  color: var(--text2); min-width: 52px;
  border-bottom: 4px solid var(--border);
}
.ch-btn:hover { background: var(--bg2); border-color: var(--border2); color: var(--text); }
.ch-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent2); border-bottom-color: var(--accent2);
}
.ch-num { font-size: 11px; font-weight: 800; font-family: var(--mono); }
.ch-title-text { font-size: 9px; font-weight: 600; max-width: 68px; text-align: center; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.ch-stars { font-size: 10px; min-height: 12px; }

/* ── LAYOUT ── */
.main {
  padding-top: 112px; min-height: 100vh;
  max-width: 780px; margin: 0 auto;
  padding-left: 20px; padding-right: 20px; padding-bottom: 60px;
}

/* ── CHAPTER ── */
.chapter { display: none; }
.chapter.active { display: block; }

/* ── CHAPTER HERO ── */
.ch-hero {
  padding: 28px 0 24px; border-bottom: 2px solid var(--border); margin-bottom: 28px;
}
.ch-tag {
  display: inline-block; font-size: 11px; font-weight: 800;
  color: var(--accent); background: var(--bg3);
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
  letter-spacing: .06em; text-transform: uppercase; font-family: var(--mono);
}
.ch-title { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 8px; letter-spacing: -.5px; line-height: 1.2; }
.ch-desc { font-size: 14px; color: var(--text2); margin-bottom: 20px; max-width: 560px; }
.tabs-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 18px; font-size: 13px; font-weight: 800; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text3);
  cursor: pointer; transition: all .1s; text-transform: uppercase; letter-spacing: .04em;
}
.tab-btn:hover { color: var(--text2); border-color: var(--border2); }
.tab-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
.tab-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent2); border-bottom-color: var(--accent2);
}

/* ── TAB PANELS ── */
.tab-panels { }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── LEARN CONTENT ── */
.did-you-know {
  background: linear-gradient(135deg, #fffdf0, #fff9e0);
  border: 2px solid var(--yellow); border-radius: var(--r2);
  padding: 16px 18px; font-size: 13.5px; color: #5a4a00;
  margin-bottom: 28px; line-height: 1.6;
  box-shadow: 0 3px 0 #e6c700;
}
.section-title {
  font-size: 17px; font-weight: 900; color: var(--text);
  margin: 32px 0 12px; letter-spacing: -.2px;
  display: flex; align-items: center; gap: 8px;
}
.prose {
  font-size: 15px; color: var(--text2); line-height: 1.78; margin-bottom: 16px;
}
.prose code, code {
  font-family: var(--mono); font-size: 12.5px;
  background: var(--bg3); padding: 2px 6px;
  border-radius: 6px; color: var(--accent2); font-weight: 600;
}

/* ── CODE BLOCKS ── */
.code-block {
  background: #1a1a2e; border-radius: var(--r2); padding: 18px 20px;
  margin: 16px 0; overflow-x: auto;
  border: 2px solid #2a2a4e; box-shadow: 0 4px 0 #0f0f20;
}
.code-block code {
  font-family: var(--mono); font-size: 12.5px; line-height: 1.75;
  background: none; padding: 0; color: #e2e8f0; display: block;
  font-weight: normal;
}
.comment { color: #6272a4; }

/* ── CARDS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin: 16px 0 24px; }
.card {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2);
  padding: 18px; display: flex; flex-direction: column; gap: 8px;
  transition: transform .1s;
}
.card:hover { transform: translateY(-2px); }
.card-icon { font-size: 26px; }
.card-title { font-size: 13px; font-weight: 800; color: var(--text); }
.card-body { font-size: 13px; color: var(--text2); line-height: 1.55; }

/* ── TABLE ── */
.table-wrap {
  overflow-x: auto; margin: 16px 0 24px;
  border-radius: var(--r2); border: 2px solid var(--border);
  box-shadow: 0 4px 0 var(--border);
}
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead { background: var(--bg3); }
.data-table th {
  padding: 11px 14px; text-align: left; font-weight: 800;
  color: var(--text2); font-size: 11px; text-transform: uppercase;
  letter-spacing: .06em; border-bottom: 2px solid var(--border);
}
.data-table td { padding: 11px 14px; color: var(--text2); border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg3); }

/* ── FLOW ROW ── */
.flow-row {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  margin: 16px 0 24px; padding: 20px; background: var(--bg2);
  border-radius: var(--r2); border: 2px solid var(--border);
  box-shadow: 0 4px 0 var(--border);
}
.flow-step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.flow-step-icon { font-size: 24px; }
.flow-step-label { font-size: 10px; font-weight: 700; color: var(--text3); line-height: 1.3; max-width: 64px; text-align: center; }
.flow-arrow { color: var(--accent); font-size: 18px; font-weight: 900; }

/* ── CALLOUTS ── */
.callout { padding: 14px 18px; border-radius: var(--r2); font-size: 13.5px; line-height: 1.6; margin: 16px 0; border: 2px solid; }
.callout-info  { background: #e8f4ff; border-color: #b3d9ff; color: #1a5a8a; box-shadow: 0 3px 0 #b3d9ff; }
.callout-warn  { background: #fff8e0; border-color: var(--yellow); color: #785a00; box-shadow: 0 3px 0 #e6c700; }
.callout-tip   { background: #e8fae8; border-color: #a8e6a8; color: #1a5a1a; box-shadow: 0 3px 0 #a8e6a8; }
.callout-success { background: var(--bg3); border-color: var(--border); color: var(--text2); padding: 10px 14px; }

/* ── REAL WORLD BOX ── */
.real-world-box {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2);
  padding: 20px; margin: 24px 0;
}
.real-world-title { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
.real-world-body { font-size: 13.5px; color: var(--text2); line-height: 1.7; }

/* ── END OF CHAPTER NAV ── */
.ch-end-nav {
  display: flex; gap: 12px; margin-top: 36px; padding-top: 24px;
  border-top: 2px solid var(--border); justify-content: center; flex-wrap: wrap;
}
.ch-end-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 16px 24px; border-radius: var(--r2); cursor: pointer;
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); color: var(--text2); font-weight: 800;
  font-size: 13px; transition: all .1s; min-width: 130px;
  text-transform: uppercase; letter-spacing: .04em;
}
.ch-end-btn:hover { transform: translateY(-2px); border-color: var(--accent); color: var(--accent); }
.ch-end-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
.ch-end-btn.primary {
  background: var(--green); color: var(--greenfg);
  border-color: var(--green2); border-bottom-color: var(--green2);
}
.ch-end-btn.primary:hover { background: var(--green2); }
.ch-end-btn-icon { font-size: 22px; }
.ch-end-btn-label { font-size: 11px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px; border-radius: var(--r2); font-size: 14px;
  font-weight: 800; border: 2px solid; cursor: pointer; transition: all .1s;
  text-transform: uppercase; letter-spacing: .04em;
}
.btn:active { transform: translateY(2px); border-bottom-width: 2px !important; }
.btn-primary {
  background: var(--green); color: var(--greenfg);
  border-color: var(--green2); border-bottom: 4px solid var(--green2);
}
.btn-primary:hover { background: var(--green2); }
.btn-ghost {
  background: var(--bg2); color: var(--text2);
  border-color: var(--border2); border-bottom: 4px solid var(--border2);
}
.btn-ghost:hover { background: var(--bg3); color: var(--text); }

/* ── GAME ── */
.game-wrap { max-width: 680px; }
.game-start-card { max-width: 420px; margin: 0 auto; text-align: center; padding: 40px 24px; }
.game-icon { font-size: 56px; margin-bottom: 16px; filter: drop-shadow(0 4px 0 rgba(0,0,0,.1)); }
.game-start-title { font-size: 24px; font-weight: 900; color: var(--text); margin-bottom: 8px; letter-spacing: -.5px; }
.game-start-desc { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
.game-rules { display: flex; justify-content: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
.game-rule {
  font-size: 13px; font-weight: 700; color: var(--text2);
  background: var(--bg3); padding: 8px 14px; border-radius: var(--r);
  border: 2px solid var(--border);
}
.game-hud {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding: 12px 18px;
  background: var(--bg2); border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
}
.hud-score { font-size: 22px; font-weight: 900; color: var(--green); font-family: var(--mono); }
.hud-timer { font-size: 15px; font-weight: 800; color: var(--text2); font-family: var(--mono); }
.game-q-text { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
.game-opts { display: flex; flex-direction: column; gap: 10px; }
.game-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); cursor: pointer; transition: all .1s;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.game-opt:hover { border-color: var(--accent); border-bottom-color: var(--accent2); transform: translateY(-1px); }
.game-opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.game-opt.correct { border-color: var(--green); border-bottom-color: var(--green2); background: #e8fae8; color: #1a5a1a; }
.game-opt.wrong   { border-color: var(--red); background: #fff0f0; color: #8a1a1a; }
.opt-letter {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg3); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; flex-shrink: 0; color: var(--text2);
  font-family: var(--mono);
}
.game-result-card { max-width: 420px; margin: 32px auto 0; text-align: center; }
.result-score { font-size: 60px; font-weight: 900; color: var(--green); font-family: var(--mono); line-height: 1; margin-bottom: 4px; }
.result-label { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 24px; }
.result-emoji { font-size: 52px; margin-bottom: 8px; }
.result-btns { display: flex; gap: 12px; justify-content: center; }
.result-stars { font-size: 28px; margin-bottom: 8px; }

/* ── QUIZ ── */
.quiz-wrap { max-width: 680px; }
.quiz-prog { display: flex; gap: 4px; margin-bottom: 24px; }
.quiz-pip { flex: 1; height: 8px; border-radius: 4px; background: var(--border2); transition: background .2s; }
.quiz-pip.done { background: var(--green); }
.quiz-pip.cur  { background: var(--accent); }
.quiz-q-card { display: none; }
.quiz-q-card.active { display: block; }
.quiz-meta { font-size: 11px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.quiz-q { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
.quiz-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.quiz-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 18px; border-radius: var(--r2);
  border: 2px solid var(--border); border-bottom: 4px solid var(--border2);
  background: var(--bg2); cursor: pointer; transition: all .1s;
  font-size: 14px; font-weight: 600; color: var(--text);
}
.quiz-opt:hover { border-color: var(--accent); border-bottom-color: var(--accent2); transform: translateY(-1px); }
.quiz-opt:active { transform: translateY(2px); border-bottom-width: 2px; }
.quiz-opt.selected { border-color: var(--accent); background: #f0f4ff; }
.quiz-opt.correct   { border-color: var(--green); border-bottom-color: var(--green2); background: #e8fae8; }
.quiz-opt.wrong     { border-color: var(--red); border-bottom-color: #cc0000; background: #fff0f0; }
.quiz-exp {
  padding: 14px 18px; background: #e8fae8; border-radius: var(--r2);
  border: 2px solid var(--green); border-bottom: 4px solid var(--green2);
  font-size: 13.5px; color: #1a5a1a; margin: 12px 0; line-height: 1.6;
}
.quiz-actions { display: flex; gap: 10px; margin-top: 8px; }
.quiz-result { display: none; text-align: center; padding: 32px 0; }
.qr-score { font-size: 56px; font-weight: 900; font-family: var(--mono); color: var(--green); margin-bottom: 4px; }
.qr-label { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 24px; }
.quiz-nav { display: flex; justify-content: space-between; margin-top: 12px; }

/* ── CHEAT / SUMMARY ── */
.cheat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 14px; margin-top: 8px; }
.cheat-card {
  background: var(--bg2); border: 2px solid var(--border);
  border-bottom: 4px solid var(--border2); border-radius: var(--r2); padding: 16px;
}
.cheat-card-title { font-size: 11px; font-weight: 900; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .08em; }
.cheat-item { display: flex; justify-content: space-between; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.cheat-item:last-child { border-bottom: none; }
.cheat-key { font-family: var(--mono); color: var(--accent); font-weight: 700; font-size: 11.5px; flex-shrink: 0; }
.cheat-val { color: var(--text2); text-align: right; font-size: 11.5px; }

/* ── CREDITS ── */
.credits-bar { border-top: 2px solid var(--border); padding: 32px 0; margin-top: 48px; }
.credits-title { font-size: 10px; font-weight: 900; color: var(--accent); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 16px; font-family: var(--mono); }
.credits-grid { display: flex; flex-wrap: wrap; gap: 24px; }
.credit-group { flex: 1; min-width: 140px; }
.credit-group-title { font-size: 11px; font-weight: 800; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
.credit-item { font-size: 12px; color: var(--text3); line-height: 1.9; }
.credit-item a { color: var(--accent); text-decoration: none; font-weight: 700; }
.credit-item a:hover { text-decoration: underline; }

/* ── MOBILE ── */
@media (max-width: 700px) {
  .main { padding-top: 108px; padding-left: 16px; padding-right: 16px; }
  .ch-title { font-size: 20px; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .flow-row { padding: 14px; gap: 4px; }
  .flow-step-label { font-size: 9px; max-width: 52px; }
  .game-rules { gap: 10px; }
  .quiz-actions { flex-wrap: wrap; }
  .result-btns { flex-wrap: wrap; }
  .ch-end-nav { gap: 8px; }
  .ch-end-btn { min-width: 100px; padding: 14px 16px; }
}
@media (max-width: 480px) {
  .ch-nav { padding: 6px 10px; }
  .ch-btn { padding: 7px 10px; min-width: 44px; }
}


/* ── RICH SUMMARY CARDS ── */
.sum-block { margin-bottom: 28px; }
.sum-block-title {
  font-size: 13px; font-weight: 800; color: var(--accent);
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 10px; font-family: var(--mono);
  display: flex; align-items: center; gap: 8px;
}
.sum-block-title::after { content:''; flex:1; height:1px; background:var(--border); }
.sum-row {
  display: grid; grid-template-columns: 200px 1fr;
  gap: 10px 16px; padding: 9px 0;
  border-bottom: 1px solid var(--border); align-items: start;
}
.sum-row:last-child { border-bottom: none; }
.sum-k { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); line-height: 1.4; }
.sum-v { font-size: 13px; color: var(--text2); line-height: 1.6; }
.sum-v strong { color: var(--text); font-weight: 700; }
.sum-v code { font-size: 11.5px; background: var(--bg3); padding: 1px 5px; border-radius: 3px; color: var(--accent2,var(--accent)); font-family: var(--mono); }
.sum-tip { margin-top:10px; padding:10px 14px; background:var(--yellowbg,#fffbeb); border-radius:var(--r,8px); border:1px solid #fde68a; font-size:13px; color:#713f12; line-height:1.6; }
.sum-danger { margin-top:10px; padding:10px 14px; background:#fff1f2; border-radius:var(--r,8px); border:1px solid #fecaca; font-size:13px; color:#991b1b; line-height:1.6; }
@media (max-width:560px) { .sum-row { grid-template-columns:1fr; gap:2px; } }
/* ── FULL REVIEW DRAWER ── */
.review-btn { flex-shrink:0; padding:5px 12px; background:var(--accent); color:#fff; border:none; border-radius:var(--r,8px); font-size:12px; font-weight:700; cursor:pointer; transition:all .15s; margin-left:6px; }

  descs:["Capture filters, display filters, TCP streams, dissectors, ניתוח HTTP/TLS", "AS numbers, BGP sessions, path attributes, route hijacking, RPKI", "DNSSEC, DNS over HTTPS, DNS amplification DDoS, split-horizon, resolver internals", "Multiplexing, Server Push, Header Compression, QUIC, HTTP/3 על UDP", "TLS 1.3 handshake, cipher suites, certificates, OCSP, certificate transparency", "eBPF programs, XDP, network observability, Cilium, eBPF vs iptables", "Docker networking, Kubernetes CNI, overlay networks, service mesh, eBPF vs iptables", "TCP tuning, kernel parameters, congestion control, RDMA, zero-copy networking"],
  tabs:['📖 למידה','🎮 משחק','📋 סיכום'],
  tabKeys:['learn','game','cheat'],
  gameTitle:'QUIZ',gameDesc:'ענה מהר. כל תשובה נכונה = +10 נקודות.',
  gameStart:'▶ התחל',gameSeconds:'שניות',gameQuestions:'שאלות',gameXP:'+10 XP',
  gameAgain:'🔄 שוב',gameToCheat:'📋 סיכום ←',
  quizPrev:'→ הקודם',quizNext:'הבא ←',quizSubmit:'שלח ✓',
  quizExplain:'💡 הסבר:',quizToLab:'',quizAgain:'🔄 שוב',
  resultLabels:['נסי שוב!','עוד קצת...','טוב!','כל הכבוד!','מצוין!','מושלם! 🎯'],
  lbTitle:'// לוח תוצאות',labExplain:'💡 הסבר:',
  points:"נק'",of:'מתוך',question:'שאלה',
  optLetters:['א','ב','ג','ד'],playerName:'את',unknownPlayer:'שחקן',pct:'% נכון',
  learn:[
`<div class="did-you-know">💡 <strong>ידעת?</strong> Wireshark פותח ב-1998 על ידי Gerald Combs בשם Ethereal. ב-2006 שונה השם ל-Wireshark. כיום הוא הכלי המשמש יותר מכל אחר לניתוח רשת — security researchers, developers, ו-network engineers ברחבי העולם. הוא מציג כל packet שעובר בממשק הרשת שלך בפירוט מלא.</div>

<div class="section-title">כיצד Wireshark עובד — מבפנים</div>
<p class="prose">Wireshark משתמש ב-libpcap (Linux) או WinPcap/Npcap (Windows) כדי להכניס את כרטיס הרשת שלך ל-promiscuous mode — מצב שבו הוא מאזין לכל ה-packets ברשת, לא רק לאלה שמיועדים לו. כל packet שעובר נשמר ב-buffer ומוצג ב-real-time. Wireshark מפרק (dissects) כל packet לפרוטוקולים שלו: Ethernet frame ← IP packet ← TCP segment ← HTTP message.</p>
<p class="prose">הממשק מחולק לשלושה חלקים: Packet List (רשימת כל ה-packets לפי זמן), Packet Details (פירוט מלא של ה-packet שנבחר — כל שכבה וכל field), ו-Packet Bytes (ייצוג hex של ה-bytes הגולמיים). להבין את שלושת החלקים יחד — זה מה שהופך Wireshark למכשיר דיאגנוסטי אמיתי.</p>

<div class="section-title">Capture Filters — לפני שמקליטים</div>
<p class="prose">Capture filters נכתבים ב-BPF (Berkeley Packet Filter) syntax ופועלים ב-kernel level לפני שהpackets מגיעים ל-Wireshark. זה קריטי ב-busy networks — ללא filter הbuffer מתמלא מהר ו-Wireshark מאבד packets. כתוב את ה-filter לפני שלוחצים Start.</p>
<pre class="code-block"><code><span class="comment"># Capture Filters — BPF syntax</span>
host 192.168.1.100          <span class="comment"># traffic מ/אל IP ספציפי</span>
port 443                    <span class="comment"># רק HTTPS</span>
port 80 or port 443         <span class="comment"># HTTP ו-HTTPS</span>
net 192.168.1.0/24          <span class="comment"># כל הsubnet</span>
not port 22                 <span class="comment"># הכל חוץ מSSH</span>
tcp and host 10.0.0.5       <span class="comment"># TCP בלבד מ-host ספציפי</span></code></pre>

<div class="section-title">Display Filters — אחרי שמקליטים</div>
<p class="prose">Display filters מסננים מה מוצג מתוך ה-capture הקיים מבלי למחוק packets. הסינטקס שונה לגמרי מCapture filters — הוא מבוסס על שמות שדות מהdissectors. אפשר לסנן לפי כל field בכל פרוטוקול.</p>
<pre class="code-block"><code><span class="comment"># Display Filters — Wireshark syntax</span>
ip.addr == 192.168.1.100     <span class="comment"># IP כלשהו</span>
ip.src == 10.0.0.5          <span class="comment"># source IP בלבד</span>
tcp.port == 443              <span class="comment"># HTTPS</span>
http.request.method == "GET" <span class="comment"># GET requests בלבד</span>
dns.qry.name contains "google" <span class="comment"># DNS queries לgoogle</span>
tcp.flags.syn == 1 && tcp.flags.ack == 0  <span class="comment"># רק SYN (חיבורים חדשים)</span>
frame.time_delta > 1        <span class="comment"># packets עם gap מעל שנייה</span>
tls.handshake.type == 1     <span class="comment"># TLS Client Hello</span></code></pre>

<div class="section-title">TCP Stream — לראות שיחה שלמה</div>
<p class="prose">אחת הפיצ'רים החזקות ביותר: לחיצה ימנית על TCP packet ← Follow ← TCP Stream מראה את כל ה-conversation בין שני hosts — request ו-response ביחד, בצבעים שונים. זה מאפשר לראות HTTP requests/responses, SMTP conversations, ו-כל שיחת TCP בייצוג קריא.</p>

<div class="real-world-box">
  <div class="real-world-title">🌍 Case Study: debugging slow API עם Wireshark</div>
  <div class="real-world-body">
    API call לוקח 3 שניות. הdeveloper טוען שה-backend מהיר. איך מכריעים? Wireshark על client. Filter: <code>ip.addr == api.server.com && tcp</code>. בודק TCP stream time deltas. גילוי: ה-TLS handshake לוקח 2.3 שניות — Server response time היה 0.1 שניות. הבעיה: DNS resolution ל-api.server.com לקחה 2.2 שניות (TTL נמוך מדי, 60 שניות, ו-high DNS load). פתרון: העלאת TTL ל-300.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 בפועל</strong></div>

<p class="prose">Wireshark הופך מכלי מפחיד לכלי שגרתי ברגע שמבינים שלושה תרחישים ספציפיים. לא צריך להבין כל packet — צריך לדעת לשאול את השאלה הנכונה.</p>

<div class="section-title">תרחיש 1: למה ה-API איטי?</div>
<p class="prose">פותחים Wireshark, מגדירים capture filter <code>host api.server.com</code>, ומריצים את ה-request. עכשיו בוחרים packet כלשהו מה-response, לוחצים ימני ← Follow ← TCP Stream. רואים מתי ה-SYN נשלח, מתי ה-SYN-ACK חזר, מתי ה-TLS Handshake הסתיים, ומתי ה-data הגיע. ה-delta בין SYN ל-data — זה ה-latency האמיתית. אם TLS לוקח 800ms מתוך 900ms — ה-בעיה היא DNS או certificate validation, לא ה-server.</p>
<pre class="code-block"><code><span class="comment"># Workflow: API latency debug</span>
1. Wireshark ← Capture ← Interface שלך
2. Capture Filter: host api.example.com
3. הרץ request
4. Stop capture
5. Display Filter: tcp.stream eq 0
6. Statistics ← TCP Stream Graphs ← Time Sequence (tcptrace)
   <span class="comment"># רואה בדיוק איפה הזמן הולך</span></code></pre>

<div class="section-title">תרחיש 2: מה המחשב שולח ברשת?</div>
<p class="prose">כדי לראות כל ה-traffic שמחשב שלך מייצר, אין צורך ב-filter. פשוט מריצים capture ל-30 שניות ואז: Statistics ← Protocol Hierarchy. מקבלים breakdown מלא — כמה TCP, כמה UDP, כמה DNS, כמה HTTP. אם רואים protocol לא מוכר — display filter על שמו וממשיכים לחקור.</p>

<div class="section-title">תרחיש 3: אימות SSL Certificate בפועל</div>
<pre class="code-block"><code><span class="comment"># Display filter לראות TLS Handshake בלבד</span>
tls.handshake.type == 1   <span class="comment"># Client Hello</span>

`<div class="did-you-know">💡 <strong>ידעת?</strong> BGP מנהל את הניתוב של כל האינטרנט — אבל הוא פועל על trust בלבד. אין authentication ל-route announcements. כל AS יכול "להכריז" שהוא יודע route לכל IP בעולם, וה-internet יאמין. זה גרם לעשרות BGP hijacking incidents — כולל ב-2010 כש-China Telecom "ניתבה" 15% מתעבורת האינטרנט דרך שרתים סינים.</div>

<div class="section-title">מהו BGP ולמה הוא קיים?</div>
<p class="prose">BGP (Border Gateway Protocol) הוא ה-EGP (Exterior Gateway Protocol) של האינטרנט — הפרוטוקול שמחבר בין Autonomous Systems. AS (Autonomous System) הוא רשת שנמצאת תחת ניהול אחד — ISP, חברת ענן, אוניברסיטה, בנק. לכל AS יש ASN (Autonomous System Number) ייחודי. Israel Internet Association הוא AS47886. Google הוא AS15169. Amazon AWS הוא AS16509. כשpacket צריך לנסוע מ-AS אחד לאחר, BGP מחליט איך.</p>
<p class="prose">בניגוד ל-OSPF שמחפש shortest path בתוך רשת אחת, BGP הוא policy-based routing. ISP יכול להחליט שהוא מעדיף לשלוח traffic דרך AS מסוים מסיבות עסקיות — לא רק technical. Peering agreements, transit costs, ו-political considerations כולם משפיעים על BGP decisions.</p>

<div class="section-title">BGP Sessions ו-Peers</div>
<pre class="code-block"><code><span class="comment"># BGP דורש TCP session על port 179</span>
<span class="comment"># iBGP — between routers in same AS</span>
<span class="comment"># eBGP — between routers in different AS</span>

<span class="comment"># BGP States (state machine)</span>
Idle → Connect → Active → OpenSent → OpenConfirm → Established

<span class="comment"># בדיקת BGP sessions ב-Linux (FRRouting)</span>
vtysh -c "show bgp summary"
<span class="comment"># Neighbor      AS  MsgRcvd  MsgSent  Up/Down  State/PfxRcd</span>
<span class="comment"># 10.0.0.1   65001    12450    12300   1d02h     450</span></code></pre>

<div class="section-title">BGP Path Attributes — כיצד בוחרים route</div>
<p class="prose">כשיש כמה paths לאותו prefix, BGP בוחר לפי רשימת attributes מסודרת. ה-decision process מסתכל על כל attribute לפי סדר מוגדר עד שמוצא tie-breaker.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>סדר</th><th>Attribute</th><th>ערך עדיף</th></tr></thead><tbody>
<tr><td>1</td><td>Weight (Cisco)</td><td>גבוה יותר</td></tr>
<tr><td>2</td><td>Local Preference</td><td>גבוה יותר (default 100)</td></tr>
<tr><td>3</td><td>Locally originated</td><td>network/aggregate</td></tr>
<tr><td>4</td><td>AS Path length</td><td>קצר יותר</td></tr>
<tr><td>5</td><td>Origin</td><td>IGP > EGP > incomplete</td></tr>
<tr><td>6</td><td>MED</td><td>נמוך יותר</td></tr>
<tr><td>7</td><td>eBGP > iBGP</td><td>eBGP מועדף</td></tr>
</tbody></table></div>

<div class="section-title">BGP Hijacking ו-RPKI</div>
<p class="prose">BGP Hijacking קורה כש-AS מכריז על prefix שלא שייך לו. ה-internet מאמין ל-announcement, ו-traffic מתחיל לזרום לAS הלא נכון. RPKI (Resource Public Key Infrastructure) הוא מנגנון שמוסיף cryptographic validation: כל prefix signed ע"י owner לגיטימי. Router שתומך ב-RPKI ידחה announcements לא חתומות.</p>

<div class="real-world-box">
  <div class="real-world-title">🌍 MyEtherWallet BGP Hijack — $150K בקריפטו נגנב</div>
  <div class="real-world-body">
    אפריל 2018: AS10297 (eNet Inc, Ohio) הכריזה על BGP prefix של Amazon Route 53 DNS. כל queries ל-myetherwallet.com הופנו ל-phishing server. המתקפה נמשכה 2 שעות. משתמשים שהתחברו קיבלו TLS certificate מ-CA לא אמין — אבל רבים לחצו "proceed anyway".<br><br>
    הלקח הכפול: RPKI היה מונע את ה-BGP hijack. Certificate pinning ב-browser היה מונע את ה-phishing. שניהם לא היו מיושמים.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 בפועל</strong></div>

<p class="prose">רוב developers לא מגדירים BGP ישירות — אבל כולם נתקלים בבעיות שנגרמות ממנו. הידע הפרקטי כאן: כיצד לאבחן BGP בעיות, כיצד לקרוא BGP looking glasses, וכיצד לבדוק routing מהארגון שלך.</p>

<div class="section-title">Looking Glass — לראות Internet Routing</div>
<p class="prose">Looking Glass הוא interface ציבורי לrouter של ISP גדול שמאפשר לשאול שאלות BGP. זה הכלי האמיתי לאבחון "למה traffic ממדינה X מגיע בנתיב שגוי?"</p>
<pre class="code-block"><code><span class="comment"># כלים ציבוריים:</span>
https://lg.he.net          <span class="comment"># Hurricane Electric — הנפוץ ביותר</span>
https://bgp.tools           <span class="comment"># בדוק כל ASN ו-prefix</span>
https://bgpview.io          <span class="comment"># ויזואלי, מצוין</span>

<span class="comment"># מה לשאול:</span>
<span class="comment"># "show route 8.8.8.8" ← כיצד מגיעים ל-Google DNS</span>
<span class="comment"># "show bgp 1.1.1.1" ← AS Path ל-Cloudflare</span>

<span class="comment"># בדיקה מ-terminal:</span>
traceroute -A 8.8.8.8   <span class="comment"># -A מציג ASN בכל hop</span>
mtr --aslookup google.com  <span class="comment"># live + ASN</span></code></pre>

<div class="section-title">כיצד לזהות BGP Hijack</div>
<p class="prose">אם site שעבד פתאום לא מגיב, ו-traceroute מראה hops לא מוכרים — כדאי לבדוק ב-BGP tools. הסימנים: AS Path שמשתנה פתאום, traffic שעובר דרך מדינה לא צפויה, latency שקפצה פי 3-5 ללא שינוי בתשתית.</p>
<pre class="code-block"><code><span class="comment"># בדיקת AS Path שינוי</span>
curl -s "https://stat.ripe.net/data/bgp-state/data.json?resource=8.8.8.8" | python3 -m json.tool | grep "asns"
<span class="comment"># השווה ל-AS Path הרגיל — שינוי = דגל אדום</span>

<span class="comment"># RPKI validation check</span>
curl -s "https://rpki-validator.realmv6.org/api/v1/validity/AS15169/8.8.8.0/24"</code></pre>

<div class="callout callout-tip"><strong>💡 מתי זה רלוונטי לך?</strong> אם אתה מנהל CDN, בונה infrastructure ב-multiple regions, או מאבחן latency anomalies — BGP looking glasses הם הכלי הראשון לבדוק.</div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> DNS הוא הפרוטוקול שמשמש הכי הרבה ל-malware communication. Researchers מצאו שיותר מ-90% מה-malware משתמש ב-DNS לC2 (Command & Control). למה? כי port 53 כמעט תמיד פתוח, DNS traffic נראה לגיטימי, ו-DNS queries קטנות ולא מחשידות.</div>

<div class="section-title">DNS Resolver Internals — מה קורה בפנים</div>
<p class="prose">כשמחשב שואל "מה ה-IP של google.com", הוא פונה ל-recursive resolver — לרוב של ה-ISP, או 8.8.8.8 (Google), או 1.1.1.1 (Cloudflare). ה-resolver הוא זה שעושה את כל העבודה: פונה ל-root servers, TLD servers, ו-authoritative servers. הlclient עצמו לא פונה ישירות לאף שרת — רק לresolver.</p>
<p class="prose">Caching הוא מה שהופך DNS לסקיילאבילי. כל תשובה מגיעה עם TTL (Time To Live) — הזמן שהresolver יכול לshlot אותה. google.com עם TTL של 300 שניות = הresolver שומר את התשובה 5 דקות ולא שואל שוב. ריצת <code>dig +trace google.com</code> מציגה את כל השלבים בזמן אמת.</p>

<div class="section-title">DNSSEC — אימות cryptographic</div>
<p class="prose">DNS רגיל אינו מאומת — resolver מאמין לכל תשובה שמקבל. DNSSEC (DNS Security Extensions) מוסיף digital signatures לכל record. כל zone חותמת את ה-records שלה עם private key, ו-resolver שתומך ב-DNSSEC מאמת את החתימה לפני שמחזיר תשובה. DNSSEC לא מצפין — הוא רק מאמת שהתשובה אמיתית.</p>
<pre class="code-block"><code><span class="comment"># בדיקת DNSSEC</span>
dig +dnssec google.com A
<span class="comment"># RRSIG record = signature על ה-A record</span>

dig +short DS google.com @8.8.8.8
<span class="comment"># DS record = Delegation Signer — hash של child zone key</span>

<span class="comment"># DoH — DNS over HTTPS</span>
curl -s "https://dns.google/resolve?name=google.com&type=A" | jq .
<span class="comment"># DNS בתוך HTTPS — ISP לא רואה queries</span>

<span class="comment"># DoT — DNS over TLS (port 853)</span>
kdig @1.1.1.1 +tls google.com</code></pre>

<div class="section-title">DNS Attacks</div>
<div class="grid-2">
<div class="card"><div class="card-icon">💥</div><div class="card-title">DNS Amplification DDoS</div><div class="card-body">תוקף שולח DNS queries עם IP מזויף (spoofed source) לresolvers פתוחים. DNS response גדול פי 50-100 מה-query. Resolver שולח את ה-response לקורבן. Amplification factor: 100x. הגנה: BCP38 filtering, disable open resolvers.</div></div>
<div class="card"><div class="card-icon">🎭</div><div class="card-title">DNS Cache Poisoning</div><div class="card-body">תוקף "מרעיל" את ה-cache של resolver עם תשובה מזויפת. בDan Kaminsky attack (2008): race condition בDNS שאפשר cache poisoning על כל resolver. נפתר עם source port randomization. DNSSEC פותר לגמרי.</div></div>
<div class="card"><div class="card-icon">🚇</div><div class="card-title">DNS Tunneling</div><div class="card-body">מחביא נתונים בDNS queries. Malware מקודד data ב-subdomain: "dGF1c2Vy.evil.com". ה-"query" עובר לDNS server של התוקף שמפענח. זיהוי: queries ארוכות, subdomains עם base64, נפח חריג.</div></div>
<div class="card"><div class="card-icon">🔀</div><div class="card-title">Split-Horizon DNS</div><div class="card-body">אותו domain נותן תשובות שונות לפי מקור ה-query. internal.company.com מחזיר 10.0.0.5 לmachines מבפנים, ומחזיר NXDOMAIN לבחוץ. VPN split tunneling מסתמך על זה.</div></div>
</div>

<div class="real-world-box">
  <div class="real-world-title">🌍 DNS Tunneling Detection — כיצד מזהים</div>
  <div class="real-world-body">
    חברות אבטחה כמו Cisco Umbrella מנתחות DNS traffic לזיהוי tunneling. Signs: queries ארוכות מ-50 תווים, entropy גבוה ב-subdomain (נראה כמו base64), אותו domain מקבל עשרות queries לדקה, responses שמכילות נתונים במקום IPs.<br><br>
    בניית detection: <code>cat dns.log | awk '{print length($5), $5}' | sort -rn | head -20</code> — מצא queries ארוכות. אם רואה subdomains כמו "aGVsbG8gd29ybGQ" — זה base64 ל-"hello world". זה tunneling.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 בפועל</strong></div>

<p class="prose">DNS בעיות הן בין הנפוצות ביותר ב-production. "Site לא מגיב", "Certificate error", "Email לא מגיע" — כולם מתחילים בבדיקת DNS. הכלים הבאים הם שגרה יומיומית.</p>

<div class="section-title">Playbook: DNS Debug</div>
<pre class="code-block"><code><span class="comment"># שלב 1: האם DNS record קיים?</span>
dig +short mysite.com A
dig +short mysite.com AAAA
<span class="comment"># אם ריק — record חסר. אם לא ריק — ממשיכים.</span>

<span class="comment"># שלב 2: האם הבעיה ב-DNS הספציפי שלי?</span>
dig mysite.com @8.8.8.8    <span class="comment"># שאל Google DNS</span>
dig mysite.com @1.1.1.1    <span class="comment"># שאל Cloudflare DNS</span>
dig mysite.com @9.9.9.9    <span class="comment"># שאל Quad9</span>
<span class="comment"># אם תשובות שונות — cache poisoning או propagation בעיה</span>

<span class="comment"># שלב 3: TTL — כמה עוד צריך לחכות?</span>
dig mysite.com | grep -E "ANSWER|[0-9]+\\s+IN"
<span class="comment"># 300 IN A = עוד 300 שניות עד שcache מתחדש</span>

<span class="comment"># שלב 4: Propagation check</span>
<span class="comment"># https://dnschecker.org — רואה מה DNS servers ברחבי העולם רואים</span></code></pre>

<div class="section-title">Email לא מגיע — SPF/DKIM/DMARC</div>
<pre class="code-block"><code><span class="comment"># בדוק SPF record</span>
dig TXT mysite.com | grep spf
<span class="comment"># v=spf1 include:_spf.google.com ~all ← נכון</span>
<span class="comment"># אם חסר → email עלול ללכת לspam</span>

<span class="comment"># בדוק DMARC</span>
dig TXT _dmarc.mysite.com
<span class="comment"># v=DMARC1; p=reject ← הגנה מלאה</span>
<span class="comment"># v=DMARC1; p=none ← monitoring בלבד — לשדרג</span>

<span class="comment"># כלי לבדיקה מלאה:</span>
<span class="comment"># https://mxtoolbox.com/SuperTool.aspx</span></code></pre>

<div class="section-title">הגדרת DNS Records ב-Production</div>
<p class="prose">TTL נמוך (60 שניות) = שינויים מהירים, אבל יותר DNS queries ועומס. TTL גבוה (3600+) = יציבות, אבל שינויים לוקחים שעה להתפשט. הכלל: הורד TTL ל-300 שעה לפני deployment, בצע שינוי, החזר TTL ל-3600 אחרי שמוודאים שעובד.</p>

`<div class="did-you-know">💡 <strong>ידעת?</strong> HTTP/1.1 פורסם ב-1997 ועדיין רץ על מיליארדי חיבורים. HTTP/2 (2015) הביא multiplexing שחסך 30-50% load time. HTTP/3 (2022) ניתק מ-TCP לגמרי ועבר ל-QUIC על UDP — ומשפר latency ב-30% על רשתות גרועות. TikTok, Google, Facebook — כולם HTTP/3.</div>

<div class="section-title">מה היה שבור ב-HTTP/1.1</div>
<p class="prose">HTTP/1.1 עם keep-alive אפשר כמה requests על חיבור אחד — אבל לפי הסדר. Request B לא יכול להתחיל עד ש-Request A מסתיים. זה נקרא Head-of-Line Blocking. דף עם 100 resources גרם לbrowsers לפתוח 6 חיבורים מקביליים לכל domain — פתרון workaround שיצר overhead ולא פתר את הבעיה האמיתית.</p>
<p class="prose">בנוסף, HTTP headers נשלחו מחדש בכל request. Cookie header של 500 bytes שנשלח ב-100 requests = 50KB של data overhead לbessentially מידע שלא השתנה. בדפדוף מובייל על 3G — זה משמעותי.</p>

<div class="section-title">HTTP/2 — הפתרון</div>
<pre class="code-block"><code><span class="comment"># HTTP/2 Key Features</span>

<span class="comment"># 1. Binary Protocol (לא text)</span>
<span class="comment"># HTTP/1: GET /index.html HTTP/1.1
Host: example.com</span>
<span class="comment"># HTTP/2: binary frames — מהיר לparse, פחות שגיאות</span>

<span class="comment"># 2. Multiplexing — requests מקביליים על connection אחד</span>
Stream 1: GET /index.html  →  ← Response
Stream 3: GET /style.css   →  ← Response
Stream 5: GET /app.js      →  ← Response (כולם בו-זמנית!)

<span class="comment"># 3. Header Compression (HPACK)</span>
<span class="comment"># Request 1: שולח כל ה-headers</span>
<span class="comment"># Request 2: שולח רק את מה שהשתנה — 90% חיסכון</span>

<span class="comment"># 4. Server Push — Server שולח בלי request</span>
<span class="comment"># Browser מבקש index.html → Server שולח גם style.css ו-app.js</span>

<span class="comment"># בדיקה</span>
curl -I --http2 https://www.google.com | head -3
<span class="comment"># HTTP/2 200</span></code></pre>

<div class="section-title">HTTP/3 ו-QUIC — TCP שמת, חי ה-UDP</div>
<p class="prose">HTTP/2 פתר Head-of-Line Blocking ב-application layer, אבל TCP עדיין סבל ממנו ב-transport layer: packet אחד שאבד עוצר את כל ה-streams עד שישוחזר. QUIC (Quick UDP Internet Connections) פתר זאת על ידי מעבר ל-UDP עם reliability מובנית per-stream. כל stream עצמאי — packet שאבד ב-stream 3 לא עוצר stream 1 ו-5.</p>
<pre class="code-block"><code><span class="comment"># QUIC Advantages</span>
<span class="comment"># 1. 0-RTT Connection: client שמכיר את השרת</span>
<span class="comment">#    מתחבר ומשלח data בpacket הראשון (לעומת TCP: 3-way handshake)</span>

<span class="comment"># 2. Connection Migration</span>
<span class="comment">#    מחשב שמחליף מWiFi לcellular לא מאבד connection</span>
<span class="comment">#    QUIC connection ID לא תלוי ב-IP או port</span>

<span class="comment"># 3. Encrypted by default</span>
<span class="comment">#    QUIC = TLS 1.3 מובנה, לא optional</span>

<span class="comment"># בדיקה האם site תומך HTTP/3</span>
curl -I --http3 https://www.cloudflare.com
<span class="comment"># alt-svc: h3=":443" ← האתר תומך HTTP/3</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 HTTP/2 Server Push — הפיצ'ר שנכשל</div>
  <div class="real-world-body">
    Server Push נראה מבריק בתיאוריה: server שולח resources לפני שהbrowser מבקש. בפרקטיקה — נכשל. browsers לא תמיד רצו את ה-pushed resources (כבר ב-cache). bandwidth בוזבז. Chrome הסיר תמיכה ב-Server Push ב-2022.<br><br>
    HTTP/3 תיקן גישה אחרת: Early Hints (HTTP 103) — server שולח "hint" על resources שיגיעו, browser מתחיל לdownload תוך כדי שה-main response מגיע. פחות aggressive, הרבה יותר אפקטיבי בפרקטיקה.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 בפועל</strong></div>

<p class="prose">רוב ה-web servers תומכים ב-HTTP/2 כיום — אבל לא תמיד מוגדרים נכון. הנה איך בודקים, מאפשרים, ומכוונים.</p>

<div class="section-title">בדיקה: האם Site שלי ב-HTTP/2?</div>
<pre class="code-block"><code><span class="comment"># curl — בדוק protocol</span>
curl -sI --http2 https://mysite.com | head -1
<span class="comment"># HTTP/2 200 ← מוגדר</span>
<span class="comment"># HTTP/1.1 200 ← צריך לאפשר</span>

<span class="comment"># מה ה-server תומך?</span>
curl -sI https://mysite.com | grep -i "alt-svc"
<span class="comment"># alt-svc: h3=":443" ← גם HTTP/3!</span>

<span class="comment"># Chrome DevTools → Network → Protocol column</span>
<span class="comment"># h2 = HTTP/2, h3 = HTTP/3, http/1.1 = ישן</span></code></pre>

<div class="section-title">הפעלת HTTP/2 ב-nginx</div>
<pre class="code-block"><code><span class="comment"># nginx.conf</span>
server {
    listen 443 ssl http2;   <span class="comment"># ← הוסף http2</span>
    listen [::]:443 ssl http2;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    <span class="comment"># HTTP/2 push hints (better than Server Push)</span>
    add_header Link "&lt;/style.css&gt;; rel=preload; as=style";
    add_header Link "&lt;/app.js&gt;; rel=preload; as=script";
}

<span class="comment"># בדיקה אחרי שינוי:</span>
nginx -t && systemctl reload nginx
curl -sI --http2 https://mysite.com | head -2</code></pre>

<div class="section-title">HTTP/3 ב-Cloudflare (הדרך הקלה)</div>
<p class="prose">אם האתר מאחורי Cloudflare: Speed ← Optimization ← Protocol Optimization ← HTTP/3 ← Enable. Cloudflare מטפל בהכל — ה-origin server ממשיך לדבר HTTP/1.1 או HTTP/2 עם Cloudflare, והvisitors מקבלים HTTP/3.</p>

<div class="callout callout-tip"><strong>💡 מדידת ביצועים אמיתית:</strong> <code>curl -w "time_connect: %{time_connect}\\ntime_appconnect: %{time_appconnect}\\ntime_total: %{time_total}\\n" -o /dev/null -s https://mysite.com</code> — <code>time_appconnect</code> כולל TLS. ההפרש בין connect לappconnect = TLS overhead.</div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> TLS 1.3 (2018) הפחית את ה-handshake מ-2 round trips ל-1. זה אולי נשמע קטן — אבל על connection בין ניו יורק ללונדון (70ms RTT), זה חיסכון של 70ms בכל חיבור HTTPS. Google מדווחת שזה שיפר latency ב-40% לusers ב-high-latency connections.</div>

<div class="section-title">TLS Handshake — TLS 1.2 vs 1.3</div>
<p class="prose">TLS Handshake הוא הטקס שקורה לפני שdata מוצפן. Browser ו-server מסכימים על: איזה cipher לשמש, מאמתים את ה-certificate, ומייצרים session keys שישמשו להצפנת ה-data. TLS 1.3 פישט את התהליך משמעותית לעומת TLS 1.2.</p>
<pre class="code-block"><code><span class="comment"># TLS 1.2 — 2 Round Trips</span>
Client → Server: ClientHello (cipher list)
Server → Client: ServerHello + Certificate + ServerHelloDone
Client → Server: ClientKeyExchange + ChangeCipherSpec + Finished
Server → Client: ChangeCipherSpec + Finished
↑ 2 round trips לפני שdata זורם

<span class="comment"># TLS 1.3 — 1 Round Trip</span>
Client → Server: ClientHello + key_share (Diffie-Hellman public key)
Server → Client: ServerHello + key_share + Certificate + Finished
Client → Server: Finished
↑ 1 round trip. ↑ 0-RTT resumption לconnections חוזרים</code></pre>

<div class="section-title">Cipher Suites — מה מוצפן במה</div>
<p class="prose">Cipher Suite הוא "חבילה" של algorithms שמגדירה: key exchange (כיצד מחליפים keys), authentication (כיצד מאמתים), encryption (כיצד מצפינים data), ו-MAC (כיצד מאמתים integrity). TLS 1.3 הגביל ל-5 cipher suites בלבד — כולם חזקים. TLS 1.2 תמך ב-300+, כולל חלשים.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>חלק</th><th>TLS 1.3</th><th>TLS 1.2 (legacy)</th></tr></thead><tbody>
<tr><td>Key Exchange</td><td>ECDHE only</td><td>RSA, DHE, ECDHE</td></tr>
<tr><td>Auth</td><td>RSA / ECDSA</td><td>+ DSA (weak)</td></tr>
<tr><td>Encryption</td><td>AES-GCM, ChaCha20</td><td>+ RC4 (broken!), 3DES</td></tr>
<tr><td>MAC</td><td>Built into AEAD</td><td>SHA-1 (weak), SHA-256</td></tr>
</tbody></table></div>

<div class="section-title">Certificates ו-PKI</div>
<p class="prose">Certificate הוא "תעודת זהות" של server — חתומה על ידי Certificate Authority (CA) שה-browser סומך עליה. Certificate מכיל: domain name, public key, תאריך תפוגה, ו-digital signature של ה-CA. Browser מאמת: האם ה-CA מוכר? האם ה-domain מתאים? האם עדיין תקף?</p>
<pre class="code-block"><code><span class="comment"># בדיקת certificate</span>
openssl s_client -connect google.com:443 -showcerts 2>/dev/null | openssl x509 -noout -text | grep -E "Subject:|Issuer:|Not After"

<span class="comment"># Certificate Transparency — log public של כל certificates</span>
<span class="comment"># https://crt.sh/?q=google.com</span>
<span class="comment"># רואה כל certificate שהונפק ל-google.com אי פעם</span>

<span class="comment"># OCSP Stapling — בדיקת revocation</span>
openssl s_client -connect google.com:443 -status 2>/dev/null | grep -A 17 'OCSP Response'</code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 DigiNotar Hack — כיצד CA נפרץ</div>
  <div class="real-world-body">
    2011: DigiNotar (CA הולנדי) נפרץ. האקרים הנפיקו certificate מזויף ל-*.google.com. כ-300,000 איראנים שניסו לגשת ל-Gmail קיבלו certificate שעבר validation — Chrome אמר "מחובר בבטחה". אבל ה-man-in-the-middle קרא את כל ה-traffic.<br><br>
    Certificate Transparency נוצר בדיוק בגלל DigiNotar: כל certificate חייב להירשם ב-public log. Browser שמקבל certificate שלא רשום — מסרב. זה מאפשר לzהות מיד כשCA הנפיק certificate לא מורשה.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 בפועל</strong></div>

<p class="prose">TLS misconfiguration היא אחת הסיבות הנפוצות ל-security findings. הכלים הבאים עוזרים לוודא שההגדרה נכונה לפני שמישהו אחר מוצא את הבעיה.</p>

<div class="section-title">SSL Labs — בדיקה מקיפה</div>
<p class="prose">SSL Labs של Qualys הוא הסטנדרט לבדיקת TLS configuration. https://ssllabs.com/ssltest — מזין domain, מקבל ציון A/B/C/F עם פירוט מלא: cipher suites, certificate chain, supported protocols, HSTS. מטרה: ציון A+.</p>

<div class="section-title">בדיקות מ-Terminal</div>
<pre class="code-block"><code><span class="comment"># מה ה-TLS version שהשרת משתמש?</span>
openssl s_client -connect mysite.com:443 -tls1_3 2>/dev/null | grep "Protocol"
openssl s_client -connect mysite.com:443 2>/dev/null | grep "Protocol\\|Cipher"

<span class="comment"># בדוק certificate expiry</span>
echo | openssl s_client -connect mysite.com:443 2>/dev/null |   openssl x509 -noout -dates
<span class="comment"># notAfter=Dec 15 12:00:00 2025 GMT</span>

<span class="comment"># בדוק cipher suites שהשרת מקבל</span>
nmap --script ssl-enum-ciphers -p 443 mysite.com
<span class="comment"># A = strong, B = acceptable, C/D = weak — חסום!</span>

<span class="comment"># testssl.sh — הכי מקיף</span>
./testssl.sh mysite.com
<span class="comment"># https://testssl.sh — עובד גם offline</span></code></pre>

<div class="section-title">nginx TLS config מומלצת (2025)</div>
<pre class="code-block"><code>ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;   <span class="comment"># TLS 1.3 בוחר בעצמו</span>
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

<span class="comment"># HSTS — אמור לbrowser: רק HTTPS לעולם</span>
add_header Strict-Transport-Security "max-age=63072000" always;

<span class="comment"># OCSP Stapling — פחות latency ב-revocation check</span>
ssl_stapling on;
ssl_stapling_verify on;
resolver 8.8.8.8 8.8.4.4 valid=300s;</code></pre>

<div class="callout callout-warn"><strong>⚠️ Certificate expiry monitoring:</strong> Let's Encrypt מחדשת אוטומטית — אבל רק אם certbot cron עובד. הגדר alert ב-30, 14, ו-7 ימים לפני expiry. <code>echo | openssl s_client -connect mysite.com:443 2>/dev/null | openssl x509 -noout -checkend 604800</code> — exit code 1 = פוקע בשבוע הקרוב.</div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> eBPF (extended Berkeley Packet Filter) מאפשר להריץ programs ב-kernel space ללא כתיבת kernel module. Netflix, Google, Facebook, Cloudflare — כולם משתמשים ב-eBPF לnetwork observability, security, ו-performance. Meta דיווחה שהחלפת iptables ב-eBPF חסכה 30% CPU בשרתי production.</div>

<div class="section-title">מה זה eBPF ולמה זה מהפכני</div>
<p class="prose">eBPF (extended Berkeley Packet Filter) מאפשר לך לכתוב programs קטנים שרצים בתוך ה-Linux kernel — בצורה בטוחה. לפני eBPF, אם רצית לעשות משהו מתקדם ב-kernel (כמו לנטר כל system call, לבלוק packets ב-hardware level), היית צריך לכתוב kernel module — סיכון ל-system crash, תהליך מסובך. עם eBPF: כותבים ב-C, מקמפלים ל-eBPF bytecode, ה-kernel verifier מאמת שה-program בטוח, ומריצים.</p>
<p class="prose">ה-verifier הוא המפתח: הוא בודק שה-program לא יכנס ללולאה אינסופית, לא יגשת לזיכרון לא מורשה, ולא יגרום ל-crash. אם הוא עובר verification — ה-kernel מריץ אותו ב-JIT compiled mode, כמעט מהיר כמו native code.</p>

<div class="section-title">Hook Points — איפה eBPF רץ</div>
<div class="grid-2">
<div class="card"><div class="card-icon">⚡</div><div class="card-title">XDP — eXpress Data Path</div><div class="card-body">הכי מוקדם ב-network stack — רץ ב-driver לפני שה-kernel רואה את ה-packet. מהיר מאוד: עד 24M packets/sec לcore. שימוש: DDoS mitigation, load balancing ב-Cloudflare.</div></div>
<div class="card"><div class="card-icon">🔍</div><div class="card-title">kprobes / tracepoints</div><div class="card-body">Hook לכל kernel function. "כל פעם שמתבצע sys_write — תן לי את הdata." monitoring מלא של כל syscall ללא שינוי בcodebase.</div></div>
<div class="card"><div class="card-icon">🔒</div><div class="card-title">LSM Hooks — Security</div><div class="card-body">Security checks. "אל תאפשר ל-process הזה לפתוח קבצים מחוץ ל-/tmp." Falco ו-Tetragon משתמשים בזה לruntime security.</div></div>
<div class="card"><div class="card-icon">📊</div><div class="card-title">Network TC — Traffic Control</div><div class="card-body">Ingress ו-egress traffic shaping. Cilium (Kubernetes CNI) כולו בנוי על eBPF TC hooks — במקום iptables.</div></div>
</div>

<div class="section-title">eBPF Tools — מה קיים כבר</div>
<pre class="code-block"><code><span class="comment"># bcc tools — עשרות tools מוכנים</span>
execsnoop          <span class="comment"># trace כל exec() syscall</span>
tcptracer          <span class="comment"># trace TCP connections</span>
biolatency         <span class="comment"># disk I/O latency histogram</span>
funclatency -u curl_perform  <span class="comment"># latency של function ספציפית</span>

<span class="comment"># bpftrace — one-liners</span>
bpftrace -e 'kprobe:tcp_connect { printf("connect: %s
", comm); }'
<span class="comment"># trace כל TCP connection עם שם הprocess</span>

bpftrace -e 'tracepoint:syscalls:sys_enter_openat { printf("%s %s
", comm, str(args->filename)); }'
<span class="comment"># trace כל קובץ שנפתח</span>

<span class="comment"># XDP drop — DDoS mitigation</span>
<span class="comment"># program שמzrop כל packet מ-IP ספציפי לפני שה-kernel רואה</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 Cloudflare ו-XDP — DDoS mitigation בmiraכle speed</div>
  <div class="real-world-body">
    Cloudflare מקבל מתקפות DDoS של 1+ Tbps. iptables לא מסוגל לעמוד בקצב — ה-kernel overhead של netfilter גורם ל-CPU saturation לפני שה-packets נחסמים. XDP רץ לפני netfilter, לפני kernel network stack, בdriver level.<br><br>
    עם XDP, Cloudflare חוסמת 26 מיליון packets לשנייה מ-CPU בודד. ה-packet מגיע ל-NIC, XDP program רץ ב-nanoseconds ומחזיר XDP_DROP, ה-packet לעולם לא נכנס ל-kernel. זה ההבדל בין DDoS שמוריד שרת לDDoS שלא מורגש.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 בפועל</strong></div>

<p class="prose">לא צריך לכתוב eBPF program בעצמך כדי להפיק ממנו ערך. עשרות כלים מוכנים קיימים — חלקם חזקים מ-strace, tcpdump, ו-top ביחד.</p>

<div class="section-title">bcc-tools — התקנה ושימוש מיידי</div>
<pre class="code-block"><code><span class="comment"># Ubuntu/Debian</span>
sudo apt install bpfcc-tools linux-headers-$(uname -r)

<span class="comment"># execsnoop — כל process שנוצר ב-system</span>
sudo execsnoop-bpfcc
<span class="comment"># מצוין לאבחון: "מה מריץ cron job הזה בפועל?"</span>

<span class="comment"># tcpconnect — כל TCP connection חדש</span>
sudo tcpconnect-bpfcc
<span class="comment"># PID  COMM    IP SADDR       DADDR       DPORT</span>
<span class="comment"># 1234 curl    4  192.168.1.5  93.184.216.34  443</span>

<span class="comment"># opensnoop — כל קובץ שנפתח</span>
sudo opensnoop-bpfcc -p 1234
<span class="comment"># מצוין לאבחון: "למה process זה איטי?" → רואה I/O</span>

<span class="comment"># biolatency — latency של disk I/O כhistogram</span>
sudo biolatency-bpfcc -D 10 1
<span class="comment"># מציג distribution של disk latency ב-10 שניות</span></code></pre>

<div class="section-title">bpftrace — one-liners עוצמתיים</div>
<pre class="code-block"><code><span class="comment"># כמה זמן לוקח כל DNS query?</span>
sudo bpftrace -e 'kprobe:udp_sendmsg { @start[tid]=nsecs; }
  kretprobe:udp_recvmsg /@start[tid]/ {
    @us = hist((nsecs-@start[tid])/1000); delete(@start[tid]); }'

<span class="comment"># איזה process פותח הכי הרבה קבצים?</span>
sudo bpftrace -e 'tracepoint:syscalls:sys_enter_openat { @[comm] = count(); }' -c 10

<span class="comment"># network latency per process</span>
sudo bpftrace -e 'kprobe:tcp_sendmsg { @[comm] = count(); }'</code></pre>

<div class="callout callout-tip"><strong>💡 Practical use case:</strong> Production server איטי ולא יודעים למה. מריצים <code>execsnoop</code> ל-30 שניות — רואים שcron job מריץ script כל 10 שניות שמתחיל 15 processes. זה לא נראה ב-top, לא נראה ב-ps, לא נראה בשום log — רק ב-eBPF tracing.</div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> Kubernetes ב-production עם 1000 nodes ו-10,000 pods יכול להגיע ל-100,000 iptables rules. כל connection בודק את כולן לפי סדר — O(n) complexity. זה הסיבה שחברות עוברות ל-eBPF/Cilium — O(1) lookup עם hash maps במקום linear iptables chains.</div>

<div class="section-title">Docker Networking — מה קורה מתחת</div>
<p class="prose">כשמריצים Docker container, הוא מקבל network namespace משלו — ממשק רשת וירטואלי, routing table, ו-firewall rules נפרדים לחלוטין מה-host. Docker יוצר virtual ethernet pair (veth): קצה אחד בcontainer (eth0), קצה שני ב-host (vethXXXXX). ה-host מחבר את כל ה-veth interfaces ל-docker0 bridge.</p>
<pre class="code-block"><code><span class="comment"># Docker Network Modes</span>
<span class="comment"># bridge (default) — isolated, NAT לחוץ</span>
docker run --network bridge nginx

<span class="comment"># host — משתף network namespace עם host</span>
docker run --network host nginx    <span class="comment"># ← nginx שמע על port 80 של host ישירות</span>

<span class="comment"># none — אין רשת</span>
docker run --network none alpine   <span class="comment"># ← isolated לחלוטין</span>

<span class="comment"># בדיקת Docker networks</span>
docker network ls
docker network inspect bridge
ip addr show docker0               <span class="comment"># bridge interface ב-host</span>
ip link | grep veth                <span class="comment"># veth pairs</span></code></pre>

<div class="section-title">Kubernetes Networking — Pod-to-Pod</div>
<p class="prose">Kubernetes מחייב: כל Pod מקבל IP ייחודי. כל Pod יכול לתקשר עם כל Pod אחר בלי NAT. זה נשמע פשוט — אבל במציאות זה מורכב: Pods על nodes שונים צריכים לדבר, ויש לנהל routing בין כל ה-nodes. CNI (Container Network Interface) הוא ה-plugin שעושה זאת.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>CNI</th><th>גישה</th><th>מתאים ל</th></tr></thead><tbody>
<tr><td><strong>Flannel</strong></td><td>VXLAN overlay</td><td>פשוט, כל cloud</td></tr>
<tr><td><strong>Calico</strong></td><td>BGP routing</td><td>performance, network policies</td></tr>
<tr><td><strong>Cilium</strong></td><td>eBPF</td><td>scale גדול, observability</td></tr>
<tr><td><strong>Weave</strong></td><td>overlay mesh</td><td>multi-cloud</td></tr>
</tbody></table></div>

<div class="section-title">Service Mesh — Istio ו-Linkerd</div>
<p class="prose">Service mesh מוסיף layer של infrastructure בין microservices: mTLS (encryption בין כל services), traffic management (routing, retries, circuit breakers), ו-observability (traces, metrics, logs). Istio מבוסס על Envoy proxy sidecar — container נוסף בכל Pod שמיירט את כל ה-traffic.</p>
<pre class="code-block"><code><span class="comment"># Istio — Service Mesh בפועל</span>
<span class="comment"># כל Pod מקבל Envoy sidecar אוטומטית</span>
kubectl get pods -n production
<span class="comment"># payment-service-7d9f8  2/2  Running ← 2/2 = app + envoy</span>

<span class="comment"># mTLS בין services — automatic</span>
<span class="comment"># Envoy A מצפין, Envoy B מפענח — app לא יודעת</span>

<span class="comment"># VXLAN Overlay — איך Flannel עובד</span>
<span class="comment"># Pod A (10.244.1.5) ← vxlan → Pod B (10.244.2.8) על node אחר</span>
<span class="comment"># Ethernet frame מוכנסת ל-UDP packet (VXLAN encapsulation)</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 iptables scale problem ב-Kubernetes</div>
  <div class="real-world-body">
    LinkedIn דיווחה: Kubernetes cluster עם 1000+ nodes. כל node מריץ kube-proxy שמתרגם Services ל-iptables rules. עם 10,000 services — 170,000 iptables rules לnode. כל packet scan = O(n) = latency overhead משמעותי. CPU usage גדל linearly עם כל Service חדש.<br><br>
    הפתרון שאימצו: מעבר ל-Cilium. eBPF hash maps = O(1) lookup. CPU usage לnetworking ירד ב-35%. Latency ירד ב-20%. המעבר לקח 6 חודשי עבודה, אבל הביא ROI ברור.
  </div>
</div>

`<div class="did-you-know">💡 <strong>ידעת?</strong> Linux kernel default TCP buffer הוא 4MB. Google מריץ TCP buffer של 256MB בין datacenters. ההבדל? על link של 10Gbps עם 100ms RTT (high BDP — Bandwidth Delay Product), buffer קטן מדי גורם ל-TCP window לא לנצל את כל הbandwidth. נוסחה: BDP = bandwidth × RTT = 10Gbps × 0.1s = 1Gb = 125MB buffer needed.</div>

<div class="section-title">TCP Tuning — sysctl Parameters</div>
<p class="prose">TCP performance בLinux נשלטת על ידי עשרות kernel parameters שאפשר לשנות ב-runtime דרך sysctl. ה-defaults מיועדים ל"average" case — latency נמוכה, bandwidth בינונית. לhigh-performance environments (10Gbps+, cross-datacenter), נדרשת כוונון מדויק.</p>
<pre class="code-block"><code><span class="comment"># בדיקת TCP buffer settings נוכחיים</span>
sysctl net.core.rmem_max       <span class="comment"># max receive buffer</span>
sysctl net.ipv4.tcp_rmem       <span class="comment"># min default max</span>
sysctl net.ipv4.tcp_wmem       <span class="comment"># send buffers</span>

<span class="comment"># Tuning לhigh-bandwidth long-distance</span>
sysctl -w net.core.rmem_max=268435456     <span class="comment"># 256MB</span>
sysctl -w net.core.wmem_max=268435456
sysctl -w net.ipv4.tcp_rmem="4096 87380 268435456"
sysctl -w net.ipv4.tcp_wmem="4096 65536 268435456"

<span class="comment"># TCP Congestion Control</span>
sysctl net.ipv4.tcp_congestion_control   <span class="comment"># current: cubic</span>
sysctl -w net.ipv4.tcp_congestion_control=bbr  <span class="comment"># Google's BBR</span>
<span class="comment"># BBR: bandwidth-based, לא loss-based. מיטב לhigh-BDP paths</span></code></pre>

<div class="section-title">TCP Congestion Control — Cubic vs BBR</div>
<p class="prose">TCP Congestion Control הוא המנגנון שמחליט בכמה נתונים לשלוח. כשיש packet loss — congestion assumed, TCP מפחית window. הבעיה: על modern high-speed networks, packet loss לא תמיד אומר congestion (עלול להיות bit error). BBR (Bottleneck Bandwidth and RTT) של Google (2016) שינה גישה: מד bandwidth ו-RTT בנפרד, שלח בtemporeconciliation — ולא בheuristic loss-based.</p>
<div class="grid-2">
<div class="card"><div class="card-icon">🔲</div><div class="card-title">CUBIC (default)</div><div class="card-body">Loss-based: מגדיל window עד שיש loss, ואז מקטין. עובד טוב ב-LAN. על high-latency WAN (100ms+) — slow convergence.</div></div>
<div class="card"><div class="card-icon">🚀</div><div class="card-title">BBR (Google)</div><div class="card-body">Model-based: מחשב bottleneck bandwidth ו-RTT. לא מסתמך על loss. YouTube דיווח על 4% throughput improvement ו-14% latency reduction after enabling BBR.</div></div>
</div>

<div class="section-title">Zero-Copy ו-RDMA</div>
<pre class="code-block"><code><span class="comment"># Zero-Copy — sendfile() vs read()+write()</span>
<span class="comment"># Traditional:</span>
disk → kernel buffer → user buffer → socket buffer → NIC
<span class="comment"># 4 copies! 4 context switches!</span>

<span class="comment"># Zero-Copy (sendfile):</span>
disk → kernel buffer → NIC (DMA direct)
<span class="comment"># 0 user-space copies. nginx ו-kafka משתמשים בזה</span>

<span class="comment"># SO_ZEROCOPY socket option (Linux 4.14+)</span>
setsockopt(sock, SOL_SOCKET, SO_ZEROCOPY, &one, sizeof(one));
send(sock, buf, len, MSG_ZEROCOPY);

<span class="comment"># RDMA — Remote Direct Memory Access</span>
<span class="comment"># Write directly to remote machine's RAM ללא CPU involvement</span>
<span class="comment"># Latency: 1-3 microseconds (vs TCP: 10-100μs)</span>
<span class="comment"># משמש ב-HPC, financial trading, GPU clusters</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 Google BBR — מה היה ולמה שינו</div>
  <div class="real-world-body">
    לפני BBR: YouTube על TCP CUBIC. בmobile networks עם packet buffering (bufferbloat), CUBIC מפרש delay כcongestion ומפחית throughput. Videos היו מufering — לא כי bandwidth נמוך, אלא כי CUBIC היה conservative מדי.<br><br>
    אחרי BBR: Google enable BBR ב-WAN links. ממדידות פנימיות: throughput עלה ב-2,700% על RTT גבוה. Latency ירד ב-75%. YouTube video start time ירד ב-20%. B-squared improvement.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 בפועל</strong></div>

<p class="prose">לפני שמשנים kernel parameters בproduction — מדדים. לפני מדידה — baseline. הנה הworkflow הסטנדרטי.</p>

<pre class="code-block"><code><span class="comment"># iperf3 — מדידת bandwidth אמיתית</span>

<span class="comment"># על client:</span>

<span class="comment"># ping — latency ו-jitter</span>

<span class="comment"># rtt min/avg/max/mdev = 0.5/1.2/3.8/0.4 ms</span>

<span class="comment"># ss — TCP socket statistics</span>

<span class="comment"># rto:xxx rtt:x.x AdvMSS:xxxx</span></code></pre>

<div class="section-title">BBR הפעלה (Linux 4.9+)</div>
<pre class="code-block"><code><span class="comment"># בדוק מה נוכחי</span>
sysctl net.ipv4.tcp_congestion_control
<span class="comment"># cubic ← default</span>

<span class="comment"># הפעל BBR</span>
echo "net.core.default_qdisc=fq" >> /etc/sysctl.conf
echo "net.ipv4.tcp_congestion_control=bbr" >> /etc/sysctl.conf
sysctl -p

<span class="comment"># אמת</span>
sysctl net.ipv4.tcp_congestion_control
<span class="comment"># bbr ← </span>
lsmod | grep bbr
<span class="comment"># tcp_bbr  20480  14 ← טעון</span>

<span class="comment"># מדוד לפני ואחרי עם iperf3</span>
<span class="comment"># על WAN links עם latency >20ms — BBR תמיד עדיף</span></code></pre>

<div class="section-title">TCP Buffer Tuning לhigh-bandwidth</div>
<pre class="code-block"><code><span class="comment"># חישוב BDP = bandwidth × RTT</span>
<span class="comment"># 1Gbps × 50ms RTT = 50Mb = 6.25MB buffer needed</span>

<span class="comment"># הוסף ל-/etc/sysctl.conf:</span>
net.core.rmem_max = 67108864       <span class="comment"># 64MB max receive</span>
net.core.wmem_max = 67108864       <span class="comment"># 64MB max send</span>
net.ipv4.tcp_rmem = 4096 87380 67108864
net.ipv4.tcp_wmem = 4096 65536 67108864
net.ipv4.tcp_mtu_probing = 1       <span class="comment"># MTU Path Discovery</span>

sysctl -p   <span class="comment"># apply without reboot</span></code></pre>

<div class="callout callout-tip"><strong>💡 Rule of thumb:</strong> על LAN — default settings מצוינים. על WAN עם latency >50ms ו-bandwidth >100Mbps — כל המדדים שלמעלה רלוונטיים. תמיד מדוד לפני ואחרי, ותמיד ב-staging לפני production.</div>

<div class="sum-row"><span class="sum-k">הרעיון הפשוט</span><span class="sum-v">כשאתה גולש באינטרנט, המחשב שלך שולח ומקבל <strong>אלפי "מכתבים" קטנים בשנייה</strong> — כל אחד נקרא "packet". Wireshark הוא כמו מצלמת אבטחה לרשת שלך: הוא <strong>מצלם כל packet</strong> שעובר ומציג אותו בפירוט מלא. תוכל לראות בדיוק מה המחשב שלך שולח ומקבל, לאיזה אתר, ואפילו את <em>תוכן</em> ה"שיחה".</span></div>

`<div class="sum-block"><div class="sum-block-title">🔍 DNS — ספר הטלפונים של האינטרנט</div>
<div class="sum-row"><span class="sum-k">מה DNS עושה</span><span class="sum-v">כתובות IP הן מספרים: 142.250.185.46. בני אדם זוכרים שמות: google.com. DNS מתרגם שמות למספרים, בדיוק כמו <strong>ספר טלפונים</strong>. כשאתה כותב "google.com" בדפדפן, הראשון שנשאל הוא ה-DNS server. בלי DNS — האינטרנט לא עובד.</span></div>
<div class="sum-row"><span class="sum-k">5 שלבי Resolution</span><span class="sum-v"><strong>1</strong> Cache מקומי (זוכר מפעם שעברה). <strong>2</strong> Resolver של ה-ISP שלך (שואל בשמך). <strong>3</strong> Root Server — יודע מי אחראי על .com. <strong>4</strong> TLD Server — יודע מי אחראי על google.com ספציפית. <strong>5</strong> Authoritative Server של Google — נותן את הכתובת הסופית. כל זה קורה ב-<50 milliseconds.</span></div>
<div class="sum-row"><span class="sum-k">DNSSEC — מניעת זיוף</span><span class="sum-v">דמיין שמישהו משנה את ספר הטלפונים — כותב כתובת שגויה לבנק שלך, מכוון אותך ל"בנק מזויף". זה <strong>DNS Cache Poisoning</strong>. DNSSEC פותר זאת: כל תשובת DNS חתומה דיגיטלית. אם מישהו שינה — החתימה שבורה והדפדפן מסרב לטעון.</span></div>
<div class="sum-row"><span class="sum-k">DNS over HTTPS (DoH)</span><span class="sum-v">שאילתות DNS רגילות גלויות: ה-ISP שלך רואה <strong>כל אתר שאתה מבקר</strong> (גם ב-HTTPS!). DoH מצפין את שאילתות ה-DNS בתוך HTTPS — ה-ISP רואה רק שדיברת עם 1.1.1.1, לא לאיזה אתרים. Firefox ו-Chrome כבר משתמשים בזה כברירת מחדל בחלק מהמדינות.</span></div>
<div class="sum-row"><span class="sum-k">DNS Tunneling — שימוש זדוני</span><span class="sum-v">הבעיה: DNS כמעט <strong>אף פעם לא חסום</strong> בפיירוולים — כי בלי DNS אין אינטרנט. האקרים מנצלים זאת: שולחים נתונים גנובים מוסתרים בתוך שאילתות DNS. <code>c2data.secret.attacker.com</code> — ה-"שאילתה" היא בעצם הנתון הגנוב. מזוהה ע"י בדיקת <em>אורך</em> שמות הדומיין.</span></div>
<div class="sum-tip">💡 <strong>פקודות שמות:</strong> <code>dig +trace google.com</code> מציג את כל 5 שלבי ה-resolution בזמן אמת. <code>dig ANY google.com</code> מחזיר את כל סוגי ה-records. נסה עכשיו בטרמינל!</div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">⚡ HTTP/2 ו-HTTP/3 — מהפכת מהירות האינטרנט</div>
<div class="sum-row"><span class="sum-k">הבעיה עם HTTP/1.1</span><span class="sum-v">דמיין שופרסל שיש בו רק <strong>קופה אחת</strong>, וכל לקוח חייב לחכות שהלפניו יסיים לחלוטין. דף אינטרנט מודרני = 100 resources (תמונות, CSS, JS). ב-HTTP/1.1 כל resource מחכה לקודם. הדפדפן פתח 6 חיבורים במקביל כ-workaround, אבל זה עדיין איטי.</span></div>
<div class="sum-row"><span class="sum-k">HTTP/2 — Multiplexing</span><span class="sum-v">פתח <strong>קופות מקבילות על אותו חיבור</strong>. 100 resources? כולם עוברים בו-זמנית על connection אחד, כל אחד עם "מספר תור" (stream ID). Header Compression: headers חוזרים בכל request — HTTP/2 שולח רק מה <em>השתנה</em>. תוצאה: 2-3× מהיר יותר לדפים מורכבים.</span></div>
<div class="sum-row"><span class="sum-k">הבעיה שנשארה</span><span class="sum-v">HTTP/2 עדיין רץ על <strong>TCP</strong>, וב-TCP אם packet אחד אובד — <strong>כל השאר עוצרים</strong> וממתינים. על רשת WiFi גרועה עם 2% packet loss: כל 100 streams ב-HTTP/2 קופאים בגלל packet אחד שאבד. הפסד יותר מ-HTTP/1.1 לפעמים!</span></div>
<div class="sum-row"><span class="sum-k">QUIC — הרעיון הגאוני</span><span class="sum-v">Google פיתח: <strong>UDP במקום TCP</strong>. UDP לא מבטיח מסירה — אבל QUIC מוסיף reliability <em>לכל stream בנפרד</em>. אם packet של תמונה אחת אובד — רק התמונה ההיא מחכה, <strong>שאר 99 הresources ממשיכים</strong>. גם: TLS 1.3 מובנה, 0-RTT reconnect (מחדש את ה-connection ב-0 מסלולי round-trip).</span></div>
<div class="sum-row"><span class="sum-k">HTTP/3 — היום</span><span class="sum-v">HTTP/3 = HTTP על QUIC. <strong>Chrome: ~60% מהתעבורה כבר HTTP/3</strong>. Cloudflare, Google, Facebook — כולם. על רשת עם 2% packet loss: HTTP/3 <strong>3× מהיר</strong> מ-HTTP/1.1. Connection Migration: עברת מ-WiFi לסלולרי? ה-connection ממשיך בלי ניתוק כי QUIC עוקב אחרי ה-connection, לא ה-IP.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🔐 TLS — כיצד HTTPS שומר אותך</div>
<div class="sum-row"><span class="sum-k">הבעיה שTLS פותר</span><span class="sum-v">ללא הצפנה, כל מידע ברשת = גלוי לכולם. Wireshark על WiFi ציבורי → קורא את כל מה שאתה שולח. עם TLS, הנתונים <strong>מוצפנים</strong>: גם אם מישהו לוכד את הpackets, הוא רואה רק ג'יבריש בלתי-קריא. הנעילה הירוקה בדפדפן = TLS פועל.</span></div>
<div class="sum-row"><span class="sum-k">Handshake — 1 שנייה של "לחיצת יד"</span><span class="sum-v">לפני כל HTTPS session: <strong>1</strong> הדפדפן אומר "שלום, הצפנות שאני מכיר הן...". <strong>2</strong> השרת בוחר הצפנה, שולח certificate (תעודת זהות). <strong>3</strong> שניהם מחשבים מפתח משותף (ECDHE). <strong>4</strong> כל התקשורת מוצפנת במפתח זה. TLS 1.3: כל זה ב-1 round-trip (פחות מ-10ms).</span></div>
<div class="sum-row"><span class="sum-k">Certificate — תעודת זהות</span><span class="sum-v">כשאתה נכנס ל-bank.com, <strong>מאיפה הדפדפן יודע שהוא ה-bank האמיתי</strong> ולא site מזויף? ה-certificate. Certificate Authority (CA) — גוף מוסמך כמו DigiCert — בדק ואישר: "כן, bank.com הוא אכן הבנק הזה". הדפדפן מאמין ל-CA. שרשרת אמון: Root CA → Intermediate CA → certificate שלך.</span></div>
<div class="sum-row"><span class="sum-k">Perfect Forward Secrecy</span><span class="sum-v">בלי PFS: אם השרת נפרץ ו-private key נגנב — <strong>כל השיחות ההיסטוריות ניתנות לפענוח</strong> (אם הוקלטו). עם PFS (ECDHE): כל session מפתח חדש שנמחק מיד. גם אם private key נגנב — השיחות הישנות <em>לא</em> ניתנות לפענוח. TLS 1.3 מחייב PFS — RSA key exchange הוסר לחלוטין.</span></div>
<div class="sum-row"><span class="sum-k">Certificate Transparency</span><span class="sum-v">מה אם CA רמאי מנפיק certificate מזויף ל-bank.com? Certificate Transparency Log: <strong>כל certificate בעולם חייב להיות רשום ב-log ציבורי</strong> (crt.sh). הבנק יכול לבדוק כל יום — "האם נוצר certificate עבורי שלא הזמנתי?" ואם כן — לבטל מיד.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🐝 eBPF — "תכנות" ישירות בתוך Linux Kernel</div>
<div class="sum-row"><span class="sum-k">הרעיון הפשוט</span><span class="sum-v">ה-Linux kernel הוא ה"מוח" של השרת — שולט בהכל. <strong>בדרך כלל אסור לשנות אותו</strong> בלי לכתוב kernel module (מסוכן, מחייב reboot, יכול לקרוס את השרת). eBPF מאפשר <strong>להזריק תוכניות קטנות ישירות לkernel</strong>, בצורה בטוחה — ה-kernel בודק אוטומטית שהקוד לא יגרום נזק לפני הרצה.</span></div>
<div class="sum-row"><span class="sum-k">Kernel Module vs eBPF</span><span class="sum-v">Kernel module נפל → kernel panic → השרת קרס לחלוטין. eBPF נפל → graceful failure → השרת ממשיך לרוץ. לכן <strong>Google, Netflix, Cloudflare, Facebook — כולם</strong> עברו ל-eBPF ב-production. בדיקת קוד: eBPF verifier בודק לפני הרצה שאין לולאות אינסופיות, אין memory access מחוץ לגבולות.</span></div>
<div class="sum-row"><span class="sum-k">XDP — חסימת DDoS ב-nanoseconds</span><span class="sum-v">eXpress Data Path: eBPF ב<strong>רמת כרטיס הרשת</strong> — packet מגיע → נבדק → נזרק <em>לפני שהkernel אפילו רואה אותו</em>. Cloudflare מגן כך על מיליוני sites: DDoS attack של 1 Tbps? eBPF זורק את כל הpackets הזדוניים ב-nanoseconds, <strong>ללא עומס על CPU</strong>.</span></div>
<div class="sum-row"><span class="sum-k">Cilium — Kubernetes בeBPF</span><span class="sum-v">Kubernetes (ניהול containers בענן) השתמש ב-iptables לניתוב — O(n) rules: 1000 services = בדיקת 1000 rules לכל packet. Cilium החליף זאת ב-eBPF maps: בדיקת 1 lookup בלי קשר לכמות Services. <strong>50× מהיר יותר</strong>. AWS, Azure, Google Cloud — כולם Cilium היום.</span></div>
<div class="sum-row"><span class="sum-k">bpftrace — debugging בשורה אחת</span><span class="sum-v"><code>bpftrace -e 'tracepoint:syscalls:sys_enter_open { printf("%s\n", str(args->filename)); }'</code> — הדפס כל קובץ שכל process פותח, <strong>בזמן אמת</strong>. ללא הפסקת התוכנית, ללא שינוי קוד. כמו x-ray לשרת חי. מאתר memory leaks, performance bottlenecks, ו-security events.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🐳 Container Networking — איך containers מדברים</div>
<div class="sum-row"><span class="sum-k">מה זה container?</span><span class="sum-v">כמו VM אבל קל יותר: <strong>process מבודד</strong> עם filesystem, network, ו-users משלו — אבל משתף את ה-kernel עם שאר ה-OS. Docker הוא הכלי הנפוץ. כל container מרגיש שיש לו מחשב שלם, אבל בפועל עשרות containers רצים על server אחד.</span></div>
<div class="sum-row"><span class="sum-k">Network Namespace</span><span class="sum-v">הסוד: Linux <strong>Network Namespace</strong>. כל container מקבל namespace נפרד — ממשקי רשת, routing table, ו-iptables rules משלו. Container A לא יכול לראות את ה-network של Container B. ה-kernel יוצר <strong>veth pair</strong> (כמו כבל רשת וירטואלי) שמחבר את ה-container ל-bridge הרשת.</span></div>
<div class="sum-row"><span class="sum-k">Docker Networking</span><span class="sum-v"><code>docker run -p 8080:80 nginx</code>: container רץ ב-"בועה" משלו עם IP פנימי (172.17.0.5). ה-<code>-p 8080:80</code> אומר: כשמישהו מבחוץ מגיע ל-port 8080 — העבר ל-port 80 של ה-container. Docker מוסיף iptables rule אוטומטית. Container לא יכול לדבר עם container אחר אלא אם בין.<strong>אותה network</strong>.</span></div>
<div class="sum-row"><span class="sum-k">Kubernetes Networking</span><span class="sum-v">ב-Kubernetes (k8s): כל Pod מקבל <strong>IP ייחודי</strong> שנגיש מכל מקום ב-cluster — ללא NAT. Service = כתובת IP "קבועה" (VIP) שמייצגת קבוצת Pods. Load balancer אוטומטי בין Pods. kube-proxy: מנהל את ה-iptables/IPVS rules לניתוב traffic ל-Services הנכונים.</span></div>
<div class="sum-row"><span class="sum-k">CNI Plugins</span><span class="sum-v">Container Network Interface: הסטנדרט שמגדיר איך networks נוצרות לcontainers. <strong>Flannel</strong>: פשוט, VXLAN overlay. <strong>Calico</strong>: BGP routing, ללא overlay — מהיר יותר. <strong>Cilium</strong>: eBPF, הכי מהיר, L7 policies (חסום HTTP אבל תן gRPC). הבחירה משפיעה על performance וsecurity.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">⚡ Network Performance Tuning — לסחוט את המקסימום</div>
<div class="sum-row"><span class="sum-k">TCP Buffer — למה throughput מוגבל</span><span class="sum-v">דמיין צינור מים: כמה מים זורמים תלוי ב<strong>קוטר</strong> (bandwidth) ו<strong>לחץ</strong> (בכמה רשות המים מנפחים). ב-TCP: Bandwidth × RTT = <strong>BDP</strong> (כמה bytes ה"בצינור" בכל רגע). אם buffer קטן מBDP — ה-TCP נאלץ לחכות אישורים ולא ממלא את הצינור. Linux kernel: <code>net.core.rmem_max=134217728</code> לhigh-speed WAN.</span></div>
<div class="sum-row"><span class="sum-k">BBR Congestion Control</span><span class="sum-v">האלגוריתם הישן (CUBIC) ניחש כמה לשלוח — לפי packet loss. BBR (Google, 2016): מודד ישירות את <strong>bandwidth ו-RTT</strong> בזמן אמת ומחשב את ה"קצב האמיתי". תוצאה: <strong>2-3× throughput יותר</strong> על רשתות עם packet loss, פי 25 על long-distance connections. YouTube ו-Gmail עברו ל-BBR ב-2017.</span></div>
<div class="sum-row"><span class="sum-k">TCP Offloading</span><span class="sum-v">בלי offloading: ה-CPU מחשב checksums, מחלק data לsegments, מאחד packets — עבור <strong>כל packet</strong>. TSO (TCP Segmentation Offload): מעביר את החלוקה לsegments ל-<strong>כרטיס הרשת</strong>. GRO: מאחד packets קטנים לגדול לפני שה-kernel מקבל. תוצאה: 30% פחות CPU לאותה throughput.</span></div>
<div class="sum-row"><span class="sum-k">iperf3 — מדידת throughput</span><span class="sum-v">Server: <code>iperf3 -s</code>. Client: <code>iperf3 -c SERVER -t 30 -P 4</code>. <code>-P 4</code> = 4 parallel streams (מדמה מציאות). המחשב מדד 800 Mbps אבל ISP אמור 1Gbps? iperf3 יראה אם הבעיה ב-NIC, ב-cable, ב-switch, או ב-ISP. <code>--bidir</code> = מדוד בשני כיוונים בו-זמנית.</span></div>
<div class="sum-row"><span class="sum-k">DPDK — kernel bypass</span><span class="sum-v">בשרתי HFT ו-5G: ה-kernel עצמו הוא ה-bottleneck. DPDK (Data Plane Development Kit) מאפשר ל<strong>user-space לדבר ישירות עם כרטיס הרשת</strong> — ללא kernel. עד <strong>80 מיליון packets/שנייה</strong> על CPU אחד. RDMA: שלח data ישירות ל-RAM של שרת אחר ברשת, ללא CPU involvement בכלל.</span></div>
<div class="sum-tip">💡 <strong>Performance debugging בסדר הנכון:</strong> <code>ss -s</code> (בדוק drops) → <code>ethtool -S eth0</code> (בדוק NIC) → <code>iperf3</code> (מדוד) → <code>perf top</code> (CPU hotspots) → eBPF לdiagnosis עמוק. אל תguess — <strong>מדוד קודם</strong>.</div>
</div>`
  ]
