`<div class="did-you-know">💡 <strong>Did you know?</strong> Wireshark was created in 1998 by Gerald Combs under the name Ethereal. In 2006 it was renamed Wireshark. Today it is the most widely used network analysis tool in the world — used by security researchers, developers, and network engineers everywhere. It shows every packet passing through your network interface in full detail.</div>

<div class="section-title">How Wireshark Works — Under the Hood</div>
<p class="prose">Wireshark uses libpcap (Linux) or WinPcap/Npcap (Windows) to put your network card into promiscuous mode — a state where it listens to all packets on the network, not just those addressed to it. Every packet that passes is stored in a buffer and displayed in real time. Wireshark then dissects each packet into its protocols: Ethernet frame, IP packet, TCP segment, HTTP message.</p>
<p class="prose">The interface is divided into three sections: Packet List (all packets by time), Packet Details (full breakdown of the selected packet — every layer and field), and Packet Bytes (hex representation of the raw bytes). Understanding all three together is what turns Wireshark into a real diagnostic tool.</p>

<div class="section-title">Capture Filters — Before You Record</div>
<p class="prose">Capture filters are written in BPF (Berkeley Packet Filter) syntax and operate at the kernel level before packets reach Wireshark. This is critical on busy networks — without a filter the buffer fills quickly and Wireshark drops packets. Write your filter before clicking Start.</p>
<pre class="code-block"><code><span class="comment"># Capture Filters — BPF syntax</span>
host 192.168.1.100          <span class="comment"># traffic from/to specific IP</span>
port 443                    <span class="comment"># HTTPS only</span>
port 80 or port 443         <span class="comment"># HTTP and HTTPS</span>
net 192.168.1.0/24          <span class="comment"># entire subnet</span>
not port 22                 <span class="comment"># everything except SSH</span>
tcp and host 10.0.0.5       <span class="comment"># TCP only from specific host</span></code></pre>

<div class="section-title">Display Filters — After Recording</div>
<p class="prose">Display filters filter what is shown from an existing capture without deleting packets. The syntax is completely different from capture filters — it is based on field names from the dissectors. You can filter by any field in any protocol.</p>
<pre class="code-block"><code><span class="comment"># Display Filters — Wireshark syntax</span>
ip.addr == 192.168.1.100     <span class="comment"># any IP</span>
ip.src == 10.0.0.5           <span class="comment"># source IP only</span>
tcp.port == 443              <span class="comment"># HTTPS</span>
http.request.method == "GET" <span class="comment"># GET requests only</span>
dns.qry.name contains "google" <span class="comment"># DNS queries for google</span>
tcp.flags.syn == 1 && tcp.flags.ack == 0  <span class="comment"># SYN only (new connections)</span>
frame.time_delta > 1         <span class="comment"># packets with gap over 1 second</span>
tls.handshake.type == 1      <span class="comment"># TLS Client Hello</span></code></pre>

<div class="section-title">TCP Stream — Seeing a Full Conversation</div>
<p class="prose">One of the most powerful features: right-click on a TCP packet, Follow, TCP Stream shows the entire conversation between two hosts — request and response together in different colors. This lets you read HTTP requests and responses, SMTP conversations, and any TCP exchange in readable form.</p>

<div class="real-world-box">
  <div class="real-world-title">🌍 Case Study: Debugging a slow API with Wireshark</div>
  <div class="real-world-body">
    An API call takes 3 seconds. The developer claims the backend is fast. How do you decide? Wireshark on the client. Filter: <code>ip.addr == api.server.com && tcp</code>. Check TCP stream time deltas. Discovery: the TLS handshake takes 2.3 seconds — server response time was 0.1 seconds. The problem: DNS resolution for api.server.com took 2.2 seconds (TTL too low, 60 seconds, and high DNS load). Fix: raise TTL to 300.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<p class="prose">Wireshark becomes a routine tool once you know three specific scenarios. You do not need to understand every packet — you need to know how to ask the right question.</p>

<div class="section-title">Scenario 1: Why is the API slow?</div>
<p class="prose">Open Wireshark, set capture filter <code>host api.server.com</code>, run the request. Right-click any response packet and choose Follow → TCP Stream. You can see exactly when SYN was sent, when SYN-ACK returned, when TLS Handshake completed, and when data arrived. The delta between SYN and data is the real latency. If TLS takes 800ms out of 900ms — the problem is DNS or certificate validation, not the server.</p>
<pre class="code-block"><code><span class="comment"># Workflow: API latency debug</span>
1. Wireshark ← Capture ← your interface
2. Capture Filter: host api.example.com
3. Run request
4. Stop capture
5. Display Filter: tcp.stream eq 0
6. Statistics ← TCP Stream Graphs ← Time Sequence</code></pre>

<div class="section-title">Scenario 2: What is my computer sending on the network?</div>
<p class="prose">No filter needed. Just run a capture for 30 seconds, then: Statistics → Protocol Hierarchy. You get a full breakdown — how much TCP, UDP, DNS, HTTP. If you see an unknown protocol — apply a display filter on its name and investigate further.</p>

<div class="section-title">Scenario 3: Inspecting an SSL Certificate</div>
<pre class="code-block"><code><span class="comment"># Display filter to show TLS Handshake only</span>
tls.handshake.type == 1   <span class="comment"># Client Hello</span>
tls.handshake.type == 2   <span class="comment"># Server Hello</span>
tls.handshake.type == 11  <span class="comment"># Certificate</span>

<span class="comment"># Click Certificate packet →</span>
<span class="comment"># Transport Layer Security →</span>
<span class="comment"># TLSv1.3 Record Layer → Handshake Protocol: Certificate</span>
<span class="comment"># → Certificates → see subject, issuer, expiry</span></code></pre>

<div class="callout callout-tip"><strong>💡 Quick tip:</strong> Always save captures as .pcap before closing. <code>File → Save As → incident_2025_01_15.pcap</code>. Saved captures are evidence you can re-analyze, share with your team, and compare over time.</div>

`<div class="did-you-know">💡 <strong>Did you know?</strong> BGP manages the routing of the entire internet — but it operates on trust alone. There is no authentication for route announcements. Any AS can "announce" that it knows a route to any IP in the world, and the internet will believe it. This has caused dozens of BGP hijacking incidents — including in 2010 when China Telecom "routed" 15% of internet traffic through Chinese servers.</div>

<div class="section-title">What is BGP and Why Does it Exist?</div>
<p class="prose">BGP (Border Gateway Protocol) is the EGP (Exterior Gateway Protocol) of the internet — the protocol that connects Autonomous Systems. An AS (Autonomous System) is a network under single management — an ISP, cloud company, university, or bank. Each AS has a unique ASN (Autonomous System Number). Israel Internet Association is AS47886. Google is AS15169. Amazon AWS is AS16509. When a packet needs to travel from one AS to another, BGP decides how.</p>
<p class="prose">Unlike OSPF which finds the shortest path within a single network, BGP is policy-based routing. An ISP can decide to send traffic through a specific AS for business reasons — not just technical ones. Peering agreements, transit costs, and political considerations all influence BGP decisions.</p>

<div class="section-title">BGP Sessions and Peers</div>
<pre class="code-block"><code><span class="comment"># BGP requires TCP session on port 179</span>
<span class="comment"># iBGP — between routers in same AS</span>
<span class="comment"># eBGP — between routers in different AS</span>

<span class="comment"># BGP States (state machine)</span>
Idle → Connect → Active → OpenSent → OpenConfirm → Established

<span class="comment"># Check BGP sessions on Linux (FRRouting)</span>
vtysh -c "show bgp summary"
<span class="comment"># Neighbor      AS  MsgRcvd  MsgSent  Up/Down  State/PfxRcd</span>
<span class="comment"># 10.0.0.1   65001    12450    12300   1d02h     450</span></code></pre>

<div class="section-title">BGP Path Attributes — How a Route is Chosen</div>
<p class="prose">When there are multiple paths to the same prefix, BGP selects based on an ordered list of attributes. The decision process examines each attribute in a fixed order until it finds a tie-breaker.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Order</th><th>Attribute</th><th>Preferred Value</th></tr></thead><tbody>
<tr><td>1</td><td>Weight (Cisco)</td><td>Higher</td></tr>
<tr><td>2</td><td>Local Preference</td><td>Higher (default 100)</td></tr>
<tr><td>3</td><td>Locally originated</td><td>network/aggregate</td></tr>
<tr><td>4</td><td>AS Path length</td><td>Shorter</td></tr>
<tr><td>5</td><td>Origin</td><td>IGP > EGP > incomplete</td></tr>
<tr><td>6</td><td>MED</td><td>Lower</td></tr>
<tr><td>7</td><td>eBGP vs iBGP</td><td>eBGP preferred</td></tr>
</tbody></table></div>

<div class="section-title">BGP Hijacking and RPKI</div>
<p class="prose">BGP Hijacking occurs when an AS announces a prefix it does not own. The internet believes the announcement and traffic starts flowing to the wrong AS. RPKI (Resource Public Key Infrastructure) adds cryptographic validation: every prefix is signed by its legitimate owner. A router that supports RPKI will reject unsigned announcements.</p>

<div class="real-world-box">
  <div class="real-world-title">🌍 MyEtherWallet BGP Hijack — $150K in Crypto Stolen</div>
  <div class="real-world-body">
    April 2018: AS10297 (eNet Inc, Ohio) announced a BGP prefix belonging to Amazon Route 53 DNS. All queries for myetherwallet.com were redirected to a phishing server. The attack lasted 2 hours. Users who connected received a TLS certificate from an untrusted CA — but many clicked "proceed anyway."<br><br>
    The double lesson: RPKI would have prevented the BGP hijack. Certificate pinning in the browser would have prevented the phishing. Neither was implemented.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<p class="prose">Most developers do not configure BGP directly — but everyone encounters problems caused by it. The practical knowledge here: how to diagnose BGP issues, how to read BGP looking glasses, and how to check routing from your organization.</p>

<div class="section-title">Looking Glass — Seeing Internet Routing</div>
<p class="prose">A looking glass is a public interface to a major ISP's router that lets you query BGP. This is the real tool for diagnosing "why is traffic from country X taking a wrong path?"</p>
<pre class="code-block"><code><span class="comment"># Public tools:</span>
https://lg.he.net          <span class="comment"># Hurricane Electric — most popular</span>
https://bgp.tools           <span class="comment"># check any ASN and prefix</span>
https://bgpview.io          <span class="comment"># visual, excellent</span>

<span class="comment"># What to query:</span>
<span class="comment"># "show route 8.8.8.8" ← how to reach Google DNS</span>
<span class="comment"># "show bgp 1.1.1.1" ← AS Path to Cloudflare</span>

<span class="comment"># From terminal:</span>
traceroute -A 8.8.8.8   <span class="comment"># -A shows ASN at each hop</span>
mtr --aslookup google.com  <span class="comment"># live + ASN</span></code></pre>

<div class="section-title">How to Identify a BGP Hijack</div>
<p class="prose">If a site that was working suddenly does not respond, and traceroute shows unfamiliar hops — check with BGP tools. Signs: AS Path that changes suddenly, traffic routed through an unexpected country, latency that jumped 3-5x without infrastructure changes.</p>
<pre class="code-block"><code><span class="comment"># Check AS Path change</span>
curl -s "https://stat.ripe.net/data/bgp-state/data.json?resource=8.8.8.8" | python3 -m json.tool | grep "asns"
<span class="comment"># Compare to normal AS Path — a change is a red flag</span>

<span class="comment"># RPKI validation check</span>
curl -s "https://rpki-validator.realmv6.org/api/v1/validity/AS15169/8.8.8.0/24"</code></pre>

<div class="callout callout-tip"><strong>💡 When is this relevant to you?</strong> If you manage a CDN, build infrastructure across multiple regions, or diagnose latency anomalies — BGP looking glasses are the first tool to check.</div>

`<div class="did-you-know">💡 <strong>Did you know?</strong> DNS is the protocol most used for malware communication. Researchers found that over 90% of malware uses DNS for C2 (Command and Control). Why? Because port 53 is almost always open, DNS traffic looks legitimate, and DNS queries are small and unsuspicious.</div>

<div class="section-title">DNS Resolver Internals — What Happens Inside</div>
<p class="prose">When a computer asks "what is the IP of google.com", it contacts a recursive resolver — usually from the ISP, or 8.8.8.8 (Google), or 1.1.1.1 (Cloudflare). The resolver does all the work: it contacts root servers, TLD servers, and authoritative servers. The client itself does not contact any server directly — only the resolver.</p>
<p class="prose">Caching is what makes DNS scalable. Every response comes with a TTL (Time To Live) — the time the resolver can cache it. google.com with a TTL of 300 seconds means the resolver stores the answer for 5 minutes and does not ask again. Running <code>dig +trace google.com</code> shows every step in real time.</p>

<div class="section-title">DNSSEC — Cryptographic Validation</div>
<p class="prose">Regular DNS is unauthenticated — the resolver trusts every response it receives. DNSSEC (DNS Security Extensions) adds digital signatures to every record. Each zone signs its records with a private key, and a DNSSEC-aware resolver validates the signature before returning an answer. DNSSEC does not encrypt — it only validates that the answer is authentic.</p>
<pre class="code-block"><code><span class="comment"># Check DNSSEC</span>
dig +dnssec google.com A
<span class="comment"># RRSIG record = signature on the A record</span>

dig +short DS google.com @8.8.8.8
<span class="comment"># DS record = Delegation Signer — hash of child zone key</span>

<span class="comment"># DoH — DNS over HTTPS</span>
curl -s "https://dns.google/resolve?name=google.com&type=A" | jq .
<span class="comment"># DNS inside HTTPS — ISP cannot see queries</span>

<span class="comment"># DoT — DNS over TLS (port 853)</span>
kdig @1.1.1.1 +tls google.com</code></pre>

<div class="section-title">DNS Attacks</div>
<div class="grid-2">
<div class="card"><div class="card-icon">💥</div><div class="card-title">DNS Amplification DDoS</div><div class="card-body">Attacker sends DNS queries with a spoofed source IP to open resolvers. DNS response is 50-100x larger than the query. Resolver sends the response to the victim. Amplification factor: 100x. Defense: BCP38 filtering, disable open resolvers.</div></div>
<div class="card"><div class="card-icon">🎭</div><div class="card-title">DNS Cache Poisoning</div><div class="card-body">Attacker "poisons" the resolver cache with a forged answer. In the Dan Kaminsky attack (2008): a race condition in DNS allowed cache poisoning on any resolver. Fixed with source port randomization. DNSSEC fixes it completely.</div></div>
<div class="card"><div class="card-icon">🚇</div><div class="card-title">DNS Tunneling</div><div class="card-body">Hides data inside DNS queries. Malware encodes data in a subdomain: "dGF1c2Vy.evil.com". The "query" reaches the attacker's DNS server which decodes it. Detection: long queries, base64 subdomains, unusual volume.</div></div>
<div class="card"><div class="card-icon">🔀</div><div class="card-title">Split-Horizon DNS</div><div class="card-body">Same domain returns different answers based on query source. internal.company.com returns 10.0.0.5 to internal machines, and NXDOMAIN to the outside. VPN split tunneling relies on this.</div></div>
</div>

<div class="real-world-box">
  <div class="real-world-title">🌍 DNS Tunneling Detection — How to Identify</div>
  <div class="real-world-body">
    Security companies like Cisco Umbrella analyze DNS traffic to detect tunneling. Signs: queries longer than 50 characters, high entropy in the subdomain (looks like base64), the same domain receiving dozens of queries per minute, responses containing data instead of IPs.<br><br>
    Building detection: <code>cat dns.log | awk '{print length($5), $5}' | sort -rn | head -20</code> — find long queries. If you see subdomains like "aGVsbG8gd29ybGQ" — that is base64 for "hello world". That is tunneling.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<p class="prose">DNS problems are among the most common in production. "Site not responding", "Certificate error", "Email not arriving" — all start with a DNS check. The tools below are everyday routine.</p>

<div class="section-title">DNS Debug Playbook</div>
<pre class="code-block"><code><span class="comment"># Step 1: Does the DNS record exist?</span>
dig +short mysite.com A
dig +short mysite.com AAAA
<span class="comment"># If empty — record missing. If not — continue.</span>

<span class="comment"># Step 2: Is the problem with my specific DNS?</span>
dig mysite.com @8.8.8.8    <span class="comment"># ask Google DNS</span>
dig mysite.com @1.1.1.1    <span class="comment"># ask Cloudflare DNS</span>
dig mysite.com @9.9.9.9    <span class="comment"># ask Quad9</span>
<span class="comment"># Different answers = cache poisoning or propagation issue</span>

<span class="comment"># Step 3: TTL — how long to wait?</span>
dig mysite.com | grep -E "ANSWER|[0-9]+\\s+IN"
<span class="comment"># 300 IN A = 300 more seconds until cache refreshes</span>

<span class="comment"># Step 4: Propagation check</span>
<span class="comment"># https://dnschecker.org — see what DNS servers worldwide see</span></code></pre>

<div class="section-title">Email Not Arriving — SPF/DKIM/DMARC</div>
<pre class="code-block"><code><span class="comment"># Check SPF record</span>
dig TXT mysite.com | grep spf
<span class="comment"># v=spf1 include:_spf.google.com ~all ← correct</span>
<span class="comment"># If missing → email may go to spam</span>

<span class="comment"># Check DMARC</span>
dig TXT _dmarc.mysite.com
<span class="comment"># v=DMARC1; p=reject ← full protection</span>
<span class="comment"># v=DMARC1; p=none ← monitoring only — upgrade this</span>

<span class="comment"># Full check tool:</span>
<span class="comment"># https://mxtoolbox.com/SuperTool.aspx</span></code></pre>

<div class="section-title">Setting DNS Records in Production</div>
<p class="prose">Low TTL (60 seconds) = fast changes, but more DNS queries and load. High TTL (3600+) = stability, but changes take an hour to propagate. The rule: lower TTL to 300 an hour before deployment, make the change, restore TTL to 3600 after verifying it works.</p>

`<div class="did-you-know">💡 <strong>Did you know?</strong> HTTP/1.1 was published in 1997 and still runs on billions of connections. HTTP/2 (2015) brought multiplexing that saved 30-50% load time. HTTP/3 (2022) broke away from TCP entirely and moved to QUIC on UDP — improving latency by 30% on poor networks. TikTok, Google, Facebook — all running HTTP/3.</div>

<div class="section-title">What Was Broken in HTTP/1.1</div>
<p class="prose">HTTP/1.1 with keep-alive allowed multiple requests on one connection — but sequentially. Request B cannot start until Request A finishes. This is called Head-of-Line Blocking. A page with 100 resources caused browsers to open 6 parallel connections per domain — a workaround that created overhead and did not solve the real problem.</p>
<p class="prose">In addition, HTTP headers were sent again with every request. A 500-byte Cookie header sent with 100 requests equals 50KB of overhead for data that had not changed. On mobile browsing over 3G — that is significant.</p>

<div class="section-title">HTTP/2 — The Solution</div>
<pre class="code-block"><code><span class="comment"># HTTP/2 Key Features</span>

<span class="comment"># 1. Binary Protocol (not text)</span>
<span class="comment"># HTTP/1: GET /index.html HTTP/1.1
Host: example.com</span>
<span class="comment"># HTTP/2: binary frames — faster to parse, fewer errors</span>

<span class="comment"># 2. Multiplexing — parallel requests on one connection</span>
Stream 1: GET /index.html  →  ← Response
Stream 3: GET /style.css   →  ← Response
Stream 5: GET /app.js      →  ← Response (all concurrent!)

<span class="comment"># 3. Header Compression (HPACK)</span>
<span class="comment"># Request 1: sends all headers</span>
<span class="comment"># Request 2: sends only what changed — 90% savings</span>

<span class="comment"># 4. Server Push — server sends without request</span>
<span class="comment"># Browser requests index.html → server also sends style.css and app.js</span>

<span class="comment"># Check</span>
curl -I --http2 https://www.google.com | head -3
<span class="comment"># HTTP/2 200</span></code></pre>

<div class="section-title">HTTP/3 and QUIC — TCP Is Dead, Long Live UDP</div>
<p class="prose">HTTP/2 solved Head-of-Line Blocking at the application layer, but TCP still suffered from it at the transport layer: one lost packet stops all streams until it is recovered. QUIC (Quick UDP Internet Connections) solved this by moving to UDP with per-stream built-in reliability. Each stream is independent — a lost packet in stream 3 does not stop streams 1 and 5.</p>
<pre class="code-block"><code><span class="comment"># QUIC Advantages</span>
<span class="comment"># 1. 0-RTT Connection: client that knows the server</span>
<span class="comment">#    connects and sends data in the first packet</span>
<span class="comment">#    (vs TCP: 3-way handshake before any data)</span>

<span class="comment"># 2. Connection Migration</span>
<span class="comment">#    Computer switching from WiFi to cellular does not lose connection</span>
<span class="comment">#    QUIC connection ID is not tied to IP or port</span>

<span class="comment"># 3. Encrypted by default</span>
<span class="comment">#    QUIC = TLS 1.3 built in, not optional</span>

<span class="comment"># Check whether a site supports HTTP/3</span>
curl -I --http3 https://www.cloudflare.com
<span class="comment"># alt-svc: h3=":443" means the site supports HTTP/3</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 HTTP/2 Server Push — The Feature That Failed</div>
  <div class="real-world-body">
    Server Push looked brilliant in theory: the server sends resources before the browser requests them. In practice — it failed. Browsers did not always want the pushed resources (already in cache). Bandwidth was wasted. Chrome removed Server Push support in 2022.<br><br>
    HTTP/3 tried a different approach: Early Hints (HTTP 103) — the server sends a "hint" about resources that will arrive, the browser starts downloading while the main response is still on its way. Less aggressive, far more effective in practice.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<p class="prose">Most web servers support HTTP/2 today — but are not always configured correctly. Here is how to check, enable, and tune.</p>

<div class="section-title">Check: Is My Site Using HTTP/2?</div>
<pre class="code-block"><code><span class="comment"># curl — check protocol</span>
curl -sI --http2 https://mysite.com | head -1
<span class="comment"># HTTP/2 200 ← configured</span>
<span class="comment"># HTTP/1.1 200 ← needs enabling</span>

<span class="comment"># What does the server support?</span>
curl -sI https://mysite.com | grep -i "alt-svc"
<span class="comment"># alt-svc: h3=":443" ← HTTP/3 too!</span>

<span class="comment"># Chrome DevTools → Network → Protocol column</span>
<span class="comment"># h2 = HTTP/2, h3 = HTTP/3, http/1.1 = old</span></code></pre>

<div class="section-title">Enabling HTTP/2 in nginx</div>
<pre class="code-block"><code><span class="comment"># nginx.conf</span>
server {
    listen 443 ssl http2;   <span class="comment"># ← add http2</span>
    listen [::]:443 ssl http2;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    <span class="comment"># HTTP/2 preload hints (better than Server Push)</span>
    add_header Link "&lt;/style.css&gt;; rel=preload; as=style";
    add_header Link "&lt;/app.js&gt;; rel=preload; as=script";
}

<span class="comment"># Verify after change:</span>
nginx -t && systemctl reload nginx
curl -sI --http2 https://mysite.com | head -2</code></pre>

<div class="section-title">HTTP/3 via Cloudflare (the easy way)</div>
<p class="prose">If your site is behind Cloudflare: Speed → Optimization → Protocol Optimization → HTTP/3 → Enable. Cloudflare handles everything — the origin server continues speaking HTTP/1.1 or HTTP/2 with Cloudflare, and visitors get HTTP/3.</p>

<div class="callout callout-tip"><strong>💡 Real performance measurement:</strong> <code>curl -w "time_connect: %{time_connect}\\ntime_appconnect: %{time_appconnect}\\ntime_total: %{time_total}\\n" -o /dev/null -s https://mysite.com</code> — <code>time_appconnect</code> includes TLS. The difference between connect and appconnect = TLS overhead.</div>

`<div class="did-you-know">💡 <strong>Did you know?</strong> TLS 1.3 (2018) reduced the handshake from 2 round trips to 1. That may sound small — but on a connection between New York and London (70ms RTT), that is a 70ms saving on every HTTPS connection. Google reports this improved latency by 40% for users on high-latency connections.</div>

<div class="section-title">TLS Handshake — TLS 1.2 vs 1.3</div>
<p class="prose">The TLS Handshake is the ceremony that happens before data is encrypted. Browser and server agree on: which cipher to use, authenticate the certificate, and generate session keys that will be used to encrypt data. TLS 1.3 simplified the process significantly compared to TLS 1.2.</p>
<pre class="code-block"><code><span class="comment"># TLS 1.2 — 2 Round Trips</span>
Client → Server: ClientHello (cipher list)
Server → Client: ServerHello + Certificate + ServerHelloDone
Client → Server: ClientKeyExchange + ChangeCipherSpec + Finished
Server → Client: ChangeCipherSpec + Finished
↑ 2 round trips before data flows

<span class="comment"># TLS 1.3 — 1 Round Trip</span>
Client → Server: ClientHello + key_share (Diffie-Hellman public key)
Server → Client: ServerHello + key_share + Certificate + Finished
Client → Server: Finished
↑ 1 round trip. ↑ 0-RTT resumption for repeat connections</code></pre>

<div class="section-title">Cipher Suites — What Encrypts What</div>
<p class="prose">A Cipher Suite is a "package" of algorithms that defines: key exchange (how keys are exchanged), authentication (how identity is verified), encryption (how data is encrypted), and MAC (how integrity is verified). TLS 1.3 limited choices to 5 cipher suites only — all strong. TLS 1.2 supported 300+, including weak ones.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>Component</th><th>TLS 1.3</th><th>TLS 1.2 (legacy)</th></tr></thead><tbody>
<tr><td>Key Exchange</td><td>ECDHE only</td><td>RSA, DHE, ECDHE</td></tr>
<tr><td>Auth</td><td>RSA / ECDSA</td><td>+ DSA (weak)</td></tr>
<tr><td>Encryption</td><td>AES-GCM, ChaCha20</td><td>+ RC4 (broken!), 3DES</td></tr>
<tr><td>MAC</td><td>Built into AEAD</td><td>SHA-1 (weak), SHA-256</td></tr>
</tbody></table></div>

<div class="section-title">Certificates and PKI</div>
<p class="prose">A certificate is the server's "identity card" — signed by a Certificate Authority (CA) that the browser trusts. A certificate contains: domain name, public key, expiry date, and the CA's digital signature. The browser verifies: is the CA recognized? Does the domain match? Is it still valid?</p>
<pre class="code-block"><code><span class="comment"># Inspect a certificate</span>
openssl s_client -connect google.com:443 -showcerts 2>/dev/null | openssl x509 -noout -text | grep -E "Subject:|Issuer:|Not After"

<span class="comment"># Certificate Transparency — public log of all certificates</span>
<span class="comment"># https://crt.sh/?q=google.com</span>
<span class="comment"># Shows every certificate ever issued for google.com</span>

<span class="comment"># OCSP Stapling — revocation check</span>
openssl s_client -connect google.com:443 -status 2>/dev/null | grep -A 17 'OCSP Response'</code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 DigiNotar Hack — How a CA Was Compromised</div>
  <div class="real-world-body">
    2011: DigiNotar (a Dutch CA) was breached. Attackers issued a fraudulent certificate for *.google.com. Around 300,000 Iranians trying to access Gmail received a certificate that passed validation — Chrome said "connected securely." But the man-in-the-middle was reading all the traffic.<br><br>
    Certificate Transparency was created precisely because of DigiNotar: every certificate must be registered in a public log. A browser that receives an unregistered certificate refuses it. This allows immediate detection when a CA issues an unauthorized certificate.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<p class="prose">TLS misconfiguration is one of the most common security findings. The tools below help verify your configuration is correct before someone else finds the problem.</p>

<div class="section-title">SSL Labs — Comprehensive Check</div>
<p class="prose">SSL Labs by Qualys is the standard for TLS configuration testing. Go to https://ssllabs.com/ssltest — enter your domain, get a grade A/B/C/F with full details: cipher suites, certificate chain, supported protocols, HSTS. Target: grade A+.</p>

<div class="section-title">Tests from Terminal</div>
<pre class="code-block"><code><span class="comment"># What TLS version does the server use?</span>
openssl s_client -connect mysite.com:443 -tls1_3 2>/dev/null | grep "Protocol"
openssl s_client -connect mysite.com:443 2>/dev/null | grep "Protocol\\|Cipher"

<span class="comment"># Check certificate expiry</span>
echo | openssl s_client -connect mysite.com:443 2>/dev/null |   openssl x509 -noout -dates
<span class="comment"># notAfter=Dec 15 12:00:00 2025 GMT</span>

<span class="comment"># Check cipher suites the server accepts</span>
nmap --script ssl-enum-ciphers -p 443 mysite.com
<span class="comment"># A = strong, B = acceptable, C/D = weak — block!</span>

<span class="comment"># testssl.sh — most comprehensive</span>
./testssl.sh mysite.com
<span class="comment"># https://testssl.sh — works offline too</span></code></pre>

<div class="section-title">Recommended nginx TLS Config (2025)</div>
<pre class="code-block"><code>ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

<span class="comment"># HSTS — tell browser: HTTPS only forever</span>
add_header Strict-Transport-Security "max-age=63072000" always;

<span class="comment"># OCSP Stapling — less latency on revocation check</span>
ssl_stapling on;
ssl_stapling_verify on;
resolver 8.8.8.8 8.8.4.4 valid=300s;</code></pre>

<div class="callout callout-warn"><strong>⚠️ Certificate expiry monitoring:</strong> Let's Encrypt auto-renews — but only if the certbot cron is working. Set alerts at 30, 14, and 7 days before expiry. <code>echo | openssl s_client -connect mysite.com:443 2>/dev/null | openssl x509 -noout -checkend 604800</code> — exit code 1 means it expires within a week.</div>

`<div class="did-you-know">💡 <strong>Did you know?</strong> eBPF (extended Berkeley Packet Filter) lets you run programs in kernel space without writing a kernel module. Netflix, Google, Facebook, Cloudflare — all use eBPF for network observability, security, and performance. Meta reported that replacing iptables with eBPF saved 30% CPU on production servers.</div>

<div class="section-title">What is eBPF and Why is it Revolutionary</div>
<p class="prose">eBPF lets you write small programs that run inside the Linux kernel — safely. Before eBPF, if you wanted to do something advanced in the kernel (like monitoring every system call, or blocking packets at hardware level), you had to write a kernel module — risking a system crash, a complex process. With eBPF: write in C, compile to eBPF bytecode, the kernel verifier checks the program is safe, and run it.</p>
<p class="prose">The verifier is the key: it checks the program cannot enter an infinite loop, cannot access unauthorized memory, and cannot cause a crash. If it passes verification — the kernel runs it in JIT compiled mode, almost as fast as native code.</p>

<div class="section-title">Hook Points — Where eBPF Runs</div>
<div class="grid-2">
<div class="card"><div class="card-icon">⚡</div><div class="card-title">XDP — eXpress Data Path</div><div class="card-body">The earliest point in the network stack — runs in the driver before the kernel sees the packet. Very fast: up to 24M packets/sec per core. Use: DDoS mitigation, load balancing at Cloudflare.</div></div>
<div class="card"><div class="card-icon">🔍</div><div class="card-title">kprobes / tracepoints</div><div class="card-body">Hook into any kernel function. "Every time sys_write is called — give me the data." Full monitoring of every syscall without changing any codebase.</div></div>
<div class="card"><div class="card-icon">🔒</div><div class="card-title">LSM Hooks — Security</div><div class="card-body">Security checks. "Do not allow this process to open files outside /tmp." Falco and Tetragon use this for runtime security.</div></div>
<div class="card"><div class="card-icon">📊</div><div class="card-title">Network TC — Traffic Control</div><div class="card-body">Ingress and egress traffic shaping. Cilium (Kubernetes CNI) is built entirely on eBPF TC hooks — replacing iptables.</div></div>
</div>

<div class="section-title">eBPF Tools — What Already Exists</div>
<pre class="code-block"><code><span class="comment"># bcc tools — dozens of ready-made tools</span>
execsnoop          <span class="comment"># trace every exec() syscall</span>
tcptracer          <span class="comment"># trace TCP connections</span>
biolatency         <span class="comment"># disk I/O latency histogram</span>
funclatency -u curl_perform  <span class="comment"># latency of a specific function</span>

<span class="comment"># bpftrace — one-liners</span>
bpftrace -e 'kprobe:tcp_connect { printf("connect: %s
", comm); }'
<span class="comment"># trace every TCP connection with process name</span>

bpftrace -e 'tracepoint:syscalls:sys_enter_openat { printf("%s %s
", comm, str(args->filename)); }'
<span class="comment"># trace every file opened</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 Cloudflare and XDP — DDoS Mitigation at Miraculous Speed</div>
  <div class="real-world-body">
    Cloudflare receives DDoS attacks of 1+ Tbps. iptables cannot keep up with the rate — the kernel overhead of netfilter causes CPU saturation before packets are blocked. XDP runs before netfilter, before the kernel network stack, at the driver level.<br><br>
    With XDP, Cloudflare blocks 26 million packets per second from a single CPU. The packet arrives at the NIC, the XDP program runs in nanoseconds and returns XDP_DROP, the packet never enters the kernel. That is the difference between a DDoS that takes a server down and one that goes unnoticed.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<p class="prose">You do not need to write eBPF programs yourself to get value from them. Dozens of ready-made tools exist — some more powerful than strace, tcpdump, and top combined.</p>

<div class="section-title">bcc-tools — Install and Use Immediately</div>
<pre class="code-block"><code><span class="comment"># Ubuntu/Debian</span>
sudo apt install bpfcc-tools linux-headers-$(uname -r)

<span class="comment"># execsnoop — every process created on the system</span>
sudo execsnoop-bpfcc
<span class="comment"># Great for debugging: "what does this cron job actually run?"</span>

<span class="comment"># tcpconnect — every new TCP connection</span>
sudo tcpconnect-bpfcc
<span class="comment"># PID  COMM    IP SADDR       DADDR       DPORT</span>
<span class="comment"># 1234 curl    4  192.168.1.5  93.184.216.34  443</span>

<span class="comment"># opensnoop — every file opened</span>
sudo opensnoop-bpfcc -p 1234
<span class="comment"># Great for debugging: "why is this process slow?" → see I/O</span>

<span class="comment"># biolatency — disk I/O latency as histogram</span>
sudo biolatency-bpfcc -D 10 1</code></pre>

<div class="section-title">bpftrace — Powerful One-liners</div>
<pre class="code-block"><code><span class="comment"># How long does each DNS query take?</span>
sudo bpftrace -e 'kprobe:udp_sendmsg { @start[tid]=nsecs; }
  kretprobe:udp_recvmsg /@start[tid]/ {
    @us = hist((nsecs-@start[tid])/1000); delete(@start[tid]); }'

<span class="comment"># Which process opens the most files?</span>
sudo bpftrace -e 'tracepoint:syscalls:sys_enter_openat { @[comm] = count(); }' -c 10</code></pre>

<div class="callout callout-tip"><strong>💡 Practical use case:</strong> Production server is slow and you do not know why. Run <code>execsnoop</code> for 30 seconds — you see a cron job spawning 15 processes every 10 seconds. Not visible in top, not in ps, not in any log — only in eBPF tracing.</div>

`<div class="did-you-know">💡 <strong>Did you know?</strong> Kubernetes in production with 1000 nodes and 10,000 pods can reach 100,000 iptables rules. Every connection checks all of them in order — O(n) complexity. That is why companies move to eBPF/Cilium — O(1) lookup with hash maps instead of linear iptables chains.</div>

<div class="section-title">Docker Networking — What Happens Underneath</div>
<p class="prose">When you run a Docker container, it gets its own network namespace — a virtual network interface, routing table, and firewall rules completely separate from the host. Docker creates a virtual ethernet pair (veth): one end in the container (eth0), the other on the host (vethXXXXX). The host connects all veth interfaces to the docker0 bridge.</p>
<pre class="code-block"><code><span class="comment"># Docker Network Modes</span>
<span class="comment"># bridge (default) — isolated, NAT to outside</span>
docker run --network bridge nginx

<span class="comment"># host — shares network namespace with host</span>
docker run --network host nginx    <span class="comment"># nginx listens on host port 80 directly</span>

<span class="comment"># none — no network</span>
docker run --network none alpine   <span class="comment"># completely isolated</span>

<span class="comment"># Inspect Docker networks</span>
docker network ls
docker network inspect bridge
ip addr show docker0               <span class="comment"># bridge interface on host</span>
ip link | grep veth                <span class="comment"># veth pairs</span></code></pre>

<div class="section-title">Kubernetes Networking — Pod-to-Pod</div>
<p class="prose">Kubernetes requires: every Pod gets a unique IP. Every Pod can communicate with every other Pod without NAT. That sounds simple — but in practice it is complex: Pods on different nodes need to talk, and routing must be managed between all nodes. CNI (Container Network Interface) is the plugin that does this.</p>
<div class="table-wrap"><table class="data-table"><thead><tr><th>CNI</th><th>Approach</th><th>Best For</th></tr></thead><tbody>
<tr><td><strong>Flannel</strong></td><td>VXLAN overlay</td><td>Simple, any cloud</td></tr>
<tr><td><strong>Calico</strong></td><td>BGP routing</td><td>Performance, network policies</td></tr>
<tr><td><strong>Cilium</strong></td><td>eBPF</td><td>Large scale, observability</td></tr>
<tr><td><strong>Weave</strong></td><td>Overlay mesh</td><td>Multi-cloud</td></tr>
</tbody></table></div>

<div class="section-title">Service Mesh — Istio and Linkerd</div>
<p class="prose">A service mesh adds an infrastructure layer between microservices: mTLS (encryption between all services), traffic management (routing, retries, circuit breakers), and observability (traces, metrics, logs). Istio is based on the Envoy proxy sidecar — an extra container in every Pod that intercepts all traffic.</p>
<pre class="code-block"><code><span class="comment"># Istio — Service Mesh in practice</span>
<span class="comment"># Every Pod gets an Envoy sidecar automatically</span>
kubectl get pods -n production
<span class="comment"># payment-service-7d9f8  2/2  Running ← 2/2 = app + envoy</span>

<span class="comment"># mTLS between services — automatic</span>
<span class="comment"># Envoy A encrypts, Envoy B decrypts — app does not know</span>

<span class="comment"># VXLAN Overlay — how Flannel works</span>
<span class="comment"># Pod A (10.244.1.5) ← vxlan → Pod B (10.244.2.8) on different node</span>
<span class="comment"># Ethernet frame inserted into UDP packet (VXLAN encapsulation)</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 The iptables Scale Problem in Kubernetes</div>
  <div class="real-world-body">
    LinkedIn reported: Kubernetes cluster with 1000+ nodes. Every node runs kube-proxy that translates Services into iptables rules. With 10,000 services — 170,000 iptables rules per node. Every packet scan is O(n) — significant latency overhead. CPU usage grows linearly with every new Service.<br><br>
    The solution they adopted: move to Cilium. eBPF hash maps are O(1) lookup. Networking CPU usage dropped 35%. Latency dropped 20%. The migration took 6 months of work, but delivered clear ROI.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<p class="prose">When a container "cannot connect to the DB" or "cannot reach service X" — here is the standard diagnostic playbook.</p>

<div class="section-title">Docker Networking Debug</div>
<pre class="code-block"><code><span class="comment"># What network is the container on?</span>
docker inspect my_container | jq '.[0].NetworkSettings.Networks'

<span class="comment"># ping between containers (must be on same network)</span>
docker exec container_a ping container_b
docker exec container_a ping container_b_ip

<span class="comment"># Check ports</span>
docker port my_container     <span class="comment"># what is forwarded?</span>

<span class="comment"># Check DNS inside docker</span>
docker exec my_container cat /etc/resolv.conf
<span class="comment"># nameserver 127.0.0.11 ← Docker embedded DNS</span>

<span class="comment"># Network not responding? Check iptables rules Docker added:</span>
sudo iptables -L DOCKER -n -v</code></pre>

<div class="section-title">Kubernetes: Pod Cannot Reach a Service</div>
<pre class="code-block"><code><span class="comment"># Step 1: Does the Service exist with the right port?</span>
kubectl get svc my-service -o yaml | grep -A5 "ports:"

<span class="comment"># Step 2: Are there Endpoints? (= Pods that passed readiness)</span>

<span class="comment"># Step 3: Check DNS from inside</span>
kubectl run debug --image=busybox --rm -it -- nslookup my-service
kubectl run debug --image=busybox --rm -it -- nslookup my-service.namespace.svc.cluster.local

<span class="comment"># Step 4: Check connectivity directly</span>
kubectl exec -it my-pod -- curl http://my-service:8080/health

<span class="comment"># Step 5: Network Policy issue?</span>
kubectl get networkpolicies -A</code></pre>

`<div class="did-you-know">💡 <strong>Did you know?</strong> The Linux kernel default TCP buffer is 4MB. Google runs TCP buffers of 256MB between datacenters. The difference? On a 10Gbps link with 100ms RTT (high BDP — Bandwidth Delay Product), a small buffer causes the TCP window to fail to utilize full bandwidth. Formula: BDP = bandwidth x RTT = 10Gbps x 0.1s = 1Gb = 125MB buffer needed.</div>

<div class="section-title">TCP Tuning — sysctl Parameters</div>
<p class="prose">TCP performance in Linux is controlled by dozens of kernel parameters changeable at runtime via sysctl. The defaults are designed for an "average" case — low latency, medium bandwidth. For high-performance environments (10Gbps+, cross-datacenter), precise tuning is required.</p>
<pre class="code-block"><code><span class="comment"># Check current TCP buffer settings</span>
sysctl net.core.rmem_max       <span class="comment"># max receive buffer</span>
sysctl net.ipv4.tcp_rmem       <span class="comment"># min default max</span>
sysctl net.ipv4.tcp_wmem       <span class="comment"># send buffers</span>

<span class="comment"># Tuning for high-bandwidth long-distance</span>
sysctl -w net.core.rmem_max=268435456     <span class="comment"># 256MB</span>
sysctl -w net.core.wmem_max=268435456
sysctl -w net.ipv4.tcp_rmem="4096 87380 268435456"
sysctl -w net.ipv4.tcp_wmem="4096 65536 268435456"

<span class="comment"># TCP Congestion Control</span>
sysctl net.ipv4.tcp_congestion_control   <span class="comment"># current: cubic</span>
sysctl -w net.ipv4.tcp_congestion_control=bbr  <span class="comment"># Google's BBR</span>
<span class="comment"># BBR: bandwidth-based, not loss-based. Best for high-BDP paths</span></code></pre>

<div class="section-title">TCP Congestion Control — Cubic vs BBR</div>
<p class="prose">TCP Congestion Control is the mechanism that decides how much data to send. When there is packet loss — congestion is assumed, TCP reduces the window. The problem: on modern high-speed networks, packet loss does not always mean congestion. BBR (Bottleneck Bandwidth and RTT) from Google (2016) changed the approach: measure bandwidth and RTT separately, send based on a bottleneck model — not heuristic loss detection.</p>
<div class="grid-2">
<div class="card"><div class="card-icon">🔲</div><div class="card-title">CUBIC (default)</div><div class="card-body">Loss-based: grows window until loss, then shrinks. Works well on LAN. On high-latency WAN (100ms+) — slow convergence.</div></div>
<div class="card"><div class="card-icon">🚀</div><div class="card-title">BBR (Google)</div><div class="card-body">Model-based: calculates bottleneck bandwidth and RTT. Does not rely on loss. YouTube reported 4% throughput improvement and 14% latency reduction after enabling BBR.</div></div>
</div>

<div class="section-title">Zero-Copy and RDMA</div>
<pre class="code-block"><code><span class="comment"># Zero-Copy — sendfile() vs read()+write()</span>
<span class="comment"># Traditional:</span>
disk → kernel buffer → user buffer → socket buffer → NIC
<span class="comment"># 4 copies! 4 context switches!</span>

<span class="comment"># Zero-Copy (sendfile):</span>
disk → kernel buffer → NIC (DMA direct)
<span class="comment"># 0 user-space copies. nginx and kafka use this</span>

<span class="comment"># SO_ZEROCOPY socket option (Linux 4.14+)</span>
setsockopt(sock, SOL_SOCKET, SO_ZEROCOPY, &one, sizeof(one));
send(sock, buf, len, MSG_ZEROCOPY);

<span class="comment"># RDMA — Remote Direct Memory Access</span>
<span class="comment"># Write directly to remote machine's RAM without CPU involvement</span>
<span class="comment"># Latency: 1-3 microseconds (vs TCP: 10-100us)</span>
<span class="comment"># Used in HPC, financial trading, GPU clusters</span></code></pre>

<div class="real-world-box">
  <div class="real-world-title">🌍 Google BBR — What Was Wrong and Why They Changed</div>
  <div class="real-world-body">
    Before BBR: YouTube on TCP CUBIC. On mobile networks with packet buffering (bufferbloat), CUBIC interprets delay as congestion and reduces throughput. Videos were buffering — not because bandwidth was low, but because CUBIC was too conservative.<br><br>
    After BBR: Google enabled BBR on WAN links. From internal measurements: throughput increased 2,700% on high RTT. Latency dropped 75%. YouTube video start time dropped 20%.
  </div>
</div>

<div class="callout callout-info" style="margin-top:32px"><strong>🔧 In Practice</strong></div>

<p class="prose">Before changing kernel parameters in production — measure. Before measuring — establish a baseline. Here is the standard workflow.</p>

<div class="section-title">Baseline Measurement</div>
<pre class="code-block"><code><span class="comment"># iperf3 — real bandwidth measurement</span>
<span class="comment"># On server:</span>
iperf3 -s

<span class="comment"># On client:</span>
iperf3 -c server_ip -t 30       <span class="comment"># 30 seconds TCP</span>
iperf3 -c server_ip -u -b 1G   <span class="comment"># UDP, 1Gbps target</span>
iperf3 -c server_ip -P 4       <span class="comment"># 4 parallel streams</span>

<span class="comment"># ping — latency and jitter</span>
ping -c 100 server_ip | tail -1
<span class="comment"># rtt min/avg/max/mdev = 0.5/1.2/3.8/0.4 ms</span>
<span class="comment"># mdev = jitter — important for VoIP and gaming</span></code></pre>

<div class="section-title">Enabling BBR (Linux 4.9+)</div>
<pre class="code-block"><code><span class="comment"># Check current</span>
sysctl net.ipv4.tcp_congestion_control
<span class="comment"># cubic ← default</span>

<span class="comment"># Enable BBR</span>
echo "net.core.default_qdisc=fq" >> /etc/sysctl.conf
echo "net.ipv4.tcp_congestion_control=bbr" >> /etc/sysctl.conf
sysctl -p

<span class="comment"># Verify</span>
sysctl net.ipv4.tcp_congestion_control
<span class="comment"># bbr</span>

<span class="comment"># Measure before and after with iperf3</span>
<span class="comment"># On WAN links with latency >20ms — BBR always wins</span></code></pre>

<div class="section-title">TCP Buffer Tuning for High Bandwidth</div>
<pre class="code-block"><code><span class="comment"># Calculate BDP = bandwidth × RTT</span>
<span class="comment"># 1Gbps × 50ms RTT = 50Mb = 6.25MB buffer needed</span>

<span class="comment"># Add to /etc/sysctl.conf:</span>
net.core.rmem_max = 67108864
net.core.wmem_max = 67108864
net.ipv4.tcp_rmem = 4096 87380 67108864
net.ipv4.tcp_wmem = 4096 65536 67108864
net.ipv4.tcp_mtu_probing = 1

sysctl -p   <span class="comment"># apply without reboot</span></code></pre>

`<div class="sum-block"><div class="sum-block-title">🔬 Wireshark — Seeing Every Byte on the Network</div>
<div class="sum-row"><span class="sum-k">The simple idea</span><span class="sum-v">When you browse the internet, your computer sends and receives <strong>thousands of tiny "letters" per second</strong> — each called a "packet". Wireshark is like a <strong>security camera for your network</strong>: it captures every packet and shows it in full detail. You can see exactly what your computer sends and receives, to which server, and even the <em>content</em> of the conversation.</span></div>
<div class="sum-row"><span class="sum-k">Layers explained</span><span class="sum-v">Every packet is like an envelope inside an envelope: <strong>Ethernet</strong> (who sends to whom on local network) → <strong>IP</strong> (internet address) → <strong>TCP/UDP</strong> (which "service") → <strong>HTTP/TLS</strong> (the actual content). Wireshark opens each layer separately, like Russian nesting dolls.</span></div>
<div class="sum-row"><span class="sum-k">Display Filters</span><span class="sum-v">Filter what you see from thousands of packets. <code>http</code> = only website traffic. <code>ip.addr == 8.8.8.8</code> = only traffic with that IP. <code>tcp.port == 443</code> = only HTTPS. <code>dns</code> = only DNS queries. Like a search engine for your network traffic.</span></div>
<div class="sum-row"><span class="sum-k">Follow Stream</span><span class="sum-v">Right-click a packet → "Follow TCP Stream" → Wireshark shows the <strong>entire conversation</strong> in readable order. HTTP (unencrypted) = you see all the text. HTTPS (encrypted) = unreadable gibberish — that's why HTTPS matters.</span></div>
<div class="sum-row"><span class="sum-k">Why this matters</span><span class="sum-v">Wireshark on an HTTP network = sees <strong>everything</strong> — passwords, cookies, messages. On a public WiFi = can capture others' packets. This is why <strong>every modern site needs HTTPS</strong>. Wireshark is also how you debug network issues, verify performance, and find the root cause of connection problems.</span></div>
<div class="sum-danger">⚠️ Using Wireshark on networks you don't own is illegal. Always get permission first. It's powerful exactly because it sees everything.</div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🌐 BGP — How the Internet Knows Where to Send Your Data</div>
<div class="sum-row"><span class="sum-k">The problem BGP solves</span><span class="sum-v">The internet is a collection of tens of thousands of separate networks (ISPs, companies, universities). When you send an email from New York to Tokyo, <strong>how is the path chosen?</strong> BGP is a "living map": each network tells its neighbors "I can reach these addresses" — and the global routing table is built from this mutual gossip.</span></div>
<div class="sum-row"><span class="sum-k">AS — Autonomous System</span><span class="sum-v">Every organization that manages an independent network gets an AS number. <strong>AS15169 = Google</strong>, AS16509 = Amazon AWS, AS13335 = Cloudflare. Your ISP = an AS. When you visit Google.com, your packet travels through multiple ASes. BGP is the protocol managing all this routing between them.</span></div>
<div class="sum-row"><span class="sum-k">BGP Hijacking — when someone lies</span><span class="sum-v">In 2008, <strong>Pakistan Telecom announced that YouTube belonged to them</strong>. BGP believed them — because BGP is trust-based with no verification. Every YouTube user in the world was routed to... Pakistan. 75 million users blocked. The internet stopped for 2 hours. <strong>This can still happen today</strong>.</span></div>
<div class="sum-row"><span class="sum-k">RPKI — the solution</span><span class="sum-v">Like a digital signature on every BGP announcement. If Google says "I reach these addresses", it signs it cryptographically. Someone tries to lie? The signature won't match. Cloudflare, AWS, and most major ISPs already implement RPKI. Adoption is growing fast since 2020.</span></div>
<div class="sum-row"><span class="sum-k">BGP Tools</span><span class="sum-v"><strong>bgp.he.net</strong>: Enter any AS or IP — see its routing map. <strong>bgpview.io</strong>: visual graph of AS relationships. <code>traceroute -A google.com</code>: shows which AS numbers your packet traverses on the way to Google. <strong>Looking Glass servers</strong>: BGP routing table from different points worldwide.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🔍 DNS — The Internet's Phone Book</div>
<div class="sum-row"><span class="sum-k">What DNS does</span><span class="sum-v">IP addresses are numbers: 142.250.185.46. Humans remember names: google.com. DNS translates names to numbers, exactly like a <strong>phone book</strong>. When you type "google.com", the first thing your browser does is ask a DNS server. Without DNS — the internet doesn't work. Period.</span></div>
<div class="sum-row"><span class="sum-k">5 steps of Resolution</span><span class="sum-v"><strong>1</strong> Local cache (remembers from last time). <strong>2</strong> Your ISP's Resolver (asks on your behalf). <strong>3</strong> Root Server — knows who manages .com. <strong>4</strong> TLD Server — knows who manages google.com specifically. <strong>5</strong> Google's Authoritative Server — gives the final IP. All of this in under 50 milliseconds.</span></div>
<div class="sum-row"><span class="sum-k">DNSSEC — preventing forgery</span><span class="sum-v">Imagine someone alters the phone book — writing a fake address for your bank, sending you to a fake bank site. That's <strong>DNS Cache Poisoning</strong>. DNSSEC solves this: every DNS response is digitally signed. If someone tampers — the signature breaks and your browser refuses to load the page.</span></div>
<div class="sum-row"><span class="sum-k">DNS over HTTPS (DoH)</span><span class="sum-v">Regular DNS queries are visible: your ISP sees <strong>every site you visit</strong> (even over HTTPS!). DoH encrypts DNS queries inside HTTPS — your ISP only sees you talked to 1.1.1.1, not which specific sites. Firefox and Chrome already use this by default in some regions.</span></div>
<div class="sum-row"><span class="sum-k">DNS Tunneling — malicious use</span><span class="sum-v">Problem: DNS is almost <strong>never blocked by firewalls</strong> — because without DNS there's no internet. Hackers exploit this: hiding stolen data inside DNS queries. <code>stolendata.secret.attacker.com</code> — the "query" is actually the stolen data. Detected by checking subdomain <em>length</em> — legitimate domains are short.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">⚡ HTTP/2 & HTTP/3 — The Speed Revolution</div>
<div class="sum-row"><span class="sum-k">The HTTP/1.1 problem</span><span class="sum-v">Imagine a supermarket with <strong>only one checkout lane</strong> — each customer must wait for the previous one to fully finish. A modern web page = 100 resources (images, CSS, JS). With HTTP/1.1 each resource waits for the previous. Browsers opened 6 parallel connections as a workaround, but it was still slow.</span></div>
<div class="sum-row"><span class="sum-k">HTTP/2 — Multiplexing</span><span class="sum-v">Opened <strong>parallel "checkout lanes" on the same connection</strong>. 100 resources? All transfer simultaneously on one connection, each with a "queue number" (stream ID). Header Compression: headers repeat in every request — HTTP/2 only sends what <em>changed</em>. Result: 2-3× faster for complex pages.</span></div>
<div class="sum-row"><span class="sum-k">The remaining problem</span><span class="sum-v">HTTP/2 still runs on <strong>TCP</strong>, and in TCP if one packet is lost — <strong>everything stops</strong> waiting for it. On bad WiFi with 2% packet loss: all 100 streams in HTTP/2 freeze because of one lost packet. Sometimes worse than HTTP/1.1!</span></div>
<div class="sum-row"><span class="sum-k">QUIC — the genius idea</span><span class="sum-v">Google invented: <strong>UDP instead of TCP</strong>. UDP doesn't guarantee delivery — but QUIC adds reliability <em>per stream separately</em>. If one image's packet is lost — only that image waits, <strong>the other 99 resources keep flowing</strong>. Also: TLS 1.3 built-in, 0-RTT reconnect for known servers.</span></div>
<div class="sum-row"><span class="sum-k">HTTP/3 — today</span><span class="sum-v">HTTP/3 = HTTP over QUIC. <strong>Chrome: ~60% of traffic already HTTP/3</strong>. Cloudflare, Google, Facebook — all use it. On networks with 2% packet loss: HTTP/3 is <strong>3× faster</strong> than HTTP/1.1. Connection Migration: switched from WiFi to cellular? The connection continues without dropping.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🔐 TLS — How HTTPS Protects You</div>
<div class="sum-row"><span class="sum-k">The problem TLS solves</span><span class="sum-v">Without encryption, all network data is visible to anyone. Wireshark on public WiFi → reads everything you send. With TLS, data is <strong>encrypted</strong>: even if someone captures the packets, they see only unreadable gibberish. The padlock in your browser = TLS is working.</span></div>
<div class="sum-row"><span class="sum-k">Handshake — 1 second of "agreement"</span><span class="sum-v">Before every HTTPS session: <strong>1</strong> Browser says "hello, encryption I support...". <strong>2</strong> Server chooses encryption, sends certificate (identity document). <strong>3</strong> Both calculate a shared key (ECDHE). <strong>4</strong> All communication encrypted with that key. TLS 1.3: all of this in 1 round-trip (under 10ms).</span></div>
<div class="sum-row"><span class="sum-k">Certificate — identity document</span><span class="sum-v">When you visit bank.com, <strong>how does your browser know it's the real bank</strong> and not a fake site? The certificate. A Certificate Authority (CA) — trusted body like DigiCert — verified: "yes, bank.com is that bank." The browser trusts the CA. Chain of trust: Root CA → Intermediate CA → your certificate.</span></div>
<div class="sum-row"><span class="sum-k">Perfect Forward Secrecy</span><span class="sum-v">Without PFS: if a server is hacked and private key stolen — <strong>all past conversations can be decrypted</strong> (if recorded). With PFS (ECDHE): each session gets a new key that's immediately deleted. Even if private key is stolen — old conversations <em>cannot</em> be decrypted. TLS 1.3 mandates PFS.</span></div>
<div class="sum-row"><span class="sum-k">Certificate Transparency</span><span class="sum-v">What if a rogue CA issues a fake certificate for bank.com? CT Log: <strong>every certificate in the world must be registered in a public log</strong> (crt.sh). Banks check daily — "was a certificate created for me that I didn't order?" If yes — revoke immediately. This system has already caught multiple CA compromises.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🐝 eBPF — "Programming" Directly Inside the Linux Kernel</div>
<div class="sum-row"><span class="sum-k">The simple idea</span><span class="sum-v">The Linux kernel is the server's "brain" — controls everything. <strong>Normally you can't change it</strong> without writing a kernel module (dangerous, requires reboot, can crash the server). eBPF lets you <strong>inject small programs directly into the kernel</strong>, safely — the kernel automatically checks the code won't cause damage before running it.</span></div>
<div class="sum-row"><span class="sum-k">Kernel Module vs eBPF</span><span class="sum-v">Kernel module crashes → kernel panic → entire server crashes. eBPF crashes → graceful failure → server keeps running. That's why <strong>Google, Netflix, Cloudflare, Facebook — all</strong> use eBPF in production. The eBPF verifier checks before execution: no infinite loops, no out-of-bounds memory access.</span></div>
<div class="sum-row"><span class="sum-k">XDP — blocking DDoS in nanoseconds</span><span class="sum-v">eXpress Data Path: eBPF at the <strong>network card level</strong> — packet arrives → checked → dropped <em>before the kernel even sees it</em>. Cloudflare protects millions of sites this way: 1 Tbps DDoS attack? eBPF drops all malicious packets in nanoseconds, <strong>without CPU load</strong>.</span></div>
<div class="sum-row"><span class="sum-k">Cilium — Kubernetes in eBPF</span><span class="sum-v">Kubernetes (cloud container management) used iptables for routing — O(n) rules: 1000 services = checking 1000 rules per packet. Cilium replaced this with eBPF maps: 1 lookup regardless of how many Services. <strong>50× faster</strong>. AWS, Azure, Google Cloud — all use Cilium today.</span></div>
<div class="sum-row"><span class="sum-k">bpftrace — one-line debugging</span><span class="sum-v"><code>bpftrace -e 'tracepoint:syscalls:sys_enter_open { printf("%s\n", str(args->filename)); }'</code> — print every file every process opens, <strong>in real time</strong>. Without stopping the program, without changing code. Like an X-ray for a live server. Finds memory leaks, performance bottlenecks, and security events.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">🐳 Container Networking — How Containers Talk</div>
<div class="sum-row"><span class="sum-k">What is a container?</span><span class="sum-v">Like a VM but lighter: an <strong>isolated process</strong> with its own filesystem, network, and users — but sharing the kernel with the rest of the OS. Docker is the popular tool. Each container feels like it has a whole computer, but in reality dozens of containers run on one server.</span></div>
<div class="sum-row"><span class="sum-k">Network Namespace</span><span class="sum-v">The secret: Linux <strong>Network Namespace</strong>. Each container gets its own namespace — network interfaces, routing table, and iptables rules of its own. Container A can't see Container B's network. The kernel creates a <strong>veth pair</strong> (like a virtual cable) connecting the container to the network bridge.</span></div>
<div class="sum-row"><span class="sum-k">Docker Networking</span><span class="sum-v"><code>docker run -p 8080:80 nginx</code>: container runs in its own "bubble" with an internal IP (172.17.0.5). The <code>-p 8080:80</code> means: when someone from outside reaches port 8080 — forward to port 80 of the container. Docker adds an iptables rule automatically.</span></div>
<div class="sum-row"><span class="sum-k">Kubernetes Networking</span><span class="sum-v">In Kubernetes: every Pod gets a <strong>unique IP</strong> reachable from anywhere in the cluster — without NAT. Service = a "stable" IP (VIP) representing a group of Pods. Automatic load balancer between Pods. kube-proxy manages iptables/IPVS rules routing traffic to the right Services.</span></div>
<div class="sum-row"><span class="sum-k">CNI Plugins</span><span class="sum-v">Container Network Interface: the standard defining how networks are created for containers. <strong>Flannel</strong>: simple, VXLAN overlay. <strong>Calico</strong>: BGP routing, no overlay — faster. <strong>Cilium</strong>: eBPF, fastest, L7 policies ("block HTTP but allow gRPC"). The choice affects performance and security.</span></div>
</div>`,
`<div class="sum-block"><div class="sum-block-title">⚡ Network Performance Tuning — Squeezing Out Maximum Speed</div>
<div class="sum-row"><span class="sum-k">TCP Buffer — why throughput is limited</span><span class="sum-v">Imagine a water pipe: how much water flows depends on <strong>diameter</strong> (bandwidth) and <strong>pressure</strong>. In TCP: Bandwidth × RTT = <strong>BDP</strong> (how many bytes are "in the pipe" at any moment). If buffer is smaller than BDP — TCP must wait for acknowledgments and can't fill the pipe. Linux: <code>net.core.rmem_max=134217728</code> for high-speed WAN.</span></div>
<div class="sum-row"><span class="sum-k">BBR Congestion Control</span><span class="sum-v">The old algorithm (CUBIC) guessed how much to send — based on packet loss. BBR (Google, 2016): directly measures <strong>bandwidth and RTT</strong> in real time. Result: <strong>2-3× more throughput</strong> on networks with packet loss, 25× on long-distance connections. YouTube and Gmail switched to BBR in 2017.</span></div>
<div class="sum-row"><span class="sum-k">TCP Offloading</span><span class="sum-v">Without offloading: the CPU calculates checksums, splits data into segments — for <strong>every packet</strong>. TSO (TCP Segmentation Offload): moves segmentation to the <strong>network card</strong>. GRO: merges small packets into large ones before the kernel sees them. Result: 30% less CPU for the same throughput.</span></div>
<div class="sum-row"><span class="sum-k">iperf3 — measuring throughput</span><span class="sum-v">Server: <code>iperf3 -s</code>. Client: <code>iperf3 -c SERVER -t 30 -P 4</code>. <code>-P 4</code> = 4 parallel streams (simulates reality). Computer measured 800 Mbps but ISP promises 1Gbps? iperf3 shows if the bottleneck is in the NIC, cable, switch, or ISP.</span></div>
<div class="sum-row"><span class="sum-k">DPDK — kernel bypass</span><span class="sum-v">In HFT and 5G servers: the kernel itself is the bottleneck. DPDK lets <strong>user-space talk directly to the network card</strong> — without the kernel. Up to <strong>80 million packets/second</strong> on one CPU. RDMA: send data directly to another server's RAM over the network, without CPU involvement at all.</span></div>
<div class="sum-tip">💡 <strong>Performance debugging in order:</strong> <code>ss -s</code> (check drops) → <code>ethtool -S eth0</code> (check NIC) → <code>iperf3</code> (measure) → <code>perf top</code> (CPU hotspots) → eBPF for deep diagnosis. Don't guess — <strong>measure first</strong>.</div>
</div>`

// ===== INTERACTIVE LAB ENGINE =====
// Types: fill, classify, order, mchoice

function renderLab(chId) {
  const el = document.getElementById('lab-' + chId);
  if (!el || el.dataset.rendered) return;
  el.dataset.rendered = '1';
  const exs = getL(chId);
  const Lc = L();
  const labTypeNames = currentLang==='he'
    ? {fill:'✏️ השלמה', classify:'🗂️ סיווג', order:'🔢 סידור', mchoice:'🎭 תרחיש', complete:'הושלמו', orderSeq:'הסדר שבחרת:', orderCheck:'בדקי ✓', allDone:'כל התרגילים הושלמו!'}
    : {fill:'✏️ Fill in', classify:'🗂️ Classify', order:'🔢 Order', mchoice:'🎭 Scenario', complete:'completed', orderSeq:'Your order:', orderCheck:'Check ✓', allDone:'All exercises done!'};

  el.innerHTML = `<div class="lab-header">
    <div class="lab-progress-row">
      <span class="lab-progress-label" id="lab-prog-label-${chId}">0/${exs.length} ${labTypeNames.complete}</span>
      <div class="lab-progress-bar"><div class="lab-progress-fill" id="lab-prog-fill-${chId}" style="width:0%"></div></div>
    </div>
  </div>` + exs.map((ex, i) => {
    if (ex.type === 'fill')     return renderFill(chId, i, ex, Lc, labTypeNames);
    if (ex.type === 'classify') return renderClassify(chId, i, ex, Lc, labTypeNames, exs.length);
    if (ex.type === 'order')    return renderOrder(chId, i, ex, Lc, labTypeNames, exs.length);
    if (ex.type === 'mchoice')  return renderMChoice(chId, i, ex, Lc, labTypeNames, exs.length);
    return '';
  }).join('') +
  `<div class="lab-done-banner" id="lab-done-${chId}" style="display:none">
    <span>🏆</span><span id="lab-done-txt-${chId}"></span>
  </div>`;
}

function renderFill(chId, i, ex, Lc, T) {
  const total = getL(chId).length;
  const fields = ex.fields.map((f, fi) =>
    `<div class="fill-row" id="fill-row-${chId}-${i}-${fi}">
      <label class="fill-label">${f.label}</label>
      <div class="fill-input-wrap">
        <input class="fill-input" id="fill-inp-${chId}-${i}-${fi}" placeholder="${f.placeholder}"
          oninput="fillCheck(${chId},${i},${fi})" autocomplete="off" spellcheck="false">
        <span class="fill-icon" id="fill-icon-${chId}-${i}-${fi}"></span>
      </div>
    </div>`).join('');
  return `<div class="lab-card" id="labcard-${chId}-${i}">
    <div class="lab-card-hdr"><span class="lab-type-badge">${T.fill}</span><span class="lab-card-num">${i+1}/${total}</span></div>
    <div class="lab-card-q">${ex.q}</div>
    <div class="fill-fields">${fields}</div>
    <div class="lab-explain-box" id="labexp-${chId}-${i}" style="display:none"><strong>${Lc.labExplain}</strong> ${ex.explain||''}</div>
  </div>`;
}

function fillCheck(chId, i, fi) {
  const exs = getL(chId);
  const f = exs[i].fields[fi];
  const inp = document.getElementById(`fill-inp-${chId}-${i}-${fi}`);
  const icon = document.getElementById(`fill-icon-${chId}-${i}-${fi}`);
  const row = document.getElementById(`fill-row-${chId}-${i}-${fi}`);
  if (!inp) return;
  const val = inp.value.trim().toLowerCase();
  const alts = (f.alt || []).map(a => a.toLowerCase());
  const ok = val === f.answer.toLowerCase() || alts.includes(val);
  row.className = 'fill-row' + (val.length===0?'': ok?' fill-correct':' fill-wrong');
  icon.textContent = val.length===0?'': ok?'✓':'';
  const allOk = exs[i].fields.every((ff, ffi) => {
    const v = (document.getElementById(`fill-inp-${chId}-${i}-${ffi}`)?.value||'').trim().toLowerCase();
    return v === ff.answer.toLowerCase() || (ff.alt||[]).map(a=>a.toLowerCase()).includes(v);
  });
  if (allOk) markLabDone(chId, i);
}

function renderClassify(chId, i, ex, Lc, T, total) {
  const shuffled = [...ex.items].sort(() => Math.random() - 0.5);
  return `<div class="lab-card" id="labcard-${chId}-${i}">
    <div class="lab-card-hdr"><span class="lab-type-badge">${T.classify}</span><span class="lab-card-num">${i+1}/${total}</span></div>
    <div class="lab-card-q">${ex.q}</div>
    ${ex.desc?`<div class="lab-desc">${ex.desc}</div>`:''}
    <div class="classify-pool" id="pool-${chId}-${i}">
      ${shuffled.map(item=>`<button class="classify-chip" id="chip-${chId}-${i}-${item.id}" onclick="classifySelect(${chId},${i},'${item.id}')">${esc(item.text)}</button>`).join('')}
    </div>
    <div class="classify-cats">
      ${ex.categories.map((cat,ci)=>`
        <div class="classify-cat" onclick="classifyDrop(${chId},${i},${ci})">
          <div class="classify-cat-title">${cat}</div>
          <div class="classify-cat-zone" id="zone-${chId}-${i}-${ci}"></div>
        </div>`).join('')}
    </div>
    <div class="lab-explain-box" id="labexp-${chId}-${i}" style="display:none"><strong>${Lc.labExplain}</strong> ${ex.explain||''}</div>
  </div>`;
}

const _csel = {};
function classifySelect(chId, i, itemId) {
  _csel[`${chId}-${i}`] = itemId;
  document.querySelectorAll(`#pool-${chId}-${i} .classify-chip, #labcard-${chId}-${i} .classify-drop-chip`).forEach(c=>c.classList.remove('selected'));
  document.getElementById(`chip-${chId}-${i}-${itemId}`)?.classList.add('selected');
}
function classifyDrop(chId, i, ci) {
  const key = `${chId}-${i}`;
  const itemId = _csel[key]; if(!itemId) return;
  const ex = getL(chId)[i];
  const item = ex.items.find(it=>it.id===itemId); if(!item) return;
  const ok = item.ans === ex.catKeys[ci];
  document.getElementById(`chip-${chId}-${i}-${itemId}`)?.remove();
  const zone = document.getElementById(`zone-${chId}-${i}-${ci}`);
  if (zone) {
    const chip = document.createElement('span');
    chip.className = 'classify-drop-chip ' + (ok?'drop-correct':'drop-wrong');
    chip.textContent = (ok?'✓ ':'✗ ') + item.text;
    chip.onclick = () => { chip.remove(); const pool=document.getElementById(`pool-${chId}-${i}`); if(pool){const b=document.createElement('button');b.className='classify-chip';b.id=`chip-${chId}-${i}-${itemId}`;b.textContent=item.text;b.onclick=()=>classifySelect(chId,i,itemId);pool.appendChild(b);} };
    zone.appendChild(chip);
  }
  delete _csel[key];
  const allPlaced = ex.items.every(it => !document.getElementById(`chip-${chId}-${i}-${it.id}`));
  if (allPlaced) {
    const allOk = ex.items.every(it => { const ci2=ex.catKeys.indexOf(it.ans); const z=document.getElementById(`zone-${chId}-${i}-${ci2}`); return z && [...z.querySelectorAll('.drop-correct')].some(c=>c.textContent.includes(it.text)); });
    document.getElementById(`labexp-${chId}-${i}`)?.style && (document.getElementById(`labexp-${chId}-${i}`).style.display='block');
    if (allOk) markLabDone(chId, i);
  }
}

function renderOrder(chId, i, ex, Lc, T, total) {
  const shuffled = [...ex.items].sort(() => Math.random() - 0.5);

    <div class="lab-card-hdr"><span class="lab-type-badge">${T.order}</span><span class="lab-card-num">${i+1}/${total}</span></div>
    <div class="lab-card-q">${ex.q}</div>

const _ostate = {};
function orderClick(chId, i, itemId) {
  const key=`${chId}-${i}`; if(!_ostate[key]) _ostate[key]=[];
  if(_ostate[key].includes(itemId)) return;
  _ostate[key].push(itemId);
  const btn = document.getElementById(`oitem-${chId}-${i}-${itemId}`);
  if(btn){btn.classList.add('order-selected');btn.disabled=true;}
  const zone = document.getElementById(`orderseq-${chId}-${i}`);
  if(zone){const s=document.createElement('div');s.className='order-seq-step';s.dataset.id=itemId;s.innerHTML=`<span class="order-seq-num">${_ostate[key].length}</span> ${btn?.textContent||''}`;s.onclick=()=>orderRemove(chId,i,itemId);zone.appendChild(s);}
}
function orderRemove(chId, i, itemId) {
  const key=`${chId}-${i}`; if(!_ostate[key]) return;
  _ostate[key]=_ostate[key].filter(id=>id!==itemId);
  const btn=document.getElementById(`oitem-${chId}-${i}-${itemId}`);
  if(btn){btn.classList.remove('order-selected');btn.disabled=false;}
  const zone=document.getElementById(`orderseq-${chId}-${i}`);
  if(zone){const s=zone.querySelector(`[data-id="${itemId}"]`);if(s)s.remove();zone.querySelectorAll('.order-seq-step').forEach((st,idx)=>{const n=st.querySelector('.order-seq-num');if(n)n.textContent=idx+1;});}
}
function orderCheck(chId, i) {
  const key=`${chId}-${i}`;
  const ex=getL(chId)[i];
  const chosen=_ostate[key]||[];
  const fb=document.getElementById(`orderfb-${chId}-${i}`);
  const isHe=currentLang==='he';
  if(chosen.length<ex.correct.length){if(fb){fb.textContent=isHe?`⚠️ בחרי את כל ${ex.correct.length} השלבים`:`⚠️ Select all ${ex.correct.length} steps`;fb.className='order-feedback warn';}return;}
  const ok=ex.correct.every((id,idx)=>chosen[idx]===id);
  if(fb){fb.textContent=ok?'✅ '+(isHe?'מצוין! סדר נכון.':'Correct! Perfect order.'):'❌ '+(isHe?'לא בדיוק. נסי שוב.':'Not quite. Try again.');fb.className='order-feedback '+(ok?'ok':'err');}
  if(ok){document.getElementById(`labexp-${chId}-${i}`)?.style&&(document.getElementById(`labexp-${chId}-${i}`).style.display='block');markLabDone(chId,i);}
  else setTimeout(()=>{_ostate[key]=[];const zone=document.getElementById(`orderseq-${chId}-${i}`);if(zone)zone.innerHTML='';document.getElementById(`orderpool-${chId}-${i}`)?.querySelectorAll('.order-item').forEach(b=>{b.classList.remove('order-selected');b.disabled=false;});if(fb){fb.textContent='';fb.className='order-feedback';}},1300);
}

// ===== HELPERS =====
function L() { return currentLang==='he' ? C.he : C.en; }

function getQ(i) {
  const key = currentLang+'-'+i;
  if (!_sqCache[key]) {
    const raw = (currentLang==='en' ? (QUIZZES_EN[i]||QUIZZES[i]) : QUIZZES[i]) || QUIZZES[0];
    _sqCache[key] = raw.map(q => shuffleOptions(q));
  }
  return _sqCache[key];
}
function getL(i) { return (currentLang==='en' ? (ILABS_EN[i]||ILABS[i]) : ILABS[i]) || ILABS[0]; }
function getG(i) {
  const key = currentLang+'-g-'+i;
  if (!_sgCache[key]) {
    const raw = (currentLang==='en' ? (GAME_QS_EN[i]||GAME_QS[i]) : GAME_QS[i]) || GAME_QS[0];
    _sgCache[key] = raw.map(q => shuffleOptions(q));
  }
  return _sgCache[key];
}
const _sqCache = {}, _sgCache = {};

// ===== NORMALIZE + SHUFFLE (length bias fix) =====
function normalizeOptions(q) {
  const lens = q.o.map(o => o.length);
  const wrongLens = lens.filter((_, i) => i !== q.a);
  const maxWrong = Math.max(...wrongLens);
  const cap = maxWrong;
  const newOpts = q.o.map(o => {
    if (o.length <= cap) return o;
    let t = o.slice(0, cap);
    const ls = t.lastIndexOf(' ');
    if (ls > cap * 0.5) t = t.slice(0, ls);
    return t;
  });
  return { ...q, o: newOpts };
}
function shuffleOptions(q) {
  const norm = normalizeOptions(q);
  const idx = [0,1,2,3];
  for (let i = idx.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [idx[i],idx[j]] = [idx[j],idx[i]];
  }
  return { ...norm, o: idx.map(i=>norm.o[i]), a: idx.indexOf(norm.a) };
}
